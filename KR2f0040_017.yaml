body:
  text: 名臣經濟録卷十七明黃訓編吏部文選中修省陳言奏狀王恕文選清吏司案呈准驗封清吏司奉本部送准禮部咨𢎞治二年七月日該太監韋泰傳奉聖㫖近日京城雨水為災南京又奏大風雷雨之異朕當檢身飭行祗謹天戒爾文武百官尤當各冝修省勉圖報稱毋自因循各衙門政事有闕失當舉行改正的斟酌停當來說禮部知道欽此欽遵等因案呈到部臣等欽遵聖諭痛加修省勉圖報稱外今將本部政事闕失當舉行改正的事件斟酌人情事體開坐伏乞聖明裁處緣係修省事理未敢擅便具題奉聖㫖都准行欽此一查得諸司職掌內開九年考滿教官考不通經者别用府衛教授州學正縣教諭府衛州縣訓導俱係教官教授係正九品學正教諭訓導俱未入流謂之别用者但不令復為教官而於品級相等官內改用也教授合改從九品稅課司大使府倉大使司獄巡檢等官學正教諭訓導合改除未入流河泊所官稅課局織染局鹽課司大使副使等官景泰天順年間教授有改稅課司大使等官者學正教諭訓導有改除倉官河泊等官者近年以來不分教授學正教諭訓導俱改除河泊所官非惟太拘其於教授實為降等有乖别用之制合無今後教官考不通經者教授改除從九品大使司獄巡檢等官學正教諭訓導俱改除未入流河泊所及大使副使等官不拘衙門如此則改調有等選法疏通一外官九年考滿到部有司官繁稱升二級簡稱升一級教官考通經府州縣學官舉人及數乃升衛學官并選貢衙門學官無舉人亦升丁憂起復除者舊例俱以後任定其黜陟頗有不均且如有司官前任簡歷俸少後任繁歷俸多升二級固為相應若前任繁歷俸多後任簡歷俸少止升一級不無有虧教官前任府州縣學日多後任衛學并選貢衙門學日少照衛學并選貢衙門學不論舉人而升固不相應前任衛學并選貢衙門學日多後任府州縣學日少論舉人不及數而不升亦不相應合無今後有司官九年考滿不分前任後任但事繁歷俸日多者升二級事簡歷俸日多者升一級教官亦不分前任後任但任府州縣學日多者從府州縣學論任衛學并選貢衙門學日多者從衛學并選貢衙門學論如此則事體停當人心悅服一在外所屬例該考核官員雖開合干上司考核詞語不開稱職平常不稱職字樣者案候行查回報之日有司官引奏復職教官具奏入選不無守候人難合無今後有司官雖不開稱職平常不稱職字樣其詞語內有勤能端謹等項字樣者即以稱職論有頗可字樣者即以平常論有無為無守誤事懶惰等項字樣者即以不稱論初考二考不行查就與定稱否引奏復職三考仍候行查至日定奪全無考核詞語照舊行查教官舊例止以到部考通經有舉人定黜陟不以上司考語為殿最雖無考語即與具奏入選差錯官吏俱照例參問一舊例外官考滿前任日少許通理前後任日多另歷三年是說丁憂起復并更調改除官前任後任近年以來却將考滿給由到部復任輳考者亦以前任後任如前論之此其因襲之失合無改正今後止以丁憂起復及更調改除為前兩任照前例查考其考滿復任輳考不必論前任後任多少一考滿官歷任六年止開三年事蹟給由者參問准作三年考滿仍令回任補造六年考滿牌冊給由不無往返人難合無今後考滿官雖歷任六年止開三年事蹟考滿給由者免其參問准作三年考滿不必補造六年考滿牌冊候九年考滿通將後六年事蹟攢造牌冊給由為便一吏員出身考滿或該升正從八品正九品者或該本等用者或該降者入選之時考中該升者升該本等用者本等用該降者降不中俱降雜職內巡檢與司府衛倉場大使俱係從九品官巡檢以軍囚及數升司府衛倉場大使以糧草及數升巡檢不考就升司府衛倉場大使考中方升不中降雜職此諸司職掌不該載不知昉於何時一向因襲而行且以正從八品并正九品官考不中一例俱降雜職似無分别是以入選官懷不平者往往纒告合無今後吏員出身考滿該升正從八品正九品者考中照例升考不中本等用其原該本等用并該降者不必考驗照例選若考中該升告願就雜職者聽如此則選法一而人心服一知印資格兩京五府知印從八品出身六部都察院知印九品出身在外都布按三司知印從九品出身在外知印係農民僉充役滿赴部冠帶辦事半年不考就除從九品職事在京知印係役滿承差請㫖做役滿冠帶五府者考中除從八品職事六部都察院者考中除正九品職事考不中俱降除雜職且在外知印不考就照資格除授在京知印考中方照資格除授此係正統天順成化年間事例不中降用事體不一况知印原非書辦文案人役與吏典一般考試招擬多是不中往往降除雜職是資格高者得官反卑資格卑者得官反高似非所冝除都布按三司知印照舊不考就選外合無今後五府六部都察院知印臨選之時止考行移照資格除授不中者降一級用如此則事體適中而彼此皆安議南京吏部尚書王㒜等備奏狀王恕文選清吏司案呈奉本部送吏科抄出南京吏部尚書王㒜等奏云云等因具奏奉聖㫖該部知道欽此欽遵抄出送司案呈到部除均勞逸以愜士心事備咨禮部徑自施行今將簡大臣以綜政務等七事逐一議擬開立前件伏乞聖裁緣奉欽依該部知道事理未敢擅便具題奉聖㫖南京戶工二部各添尚書一員吏禮兵三部各添侍郎一員有兩員的罷寫本監生准照數添兩京取撥監生仍舊吏典不必經由御史等官考送只部裡嚴加考選不許姑息其餘准議欽此一看得南京吏部尚書王㒜等奏稱南京戶刑工三部較之各部政務頗繁今止有侍郎一員及南京都察院止有僉都御史一員要於各尚書或侍郎都察院右都御史請㫖簡命各一員前來到任管事一節查得南京總督糧儲右副都御史李益近奉欽依改南京都察院管事連右僉都御史虞瑶已足二員之數不必再添外南京戶刑工三部委的政務頗繁堂上官少分理不周合當添除南京兵部亦係事繁衙門左侍郎白昂近奉欽依改戶部左侍郎提督整理河南山東河道去訖止有尚書張鎣獨員管事又兼參贊機務亦合添除合無於戶刑工三部或尚書侍郎各添一員兵部添侍郎一員命下之日本部照例㑹同各部都察院通政司大理寺三品以上大臣於兩京各衙門及在外巡撫方面內推舉相應官各兩員請㫖簡用一查得成化十七年節該聽選監生陳䇿等奏要照倉攢曹寬等冠帶守支事例冠帶聽選等因該吏科參看得朝廷設立學校作養人才一三代崇尚儒術之意故科貢有常制任用有差等今聽選監生陳䇿乏藏器待時之猷忘觀我朵頥之戒包羞忍恥自比雜流希求冠帶恐虧大體等因節經立案訖今南京吏部尚書王㒜又奏要將赴選監生不拘科貢納粟等項年四十以上及㑹試中副榜不願就職舉人不拘年嵗給與冠帶大意欲使附選監生年老者可榮終身副榜舉人不第者終為教官固是疏通選法之一端但人之常情好榮利者多甘恬退者少節奉詔書恩例監生有不願出仕者聽授以從七品依親坐監者授以正八品俱有司職名及填注衙門其有嵗貢生員到京不曽坐監不願出仕者亦聽比例給與冠帶閒住俱係見行奈何不願出仕者千無一二减年冒進者比比皆然且三考吏典巳有資格例該冠帶附選監生未定品級難令冠帶今若一槩給與冠帶不惟使科貢之人下同雜流且非崇儒舊規一查得在外司府州縣等衙門官三年六年俱赴部給由惟雲南布政司所屬府州縣官并軍職首領官三年六年考滿俱赴本布政司給由考核就彼復職牌冊類繳候九年通考赴部其各處閘埧河泊稅課司局并驛遞官三年六年考滿𨽻布政司者俱赴各該布政司給由南直𨽻赴南京吏部給由亦就彼考核復職牌冊俱差人類繳本部北直𨽻者赴本部給由引奏復職九年通考官不分逺近俱赴部給由係是舊例及查得成化六年為申明舊制事本部題准今後除邊方軍馬錢糧所係官員考滿申請定奪外其餘不係邊方大小官員務要依例三年給由雖有專責差占及奉例納米等項三年六年之間亦要一次赴部給由考核不許託故違者查理究問有規避黜降巳經通行外成化二十等年又該戶部題准被災去處三年六年考滿官員依例納米准令給由以備一時救荒又經通行去後今奏前因誠為有理除雲南等處地方窵逺有司大小官員照舊布政司給由外其浙江等布政司并南北直𨽻府州縣等衙門今後有司大小官員三年六年考滿俱要依例赴部給由考核驛遞等官在外者仍赴本布政司給由係南直𨽻者赴南京吏部給由俱造牌冊繳部查考北直𨽻者赴本部給由引奏復職不許仍前令其一槩納米以玷名節如遇地方災傷缺糧賑濟許令有司預先别作措置或臨期多方區處如此則考課之法不致廢弛而備荒之政不悮矣一看得南京吏部尚書王㒜等奏稱南京戶部等衙門俱有寫本監生止是本部并南京禮部一向不曽添設及稱各衙門寫本監生俱行本部轉行南京國子監取撥止有戶工二部徑自行取不曽經由本部及至滿日却乃送回附選年月淺深無從查算要將南京吏部并禮部各添設寫本監生二名兵部再添設一名及將南京戶工二部寫本監生俱從本部取撥一節合無准其所言行移南京吏部依擬施行及照南京刑部工部都察院大理寺鴻臚寺尚寶寺寫本監生俱經由本部取撥內禮部寫本并兵部清軍清黃續黃中書舍人寫誥戶部天財庫收鈔工部清匠都察院出巡刷卷等項監生俱係各衙門徑自行取歷滿之日方送到部附選年月淺深亦難查考合無今後遇有前項各衙門寫本清黃等項監生有缺俱要行移本部照缺轉行國子監取撥如此則事體歸一庶便查考一看得南京吏部尚書王㒜等奏稱辦事當該吏典數少不拘撥用要全撥福建湖廣所屬府州縣或摘撥江西福建湖廣窵逺府分及要停止巡按御史考試新例一節照得天下吏員出身資格雖有不同皆是管事人員若不考送一槩收用將來豈不誤事前項考送之例無非甄别人才以備任用立法之意未為不善兼且行之未久難便停止兩考各處吏典赴本部給由者亦有數撥用尚恐不敷其湖廣福建兩省吏員難准全撥合無量撥福建邵武府湖廣德安州吏典與南京吏部本部仍行福建湖廣布政司今後二府并所屬吏典役滿之日徑自起送南京吏部撥用如此則事頗得中而人不乏用矣一查得諸司職掌內開吏員人等父母年老别無人丁者務要經由本部移文體勘是實明白奏准方許離役俱候親終服滿起復赴部聽用今南京吏部尚書王㒜等奏稱吏典初參之時不思親老缺人侍養及至役滿赴部即告侍親要將充吏農民審係單丁不許起送收參合無通行各布政司及南北直𨽻今後選取農民充吏之時務行所屬官司里老從實審勘軍匠戶五丁以上民戶二丁以上方許收充單丁之家不許一槩朦朧起送收參其充吏之後兄弟亡故父母年老無人侍養告要侍親者仍照舊例施行一查得諸司職掌京官丁憂具奏關領勘合回家守制若有接喪者申報本部改填勘合其餘官吏監生承差知印人等聞父母喪守制接丁祖父母繼母喪等憂起復到部查有原籍官吏里老保結者俱准收用今南京吏部尚書王㒜等奏稱丁憂官吏有接服者俱要預先申逹起復之日查無預申者送問仍將符同官吏究問如律一節合無准其所言照依先年奏准事例通行天下今後丁憂官吏人等服制未滿接服守制者隨即具告本州縣審勘明白申報該部備照候起復之日查無預申新喪公文者就送法司問罪仍將符同官吏究問若稱已行申報中途沉滯者官員監生不許赴選吏典不與實撥候行查至日定奪議知府言芳升用科道官奏狀𢎞治三年王恕文選清吏司案呈奉本部送戶科抄出直𨽻廣平府知府言芳等奏工科給事中唐希介監察御史李葵盤糧專事威福等項事情該通政使司官奏奉聖㫖這本所奏的事該衙門看了來說欽此欽遵抄出送司案呈到部除專事威福及僞造關防等項事情係别部掌行外其言清要之職合無仍求久歷别官才德素聞之人升用其新進年少雖一時紙上文字可觀才德未著冝勿輕授致令傲然輕世作聰明以乖治體一節查得給事中從前至今多係進士就除並無别官升用及查得𢎞治元年正月該南京禮部精膳清吏司郎中李諒奏稱近年以來被前奸貪之臣畏懼糾彈朦朧奏稱新中進士未諳刑名事體必先選在外有司推官知縣待其政績昭著吏部行取選任御史不知內寓奸術意將初中進士正大之氣轟烈獨立敢言之時也一旦選為有司庶職使之奔走於塵埃馬足之中俯仰於承問聽命之頃曲折百般頓挫無奈守政者俟命挨次行取奔競者請託權貴保舉旌異既得美官只知恩出於權貴縱有奸惡豈肯輒便紏核合無仍照依舊制於進士中年貌相應學行優長平昔名實相須者及聽選舉人在外進士知縣儒學官員果係學行兼全政績著聞者相兼博訪精選任用庶使賢才彚進風憲得人至治日臻等因具奏奉聖㫖該衙門看了來說欽此欽遵本部議得推官知縣進士俱讀聖賢書俱由科目出身豈進士無練逹老成之人推官知縣皆不才奔競之士顧擇而用之何如耳茍擇得其人則皆可用用匪其才則皆不稱此必然之理不易之論也今南京禮部精膳清吏司李諒奏要仍照舊例於進士中年貌相應學行優長及聽選舉人與在外進士知縣儒學官員相兼任用御史一節誠為得冝合無准其所言今後選用御史於在京各衙門辦事進士與夫曽經一考稱職行人博士及進士舉人出身推官知縣內選年三十以上五十以下人物端莊詞語正當操行亷謹才識優長者送都察院理刑半年滿日聽本院考察各注考語連人送部諳曉刑名不堪為御史者别用巳經節次題准將進士陳震等選送理刑及實授御史去後今知府言芳又奏前因臣等切惟科道之職不職係乎人之賢不賢不係乎新進之與久任也人固有出仕未久而端重老成者亦有歷官數年而浮躁如故者似難以新進久任而槩論人之賢否也况言芳所言唐希介等前項不法事情未經體勘不知虛實難憑言芳一人之言將已經銓選之法輕易更改若候行勘唐希介等前項事情如果是實付諸法司論罪發落自足以警戒將來豈冝因人而遂變其法合無候戶部行查唐希介李葵有無前項事情奏請定奪以後給事中御史有缺仍照見行事例兼用進士除補永為定規緣係節該欽依該衙門看了來說事理未敢擅便具題奉聖㫖是欽此議知州趙源乞開升衙門奏狀𢎞治三年王恕文選清吏司案呈奉本部送准兵部咨職方清吏司案呈奉本部送兵科抄出廣西龍州土官知州趙源奏云云等因奏奉聖㫖該部知道欽此欽遵抄出移咨送司案呈到部看得廣西龍州土官知州趙源奏稱本州地方與安南國毗連每遇交人進貢往來係臣率領兵目迎送護持其間官僞稱侯伯都督侍郎勢張狐犬之威欺壓守備官員妄自尊大乞照馮祥縣開設軍民府事例將龍州改為龍州府土官知府職事張牙爪精神保固地方一節臣等竊聞書曰監於先王成憲其永無愆詩曰不愆不忘率由舊章此古昔之格言後世君臣之所當法守者也緣前項地方自國初開設州治迄今一百二十餘年自趙帖堅附為土官知州子孫世襲其職至趙源已是四輩未嘗改作所以邊釁不生境內晏然今土官知州趙源無上事設此謀託此詞欲升百餘年來已定之州治而為府治若允所請恐邊境自此多事矣非地方之福亦非趙源之福合無行令巡撫都御史今後如遇安南遣使入貢經過龍州地方差官開諭來使務要遵守禮法毋得生事擾害仍戒諭知州趙源亦要安分循理遵守祖宗成憲永享和平之福毋再妄生異議率意改作以貽後日之悔緣奉欽依該部知道事理未敢擅便具題奉聖㫖是欽此議修盧溝河官不當升職奏狀王恕文選清吏司案呈奉本部送內府抄出欽差內官監太監李興題云云等因具題奉聖㫖吏部便斟酌了來看欽此欽遵抄出送司案呈到部切惟朝廷置文思院官并把總人匠無非為營造設也今副使潘俊等修築盧溝河隄岸工完雖曽效勞是乃職分之所當為非分外事也訪得天順年間并成化初年亦曽修築河隄本部查無升官事例想是彼時不曽升官止查得成化十九年六月修築盧溝橋决口工完把總袁狗兒等十二名八月蓋造恭慎夫人墳塋工完升把總柴甫成等四名九月修理大慈恩寺殿宇工完把總金全等三十七名俱文思院副使是以濫升匠官并欽天監太醫院等衙門官日增月益動以千計大壞名器虛費錢糧物議為之沸騰欲其革職而未之能逮至陛下即位因科道建言一切罷去人心十分痛快仰望太平且如營造憲宗皇帝山陵乃初政第一莫大工程凡八閲月所役軍夫匠作人等何止三四萬然告成中間豈無精通藝業造作有方之人亦豈無揀擇月日修合藥餌書辦文案之人未聞有加升職事者今修隄之功不及山陵三分之一較其事之輕重奚啻百鈞之於一羽也營造山陵工完未嘗升官今修築河隄工完若許升官不無有失輕重况目今修城等項工程數多若工完之日俱照此例奏討升官將何詞以拒之其為冗濫又復如前日矣豈不為新政之纍所據副使潘俊等只可量加賞賚以酬其勞恐不可升官以開弊端也緣奉欽依吏部便斟酌了來看事理未敢擅便𢎞治三年五月初十日具題奉聖㫖是潘俊等不准升都加與賞賜欽此覆運使周軫等選任運司官奏狀王恕文選清吏司案呈奉本部送吏科抄出山東都轉運鹽使司運使周軫等奏云云等因具奏奉聖㫖吏部知道欽此欽遵抄出送司查得先該南京工部營繕清吏司主事夏英奏稱今後運使同知務選年壯亷潔之士副使判官要除進士英俊之人官年壯則無日暮途窮之憂任進士則有砥礪名節之勸如有不為利誘者三五年間不次升擢等因該戶部議擬具題節該奉聖㫖運司官員吏部照依所奏選除欽此欽遵已經節次將二甲進士萬福等三甲進士袁翺等選除運使運判訖今該前因案呈到部檢照諸司職掌內開各鹽運使各一員同知各一員副使各一員判官員數不等蓋以運使為掌印正官同知與運使同知其事副使則副運使而行事所以不分運司鹽課多寡而各設一員也判官員數不等者蓋以判官為分司催辦鹽課之官如兩淮運司有泰州淮安通州三分司則設判官三員長蘆運司有滄州青州二分司則設判官二員兩浙運司有溫台寧紹嘉興松江四分司則設判官四員由是而知判官乃分司催辦官後雖頗有裁革職掌未嘗不同今運使周軫不知何為而有運使所以總理鹽課而公𣲖商之法同知副判所以親臨鹽場而盡催辦之勤之說若不與之辨别誠恐不知所惑而以周軫之言為是使同知副使遂為催辦之官而不得干預司事不無有乖治體其言本司運判缺員要於第三甲進士內精選一員或舉人監生中有年力精壯可必其有守有為者一員以補其缺一節但即今舊進士已住外選新進士辦事不久未該選用合無於舉人監生內選補前缺今後各處運副運判有缺於進士舉人內相兼選用仍通行各該鹽運使司使知朝廷設官之意如或分司缺判官催辦暫委運同運副催辦或監掣盤鹽等項亦聽差委如判官不缺及别無差委著令運同運副公同運使管事或共案署押或分投理辦務要同寅協恭秉公效勞共成其事不許互相推託致誤公務如違許巡鹽監察御史參究拏問應奉請者照例施行如此則官不久缺職掌不紊緣奉欽依吏部知道事理未敢擅便𢎞治三年五月初十日具題奉聖㫖是欽此再論工完乞恩奏狀王恕該本部題文選清吏司案呈奉本部送內府抄出內官監太監李廣等題云云等因具題奉聖㫖該部看了來說欽此欽遵抄出送司查得先該內官監太監李興題稱奉勑提督官軍人匠修築盧溝橋工完要將文思院等衙門副使潘俊把總曲興等量加升職本部為照營造憲宗皇帝山陵乃初政第一莫大工程所役軍夫匠作人等何止三四萬凡八閲月然後告成未聞有加升職者今修築河隄工完若許升官不無有失輕重况目今修城等項工程數多若工完之日俱照此例奏討升官將何詞以拒之其為冗濫又復如前日矣豈不為新政之纍所據副使潘俊等只可量加賞賚以酬其勞恐不可升官以開弊端等因具題奉聖㫖是潘俊等不准升都加與賞賜欽此欽遵今該前因案呈到部看得太監李廣等題稱修築正陽等門城垣河橋工完乞要將冠帶掌作把總并天文生醫士及催工官尚禮等量加俸級一節緣修築城垣河橋較之修築河堤工程相去不逺盧溝橋工完官匠人等既奉欽依不准升都加與賞賜所據修築城垣河橋把總尚禮等似難量加俸級合無照依前例量加賞賜以酬其勞庶幾事體歸一人無異議緣奉欽依該部看了來說事理未敢擅便𢎞治五年閏九月二十四日具題奉聖㫖冠帶把總尚禮王友道王豬兒杜鑑羅祥與做軍器局副使王福董瓉耿福汪寬朱顯都與冠帶董旺葉森楊承德楊通王穆陳霽加賞絹一匹欽此臣等竊惟自古帝王之治天下其要無過賞罰號令而巳賞罰無二號令如一則人自信服否則欲人之信服也難矣治亂之機豈外是哉仰惟陛下嗣承大統之初中外臣民翕然愛戴莫不願陛下萬萬年常居寶位永為億兆之主所以然者固由祖宗德澤及人之深亦由陛下首頒詔㫖革罷傳奉冗官驅逐妖僧邪士不受獻貢停止織造裁省冗費數者有以歆動之也臣等受陛下大恩忝居銓選之司若於用人得失漫不可否惟順㫖而行竊恐隂壞大事失天下心雖死何贖是以不避斧鉞之誅屢進逆耳之言無非欲匡輔至治少盡臣職而巳豈有他哉且如前者太監李興奏要升修盧溝橋河隄岸管工副使潘俊等職事陛下巳納臣等前言特加聖㫖不准升都加與賞賜今太監李廣奏要將修城垣冠帶官尚禮等略加俸級臣等亦以前言具題陛下却降前項升賞之㫖是功同而賞異也臣等固不知李興之意有無不平在他人有所不免必將復比例上請矣若再請再不許彼必惶恐許之則冗官之弊滋熾况今升尚禮等多係前時革罷傳奉官員前日革之已得衆心今日升之豈不復失衆心又况革罷傳奉官千百餘員見尚禮等又得升職未免各尋蹊徑夤緣求進不知何以處之欲其不為聖政之纍難矣且洪武永樂年間營造兩京城池宮殿山陵及文武衙門有無升賞管工官員臣等固不能知正統年間營建三殿兩宮包砌京城及修造各衙門工程若彼浩大升除官匠不過五六員今補修城垣橋梁比之前工不及萬分之一反升官如此之多不亦異乎且軍器局止有額設大使一員副使二員近來副使李安等一十六員赴局考滿在任未考滿者不知亦有幾員近又升尚禮等五員似非祖宗設官之初意伏望陛下俯賜察納收回前㫖將尚禮等亦量加賞賜如此則前後之恩如一彼此之心俱安且塞將來無厭之求人自信服而太平之治效亦可以立見矣𢎞治三年十月初二日具題奉聖㫖尚禮等既升職冠帶了罷欽此議太醫院缺官奏狀王恕文選清吏司案呈准太醫院手本開𢎞治四年五月設監太監覃文等於乾清宮奏奉聖㫖著御醫徐生升除院判欽此欽遵合行手本前去施行等因到司案查先因太醫院院判章淵病故本院推舉帶俸院判劉文泰定奪補缺本部為照劉文泰先被科道官劾奏醫術不精用藥乖謬降職帶俸難以定奪駁回從公另行推舉精通方脈年資老成官一員送部去後未報今該前因隨奉本部送該通政司連狀送據御醫許觀告由醫士成化八年二月內䝉御藥房司設監太監覃文奉取本房答應成化十三等年用藥有效歷升院判成化二十三年十月內為陳言事將觀一體降除御醫𢎞治元年三月內䝉欽差給事中御史等官將觀考中一等明通脈理用藥有效存留供事今䝉本院却將近年取來御醫徐生推舉赴部保補院判員缺若不狀訴是觀自起送到今二十餘年亦係㑹官考中一等徐生近於成化二十一年方升御醫亦係考中第二等人數與觀事理不同攙越妄補等因送司查得𢎞治元年四月為嚴考察以厲庶官事該給事中等官孫圭等㑹考得御醫孫泰許觀黃綬錢鈍陳公賢惠民藥局謝惟廣六員明通脈理用藥有效為一等御醫徐生鄭文貴施鑑金璽吏目劉年惠民藥局卲忠萬冀李華八員頗通脈理用藥有效為二等本年七月該本部議今後凡遇大小官員缺從本部銓選推舉擬奏定奪一應人員不許營求內外權要之人奏乞升職違者並聽本部參奏就將所舉之人拿送法司問罪不分原有官無官俱發回原籍為民當差舉主一體治罪等因具題奉聖㫖是今後一應人員不許營求內外權要冒濫升職違了的治罪不饒欽此欽遵通查案呈到部切以太醫院官醫術精否臣等固不能知以事體論之院判劉文泰既被劾奏醫術不精用藥乖謬令其帶俸似難復用管事遇有員缺合於㑹官考中一等御醫等官內挨次舉用為當今徐生以二等官得被前㫖此許觀所以不平而有是言也切惟百司庶府大小臣僚皆是充皇上任使者也聖意豈不欲用賢而退不能向使知徐生是二等官雖有人薦其能必不肯越一等官而先用之以來物議然而此事舉之者有礙前例但不見抄出全文奏詞不知太監覃文如何具奏事難定奪所據徐生顯有營求請託之情合送法司究問果有干礙之人冝從法司徑自參奏提問前項院判員缺合無依考定等第次序舉用等因具題奉聖㫖既有在前事例恁還㑹禮部太醫院公同御藥房太監推選相應的來看欽此欽遵抄出到部查得太醫院官有缺本院具呈本部題過然後行令推舉相應人員送來請㫖除授係是祖宗以來成憲命臣等公同御藥房太監推選前項官員非敢不遵但本部自祖宗以來並無公同內臣推選官員事例誠恐今日創開此例則祖宗之成憲自此變更末流之弊將不可救書曰監於先王成憲其永無愆以見不監先王成憲而行者必有過差而不能善其後也且獻可替否人臣之職也臣等有見於此而不言是不能盡職罪何逭焉伏望皇上俯賜裁察容臣等死罪合無不必㑹官推選只照見行事例令太醫院從公推舉相應官一員送部請㫖除補院判如或推舉不公聽本部恭究或有不相應人員揑詞告爭亦坐以罪如此則法有定體事無紛更弊端絶而人心服矣𢎞治四年五月十五日具題奉聖㫖你每既這等說不必㑹選徐生曽用藥有效升院判欽此議傳奉官升職奏狀王恕文選清吏司案呈奉本部送吏科抄出文華殿書辦中書舍人杜昌等奏云云等因具奏奉聖㫖吏部看了來說欽此欽遵抄出送司該吏科抄出浙江道監察御史滕祐題云云等因具題奉聖㫖徐生已升了罷杜昌等吏部知道欽此欽遵通抄送司案呈到部臣等看得杜昌等俱由雜流奔競請託乞恩傳奉不數年連升疊轉至於在京堂上五六品職事處於禁密之地後雖降級仍存供事已為幸矣三四年來希冀復職未嘗絶念但無由而發一見傳奉降級官徐生違例夤緣復用臣等本部言之既不䝉見聽科道言之又不䝉加省輒便效尤敢於故違奏復原職此御史滕祐有見於此所以反復懇懇言之臣等詳味其言非見理明白有忠君之實心懷經國之逺圖者未易及此陛下冝留神再三省覽依其所言賜之施行將徐生杜昌等拿送法司明正其罪庶幾紀綱不壞名器隆重幸門閉弊端絶而奔競之徒不復覬覦矣今既奉成命徐生已升了罷若將杜昌等亦置之不論則其他傳奉革罷并降職官又何畏憚而不來奏擾豈不有壞士風紊亂朝政欲天下之無事恐不可得也伏望皇上斷自宸𠂻合無將杜昌等七員照依御史滕祐所言拿送法司明正其罪以為將來之戒緣杜昌係京官及節奉欽依吏部看了來說并徐生已升了罷杜昌等吏部知道事理未敢擅便𢎞治四年六月初九日具題奉聖㫖是杜昌等具奏煩擾希求復職本當拿問且都饒這遭著仍舊辦事欽此議選用王府醫官奏狀王恕文選清吏司案呈伏覩𢎞治四年六月節該欽奉勑吏部益王年已長成依例便選學行端正者除王府官欽此欽遵巳經通行太醫院等衙門取相應醫士人等選除去後續稱太醫院手本開稱䝉御馬監太監陳富於乾清宮傳奉聖㫖既親王奏討冠帶醫士張錡等二名照數撥與欽此欽遵今將撥過醫士姓名合用手本開報前去施行等因到司案呈到部臣等仰惟前勑有以見聖意命臣等選學行端正者為王府官蓋欲王之先後左右皆正人將以成王之德也及觀傳奉㫖意又以見聖意一聞王言輒便依從者惟恐拂王之情也將以成王之德愛王也恐拂王之情愛王也二者雖是愛王然於愛之中亦不可不審處之設若張錡等二名醫術果高於一時王所素知無左右為之先容王自討之陛下自許之臣等將奉行之不暇奚敢置喙於其間哉今王尚在幼冲恐未知醫之賢否蓋是有求於王之左右而討之陛下許之則是開衆枉之門起奔競之風使王日與此輩居將何所取以成其德乎向者蔣宗儒等而為良醫正副使臣言之陛下從之今張錡等必不敢復為此謀只因臣等未嘗言之所以張錡等今復踵而為若臣等再不言之則後之欲為王府官者莫不奔競者得之而守分者不得則守分者亦將變而為奔競矣竊恐士風從兹日趨於下而不競也然而此事陛下雖曰愛王實無益於王而有損於治體有壞於風俗也不小臣等愚昧伏望陛下自今伊始愛王當以德而不可以姑息焉以德則王始雖不悅而終有以成其德以姑息則王始雖悅而終無以成其德二者是非較然有不待智者而後知也合無令張錡等二名仍前冠帶辦事另取相應醫士除授良醫正副如此則奔競自息風俗不壞公道行而人心服矣今後凡王言之合理者陛下固當從之其不合理者亦常諭王知其所以不可從之道如此則王之左右皆不敢以不正之事啓王行亦不敢以不正之言為王道而王之言行皆歸於正豈不為宗室之光乎陛下友愛諸王之道孰有加於此哉緣係息奔競正士風事理伏乞聖明留神裁察幸甚𢎞治四年六月十二日具題奉聖㫖是張錡等不用仍行太醫院從公推選的除授今後太醫院用人只照舊例行不許夤緣奏請欽此議置選用進士奏狀王恕文選清吏司案呈該本部題照得每科第三甲進士前七八分多選在外知縣等官後二三分俱選京職所以進士該外選者或告養病或因公差在家延住待不除選外任方才赴部希冀京職之除若不處置誠恐遞相倣效非惟有壞選法抑且有壞士風合無今後除丁憂起復進士仍照常例遇缺隨衆選除外其餘養病公差回還者上下名除揀選給事中御史中書舍人并王府官外如已選外任亦選外任已選京職仍選京職庶人心得平而選法不壞矣緣係處置選用進士事理未敢擅便𢎞治四年八月初八日具題奉聖㫖是欽此議保用典樂奏狀王恕文選清吏司案呈奉本部送內府抄出岐王奏云云等因具奏奉聖㫖看了來說欽此欽遵抄出送司查得徽王成化十七年之國𢎞治二年八月內該徽王奏謝典樂王信致仕保伊隨帶前來徒樂舞生蔣真道任本部已經勘結無礙將蔣真道題准除補本府典樂訖查得親王未之國之前典樂有缺該行太常寺推選年深相應樂舞生送部具奏除補行太常寺典簿㕔手本據神樂觀手本查得魏道賢委是李宗正徒弟身雖無過係成化十八年七月內充樂舞生方經九年及拘集樂舞生張永常等五百二十四名到官審勘得樂舞生魏道賢見在張永常三百五十一名之後本觀難以定奪等因回報到司案呈到部看得魏道賢係是神樂觀樂舞生不係典樂李宗正帶在身邊隨王之國徒弟此與蔣具道不同况本生在觀年淺尚在見在樂舞生三百五十一名之後例不該攙越授職就使相應授職亦必待所司舉行而後可今本生赴長史司具啓王保伊做典樂是自薦自售非知其能而舉之也若將此等自薦之人用之則是起奔競之風其後王府官有缺奔競之徒皆來自薦不用則援此為例用之則從此而壞選法矣且道士之稱受業師則曰師父於師前自稱則曰弟子此理之正也未有直稱師為父而自稱為徒男者今魏道賢收內自稱徒男稱其師曰父可見是邪諂之人非正士也既稱師為父已為徒男師死未及兩月却不守服就來做官亦可見其為人也王之左右須得正人則王德日進書曰后德惟臣是也如此邪諂不正之人豈可為親王官僚乎合無照依舊例行移太常寺從公推選年深相應樂舞生一名送部另行具奏除補緣係比例奏保典樂及奉欽依吏部看了來說事理未敢擅便𢎞治四年十月初二日具題奉聖㫖是欽此扶持公道奏狀王恕文選清吏司案呈查得先該吏科等科都給事中等官張九功等題兹者法司㑹議論奏栁景秦紘之事陛下於栁景念及祖功赦其死命俾得幅巾優游閒住於秦紘則以奏事亦有不實免其運炭使之致仕且律條有曰告二事以上重事告實輕事招虛及數事罪等但一事告實者皆免罪今秦紘所言栁景之事輕重勘實不止一端間有不實乃千中之一二耳揆之律意固當免罪况秦紘之舉乃風憲彈劾之公議非常人告訐之私情雖曰有罪薄乎云爾揆諸情法尤可矜恕伏望皇上俯念人才之難思秦紘盡心為國反遭擯黜之枉將秦紘仍留辦事以慰在官等因具題俱奉聖㫖秦紘已發落了不准該衙門知道欽此欽遵抄出到部已經立案訖讀該南京六科給事中倪天民等十三道監察御史楊璡等與夫肇慶府同知張吉亦論奏其事文雖殊而意則同俱奉聖㫖該衙門知道欽此欽遵抄出送司案呈到部臣等竊惟帝王之治天下惟賞與罰最為緊要當則人服否則不服其可忽哉參看得都給事等官張九功等所上五章栁景秦紘之情罪與夫朝廷所以處之者是非了然欲望朝廷召還秦紘以正賞罰以為勸戒陛下冝從而未之從者是臣等不能贊襄以成陛下納諫之美罪莫大焉今栁景該追贓又䝉聖恩免之矣而恩獨不及於秦紘則是為地方軍民之害者可恕而除地方軍民之害者不可用其何以服人心而勵將來豈不大可惜乎伏望陛下從天下之公論召還秦紘或處之都察院或處之南京都察院俾之視事未必無補如此則賞罰攸當舉措得冝而人心服將來勸矣不然則非臣等所敢知也伏乞聖明裁察幸甚緣係節奉欽依該衙門知道事理未敢擅便𢎞治四年十二月二十四日具題奉聖㫖南京戶部尚書黃紱改南京都察院左都御史秦紘著做南京戶部尚書欽此論御醫王玉不當升俸奏狀王恕文選清吏司案呈奉本部送吏科抄出太醫院御醫王玉奏云等因具奏奉聖㫖該部看了來說欽此欽遵抄出送司案呈到部查得成化二十三年九月內該科道陳言該本部查處具題節該奉聖㫖太醫院堂上官照額挨次存留院使施欽開來看欽此欽遵續該本部照額挨次存留院使施欽院判任義章淵三員其餘左通政張倫左參議丘鈺院使仲蘭錢鈍院判劉文泰汪智許觀莊元金璽李思勉施鑑陳公賢徐生黃綬孫泰潘澤王玉共一十七員俱係額外官員等因具題節該奉聖㫖是太醫院額內的僉書額外已降的罷汪智李思勉致仕張倫降院判其餘降御醫都各供事欽此欽遵彼時王玉丁憂在家其後起復到部違限年久本部欲送法司問罪題奉聖㫖王玉違限年久本當送問且饒他著復御醫辦事欽此欽遵又查得先該禮科等衙門給事中等官孫圭等題稱御醫等官王玉等四員丁憂去訖無憑考察該本部題准候各官起復到部仍行給事中等官㑹同考察續據吏目朱戡等奏要免考本部為照各官俱係題奉欽依該考之數難准免考等因具題節該奉聖㫖丘鈺王玉朱戡已復原職并吳英都免考欽此欽遵又查得太醫院以修省改正為由欲復革罷傳奉官陳俊宮良寧銓吳綬聶整朱俊等舊職臣等以為若復陳俊等官則其餘傳奉革罷者皆來奏擾再三陳奏不可皇上竟將陳俊宮良寧銓吳綬升授御醫訖今王玉奏稱當在春官效勞與陳俊等事體相同要復院判且太醫院額設院使一員院判二員成化年間濫設數多皇上嗣位之初遵依舊制存留院使一員院判二員見今不缺今王玉又要升授院判則事前項降除御醫者誰非效勞之人若復王玉一人之官則其餘人等必來奏擾不與覆奏彼必怨怒造言謗訕無所不至與之覆奏則冗官仍復如前有纍陛下初政天下公論必謂臣等阿諛竊祿不能匡輔有何顔復立於朝設若院判有缺而王玉名在同降衆人之末計其資望考其藝術未必超越衆人亦難輒憑所奏就與升授所據御醫王玉既䝉聖恩免其送問又免考試自合黽勉盡職以圖報稱今却不安職分希求升授於理不可論法難容欲將本官拿送法司究問以警將來緣奉欽依該部看了來說事理及係京官未敢擅便具題奉聖㫖王玉免送問升俸二級以後再有奏擾的送問不饒欽此臣等竊惟賞罰者天下之公所以勸善而懲惡也是賞罰也君主之臣輔而行之君欲賞一人罰一人合天下之公論為臣者能襄贊以成之使天下之善以勸惡者以懲斯人也非良臣乎君欲賞一人罰一人不合天下之公論為臣者不求正而阿狥之使天下之善者不勸惡者不懲斯人也非佞臣乎今陛下以堯舜之德居堯舜之位故臣等欲效良臣而不願為佞臣也且御醫王玉粗通醫術行不過人由傳奉而升判人多不平陛下嗣大位之初降為御醫物議稍息兹者謀復院判臣等論如前陛下若依臣等所言將本官拿送法司問罪是為懲有罪乃法之正也免其送問是為宥有罪猶之可也今既免其送問又升俸二級是為賞有罪奚可乎哉若臣等不言後來如王玉者臣等又行送問其何以服天下人之心欲天下不謂臣等為佞臣得乎然佞臣固非臣等所願為亦非陛下所以望臣等也伏望聖明俯察芻蕘之言收回升俸之命令王玉仍照今職辦事庶可以服天下人之心且使後來如王玉者不待參問而自不來奏擾矣臣等惓惓為國之心不自知其言之狂也罪該萬死伏惟聖慈俯賜矜察幸甚𢎞治五年二月十二日具題奉聖㫖你每既這等說王玉著仍舊辦事欽此議經歷高祿升官奏狀王恕今日早朝退錦衣衛官召吏部堂上官臣恕偶有恙不能朝參臣恱臣經趨至左順門有司禮監太監覃昌說稱皇上欲著通政司經歷高祿升本司參議臣恱等回說無缺又無憑據難以奏臣悅等回至部中與臣恕等備說前情臣等仰惟皇上寬仁厚德為天下國家之心無以加矣眷顧親戚之恩亦無以加矣高祿乃皇親壽寧侯之妹夫欲為通政司參議也非一日矣然而持久而不與者蓋恐來天下之物議纍莫大之聖政故爾今日欲與之者恐非陛下之本心且高祿由舉人出身使其安於其職歷年深養望久遇有缺然後升人自服彼亦安今本官歷任未及三年驟升是職何以服天下之心杜天下之口是欲擡舉本官反纍本官也有何益哉伏望皇上以天下之官待天下之士若為親戚而妨公議使天下後世得以窺其淺深非陛下之所願亦非臣等之所願也臣等待罪銓司忠誠為國不自知其言之狂妄而激切也死罪死罪惟聖明優容而矜察之幸甚𢎞治五年五月二十日謹具題知議進士石存禮除官奏狀王恕照得自今年六月本部大選官員取到三甲進士內一員石存禮年二十二嵗山東青州府益都縣人照依甲第次序本官該選知縣臣等竊惟知縣乃一縣之主百責所萃生民休戚係焉非年少力弱者所能勝任查得舊例中副舉人俱除教職中間有年未及二十五嵗告願不就教職者准送國子監讀書二十五嵗以上不願就教職者不准仍除教職蓋以未及二十五嵗者年少未可為人師範故准令不就教職况知縣比之教職責任尤重今石存禮年方二十二嵗氣質清秀形體孱弱若除授知縣使宰百里之地居羣僚之上督率衆職分理庶務加以送往迎來承上接下勞苦百端恐不能堪看得行人司行人亦係三甲進士該除官員其職最簡而無勞事欲將石存禮仍送該衙門辦事候有行人員缺另行除授行人使本官讀書進學日省月修待其老成然後授以任事之職斯可責其成績緣是處選用年幼進士事理未敢擅便𢎞治五年六月初八日具題奉聖㫖是欽此議御史馮玘圖治奏狀王恕驗封清吏司案呈准兵部武選清吏司手本奉本部連送本司案呈准職方清吏司手本奉本部送兵科抄出巡按貴州監察御史馮玘題云云等因具本奏奉聖㫖該部看了來說欽此欽遵抄出送司案呈到部看得所奏四事內處置邊患等三事本部徑自查奏外其馴服土官一事內宣撫宣慰長官把事等官本部議奏其知府知州文職等官係𨽻吏部掌行連送該司仰行吏部該司呈堂徑自查照施行等因到司查得土官赴京襲職固是舊例亦有鎮守總兵等官保勘明白具奏就彼冠帶承襲者又有赴京具奏有人爭襲發回保勘者又有到京為無保勘公文發回病故者又有到京查無㑹奏緣由發回候㑹奏至日另行本人奏稱情願在京聽候者天順八年三月節該欽奉詔書內開雲南貴州廣西湖廣四川土官今後有告襲者委官務要從公體勘定名㑹奏該部行令就彼冠帶襲職不必參駁中間如有狥私不公許巡按御史紏舉罪坐原勘官員欽此欽遵外今該前因案呈到部看得監察御史馮玘奏要令土官子孫循舊例赴襲替亦可馴服其心一節其意固善但土官衙門設在極邊地方襲替往還動經萬里中間貧富不一盤費艱難及至京師承襲有保勘不明㑹奏未到又有被人爭襲駁回保勘纍年不得承襲如前所云者亦有被無藉之徒指稱官府使用􅫬騙財物靡所不為以致逺人受其陷害衙門被其玷汚是以朝廷洞察斯弊特開恩例免其來京委官從公體勘定名㑹奏該部㑹令就彼冠帶承襲是乃懷柔逺夷革弊省事之良法若依監察御史馮玘所奏令其赴京承襲俾知朝廷之盛自足以消其邪心恐邪心未消而前項於彼不便之事有所不免不如仍照詔書事例令其保勘明白奏來就彼冠帶承襲為便合通行貴州等布政司今後土官子孫襲替保勘明白仍照詔書恩例行令就彼冠帶承襲到任之後如遇總鎮巡撫巡按三司分巡分守及一應上司官員到彼俱要與同流官參見其總鎮等官亦要諭以朝廷恩威使之各懷忠順之心撫治夷民辦納糧差如或生事擾害地方國法具存决不輕宥緣奉欽依該部看了來說事理未敢擅便𢎞治五年六月二十日具題奉聖㫖是欽此議都御史高嵩乞全體統奏狀王恕文選清吏司案呈奉本部送吏科抄出巡撫貴州都察院右僉都御史高嵩奏云云等因具奏奉聖㫖吏部知道欽此欽遵抄出送司案呈到部洪惟我朝太祖高皇帝創業垂統內設五府六部都察院等衙門外設都布按三司以及府衛等衙門即周官所謂六卿分職各率其屬以倡九牧阜成兆民之制內外體統豈容紊亂又大明律有曰凡奉制命出使而官吏毆之杖一百徒三年罵詈杖一百蓋以上命為重初不計其官之崇卑也以體統論之都御史則統攝乎布政而布政固其屬也以奉使論之都御史奉命出使布政職守一方當致敬盡禮况都御史高嵩齎捧璽書巡撫貴州而其境內官無大小皆當受其約束政無巨細皆當聽其處分今布政劉元自恃小才罔知大體乃敢輕侮都御史高嵩言語不遜則是壞朝廷之紀綱亂內外之體統本當恭究但事在革前欲將劉元改調别任緣今地方多事合無姑且不動本部纍行貴州布政司轉行左布政劉元今後務要改過自新安分守禮敬修職業毋得越禮犯分眇視制使自速罪愆仍行都察院轉行都御史高嵩亦要振肅紀綱以禮自防行事之際尤當顧大體毋得避小嫌今後劉元如仍侮慢自賢不聽約束阻壞行事明白恭究以憑拿問緣奉欽依吏部知道事理未敢擅便𢎞治五年六月二十五日具題奉聖㫖是欽此議給事中王欽拾遺公道奏狀王恕文選清吏司案呈奉本部送准禮部咨儀制清吏司案呈奉本部送禮科抄出刑科給事中王欽題前事等因開坐題奉聖㫖該部看了來說欽此欽遵抄出送司案呈到部看得本官所題廣邊儲以防不虞等事係𨽻吏戶二部掌行擬合通行開單移咨煩為徑自施行等因送司案呈到部今將本官所言逐一議擬開立前件伏乞聖裁緣奉欽依該部看了來說事理未敢擅便𢎞治五年十一月十九日具題奉聖㫖准議欽此一臣等㑹同都察院右都御史白昂等查得自宣德年來至今都察院同僉書管事都御史或一員或二員多不過三員未嘗有四五員同僉書管事者正統末景泰初都御史陳鎰王文輪流鎮守陜西回則在院管事其餘各處巡撫并贊理軍務都御史缺一員則推舉一員其所推舉者多係曽經歷練老成之人少有不稱厥職者今給事中王欽題要照依諸司職掌原設左右副都御史二員左右僉都御史四員選補充足在院協同管事以練逹刑名如有巡撫員缺就便挨次差遣一節其意無非欲巡撫官之得人且祖宗之定官制都察院雖設左右都御史各一員左右副都御史各一員左右僉都御史四員共八員想當時在院管事并公差在外者不過此八員而已今在院管事并公差在外巡撫等項常有二十二三員不為不多若再補足員數在院管事以備巡撫差用非惟管事之際議論紛紜政不歸一抑且輿𨽻廪祿難以供贍似為未便今都察院見有右都御史白昂右副都御史翟瑄又有左僉都御史李介守制將滿儘可了事合無不必照依額數添除官員今後遇有巡撫都御史員缺本部仍照例㑹推相應人員請㫖簡用如此則官無冗設而法有定一伏覩各處提調學校御史副使等官節該欽奉勑諭內有曰學校無成皆由師道不立今之教官賢否不齊先須察其德行考其文學果所行所學皆善須禮待之若一次考驗學問疏淺及怠於訓誨者姑誡勵之令其進學改過若再考無進不改送吏部别用欽此今給事中王欽題稱前因無非愛惜人才崇重師儒之意合無行移都察院轉行各處提學御史副使等官今後考驗教官務遵原奉勑諭內事理當禮待者禮待之當誡勵者誡勵之當起送别用者起送之不許狥私偏執將一次考驗不中一槩起送别用如此則勸懲不致輕易而師儒知所奮勵矣一查得先該廣平府知府王衡等奏稱納銀聽恭吏典不諳刑名行移不通楷書算法既以納財為出身之階必以貪財為營家之計奏要今後遇災傷荒歉先事預防臨期賑恤凡百長䇿任其施為不許再擬納銀充吏永杜貪利之門等因本部訪得永樂宣德正統年間天下亦有災傷各邊亦有軍馬當時未嘗舉行納糧草納銀兩為監生吏典等項事例糧草不聞不足軍馬不聞困斃近年以來各邊并腹裡少有災傷所在守土等官止圖目前分寸之利不為國家長久之謀輟便奏開生員吏典人等納糧草納銀兩等項事例彼此效尤遂為長䇿殊不思祖宗教養生員參充吏役良法美意各有攸在且如生員選於民間俊秀子弟教養於學校成材者科貢入監不成材者充吏為民未嘗不别賢否一槩濫進也其吏役亦必於農民之中選其識字能書者充之令其書辦文案及其兩考役滿赴部辦事數年才撥京考滿其考中才得冠帶不中者發回為民未嘗不論能否一槩入選也近來因有前例是以在學無志生員及未學富家子弟揑作生員名色不分賢否有無學識一槩入監以圖出身將來入仕不知為政之道豈不誤事殃民一切小民不分能書與不能書不論市民與農民一槩聽缺充吏不惟官司不得伊書辦文案且於舊制有違及其三考役滿又免考驗一槩照依資格出身所以多不稱職比先年間監生止由科貢吏典亦循年資别無雜進之徒是以聽選之人不多選法不至壅滯任用亦多得人自有此例雜進日多一日以致正途監生吏典因而壅滯不得出身多者十七八年少者不下十五六年才得選用年巳向衰誰肯盡心幹事不謀歸計甚至聽選年老例不入選只與冠帶閒住又况此等雜途所進中間多有負債破産頑鈍無恥之輩今日既知以財進身他日豈肯以亷律己欲不貪財害民天下治安何由可得欲將納銀納糧草等項事例限本年四月以裡通行停止今後遇有災傷及邊方糧草不足不許再行奏開前項生員吏典人等納糧等項事例貽患將來等因𢎞治元年三月具題奉聖㫖是續該四川布政司奏要令陜西等布政司一考兩考吏典定與則例出納銀兩或免其考試就撥京考或給與冠帶各照資格選用等因戶部明知題准今後不許再行奏開前例却乃不令本部知㑹朦朧題准行移四川陜西雲南貴州四布政司招納去後𢎞治二年六月內該四川布政司奏稱年嵗豐稔本部查照前項禁革事例具題行移該布政司將納銀事例限七月停止今後諸司衙門敢有再行奏開前例許本部參奏或科道官紏劾治罪題奉聖㫖是欽此巳經節次通行欽遵外近該巡撫山東左僉都御史王霽巡撫南直𨽻左副都御史似鍾各明知本部題准再不許奏開吏典人等納銀事例乃敢故違王霽既開端於前似鍾又接踵於後戶部亦不查照輒便題准是便使後來雜進人多選法壅滯以致正途循資而進者皓首不得出身歸怨吏部未必不由此也且吏部掌天下官吏選授之政令戶部掌天下戶口田糧之政令選法不清吏部之責錢糧之不足遂令選法之不清是自欲逃其責而使人任其咎也况其所得銀物不及一貴族所積濟人不多壞事實大且使詔㫖不信於天下其為聖政之纍夫豈小哉今給事中王欽所言前因誠可謂深知其弊所宜禁止合無通行各布政司并直𨽻府州各行所屬衙門除已留在官聽缺知印承差吏典挨次參補外以後遇有名缺預先三箇月以裡行屬照例於良善農民內揀選身家無過人物端莊諳曉書寫者不必納銀就令參充其山東直隸今次奏准納銀事例合無於𢎞治六年五月麥熟之時就便停止今後各處災傷任從巡撫等官多方區畫措置再不許奏開吏典納銀事例如違許本部并科道官紏劾治罪若該部不行查照朦朧覆奏准行亦聽科道官紏劾如此則吏胥無雜進之途銓選免壅滯之患矣奏為嚴檢防以祛宿弊事汪鋐照得嘉靖十四年春又當朝覲之期例該吏部㑹同都察院考察天下司府州縣大小官員凡應行禁革事冝已經題奉欽依通行禁革去後臣竊惟欲治末者必端其本欲清流者必澄其源故自古聖賢論為治必本諸身論用法必先於近京師天下之標凖也吏部百官之表率也茍不於本源之地先加之意欲令之必行禁之必止胡可得哉臣嘗觀在外大小官員畏懼考察者固未必盡無而冀望升擢者實多直己行道者固未必無人而奔競干進者常衆故使人來京夤緣請託私通賄賂往往有之其所干之人自持亷潔拒而不受者固不為無而自處卑汚受之自如者亦不為少况不受者亦惟不受之而已卒未有能發其奸而置之於法者也夫其不置之於法何也蓋謂不受則在我者已盡矣置之於法則巳甚矣此固君子忠厚寬大實因循廢法之端法廢則公道不行是非倒置故人心無所忌憚而其弊卒不可禁考之往年朝覲雖每有禁例之行而人心視為虛文漫不知畏良由本源之地未能嚴於檢防故耳又有監生承差吏典雜職人員到部聽選被人哄詐賄求美職有考滿起復官員到部被吏胥作弊刁難索詐財物有光棍在外詐冒名色打㸃關節玷辱司屬名節遂使天下有司真謂美官可以賄得黜罰可以計免吏部表率之地真可鑽求臣等職守紀綱真可干託作弊是致聖朝清明之化不能彰信於外百官何所風勵以堅其節操貪懦何所懲戒以修其職業奸贓肆橫良民受害太平之效無由而致災異之變屢嵗頻仍職此之故也伏望皇上鍳納臣言特勑厰衛緝事衙門多差緝事人役於京城內外及於臣本部與臣等所居私宅之前後左右密加體訪但遇有投遞書簡饋送賄賂私通關節及吏胥誆騙光棍詐冒各項違犯情弊訪緝是實即便拿送厰衛審供明白奏送法司如所干之人未曽交接容納則不得干及如已交接容納則一體參究其所獲財物不拘多寡悉賞拿獲之人照强盜事例升級若有聽選考滿起復人員到部被人嚇詐財物者緝訪得獲止罪嚇財之人被嚇者免究更乞勑下都察院嚴行巡撫都御史及五城兵馬一體差人緝拿仍出給榜文於京城內外寺觀與軍民官宦之家並不得容留前項私通關節之人事發一體治罪其他文武各衙門凡錢穀兵馬䕃襲科舉冊封刑名工作等項政務但有私通賄賂并詐緝事人役一體緝拿舉發如此則大公至正之法行於上禮義亷恥之風興於下而奔競干謁之私自泯矣夫臣為此請非敢矯激以沽名也亦非敢立異以駭俗也良欲正國法昭公道以贊輔聖朝清明之化於萬一云耳臣不勝懇切祈望之至為此具本親賫謹具奏聞伏候勑㫖嘉靖十三年閏二月二十一日奏二十三日奉聖㫖這所奏著都察院查照先年奏准事例禁約名臣經濟録卷十七
