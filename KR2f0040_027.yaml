body:
  text: 名臣經濟録卷二十七明黄訓編禮部儀制下一道德以同俗一丘濬臣按漢宣帝㑹諸儒於石渠閣講論五經同異然惟講議之而巳未有成書也至唐太宗始命孔頴達㑹諸儒臣譔五經正義是亦一道德之一端也葢道德雖具於人心出於天命然不考之聖賢之經傳安知其不以是為非以非為是哉是以自古帝王有志於三代之治者莫不以同風俗為務同風俗者莫不以一道德為先一道德者茍不質正於聖賢之言何以知其所以然之故與其所當然之則而施行之哉雖欲道德之一不可得也聖賢之言具載經傳不有以表章而發明之上之人何以為據下之人有不信者矣是以帝王欲一道德以同風俗往往留意於經籍而命諸儒考正而㑹聚之用以頒布天下使家傳而人誦之則凡有是道德者皆知如是則為道德不如是則非咸為道德之歸而風俗醇正而無彼疆此界之殊矣唐太宗有見於此而命孔穎達以考正六經而穎達不足以承上意而所正者多有謬冗則亦何益之有哉穎達之學雖有可疵而太宗之見則超然出乎後世人君之表可尚也矣我太祖開國之先首建學校未幾詔行科舉一以五經四書教人取士各專一經而兼治四書太宗又命諸儒輯五經四書性理大全書易主程朱書主蔡氏詩主朱氏春秋主胡氏禮記則用陳澔集説四書之訓則一本朱子集註章句焉夫五經自漢以來專門名家各自開戸牖而殊軌轍或泥於訓詁或流於䜟緯至於有宋濂洛關閩諸儒者出然後經㫖大明於世而我列聖又表章之遂為千古不刋之大典不易之定論是以道德一而無岐轍之差風俗同而無疆界之别斯世斯民得以見天地之純全識聖賢之至理享帝王之盛治一何幸歟一道德以同俗二丘濬臣按程子謂治天下以正風俗得賢才為本臣竊以謂得賢才又正風俗之本必欲得賢才以正風俗而一道德又其本也道德不一則人執私見家為異説各道其所道德其所德不相統一矣必欲道德之一而咸惟中正之歸則又在師道之立焉立師道以修學校之政俾其掌天下之風化教天下之人材考正經典講明義理以一人心之趨向期於道德之一風俗之同而後巳所以然者非得夫程子所謂明先王之道德業充備足為師表者曷足以當兹任哉惟我祖宗建學立師教育人才一以五經四書為教學之具凡今布列中外者孰非明先王之道之士哉今日班行之中縉紳之列未必無其人也盍加推訪其間有德行文學聞望素著冠於一時為内外所推重者即僉舉以聞命以師儒之首秩俾之自擇其屬必得如程子所謂篤志好學材良行修者以充其選而又於大臣中特命一人典領其事如程子所云者授以璽書責以提督作興之任俾其率領羣儒詳立規條一本程子所上劄子以為凖則根據學校所施行者必太祖皇帝所定之學規士子所誦習者必太宗皇帝所頒之書籍叅諸古典酌以時制凡夫學校所以誘掖激厲漸摩成就之道節目次第門分條具以為一代教養之法即行之太學又頒之天下如此則施教者有成效受教者有成德而推其所得以為教者皆有成法而用之無窮矣要必就其所教之中差其果於行事者用以釐百司之務擇其深於道義者留以為太學之師散其明於經訓者分以掌州縣之教而州縣受教之士又以其所受於教者之教以卒業於太學以分任於有司以推教於他人彼此承傳後先授受同此詩書之習同此道德之歸朝廷之政教此道此德也官府之禁令此道此德也學校之功課此道此德也道德既一風俗自同立德者不索隠以行怪行事者不謀利而計功為學者不駕虚而翼偽修辭者不厭常而喜新居官者不黨同而伐異渾渾乎和平温厚之天坦坦乎大中至正之域世道至此雖唐虞三代不是過也由是觀之治天下之道莫大於正風俗正風俗之要莫切於一道徳程顥一世大儒言於其君欲其特留宸意為萬世行之臣敢不昧死援程顥之言以為九重告送主事林君孟和之南京序彭韶國家分六曹以本庶政理曹視他為簡在南都留務為尤簡進士林君孟和既拜祠部主事當之南都惜之者曰孟和為人慷慨喜事才識過人且志專而確慮事論道理必究竟至盡著作極力慕竒古焦心勞思目為損不少休又故門閥家習知官儀與庶士不侔置諸臺諫或司繁劇當盡見其才氣顧投之閒局何耶解之者曰執政愛䕶人才欲周其用故舉措率人所不意簡靜樸厚者俾之蒞煩所以充拓其不及疏通智略者不授吏事所以補助其徳性蓋儲材於今待用於後未始無意也予竊以為不然凡天下之務粗者可以才智遣精者必待人而後舉獨材智乎是尤不可不圖得士也故精莫過於禮樂以房魏之賢尚不能對太宗之問退之之博且苦儀禮之難讀况其他乎祀部掌國之大祀禮樂之司也司禮樂而諉之閒局異哉所以守官矣仰惟我國家百年之盛正禮樂可興之時宏綱大指因於舊典不容少議然沿革之序萬一有宜行者攷之往古若禘祫之制明堂之位諡議出於太常太常勿居羽流雅樂當校定鍾律為本俗樂别加簡肄佛老之宫制減削道陵後不可與夫子並凡此皆禮官責也其禮意之微制度之密音律通乎治忽異教入乎人心欲精究而推明之以獻於上豈嵗月朝夕之故哉吾恐有憚煩之是慮曾謂閒散而減於吏責乎執政之意殆不如是也是以圖用君君其往效職以祛時人惑孟和曰誓畢吾生矣於其行次第其言以贈之欽遵聖訓嚴禁奢侈事汪鋐臣惟皇上舉行曠典親事耕蠶率先天下將使天下之民男勤於耕女勤於織以為豐衣足食之本既又頒示聖訓列為條目勅諭部院刋布天下將使天下之民重本抑末去惡遷善以成禮義㢘恥之風此皇上惠愛元元之心至矣盡矣臣伏讀聖訓内一款一秋成之後所獲須要撙節愛惜勿得賤棄儲之以備凶歉臣仰窺聖諭葢謂民之於財非勤無以開其源非儉無以節其流勤與儉可相有而不可相無也故既率之以勤復諭之以儉洪惟太祖髙皇帝著大明令禮儀定式凡官民服飾冠帯房舍鞍轡墳塋器皿床榻各有等第無非示民節儉使不得縱欲敗度夫奢之為害不止貧而巳也官之貪民之為盗上之虐下下之慢上禮義之風熄㢘恥之道喪皆自奢侈為之故太祖髙皇帝詳於禮制以防遏民欲如比奈何承平日久人心玩愒雖有令式㒺知遵守財愈匱而奢愈甚民俗之弊極矣皇上聰明天縱洞燭幽隠故撙節愛惜勿得賤棄之訓如遍厯閭閻而熟見之者真法祖奉天興道致治之要務也臣忻躍感戴自不容巳是用忘其固陋謹以令式所載及皇上所諭至意敷張演繹列為條款開坐上陳伏乞聖明俯賜采納責令御史守令著實奉行俾天下之民既務於勤又務於儉自京師以達四海翕然從風則禮義可興教化可行而治效可立見矣臣不勝懇切願望之至為此具本親齎具奏聞一伏覩大明令凡官民服色冠帶房舍鞍馬貴賤各有等第上可以兼下下不可以僭上職官妻女一品至三品服渾金衣首飾釧鐲用金玉珠寳四品五品妻女服金搭子衣首飾用金玉珠六品至九品服銷金衣并金紗搭子首飾用金珠惟耳環許用玉珠以上許通用綵繡庶民男女衣服並不得僭用金繡許用紵絲綾羅紬絹素紗金首飾一件金耳環一對餘止用銀翠帽頂帽珠並不得用金玉珊瑚琥珀靴不得製造花様金線粧飾庶民並不得用羅絹涼傘許用油紙雨傘凡鞍轡職官一品二品用金粧飾三品至五品用銀六品以下惟用確石鉞鈇庶民不得描金惟用銅鐵粧飾職官一品二品器皿許用金玉三品至五品惟酒盞用金六品以下酒盞用銀庶民惟酒盞用銀餘者禁止一伏覩禮儀定式凡衣服花様公侯駙馬用麒麟白澤文官一品二品仙鶴錦雞三品四品孔雀雲鴈五品白鷴六品七品鷺鷥鸂鶒八品九品黄鸝鵪鶉練鵲風憲官用獬豸武官一品二品獅子三品四品虎豹五品熊羆六品七品彪八品九品犀牛海馬凡文武百官軍民僧道人等衣服帳帽並不許用𤣥黄紫三色并織繡龍鳳紋凡官員蓋造房屋並不許歇山轉角重簷重拱繪畫藻井其樓房不係重簷之例聽從自便公侯前㕔七門或五門兩厦九架造中堂七間九架後堂七間七架門房三間五架門用金漆及獸面擺錫環家廟三間五架俱用黒板瓦葢屋脊用花様瓦獸梁棟斗拱簷桶彩色繪飾忩枋柱用金漆或黒油飾其餘廊廡厨庫從屋等房從宜葢造俱不得過五間七架一品二品㕔堂五間九架屋脊許用瓦獸梁棟斗拱簷桶青碧繪飾門屋三間五架門用緑油及獸面擺錫環三品至五品㕔堂五間七架屋脊許用瓦獸梁棟簷桶青碧繪飾正門三間三架門用黒油擺錫環六品至九品㕔堂三間七架梁棟止用土黄刷飾正門一間三架黒門鐵環巳上品官房舍除正㕔堂外其餘房舍許從宜葢造但比正房制度務要減小不許太過其門忩戸牖並不許用硃紅油漆公侯一品二品酒注酒盞用金餘用銀三品至五品酒注用銀酒盞用金餘用磁漆六品至九品酒注酒盞用銀餘用磁漆木器並不許用硃紅及稜金描金雕琢龍鳳紋官員床面屏風槅子並用雜色漆飾不許雕刻龍鳳紋井金飾硃漆官員鞍轡公侯一品二品用銀減鐵事件䩞用描銀三品至五品用銀減鐵事件䩞用油畫六品至九品用擺錫鐵事件䩞油畫一今之官民房屋違式者甚多合無行令巡按御史督同府州縣掌印官嚴加禁約凡以前造過違式房屋責限半年内改正自文書到日以後違式新造者許地方里老鄰佑指實呈首即將本犯并工匠依律問罪房屋拆缷入官如是地方狥情不舉事發一體究治年終府州縣各將改正追問過縁由造冊繳報巡按御史轉報都察院查考其奉欽賜第宅亭院不在禁限一今之富民男女衣服首飾僭用太甚徧身錦繡盈頭金寳恬不為異合無行令巡按御史督同府州縣掌印官嚴加禁約今後但有前項違禁服飾許地方里老鄰佑捉挐呈送依律問罪服飾追奪入官如是地方狥情不舉事發一體究治一今之富民器皿率用金玉合無行令巡按御史一體禁約究治違禁之物追奪入官一伏覩聖訓所謂賤棄者正如今官民之家一有宴㑹輒張盛筵所食不及一二所費常至什百暴殄天物莫此為甚合無嚴加禁約今後士大夫㑹飲毎桌果殽各不得過五碟庶民之家並不許鋪設筵席止用團桌聚坐食取適口酒止五七行不得作樂歌唱酒肆之内不許三五成羣長日酣飲在京行巡城御史在外行巡按御史差人宻切緝訪軍民有犯即行挐問職官有犯指實劾奏一居喪供佛飯僧出殯大設儀仗送殯至數百人實是賤棄米穀至於乗喪嫁娶作樂飲酒食肉實是滅棄禮法合無在京在外通行御史督同有司嚴加禁治則庶幾浮費可省風俗可淳一富貴之家率于院落栽植花木粧飾假山元宵做造鼇山花燈舉放煙火争竒鬭巧所費不貲及端午打造龍船競渡無時遊玩湖山寺院男女混雜合無通行禁治其浪造假山等物通追入官仍將追治過縁由造報一京師乃四方之表職官乃庶民之表法行必自近始必自貴者始乞勅巡城御史嚴督五城兵馬遵將令式所載并前項禁約事宜一一著實舉行違者指實叅劾如是御史不能盡職虚應故事臣等詢訪得實遵照勅諭内事理叅奏罷黜嘉靖九年二月十六日奉聖㫖朕惟禮制所以辨上下定民志一應官民服飾房舍器皿等項我祖宗俱有品級等第著為定式近來貪官豪民委的陵節犯分日習奢侈以此未免剋剥兼併雖屢有㫖禁約都因巡按官不行奉法以致府縣官狥情怠玩虚應故事覽卿所奏具見振揚風紀導民儉約至意都依擬在京行巡城御史在外行巡按御史便通行出榜張掛曉諭著實舉行所司有不奉法官民有不遵改的指名叅奏治罪罷黜民政方孝孺治天下者固不可勞天下之民以自奉也然不能使天下之民知道而易使亦豈足以為治乎當昔之未有君臣也民頑然如豕鹿猿猱餒則食飽則奔迸跳躑而不可制欲馴之且不能况欲使之乎聖人者出知其散漫放恣無所統屬非久安之道也於是制上下之分定尊卑之禮俾賤事貴不肖聴於賢由吏胥以至於大夫公卿由子男以至於諸侯各敬其所宜敬而各事其居乎上者猶以為未足也復制治民之法使五家為比二十五家為閭百家為族五族為黨二千五百家為州萬二千五百家為鄉以屬乎司徒五家為隣五隣為里四里為酇酇五為鄙鄙五為縣縣五為遂以屬乎遂人聮之以五兩卒伍師軍以知其數習之以師田飲射祭祀讀法以一其心書其善以作其氣罰其惡以折其驕六畜車輦旗鼓兵器之稽可按籍而知老弱壯少可任與否不必問乎民而具上有所興作朝出一言而暮巳集進之則前退之則却其民常知恭順忠愛事上為當然不敢少有忿怨避縮之意三代之時非不役民也而未嘗有一民敢發不遜之言豈威力足以制之哉其法素備其教素明民皆知道而易使故也戰國之君不知先王之用心務為茍簡之術以為不必如先王之煩宻過慮亦可以為治斥絶遺典而私心自為既巳失矣而秦又并燒除割絶之不復有為治之法而徒任刑罰以刼黔首譬之去悍馬之羈靮而臨以鋒刃彼有蹄齧騰躍而走耳安能以可生之身蹈必死之禍哉故斯民至於秦而後興亂後世亡人之國者大率皆民也其禍實自秦始秦之民即三代之民在三代之時則尊君而附上當秦之時則鷔狠凶戾視其君如仇讐豈民之過哉無法以維之無教以淑之而不知道故也二家之童其一自㓜教之以拜跪順悌其一恣詈言誶語而不禁他日犯上而賊倫者必自㓜不教之人其知教者必不至乎有過也治天下者未嘗願天下之不治而不修致治之法猶願無死而不食也致亂之由非一端莫甚於治民無法治民之法既定世有叛將亡卒挾奸而肇釁縶而殺之易易耳亂亡所以相踵者無賴者為之倡好亂之民皆起而從之也使斯民皆知君臣之義或有狂夫怪民出乎其間衆縛而告于司冦何亂之能成兹欲復井田行周制如先王之時固難矣獨不可稍取先王之意為之法乎今之役民雖不能嵗止於三日亦未至於厲民也終嵗休於家縣官役之以數日之事巳若為所不當為發憤懐怨而就道甚者或逃匿而不從上之威令方行而民巳如此設使不幸而威令有所不行何望其從上之命乎此治民無法教民無道而不知君臣之義使然也為人父者未必皆無過舉然子不敢逆其命者以父子之倫不可悖也人君之政豈能皆合乎民心苟不知君臣之義少不慊所欲則攘袂而起其危亦甚矣烏可以為不急而不務哉欲民易使則莫如倣鄉鄰酇鄙比閭族䣊之制執其中而用之為之正若長者月申之以讀法開之以古訓春秋合之以祭祀和之以飲酒導其忠順之道罰其不率令者遇有徵發以趨事先為者為上而厚賞以勸之以訕訐敗類者為下而屏黜以愧之上之人又能躬行以成俗立學校以明教則民可漸化矣然必制民之産使無死亡之憂然後可茍驅不能自存之民從吾之令雖堯舜之仁周公之智有所不能况三代之舊法乎故民易治也在乎治之有法法可行也在乎養之有道成化方孝孺寓控制天下之道於迂逺不急之法使人隂服乎上而不自知者周之所以得民也欲人之服從而炳然示之以服人之具其服也必不堅有意於服人先以養人者示之使天下咸化而歸巳此誠能服人者也秦漢之君未嘗不笑周以為迂而其為治之具固周之所笑以為拙陋而不為者也惡犬升竈而食糜必嚴禁而預防之使不敢近則可矣不能制之於先伺其既食而擠之於釜雖可以快意而釜之糜豈可食哉秦漢之法擠犬於釜之類也其於民也未能教之知義而禁之勿為亂未能教之知孝而禁之勿悖慢視斯民㝠頑愚僻與熊豕麋鹿無異不少置於心而為之計及其麗乎刑則三族誅滅之典斷然行之而不顧威令既立使人視斧鑕如就几席而無所避豈不可畏哉畏極而玩玩極而怨有時而不畏矣故以刑罰為威者威既䙝而亂生以禮義化民者俗既成而分定能使民畏禮義如刑罰而不敢犯之則刑罰可措而不用矣周之盛時是也五家置之長二十五家置之胥百家置之師五百家立之正其事似乎不切也嵗時則讀法春秋則㑹射蒐狩考其善而書之糾其惡而戒之民之得休息者寡矣其事似乎太煩也然周卒以此而治孰謂果煩而不切也哉周之成法具在今欲為此不難也而民必以為甚病夫變其所久習而俾為其所未見非特今之人病之雖周之民亦然武王周公以至仁易至暴宜其悦而順也然殷民紛紛思亂久而後定者非以法制之所行而然也葢殷之政亡久矣周驟以禮義繩之俯仰揖讓於規矩之中而不勝其勞則思其縱逸之安固恒人之所同然者况今之世承大亂之後乎然先王之道所以利民而上無所利能為之以漸可不擾而復稍撥其當損益者而疎略民可不甚病也宜定其制曰民家十為睦睦者言相親也十睦為保保者言相助也十保為雍雍者言衆而無争也雍咸屬於縣雍有長以有德而文者為之保有師以有行而文者為之睦有正以忠信篤厚為十家則者為之同睦之人月之吉咸造睦正之廬正中坐餘立而侍老者坐侍令少者一人讀古嘉訓巳正為釋其義戒勸之衆皆揖而聴一人讀邦法已正立而宣敷之衆皆北向跪而聴讀既正書衆名於冊列其所為於側善惡咸具無惡者為上善多者次之善惡均者為中惡多者為次中無善者為下正飲衆酒位皆以其行為差下者不畀酒不命坐三年而無惡者告于縣而復其身三年而無善者罰及之異其服不齒改者免之其善之目曰孝曰弟曰親隣曰䘏貧曰助同睦曰敏好學其惡反是保有學以教十睦之秀民四時各一㑹如睦制而略其教之之法取其孝弟忠信之行取其端莊和敏之德取其治經而知禮射而中習禮樂而安知書數而適用月試而升黜之升則於雍雍亦有學其教如保而加詳雍試而善則升於縣而復其家黜則于睦俾家之修修而有聞則復教之而復升之凡睦之民有未達則問諸正正未達則問諸學農而暇則惟學之游以諮善言以法善行同睦同保遇相揖作相助語相讓飲酒相命召若族雖非同睦行族禮童子則學於睦之正取其羣而和睦正保師雍長縣嵗考其績而升易之為上下疑有缺悮者其家復凡民力征相先粟賦相率上之所令胥勸而趨葬死而絶者食病而窶者敬德而文者執强悍愎而敗類者棄好佞而巧者此其要也持而循之使不至於壊謹而察之使不至於弊而朝廷都邑皆以禮為治民寧有不化者哉由是道也近者十年逺者數十年周之治可復見矣嗚呼周之盛至於今三千年矣漢文帝唐太宗宋仁宗有願治之心而治卒不如古者以其不法古之道而失先王之意也道之行豈非難哉然為天下者患乎無志有志無難為也患乎茍安求安無難致也患乎畏事立事無難成也舉而措之如斯而巳矣正俗方孝孺行於一人之身而化極四海之内觀於數百年之前而驗於數百年之後者風俗是也故風俗之所成至微也其效至著也所係似小也所由甚大也不可忽也昔者楚靈王好細腰舉國之人皆約食束膂引而後能起憑而能立伊川之祭被髪而祭智者知其變而為夷風俗之端可不深察哉夏之忠商之質周之文其先之所尚傳之十數世而不變守之至於國亡而後巳其俗素巳定也故商之不能為忠猶周之不能為質也周公豈不知文之不若質哉至於商之末質漸散而繁文興矣周公知其莫可及也故因而文之恐其趨於浮薄也為之禮以節之作之樂以和之惟其如此故能至於七百餘年然其後亦巳不勝其弊矣戰國之世游説之士螽聚蚊合以諂言邪説啗諸侯傾動天下誠三代之所未有也由是生民日流於變詐豈非文勝之弊哉及秦懲其病遂坑殺儒生舉先聖賢之遺文餘法一火而盡燔之曾不師古而任其深刻巧苛之律不旋踵而遂亡其所尚非其道故也漢興務以寛大更之法疎禁濶四百年之基用此以立然其時朝廷無人不知以禮義為俗其所因仍大率皆秦制也烏望其如三代哉至於近世惟宋之俗為近古尊尚儒術以禮義漸漬其民三百年之間宰相大臣不受戮外内庶官顧養㢘恥雖曰綱紀未備其所崇尚逺非秦漢以下之所能及故其垂亡之際孀后少主既巳就虜而其臣抱君之遺孤奔走海島誓天指日擁立為帝朝夕請命如事神明卒之無一人有叛背之心至於溺死於海而後巳雖三代之亡未聞忠厚惻怛有若是者孰謂風俗無益於國哉且夫秦皇帝之死未久而其黔首相與奮挺而呼願食其肉漢唐之衰皆逼於其簒弑之臣而奪之而宋乃獨若此者何也秦棄禮義漢唐不知禮義為俗而宋風俗淳美故也假使宋無靖康之禍尊其前世之俗國安遽亡哉以是知風俗之至急也宋亡元主中國者八十餘年天下之民凡人心習尚不隨世道以為升降者鮮矣其初尚有一二賢者教之叅用古法而亦頗以寛大為政故民亦安之迨乎暴君代作人之云亡處要職者黷貨紊法終以此亂其政大壊以至於今譬如敝鐘漏鐻非重鼔而鑄之其音不可得而調也夫欲因亂國之俗而致治雖聖人不能也勢不可也俗之既壊則日甚而嵗滋耳無以匡持之豈遂止哉今北方之民父子兄婦同室而寢汚穢䙝狎殆無人理盂飯設七咄爾而呼其翁對坐於地而食之為之學者其頑不知教其於大倫悖棄若此甚非國家之便也上下有則乃所以導民故古者士民不非其大夫今小民得以執郡縣之短長撾鼓而訴之闕下弟子或訟其師子姪或證諸父禮義不足曷所不至哉法令非不明也有司按四方之罪非少怠也而犯者不為衰止黠胥巨吏開口肆然徵取於人而不顧問之則曰行且輸作不取何以為資或曰身死而妻子何所仰食姑取之以自給耳其設心自以為明達見執貧守法者衆且羣指而笑之而其人亦不幸卒無赦以死於是益堅貪者之心小民轉之窮苦割剥肌骨鬻産賃室以奉其無厭之欲非特為此也國之大柄可以貧富者惟寳鈔為然無賴之民聚徒勒板而為之御史中使國之㢘察天下者妄詐男子假其衣冠符印乗傳而横行夫偽鈔偽官之律至重也而若不愛其死而冒之哉豈誠不愛也哉彼見死者之多而死不之畏也且人雖至愚奚不畏死彼誠見生之不足樂也知生之足樂則安肯言死哉頃者富民受挫辱於官府或裾其衣而跽或庭拽而詬罵其心大恥掩面而不敢見人里中弔者填其戸殺羊為酒而祓除之其人亦終身以為病况犯有名之律至於死地哉今人則俱不顧矣鞭一百扶而出於外揭其瘡以示人談笑而道之人亦不以為怪一百之刑曾不直舊時之詬罵刑愈多而人愈不知恥則刑之不足以化民亦明矣故欲民之重死而難犯法莫如省無用之刑而以禮義教之夫牧者之於羊操長鞭而逺麾之未嘗及其體則逐逐然行矣茍步步而鞭之則必馳突散走而不可制故刑者非所以治民者也不得巳而後用民知其不得巳而後用則烏忍犯之哉俗之不美至此甚矣少遲而不變法令將不足禁之不可不深計也三代之變俗各視前代而變之元之俗于今不宜故今宜用禮義為質而行周之制今周之制亦有行者矣學校非不立也鄉飲之禮非不修也然而俗尚未善者未嘗灼然示之以所尚也夫示之以禮義者朝廷之上皆不言他而以禮義御史出行郡縣不以搏擊人責之而責之以禮義化民之事守令者考覈之等不以興利增戸求之而求之以刑罪息學校興嵗舉其孝弟忠信之民而尊異之使小民皆知朝廷之意在乎成俗而不求利在乎任德而不任刑則信讓立而㢘恥興㢘恥興而民重其死然後取先王防範天下至於七百年之法舉而盡行之三代之俗必復見而成康之治不難致矣世嘗謂古今不同俗豈其然哉今也民啜粟飲水與三代之民同養老育㓜與三代之民同獨人君不可行三代之政乎用元之法而欲致古之治猶食烏喙而望其引年附獨木而濟大川也嚴旌别以示勸丘濬臣按天下之起於一家之積無一家之不理然後天下之平由此其基焉易不云乎方以類聚物以羣分鳥獸必相與羣於林藪魚鼈必相與羣於川澤惟能羣然後可以生育物且然而況於人乎人之生也有父子有兄弟有親屬姻㜕必有恩以相親有禮以相接有誠以相孚然後可以久處而至於逺且大也茍連肢體而分爾汝同井宅而割門戸相爭相奪甚而相鬭訟相戕賊不思吾有身體即吾祖考之遺體吾之兄弟即吾父之子也吾之伯叔即吾父之兄弟也吾之子亦且相與為兄弟吾之兄弟即吾之伯叔分而異之推而逺之雖若疎異然原其始初皆出於一人之所生其氣脈本相同也先王有見於斯於凡民之有孝義累世不分居者必旌表焉雖曰為厚人倫移風俗之計而實以隆吾致太平之基也我聖祖承元人叔季不綱之餘尤疾兼并之俗豪家鉅族往往以失道踰制獲戾獨於浦江鄭氏家以恩數或有誣衊之者輒赦不問既旌其門又屢擢其子弟為顯官毎指以風切當世登極之初即制令云凡孝子順孫義夫節婦志行卓異者有司正官舉明監察御史按察司體覆轉達上司旌表門閭列聖相承率循舊章凡下詔天下輒載其事以申飭有司又於律文凡盗賊刺字者收充警迹是亦先王旌别淑慝之良法深意也采苓子鄭處士墓碣録方孝孺周之文盛矣至其季也流而為夸詐孔子葢屢歎之教人必以忠信豈不以忠信為立德之本故耶今世去孔子時益逺機巧之俗勝而敦慤之風微乃有若鄭處士者焉其可尚也哉處士諱濂字仲德别號采苓子居金華之浦江自其七世祖綺教子孫勿異爨今傳十有一世矣元及國朝皆表其閭天下稱之曰義門鄭氏處士處乎世者八十有四年主其家者凡十有七年自成童至耄老其言必信其行必篤其事長撫孤待昆弟接朋友一以誠自持無纎毫之妄望之其容熙熙然即之其語怡怡然久與之盤旋未嘗見其忿言怒色躁者炙之而悔詐者近之而愧士君子與之游者若翰林承㫖宋公濂教授胡公翰贈翰林學士王文節公褘皆以文學重當世莫不推服以為賢而鄉人子弟聞處士之名者咸敬畏以為不可及也嗚呼可謂忠信之士矣處士為學通大義美髯長身貌和而氣淳家以田賦多推擇為糧長屢以事入覲太祖髙皇帝識之後妄人誣其家與權臣通財時嚴通財黨與之誅犯者不問實不實必死而覆其家處士與從弟湜兩人爭先就吏上獨憐之曰我知鄭義門無是也人誣之耳擢湜布政司參議而盡以所徴貨全歸鄭氏且問處士治家所以長久之道處士具以對上甚喜處士感上之恩毎上生辰即捧香詣闕下拜賀上未嘗不喜而勞之當是時浙東西鉅室故家多以罪傾其宗而處士家數千指特完蓋忠信之報云議處節孝以彰風化疏該儀制清吏司案呈查得本部節年稿簿内開凡民間孝子順孫義夫節婦等項見行事例先據有司具奏到部仍行有司覆勘回文至日復行彼處風憲衙門覈實取具結狀到部案候類奏旌表文移往返之間以地方逺近計之多者三五年少者亦不下一年有餘况閭閻節孝之人多有出於貧乏之家有司結勘里胥因縁為奸假藉保覆横肆需索是以有力者或足以應其求而貧難者遂不得其覆勘甚至勘合雖行而終於湮没不報者往往有之又况有司具奏等項節婦中間多有六七十嵗以上者年巳衰暮而文移勘覆動經數年寵光未沐巳先朝露蓋有抱節操行終身不獲表異之榮者比比合無今後孝子順孫義夫節婦等項但係有司勘實奏請者免行有司覆勘止行風憲官勘實若係風憲覈實奏請者免其再覈通候季終類奏旌表則不惟有司文移減省里胥不得為奸抑且使行義足徴速獲為善之報寵光所被真足以激勸世俗矣伏乞轉達等因案呈到部臣等看得該司呈稱乞要將孝子順孫義夫節婦有司勘實具奏者免其覆勘徑行風憲官覈實若係風憲官覈實具奏者免其再覈通候季終類奏旌表以便人情以杜弊端一節為照前項旌表節孝事例實為朝廷激勸風俗之盛典所以必行再三覈勘者恐有虚偽無非欲考其實耳然至於文移展轉動淹嵗月吏縁為奸恩不下究亦不可不為之所也今據該司所呈實便事體足弭弊端况風化所闗相應依擬臣等合候命下著為定例通行今後凡民間孝子順孫義夫節婦等項但係有司勘實具奏者免其復勘徑行風憲官覈實若風憲官覈實具奏者免其再覈通候季終類奏旌表一次如此則人情便而弊端革矣嘉靖十年十月十三日具題十五日奉聖㫖是欽此鄉飲酒記葉盛鄉飲酒盛禮也古先聖王皆致重而不敢輕我太祖皇帝尤注意焉嘗觀前吏部尚書崑山余熂茂本所為鄉飲酒序似始於洪武十二年及考餘干縣誌所載則又云行於五年八年未知孰是併録於此以竢考徵余序曰皇帝龍飛十二載特詔天下行鄉飲禮崑山縣人臣李無逸尚義讀書時為萬石長奉詔惟謹迺即其鄉賔禮耆英逺近畢至則有若周壽誼年百有十二嵗皤然在席九十八十七十者坐以齒盛升降揖讓拜俯周旋之儀獻酬有容讀法胥吿觀者如堵牆莫不感化翕然巳而醉者扶歸者歌髫白欣欣笑言載途鄉士大夫紀其事而詠之吾友余彦智以書走京師求予引其端又弗克為其請益堅嗚呼鄉飲不行久矣黄鮐之老耳不聞鹿鳴之歌目不識賔介之儀蓋百有餘年矣皇明出而一舉累代之曠典一旦而復之何其易哉而無逸生逢聖世獲覩盛禮之行乃能率先鄉人峩冠博帶與龎眉兒齒雍容揖讓於樽俎間且以忠君孝親睦閨門比鄉䣊為勸可謂不惑流俗篤信古道者矣世有藏鏹數百萬即為富家翁烹羊炰羔舉觴浮白挾吴姬侍趙女彈箏搏拊歌呼嗚嗚以極一時之樂烏識所謂鄉飲酒禮者哉聞無逸之風亦可少愧矣使鄉鄉如無逸則古禮不難復而况孝弟可興風俗可厚其機一寓於是乎吁紛紛百卉中見此孤蕙蘭亦君子之所與也為我謝曰聖天子在上善自律以化其鄉人他日璽書惟汝加尚勉㫋哉洪武已未春正月既望承勅郎同縣余熂叙志曰里社鄉飲酒讀律儀式并圖洪武五年五月初四日朝廷降鄉飲酒讀律儀式命有司官㑹同儒學官率士大夫之老者行之使民知禮知律毎嵗孟春正月孟冬十月百家為一㑹共備酒肴有糧長者糧長為主席無糧長者里長為主席如坐以賔之年最長者居中衆則序齒居左所主席者居其末坐定選一人讀律及宣申明戒諭既畢行飲酒禮拜則年長一倍之上者坐受長十嵗者立受相若者抗蓋參酌唐宋之制也時本縣未之行八年又命下知縣畢福行之毎都以大戸率士民於申明亭上讀律戒諭飲酒致禮風俗翕然而變可謂盛矣水東日記宗法方孝孺井田廢而天下無善俗宗法廢而天下無世家聖人之立法所以救萬民之心而使之萃於一者治道之極治功之盛不可忽也故一之所在智者無所措其謀辨者無所措其說勇者無所用其力如裘之領如網之綱如髪之握如輹之轂如馬之有轡如牛之有紖操之則歛縱之則放招之則集撝之則退屈伸作止惟上之所令不能參以私先王之民非甚異於後世也其好義而易使從化而畏法寧死於飢寒而不忍為亂者豈碪斧鈇鉞所能禁哉教之以其所固有故其向善也安令之以其所易知故其趨化也亟當是之時同畝接閭之人猶相親睦信順而大小宗法行乎宗族之間為百世之宗者百世宗之為五世之宗者五世宗之宗其身則守其訓有所猷為皆受命於宗子而悍戾爭鬭之風無自而起茍非大奸魁詐不可教令則安有不善者乎故三代之俗非固美也為治之具既美而習使之然也後世之願治之主王佐之臣迭興於世而卒不足幾此豈民性之不可化耶其具之廢巳久世主便因循而憚改作材士昧逺略而務近功區區補敝苴漏而未及乎政教之全也民心益離而俗益散奚獨民之罪君子與有責焉吾嘗病之而未之能行則思以化吾之族人而族不可徒化也則為請以本之一為始遷祖之祠以維繫族人之心今夫散處為廬為十為百而各顧其私者是人之情也縱其溺於情而不示之以知本則將至於紛爭而不可制今使月一㑹於祠而告之譜之意俾知十百之本出於一人之身人身之疾在乎一肢也而心為之煩貌為之瘁口為之呻手為之撫思夫一身之化為十百也何忍自相戕刺而不顧乎何忍見其顛連危苦而不救乎何為不合乎一而相視為塗之人乎故為睦族之法祠祭之餘復置田多者數百畝寡者百餘畝儲其入俾族之長與族之㢘者掌之嵗量視族人所乏而補助之其贏則以為棺槨衣衾以濟不能葬者産子者娶嫁者喪者疾病者皆以私財相贈遺立典禮一人以有文者為之俾相族人吉凶之禮立典事一人以敦睦而才者為之以相族人行誼之倫擇子姓一人為毉以治舉族之疾其藥物於補助之贏取之有餘財者時增益之族之富而賢立學以為其師取其行而文其教以孝弟忠信敦睦為要自族長以下主財而私典事而惰相禮而野不能睦族没則告於祖而貶其主不祠富而不以教者不祠師之有道則祠之不能師者則否郡國之禮一丘濬臣按先儒謂鄉飲有四一則三年賔興賢能二則鄉大夫飲國中賢者三則州長習射四則黨正蜡祭今世所行者惟存一鄉大夫飲國中賢者爾他如所謂州長習射黨正蜡祭世不復講而三年賔興賢能其宴㑹今謂為鹿鳴而亦不以鄉飲名之焉夫飲之名始於成周漢唐以來亦間行之然無定制我太祖皇帝得國之初即詔天下府州縣毎嵗再行永為定制伏讀御製大誥有云鄉飲酒禮不過申明古先哲王教令而巳所以鄉飲酒禮叙長㓜論賢良别奸頑異罪人其席間年髙有德者居於上髙年淳篤者並之以次序齒而列其曾違律犯法之人列於外坐同類者成席不許干於良善之席主者若不分别致使貴賤混淆察知或坐中人發覺主者坐以違制奸頑不由其主紊亂正席全家移出化外嗚呼斯禮古先哲王之制妥良民於宇内亘古至今興此鄉飲安鄰里和長㓜序無窮之樂大哉王言所謂從者昌否者亡其垂世警俗之意深矣傳曰禮之教化也微其止邪於未形使民日遷善逺罪而不自知也其此意歟郡國之禮二丘濬臣按此古人行鄉飲酒禮之三也竊惟今制一嵗凡再行鄉飲酒禮既行之於正月望日又以十月朔旦行焉嵗首之禮宜如常制合養在官在民之老以正齒位若夫孟冬之月百穀告成農夫終嵗勤苦始得少息請略倣周人蜡祭之禮備牲醴以索祭鬼神聚民之老者飲以勞之遂禮其年髙有德者以為大賔而以其能帥子弟耕稼者為衆賔庶合古禮意云家鄉之禮一丘濬臣按易曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦蓋太極動而生陽靜而生隂隂陽之氣凝而成人乾道成男坤道成女男陽而女隂男之陽而配合女之隂則為夫婦由是而生父子由是而成君臣由是而叙為尊卑上下親疏之分此禮義所由以錯也是以人君為治必以正家為本而家之所以正者統系明内外辨秩然有其禮也禮始於謹夫婦夫婦之謹在於正男女之位而分别之人君既正身修德以閑其有家又必命官惇典庸禮以敷德教於天下使天下之人曉然知大防之所在男盡男之禮女盡女之禮各夫其夫各婦其婦以是成孝敬厚人倫美教化移風俗則治平之基於是乎立矣三代之盛率循是道漢唐以來治雜於霸甚而邪僻自處而不知非宋世雖稱尚文然藩服郡邑皆置營妓而名為士大夫者亦畜歌姬時或出以娱賔而人家所謂養娘者又皆立契典僱至於前元入中國之季年風俗敗壊重以羣盗淫掠我朝承其後痛加禁革立為官吏宿娼之律士夫一有犯焉終身不齒宋朝視我朝媿多矣昔漢承秦人苛刻之後一切反其所為然路温舒猶謂秦有十失其一尚在今元之弊政汙習固巳汛掃無餘矣然猶不免有一之尚存者男女之無别也今燕趙齊晉之域古所謂中州也自古聖帝明王大賢君子過化存神之地禮義㢘恥所自出也而今閭閻之下貧下之家内外尚無限隔男女同炕而寢夫婦以名相呼翁婦嫂叔之不相迴避繼父繼母之子女相為婚配諸如此類者尚或有之乞勅有司痛加禁約一洗從前之積習以昭盛代之文明毋使片翳寸纇以為大明之玷家鄉之禮二丘濬臣按黄潤玉謂大宗絶立後小宗絶不立後為今制然觀宋儒陳淳謂古人繼嗣大宗無子則以族人之子續之而不及小宗則是我朝親藩初封未有繼别之子而國絶則不為立繼蓋古禮也親藩且然况庶民乎然則今庶民無子者往往援律令以爭承繼非歟謹按聖祖得國之初著大明令與天下約法有云凡無子許令同宗昭穆相當之姪承繼先儘同父周親次及大功小功緦麻如無方許擇立逺房及同姓為嗣若立嗣之後却生親子其家産並許與原立均分並不許乞養異姓為嗣以亂宗族立同姓者亦不得尊卑失序以亂宗族其後天下既定又命官定律立嫡子違法條云若養同宗之人為子所養父母無子而捨去者杖一百發付所養父母收管若有親生子及本生父母無子欲還者聴若立嗣雖係同宗而尊卑失序者其子歸宗改立應繼之人其遺棄小兒年三嵗以下雖異姓仍聴收養即從其姓切詳律令之文所謂立嗣之後却生親子并所養父母無子而捨去及若有親生子等辭皆謂其人生前立嗣也無有死後追立之文聖祖之意蓋以興滅繼絶必前代帝王功臣賢人之後不可絶其嗣使其不血食也先王制禮不下庶人庶人之家若其生前自立繼嗣及將昭穆相應之人自㓜鞠養從其自便然又恐其前既立繼而後又有子或所養之人而中道背棄及有尊卑失序者故立為律令以禁戒之也令如漢髙祖入關之約法律乃蕭何之所次也斷此獄者當以律文為正若夫其人既死之後有來告爭承繼者其意非是欲承其宗無非利其財産而巳若其人係軍匠籍官府雖脇之使繼彼肯從哉春秋推見至隠而誅人之意請自今以後其人若係前代名人之後或在今朝曾有大名顯宦者以宗法為主先求繼禰小宗次繼祖之宗次繼曾祖之宗又次繼髙祖之宗此四宗者俱無人然後及疎房逺族及同姓之人若其人生前或養同宗之子雖其世系比諸近派稍逺然昭穆若不失序亦不必更求之他所以然者以其於所養之人有鞠育之恩氣雖不絶而心巳相孚故也凡為人後者除大宗外其餘必有父在承父之命方許出繼已孤之子不許者為人後者為之子為人之子則視其人行第稱其所生或為伯或為叔不承父命而輒稱已父母為伯叔可乎是貪利而忘親也如此則傳序既明而爭訟亦息矣家鄉之禮三丘濬臣按周禮以本俗六安萬民註謂本俗為舊俗竊以謂本者人生本然之道淳古所行者今則變而澆漓矣於是申而明之復而還之使萬民各循其本仍其舊以遂其安焉雖然萬民之積起於一民萬家之所以同者由乎一家之積也是以古昔先王經理天下以安萬民自本俗始正本俗必自民家始是故因民之族一民之俗居必同室也而規制不得以自異葬必同壤也而兆域不得以自别聮兄弟使之叙輩行以相稱謂聮師儒使之合硯席以相肄習所交游者必同一其道而不得以友非類所衣被者必同一其製而不得以為異服如此則家不殊俗矣由一家而合之一方由一方而合之四方莫不皆然則天下之平其基在此矣淳古之本俗豈不於是而復哉夫以先王之世於凡民之宫室墳墓兄弟師儒朋友衣服皆為之處置乃獨於其日用之飲食畧焉張紞謂聖人非不欲之難為之制爾嗚呼信乎其難也何則古者一夫受田百畝一夫上父母下妻子以五口八口為率孟子告齊梁之君所謂八口數口之家是也民年六十以所受田傳其長子其次子是為餘夫年十六别受田二十五畝俟其壯而有室然後更受百畝之田百畝之外又受田廬之地五畝二畝半在田二畝半在邑由是觀之三代以前蓋無累世同居共爨之制可知也然則漢唐以來往往於累世同居者旌其門復其役夫豈無其故然歟蓋以世道日降民俗日偷乃有一家焉獨於道隠民散之餘而為合族立宗之舉則夫操長民之柄者將以致其潛消宻移之化安得不為之率德勵行使民知所勸而强於為善哉然此特人君之微權耳非生民久處之常道也蓋天下之土地有限人民之生息無窮考史自唐以來民之同居者久不過十世踰十世而不散者蓋無幾焉是雖勢之不得不然而亦理之窮而變也張紞論欲倣古諸侯廟制五世一宅各有祠而總為牆宇以郭其外庶幾事親奉祭各得其所臣竊以為一姓之家一族之産十世之後非併諸其鄰安得地以容之哉然則為之計也奈何曰其巳然者朝廷當為之維持輔其所不及助其所不足蠲其所不能子孫之茂異者擢用之其不率教者懲治之如此則其家範久行而族居不散矣若夫人家之所以自為計者盍思曰合族以居共爨而食豈非美事哉然吾之恒産有數而子姓之生息無巳一日不再食則飢一歲不製衣則寒一人不得其所則戚創立之初三四世間固若易為矣至於六七世之後食指日多費用日廣何所居以安其身何所出以給其用可不豫為之慮詳為之計哉且三代聖王經世之典所以貽厥孫謀者數世之後尚不能無變更况人家乎蓋人人須有所居止日日須有所食用勢至不能容力至不能給必思所以變通之道宜一凖周官本俗而不失其意是故居必欲比宫室若地不能容不得巳而别遷必合衆力為之營構不失舊媺之規葬固欲聮墳墓若地有所礙不得巳而别厝必隨支派為之布列而不失族葬之舊兄弟之聮稱呼必合其輩行命名則同其偏旁師友之聮肄業則一其道德交游必同其臭味以至衣服必為寛博之製不尚詭異之飾使人望而知其為一家羣從子姓也家必同一俗人各習一業少者為之生計壯者為之身計衰者為之老計老者為之死計無子者為之後計而又時修譜牒詳明世系祭有祭田墓有墓田供力役有田延師教有田不惟有合族之公田而又有各室之私田而私田之中又各有公田焉大宗則行時祭小宗則行節祠使之既協力以事其大宗而奉其祖廟又各竭力以事其私親而祭其祖禰親未盡不得别居異財服雖盡不得析戸别籍私家既為之則範而率族屬以必遵其祖訓官府又為之禁令而限民人以各守其家法如此雖不必同居共爨而本然之道常存淳古之俗可復矣臣集為家鄉之禮凡人家所當行者既巳類叙如前而又引周官本俗安民之法以總結之者期天下之人家行古禮鄉復本俗必如周禮大司徒以致萬民之安者以立治平之基奏故官房屋事萬觀臣近視巳故官員之家先前有因父祖伯叔任官之時遵奉國朝稽古定制照品級造屋住以後父祖伯叔病故多被小人訟其子孫僭住違式房屋其受理官司亦不究其造屋原因輒便依告提問如律房屋斷没入官臣竊稽諸唐制其祖父舍宅門䕃子孫雖廕盡聴依仍舊居住前件如䝉准奏乞勅工部行移内外衙門但有故官之家曾依品級起造房屋者除因貪汚罷黜著令改拆外其能守法奉公終於本等職事許令子孫永逺居住如此不惟厲仕者㢘謹之心亦祖父舍宅門廕子孫之盛典也前件㑹官議得合准所言宜從行在工部施行未敢擅便具本正統三年三月二十日早各官於奉天門奏奉聖㫖是欽此除欽遵外移咨到部擬合通行除外合行本司轉屬照依奏奉欽依内事理一體欽遵施行題公差事張寧近該行人司司正李寛題為申明職掌事查得洪武二十七年五月二十三日禮部議得合差行人事件凡開讀詔赦諭勞軍務賞賜祭祀賑濟徵聘賢才整㸃大軍出使四夷俱合差遣除奉特㫖差遣不拘比例各官於奉天門奏奉太祖髙皇帝聖㫖是整㸃驛傅決罰有司審決重囚不許差欽此欽遵近於正統八年因本部擅差進士伴送哈宻使臣該本司人劉澣奏䝉都察院差御史曹泰查得伴送使臣終係奉使四夷之事今郎中葉臻不差行人却差進士事屬有違具題奉太上皇帝聖㫖都饒這遭欽此續於正統十四年又該御史楊剛題稱行人職掌奉使今後開讀詔赦必先差行人行人不敷方差進士進士不敷然後差各衙門官員具題奉欽准外奈何近年以來奔競之徒肆無忌憚恃勢要求越職差遣乞查勘洪武年間并御史曹泰楊剛奏定事例永為遵守等因具題奉聖㫖著該衙門查洪武永樂年間例來說欽此本年二月十七日本部巳經通行覆奏奉聖㫖今後只照洪武永樂年間事例再來打攪不饒欽此欽遵臣切惟太祖髙皇帝設官定職各有攸司其在京各衙門郎中主事等官俱有官守不宜一時曠廢所以特設是官以通使命往來自洪武二十七年以前止以承差任使後欲其通達國體不辱君命始專以進士除授任用之意葢亦重矣爰自定制以來一應合差事件俱屬行人間有别項官員無非一時特㫖或因行人不敷故也豈期因襲既久遂以為常今各衙門官員一切指此要求請托苞苴公行有因親舊在任而假途營求者有因離家日久而枉道回還者有因懶於坐理而托此游逸者有因有所規避而假此疏釋者求之者不巳主之者不辭易於取覔者皆歸之請囑難於辦給者必委之行人致使為是官者羣坐無為一籌莫展及至奏請申明定奪禮部又行巧立詞説或言其沿途搔擾不便或言其止是爭要差使夫擾民之罪犯者當之豈可預為之疑而奪其所掌差使乃行人分所當為之事豈可反謂之爭要哉且如李寛所奏洪武二十七年事例即是太祖髙皇帝舊制今祠祭司郎中蕭總員外陸通主事周騤等要得支吾不即據此為証况洪武年間差遣條例見在本科與本部後項查出永樂十一年以後差人款目無異却言文卷俱在南京别無查考其御史楊剛奏准事例與李寛所奏正係奉查實跡本司因見原奉欽准内有行人不敷方許差進士等項事例却乃隠而不舉行人楊顯加與李寛所奏詞情本無關涉本司因見原奉聖㫖有再來打攪不饒事理却乃故行援引意在希㫖自永樂十一年至今其間朝廷事務非在一端所差行人蓋亦多矣本司設心䝉蔽要見多差别項官員是以止開到禁茶伴送葬祭三件又不明開此時有無奉㫖别差及行人不敷縁由亦不知本部是否因襲前失止是朦朧開坐却言别無定奪此其巧於欺㒺昭然可知臣㕘照蕭總等奏對不誠奸慝斯漸下侵庶職上㒺於君原其今日創謀之由實為他日自謀之地乞挐送法司究問以彰變法之罪再照本部尚書胡濙侍郎薛琦姚䕫不行用心查考却乃依憑蕭總等開奏草稿即與具題亦合究治仍乞收回原㫖再行查考舊制及近事例遇有事務先儘行人方許差遣别項官員其奉特㫖者仍前不拘此例如有請託等項事𤼵一體治罪庶使祖制不違而職有定守官難作弊而人不茍求矣縁總等係堂上官并在京官員未敢擅便謹題請㫖方洲集行人司題名記顧清行人司題名倡自仰君世用既而遷去更代不一塵司石匠氏所㡬二十有年矣謝君𢎞謨思纘興若事楊給事中士宜嘗為之請記未就而君復遷去戴君絲材夏君公謹又取其未盡刻與後至者刻之為續題名既成以朱君大武來申前請以終謝君之事行人古者掌賓客使命之官其名見於周禮春秋之世鄭以公孫子羽為之其人之賢乃與子産並列吳之季札魯之叔弓齊之髙子皆國之選也而結駟連軫交騖於中原則是官之重可知也兩漢及唐為大鴻臚之屬及宋而為諸使臣走馬承受之任則微矣皇明以六典建官參之近制以賔客𨽻鴻臚而立行人司專使命之職凡國有大詔令若親藩外夷封建弔祭及有所諭告巡告則承之行人非是皆不得遣焉又定制司正副而下皆以進士為之非是人不與列給事中御史若省郎或外臺僉佐闕則取諸其中蓋秩雖下而選甚髙禄雖微而任則重今日之行人真成周盛時之行人矣官府之有題名雖以識履厯要實有鑒戒存焉行人之職重於周輕於近代至我朝而復古豈徒以其名哉孔子曰行己有恥使於四方不辱君命可謂士矣又曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為夫謂之專對謂之不辱聖人之論則使之體也春秋列國之用人則使之式也今天下一家四海一君威靈所加荒外夷裔奔走㳟命為行人者憑軺軒乗康莊雍容以臨之則夫宣上徳而達下情尊主威而重國體者豈無其道哉謝君始刻自南京吏部尚書黄公宗載至太常少卿李君陽春止二百六十有七人續題者武岡州守唐君榮而下又百五十有三人尚論前修斯亦足亦勸矣嗣而興者其殆有思乎踵吳季之芳塵超國僑而先駕以無忝宣尼之訓使將來永有述焉則三君者之志不孤而庶㡬我國家稽古命官之意矣名臣經濟録巻二十七
