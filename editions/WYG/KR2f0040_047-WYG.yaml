body:
  text: 名臣經濟録卷四十七明黄訓編刑部題奏雜論題平大法事林俊陜西清吏司案呈先為建言民患事該巡按直𨽻監察御史陳實㕘稱内史葛景盧佐違法事情該本部覆題奉聖㫖葛景盧佐縻費廩給占用夫船本當提問且饒這遭欽此又為乞治倚勢挾讐䧟死平人兇犯以公法令事該刑科給事中劉濟等㕘稱先鎮守太監劉實并伊弟錦衣衞中所副千户劉文挾讐誣䧟等因該本部覆題節該奉聖㫖劉文巳有了㫖劉實既去任都免提問欽此又該河南清吏司案呈皇城守衞事該犯人梅清招稱西中等門左少監李舉用内使范寳薛安奉御劉孟陽强索賍銀等情該本部覆題節該奉聖㫖李舉用等不必提都着司禮監奏請發落欽此又該廣東清吏司案呈為陳情辯明分豁誣害事該本部題㸔得内官監右監丞劉景爵李文昌長隨劉景翬陽和史監張馳保内使甄受劉景爵李囊强索財物合行提究等因節該奉聖㫖李文昌等不必提着司禮監奏請發落欽此又該廣西清吏司案呈為守衞事該給事中王瑄等㕘稱長隨李文賢於金水河内渰死家人李優子等因該本部覆題奉聖㫖死的巳相視明白了合該官員都免提問欽此欽遵㸔得内使葛景盧佐强索廩給占用夫船羅織挾騙倚勢賤買千户劉文爭占樂婦挾讐陷死田瀾太監劉實聴信撥置煅鍊害人俱難輕貸左少監李舉用内使范寳薛安奉御劉孟陽剥削軍士索要賍銀右監丞李文昌等承委管工强索財物長隨李文賢禁密之地渰死人命俱屬違法律當提問今俱奉欽依免提不必提不惟廢法長姦亦且事難歸結合呈查處等因案呈到部臣等竊惟法立於祖宗守於陛下而奉行於法官漢武侯曰宫中府中俱為一體不宜偏私使内外異法所以防官邪齊民志也今法干於内臣至内臣之親屬者皆得饒免是法獨行於外而不行於内陛下神化之妙左右自皆革心萬一作奸犯科而無法制之是教之使犯其流安可止耶夫人情不甚相逺論細謹内臣豈無論輕縱外臣難免惟外臣有六年之考察三年之黜陟科道之糾劾撫按二司守巡之摧擊一干吏議終身不敘大約三數年間沙汰而去者不下三五千人是皆内臣所無故法易犯而事無大小又須具奏故祗見㕘論之多若偏於外臣者實非敢輕重其間也所據前項内臣似宜各下法司明正其罪罪之不當自宜廢不法之官不宜廢祖宗之法而司禮奏請發落亦須獄上方下其奏與凡貴戚之臣一無所假則奉上無私畫一不二疏戚内外皆無越我防制之中相率遷善以罔干予政泰和之治成矣若彼此猜疑殆非國家之福亦非内外臣之利也臣等無任勤綣縁係平大法以召大和事理未敢擅便謹題奉聖㫖已各有㫖了欽此題訪獲事林俊錦衣衞鎮撫司題稱少監王玘等軍匠陳俊等并任氏偷盜内府財物縁由奉聖㫖是陳俊并任氏送法司擬了罪來説王玘等送司禮監奏請發落未獲的着挨拏送問守門守衞内外官軍本當查究但既無的記日期罷張徳玉等饒他欽此欽遵將陳俊等開送前來各問罪送大理寺待報發落外該本部看得内府嚴密之地内監親近之臣而内庫之儲付以監守責亦專矣不謂王玘盧能韋祥霍通韋訓范誨䝉浩孫忠李忠董鏞息堂玉廷佑甄得李進大肆姦貪串同陳俊等恣意侵盜銀共二千七十九兩紵絲絹布共一千餘匹紵絲紬絹衣服共二百領又有金紐玉束等物夫一時侵盜如是平時侵盜何如一起事發如是各起未事發何如中間侵隠又有不可以數計者夫當正徳蠱極之時嘉靖起而應亨嘉之㑹豹房等財物天意為中興積也而道路相傳多見侵沒今被該厰訪出宜示大戒顧乃得送司禮監奏請發落夫以近日内臣有犯不付有司猶非大盜尚為失刑今王玘等大盜容不付有司邪成化間刑部陜西司一起内使張來保盜彰徳宫財物計賍約銀百兩問擬盜内府財物斬罪奏奉憲宗皇帝聖㫖即押赴市曹處決掌宫太監被累知罪人不行捕告亦發南海子充淨軍夫彰徳之財猶私財也尚示大戒内府公家之積内而大禮外而大費皆是乎出不示大戒誠恐江河不足以實漏巵群盜效尤國計一空其弊可勝道耶書云君曰辟曰宥臣曰勿辟勿宥言不當徇君以為生殺惟當審輕重之中此法官萬世訓也臣等為國守法豈容忍黙以漏大姦所據王玘盧能等一十八員名似宜下之有司明正其罪太監張徳玉等及該直守門守衞内外官軍亦各查究如律庶羣姦屏息積弊一清縁王玘張徳玉等俱内臣及係治盜臣以防耗國事理未敢擅便謹題請㫖奉聖㫖是王玘等巳各打五十降小火者發南京打更了張徳玉并該日守門守衞内外官軍巳有了㫖了欽此重惜事體以正朝廷疏近該東厰太監芮景賢受民人趙紀詞狀奏奉欽依差錦衣衞官校拏解知府郭九皋等來京問理一事巳經科道官連日抗章糾正其失節奉聖㫖未賜允納昨者又奉聖㫖趙紀所告係干人命重情又贓私數多特差官校拏解來京待解到之日朝廷自有處置你每如何又這等來説該衙門知道欽此㨿趙紀告稱因定國公家奏陳土豪久隱功田被知府郭九皋問發伊男趙學充軍乃訐愬九皋并同知張守接受馬甫廣等金銀致死人命等情臣查得定國公徐光祚於去年實有此奏奉欽依着撫按官㑹同原差科道部屬官選委公正人員審勘明白議處停當來説欽此該巡撫順天等府地方右副都御史孟春巡按監察御史郭楠實㑹同臣與監察御史樊繼祖户部主事張希尹行委知府郭九皋同知張守將定國公奏内事情從公查勘續㨿該府勘明申稱奸民趙紀違例投獻揑稱馬甫廣等霸占等因巳經都御史孟春㑹同具題外㨿今趙紀所告前事則是掇拾原勘官員中間似有依慿城社之迹奸弊顯著法所當懲奈何反開告訐之門遽興拏官之獄况朝廷設官分職自有定制臣下奉法任事各有常守今天下一應詞訟内則從三法司外則從按察司及撫按衙門祖宗以來守為成法况東厰原奉勑諭責在緝事専為京城其永平府係直𨽻地方逺在千里縱干人命贓私自屬彼處撫按衙門東厰委的不應受理又不當輒與聞奏趙紀縱有寃枉重情自當赴本管上司陳訴若有見監人犯亦各具本奏行法司不應驀赴東厰首告今芮景賢昧於事體輒受民詞既以聞之陛下一時未察不直付之所司輒差官校拏解今日舉措委於事體非宜且陛下之言曰待拏解到日朝廷自有處置臣謂朝廷處置亦惟有法而巳今拏解之舉巳為法外之事臣未見法外行事而可以服天下者也且朝廷行政貴識體要人主為治宜攬大綱即使郭九皋拏解到日鞫問貪酷是實陛下猶不免以天子之尊下侵有司之事頗𩔖苛察足傷大體設或趙紀所告涉虚九皋被逮而死則虧損聖徳孰任其咎今㨿紀一面之詞未經勘鞫真偽不辨而九皋先巳禠奪衣冠身就縲絏道路興嗟甚非美事風聞四方人人解體恐非國家待士夫之道也况此事根因原屬撫按衙門所告情詞牽連人犯頗重徒使拏解到京終是難於結斷萬一盡属虛謬於朝廷所損非輕臣愚欲乞陛下俯垂明察示人至公無主先入之言勿與臣下爭勝特降明㫖將知府郭九皋提解永平府聴理將趙紀所告事情選差刑部錦衣衞官各一員前去會同北直𨽻撫按官逐一體勘待勘得九皋等賍私是實人命果真然後拏解前來處以重典以為天下貪酷官員之戒實未為晚若趙紀所吿事出誣罔則亂法之姦罪在不赦亦乞朝廷從重處治用懲頑梗如此則事理不失法令自行議論自息朝廷正而人心安矣臣冒昧進言無任隕越伏惟陛下留神省察則公道幸甚應詔陳言以弭災異事汪鋐廣東道監察御史呈刑科抄出臣鋐等題前事奉聖㫖還㑹議明白歸一來説欽此欽遵抄出到道案照先該本道呈刑科抄出刑部尚書許瓚奏前事欽䝉勑諭近來逺近之民餓􅥌盈途死亡流離無筭聞諸奏報實用憂傷爾部院大臣百司庶僚之首不可不加勉刑獄重事人命所關其情弊多端最難條數甚傷和氣法司推議奏請臣聞命驚惕措躬無地切惟天人本一理感召無二致變不虛生惟人所致君以承天大君天地之宗子大臣宗子之家相大君總理於上羣臣分理於下臣職舉則庶政修而人君享垂拱之休和氣應而禎祥至矣臣職廢則庶政隳而人君負宵旰之勞沴氣應變災生矣恭惟皇上以大聖至仁之質懷敬天法祖之誠求賢納諫勤學好文念百姓之饑寒則賑濟救拔之恩屢頒憂邊方之多難則安輯禦攘之䇿累行近因四方有災沴之奏天時失雨暘之宜心切焦勞省躬自責以誠意應天變以實德率臣工詔諭諄切期與臣工共圖治理令各條陳弭災事宜愛民求治之心雖二帝三王不過是也臣以謭薄之資庸陋之器職忝司刑才不勝任深懼無以仰答聖明慎重刑獄之盛心致災之由獨臣為最謹以職守所關條陳四事上凟宸聰大義欲求仰體聖明欽恤仁愛之厚而識見短淺未敢自謂可以裨治理而回天變也伏惟聖明俯賜容納採擇施行等因奉聖㫖着都察院大理寺還參詳律例通行㑹議停當來說欽此已經呈院議覆去後今奉前㫖呈乞㑹議施行等因具呈到院案照先為前事該本官奏奉前㫖臣等已將所奏㑹同大理寺卿葛浩等詳議覆題去後今奉前㫖臣等覆㑹同大理寺卿葛浩等參詳律例㑹議明白開列前件對欵覆題合候命下查照施行惟復别有定奪縁係應詔陳言以弭災異及先奉欽依着都察院大理寺還參詳律例通行㑹議停當來說并今奉欽依還㑹議明白歸一來說事理未敢擅便謹題請㫖一禁囂訟以安良善前件查得大明律内一款凡誣告人笞罪者加所誣罪二等流徒杖罪加所誣罪三等各罪止杖一百流三千里若所誣徒罪人巳役流罪人已配雖經改正放回驗日於犯人名下追徵用其路費給還若曾經典賣田宅着落犯人備價取贖因而致死隨行有服親屬一人者絞將犯人財産一半斷付被誣之人至死罪所誣之人已決者反坐以死未決者杖一百流三千里加役三年又查得一款凡教唆詞訟及為人作詞狀增減情罪誣告人者與犯人同罪若受雇誣告人者與自誣告同受財者計贓以枉法從重論又一款凡誣吿人充軍民告抵充軍役軍告發邊衞充軍又一款内稱若冒認及誆賺局騙拐帶人財物者亦計贓准竊盜論免刺又一款凡恐嚇取人財物者計贓准竊盜論加一等免刺又查得問刑條例一款一軍民人等干已詞訟若無故不行親齎并隱下壯丁故令老幼殘疾婦女家人抱齎奏訴者俱各立案不行仍提本身或壯丁問罪又一款凡將本狀用財雇寄與人赴京奏訴者并兠攬受雇受寄之人屬有司者發口外為民屬軍衞所者俱發邊衞充軍原詞立案不行又一款在外刁徒身背黄袱頭揷黄旗口稱奏訴直入衙門挾制官吏者所在官司就拏送問若係干自巳事情及有寃枉者照常發落不係干巳事情别無寃枉并追究主使之人一體問罪屬軍衞者俱發邊衞充軍屬有司者俱發口外為民又一款代人揑寫本狀教唆扛幇赴京及赴巡撫巡按并投按察司官處各奏告叛逆等項機密强盜人命重事不實并全誣十人以上者俱發邊衞充軍又一款一朝覲聴選給由等項人員及解送軍匠物料聴奏儀賔會試舉人嵗貢生員人等到京若在京及原籍來京一應親識閒雜人等設法奏告欺詐嚇取財物者問罪枷號一箇月發落原詞立案不行欽此前項律例不為不嚴法網不為不密但經行既久人心玩慢以致近日刁風大起如楊孝丁鑑之徒造為刁詐之術肆行輦轂之下變詐多端效尤日廣誠有如本官之論者若不通行禁約何以杜塞將來臣等㑹議得前項律例事理合候命下通行兩京内外大小問刑緝事衙門一面通行申明禁約一面多方緝捕拏問以杜弊源但其間又稱及行通政司收受本狀審有雇替冒名奸徒即便嚴繫送問本狀不許封進一節會議得通政使司之設本為出納帝命通達下情以防壅蔽今稱嚴繫送問本狀不許封進恐長壅蔽之漸又查得大明㑹典内稱一應奏告詞狀中間看係革前并不干巳事及審出添揑等詞若情係不該奏告就於本後明白㕘出投送法司該道再加詳審立案不行欽此亦未明言本狀不許封進又查得洪武十四年事例本司職專出納與内外諸司俱無文移有徑行本司者以違制論欽此俱與本官奏詞不合擬合照舊施行一求實情以釋寃枉前件臣等會議得大明律刑律盜賊項下二十八條其間拳拳以得財不得財為言又一條云凡盜公取竊取皆為盜器物錢帛之𩔖須移徙巳離盜所珠玉寳貨之𩔖㨿入手隱藏縱未將行亦是其木石重器非人力所勝雖移本處未䭾載間猶未成盜馬牛駝驢之𩔖須出欄圈鷹犬之𩔖須専制在己乃成為盜人命項下二十條其間有成傷輕重之等有保辜限期之文犯姦項下一十條有曰其非姦所捕獲及指姦者勿論若姦婦有孕罪坐本婦鹽法項下一十二條有曰若事發止理見獲人鹽當該官司不許展轉指攀違者以故出入人罪論至於枉法嚇騙律雖不言過送亦必事迹顯明原贓追出然後科罪又查得問刑條内一款鬬毆傷人辜限内不平復延至限外而死情真是實者仍擬死罪奏請定奪欽此律例詳明纎毫不謬夫何内外問刑衙門官員或律例不明而假手吏胥或昭鑒不真而茍且成獄或拘泥成案或迴避嫌疑惟知事便於巳不思罪枉於人誠有如本官所言者合候命下之日通行内外問刑衙門今後推問囚犯招情一如本官所擬人命必審問苦主騐對屍傷盜賊必審勘失主追騐真贓受贓充軍必求過付見証之人姦情私鹽必求見發捕獲之情如屍傷不對失主未到或不知名失主或不知名地方或不知名失記名過付見証之人或指誣姦情攀告私鹽等項俱不許成招問罪或事不可結正者奏請定奪如有前項含糊不明招詳到部俱照臣等前奏奉欽明憲綱事理查其回繳招由初次欠允駁回再問二次欠允具實㕘劾其在外撫按衙門遇到所属呈到招由欠明者亦照前駁勘二次欠明者亦許指實㕘劾庶不致事枉人寃以傷和氣其兇徒打死人命即將本屍付之水火强盜在野馳驟拒敵傷人或夥打流賊見被擒獲審問明白者則又不在檢屍追贓常例之中而死有餘辜無容議矣其稱皇上總攬萬㡬親閲章奏或遇有此等獄情特下詔仍令原問衙門回答具奏無非欽恤刑獄至意伏乞聖明隨宜俯就裁奪施行不勝幸甚一明律意以平罪犯前件臣等㑹議得人之犯罪情節未能皆一而併贓計贓律意各有攸當所謂併贓者其款有三如曰凡竊盜巳行而但得財者以一主為重併贓論罪為從者各減一等刺竊盜二字此一款也又曰凡監臨主守自盜倉庫錢糧等物不分首從併贓論罪刺盜官物三字此二款也又曰凡常人盜倉庫錢糧等物但得財者不分首從併贓論罪刺盜官物三字此三款也所謂計贓者其款有十如曰凡白晝搶奪人財物計贓重者加竊盜罪二等為從各減一等刺字此一款也又曰凡盜牛馬驢騾猪羊鷄犬鵝鴨者並計贓以竊盜論刺字此二款也又曰凡盗田野穀麥菜菓及無人看守器物者並計贓准竊盗論免刺此三欵也又曰凡恐嚇取人財物者計贓准竊盗論加一等免刺此四欵也又曰凡用計詐欺官私以取人財物者亦計贓准竊盗論具免刺此五欵也又曰知强竊盜後而分贓者計其所分贓准竊盜為從論免刺此六欵也又曰凡棄毁人器物及毁伐樹木稼穡者計贓准竊盜論免刺官物加二等此七欵也又曰凡官吏受財者計贓科斷説事過錢有贓者計贓從重論此八欵也又曰凡監臨官吏挾勢及豪强之人求索借貸所部内財物者計贓准不枉法論此九欵也又曰凡有司官吏人等非奉上司明文因公擅自科斂所部内財物及管軍官吏總旗小旗科斂軍人錢糧賞賜入已者並計贓以枉法論其非因公務科斂人財物入已者計贓以不枉法論此十欵也夫曰併贓是併衆人之贓而通作一處論也曰計贓是計各人入巳之贓而各自一人論也此律之文義甚是明白本無可疑但計贓之中如十人共奪銀一兩則又不得不併論如三人盜一馬五人盜一牛則亦不得不併論又如三人共毁一棹五人共毁一牀則亦不得不併論議者因此往往致疑謂計贓通當以併贓論也臣等看得律之言併言計其文自殊今比而同之未免有失律意人之情犯不同而律意亦如化工隨物賦形自不拘一合候命下通行内外問刑衙門今後但遇律文稱併贓者則以併論稱計贓者則以計論其計贓之中有不得不併者則亦以併論如此則與律意自不相背而於人情亦無不當矣一清刑禁以廣仁政前件臣等查得大明律内一款凡獄囚情犯已完監察御史提刑按察司審錄無寃别無追勘事理應斷決者限三日内斷決應起發者限十日内起發若限外不斷決不起發者當該官吏三日笞二十每三日加一等罪止杖六十因而淹禁致死者若囚該死罪杖六十流罪杖八十徒罪杖一百杖罪以下杖六十徒一年又一條云凡獄囚應請給衣糧醫藥而不請給患病應脫去枷鎖紐而不脫去應保管出外而不保管應聽家人入視而不聽司獄官典獄卒笞五十因而致死者若囚該死罪杖六十流罪杖八十徒罪杖一百杖罪以下杖六十徒一年提牢官知而不舉者與同罪若巳申禀上司不即施行者一日笞一十每一日加一等罪止笞四十因而致死者若囚該死罪杖六十流罪杖八十徒罪杖一百杖罪以下杖六十徒一年又一款云凡婦人犯罪除犯姦及死罪收禁外其餘雜犯責付本夫收管如無夫者責付有服親屬鄰里保管隨衙聽候不許一槩監禁違者笞四十及查得嘉靖三年四月十九日詔書内一款一兩京法司及外問刑衙門近年以來軍民詞訟不行即時問理又聽犯人展轉攀扯以致淹禁日久因而病死者往往有之寃抑不伸致傷和氣今後務要上𦂳問結毋致枉濫又查得嘉靖六年二月十三日詔書内一款一兩京法司及在外問刑衙門受理詞訟不許聽犯人展轉攀扯以致淹禁枉濫及酷刑拷打致傷人命有故違者在京許科道官在外聽撫按官訪挨查照律例從重問擬發落又一款一刑獄未明人情所苦近來各處問刑衙門監禁强盜人命未決及充軍追贓人犯有疑似不明真偽未分者蓋縁起初原問官司或執偏見或肆貪酷不加詳慎有因刑逼坐贓者有因同姓名誤坐者草次取供遂成案卷豪猾者反以僥倖脱網良善者乃以無辜受禍以後嵗月漸逺官吏屢經拘成案者不肯與辯避嫌疑者不敢與辯結憤牢獄實傷和氣都察院便行移與各處巡按及審録官各秉至公勿拘成案勿避嫌疑的見寃枉即與辯理情重者奏請定奪以雪民寃欽此前項律例雖詳而有司視為故紙叨禄俸以偷安視人命如草芥深為可惡合候命下通將本官所議及前律例詔㫖再行申明遵守今後問理詞訟或𦂳關人犯巳到不即決斷聽從牽提無干人衆或輕犯到久候提𦂳關人犯久禁不行召保及男子不係徒犯重贓婦人不係逃走重刑一槩濫禁致使枉死被汚者在内聽科道官在外聽撫按官指實㕘奏其稱兩京冬至以後立春以前四十五日之間應該枷號人犯比照天氣暄熱欽恤㫖意其各開奏取自上裁法司通行酌量奏請一節蓋謂盛寒盛暑枷號均為不堪而盛寒尤甚合候命下今後自冬至以至立春四十五日之内但有應得枷號人犯暫且停止召保在外候至立春以後照例枷號如此則法無輕縱而人情亦堪矣嘉靖九年九月二十五日奉聖㫖是准議行題為計處凈身以圖善後事汪鋐巡視五城監察御史汪似等各將查審過凈身男子王堂等共八千七百一十二名陸續開具到院案查先准禮部咨為孤苦至極以無歸着再乞天恩垂蘇生命事該本部題看得順天等府宛平等縣軍民等籍淨身男子王堂等三千五百一十五名連名奏稱各無歸處乞要收用一節為照古者大刑有五其一曰宫而成周酒人漿人醯人染人之射𩔖用奄寺蓋先王不忍以罪辜棄人而復收恤之以藉用其力我朝内府監局掌以中人悉如周典而自宫禁例至以不孝論死其欲保全人道正先王以生道殺人之意但宣徳正統以來宦臣收入漸多及武宗之世日益昌熾錦衣玉食之榮上擬王者為之弟姪者往往坐獲封拜而蒼頭厮飬亦復紆金衣紫是以閭閻小民朶頤富貴往往自殘形體以希進用當時收充海户者幾萬人嵗縻月糧不可勝計恭遇皇上御極裁革殆盡數年以來饑寒死亡日漸凋耗即今見在者不過三四千人今王堂等私自凈身雖於禁例有違但自經裁革以來無所棲泊王府功臣之家既不敢犯法私用民間又不敢違禁隱藏以致上無富貴之圖下無衣食之計流落狼狽凍餒切身甚者肱篋穿垣以圖口腹及其求食不得則又糾朋聚黨叫號街衢擊皷排閽控訴苦楚皇上蓋嘗數下驅逐之令示之極刑而旋去旋來暋不畏死是豈得巳之情哉先王之仁不忍使一物之不得其所矧於此屬之情亦甚可憫況今上林苑南海子灌畦牧獸俱各乏人即欲量為收用亦不為過但恐奏内之人數多有虚揑姓名以希頂補而在外不曾投告官司者尚多未經查審明白難便一槩混收合候命下行令巡視御史督同五城兵馬指揮等官將見在淨身男子逐一㸃視比照奏内姓名有無虚揑備查的確數目及各人年嵗貫址定限三月十五日以前開報本部仍㑹同司禮監官備查先年收充海户事例從長議處請自上裁如果見在人數比之先年不甚泛濫即將王堂等收充海户供役食糧其王府及在京貴主之家但有缺乏内臣供事者許其具奏前來照例差遣其三月十五日以後如有陸續前來奏擾者即係前項虚揑姓名頂補人數查照𢎞治十三年事例定發邊逺充軍仍行都察院轉行各處巡按御史出榜禁約私自凈身之人俱照𢎞治五年事例本犯及下手之人處斬全家發邊逺充軍兩隣及歇家不舉者同罪巡按御史仍取具合屬府州縣以及衞所等官不違依准定擬期限繳送本部以憑查考如所屬地方再有凈身之人本管官吏一體㕘治庶法令嚴重而人不敢輕犯矣等因題奉聖㫖是依擬行欽此欽遵備咨到院巳經通行欽遵劄仰巡視五城監察御史督同查審去後今據開送前來除照名咨送該部施行外臣等照得永樂宣徳正統𢎞治以來淨身禁例不為不嚴但禁令方行旋復收用不能堅守其禁是以禁雖嚴而人往往犯之猶如無禁也查得嘉靖七年節奉明㫖這淨身男子着原籍官司鈐束在家生理但有赴京奏擾的拏問重治不饒嘉靖八年復節奉明㫖這淨身男子余瑾等一千三百六十二名巳經題准發五城查審年力精壯准發各王府供役其老弱嚴加鈐束若縱令入京再行奏擾一體㕘究重治續到范玹等一千餘名不係原奉㫖收發之數乃敢聞風聚衆觀望告擾着巡捕將官及五城兵馬㑹同盡行驅逐出城也給與執照著各回原籍九門官軍今後務要著實把守盤詰再有擁衆入城不聴阻遏的即報巡捕及五城官捉拏送官問罪處死都察院還通行各該有司申明舊例今後若有私自淨身的本身并下手之人處斬全家發邊逺充軍兩隣里老不舉的各治以罪有司官不行關防撫按衙門㕘治降調欽此臣等仰見皇上嚴為此禁確守不移正以監先年旋禁旋收之弊不為因前茍且姑息之政於以保全人道於以消弭禍患憂深慮逺所謂仁之至義之盡也乃今復奉明㫖依擬收用豈皇上之得巳哉是盖天地好生之徳欲使天下無一物不得其所無一夫不被其澤耳臣等又復何言但今日之收與前日之禁似相背馳未免復蹈先年旋禁旋收之轍人見令之不信無所畏憚則覬覦富貴之念未免復萌而殘毁形體之事自不容巳殆恐今日收用一千則明日民間又復增淨身一千矣今日收用一萬則明日民間又復增淨身一萬矣令之不信雖咬釘嚼鐵無補也且該部原題謂見在者不過三四千人今數幾至一萬以萬人而聚食於一處升斗之糧不足以滿其欲勢之所至將若之何況復源源而來有不可限量者哉古人有云蝮蛇一螫手壯士遂解腕盖言忍痛以避毒也若姑息一手則其毒將遍及於一身不可救藥矣伏望皇上深思逺慮斷自聖􅇆勅下該部從長計處設為良法以散其衆不急不徐務使令之必行禁之必止消禍於方萌弭患於未形斯為善後之圖大聖人至仁至義之施也臣等不勝惓惓縁係計處淨身以圖善後事理未敢擅便謹題請㫖嘉靖十一年四月十七日題十九日奉聖㫖是這私自浄身男子明犯律條且先朝冗食巳都有詔㫖查革了節次糾衆來京奏擾又累有明㫖驅遣禁約禮部各給與票帖令各回原籍生理如何却又來京奏擾動以萬計卿等所奏實為國家深長之慮禮部還查詔㫖計處停當來説不可務為姑息以貽後患題為反獄事汪鋐福建道監察御史呈刑科抄出巡按福建監察御史施山鎮守福建地方兼管市舶司事内官監左少監師章各奏前事奉聖㫖都察院看了來説欽此欽遵通抄出到道具呈到院臣等看得巡按福建監察御史施山鎮守福建地方内官監左少監師章各奏稱侯官縣監候人命强盜重犯盧堅等十九名執持刀斧反獄殺死左布政使查約右㕘議楊瑀都指揮王翺知縣黎文會按察司經歴周煥又打開福州府及懷安縣門進入各監内將斬絞重囚犯張九等五十七名一同反出打開城門殺死把門百户及民兵郭清等賊衆方行逃走副使郭持平等陸續擒捕及㕘奏巡捕指揮仲欽等不行嚴謹防捕一節為照福建省城設有都布按三司并一府三衞三縣等衙門各該掌印佐貳等官俱各在任又有巡按御史及鎮守内臣同在一城今侯官縣監囚犯一旦執持刀斧公然反出殺死方面大臣刼放府縣囚犯殺死門官民兵一齊奔逸如出無人之境則上而鎮守三司法令廢弛下而府衞縣官職業不修居然可見及照布按二司監并府監俱設有司獄官吏及獄卒數十人以上關防猶自嚴謹今重犯不收司府監而收縣監則經該官吏其情弊亦自可知再照前項重犯招内既稱情真怕死然前此㑹審却乃不行處決朦朧監禁則巡按御史及三司掌印等官豈能辭責臣等又訪得亂作之時御史及三司等官或踰垣或投入民居各四散奔走藏躱損失威重莫此為尤且無辜之民横罹鋒鏑者不下六七十人賊首奔遯未獲奏報情詞未真人心洶洶誠有如都給事中趙廷瑞之所㕘者查得巡視浙江等處都御史胡璉見巳到任本院欲候命下備咨本官行令上𦂳親詣福建地方將前項反獄事情從公查勘要見反獄囚犯何年監禁何官問理因何不收司府監而收縣監因何遷延不行處決即今斬獲者是否真正其奔逸賊首林汝美車卜二等有無捕獲軍民被殺的有若干名口各賊行過鄉村曽否殺擄人財務要一一從公勘問明白分别各該貽患失事等項官員罪犯輕重及將擒捕效勞人員分别功罪查被殺左布政查約應恤縁由一併奏請施行縁係反獄及奉欽依都察院看了來説事理未敢擅便謹題請㫖奉聖㫖是請辯馮恩罪狀疏王廷相嘉靖十四年四月十七日該司禮監太監張欽傳奉聖㫖如今天氣暄熱而法司并錦衣衞見監囚犯笞罪無干的放了徒流以下便減等擬審發落重囚情可矜疑并枷號的都寫來看欽此欽遵仰見我皇上好生之徳與天同體臣備員法司敢不祗承休命以奉宣徳意乎臣於去年㑹同吏部尚書汪鋐等奉命審録罪囚審得刑部犯人馮恩犯該上言大臣徳政斬罪臣與鋐等以本犯罪狀與律不𩔖情實可矜擬以有詞再問伏䝉聖㫖依擬今巳數月矣未見刑部再問明白擬奏今者又奉欽恤之命臣乃執法之官若隠忍不言致使皇上欽恤之仁不被於下厥罪深重焉用執法為哉臣伏覩皇明祖訓有云凢官員士庶人等敢有上書陳言大臣徳政務要鞫問情由明白處罪本註云如漢王莽為相操弄威福平帝以新野田二萬五千六百頃益封莽莽不受吏民上書頌莽功徳者前後四十八萬七千五百七十二人遂至威權歸莽傾移漢祚大明律條意亦同此切惟聖祖垂訓制律之意慮恐後世宰執姦邪暗邀人心以危社稷故耳今馮恩所犯情狀揆之於此實不相𩔖何以言之尚書汪鋐掌都察院之日恩曾挾私妄劾鋐及鋐轉陞吏部尚書恩之意以鋐必害巳故先為論列以制鋐不敢發且波及一二輔臣以示其非私劾鋐此小人之心而量君子之腹者也跡其情狀誠為可惡至於舉論尚書夏言王憲等之賢亦不過假藉言官論列之公以濟其害鋐之私耳比諸稱頌王莽功徳本不相類臣與鋐等擬以有詞再問者此也伏乞陛下矜憐之臣又聞之前輩有云我朝祖宗以來有三美政皆前代所不及不與異域和親一也不使外戚與政二也不以論諌殺言官三也夫言官人主之耳目也耳目聰明不致䝉蔽則人主洞燭姦邪萬里畢照社稷之福也故古聖王之於言官言善則行言不善則優容之所以廣聰明而鎮姦回也言官至於殺戮則臺諌之臣莫不括囊惜命矣誰復敢犯危而言之夫姦邪無種乘便乃生使言官畏禍而緘黙以自保此匪人得志之秋也䝉蔽奪其聰明姦黨隠於肘腋人主孤立無所聞見豈不危哉我祖宗以來不殺言官大義以此伏惟陛下鑒察之且馮恩狂妄小人殺之亦何足惜但係朝政之大為可惜耳伏望陛下再勅刑部議辯律義與恩所犯情跡果合與否再行具奏上請定奪則皇上欽恤之仁不致遺漏而可矜之囚亦得以被其更生之澤矣臣不勝幸甚縁係辯明律義矜人命以重欽恤恩例事理未敢擅便謹題請㫖治要方孝孺無法不足以治天下而天下非法所能治也古之聖人知民不可以威服於是寓革姦剗暴之意於疎緩不切之為使民優柔揖讓於其間莫不兢然有自重知恥之心未見鉄鉞而畏威未見鞫訊而逺罪潜脩黙改於田里之中若有臨而督之者彼豈恃區區之法哉法之為用淺陋而易知民之為情深詭而難測以難測之情視易知之法法巳窮而其變未巳未有不為竊笑而隂誹者也善用法者常使民聞吾法之不可犯而不使民知吾法之果可畏夫人祗天而懼帝者以其威不可測而未嘗親見其誅殛也如使鬼神臨人之庭捽人而擊之則愚夫鄙婦皆思持梃而逐之矣其何畏之有欲人之重犯乎法在乎不輕用法於民吾視殺戮為輕刑而數用之彼將輕吾之殺戮而數犯之矣吾視笞罵為大辱而重施之彼亦以笞罵為足恥而畏避之矣得其要術者能使民畏笞罵為殺戮不得其要者刑人接於市而人談笑犯法不為之少衰人惟以死為足重也故知樂其生知生之樂也故凡可以賊身害名之事慎忌而不為使皆不愛其死則將紛然驚肆馳逐於法令之外趨死而不顧雖有法何足以制之聖人之治不恃斯民畏吾之法而恃其畏乎名不恃其畏乎名而恃其畏乎義夫纊冠素組𤣥冠縞武與坐之嘉石而畫其衣施之人身非有毁形傷膚之慘也而使惰游之士不齒之人與麗乎法者服之則慙悔愧恨與被木索嬰金鐵者無異此何必刑哉加之以其辱固甚於刑矣孝友睦婣任恤先王以是數者勸天下之民非能家説而人誘之也而人以能是為榮不能是為辱書之黨正族師之籍如受命於王庭而就刑於司冦其心達乎義故知畏乎義而惟恐或違之也事固有類乎不急而至要為用甚微而為化甚博者聖人常以是寓夫御世治民之精意使民奔走慕悦無所厭倦而不自知其由世俗不之察以為迂逺而不若用法之有功則過矣人主莫不欲人之興於孝悌禮讓也而人不免悖徳而蔑教莫不欲吏之奉職而循理也而吏不免怠肆而迂僻則法果可以禁之乎法加人之肢體而不從而謂虚名可以服其心若不近人之情而理有所宜然者不可不察也二人治家一以變色不言為怒一以箠撻詬罵為怒自其嚴者言以變色不言者為不肅矣示其怒者雖異而其為怒則同人見其色之不易變也於其偶發乎面其畏且懼與箠撻何擇哉故法不必嚴在示其意向而巳辱莫大於不得同於恒人觴舉坐以酒而飲一人水其愧甚於刑及其身恥為醉酒者所輕笑也良淑之民皆冠緇布徳為民所尊者加識别之行為人所卑者使不與恒民齊則民莫不修其所可尊而去其所可卑者矣吏以廉稱者歸則服其服不能以義退者異其服以媿之則莫不盡其職矣推是類也等其田里别其室廬使民無貴賤以徳之髙下為貴賤仕無崇卑以政之廣狹為崇卑有罪者始則異其冠服次則殊其里居如是而不悛則誠不可與為善矣然後刑戮加焉人知刑罰果出於不得巳行於果不可不怒也必能自重其身知麗乎法者為可恥而禮義之俗成矣夫茍可以變易風俗雖有甚難至逺之事先王之所樂為也况其易者乎易者忽之以為疎而不屑為難者重之以為髙而不敢為則是聖人之道終無適而行也悲夫制刑獄之具一丘濬臣按自文帝廢肉刑至是蓋三百年一旦欲復之難矣孔融之議専為惜人是即所謂雖欲改過自新其道無繇者也肉刑有五宫居其一乃其中尤慘者也四刑止毒其身宫刑乃絶其世人之有生承傳禪續其來有非一世而一旦絶之于其身豈非人生大慘哉自漢文帝廢肉刑後有議欲復之者仁人君子必痛止之夫於人之有罪者尚不忍戕其生絶其世乃有一種悖天無親之徒自宫其身以求進以祖宗百世之脈雲仍萬世之傳而易一身之富寵嵗月如流人生幾何胡不思之甚耶愚民無知而自落陷穽上之人亦恬然視之而不知禁止何哉兹亦斁彛倫敗風化感傷和氣之一端有國者嚴為之禁而罪其主使用力之人是亦不忍人之政之大者也制刑獄之具二丘濬臣按唐虞三代以來俱用肉刑至漢文帝始廢肉刑用笞其原盖權輿虞刑之鞭扑也除死罪外自墨劓以下率以笞代之然未為笞令所箠之具無常物所箠之處無定在景帝定箠令箠之制始用竹箠之處専在臀魏晉南北朝其君臣仁暴不同其俗尚厚薄不一其所用刑各有不同隋文帝始定為今之五刑凡前代拷訊之具若夫捧束杖車輻鞵底之𩔖盡除不用唐宋因之制為刑具各有等第本朝於大明律卷首作為横圖以紀獄具笞大頭徑二分七釐小頭徑一分七釐訊杖大頭徑四分五釐小頭徑三分五釐以上皆以荆為之長俱三尺五寸枷以乾木為之長五尺五寸頭闊一尺五寸死罪二十五斤徒流杖以下有差杻長一尺六寸厚一寸鐵索長一丈鐐重二斤凡為笞杖皆削去節目用官降較勘如式然後用之不許用䈥膠諸物裝釘應決者用小頭臀受其大小厚薄視唐略等比宋則尤為輕焉祖宗好生之仁雖為惡之罪人惟恐或有所傷而為之薄刑也如此是以仁恩厚徳浹於民心百年於兹近年以來乃有等酷虐之吏恣為刑具如夾棍腦篐烙鐵之𩔖名數不一非獨有以違祖宗之法實有以傷天地之和伏乞聖明申明舊制凡内外有因襲承用者悉令棄毁然禁之必自内始敢有仍前故用即以所製者加之庶使太祖皇帝慎罸之意恤刑之仁所以著於律文者萬世之下咸如一日所以恢皇仁於九有綿國祚於萬年者端在於斯明流贖之意丘濬臣按自廢肉刑之後惟宫一刑尚存然多取反叛餘孽為之亦或有生而隠宫及自宫以求進者官府不以為刑也唐初雖斷右趾太宗以為肉刑久除不忍復而房𤣥齡亦謂今肉刑既廢以笞杖徒流死為五刑又刖人足是六刑也於是除之宋人於今五刑之外又為刺配之法豈非所謂六刑乎聚罪廢無聊之人於牢城之中使之合羣以構怨其憤憤不平之心無所於洩心中之意雖欲自新而面上之文巳不可去其亡去為盜挺起為亂又何怪哉宋江以三十六人横行河朔迄不能制之是皆刺配之徒在在而有以為之耳目也慎眚災之赦丘濬臣按赦之為言釋其罪之謂也後世之赦乃以蠲逋負舉隠逸䕃子孫封祖考甚至立法制行禁令皆於赦令行焉失古人眚災肆赦赦過宥罪之意矣臣愚以為赦令之頒宥罪之外蠲逋減稅省刑巳責弛工罷役寬征招亡凡寛民惠下之道因赦而行可也非此属也一切付之有司行馬凡夫赦文之初作條件之初擬也必須㑹集執政大臣各擬所司合行條貫從公計議必於律例無碍必於事體無違必於人情不拂斷然必可行的然必無弊如蠲逋也其物必可除後決不至於復追如寛征也其事必可巳後決不至於再作其文意必不至解而兩通其前後必不至言而相戾既處置其事宜復講解其文理明白切當然後著於赦文行於天下則上之所謂頒者無虛文下之所沾者皆實惠矣明復讐之義丘濬臣按復讐之義乃生民秉彛之道天地自然之理事雖若變然變而不失正斯為常矣以五行之理論之如金生水金為火所克水必報之水生木水為土所克木必報之木火土三行皆然人稟五行以有生有以生之必有以報之人知所生者必報其所由生是以相保愛相䕶衞不敢相戕殺非但畏公法亦畏私義非但念天理亦念人情此人所以與人相安相忘而得以遂其有生之樂也然人世有無窮之變王法有不到之處天理有未定之時或相殺焉殺之不以其罪冺之不存其迹急之不容其緩是故所殺之人其父也其子曰父生我者也而人殺之是無我也我何以生為必殺之以報我所生所殺之人其兄若弟也其兄若弟曰兄若弟我同生者也而人殺之是蔑我也必殺之以報我同生我不報之人設殺我而我兄弟不為報吾謂之何所殺之人其交好游從也其交好㳺從者曰若與我交好㳺從彼非不知也而殺之是藐我也必殺之以報我所知我不報之人設殺我而我交好㳺從不為報我謂之何天下之人凡有生者皆相為死則彼不逞之徒不仁之輩不敢起不仁之念蓋慮其人之有子若孫有兄若弟若交好若㳺從必上告天子下告方伯赴愬於有司聲寃於皷石也而王法雖公刑官雖明然無愬告者則其寃亦不能以上達此聖人制其法於禮使凡為人子為人兄若弟有父母兄弟之讐則必赴愬於官不幸而無子孫兄弟則其所交㳺者雖非血属亦得以為之伸理焉茍愬於公而公不為之報或其勢逺而力弱事急而情切一時不能達諸公奮其義而報之則亦公義之所許也禮所謂不共戴天不反兵不同國盖謂為人子為人兄若弟為人交游恒各以是存諸心必報吾父必報吾兄若弟必報吾交游不然吾不與殺吾父者共戴此天殺吾兄弟者吾遇之必不反兵殺吾交㳺者吾與之必不同居此國甚言必殺之以報所讐不但已也解禮者乃専以為私報所讐狹矣禮盖兼公私言也不能報以公必報以私㫁斷乎其必然此先王立禮之意也三代之時皇極建而公道明非士師無擅殺之吏非天命無枉死之人非獨無不報之讐而亦無讐可報也然先王以好生為徳恒恐一人之不得其生而或有以戕其生者故既本天地相生之理制刑罰之常以弼教又因五行相克之理明報復之義以垂訓使人知殺人之親交者必死殺已之親交者必報而不敢相戕害以喪其生相容隠以忘其死此古昔盛時所以人無寃聲天無戾氣而世無禍亂之作也自秦漢以來此義不明一切以法律持世惟知上之有法而不知下之有義所謂復讐之義世不復講至于有唐陳子昻韓愈栁宗元始因適有報復父讐者而各言所見要之皆是也而未盡焉謹案周官朝士凡報仇讐者書於士殺之無罪所謂報仇讐者非謂為人子若弟者親手剸刃於所讐之人凡具其不當死之故與所殺之由達于官者皆是欲報其仇讐也既書其情犯而告于官而其所讐者或隠蔽或逋逃或負固而報讐之人能肆殺之以報其所親之讐則無罪焉盖人君立法將以生人無罪者固不容人之枉殺有罪者亦不容人之擅殺所以明天討而安人生也茍殺人者人亦殺以報之曰吾報吾所親之交讐也不分其理之可否事之故悞互相報復無有巳時又烏用國法為哉孟子曰為士師則可以殺人明不為士師則不可以殺人也朝廷當明為之法曰凡有父兄親屬為人所殺者除悞殺戱殺過失殺外若以故及非理致死者親屬隣保即為之䕶持其子若孫及凡應報復之人赴官告愬如無親屬其隣里交㳺皆許之府縣有碍赴藩臬藩臬有碍赴闕廷徑赴者不在越訴之限若官司徇私畏勢遷延嵗月不拘繫其人而為之伸理其報復之人奮氣報殺所讐者所在即以上聞特勅理官鞫審若其被殺者委有寃狀而所司不拘其人不具其獄即根究經由官司坐以賍罪除名而報讐者不與焉若所司方行拘逮而或有他故而致遷延即坐殺者以擅殺有罪者之罪而不致死焉若不告官不出是日而報殺者官司鞫審殺當其罪者不坐若出是日之外不告官而擅殺者即坐其親屬隣保以知情故縱之罪而其報復之人所殺之讐果係可殺則讞以情有可矜坐罪而免其死若官吏假王法以制人於死律有常條不許私自報復必須明白赴愬若屢愬不伸而殺之者則以上聞委任大臣鞫審如果被殺者有寃而所司不為伸理則免報讐者死而流放之如胡氏之所以處張瑝者而重坐經由官司之罪若被殺之人不能無罪但不至於死則又在隨事情而權其輕重焉如此則於經於律兩無違悖人知讐之必報而不敢相殺害以全其生知法之有禁而不敢輒専殺以犯於法則天下無難處之事國家無難斷之獄人世無不報之讐地下無枉死之鬼矣戒濫縱之失丘濬臣按宋至理宗時土地巳蹙窮民殘喘待日而斃多方以嫗乳之猶恐不足以存而一時監司守令乃為嚴刑苛法以籍民財以殘民命理宗在位方以崇尚道學為事務虛名而蔑實政當是之時為監司守令者豈無學道學之流乎要之皆趣時好名之士非真有心於居敬窮理以濟人利物者也卒至於傷天地之和蹙國家之脈而有䘮敗之禍也嗚呼豈無所自哉今去宋季不逺其淫刑之具如所謂腦箍超棍之類世猶有襲而用之者伏惟國家以仁立國乞勅有司痛加禁革敢有於律文訊杖之外巧意用刑者坐以違制之律造之者重罰用之者除名是亦順天心夀國脈之一大事也廣東司題名記彭韶國初元風未殄民嗜刑憲時雖倣古設六曹稍更刑曹所轄都官比部之制分為浙江江西福建山東北平四川山西湖廣廣東廣西河南陜西十二部其雲南𨽻陜西部後更曰清吏司凡以厲廉節盛任使也永樂間安南内屬置交阯司又析雲南四川之交為貴州置貴州司而北平陞為北京始置司後廢合十三司司郎中一人員外郎一人主事二人或三人四人當是時官置在金陵而北京設行部車駕巡幸又稱行在官以從罷則否無常員至十九年辛丑北京告成乃置曹司一依金陵舊制後加以行在又廢交阯而雲南自為司方定都之初百務草剏率皆權寓莅事今城隍廟西惜薪司俗呼舊刑部是也正統辛酉改建於此始去行在正六曹之名而金陵謂之南京官聨如故然其主事僅一人而此則定員三人並正副郎為五人而選任甚嚴數十年來政平訟理君子謂諸公有助焉贈按察使陳子序彭韶陜西按察司副使大竹陳子陞浙江按察使惟國家定制按察之官總司諸路刑獄日讞其牒嵗告成言其道有二曰詰姦正辟訊寃平反而巳矣詰姦正辟義之謂也訊寃平反仁之謂也仁以經之義以緯之而天下之刑斯平矣然義尚震曜其功顯而譽易以興也仁務寛恤其徳隠而憎嫌是故深文密理詳於詰民之姦而正其辟世無遺法矣訊寃平反則曰未遑焉蓋暴暴于義而仁之澤缺如也或曰執法當如是也夫法者中而巳法重當以入法輕當以出斯均謂之執也必曰執也附入不附出則法之戕人慘於矛㦸聖人無用法矣自古稱執法有如張釋之者乎犯蹕者除死罰金盜鐶者宥族棄市未嘗無出理鷹鸇鸞鳯其祥不同藥石梁肉其效異也大竹曰善哉言乎凡司命之所願聞也贈主事陳君之南京序彭韶法者天下之平而吏所以司平者也在漢惟張釋之用之為然至張湯則變怪百出史能狀之矣予少時好惡方明感激釋之事中夜欲舞豈獨願為執鞭哉比入仕前後俱在刑曹轇轕之餘心與時化迹其遷就之意大抵湯趨向也豈惟予為然僚屬之中公相傳襲求廷執如釋之者絶少至使善類無所仰賴予蓋不忍言也嗚呼韶豈敢以不肖之身而律他人又豈敢以不肖之心而恕他人哉幸有人焉固望其為吾黨雪恥矣餘姚陳君直之其人歟方直之年少取進士如拾芥議論英發平生抱負要自云云然涉世日淺困心衡慮之事耳得聞之而身未始行之夫聞之與行意味滋别是未可以自許之端而決終身之策也凡平法在人而持平在心釋之必正心克己人也故其法平湯必偏心忌克人也故其文害直之之始拜官刑屬非有二張之寄然平心守法則何嘗以彼此分耶要必提撕此心寧下無髙寧拙無巧即時所欲罪吾視諸三尺所欲釋亦視諸三尺既豪强不必巧詆貧弱不用曲文㴠養之久澹然塞淵隨物應之耳異時推排漸至大用式敬之效予知所被者逺矣不得巳而面折廷諍又不得巳以身決去就猶曰國有人焉直之將取法古人而予以釋之願之蓋忝同官之好舉所急者為贈非必直之止於此也雖然釋之亦豈易輕哉名臣經濟錄卷四十七
