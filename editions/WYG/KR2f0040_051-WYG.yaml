body:
  text: 名臣經濟錄巻五十一明黄訓編工部都水下髙郵州新開湖記劉健髙郵州之西南湖曰新開與甓社湖通而天長以東諸水盡匯於此其南北運道自杭家觜至張家溝凡三十餘里􅄓風或起則巨浪掀天舟行遇之多致覆溺𢎞治初户部左侍郎白公昂奉勑整理河道乃於湖東開夾河一道曰康濟河以通行舟往來便焉然湖之老岸嵗乆激於西北風浪日就頹壞而康濟之河難保無虞九年都憲李公蕙適總督漕運甞委揚州府通判施君淵董工修築未幾遷官去乃以通判韓君琚代之工未竟而李公亦物故都憲張公敷華張公縉相繼其任工部郎中謝公緝張公瑋劉公浩相繼管理凡工力措置悉委揚州府知府王君坦許君節王君恩而督勵益至老岸之下頹樁廢石積乆未除岸之不堅職此之故命夫匠入水悉出之然後釘樁下石以次修築迄十六年八月也湖東夾河之間民田千餘頃困於積水乃於河底作涵洞三以泄之嵗乆而湮塞河之新岸又日漸衝決田沒於水而稅如故凡業田之民流亡殆盡諸君患之仍委韓君等督工修理僅三閱月而完田既可乂民之流亡者復業又自淮安至儀真一帶河岸低者増之缺者補之視舊有加故近年以來雖大水無所患而舟楫經行者咸視為坦途焉髙郵州新開康濟河記劉健𢎞治二年秋河決汴溢於山東損運道山東守臣上其狀天子勑户部左侍郎白公昂乘傳以往河既迄功乃視運道自山東抵揚州議所以濬治時監察御史孫君行工部郎中呉君瑞董河事與巡撫右副都御史李公昂漕帥署都督僉事屠公勝署都指揮同知郭公鋐合議髙郵州運道九十里而三十里入新開湖湖東直南北為隄舟行其下自國初以來障以樁木固以磚石決而復修者不知其幾其西北則與七里張良珍珠甓社諸湖縈迴數百里每西風大作波濤洶湧舟與沿隄故樁石遇輒壞多沈溺前此董河事者甞議修湖東鑿腹河以避風濤便往來今欲舉運河便利宜莫先於此者白公議允遂相地興工開鑿起州北三里之杭家觜至張家溝而止長竟湖廣十丈深一丈有竒而兩岸皆擁土為隄樁木磚石之固如湖岸首尾有閘與湖通岸之東又為閘四為涵洞一每湖水盛時便從減殺焉以三年三月始事凡四閱月而成自是舟經髙郵者人獲康濟白公因采衆議聞之上名曰康濟河耆民葛璘等謂當有紀郡守貳有甞識予者乃具事狀來請記予惟國朝貢賦之需東南過半自海運不行官舫客舟悉出於此舳艫相銜晝夜無虚時而髙郵當南北之要衝顧湖水為險事誠有缺諸公於此能急先務易風濤為坦途以康濟往來且工以雇募費出帑藏使民不勞而事集有足嘉者遂為之書乞趁時般運通州倉糧狀王恕成化八年三月二十二日總理河道刑部左侍郎王恕題臣惟京儲之充足固資乎漕運漕運之通塞亦由乎天時若導泉濬渠築隄撈淺之𩔖皆可以人力為也至若雨澤之愆期泉脈之㣲細則由乎天時似非人力所能為也臣以凡庸無用之才叨膺總理河防之寄夙夜兢惕惟恐不勝凡人力之可為者臣固宜殫力為之至於天時之不可為者以臣之愚固無如之何然亦不可不早圖而預為之計思得揚州一帶河道别無泉源止藉髙郵邵伯等湖所積雨水接濟去年因是彼處地方乆旱無雨湖水消耗所以河道淺澁阻滯運船幸賴朝廷洪福上天眷佑偶然大江水溢横流過壩船隻方得疏通比及到於張家灣等處却值秋雨連綿路途泥濘脚價髙貴每銀一兩止裝京糧八九石多亦不過十石原領耗米雇脚不敷以致軍士借債賣船湊補上納至十月終方得回還所以多在沿途守凍迄今尚未有到衛者今年揚州地方仍前乾旱河道愈加淺澁雖巳設法挑撈車水接濟止可補其所耗豈能増其所無慮恐今年糧運又似去年不無負累軍士訪得即今張家灣等處脚價比之去年有雨時月頗賤所宜議處如䝉乞勑户部公同總督糧儲内外官貟從長計議合無該部出榜召募有車之家給與勘合趁今路乾之時令其支運通州倉糧赴京倉交納管糧主事等官躬親監臨平斛出納仍令巡倉御史禁革奸弊就於該倉支與糧米准作脚價每十石比街市時價多加與米四五斗則人得其利而樂為之運納運彀京倉糧數而止待糧船到日若遇天雨脚貴却令將該運京倉糧斛照數於通州倉上納每石仍照今次給過脚價米數令其抵斗稍加斛面交納則軍得其便而願為之出備合用墊倉蘆蓆等項就於該倉領用如此非惟京儲不致遲悞而軍士亦得以蘇息矣議開河修塘狀王恕成化八年三月二十二日總理河道刑部左侍郎王恕題臣看得揚州一帶河道南臨大江北抵長淮别無泉源止藉髙郵邵伯等湖所積雨水接濟湖面雖與河面相等而河身比之湖身頗髙每遇乾旱湖水消耗則河水輒為淺澁不能行舟若將河身比湖身濬深三尺則湖水自來河水自深雖遇乾旱亦不阻船前項河道自南至北四百五十餘里中間除深濶不用挑濬外其淺窄可挑濬去處尚有二百餘里約用九萬餘人六十工可完每人日給口糧二升該用糧米一十萬八千餘石捲埽打壩共用樁木一萬六千餘根草二十餘萬束及看得髙郵湖自杭家觜至張家溝南北三十餘里俱係磚砌隄岸每遇西風大作波濤洶湧損壞船隻失落錢糧人命不可勝紀况前項隄岸之外地勢頗低若再濬深三尺闊一二丈起土以為外隄就將内隄原有減水閘三座改作通水橋洞接引湖水於内行舟仍於外隄造減水閘三座以節水利雖遇風濤亦無前患若興此役約用二萬三千餘人六十工可完每人日給口糧二升該用糧米一萬五千六百餘石合用築隄樁木五萬四千餘根草二十七萬餘束造減水閘并改造通水橋洞約用樁木磚石等料并工價銀二百餘兩又看得揚州灣頭鎮迤東河道内通通泰等四州縣二千户所富安等二十四鹽場其間有魚鹽柴草之利在前河道疏通之時二千户所運糧船隻俱在本所修艌客商引鹽裝至儀真每引船錢不過用銀四五分揚州柴草止每束賣銅錢二三文近年以來河道淤淺不曽挑濬加以天旱雨少河水乾斷舟楫不通魚鹽柴米等項通用旱車裝載二所運糧船隻不得回還本所牛車脚貴柴米價髙以致客商失陷本錢軍民難以遣日前項河道自灣頭起至通州白浦止三百四十餘里俱用挑闊八丈深三尺約用八萬五千六百餘人六十工可完每人日給口糧二升該用糧米十萬二千七百九十餘石再看得雷公上下塘句城塘陳公塘俱係漢唐以來古蹟各有放水減水閘座年乆坍塌遺趾見存近年以來止是打造土壩攔水隨修隨坍不能蓄積水利若每塘修造板閘一座減水閘二座潦則減水不致衝決塘岸旱則放水得以接濟運河以上四塘共造放水板閘四座減水閘八座除舊有磚石外約用新添磚石等料雇直并匠作工價銀二千餘兩雜工止用各塘見在人夫不必勞民動衆臣雖無識詢之於衆咸以謂若將以上三件河道依前整理庶幾舟楫疏通永無淺阻風濤之患而為往來軍民無窮之便但緣前項工程浩大合用人力錢糧數多况揚州府地方連年災傷人民窮困倉庫空虚兼且邇來𤣥象示警强敵犯邊人心驚疑如斯之役未易輕舉須候時和嵗豐人力寛舒方可為之惟修理陳公等塘閘座一事既不起倩人夫止用前項工價為之頗易合無於本府收貯解京船料銅錢内委官支給收買物料修造閘座亦可以蓄積水利接濟運河揚州府重修白塔河記王璵維揚郡治東北兩舎許宜陵鎮側有河名白塔蓋古運河支流以南屬於江北達於淮者也皇明宣徳壬子平江伯陳公瑄釃浚舊道建新開大橋潘家江口四閘以蓄洩水以便江南漕運歴嵗滋乆中多壅閼舟既不通閘亦隨毁迺者成化癸巳冬巡河郎中郭君昇以為言上其事於總督漕運都御史李公裕以詢於衆得修河事宜以屬郭君而總其成焉郭君於是召集旁近兵民二萬人疏舊河二十里築東西捍水堤四十里建通江大同二閘其大橋新開閘之故存者咸修復之又増建土壩三夏月潮漲則由閘冬月水涸則由壩又建減水閘五以防泛濫淺鋪五以備疏瀹至於蒞事有㕔享神有祠保障有巡檢司凡有益於河者無不為之經始於丁酉三月以是年六月畢工通判鮑克寛具事顛末來請記予甞考之呉城䢴溝訪於左傳渠通江湖載之遷史唐漕江淮撒閘置堰宋至紹興易堰以閘則漕河之出於揚境者最為切要漕法之講於儒先者最為詳備漕數之給於縣官者最為豐溢大抵建國於西北為不拔之基取材於東南供不貲之費由今視昔初無少異興事勸功有待於人此白塔河之所為濬理於今日也雖然古人甞謂潤州北距𤓰步沙尾紆匯六十里舟多敗溺遂徙漕路由京口埭沿伊婁渠以達揚子嵗無覆舟且減運錢數萬今京口埭既淤淺不勝重載則由常州孟瀆河入江遡流而趨伊婁回逺百八十里視六十里既兩倍之而大江風濤之險漂溺之患月所不免又非但嵗中見之而已也斯河既成則江南漕舟出孟瀆者可徑投斷腰洪入夾江三十里入河又四十里而達揚境脫不測之淵以即安流忘盜竊之虞而游樂土蒸徒歡呼無事轉挽篙工柁師枕臥而至其為省費又奚翅數萬而已也使非李公之經畧郭君之籌畫而欲望其力排羣議茂纘成蹟施加當時敷被後世如此役者庸可得乎李公字咨徳南昌人巡撫淮南焯有風烈郭君字騰霄濠梁人治水徐淮之間亦累著竒效以不係於兹河也皆畧而不書而特書其興利拯患充國惠民之一事俾列之貞石以為後來者勸云儀真縣復通濟閘記王夔儀真縣城東南自成化甲午提河工部郎中郭君昇疏言於朝置閘曰臨江曰通濟曰響水曰裏河口而通濟當其中方其置閘也閭閻駔儈之家狃於壩利往往浮言喧騰謂有洩水過鹽之患若無事於置閘然者及閘成僅於兩紀而通濟遂廢蓋置之既不協於其心則廢之適墮其計雖有訏謨逺識知其不可廢者亦漫無諫正聴其廢焉而已矣夫通濟之所以不可廢者何也潮之至也不踰時而遽退船之羣次於閘也銜艫接舳無慮二三百數以無慮二三百數之船而當倐退之潮茍無通濟紆匯豬蓄有以逗其勢遏其衝將使跬步隔於千里頃刻淹於旦暮前響水而弗及後臨江而已逺其不貽淺涸損壞之患者幾希癸亥之厄可監也故臨江諸閘不可無而通濟尤不可無則尤不可廢也廢之者私智也縱其廢之者私意也夫事不更變曷見其的於是南京工部分司署貟外郎何君白於總督漕運兼巡撫都察院右副都御史張公公韙其議檄通判揚州府事韓侯知儀真縣事馬侯協力起廢而主簿唐侯暹義官許晟夏麟耆民栁瓚夏儐盛清臧恕張綸共蒞厥事肇事於𢎞治乙丑正月朏四閱月訖工凡用物以株計松杉榆木三百七以斤計黄白檾蔴八百五十生熟鐵八百軟篾油灰各二百炭千二百以石計秫米七十灰千二百二十五總費白金二百四十二兩有竒閘髙一丈五尺南北隄燕尾共長三十一丈甃石五百八十三丈五尺襯石千七百四十九丈雖閘址仍舊而規制加壯適提河工部郎中張君至㳙吉啓閘飛艘舞艦與潮下上蒸徒稱便無復淺涸損壞之溷其慮馬侯以予縣人也請書前賢置閘之難後人廢閘之易而復之者之有光於置之者焉且俾嗣今修飭毋騖私效尤貽患於無窮予謂栁子有言賢者之興而愚者之廢廢而復之為是習而循之為非恒人且猶知之不足列也然而復其事必由乎賢者斯今之所以復通濟之意乎歐陽子有言作者未始不欲其乆存而繼者常至於殆廢自古賢智之士為其民捍患興利其遺跡往往而在使其繼者皆如始作之心則民到於今受其賜天下豈有遺利斯今之所以鑱石昭後之意乎張公名縉字朝用陽曲人成化已丑進士歴總臺憲式惠淮土尋入為户部右侍郎何君名垕建昌人張君名瑋呉人韓侯名琚河南人馬侯名論遼陽人閘對記黄瓚予奉命督運艘於儀真與鄭水部克明楊水部汝珪議啓閘省壩費有事閘司者皆安常襲故以為不可時克明已去予與楊水部持議益堅乃集儀真衛指揮金鏜劉俸知儀真縣事李文瀚儀真縣學教諭盧繡訓導呉正葉逢春於舟舉一木諭之曰以此椓平水盡所過舟較洩水幾何衆皆曰諾既而視之減初則二分許予曰水拔自近爾也再移時自逺而集當不減毫髮明旦視之果然衆議遂沮客有過予問所以予隨答而責之以質楊水部將以定浮議而開永利也水部覽而頷之曰此殆都憲黄公記修閘之意也時桐城張君履謙亦在坐曰甞見邃菴先生亦言之於是遍覽諸閘二公之外復得先少宰錢公太宰王公之文於敗垣荒壤中喜而相謂曰閘之興廢公論其定於是矣然不利於鄙人弗夀諸梓必相繼埋沒前人惠利之功雖復於今日安知將來又不惑亂於浮議乎水部曰然請命之名曰舉墜錄水部曰稱情哉既而取前稿於水部將裂之水部曰謂何曰凡吾所臆見者四碑盡之矣安用此贅詞哉水部曰諸老之文學士大夫所能解若夫親履而甞試之是非利害如示諸掌可以考實跡可以論衆人則子之言夫請續碑記之後因併刻之正徳戊寅夏五月十日予在儀真既啓閘通運船客有過予問之曰往者閘司懼洩水禁弗啟子今啓之水弗洩而舟獲濟何所見而然耶曰見夫理而已客曰理安在曰夫閘首裏河口中通濟羅泗尾闌潮闌潮距裏河口五里許可容二千艘頃入通濟纔十一鱗次以待閘下而啓上水既平不費索挽起未初終申而畢其所洩者長不過一里廣不過十尋深不過三尺以此之洩計淮南江北之瀦如其長者幾四百如其廣者何止二萬倍以二因四為數八百萬則每一啓閘八百萬分纔去其一耳何洩之足慮客曰甞見夫閘司迫於不得巳而一啓也既牽於閘之兩翼復綆引於西隄之絞闗終日不盡二十船何也曰下不閉而河啓人力不足以勝水勢也予故曰閘政之廢絞闗為之也客曰絞闗所以禆政而謂其廢焉何也曰北河之閘地勢猶梯級閘於下而受水於其上舟非亟挽恐上竭而不能入入而不能蘟乃倚力於絞也今通濟閉而裏河啟水平舟運帆舉篙刺之力耳焉用彼為哉惟無以遏奔放之勢而强以人力水易淺而舟難進此浮議乗而沮之也客曰天下水彼盈此亦盈彼縮此亦縮也何清江之閘長啓而不閉隄塘備澇之斗門又從而減洩此則惟恐滲漏禁弗啟豈水之性失其平消長盈縮不相通洩於彼者則無與於此洩乎此者猶貽患於彼耶曰人心之偏於水乎何尤謂彼之洩無與於此之盈縮譬之盎貯醯醖漏於左而曰無與於其右孩提有識者不如是之愚也寧減有餘於無用之地而不於此利舟楫譬之厨有餘飯顧乞兒之哀求弗與舉而覆諸汙渠中有人心者似不如是之忍也客曰彼不有大禁胡執泥至此曰無也居貨庸力之徒利於壩故閘一開納賂洩水之謗起而在耳目者多不察此自好者寧廢公道而弗任怨報謗奔走下吏醺其醲而䑛其膏一唱百和惟壩焉是附於是閘政日廢前賢建置之盛舉朝廷濟利之大惠遂為虚文焉客曰北閘之水源不息放之則縮閉之則聚其常也若此盤盂之積值經月不雨閉而不洩技窮矣則將何以益之乎曰潮有大小有定候俟其至而啓閘俾内灌既平閘而留之使乘潮之舟不沮淺而裏河之納且不退如是再三可以變淺涸而為盈溢顧謂洩水而不啓何其謬哉客仰而笑之曰往者大水裏艱運而外艱入工部郎中呉君諭執役者以借潮衆竊笑之君令稍削壩已而潮至艱於外者乘勢而湧入内之不能運浮而前兩厓之艱運船商船皆徳君之惠鼓掌踊躍以君為神明如子之論君殆有見於閘而目之於壩焉耳豈真神明也哉曰然客起而嘆曰為政在人聖人之至論客乃揖謝而退儀真縣新建爛潮閘記楊一清𢎞治辛酉春二月二十四日儀真縣新建攔潮閘成便漕也儀真為漕河自前代巳然我國家定都北方嵗漕東南粟以供京師多由此道蓋喉襟最要地也顧漕河之水至是當入江髙卑勢殊河易洩且涸宋嘉定間守臣建白置三閘為蓄水計尋廢再舉再廢國朝洪武辛亥始即其地築而壩之舟下之上必車壩乃達不盡剥載則不敢以舉力稍不齊舟輒壞由是儀真之地舸艦雲接販鬻喧闐罔利之徒萍聚而蟻附居貨食力惟壩是便閘不復講矣成化甲午巡河郎中郭君昇建議置閘四為東闗為響水為中閘為羅四閘以通於江一時稱便獨妨罔利者煽為洩水之說任耳者和之閘遂不用𢎞治戊申朝廷用言者下工部檄郎中施君恕相所宜復東闗羅四二閘廢響水中閘而新之舟復通利焉然江濵無閘潮無所瀦上閘啓注不可遏於是復起洩水之議漕運總戎郭公鋐甞欲増置濵江攔潮閘或謂江濵多浮沙不果𢎞治已未冬都察院右都御史張公敷華奉勑為巡撫總漕事有以攔潮之䇿獻者公詢於衆揚州府同知葉君元進曰元甞承檄董濬河濬及江濵深七尺土黄壤無沙閘必可置公曰然遂以聞即得㫖乃㑹郭公檄葉君任其事君受命惟謹㑹籍程物卜以庚申十月八日始事度地勢定造閘之規髙一丈八尺中廣二尺八寸袤三丈翼而東西亘加袤之二爰琢爰甃犬牙相入磨礱剷磢厓削砥平疊石數重以固其涯松樁節比以固其底凡用物以段計者石八千七百九十以株計者木五千四百七十以片計者板四百九十以斤計者鐵二千九百八十蔴一千六百七十篾六百十桐油一百以擔計者石灰二千一百三十粳米四百八十秫米三十三諸庸售所取直得先年濬河羡餘銀千兩有竒不責辦於有司故工鉅而官不知費方役之興監察御史馮君允中行河至顧瞻稱與為之指畫俾急圖厥成巡河郎中劉君繼至偕工部主事鄒君亦胥督勸羣僚嚮風百工子來故事集而人不告勞距經始之期纔四閱月耳馮君謂閘啓閉宜有定規乃㑹劉君議視河盈縮及潮之長落啟閉傳檄有司遵行之是嵗江河㑹通舟無留行揚旗伐鼔通數十百艘於飲食談笑之頃視車壩之勞固有不待較者比秋霖潦浹旬湖水大漲得以時洩不横決為隄堰害亦惟是閘賴焉所省漕運之費嵗當若何民船商舶所省又當若何以嵗繼嵗吁其不可量也於乎天下無難為之事顧為之何如耳其始也存乎志而其成也存乎決書曰功崇惟志惟克果斷是也昔虞文靖公甞言善為政者當為其所不可不為不敢擅為其所不得為與輕為其所不必為斯可矣是閘為漕運計為天下計在公誠不可不為者然非志之崇則曰曷仍舊貫非力之斷則曰曷為斂怨欲其果於有為難矣不然自有閘議以來凡歴數政終以異議者衆莫適任責故亟舉亟罷迄無成功公始至而即圖之謀定而身任之擇人而委之雖羣咻衆鬨屹不為變其志與斷有過人者不於是乎徴耶然吾每見世之仕者有所舉動輒為異議所沮其同事者謂功不已出從而媒孽之唯恐費甚焉况奉行其下又無良有司虚文取辦徒勞無益以増兹多口者皆是也坐是以隳厥成者多矣公興是役馮君諸賢既贊其決於上又為之規議以圖其永於正未甞有所沮撓而奉以周旋又有若葉君心計目揣舉無遺力經營結構無一弗當意者暫費而大蠲百年來所當為而末及為者一旦從容為之騰口之徒不敢復出一語是雖公之忠信所孚風聲所動而諸君協謀宣力其功顧可誣哉故併書之石以告來者俾嗣守之勿復惑於浮言以隳前人之功也東闗閘記莊㫤儀真東闗閘工部主事夏公育才所建也公以上命來督儀真謂儀真京師喉襟之地轉輸漕運之所必由朝覲商賈之所必涉有京師不能無儀真也然儀真五壩又非取給於東闗不可五壩盈則蓄東闗以待其涸五壩涸則洩東闗以濟其急有五壩又不能無東闗也是五壩者用於儀真東闗者用於五壩也公汲汲於此豈為儀真計哉京師計也天下計也公之用心朝廷可謂至矣公既閘人有謂公於某者曰儀真五壩之地一窪沼也以京師之大賴其力於此尋丈之濟豈可深慮哉然欲為京師計使儀真五壩不費餘力而國用自充豈有難者昔虞文靖公送祠天妃二使者謂國家之東萑葦之澤濵海而南者廣袤相乘淤沮可稻之地何啻千數百里使若東南之人隄圩而田之給牛種農具為之屯種寛其賦之入可省江南漕運之半而儀真五壩之力當亦不可廢也今謂儀真距急水河之地髙下不下數丈使塞𤓰埠決六合野浦橋之淤塞乃自急水河以達於儀真長江大河風帆浪舶瞬息千里孰之能禦而儀真五壩又將可以併省矣公之所以為朝廷計者乃不於此而於彼何哉某曰不然子將以已之所涉者以料公也公豈不知乎此哉某以病廢所謂國家濵海而南之地足跡未甞一至不知果可以屯田否也又不知虞文靖公之說行於古者而亦可以行於今也使其可行從前之說則屯田之入但可以省夫江南漕運之半而其半又果能不藉夫五壩之力哉從後之說其䇿雖無可議然水之髙下亦未可遽以口舌而爭使果如是則江空水落之時而視夫夏潦濔漫之日又不知其能同否也茍有不同而五壩又可廢哉而東闗之閘不可廢也蓋公之學有本末故其政有緩急緩者效大而用力常難急者效速而用力常易公知三者皆善故先其易而後其難而若所謂以急水河達於儀真公之友夏官主事婁君元善巳上聞矣元善之論公有不知者乎知之公有不為之成乎以元善之論而公成之公之功也至若文靖之說真不甚易非有回天倒海之力不可以某觀之公可辭乎使公不以為難而又極其力焉則國用尚何不充之有公殆將以是三者次第行之而謂公不知出乎此者不知公也不然則善與人同不求不忮者又豈無一道乎知急河水之論儀真之水未可遽達使併五壩而遽廢之則往來京師者以求於目前閘東闗者急水河地也知屯田之說以天下之事能無齟齬使急水河之舉茍有不善則為迂談何以取信於上成急水河者屯田地也此裁成左右之精經綸造化之妙人不及知而公獨知之而某竊窺見之者必居其一於此矣嗟乎天下之治使皆結繩使皆野鹿則巳如欲酬酢乎其他則計之大者亦無以過於此也而若公者尚可為之訾哉公名英育才其字世家吉水云莊定山集京口運河疏濬記倪謙鎮江為郡瀕楊子江通江有河曰運河與江北𤓰州相直凡蘇松江浙閩廣之人舟出於江者率由是徑而易達然自京口閘至常郡犇牛壩一百六十餘里間地勢髙隆河形淺狹止利小舟之行其漕運鉅艘與夫官民船舶俱從夏港涉大江經圌山始克有濟水道迂逺暗沙險阻不時風濤發作輕則檣傾楫摧重則覆溺戕生或遇寇盜動罹刼害且並河之田一遭旱暵則水脈枯涸不能浸溉坐受飢斃公私病焉景泰間郡長吏欲事疏濬具疏以聞詔巡撫工部尚書周忱相度事宜勘計工費疏入而公以謝事去天順間總督糧儲都憲李公秉繼巡撫於斯詔下覆實以行公始圖經費以舉是役尋召還朝後巡撫都憲崔公恭奉命踵至以為便國利民莫切於此遂與郡守林公鶚申度前議自新港至犇牛舊河則疏濬深廣京口呂城舊閘則修甃頹缺别於郡城減度橋増置一閘用以瀦水潮汐洪大則開閘放舟微小則閉閘車壩庶水有所蓄舟楫通利田畝沾沃永為民便所用衆材則於浙江嘉湖二郡取之徒役匠石則於蘇松常鎮四郡取之議定乃事興剏裒材用鳩工徒嚴期約刻日咸集分官各司其役至於規畫勸督則身親蒞焉趨事惟勤並手偕作舉鍤如雲劚土如山其河狹者拓之淺者鑿之務底深廣使多受水其閘舊則培其崩頺補其刓缺完復前規新則下木為樁實甓為基纍以灰石固以鐵鍵制度如式務底堅緻以時蓄洩常使水與閘平不致盈縮以某年月日興役某月日役止其為費木以株計若干石以方計若干鐵以斤計若干役以工計若干初役之興也下民頗以為勞逮今十數載間水常瀰漫非惟舟楫得涉安流賴免風濤冦盜之虞而田畝得資浸溉大享豐穰之利益思前人之徳不置咸欲刻石以紀其績丹陽尹蔡侯實因民之情乃具述疏濬設置顛末屬言為記惟濬畎澮距川禹之績也自井牧溝洫之制廢而後河渠之利興古昔能濬河導川者史不絶書則水之為利誠為政之先務也功之鉅者其費侈利之博者其勞多然不一勞者不永逸不暫費者不永寧故於是役李公不䘏其費志圖興舉於前而崔公不憚其勞力任其責於後則卒底於成者崔公之功也不亦能急先務者歟故今遺惠在人豈惟起人無窮之思而偉蹟在世其必郡乘載之國史書之與古能濬導者同垂名於不朽矣遂書以畀之使刻焉倪文僖公集常州府重建犇牛閘記王璵距毘陵城西三十里其地為犇牛堰泝堰水西行百八十里歴雲陽達京口為餫河其地勢東傾蓋堰不足以時蓄洩也古甞於京口呂城奔牛為三閘皆莫詳其剏始璵甞觀史記丹徒水道自六朝來通呉㑹隋初有詔浚治則是閘在齊梁前巳有之宋陸放翁所謂自剏為是運河三閘已具其說近是大業之役閘當與河相為廢興而志不書至元符嘉泰始兩書修復則上下數百載間其缺而不書亦已多矣國朝洪武巳酉閘廢更導其支流東北出於堰為壩自是餫河不復通重載漕舟多出孟瀆河濟江江行險逺嵗不能無覆溺之患天順巳夘今冢宰崔公克讓為都御史巡撫江南因民之虞患也為言於朝請復建閘營度適宜委畀得人曽無幾何而五閘告成其在常境者犇牛下閘是也成化戊子都御史邢公克寛來繼謂奔牛猶有上閘其遺址尚存盍亦修建俾互為啓閉遂以其事付之常守卓君天錫而以武進邑丞宋瑛董役事給費於公帑役民於農隙其經畫之良成功之速與下閘等矣夫自堰廢為閘閘廢為壩言水利者時有訾病今閘與壩兩存之春夏水溢則由閘秋冬水涸則由壩壩可瀦而閘無壅也根遺跡筴成筭以開永圖夫豈樂因循而好自用者所能彷彿其一二哉閘成之明年同知謝君庭桂以屬予記夫國家自移都北京其材賦多取給東南正猶漢之山東唐之江淮也引渭穿渠含嘉轉漕當時最稱便利然水有底柱之險持異議者亦甞改作卒無成功是役於智巧而不觀形勢之順逆監古今之成敗者也近議亦有謂自七里港疏河越黄墳岡以受江水而崔公不用用之幾何不為褒斜取道而邢公繼之理其未備無事更遷其亦異於鑿三門以重為梁棧者逺矣二公敭歴臺省雅有才望其出殿南坼也威惠並行為國足用為輸將繇使脫險繫斯舉也餘可𩔖推卓君克承克引民不厲而功自倍施之守官用成佳政皆不可以不書夫書前人之跡以昭示後人俾嗣守之勿墜謝君之用心亦良厚矣於是乎書漕船志馬廷用予鄉席君文同以進士出宰郯城入拜工部都水司主事奉命分司清江船厰甫至興利滌弊多所裨益逾年稍暇即於厰旁及分司左右皆樹大匾以標識之又通年代考據漕船沿革次第走使過南京屬予為之記文同為政知所重矣清江船厰在清河縣之南距淮安三十餘里因臨於淮水故名清江云其地平衍彌望曠然蓋南北一要衝也我太祖髙皇帝混一區宇定鼎金陵九州百夷任土作貢肆我太宗文皇帝中靖家邦益隆繼述於順天肇建北京爰命文武大臣各一貟濬閘河通舟楫以有海運轉輸之半行之未乆海運遂罷今所謂清江衛河二提舉司皆當時成議於為便宜可乆者累朝相承畧加損益至英廟時江南江北始限為船一萬一千七百有竒清江十九衛河十一後清江運船之數復析浙江南直𨽻等衛俾歸自成造𨽻於清江者惟南京鎮江江北直𨽻諸衛所而已每船價銀一百二十兩所徴船料初取諸江西湖廣四川福建直𨽻徽州諸郡縣民苦解納往返經年破産蕩家公私俱困軍士亦往往有支料不敷展轉陪補之患殆有緣此而鬻子出息轉相逋逃者有司具實以聞朝廷采羣議湖廣荆州府浙江杭州府直𨽻太平府委部官抽分以充清江衛河造船之用淮安抽分則令本司自領之通計每嵗例該銀二萬六百七十兩蘇杭淮三府人匠銀三千三十兩每嵗額造五百二十三隻江南諸省府不例數内迄今遵守以為定規頃者總督漕運右都御史安福張公總兵官都督同知合淝郭公奉詔入朝㑹同本部尚書曽公等首建大議復増入官銀二千三百七十兩總計官給銀二萬六千七十餘兩并各軍士原額自辦銀二萬三千七百餘兩總得每嵗共用銀五萬餘兩疲兵困卒頓覺少甦此晁大夫所謂節其力而不盡邵夫子所謂寛一分則民受一分之賜者也夫論大計者不惜小費圖逺效者不屑近功今計費而給之雖錙銖必較計艘而督之雖沈覆不恤加以羅織多事之吏爭􅃷虚名逺謗避嫌之人僅守成案數運之後為弊日滋吾恐軍民皆憊上下匱乏不知何拯救之方通融之術可以處此而後得耶嗟乎天地間財貨止有此數不在民則在官孔子曰節以制度曽子曰用之者舒正使劉晏諸人復用於世千岐萬徑徒爾紛更吾聖賢之語足矣理財之道要不過此庸系此於末簡為清江船厰志且以告夫將來從事者萬一吾君吾相有問焉當執此以對此予日夜所有事而愧未能也亦文同所以刻石之意也於是乎書清議篇唐龍漕運錢穀之府乃露積於舟而持之者又動戾約束故奸利易滋獄訟煩興而不息焉特置理刑主事以掌其案厥職専矣其他不領於漕運若吏之掊剋有詞民之爭鬭有詞商之逋債有詞則一聴犯於有司而主事不與焉此不易之制也邇年理刑者不惟於漕運之牒而聴斷焉諸例所不與者一切傍侵兼受廣捕逮密羅織繁案牘日弊弊然越俎代庖官之僭也十羊九牧民之殘也清議咸不直之而􅙅􅙅訿訿騰於道路達於京師減職禠銜者凡幾人於是當代者咸懼其來來者欲去去者欲速若不可一日居也嘉靖戊子春獲拜董漕之命都下士夫語以是故而憂之少宰中峯曰而今理刑者乃李子尚絅志明行潔達於政體毋用為憂四月涉淮之境上問之父老曰賢哉理刑問之齊民曰賢哉理刑既而夷考之吏之詞至辭民之詞至辭曰自有主者若商人爭猥瑣之利益弗屑以淆其政乃喜曰辨治哉慎度哉於是盡檢漕運諸刑牘次第授之則曰是乃攸司敢不審克之奸則詰蠧則翦貪則縶侵漁則割正一允以常刑而無所於貸令斯昭昭然至於疑者辨其誣寃者伸其理困者疏其滯哀矜惻怛又若不可以已繁詞不連於庭私謁不跡於户政有常經民弗擾矣由是清議秩然以定渢渢然興焉然則豈有不可居之不善斯不善爾居之善斯善爾李子方得代父老齊民赴予留之而不可得也乃著清議篇以彰之且欲其慎之終身云漁石文集河議宋濓宋潛溪曰比嵗河決不治上深憂之既遣平章政事嵬某御史中丞李某禮部尚書台哈布哈沈兩珪及白馬致祀又置行都水監専治河事而績用未之著乃下丞相㑹廷臣議其言人人殊濓則以為河源起自西北去中國為甚逺其勢湍悍難制非多為之委以殺其流未可以力勝也何也河源自吐畨朶甘思西鄙方七八十里有泉百餘泓若天之列宿然曰鄂端諾爾譯云星宿海也自海之西又匯為阿拉克諾爾二澤又東流為齊賔河而齊爾綽克之水由西合呼喇之水従南㑹雅爾楚之水復至自東南於是其流漸大曰托喀尼譯云黄河也河水東行又岐為九𣲖曰伊遜鄂羅木譯云九渡也水尚清淺可涉又東約行五百里始寖渾濁而其流益大朶甘思東北鄙有大山四時皆積雪曰伊拉瑪博囉又曰騰格哩哈達譯曰崑崙也自九渡東行可三千里乃至崑崙之南又東流過庫濟庫徳二地至哈喇博勒齊爾與納琳哈喇河合又合竒爾穆蘓二水乃折流轉西至崑崙北既復折而東北流至貴徳州其地名博勒齊爾自崑崙至此不啻三千里之逺又約行三百里至積石從積石上距星宿海蓋六千七百有餘里矣其來也既逺其注也必怒故神禹導河自積石至龍門南到華隂東下底柱及孟津洛汭至於大伾大伾而下釃為二渠北載之髙地過洚水至於大陸播為九河趨碣石入於渤海然自禹之後無水患者七百七十餘年此無他河之流分而其勢自平也周定王時河徙砱礫始改其故道九河之迹漸至湮塞至漢文時決酸棗東潰金隄孝武時決瓠子東南注鉅野通於淮泗汎郡十六害及梁楚此無他河之流不分而其勢益横也逮乎宣房之築道河北行二渠復禹舊跡其後又疏為屯氏諸河河且入於千乘縣徳棣之河復播為八而八十年又無水患矣及成帝時屯氏河塞又決於館陶及東郡金隄泛濫兖豫入平原千乘濟南凡灌四郡三十二縣由是而觀則河之分不分而其利害昭然又可覩已自漢至唐平決不常難以悉議至於宋時河又南決南渡之後遂由彭城合汴泗東南以入淮而向之故道又失矣夫以數千里湍悍難制之河而欲使一淮以疏其怒勢萬萬無此理也方今河破金隄輸漕鄆地幾千里悉為巨浸民生墊溺比古為尤甚莫若浚入舊淮河使其水南流復於故道然後導入新濟河分其半水使之北流以殺其力則河之患可平矣譬猶百人為一隊則其力全莫敢與爭鋒若以百分而為十則頓損又以十各分為一則全屈矣治河之要孰踰於此然而開闢之初洪水泛濫於天下禹出而治之水始由地中行耳蓋裁成天地之化必資人功而後就或者不知遂以河決歸於天事未易以人力强塞此迂儒之曲說最能僨事者也濓竊憤之因備著河源以見河勢之深且逺不分其流決不可治者如此儻有以聞於上則河之患庶幾其有瘳乎雖然此非濓一人之言也天下之公言也潛溪集按景濓此議作於至正間予甞聞前輩云禹貢曰導河自積石未窮其源也漢張騫云河有兩源一出于闐一出於葱嶺唐薛元鼎云得河源於崑崙蓋皆傳聞耳迨元起沙漠太祖征西夏至黄河九渡蓋在崑崙西南憲宗命錫里征西域六年拓地四萬里而河則在域内所謂星宿海得之目覩也景濓引援示人詳矣若夫治河多分其流亦確論也河源辨王鏊客有問河源者王子曰是非予所及也雖然予以為必出於崑崙曰子何以知之曰予以理知之山與水同原天下之山起於崑崙天下之水出於崑崙無疑也曰子不聞乎昔元世祖欲窮河源遣使行四五干里至吐畨朶甘思西部有曰鄂端諾爾者華言星宿海也有水百泓望之如列星此河源也踰崑崙二十餘日矣予曰西域之跡發自張騫騫所歴諸國甚乆且逺東漢之世大秦條之安息至於海濵四萬里外重譯貢獻班超遣掾甘英窮臨西海而還皆未覩所謂崑崙也何元使得之易乎禹本紀言河出崑崙去嵩髙五萬里外國圖云從大晉西七萬里得崑崙之墟今元使行不及五千里云已踰之何崑崙之近乎自昔言崑崙者皆在西北元使所圖乃在西南何也兹則元使所謂崑崙者果崑崙乎所謂星宿海者果河源乎未可知也爾雅云河出崑崙墟色白并於七百川色黄山海經云崑崙之丘河水出焉東南流注於汜天之水洋水出焉西南流注於醜塗之水黒水出焉西流注於大杅淮南子云崑崙之墟河水出其東北􅑍赤水出其東南􅑍洋水出其西北􅑍佛經阿耨山頂有大池水分流為四大水入中國者為黄河入東海其三入南海北海西海為弱水黒水之屬穆天子傳云阿耨達山出六大水西南有水名遥奴小東有水名薩罕又東有水名恒伽三水同出一山俱入恒水阿耨即崑崙也康泰扶南傳曰恒水之源出崑崙有五大源分流為諸水洛書曰河自崑崙出於重野逕積石為中國之河古書所紀先後一轍豈皆不可信而元使獨可信乎是為其得之親見也曰古之至人夫獨非親見鑿空以欺後世乎釋氏生於天竺穆王宴於瑶池夫豈非親見乎而疑之也然則元使其誣乎曰吾甞考之河有兩源一出于寘一出崑崙之墟且漢使亦甞窮河源矣謂出于寘其山多玉石采來天子案古圖書名其山為崑崙然非古所謂崑崙也元使所見其殆是乎若崑崙之墟彼固未之覩也且天竺諸國有身熱頭痛之坂縣度之阨熱風夏雪毒龍惡鬼猛虎獅子之害元使亦甞歴此乎淮南子載崑崙之上有木禾珠樹玉樹懸圃閬風十洲記謂弱水繞之上有金臺玉闕之類元使亦甞覩此乎雖其神怪恍惚不可盡信而河源之出於是不可誣也近有佛圖調者謂鍾山西六百里有崑崙郭璞謂别自有小崑崙也則崑崙固非一乎曰崑崙之逺近不一然則河源惡乎定曰水經云崑崙之西北河水出其東北􅑍東南流入渤海其源一出于寘之南山北流與葱嶺合東注蒲昌海郭璞云河出崑崙潛行地下至于寘國復分流岐出合而東注鹽澤復行積石為中國河此定論也予見近世之論河源者每以一夫之目廢千古之論故為之辨山居雜著除民之害丘濬臣按天地間為民害者在天有旱潦之災在地有河海之患然雨𤾉之為旱潦也有時而人猶可以先事為之備若夫河海之患則有非人力所能為者矣雖非人力所能為而人君有志於為民者其忍坐視而付之無可奈何哉中國之水非一而黄河為大其源逺而髙其流大而疾其質渾而濁其為於中國也視諸水為甚焉自禹疏九河之後遷史河渠書述之詳矣臣請探厥本源自張騫使西域之後說者咸謂河出崑崙至元世祖始命其臣篤實者西窮河源得其源於吐蕃朶思甘之南曰星宿海四山之間有泉近百泓匯而為澤登髙望之若星宿然胡言所謂鄂端諾爾也其地在中國西南直四川馬湖府之正西三千餘里雲南麗江府之西北一千五百里較之崑崙殆為近焉自西而東合諸河水其流寖大東北流分為九渡行二十日至大雪山名騰格哩哈達即崑崙也繞崑崙之南折而東而北而西復繞崑崙之北又轉而東北行約二十餘日始入中國自貴徳西寧之境至積石經河州東北繞朔方上郡又東出境外經三受降城東勝等州又折東南出龍門過河中抵潼闗東出三門析津為孟津過虎牢而後奔放平壤吞納小水以百數勢益雄放無崇山巨磯以防閑之旁激奔潰不遵禹跡故虎牢以東距海口二三千里俱被其害方禹之導河其河蓋自西而東又轉而北之東以入海焉周定王五年河徙已非禹之故道漢元光三年河徙東郡東注勃海繼決瓠子又決館陶遂分為屯氏河二河相並而行元帝永光中河水始分流於博州屯氏河始塞後二年又決於平原則東入齊入青以達於海下流與漯川為一宋熈寧十年河又分為二派一合南清河入淮一合北清河入海是時淮僅受河之少半耳金之亡也河始自開封北衛州決入渦河以合於淮舊河在開封城北四十里東至虞城下達濟寧州界本朝洪武二十四年河決原武之黒陽山東經開封城北五里又南行至項城經潁州潁上東至夀州正陽鎮全入於淮而故道遂淤永樂九年復疏入故道正統十三年又決滎陽東過開封城之西南自是汴城在河之北矣又東南經陳留自亳入渦口又經䝉城至懷逺東北而入於淮焉抑通論之周以前河之勢自西而東而北漢以後河之勢自西而北而東宋以後迄于今則自西而東而又之南矣河之所至害亦隨之䘏民患者烏可不隨其所在而除之哉禮曰四瀆視諸侯謂之瀆者獨也以其獨入於海故江河淮濟皆名以瀆焉今以一淮而受大黄河之全蓋合二瀆而為一也自宋以前河自入海尚能為並河州郡之害况今河淮合一而清口又合沁泗沂三水以同歸於淮也哉曩時河水猶有所瀦如鉅野梁山等處猶有所分如屯氏赤河之類雖以元人排河入淮而東北入海之道猶微有存焉者今則以一准而受衆水之歸而無㳙滴之滲漏矣且我朝建國幽燕漕東南之粟以實京師必由濟博之境則河決不可使之東行一決而東則漕渠乾涸嵗運不至其害非獨在民生且移之國計矣今日河南之境自滎陽原武由西迤東歴睢陽亳潁以迄於濠淮之境民之受害而不聊生也甚矣坐視而不顧歟則河患日大民生日困失今不理則日甚一日或至於生他變設欲興工動衆疏塞並舉則又恐費用不貲功未必成而坐受困弊然則為今之計奈何孟子曰禹之治水水之道也又曰禹之治水也行其所無事也古今治水者要當大禹為法禹之導河既分為九以分殺其洶湧之勢復合九為一以迎合其奔放之衝萬世治水之法此其凖則也後世言治河者莫備於賈讓之三䇿然歴代所用者不出其下䇿而於上中二䇿蓋罕用焉往往違水之性逆水之勢而與水爭利其欲行也强而塞之其欲止也强而通之惜微眇之費而忘其所捐之大䕶已成之業而興夫難就之功捐民力於無用糜民財於不貲茍顧目前遑恤其後非徒無利而反有以致其害因之以召禍亂亦或有之顧又不如聴其自然而不治之為愈也臣愚以為今日河勢與前代不同前代只是治河今則兼治淮矣前代只是欲除其害今則兼資其用矣况今河流所經之處根本之所在財賦之所出聲名文物之所㑹所謂中國之脊者也有非偏方僻邑之可比烏可置之度外而不預有以講究其利害哉臣願明詔有司博求能浚川疏河者徴赴公車使各陳所見詳加考驗預見計定必須十全然後用之夫計䇿雖出於衆而剛斷則在於獨擇之審信之篤而用之專然後能成功耳不然作舎道傍甲是乙非又豈能有所成就哉臣因朱氏之言而求大禹之故深信賈讓上中二䇿以為可行蓋今日河流所以泛溢以為河南淮右無窮之害者良以兩瀆之水既合為一衆山之水又併以歸加以連年霖潦嵗嵗増益去冬之沮洳未乾嗣嵗之潢潦繼至疏之則無所於歸塞之則未易防遏遂使平原匯為巨浸桑蔴菽粟之場變為波浪魚鼈之區可嘆也已伊欲得上流之消洩必先使下流之疏通國家誠能不惜棄地不惜動民舎小以成其大棄少以就夫多權度其得失之孰急乘除其利害之孰甚毅然必不惑於浮議擇任心膂之臣委以便宜之權俾其治河流相地勢於其下流迤東之地擇其便利之所就其汙下之處條為數河以分水勢又於所條支河之旁地堪種稻之處依江南法創為圩田多作水門引水以資灌溉分疏之後水勢自然消減然後從下流而上於河身之中去其淤沙或推而盪滌之或挑而開通之使河身並深足以容水如是則中有所受不至於溢出而河之波不及於陸下有所納不至於束隘而河之委易達於海如是而又委任得人規置有法積以嵗月因時制宜隨見長智則害日除而利日興河南淮右之民庶其有瘳乎或曰若行此䇿是無故捐數百里膏腴之地其間破民廬舎壞民田囿發人墳墓不止一處其如人怨何嗚呼天子以天下為家一視同仁在此猶在彼也普天之下何者而非王土顧其利害之乘除孰多孰寡爾為萬世計不顧一時為天下計不徇一方為萬民計不恤一人賈讓有言瀕河十郡治隄嵗費萬萬及其大決所殘無數如出數年治河之費以業其所徙之民大漢方制萬里豈與河爭咫尺之利哉臣亦謂開封以南至於鳯陽每嵗河水渰沒中原膏腴之田何止數十萬頃今縱於迤東之地開為數河所費近海斥滷之地多不過數萬頃而已兩相比論果孰少哉請於所開之河偶值民居則官給以地而償其室廬偶損民業則官陪其償而免其租稅或與之價值或助之工作或徙之寛閑之鄉或撥與新墾之田民知上之所以勞動乎我者非為私亦何怨之有哉矧今鳯陽帝鄉園陵所在其所闗係尤大伏惟聖明留意萬一臣言可采或見之施行不勝幸甚治河論上邵寳萬世言治水者必曰禹治水而不法禹可乎孟子曰禹之治水水之道也水之所以為水禹之所以為治無出此矣河也者天下之水之大者也禹之治水其詳見於禹貢其曰導河積石至於龍門南至於華隂東至於底柱又東至於孟津東過洛汭至於大伾北過洚水至於大陸乂北播為九河同為逆河入于海者皆順道之法初無障逆之說故能成府事之功而天下稱神其極至於地平天成焉由今觀之其所空之地甚廣所處之勢甚易所求之效甚小是故其成功也如此今之治水者其去禹也逺矣而所空之地乃狹於禹所處之勢乃難於禹所求之效乃大於禹欲其成功不亦難乎何謂所空之地狹於禹蓋禹之導河自大伾以下分播合同隨其所之而疏之不與爭利故水得其性而無衝決之患非無衝決也彼自衝決而非吾之所得與也今夫一杯之水舉而注之地必得方尺乃能容之其勢然也河自大伾以上水之在杯者也大伾以下水之在地者也以在地之水而欲拘束周旋如在杯之時大禹不能而况他人乎今河南山東郡縣棊布星列官亭民舎相比而居凡禹之所空以與水者今皆為吾有蓋吾無容水之地而非水據吾之地也固宜其有衝決之患也故曰所空之地狹於禹何謂所處之勢難於禹蓋甞觀禹之治矣隨處施功初無窒礙亦無拘限今北有臨清中有濟寧南有徐州皆轉漕要路而汴省在西南又為宗藩所在左盼右顧前瞻後望動則肘掣使水有知尚不能使之必隨吾意况水無情物也其能逶迤曲折以濟吾之事哉故曰所處之勢難於禹何謂所求之效大於禹蓋禹之所以為治去其墊溺之害而已此外無求焉今則賴之以漕不及汴矣又恐壞臨清也不及臨清矣又恐壞濟寧也不及濟寧矣又恐壞徐州也使皆無壞又恐漕渠不足於運也了是數者而後謂之治故曰所求之效大於禹以若地處若勢求若效雖禹復生恐其難矣而或者猶嘵嘵然曰某為上䇿某為下䇿某為中䇿則惑之甚也然則奈何奈何哉蘇子曰夷狄不可以中國之治治也求其大治必至於大亂先王知其然是故以不治治之治之以不治者乃所以深治之也某於河亦云治河論下邵寳夫所謂治之以不治者非不欲治之也蓋難於其治也難於其治而遂不之治則其患有不可勝言者君子顧忍坐視吾無辜之百姓受兹酷烈哉今夫人有病其勢篤且死也將求醫以治之歟抑亦委之於不醫歟委之於不醫是待死而已矣是故謂河之不必治者待死而委之於不醫者也茍知求醫矣而謂其可恃以必不死且至千百年之夀此所謂不惟無益而又害之今之治河者何以異是是故亦治之以不治而巳矣蓋河自周定王時北徙漢氏而下决東郡決瓠子决魏之館陶分屯氏決清河靈烏瀆口其變非一議者或欲疏禹之故道或欲塞所決之口或欲分流以殺其衝決之勢或欲築堤以障其泛濫之虞或又有望氣用數而謂人力强塞未必可以應天者載考前史歴歴可見亦今日治河者之所熟講而飫聞者也雖成敗得失不能無辨然譬之醫者其皆一方乎茍不問其緩急先後執一方而求病之愈不愈則歸咎於方豈方之罪哉用方者之罪也取古之方隨其緩急先後而用之此所謂治之以不治者也故如漕渠急則張秋等壩所當先築而疏故道塞决口分流諸派次焉然故道若髙則不必於必疏新流若下則不必於必塞其間泛出旁溢或用疏法或用塞法以水治水吾無容心故曰取古之方隨其緩急先後而用之此之謂也今河之為患如一人之身而具百病者也朝輕而夕重表減而裏加雖有盧扁不能使之全愈也故必得良醫師坐守其側切脈觀色聴其聲音察其寒熱究其病之所由起盡心力救之如前所謂取古之方隨其緩急先後而用之者幸而愈則調理如故不幸而復發於此則改圖而治之是故有求醫無遺醫藥餌常備攻治常施而不必其成功要於不死而已矣故曰治之以不治今治河之大臣良醫師也工與料藥餌也凡所謂疏塞分築之類攻治之法也為今之計宜常設總理大臣更置其屬頻巡視謹調䕶任滿則代或加命使仍其職而不必其功之成備工與料而惟其所用焉可也然大臣之任其事在朝廷疏塞分築之類其事在大臣而所謂工與料者則在民矣民可使之困乎故治河非難也備工與料之為難也容春堂集總理河道題名記于湛王者宅中圖治必輓天下財賦以給經費我朝始由海運繼由陸運凡三變乃改今河運然地勢中髙南北迤􅆔就下乏水以濟濟水伏流齊魯隨地溢出為泉泉在東郡凡二百八十有竒各以近入汶泗洸沂諸水東流赴海文皇帝命工部尚書宋公禮修復㑹通河伐石起堰東遏諸水西注漕渠南北分流北流者㑹漳㑹衛上接白河南流者㑹河㑹淮下接寳應髙郵諸湖漕渠遂亘南北濬泉以廣其源建閘以節其流築隄以防其潰決列鋪舎以通其淤淺闢湖瀦以時其蓄洩引水灌洪以平其險阻備夫以供其役銓官以司其事董之以主事八各有專職臨之以郎中三各有分地監司守令亦與有責焉又以地廣事劇役衆費繁宗統不可以無人乃勑差大臣一人總理於上爰集衆思以舉羣䇿嵗輓東南四百萬石萬艘鱗次而進時當盛夏維揚迤北乘風揚帆南旺迤北順流放舟既脫海運之險亦無陸輓之勞四方萬國五材百貨罔不畢集民命獲全國計斯裕文皇開濟之功同於天地諸臣弼成之蹟要亦不可泯也禹貢一書紀神禹治水之蹟與典謨訓誥並列為經昭示罔極我朝前此效勞諸臣水部分司各有題名而總理大臣漫無所考豈非缺典耶嘉靖丁酉予承乏是任深用嘅惜乃搆亭公宇之東偏爰披往籍錄宋禮以下若干人立石題名而各疏履歴其下仍虛左方以俟遞書庶後來者有考焉或曰漕河之盡制以帝都之在燕也前代都平陽都闗中都洛陽都大梁並以黄河為運道寧有此勞費哉曰是不然夫東南以海為險西北以山為險遡海肆逆為難而乘髙犯順為易故西北世有邊塞之患自遼左至甘涼六鎮皆守山外去中原千有餘里惟幽薊一鎮獨守山内中原内地與敵僅隔一山而山復中缺為敵所窺安史之盜唐契丹之盜晉金元之弊宋率由此首難自昔有天下而以此地屬人未有能乆寧者竊謂扼强敵而障中原據上游而制六合孔子復生必從文皇帝之見矣曰都燕之利則既聞命矣海運由浙西不旬日可達都下較之河運費省而功倍丘文莊衍義補言之詳矣近年言者亦多厭河運之勞而欲舉文莊之䇿子顧極言河運之利而欲侈諸臣之功示諸乆逺何也曰海運之法作俑於秦效尤於元祖宗已棄之䇿三代以前未聞也文莊計漂溺之米而不計漂溺之人故以海運為便不知米漂而載米之舟駕舟之卒管卒之官能獨免乎考之元史至元二十八年海運漂米二十四萬五千六百有竒至大二年漂米二十萬九千六百有竒即如文莊言每舟載米千石用卒二十人則嵗溺而死者殆五六千人此元人海運之弊之明驗也若之何乃尤人而效之哉河運之費費於人所謂人亡人得者損上益下者王者以天下為家又奚恤哉曰海運誠不可復矣今之河運築堤建閘並以人勝時不常泰人不皆良能保無意外之變乎曰變不可保也海胡可蹈哉今之黄河經行河南之祥符者去衛河僅七十里鑿而通之萬夫一月之力也議者徒以衝決為難竊以為黄河之難不難於海也二道並設而各從其便常可也變亦可也是則可為也曰此尤不可之大者先朝河決張秋運道梗塞罄數省之力捐不貲之費再歴寒暑乃克底寧衆方幸其南子欲引之北吾不知其何說也如子之言且將為運道憂矣曰今之黄河固古之運道也昔固北行而今始南遷也民間舟楫往來如織未甞一日廢也在古則宜在今則否在南則利在北則否在民則可在公則否在海則易在河則難吾亦不知其何說也此不榖之見也謹併誌之漕河圖志敘予觀漕河圖志未甞不敬嘆我祖宗之聖謨神烈之宏逺也夫漢唐皆當王闗中矣宋甞都汴矣而漕挽有三門七津之險有海運難其故道猶存見者罔弗騰駭惟我國家則不然跨江入淮由河達濟四瀆畢涉舳艫相望者三千里雖有吕梁徐州二洪之險又皆疏鑿之命水部臣監臨之舟航利涉惟汶濟泉源或遇陽亢時出微細則疏沂泗諸水以益助之築閘置吏以啓閉之分命水部臣以轄之總命大臣以督之淺深惟均漕舟往來弗滯官軍樂於用命呉艭越艘燕商楚賈珍竒重貨嵗出而時至言笑自若視為坦途於乎其視漢唐宋之險且難者奚翅霄壤哉雖然漕挽者官軍之勞輸納者百姓之力也古者什而賦今則不然計畝輸糧徴逋索貢半歸官府百姓所食羡餘粃稗耳官軍兊運罔知寒暑牽䉡捩柁百倍其勞既入太倉固皆充軍國之用而冗食者蜂攢而蟻聚甚至錦衣玉食大半皆游手狡滑之徒是皆小人之所當必去者也讀聖賢書食天子祿如吾輩其亦有伐檀之風否乎漕河軍衛有司府三州十一縣四十衛二十二所一宛平縣大興縣通州通州左衛通州右衛定邊衛神武中衛漷縣香河縣營州前屯衛武清縣武清衛天津衛天津左衛天津右衛靜海縣霸州青縣興濟縣滄州交河縣南皮縣東光縣呉橋縣景州徳州徳州衛徳州左衛故城縣武城縣恩縣夏津縣清河縣臨清州堂邑縣博平縣東昌府聊城縣東昌衛平山衛陽榖縣東阿縣夀張縣東平州東平守禦千户所汶上縣嘉祥縣鉅野縣濟寧州濟寧衛鄒縣魚臺縣碭山縣蕭縣豐縣沛縣徐州衛徐州衛徐州左邳州邳州衛睢寧縣宿遷縣桃源縣清河縣淮安府山陽縣淮安衛大河衛寳應縣髙郵州髙郵衛揚州府江都縣揚州衛儀真縣儀真衛漕河水程自通州至儀