body:
  text: 名臣經濟錄卷四十一明黄訓編兵部職方中之下劉大夏言行錄公為兵部郎中時有中官用事獻南䇿以中㫖索永樂中調軍數公故匿其使者家數被捶若弗聞者獨徐以利害告尚書余公子俊沮之事遂寢朝鮮使者為建州冦邀刼請改貢道中官有朝鮮人為之地事下兵部議將從公曰朝鮮貢自鴉鶻闗由遼陽經廣寧過前屯而後入山海迂回三四大鎮此祖宗㣲意今若自鴨緑江抵前屯山海路大徑直恐貽他日憂卒不從冦數擾雲中邊師失律中外震驚調發戰守無虚日每一報至尚書必曰劉郎中云何所言輒行行輙效時右侍郎缺中官有欲薦公者遣人言於尚書冀一徃見公巽詞謝之然猶廹趣不已乃自求外尋出為福建參政奉勅巡視海道兵久弛而倉儲既乏于勢卒難就理公曰在得人耳謀於鎮巡首選衛所軍政官而擇其尤者總諸水寨兵造戰哨船各若干艘緩急異用葺倉計儲立收支法寨設一館而親督察之不半年海道肅然𢎞治丁已北邊倉場糧草告乏公以户侍簡命經畫瀕行周司徒經謂公曰邊上糧草半屬京中貴人子弟經營公素不與此輩合此行所謂剛取禍矣公曰處天下事以理不以勢定天下事在近不在逺俟至彼圖之公至召邊上父老日夕講究遂得其要領一日揭榜通衢云某倉缺糧幾千石每石給官價若干封畿内外官員客商之家但願告報者米自十石以上草自百束以上俱准告糶雖中貴子弟不禁也不兩月倉場積蓄有餘盖徃時糴買法有來告糧千百石者草千萬束者方准以致中貴子弟各争為市轉買邊上軍民糧草陸續運至自公此法既立有糧草之家自徃告報中貴家人即欲收糴無處得買也邊上軍民云自公收市法行倉場有餘積私家有餘財三十年前僅見此耳壬戌陞兵部尚書時邊方告急上以兵事屬中官苗達謀出兵圖之密言於上乃召問計公曰臣聞從征將士言當時全仗朝廷威徳乃獲遁免上曰永樂頻出塞破敵今何不可對曰皇上聖武固同於太宗奈今將領兵逺有不逮且當時淇國公丘福稍違節制兵甲萬餘俱陷沙漠况今之將又在丘福下不若且令各邊料敵戰守猶似得䇿上乃悟曰朕幾為人所誤事遂寢上嘗召問天下衛所軍士何如對曰與民一般窮安能養其鋭氣上曰在衛有月糧從征有行糧何以至窮對曰江南衛所困於糧運江北衛所困於京操此外浪費猶有臣等不能知者所以俱窮上翌日詔各衙門凡有損於軍民弊政悉疏以聞上欲於附近地方團操人馬以為京師左右掖問䇿公對曰京西保定府地方獨設都司統五衛仰思祖宗恐亦是此意未幾一御史陳擬将保定兩班一萬人回衛團操奏入上可遂勅京營都指揮戴儀徃任其事乃有造飛語帖子於宫門誣公上曰宫門豈外人可到必此曹忿不得私役官軍所為耳修清寧宫有㫖下兵部撥用軍夫萬餘人做工公知工少人多盖監督中官有利而為也即上言減去十分之五督工者訴於上上令司禮監語内閣曰劉大夏不以朝廷大工為事率意減去人夫即調㫖來切責劉閣老健曰愛惜軍夫司馬職也近日劉每以老辭位朝廷每下温㫖勉留尚請之未已若切責㫖下彼將以不職固辭更於何處討這等人來替他司禮監以其言入告孝宗欣然納之用軍夫卒如公所裁之數𢎞治癸亥四方奏災異畿甸四五月無雨公引咎求退且言兵政弊端上不允令開具弊端公陳十事一曰京住官軍苦於出錢供用二曰在營軍士困於私役做工三曰江南軍士因漕運破家四曰江北軍士因京操失業五曰竭軍民之力運糧而濫食者衆六曰罄生民之財買馬而私用者不顧法禁七曰各處鎮守太監貪婪八曰各處守備内臣占軍數多九曰陞賞被於勢要十曰禁衛苞苴公行奏上孝廟一一准行之公為兵部尚書浮梁戴公為左御史孝廟有大政事每召二人面議𢎞治乙丑春二公對畢上令中使出白金二錠以賜且面諭曰卿等將去買茶菓用朕聞朝覲日文官避嫌有閉户不與人接見者如卿等雖開門延客誰復有以賄賂通也朕知卿等故有是賜且命不必朝謝恐公卿知之未免各懐愧懼也孝宗一日召公面語曰事有不可每欲召卿商量又以非卿部内事而止今後有當罷者卿可寫揭帖密封進來對曰不敢上曰何也公曰先朝李孜省可為鑑戒上曰卿與我論國事豈孜省營私害物者比乎公曰臣下以揭帖進朝廷以揭帖顯行是亦前代斜封墨勅之弊也陛下所行宜逺法帝王近法祖宗事之可否外付之府部内咨之内閣可也如用揭帖日久上下俱有弊且非後世法臣不敢效順上稱善久之孝宗嘗召公因言天下何時太平朕幾時做得如古之帝王公曰求治不宜太急但凡用人行政有疑者即召内閣并執政大臣面議停當行去自然順理便是太平上曰大學士劉健嘗薦劉宇才堪大用以朕觀之此小人也豈可用哉以是而言内閣亦未可盡托孝宗每召公入内廷奏事公至跪御榻前上轉首左右顧近侍内臣即退避數丈地俟奏事畢復來侍駕一日公對久事畢欲起不能上曰司禮監來朕與劉尚書論事語長彼老不能興爾李榮與某扶掖出順門外回榮且扶且謂公曰吾輩行事不好處多老先生於上前幸隠惡揚善公曰聖上天性聰明某於政事外未嘗敢輕易毁譽他人也某今日求退上曰李榮亦在朕前説卿是好官如某者與老太監踪跡疏逺不知何以如此榮曰當朝大臣公名第一榮何敢蔽賢也户部郎中李夢陽𢎞治中建言指斥政事之非者孝廟怒下夢陽錦衣獄一日北鎮撫具獄詞以讞有㫖令夢陽復職他日獨召公奏事畢上曰近日外事若何公頓首近有㫖釋李夢陽中外懽呼聖徳如天之大上曰李夢陽本内事闗戚畹且語言狂妄朕不得巳而下之獄鎮撫司本上朕試問左右當作何批行一人曰此人狂妄宜付錦衣獄撻以釋之朕揣知此輩意欲得㫖下便令重責致其死以快宫中之怒使朕受殺直臣之名左右不忠如此朕所以即釋復職更不令法司擬罪也公頓首謝曰陛下行此一事堯舜之仁也刑部尚書閔珪讞重獄忤㫖批答久不下一日公獨對孝宗因語及之公曰人臣執法不過效忠朝廷耳自古聖帝明王徃徃屈意從之閔珪所為無足異者上曰且道自古何君何大臣亦嘗如此公對曰臣㓜讀孟子内見舜為天子臯陶為士瞽瞍殺人臯陶亦執之而已今之法司事恐亦出此似未可深責也上頷之明日㫖下一依刑部所擬無改光禄寺之設供奉内府御膳備辦使臣外夷宴享而已近成化𢎞治已來添有坐家長隨七八十員又有傳添湯飯内臣一百五十餘員天下常貢已不足用乃責令京師鋪户買辦官中不給負累市井賖借𢎞治辛酉公因應天鳯陽淮揚蘇松等處民饑盜起因以前事執奏曰光禄日辦卓面不勝查算日殺牲口無慮數百既巳損民之財尤虧愛物之仁疏上孝宗惻然下令裁減官民乃甦後光禄卿艾璞曰東山此奏嵗省光禄銀八十餘萬古稱仁人之言其利博此之謂歟𢎞治甲子北邊總兵員缺有李某者求媚近戚以情干於上欲傳奉得之上曰傳奉先朝弊政朕始革罷豈可復踵其失懇請上命司禮監與兵部議之太監李榮對曰有㫖傳奉尚書劉某且執奏中官口傳之詞彼豈聽受耶其人懇不已上一日奉天早朝退獨召公授一帖子公啟視之乃硃書某人姓名也退至部語同列曰上既命兵部推舉只當以堪任者以聞如某人才望非帥臣選終不可從明日推某某以請上徑從内批出用李某其人到未久被劾取回他日公獨對上乃曰向用李某盖不得已今敗事矣朕悔不用卿所舉之人也公於本兵外知無不言言無不聽國有大政大疑每召公至内殿面與參決所議事雖貴近左右元勲輔相有不與聞者公亦不以告人玉帶蠎衣元寳之賜迥出諸大臣之上賜誥有廊廟英資湖湘間氣之褒乙丑五月孝廟賔天四上章請老乃從之公在兵部議革騰驤四衛勇士議節光禄寺無名供饋嵗省宫府數百萬近幸者滋不悅正徳丁夘激怒於今上將及禍太監寗瑾知重公者叩首諫曰此先帝意非劉大夏建白遂免時逆瑾用事日誅求臣僚而大臣中有欲中害公者昌言云抄劄劉大夏家可得金數萬瑾因潘尚書蕃毛總兵鋭獄詞連公姓名戊辰夏遂矯制差錦衣衛宫校逮公千户羅某至廉知公貧雖以酒器為贐彼堅却不受八月至京繫北鎮撫同繫者教公行賂為求生計公曰如此而死唯累一身稱貸免死則累一生且累子孫矣瑾怒欲置之辟㑹官議於朝堂屠左都滽曰檢律劉尚書無死罪瑾曰充軍罪亦無耶法司比附守禦官撫馭無方致所部軍人犯叛律充軍十月遣戍肅州當時士夫以公出獄為喜買驢雇車挾二僮以行故人贈送謝絶不受發都城日觀者如堵所在罷市父老涕泣士女㩦筐饁進果食亦有焚香黙禱曰願公生還者已已四月到配所即買地為墓作終焉計人問公何不挈親子以侍公曰吾仕宦日不能為子孫乞得一官今充軍老死顧令子孫補伍豈人情所安也庚午夏京師風霾蔽天寧夏寘鐇叛亂肆赦天下公得釋歸八月瑾誅復公原官致仕公之為人也明識治體如賈太傅通達國事如陸敬輿質直不阿如汲長孺廉潔不私如包希仁忠誠懇切如司馬君實焉是固先民之遺軌也覆陳邊務事劉大夏職方清吏司案呈奉本部送於兵科抄出巡按陜西監察御史金洪題臣節該奉勅延綏寧夏地方西北重鎮近來北人不時犯邊屢勅巡撫等官整理邊備未審有無停當今以爾巡按一方特命就彼閲實爾須查照兵部題准事例躬親遍歴將官軍馬匹器械墩臺等項務要逐一㸃檢及大小將官賢否從公訪察具奏以慿處治欽此欽遵臣猥以凡庸誤䝉任使捧命奔趨無逺弗届隨處巡察於事粗知除将兵部題准事例另行造冊具奏參究外然千慮之中僅而一得忘其愚陋謬謂可行謹條為十二事瀆冒尊嚴倘䝉采納俯賜施行區區芹曝之誠豈勝忻幸等因具本該通政使司奏奉聖㫖該衙門看了來説欽此欽遵抄出送司除查得奏内謹存積省轉輸二事呈堂移咨户部徑自覆奏外看得巡按陜西監察御史金洪所奏後開十事俱係邊方要務本官親歴其地奉勅閲實聞見必真擬合逐一對􅍁議擬伏乞聖明裁處緣係風憲官員奏陳邊務及奉欽依該衙門看了來説事理未敢擅便𢎞治十七年正月初七日本部尚書劉等具題本月十六日奉聖㫖准議計開一嚴燒荒以安邊臣聞敵之入套必視芻牧前年因被人馬數多踐踏鮮生去冬以此俱各過河去訖每年霜降例該榆林寧夏二鎮官軍分出燒荒訪得俱各虚應故事十分燒不及一止是捕生打草而還以致芻草茂盛得以久住為患邊方貽聖明西顧之憂今幸套内無冦臣愚合無行令二鎮各差勤能官三十員各帶人馬二百餘名委副總兵等官分管各齎五十日糧徑至河邊分與地方埋立樁木各將一半架梁一半㸃火燒至邊墻務要盡絶并差官把守入口盤檢牲口草束完日撫鎮等官各帶領軍馬查驗以十分為率三分未燒及查出捕生打草者即係守備不嚴各問罪畢日革去管事差操五分未燒者降一級止燒四分以下者降二級若查驗官互相扶同河凍敵復徃套俾責有歸則令嚴弊革師不勞而敵自退矣前件查得每年秋深草木乾枯之時本部請勅各鎮守臣并獨守一方内外官員先行差人哨無敵情然後行令副參等官各照地方出境燒荒已有常行定例但將官實心奉行者少中間虚應故事誠如本官所言者欲於燒荒畢日重復出境查驗勢恐難行今詳本官所奏之意則是套内敵情有無可以驗燒荒虚實合無通行各邊今後每年燒荒官軍回日巡撫都御史務要盤檢有無牲口帶來者日後北兵在套或近邊住牧就遣夜不收哨探在何地方離邊逺近查與原報燒過里數若干就將原日領軍出境燒荒將官指實參奏挐問本處查有入敵失事緣由依擬降謫一修城堡以固邊臣至寧夏中衛查得本年二月十六日被敵傷虜程伏山等三名二十五日虜郭阿榮等三名三月二十日三次烽砲不曾入境二十三日殺虜胡成五等二名四月初九日虜范達兒一名五月十九日搶殺男婦饒通等一十四名口牛馬羊共六十餘頭匹二十二日虜夏細奴等二名今六月十九日又殺虜馮官音保等六名官馬一匹每日辰時掛旗始放人生理申時收入止是三時三時外又節被撲出搶殺地方實是迫切其乖覺官俱尋别差躱避止將無用官及總旗等巡山以致節次誤事又自鎮夷墩至定西墩二十餘里失打邊墻下有白渠一道今亦湮塞臣事完欲從勝金闗徃寧夏又據該衛手本開闗外石空寺至棗園堡共一百三十餘里自𢎞治十四年至今北人出沒道路不通臣嘗詢問生員人等皆言山後之敵本無百數成羣使烽砲嚴謹豈敢時常撲出先年韓玉為參将五年敵不敢至兹巡山非人法度漸弛故耳及至寧夏又查據慶陽府同知張賢呈稱本鎮北邊鎮逺闗内原有黒山營每年按兵三百員名北可以守闗南可以為平虜城應援近今一向棄置不守𢎞治十四年十一月内被敵燒毁營門去嵗平虜城搶殺數多若此營尚守豈敢深入臣愚以為前項渠墻應合挑築烽堠當得謹嚴而此營不可廢棄又從靈州至花馬池近今添設毛卜刺等堡新舊相去不過二三十里若守之以兵委的聲勢聨絡足為捍禦又至榆林舊安邊營春得本營東至寧塞營西至定邊南至新安邊營各九十餘里地勢平坦原無邊墻實為孤懸難守臣愚又以為宜築墻一道與兩邊舊墻相接其東西二空仍各添築二堡每堡撥軍五六百名按伏就將墻下地分與屯種暫免起科以安其心庶幾防守有所慿藉合無将臣所言再加酌量務要選委賢能謹嚴烽火添築墻堡戒飭縱弛則廢墜復新而邊方有賴矣前件除寧夏地方殺虜人畜緣由已經節行巡按衙門查勘去後未報及查得近為陳言𦂳急邊務事該延綏守臣奏稱本鎮寧夏至定邊營一帶地方衝要行修築邊墻等因文經題行總制衙門公同守臣勘議具奏外今本官又奏前因大意在於選用巡山官員修理各該險阻事在彼處難以遥制合無備行總制尚書秦紘公同二鎮守臣一併查勘備由具奏一揀將才以鎮邊臣看得邉境為患自古皆然惟在用將之得人爾近将吳江充總兵李祥曹雄充副總兵衛勇充游擊巴琮充參将選用得人邊方稱慶将來必成禦侮之功臣於各邊與各将官相接及詢考事功畧有所知不敢隠黙謹昧死言之先致仕今復視事參將王㦸處死地而得生臨事機而知變軍旅服謀敵人問姓把總舊安邊營慶陽衛指揮僉事魏鎮處孤懸之地有禦敵之才敵不能犯人樂於用榆林管司綏徳衛署指揮同知藍海發身行伍熟知險要驍勇絶倫謀畧足用寧副總兵傅釗初起納粟屢奏非功遇敵則怯圖利則勇廣武營協守神武左衛指揮同知張翼處事乖方致人不服本無將領之才大起貪殘之議守備花馬池參将馬隆讀書尚禮知務識時但怯懦自其所禀戰陣非其所長當此要衝屢致悞事榆林游擊將軍姜漢臨事有幹遇事知嚴但平昔不曾見陣一旦責以難為任非其人恐致壊事况傅釗馬隆張翼見被參提人數但事情牽連卒難杜絶即今河凍在邇正係選用之際倘䝉悮聽將王㦸魏鎮藍海漸加進用將姜漢取回腹裏别任將傅釗馬隆張翼放回原衛聽候另參則與奪得當而邊務有賴矣前件看得本官閲視地方開奏各官賢否應當參酌所言處置但延寧一帶為事將官近該本部奏稱敵兵過河要人隄備已經奉有欽依姑令記罪前去領兵隄備候邊事寧日照舊問結去後今本官又奏前因緣成命已下難便更改除所舉王㦸魏鎮藍海案候聽用外所據開奏馬隆姜漢亦各稱有將官器度宜當俟其後效傅釗張翼既稱其怯敵圖利無才貪殘合無行令總制尚書并各該巡撫都御史再加詢訪的確候各官問結之日另行具奏定奪一放土軍以信邊臣在延綏等處據各土軍告稱前䝉榜招内開有警殺賊無事歸農今通留在官並無營房住坐節被各官剋剥又無征操虚費倉糧月以幾萬計且荒蕪田土抛棄妻子不得安生及各軍户人又告稱先年應募多被各官圖陞逼迫貪要賞賜不拘老少盡去投充地土抛荒糧差負累又被囑告各宫日逐勾拏幇貼盤纒多有逃走及縊死者願將原賞銀兩送還疎放又有告稱原投軍人有死亡有逃走有冒名有因讐揑報者先年不曾查審今一槩將無干户丁勾替無辜各等因臣看得前項軍人非自外至皆近邊之民今民半為軍而糧差不減又增幇貼之累軍久拘官而妻子無倚又受剋剥之害失此不為處置恐軍民俱累矣且失信邊人後有調遣誰肯樂從臣愚合無將各軍人清查明白造冊在官着各里老保領盡放歸農冬月拘操訓練支糧有警仍須奏請勾取不許揑作願留及追取幇貼其死亡者官為相驗除豁逃走及冒名揑報者着各里老拘各正身并父兄子弟代當不許將無干人户擾害則兵寓於農而公私兩得矣前件查得先為急募土兵以禦強冦事招募過延寧二鎮土軍共二萬一千三百七十六名編成隊伍闗與軍器各隨衛所營堡食糧就令原招人員管習武藝情願常操者補作游兵之數其餘分作兩班每年十月起至開年三月止每班備禦三箇月該管官員敢有科擾及擅勾非時公私役使者㕘奉究治等因題奉聖㫖是欽此欽遵通行去後續該彼處守臣奏稱各軍情願留操及將沿邊增設衛分就將各軍編發補伍行令勘處間今該前因緣御史金洪親歴其地據告真情觀其告稱比先招募之濫近日拘留之苦供貼之難甚至願將原賞銀兩送官疎放中間難保其無揑作願留及科擾役使之弊合無將金洪所言備行總制尚書秦紘候邊情寧日選委二司能幹着實官員各赴二鎮將原招軍士逐一清審明白仍查照欽依事理除着實甘心願留補作游兵其餘俱責令里老及該管人員保領照例冬春輪班操備夏秋放免歸農遇有重大軍情一面行移巡撫巡按㑹同拘集一面奏聞拘操之日照例支糧中間查有死亡告相明白即與開除願補者聽詭名揑報逃走者就拘原報之人正身及父兄子弟頂當仍將審過實數并處置過緣由咨部知㑹若查有科擾等弊應挐問者挐問應叅奏者指實叅奏一教騎射以禦邊臣觀敵之所長騎射而已我之所以不能勝之者豈力之不足耶盖有由也臣近於各邊將各軍官并報出能騎射軍士比較賞罰步下者百中不過一二馬上者全無彼知敵之所長乃我之所短故見之先怯怯則潰無疑矣若操練精熟自揆我之技能足以勝之何懼耶今各鎮軍官知掊剋而已虐使而已及至教場不過下營走隊放砲飲酒虚應故事知訓練之者誰耶臣愚合無兵部定以逺近馳驟之法行令各鎮等官今後務要依法嚴加訓練該操時月本鎮官親詣教場逺處委能騎射官員每日比較十隊或六七隊量加賞罰周而復始其下營等故事十日半月一舉至將歇操之時該部仍奏差知兵郎中等官將各官軍逐一比驗一隊之中以十分為率能騎射者有六分之上将管隊官量增支俸一級不能者六分之下量減支俸一級官亦如之如數内軍士果不堪教退出别選户丁應當無户丁者改與别差明年再驗如前而賞罰之及各撫官亦視官軍能否具數請命於上則士馬精强而敵聞風知懼矣前件看得操練官軍騎射係是將官本等職業今御史金洪親歴其地比驗軍士如此不知該管將官所幹何事巡撫都御史因何扶同不言况事在人行兵難中制合無不必本部立法差官止將金洪所言通行各邊總兵官今後務要嚴督副叅等官用心設法教習騎射都御史不時比驗将把總管隊等官量行賞罰若將官果有中間不肯嚴督操練虚應故事即便具實奏聞御史按歴去處比驗軍士若果騎射不熟及詢訪將官止知掊剋私役者指實具奏本部将巡撫總兵一併叅奏取自上裁一節工役以逸邊臣查得巡撫寧夏今致仕都御史王詢節次題准於寧夏開西首渠靈州開金積渠灌田沮賊其西首渠功費重大年久不成方纔停止金積渠至今陸續挑濬已經三年未曾成功臣親至其地詢問地方人等及查考工程并圖様原議開長一百三十里計夫七千餘人俱自備飯食但積金山口多石難於施工本年春間本地夫二千八百餘人挑濬一月止開二里七分况南首地髙於水一丈有餘不能灌溉直至中間方得水利功又難成訪得先年有盧千户者久逺不知其名看得本山腰間水勢髙起一丈建言欲用石匠三千名多取柴醋等物鑿開一道過水庶與地相等得霑水利因是功程浩大不曾准行本官悞聽傳言不度水勢欲於山口開渠心雖為民今反累民况當軍旅倥偬之餘修城築堡運木轉石月無虚日有何豐積衣食能自備施工臣愚合無將此不急之役暫且停止候年豐事平令有識人員仍依盧千户所擬處置施設庶邊人不致重擾矣前件查得先該寧夏守臣各奏稱勘議過本邊原有古渠三道東渠中渠見通水利可遏賊路惟山邊一渠内地方似為敵境欲將舊渠挑成河塹以限北兵多得地利以資邊儲本部議得工程浩大難便輕舉仍行各官㑹同巡按御史再行計議如果決能成功保無後患候來年和暖之日哨無敵情然後興工迄今三年之上未據奏報今本官奏稱所開之渠地髙於水不能灌溉山口多石功亦難成所據寧夏久疲未蘇之人何以堪此合無備行總制尚書秦紘移文該鎮守臣從長計議如果此渠難於施工徒勞無益即便停止咨報知㑹一用精鋭以助邊臣在各邊累見塞外走回人口詢問詳細皆言被虜男婦多有思歸流淚但管束嚴謹懼怕者不敢走愚魯者不能走及走而被趕及殺死者亦不知其數幸而至墩下實出於九死一生且又有能取其馬同來者實非精壯乖覺之人有不能至今止量給衣糧送回其家甚至有貧無依倚者不無阻其來歸之心臣愚以為此輩日與敵接膽大氣壯又頗有識始能脱身若收而為兵必精鋭士也合無今後有前項走回之人在彼過一年之上者俱令就彼便所收入隊伍槩與糧賞觀其才而進用之則未來者聞知而動心既來者知感而思報矣前件查得各邊遇有塞外走回人口審有的確鄉貫者送發寧家完聚免其雜差係見行事例今本官奏要將前項被虜年久走回之人俱令就彼便所收入隊伍槩與糧賞是亦選用精鋭用防邊鄙之意但此輩被虜日久自意骨枯草野不復與父母妻子面見幸而脱死生還情難一槩强留合無行移彼處鎮巡官員今後被獲走回審有鄉貫之人若果精鋭情愿在邊殺敵者量給賞勞與邊軍一體收伍食糧不願者仍照舊例施行一分地方以理邊臣至寧夏榆林兩邊見伸寃理枉及告賍官汚吏者紛然沓至除量情施行外但所轄地廣一年止可一至其餘月日前項軍民不過飲恨吞聲俯首順服而已彼非無官終是日久人情稔熟必須布按二司守巡官時常巡歴禁治緣先年所定地方將巡慶二府二十四州縣并兩邊通屬河西道寧夏西路至榆林東路該二千餘里中間城堡數多又有二府州縣事務豈能周悉今闗西道止理平鳯二府十八州縣比之河西道地方不及一半况固原州至韋州不過二日已是寧夏之境又自韋州至靈州適當寧夏之中臣愚合無將闗西道分管寧夏河西道止管榆林則地近小而易於巡行仍每年各至四次及年周查無半年不完事件方許更替庶伸訴有所而奸頑知警矣前件看得二司官員巡守必須地方便利方可責成今闗西河西二道既地里逺近懸絶難於遍巡則一方庶務何以督理而貪官汚吏安知警懼御史金洪所奏亦為有見合無仍行陜西巡撫都御史再行參酌奏内事理如果前項所定地方均停從宜更改行令二司官員遵守施行一慰死事以勸邊臣查得榆林栢林等堡被敵射死指揮孟紀千户劉寵及軍士一十七名該太監苗逵題該兵部題將陣亡并殺敵軍人各賞銀二兩將孟紀應襲男保送前來定奪似此人心知奮後曹雄等畧獲㣲功臣親詣孔壩溝今問斬罪都指揮楊琳誤事之處訪得内有西安衛前所副千户湯璽强弓善射矢無虚發敵東衝東卒呼之而射退西衝亦然矢盡又取人之矢射之斃敵不知其數後賊突入各俯首受刃彼方慷慨自刎至今逺近為之痛惜恐有不實審據同隊指揮使尤鉞開呈相同臣又訪得各墩臺夜不收并瞭髙爪空公差人等當直而出必與其家相向而哭幸而無事則市酒殽焚紙錢而奠之豈其得已耶中間有被敵搶殺者妻子分散父母無倚彼皆因公誠為可憫臣愚以為欲致生者之力當施死者之恩又查得湯璽無子而貧母妻見在賃房住過今止弟襲職合無將本官量給月米養其家屬或贈與官職以旌其能及今後公差人役有被敵搶殺者官給銀五兩以安其家其陣亡及被虜殺之人仍依兵部所定庶死無所憾而生知所奮矣前件查得孔壩溝死事官軍近該總制尚書秦紘具奏本部議擬具題節該奉聖㫖是朱鼎妙齡武臣許慶湯璽各贈官二級仍查他子孫照例襲陞其餘陣亡官軍便着查明來説定奪欽此欽遵通行去後及又查得本部題准事例及夜不收公差人役被敵殺死者賞銀五兩埋葬有子孫者陞授一級止有父母者加賞銀五兩虜去者亦賞銀二兩以恤其家今本官又奏前因緣各查有前項題行事理難再别議合咨都察院轉行本官將前項奏行陣亡官軍事情作急勘報及今後有公差夜不收被敵殺虜者照例具奏施行一分陪補以恤邊臣看得陜西各衛官軍騎操馬匹隨補隨倒中間有因公事而騎死者有因私事而騎死者有急病而不及毉或毉不效而死者有知病而不與毉者有扣減草料而死者止給樁頭朋合錢外俱各追陪以致變易田産鬻賣妻子實為苦楚近今寧夏衛分又不照前例每倒死馬一匹不問緣由止追肉臓銀一兩五錢官與買補榆林衛則槽下死者追陪公出倒死者不追給與官價買補又多被侵減及揑報又不追樁頭朋合等錢臣愚以為不究倒死之由一槩追陪事有無辜者在一槩官為買補又有幸免者存况肉臓樁頭等銀無處查考非但事體不一抑且法令失平合無行令各鎮今後倒死馬匹務要查驗明白每馬一匹一以十兩為率若是因公走死即令免陪止將皮肉入官若是醫治不痊并不效者終是水草失時所致連樁頭肉臓等錢陪銀五兩若是私事走死及病而不與醫與扣減草料死者即將月糧扣算不許抑勒户丁幇貼或樁頭等錢不彀給發亦照數算除其先前倒死未補馬匹亦照今擬查追鎮撫官將追出銀兩徑自差人買補亦不許給與各軍以致侵剋仍令管馬官員用心提調若是倒死數多查究治罪年終將死過馬匹造冊送部備照庶情法兩當而人無怨嗟矣前件查得官軍騎操馬匹除追敵燒荒等項公差倒死免追其餘槽下倒死告相明白官軍朋合出銀馬主出備樁頭官為通融買補此係奏行事例其朋合之例每年終止令六箇月按月每月都指揮出銀一錢千百户鎮撫出銀七分旗軍出銀五分樁頭之例倒死馬主都指揮出銀三兩指揮出銀二兩五錢千百户鎮撫出銀二兩旗軍出銀一兩五錢走失者各加銀五錢今御史金洪因見各邊騎操馬匹追補不均要得查究倒死緣由分别免追一節最為有見既查有前例相應通行遵守合無本部移咨各該巡撫都御史及咨都察院轉行本官各仰所屬衛所官軍務要各將騎操馬匹用心愛惜喂養臕壯以聽調用内有因公追敵等項致死者免其賠補官給馬匹醫治不效者即係槽下倒死之數照例追徵樁頭銀兩貼助朋合銀兩買補其有為因私事走死及諸般作踐倒死者查勘的實即追好馬一匹還官或追銀十兩在官買馬各邊一體通行不許偏執致有彼此不同則馬政不致廢弛題武舉事劉大夏職方清吏司案呈照得先於𢎞治十七年十月二十五日該本部題武舉事例節該欽奉孝宗皇帝聖㫖今後三年一次舉行其餘制度有未備的你每再斟酌議處來説欽此欽遵今照正徳二年例該武舉開科但各處起送應舉武生到部者尚少及入試未有定期法制俱有未備呈乞議處等因案呈到部切惟文以黼黻太平武以戡定禍亂文武並用誠治世之良圖保邦之要務也洪惟我朝開設文舉每三年一次大比藩省鄉試在秋八月舉行京都㑹試在春二月舉行今武舉止行於京師而掄材授官與㑹試相同却於鄉試之後舉行事不相類况文舉法制行之既久而程式俱備科目得人以資世用武舉法制行之未久規矩未定取士疎畧無補於時合無將武舉入試日期定於文舉㑹試之年如二月初九日文舉頭場初試十二日再試十五日終場武舉合當定於當年三月但文舉殿試在於此月誠恐日期相碍合無將武舉初試定於當年四月初九日頭場射步下箭十二日再試射馬上箭十五日答䇿終場其餘凡命官司試供給揭曉引見謝恩宴賜等事凡法制有未備者俱聽臣等㑹同五府各部都察院通政司大理寺六科十三道掌科官掌道官公同㑹議停當逐一條陳上請定奪頒布為式遵依舉行庶使一代之法制以全而四方之英武倍出隨器任使而真才不可勝用矣等因正徳二年十月初五日太子太傅兵部尚書劉等具題本月初七日奉聖㫖是欽此欽遵臣等㑹同府部等衙門太師兼太子太師英國公張等議得武舉之設將以延覽英雄廣儲將帥招徠韜畧之士收拾跅弛之才其事在所當重者臣等詳著於後盖古今治天下之具惟文武二道天之生材以供世用惟文武二藝凡國家求相於文求將於武亦惟文武二科二者式並用而不可偏廢者也我朝設文舉以求士品式詳明恩禮優渥誠足以備一代之彛典而其網羅之周密自閥閲以及草澤不以逺而遺不以賤而棄故得人以備任使自大僚以及庶秩大才足以充大用小才足以充小用其用武臣也甄别軍功之大小以為陞擢之階級内或陟督府之崇班外或膺邊方之重寄或處以方面之長貳或列於行伍之師帥世享簮纓家足餼廪祖宗以此奬勵武臣作興士氣意甚善矣但求采止於武弁一途謂名武臣者便可為將凡授鉞推轂非出於貴寵之子弟即拔自行伍之粗材近嵗雖有保舉將才之例又但據見有官職之人而推薦之其間徃徃徇名而不責實挽强引重者目為勇敢談説縱横者目為謀畧及委以重兵臨以大敵僨事者多而成功者少盖由求將之意雖勞而選將之路太狹也宋臣范仲淹有言議者不知取将之無術但云當今之無將今日之弊殆亦坐此且天之賦人以材拙於文者或優於武亦不以逺而嗇不以賤而限如穰苴生於寒㣲吳起困於羈旅樂毅出於疎賤黥布雜於輿臺衛青辱於人奴去病辱於假子凡此數人當時非有識人為之汲引豈能自致通顯建功於世而垂稱於後耶今四海之大生聚之繁寧無若斯者在於側陋之間乎非在上者捜揚而駕馭之其錮一生於無用之地者間亦有之此臣等議得武舉之設將以招徠韜畧之士收拾跅弛之才其事不可以不重者此也夫武以用將為先亦猶文以求相為先孫武曰將者人之司命國家安危之主也司馬曰将不能設無以應卒昔唐知求將之為重視進士科而増置武舉遂得郭子儀卒成再造唐室之功宋知求將之為重視制科而詳定武舉遂得髙志寧令狐挺卒能料元昊之背叛破智髙之猖獗盖異人傑士感奮而興飲氣挾術以赴功名之㑹此前代故事有足徵也宋臣蘇洵言於仁宗曰文有制科武有武舉陛下欲得將相於此乎取之十人之中豈無一二此名儒之格言為足徵也臣等議得武舉之設将以延攬英雄廣儲將帥其事不可以不重者此也兹者適當武舉再開之時臣等見得法制未備禮儀未隆上未足以承陛下旁求之心下不足以副豪傑登進之望宋臣富弼請置武舉嘗曰法度齷齪未能致將起之士臣等竊與之異世而同懐也盖事既當重則品式宜加詳備恩禮宜從優厚今欲依倣唐之增置宋之詳定故事參酌㑹殿二試事例少加損益每遇文舉鄉試之年亦将武舉預期行移南北二京并十三省令其轉行軍民大小衙門出給告示曉諭各色人等如有究極韜畧精通武藝身家無碍堪應武舉者或隠於山林或育於學校或羈於戎卒或係於仕籍許各赴所在官司投報籍貫脚色查審明白屬軍衛者禮送該管都司屬有司者禮送本布政司俱從巡撫都御史并廵按御史考試其南北兩京亦令軍衛有司送南北直𨽻巡按御史帶管考試所考人材如果謀畧弓馬可取就令各該衙門禮送兵部㑹粹數目請於次年夏四月開科兵部堂上官并提督京營總兵官總領大綱兵部司屬官分理衆務初九日初場較其騎射人發九矢中三矢以上者為合式十二日二場較其歩射亦發九矢中一矢以上者為合式俱於京營將臺前較閲十五日三場試䇿二道論一道再照先年事例在於教場内試䇿但地方曠闊渙散雜處耳剽目竊難於闗防今令文場席舎内試之差撥官軍防守先期請命翰林院官二員為考官給事中并部屬官四員為同考試官監察御史二員為監試官臨期陛辭入院試卷皆彌封謄錄編號上寫馬步中箭若干送入内簾看詳分配等第其答䇿有能洞識韜畧謀猷宏逺作論有能精通義理文法整齊參以弓馬俱優者列為上等䇿論頗優而弓馬稍次者列於中等之前弓馬頗優而䇿論但能粗知兵法直説事狀文藻不及者列於中等之後其或䇿論雖優而弓馬不及或弓馬偏長而䇿論不通俱非全材黜之以俟後舉其考試日期若遇風雨恐騎射不便隨時改移及照禮請考官該用表裏下程入院管待茶飯并試官簾外執事官應試官生人等飲饌等項合無本部於缺官柴薪皂𨽻銀兩支給五百兩順天府領出兩平買辦供給造冊繳報其紙劄梨板刋字表背人匠行三法司并順天府闗領應用試畢將一應有事於場屋官員并中式之人照依文舉事例梓其姓名錄其弓馬䇿論之優者装潢成帖題曰武舉録刋録進呈上塵睿覽仍出榜於兵部門首張掛臣等次日早引赴御前叩頭畢預事官俱赴中府用樂筵宴其筵宴亦照文舉廷試事例預行光禄寺設辦宴名預請欽定并請命内閣重臣一人主席宴畢該營備鼓樂職方司官二員送武舉第一人歸第其中式官生陞級加俸作論一道答䇿一道馬上中四箭以上步下又中二箭以上者官員於本職上加署職二級其第一人若係百户以上官員照例加陞若係百户以下合無不為常例授以千户職衘就送團營贊畫以示崇異其第二名以下總旗授以試百户小旗生員舎人俱授以試所鎮撫軍民人等授以各衛試知事俱月支米三石作論一道答䇿二道馬上中三箭以上步下又中一箭以上者官員於本職上量加署職一級總旗授以署百户小旗舎人俱授以冠帶總旗生員授以各衛試知事軍民人等授以試巡檢俱月支米二石通送京營總兵官處量用把總等項聽候調用中間有願回原籍者咨送巡撫官處照依品秩委用此制一定庶法度昭宣足以備彛憲禮羅崇重足以淑人心凡海内智勇之士莫不仗劒而起應詔而來各售其術期以効用於世大者建立功名次者攫取榮顯是驅天下之英雄而入於吾彀中矣陛下屈羣䇿而用之何愾之不可敵何侮之不可禦雖鞭笞四海伸威萬里將無不如吾意者又何假拊髀而思嘆惜才於異代也哉其入場闗防條件臨時出給榜文曉諭所有合行則宜俱各開􅍁於後縁係議處武舉事理未敢擅便正徳三年正月二十日太子太傅兵部尚書劉等具題本月二十二日奉聖㫖准議行為北兵入境驚擾人民事王瓊本月二十日已時據羽林前衛正千户苗世英口報䝉委本職見在西山齋堂清水等社掏取水炭本年七月十五日夘時分忽有北兵數十餘騎不知從何闗口入境到於宛平縣地方清水社齊家庄等村殺死民人張迪又到塔河村清水等村殺死民人李敬䢰殺傷男婦六名口搶去男女十數名口牛羊騾馬不知其數人去跟逐瞭見北兵不知騎數在於洪水口地面安營本日又見北兵二百餘騎從沿河口三岔等村搶去騾馬牛羊不知其數見住地名黄魯安營况係腹裏偏僻地方住居軍民俱係宛平縣當差人數今被驚擾朝不保夕雖有邊口守把官軍寡不敵衆以此禀知等因具報得此臣等料得前項敵情係白羊口同日犯邊北兵今已過五日前敵或已退出况劉暉等領出軍馬出口遥振軍威彼敵聞知畏懼截其歸路不敢深入但恐敵兵衆大宣府官軍盡數發出彼已輕視不懼萬一聞知劉暉等所發軍馬數不上萬劄營不退復入侵犯逼近京師若不急早預備不無倉卒失措合無本部差人催促原差巡捕都指揮袁傑王佐等并順天府委官照依原擬上𦂳分投前去各口及前項齋堂等處地方徃來巡哨安撫人民但聞邊情星夜飛報本部一面差人齎文送與都御史臧鳯督委官員但係北兵道路添軍防守供給口糧不許失誤伏乞聖明軫念北人勢衆軍情難料必須有備庶免無患乞召提督團營内外官面諭令其作急計議挑選精鋭有馬官軍作為竒兵毎三千名委将官一員管領闗給馬疋火器什物各與賞賜整辦軍裝户部上𦂳措備本色草料儧喂臕壯馬匹并合用口糧俱預為辦完一遇警報即時出城相機截殺仍多選步軍闗領盔甲挨牌火器并戰車就於教場演習下營預立陣法演習慣熟遇警即發出城各闗廂相視便益地勢安營固守一則防䕶闗廂軍民不使擾亂一則將官所領有馬竒兵徃來截殺有所歸宿相機行事保無他虞前項統領竒兵并管安步卒下營官就聽提督團營官計議推舉奏請定奪若見在團營内坐營官不敷計令各營并見在京閒住等項堪以委用官内推用不必拘泥常法本部通行各衙門大小官員除本部已奏行事件外但有禦敵長䇿本部智慮所不及事宜并知有應用將官俱聽明白直陳所見共濟時艱緣係整飭兵備防禦邊患重事未敢擅便等因正徳十一年七月二十日太子太保本部尚書王等具題二十二日奉聖㫖是恁所陳各項事宜便行與各該衙門官員着一一依擬舉行共圖有備無患毋得輕忽悞事為建言邊情嚴設備以安地方事王憲職方清吏司案呈奉本部送兵科抄出山西等處承宣布政使司太原府忻州儒學訓導方仕譽奏臣伏覩大明律内一􅍁若百工技藝之人應有可言之事亦許直至御前奏聞其言可用即付所司施行欽此欽遵幸逢聖明在上仁孝天成敬一日躋天下軍民莫不共仰洪休謳歌太平之盛也但邊僻相去遼逺其情或有未伸臣思知害不舉固非人臣讜忠事君之道臣係陜西西寧衛軍生切見西寧地方原係番夷雜處之地洪惟我朝太祖汎掃邊塵招集人民開荒展土始建城郭設立衛所名為西寧是以學校茶馬司倉場驛遞漸為備具於是西番進貢北敵潜踪雖係邊境之地實同腹裏之安西海出魚鹽之利山澤滋馬牛之蕃金褐事産絨貨皆多其城南有李斯牧川其城西北有雙伯羊川俱地方百里土脈肥饒甚堪種牧於此軍民樂業西番獲利所以倉場委積茶馬之政興也至正徳七年以來有强敵名喚額布勒阿爾托蘇哈喇茂三種深入侵奪前利西番每被擄掠臨城徃徃搶刼軍民不息戰争以致地方不安人民失業至今視為泛常臣在此生長毎罹此患頗知山川險阻地理深淺先年作生員之時曾言於楊總制郭兵備設立邊墻榨子畧為防備臣切思西寧地方自洪武開衛所以來原無外冦侵害今被外冦侵害為因失於不備之初仰惟朝廷身居九重不能細周邊務雖設總制巡撫離彼千里况有巡按只是一年本處雖有兵備守備暫來暫去故雖設備未免詢於鄉人而已所以隨備隨廢致使敵人深入臣受一介之職愧無涓埃之補若不悉陳設備之䇿恐敵人貪婪益甚熟知山川險阻竊窺中土盈虚致使邊疆狼狽唇亡齒寒雖勒兵馬勦殺臨患難以備敵又况西寧正南通四川松潘衛東南通歸徳千户所河州岷州西北通甘肅涼州東北通莊浪寧夏榆林直至山西三闗大同宣府為敵人來徃之路於此可以設險固守况敵人詭計百端忽來忽去統兵西征而北走北征而西走四路通達徒勞軍馬錢糧難以防敵徃徃失於不備念臣每慮邊疆被害存心非止一日惟願皇圖鞏固而軍民息戰争之勞也臣離家五年思親年老欲要奏告回家尤恐路途窵逺經遇敵人深為未便進退兩難實不得已臣因山西三闗大同敵人聲息又言於黄巡撫陳廉使陳提學欲嚴設備縁係邊情重務未敢擅便今臣親奏伏望聖明逺紹太祖之成憲大施恤患之深仁乞勅兵部議處轉行山西陜西總制撫按等官設法招集各處有罪人民發去充軍㑹同西番於雙伯羊川等處揀擇地形建立城衛以禦敵人往來之咽喉而為軍民屯田之良䇿不戰自鞏固不争自持久不惟西寧為然也凡寧夏榆林及山西三闗大同宣府四川等處於敵人出没徃來險阻去處亦須設險守固使敵人不得竊窺中國之境於以壯宗社億萬年無窮之業而國家永無西顧之憂也為此具本并地理圖親齎謹具奏聞等因奉聖㫖該部看了來説欽此欽遵抄出送司查得先為採訪邊情急為救濟事該提督軍務尚書王憲題稱近年肅州衛屯田舎餘抽選一千員名作為游兵致將屯地抛荒相應設法清勾補足軍伍将新選屯丁游兵疎放種田乞要行陜西都御史備查肅州衛節次開逃軍冊備行原籍嚴限清勾解補及行山西山東河南陜西北直𨽻大小問刑衙門今後但係發遣充軍人犯俱申各該撫按定發肅州衛充軍等因該本部議應依擬覆題奉聖㫖是准議行欽此又為議處邊備以禦外患以安地方事該巡按御史陳世輔題據整飭甘肅事務分巡西寧道副使李淮呈稱自蘭州至甘涼諸處沿邊一帶雖有墩臺縁坍塌不修或窵逺不守或設立不係𦂳要或𦂳要未曾添設雖間有挑穵壕塹而未必盡挑有築堵賊衝而未必盡築有斬截岩崖而未必盡斬合無就將附近該修該添堡寨一併踏勘估計量其多寡設立大小屯堡修復之後各於近堡去處設立小教場一所督令屯丁就彼習射仍於適中去處築打小堡挑挖壕塹置立弔板以便趨避若止有三五騎近堡瞭望的確伏兵許其協力勦捕等因該本部議擬題奉聖㫖是欽此又為修飭邊防以禦外患事該巡按御史方宜題稱蘭壯甘涼一帶倚山為險而墻塹俱有未為欲於沿邊要害去處添築營堡以藏按伏并游擊之兵等因該本部議擬題奉聖㫖是准議行欽此欽遵俱經通行總制及該鎮守官詳議參酌時勢着實舉行去後未報今該前因案呈到部看得訓導方仕譽奏稱西寧地方西南有李斯牧川西北有雙伯羊川土脈肥饒甚堪耕牧乞要議處轉行總制撫按等官設法招集各處人民有罪發去充軍於雙伯羊川擇地建立衛城以禦北兵及欲行山西三闗宣大四川等處一體設險固守一節為照設險禦敵乃安内攘外要務今本官具奏前項事與徃時各官建議大要相同其言似有可採但稱要於雙伯羊川等處建立衛城事體重大况本官原係該鎮土人中間未審有無便已損人别項情弊難遽議擬相應勘處合候命下本部移咨甘肅巡撫都御史㑹同總鎮等官參以前時各官所議查勘前項地方果係衝要相應建立城堡議處明白具奏定奪若本官别有情弊假以建言為由妄行奏擾亦就徑行查究其有罪人民編發軍伍合行山西山東河南陜西北直𨽻各該巡撫及咨都察院轉行各該巡按御史查照前例申明舉行及通行各邊巡撫都御史查議各該邊鎮如有近敵衝要地方應設城堡控馭者一體查議停當奏請施行緣係建言邊情嚴設備以安地方及奉欽依該部看了來説事理未敢擅便嘉靖十二年二月二十二日太子太保本部尚書王等具題二十四日奉聖㫖是上禦敵疏李賢近因敵使來貢索要使臣文武大臣進言遣使相答節奉聖㫖今朕嗣承大統拳拳欲富國强兵以報讐雪恥思與彼絶而卿等乃累言復欲如前遣使與之徃來非朕本心不允所請咨爾大小文武羣臣其共計議長䇿果當如何可副朕志明具以聞勿事空言圖保身家而已臣雖不與共議之列伏讀天語感激奮發忠憤之心耿耿不寐夫主憂臣辱主辱臣死仰惟皇上之志欲報讐雪恥諄諄告諭臣下共議長䇿以副其志而凡食君之禄者寧不惕然於心乎臣聞魯國有難漆室女憂之况列於侍從立於朝廷則其憂之當何如也臣惟今日禦敵長䇿惟在痛加懲創一場而已不然終不肯退然必待其自發而後應之近聞北人其志不小東收女直等處西收回回部落不但攻圍大同宣府而已又欲大舉入冦豈可坐待其至不早為取勝之䇿竊料沙漠不過中國一大郡以天下之衆不能取勝者未得其䇿故也且敵人為患自古有之其攻城掠野勝之則來敗之則去亦常事也如周之君臣豈無所用其心哉而備邊禦敵僅得中䇿秦漢而下徃徃無䇿以禦之臣以愚見度之北人所以輕侮中國者惟恃弓馬之强而已中國長䇿無他惟在避其弓馬而已臣觀今日之拒馬木止能拒馬不能避箭挨牌止能避箭不能拒馬惟有所謂戰車者既能避箭又能拒馬盖此車即漢時衛青武剛車之類青擊匈奴深入北地見單于兵陣必以武剛車自環為營兵法謂是車有巾有盖為先驅焉臣謂武剛車徒能避其弓馬今之戰車不但能避弓馬又有取勝之道取勝者何火鎗是也論中國之長無出於火鎗前代未嘗有也若用得其法敵之弓馬弗能當也近來不能以此取勝者非火鎗之過用之者不得其法耳且使火鎗者須要遮避其身以壯其膽然後發而取中不然則畏其箭來傷已手足失措雖能發鎗不暇取中臣觀車制四圍箱板内藏其人下留銃眼上開小窓長一丈五尺髙六尺五寸前後左右横排鎗頭每車前後占地五步若用車一千輛一面二百五十輛約長四里四面共十六餘里欲行則行欲止則止謂之有脚城内藏軍馬糧草輜重以此禦敵使其馬不得衝陣箭不得傷人彼若近前火銃齊發竒兵繼出彼若逺避我勢自張我威益振况此時大同宣府遼東一帶軍民不敢出城耕作城外之地俱是北人馳騁之所若此等邊城俱用此車遣將出帥可以横行於沙漠可以深入其巢穴不但用以退敵驅之出境使我軍民得以耕作營其衣食所謂長䇿莫善於此雖然此䇿固善又在將帥之志何如耳夫今之士卒猶古之士卒善用兵者伸其號令嚴其紀律以作其氣以鼓其勇使以畏威懐徳効力用命以進死為榮退生為辱雖赴水火不敢退縮如此而不取勝者臣未之信也况朝廷於將帥特彰剖封之典於士卒頻加賞勞之恩待之可謂厚矣若又不能為國家折衝禦侮搴旗斬将以雪前日之恥以伸朝廷之威此忠臣義士所以不能安其心也臣聞天道好還北人自犯邊以來肆其凶暴所向得利其志益驕中國之人被其殘毒甚矣今又不知止足欲生釁端安知不自取敗亡也哉此雖在於人事之修或亦天道之必然此臣所以拳拳以取勝之䇿為獻伏望陛下采而用之命工部各厰修造此車不為甚費所謂有備無患事乃克濟者也臣急於獻愚不暇組織成文干冒天威無任悚懼之至景泰二年五月十三日奉聖㫖所言皆是䕶國之心着管軍馬大小文武官員看了采取而行欽此論散處邉人疏李賢臣聞帝王之道在赤子黎民而覊縻絶域夫黎民而赤子親之也絶域而覊縻疏之也雖聖人一視同仁其施也必自親以及疏未有赤子不得其所而先施惠於外人者况奪赤子之食以養外人聖人忍為之哉切見京師蕃人不下萬餘較之畿民三分之一每月支俸米較之朝官亦三分之一而實支之數或全或半又倍蓰矣且以半俸言之在京指揮使正三品該俸三十五石而實支一石達官則實支十七石五斗是贍京官十七員半矣傳曰朝無幸位則食者寡此又非倖位之比也夫以有限之糧而資無限之費欲百姓富庶而倉廪充實未之有也近者連年荒旱五榖不登而國家之用則不可缺是以天下米粟水陸並進嵗入京師數百萬石而軍民竭財殫力涉寒暑冒風霜苦不勝言然後一夫得數斛米至京師者幸也若運至中途食不足衣不贍而有司曾莫之恤督責之愈急是以不暇救死徃徃枕藉而死者不可勝計而邉官坐享俸禄施施自得嗚呼既奪赤子之食以養禽獸而又驅其力使餽之赤子卒至於饑困以死而禽獸則充實厭足仁人君子所宜痛心哉若夫俸禄所以養廉也今朝官皆實闗俸米一石以一身計之其日用之費不過十日况其父母妻子乎臣以為欲其無貪不可得也備邊所以禦侮也今邊軍長居苦寒之地其所以保妻子禦饑寒者月糧而已糧不足以贍其所需欲其守死不可得也今若去此夷官臣愚以為除一害而得三利焉何則計夷官一嵗之俸不下數十萬可以全生民之命可以贍邊軍之給可以足京官之俸全生民之命則本固而邦寧矣贍邊軍之給則效死以守職矣足京官之俸則知恥以修廉矣得此三者利莫大焉臣又聞聖王之道貴乎消患於未萌易曰履霜堅氷至書曰惟幾惟康不可以不察也臣切見夷人來歸絡繹不絶朝廷授以官職足其俸禄使之久處不去混迹畿内無益之費尚不足惜又有甚者焉夫外域之人其深莫測乍臣乍叛荒忽無常彼來降者非心悦而誠服也實慕中國之利也且邉人在邉未有不自種而食自織而衣今在中國則不勞其力而坐享其有是故其來之不絶者中國誘之也誘之不衷則來之愈廣一旦邊塵有警其勢必不自安矣前世五胡之亂可不監哉是故聖人以要荒治之其來也懲而禦之不使之久處其去也守而備之不誘其復來其為社稷生民之慮至深逺也近日邊塵數警而夷官羣聚京師臣常恐懼不能安寢伏願陛下斷自宸衷為萬世長久之計乞勅兵部將夷官漸次調除天下各都司衛所彼勢既分必能各安其生不惟省國家萬萬無益之費而又消其未萌之志矣臣才識不逺偶有所見故昧死以言惟陛下采納則斯民幸甚社稷幸甚内夏外域之限一丘濬臣按唐太宗朝羣臣承詔議處突厥降者部落朝士多言欲處之河南兖豫之間顔師古欲寘之河北温彦博欲凖漢建武故事李百藥欲各即本部署為君長與竇静之議畧同惟魏徵之議援晉朝事為鍳得帝王内脩外撫之道思患豫防之心彦博謂王者之於萬物天覆地載靡有所遺是固然矣然殊方異俗必不能相安於城郭市井之間而所以處之者必有其地是固有以限之也則夫聖人之處逺人可無内外之限哉太宗從彦博議散處其民於諸州用其部曲以為宿衛數年果有結社率之反言事者多言突厥留河南不便乃詔突厥及降兵在諸州者並令渡河返其舊部太宗有朕不用魏徵言幾至狼狽之嘆由是以觀為人臣者不可不明春秋之義而議事者當援古以證今昭昭然明矣魏徵曰晉初羌羯與民雜居中國後二十餘年伊洛之間遂為氊裘之域此前事之明鑑也雖然此豈但為唐一時之鑑哉乃千萬世之永鑑也昔人有言前車覆後車戒臣嘗讀古詩有云越鳥巢南枝代馬嘶北風盖人生天地間雖有賢愚之殊而其思鄉土黨同𩔖之心則一也况彼逺人禀性絶與常人不同而不可律以中國之人情請以東晉事質之北朝之中匈奴為大匈奴之種在漢已入居中國歴漢而魏而晉已數百年矣其居中國非不久也歴代授之以官爵寛之以力役非不厚也而淵聰者自其髙曾以來皆生長中國其於故域不相聞也非一世矣一旦不幸國家有事即相呼而起以為中國大害甚者執天子而折辱之後世逺人之處中國者固未必如晉之多然涓涓不壅終為江河毫末不札将尋斧柯為世道深長慮者亦不可不防㣲杜漸也請以今日論之國初平定凡䝉古色目人散處諸州者多巳更姓易名雜處民間如一二稊稗生於丘壟禾稻之中久之固已相忘相化而亦不易以别識之也惟永樂以來徃徃以降人寘之畿甸之間使相羣聚而用其部長時有征討起以從行固亦賴其用矣然而已已之變敵犯近郊其中亦有乘機易服以刼掠平民甚至乃有為敵向道者此其巳然之效可為明鑑者也當是時臣親目擊其事而議者咸謂事平之後即與處置今又踰三十年矣而其黨𩔖處京城畿甸間者如故若謂此輩生長中國受恩厚而染化深不必他慮臣竊以為晉之事已經三朝歴數百年尚不忘其故俗而為中國禍害况今入中國未有百年而其衣服語言猶循其舊俗者乎設使未經變故尚當為之逺慮况又有已驗之實效乎天下之事最難處者莫甚於此盖今日慕華歸王之人久居内地勞效素著欲如唐太宗並令渡河反其舊部難矣不得已而思其次請凡自西北内附者除已建顯功受封爵外其餘有官者遞陞一級給與全俸無官者編入隊伍月支米比常伍加多勅兵部註撥於迤南衛所衛不過二百所不過二十官不許專城卒不許𩔖聚征操外並免雜役如此則不失安輯之道既得其用且免其患矣内夏外域之限二丘濬臣按自昔帝王用人不繫世𩔖蕃將之中如漢之金日磾唐之阿史那忠等不可謂無人然而為治之道當循其常從其多不可以其一二而廢其千百以其偶然而遂不信其常然耳何者天地生人同此天而各異其地地有不同則其生智習性自然殊别及其混處之久則不知不覺而合為一矣方當無事之秋聚居而托處聨絡而親比日染月化遂認并州為故鄉者多矣彼其感恩思報之心忠君親上之念固未嘗無非惟無異言亦無異夢指天誓日真如金石之固死生不渝矣一旦而有風塵之警疆場之變我之勢方强氣方壯根本方固彼固不敢有異志不幸而我弱彼强我負彼勝則彼將持兩端觀成敗以為去留此等之事不能無也其甚者若漢之中行説宋之郭藥師豈非後世之永鑑哉然則為今之計若何曰譬如畜獸然十虎之間而雜以一狼亦何不可之有且唐之蕃將如執矢思力出自突厥契苾何力生於鐵勒他如史大奈李謹行泉男生李多祚之倫皆能知義而鷙挺不遷為唐史所稱其尤著勲名者則有如渾瑊阿跌光顔者焉豈可以逺人而不用哉但不可如天寳之末盡用蕃而代漢耳仰惟我朝祖宗凡歸正而建功者徃徃錫之以封爵膺之以顯任惟於五府諸衛之長諸邊總戎之任則有所限制而不得以專盖有合於唐人不用蕃將為上將之意夫於任用之中而寓制馭之意非獨使上之人無所疑於後而亦俾下之人得以保其全於終也豈非萬世之良法乎聖子神孫所當遵而行之萬世而不可輕變者也名臣經濟錄卷四十一
