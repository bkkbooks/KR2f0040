body:
  text: 名臣經濟録卷三明黄訓編保治正統雷震奉天殿鴟吻奏請修省疏劉球臣謹按春秋而知君心之所感天心之所應有如響之答聲影之隨形而國家成敗興亡莫不繫之董子所謂國家失道天乃先出災害以譴告之不知自省又出怪異以警懼之此天心仁愛人君欲止其亂也人君遇天戒豈得不嚴於修省哉昔者桑榖生朝太戊修政而殷道興雉雊於鼎武丁正徳而殷邦靖旱魃為虐宣王修省而王化行皆能修省以奉天故天災之降不為其國害反為其國福也昨者雷震奉天殿鴟吻皇上素服輟朝下罪己之詔出省躬之言令羣臣各修厥職修省之意至矣固足以答天心而彌災異矣臣竊以為今日修省之所當先者其事有十其一勤聖學以正心徳自古聖哲之君動與天合而雨暘寒暑無不時若以能専志問學於一切無益之事悉屏不御所以私欲盡去天理昭著心得其正而天不違之中庸所謂致中和天地位萬物育者是也臣願皇上以古聖哲之心為心視朝之暇御經筵之日多居宫苑之時少所謂無益之事悉置意外惟數進儒臣講求至理篤盡精一之功推極修齊治平之道使學問功至理欲判然則聖心正而天心無不順矣其二親政務以總權綱夫政自己出則權不下移故太祖太宗每早朝罷及晚午二朝必進大臣於順門或便殿親與裁决庶政或事有疑則召掌機務之臣商確之而自折其𠂻所以權歸於上皇上臨御九年事體日熟願守二聖之成規復親决之故事庶幾權綱有歸而政惟一矣其三别賢否以親正士諸葛孔明曰親賢臣逺小人此先漢所以興隆也故願治之君無不樂有正大君子為之親信以贊其治而益其明惟分别之不可不精今内外之臣不能無賢不肖之分惟皇上察之於已詢之於人果賢而可親也則親之果不肖而當逺也即逺之則君子日進小人日退矣其四選禮臣以隆祀典今之太常即古之秩宗必得寅清端重明習禮典儒臣為之然後可交於神明故舜命伯夷伯夷猶讓於䕫龍誠以是職不易稱也今太常卿與少卿久缺未選無乃享祀之禮有乖宜選儒臣為之庶祀典克修矣其五嚴考覈以督吏治自三代以下省方之禮廢而郡縣不敢肆田野之民得其安者以數遣繡衣採訪等使巡行郡縣以察吏得失問民疾苦也洪武永樂間亦甞行之近来多付此任於布按二司及巡按御史其所考察徒文具爾以故吏無善政民多失業至於軍衛之臣為害尤酷誠宜選擇公明亷幹廷臣分行天下自三司郡守而下無分文武官吏俱得考察其果奸墨無狀具實黜退若有亷能仁恕治行過人亦具奏乞旌異庶人有勸懲而吏治修舉矣其六慎刑罰以彰憲典古者人君不親刑獄而悉付之理官書所謂予曰辟爾惟不辟予曰宥爾惟不宥惟厥中盖恐徇喜怒有所輕重於其間以致刑失其中也近者法司所上獄狀有奉𠡠㫖減重為輕加輕為重者法司既不執奏至於訊囚之際又多有所觀望以求希合聖意是以不能無枉臣竊以為一切刑獄宜從法司所擬設有不當調問得情則罪其原問之官其運磚納米贖罪等例亦非古法且使貪者得以幸免而亷者蒙辜宜令法司今後文武之臣除犯公罪許贖外其餘俱依律問擬則刑罰中而憲典彰矣其七罷營作以蘇人勞夫土木之工不息則天地之和有乖故春秋於勞築之事悉書以示戒者為此也今京師營作之興已五六年雖不煩民而皆役軍然軍亦國家赤子須之禦暴而赴鬭豈宜獨役而不加恤况各衙門皆已更新宜罷其工庶人力得蘇矣其八寛逋賦以憫民窮周禮荒政十二薄征其一也近者各處報水旱荒灾乞減租稅而有司多不准減或准亦徒事虚文使民不得受其實恵以致窮困流徙者日益多宜令户部遇有報荒即與勘實量減其租仍思所以安養流民使不失業庶民窮有濟矣其九息兵威以重民命夫兵凶器動必傷人不可舉動漢髙帝以武定天下非不善兵然被匈奴白登之挫終不報怨以兵興必傷人也如麓川連嵗用兵死者十七八軍資爵賞不可勝計今瘡痍未瘳又遣定西侯蔣貴總之以從緬甸受其所拘首寇思倫發借彼言果信得寇以歸不過獻諸廷磔諸市梟諸達道而已然彼挟以為功必求與立邦分有麓川地不與則致怨與之則兩夷土地人民各増其半其勢坐大將不可制是滅一麓川生二麓川也設有蹉跌則兵争無已死者必多臣見皇上每錄死囚多憫之而免令充軍仁心若此真足與天地好生之心合矣今者必欲生得一失地之竄寇而驅十餘萬無罪之人以就死地豈不有乖於好生之仁哉况寇子思機發在麓川已甞遣人来貢無悔過祈免之意若𠡠靖逺伯王驥遣人徃諭緬甸不煩動衆生致此寇只斬寇首来獻即與厚賞仍令思機𤼵盡削四面之地分與各寨新附之夷掌之許以小職使仍居麓川則兵不用而此方可寧息臣以為宜召還蔣貴并止四川湖廣貴州之兵用全數萬生靈之命其十修武備以防外患大易有曰思患而預防之盖能防患於前斯可無患於後今北敵比年入貢然遣来之人嵗増無減其包藏禍心誠所難察一旦率彼烏合之衆長驅入寇之患已深不可不預防之莫若於今閒暇之時數遣給事中御史於在京及沿邉閱督操備預使借工各厰及服役私家軍士悉就訓練仍公武舉之令以求良將定召募之法以来武勇廣屯田之規收中鹽之利以厚儲蓄庶武備無缺而外患有防凡此十者皆今日之急務所以感上天昭格致太平之福慶者意誠在此不揆愚陋昧死以言伏惟聖明裁之王振之變一李賢正統數年天下休息皆張太后之力人謂女中堯舜信然且政在臺閣委用三楊非太后不能正統初有詔凡事白于太后然後行太后命付閣下議决太監王振雖欲専而不敢也每數日太后必遣中官入閣問連日曽有何事来商確即以帖開具某日中官某以幾事来議如此施行太后乃以所白驗之或王振自斷不付閣下議者必召振責之由是終太后之世然後専王振之變二彭貫正統八年夏四月雷震奉天殿鴟吻詔求直言時宦官王振専恣士大夫側目先生劉球上疏論極謂權不可下移振怒欲嫁禍無由適修撰董璘自求為太常卿下錦衣獄而先生所言有謂太常卿必得儒者衛使馬順迎合振意誣先生與璘朋奸亦下獄竟死焉王振之變三李賢自宦官王振専權上干天象災異疊見振略不驚畏凶狠愈甚且諱言災異初浙江紹興山移于平田民吿于官不敢聞又地動白毛徧生奏之如常又陜西二處山崩壓折人家數十户一處山移有聲叫三日移數里不敢詳奏又黄河改徃東流於海渰沒人家千餘户又振宅新起於内府乾方未踰時一火而盡又南京殿宇一火而盡是夜大雨明日殿基上生荆棘二尺髙始下詔赦盜不可遏蝗不可滅天意不可回矣北敵犯邉乗機大舉聲息甚急日報數十次己已秋七月振不與大臣議挟天子率師親征明日朝罷使上宣諭出師又明日即行大臣倉卒不及言各退以待予與驗封郎中趙敏謂敵勢猖獗駕不可出白於冡宰乃約大臣上章留之不從明日駕出總兵官以下亦弗預知軍士俱無備文武大臣皆匆匆失措而隨之天時人事極不順至龍虎臺札營方一鼓即虚驚衆以為不祥明日過居庸闗又明日過懐来又二日至宣府連日非風則雨人情洶洶聲息愈急隨駕文武速上章留之振益怒俱令略陣明日當過雞鳴山衆皆危懼無不歎息怨恨者予不勝其怒與三五御史約謂今天子蒙塵六軍喪氣無不切齒於振若用一武士之力捽而碎其首於駕前數其奸權誤國之罪即遣將領兵詣大同而駕可回也欲謀於英國公不得間竟行人人自危未十日兵士已乏糧矣方秋禾稼徧野所過一空將至大同僵屍滿路敵亦開避待我深入至大同又欲北行因鎮守大同中官郭敬宻言其勢决不可行振始有回意明日班師大風至晚雷雨滿營人畜驚懼益甚又連日雷雨滿營過宣府敵追至明日於土木駐營宣府報至遣成國公率兵五萬迎有勇無謀冒入鷂兒嶺北敵於山兩翼邀阻夹攻殺之殆盡遂乗勢至土木明日已時合圍大營不敢行八月十五日也將午人馬已二日不飲水渇極掘井至二丈深無泉敵見不行退圍速傳令擡移營南行就水行未三四里敵復圍四面擊之竟無一人與鬭俱解甲去衣以待死或奔營中積疊如山幸而北人貪得利不専於殺二十餘萬人中傷居半死者三之一騾馬亦二十餘萬衣甲兵器盡為北人所得滿載而還自古北人得中國之利未有盛於此舉者北人亦自謂出於望外况乗輿為其所獲豈偶然哉王振之變四劉定之昔我太祖髙皇帝膺受天命驅逐前元遁歸朔漠其末帝托歡特穆爾既殂太祖以其甞臨天下諡為順帝可謂盛徳至仁矣順之遺𦙍據其故土仍君長逺方世次莫考惟知其地名威拉其君立于宣宗皇帝時者名布哈此稱為可汗而彼自稱不知計必仍僭其先世大號也故其臣亦悉用故時將相稱號豈非尉佗自娯子陽尊大者哉稱丞相二人曰和寧王阿魯台曰順寧王托歡甞遣使者朝貢朝廷賜以詔書亦稱之曰王其後二人相繼死而托歡之子曰額森悉有二人部屬其號為太師君臣異處常不相見布哈取額森妹以相固結今皇帝即位以来額森每嵗之冬遣人貢馬朝廷厚答金帛過元旦郊祀始遣還然久而漸桀鷔不恭徃来通事等變詐翻覆告以中國虚實額森求以其子結婣於帝室通事皆私許額森進馬為聘儀朝廷不知也答詔無許婣意額森媿怒以正統十四年七月初八日兵入塞外城堡多陷沒邉報日至遣駙馬都尉井源等四將各率兵萬人出禦之源等既行司禮監太監王振復勸上親征命太師英國公張輔太師成國公朱勇等治兵朝臣奏疏請留不允十七日駕行命郕王居守每旦於闕左門西面受羣臣謁見偕太監金英吏部尚書王佐鄺野學士曹鼐等官軍私屬共五十餘萬人出居庸闗抵宣府井源等報敗踵至上至大同暮有黒雲如繖罩營雷雨大作振惡之乃勸駕還八月十三日至狼山敵追及遣朱勇等三萬騎還戰皆敗死無隻騎回是日駕至土木日尚未晡去懐来城僅二十里欲入保懐来振輜重千餘兩在後未至留待之遂駐土木旁無水泉又當敵衝十四日欲行敵已逼不敢動兵士束手饑渇十五日敵使持書来以求和為言召曹鼐草敕與和遣二通事與敵使偕去遂移營踰塹以迴旋之間行列已亂争先奔逸勢莫能止敵騎蹂陣而入奮長刀以擊我軍大呼解甲投刃者不殺衆裸袒相蹈籍死蔽野塞川宦侍虎賁矢被體如蝟上與親兵乗馬􅊳圍不得出敵擁以去文武軍士幸免者蓬頭赤身踰山墜谷連日饑渇得達闗上敵舉我輜重惟取其金銀珠寳貴細者其實敵衆僅二萬我師死傷者過半十六日上在敵營手書遣使與懐来守將言被留且索金幣懐来城闗不可入縋而登復遣人送至京以其夜三鼔從西長安門入報十七日百官集闕下頗聞敗報私相告語愁歎驚懼出至紫陌見軍士奔歸瘡殘被體血汚狼籍然尚未知上所在也是日午遣使賫黄金珠玉衮龍段疋等物駝以八馬詣額森營請還車駕十八日皇太后召百官入集闕下命郕王權總萬幾於午門南面見百官啟事奉令施行衆皆謂行且即真矣數日内外洶洶不自保已而皇太后詔天下立皇子見深為皇太子又數日于謙等彈奏奸臣王振傾危宗社歴數其罪千萬言讀既畢王諭以自有處置謙等言振罪惡滔天今日不正典刑滅其族臣等皆死于此决不但已也因哭聲徹中外王起入内使將闔門衆擁謙等隨入太監金英殿傳令㫖且退衆奮欲捽英英懼言今籍沒振遣指揮馬順徃衆曰奸臣黨也宜遣都御史陳鎰英脫身入順前勸解辭色稍遽給事中王竑捽順首衆争毆之蹴踏撦裂頃刻而斃或就脫順鞾擊出眼血流闔門前衆愈怒求内使毛玉等二人英使捽出亦擊殺之曳三屍陳于東安門軍士猶争擊不已陳鎰等奉令㫖籍振宅并其黨彭得清内使陳宦等家執振姪錦衣衛指揮王山至反接跽于廷共唾罵之令㫖奬諭百官各歸莅事拜謝而出明日移王座入奉天門左受朝由此即真之議益急振宅在宫城内外凡數處重堂邃閣擬於宸居器服綺麗尚方不逮玉盤徑尺者十面珊瑚樹髙六七尺金銀十餘庫馬數萬疋臠山於市其族屬無少長皆斬山弟林亦為錦衣衛指揮從駕死於敵林尤凶悍姬妾百數二十二日敵擁上至大同城門不開校尉袁斌隨侍以頭觸門大叫於是廣寧伯劉安給事中孫祥知府霍瑄同出見獻蟒龍袍上以賜知院巴延特穆爾及額森弟大通漢王上曰秋稼未收軍士久饑可令刈以入城又曰敵欲歸我情偽難測且嚴為備安獻酒上酹地飲訖敵令括城中犒軍物并内官郭敬等金銀共萬餘兩来迎駕既獻敵不應二十三日上索西𤓰雪梨與敵食訖遂去過猫兒莊九十海子見蘇武廟李陵碑二十八日至黒松林額森營在焉上入營座額森拜稽首乃侍坐宰馬設燕出其妻妾四人以次奉上酒歌舞以為娛其後遂奉上居於巴延特穆爾營去額森營十里餘巴延特穆爾與妻見上如額森禮巴延特穆爾每二日獻羊七日獻牛額森每七日獻馬二人每出獵則又以其所獲野馬黄羊之數来獻二十九日皇太后命王早正大位以安國家有司擇日行禮率衆詣文華殿請王出見辭讓不允衆共言祖宗神器不可虚聖母有命不可違有㫖從請乃再拜山呼而出楊善北使事李賢正統十四年春北敵遣使二千餘人進貢馬疋報作三千權臣怒其詐減去馬價敵使回報遂失和好秋七月敵將額森等大舉入寇其鋒不可犯大同失利邉將有棄城走者權臣挟天子親出師百官上言懇留不從迫促而行至大同見敵勢猖獗始懼旋師至土木㑹兵將無鬭志人馬饑困敵衆来襲前鋒莫當追而圍之我師大潰遂獲乗輿羈於北庭八月十五日也天下聞之驚懼不寧賴今上皇帝以太弟即位尊兄為太上皇人心始安然上皇在北音問不通者一載餘有自敵營脫回者方知無恙敵亦遣使来通但譎詐不可信未可以使徃報左都御史楊善慨然欲徃上從之人皆危懼善曰上皇在北庭食君之禄者於心安乎此為臣效命之秋也遂行至其境北將額森宻遣人黠慧者田氏来迎且探其意相見云我亦中國人被羈於此因問向日土木之圍南朝兵何故解衣甲而走答曰太平日久將卒相安况此只是扈從隨駕初無號令對敵因四方無虞只營修寺宇而已何曽操習被爾敵兵陡然衝突如何不走雖然汝國幸而得勝未見為福今皇帝即位聰明英武納諫如流有一人獻䇿云北人敢入中國者只慿好馬扒山過嶺越闗而来若令一帶守邉者俱做鐵頂撅子上留一空安尖頭錐子但係人馬過的山嶺遍下錐撅来者無不中傷即從其計又一人獻䇿云如今大銅銃止用一箇石砲所以打的人少若裝鷄子大石頭一斗打去逆開數丈濶著人馬即死打中最多也從其計又一人獻䇿云廣西四川等處射虎弩弓毒藥最快若箭頭搽此毒藥一著皮肉人馬即死今從其計已取得藥来天下選了三十萬有力能射者演習曽將有罪人試驗箭去著皮就死又一人獻䇿云如今放火鎗者雖有三四層他見放了又裝藥便放馬来衝躧若做大様兩頭銃裝鐵彈子數箇搭上毒藥排於四層候馬来齊發俱打穿肚曽試驗三百步之外者皆然獻計者皆陞官加賞天下有智謀者聞知莫不皆来操練的軍馬又精銳可惜無用了來人曰如何無用曰兩家講和了何用來人聞此言潛去報知次日至營見額森問曰汝是何等官曰都御史曰兩家和好許多年今番如何減了我馬價與的段疋一疋剪為兩疋將我使臣閉在館中不放出這等計較闗防如何答曰比先汝父差使臣到我太宗宣宗皇帝前進馬不過三十餘人所討物件十與二三也無計較一向和好汝今差来使臣多至三千餘人一見皇帝每人便賞織金衣服一套雖十數嵗孩兒也一般賞賜殿上筵宴為何只是要官人面上好看臨回時又加賞宴差人送去何曽拘留或是帶来的小厮到中國為奸為盜懼怕使臣知道從小路過去或遇虎狼或投别處中國留他何用若減了馬價一節亦有縁故先次官人寄書一封著使臣王喜送與中國某人㑹喜不在誤著吳良收了進與朝廷後某人怕朝廷疑怪乃結權臣因說曰這番進馬不係正真頭目如何一般賞他以此減了馬價段疋及某人送使臣去反說吳良詭計減了意欲官人殺害吳良不想果中其計額森答曰札札北語云札札然辭也又說買鍋一節此鐵鍋出在廣東到京師萬餘里一鍋賣絹二疋使臣去買止與一疋以此爭鬬而賣鍋者閉門不賣皇帝如何得知譬如南朝人問使臣買馬價少便不肯賣豈是官人分付他来額森笑曰札札又說剪開段疋是回回人所為他將一疋剪做兩疋送與官人充做課程若不信去搜他行李好的都在額森曰者者都御史說的皆實如今事已徃都是小人說壊因見說的意思和了又曰官人為北方大將帥掌領軍馬却聴小人言語忘了大明皇帝厚恩便来殺擄人民上天好生官人好殺將無罪人民擄去有想父母妻子脫逃者拿住便剜心摘膽髙聲叫苦上天豈不聞知答曰我不曽著他殺是下頭人自殺又曰今日兩家和好如初可早出號令收回軍馬免得上天發怒降災額森笑曰札札問皇帝回去還做否答曰天位已定難再更換額森曰堯舜當初如何来答曰堯讓位於舜今日兄讓位於弟正與堯舜一般有知院巴延特穆爾說將這使臣留下再差人去問来還著這皇帝做然後放去不然不要放去額森曰當初問他要大臣来迎既差来又去問是我失信了著他迎皇帝去罷有平章昻克說汝来取皇帝將何財物来答曰若將財物来後人說官人愛錢了若空手迎去見得官人有仁義能順天道自古無這等好男子我監修史書備細寫上著萬代人稱贊額森笑曰札札都御史寫的好者次日方見太上皇帝明日額森設筵宴與上皇送行額森自彈琵琶妻妾奉酒額森曰都御史坐上皇曰太師著坐便坐對曰雖居草野不敢失君臣禮額森顧羡曰好禮數宴畢額森送上皇去明日又設筵宴與使臣送行至午後而罷又明日巴延與上皇送行又明日與使臣送行次日駕啟額森率衆頭目羅拜而别巴延特穆爾領大軍䕶送至野狐嶺痛哭别去仍命大頭目率五百騎送至京師行未數里忽有五十餘騎追来上皇失色大驚及至乃是平章昻克因送而回獵射獲一獐来獻受而去駕入闗送的頭目𦂳隨上皇不離左右至東華門住乗輿掲簾視見候入大内然後就館此事雖是額森輩累受朝廷恩恵一念之善不可遏而非使臣負忠義之氣發於言詞應對不窮有以竦動觀聴隂折兇惡而開其向善之心則彼未必不猶豫遲留以索利於再四安得一旦慨然首肯無疑以回乗輿於不可出之境前代若晉若宋數帝陷入者迎之不得秪見其辱耳嗟夫使臣若此千載一人而已建言時務疏劉定之臣觀自古以来邊疆之禍未有甚於今日者也古者如晉懐愍之陷於匈奴宋徽欽之陷於女真其時皆因邉塞外破藩鎮内潰救援不集播遷無所然後有蒙塵之禍未有若今日天下之大數十萬之衆奉上皇至於漠外委以與威拉者也至於晉宋既遭此禍之後元帝繼統髙宗嗣服皆舎棄故都偏安一隅然尚能奮既衰之勢以禦方張之敵使劉曜石勒斂於虐燄而不侵梓宫韋后因其講和而来歸未有若今日額森乗勝入宼直抵京城奉上皇以来而天下之大數十萬之衆既不能奮武以破敵又不能約和以迎駕聴其自来又聴其自去者也盖國勢之弱久矣雖非陛下所能遽使之强然豈可不思自强之術而力行之乎臣愚無知曉敢條陳所見以俟采擇其一曰戰陳臣觀昨者之戰但知閉營堅壁假托持重之說而不能出竒盡力以收勝捷之功甚至前隊敗而後隊不救左哨出而右哨不隨宜倣宋吳玠吳璘兄弟三疊陣之法前一行刀楯蹲伏以俟其陣最低第二行矛㦸大鎗立地以俟其陣稍髙後一行騎兵弓矢其陣最髙敵至得互相迭為救䕶庶幾不至狼狽又敵騎之来奔走蕩突必資刀斧制之昔郭子儀破安禄山戰騎用八千軍執長刀如牆而進韓世忠破金軍拐子馬用五百人執長斧上砍人胸下砍馬足由此言之刀斧之揮霍便捷優於火鎗之遲緩趑趄也其二曰守禦昨者紫荆居庸等闗既不禦敵之入又不能遏敵之出名為闗塞實則坦途敵騎之来若長風之驅雲霧豁然無所底礙盖兵士寡弱亭障缺敗蹊隧疎陋非朝夕之積也今宜増兵士繕亭障塞蹊隧如古者畫境分守之時因其陸名則縱横掘塹名為地網因其水泉則遇處停蓄號曰水櫃或多植榆栁以制奔突或多招土兵以助官軍此皆古所甞為必有效驗今武夫悍將多云古不可泥然商之賢相不云乎事不師古以克永世匪說攸聞此臣老生腐儒之所信其言者也其三曰通使夫通使之職欲其内藴忠臣之心外有言語之才昔漢文帝遣陸賈使南越用能屈趙佗之膝以去僭號宋仁宗遣富弼使契丹用能結華夷之盟以息戰争若賈弼者所為藴忠信而能言語者也奈何徃時専以譯人駔夫為之哉今後宜用文武賢臣備正使之選令通敏者為之介紹錄其動静言語纎悉必載回日聞奏庶乎不至招釁起戎矣其四曰降人徃年以来降人皆留居京師授以官職給以全俸夫非我族類其心必異故昨者或衝破闗塞奔歸故土或乗伺機便寇掠畿甸今宜乗大兵聚集之際遷徙其衆逺居南土禁其種落不許自相婚媾變其衣服不許仍遵舊俗或以為兵使與中國之兵部伍相錯以牽制之或以為民使與中國之民里甲相離以染化之况又省全俸之給減漕輓之勞臣甞於上皇時言之智謀淺短不足仰動天聴然今者之禍可監矣其五曰練兵夫天下之民農夫出粟紅女出布而輸納公上者多以養兵也天下之兵受粟於倉受布於庫而練習武藝者所以為國也向者兵士受粟布於公門而納月錢於私室於是乎手不習攻伐擊刺之法足不習坐作進退之宜目不識旗幟之色耳不聞金鼓之節但見其或負販貨財以為商或習學技藝以為工而工商之所得僅足以補月錢之費盖民之膏血兵之氣力皆變而為金銀以恵奸宄一旦率以臨敵如驅牛羊以當虎狼幾何其不敗哉今宜痛革月錢之弊作新操練之政將帥有踵舊弊而不改者誅之可也怠新政而不務者降之可也士卒練習既久拔其勇銳者汰其罷軟者糧賞有厚薄費用可節縮矣其六曰撫民夫養兵之費既出於民而兵敗之禍民蒙其害始也出費而終也蒙害民其何辜乎况守令之刻削於民猶將帥之刻削於兵也今宜於常年考覈之所黜落三年朝覲之所彈糾者悉加嚴罰而不寛縱至如大臣舉官有犯賘私者必連及舉主夫恩不加於貪吏則貪者寡矣罰不貸於舉主則主者慎矣民豈不蒙其恵乎民安而邦本固雖敵人外侵而邦本内固此保國永世之良圖也豈可以目前不暇而謂之迂緩乎其七曰選將夫將材罕得天之生將材豈専在於將門乎販繒屠狗之夫而漢賴以王被褐捫虱之人而秦賴以伯至於趙括者豈非趙奢之子然殞首於白起王離者豈非王翦之孫然繫頸於項羽今國家用將有出於將門之中者若石亨楊洪是也有出於將門之外者若于謙楊善是也然將能知將宜令其各舉所知不拘門地或以勇力或以計䇿其餘公卿侍從亦令各舉所知量能而任之庶乎拔十得五聞一知二將材由此而充矣其八曰賞罰夫有兵將而無賞罰猶無兵將也將非賞罰無以將其兵君非賞罰無以將其將昨者遣石亨等將兵禦敵未聞其摧陷敵兵迎回鑾輅但迭為勝負互相殺傷而已雖不足罰亦不足賞也今亨自伯爵陞為侯爵謙由二品陞為一品天下之人未聞其功而但見其賞豈不怠忠臣義士之心乎昔漢之圖恢復也所恃者諸葛亮宋之圖恢復也所恃者張浚其人皆忠義素著功業久立及至街亭之戰不勝而亮降丞相之號符離之役未捷而浚解都督之職待收後效乃復前官今宜使亨等但居舊職勿受新陞以崇亷耻之節以作敵愾之氣他日勛名振而爵賞加亦何晚乎夫既與而不忍奪者姑息之政也既進而不肯退者患失之心也上不行姑息之政下不懐患失之心則治平可計日而望矣至於昨有臨陣而死者有棄闗而生者亦宜急加賞罰庶幾恩及卑賤而人知所勸法行貴近而人知所戒矣其九曰議政向者御史建議欲令大臣入内議政事寢不行夫人主當總攬權綱親决機務而大裘之領不可以倒絜太阿之柄不可以倒持凡政事有早朝未及决者宜日御便殿使近臣侍於側大臣奏於前言官察其邪正而加糾彈史官書其言動以示勸懲君臣之間詢謀疇咨互相可否以求至當此前代故事祖宗成法也陛下遵而行之則决於萬幾也益以熟而察於百官也益以明聖政益新天命益隆矣若乃仍如前日每事但以奏本進入㫖意批出臣恐偏聴生奸獨任成亂治化無由以底於雍熈也凡此皆其見於政治者而尤必以徳學為本臣請得終言之其十曰徳學夫人主之徳欲其知如日月之明則可以察枉直仁如天地之大則可以覆羣生勇如雷霆之斷則可以收威柄故中庸曰知仁勇三者天下之達徳也而宋賢相司馬光之告其君仁宗英宗神宗皆以仁明武為言光之所謂仁明武即中庸之謂知仁勇也然是豈可以易而能哉必本於學矣成湯之聖學於伊尹武王之聖訪於箕子曽謂聖帝明王全由天資不假學力哉然五經諸史之博儒生且未易徧觀而况於人主臣謂經莫要於尚書春秋史莫正於通鑑綱目陛下宜留心焉不宜觀其善而避其惡也夫善惡兼而觀之則於為君也既知禹湯文武之所以興又知桀紂幽厲之所以替而趨避審矣於馭内臣也既知有吕疆張承業之忠又知有仇士良陳𢎞志之惡於馭外臣也既知有蕭曹房杜之良又知有李林甫楊國忠之奸而用舎當以其為知仁勇之助豈不大哉茍徒若前日使儒臣誦其善而避其惡是猶恐道路之有陷阱閉目而不視恐魚肉之有餒腐擁鼻而不嗅其不至於誤食而嘔噦㝠行而顛躓者少矣伏惟陛下以不世出之聖當大有為之時誠能本於徳學以見於政治則天下之大尚如金之完固而未缺臣見國勢可强仇耻可雪兄弟之恩可全祖宗之治可復而何難哉臣干冒天威不勝戰懼伏惟擇其言而赦其罪幸甚于謙憐忠錄夏時正正統己已敵人額森入獨石宣府一帶及秋特猖獗甚六師親征公與尚書鄺埜力言但當嚴𠡠宣府總兵楊洪慎防固守隨方應禦不煩勤逺不聴吏部大小臣合詞請留亦不聴遂行是年八月三日也其望師駐狼山土木玩忽不為備敵騎奄至王師敗績死者填委溝壑為滿英宗皇帝北狩逺去宣府懐来等衛僅保餘息臨邉城堡奔避為空京師大震公時居留聞報大慟念惟軍旅自兹方興司馬掌邦政我其不任誰當我任一切攬而有之倦忘寢而飢忘食聖烈慈夀皇太后聞知公名進尚書固辭始就職是時三營精銳盡簡征行留者老弱弊敗京師百萬衆聚時事情百出公先事預防攝權制變運用一心萬目齊視倚為安危輕重景泰帝時居郕邸權宜監國公啟遣官亟先清理選補京衛官軍四出招募軍士舎餘義勇民壯僉㸃民丁替換京漕江北衛分官軍俱𨽻三營操備紫荆等處闗口奏保楊洪等督操三營都御史軒輗等巡撫浙江等處拊循防禦顧集民間執鍛助兵仗局作憲廟春秋方富正位東宫景泰帝尋以廷臣翊戴合詞勸進遙尊英廟為太上皇帝改明年為景泰元年天下始知有君南北道通朝貢畢来戰守之具一月完備士氣復振人心乃定朝綱為肅法令乃行太監喜寧本夷種也土木敗降額森因為其用盡以我細大告之遂為嚮導奉英廟趨紫荆闗京師戒嚴恟恟無固志徃徃挈家南奔又侍講徐珵妄言占象倡議南遷事傳聞六宫而二三大臣復依違其間公為慟哭於廷抗言京師天下根本宗廟山陵社稷咸在百官萬姓帑藏倉儲咸在此處不守何處可守若一動則大勢盡去宋南渡之事可監矣不幸俱死於此一步不得離比太監金英特是公言堅持固守之議公奏簡親信及戚畹重臣環衛宫闕守九門各以强幹有志節給事中等官王竑等監之盡令郭外攜挈入城仍行敵所經由堅壁清野固守勿戰公乃請率先將士躬擐甲冑軍於徳勝門外閉闔城門誓言必死泣諭三軍曉以國恩當報忠義難得事幾一失禍患立至生不如死人人感奮勇氣百倍十月之朔額森入紫荆闗傳言送駕還京長驅直前其先至者星散前突我軍堅不為動知我有備稍自引却額森次至城下對我壘而陳英廟在額森所敵覘我整暇叵測不敢有加我亦不敢向敵輕放一矢朝廷日遣使至額森壘問安喜寧嗾額森邀我六七大臣出城議和奉駕回京邀我議和等物百萬萬計乃其狡獝本心將以媒蘖釁端責我以所難從也廷議依違莫决禮部使来問公公曰今日止知有軍旅事他非所敢聞喜寧每隨問安者入城中間秘莫之知但見其奉英廟弗懈益䖍而額森則日望議和至所計在金帛也故自次城下至是凡七日為既望我諜益審奉駕就寛燥地與其壘離隔為逺乃砲擊其壘敵死砲下萬計額森大沮宵遁復奉駕以偕我軍奮欲乘之言者不欲邀擊窮追乃止逐出境外縱自去初紫荆失守公集議所以禦之之䇿皆曰額森善戰而我士新集且脆弱公曰聞善戰不若不戰而屈人也乃一以忠義干城卒致一矢不遺敵衆自退且於其去有可乗而縱不之追彼其㝠頑無覺也歟否焉寧無心恱誠服也歟平居天柱地維之位駢列公方外来不期月適罹多難獨能煉補以無傾天真純祐儲以待之非偶然也進少保總督三營固辭如初益閉門謝客口略不言有言今日宋李綱大不能及公曰四郊多壘卿大夫之耻城下但不盟耳今惟有問罪還復車駕爾餘皆非所宜言乃即計授都督楊俊等擒獲喜寧伏誅方懸重賞行搆額森身動訓閱養威畜銳刻日大舉期在得志適若有所監格額森悔過效順請自奉駕還京言不及他事久持不下既下廷議多言敵情譎詐難信公曰此天意也君臣大義兄弟至親正當速遣使奉迎以承天心若果額森言而無信則我為有詞矣衆議乃决明年英廟還京衆歸公一言之重名臣經濟錄卷三
