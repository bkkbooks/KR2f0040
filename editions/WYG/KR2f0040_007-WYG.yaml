body:
  text: 名臣經濟錄卷七明黄訓編保治𢎞治中災異陳言疏倪岳先准禮部咨開𢎞治十一年十月二十日題内開貴州安南等處失火燒燬軍民房屋共一千八百餘家延燔城樓公廨等屋共六十餘間燒死官軍舎餘人等計一百餘名直𨽻夀州并河南府等處風雨氷雹傾倒房屋舗舎共三百餘間渰倒軍人屋宇三十餘家及垜口二處計三百餘丈鄉村麥苗孳畜江上大小船隻多為弊壊或地震不次而廬舎為之揺動或天鼓連響而人心為之危懼而蘇杭等處潮河池泖諸水寂無風潮而翻騰沸湧甚者雍府新創迅雷震之清寧宫為太皇太后祗受天福之所為陛下隆極孝養之地乃今燒燬殆盡尤為切近之災要行兩京文武羣臣洗心滌慮思過省愆務盡交修之誠以罄應天之實等因奉聖㫖是欽此續准禮部咨𢎞治十一年十月二十五日欽奉勅諭文武羣臣朕惟天道人事相為流通感應之機捷於影響甚可畏也邇者上天戒示災異頻仍乃𢎞治十一年十月十五日清寧宫災中夜達旦朕心驚懼寢食靡寧慮有愆違上干和氣循省數日莫究所由兹特齋心竭誠遣官祭告天地太廟社稷山川爾文武羣臣有官守言責皆與朕共天職者宜各省躬思咎去垢滌汙殫心效力毋得因循怠玩若罔聞知凡百司政弊奸貪顯跡及一應軍民利病皆直切指陳無有所隱以助朕勵精之治荅上天仁愛之心綿國家億萬載隆長之祚欽哉故諭欽此謄黄賫捧前來於本年十一月十八日接至南京禮部通行各衙門欽遵外臣等聞命戰兢罔知攸措仰惟聖明臨御兢業萬幾日御經筵精求理道誠宜和氣丕應嘉瑞畢臻夫何比年以来災異頻繁聞見驚駭及兹清寧之災尤為非常之變自逺聞之已倍驚皇况惟聖心誠孝方隆奉養之禮當此變生倉卒寧免震驚之虞此臣等悚懼之心夙夜為之靡寧復念臣等各以菲才謬當重任不能勉修職業以仰答恩休徒爾坐縻廩祿以召致罪戾上干天意職此之由汗靦倍増伏俟罷黜過承恩詔但令修省除已望闕謝恩省躬思咎痛加湔滌外竊惟聖諭所云天道人事相為流通感應之機捷於影響甚可畏也於此誠足以仰窺聖明深達天人之理克究災異之端者矣然猶屈己求言使得指陳利病此蓋古帝王不自滿假詢于芻蕘之盛心也夫欲思以回天意必當有以順民心欲有以順民心必當有以寛民力是以營繕頻興民力所由以困征斂横出民力所由以竭賞罰冗濫則無功者錄民何視以勸用舎顛倒則不肖者進民何藉以安蓋民心嗟怨之日深則天意譴告之必至以此厯推致災之由庶可少盡弭災之實臣等各攄膚􅦓之見少效涓埃之益凡二十八事畫一上聞此皆職守所司耳目所及伏惟聖明俯垂矜納其於聖政或有少補犬馬惓惓之私不勝至願縁係災異陳言事理開坐㑹本專差辦事官羅憲賫捧謹題請㫖一推行聖學近者伏聞聖上勤御經筵日講不輟講明聖賢之格言圖惟治平之要道緝熈之功啟沃之益於是為大三代之治端在今日宗社之幸生民之幸也臣等竊惟朝廷日講之制必以宋儒真徳秀所著大學衍義次第進講書云知之非艱行之惟艱讀其書而不求其意亦無益也考之衍義所載首言格物致知之要必以帝王知人之事為先其於辨人材之論尤惓惓焉蓋任賢圖治乃人君之職故所任之得失賢否則天下治亂安危係之非細故也伏望聖明因夫今日所講之書驗之古人已行之事獨運於聖心之㣲以謹夫用人之道於凡内外文武之臣左右前後之職其間果有忠實不欺淳謹可托特立而不為黨與之私勤敏而足為治理之助者俯推委任之誠而不輕為揺奪曲施保全之恩而不易為間阻其有立心私邪制行奸詭執左道以變亂倡異端以熒惑以土木營繕為奉承以禱祠祈禳為忠愛費財而不顧勞民而不恤以至依阿循黙以茍容而不知竊位之恥奔競冒昧以希進而不知枉已之辱若是者皆足以僨事而害政違天而虐民所宜逆逐而不留拒絶而逺去庶朝廷為之永清天意為之昭格災害可弭政務可修而太平之治必在此矣一豫節親藩竊惟自古藩國之設主於屏翰天朝强本固宗之道也太祖髙皇帝福徳髙厚本支衆多當時慈愛均一是以恩禮交隆列聖繼統天潢繁衍封建之盛殆遍天下但比年以來衡州建昌等處疊遭雷震變異非常此必藩國營繕太盛天戒昭然示警以至於今災生壼掖事理相闗誠非偶然夫天下之人民皆朝廷之赤子也親王之國車船人夫之費分所當得未敢盡言奈何承奉等官不知仰體朝廷親親之意一離通州便作威福剋害夫役凌虐有司經過地方勢同刼奪甚者方面官員痛遭斥辱不豫有以節制之則徃過來續積弊益甚民將不堪將來必大有仰厪聖慮者矣天下之田土皆朝廷之租税也親王治國宫室祿米之設巳有定制經費有餘奈何承奉等官不知仰體朝廷親親之意一至本國遂起貪心占民房屋奪民田土輒奏朝廷誤䝉准賜甚者侵越市鎮强取税錢不豫有以節制之則田土有限藩府日増國賦日削將來必大有仰厪聖慮者矣夫言之於無事之日不足信言之於有事之後不及行是故進言之道自古難之伏願皇上明勅承奉等官務要輔王以正仍逐一開示條件嚴加禁防之國之際不許生事擾人在國之時不許輒行奏討如有違越者悉如近該欽奉聖㫖事意許巡撫巡按官員指陳實跡叅提首事之人眀正其罪更置官屬庶幾宗固本强民安物妥而天意可回矣一懲究欺弊臣等竊惟人臣事君以不欺為本况履霜堅氷其來有漸為臣之職誠不可忽其漸而涉於欺也且明者見於亂之未形智者察於幾之未動豈可於所已形巳動之事而圖為掩匿營護以茍目前之安乎比年以來相習成風如雲南之木邦貴州之清匀江西之南贑以至東西二廣之域西北三邊之地南北兩畿之間侵犯者不為剋復之計盜竊者不聞勦捕之䇿甚者殺良民以為賊假敗績以為功捷奏率為虚聲掩䕶遂為良筭任其事者展轉退託以俟遷官為其民者流離虐害無所控訴夫隄防以障水小有罅隙亟宜築塞及其横潰為力難矣唐宋之季率因奸欺之臣迷誤國事馴致禍亂不可不慮也今大江南北歲豐而盜作糴賤而民貧武備空虚災異稠疊有識於此不無寒心伏望皇上彰離照之明奮乾剛之斷勅該部查勘前項各處如是地方未靖而言巳遂平定邊境未服而言巳聽撫安盜賊隱而不聞匿而不捕聲息蔽而不舉言而不實虚呈功捷冒請陞賞者一一從公究理以懲欺蔽庶幾將來人知所警早為徙薪之謀不貽噬臍之悔矣一甦息貧窮臣竊惟事有因革理貴變通庶弊蠧可以袪除而貧窮有所甦息也照得南京官軍騎操馬疋常年倒死數多俱照在京事例出辦樁錢并朋合錢預備買補倒死馬疋隊伍固所宜然不曽倒死馬疋何為一槩出辦後該兵部議處諒將收到草塲地畆銀兩每疋補助三兩但買補之際多被勢要之人故將老病馬疋加意喂養乗機貨賣以致舊者買補不前新者倒死相繼負累管操官員住支俸給養贍猶且不週戰守何由可望及照南京各衙快船先年不曽定為則例均勻派撥有一衛五七隻十數隻者多至三四十隻者甚者全無一隻以致船隻多寡不一所以衛分勞逸不均及其蔽壊打造之際初年物料俱係工部出辦近年奏定官出六分自備四分官出者不以時給打造不前自備者負累軍餘出辦貧苦百端交收在官又被衛所官員侵欺花費及用造船毫釐無措以致船隻無由完備軍餘辦價不已似此事理之弊蠧不為變通則官軍之貧窮何由甦息伏望皇上念祖宗根本之地憫官軍貧窮之苦特勅該部不為常例通行南京兵部各委公正廉能官一員查勘各營倒死馬疋自𢎞治十一年以前應該買補共若干疋各營收貯出辦樁錢共若干兩每疋該銀十兩止該買補若干疋其無價買補者尚有若干疋就將兵部每年原收馬草等項地畆銀兩照數支給通將二項銀兩轉解兵部發付太僕寺收貯於南京太僕寺俵過該送太僕寺備用馬疋照數闗領官軍騎操仍行管操官員不時㸃閘務要用心餧養不致瘦損以後遇有倒死樁錢朋合錢積至五兩兵部草塲銀補助五兩悉照前例解納兊領馬疋騎操庶得軍免買補之苦民免解送之勞實為兩便其管操官員該住俸糧之日乞照屯田事例止住一半但少存其養廉之具庶可責其敵愾之心及查勘各衛打造修理未完快船共若干隻見領料辦價打造者若干隻巳領杉篙等料花費無存者若干隻人船俱無下落者若干隻每船通計該用銀若干兩各以料價二項分數多寡計筭見有而不足者應該補足花費而無存者應該全給通將侵欺官員查出挐送法司照例從重問罪監追前價其不足之數亦將兵部每年原收馬草塲等項地畆銀兩照數那借支給應用并行南京工部即將該給物料作急支給除人船俱無下落者開豁不行打造外其餘船隻督併打造完備通將各衛原造文冊查勘各衛軍餘數目船隻多寡除十隻以下及人船相應者不動外其二十隻以下減去二分二十隻以上者減去三分均派無船及人多船少衛分撐駕仍行管船官員不時㸃閘務要用心愛護依時修艌以後仍照例十五年以外不堪撐駕者官給全料十年以裏損壊者責與本船夫甲備料修理如此庶貧窮可以甦息差役亦得均停人心悦而天意可回矣一修復常平臣竊惟農無常稔之年國有備荒之政求之古人之所已行蓋惟常平獨為盡善是以成化初年南京守備官員因見歲凶民饑莫能拯救乃倣古常平之意奏將沒官房屋改為倉厫名曰常平銓官置吏以司出納每歲將蘇松等運到糧米免其上倉將各衛官軍三箇月俸糧臨船兊支省出加耗脚價每歲約有十萬餘石運赴常平倉交納遇歲凶米貴減價糶賣銀錢收貯官庫歳豐米賤増價糴買糧米收貯本倉良法美意與古實同後因本倉積米數多南京户部奏將作正支放常平之法遂廢倉厫雖存傾圯過半當時費用財力即今棄之可惜况京師之大略無備荒之儲豈宜然哉且往年米價湧貴至八九錢一石民皆缺食盜竊紛起若使官倉有米能糶數十萬於市則米不湧貴民饑可療矣如今年米價極賤至二三錢一石民賣輕賫虧損至極若使官庫有銀能糴數十萬於倉則米不狼籍農力可蘇矣奈何坐視米價貴賤之機莫救農末交病之苦豈宜然也如䝉乞勅該部查照先年奏設常平事例再為斟酌倉厫損壊諒行修理仍自𢎞治十二年為始浙江等布政司蘇松等府該運南京糧米照例三箇月臨船兑支將所省耗米脚價或一年者或二年者運赴本倉上納以為常平之本行令該管官員隨時米價貴賤依擬糶糴若本倉糧米積至四五十萬石恐至陳浥不堪方准作正支放就將本年臨船兑支所省糧米照依前數運納以為常平之本務使新舊相更貴賤相濟倉有餘糧歲荒無缺食之憂市有平價年豐無傷農之慮實為便益一類解文冊臣竊惟政以靜為善令以簡為良則下人易於遵行臨事免於廢擾也照得南京各衛所軍伍俱自永樂年間分調所存者十無三四人少多差乃倍於舊且如一年之間該造文冊無慮二十餘起攅寫之勞裒歛之費所不可言近雖稍減而勞人費事尚有存者如每歲春季各衛將舊年已支錢糧數目攅造文冊名為歲用及至冬季又將次年該支錢糧數目攅造文冊名為歲支俱要送官赴京送繳户部南京共該五十餘衛每衛一年差官二次約計一百餘員造冊之際費擾可知至於往迴路給皆從槩衛貼辦侵漁科歛日益歲増衛所憊困何由甦息况所支用錢糧俱係南京户部管辦造冊查對理亦宜然繳送户部無大闗係如䝉乞勅該部將前項文冊行令各衛依時攅造每年二次通送南京户部查對明白待有本部公差官員通賫類繳户部庶官員免跋涉之勞衛所省科歛之弊亦省事便人之一端也一併省重複臣竊惟恤民莫大於惜財惜財莫先於省事盖事多則費廣財費則民窮乃理之必然者也照得南京内府各庫先因管庫官員作弊偷盜官物年乆一旦以火遮飾不惟罪得茍免又且勞費盖造今復奏行工部每年春秋二季用工修理任從該庫破調損壊滲漏去處動用物料人匠其費不貲仰惟朝廷於凡宫殿宗廟社稷等處事體最為重大俱無一年二季修理之例何獨南京各庫重複勞費無有窮已再照成化年間欽差内官二員前來南京督理織造開局置機勞民動衆拘役之艱難供億之騷擾月益日増民不堪命𢎞治初年已䝉聖明特詔停止内官取回中外臣民不勝慶幸近年又復差遣内官二員前來仍前織造縁所織造紵絲紗羅果係上供九重内奉三宫之用雖官司竭營辦之勤百姓極科裒之重分所宜然不敢辭免但所織造不過用充内外官員不時賞賜而已其各布政司南直𨽻各府歲造織内酌量改造進用亦無不可臣等已於𢎞治十年四月内因遇災異陳言㑹議奏請乞暫取回未䝉俞允忽於今年十月又復䝉差南京内官監太監鄭山亦於前項織造去處管理織造縁係挨輪年分接續幹辦所理既無別事委任何必人多况逐日供給之費各項役使之人徒増一倍民實不堪似此事闗一體差至三人重複勞費無有窮已如䝉伏望聖明俯恤民隱大惜財用事干重複少賜併省特勅該部通行南京工部將内府各庫一年二季修理事理暫且停止果有滲漏損壊之日聽令照例具奏計勘明白方許興工其新添織造内官乞賜革罷所織叚疋等項併於先差内官管理如此庶事稍省而民心可安民少安則天意可回矣一減省供應照得南京光祿寺遞年醃臘活鹿一百五十一隻天鵝四百六十三隻俱係直𨽻安慶等府湖廣等布政司地方採捕解納有起自三四千里路來者有起自一二千里路來者俱候小雪節解到係是山澤之性沿途餧養艱難多致瘦損到此之日依期宰醃用鹽太少天熱生蟲用鹽太多苦醎無味又要打造木櫃裝盛起撥馬快船隻遞送及至到京不堪供應及本寺做造菜臺俱於每年二月分起手採取曬晾做造每三日一換㕑子餘丁一百名動經四五十日方纔完備起撥馬快船隻差撥經手官㕑解送在途遷延日乆停放過時多有變味不堪供應竊照活鹿天鵝菜臺北方所產處處有之非比別項時鮮北方所無者依時上進豈敢缺悮况做造不法進用過時以致味變不堪供應而小民之採納艱難道路之應付騷擾有費無益莫此為甚如䝉乞勅該部議擬合無每鹿一隻徵價二兩天鵝一隻徵價伍錢行令各司府照數煎銷成錠差人解部轉發光祿寺收貯凡遇缺用天鵝活鹿照依時價收買供應其做造菜臺暫且停止實為便益一署掌印信臣竊惟體統正則下有法守委任定則事易遵行照得南京六部都察院通政司大理寺堂上官近年雖設正佐二員偶遇事故或有正佐官兩缺之時堂上印信不免暫委本部郎中等官署掌縁委官與各屬官分係同僚不相統攝凡諸行事誰肯聽從體統不正事難辦理又况各官賢否不一錢糧刑名等件出入議擬之間乗此間隙而輕重其心高下其手者未敢保其必無廢務妨公大率由此欲照在京事例奏請差官署掌又往來動經數月愈至悮事合無今後遇有前項衙門缺官掌印之時行移南京吏部如吏户禮兵工各部通政司有缺就於各衙門堂上官内輪流署掌三法司有缺就將三法司堂上官内輪流署掌如此則體統不紊上下相安公道行而衆務舉矣一稽核名實臣竊惟天下之人才其養也皆以學校其進也皆以科貢入官之後考績幽明之說雖同循名稽實之法獨異今州縣之官發身進士者或三年四年有旌擢内遷之典而非出進士者則寥寥無聞夫十室之邑必有忠信天之降才未必爾殊其間豈無立志操心奉公守法思欲與科第齊者惟是激勸之典既無及巳而考績之法又復頻仍不免於計日謀身雖妨政害民亦不暇恤其出進士者固多顧惜名器然其間亦豈無肆志妄為者惟是已之地位既殊人之相待又異雖有瘝官曠職妨政害民者人亦防其後達曲賜優容夫作人之道全在鼔舞變化而考績之説同一黜陟幽明今鼓舞之法既獨行於進士一科而考績之法又獨嚴於發身舉人科貢者遂使有志者變為無志欲效者不獲自效狥名失實莫此為甚如䝉乞勅該部今後州縣親民之官不必專論其出身惟當稽核其名實其奉公守法者雖非科目亦加旌擢肆志妄為者雖出科目亦不茍容公其一視之仁使人皆知自奮時其考察之令使人皆得自效凡巡撫巡按監臨等官具掲帖報賢否者不得以奉承之能否而輕為髙下操予奪黜陟之柄不得狥一言之先入而遂廢咨詢如欲薦一人必使如虞廷所謂載采采退一人必使如明詔所謂有指陳務俾賢者得乆任以自效不賢者不徼幸以茍容將見公道大昭名實不紊而人皆䝉其恵矣一均平銓選臣竊惟自古建官惟能立賢無方初無内外逺近親疎之別果賢能邪雖外而疎逺在所必取果不肖邪雖内而親近在所必棄我太祖高皇帝定鼎金陵稽古建官著為定制自後肇建北京改為南京然而諸司之建置不移各官之職任如故誠立萬年不拔之良法也奈何近年以来兩京官職出身既同除授不異及其轉遷之際乃相懸絶且如在京科道部屬官員在外則陞僉事叅議知府副使叅政在内陞太僕大理寺少卿寺丞通政司叅議今南京科道部屬官員止陞僉事知府亦且淹至七八年之乆而後得間有一二陞為光祿少卿通政叅議按察司副使者其他職事稍尊絶無可望以致各官退有後言以為兩京官員均為京職均效勞勩若使其不肖者降黜不異則賢能者遷陞宜同今乃秦越異視爾我隔藩况南京祖宗根本重地又非其他疎逺之比借曰兩京官員多寡之異大率不出三分之一彼處其二此獨不得與其一乎如䝉乞勅該部今後南京官員少均遷叙其間果係賢能之人不惜處以稍尊之職庶人心無不平之嘆而銓選得均平之理矣一照例附選臣竊惟銓選固貴均平淹滯尤當疏導則人無南北觖望之心事得彼此歸一之善也照得兩京國子監監生俱䝉朝廷作養其分撥各衙門厯事歲月皆同而附選之先後獨異查得在京各衙門厯事監生三箇月考勤之後即得奏行吏部附名選簿附選之後仍令厯事一年聽候挨次取用今南京各衙門厯事監生三月考勤之後直至厯滿方得附選中間或遇丁憂事故等項回還原籍服滿方來補歴淹滯歲月駸循衰老其為抑鬱不言可知夫以三月同一考勤而附選之期南之視北乃差至一年之乆雖稱南北人數多寡不同亦不宜懸絶至是合無今後南監監生厯事考勤之後一照在京事例聽從南京吏部先將名籍奏行吏部附選照舊例厯滿一年聴候挨次取用庶事體得以歸一而人才可免淹滯矣一湔滌過名臣竊惟天地生成之徳不以逺近而殊則朝廷造就之恩亦不以逺近而異况南北皆謂之京師大小均謂之京職而祖宗根本之地尤所當厚者乎伏覩每歲十二月内節該欽奉勅諭禮部三法司兹者春陽肇序萬物咸亨在京文武羣臣除賍罪外有犯公私過名記録在官者悉與湔除俾圖自新欽此欽遵外夫人非聖賢孰能無過一蒙恩詔咸得自新去瑕滌穢不致廢棄孰不感激奮發爭圖報效惟獨南京各衙門大小官員授職皆同釐務無異或有纎介之過不䝉湔滌之恩其間一考稱職官員無由請封六年署職官員無由授實九年通考遂礙敘遷仕途有此躭悮中心未免拂鬱近該禮部題十月二十五日欽奉勅諭文武羣臣欽此欽遵謄黄賫送在京文武衙門欽遵外今照南京係祖宗根本重地其文武衙門與在京事例相同合無謄黄轉行兵部差官馳驛賫捧前去各該衙門一體欽遵知㑹等因奉聖㫖是欽此伏惟日月之明容光必照雨露之施無逺弗及綸紼之恩豈有間於逺近者伏望聖明體孔子赦小過之言念武王不忘逺之意特勅禮部如遇年終降勅湔除罪名之日乞令照依前例謄黄差人賫捧前來南京各衙門有過官員一體湔除俾圖自新庶得恩典均沾人心感發實為便益一疏通鬱滯臣竊惟和氣致祥乖氣召異自然之理也昔匹婦含寃三年亢旱匹夫結憤六月飛霜天人之理相為流通則夫人有鬱憤之情寧不有傷和氣而召災變乎照得近嵗以來文職官員多有縁事降調或以陳言或因小過或為豪右而排斥或被誣奏而陷害吹毛以求其疵洗垢而索其瘢於其迹雖若可罪原其心亦無非欲攄誠悃少圖萬一之報耳然一䝉降謫乆未收復則其鬱滯豈直匹夫匹婦之比也伏望聖恩憫人才之有用念過失之可原乞勅吏部通將𢎞治六年以後欽䝉降調官員查照原擬應該復職者仍令復職以沛曠蕩之恩以全公平之體如此則凡在臣工豈不倍増感激之私圖盡報稱之力鬱氣消而和氣臻矣一寛免違限查得見行事例舉人告入監并監生願就教職考不中復監者俱除水程四十五日外仍除三箇月若患病有堪信文憑仍除三箇月過期者送問除遵行外夫謂之舉人入監指新未入監者而言若舊中已經坐監者不在其數謂之監生復監者指舊貢巳入監者而言若新貢未曽入監者不在其數今告入監舉人不分舊中已曽坐監及願就教職考不中復監監生不分新貢未曽入監但有過期一槩送問似與前例不合及查得除授官員赴任過違憑限半年之上方送問罪其舉人監生止許四月未免過嚴况各生違限到監坐班月日虚曠本監自與查算不得出身此與官員赴任不同而各生多係貧難逺方之人所帶盤纒有限一經送問贖罪價銀無從措辦尤為窘迫如䝉乞勅禮部議處合無今後新舊舉人并歲貢監生不分入監復監者過限違期但有患病等項堪信文憑俱免送問仍行該監嚴查虚曠月日務要應該撥厯之日方准撥厯出身如無患病堪信文憑者止照官員赴任違限半年之上事例方與送問如此則法令適中賢才得所一慎用將官臣竊惟將者兵之司命國之安危係焉將官之設其不輕而重也較然矣臣等近聞大同總兵神英副總兵趙㫤各以私忿互相攻訐頗凟聖聰差官體勘未䝉定奪及宣府總兵官阮興又䝉取回別用且大同宣府乃朝廷之北門而將官實司北門之鎖鑰者也方今邊圉未輯災異屢形而將官之重未盡得人如此萬一北寇聞風乗機侵犯為害非細有識寒心固宜早為區處不可視為泛常且聞各邉將官有缺多在京營選補但此等官員初到地方夷情不達邊務未諳一遇有警手足無措又安敢望其克敵制勝者乎乞勅該部通將各年各官公舉將材照例㑹同五府各部都察院大理寺堂上官并掌科道官從公逐一評議原舉勘任主副將官其間或精通武藝或練達戎務或弓馬熟閑或韜畧諳曉或智謀過人或勇敢出衆宜用於北者北邉宣府大同遼東陜西等處地方有缺挨次奏補宜用於南者南方雲貴兩廣四川湖廣等處地方有缺以近就近挨次奏補其有不協公議及夤縁請托者俱令革退其有未經公舉及巳舉未經評議者無得舉用至於京營將官未經行陳止可存留拱衛京師如此則南北將官可兾於得人而各邊地方可保無虞矣一減省差遣照得針工巾帽二局每年奏差内臣四員前來南京取用麂皮等項物料經年動歲方纔回京每員取撥六百料馬船二隻暫座共用船八隻每船一月索取貼幇銀五兩一年之間約取銀四百八十兩及至起程每船又要脱幇銀五両夫甲貧難辦納不前百般辱打隨船什物因而强搬怨嗟之聲聞者不忍誠使減此官則減此船減此船則無此害况南京針工局遞年常有起運物料如䝉乞勅各衙門今後取用前項麂皮等項物料免差在京内臣就行守備太監督令南京針工并巾帽局依數造辦選差的當官一員起運管送仍照例㑹官裝扛務要十分滿載不許多占船隻及夫甲非理凌虐索取財物如有故違許科道并兵部委官指實具奏禁治庶幾害可除事亦不廢一禁約取索照得南京馬快船專備裝載官物之用近年以來差使浩繁駕船夫甲横被管運内外人員索詐艱苦不可名狀姑以為害最甚者言之如南京内官監年例該運黑沙洲蘆柴計把不啻千萬占差六百料馬船共一十六隻隨船水夫約五六百人每年蘆柴就派水夫各自砍斫裝載管押官每船一隻要銀二三十兩水夫貧難多將月糧賣輳方免捶楚及交柴之際管塲官又行索取每柴一束要錢一文柴滿千萬則錢亦千萬錢不敷者百般刁難及照南京内官監等四衙門裝運蕪湖抽分厰板枋用馬船三十餘隻南京中運都督府裝運爛泥洲等處蘆柴用馬船十隻管押人員往往效尤逼追人夫因而逃竄數多船隻廢壊職此之由如䝉乞勅兵部查例嚴加禁約今後管押等官敢有仍前索詐許令巡江御史宻切訪察叅奏拿問以示警戒被害之人亦許指實陳告其蘆柴每年照數砍裝交納就行管理抽分御史臨塲驗收如此則夫船不累裝運無悮一慎重刑獄臣竊惟刑以輔治自古帝王之治天下未有不本諸此而為治者易曰君子以明慎用刑而不留獄書曰欽哉欽哉惟刑之恤哉是刑不可以不慎也然則司刑獄者當存心以仁恕持法以公平庶幾刑不至於濫寃矣臣等嘗見兩京法司推問輕重罪囚悉發大理寺審錄情罪相當者評允施行情不當罪者駁回再問如此可謂慎於用刑矣而常有稱寃不服罪囚其在外諸司問理刑獄秉公持正而刑罰得中者固有其人中間有等矯情干譽之徒不能體皇上重愛民命之意以苛暴為能事以刻剥為盡職讞獄之際視人命如草芥煆煉成獄問擬斬絞罪名監候呈詳或有詞未明或稱寃不服恐其反異不便及未成獄囚犯一槩輙令獄卒多方致死殊不知古人用刑罪疑惟輕之意寃枉所係誠可哀憐上干和氣致生災變未有不由於此及法司奏行差官前去各處審録重囚往往圖得便道過家不及致詳刑獄雖有審錄之名實為虚應故事如䝉伏望聖明擴天地好生之徳體日月照察之明特勅法司凡遇差官審錄弗狥私情務要南方刑獄擬差北方官員北方刑獄擬差南方官員其於審錄之際仍要留心詳審勿拘成案情真罪當者監候奏請處决其間情有可矜罪有可疑及情法不相當者具𦂳闗略節縁由奏請區處其原問官員果有故出入人罪者依律坐以故出故入之罪如失出入人罪者坐以失出失入之罪如此庶在外問刑官員少知慎刑之意不行慘刻之科而刑獄亦得以清寃抑亦得以雪人心和悦而災異消弭矣一查明禁例竊惟道之以政齊之以刑謂法制禁令即今之律例是也然非政有定體何以刑得其平當此萬國同文之時豈有兩京異政之理南京祖宗根本重治山陵宫闕俱存而曲禁周防乃政務所當急者如南京内官監於皇城四門守衛官軍内每門日撥軍一百名看守打掃及南京司苑局日撥金吾後衛府軍後衛上直官軍一百名在東西二園栽種又孝陵神宫監太監等官燒用柴薪俱是給與軍人票帖前去攔牲門外拾取又以免差使為名收斂軍人銅錢以此旗軍人等効力公所者數少乗機私役者過多至此事發法司理問為因近年在京皇城各門并長陵等陵一切禁例多不行移南京衙門知㑹以致各該監局查報之時往往援引逺年事例如内官監則曰宣徳年間奏奉額設司苑局則曰洪武及宣徳年間差撥存留孝陵神宫監所燒柴薪則曰本監與南京浣衣局内官吏堂官長隨内使先年舊例俱在本山手扳脚踢拾取燒用所歛軍錢則曰買辦薑種及進用蒜頭山藥芋苗用盡此等體例俱無的確年月亦無原奉㫖意全文有無虚實無所考証夤縁影射為弊日滋以致山陵之嚴宫闕之禁失之太疎而防㣲杜漸之計漫不知警於兹災異之臻若復無所省究豈宜然哉况在京皇城各門并長陵等陵事體既與南京相同則夫凡百禁例亦當與南京無異理須歸一人易遵守如䝉乞勅法司通查在京近年奏准見行事例比與南京門禁相同者備行南京法司一體遵行仍乞勅南京内外守備叅賛官弁南京兵部轉行南京各該監局軍衛務查前項原奉洪武永樂宣徳等年間欽依及奏行事例的確全文俱從兵部法司將與在京見行禁例通併叅詳若係出於一時權宜自當遵依近例為當明白奏請著為成法頒行南京如有違犯據憑論斷其有仍將逺年不明事例朦朧搪塞者宜從法司徑自叅究施行如此則兩京無異政衆心有定守而陵闕益尊嚴矣一申明舊例照得先該南京總督糧儲右都御史周瑄奏稱南京無藉軍民人等稱為跟子名色迎接納糧人等跟送歇家哄誘銀兩買囑官攅人等通同作弊犯該滿貫徒罪以上就於倉塲前枷號三箇月滿日照包攬坑陷納户事例發邊逺充軍等因具奏該户部㑹議得前項跟子歇家滿貫徒流以上枷號一箇月常例發落節該奉憲宗皇帝聖㫖禁革􅫬騙這件還准他每説欽此欽遵通行外後該欽奏詔書已將前項新行條例革罷近該南京總督糧儲右副都御史王軾具奏明白户部議擬前項跟子歇家滿貫徒罪以上仍照前例枷號三箇月連當房妻小發邊逺充軍職官有犯奏請定奪奉聖㫖是欽此欽遵通行外臣等看得事體貴合人情法令在得中道各司府州縣納户初到南京不能熟知道路未免尋人指引别無官房住歇未免尋討歇家此人情所不能無者查得見行事例攬納之人坑陷納户及打攪倉塲虚出通闗者止問充軍不曽枷號今跟子歇家止是曬晾駞載糴買等項多取工錢價直比之攬納作弊輕重不同既枷號三月又發遣充軍法令似乎過中以致近年納户往往倉前露卧人家不容安歇一入歇家輒被哄嚇受害多端近該法司問擬又皆拘執前例或連引情輕人犯俱問枷號充軍逺近稱寃有傷和氣合無今後南京法司如遇跟子歇家有犯指稱官吏名色􅫬騙財物滿貫與坑陷納戸限外不完及通同官攅虚出通闗者俱照原擬事例問罪充軍免其枷號若止因曬晾駞載糴買等項多取工錢價值財物至滿貫者枷號一箇月與不滿貫者俱依律問罪照依常例發落如此則刑罰平而和氣應矣一減造軍器臣竊惟軍器所以禦戎固不可不預為成造而財力費於無用尤不可不量為區處查得南京兵仗局前厰遞年成造盔甲鎗刀弓箭撒袋圓牌等項軍器共七萬六十餘件收貯南京戍字庫聴候應用誠國家思患預防修武備禦戎冦萬世之良䇿也但承平日乆軍器少用未免法出弊生今計該局歲用生熟鐵一十一萬七千九百餘斤木炭木柴四十餘萬生水牛黄牛白硝麂襍等皮三千三百餘張翎毛觔角箭竹襍木約二千七八萬其餘銅錫銀硃靛青油漆魚線水膠綿苧布絲絹紙劄等料動以千百計軍民人匠班匠共六百五十五名外僱工銀二千八百五十餘兩然所造前項軍器大抵多被尅減工料成造不堪雖有該部及科道委官按季盤驗亦不過大略看過不能一一週悉况南方地勢卑濕收貯三五年後箭翎弓張多巳脱落朽壊鎗刀衣甲亦各鏽爛誠恐一時行軍卒要應用有名無實誤事非細查得本庫自洪武永樂等年到今陸續收貯見在軍器共有四五十餘萬件頗勾應用及查得先該工部議擬天下軍衛有司歲造軍器數多積乆恐不堪用題奉欽依俱自𢎞治二年為始減半成造誠為得宜乞勅該部計議合無將本局歲造軍器暫且停止仍將戌字庫原收軍器委官盤驗見數其間堪用者如法安置曬晾不堪者挨定年分逐漸修理有當添補物料止於各庫㑹有糧支應用待修理完日仍照減半事例成造如此則財力不至妄費軍器皆為有用矣一量停造作臣竊惟上之供用有缺固不得不徵取於下下之財力有限亦不得不赴愬於上盖下有餘力則上無不足之患而上或過取則下有不勝之憂此皆國用之所急民情之所切者皆不可不詳思而慎處之也查得本部先於𢎞治十年十一月内該南京内官監掲帖一件為欽依起運急缺供用物件事該太監李廣奏取生漆桐油肥皂各二十萬斤銀硃各三萬斤分派應天等府辦納續行本部成造裝盛箱桶瓦罈雨罩共一萬九千八百箇雙鐵鎖九千二百把單榜紙三萬一千六百張黄䗶白麵桐油等項共一千六百餘斤又於本月内准本監掲帖一件欽依成造急缺供用物件事亦該太監李廣奏取硃紅漆戧金雲龍黄銅火罩等件共四萬五千六百五十副箇除該監通行南京丁字庫等衙門將㑹有銀硃黄熟銅生漆金箔木炭等料共六十萬五十二斤塊徑行外將㑹無生漆銀二硃等料共二十一萬九千五百餘斤根塊亦行應天府鋪行估計支給天財庫錢鈔買辦及行本部成造裝盛箱桶木匣鎖鑰黄氊黄紅綿布綿花套桐油木杠雨罩等項共六千八百九十餘件黄單榜黄白中夾紙四萬八百五十張至𢎞治十一年八月准南京兵仗局掲帖一件上用供用物件并軍器等項事該署兵仗局事内官監太監楊穆等奉欽依成造上用象牙鵓鴒頭弰彈弓等件八百件供用竹竿綿紫魚义等件共一萬五千八百四十件該局料計見有生銅等料一萬五千七百六斤南京甲字庫闗支闊白錦布等料共二十九萬八千七百七十七疋斤龍江瓦屑埧二抽分竹木局闗支煤炭木炭等料共六百五十八萬四千七百四十斤塊應天府支給天財庫錢鈔買辦青紵絲絨線象牙銅鐵油漆等料共七十萬一千四百四十二疋塊本月内又准工部咨為成造神器事該署兵仗局事内官監太監楊穆等題奉欽依成造各銅將等件共二萬二千六百九十箇把坐派蘇松等府買辦水黄牛等皮九千五百三十張應天府支給官錢買辦魚線膠紅熟銅油灰黄丹黄麻等料共一十四萬五千四百餘斤等因節行到部除欽遵坐派成造外臣等切詳各監局成造上用供用器皿物件誠為浩繁然天下司府州縣歲辦皮張油漆銅鐵銀二硃等料亦為不少必須量入為出以次成造方可使國用不缺民力不困今一年數月之間各起坐派前項物料動輒數十百萬非惟府庫錢粮支給不敷且使小民出辦何以能堪况應天府係南京根本重地而蘇松等府尤百萬京師仰給之處又兼連年災傷薄收公私俱困豈得恝然不加撫恤其鋪行買辦名雖闗支内庫錢鈔給還但納料闗價出入各門禁及該庫俱要財物打㸃使用及至闗出錢鈔又多爛鈔低錢俱不堪使用以此徃徃破家蕩産賣男鬻女不能賠償又如各府州縣大户解納生漆桐油銀二硃紙劄等料俱有原裝盛箱桶等項却又剋下另行本部重造尤為煩費似此假公營私傷財害民誠有傷國體上干和氣之甚者如䝉乞勅該部通將前項原坐派供應物料器皿等件逐項查審將𦂳急缺用者再行奏請行下催䟎成造先行解納其可緩者暫即停止今後在京各監局若有奏行成造器皿等項工部務要查看先後酌量緩急另行奏請行下無得并於一年一月之間致使所司倉猝無棤仍行南京成造監局衙門該用物料務要㑹同該部及科道官嚴督各作匠役人等從公估計如某器皿合用某物料若干及將造完要行裝盛亦要估計某物若干用某様箱桶并鎖鑰扛索氊片各若干通估明白相應方許將㑹有者行各庫局闗支㑹無者行有司買辦不許各該衙門止憑作頭人等朦朧多估輒行闗支買辦其解户納料鋪行闗支錢鈔亦要科道官從公隨即收放不許刁難指要財物及各司府州縣解納油漆銀硃等料若有原來箱桶等件不許又行重造致費工料如此庶上用之供應可以不缺下之財亦無妄費而民困或得少蘇矣一遵復舊制照得山東臨清州直𨽻淮安揚州蘇州浙江杭州府江西九江府等處俱係客商船隻輻輳之處祖宗舊制各設有鈔闗收受商税俱委各本府通判等官管理行之百年雖不能無弊然課鈔亦未見其虧折客商船隻亦未見留難盖通判等官職卑責重上受巡撫巡按分巡分守等官節制少有不才隨加罪黜故非極妄無知之人則不敢在闗生事動擾客商近年以来改委户部官員出理課鈔其間賢否不齊往往以増課為能事以嚴刻為風力籌算至骨不遺錙銖當法之外又行巧立名色肆意誅求船隻往返過期者指為罪狀輒加科罰客商資本稍多者稱為殷富又行勸借有本課該銀十兩科罰勸借至二十兩者少有不從輕則痛行笞責重則坐以他事連船拆毁客商船户號哭水次見者興憐夫増課為國雖有稱聚猶是有名其科罰勸借者或倚稱修理公廨或倚稱打造坐船率皆借名入巳無可查盤况此等官員既出部委各處巡撫官視為賔客巡按官待以頡頏是以肆無忌憚莫敢誰何以致近年客商懼怕征求多至賣船棄業此豈祖宗設闗通商足國裕民之初意哉伏願聖明俯察民隱勅該部停止新例遵復舊制仍勅鎮巡等官時常糾察各府委官如法奉行務要公私兩便商民不虧庶幾人心快悦怨氣消弭而天意可回矣一裁抑侵剋竊惟抑末固為政之理而通商亦富國之術茍使官司肆為侵剋遂致道路漸成愁怨傷和召沴豈王政之所宜哉照得舊制天下商賈輳集之處各設税課司衙門立法抽税具有成法惟南京龍江大勝港原設抽分竹木局抽分竹木柴炭等項有三分取一有十分取二有三十分取二者取之至輕用之有節逺近輻輳上下便益近年工部奏准於浙江杭州府湖廣荆州府直𨽻蕪湖縣設置抽分衙門差遣部官管理不惟地方接連重複抽税而其人賢否不齊寛嚴異法但知増課以逞己能不恤侵剋以為民病甚者器皿貨物不該抽分之物一槩任意勸借留難所得財物無可稽考因而侵漁入已難保必無及照龍江大勝港抽分例有内官兼管比因洪武永樂年間許令就於抽分内取鈔三十貫以為茶果食用今乃借此為名百法巧取如杉楠板每塊籌二根取銀二錢四分柴炭百斤籌一根取銀三分四釐計籌取錢漫無紀極通計春夏有水船多時月每人約得銀六七百兩秋冬水落之時亦不下一二百兩因此抽分重大遂至客商阻絶及至各工所闗領竹木等料又被索取起籌出厰等錢展轉刁難不肯從公放支月益歲増為害無已如䝉乞勅工部轉行各處抽分官員務要奉公守法律己便人不必以剋下奉上為能但當以稱物平施為務其曽經抽分去處給與執照不許重複抽分仍乞勅南京守備太監今後差撥抽分内官止照舊數無得過多仍要嚴加禁約不許似前計籌取索財物及縱容家人伴當在彼生事其各工所闗支物料明文至日即便放支不許刁難若踵前弊無所悛改悉聽管理抽分監察御史等官徑自叅奏究問施行如此則侵剋之弊可以少除而愁怨之聲可以少弭矣一防革宿弊照得禮部所收惟藥材及厯日紙劄二件藥材係湖廣江西福建等布政司所屬并應天府所屬州縣解納厯日紙劄係浙江布政司所屬并直𨽻府州縣解納遞年解到本部俱發太醫院并欽天監上納今訪得各院監堂上并屬官少肯守法每收各項藥材紙劄多般刁難或本堪中而揑作不堪或不收本色而掯收折色或以一倍而收數倍甚至通同攬納之人多取價利指以修理為名罰要銀兩以致經旬累月不得完納解人受害合無今後遇有解到前項藥材紙劄聽本部委官前去公同監院官員陸續監收但驗堪中不拘土産即便照數收受不許刁難折納及取罰等項完就出實收付解人繳結如委官扶同容縱不行舉正者本部叅究庶前弊少革解户可甦一袪除民病竊惟方今民病非止一端臣等不能周知姑舉耳目所聞見為民病之大者言之如均徭下户先年存留不編差役本為優恤小民近年州縣官員不體此心往往槩追銀兩每糧一石人一丁有追銀一兩者糧至千石丁至百口則追至千百兩以一州一縣二年三年計之不知通追丁糧銀該幾千萬兩如囚犯紙劄先年官司問囚有罪之人方追紙劄以備公用今則不分有罪無罪或狀批老人亭亦照名數追徵且不收本色俱追價銀一狀有十名則追紙價十分有百名則追紙價百分以一月一歳千人萬人計之不知通追紙價銀該幾百千兩及先年犯法之人只是依律問斷今之官司既問本等罪名又法外加刑濫罰少者三五十兩多者一二百兩若罰至百人千人又不知其數幾何及至盜取各項銀兩或名為輳辦科差或指為預備賑濟或花為修理造作之類殊不知俱係虚作之數其實侵欺入已也其間亦有被人告發因無卷案簿籍可查以致上司難於考究况聞逺近一律倣傚成風夫寛一分則民受一分之惠今貪官百計誅求若此民何以堪乞勅該部衙門計議合無通行天下巡撫巡按官嚴加禁約司府州縣官員今後有均徭去處照舊優恤下户不許追徵銀兩若編剩户内果有頗過之家亦要盡其一年輳編不許遺留以啓貪官侵剋其有罪囚犯止許官司追徵本等紙劄除公用外按季類解本管上司支銷不許將無罪之人及老人亭槩追紙價及犯法之人官司一依律例問斷亦不許法外加刑濫罰銀兩敢有故違似前或追下户剩户銀兩或追紙價銀兩或罰犯人銀兩事𤼵俱以賍論縱不入已亦當從重問革庶貪官知懼良民獲安一懲戒奸貪竊惟十羊九牧則必生紛擾之患羣狼牧羊又曷逃㗖噬之逼故奸貪之害不少為袪除則瘡痍之民殆未易甦息也照得浙江等布政司直𨽻府州運納南京糧米及一應客商軍民人等船隻率皆經由龍江闗進入本闗設有内官守把及各布政司府州解納一應錢糧俱送南京内府承運等庫收貯各庫亦設有内官兼管但近年為因守備官員奏討内官前来數多以致添撥各處管事者亦多各官不思朝廷錢糧為重人民艱難可憫所在之處多帶家人伴當勢如狼虎船隻往來者不分竹木柴炭糧食襍貨甚至裝載灰糞之㣲亦要過闗財物必充所欲方容船隻出入錢糧進納者雖經户工二部各司掌印官員辨驗堪中印封送庫亦且百方刁難不肯收受各照數目需索銀兩至將解戸吊綁墩鎖苦害不堪重而布絹錢鈔輕而絲綿蜜蠟無物不然必滿所欲方與㑹官收受及照東安西安二門守門内外官軍人等乗機為害每遇錢糧進入輒便攔當或將解户趕逐或將脚子趕打遲留一日二日有之為害千萬百計不巳以致解户負累掲借錢物累年不得完結及得批單回家債主又復逼取傾家蕩産苦害無辜此皆奸貪顯迹所宜量為懲戒如䝉乞勅南京守備太監將守闗管庫内官中間果有淳謹守法不肯生事者止照舊額存留近年新添冗官及生事害人者盡行革去仍要嚴加禁約不許似前害人其守門官軍有犯或被害之人告發宜從監守科道官員徑自叅究施行如此則闗津無阻輸納易完人心和暢而天意昭格矣癸已封事謝鐸具官臣某謹奏為講學圖治事成化八年十二月十六日太子少保吏部尚書兼文淵閣大學士彭等傳奉到資治通鑑綱目五十九卷令修撰羅璟并臣鐸二十員校勘訛誤將翻刻以供睿覽者除欽遵外臣退竊自念是書成於宋儒司馬光朱熹之手上師春秋下薄遷固實經世之大典帝王之龜鑑也曩在宋時神宗理宗二君雖嘗留意是書卒不能推而見之政治之間百世之下識者未嘗不有望如陛下今日之舉者是盖不特是書千載一時之幸實宗廟社稷之幸天下生民之幸臣等豈勝欣慶踊躍之至臣待罪翰林今八年矣恒竊愧懼思欲仰酬聖恩於萬一而庸鈍淺暗不識治道之宜凡臣所未能言與所欲言而未能者大臣能言之諫官能言之百司庶職能言之是以口與心謀趑趄前却不敢無因冒越以至今臣愚竊觀今日天下之勢如日之中如月之望如四時之夏正易所謂泰所謂豐所謂大有之時也以陛下端拱持盈於上羣臣奔走仰成於下宜若無待於私憂過計者然而中者昃之漸望者弦之漸夏者秋之漸故聖人於易在泰有艱貞之戒在豐有勿憂之戒在大有有無備之戒盖不如是則無以保其常豐常泰常大有如一日也然則將如之何哉亦曰廣求賢臣如泰之九二得尚中行豐六二之有孚𤼵若大有九二之大車以載相與講學圖治以保此泰豐大有之業於無窮而巳然帝王之所謂學者亦豈區區尋章摘句間哉孔子曰知仁勇三者天下之達徳也盖必明足以燭理然後謂之知不然則知之不精至有以君子為小人以小人為君子者矣必理足以勝私然後謂之仁不然則行之不篤至有知其為君子而不能用知其為小人而不能退者矣必氣足以配道義然後謂之男不然則所知而行者亦且半途而廢至有知用君子而卒不果於用知退小人而卒不果於退者矣堯舜禹湯文武之所以為知為仁為勇者具見諸經臣愚不敢逺引備述姑即是書所謂漢唐二代之君其於君子小人進退用舎之間亦略可見矣盖必若漢昭帝辨上官桀之詐以信霍光庶可謂之知而苛察之知非知也必若漢文帝割鄧通之愛以從申屠嘉庶可謂之仁而姑息之仁非仁也必若唐憲宗不沮羣議卒任裴度以成淮蔡之功庶可謂之勇而亢暴之勇非勇也彼代宗深信佛法惑於元載報應之言而不能察是以貪昧而昏其知也𤣥宗溺意聲色知李林甫之妬賢疾能而不能去是以愛欲而害其仁也元帝屈於恭顯之譛而不能直蕭望之之寃是以柔懦而喪其勇也若是者今其治亂安危何如哉臣愚竊觀今日天下之治上安下泰文恬武熈積襲因仍徇名廢實天下之事恒所令非其所好天下之人皆奉意而不奉法如曰振綱紀而小人之無畏忌者自若如曰勵風俗而士夫之無亷恥自若飭官司也而汚暴益以甚裕民兵也而疲弊益以極減省有制而興作每疲於奔走蠲免有詔而征歛每困於追呼考察非不行而倖門日益開簡練非不舉而私撓日益衆賞竭府庫之財而有功者未必勸罰窮讞覆之案而有罪者未必懲凡若此者其蠧根弊源將必有在臣愚誠不足知之夫以陛下之聰明天縱宵旰勤勞若今日之留意是書者豈不知講學用賢以圖政治而故使之至是哉特以人心不可兩用或者一念之間奪於彼則不得務於此惑於外則不得專於内故雖勞於求賢而一或有妨乎己則賢者未必得用雖勤於立政而一或有碍乎己則善政未必得行是惟陛下宻察此心懼有於無必開拓此心之所謂知必力行此心之所謂仁必奮𤼵此心之所謂勇以力求所謂中行有孚大車以載之賢知之必深任之必篤日置左右薰陶啟沃稽之經傳質以是書直以今日之事驗之既往之迹見其用某人而興行某政而得則曰今嘗亦有是乎見其用某人而亡行某政而失則曰今豈亦有是乎反觀内省長慮却顧兢兢此心罔有内外罔有終始大本既立萬目自隨則前所謂積襲因仍徇名廢實之弊皆將一旦革去無有難者而此豐泰大有之業可保無失如唐虞三代時矣區區漢唐之治如此書所載尚何足道哉臣狂瞽迷謬凡此皆儒生之常談世之雄傑才辨者未必不以為迂腐而不可用然臣力求古往反復究思要之至理竊惟治造之大本莫切於此而救時之急務亦莫先於此舎此而欲别為奇謀良䇿以坐收唐虞三代之治臣愚不敢負此心以欺陛下也夫以陛下之聖據大有為之勢操大可為之權如天之於萬物欲春而春欲夏而夏欲秋而秋無與牽制無與沮撓斷然而行實聖心一轉移間耳夫何難之有哉伏惟陛下察臣之愚矜臣之志不以出位為責不以未信為嫌試以今日惓惓是書之意而一行之則宗廟社稷之福天下生民之福皆將不外是矣臣不勝惓惓戰慄待罪之至某始乎狂妄為此幸不即罪巳棄而焚之矣既十年偶讀曽南豐論孔光焚藁事謂必焚之使後世不見藁之是非必其過常在於君而美常在於巳也其可乎哉且光之為是亦庸知其言不果出於邪而故焚之以盖已之奸以惑於後世者乎予用是懼乃從官府案牘中掇拾其舊以存用志吾過且以彰吾君之美於億千萬載而不忘也成化十八年秋八月某謹識奏止奉送神像疏馬文升查得近該御用監太監王瑞等奏稱欽䝉差往湖廣江西等處公幹合用黄快船六十隻帶去官舎勇士匠八十六員名乞要應付等因奉聖㫖是欽此欽遵抄出除照例應付及詢討船之人俱言往武當山送𤣥帝神像近又該司禮監太監陳寛傳奉聖㫖朕弟汝王之國凡一應合行的事該衙門便照例開具来説欽此除欽遵施行外近又該巡按直𨽻監察御史丘天祐奏稱直𨽻池州等府貴池等縣地方五月十一日起十三日止驟雨連綿山水泛漲勢約三丈渰死男婦二百六十一名口漂流居民房屋一千九百餘間臣又聞河南山東南北直𨽻遼東山西自七月以来天降驟雨平地水深數尺漫倒城垣没渰田禾自通州直抵湖廣江河兩岸無處不被水災而河南黄河之水為害尤甚各處秋田必無所收况今陜西北敵在套勢甚猖獗未見勦平勞及三省民不聊生而東北諸邊亦未寧靜湖貴苗夷倡亂方且用兵此正天下多事之秋也仰惟皇上奉送𤣥帝神像於武當山固是為國為民祈福之意而神亦以好生憫物為心臣巡按湖廣親詣本山看得宫殿雄麗神像尊嚴此皆我太宗文皇帝所造其制度規模無以復加矣皇上若欲奉送神像使時年豐稔邊方無事不甚勞傷且猶不可况今天下水旱䖝蝗邊方用兵親王之國民困財竭之際而乃有此舉甚非所宜恐神亦不安而福亦不降矣欽命内臣并帶去官員如此之多所過去處該用人夫動輒數千差去官員固為安靜終是勞傷况自京城至於通州道路泥濘人馬難行尤為不便臣累荷列聖莫大之恩叨官五十餘年幸䝉皇上委任隆重職掌兵戎官居保傅責在輔弼使天下之人竊議當此多事之秋而為此可巳之事誠恐後世史必書之臣若不懇切為皇上言之是孤眷遇之恩勉留之意則臣負國之罪將何所逭哉伏望皇上憫念生靈察臣愚忠將前神像暫且停送候年時豐稔邊方寧靜民困少蘇之日差官送去亦不為晚倘納臣言宗社幸甚天下幸甚𢎞治十四年七月十六日題十八日奉欽依卿所言具見忠愛但事既舉行難以中止差去官員人等不許沿途生事擾人已有勅嚴加戒諭了該衙門知道欽此地震陳言疏馬文升查得近該巡按陜西監察御史燕忠奏稱據西安并長安等縣申稱𢎞治十四年正月初一日申時分忽然地震有聲從東北起響向西南而去動搖軍民房屋本日酉時分復響有聲如前至次日寅時又響如前又據本府朝邑縣申本年正月初一日并初二日寅時地震聲響如雷自西南起將本縣城樓垜口并各衙門倉監等房及槩縣軍民房屋震搖倒塌共五千四百八十五間壓死大小男女一百七十名口壓傷九十四名口壓死頭畜三百九十一頭隻及縣東北正東南地方安昌八里一十九處遍地竅眼湧出水深淺不等泛流震開裂縫長約一二丈者四五丈者湧出溢流良乆方止察家堡嚴伯村等四處湧出幾流成河不時動搖自本日起至十五日尚震未息人民驚惶四散逃避高阜去處搭菴存住等因隨據延安慶陽二府及直𨽻潼闗等衛各申稱所屬州縣與前長安等縣同時地震聲勢相同具奏該禮部抄出及訪河南河南府靈寳等縣亦各地震如前臣惟地乃靜物止而不動動則失其常也考之古典地震乃臣不承於君夷狄不承於中國之兆厯代固有地震未有震於正月朔日者亦未有震開而裂水出將成河者此乃非常之異古今所未多見者也况朝邑縣南近華嶽東連黄河而潼闗之山實與華嶽相連潼闗朝邑地震如此之甚則華嶽黄河必為之震溢矣且兆不虚示必有其應况陜西乃闗中重地四鄰番寇而延慶二府又與河套宻邇正月朔日地震而北敵十五日擁衆入寇榆林是則侵陵中國之兆亦巳明矣臣聞此大異驚愕莫知所措除痛加修省外照得即今北敵小王子部落日衆精兵數萬其首領和碩者梟雄桀黠往往以詐計敗我官軍近來入冦少散槍掠專一攻圍城堡燒燬草束而用兵且精亦有號令觀其所存其志非小若不使之大遭挫敗逺遁隂山或自相讐殺部落離散年復一年得我厚利獲我甲兵以彼之馬力藉我之技巧恐為中國之大患也仰惟陛下宵旰憂勞勵精圖治雖古帝王亦不過是宜其兩儀奠位四夷賔服今陜西地震如此其異非常是皆天心仁愛陛下故示此以警告之欲其早為修省而保洪圖於億萬斯年也今海内民困財竭兵衰將懦紀綱未大振法令未大行文恬武嬉奢靡成風北冦猖獗人心涣散此正安内攘外之時修徳弭災之日伏望陛下祗畏變異修省剋責行仁政以安養斯民重臺諌以廣開言路府庫之金帛重為撙節以備𦂳急之用無益之齋醮暫免修設以省浪費之繁念錢糧之空虚止傳奏無例之官憫畿民之艱窘禁奏討有碍之地遵聖祖之訓毎清晨視朝法列聖之規日奏事二次今敵住河套正在用兵之際乞將陜西織造絨褐内官早取回京以蘇一方軍民之困存其餘力以備二邊飛輓之急仍乞勅翰林院撰寫祭文禮部奏請差官賫捧香帛前去陜西致祭西嶽華山西鎮吴山之神更乞勅陜西巡撫都御史將被震倒塌房屋及壓死壓傷軍民之家量給銀若干兩以為賑恤埋𦵏之資及將所屬一應不急之務俱暫停止凡百安輯之方悉從舉行猶須操練軍馬修理城池務使地方寧靜軍民獲安内治既修則北敵不足畏矣臣荷國厚恩五十餘年官居保傅職掌兵戎國家安危實同休戚覩兹變異無任憂惶伏望陛下察臣愚衷憫臣勞瘁前項所陳一一俯賜施行則臣安享厚禄不為靦顔而陛下言聽計從亦不虚負累次勉留溫切之詔矣𢎞治十四年二月十八日具題二十日奉欽依覽奏具見忠愛之意視朝奏事朕自加省織造絨褐内官便取回其餘都准行該衙門知道欽此恤民困以固邦本疏馬文升竊惟自古聖帝明王英君誼辟莫不以仁民為首務盖以生民之休戚國家之安危係焉成周以農事開國以仁愛養民故傳世三十雖有五伯之强而猶知尊周炎漢去古未逺以仁厚育民故厯年四百雖有中衰之禍而旋復舊物此皆以仁政得民心之深而民仰戴不忘之效也繼而隋唐趙宋其君有始雖勵精圖治躬行節儉而鮮克有終者仁政不能乆施於宋而又有突厥吐蕃契丹之患兵戈不息民不聊生卒致傾危而不可救此仁政不能乆結於民心之驗也載在史册昭然可考下逮殘元前主中國荼毒生靈仁政全無固不足言矣仰惟我太祖髙皇帝掃除殘元奄有天下拳拳以愛民為本懇懇以憂世為念驗田取賦十一而税凡有買辦免其徵納未嘗輕歛於民永為定制故民之感恩淪於肌膚浹於骨髓得民之心實有同於三代萬萬年之國祚盖已基於此矣列聖相承咸遵是道但自正統十四年承平日乆兵政廢弛浙江葉宗流福建鄧茂七廣東黄蕭養嘯聚於南方敵人額森等侵犯乎京師自此天下多事而民漸凋憊矣肆惟皇上即位之初崇尚節儉尤切愛民内府各衙門供用之物俱定有中數雖光禄寺奉上之物亦䝉御批而取是以節儉之徳傳播天下仁厚之政繼述祖宗近年以來為因北冦犯邊内府成造軍火器械等項及百工技藝之人添之酒飯所以内府各衙門派出物料牲口數多况又該用一倍而派三四倍者不分㑹有㑹無年年派出無有止息該部依數分派有司照數追徵懼獲稽遲之罪定立均徭之名有一大縣一年派銀五六千兩者三四千兩者至小州縣亦派銀數百餘兩而糧草驛站京班皂𨽻砍柴擡柴夫役收買備用馬疋該銀不下數百萬兩不在均徭數内俱係小民膏脂前派者未完後派者復至加以宗藩位多冗官太濫俸禄等項及起運京儲邊糧之外存收糧米所餘無幾凡百買辦俱係民供其視祖宗之時大有不同以此小民窮困已極怨聲盈途皇上深居九重何由得知臣詢之天下至京方面官員并各該鄉官仕於京者皆以買辦頻繁均徭出銀累民爲言大戕邦本實由於兹况今兩廣江西盜賊生發良善受害浙江湖廣等布政司及應天府并南直𨽻各府州縣俱有水旱災傷民多缺食荷䝉皇上欽命憲臣前去巡視及勅巡撫等官用心賑濟愛民之仁無以加矣若節年所派物料不許斟酌蠲免有司懼罪嚴刑追徵是所賑者少而所徵者多欲民之不逃亡胡可得乎盖自古民安則思治民困則思亂和氣則致祥沴氣則召異此理勢之自然也今徭税既重災傷荐臻武備衰弱倉廩空虚盜賊充斥而災異迭見於此之時若不溥施恩與少蘇困憊誠恐缺食之民奸宄之徒乘隙嘯聚處處蜂起卒難撲滅雖有智者不能善其後矣事之可憂莫重於是盖恩貴預施患在早弭故書曰制治於未亂保邦於未危易曰君子以思患而預防之實有天下者所當深慮也伏望皇上以社稷為重以斯民為念乞勅户禮兵工四部各查自𢎞治元年起至十六年止節次派出浙江等十三布政并應天順天二府及南北直𨽻府州縣一切買辦物料牲口菓品及兵部見追節年虧欠倒失馬疋草塲等項銀兩并成造解京軍器與夫一應物料已未完數目備查明白徑自具奏一總㑹同五府各部都察院大理寺堂上官六科十三道掌科掌道官從長計處某物料合當蠲免某物料合暫停止某物料果係急用作何買辦凡可以節財裕民乆逺良規議處停當上請聖裁如此庶恩惠溥施而得仁政之本民困少蘇而免意外之虞臣叨列六卿之首忝任三孤之職責在上輔君徳下安黎庶永固皇圖安如磐石此心之存死而後已今聞兹民患若不以古今治亂係民休戚懇切為皇上言之早為消弭萬一貽患地方則臣負國之罪將何所辭伏乞聖明俯賜施行宗社生靈不勝幸甚𢎞治十六年十一月初一日具題次日奉欽依該部看了來説名臣經濟録卷七
