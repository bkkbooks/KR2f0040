body:
  text: 名臣經濟録卷三十九明黄訓編兵部職方上之上為邊務事于謙照得近該衛喇特額森續差使臣察爾竒等二十七名來京進貢該宣府總兵官右都督紀廣等問討鐵牌㸔驗説無止有番書一紙差伊帶領諾延三衛頭目來為阿嚕台和寧王的根脚在三衛來取不與着軍馬來取三衛如今放囘怕邊上人驚差我領他毎來朝見今三衛老小車輛盡在小黄河牛頭山一帶住劄打圍等因本部已經覆奏通行隄備去後今照諾延三衛兵丁素號驍悍叛服不常不恥敗亡敢為摽掠觀勢强弱以為從違先因額森犯邊各種部落多有結連往往在於近邊去處潜藏出沒摽掠人畜其為邊患不可勝言既被額森収捕今又放令囘還名為在邊住種其實奸詐難測安知不為額森腹心而為我邊患害况小黄河牛頭山一帶正係敵人出入要途不可不備今既察爾竒帶領來朝若便待之如常置之不問非惟不足以發其奸抑且不足以弭其患合無令通事都督僉事昌英等將察爾竒帶來諾延三衛嚴加曉諭備述先前擾邊之罪朝廷恩同天地因其臣順來朝一切不問爾等當感恩思報毋蹈前非仍請勅令其賫囘曉諭諾延三衛頭目人等爾等蒙國恩開設衛分享有官爵務要敬順天道尊事朝廷鈐束部落以為我邊藩籬若有外寇侵擾必須奮勇勦殺以除邊患或有迤北走囘人口不得邀截殺害就便差人護送來京朝廷陞賞不恡若違背天道孤負國恩犯我邊疆朝廷調度大軍勦殺必不容貸如此庶使恩威得以並行逺人知所感懼縁是處置邊務夷情具題景泰三年正月日奉聖㫖是欽此為被虜走囘人口事于謙内府抄出鎮守陜西内官王莊兒等題景泰三年正月初二日酉時准總兵官征西將軍都督同知張泰等手本景泰二年十二月十九日據黒山營哨備署都指揮僉事任信呈送被虜走囘男婦三名口到官會同鎮守太監來福副總兵都督僉事馬讓叅賛軍務右僉都御史韓福審據韓成供係寧夏中護衛左所百戸毛俊下選操土軍陜失丁戸内餘丁先於景泰元年正月初十日被敵人賽堪王識字人阿里特穆爾搶去跟隨到於地名圖喇河老營住過是成因曉番語今年秋間聞知額森差使臣赴京進貢留下兵丁五百在於口外住劄等候使臣同囘後又聽得額森恠恨托克托布哈王要人馬去征殺了要着他的外甥阿必鼎王的男做王子有阿哈知院不忿領部下一枝人馬又有哈喇展三千人馬都投順托克托布哈王去了有托克托布哈王整㸃人馬要與額森厮殺有賽堪王得知収什人馬報與額森一同前去鴻和爾海地面躱避有額森又將原収和卓一枝人馬連家小都放囘原地方去了等用着你特來成等跟隨阿里特穆爾行了十程至十一月二十日夜同妻李氏商議約同直𨽻寧山衛右所百戸賈貴下總旗孟成共偷兒騸馬七疋夤夜脫走沿途倒死五疋於本年十二月十八日到於黒山營轉送前來據供告報等因准此叅看得縁係走囘人口告報境外敵情事理專差舍人呉能賫本具題該本官欽奉聖㫖兵部知道欽此又該鎮守陜西興安侯徐亨亦題前事通抄到部除走囘人口另行外查得近該迤北走囘男子段大口等說稱額森要與托克托布哈讐殺等因本部為照額森之與托克托布哈其讐嫌猜忌之心非止一日今稱仇殺理或有之又恐敵情奸詐假以仇殺為名意在犯我邊境不可不備已經節次奏准行移各邊各闗總兵鎮守等官嚴加隄備去後今綽爾哈雅叅照走囘男子韓成等所說聽得額森恠恨托克托布哈要領人馬去征殺着他外甥阿必鼎王的男做王子一節縁與段大口等所說事情頗同及稱有阿古爾知院同哈喇展人馬都投順托克托布哈王等因縁哈勒琿在敵人中頗知道理累曉天道人事必是因見額森邪謀彰露暴厲已成且恐不利於已以此結連投順雖傳說之言未見的實然以理揆之額森違天背徳罪惡貫盈或者天誘其𠂻使其自相吞噬以速滅亡且邉境相攻中國之利先事預備防患之䇿萬一敵人果於自相攻擊其潰散敗亡之敵不無欵叩我邊誠恐所在總兵等官倉卒之際處置乖方失悞事機未便合無令該府差人馳驛賫文與各邊各闗總兵等官務在整飭人馬固守地方若有邉兵叩闗來降覆審明白果無虚詐就便差人伴送赴京其有散亡部落或在我邊地潜形隠跡或相率侵擾必須哨探敵衆多寡斟酌形勢强弱可以乗虚襲取即便挑選官軍運謀設法出其不意掩其不備奮勇𠞰殺仍星馳差人具奏有功之日朝廷陞賞不恡仍令各邊總兵等官務要上念皇上委任之隆下軫邊事付託之重當敵人間隙之際正將臣立功之秋時不可失志不可餒凡在邊内外文武官員十分用心公同計慮相機而行以清絶塞之烽烟以為邊方之保障既不許逡巡退縮以誤事機亦不許輕率無謀以中敵計縁係處置夷情及奉欽依兵部知道事理具題奉聖㫖是欽此陳邊務䟽于謙近該各邊送到走囘人口屢報敵人托克托布哈與額森仇殺而大同等處亦報煙火聲息臣等切惟額森違背天道辜負國恩一旦無故生釁侵擾邊境荼毒生靈雖悔過攄誠遣使入貢而罪大惡極終不可容臣謙備員總督臣亨叨任總兵日夜兢惕思所以報朝廷之恩思所以雪前日之恥今敵人自相吞噬是天授以復仇之機而不可失也且敵人驚散擾亂必來窺伺我邊今春東作之時未免有妨耕務若非振以兵威令其逺遁則邊方屯田之事恐未能成臣等再三計議欲各統在京軍馬五千臣謙徃宣府臣亨徃大同其餘將佐於范廣楊俊孫鏜過興張義雷通石彪郭英劉深崔福劉鑑等内定奪前去蓋京師非無軍馬若帶去太多恐費邊儲且兵貴乎精不貴乎多故也臣等到邊遇警則所在各城軍馬悉聽臣等調度如敵勢大必用添軍𠞰殺另行奏請定奪如䝉允臣等所請請將三營團操軍馬内挑選停當整理部伍収拾軍装什物等件至二月中旬以後天氣漸和啓發前去兵部仍先行各邊各闗整搠軍馬以為聲援預備䇿應其餘軍前合用事件臨期具奏臣等素乏謀勇之材又無勲閥之望叨受恩寵任寄兵戎茍於此時而不奮忠義之氣竭涓埃之報則是負天地生成之恩其於天下後世之清議亦有所不容者景泰三年正月二十日臣等昧死具題為整飭邊備事于謙兵科抄出總督邊儲叅賛軍務都察院右僉都御史李秉題臣聞制敵之方固莫先於講武以練兵尤莫要於據險以固守照得獨石馬營等處城池形勢險隘官軍頗多戰守有人彼若勢寡則有寡不敵衆之心不敢輕進勢衆則有腹背受敵之患不敢深入又有都督孫安在彼提督號令頗嚴官軍知畏縱有警急亦無足慮所可慮者惟宣府而已切照宣府迤北沿邊一帶大小白陽常谷青邊張家等口中間多有通行人馬去處正統初年該太監興安尚書魏源親詣彼處相度形勢築立城堡調撥神銳馬步官軍輪流守備以絶邊釁固安人心續該總兵官楊洪奏准將大小白陽等處城堡原守官軍馬疋歸併葛峪堡操練比因青邊口張家口西陽河等處城堡係緊要去處仍前守備不曽歸併後因敵人犯邊前項城堡無人守備俱各廢弛及照青邊等口内近宣府外通沿河十八村等處軍餘俱由彼處出入前去馬營獨石搬運糧米被敵人搶擄者甚多此等之徒深知鄉導是以被虜軍餘王春等入境打細由此進入其原立城堡若不仍前復設調撥軍馬照舊守備非惟無以嚴邊防誠恐有以啓敵意臣屢以此事與鎮守總兵等官栢玉等極陳利害商確施行栢玉等僉曰可行獨總兵官紀廣執迷不從說稱沿邊墩臺俱有守瞭官軍便不守這堡也不妨臣切慮沿邊墩臺相離通人馬去處城堡少者四五里多者十數里縱有奸細乗夜進入守墩之人豈能瞭望及照原守城堡即今見存其守備官軍俱在宣府等處團操前項城堡缺人守備倘有奸細投間抵隙因而入境窺探虚實貽患非輕臣叨居言路之官濫膺叅賛之任義所當言豈敢緘黙如䝉勅兵部行移鎮守等官將不係團操侵邊等口緊要去處量撥官軍馬疋仍舊修守分委都指揮或的當指揮一員專一在彼提督精鋭馬步官軍輪流守備仍行左叅將楊能量帶官軍於空處添築墩臺以便瞭望其歸併大小白陽等處遺下城堡隘口仍令守備萬全右衛都督江福葛峪堡都督楊文提督墩臺都指揮梁泰等嚴督該管官軍常川逺出哨探以備不測不許怠忽以墮敵計務要闗防周宻而嚴謹隄備相機行事而邊境無虞仍行都督紀廣從長斟酌如果要害去處可以不設守備本官别有禦敵長䇿令其明白具奏定奪具題該通政使司官奉聖㫖兵部知道欽此欽遵抄出到部叅照青邊等口地方比先俱各築有城堡控制强敵近因强敵犯邊守將不能銳意捍禦致將臨邊城堡多有損棄廢弛兹者敵衆逺遁整飭邊備乃其急務况古人之于邉疆以守為上今日之計若不將沿邊一帶緊要城堡逐漸修復以實守備誠恐敵人奸詐難測萬一再有動摇未免愈加壊事今僉都御史李秉建言議修復前項城堡此實保邊禦侮長䇿而紀廣身任總戎顧乃偏執不從推原本心不過苟圖目前之安不思經乆之計若不早為處置不無臨期失措合無准其所奏令該府差人馳驛賫文與紀廣公同叅賛鎮守叅將内外官員從長設法計議一一照依李秉所奏將青邊等口緊要去處趂今邊務稍暇天氣晴明量撥官軍脩守并分委都指揮等官提督精銳馬步官軍輪流守備仍令左叅將楊能量帶官軍躬親前去踏勘添設墩臺其歸併大小白陽口等處遺下城堡隘口令守備萬全等處都督等官江福楊文等嚴督該管官軍提督哨瞭整飭邊備完日令紀廣等明白具由囘奏仍令紀廣今後凡有一應邊務須要博采衆長從公整理不許因循苟且偏執誤事如今日偷安怠忽不即區畫措置異日倘失事機罪將何逭縁奉欽依兵部知道事理具題景泰三年五月二十五日奉聖㫖是欽此為來歸人馬事于謙兵科抄出提督軍務右僉都御史鄒來學題准兵部咨該提督遼東軍務左都御史王翺題據遼東都司呈本司地方章驛站煙墩走囘迤北男子三名差人送到廣寧委官審得蘇克等供說境外額森事情掌部事少保兼本部尚書于謙等欽奉聖㫖兵部知道欽此欽遵抄出到部叅照各人傳說敵中前項事情雖係一面之詞未見的實然近來迤北走囘人口同來降夷人亦徃徃備述其事但來見傳説托克托布哈王有無見在今稱被哈巴爾王殺了人馬跟額森二處去等因臣等切詳額森倚恃􅇯强違天逆德罪大惡極凌邁古今一旦無故將托克托布哈殺害雖傳聞之語未可憑信萬一果如蘇克等所言則額森既將托克托布哈人馬吞併其部落氣勢不無益加强盛志驕氣盈愈無顧忌又况額森桀驁險狠敢為不義已將本主殺逆自知惡不可掩罪不可逃雖欲改悔其道無由近雖遣使朝貢奸謀未易窺測誠恐漸有圖大之意復萌犯邊之謀故意遣使來京一則張大殺敗托克托布哈一則使我懈怠不為設備雖天地鬼神不容而有必敗之理然而蜂蠆有毒亦不可不為隄備切慮今年夏秋之間分遣兵衆在邊剽掠不無邊事日急臨期難以措置兼大同係西北重鎮為山西及鴈門紫荆倒馬等闗一帶藩籬而遼東永平山海宣府延綏寧夏甘肅俱是緊急邊境去處雖是節有議奏行去各該總兵鎮守等官隄備誠恐視為泛常彼此因循月日卒遇警急事情不能相機守戰設若一處不支而稍剉鋒未免諸處聞風而逓相動摇况安邊之道以先戒為寶而防患之䇿以預備為先近日遼東及偏頭闗等處節奏瞭見敵營火發數多徃南行走不可不備合無令該府差人馳驛賫文與遼東永平山海宣府大同延綏寧夏總兵鎮守守備等項文武内外官員從長計議倘或敵帥額森等摇動扇惑侵擾邊方設何計䇿可以阻截𠞰殺不令深入用何方畧可以保固邊境俾無踈虞所在領軍頭目何人堪以守城何城軍馬數少堪以増添何處軍馬太甚堪以那調沿邊一帶墩臺中間有無堪以添設所在糧餉草束有無収積堪彀支用逐一區畫停當具實囘奏定奪等因具題奉聖㫖是欽此欽遵備咨到院臣切照敵帥額森逺居沙漠虎踞一隅向者恃一時之徼倖來犯京師得以全還彼已出扵望外今又謀害本主凌處同類雖曰傳言不足盡信然無厭之性理或有之使其終不知止再敢侵犯邊鄙是自罹敗亡之禍以我之逸待彼之勞以我之險扼彼之危取勝之道何有哉臣深荷天恩叨承重寄不諳軍旅素無克敵制勝之才從事邊方謹陳設險守備之畧未知可否伏乞聖裁縁係具實囘奏事理今將永平山海直抵宻雲一帶邊情開坐具題該通政使司官奏奉聖㫖兵部看此欽此欽遵抄出到部今所言事件議擬開立前件謹題請㫖一永平山海薊州等處地方㑹同鎮守右少監都永總兵官都督僉事宗勝叅將胡鏞馬榮計議得自山海至猪圈頭止沿途路經一千二百餘里新舊營堡三十四處每營分委指揮一員管束兵二三營或四五營選把總指揮一員提督數内揀選精銳勇敢之人屯聚四處曰駐操營無事之時不守闗隘分為一等二等專一操練有警之際其營䇿應某闗俱照平日定操成規不致推托又選揀輕健善能逺走便於藏伏素知地理者聚為一營專聽截殺刼營緊急調用原設并新増大小闗寨一百一十七處每闗修砌磚牆闗外又重闌馬石牆深挑溝塹整理簽榨廣置掛木入闗至二三十里之外陡峻狹隘兩傍俱積木石其總路險要去所又行重别設備一則可以為闗外之藩屏一則可以遏敵人之歸路沿邊一帶地方除十分陡峻全不通人者不必用工其餘平漫并﨑嶇頗容徃來處所通削偏坡雖有高低頑石亦不必用火燒煆砍成牆壁間有深渠小口難以披削者則火灰石砌塞大闗用指揮一員小闗用千戸等官一員職專守把另選把總指揮一員分投提督有事則守勝地無事則輪流燒造磚灰増添防備新舊墩臺五百二十座前後聮絡烽火相望闗外至五十里止各有接連架砲士卒五十里之外至百里止各有長哨夜不収推選熟知地里官員不時徃來㸃視自營而至闗自闗而至外平居之日各司其事卒遇邊警㑹而為一又必累行踏勘籌度敵兵何路而來何路而去來則何以禦之去則何以邀之平昔設法之方大槩如此使其敵兵小至誠恐聲東擊西分兵誘我乗隙而入各該闗營照舊操守不必調遣只調原定䇿應營堡官軍恊同本官相機𠞰殺大至則通調見有官軍俱各赴受敵處所左右屯注臣與總兵躬親當其前分調叅將挑選精健士卒從間出闗控據險隘之所以遏其後驍勇頭目又各分兵埋伏乗機而動我之兵力雖寡有險可恃彼之人馬雖暴無計可施使其進無所得退無所歸蛇豕雖毒已投於䧟阱㡬何而不至於覆亡也哉然兵家情狀變態不一倘彼有兵相繼設伏以餌我無可為之機無可乗之勢則當整慎勿戰固守要害不可輕動以墮其計彼之人馬乏食漸至疲弊必不能持乆而自退矣我則萬無一失何邊患之足慮哉看得官軍頭目總兵叅將而下皆可隨機應用把總提督營堡指揮李濟等十員頗有驍勇堪以出戰把總提調闗隘指揮陳宣等八員處事勤慎堪以守闗都指揮僉事劉輔等僅可以固守山海永平薊州遵化等處城池其闗營軍馬沿邊墩臺等項俱已區畫増那停當各處倉驛糧草見勾支用前件看得所奏係干邊務既已鄒來學會同彼處總兵鎮守等官都督僉事宗勝等計議停當俱合准擬仍行鄒來學照依所處事理逐一施行務在提督有方用求實效不許虚應故事徒為文具仍嚴加禁約各該闗隘把總都指揮等官將所部士卒加意撫䘏訓練聽候調用毋得假公營私役占虐害以致軍令不行士心不附遇警不能守戰致悞事機一宻雲地方㑹同鎮守内官張溥恊賛軍務監察御史張斌鎮守都指揮同知趙致署都指揮僉事張興計議得東自黄河口起西墓田峪止路經八百餘里闗寨七十四處墩臺一百五十六座營堡八所操守軍官舎餘四千八百六十六員名沿邊一帶平漫去處俱已修削偏陂闗口修砌堅守牆城闗外重置闌馬石牆挑掘壕塹廣置簽榨又有軍民夜不収輪流架砲出哨闗内營堡常川操習聽候調遣無事之時都指揮趙致分管古北口迤東署都指揮僉事張興分管古北口迤西内官張溥御史張斌鎮守古北口通行提督宻雲中後二衛古北東西二路軍如有聲息敵少各照地方調用附近營堡之人䇿應敵衆通調東西二路官軍於受敵處所駐劄可守則堅壁清野控據要害分布官軍翼其兩哨奪其高峰使之勇無所施衆無所用人馬罷敝將不戰而自退矣可戰則鎮守内官恊賛官員躬率士卒以禦其衝突宻切選委驍勇頭目帶領精銳官軍潜伏險隘以遏其歸路挑選勇敢之夫長㦸巨斧大器短兵强弓勁弩齊力奮勇或晝而摧其堅陣或夜而襲其營壘臣等之經營圖畫設險守備不過如此切詳都指揮趙致等固可以領軍出戰指揮劉榮毛顯亦可以守城縁要害數多兵力寡少有一闗官軍多止十餘名少則五七名者平居之時畫地分守尚且不敷遇警之際將何調用者有如古北口潮河川并龍王峪五寨俱各寛漫平坦路通大小興州沙漠賊巢可容千萬人馬徃來牆子嶺甎垜子四馬等闗俱係曽經敵兵侵犯之處雖有貼守海運之人全無器械武事生踈不過因循日月懸望輪班而已倘有遣調豈得實用今照石匣驛正係東西地里適均之處水草利便可以照依永平山海等處建三駐操營一所乞勅該部計議取囘海運官軍免致徒勞糧賞將宻雲中衛并附近營州左興州後等衛在京操備官軍摘撥二千員名選委驍勇都指揮一員管領前來駐劄使其住成家業不必輪班專一操練聽候䇿應仍聽内官張溥恊賛監察御史張斌節制如此庶使首尾相連緩急得用其邊備之謹嚴可以與永平山海等處同一無虞矣倘臣言為無足取直待報有聲息臨期奏請定奪雖調京軍前來必須徃復攻守一時應援不及貽患非輕再照本處見在馬草頗勾支用倉糧數少已經具題外乞勅該部急為處置便益前件看得宻營中衛并營州左興州後等衛在京官軍係比先年間選取赴京操備之數即日多已揀作團營操練聽候警急出口殺敵而彼中事體比之各邊及京師頗緩難准撥去守備又前項撥去海運官軍比先原有此故京師暫時増添候邊事寧息亦當取囘况差撥前去已乆操習有成且在京各營亦有此等淮安等處退下運糧官軍有等操練既乆弓馬熟閑多有選作團營頭撥之數豈可盡謂徒費糧儲所撥前項官軍亦難取囘况非無勇怯之分法有激勵之道若所在鎮守等官能將前項軍士設法訓練用心撫卹自然衆心歸附武藝精熟則軍威必致於整肅武事豈終於生踈合行鄒來學等仍將前項發去相兼彼處原有官軍如法團營操練守禦地方不許親營官旗私役虐害以致衆情不附遇警僨事其奏倉糧數少一節合行戸部徑自查照定奪景泰三年四月十六日奉聖㫖是欽此預備邊務事于謙内府抄出鎮守大同太監裴當題後軍都督府准兵部咨呈兵科抄出總督軍務少保兼太子太傅兵部尚書等官于謙等題該右僉都御史李秉題稱敵中差來使臣鴻臚寺序班楊冕男楊玉説稱額森老營見今安在哈喇茂地面住坐統領精兵見在沙窩一帶藏住等因㑹同總兵官太子太師武清侯石亨等計議得敵帥額森恃其兵力志驕氣盈假以進貢為由遣人瞰我虛實而又紏集部落日漸近我邊方侵犯之謀既已彰露隄備之䇿不可不嚴其大同地方雖緊要相離京師窵逺卒難應援兵部節次行移總兵等官郭登等令其計議應否遣將増兵而各官執稱糧草不敷并敵使來朝不必増添難便定奪合無再行郭登等計議如果應合遣將領兵前去調遣戰守徑自具奏定奪等因具題節該奉聖㫖懐來操備一節明年春煖緩急定奪欽此欽遵㑹同總兵官定襄伯郭登等及都司衛所管事管操等項都指揮等官孫英等議得敵帥額森指以進貢為名糾集北部之衆故彰聲勢逼近邊陲肆其無厭之求邀以難從之請名雖曰和實則啓釁然制敵之道在於有備無虞用兵之方貴乎知彼知已今大同見操官軍除東西二路外馬隊官軍止有六千餘員名以近守則有餘以逺戰則不足步隊官軍雖有八千八百餘員名止可排營列陣不能争先趨利數内亦有精壯好漢為因無馬俱各步操如䝉聖恩憐憫邊方兵力寡弱乞勅該部量撥精鋭馬隊官軍一萬餘騎前來餘外另帶附餘馬數千疋每馬就䭾行糧數斗糧則給軍食用亦可存省邊儲其餘馬疋聽臣等於步隊内選人騎操如若馬步軍士數少即於正統十四年原選各衛所餘丁并大同府民壯查照原來量為増減整㸃齊備聽候有警相機調用如此則軍威强壯邊事可以有為人無浮沉供給不至缺乏臣等再照大同府四州七縣之民生長邊方安其習俗性既勇悍尤耐饑寒自昔至今多於腹裏及迤南衛所充當軍役其各該衛分有二三千里者有五七千里者或歲乆年深抛家失業者供役者少事故者多或因途路窵逺中道死者有之或因不服水土到衛死者有之或因貪賍官吏受囑賣放者有之起解者未至逃亡者復來該衛無實用之人原籍有清勾之擾既僉長解又斂盤纒况今兵燹以來鄉里凋零至極軍伍既不能足民户因而靠損其本府州縣官吏里老累次於臣等處告稱艱難若得就近於大同等衛所當軍情愿自備鞍馬不敢便支糧賞奮勇殺賊以圖補報臣切惟天下衛所相同者多祖宗制度難於更改但國家政務有經有權敵人事機有急有緩今者北人之於西夷大同之與他處非惟理勢輕重有不同其實事機急緩之懸絶若不先其所當重者急者而後其所當輕者緩者則守經用權之道未見其可如䝉准題乞勅該部從長計議除太原府等處邊衛軍役外其餘不拘在京在外衛所校尉力士旗軍幼軍等項今後遇有逃亡事故在營無人補伍例當清勾者不為常例俱各於大同就近照名充當軍役聽其自備鞍馬暫且不支糧賞於大同前後二衛帶管収操待後積有數多另立衛分管轄仍行原先衛分開豁籍册永不勾補縁此等之人既免離鄉背井之苦得遂安家戀土之情若使撫䘏有方教演有法遇有警急一則不忍棄其祖宗墳塋一則不忍毁其宗族産業無不心懐敵愾樂於戰鬭此與山西河南調來操備官軍主客既殊堅脆亦異庶使民户無分析之患軍衛獲有用之兵所謂一舉而兩得也縁係計議囘奏請㫖調發京兵及改調軍役事理具題該本部官欽奉聖㫖兵部知道又該鎮守大同總兵官武定伯郭登等亦題前事通抄到部案查先為前事已行勘議去後今抄前因叅照奏要量撥精銳馬隊官軍一萬餘騎就帶附餘馬數千疋前來操守一節查得在京各營官軍見䝉勅諭選揀一十五萬團營操練聽調殺敵其餘次撥官軍又有運糧等項差占數多况大同各城蓄積糧草有限供給彼處官軍尚且不敷節有奏報聲息未有十分緊急若是添撥官軍前去操守不無坐食邊儲愈見凋耗兼且京師守備為重官軍難以輕動合候有警之日另行奏請命將發兵前去䇿應其前項馬疋合無行移太僕寺揀選一千五百疋令郭登等差人闗領前去給與選出步隊精銳官軍并彼處舎餘民壯騎操應用其稱要大同府所屬州縣清解各衛所校尉力士旗軍幼軍等項俱於大同附近衛充當軍役一節校尉力士幼軍俱係隨侍等項緊要人數又兼其數不多難以存留外所據各衛清解旗軍合無准言不為常例存留彼處操備聽調殺敵候邊方寜息另行定奪仍令各該有司軍衛將清勾収發過旗軍姓名通類造册繳部以憑查考不許指此為由生事擾害縁奉欽依兵部知道事理具題景泰三年十二月二十六日奉聖㫖是欽此建置五團營䟽于謙欽差提督軍務少保兼兵部尚書等官于謙等題該臣等計議方畧會本具題節該奉聖㫖卿等便同各營頭目每從長計議敵果入寇如何可以出戰勦殺如何可以固守無虞敵若不來亦當如何操練軍馬或分或合可以百戰百勝以防不虞務在的然有可憑恃毋事虚言欽此計議得國之所恃者兵兵之所賴者將將得其人則兵無不精兵無不精則國威自振而邉方之患自平矣臣等俱以庸劣叨膺重寄馭兵乖方既厪聖慮今議得各營見操官軍巳選十萬分作五營團操以備出戰每二萬人為一營每隊五十名一人管隊每二隊又立領隊官一員每千人把總官一員每三五千又立把總都指揮一員其管隊把總大小總兵官員各量其才器高下謀勇如何而選用之使之互相統屬兵將相識如遇下教塲操練之時臣等出其不意量調一隊或三隊五隊㸃閱但喚把總管隊官姓名各官自行管領本隊軍士前來内喚出軍士一二人或三五人令管隊把總官識認是何姓名衛所却將軍人懸帶牌面上原開冩姓名衛所年貌查對查若有不同就將管隊等官量情責罰仍比較弓箭牌刀長鎗等項武藝精熟者量為奬勸生踈者一體懲治使管軍者知軍士之强弱為兵者知將士之號令體統相維彼此相識不致臨期錯亂難於調遣大意前項團操十萬合則為一營分則為五營萬一敵人侵犯人多則各營俱動人少或分調一二營或調一萬三五千隨機應敵其平日選定大小該管頭目已定則交戰之時多用則多調少用則少調止調該管頭目則士卒自隨平日相處既乆同軰之人易以相機管事之人易以使令如手足之捍頭目子弟之衛父兄比之平日混同操練不辨强弱不知號令將各營之人逐漸輳合者不同庶幾可以成功取勝又敵之所恃者弓馬衝突而已敵知我火器一發之後未免再裝遲慢以此我軍放罷火器就便馳突前來今若與之對敵我軍列陣外用鹿角遮䕶持滿以待敵若來緊堅陣不動先以弓弩對敵神銃未發先以火藥爆竹詐之敵必謂我火藥巳盡不復畏避馳馬來攻則我軍火銃火砲飛鎗火箭弓矢齊發若勢動又以大將軍擊之待敵勢動分調精銳馬軍用長鎗大刀勁弓射砍步軍用團牌腰刀一齊衝入敵陣或刺射人馬或砍其馬足臣等以身率先衝冒矢石奬勵士卒俾無退縮如有退縮者即以軍法治之此則臣等愚見操軍出戰分合之勢如此仰惟皇上徳威逺布敵必不敢侵犯京師臣等謹當用心設法將各營巳選團操并其餘軍馬一體操習整飭隊伍申嚴號令務使人馬强盛武藝精熟除團營之外另選次第精壯以備緩急調用以助團營軍威每日除演習弓馬武藝之外仍令馬步官軍兼習陣法及交鋒衝突安營走陣以為戰鬬之勢使之耳目慣熟步驟輕健能知進退坐作之法免致臨敵畏怯失錯至於固守之法則今日士卒頗多京師城垣堅固又有戰車鹿角器具敵縱勢衆可以固守無虞雖臣等愚見如此但用兵之法不測如隂陽難知如鬼神貴在臨期應變難以一定而求况敵兵矯健去來之間如飄風驟雨應敵之餘非勇無以挫其鋒非智無以破其詐必謀勇兼濟而後可以成其功岳飛有言陣而後戰兵家之常運用之妙存乎一心又曰文官不愛錢武官不惜死天下太平矣臣等既蒙朝廷大恩授以重任敢不潔已愛軍以振士氣捐軀効死以報國恩縁係㑹議戰守事理具題景泰三年十二月二十二日各官奏奉聖㫖是兵貴乎精將在謀勇卿等務要同心恊力操習軍馬有事運謀或戰或守若無事則撫恤士卒養其銳氣遇警急易於調用這等不負朕委託之重欽此處置三團營䟽于謙該各營總兵等官太子太師武清侯石亨等㑹議得迤北敵帥額森倚恃强盛屯聚士卒近我邊疆若不預為設法選練設使遣將調兵軍不識將意將不識軍情不能為用今五軍三千神機等營各有總兵掌管規矩不同倘遇調遣輳撥前去非惟軍將俱不相識抑恐號令不一悞事不小合無於五軍三千神機等營選揀精銳馬步官軍一十五萬内五軍營八萬神機營五萬三千營分為十營一營一萬五千用坐營都督一員五千用都指揮一員共用三員一千名用都指揮一員或指揮一員把總共用一十五員五百名又用指揮一員把總共用三十員每隊用管隊官二員前項坐營把總等官各於營内選揀廉能驍勇之人管領操練俱聽臣等往來提督管操太監劉永成原管神機營阮讓原管三千營取自上裁令其提督操練監鎗内臣隨同前去各營監鎗如有聲息各調官軍若干或用一營二營三營就着某總兵官及坐營都督統領前去互相䇿應征𠞰其餘官軍令的當頭目管領各於本營操練如此庶得號令歸一人易遵守内外兩得其濟臨敵必能成功縁是㑹議軍務守禦京師事理具題奉聖㫖是欽此為軍務事于謙先該宣府等處總兵等官奏報賊寇聲息緊急欽命臣同各營總兵官計議戰守方畧臣等巳將議到方畧逐一開奏該奉欽依是欽此除欽遵外今照總兵官武清侯石亨同左右副總兵叅將都督孫鏜范廣過興張義等見今挑選到五軍三千神機營頭撥精鋭官軍二萬員名均派三營照舊操練外臣等原先議奏方畧内要領大將軍砲丁六箇并量領大砲飛鎗手把銃以備衝敵之用俱未曽闗領今照火砲之具實乃軍威亦敵人平昔所畏必須平居之時領出聽總兵等官設法令軍士演放操習慣熟量其高低逺近緩急疾徐一旦臨敵方能不亂而有成功又况今日夜不収往獨石等處哨探囘還説稱哨馬營一帶俱有敵兵駐劄其勢浩大竊料敵兵候秋高馬肥氣候漸凉不無有侵犯邊方深入為寇之意兵家之事以先戒為寶防患之䇿以預備為要况神機營撥到官軍數多砲少周匝罷列不敷切恐臨機難於禦敵乞勅工部合無將後項開列銃砲火器等件照數作急於内府闗出交與總兵等官石亨等如法収貯隨宜操演其大將軍砲十六箇斤重數多人力不能背負合用駞載車輛亦乞行移工部成造具題奉聖㫖是欽此覆湖廣奏免調戍廣西事于謙兵科抄出巡撫湖廣都察院右都御史李實題據湖廣都司呈案照先准湖廣按察司牒呈奉本院劄副備仰本司轉屬行查守備廣西官軍人等額定名數及從前至今死亡數目呈報施行備牒奉此行據荆州徳安等衛所呈申查得逓年輪班廣西征進官軍每年蒙撥哨守潯梧等州大藤等峽為因感患山嵐瘴氣死者一年每衛所一班不下百十餘名不免要軍撥補其事故旗軍節經發册有司清勾延及一二年十無三四解衛見在旗軍節因湖貴地方苖賊作耗并漕運京倉儧運糧米軍餘盡數征差去訖似此連年廣西備禦不絶衛所旗軍日益事故數多委的缺軍䕶守城池各將逓年事故死亡數目開申到司除茶陵寧逺二衛夷陵守禦千户所未據開報外今將荆州等一十七衛原調廣西兩班備禦逓年事故官軍數目開呈到職案照近據岳州衛申據本衛輪班廣西備禦千戸楊麒呈前事自正統十四年八月内管領旗軍潘辛三等一百五十四名前往廣西聽副總兵征蠻將軍都督武毅調撥欝林州等處哨守景泰元年至景泰二年八月内瘴疫傳染陸續病故六十名在逃二十名止有七十四名囘衛呈乞撥補聽候換班行㨿左右等五千戸所申稱旗軍盡數差撥征進運糧别無空閒軍人可補隨㨿本衛止有食糧正軍一千八十四名廣西二班三百五名漕運六百五名於内逃故五十五名無軍撥補巳將餘丁補運外續調常徳等處䇿應殺苗一百三十七名原征麓川復征香爐山等處二百三十四名於内逃故陣亡病弱六十名後調貴州殺賊選要精壯縁無軍選補又於䇿應軍内㨂選精壯四十八名并餘丁輳補起程外餘存軟弱八十九名係䇿應之數奉總督軍務右都御史王來劄副仰令整搠在衛操備聽候調用此照原數尚欠四十八名無軍補完移闗到衛照得班次在邇前項逃故數多無軍撥補不無有悞申乞定奪等因到職叅照岳州衛申稱原撥旗軍潘辛三等一百五十四名前往廣西哨守内病故六十名在逃二十名止存七十四名囘衛輪該景泰三年二月初一日前去換班及逃故名缺行據各所申稱旗軍盡數征差運糧䇿應等項無軍輳補要行定奪一節為照岳州乃湖湘衝要之地見今靖州等處苗賊生發城池必須固守斯無後患即目在衛别無正軍止有新選餘丁數不補百既稱無軍暫免輳補候征進官軍班師之日照舊撥補前去廣西守備所㨿見在官軍合行依限換班其逃故軍人亦合照名取補除通行勘去後今呈前因臣訪得廣西地方洪武年間原無官軍守備至永樂二十一年因欽差總兵等官在彼鎮守奏撥湖廣所屬衛分官軍五千員名分作上下二班輪流縁廣西係煙瘴之鄉本土人民尚有死亡其前項官軍素非本處生長不服水土俱各染疾名雖在彼備禦實乃養病度日不堪操調虚費糧賞無命者俱即病故幸生者多致風癱從前至今官軍相繼輪班一家有死一二人者有死四五人者姑以總數計之其原額共該官軍一萬餘員名除茶陵等衛未曽開報今查荆州等衛所已死一萬六千六百餘員名逓年輪班囘還死者過半俱要本衛所輳補又兼近年以來麓川等處賊寇竊發調軍征進及裏河運糧等項差役重繁官軍逃故數多無軍撥輳盖因死者愈速而生者不繼為今之計欲令官軍照舊守備未免罹此廣疫是以無罪之人而置諸必死之地徒有守備之名而無守備之實欲將官軍停罷不設誠恐彼處不時出沒侵擾地方必須有備然後無患臣識見短淺計莫能及乞勅該部㑹同多官計議斟酌可否務使邊境有備禦之方官軍免速死之患縁係邊備軍情事理具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出到部叅看得李實所奏前事大意欲要將廣西輪班官軍存留另行設法撥補前去廣西操守臣等切照廣西地方多係土官衙門蠻夷雜處易動難安先因彼處官軍數少議將湖廣官軍調撥一萬員名分作兩班輪流前去守備經今年乆比因廣西賊寇生發十分猖獗該副總兵等官都督武第等奏稱官軍數少調遣不敷要行添調大軍征𠞰本部為照附近廣西各該都司地方俱有盜賊生發俱用官軍撫捕卒無相應堪以添調巳經覆奏行令湖廣廣東二都司將原定廣西輪班官軍依數上𦂳催促前赴廣西聽調今查湖廣都司所屬衛所官軍舎餘共一十四萬二千二百餘員名廣西都司所屬衛所官軍舎餘止有四萬四千八百餘員名以一十四萬之中一班輪該五千赴廣西操備其數不多今若要行􅅏存不肯調撥委的廣西地方賊情𦂳急其他去處别無相應之人可以那調况廣西湖廣地方兩處相為唇齒賊情緩急互為應援即目湖廣永州地方被廣西流賊越境侵擾設使廣西兵勢振肅自能撫捕未必貽患地方况本處官軍數少别處調來守禦非獨廣西為然且如京師見有七十六衛所官軍又行添調河南山東等都司并北直𨽻衛所官軍輪班赴京操備而河南等都司官軍亦調大同并陜西延綏等處備禦與原衛地方相離窵逺并無干涉尚然那調何况湖廣附近廣西而地界聮屬賊寇往來出沒一處有警則兩處不安今要存留不行調去匪獨為廣西之患抑且非湖廣之利臣等又議得一歲之中所在軍民尚有死亡事故今以前項輪去廣西備禦官軍二三十年之間豈無凋耗物故兼且各司府州縣清解軍丁自有本處衛所而囚犯編發充軍亦各有限實是無從區畫另調前去廣西備禦所奏難准合無行令該府行移湖廣都司將廣西輪班官軍照數依期督發起程更替仍整搠在衛軍士并舎餘人等操守城池遇有𦂳急賊情聽總兵等官調度守戰不許指以軍少為由因而怠忽兵備候廣西賊寇十分寧息將前項調去備禦官軍另行議奏定奪縁奉欽依兵部知道事理具題奉聖㫖是欽此奏乞聖㫖榜文以安反側事于謙切照福建浙江湖廣貴州廣東等處地方近年以來為因旱澇相仍民多艱窘有司不才官吏不能盡心撫綏却乃生事逼迫以致盜賊竊發良善被害上干宸慮勞師逺征天心助順將士效力所在寇盜以次削平各處地方漸就寧謐此誠國家萬萬年太平之慶臣等切惟大易有思患預防之言虞書著儆戒無虞之訓是以古之聖帝明王制治保邦之心未必不先事而慮今朝廷凡一應軍需財用糧餉物料大率取辦江南軍民儧運供給此賊寇頗寧人心甫定之際所宜維新命令以防患於未萌看得湖廣貴州苗蠻多係巢居穴處其性頑獷易動難安其靖州曽定等處餘寇未盡剪除福建浙江多係山深林宻去處為因産有銀礦頑民往往㝷踪竊取稍失防閑輙便讐殺近雖温州等處地方各起盜賊巳曽擒獲干連抄提人口該鎮守官侍郎孫原貞具奏要行寛宥本部依擬覆奏欽准免其抄提令其復業誠恐舊染未除驚疑未定因争小利復起釁端又兼原調殺賊軍屬多已散囘各衛各班捕盜領軍官員亦有取囘原任者萬一不逞之徒踵為嘯聚重復議設方畧征討轉餉撫捕不免事出倉卒人愈勞困雖皇上聖徳逺被萬方决無此虞防㣲杜漸不可不慮近雖節有欽奉詔書事例并本部行移各處鎮守等官令其隨宜招撫叛寇􅇺安軍民未免循常不能聳衆合無請給聖㫖榜文本部差官舎人分投馳驛賫與湖廣貴州廣東廣西福建浙江等處總督提督軍務及鎮守等項尚書都御史侍郎等官薛希璉王來孫原貞李堂孟鑑寇深李匡等令其各為謄冩有總兵官去處用總兵官印無總兵官處用所在布政司印於各府州縣土官衙門去處張掛曉諭軍民番夷頭目人等爾等先前或為不才有司激變或為豪右大富凌逼或土官以恃暴横不能恤或守臣不得其人騷擾或為賊黨哄誘或為賊人擄掠不得已從賊為非今賊首多被官軍擒獲爾等有改過革心復還鄉里者亦有陽為順附隂持譎計者且爾等自從祖父以來受國家恩養將及百年祖宗墳塋父母妻子完聚保守足以衣食為良民乆矣今一旦舎順從逆去安就危其所以不為官軍殺獲幸矣自今益思保全之計輸誠順附各安其業朝廷體天地好生之心廣一視同仁之量前罪俱置不問共享太平之福永永無害若或隂持詭計竄遁山林圖為目前之謀不顧後日之悔則命將出師設法擒獲首從必殺無赦悔將何及爾等雖一介編氓或生蠻種然好生惡死人之常情趨吉避凶世之通論爾等不可不審死生吉凶之理其各司府州縣宣慰宣撫長官司等衙門官員自兹以往亦宜洗心滌慮奉公守法撫愛下人不許貪婪酷暴肆為凌虐以致激變小民重貽後患如若仍前有違一體處以重罪如此庶可以安反側之心而消意外之患本部仍通行薛希璉王來孫原貞孟鑑李堂寇深李匡等令其公同彼處鎮守總兵等項内外官員及巡按御史都布按三司堂上官員從長計議陳設方畧何處殺賊十分盡絶何處賊寇尚未平安何處軍馬可以散囘何處官軍仍暫守備何方可以絶後日之患何䇿可以為經乆之計備將議過防患方畧逐一具由差人馳奏以憑定奪不許因循苟且虚飾繁文自貽方來之患縁係邊患事理具題景泰二年五月日奉聖㫖是欽此覆都御史王來與僉都李匡訐奏平苗䟽于謙兵科抄出總督軍務等官都察院右都御史王來等題景泰二年八月十四日節該欽奉勅諭巡撫四川左僉都御史李匡奏爾等差人往彼期約六月初一日三路進兵俱至草塘㑹合播州官軍𠞰除苗寇及李匡領軍到彼而爾等班師致令孤軍無援幾陷賊計朕覽貴州三司并李匡所奏則彼處地方多未寧靖而爾等不行用心殄滅輙便班師玩寇殃民罪不容恕但今用人𦂳急姑記爾罪勅至爾等作急統領官軍前去貴州將前項有賊地方逐一搜𠞰盡絶以除邊患不許頃刻稽遲縱令各賊復肆猖獗有悞事機仍將先李匡所奏事情從實囘話奏來處置欽此欽遵續准兵部咨該巡撫四川左僉都御史李匡題欽䝉勅令臣提督四川行都二司官軍撫捕播州苗寇除欽遵外照得播州貴州相為唇齒貴州在平南而賊附於播州播州在平北而賊附於貴州其草塘江渡三百勞清水江在乎貴播之中蓋賊之巢穴也播州雖有官軍七百餘衆僅能據烏江之險守要害之地者九處以防禦侵境之賊及隄備貴州糧道若欲𠞰平草塘等處賊人必得貴州大軍㑹合夾攻庶幾事有成效而無意外之虞近該總督軍務右都御史王來同正副總兵叅將等官統領大軍自湖廣前來貴州臣咨請王來先行㑹兵攻取草塘等處使播州無囘顧之憂就調守播州官軍并力前進以靖地方用緩民力續准王來囘咨開待貴州香爐山克破之後分兵㑹取草塘等因後訪香爐山極貴州之險為照用兵之道當先取易以振威不可先難以挫銳致㝠頑之賊負固抗敵月乆不下臣以貴播地方之平在此一舉若或稍却賊風益熾臣於景泰二年五月初六日摘撥守備播州各隘口官軍二千員名親自領兵䇿應十四日行至龍里據貴州按察司呈奉右都御史王來劄副開彼處軍馬足勾調用仰本司轉行與臣領軍囘還臣依呈囘至播州本年五月三十日王來差百戸余瑾馳驛賫咨與臣開稱香爐山賊人招撫下山議令副總兵毛福夀方瑛叅將安順李震等分領官軍於六月初一日起程一路自平越衛進一路自黄平千戸所進一路自偏橋衛進俱至草塘㑹合播州官軍𠞰除苗寇臣訪得黄平與平越到草塘常行路該兩日軍行路該四日播州到於草塘路該六站各隘口摘撥官軍四千土兵二千亦於六月初一日起程初五日到烏江初六日過江初七初八日就彼駐劄探聽貴州軍馬聲息據監察御史焦寛呈開㑹都指揮曹廣等統領軍馬已到黄平臣於九日起程十一日到草塘官軍分作前中後三營土兵分作左右兩營並無貴州三路軍馬到來致被賊人眇視孤軍深入重地日夜在於四山吹角呐喊臣恐各賊邀截後路拘旋經過去處聽招寨長到營諭以利害禍福給與賞勞令各將精壯人丁隨軍征進杜其異心其惟以次人丁守備糧道戒諭官軍死戰則生又有陞賞之榮退縮則死雖或逃生而又有犯法之辱官軍自知深入重地援兵未至莫不激勸奮勇本月十三日夜賊人不知其數來刼前營官軍知覺奮勇對敵斬首九級賊人退散生擒四人十五日賊人約聚二萬餘衆前來拒敵前營指揮僉事李銘領軍當其中後營指揮同知陳瑄李經等領軍出其右土兵隨官軍之後一正兩竒四圍夾攻官軍奮勇效死一戰斬首四百四十三級生擒三人餘賊丢棄鏢弩盔甲挨牌盡行潰散官軍追逐三十餘里焚其巢穴煙熖漲天獲到被虜軍民男婦三十一名口軍勢奮迅賊風披靡若得貴州官軍加以數千䇿應則草塘等處地方可不一月平定臣於十六日差健步前去黄平千戸所取軍䇿應及差土人前去各寨招安各寨苗頭漸來納欵續據本所申稱總督總兵等官巳行班師去訖為是孤軍或恐苗情多詐只得囘還叅照㑹兵𠞰殺賊寇最為重事時刻不可稽違今右都御史王來約臣進兵深入重地却乃班師囘還非獨欲陷臣致死實欲損朝廷之軍馬悞朝廷之地方原其立心實是隂險幸藉朝廷洪福全勝旋師於本月十九日起營囘還縁係捷音及照右都御史王來亦合有罪係掌握兵柄大臣通行具題伏乞聖裁該部本官欽奉聖㫖兵部知道欽此欽遵抄出到部查得先該總督軍務右都御史王來總兵官保定伯梁珤各奏湖廣之靖州天柱銅鼓五開貴州之平越清平都勻等處苗蠻夷類俱巳撫捕寧息二處地方皆已無虞要行班師囘京及該巡撫寺丞王恂同巡按貴州監察御史都布按三司又奏貴州金筑安撫司并普定畢節等衛苗賊復縱刼掠尤甚於前聲言候大軍囘還要來攻城仍乞梁珤等駐兵𠞰殺等因具題本部巳經覆奏請勅王來梁珤等調度原額官軍達官人等星馳前去貴州撫捕賊寇續該王來又奏貴州三司不當將前項賊情奏報等因本部為照貴州係是重地其都布按三司等官既見賊寇攪擾地方不得不奏王來係總督軍務官員不咎自已不能統兵前進肅清邊境却乃歸罪别人事屬不當又經覆奏就令差官奏事人馳驛賫文與王來梁珤等作急督領官軍前去貴州㑹同右副總兵都督方瑛照依勅内事理設法撫捕苗寇去後今該前因臣等切惟受上命而弭盜安民者責任至重挾奸計而玩寇殃民者法令難容切照右都御史王來猥以小才驟膺重職任都風紀總督兵戎所宜竭忠盡誠運謀戮力掃除作耗之苗蠻慰安逺方之黎庶必候事盡寧妥方可奏請班師豈期本官懐奸挾詐長寇殃民惟隂險之是圖棄信義而弗顧既已行移巡撫四川僉都御史李匡領調官軍到於草塘㑹合𠞰賊及至李匡督率官軍冒險逺進累遇賊衆而王來却乃先行班師並不發兵䇿應以用兵為兒戯視邊務如等閒俾李匡進退兩難使孤軍深入無援若非李匡等仰仗天威奮勇敵戰萬一寡弱不支誤中賊計非惟益賊寇之縱横抑且遺蠻夷之恥笑所據王來不義不忠陷人死地止知遂已之奸謀不恤朝廷之大計其為罪惡實等淵海及照總兵官保定伯梁珤與王來彼此相資同惡相濟不候賊寇殄滅輙便一同班師原其情犯厥罪惟均况今邊方多事軍務為先王來梁珤為總督總兵之官玩法壊事於此若不行提問罪無以大彰天討垂戒將來合無令法司差人將王來梁珤通行提取赴京問罪仍乞聖裁另選忠誠智勇文武大臣各一員代替王來等充總督總兵前去貴州撫捕苗賊如其聖恩寛大未即加誅亦乞請勅切責王來等令其改過遷善奮勇設謀務在殄滅邊寇候事畢另行提問及請勅奬勸李匡旌其能恤鄰邦之患躬提孤軍深入又能殺敗賊寇擒斬賊首當益勵忠勤用心教練軍士聽候調用仍將殺賊有功官軍取勘明白從實造册開奏以憑定奪陞賞等因具題該本部官奉聖㫖李匡雖奏王來梁珤如此奸謀玩寇殃民未知虚實邊境正要用人之際便冩勅去着上𦂳領兵前去貴州殄滅苗寇就將李匡奏的事與他看着從實囘將話來欽此欽遵通行備咨到臣除行總兵官保定伯梁珤欽遵外臣來查得景泰二年二月内准巡撫四川左僉都御史李匡咨開貴播賊徒相為依附播賊非貴州之賊附集甚衆不敢屯聚方今貴州之賊重在清越播州之賊結在草塘雖𨽻播州其恊草塘之民以為非者又皆平越等處之苗今臣分兵一二萬令一總兵自興隆取路前來直抵岑貴與李匡㑹合并力克復草塘等因彼時臣與叅將等官俱於湖廣靖州囘軍出至沅州犒賞官軍前進貴州議得貴州之賊惟平越清平都勻興隆最為險惡之處况賊首韋同烈等一向在彼圍城截路欲依李匡之計分兵取路先進草塘以安四川播州之境則彼官軍固為快意可以釋其備禦之乆然貴州之平越清平興隆一帶賊寇方且阻截大路邀奪糧餉草塘何由而進萬一得進我之官軍如在甑中何由而出决然不可必須大軍且於大路前進興隆直抵清平平越㑹合副總兵方瑛等軍馬將附近大路為惡苗賊東西夾攻以通糧道候前項去處道路䟽通撫捕平靖兵糧並進其勢自屈不過掃蕩撫捕而巳囘咨去訖臣等統調大軍於本年二月二十二日至二十三日進至興隆果有賊首苗王韋同烈等聚徒三萬餘衆逞兇拒敵及砍橋奪路當督官軍奮勇殺賊隨即乘勢直抵清平㑹合副總兵都督方瑛等官軍分哨長驅勢如拉朽各路苗賊無不望風披靡既而躧探得賊首苗王韋同烈等因被官軍殺敗却乃奔上香爐山寨又欲糾合賊衆來拒官軍臣等又㑹同計議香爐山寨固為至險是乃賊衆觀望之地今賊首韋同烈等奔潰去彼又欲聚衆倘或持乆其勢益强卒難取勝莫若乗其弊敗兵心分攜之際嚴督各哨官軍俱進香爐山寨并力齊攻庶賊首可擒而餘賊可滅於是戒誓各哨官軍鼓勇奮鋭分路攻打為惡苗寨徑抵香爐山寨下週圍列營齊攻夾擊仰賴皇上聖威神武致將賊首韋同烈等擒獲餘賊得招間本年五月初十日又據貴州按察司呈奉李匡劄副近聞大軍攻圍香爐山寨而彼蠢然無知賊人尚猶據險未下今當職擇於本月初六日率領官軍前來䇿應合先行劄副本司轉報總督總兵等官知㑹如是克破請作急報知以免官軍往復等因備由具呈前來臣等看得香爐山寨賊首已擒餘賊將下况見在官軍已勾攻圍今李匡説稱要行作急報知以免往復必是未曽起行况今天道炎熱未免虛費糧餉以此行文報知阻其前來免致軍士往復於本月十二日香爐山寨苗羅義等率衆下山聽招臣等逐一撫令安業至本月二十四日領軍出至清平又行㑹議貴州所屬興隆清平平越至西極險之處俱已𠞰捕寧息其都勻草塘雖係偏隅即合分兵撫捕以靖地方庶可班師臣來督調副總兵叅將等官都督方瑛等領統官軍於平越一路臣珤統調都指揮曹廣吉世英并監察御史焦寛於興隆黄平一路俱進草塘左副總兵都督毛福夀等統領官軍俱進勻塘仍行報知李匡將彼守備播州官軍前來恊應俱於六月初一日啓行前進㑹合撫捕自本月初一日至初八日節准都督方瑛等手本開將平越所進地方王都保等處苗頭阿郎等及黄平安撫司太平等寨長甘把楊等俱已招撫領榜及開草塘青池西煙等處各寨苗衆俱稱四川播州管轄俱住原管官司聽招去訖及據監察御史焦寛呈將前項縁由已呈李匡知㑹外候至本月初十日臣來於清平沾患痢疾有都督方瑛到臣歇處説稱草塘苗民怕當兩處差發以此要去播州聽招别無生抝事情㑹議間又准李匡咨稱四川守備官軍五年不曽更替饑寒切身死亡相繼在外征進疲弊之甚為照香爐山之賊既巳投降都勻草塘必皆易取則是地方可平班師可必令臣來㑹同總兵等官早將四川都司官軍放囘等因臣等議得四川貴州地里相叅至為鄰近若將四川官軍先放其湖廣諸處官軍苦涉尤多則又何以拘執况大軍之衆進退一律豈可偏意自由以妨大計臣等不曽准允候至十四日因彼絶其消息囘報臣又備將前項縁由及囘軍事情行文差百戸余瑾馳驛賫報為是天道酷熱疫病大作又恐糧餉不充官軍大衆勢不能駐且貴州以後别無事情來報以此公同副總兵叅將叅賛等官㑹議明白踈放官軍將前情各具本奏請定奪班師並無别項情由豈期李匡懐此深機逞功却奏臣等立心隂險欲損軍馬欲悞地方臣等叨領總督總兵之任使有損軍悞事臣等之罪何所容逃此李匡蓋是嗔怪臣等不從其計先進草塘致其在彼守候月乆又且阻其囘軍不㑹得與克平香爐山寨之功及不先放四川官軍以此結怨加詞過毁借使草塘之賊可以孤軍進𠞰則播州守備守軍在彼經及三年咫尺一江猶且不敢過岸若非湖廣貴州官軍東西㑹合擒獲賊首韋同烈等及將清平平越興隆并香爐山寨一帶地方𠞰撫寧息李匡未必肯來及至行文報知尚且遷延直待苗衆聽招之後纔方伺隙乗虚以計取功臣等又看得李匡等奏稱彼處苗賊眇視孤軍深入重地日夜在山吹角呐喊恐賊邀截後路拘喚經過去處聽招寨長到營諭以利害禍福給與賞勞令將精壯人丁隨軍征進以次人丁守備糧道一節似非的實既是深入重地賊人眇視孤軍恐有邀截縁何彼處又有聽招寨長與其同處一類之人肯出精壯人丁隨同征進以次人丁守備糧道恐無是理其後又稱差人前去招安各寨苗頭漸來納欵為是孤軍只得囘還此等情詞無非要見草塘之地皆李匡撫捕之功無有臣等軍威之力况草塘之苗先該副總兵叅將開稱俱往四川播州該管官司聽招去訖各行李匡知㑹今苗既巳聽招亦各放心自在忽見李匡官軍復來如何不驚惶呐喊防備抵禦是固情理之常若草塘之苗未曽聽招之時李匡官軍守備年乆豈能領軍獨進前項事情軍民共知瞭然明白實難虚妄前者臣等具題聽候班師本内俱巳開陳詳悉但臣等識見愚闇不能預防李匡隂謀致其羅織如此罪重丘山伏望聖恩憐憫特加寛宥臣等下情尤乞聖明俯垂監察臣等益當盡心竭力統調官軍前進貴州將未靖地方逐一撫捕以除邊患及奉欽依李匡雖奏王來梁珤如此奸謀玩寇殃民未知虚實邊境正要用人之際便冩勅着上𦂳領兵前去貴州殄滅苗寇就將李匡奏的事情與他看着從實囘將話來事理臣等不勝戰慄感激具本及將李匡節次原來咨文及臣來囘文謄冩隨本封進具題該本部官欽奉聖㫖該衙門知道欽此欽遵抄出到部案查先該巡撫四川左僉都御史李匡奏前事巳經通行總督軍務右都御史王來總兵官保定伯梁珤令其照奉欽依内事理從實囘話去後今抄前因叅看得王來囘奏及繳到與李匡往復文移内事情其王來既於本年五月内克破香爐山寨出清平㑹議得都勻草塘雖係偏隅即今分兵撫捕以靖地方庶可班師王來督調都督方瑛等官兵於平越一路梁珤等統調都指揮曹廣等官軍於黄平一路俱進草塘仍報知李匡將彼守備播州官軍前來恊應俱於六月初一日啓行㑹合撫捕後李匡果於初一日領兵起程十一日到草塘地界彼時王來正當督兵倍道兼行前去䇿應設或人衆路逺倉卒難至都指揮曹廣軍馬巳到黄平去草塘師行路止四日亦當飛檄曹廣領兵赴援表裏夾攻則草塘等處苗寇或可𠞰無遺類計不出此却乃懐挾奸詐嫉忌功能不思李匡孤軍深入重地寇賊環繞進既不可退又不能三軍之命懸於毫髮其望捄援甚於水火而王來自五月十四日到清平至六月十四日前後共二十日端坐一城稱疾不行啓發又不督令别路官軍前進止憑都督方瑛手本及據本官口說苗民聽招等因輙差百戸余瑾馳報李匡囘軍又與梁珤將大軍擅自踈放以致賊黨未平地方未妥及照王來身任總督手握重兵緩急賊情所宜知悉清平相離草塘不甚窵遠豈無差去哨探之人却奏李匡絶無消息顯是躧探得李匡人馬已臨賊境忌有成功故意掣囘大軍隂欲壊彼之事逞已之能又看得繳到與李匡往復文移内報知李匡要伊領兵前來草塘恊應㑹合撫捕賊寇𦂳要咨文隠匿不曽奏繳却將李匡今年正月内與伊促兵殺賊咨文内並不干涉者混粘奏繳又將五月三十日李匡與伊要取囘四川官軍咨文奏改於六月十一日到清平㑹議之後又不輸情服罪調弄繁文雖曰展轉彌縫終係辭理不直似此熒惑聖聽遮掩己非奸欺不忠行險悞事合當治罪再照李匡任風紀之要職膺巡撫之重寄明知四川播州與貴州都勻等處相連苗賊為惡非止一日城池被其圍困人財苦於殺掠擁兵觀望不肯捄卹聞知王來等大軍巳於今年二月間起程進至香爐山寨等處撫捕賊寇漸巳成功李匡至五月間纔領軍前去䇿應顯是虚張聲勢意圖邀功及王來囘報彼時官軍已勾攻圍止囘李匡中心不平却將四川調去貴州殺賊官軍擅自移咨要行囘取各計私忿不顧大計亦合有罪但王來見今總督軍務往來湖廣貴州地方撫捕賊寇李匡巡撫四川俱係重事合無令法司差人將各官通提赴京問擬明白奏請發落另行奏差忠誠才智文職二員更替王來李匡整理事務惟復且不提問各另請勅切責王來李匡并梁珤等今後各要洗心滌慮改過遷善恊心比志以副朝廷之託運謀戮力以安反側之患其有未平賊徒各照地方務在設法撫捕果有地界毗鄰勢必兩相應援必須捄灾卹患你我相濟以圖成功以祛民害不許似前疑忌矛盾互相訐構是非有失大體致悞軍務如違一體治以重罪縁係具奏囘話及奉欽依該衙門知道事理具題景泰二年九月日奉聖㫖王來李匡各逞私忿不顧朝廷大事理當究問今邊境未寧且冩勅切責他每着用心整理邊務再不許互相訐構事發不饒欽此為病故官員事于謙景泰元年十一月十二日禮科抄出雲南都司等衙門都指揮使事都指揮僉事胡誌等題有總兵官黔國公沐斌先於正統十四年九月初二日忽患風濕手足緩弱節次請醫調治稍痊一向扶病管事景泰元年九月十九日又加嘔吐咳逆病症至二十八日轉加痰疾喘急醫治不痊至本年十一月初五日身故縁係總兵鎮守官員具題該禮部官欽奉聖㫖該衙門知道欽此欽遵抄出到部除另行外照得雲南地方多係土官衙門自國初以來皆係黔國公父子相繼世守其地號令素行蠻夷信服今沐斌既已病故一旦改委他人代總兵政切恐衆心不服難於統理况隴川等處賊子遺孽未曽殄除而附近貴州四川俱有盜賊生發須主將得人然後地方安妥訪得沐斌應襲之子尚幼其姪沐璘見任雲南都司署都指揮僉事威望雖未素著實乃沐氏宗枝夷人頗知其名逺近亦皆屬望若是權宜陞用事體實為允當及照右都督方英見任雲南充叅將征進隴川驍勇善戰廉介不貪雲南之人素所畏服亦堪委任但本官見在貴州殺賊先因巡撫貴州右寺丞王恂奏保方英堪充總兵鎮守貴州本部為照貴州等處已有總兵官保定伯梁珤方英見充右副總兵賊寇未曽平安難便准令鎮守巳經議擬奏准令方英仍充總兵官鎮守貴州去後今照貴州等處賊寇尚未盡絶正用能幹將官撫捕方英難便那動合候貴州賊平另行定奪伏望聖恩先將沐璘量陞都督同知或都督僉事請勅充總兵官掛征南將軍印令其鎮守雲南撫按夷民操練軍馬禁革奸細保障地方凡百所行務在上體聖心逺法祖宗毋貪淫暴虐以失人心毋怠忽因循以誤邊務如遇地方蠻寇生發㑹同叅佐并守土官員計議停當相機撫捕不許輕易畏縮因而失機悞事及訪得雲南都司署都指揮使事僉事胡誌練達戎政比衆為優合無實授都指揮使請勅本官充左叅將恊同沐璘鎮守仍令沐璘胡誌公同鎮守雲南内官郝寧叅賛軍務副使鄭顒及都布按察司堂上官巡按監察御史於彼處都指揮或指揮内推舉堪充右叅將二人開具實跡作急㑹奏以憑定奪不許狥私濫舉欽依該衙門知道事理具題奉聖㫖是沐璘陞都督同知掛征南將軍印充總兵官鎮守雲南胡誌署都指揮僉事充左叅將恊同沐璘鎮守軍民務要事妥夷安欽此為邊患事于謙兵科抄出貴州布政司思南府蠻夷長官司土官長官安逸奏伏覩大明律内一欵若内外大小官員但有本衙門不便事件許令明白條陳實封奏呈取自上裁若知而不言茍延歲月者在内從監察御史在外從按察司糾察欽此欽遵臣任土官不敢緘黙合將本處地方不便事件逐一開坐具本親賫伏望皇上體祖宗之成憲憫邊境之生靈仍命内外廷臣斷以至公早為救濟庶幾邊患可息軍民可安臣一芥草茒罪當萬死下情不勝惶汗之至具本該通政使司官奏奉聖㫖該衙門知道欽此欽遵抄出到部今將所奏事件逐一議擬開立前件謹題請㫖一件安邊事有鎮逺府卭水一十五洞蠻夷長官司十四寨反叛苗人原係前思州田慰親管永樂十年内本官調領各寨苗人攻破思南地方後改府治將前長官司撥𨽻新設鎮逺府其性兇惡得肆奸謀累䝉總兵官都督梁福等貴州左布政使蔣廷瓉處調官軍𠞰滅豈期鎮逺州土官同知楊政麟妄意招撫總兵官信其惑亂不曽征𠞰連年滋蔓宣徳年間有湖廣都指揮何貴往來備禦見得縱横奮勇生擒賊徒斬首抽腹是以地方寧靖本官與按察使應履平不知被其排奏革去自此守鎮不嚴乃於前歲糾合播州宣慰司草塘貴州平越等處兇苗出境謀殺軍民放火燒破大小衙門經今三年未曽寧息苗賊聞知大軍數多面從心異雖是靖逺伯王驥招撫不過一月又將石阡思南二府人民重復殺虜逃命者至今招撫不囘藏山者缺食餓死苗賊不時猖獗若非添設大軍討滅終被侵害乞勅兵部定奪調遣江西都司衛所軍馬湖廣江西四川雲南四布政司民壯兼同各處宣慰宣撫安撫招討長官勇猛蠻兵土軍通行總督軍務都御史總兵等官調度將前項為惡兇苗盡行𠞰滅勿聽招撫仍於四川播州宣慰司照舊除授軍職副使僉事恊同土官宣慰撫治其湖廣貴州邊衛分撥總兵叅將鎮守如此則地方可寧矣前件看得貴州地方先因苗賊生發欽依總督總兵等官右都御史王來等統領官軍在彼撫捕近因各賊未平巳經節奏行王來等作急設法處置今奏要添調江南官軍民壯將兇苗盡行𠞰滅勿聽招撫一節縁王來等處已有調到雲南四川二都司官軍兼同本處原有官軍守戰又况近日湖廣貴州等處俱有盜賊擾攘各用官軍撫捕别無相應堪以起調兼且區畫賊情撫捕殺戮二者相須為用若專於殺戮不聽撫捕非惟賊數類多不可勝誅抑恐鋒刃所及横罹無辜合行王來等務在整肅官軍人等將前項苗賊上𦂳設䇿撫捕其間若有悔過遷善誠於納降者則開以更生之路使之復業怙惡不悛終於反覆者則振以官兵之威俾其授首既不許一於招撫縱賊長奸亦不許果於殺戮濫及無辜必須處置合宜而患害蠲除地方寧謐而經乆利便仍將撫捕賊寇盡絶縁由具實囘奏其稱要於播州宣慰司除授軍職副使僉事恊同土官宣慰撫治查無事例難准又况各處土官衙門已有都布按三司官員分巡整治難再濫設及稱湖廣貴州邊衛要分撥總兵叅將查得湖廣邊境已有都督陳友等守備貴州邊境已有都指揮張仕守備兩處總兵叅將又有保定伯梁珤都督方瑛都指揮安順等難再差遣重為地方之擾一件戸口糧馬事照得本長官司原管夷民四里内有三里人户俱被各處苗賊殺虜零落不存雖有避命巖崖藏住又遭疫疾死亡少有復業干碍糧馬無人應當臣切思本府所屬五長官司一縣户口多有隠瞞漏報秋糧驛馬高下不均以致遞年差役靠損貧民比先開設府治止憑黄册朦朧僉㸃官府不曽稽考中間里分多而糧馬少戸口増而差役輕今被苗賊殺虜卷册燒燬兩無查照難以分辨若不從長編造不無富者愈富貧者愈貧殃及小民深為未便乞勅户兵二部照清軍事例各遣主事二員㑹同布政司官員親詣長官司縣不分殺虜與見在人户從實取勘見丁編明量力多寡注定糧差驛馬攅造黄册備照及將消乏圖里照例歸併其死絶戸下糧馬明白開除以甦民困敢有隠瞞詐冒合戸者官吏里老依律取問仍行思州等五府各長官司一體均平造報非惟不負朝廷優養邊方之意抑且糧差無拖欠矣前件看得奏要差主事攅造馬册縁彼處自有三司等官理辦難再差官其要將死絶戸下馬疋開除縁彼係是極邊地方又兼屢經擾攘宜從寛緩今貴州布政司委官查勘明白徑自分豁所據攅造黄册合行戸部徑自查照定奪一件舉用賢才事有叅賛軍務貴州按察司副使李睿先䝉坐委經理屯田守鎮蠻夷詢察官員賢否任用以來民安事妥不期前歲貴州等處諸種苗蠻作耗攻圍城池被其乆困本官忠義勇敢日夜運謀効力死守衆皆推服功莫大焉又有貴州平越衛千戸趙信武藝精通弓馬慣熟且苗蠻畏服不敢出沒本官為事去後苗賊乘機出境刼殺官民切思趙信昔平播州草塘貴州平越等處兇苗聞其威勢號稱老虎似此軍職百無一二實堪任用以上文武賢才二員乞勅吏兵二部再加陞擢專一提督貴州四川湖廣有苗地方節制軍務候賊寧息仍令守鎮便益前件除要陞擢副使李睿行移吏部另行外查得近該總督軍務右都御史王來奏保平越衛指揮同知趙信素負敢勇苗蠻稱為老虎要量授署都指揮僉事守備興隆等衛地方等因本部巳准奏准趙信量陞署都指揮僉事守備興隆去後今奏要陞擢平越衛千戸趙信一節未審本官即係王來所保趙信惟復别有姓名相同之人縁職事不同難以定奪合行王來查照若趙信即係先前奏保署都指揮行令本官照舊守備若係别項官員就便體勘本官有無前項應否陞擢明白具由囘奏以憑施行一件官制事臣本長官司官制蠻夷二字係正六品印信衙門正統十四年被鎮逺府卭水草塘等處蠻夷出刼搜山將臣堂弟安達殺死罵説他是蠻夷長官司百姓與我一般不肯同反殺了無事又將漏溪等圖人民殺虜罵説若是别箇長官司百姓少少殺他臣思始祖陜西人氏前元時輔討西蜀克平古州八萬地方有功卜地義陽住坐生下兒男洪武年間舉任事子孫承襲以來宣布朝廷威徳土民向化年乆今被别郡苗蠻謀反上欺國法下侮官制因而殺死堂弟情理不甘乞勅禮部定奪合無不拘舊額將蠻夷官制改賜義陽長官司請降印信令臣賫囘行使不惟用夏變夷抑且永沾聖化便益前件看得思南府蠻夷長官司衙門係比先年間設置已定今要將蠻夷官制改作義陽長官司另降印信誠恐有違舊制又况蠻夷長官衙門貴州見有二十餘處要將一處更改不無諸處倣效非惟事體紛更抑且成規紊亂所奏難准一件撫安地方事臣思貴州左布政使蔣廷瓉朦朧奏准將湖廣布政司舊管思州思南五宣慰司地方分設八府比較腹裏不滿一縣人民又摘出四川布政司舊管貴州宣慰司并軍民衛分土官衙門却與貴州開設布按三司並不係蒋廷瓉征𠞰化外克平郡置實乃人民稀少不敢重復干冒近者貴州普定都勻清平平越等處并四川播州宣慰司草塘黄平重安苗賊糾合鎮逺衛府所屬諸種苗蠻自正統十四年以來造反刼殺軍民受害不計其數止有思南石阡銅仁三府之民中間雖有苗類不敢為惡反被前項衛府宣慰不行鈐束撫捕縱令毒害生靈臣先於正統九年間曽將六府民情應合歸併縁由奏聞奉吏部勘合行移貴州三司體勘不期前巡按監察御史虞􅐃偏執不由都按二司公論只憑布政易節私議妄行囘報致有今日之患比先二宣慰司所管貧薄夷民自洪武永樂年間湖廣管屬之時止有秋糧驛馬餘無皂𨽻月錢是以蠻民守法無事雖二宣慰爭占於民並無相干今照貴州自添設三司以來遞年拜進表箋朝覲公差丁憂任滿等項下至龍里鎮逺一帶衝要衛府雖稱軍民官制中間民庶生熟不同刀耕火種别無生理所辦雜泛只得典賣兒女田産奉承不暇每遇雲南貴州徃來官員或舉家囘還原籍扛擡浩繁苦楚尤甚用此激變致生邊患荷䝉聖恩命將出師費用糧賞將及三年未得平安在京大臣有欲革併照舊奈何中間又有羅織裁臧官員終為不便臣叨任土官豈容坐視切思貴州城池原立都司總兵鎮守附郭止有貴州長官司里長五名方面難為况六府官民逆上貴州山路陡險不通舟楫肩擔背負民力艱辛謹按貴州古為思方之邊思州六府近湖廣辰沅之一隅乞勅吏兵二部都察院考古再行計議仍將思州六府官民歸併撥還湖廣布政司管轄一水便利以紓民困其貴州宣慰司并軍民衛分土官衙門仍𨽻四川布政司照舊提督如此則科差減省軍民安妥矣前件查得先該吏部左侍郎何文淵題稱要將貴州被賊燒燬衙門勿復起盖布按二司并各府大小官吏并從征官軍俱各取囘止照洪武年間設立宣慰司衙門管屬土人設都司衙門鈐束軍衛等因具題抄出本部為照貴州地方係我太祖高皇帝開創於前太宗文皇帝經營於後殆今八十餘年近因征南之師數出遂致各種苗蠻乘機生發各該城池雖苗賊圍困各城官員皆能効力死守况總督總兵叅將巡按三司等官又不曽要將貴州地方遺棄征進官軍取囘縁由具奏係干邊務難以遥度已行奏准行令彼處總兵等官保定伯梁珤等將何文淵所言公同勘議處置務要上不違祖宗之成法下不貽邊境之後患通行囘奏定奪續據貴州銅仁府烏羅長官司土官長官楊敏等奏稱本處八府土官衙門永樂年間開設貴州布按二司除授流官僉㸃承差皂𨽻等項辦納月錢擾害非止一端以至正統十四年賊寇生發人民被害要照洪武年間將本處地方原係四川所轄者撥付四川原係湖廣所轄者撥付湖廣等因具奏抄出本部查照何文淵所奏事理又經覆奏通行梁珤王來等計議處置俱各未報今奏又要將思州六府歸併湖廣管轄其貴州宣慰司并軍民衛分土官衙門𨽻四川提督一節縁無王來等囘奏縁由係干邊方重事難便定奪合無再行王來梁珤公同副總兵方瑛及四川都布按三司巡按監察御史查照原今所奏應否改𨽻務在㑹同勘議斟酌停當上有益於朝廷下有便於民庶作急具由囘奏不許輕易怠忽致貽後患及日乆不即剖决各致該土官展輾具奏事無結絶景泰三年四月日奉聖㫖是欽此題乞恩事于謙内府抄出靖江王奏自永樂闕年闕月闕日廣西都司來奏蠻人出沒討軍截殺本府差官奏請奉皇太子令㫖量撥與精鋭官軍五百一十六員名遞年征進累次輳補逃亡事故虧折雖多不絶至正統十四年總兵官栁溥具奏正統闕年五月初五日欽差錦衣衛舎人李旺賫書委臣先選精鋭官軍五百員名赴總兵官處聽調再選五百員名聽候朕念王府使令不可缺人且留在府遇警急調用欽此俱欽遵外調撥餘丁五百員名在府聽候其栁溥皆非警急一槩調用後因官軍各告衣甲損壊臣具奏比依湖廣廣東事例更換囘衛輪班已䝉聖恩准臣所奏分為兩班一年一換至景泰元年都督田真劄副䕶衛言稱蠻人滋蔓奏准兩班俱調不論已被蠻賊殺官軍數多臣已經開奏明降景泰三年九月内劄副送前班已故指揮曹福原領官校到衛臣就㸃看實在三百六十六員名内中亦有征傷不堪之數虧折事故一百八十六員名景泰三年三月内劄取更替臣選官軍一百八十六員名輪補去訖本年五月内二班已故指揮許正等官軍臣親逐一㸃視止有見在百戸言慶旗軍二百八員名在逃四十五名其餘傷故官軍二百八十九員名臣思若不備情具奏查得前項虧折已將䕶衛官軍盡數撥補去後又發囘二班官軍除另行提捉原逃旗軍聽候外若後輪班惟復移文仍要索補虧折之數委的缺少臨期無軍完輳不無累煩聖聽臣思比先奏准一年一換今將兩班輪作三箇月替換越致累損繁難切照䕶衛官軍先於永樂年間全伍調征交阯并到今逐年差征廣西地方事故亡絶數多餘存不堪數少亦有匠人造辦應貢表箋箱袱馬疋什物如䝉准奏伏望皇上篤念親親隆厚哀憐臣逺在屏藩孤窵艱難委將䕶衛官軍盡數撥補前班去後乞賜人匠造辦表箋等項及宥免後補事故官軍仍依奏准一年一換輪班事例寛恕便益實為感恩之至為此具本專差内官言慶親賫具奏文該靖江王亦奏前事内稱伏望叔母上聖皇太后叔母皇太后篤念親親隆厚哀憐乞賜人匠造辦表箋等項宥免後補事故官軍仍依一年一換輪班事例等因該本部官俱欽奉聖㫖兵部知道欽此欽遵通抄到部叅照奏稱要將前項䕶衛官軍宥免事故後補并要一年一換輪班一節照得前項官軍先因彼處盜賊生發官軍調遣不敷欽䝉選出聽總兵官調度殺賊設若賊寇平安地方無事自當發囘原衛奈因連年盜賊生發人畜累被剽掠地方受害不可勝言若非前項官軍恊同撫捕則總兵官憑何調遣又况軍衛之設正所以保障城池殄除盜賊王府所在之處蠻賊竊發縱使調用前項䕶衛官軍亦是保䕶王國若是地方擾攘則王國何由得安兼且廣西地方軍衛連年征調不息軍士凋耗數多惟䕶衛官軍平日差遣數少什物頗為完具若依所奏事故者宥免撥補三箇月輪替者仍作一年則事役勞逸不均軍衛愈加靠損徒有其名而無其實軍士日加消耗機務日益廢弛其貽後患實非細故所奏難准合無行移總督兩廣太子太保兼左都御史王翺副總兵署都督僉事陳旺令其到彼將先次選出軍方許將事故者替補及總兵等官調度殺賊中間若有事故准於原衛挑選精壯之人照數撥補不許故違有誤軍務候地方賊寇十分寧靖另行定奪再照各處王府設置長史紀善伴讀教授職專輔導親王繩愆糾繆惟凡王府一應施行事宜舊有定法為各官者豈不知朝廷萬機皆斷聖志發自宸𠂻明見萬里聰聞至㣲而以一事之㣲輙敢奏稱伏望叔母上聖皇太后非惟乖違舊制抑且凟亂朝經詳其所由盖是王府長史紀善伴讀教授不能盡心輔導及護衛指揮并首領官員意圖占恡官軍故行撥置煩凟以致行事乖方有失大體及本府累次為因細故訐奏總兵巡撫巡按等官及行勘問事不實顯是輔導隨侍不得其人以致事體紛擾上干天聽合無行移都察院轉行巡按廣西監察御史將靖江王府紀善長史伴讀教授并䕶衛指揮及首領官照名查提問擬明白監候奏請發落本部仍行廣西都司轉行䕶衛將前項官軍照舊三箇月更換事故着與補替不許仍前展轉遲悞縁係叅問王府官員并欽依兵部知道事理景泰年七月日奉聖㫖王府官員都不問䕶衛官軍照舊三箇月更換再展轉悞事不饒欽此京軍舊數葉盛正統十四年末多事之先五軍都督府并錦衣等衛官旗軍人等三百二十五萬八千一百七十三員名實有一百六十二萬四千五百九員名事故一百六十三萬三千六百六十四員名馬駝騾驢牛二十萬八千三百二十六疋頭隻實有一十九萬七千三百五十八疋事故一萬九百六十八疋蓋官軍等則錦衣等三十五衛二十九萬四千一百一十七員名實有一十五萬九千八百七十一員名事故一十三萬四千二百四十六員名五府并所屬二百九十六萬四千五十六員名實有一百四十六萬四千六百三十八員名事故一百四十九萬九千四百一十八員名馬騾等則錦衣等三十五衛二萬二千八百二十疋頭隻實有二萬五百十二疋頭隻事故二千三百八疋頭隻五府并所屬一十八萬五千五百六疋頭隻實有一十七萬六千八百四十六疋頭隻事故八千六百六十疋頭隻今依養蕃息之乆又不知其數何如者也名臣經濟録卷三十九
