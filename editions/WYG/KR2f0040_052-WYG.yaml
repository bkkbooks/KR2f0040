  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0040_WYG_052-1a, image: WYG0444/WYG0444-0477a.png}
body:
  text: 名臣經濟録巻五十二明黄訓編工部虞衡屯田遵化縣鐵厰志邵寳工部分司在縣東六十里鐵厰中永樂間俱以各衛指揮領其事宣德末始委虞衡司官董之分司正綂九年主事張孚建成化間主事馬祥鼎新焉正㕔三間中外門各三間左司房三間譙樓三間右雜噐庫鐵庫計二十四間米庫一間吏舎四間雜造局六間爐冶所鐵砂場獄二十六間爐房九間公廨過㕔一間寢室五間四顧樓柴炭場萃景樓翫翠齋各三間滌煩樓亭一間廂房四間户所㕔各三間在儀門外軍噐局三間在㕔北倉房五間在㕔西北缺易州山厰志戴銑山厰之設專以燒薪炭供應内府宣德五年置於平山繼遷沙峪口景泰間移置滿城縣西十里惟設部堂之所周以垣墉構以稠木盖以茅茨僅蔽風雨而已各府厰房未有定居率於西山寨口置厰燒採地荒又徙他處凡遇朔望及柴夫銷批倒解俱赴部厰習為例天順元年移置州城西北二里許其㕔堂官民廬舎茍完而已其後建部堂於中環以土成八府五州分治以次而列皆南向前有東西長衢各屬州縣分治列焉毎門各設坊牌以記之其部堂府治两傍各有隙地為積放薪炭之所併植蔬果以供日用部堂總其綱府州縣佐貳官分理其事民之執兹役者嵗億萬計車馬凑集財貨山積亦云盛矣然昔以此州林木蓊鬱便於燒採今則數百里内山皆濯然舉八府五州數十縣之財力屯聚於兹而嵗供猶或不足民之膏脂日以告竭在易尤甚上不虧國用而下能蘇民困仁人君子尚有以念之哉工部分治一所居厰之中直𨽻真定府分治一所營一所在部治東轄州五縣二十七直𨽻保定府分治一所營一所在部治西轄州三縣一十七山東兖州府分治一所營一所在部治東轄州四縣二十三山東青州府分治一所營一所在部治東轄州一縣十三山東東昌府分治一所營一所在部治西轄州二縣十六山東濟南府分治一所營一所在部治東轄州四縣二十六山西太原府分治一所營一所在部治西轄州六縣二十三山西平陽府分治一所營一所在部治西轄州六縣二十九山西直轄五州分治一所營一所在部治西轄縣一十七工部蕪湖分司題名記邵寳公署之有題名舊矣姓名邑里科第官階差遣嵗月之外不加一詞而褒貶之公論付之後人書之者無心而觀之者足以為勸為戒其微而婉也有詩之義其簡而嚴也有春秋之體是故君子尚之而歴世不能廢也我國家承平百五十有餘年百司庶府莫不任人就列内而省䑓外而藩臬郡縣至於寓館署㕔皆有所謂題名者盖世平治乆制備文繁雖不出於令甲而於事體亦若有不可缺者如此工部分司在蕪湖縣者實自成化七年始當時建議者以漕運舟船之料供應什器之料民不勝其科率盖取諸材木之𣙜焉而蕪湖為畿輔近地當川湖二省下流商筏所聚故分司於是乎建大司空嵗請於朝簡委員外郎若主事一人主之期月乃代越𢎞治正德至於今盖五十有六年矣歴官五十有三人先是𢎞治乙丑主事永平張君秉清者嘗一題之今主事岳池張君大用謂其簡略失次也通加詳訂序書分注以刻諸石將俾繼自今有所考焉用為後人指議之地刻既成則託吾友李生原道書請予為記予惟六卿分職莫非天工王事而虞衡所職則渉於權利士大夫之自好者往往不屑於是然君子論為已之學者率謂錢榖簿書不足為累盖于其心不於其迹其道固然也况公私義利之辨正君子所當先講者故不當其事則已茍事有所當則夫地也吾致力焉而自考焉實於斯在盖以公滅私固君子立心之要以義為利尤君子制事之宜以是事國何職不共以是立身何德不進易是則上干官箴下招物議刑書史筆不在於今則在於後雖有他美莫之能贖而况無美可稱者哉古今記題名者莫不以司馬公諫院為先要其大指不過忠詐直囬四言而已而後人所議率不能外今予之虞於後人者豈有他哉亦惟曰某也公某也私某也義某也利云爾嗚呼人有恒言後之視今猶今之視昔也可不畏哉可不儆哉張君發身賢科始仕初政乃是之蒞而於斯記汲汲焉圖之予知君之能愛斯名也亦可以觀乎其人矣矧原道乃吾同年贈司空舫齋先生之子文行粹然克肖家學凡所稱君其言也信因附書之而不敢加一詞者亦題名體也名臣經濟録卷五十二
