body:
  text: 名臣經濟録巻四十九明黄訓編工部都水司上重修京都城壕記呉寛惟太宗文皇帝入繼大統之七年肇建京都於朔方所以臨御中國控制四方其形勢雄其規模大其謀慮深實與啇之遷殷周之作洛匹休於無窮者都城周四十里鑿壕迴環廣若干尺深若干尺水自城玉泉山而來道出大内穴城為門於壕委之或時夏秋風凉溝渠漲溢又為水口於壕洩之其流皆注大通河東南入於海既厯嵗月湮輒加修於是不修者久矣皇上有詔發軍夫四萬人命襄城侯臣瑾工部尚書臣復領其事而以中侍之貴者監督之以成化九年四月十六日功自西北隅始壩堰既築畚鍤並至人為之伍伍分之地旁廣下深一皆如制縁壕之堤有缺壞者則取客土築之惟堅既又築垣堤上以闌人畜之越入者凡為丈八千三百有竒至於楗㮑橋梁之類廢則修治不計財用初皇上重勞功役間休息之越明年九月三日功始告成流泉清漣曲堤整潔樓櫓不篩城郭若增而髙輪蹄交馳道路若闢而廣京師壯麗不替有加事聞自督工之臣下達役夫賞賚有差蓋當工役之初興也有議之者曰壕之為制凡以設險是舉也其守國之良䇿歟臣聞之竊以斯言是矣而未必盡何也今天下無虞號稱極治雖在要荒之外皆吾衽席之上方將舉四海以為限何事一壕哉然而復為是者則以京師文皇帝建為萬世不拔之丕基也厥初經營亦惟甚難文孫繼世時加修之惟知其難故也知其難則推而及於舊章成憲無不由之監之者何止一壕哉且姑即一壕以窺皇上之大徳於汙濁之滌而去也則凡宵人惡類必知所惡而屏之不留矣於壅滯之决而行也則凡諍臣拂士必知所好而宣之使言矣於堤之築而能捍也則紀綱必張而廢弛之患無矣於垣之築而能防也則禮度必嚴而緩縱之事無矣於財之有用則不至妄費以傷其財於力之可使則不至輕役以損其力土宇於是而恢拓人民於是而保障此豈非無形之險也乎若夫漢水以為池長江以為塹視一壕之險大矣然人終得而渡之烏在其為險者臣故知神謀之不出此也臣備員詞林職在紀載覩功之既完也敢執筆以記通濟河碑楊士竒其畧曰南去通州二百里楊村驛之北河屢决河仰受北河楊河潞河諸水下合直沽南來之水入海凡齊魯汴蜀湘漢江廣閩浙之賦運及海内海外朝覲貢獻之上于北京者皆道此以達所係之重也其水之失性也自洪武之季至今四十五年之間屢决屢築築已復决智殚力疲公私患之皇上嗣大統之明年秋有司以决聞請如故事築之三年春復决上以命太監阮安安受命行還奏水當順其勢道之今逆之使紆屈勢不得達故决宜取徑道改鑿使其順下臣視河西務徑行二十里許可鑿計用萬五千人庶幾可以免决遂以圖進上遂以命武進伯朱冕發卒少保工部尚書吳中發民如所計之數諏日興役以安董之如期竣事遂因其故道河下趣焉安行夾河築防既崇且厚伐木以捍之植樹以固之革險為夷事聞賜名通濟河少保吳公屬記是役之成古者治水自京師始先所重也斯河之重固以京師然昔者作之難而今之易何也非奉命之臣其用心之誠與公者有異乎斯役也實本於皇上之善用人知之明任之専此功之所由成也自古英君明王所以克興事功未有不由斯道謹因紀是復推本作詩以頌聖天子仁明之功固安堤記楊榮天下之難治者莫踰水而治水之先者莫踰京師故大禹之蹟首在冀州豈非以水之利害所係者大而地畿之内宜慎其防以為宏逺之圖也歟盧溝之河發源太原之天池伏流至朔州馬邑從雷山之陽發為渾泉而為乾河鴈門應州雲中山西諸水皆㑹焉愈逺益大過懐來行兩山間拘束齟齬而不得肆至京城西四十里石經山之東地勢平而土脉䟽衝激震蕩遷徙弗常後魏都督河北道諸軍事建成侯劉靖及子平鄉侯𢎞築戾陵堰以防之水患以息後人思其功謂之劉師堰歴世既久水勢漸更下流十五里距盧州不逺有曰狼窩口時復衝决漫流而東浸没田廬民弗安業聖朝建北京視河為襟帶永樂間屢嘗修築輒復頽圮今聖天子嗣位命工部侍郎李庸内官監少監姜山義徃任厥事復命太監阮公安少保工部尚書吳公中總其事宜勅其務存堅久勿為茍且庶幾暫勞永逸羣公効命材謀共濟經始於正統元年冬畢工於二年夏凡用工匠二萬餘月給糧餉以萬計累石重甃培植加厚崇二丈三尺廣如之延袤百六十五丈視昔益堅既告成賜名固安堤置守䕶者二十家建神祠於上有司以時修祀禮凡督事悉賜鈔幣以勞之其視築戾陵堰役費加倍而堅實亦過之仰惟聖明至徳蟠際穹壤而於京畿益圖鞏固以寧濟斯民於千萬年諸公亦能同寅恊恭用成厥功盖可久可固而利益於世者不小皆所當書於是叙其始末俾勒諸石庶後之人有考焉楊文敏公集大陸澤記石珤珤嘗浮清源道出寧晉問渡於所謂葫蘆河者平波漫衍一碧千頃茭蒲菱藕魚鰕之利民咸取之供賦税焉俗謂之水五社五社之民沮洳弗田力胥此出故也噫嘻此其古所謂大陸之藪歟禹貢大陸既作是也顧古之大陸地當不止於此今近澤藪之田皆禹平水土後民始耕作至於今也至觀班氏所謂大河逾洚水至大陸布為九河則亦臆揣之論今大陸與大河絶不通顧其地相通不出三百里有此附㑹耳不然豈古今陵谷之推移刷盪盡失其舊歟趙武靈王曰吾國東有河薄落之水亦謂此漢時其地猶有薄落亭今云葫蘆河者恐或其聲之訛轉云熊峯先生集滹沱河記石珤恒山之陽有鉅川焉曰滹沱源出代郡㤗戱山下匯為三泉流稍延漫循大行掠晉冀蜿蜒而東注之海按班固叙禹貢九河所謂徒駭者是也至宋蔡沈疑之蓋亦惑於夾右碣石之說遂以九河皆淪沒於海滹沱中髙不與大河相涉非之夫九河固淪沒於海九河之源豈亦淪沒乎滹沱固不與大河相涉然所謂九河者亦猶九川云爾豈謂大河播而為九乎故知山川經絡茍非目覩身歴而欲據文字定之鮮有不失者矣是則滹沱亦未見其的不為徒駭也顧大行以東地勢頓下且河道淤沙窪壅不常傍無澗壑以洩水怒故霖潦相仍山谷諸流叢奔㑹趨洶湧而至敗城郭没田廬其害有不可勝言者今禹貢舊道既不可見而西漢於此置蒲吾渠通漕船亦湮滅無跡豈非亦以水之害甚不可䟽瀹而廢歟河經藁城自國初至今不知凡幾徙成化壬寅始迫城下净土寺没焉自後毎秋漲至則汎濫於縣三五十里市野皇皇無所遯棲適有天幸未為洿沼𢎞治六年太守張君淑始開新河於郡南費以萬計未再逾夏水大入復趨故道功竟不成老氓相傳云是河不宜修築惟祭則可蓋神明之也嗚呼禮諸侯得祭其境内山川則祭典固不可缺然禦災捍患以寧邦家為民父母者職也徃者宣防之塞近時張秋之築具在䟽理之功亦豈可少哉顧得其要與否耳誠使善工相髙下量順逆遲以嵗月鑿山開原廣拓水境要其上流而放之寧棄百里之地以全城池則雖鑚龍門析伊闕尚可為也而此獨難哉不然為石隄以限之亦再嵗之利也又其上者平政惠民薄聚歛省刑罰尊老慈㓜修祭祀順天時使各得其所則火炎上水潤下百川用寧無墊溺之苦雖古昔賢者之論豈能外乎是哉若復迂之是洪範可遂廢而天下之害付之末如何矣智者試反而思之萬一得其效豈以某之言為老生之談哉熊峯先生集薊州新開運河碑記李賢君子受一方之寄者其要莫先於興利然必有過人之才識見髙逺灼知有利而無害然後興焉不然則率易妄作利不可得而害已隨之古人所謂興一利不如除一害者良有以哉洪惟我朝奠安海宇以康濟生民而防邊一事尤為加密東北之境控弦之士無慮十數萬人而糧餉之需大抵取給於江淮是以大河諸衛嵗運三百六十餘艘抵薊州為倉而貯之徃時由直沽循海道多風船至海濵不敢遽必淹及旬日甚至彌月候風色止息方敢一渡或之中流遇風濤迅作遂罹漂蕩覆溺之患嵗損船不下數十而糧斛動以萬計主漕運者恒以為憂天順改元皇上光復大位政令一新天下臣民莫不欣欣鼓舞興起事功而巡守薊州諸臣深慮及此詢諸父老之熟於地理者云海濵有二沽一曰水套一曰新開相去纔十里可以開河通潮以便運艘避海難遂以其事聞上命守臣都督僉事宗勝董其役勝尋以疾在告復命叅將都指揮僉事馬榮代之又以監察御史李敏工部主事李尚共蒞其事三人者才識俱優乃同心協謀相度髙下起薊州諸衛武夫萬人撫恤奨勵罔有不至以故衆役感悦爭先効力以是嵗三月始事於甲午訖功於丙午人皆驚異以為成功之速如此必有神明黙相其間遂建天妃宫於新河之左且謂斯舉便國家之漕運通商旅之徃來公私之利在焉非小補也乃立石於傍走書至京師乞予言以紀其事予嘗考唐神龍中於漁陽開平虜渠傍海穿漕以避海難當時便之今二三君子能興斯利於數百載之後蓋非率爾妄作者矣嗚呼興利固難而保利尤難若夫繼諸君而巡守此地者尚體諸君之所以興起繼修之志用保此利於無窮是宜大書傳之久逺且為來者勸重開通惠河疏王軏題為計處國儲以永圖治安事各准本部咨該工部題於户科抄出巡按直𨽻監察御史吳仲題稱臣奉命巡視通倉備檢接管巻内見通州閘運一節先該平江伯陳鋭都御史李裕臧鳳俞諌髙友璣御史薛為學楊儀楊璋秦鉞向信主事鄺珩給事中翟瓚鎮逺侯顧仕隆署都督楊宏等各題前事内向信一疏尤為明白簡當鑿鑿可行但事屢議而竟無成言雖切而卒無補臣竊思之水陸轉運其勞逸省費較然甚明况陳鋭等多累朝漕運名臣言必不妄臣因考之元史至元二十九年都水監郭守敬建言疏鑿通州通惠河引水置閘興工之日世祖命丞相以下皆親操畚鍤為之倡置閘之處徃徃於地中得舊時磗木時人為之感服船既通行公私兩便先時通州至大都五十里陸輓官糧嵗若干萬民不勝其瘁至是皆罷之自是漕運無轉般之勞而一代事功卒歸於守敬焉及考金水海子白浮甕山諸志典籍昭然而可㨿踪跡尚在而可尋何獨我朝必用置閘河於無用費脚價而不惜哉臣又恐有風水家之説因訪之上源見於諸陵無損遡其末流又於都城無害且源頭活水運亦流不運亦流初不因運之行止而為河之開塞水之盈涸此理甚明足破羣惑况通流等八閘閘石見存無事於添補閘夫見在無事於添僉閘官見任無事於添設近年營建大木皆由此河直達大通橋下滔滔無阻叅將王佐曽舉而行之特易易耳但毎至垂成輒復中止者祗為權勢之車輛罔利之牙稅不便所阻臣又考之元史漕運糧儲南來諸物商賈舟楫皆由通惠河直達海子登岸未聞灣民餓死况今止通軍民糧運其官私貨物仍舊亦未為全絶其利源也臣嘗竊料閘運一年可省脚價銀十餘萬兩今當民窮財盡之時於國計不為無補臣幾欲具疏上聞尤恐識見未真料理未周不果繼而見在京各衛因徃通州闗糧或被官吏冐支或被行伍騙匿或子姪不肖而花費空手而囘或隂雨連旬而放遲盤纒過半累累呈告到臣皆為有名無實臣因考之漢唐都闗中宋都河南皆由汴由渭直達京師未聞有貯國儲於五十里之外者我朝通倉其初如徐徳等倉故事只有神武中衛小倉已後因漕運來遲暫將京儲收貯通州以待轉般因循茍且嵗月既久遂為三七定例嗣是莫之能改遂使一代官軍不沾實惠又欲具疏上聞未果然此特其利害之小者耳臣近因穵運邊糧備訪邊闗寨堡險隘逺近以防不虞因知密雲等處皆有間道可通若使姦細為之嚮導輕騎疾馳旋日可至或㨿倉厫或肆燒毁國儲一空則京師坐困矣雖有言者但以閘運省費為言而卒莫有以先代之故事間道之危機為陛下告者是宜陛下信之不専行之不决也語曰人無逺慮必有近憂傳曰成大事者不謀於衆惟陛下留神省察謀之二三元老大臣而獨斷焉萬一臣言或是誤䝉採納即今漕運㑹議在邇乞勅户工二部查照先今節次題覆事例一併議處就着廵倉御史㑹同工部管閘修倉主事兼理閘運閘板見存修補借之各厰少有疏濬并其他用度量支修倉餘剰廵倉賍罸并所省脚價民財民力一不妄費大運京糧姑聽六路自進且令覔船雇人略運百萬以試之如果可行就將省下銀兩蓋房造船築堤展河次第舉行所謂三七通糧漸撥京師自二八一九而全輸矣興國家自然無窮之利杜後世意外不測之虞所謂富國强兵殆一舉而兩得之矣等因具題奉聖㫖户工二部便查議了來説欽此欽遵抄出送司案呈到部擬合就行為此合咨前去煩為查照㑹議覆奏施行等因咨部送司查得成化八年該漕運總兵官平江伯陳鋭題為陳言便利漕運事該户部議准興工挑濬間該司禮監太監懷恩傳奉聖㫖大通橋一帶工費浩大暫且停止欽此正徳二年該廵按直𨽻監察御史楊儀題為公務事開稱挑濬大通橋至通州閘河以便運糧等因奏行户部覆奉聖㫖修理閘河着户工二部上𦂳議處預先整理務濟明年漕運其餘俱准議行欽此已經動支太倉收貯水兌脚價等銀二萬二千餘兩推委漕運叅將梁璽恊同户部郎中郝海本部員外郎畢昭興工挑濬去後未見成功至正徳六年間本部管閘委官主事鄺珩為節財裕民以圖治安事呈准每年行取剥船伍百隻添該閘夫三百名以備搬剥等因奉聖㫖前項夫船俱令查革改正仍着運糧官軍自行照舊雇草搬運欽此又於正徳十一年八月内該工科給事中翟瓚題為疏通漕運節財用以大利軍民事修理運道徒費無益乞要多官㑹議開修運河等因奉聖㫖該衙門知道欽此欽遵抄出到部行間續該監察御史張欽題為節財用順人情以利軍民事運河不必修濬陸路實為簡便等因已經本部㑹官議題節奉聖㫖是這修理等項事宜着原差侍郎等官一併勘處停當來説欽此備行廵撫都御史李瓚廵按直𨽻監察御史牛天麟并户部主事等官董琦等㸔得前項河道屢議屢修而卒無成功者陸路實為經久等因節奉聖㫖是這脩路事宜你毎勘處停當都依擬行欽此已經欽遵㑹官將前項陸路欽差户部侍郎楊潭本部侍郎劉永督理脩砌完備外又查得嘉靖元年四月内准户部咨開稱提督漕運都御史臧鳳鎮逺侯顧仕隆題京城大通橋至張家灣一帶河道乃前元轉運通渠永樂正徳年間重加挑濬糧運抵京未幾貪利之徒阻滯不行近年營建大木悉由於此若將此河原設五閘少加修理轉行漕運衙門動支官錢打造剥船共二百五十隻每船用軍四名共一千名仍置口袋一萬條輪畨領装悉聽叅將王佐委撥官軍管領撑駕等因已經户部㑹同吏部等衙門尚書等官陸完等題准轉行叅將王佐㑹同廵倉御史秦鉞管閘主事華湘欽遵從宜處置間隨該御史秦鉞亦題前事要因八閘之舊址均築五埧之新制就於其旁各置減水閘一座於内打造剥船蓋造官房收貯糧米次第運至大通橋其朝陽闗原有舊河一道今已築為城壕應否疏通等因題奉聖㫖該部㸔了來説欽此抄出查覆間又該廵按直𨽻監察御史向信題稱大通橋至通州一帶閘河累議未修今稱築埧蓋房不必置蓋毎閘轉行漕運衙門打造剥船五六十隻恐緩不濟事或暫令張家灣河西務一帶居民聽其造船覔利等因本部已經議得陸路運至太倉不過四五十里車運脚費雖多一日可抵倉内船運脚費極省至大通橋下亦當陸運約四五里必須車馬装駝方得抵倉所以近橋須立厰蓋房堆候車騾亦當預處且自張家灣即入閘河經閘三四方抵通州近該叅將王佐處置運船俱由大河直抵通州城下或者又謂城北置創一閘可省前項四閘雖為㨗徑但河勢地形髙下須相度停當方可舉行等因覆奉聖㫖是欽此已經通行勘議去後查得嘉靖五年三月内該總督漕運都御史髙友璣總兵官楊宏各題脩治道路以便運餉事張家灣至京城朝陽闗外運道六十餘里髙下不平先因雨水衝坍車驢負載米糧俱遭陷溺乞要户工二部計議早起人夫差官設法填墊或欲閘河設法疏通船隻水陸併行等因又經議擬覆奉聖㫖是户工二部便差能幹屬官一員前去㑹同廵城廵倉等官督率府州縣應管人員相度脩理務在早完以便糧運閘運事且罷欽此已經通行委官行勘脩理間縁夏秋時月雨水連綿道路泥濘車不得行反為運道之阻合無查照先年運官萬表所議量撥運夫隨處填墊紓目前一時之急等因復奉聖㫖是欽此已經轉行提督漕運總兵官楊宏責撥軍夫填墊外今該前因通查案呈到部臣等㑹同戸部尚書鄒文盛等議得廵按直𨽻監察御史吳仲題稱通州閘運屢議而竟無成及考諸志典籍乞照先年節次題覆事例一併議處就着廵倉御史㑹同該部管閘脩倉主事兼理閘運量支修倉餘剰廵倉贓罸并所省脚價民財民力一不妄費如果可行就將省下脚價蓋房造船築堤展河次第舉行一節為照前項河道屢經建議俱未成功今本官歴陳前代之故事慮及間道之危機省費轉輸皆有所據但河道形勢難度財力所需浩繁事體重大相應勘處停當方可舉行合無候命下之日户部選委屬官一員與本部管閘脩倉主事㑹同廵倉御史親詣各閘踏勘形勢髙下計料所費工力除各閘一應樁杉等項應合増置船隻修防築堤及河道淺窄處所作何挑濬及將上源水勢向背地里逺近可以疏引水歸故道及照大通橋抵倉亦合另設陸運作何處置各項合用工料錢糧所奏修倉餘剰廵倉贓罸及所省脚價有無彀用務使長便經久可行逐一㑹處停當勘過河道髙下及所計工程畫圖造冊㑹報以慿㑹議裁奪若或有碍亦要明白開呈勿致中止虛費財力其所議通糧全輸京倉以興無窮之利以杜意外之虞姑候修河畢日另行㑹處等因奉聖㫖修濬閘河委係轉漕便利至計永樂年間已有成筭後乃因循不曽舉行近年屢議修復皆為附近貪利之徒所阻亦因大臣不肯任事小官徒事虛文見今東南民力困竭漕運軍士疲弊茍有寛省之䇿豈可因循不為着户工二部各委堂上官一員㑹同漕運總兵叅將并原經委錦衣衞都指揮王佐及今舉奏這事御史吳仲等親詣彼處地方稽查先今議處事宜踏勘地形髙下計筭所費工力究竟脩否得失利害明白具奏定奪大事可成則勞費不足計國計有補則浮言不必䘏若姦豪之人恐妨已利故為騰謗撓阻聽緝事衙門訪拏究問欽此隨該各部覆題節奉聖㫖着王軏何詔去欽此各欽遵備咨到臣等欽遵隨㑹同漕運總兵官楊宏叅將張奎錦衣衞都指揮王佐御史吳仲除永樂年間事體巻案不存無慿查考外稽查得先年節該諸臣奏建閘河一事俱該户工二部查議題覆脩濬或因工程浩大暫止或欲候待年豐暫停或為勢要罔利之徒所阻以此俱各未見成功臣等議照漕運糧儲國家大計容受之多車不如船隂雨之行陸不如水舟車並進脚價倍省此閘河之所以不可廢也自大通橋起至通州白河止閘埧規模具在脩濬必可通行前代君臣尚能興舉其事舳艫直指海子今之閘運止於般剥而復屢行屢止者固由勢要姦徒罔利所阻亦由地形漸異流沙淤塞大通橋至白河僅四十里其地形髙下相去六丈有餘使其不計多費錢糧大興工役開深七丈再加廣濶水勢就下通引白河則運糧大船直達京城而諸閘可以不用固永久之利也但工程浩大切近都城不敢輕議為今之計只應循照舊規修濬河閘臣等陛辭之日自大通橋沿河逐閘踏勘形勢大畧此時閘門洞開初冬水涸流波尚且不絶若各閘皆閉水盈可待至通流閘坐於通州舊城之中經二水門南浦土橋廣利三閘市井輻輳之地兩岸居民闤闠鱗集櫛比般運糧米大為不便㸔得本城西門白河之濵舊有小河通過城北一面中有舊廢土埧地基西不一里至今堰水小埧議須挑濬河身因舊埧添築髙濶多用樁木甎石甃砌平時習水行舟水大聽其漫流而過由此徑達普濟閘可省四閘兩闗般運之難閘埧相去窵逺合添設閘官吏二員名閘夫十名分管普濟通流二閘㸔守新埧以防盗决仍㑹委戸部坐糧員外郎范韶工部脩倉主事周朝着管閘主事魏良輔公同順天府通判何棟通州知州曹俊及通州等衞指揮等官分役各閘并舊埧地方踏勘丈量應該脩濬築埧去處計工估費行據各官呈報㑹計得修理閘座挑濬河身築砌新埧合用工料價銀大約一萬兩自新埧起至慶豐閘計般運五處毎閘各用剥船六十隻共用船三百隻毎隻載米一百五十餘石日運米約有一萬石船隻造於漕運衙門口袋出於包運經紀人夫聽其雇覔篙䉡隨其本船置造毎隻計該價銀三十五兩三百隻共銀一萬五百兩造完至日交付船運經紀人等毎名管領一隻時常㸔守損壞修理其原借官銀仍令毎年脚價銀内扣除十兩還官三四年間可以還足毎船毎閘議定船運撑挽脚銀一兩閘埧五處共銀五兩自大通橋馬頭登岸合用小車驢騾装載般運毎船糧二百石議定脚價銀六兩毎糧一石常年陸運原費脚價銀一錢今止用銀五分五釐可省四分五釐通計二百四十萬石京倉糧米可省銀共十萬八千兩若使皆由閘運切恐糧多船少船運稽遲反致有誤晴日路乾聽車輛一面照舊載運水陸並進則漕運官軍完糧之日可得早囘月餘預兌下年糧米陸運騾車責令徑赴西倉閘運小車驢騾止令運至東倉逺近均便為照大通橋地方窄狹人烟輳集恐妨起陸若於慶豐閘下登岸運糧又省二閘般運勞費亦令聽從立法非難而難於守法任人非難而難於得人茍非其人則法雖善亦不久而廢矣今後合無户工二部暫添選委郎中或員外郎各一員兵部推選曽經漕運練達老成勤能都指揮一員查照先年事例用充叅將住劄通州専管輕賫銀兩修理閘河般運糧米給散脚價及管天津以北催儹運糧仍令㑹同廵倉御史俱領勅行事嚴督選委府衞州縣的當幹濟官員雇募人夫并通州等衞遮洋運糧軍餘共一萬名分工限日作急修理築濬務在堅完糧運若到各官分投閘埧坐守督運禁革奸弊閘運通行之日奏請取囘量加擢用毎閘埧各造官㕔三間厰房二十間兩岸修築馬頭地方泊船船運剗平沿河牽路便於行船官㕔即今起蓋厰房以漸續成工料脚價查借見在修倉餘銀二千兩廵倉衙門贓罰等銀一千兩漕運衙門今年改撥通州收糧扣除脚價銀四千五百餘兩如有不足另借太倉銀兩應用待後省出脚價餘銀逐一補還閘板木料甎石工部各厰取用如或不敷官銀買辦又訪得糧運人倉多被門官歇家伴當光棍人等掯留糧袋索借錢銀乞勅厰衞并西司房緝事衙門廵訪拏送法司照依打攪倉塲事例問擬枷號發遣充軍庶漕運疏通錢糧節省如此則閘運一事有利而無害有得而無失可為世守之法而大造軍民之福矣再照通州京輔之地兩城夾固三倉豐儲居集萬家守以伍衞亦當積蓄以安人心不宜過慮般運自起驚疑及查河源之水出於西山玉泉由海子經流大内玉河而出沿城至大通橋其間事理或時之旱澇或流之巨細啟閉通塞又非外人所能與者前項節財興利事情幸賴聖明御極廟堂力主於上百執事奔走於下董事興工無有不濟欽命臣等㑹同查議明白今將修濬閘河畫圖貼說一本進呈御覽伏乞聖明定奪勅下該部再加詳議如欲舉行趂時地未寒凍擇日興工若至冰堅停止來年二月天暖土融隨即繼工務在四月工程不悞糧運縁係計處國儲云云具奏定奪事理臣等俱未敢擅便等因奉聖㫖是修濬通惠河乃前人遺跡先朝成筭近年屢議修復輒為姦豪射利之人所阻今閘埧具存河渠無碍原設官吏夫役俱各見在你毎今所議處尤為簡易合用錢糧不多且車舟並進不失車脚之利一應疏濬盤剥修閘造船等項事宜都依擬施行然政之修舉必在得人兵部便㑹户部推舉曽歴漕事練達都指揮一員照例充叅將通州住劄照舊驗收輕賫銀兩兼理修河事務吏部仍㑹戸工二部推有才力肯任事郎中一員并通州廵倉御史各冩勅與他行事未盡事情聽該部并各官從宜處置事體重大者具奏定奪今冬先將木植磗石等項置辦整待來春融煖之時興工委用官員務要用心恊力共成大功勿得偏執違抝妨悞經國大計責有所歸欽此嘉靖六年十一月十三日奏為興水利以救民患事汪鋐臣照得各處地方水旱相仍五穀不登人民饑窘而陜西一省連年亢旱尤為狼狽兼以祖宗所立鹽法廢革不行惟狥餘鹽之弊政盡壞飛輓之良規以致各邊糧草缺乏人馬俱困撫臣徃徃請給内帑至厪聖慮屢遣大臣或督理賑濟或經畫邊儲臣仰見皇上軫念元元之心保固疆圉之計固無所不用其極矣但天下之事圖之必於其要而治之貴得其本遵復祖宗鹽法之舊使天下商人争先踴躍趨赴各邊上納糧草不呼而集不輓而積此濟邊之至要也興修水利使大小溪河川澗之水或瀦而止或引而分皆可以為田疇灌溉之益此足民之大本也臣見近時監察御史周相聞人詮各極言祖宗鹽法之利不可不興最為詳悉臣不敢贅言外謹以水利一事詳為皇上陳之在昔成周盛時田以井授夫間有遂十夫有溝百夫有洫千夫有澮萬夫有川無非為水利計耳是故以瀦蓄水以防止水以溝蕩水以遂均水以列舍水以澮㵼水其詳於水也如此誠以水也者田之所賴以為田者也苟不盡力乎溝洫而徒責效於雨仰救於天欲田之常稔胡可得耶自秦用商鞅廢井田開阡陌而溝洫之制隨以亡矣輔臣丘濬有云井田之制雖不可行溝洫之制則不可廢此確論也夫秦雖廢溝洫而後人因川澤之勢興灌溉之利亦徃徃有之如秦鄭國開涇水自中山抵瓠口為渠用溉注填閼之水溉㵼鹵之地四萬餘頃收皆畆一鍾於是闗中為沃野無凶年名曰鄭國渠此其迹固在今可訪而行之者也如蒙乞勅陜西及延綏甘肅寧夏各廵撫都御史各嚴督所屬司府州縣衞所各該掌印管糧管屯等官務各躬親循行郊野相視地宜某川之水可導某山之水可疏其導之也或為溝或為洫必因水勢之大小其疏之也或為遂或為瀦必因地勢之髙下或為防以止水或為澮以㵼水或當為陂或當為堰考古人已行於昔者而施之於今求古人已行於彼者而為之於此嵗積月累不責效於旦夕躬閱熟視不取信於簿書因時制宜不膠執於一定夫如是則三年之後必有成效而民之饑者可食困者可蘇矣抑不獨陜西然也魏史起為鄴令引漳水溉鄴民歌之曰鄴有賢令兮為史公决漳水兮溉鄴旁終古冩鹵兮生稲糧李冰為蜀守壅江水作堋穿二江以通舟船因以灌溉諸郡於是蜀沃野千里號為陸海漢召信臣為南陽太守于穰縣南造鉗盧陂用廣灌溉嵗嵗増多至二萬頃人得其利及後漢杜詩為守復修其業時歌之曰前有召父後有杜母宋臨津令黄懋上書請於河凡諸州作水利田自言閩人閩地種水田縁山導泉倍費工力今河北陂塘甚多引水灌田省功易就乃以何承矩為屯田使懋充判官於凡河北諸州水所積處大墾田於雄莫覇等州興堰六百里置斗門引定水灌溉民賴其利凡此皆古人已行之迹載之史冊可考而知者也今河南山東山西四川湖廣江西浙江南北直𨽻各間有水旱而順天河間真定保定等府又有水患如䝉乞勅各該廵撫都御史務要一體訪求前項古人已行之迹着實舉行嚴督所屬司府州縣衞所官員一一躬親履閱隨其便宜勇力興脩毋阻於浮議毋泥於已見必使山川原野之間有溝以導水無壅遏之患有防以止水無决壞之憂有瀦以蓄水無散逸之虞如此則旱不能為災潦不能為虐而民之生可聊矣仰惟朝廷設立撫臣其大要惟在於衞民生重民命扶顛持危禦災捍患故撫臣以撫名必如父母之撫其子而後可以稱其名也欲如父母之撫其子亦安得坐視其斃而不思所以救之乎夫水利不修則旱潦無備旱潦無備則五穀不登五穀不登則生養不遂生養不遂則其斃可立待矣是故修水利以備旱潦此撫臣衞民生重民命之大節也若其瑣瑣之務何足為有無撫臣舍此不圖乃至於請給内帑請蠲賦税豈撫臣之宜有哉臣又聞唐虞三代之時皆建都西北未嘗仰給東南而春秋之世如山東山西陜西河南等處皆為列國之地當其時干戈俶擾一國之賦自足以供一國之用未嘗取給於他邦良以溝洫之制尚存故旱潦有備而國用自充耳夫今之山川即古之山川今之土地即古之土地今之民物即古之民物豈有古人可行而今人不可行者耶在天有適然不可期之數在我有卓然不可隳之備是謂裁成天地之道輔相天地之宜而撫臣之職盡矣臣欲候命下移咨各該廵撫都御史遵奉查照施行臣不勝懇切祈望之至為此具本親賫謹具奏聞奉聖㫖覽卿奏具見為民足國之意鹽法着該部查照舉行水利工役重大還待邊方事寧時年豐熟來説該衙門知道名臣經濟錄巻四十九
