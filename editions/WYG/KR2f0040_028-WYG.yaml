body:
  text: 名臣經濟録巻二十八明黄訓編禮部祠祭上總論祭祀之禮丘濬臣按朱子謂此門人記孔子祭祀之誠意又記孔子之言以明之所謂吾不與祭如不祭葢謂當祭而或有疾病不得巳之事而使他人攝行其事非甚不得已決不可也然所攝之人必須氣類相通職掌所係然後使之代行可也不然恐無感格之理是故内祭當用親屬外祭當用禮官後世用其官爵之尊崇者非是竊考洪武禮制開國以來各布政司府州縣社稷山川等壇原定行禮獻官以守禦武臣為初獻文臣為亞獻終獻洪武十四年聖祖勅諭今後祭祀以文職長官通行三獻禮武官不與祭禮部臣言官有職掌禮貴誠一古之刑官尚不使與祭而况兵又為刑之大者乎不令武官與祭所以嚴事神之道而達幽明之交也著在禮制頒行天下今百餘年矣臣請朝廷遇有遣官攝祭亦凖此制而以禮官行事庶合周官大宗伯王不與則攝位之文郊祀天地之禮一丘濬臣按祀典之載於禮者莫先於舜典也上帝之祭前此未有其名雖易有殷薦上帝之象然象乃孔子所筆也書之所謂類者葢虞廷史臣之詞在周前千有餘年臣竊意其所謂類者史臣紀舜受命之初其祭告于神也皆類合於上帝不言后土者言天則地在其中猶中庸所謂郊社之禮所以祀上帝而不及后土註謂其省文耳分祀天地之説始見於周禮雖曰必順隂陽因髙下而各從其類以求之庶得其神之來享然天與地對皇天與后土對六經言天必與地俱孔子言郊多與社並天與地並祭猶父與母同牢也豈得為瀆乎况一年之間夏在冬前並祭天地則以為瀆亂龎雜地先天祭豈非越次先食乎虞夏祀帝之禮與其時俱不經見惟周禮祭天則用冬之日至葢成周以建子之月為正嵗也嵗正之首未遑他事首舉上天之祭至於建午之月乃祀地耳是葢一代之制後世因之可也别以義起亦可也夫類於上帝經有明言舍周而從虞又何不可哉烏可以合祭之禮起於王莽而以為不經夫事茍合義固不當以人廢矧在周之前明有虞書之文所謂類者安知其非當時所稱之祭名哉漢儒解周禮類造之言非解書也夫周有冬至之祭故凡非時之祭謂之依者常祭可也有虞之世所謂常祭者何名其行禮者何時此所類者何所謂乎我聖祖初得天下即築壇為南北郊冬至祀天于圜丘夏至祀地于方丘一如周禮之制行之數年風雨不時天多變異乃斷自聖衷復為合祭之禮而以正月行禮凡所謂六宗山川羣神皆各為壇以從祀葢復有虞之典於四千餘載之後毎正嵗之吉天子躬祀天地而巳祖宗配享分命羣臣各獻二十四壇行之百年神祗享荅休徵屢應其克享天地之心而徧致明靈之格者非一日矣萬世所當遵守郊祀天地之禮二丘濬臣按先儒謂以形體而言謂之天以主宰而言謂之帝天與帝一也周禮言祀昊天上帝而後又言祀五帝亦如之所謂昊天上帝者兼天與帝言之葢以主宰乎天者其神之大者在此也所謂五帝者言帝而不言天葢隨時隨方而立名其神各主宰乎一方之氣也漢儒不明此義附㑹而為六天之説既有昊天上帝又有天皇大帝又有太一感生帝之類皆非正禮也葢天無二日民無二王固無二帝之禮况六五哉本朝惟於大祀殿祀昊天上帝凡所謂天皇太一五天帝之類一切革去三代以下祀典之正所僅見也惟道家者流承襲前代之舊因仍未革其所奉祀者乃列昊天上帝於其所謂三清之下又塑上帝像與天皇紫微並列至其所為上帝稱號又於昊天之下加以金闕於上帝之上加以玉皇夫金玉之為物滯於有形乃世俗之所貴者而非大道之所寓也顧以世俗之所尚者以為上帝之尊稱其䙝瀆甚矣且老聃生於周末死有墓及子孫乃人鬼也而躋之天神之上且不可况上帝乎唐𤣥宗宋徽宗本欲尊天而不知其䙝天也其後流離困阨禍及生民安知非天之所譴耶明聖之主尚其正之不可諉為異教之徒自相崇奉非祀典之所繫也郊禮議題為申明議郊禮講明國法請聖斷以正人心以定大典事臣於前月初十日伏承聖制問及南北郊大祀并朝日夕月之禮臣即時欲述所聞以對乃以臣前上疏巳略開陳奉有俞㫖今方廣詢廷臣以求公是臣固可以無言日夕覬望公卿大夫必有稽古識治之學必能悉心殫慮敷陳先王之典以仰稱休命者不意旬月以來側聞議論紛操人懐異見殊為可訝及昨覩詹事霍韜之奏則又大可駭懼臣心亦不能無疑矣夙夜再三思惟求其說之不得於是考先王之遺訓稽國朝之典章殊未見其不可然後知韜之言過矣臣兹不容於不言也請先以郊祀之禮為對而後辨韜之失言臣聞之中庸曰武王周公其達孝矣乎又曰郊社之禮所以祀上帝也葢天之胙君實為神主君之受命惟典神天武王伐商以其不祀上帝周公稱繼志述事惟以致孝鬼神陛下聖諭議及於此葢敬天之誠也禮神之至也實為天地神人之慶也竊聞周禮一書言祭祀甚詳大宗伯掌禮者也而首及於天神人鬼地祇之三禮此即有虞秩宗典朕三禮之意是故以祀天神則有禋祀實柴槱燎之禮以祀地祇則有血祭埋沈疈辜之禮以享人鬼則有獻祼饋食祠禴烝嘗之禮大司樂冬日至地上圜丘之制則曰禮天神夏日至澤中方丘之制則曰禮地祇圜丘禮天方丘禮地則天地分祀從來久矣宋儒引昊天有成命為郊祀天地之詩則曰郊祀無天地之分劉安世以豐年潛有多魚二詩證之以為郊祀天地皆歌此詩何嘗言其合祭朱熹則斷以此詩多道成王之德疑祀成王之詩以今觀之葢終篇無一語涉天地此朱熹之言的然可據而小序不足凖也况周禮掌次王大旅上帝則設氈案設皇邸司裘為大裘以共王祀天之服皆言天而不及地宗伯六器則以蒼壁禮天黄琮禮地是天地之祀玉有别也典瑞則以四圭祀天兩圭祀地是天地之祀玉不同也祀天於冬至以陽氣來復於上天之始祭地於夏至以隂氣潛萌於下地之始時不同也用圜鍾于震之宫取其乾出乎震之義用函鍾于未之地取其坤居於未之義是樂不同也小宗伯言五帝且兆于四郊而不言與昊天上帝同郊祀况可與后土地祇合祭乎則天地不合祀從來亦久矣是故宋儒葉時之言曰郊丘分合之説當以周禮為定今之議者以社為祭地而不知天子之社有三曰大社曰王社曰亳社大社為百姓而立王社為藉田而立亳社則遷國之社也而祭地不與焉朱子釋中庸曰社祭地不言后土者省文耳葢祭地之名亦曰社也祭地之社總大地言之與天對者也大社乃自王畿千里之地言故諸侯國社以至庶民鄉社皆祀其所主之土也故社字從示從土義有在矣且議者既以大社為祭地矣則南郊自不當祭皇地祇何又以分祭為不可乎議者又疑古無北郊然郊特牲曰兆於南郊就陽位也則南郊固見於經矣祭天而兆于南郊以就陽位則祭地而兆于北郊以就隂位曷見其不可也程子曰北郊不可廢况陳氏禮書直曰祭地於北郊方丘者北郊之丘也丘方而下所以象地則古人固嘗行之矣議者又謂莫大於天地實天中之一物耳不必别祭則以天為尊以地為卑不得與天抗似也然天地合祀則同尊並大是崇地抗天矣與天為敵矣乃不以為非何也程子曰郊天地與共祭父母不同此是報本之祭須各以類祭豈得同時又曰冬至祭天夏至祭地此何待卜朱子曰古時天地定是不合祭日月山川百神亦無合共一時祭享之禮又曰天下有二件極大底事其一是天地不當合祭於南郊夫程朱三代而下大名儒然則其言皆不足據乎秦去古未逺則祀天不於圜丘而於山下祭地不於方丘而於澤中漢之制祀天於甘泉祀地於汾隂則秦漢天地之祭猶分也至元始之制則天地同牢於南郊此則莽賊隂媚元后之計欲以妣並祖故不得不以地並天也合祭之說實自王莽始矣自漢而唐而宋皆合祭而地之特祭少矣漢之前皆主分祭而漢之後亦間有之如魏文帝之泰和周武帝之建康隋髙祖之開皇唐睿宗之先天皆分祭也開元制禮則專主合祭矣元豐一議元祐再議紹聖三議皆主合祭而卒不可移者以宋人有郊賚之費故三年一郊至傾府藏之財而不足以從事所以必於合者從省約也安簡便也亦未嘗以分祭為非禮也蘇軾言祖宗幾年合祭一旦分之恐致禍朱子謂其説甚無道理然兩郊之説在宋似為難行與今日之事異矣本朝丘濬之言以類于上帝類字强訓為合此葢臆説又以元始禮天地同牢不為瀆不可以莽廢又謂夏至祭地則地先天食其辭多歸美本朝之制葢從周之意而不知其言之悖於義也今之議者大率主濬之言而往往以太祖之制為嫌為懼然知合祭乃太祖之制為不可改而不知分祭固太祖之初制為可復也知大祀文乃太祖之明訓為不可背而不知存心録固太祖之著典為可遵也且皆太祖之制也從其禮之是者而巳矣矧敬天法祖無二道也陛下固巳灼見禮之實矣當時學士解縉固嘗請復掃地之儀矣使太祖尚在知禮之臣亦當請而改之况陛下以聖子神孫有聖人之德而在天子之位顧不得操制作之權以隆繼述之孝乎且陛下今日之舉欲復古禮以大報天也欲遵祖初制以求盡善也欲逺跡三代之隆而一正千古之謬也將以建一代中興之業而陋漢唐宋於下風也所謂功光祖宗業垂後裔之事未有大於此者也是故文武之制禾備周公作禮樂以成之未聞周公變文武之舊也况禮樂必積德百年而後興今以其時考之則可矣我太祖天造草昧規模宏逺訏猷懿範可守可則者多矣乃若禮樂之興恐亦有不能不待於後世者至於振起而充拓之雖我聖祖之心豈無所望於後世之聖子神孫者乎此正今日之事也豈有泥於祖宗巳然之迹遂一成而不可變耶中庸曰非天子不議禮不制度不考文孔子曰禮樂征伐自天子出然則所謂天子者豈盡指創業之君言耶信如諸臣之議則守成之主皆無所事事矣雖有周公孔子之聖亦不敢言禮樂矣所謂善繼人之志善述人之事皆無所用其力矣無乃失之逺乎韜之奏曰紊亂朝政曰變亂成法必有任其責既而曰諌官創議葢指臣也韜之此言私心害之也欲中人以禍而不知祖宗之大法故韜往往自蹈之而不知其施諸人無足怪也臣請得以講明之非以曉韜且以曉在廷諸臣也夫律有奸黨之條内開若在朝官員交結朋黨紊亂朝政者皆斬此指國家一應法度政令干係紀綱名分而奸臣交結朋黨紛更壊亂交通扶同為奸作弊以欺君罔上虐民害政者言也今日所議者郊祀之禮耳乃古先哲王令典我太祖髙皇帝之所巳行載在典章律亦有毁大祀丘壇之文解律者曰丘壇祭天圜丘祭地方丘壇其所登祭之處此法家之所知也言官議禮本非變法以此為紊亂成法之文屬在講讀律令條下曰凡國家律令叅酌事情輕重定立罪名頒行天下永為遵守百司官吏務要熟讀講明律意判決事情末一款若官吏人等挾詐欺公妄生異議擅為更改變亂成法者斬此所謂成法者即太祖所定之大明律令也未聞以禮樂制度為成法也韜嘗奏言有禄人受枉法賍八十貫律絞欲將在外知縣以上等官但犯賍八十兩即挐觧來京絞諸都市不許准徒是改雜犯為真犯也此則非成法矣臣嘗伏讀太祖御製大明律序今後法司只依律與大誥議罪今黥刺者除逆黨家屬并律該載外其餘有犯俱不黥刺雜犯死罪并徒流遷徙笞杖等刑悉照今定贖罪條例科斷臣又嘗伏讀皇明祖訓如曰守成之君所用常法止守律與大誥不許用黥刺剕劓閹割之刑臣下敢有奏用此刑者文武羣臣即時劾奏如曰以後不許立丞相臣下敢有奏請者亦要即時劾奏皆處以重典若此類者乃我太祖成法非臣下所敢變亂者也豈惟臣下雖我皇上亦豈得遂變之惜乎韜之未達乎此也臣備員諫諍使萬一有干祖宗典憲亦豈敢輒犯哉臣雖至愚或不至此也至於毁周禮一書尤為妄議臣不敢一一指摘當於其大者辨之韜曰宋儒胡宏有言周禮非周公之書王莽劉歆為之也韜名為讀書知禮者且備位儒臣矣何其不考之甚也胡宏之言非宏言也承舛踵訛之説也夫周禮之出自劉德始累周禮者亦自劉德始周禮之立自劉歆始誣周禮者亦自劉歆始周禮之傳自鄭康成始壊周禮者亦自鄭康成始昔秦人焚書滅學周禮藏之山巖屋壁僅而獲存武帝時有季氏得之以上河間獻王德乃以考工記補五官之缺漢臣詆之以為末世瀆亂之書實劉德一記累之也至成帝時劉向子歆校理秘書乃獨知其為周公致太平之迹不幸身為國師取之以輔王莽乃為泉府理財之説於是六幹立法則皆置市官當時漢儒訾之以為六國隂謀之書是劉歆一法誣之也先儒嘗謂累周禮者其罪小誣周禮者其罪大誣周禮者其法在壊周禮者其法亡然禮經之學所賴相傳至今不墜者實諸儒講明之功也今韜不以諸儒講明者之言為陛下獻乃獨取胡宏憑私臆決之一言以厚誣周禮不惟取辨一時以誤陛下而又誤天下後世使信周禮為王莽偽撰不得表章而遵行之其闗係名教非細故矣臣竊為韜懼也臣何敢隠而不盡言與之辨乎夫諸儒講明之功莫大於朱子程子朱子曰周禮乃周家盛時聖賢制作之書又曰周禮一書周公所以立下許多條貫皆是從廣大心中流出又曰周官徧布精宻乃周公運用天理熟爛之書又曰説制度之書惟周禮儀禮可信禮記便不可深信又曰周禮非聖人做不得程子曰周禮一書周公致治大法在其中又曰必有闗雎麟趾之意而後可以行周官之法度他如文中子居家不暫舍周禮至謂如有用我執此以往又曰周禮其敵于天命乎又曰吾視千載以上聖人在上者未有若周公焉其道則一而經制大備後之為政有所持循東萊吕氏曰用典所載綱以六官之職統端於内治達於外樞動於上政行於下此聖人之所以好要而百事詳也范氏曰人君如欲稽古以正名茍舍周官未見其可楊氏曰周官之書先王經世之務也不可不講然則韜之學果純於程朱數子乎至力詆天官冢宰篇為莽誑天下之術則又大可異矣夫天官冢宰一篇朱子以為周公輔導成王垂法後世用意最深切處欲知人主正心誠意之學於此攷之可見其實又謂冢宰一官兼領王之膳服嬪御此最是設官者之深意葢天下之事無重於此後世雖不能行豈可盡廢聖人之良法美意而誣以莽之偽為耶且莽之前固嘗有周禮矣今則以為周制之土苴而莽集其大成韜又曰合祭以后配地自莽始夫莽既偽為是書矣何不削去圜丘方丘之制天神地祇之祭而自為一説耶其説不得而通之也是故疑周禮者漢武帝何休謝氏黄氏之徒也彼程子朱子東萊横渠則固無疑矣用周禮悮天下者王莽劉歆蘇綽王安石也彼周公召公畢榮毛散諸公則未嘗誤也韜謂皇上好古之篤如此志復三代如此千萬世一人而巳矣未見儒臣以三代純王之學上輔聖主此言誠是也然既以皇上好古志復三代則分祭天地固古禮也三代之典也何以言其非禮而必欲使襲王莽瀆亂之舊耶夫致主之學周公之道純矣今乃欲盡廢周禮使不得行於世則祖宗之設官分職大小政體其倣於周禮者多矣然則必一舉而變亂之耶抑不知此外又别有何道乃為純王之學可以輔聖主耶是故韜之言臣不敢以為是也獨怪夫韜之言出而和者遂紛紛也况近年禮部行移令立小學習讀周禮又令科塲必以周禮策士是皆奉陛下明㫖施行者也乃不聞韜奏止之及韜修大明㑹典嘗具奏欲將内府各監局職掌屬之禮部亦復援引周禮天官冢宰之文是韜平日未嘗非周禮也何得因議郊祀而一旦遂欲盡棄其學耶殆不可曉也臣竊憤懣以今日之事乃陛下光明俊偉超軼古今之盛舉而不得羣臣同寅協恭之助實韜有以啟之也但在廷羣臣之奏或謂事體重大憚於更改或謂合祀從來久逺宜仍舊貫或以費財動衆恐停國力此固私憂過計之言自是一説亦何不可之有獨怪夫牽合附㑹背畔決裂以聖人之言為不必盡信則不免於欺矣且建白者言官之職議可者執政大臣之事至於議禮之權又惟天子得以獨專非臣下所敢與也况臣前疏固巳言之矣臣又竊惟今日之事職掌者禮官則考訂折衷以求定論者當在禮官也謀國者大臣則議擬奉行以身任其責者當在大臣也臣既各以所見上陳矣但前月仰奉明問旬日之間即以疏上竊恐考究未必盡精意見不能無異中間固有詭詞詖説黨邪惑衆者殆不足深較葢議禮之家名為聚訟常情所向自古已然惟是天地大祭國家重務况於千八百年之下興起三代而上之盛典所當尤加慎重必使損益合宜足以垂範宇宙不致少有遺恨以貽後議則天下之大幸也伏望皇上恢𢎞天度開張宸聰矜愚盡下曲示優容小大臣工必能克去已私仰體聖明深求古義以奉明詔所據圜丘方丘朝日夕月諸神壇壝規制自有我太祖刋定之典備載存心録一書不須創設無所變更一凖乎舊而巳但大祀殿以之祀天則不應經義以之饗帝則合周禮然祖宗並配父子同列稽之經㫖未能無疑矣周人郊祀后稷以配天臣以為我太祖聖神文武欽明啟運俊德成功統天大孝髙皇帝足以當之宗祀文王於明堂以配上帝臣以為我太宗體天行道髙明廣運聖武神功純仁至孝文皇帝足以當之區區之愚有見於此不敢不以為獻如蒙再下臣章勅禮部一併㑹議所貴廷臣協心同德深考博求務合經訓破除臆説不狃於茍且之情不遷於衆多之口忠誠精白以仰承皇上中興大有為之志以光復太祖之始制使天下後世知郊祀天地獲全古禮一洗千古之陋自陛下始顧不休哉伏惟聖明觀其㑹通取厥中正斷而行之以幸萬世臣不勝戰懼昧死願忠之至嘉靖九年三月初三日題初五日奉聖㫖這所奏皆發明古典朕巳具悉禮部便上𦂳將各官所奏并此本看詳開具務要據古斟酌㑹官議擬明白奏請定奪勿得稽遲避忌欽此論郊社黄潤玉中庸曰郊社之禮所以事上帝也朱子註郊祭天社祭地葢郊之禮主祀上帝而統地祇也按郊特牲篇郊特牲而社稷太牢又云社所以神地之道也地載萬物天垂象取材於地取法於天是以尊天而親地也禮運篇夫政必本於天殽以降命命降於社之謂殽地又曰祭帝於郊所以定天位也祀社於國所以列地利也又云禮行於郊而百神受職禮行於社而百貨可極又按書泰誓云類于上帝宜于冢土召誥云用牲于郊牛二社于新邑牛一羊一豕一以上經傳對舉郊天社地之文最為明白及考祭法燔柴於泰壇祭天也瘞埋於泰圻祭地也用騂犢於泰昭以下六宗四坎壇之百神皆埋少牢此王者郊天而并祭地之大禮也周官大宗伯章祀天始上帝祭地始社稷獨司樂章有夏至方丘之文即祭法王為羣姓立大社而王社乃宗廟之右社稷也别無北郊之名夫天包乎地天尊而地卑固不可以並言南北郊也禮云器用陶匏順天地之性也此亦郊天而并祭地也草廬吴先生謂天地並尊似拂易傳天尊地卑之義故著此論宗廟饗祀之禮邱濬臣按古者天子七廟各自為室自漢明帝以後始為同堂異室之制行之千有餘年一旦革之以復古制葢亦難矣必欲酌古今之制果何如而可適今之宜而不失古人之意乎臣竊謂宜如周人宗廟都宫之制七廟各為一室太祖之廟居中分為三昭三穆其中有功德者别出之以為世室如劉歆之説兄弟相繼者名為一世而各自為一室毎嵗四祭如周禮所謂祠禴嘗烝者春祠則犆祭夏秋冬則祫祭如王制之説春祠毎嵗孟春自初一日齋戒為始四日祭太祖廟間一日祭一廟前一日省視祭畢即繹十有四日徧七室毎室各祭則羣廟之主各得自伸其尊而不厭於太祖矣至於夏之禴秋之嘗冬之烝則先期各於其廟吿以時祫之意至日各迎其主祫食於太祖之廟而巳祧者不與焉則主祭者不勞而行之不難矣所謂大祫大禘者説者謂五年一禘三年一祫非古制大儒程頥有言立春祭先祖冬至祭始祖朱熹謂先祖之祭似祫始祖之祭似禘二儒之言雖為人家而發然揆之於義而合推而上之似亦可行請於毎嵗立春之日行大祫禮凡毁廟未毁廟之主皆合食於太祖之廟大禘之禮則於冬至之日行之於始祖之廟而又推始祖所自出之帝而以始祖配之焉後世人主多是崛起未必皆如三代世系有所據依功業有所積累所謂始祖者創業之君也始祖所自出之帝據其所可知者請以宋朝為比而即光宗之世論之所謂始祖者太祖也太祖者宋創業之君也太宗仁宗二帝有功德不祧以為兩世室神宗哲宗徽宗欽宗髙宗孝宗六室為親廟前此順翼宣三祖真英二宗皆在三昭三穆之外親盡而祧所謂僖祖者太祖之髙祖開國之初即追封以為親廟其所知者止此自此以上更不可考是為太祖所自出之帝宜别為一廟以藏其主而以順翼宣三祖祔其中遇行禘禮則請僖主出就太祖之廟祀之而以太祖配焉順翼宣三祖配食其在左大祫則太祖正東向之位而凡毁廟未毁廟之主皆合食於太祖如常儀如此則太祖名號既與廟相稱而亦不失其所以追王崇祀僖祖之心矣宋人以僖祖正東向之位以為太祖然宋之太祖乃是建隆帝與廟號不相稱祧去僖祖不祭則又失太祖事亡如事存之心若夫祭天饗帝則惟以太祖配焉夫然則尊尊親親各得其宜而古禮庶幾可行之今乎是雖不盡合古人之制而古人之意或亦略得其彷彿矣傳曰非天子不議禮顧臣何人輒敢妄議葢述所聞以比擬前代之制非敢以為今日可行也臣昧死謹言廟制疏倪岳勅諭禮部朕惟古者天子九廟而祖功宗德百世不祧其他則以次祧遷有常制焉恭惟我太祖髙皇帝混一區宇肇正綱常追祀德懿僖仁四祖同殿異位情文具稱列聖相承昭穆有序至於皇祖考英宗睿皇帝九廟巳備兹者皇考繼天凝道誠明仁敬崇文肅武宏德聖孝純皇帝山陵將畢升祔有期當定祧遷之制矧惟皇妣孝穆慈慧恭恪莊僖崇天承聖皇太后祔葬畢日宜有奉享神主之禮爾禮部其㑹文武大臣并詹事府國子監翰林院堂上左右春坊及科道掌印官詳稽古制斟酌情文議處來聞務遵典禮足垂萬世用成朕尊祖敬親之大孝欽哉故諭欽此欽遵㑹同太傅兼太子太師英國公等官張懋等議得禮必縁情而立義事當據古以證今謹按成周之制天子七廟三昭三穆與太祖之廟而七文王武王為宗不在數中故為九廟葢以后稷為始祖文武為世室皆百世不遷其餘則以次而祧前乎周則商以契為祖而湯與三宗百世不遷後乎周則宋以僖祖為祖而太祖與太宗百世不遷彼時僖祖祧遷雖曰迭有異議而大儒程頥朱熹皆以奉僖祖為太祖為得禮之正而合於人心之同所謂有其舉之莫之敢廢者也國朝太祖髙皇帝肇建丕圖追祀四祖迨至英宗睿皇帝龍馭上賔遂備九廟在當時則德祖尊為髙祖以上葢無可推之親在今日則德祖尊為始祖以下固有可祧之主洪惟太祖髙皇帝太宗文皇帝功德隆盛如周文武萬世不祧懿祖而下以次遞遷實惟古制今伏遇憲宗純皇帝升祔之日所有懿祖皇帝神主義當奉祧仍於太廟寢殿之後略倣古者夾室之意别建一殿九室以事奉藏况古自祫祭謂合祧廟與未祧之主於太祖之廟而祭之故謂之祫祫者合也今亦宜於嵗暮享祭之日奉迎懿祖皇帝神主仍居舊位以享祫祭之禮則毎嵗一祭視古三年一祫於禮有加近該欽天監選到成化二十三年十二月二十四日憲宗純皇帝神主升祔太廟後殿未可營建合無暫請懿祖皇帝神主安奉於德祖皇帝室内以俟後殿之成此即所謂毁廟之主藏於太祖之廟於義亦安又按周禮春官大司樂之職歌仲吕舞大濩以享先妣謂姜嫄也是帝嚳之妃后稷之母故特立廟以祭之至宋則元德懿德二皇太后俱有别廟之享章獻章懿二皇太后遂有奉慈之建毎嵗五享四時薦新上食並同太廟兹者恭遇孝穆太后祔葬茂陵所有神主宜於奉先殿傍近宫室改為别廟以禮安奉嵗時祭享悉如太廟奉先殿之儀仍乞勅奉遷官於祔葬畢日暫奉神主於茂陵獻殿以俟二十四日憲宗純皇帝祔享太廟禮畢然後啟行於二十六日文武百官各具素服出城奉迎自大明門進入就赴别廟安奉如儀以是叅稽乎情文庶幾咸合乎典禮縁係節該欽奉勅㫖㑹官議處來聞事理未敢擅便定奪謹題請㫖成化二十三年十一月二十一日於西角門題奏本月二十三日奉聖㫖是奉先殿傍近無宫室堪改别廟恁還再議來説欽此欽遵二十六日禮部㑹官議擬題奉聖㫖你毎既考論明白准議欽此欽遵後於奉先殿之東别闢門改一殿仍扁曰奉慈殿以奉神主云青谿漫藳題禮儀事楊守陳往者欽䝉􅃯諭以憲宗純皇帝將祔太廟當定九廟祧遷之制命文武大臣下逮臣等㑹議臣愚無識以為當據古禮而但定七廟祧德祖懿祖熙祖三廟乃以仁祖淳皇帝太祖髙皇帝太宗文皇帝仁宗昭皇帝宣宗章皇帝英宗睿皇帝憲宗純皇帝為七廟别為殿於太廟之後以奉三廟神主三嵗一祫以後則自仁祖及仁宗以下親盡而祧皆祧於三祖之廟而太祖太宗皆百世不遷庶無悖禮臣議若此衆於建别殿以藏祧主而行祫禮與臣議同惟以明詔巳言九廟而難違德祖當為始祖而不遷故但請祧懿祖與臣議異臣退而思之竊以為詔書九廟猶或可從若德祖不祧以為百世不遷之祖則有不可孔子曰祖有功宗有德此萬世不易之論也天子七廟太祖之廟百世不遷餘皆祧毁此四代帝王之成法也請詳陳之唐虞之文祖尚矣夏之顓頊既帝而鯀無功故以禹為始祖殷之始祖曰契周之始祖曰稷皆有大功故號太祖而郊祀配天其廟不遷漢及魏晉上祖無功皆以創業之君為太祖李唐上祀四世諡其髙祖曰宣簡公曾祖曰懿王考曰元皇帝而其祖諡景皇帝有功實號太祖趙宋亦祀四世號其髙曾祖考為僖順翼宣四祖而以藝祖開國廟號太祖凡號太祖者必以配天此皆據禮以定名號巳示當祧與不遷之意矣故魏晉之廟太祖以上親盡皆祧而太祖厯世不遷時無議者唐至中宗既祧宣簡於夾室𤣥宗仍復宣簡而諡為獻祖并諡懿王為懿祖至代宗并祧獻懿德宗又祧元帝於是太祖居第一室矣然至祫禘之時則獻祖居尊東向而太祖在昭穆之列當時人心猶慊議者紛然卒遷獻懿之祖於興聖廟不預祫祭而太祖正東向之位為不遷之祖終唐之世無復議者宋至神宗巳祧僖祖於夾室及王安石用事仍復僖祖且定之為始祖而居累朝闕祭所虚東向之位遷順祖於夾室當時名臣若韓維司馬光孫固王介張師顔者羣議力争莫能回也哲宗既祧翼祖徽宗又祧宣祖而僖祖猶居尊位太廟猶列昭穆人心亦慊故髙宗以來如董棻王普之倫屢嘗論列寧宗乃用趙汝愚鄭橋樓鑰陳傅良諸臣之議并祧僖宣二祖别建四廟殿以奉祧主時惟一朱熹争之不勝於是太祖始居第一室而祫祭居東向之位終宋世不遷無復議矣此則凡號太祖而配天者必居尊位而百世不遷然後合乎典禮協於人心而無可議也國初追帝髙曾祖考為德懿熙仁四祖亦但以為四親廟而已初無祖功之意故郊祀配天則以仁祖亦惟取嚴父之義耳固未嘗以德祖擬商周之契稷而輒以配天也太宗嗣位乃尊髙皇帝為太祖而遂以配天仁祖亦不得預則其意亦以四祖親盡當祧而太祖有功不遷當如夏之以禹為始祖漢以下以創業之君為太祖者也在禮太祖即始祖髙皇帝既號太祖今乃復號德祖為始祖豈先王之禮祖宗之意哉且古者一帝一廟廟皆南向後世同堂異室亦皆南向時享則諸帝皆南面而各尊惟祫祭則太祖東向獨尊餘則左右分向皆卑也我朝時享之禮則惟德祖南面獨尊餘皆東西相向而卑巳如祫之儀矣今祧懿祖則以德祖為始祖而百世不遷永居南面之位而常尊太祖永居東向之位而常卑後世臣子瞻之孰無感悵必有博聞達禮之儒昌言正議而羣臣和之天子從之卒祧德祖而尊太祖然後巳耳唐宋之事是明鑑也若祧德祖則異日三祖以次祧盡而太祖可居南面之尊以稱其名實此天下人心之同願雖傳萬世必無易也况别殿宻邇太廟而祫祭則德祖猶居南面之位而太祖諸帝皆分列左右不失其尊非若唐遷獻祖於興聖廟宋遷僖祖於四祖殿而逺隔别享伸孫之尊廢祖之祭也亦何嫌哉今之議者率謂德祖猶宋之僖祖王安石嘗議尊僖祖為始祖其後朱熹廟議實取之今尚敢有異議乎臣以為不然安石謂僖祖有廟與契稷疑無以異熹亦謂莫若以僖祖擬稷契而祭于太廟之初室曰疑曰莫若則其意豈真以僖祖可為稷契而合於禮之祖有功者哉葢其説以為若祧僖祖不可下祔子孫之夾室又不可别立一廟故為是不得巳之辭耳葢祖有功之禮終不可泯也况時異制殊尚執其説之不可行於宋者而必欲行之今乎今太廟既無夾室若執其説雖别立廟亦不可也祧主將安寘乎今既別立殿以奉祧主無所謂下祔子孫者德祖之祧何不可之有而必欲强無功者以為始祖而使有功之太祖乃不得如夏之禹漢以下創業之君何哉孔子明言祖有功宗有德世無不宗之安石但論本統而不論功德巳戾乎孔子而朱子有取之者其説雖多亦但如前之所云者耳今議者不察定禮不從孔子而猶以朱子為辭廟祀不祖有功而以無功者强擬上不當祖宗之意下不愜臣子之願名與實乖文與情戾安可為典而垂世哉陛下若姑循近制則存九廟祧德祖亦可矣雖從今議而毎嵗一祫亦無不可葢古禮四時皆祭三嵗一祫今四時之外實多嵗暮一祭故僉議改嵗暮時享為祫乃禮之從宜而近厚者亦可從也若務遵古典則當全用臣議并祧三祖但存七廟三嵗而一祫乃協四代之典足垂萬世之法也伏惟聖明裁處凡宗廟之數祖宗名號之義廟主當祧與不遷之制行於古而宜於今者臣既備陳如右至於厯代羣臣之議其是非得失有可鑑者臣復條列於左謹按宋神宗治平四年以英宗將祔廟太常禮院請祧僖祖兩制若翰林承㫖張方平等論謂合禮遂祧僖祖神主藏之西夾室矣至熙寧五年平章事王安石奏曰萬物本乎天人本乎祖故先王廟祀之制有疎而無絶有逺而無遺商周之上斷自稷契以下者非絶嚳以上遺之以其自有本統承之故也若夫尊卑之位先後之序則子雖齊聖有功不得加其祖考此天下萬世之通道也本朝自僖祖以上世次不可得而知則僖祖有廟與稷契疑無以異今毁廟而藏主夾室替祖考之尊而下祔於子孫非所以順祖宗之孝心事亡如事存之義因循定禮實在聖時請下兩制詳議臣按郊廟之禮論廟祀祖宗則曰祖有功宗有德其言各有攸當安石引孔子論郊祀者以論廟祀故以祖宗但論本統而不論功德可謂悮矣商周之契稷實以有功而不遷豈徒本統所始而巳宋之僖祖則以無功而祧之乃先王之典禮後世之公論豈子孫以有功加其祖考而失尊卑先後之倫哉稷之先世自帝嚳以泝黄帝譜系甚明非以其世次不可知而定為始祖也固與僖祖異矣葢稷之有廟也以功功立不遷僖祖之有廟也以親親盡斯毁烏可謂無異耶若以僖祖藏主夾室未安則豈可因此而廢祖功之大禮哉當時孫固張師顔之説亦可從也諸説具見於後翰林學士韓維等議曰先王有天下迹其基業之所起奉之為太祖契稷是矣後世有天下者特起無所因遂為一代太祖國家太祖皇帝功德卓然為宋太祖無少議者僖祖雖為髙祖然功業未見所因世系未知所始而欲契稷奉之於古無考於今未安今之廟與古殊制古者毎廟異宫今祖宗同處一室而西夾室在順祖之右似亦無嫌天章閣待制孫固曰后稷播種萬世粒食其功大矣故為始祖而配天今太祖皇帝削平諸難功格上天百餘年間天下之涵泳生養而安樂於無事者皆其功也宜尊奉為始祖若僖祖之德不昭見於生民不明被於後世豈可以躋后稷之廟當始祖之禮今毁其廟而藏主於西夾室在順祖之右固巳順矣非祔子孫而替祖考也若猶以為不可則特為僖祖立室凡毁廟之主皆藏其中當禘祫時以僖祖居東向之位太廟與羣廟之主皆順昭穆之次從之而合食則僖祖之尊自有所伸矣若以别室為非則周人别廟姜嫄不可謂非禮也判太常寺張師顔等曰商周稷契皆有大功始受封國故奉之為太祖後世受命之君功業特起不由先代則親廟迭毁身自為祖故魏祖武帝則處士毁唐祖景帝則𢎞農毁此前世祖其始封之君以法契稷之明例也僖祖雖為聖裔之先而非始封有功親盡固當祧也今欲以有廟之始為説援而進之以為始祖固與契稷異矣使契稷本無功德初不受封而引以為據庶或可矣若其不然豈可據哉太祖首創洪業傳祚萬世固當為帝者始祖若僖祖神主則宜略倣周人守祧之制築别廟以藏之亦禮之以義起者也臣按自漢以來議此禮者衆矣漢則韋𤣥成等四十四人皆謂髙皇帝為太祖請瘞太上主於寢園魏則鍾繇髙堂隆諸儒皆謂武皇帝為太祖請遷處士主於園邑晉則范宣蔡謨羣臣皆謂宣帝為太祖請築别殿以藏三祖神主唐則張齊賢謂景皇帝為太祖而𢎞農及宣光之主皆當祧之陳京諸臣請築别廟以藏祧主顔真卿韓愈請藏主夾室而時出以享祫祭此皆祖有功而祧無功合於古禮與宋諸賢之議如出一口韓琦見固之議而歎曰孫公此議足以不朽矣司馬光與維議同神宗亦以維言近是皆為王安石沮之惜也翰林學士元絳等議曰自古受命有天下者皆推本其統以尊事其祖商周之祖契稷皆以承其本統而非以有功與封國為輕重也諸儒以契稷有功於唐虞之際故謂之祖若必以有功而為祖則夏后氏不郊鯀矣今太祖受命之初立親廟自僖祖以上世次不可得而知則僖祖之為始祖無疑矣倘謂僖祖不當比契稷為始祖是使天下之人不復知尊祖而子孫得以有功加其祖考也傳曰毁廟之主陳於太廟未毁廟之主皆陞食於太祖今遷僖祖之主藏於太祖之廟則祫禘之日四祖皆降而合食也情文不順莫甚於此請以僖祖為太祖則合於先王之禮意臣按絳議有述安石之言者前巳辨矣餘亦未安夫祖有功宗有德此三代之典禮宣聖之格言萬世不可易者若謂祖不以功則宗亦不以德乎祖不以功則商自三宗以上周自王季以上何者非祖而獨尊契稷宗不以德則商太甲以下周自王季以下何者非宗而商獨取太甲太戊武丁周獨取文武耶夏雖郊鯀於一時不廟鯀於百世正以無功而不可祖故但祖禹耳漢以髙帝功大而為太祖文帝盛德而為太宗降厯魏晉無不以有功者為祖有德者為宗豈絳之稽古未詳歟若謂四祖降而合食為非則王者既立始祖之廟又推始祖所自出之帝而祀之於始祖之廟此亦降而合食情文不順者耶先王之禮固祖有功而太祖之廟惟一既毁之廟不立也宋既號有功者為太祖矣絳乃欲以無功者立其巳毁之廟而又號為太祖何太祖之多耶不知其所謂禮者合何禮也絳本傳云絳有威名而無特操在翰林諂事王安石及其諸子士論鄙之然則絳之此議豈其本心也哉衆議既上王安石奏曰聖王議禮固有因循至於逆順之大倫詎能違戾而變古今或以夾室在右謂為宗祐為尊本統所承措之别室為當類皆違經背禮臣等所不敢知於是遂奉僖祖為太廟始祖臣按孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也然則聖王之禮固有因循亦有損益故祖功宗德厯代因循而無異祧主異藏厯代損益而不同也魯禘躋僖公春秋譏其逆祀宋禘未始有躋者惟以僖祖無功而祧之亦因循舊禮非變古而違逆順之大倫也古者太廟惟太祖有功不遷餘皆迭毁此三代因循既千餘年矣自漢魏以來必推有功者為太祖不遷其無功者雖屬尊於太祖而必迭毁誠合古禮此厯代因循又千餘年矣而安石率然以無功者强為始祖有功者虚稱太祖情文不順名實尤乖舉三代以來數千年之令典一朝而亂之敢違戾變古者非安石其誰歟若祧主之藏則厯代因時損益固有不同夾室如韓維所議别廟如張師顔所論亦損益之宜者也若據古禮則廟制同門異宫有毁無立所謂祖有功即指太祖太祖乃始祖之號耳唐張齊賢謂禮經始祖即太祖太祖之外更無始祖宋王普謂太祖即廟之始祖是為廟號非諡號也惟我太祖廟號巳定雖更累朝祫享必虚東向之位以其非太祖不可居也逮至熙寧乃尊僖祖為始祖而太祖常列昭穆名實戾矣倘以此為是則僖祖當稱太祖而太祖當改廟號也二説良是安石既不能改同堂異室以復古之廟制又别奉無功者以為始祖而加於太祖之上重立其巳毁之廟是亦違經背禮矣何乃以是闢羣賢哉夫祖功宗德厯代因循禮之本也縁情立典萬世通行而不可變者也祧主異藏厯代損益者禮之文也因時制宜毎代各施而不可泥者也安石但泥於毎代各施之宜而輒變夫萬世通行之典可謂不知務矣以堅志强辨力排羣議而自用此即其行新法之智力也周官法制本非後代時勢所可行而强行之殷周契稷本非後王祖宗所可儗而强儗之同一窒也新法之法當時被其禍始祖之議今尚踵其非可勝嘆哉髙宗紹興五年吏部員外郎董棻太常寺丞王普皆請祧僖祖而祫祭正太祖東向之位髙宗及宰相趙鼎皆是之然未暇也至紹熙五年寧宗即位太常少卿復言如普棻尤切既而吏部尚書鄭僑等亦因大行祔廟之祭是祖宗萬世之禮破熙寧不經之論請祧僖祖而正太祖東向之位詔從之僑等又言僖祖當用唐興聖之制立為别廟而順翼宣之主皆祔藏焉遇祫則即廟而享於禮為稱詔有司集議諸儒若樓鑰陳傅良輩皆以為可宰相趙汝愚是之乃别建四祖殿於太廟之西以奉四祖祧主嵗令禮官薦獻太廟以太祖正東向之位方集議時朱熹在經筵獨集議狀曰今羣議雖多皆有可疑如以藏主於夾室則古未有祖考祧主藏於子孫之夾室者自太祖之初室視夾室如正殿之視朶殿子孫坐於正殿而以朶殿居其祖考此不可之一也至於祫享則又設幄於夾室之前而别祭既不可謂之合食而僖祖神坐正當太祖神主之背前孫後祖又不可之二也如曰别立一廟則不惟喪事即逺有毁無立而所立之廟必在偏位其棟宇儀物必不能如太祖之盛是名為尊祖而實卑之又羣廟之主祫於太廟四廟之主祫於别殿又不謂之合食此又不可之三也如曰藏主於天興殿則宗廟原廟古今之禮不同不可相雜亦不合食與别廟無異此又不可之四也凡此數者議者亦皆知其不安特以其心欲急奉太祖東向之位其實無益於太祖之尊而徒使兩廟威靈常若争較弱强於冥冥之中使四祖疑於受擯徬徨躑躅不知所歸令人傷痛不能自巳今但以太祖當日推尊帝號之心而黙推之則其在天之靈必有所不忍而不敢當矣又况僖祖祧主於治平不過數年而神宗復奉為始祖以為得禮之正而合人心又况所謂有其舉之而莫敢廢者乎且孔子論武王周公之孝而曰踐其位行其禮奏其樂愛其所親敬其所尊事死如事生事亡如事存孝之至也今天子既踐太祖之位行太祖之禮奏太祖之樂矣固當愛太祖之所親敬太祖之所尊而所以事太祖者無異乎生存之時乃為至孝而議者顧欲黜其所追尊之祖考而又未有一定之處豈所謂愛敬其所尊親而事死亡如事生存之時乎葢議者之為此説但以太祖膺圖受命化家為國而王業之興不由僖祖耳然后稷始封於邰而不窋已自竄於戎狄公劉太王又再遷而後定文武之興又何嘗盡由於后稷哉但推其本始為出於此故不可以不祭而祭之不可以不尊耳豈計其功德之大小有無哉况周人雖以后稷為太祖而祭法亦曰祖文王而宗武王是乃祖有功宗有德之意故自為世室而百世不遷以冠諸廟則亦不必東向於祫而後可以致尊崇之意矣今莫若以僖祖擬后稷而祭於太廟之初室順翼宣祖俱藏其主於西夾室太祖而下各以昭穆祭於太廟則僖祖東向如故而順祖以下至於孝親皆合食焉則理順矣葢尊太祖以東向者義也天下臣子今日之願也尊僖祖以東向者恩也太祖當日之心也與其伸義屈恩以快天下臣子之願也孰若屈義伸恩以􅇺太祖當日之心乎韓愈所謂祖以孫尊孫以祖屈者正合此意而又以為四時各祭其廟則所伸之祭常多三年然後一祫則所屈之祭常少亦切中事情故熹竊以為羣議皆舛逆而難通不若還僖祖於太廟三年而一東向之為順易無事也臣按羣議四者雖若不可然背聖訓而祖無功恐尤不可今我朝太廟既無夾室而祧主不敢毁之瘞之必當作别殿而不可泥於有毁無立之文矣太廟既有廟寢今别作殿是後寢以藏已毁廟之主前寢仍藏未毁廟之主廟則為時享祫祭通用之所無所謂藏祖考於子孫夾室者矣廟地且廣而别殿在正北棟宇儀物可盛於舊無所謂名為祖而實卑之者矣今改嵗暮時享為祫祭則毁廟未毁廟之主毎嵗皆合祭於廟無所謂受擯别享而不得合祭者矣豈復有一如熹之所疑者乎然則所謂四不可者今皆可矣今祧德祖而熹尚在亦或無異議耶其謂兩廟威靈争較强弱四祖疑於受擯徬徨躑躅恐未必然熹嘗言祖有功宗有德天下後世自有公論不以揀擇為嫌所以名之曰幽厲雖孝子慈孫百世不能改也又嘗言祖功宗德其説尚矣而程子獨以為如此則是為子孫者得擇其先祖而祭之此殊未然商之三宗周之世祖見於經典皆有明文而功德有無之實天下後世自有公論若必以此為歉則秦政之惡夫子議父臣議君而除諡法者不為過矣且程子晩年嘗論本朝廟制亦謂太祖太宗當為百世之廟以此而推則前説若非記者之誤其或出於一時之言未必終身之定論也夫既謂公論在天下後世則非太祖所得而專之雖太祖有所不忍而不敢當如公論何若謂僖祖之為始祖已得禮之正而合於人心則當時附安石者惟元絳等數人而巳若韓維張師顔輩數十人皆謂其背禮逆情而力争之後世若董棻王普數人亦皆謂其違經戾古而請更之又後則趙汝愚鄭僑輩數十人又皆謂其不經之論而卒正之安在其得正禮而合人心也雖熹亦自言尊太祖則快天下臣子之願夫臣子之願則尊僖祖之不合人心也明矣又曰禮者順於鬼神合於人心而理萬物者也豈有不快臣子之願而可謂之合人心不合人心而可謂之正禮乎有其舉之莫敢廢也戴記有是言矣然僖祖既祧之後熹援王安石故事又謂更改豈忘其上文有其廢之莫敢舉也之言乎要之舉廢當揆諸義不可執也所引中庸愛敬所尊親事死亡如生存之説似矣然僖祖固太祖之所尊而敬者順翼宣三祖獨非太祖之所尊而敬者乎留僖祖而黜三祖則於所尊有敬有不敬者矣豈太祖生存之時之心哉若謂周家之興不由后稷則書言先王建邦啓土詩列生民思文而序者言文武之功起於后稷史記言古公亶父復修后稷公劉之業論語曰禹稷躬稼而有天下皆虚誕耶謂祀稷但論本始而不記功德則與其前所謂祖功宗德尚矣之説何背馳也孔子言天子七廟三昭三穆與太祖之廟而七自此厯數而以祖有功宗有德結之則所謂有功者正指太祖也祭法但言祖文王而不言文王為太祖熹乃以祖有功為文王無乃失其㫖歟况祭法之言禘郊祖宗多悞今未暇辨也謂僖祖擬稷而居初室祫享東向則諸賢羣議巳具前矣所定昭穆之次馬端臨亦嘗議此未能詳也謂尊太祖為恩尊僖祖為義固當然常人之情多以恩掩義聖人制禮必以義斷恩若惟其恩不惟其義則至親之喪其可以期斷祖考之諡其可以幽厲乎然則屈義伸恩之説亦恐未安所引韓文臣有别論在後葢熹一時之見偶合於安石遂主張其説而排羣議其於諸書衆論皆不暇顧雖孔子之言亦不暇詳與其平昔之言牴牾而一篇之中亦自相矛盾此豈至當之論而可信從者哉今之議者徒以熹為大儒其言必當竟不究其是非得失而靡然從之併為一談牢不可破甚者或謂祧首廟之主則為無祖然首廟既非有功如稷則與次廟等耳祧其主而不毁不瘞乃遷居别殿且享祫祭焉可謂無祖耶或謂皇家之祖豈可言其無功然功德有無天下公論豈可掩實以阿世哉或謂朱子之言敢不信從然擇言處事惟當視理安可狥人葢尺寸各有長短智愚皆有得失故先哲之論後儒或更狂夫之言聖人猶擇熹言若未當理安可必從且熹雖大儒未及孔子之大聖何從熹而不從孔子哉葢皆未嘗詳考而深思耳熹小帖曰熹既為此議續訪得元祐大儒程頤之説以為太祖而有僖順翼宣先嘗祧僖矣介甫以為不當祧順以下祧可矣何者本朝推僖祖為始祖已上不可得而推也或難以僖祖無功德亦當祧以是言之則英雄以得天下自己力為之並不係於祖德或謂靈芝無根醴泉無源物豈有無本而生者今日天下基本葢出於此人豈得謂無功業朝廷復立僖祖廟為得禮介甫所見終是髙於世俗之儒竊詳頤之議論素與安石不同至論此事則深服以為髙於世俗之儒足以見義理人心之同然固有不約而同者今但以程頤之説考之則可以見議論之公而百年不決之是非可坐判矣臣按自古英雄之得天下亦鮮有自許已功不念祖德而不祀者惟繼世之君必審公論而祖有功耳且晉瑯琊王德文曰七世之廟自由德厚流光非為太祖伸尊祖之禮也亦有㫖哉宋之僖祖猶商之報乙周之亞圉皆不過王者之髙祖耳若以為天下基本所出是其功業則商周但祀報乙亞圉為太祖可矣何必祀契稷耶然則復立僖祖之廟固非得禮而安石違聖變古所見豈髙於世俗之儒耶頤之此説不載於遺書外書或如熹所謂若非記者之誤則出於一時之言而非其終身之定論也歟理義之心人皆有之自孔子而下若漢韋𤣥成魏髙堂隆晉蔡謨唐張齊賢宋司馬光等動輒數十人更十餘代厯千餘年總數百人前後議論皆不約而合者何獨以安石與程頤相合為足以見義理人心之所同哉豈韋𤣥成以下數十人皆愚不肖而無義理之心獨安石與頤有是心耶夫議論之公必出於衆人之口故公論謂之輿論熹不考孔子之言與韋𤣥成等數百人之論以為公而獨考程頤一人之説為公論以判百年不決是非顧安得而判之宜趙汝愚諸賢之不從也熹面奏劄子曰僖祖者太祖之髙祖也雖厯代久逺功德無𫝊然四世之後篤生神孫順天應人以寧兆庶其為功德豈必身親為之然後為盛哉是以太祖首尊崇之以為初廟當此之時葢以歸德於祖而不敢以功德自居矣今乃以欲尊太祖之故而必使之奪據僖祖東向之位臣恐在天之靈於此有所不忍而不敢當也臣按熹前議巳謂周家之興不由后稷但推本始而不計功德矣尋因程頤僖祖安得無功業之説又謂僖祖功德為盛何其立言之不一耶且頤所謂天下之基本熹所謂篤生神孫之功德豈獨僖祖有之順翼二祖亦無不然至於宣祖則篤生聖子且鞠育教誨之至其功德不尤盛哉若僖祖當祧太祖不忍奪據其室則宣祖當祧而太祖奪據其室尤不忍也以此而推真宗以下諸帝之心亦皆不忍奪據祖考之室雖經百代亦無一廟可毁則所謂先王之典禮後世之公論將安施耶熹嘗作韓文考異於禘祫議下考曰今按韓公本意獻祖為始祖其主當居初室百世不遷懿祖之主則當遷太廟之西夾室而太祖以下以次列於諸室四時之享則惟懿祖不與而獻祖太祖以下各祭於室室自為尊不相降厭所謂所伸之祭常多者也禘祫則惟獻祖居東向之位而懿祖太祖以下皆序昭穆南北相向於前所謂祖以孫尊孫以祖屈而所屈之祭常少者也韓公禮學精深葢諸儒所不及故其所議深得夫孝子慈孫報本反始不忘其所由生之本意真可為萬世通行之道非但可施於一時而巳臣按唐代宗立時即祧獻懿二主於夾室而遷太祖主於初室禘祫則獻懿不與而太祖東向厯十有八載至德宗建中二年因顔真卿議乃以獻祖主遇祫祭則暫出居東向之位祭畢仍藏夾室厯二十年至貞元十七年有言太祖百代不遷而獻祖親盡廟遷祫居東向非是乃令百僚議之議者多以獻祖主或毁或瘞或遷而不使之合食以替太祖東向之尊故韓愈皆以為不可但欲仍舊藏主夾室而禘祫則出之以暫居東向耳非謂獻祖不當祧其主不當藏夾室也然則所謂獻祖為始祖其主當居初室百世不遷者自是熹之所見非愈之本意也且愈屈伸之説固含尊卑之義然獨為太祖發耳熹謂室自為尊不相降厭則諸廟皆尊不獨太祖而巳葢當時時享則獻祖不與太祖尊居初室是獻祖屈而太祖伸也祫祭則獻祖尊居東向太祖卑列昭穆是獻祖伸而太祖屈也時享常舉而太祖常居初室故愈謂常祭甚衆而太祖所伸之祭至多也祫祭三年一行而太祖暫列昭穆故愈謂合祭甚寡而太祖所屈之祭至少也若如熹言獻祖居初室而太祖居第二室則凡常祭合祭獻祖皆居尊位常伸無屈太祖恒列昭穆常屈無伸而不可謂伸多屈少矣商周起於契稷廟以契稷為太祖莫有尚者故時享祫祭無不尊之唐興由於景帝廟以景帝為太祖不遷其上更有獻懿迭毁故時享則尊太祖祫祭則尊懿祖此愈所謂事異殷周禮從而變也若如熹言獻祖居初室而祫祭東向則全與商周之禮同矣何謂事異而禮變耶且愈又有遷𤣥宗廟議其言唐之廟制甚明謂國朝九廟之制法周之文太祖景皇帝始為唐公肇建天命義同周之后稷髙祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王其下三昭三穆謂之親廟與太祖而七以是觀之則愈之本意何嘗以獻祖為始祖其主當居初室百世不遷如熹之説哉熹固謂韓公禮學精深諸儒所不及其所議可為萬世通行之道愈之禘祫議與遷廟議實同一意可通行者熹惟主張安石之説更不詳考唐典深究韓文而遂以已見為愈之本意安可盡信而必從之哉觀安石與熹之議質以厯代聖賢之論如前所陳則僖祖不可儗契稷而為始祖也較然矣我朝德祖實與僖祖無異當祧也祧德祖而以太祖儗之殷契周稷與唐景帝宋藝祖是萬世通行之典也祧主藏於後寢祫禮行於前廟時享則尊太祖祫祭則尊德祖是毎代各施之宜也得其本而不泥其文豈不韙哉叅酌古今慎處廟制乞賜明斷疏廖道南該右春坊右中允廖道南奏臣伏攷洪武元年二月朔我太祖髙皇帝勅諸儒臣曰自昔聖帝明王之有天下莫嚴於祭祀故當有事内必致其誠敬外必備其儀文所以交神明也朕誕膺天命統一海宇首建郊廟以崇祀事顧草創之初典禮未洽其何以交神明致靈貺其各具沿革以進於是輔臣李善長傅瓛等學士陶安等上議曰商書七世之廟可以觀德則知天子七廟自古有之不獨周制為然若太祖百世不遷三昭三穆以世相次此萬世不易之禮也今擬四代各為一廟德祖𤣥皇帝居中懿祖恒皇帝居東第一廟熙祖裕皇帝居西第一廟仁祖淳皇帝居東第二廟以四時及嵗除凡五享惟孟春特祭於髙祖廟孟夏孟秋孟冬則各祭於列廟臣惟我聖祖之制斟酌三代垂憲萬世載在國史編諸集禮聖子神孫所當世守以為祈天永命之洪圖者恭遇我皇上中興大化光紹丕烈遵復四郊以祀天地日月釐正百禮以祭神祇帝王情文胥協顯微攸通無復加矣而獨於宗廟之制屢形於御札宣於召問有不能以自安焉者誠有以見聖人之大孝天子之大禮有聖人在天子之位如之何其弗可行也朱熹曰天下有二件極大事一是天地合祭一是太祖不特立廟與諸祖同一廟千五六百年無人整理又曰漢承秦敝不能深考古制自是以來更厯魏晉下及隋唐其間非無奉先思孝之君據經守禮之臣而皆不能有所裁正至使太祖之位下同子孫且更僻處於一隅既無以見其為七廟之尊羣廟之神則又上獻祖考而不得為一廟之主以人情論生居九重窮極壯麗而没祭一室不過尋丈甚或無地以容鼎俎孝子順孫之心宜有所不安矣夫熹之進講此論於經筵在宋偏安之時而况我皇朝輿圖一統我太祖髙皇帝崇勲峻業逺邁百王豐澤洪仁光被九域夫有萬世不朽之功者宜享萬世不遷之報而乃今不獲專享特廟以全南面之尊端居宗祧以統列廟之主尊卑長㓜並列於一堂而邊豆鼎俎分羅於一隅信有朱熹之所云者此我皇上至仁大孝之思所以特發由衷而不能以自安焉者也今之議以為弗可行者其説有四一曰地勢窄隘二曰禮節繁難三曰成憲宜遵四曰勞費當惜臣請解其惑焉夫以地勢窄隘為言者臣按周禮匠人營國左祖右社廟門容大扄七箇闈門容小扄三箇鄭𤣥註云闈門廟中之門大扄牛鼎長三尺小扄膷鼎長二尺以周尺較之周之九廟之制亦甚儉矣臣愚前奏禘義篇云請以今太廟為我太祖萬世不遷之廟太宗以下各建特廟於今兩廡之地制度不必其崇髙而務質朴之為貴儀文不必其繁縟而務簡素之為貴有都宫以統廟而不必各為門垣有夾室以藏主而不必更為寢殿法古之意而不失其義酌今之宜而咸得其當庶尊尊有主而太祖之位恒安而不遷親親有倫列聖之尊各全而無瀆矣夫以禮節繁難為言者臣按周禮外宗掌宗廟之祭祀王后不與則贊宗伯鄭𤣥註云有故不與祭宗伯攝其事故王一獻卿大夫以次代獻古禮也陳祥道亦云君子以義處禮則祭不至於煩數以仁處禮則祭不至於疏怠是故禮雖先王未之有亦可以義起也而况古禮有諸乎今若各建列廟特享之時我皇上躬行禮於太祖之廟其如遣親臣代獻如古諸侯助祭之禮亦未為不可而何必拘泥邱濬十八日行禮之臆説哉夫以成憲宜遵為言者臣按中庸曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也陳櫟註云祖父有欲為之志而未為子孫善繼其志而成就之祖父有巳為之事而可法子孫善因其法而遵述之故武王周公稱為達孝而况我皇上善繼太祖之志善述太祖之事以覲耿光以揚大烈正所以遵我太祖之成憲也夫以勞費當省為言者臣按禮曰君子將營宫室宗廟為先居室為後孟子亦曰君子不以天下儉其親而况今日之尺地寸土皆我祖宗創業垂統之所貽百官萬民皆我祖宗休養生息之所致以祖宗之土地而建祖宗之廟以祖宗之臣民而供祖宗之事如之何其弗可行也臣愚於嘉靖九年二月内陳言郊祀有及宗廟之制仰䝉御札詢及輔臣彼皆不以為然臣覆奏云郊廟一體天人一道未有郊祀宜急而廟祀宜緩者又䝉明命下禮官議巳而宸衷獨斷親定圖式舉孟春特享之祭正太祖南面之位各為帷幄以權九廟之制甚盛典也而又肇舉大禘大祫以伸仁孝之思以盡誠敬之極禮曰尊祖故尊尊敬宗故親親我皇上尊尊親親之道其克盡矣臣愚前奏又云各居一幄者一時之權也而各一廟者萬世之經也伏望聖明采于芻蕘不棄葑菲逺法商周之彞典光復聖祖之舊制則億萬年太平之基端在是矣臣於邇者恭覩泰神殿成我皇上恭詣奉安皇天皇祖及諸神位行禮甫畢天應瑞雪及長至之夕我皇上躬行大報禮於圜丘是夕天宇澄霽景緯輝朗兹葢至誠昭格休徵應響之嘉祥也臣謹撰泰神殿禮成感雪賦一篇圜丘載祀慶成詩九章并録上御札寵及臣名者三條及臣原奏三通裝成二冊隨本進呈仰兾宸慈俯垂省覽臣無任戰慄之至等因奉聖㫖這所進詩賦奏疏送史館採録宗廟祀典儀制朕嘗有諭輔部大臣禮部便㑹官議了來説欽此又於禮科抄出禮部尚書兼翰林院學士題為㑹議宗廟事臣頃者伏䝉皇上於重華殿東室召見大學士李時翟鑾尚書汪鋐臣適後至首䝉聖諭天地百神祀典俱巳釐正惟宗廟之制非古臣具對誠如聖諭但古人建廟恐制度卑小今本朝太廟規模𢎞偉若一旦改作恐事體重大陛下亦諭臣曰事體委的重大臣奏曰各立廟本是古禮但他日致祭陛下欲一日徧厯羣廟恐勢不能上曰今日言廟制未論到行禮處即使難行或遣官亦可臣又奏曰古禮恐亦難盡復上曰盡如古禮固難但大體處不可不依據古人各立廟只是各全其尊此等處却當依臣奏曰太廟宜如何處上曰太廟自不當動臣又奏寢殿祧廟如何上又曰寢殿祧廟俱不動臣始仰見聖慮淵微止欲於太廟之外增建羣廟使列聖各専其尊庶於古禮為合於聖心為稱臣乃奏曰三殿不動事又易處須是臣等量度地步廣狹具奏上曰須是如此末後上又諭曰我皇考顧得專享世廟之祀自我文祖以下列聖乃不得專廟以祀朕心未安臣時等俱叩首對揚曰聖諭及此真聖人大孝之心也臣復䝉聖諭卿禮官宜即具奏臣承㫖而退終夜以思仰知聖心廣大見道分明鋭志興復古典臣叨列禮官乃得仰佐下風豈不甚幸况禮重郊廟事同一體臣先建議分祀葢嘗有感於宋儒朱熹之言謂天地間有兩件極大底事其一天地不當合祀於南郊其二本朝不為太祖特立廟此臣少日所聞有志於此久矣詎意遭逢明聖而南郊大典竟得光復若廟制一新則是朱子所謂兩件極大之事皆舉行於當今陛下制作之志可無遺恨議禮之家可無遺論而臣區區仰佐聖明興起禮樂之願亦庶幾其全且畢矣臣方欲具奏間適見大學士時鑾向臣曰昨䝉皇上召見文華西室因時奏建廟之議恐今年天氣寒沍不便興工且少待來春䝉聖諭曰昨所論偶爾議及但地方窄狹勢恐難行且罷臣仰聞宻勿之言遂不敢瀆奏昨該中允廖道南奏奉聖㫖宗廟祀典儀制朕嘗有諭輔部大臣禮部便㑹官議了來説欽此臣始惶懼仰惟聖志方欲舉行未有罷議而臣以輔臣之言稽於敷奏以致尚留淵衷未有定議臣實死罪死罪但聞命以來即當踴躍從事既而思慮經營無不曲到所不能如志者惟是地方有限恐於規制不能無窒礙耳且太廟兩旁隙地無幾左則限於世廟右則迫於前朝若欲建立羣廟必須規模宏逺合古宜今有不容茍簡者宗廟重事宜慎謀始臣愚伏乞聖慈特命内閣輔臣司禮監内官監官及尚書汪鋐蔣瑶并臣㑹同恭詣太廟步量地方審度位勢計畫規制逐一籌筭議擬明白停當先行具奏請㫖定奪方可㑹官定議上請庶神謨有定而公議允諧矣等因奉聖㫖卿只遵照前㫖即便㑹議了來説欽此欽遵通抄到部臣等㑹同中軍都督府等衙門太傅兼太子太傅武定侯等官郭勛等吏部左侍郎等官嚴嵩等㑹議得竊聞古者天子宗廟之制唐虞五廟夏后氏因之殷周之制大抵皆七廟而祭法王制所論與劉歆宗無數之説又各不同宋儒朱熹論古今廟制引王制天子七廟三昭三穆與太祖之廟而七其制皆在中門之左外為都宫内各有廟有寢别有門垣太祖在北左昭右穆以次而南太祖者百世不遷一昭一穆為宗亦百世不遷二昭二穆為四親廟髙祖以上親盡則毁而遞遷昭常為昭穆常為昭既而曰三代之制其詳雖不得聞然其大略不過如此漢承秦弊不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆明帝遵儉自抑不復别為寢廟而子孫遂為同堂異室之制嗣是更厯魏晉下及隋唐皆不能有所裁正至論宋事亦以不為太祖特令廟為恨此朱子之言後學相守以為􅃀論者也恭惟我太祖髙皇帝受天明命以有天下初為四親各别立廟德祖居中懿祖居東第一廟熙祖居西第一廟仁祖居東第二廟廟皆南向東西兩夾室兩廡三門門設二十四㦸外為都宫正門之南别為齋次其西為饌次門東為神厨其一時制度儼合古禮嗣後改建太廟始一遵同堂異室之制夫既遵古制以各立廟矣而一旦襲用漢唐故事是葢神謨英斷必有所以然議禮者終以為非古之制也恭遇皇上峻德憲天聖學稽古天地百神之祀典皆以釐正制度儀文昭然可述矣獨於宗廟之制未之修復所以形於御札宣於召問謀之輔部大臣者屢矣臣等恭聞聖諭仰見大聖人制禮作樂之志奉先思孝之誠葢欲追復三代之禮以成一王之制將以垂諸萬世而不刋者也臣等躬逢斯盛仰奉明㫖敢不思所以對揚之乎但臣等廣集衆思愚有一得不敢不為陛下陳之臣等嘗聞廟者所以象生之有朝也寢者所以象生之有寢也建之觀門之内不忍逺其親也位之左不敢死其親也是其營構之制奠兆之所各有定則不可以意為者即今太廟南邊墻東邇世廟西阻前朝地勢有限輔臣禮官已奉有聖諭太廟三殿俱不動則是太廟周垣之外左右隙地不盈數十丈耳若依古制三昭三穆之廟在太廟之前以次而南則今太廟都宫之南至承天門墻不甚遼逺即使盡闢其地以建羣廟亦恐勢不能容若欲小其規模不必别為門垣寢廡則又不合古禮况古人七廟九廟制度皆同太廟營構巳極𢎞壯而羣廟隤然卑隘恐非所以稱生前九廟之居也議者欲除太廟兩廡則非特不中典禮而裁損廟制事體尤重且諸王功臣之祀又將置之何所非臣等所敢聞也且臣等聞之廟者貌也所以形貌祖考而禮之明者也寢者寢也所以寢息祖考而妥之幽者也有廟無寢則神將安棲議者欲藏其主於夾室之中夫夾室者側室也所以藏祧廟之主也以親廟未毁之主而藏之夾室恐非禮也至謂周人廟制約儉宜摹倣而為之是又徒耳熟陳言而未嘗精於心計者也夫周廟門容大扄七箇闈門容小扄三箇則大門實容二丈一尺小門實容六尺其制度之𢎞且過於今烏在其為儉約也况臣等恭覩世廟之制葢損於太廟之數多矣今欲建立羣廟其規制髙廣又豈可損於世廟乎且太宗功業之盛比隆太祖而憲宗又我獻皇父也二廟規制視世廟尤不當有一毫降損而後可不然則聖心於此又有所大不安也今太廟之主自我太宗而下凡七聖兹欲各為立廟將依古制為三昭三穆而止立六廟乎將依商周之制以太宗為百世不遷之宗而加立七廟乎夫規制既不可降損而欲擬諸世廟森然並建七廟於太廟之南豈惟地小不足以容殆恐宸居左偏宫室太盛以隂陽家説未免有偏缺壓制之嫌此就地勢規制而言臣等所未敢輕議也臣等竊謂即使各廟既成陛下以一人之身冠冕佩玉執圭服衮循紆曲之途而欲一日之間徧厯羣廟為之興俯拜起升降尊獻雖有强力之容肅敬之心且將薾然疲􅓈非獨筋力有所不逮而日力亦有所不給矣議者乃引周禮宗伯代后獻之文謂羣廟之中可以遣官攝祭是又未嘗深惟禮意者葢古者宗廟之祭君后迭獻是以后不與祭則宗伯可以代獻謂同在一廟之中而代后之亞獻者言也未聞人臣可以代天子行事而遂主一廟之祭也且古者諸侯助祭多同姓之臣以之代攝猶之為可何也同一祖宗之子孫也今之陪祀執事者可以擬古諸侯之助祭者乎孔子曰吾不與祭如不祭是有故不得與祭而其心猶以為如不祭也况陛下之仁孝誠敬可以終嵗舉祭止對越太祖之廟而不一至羣廟乎且規制必備而成廟門垣堂廡寢室是也儀文必備而成禮陪臣樂舞之數是也今欲立為七廟或八廟之制則毎廟之中致祭之時皆當有樂舞之數陪祀之位而後可若曰降從簡易而垣寢不備樂舞不陳主祭不親則是本欲尊之而反卑本欲親之而反疎祇見貶損而未見所以為隆重矣先年大學士邱濬謂宜間一日祭一廟厯十四日而徧七廟此葢無所處而强為之説不自知其言之涉於迂濶此就禮節儀文而言臣等所未敢輕議者也臣等竊聞先儒馬端臨曰後世之失禮者豈獨廟制一事而廟制之説自漢以來諸儒講究非不詳明而卒不能復古制者以昭穆之位太拘故也必欲如古制立廟必繼世而有天下者皆父子相繼而後可若兄弟世及則其序紊矣周孝王以共王之弟懿王之叔繼懿王而立故晦菴廟圖宣王之世則以穆懿夷為昭共孝厲為穆夫穆王於世次昭也共王為穆王之子於世次穆也懿王為穆王之孫則繼穆王而為昭是也孝王為共王之弟而以繼共王為穆雖於世次不紊然以弟而據孫之廟也至夷王為懿王之子世次當穆而圖反居昭厲王為夷王之子世次當昭而圖反居穆則一孝王立而夷厲之昭穆遂至於易位於是晦菴亦無以處此不過即其繼立之先後以為昭穆而不能自守其初説矣又况宣王之世三昭三穆為六代則所祀合始於昭王今因孝王厠其間而其第六世祖昭王雖未當祧而已在三昭三穆之外則名雖為六廟而所祀止於五世矣然此所言者昭穆祧遷之紊亂不過一代而巳前乎周者為商商武丁之時所謂六廟者祖丁南庚陽甲盤庚小辛小乙是也然南庚者祖丁兄子陽甲盤庚小辛小乙又皆祖丁子也姑以祖丁為昭言之則南庚至小乙皆祖丁子屬俱當為穆是一昭五穆而祖丁所祀上不及曾祖未當祧而祧者四世矣後乎周者為唐唐懿宗之時所謂六廟者憲宗穆宗敬宗文宗武宗宣宗是也然穆宗宣宗皆憲宗之子敬宗文宗武宗又皆穆宗之子姑以憲宗為昭言之則穆宣為穆敬文武為昭是四昭二穆而懿宗所祀上不及髙祖未當祧而祧者三世矣葢至此不特昭穆之位偏枯而祧遷之法亦復紊亂若必欲祀及六世則武丁之時除太祖之外必創十廟懿宗之時除太祖之外必創九廟而後可且繼世嗣位者既不能必其為弟為子而創立宗廟之時亦安能預定後王之入廟者或穆多昭少如殷之時或昭多穆少如唐之時哉若必欲昭穆不紊則立廟之制必須屬乎昭者於太祖廟之左建之屬乎穆者於太祖廟之右建之方為合宜而預立六廟定乎三昭三穆以次遞遷之説不可行矣似反不如東都以來同堂異室共為一廟之混成也此則往哲之論足證今事就昭穆祧遷而言臣等所未敢輕議者也臣等仰惟陛下孝思純至天鑒髙明制禮作樂卓越前聖方且退託謙沖下咨廷議但臣等愚昧非不知古禮當復而事理有所難行惟是聖諭以為皇考獻皇帝有世廟以享祀太祖太宗以下列聖乃不得専有一廟以全其尊斯言也皇天列祖實鑒臨之天下後世可以仰見陛下純孝至誠大公至正之心矣但臣等愚見則以為列聖同享太廟巳極尊崇而皇考專居世廟猶為退遜若廟制大小不倫行祀親攝或異則尊卑厚薄之分反不足以稱陛下孝敬之誠恐又未免有遺恨矣臣等竊見今嵗孟春陛下更定特享之議正太祖南面之位以為太廟之始祖又為列聖各設帷幄祭俱南面各自奠獻讀祝臣等仰服陛下酌古凖今因時制宜儼乎各廟專祀之儀雖古人制禮精微之意亦不過如是而巳况向來恭聞陛下有諭輔臣御札云祀典宜正廟制難更大哉皇言實萬世之寳訓也今臣等復議九廟九間同為一堂雖有帷幄而無所間隔嫌於混同未稱專尊之敬請以木為黄屋儼如廟廷之制毎廟設一於殿之一間又設帷幄於其中太祖居中盡北太宗而下列聖依昭穆之序以次稍南位置如古建廟之制則太祖列聖各得以專其尊足以申陛下尊尊親親之情而於古禮亦庶幾矣臣等以為足以作則萬世而未可以為遷就權宜云也彼朱子所謂宋太祖僻處一隅與夫設祭一室甚或無地以容鼎俎者事體大有不侔陛下博觀前史固可考而知也但宗廟重事臣等愚昧未敢定擬伏乞聖明特賜裁斷嘉靖十年十一月二十四日具題十一年三月二十一日奉聖㫖郊廟大禮係國家重典朕於天地百神祀典俱巳釐正惟宗廟之禮尚襲同堂異室之制未能復古於心歉然朕嘗稽我聖祖開國之初巳曾建立四親廟實有鑒於漢制之非今具載大明集禮存心録祭祀禮儀朕為子孫所當遵行見今太廟前堂後寢俱有定制不必移其昭穆世數廟次你部裏便㑹同多官相度兩廡地方議處規制停當來説奏為分豁薦新疏羅玘臣等自履任以來謹奉本寺年例薦新品物遞年按月按品差官供薦戰戰兢兢毎懼後期有乖宵旰孝思之誠憑仗天威兼資成憲水陸無虞依時而至常免愆尤實為過望本年正月内據香橙園戸葛川關連名狀告内開各係應天府上元縣北城等鄉民洪武年間編充本寺薦新香橙園戸遞年九月分例該供薦八月末旬本寺差官賫送自初及今嵗復一嵗不期正德四年入冬以來氷雪異常香橙樹株盡行凍枯連根無存恐悮供薦欲吿准令夏末前往蘇松等府産有去處轉買本寺難便准信當差鋪排傅隆就園踏驗與告相同巳行准令自往轉買充薦至七月初十日續據稱到前項地方轉買其香橙樹株亦皆凍絶又欲告給批文前往江西浙江等處轉買臣等思得重大若拘常例不稍變通必致悮事遂一面具呈南京禮部知㑹一面給批著令往買至八月初六日各告仍復空回羣然悲號自旦至暮若不能生臣等聞之亦皆徬徨無措即欲依其情理奏請分豁其如初告之時止差鋪排一人踏驗其園戸俱係應天府上元縣人民橙園亦係該縣地方以驗到之人當土著之衆戸且無刑威又非管轄事亦朦朧安可為的况其告往轉買之地既云蘇松又謂浙江本寺雖給批文設或公然在家至期給批告官故為情狀幸准分豁在理容或有之且或前項果品於市井之時街坊市井猶有轉相買賣者則是本寺徒信下人一面不顧祖宗百年之法罪固難容心亦何忍為此隨將前項事理一一開具移關應天府轉行該縣查勘務不欺為的續准應天府關稱上元縣申據北城鄉里長總甲供稱香橙樹株委的凍枯盡絶葛川關等委的六月内前往蘇松等處及七月内執批前往江浙等處轉買空回重甘結狀等因備關到寺臣等看得去冬氷雪南京城内官寺民居園林樹木凍萎殊甚至於竹最堅勁耐寒亦皆枯絶况夫柑橙橘柚之柔脆宜煖者其先枯盡無從採薦宜也又况蘇松江浙地里聯屬氣脉不甚相逺非閩廣炎方之比其氷雪大抵皆然橙樹枯盡無從買薦亦宜也但臣等思之若係上供之物時有缺乏在陛下覆幬之仁固將憐而宥之而此實宗廟薦新之品又當聖孝格廟之晨是何敢覬覦陛下有所重輕於其間哉實惟臣等司薦之官誠意之未孚私心之多慝致傷和氣天降之罰而又依常襲舊不能先事蚤知預令葺葢編籬塞向墐戸多方以䕶之以致如斯是誰之過歟彼園丁下隷則至愚而無知者也又何預焉如䝉乞勅禮部議處止將臣等明示譴罰或寛斧鉞之誅明勅吏部按臣等官職之崇卑事權之正二在任之久近或原或降或削其官職與歸田里則臣等不勝感戴之至縁為薦新事理未敢擅便為此具本差協律郎王古𤣥齎奉謹具奏聞遵成憲以昭典禮疏唐冑臣惟自古帝王之興天必生佐命之臣以為之輔故君當大統既成之後必隆褒臣之典非但以報其功亦所以尊崇吾之德業以昭示萬方也我太祖髙皇帝南京功臣廟之建此開國之一大典今百六十九年矣天下至今無敢議及者近日武定侯郭勛無故將始祖郭英奏欲添祀以致該部請乞多官㑹議不敢據抑之者以稱伊祖與原祀徐達等功同一時但達等物故各當廟建之時而英獨以後死不與此可欺以方之言惑之也及都給事中邢如黙之奏巳明而我皇上慎重猶欲禮部看了來説豈以黙之論雖甚當而叙事或未詳也臣惟皇祖當開基洪武之二年正月乙已命立功臣廟於雞籠山六月丙寅甫成遂論功列祀凡二十一人命塑死者之像虚生者之位葢是時胡大海馮國用趙德勝耿再成丁德興俞通海張德勝茅成皆巳死先棲神於卞壼蔣子文等廟今復祀此所謂塑像者此也而徐達常遇春李文忠鄧愈湯和沐英華髙吴良吴禛曹良臣康茂才吴復孫興祖俱見在所謂虚位者此也是當論祀之時巳合生死者之功而定之矣勛何所據而敢為此言也哉及細讀勛奏稱英於洪武十七年論功開國受封至永樂改元始卒享祀非功有優劣實死有先後然後知勛乃不學少知之悮也葢洪武十六年雲南既平次年論功以大將潁川侯傅友德進封潁國公而於副將已侯之藍玉仇成王弼許爵其世論及偏禆謂陳桓胡海郭英張翼等兵興以來屢致勤勞今勲尤著於是各以都督僉事桓封普定侯海東川侯英武定侯翼鶴慶侯子孫世襲食禄各二千五百石葢廟之定祀至是巳十六年而英始侯其所論者乃雲南之功而勛悮以為開國也且大明一統志天下郡縣例書人物故鳳陽志英葢各以其地言彭韶尹直楊㢘所著皇明名臣錄俱不載英惟黄金開國功臣錄五百九十三人凡建功於國初者不論大小皆録而英亦與葢各以人言皇明祖訓首章議親條下開列三公二侯五家而英以皇妃王妃駙馬之貴其家亦與葢專以親言俱與廟祀無干而勛皆泛引以為證又惑也又太廟配享當廖永安未除之先凡有一十三人其巳死廖永安俞通海張德勝桑世傑耿再成胡大海趙德勝之七人於洪武二年正月丁未太廟之享巳躋在配至九年始加封號贈諡而徐達常遇春李文忠鄧愈湯和沐英等六王則各隨其卒之年進侑皆皇祖親定即古爾祖從享祭於大烝之義此之廟祀其典尤重英祀廟且不與而又欲望其配享豈不尤惑也哉夫英功累至侯爵非不大又以恭儉謙虚之德為世所仰而勛今日之祇奉眷顧以將順聖德之美亦為可重故尊祖而陷於不知其情雖輕而於我開國之大典所關則重况前代帝王之舉此者若西漢元功之十八位次東漢雲臺之三十二及唐凌煙二十四之圖畫烜赫宇宙厯其世代未有異議而欲參差之者至今照映青史而我聖祖之享祀則以血食寓褒揚其報尤重故其品尤精如六王元勲配享廟祀兩聮上俎其配享王以下今向六人俞通海張德勝桑世傑耿再成胡大海趙德勝皆取於死事而當時茅成亦死事者惟與廟祀而不得配享廟祀六王以下十五人以多功於五百九十三人之中僅取馮國用丁德興華髙吴良吴禛康茂才吴復曹良臣孫興祖九人以節功雖今配享九人之中惟胡大海趙德勝耿再成俞通海張德勝得與廟祀桑世傑雖在配享而不得兼廟祀其神化之妙非口舌筆墨所能盡者故今位列差次之間尚不可輕以移易况有無之額敢得而增損乎使勛而知此縱英侯功先於開國亦當俯首歛避况後以南征而敢啓口也哉伏願皇上於英之配享廟祀且寢其議使在天之靈慰聖祖當日之心額序之席悦諸臣素聚之魂而英平生謙讓之精爽安食家廟於百世不致忸怩於非儗之旁則勛知孝而不知學之誤亦可洗雪以全終臣節而國朝之大典崇隆於聖明之世而為史籍萬萬年無疆之光矣臣以事干祖宗成憲故敢罄衷披瀝冒瀆天威不勝戰慄待罪之至伏望聖恩俯賜監納則輿情允協禮樂昭明神人胥服矣奉聖㫖該衙門知道名臣經濟録巻二十八
