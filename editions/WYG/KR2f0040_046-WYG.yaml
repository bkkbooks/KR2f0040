body:
  text: 名臣經濟錄卷四十六明黄訓編刑部論奏論韓國公冤事代虞部郎中王國用作解縉臣聞君親無將春秋誅意臣子事嫌於不軌固天下之所共誅幽明之所同憤者也然於事嫌不軌之中辨析㡬微之際此禍㡬之所不測骨肉之所難言者惟明主能察焉竊見太師李善長與陛下同一心出萬死以得天下為勲臣第一生封公死封王男尚公主親戚皆被寵榮人臣之分極矣志願亦已足矣天下之富貴無以復加矣若謂其自圖不軌尚未可知而今謂其欲佐胡惟庸者揆之事理大謬不然矣人情之愛其子必甚於愛其兄弟之子安享萬全之富貴者豈肯僥倖萬一之富貴哉雖至病狂亦不為矣善長於胡惟庸則姪之親耳於陛下則子之親也豈肯舍其子而從其姪使善長佐胡惟庸成事亦不過勳臣第一而已矣太師國公封王而已矣尚主納妃而已矣豈復有加於今日之富貴者乎且善長豈不知天下之不可倖求取天下之百戰而艱危也哉當元之季欲為此者何限莫不身為虀粉覆宗絶世能保首領者幾人哉此善長之所熟見也且人之年邁摧頺精神志慮鼔舞倦矣偷安茍容則善長有之曾謂有血氣之强暴感動其中也哉又其子事陛下託骨肉至親無纖芥之嫌何得忽有深讎急變大不得已之謀哉凡為此者必有深讎急變大不得已而後父子之間或至相挾以求脫禍圖全耳未有平居晏然都無形跡而忽起此謀者也此理之所必無也若謂天象吿變大臣當災則殺人以應天象夫豈上天之欲哉今不幸以失刑而臣懇惻為明之猶願陛下作戒於將來也天下孰不曰功如李善長又何如哉臣恐四方之解體也且臣至疎賤非不知言出而禍必隨之然恥立於聖明之朝而無一諫諍之士始者側聽私室引耳朝端意謂羣臣豈無忠智左右近侍必有為陛下言者公卿大臣必有爲陛下言者臺諫御史必有為陛下言者而事枉寃延今未己羣臣杜口竟無一人為陛下言之者臣所以忘其疎賤冀陛下萬一感悟臣甘就鼎鑊無所復恨矣考校錢糧封事鄭士利前月九日欽遇陛下渙發徳音廣開言路此二帝三王之盛舉也側聞邇來中外臣民大有所陳惟考校錢糧事未有言者意者當陛下赫怒之餘故人容容各自重耶不然何其宜言而不言也臣草野布衣聞見淺近政事之得失生民之利病臣焉能知惟考校錢糧得聞一二諺所謂耳聞不如目見向非臣兄士原為先任懐慶府同知考校錢糧事斷發工役臣亦蓋不知也自詔書之下臣欲言之久矣特以臣兄之故恐陛下以臣為假公營私者不敢言欲進復退者累一月既竊自念以為當陛下求言之急豈惡直言之士若乃畏首畏尾避嫌遠疑是忠臣義士之心不白於天下也輒不自揆故僭言之亦不自量已昔有野人食芹而美者則欲以獻於其君區區愚衷正與此𩔖陛下幸垂察焉夫考校錢糧用使空印自昔已然非至聖代而然也陛下即位已九年矣詔條之内不見禁革而律令之内所不該載上下成習以為當然天下之人咸知之惟陛下未之知耳一旦生事之人摭拾此事致使忠良老成咸被其害臣愚請試言其故夫考校錢糧各府齎將文卷越行省攢造千百巻宗攢於一冊牽查照算豈無錯誤故曰寸寸而度之至丈必繆銖銖而數之至石必差是以必須空印無弊也向使有司官吏欲偷盜􅃚移埋沒作弊當預於本處文卷補完然後赴省部攢造豈不藏鋒斂鍔便且易邪又何必欲空印旋補而旋生弊也又況出納錢糧各州府非奉省部不敢専擅一絲一毫之出入其原皆出於省部故省部卷中所有府州文卷不能損也府州文巻所無省部卷中不能益也若網在綱有條而不紊特散漫於各卷未之歸一查照攢造之間不能無誤空紙所以為誤差錯之設無弊也且各省府至戸部里路逺者半年餘近者亦不下半月偶有差錯理須扣換填補若待復至本處衙門用使印信即非旬日可及省部置局督併攢造有如星火若爾展轉迂迴豈不大誤事邪是以必須空印無弊也今行移文書除張縫中印信外後面必有年月年月之傍必有註語然後官吏僉押於年月註語之間用使印信今考校文冊下面張縫印信雖多而後面年月之旁註語已定又止一印信向使掾典欲假此空印行移文書潛謀不軌下而張縫固有印信可徵而後面年月即無印信又無封皮不知復可作何行移而何處不曉法律舖兵便與承接遞送而何等庸愚官吏輒便憑信與之施行空印之不可以行移遞送而明矣臣竊迹前世興亡之故大抵親賢臣逺小人以興而親小人逺賢臣以敗未嘗以空印也空印之不能為國家患益明矣陛下以天縱之資日月之明豈不燭此情理然而盛怒未解者意者左右之臣未嘗以此言進歟臣愚竊以為考校官吏止可坐之以不勤之罪而不當坐之以重罪也況所犯在律令頒行之先乎空印既不可以行移文書又不可以􅃚移作弊免死杖一百工役終身前此復有充軍者假使偷盜􅃚移潛謀不軌不審陛下復加之何罪陛下必欲禁革空印不過罪一二人下半紙詔書明諭天下使天下後世之人知懼而不敢犯足矣何必牽枝引蔓罪及各省府邪夫人才之難自古為然十年長養十年教訓十年歴練至於四十血氣既定見識已明然後適用故曰人惟求舊今内而尚書外而叅政等官尤所謂國之重臣功能俱茂者也自非聖人不能無過縱有罪過臣猶謂得與八議之科今乃俱為考校錢糧有不保首領復追俸者有斷發工役改發充軍者中外老成蕩然一空並使晚進後生布列中外未審孰為陛下畫此䇿也使彼在任之内所言所行果皆考校錢糧事邪抑亦有忠國愛民之事也如果俱係考校錢糧固為得罪若亦有一斑半點為國為民亦可絶長補短以功掩過三年之俸亦不足為國重輕也而追之是導天下之人而為貪汚也奚補哉其犯賍私者工役而用使空印者亦工役復終身焉彼富裕者固不復憂而此貧乏者則受苦楚其平日賍私者至此自為得計臣竊恐自是之後廉謹者愈無所勸矣昔秦穆公赦食馬之徒厥後猶得其死力考校官吏非岐下野人比也陛下幸赦之又豈特得其死力而已哉古人有言曰人之有言不得已也臣兄已斷發工役固不敢辭而甘心輸作以贖罪矣臣復勤勤懇懇不避鈇鉞為陛下言者非不知觸忤天顏罪在不赦顧以朝廷大體當務從平恕不宜持法過當有累聖明盛德蓋亦不得已言耳固非為臣兄一人之計而言也言詞粗鄙不能囘護陛下倘以臣為草野疎愚不識朝廷忌諱恕其狂瞽而納用其言又豈特考校官吏感恩無窮天下之士必皆鼔舞懽忻而樂於仕進矣謹於中書省投進以聞干冒宸嚴無任戰慄屏營之至訟劉槩罪狀王恕竊見刑部河南清吏司問得犯人劉槩合比依造妖言者律斬秋後處決湯鼐依風憲官受財加其餘官受財不枉法有祿人一百二十貫二等罪止律減等杖一百徒三年吉人依奏事詐不以實者律減等杖九十徒二年半李文祥鄒智俱依不應得為而為之事理重者律減等杖七十俱職官各照例運磚各完日湯鼐係有賍官革職為民吉人李文祥鄒智俱浮躁淺露人數送吏部收查定奪東思誠曹璘俱供明各還職大理寺審擬合律奏奉聖㫖這厮每既情犯深重劉槩揑造非言依律處決湯鼐風憲犯贓押發陜西肅州衞充軍吉人肆奸欺罔發囘原籍為民李文祥鄒智私交妄議降三級調邊任都免運磚其餘准擬欽此欽遵抄招用手本連李文祥等送本部施行等因除湯鼐李文祥等罪不至死臣不敢妄議外但劉槩比依前律坐以斬罪臣則不能無疑焉伏覩大明律云凡造讖緯妖書妖言及傳用惑衆者皆斬欽此先儒謂讖緯如亡秦者胡之讖及赤伏符等及諸經之緯書蓋讖緯之書即妖書讖緯之言即妖言以其說未來之興亡能惑衆亂民壞國家之事故禁之嚴使之不敢犯也今劉㮣招稱不合要得阿䛕湯鼐又揑寫一夢書内稱別後時夢中會見一夕夢一老人騎牛背上行陷於泥淖中公左手把一五色石子右手捉牛角引就正路其人謝而去因思人騎牛背儼然一朱字正我朝之姓氏豈非天生豪傑欲賴之引君當道邪但五色石子意不可曉或者公自臺中首先抗疏為彈之第一等邪請試思之如何等情臣切詳劉槩書詞固為狂妄不能無罪其夢有無亦未可知推原其情不過因見湯鼐節次建言指陳得失不計利害以為天生豪傑以道事陛下也是乃與人為善之意別無惑衆亂民之情今比依造妖言者律論以死罪臣竊以為過矣設有造如亡秦者胡也之𩔖之言惑衆亂民者不知更以何罪加之昔之時有以忠諫者為誹謗深計者為妖言至今人為之痛惜陛下受天明命正位宸極以堯舜之道治天下天下愛戴之如堯舜矣今法司以如此之情坐劉槩以妖言死罪不無有累陛下清明之政欲使天下後世不為之痛惜恐不可得也且一婦含冤三年不雨今各處災異人情洶洶此正朝廷欽䘏刑獄求言脩省以囘天意以弭災變以安人心之時若使劉槩緣此死於獄中豈不愈傷天地之和愈召水旱之災而臣忝在六卿之列知而不言則違先聖事君有犯無隠之戒其罪將安逃乎是以不避鈇鉞為陛下言之倘蒙聖明裁察寛宥劉槩死罪將見天下後世莫不稱頌皇上矜恤之仁豈不召和致祥衍慶延祚於無窮也𢎞治二年四月初三日具奏奉聖旨劉槩造妖引喻非𩔖法司比律問擬未為不當你如何這等來說且監著待後發落刑部知道欽此論不可内外異法奏狀王恕臣竊聞古人有言國無賞罰雖堯舜不能為治臣謂賞罰不當與無賞罰同何以勸善懲惡服天下心天下不心服則萬事瓦解雖有智者不能善其後矣諸葛武侯有見於此故告後主有曰宮中府中俱為一體陟罰臧否不宜異同若有作奸犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使内外異法也斯言也實公天下之格言服人心之要道也雖為後主吿實所以為萬世人主吿也臣伏覩昨者發落南京御史姜綰等聖旨似與武侯之言不同大駭物情誠恐天下聞之謂今聖明之時内外異法豈不有傷陛下平明之治乎臣實不忍敢不昧死言之且姜綰等與太監蔣琮交相訐奏互有虚實姜綰等既降調其職侍郎黄孔昭等被其連累亦各罰俸三箇月豈宜獨宥蔣琮之罪而不為之處置乎夫為此一人遂廢天下之公論壞國家之政體豈陛下之本心蓋未之思耳臣荷聖恩起於既退之餘加以一品之職非徒富貴之也蓋欲朝夕納誨匡輔至治臣知此事未宜而不言是不忠也倘異日陛下自覺其非豈不以不忠責臣乎縱使陛下終不覺悟臣亦安忍坐視乎昔子思言於衞侯曰君之國事將日非矣君出言自以為是而卿大夫莫敢矯其非卿大夫出言自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生由是言之是君不可以不聽言臣不可以不進言也臣伏願陛下追還前㫖另行裁處務合公論使彼此心服天下無得而議將見盛德大業可以與天地相為悠久矣若以臣言為狂妄而不之省乞將臣罷歸田里以為多言者之戒臣干冒天威不勝戰慄待罪之至具題𢎞治三年正月二十五日奉聖旨這事已發落了罷欽此再論不可内外異法奏狀王恕臣昨發落太監蔣琮及南京御史姜綰等聖旨以為蔣琮姜綰等俱是有罪人犯姜綰等降調外任侍郎黄孔昭等被其連累亦皆罰俸蔣琮獨蒙恩宥又不為之處置人皆不平是以昧死上言欲望陛下追還前旨另為裁處以昭公道以服人心且免天下後世内外異法之議是臣惓惓為國之心非敢徇情妄言以惑聖聽自取誅殛之罪伏奉聖旨這事已發落了罷欽此臣惟人之大倫有二君臣也父子也傳曰事君有犯而無隠事親有隠而無犯此言事君事親諌諍之道不同也又曰事父母㡬諫見志不從又敬不違勞而不怨此言為子者當諫於父母也又曰君子之事上也進思盡忠退思補過將順其美匡救其惡此言為臣者當諫於君也臣讀聖賢書所學者忠君孝親之道也今臣已老矣親已去世矣雖欲孝誰為孝幸有聖天子在上且又身居臣隣之地匡輔諫諍是其職也是以於政治闕失知無不言言無不盡期於補其缺成其美以圖萬一之報而已若陛下曰可臣亦曰可陛下曰否臣亦曰否則非陛下起臣之意亦非臣之志也然而此事雖小關係治體甚大設未得其當雖十易之不為過要於其當而後已若發落了不可易古之所謂從諫如流者所從者豈皆未發落事乎漢文帝欲重犯蹕之罪張釋之曰當罰金欲族盜髙廟器者張釋之曰當棄市文帝雖發怒終從其言未嘗以不合已意而不從也伏願陛下昭日月之明察芻蕘之言𢎞天地之量赦狂瞽之罪乞將前事再加櫽括別作處置使内外無分彼此而人心服治體不至虧損而朝廷尊矣臣不勝至願𢎞治三年正月二十八日具題次日奉聖旨朕意以蔣琮守備重任不宜輕動如何又這等來說不准再不許來奏擾該衙門知道欽此奏正法守疏林俊四川清吏司案呈嘉靖二年閏四月十六日該校尉陳賢齎捧駕帖該太監崔文題為分豁妄捏虚詞陷害良善代伸私忿事奉欽依是陳泰曹浩宋鈺張奉宋鐸李陽鳳梁方小陶兒錦衣衞都拏送鎮撫司打著問的明白來說欽此欽遵案查為漏網餘黨挾讎撥置内臣毆打公差人役事奉本部送准工部咨據作頭宋鈺吿稱差委城垣工所跟隨委官六員外看工計料有管工崔太監名下被革投充軍匠李陽鳳梁方時常向鈺言說要科斂舖户人等財物不遂計稟崔太監差寫字小陶兒督令軍牢捉至工所喝令重責二十五棍以致内損傷重吐血不止等情吿送到部咨送到司已經行提李陽鳳梁方等到官小陶兒張奉未到續為修濬城壕等事准工部都水清吏司手本帖送刑科抄出巡視南城監察御史劉黼題據牌兒頭陳泰等呈稱自嘉靖元年五月十一日至今年閏四月每日撥夫十名每夫貼好錢五十文交與夫頭曹浩供稱崔太監分付五城毎日撥夫十名每辦錢五十文打點管家及掌案李陽鳳梁方等等因題奉聖旨該衙門知道欽此欽遵抄出粘送到司查究間今奉前因見得前項人犯未經審問有礙職守呈乞施行等因通查案呈到部看得該司呈稱作頭宋鈺所告及巡城御史劉黼所叅李陽鳳等撥置科斂等情事亦頗小忽聞奉㫖取付鎮撫司打問臣等不勝驚駭切惟祖宗設立刑部都察院大理寺謂之三法司凡大小罪犯無不由之錦衣衞謂之親軍所以貞伺機密糾察奸細鎮撫鞫訊大盜妖言洪武二十年我太祖以鎮撫司非法淩虐燒其刑具以所繫囚送刑部洪武二十六年申明鞫刑之禁凡罪囚俱送法司永樂以後任遇漸加而職事仍舊見之大明會典者如此列聖相承恪遵無易正徳年間劉瑾錢寧等相繼擅權凡意中愛惡輒奪付鎮撫文致成獄以遂其奸而祖宗之法大壞劇盜四起巨逆繼作皆陛下所習聞而痛惡者天啓我皇入正大統撥亂世而反之正先朝之牢奸錮弊一舉而剪除之天下方仰中興之治不意忽有此未思之舉豈崔文有所膚愬或手假以濟其私夫法本大公罪必居一使宋鈺所告崔文等涉虚自有反坐之律所告崔文等果實亦有必當之條此祖宗成法在陛下亦有所不得私者況臣等微末之臣邪今不待法司問結而輒付鎮撫是固臣等奉職無狀祗可治臣等之罪而未可廢祖宗之法況今風霾雨土赤日無光夫土下物也土而上之此下蒙上之徵日君象也日而掩之此臣蔽君之應天災之示戒甚明正上下内外省身脩德之日今小事尚爾有拂於天萬一有大於是將何如邪誠恐將來之變有不可測者伏望皇上念祖宗之法畏上天之戒收囘成命仍將李陽鳳等付法司從公究問歸結將臣等褫職罷歸田畝以為法官失職之戒緣係正法守懲不職以杜厲階事理謹具奏聞閏四月十六日進十九日奉聖㫖宋鈺李陽鳳等還送鎮撫司問正法守再疏林俊該本部奏前事奉聖㫖宋鈺李陽鳳等還送鎮撫司問臣等聞命惶惑罔知適中奉詔則廢法守法則違詔懸命利刃無復存身之地然伏而思法者祖宗所以布大信於天下而詔㫖者陛下一時之權宜也奉詔少緩罪止臣等一身若守法少移則負祖宗負朝廷得罪於天下後世矣是故臣等寧冒違詔之誅不敢廢祖宗之法以從陛下之命抑君曰辟臣曰勿辟君曰宥臣曰勿宥古固有行者矣漢張釋之為廷尉渭橋犯蹕奏當罰金文帝怒曰此人親驚吾馬廷尉乃當之罰金釋之曰法者天下公共也而重之是法不信於民民安所措手足乎帝曰廷尉當是也唐戴冑為大理少卿選人詐冒資䕃太宗令論死冑據法論流太宗怒曰卿欲守法而使朕失信邪對曰陛下忿選人之多詐故欲殺之既而知其不可復斷之以法此乃忍小忿而存大信也太宗曰汝能守法朕復何憂夫釋之戴冑能執法不阿文帝太宗能從善不咈故漢廷無寃民而貞觀之治幾致刑措國史載為美事陛下勵精圖治方比隆堯舜舍巳從人之盛而咈心之受豈顧出文帝太宗下邪爰自正徳以來權奸扇惑獄以賂興雖元惡大憝一欲出入即奪諸法司下之詔獄比之為奸祖宗成法為之大壊人怨天怒宗社幾危非陛下立乾斷以綱紀於上輔臣出死力以擔荷於下豈有今日者哉不意又有奪取刑部見問之囚付之鎮撫司以為解脫之計恐此途一開後有重大獄情皆得扳求内降以圖倖免誤陛下事不細而亂階再作自臣始矣伏願陛下恪守成法收囘成命將李陽鳳等仍付本部或都察院從公問結將臣等罷歸田里以為法守不謹者之戒緣係正法守懲不職以杜厲階事理謹具奏聞嘉靖二年閏四月十九日進二十一日奉聖旨宋鈺等只照前旨拏送鎮撫司問林俊等顯是違旨著囘將話來乞恩囘話疏林俊本部具奏為正法守懲不職以杜厲階事奉聖㫖宋鈺等只照前旨拏送鎮撫司問林俊等顯是違旨著囘將話來欽此欽遵臣等聞命錯愕無地措躬竊惟我祖宗分建諸司各有職綂刑獄歸之法司罪無大小無不由之鎮撫司緝獲大盜奸細訊鞫既得其情擬罪必付之法司未有奪取法司未問之囚而付之推問者此我祖宗百五十餘年成法也一旦崔文以脫罪之私敢干内降駕帖取自刑部而付之鎮撫綱紀大紊臣等伏思人臣以奉公守法為職以犯顔敢諫為忠唐徳宗相裴延齡陽城欲取白麻毁之唐文宗詔左藏史盜度支縑帛徑赦勿治狄兼謨繳還詞頭自古人臣忠愛其君者往往如是臣等竊慕古人思報國恩誠不忍見漏奸之崔文蠱惑希寵嫁左道以興齋醮蕩上心耗内財扇邪俗濁亂我嘉靖清明之治言官交劾玩視若無顧敢沮滅成法此途一開禍亂何極臣等深為此懼申論祖宗大法之不可廢而人愚言突力欲囘天跡若違㫖罪當萬死伏望聖明將臣等罷歸田里該司主事熊宇為因郎中員外俱差無官署印暫令列名無預可否乞賜寬宥其李陽鳳等似宜改付都察院究問以正事體以公聖政臣等無任恐懼感泣願幸之至緣係乞恩囘話認罪事理謹具奏聞伏候勑旨嘉靖二年閏四月二十二日進二十五日奉聖旨李陽鳳等只著鎮撫司從公究問林俊等都饒這遭欽此題謹聖治疏林俊巡按直隷監察御史馬錄題稱問得張龍犯該諸衙門官若與近侍人員互相交結漏泄事情夤緣作弊而符同奏啟者律斬秋後處決妻子流二千里安置緣犯在革前奏請定奪叅照張龍罪雖遇革緣人品卑汚不顧廉恥交結權奸中傷善𩔖情犯可惡若照常發落無以警戒將來伏乞聖裁合無將張龍從重發落惟復別有定奪等因具奏奉聖旨法司知道欽此欽遵抄出送部看得巡按直隷監察御史馬錄題稱問過犯人張龍犯該諸衙門官與近侍人員互相交結漏泄事情夤緣作弊符同奏啓斬罪犯在革前及叅本犯交結權奸中傷善𩔖乞要從重發落一節為照張龍先任給事中選陞通政司叅議已為朝論不容被劾降灤州同知後夤緣内侍歴陞府同知知府又結錢寧陞右通政節經科道糾劾倚錢寧等為心腹力為營救恣情班行略無愧容指倚錢寧名目誆騙王通銀一千一百兩徐漢興銀五百兩金一百兩金寶絛環鉤帶等項其私與過銀又不知其數所據本犯奔競朋黨夤緣轉官黷貨稔奸變亂成法罪不止於亂政若依擬革免委涉輕縱合無將本犯改擬比依在朝官員交結朋黨紊亂朝政律斬秋後處決仍咨都察院轉行直隷監察御史監候審決庶王法無私巨奸知畏等因奏奉聖㫖是張龍依擬處決欽此覆辨明寃抑疏林俊題為辨明奸黨讎陷舉家性命寃抑無伸懇乞天恩比例發遣充軍分釋情罪存憐殘生等事該見監犯人廖鵬齊佐王瓛各具本奏辨俱奉聖㫖法司看了來說欽此欽遵通抄到部案查先該本部等衙門會問得廖鵬齊佐王瓛俱犯該在朝官員交結朋黨紊亂朝政斬罪秋後處決妻子為奴財産入官節奉聖㫖是廖鵬等三名各依律處決欽此監候處決間今奉前因看得見監朋黨亂政斬罪犯人廖鵬等各因勑諭差官錄囚奏要比例寬宥發遣一節為照廖鵬齊佐王瓛與已處決錢寧納賄招權朋交黨惡罪貫已盈人神共憤而廖鵬出入諸兄流毒兩省尤為首惡元兇先該多官會問明白節次會審情真科道等官𩔖奏處決即今未正典刑已為下咈人心上干天變各犯乃敢飾詞奏辨冀圖幸免該科各行叅論誠為有見臣等伏覩勑諭内開屢審情真者法難宥免及節該奉明旨不當宥而宥皆足致災欽此欽遵所據廖鵬齊佐王瓛法無可生天醜其惡俱節審情真不當宥人數合無行令該司牢固監候處決緣節奉欽依法司看了來說事理覆奏奉聖㫖是各照前㫖依律牢固監候欽此題侵欺錢糧事林俊嘉靖元年十月管牛房尚膳監左少監賈全奉御王太安郭文王川長隨段仲張仲堂姜輔閻川内使任信等侵盜喂養牛隻料豆三十九石倉官徐鈞失於覺察該本部浙江司問擬賈全等俱雜犯斬罪徐鈞減等杖罪具奏送審奉聖㫖是賈全送司禮監奏請發落徐鈞等送大理寺審了來說欽此欽遵抄出送司案呈到部看得刑部大理寺皆古刑官虞謂之士師周謂之司冦我太祖慎重刑獄鞫於刑部而讞於大理然後吿成於天子而聽之此成法也近者内侍有犯多付司禮監似無刑部也今付刑部又即付司禮又似無大理也竊意終非祖宗成法伏望聖明將賈全等仍同徐鈞等送大理寺審錄然後付之司禮庶㡬成法具存為聖子神孫萬世不易定守臣等不勝願幸緣係奉欽依是賈全等送司禮監奏請發落徐鈞等送大理寺審了來說事理嘉靖元年十月十五日具題十八日奉聖㫖卿等說的是賈全已發落了欽此名臣經濟錄卷四十六
