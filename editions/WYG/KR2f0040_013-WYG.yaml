body:
  text: 名臣經濟録卷十三明黄訓編内閣題緝熈聖學事薛瑄切見近日有臣下進言欲開經筵以緝熈聖學者雖䝉聖德允納未見施行盖欲俟軍旅事平之日以開講也臣愚以爲當聖主中興之時天歩惟艱之日正講論爲學爲治之道不可一日而緩焉者也昔漢光武躬擐甲胄討除羣兇猶且投戈講藝息馬論道軍旅之間未嘗一日廢學故能舉羣盗如鴻毛復大業如反掌唐太宗興義兵掃除㓂亂一時潛邸從龍之人皆文學智謀之士日久相與論爲學致治之道乙夜之覽身忘其倦故能剗削僭僞拯濟生民此講學所以有資於戡大難也近者漠北敵人雖陸梁爲㓂而内外禦侮各有其人堂堂天下號令一施風行草偃非至如漢唐草昧之秋也顧可以斯時而少緩講學之事乎伏望皇上命廷臣集議經筵儀式務從簡約不尚奢蕐仍愽選公卿侍從文學之臣有學術純正持已端方謀深慮逺才識超卓通達古今明練治體者一二十人使之更代入直恭遇皇上視朝之暇日御便殿即召各臣進講其所講之書先大學論語孟子中庸兼講尚書春秋諸史則資治通鑑綱目務要詳細陳說聖賢修己治人之要懇切開告帝王端心岀治之方以至唐虞三代漢唐宋以來人君行何道而天下治安爲何事而天下乖亂與夫賞善罰惡之典任賢去邪之道莫不畢陳於前如此則勸講之官庻可日修其職講官之職既修雖皇上聦明之資實由於天錫而朝夕緝熈啓沃之力亦有益於聖心聖德日明於以修治道則正心以正朝廷正朝廷以正百官正百官以正萬民而治道有修明之效於以攘夷狄則修軍政以簡將帥以練士卒練士卒以討夷狄而夷狄有殄㓕之期此講學有資於成大功戡大難宜急行之而不宜緩焉者也且光武唐太宗一時英主耳猶能勤講學於搶攘之時以收戡靖之績伏惟皇上有唐堯虞舜之盛德將以成中興殷周之大功誠於此時舉行開講之事以緝熈聖學則神功聖德髙出千古矣又豈漢唐二主之可比哉臣猥以衰邁懦柔之資章句迂僻之學自忝科第屢叨法從昔嘗獲罪先朝放歸田里分將終老丘園瞑目溝壑幸沐皇上龍飛九五運啓昌期將以立莫大之治功故不遺草茒之賤士援臣布衣之中授以清要之職日夜思慮愧無補報故敢昧死妄陳前言伏望皇上開天日之光采而行之不勝懇悃之至正學𩔖編李賢行狀録程敏政英宗復位一時輔臣多竄殛遂以人望召公兼翰林學士入内閣典機務未幾進吏部尚書兼官如故山東奏民饑雖得内帑銀三萬而不足上復召有貞及公議有貞持不可曰散銀有弊無益饑者公言天下事未嘗無弊顧奉行何如耳散銀有弊而不賑貸是視民饑死而不拯也因噎廢食豈爲人上之理上深以爲然命增銀四萬兩民頼全活甚衆時太監曹吉祥忠國公石亨以迎上復辟爲已功竊弄威福上漸不能堪乃宻語有貞及公宜恊心輔朕公自念遭遇不偶凡事一以至公處之時崇仁處士呉與弼以薦䀻至京上喜其來問公曰與弼當授何官公曰與弼老儒必能成就君德授春坊諭德專輔青宫爲宜與弼固辭恩命不受乞歸田里公復請狥其志以勵士節上思建庻人幽大内六十年欲赦之左右多以爲不可召問公公曰陛下此一念太祖在天之靈實臨之堯舜存心不過如此上意遂决遣中官衛送居鳯陽岀入自便初石亨以文臣總軍務於邉使武臣不得逞因請罷之居無何邉徼騷然上悟其非命公舉可任廵撫者盖都御史李秉芮釗白圭王宇陳翠皆公所薦一時號稱得人景㤗間三年一度僧數萬是歲如期來集公言於上曰此軰有損無益宜後十年一度爲著令初上於便殿屏人謂公曰吉祥好預國政聞四方奏事者必先造其門奈何公曰自古人主權不可下移若陛下每事自斷惟公道處之則彼不敢預而趨附之人亦自少矣上曰朕意亦然㑹石亨敗家居其從子定逺侯彪岀鎮大同諷大同人薦已上㢘其詐幷逮亨置於法因問公迎復事公曰當時亦有要臣者臣不敢從上怪問何公曰天位乃陛下所固有若景㤗不起羣臣表請復位名正言順何至以奪門爲功奪之一字何以示後此軰實貪富貴非爲社稷計倘景㤗先覺亨等何足惜不審陛下何以自解幸而事成得以貪天之功然天下人心所以歸向陛下者以正統十數年間凢事減省與民休息所致今爲此軰損大半矣上竦然大悟詔凡以迎駕奪門冒功陞者四千人悉褫職中外肅然盖非公忘身狥國不避仇怨莫敢發者公以朝覲官黜陟之典徃徃應故事無以示懲勸言於上罷不職者數百人旌異者十人賜宴禮部上命公與尚書鹽山王公主之吉祥從子昭武伯欽殺人事覺御史劾之上雖見原而下詔戒諭勲舊之臣欽益懼與吉祥養死士謀不軌幽上於南宫而立皇太子因西師行乘機入内爲亂朝臣當道或有憾者􅆷害之擊公傷首及耳且持公謂曰某等廹於䜛間不得已爲此請入䟽以申救公曰爾既殺仇償怨能止戈反正我當言之上得疏乃知公在甚喜既脫於難上急召公入公手疏曰逆賊就擒此非小變宜詔天下一切不急之務悉皆停罷且言自古治朝未有不開言路者惟權奸欲塞之以遂其非由是䧟於大惡而不悟自石亨等排黜䑓臣言路閉塞其流遂至此極上悉報可下寛恤十餘條而以開言路殿焉癸未春上以足疾不視朝召公曰大祀將至而疾未愈欲遣官代行可乎公曰亦須至壇所雖不能行禮人心亦安上至齋宫復召公曰朕惟俯伏難於起身欲令一人扶之何如公曰陛下能力疾行禮尤見敬天之誠遂成事而還二月晦夜公聞空中有聲明日宻疏曰傳言無形有聲謂之鼓妖上不恤民則有此異惟陛下憫念黎元凢一切不便於民者悉皆停罷則天變可彌上覧之即召公曰此事正湏先生言先生不言誰復言者其具寛恤事條宻封以來公遂疏十事一清淹禁罪人二止銀場煎辦三停歳造紙劄四蠲被災糧稅五弛芻粟之徴六罷虧損馬疋七飭邉臣撫恤兵民八命有司存恤流移九戒御史紏察貪吏十禁外官因事科歛上曰朕諦觀之皆實惠也宜即詔天下公又請罷江南所造段疋及燒磁器清錦衣衛所監罪人止各邉守臣進貢已下畨所遣使臣停内外買辦采辦上不從公執之數四止取前十條行之左右見公力諍皆寒心同列亦爲公懼公曰古之大臣知無不言今雖不能盡然至於利害係國家安危者豈可黙黙以苟禄位然上聖明亦不以爲忤也上以母后胡氏因疾請閒尊號静慈仙師非令典欲上皇后尊諡而左右以爲不便一日召問公公曰陛下此一念天地鬼神實臨之然臣之愚必須以陵寢享殿神主皆如奉先殿之式庻幾稱陛下之明孝不然爲虚文上即命舉行甲申春正月上不豫久之疾劇命中官以遺詔示公十七日上賔後五日命上嗣位有欲致隆於上生母者公曰天子新即位四海顒望凡事宜悉遵遺詔庻幾順天理服人心脫或不然則當尊母妃爲太后於皇后爲太后上加二字以别之卒如公議尊皇后爲慈懿皇太后貴妃爲皇太后進公少保吏部尚書兼蕐盖殿大學士時災異屢見公請出宫人以昭聖德有内直將軍愬天順初因入直迎駕而陞非冒功者今一切褫職非法意上念其久於役特復之以迎駕奪門陞者紛然不已公言於上曰自石亨軰此舉之後人以得富貴之易貪利者惟幸有事宜早治之且請復少保于公謙等官賜祭改葬以雪幽枉上亟是公言命兵部按其以迎駕奪門陞者自太平侯張瑾興濟伯楊宗以下俱奪爵盖公欲消患於未萌故於上即位極言之由是洶洶者衰息有識者至今以為難公少即有志聖賢之學為諸生時提學者問所志對曰為學之道當如周子言藴之為德行行之為事業其人大異之在吏曹遍書箴銘於座右及故學士薛公瑄交厚善務以性學相切劘而窮理之功益宻故言益純行益充立朝四十年不立黨與惟守一誠盖不知者始或疑而終大服之無異議自以受知英宗遂身任天下之重知無不言言無不力天下亦倚公為重雖遭䜛罹毁處之㤗然登對之際氣象雍容言辭簡當將順匡救之力甚多英宗嘗論景㤗不與大臣接言公曰自古明君未嘗一日不與大臣商確治道所以天下常安先儒謂接賢士大夫之時多親宦官宫妾之時少於君德方有益又言朕自復位以來未嘗一日忘在南城時每以此戒左右公曰安樂不忘患難古昔聖賢之君存心正如此又以戒左右最善又言飲食隨宜曾不揀擇衣服亦隨宜雖著布衣人不以為非天子也公曰如此節儉尤見盛德若朝廷節儉天下自然富庻前代如漢文帝唐太宗宋仁宗皆節儉是以當時海内富庶非其餘可及又曰朕於四書皆嘗讀遍如二典三謨真是格言公曰誠如聖諭凡帝王修身齊家敬天勤民用人為政之事皆在其中此時正宜玩味體而行之英宗每為首肯愛惜人才惟恐弗力而以奬恬退勵名節為先耿公九疇及軒公輗皆以㢘介聞公首舉耿為都御史軒為刑部尚書未幾耿為石亨所排斥軒以權貴侵官託疾去公屢言於上而還之年公富亦為亨姪所誣䧟及亨敗公乃力言富有執守可大用遂起為戸部尚書上嘗語公曰左右多不恱富者公曰不恱者衆愈見其賢禮部侍郎缺員有因近習薦陞者上問公曰何如對曰不知其人臣所知者學士李紹可任此因進言邇者士風不立多夤縁以求進如用紹請於黼座召吏部面命之庶幾士𩔖知警上從之命下之日傾朝􅌶然其後任事大臣多公所薦已薦矣其人不之知反有訾公者或以告公公曰吾知用其才耳三選庶吉士儲養於翰林親加督教如愛子弟與故學士吕文懿公及今學士陳公彭公相處十餘年未嘗失詞色毎語具以忠言相告而於講學論政至終日忘倦人有善若已出不白之不已兩廣兵興編修丘濬實廣人具嶺南事宜告公公繳奏言濬言可用請付軍中為平賊之助遇天變民瘼憂形於色每以裁抑浮費蘇息民力為本謂内帑財物非濟兵民則人主必生侈心而移之於土木禱祠聲色之用自公柄政前後𤼵内帑銀救荒恤邉凡數十萬計人有急難以身救之而於植臺諌慎刑獄尤惓惓焉有㑹試被黜者訴考官有弊上不恱以章示公公曰此乃私忿考官實無弊如臣弟讓亦不在中列可見其公上意方解言路屢閼屢闢而不至於銷鑠皆公力主之惟成化初言者厯詆中人之惡謂不可使與國政得補外而或咎公不申救者公曰此事何可激也甘露之變黨錮之禍諸君獨不知之天順中宗室臨川王弋陽王前後為緝事者𤼵其隂事而多渉虚因召問公公曰觀此則其餘所枉多矣法司雖知其枉而不敢辨非明詔理官不許畏勢避嫌實傷和氣上乃召三法司面戒飭中外感恱凡朝廷大政令渉於軍情邦計者必經公議而後决北敵博囉近邉有言傳國璽在其處請發兵乘機奄取之上為之動公曰頻年災荒府庫空虚兵民困極宜與之休息且敵近邉未嘗犯塞無故伐之必賈釁况秦璽亡國之物亦不足寳上矍然罷議内帑奏乏金用詔下戸部議請以蘇松嘉湖四府歳折糧銀折金五萬兩公言國家財賦仰給東南而金非其所産今欲折金價必湧貴聞雲南諸夷有歳辦金銀若以銀折金亦足以充國用衆以為便松潘𦍑叛亂巳勅三司調兵勦之久不下公曰三司頡頏牽制自不能成功若朝廷命一大臣統之則事定矣易曰長子帥師弟子輿尸不可不慮上問公可將者公薦都督許貴遂用之而松潘𦍑始靖凡冊后妃與諸王大䘮大祀冠婚之禮及今上之初親耕視學諸大典禮悉命公與禮官增損儀式而後行論者謂自天順以來所以正君德恤民生進賢才廣言路抑佞幸却戎狄皆公之力天不憖遺可為世道斯文之不幸上中興正本䇿李賢臣伏惟陛下即位之初大開言路凡朝廷之闕遺有司之利病生民之休戚軍務之得失中外進言者論之詳矣若夫關於陛下躬行窮理正心修已治人之道則或畧焉此臣區區犬馬之忠私竊過慮以為陛下一身乃家國天下之本也而陛下之心又一身之本也夫正其本萬事理惟陛下之心既正則家國天下之事可得而理矣臣所以忘其愚陋獻此中興正本䇿其目有十焉一曰勤聖學二曰顧箴警三曰戒嗜慾四曰絶玩好五曰慎舉措六曰崇節儉七曰畏天變八曰勉貴近九曰振士風十曰結民心夫勤聖學者所以格物窮理也顧箴警者所以誠意正心也戒嗜慾以至結民心者所以修身治人之道也皆切於陛下躬行之事不係各司舉行者伏乞留中萬幾之暇時賜省覽於陛下身心未必無少補焉且陛下春秋鼎盛初豋寳位天命之眷顧方新人心之向慕方切當端本正始之日適乘勢有爲之時求其所謂要道先務今日最急而不可緩者在此十䇿夫十䇿既舉則大本正矣天下之事可以次第而推行之不難矣由是明是非以行賞罰辨邪正以用人材抗公道以振紀綱節財用以固邦本勵將帥以作士氣修政事以攘夷狄開壅蔽以通下情敬大臣以資治道特皆陛下之餘事耳伏望聖明深加察納果㫁力行以幸天下以光祖宗以慰生靈延頸舉踵之望以追前代英君義辟之踪盖陛下之責必如是而後塞嗟夫言之逆耳者惟聖君乃能聴事之難言者非忠臣不能言故曰責難於君謂之恭陳善蔽邪謂之敬昔宋儒朱熹將上殿奏事或謂正心誠意之説上所厭聞熹曰吾平生所得惟此四字豈忍不言而欺吾君乎此人臣以道事君貴乎有犯無隠也臣觀陛下即位以來雖踈逺之臣芻蕘之賤皆得効忠况臣職居郎署日近清光噤黙不言可謂忠乎雖然噤黙不言者臣之罪也言之不用者亦臣之罪也何者陛下有聦明之資有温恭之德有寛仁之度有納諌之美臣下有言而不用非拒之也盖以所言未必剴切當帝心者或無誠意感動故也故曰言之不用者亦臣之罪也倘陛下不以臣卑鄙猥言或有可取舉而行之將見功業煥然必出於尋常萬萬豈但臣之受賜而已實社稷蒼生之大幸也臣不勝惓惓罔知忌諱昧死進言冒干天威無任激切悚懼之至一曰勤聖學臣觀自古聖賢之君率皆留心於務學曰人心惟危道心惟微惟精惟一允執厥中此堯舜禹相傳之學也曰以義制事以禮制心成湯之學也曰終始惟一時乃日新太甲之學也曰惟學遜志務時敏厥修乃來高宗之學也曰克厥宅心文王之學也訪於洪範丹書武王之學也曰日就月將學有緝熈于光明成王之學也若夫漢唐宋之君或講論經理夜分乃寐或執業尊師升堂講說或銳情經術夜艾不休或留意典墳採為龜鑑或進陸贄奏議或覧貞觀政要不以炎暑而輟經筵不以風雨而罷講讀雖無唐虞三代正心誠意之功亦可謂後世好學之賢君較之懵然而昏亂者不啻天淵之相逺矣伏願陛下歴觀前代聖賢之君所好者何學所學者何事不但口耳之粗迹務考義理之奥㫖必専心以致志不一暴而十寒以正心修身為要務以居敬存誠為大本帝王之學既有所得應事接物無或不當異日嘉靖邦國巍然為中興之令主未必不由好學致之也伏願聖明留意二曰顧箴警臣聞前代聖賢之君必頼箴規警戒之助然後此心不敢怠忽常存敬畏庻幾無過舉焉若成湯之聖而猶銘其沐浴之盤以自新武王之聖而亦銘其席杖楹牖以自戒衛武公在輿有旅賁之規位宁有官師之典倚几有訓誦之諌居寢有暬御之箴魯廟有欹噐而存持滿之戒稷廟有金人而寓緘口之銘無逸一篇列於講閣前代遺迹寫為鑑圖書洪範之語於座屛書孟子之言於屛障此皆宋之令主也由是觀之前代聖賢之君以警戒為規鑑以宴安為鴆毒内外交養而表裏俱修是以君德日隆多福自至其餘不知警戒雖有忠臣進獻箴銘視為虚文畧不省覧是以留連荒亡盤樂怠傲自求其禍以致敗亂徃徃皆然伏願陛下法前代聖賢之君存箴䂓警戒之助摭徃事之明鑑採古人之格言或施之障屏或設之殿壁出入起居常目必在退朝燕處此心不忘於以防過於未然於以禁欲於將萌如此則意無不誠心無不正身由是而修天下由是而治將無愧於古之聖帝明王矣惟聖明其深念之三曰戒嗜欲臣觀自古聖賢之君未嘗不以嗜慾為戒益之戒舜曰罔游于逸罔滛于樂臯陶之戒舜曰無教逸欲有邦仲虺作誥以戒成湯曰惟王不邇聲色不殖貨利用人惟巳改過不吝伊尹述訓以戒太甲曰敢有恒舞於宫酣歌于室時謂巫風敢有殉于貨色恒於游畋時謂滛風召公之戒武王曰玩人䘮德玩物䘮志不矜細行終累大德周公之戒成王曰無滛于觀于逸于游于田以庶邦惟正之供張藴古作大寶箴戒唐太宗曰樂不可極樂極生哀慾不可縱縱慾成災范祖禹講五子歌戒宋哲宗曰内作色荒外作禽荒甘酒嗜音峻宇雕墻有一於此未或不忘此前代聖賢之君能受人臣之戒而不敢流於嗜慾當時天下之治不可尚也若夫昏暗之主雖有忠臣進戒拒而不納逸樂怠荒以致天下之亂者多矣夫宴樂乃害心之鴆毒酒色實伐性之斧斤伏望陛下以前代聖賢之君為法絶去嗜欲之私養其清明之德以斯民未被其澤為憂以天下未得其寧為念講周孔之遺編考帝王之治道務成中興之念以慰祖宗之心則社稷幸甚蒼生幸甚四曰絶玩好臣惟人主一心攻之者甚衆不能為玩好所惑者寡矣是以古之聖賢之君常有所警珠玉犬馬珍禽竒獸一切玩好之物悉皆罷去此心湛然虚明淵静故召公恐成王受西旅之獒曰不役耳目百度惟貞盖謂心無所主反為耳目所使若心得其職則百度無不正矣必欲心得其職非從事於學不可也夫一心無兩用既能專於此必不牽於彼伏乞陛下於内侍之中擇讀書知義者四五人置諸左右外聴儒臣講論經史内與左右觧說其義心通性恱日新月盛聦明益長智慮益髙靜觀左右之人或以玩好之物來陳者必嚴以斥之曰爾以聖明之君待其主邪以庸暗之君待其主邪夫以聖明之君待其主者以堯舜之道陳之以開陛下之心胸此忠臣也以庸暗之君待其主者以玩好之物陳之以惑陛下之耳目此奸臣也歴觀前代未有明君而不法堯舜之道者未有昏君而不溺玩好之物者惟陛下留心省察果能務學而絶玩好則行無不謹身無不修宗社自固生民自安不患不為大明令主而中興之業不成者臣未之信也五曰慎舉措臣惟人君之舉措不可不慎也書曰惟皇作極盖謂人君一身立至極之標凖而天下四方之人環顧以取法焉舉措一失其當則逺近之人得以窺探其好尚之偏可不懼哉記曰王前巫而後史卜筮瞽侑皆在左右王中心無為以守至正又曰虞夏商周有師保有疑丞設四輔及三公皆所以防君之過舉也昔周成王削桐葉為圭以與叔虞曰封汝史佚請擇日王曰戯也史佚曰天子無戯言言則史書之至於漢唐宋之君皆有起居注之職有失即告有過必録盖亦嚴於自防矣是以古之明主愛一嚬一笑夫一嚬一笑尚不可輕𤼵况見諸行事一舉一措豈可輕動哉伏願陛下試加留意一日之間舉一事也必再思之果當於理然後行焉措一事也必更審之或乖於理而即止焉又望陛下内則親夫貴近之臣外則勉夫輔導之職若髙宗之命傅說曰朝夕納誨以輔台德又曰爾交修予罔予棄予惟克邁乃訓夫人君既以伊傅周召望其臣則人臣必以堯舜湯武致其君由是君臣一體志同道合而陛下之舉措無有不得其當矣六曰崇節儉臣觀自古聖賢之君未有不崇節儉者若帝堯茆茨不剪土階三尺大禹絶㫖酒菲飲食卑宫室惡衣服文王卑服即康功田功當時雍熈㤗和之治不可尚矣漢文帝欲作露臺不忍百金之費身衣弋綈席用莞稈所幸夫人衣不曵地唐太宗出宫女三千欲營一殿材用已具監秦而止嘗曰欲盛則費廣賦重則民愁以此思之不敢縱欲宋仁宗夜思燒羊忍飢而不索恐自此多傷物命見宫人首飾珎珠遮目不觀惡其奢蕐噐用止於漆素衾裯止於繒絁漢唐宋各有天下數百年求其海内富庻無如三君之時盖人君既以節儉存心臣下豈敢奢侈相尚自然家給人足也况今天下多事之秋工部光禄寺諸司諸色買辦倍於前日近因賊㓂驚擾人民尚未寧息伏望陛下躬行節儉凢内府一應服食噐用必須究查今日之費比之先朝果減省乎果增多乎務用減省以蘇民力則天下幸甚七曰畏天變臣聞天心仁愛人君必出災異以譴告之為人君務求天意所在而存修省之誠可以變災為祥轉禍為福也昔商之中宗有桑榖幷生於朝恐懼修德而天意即囘髙宗有飛雉鳴於鼎耳克正厥事而王業再振宋之太宗避殿減膳而東井彗滅詔欲自焚而得雨蝗死仁宗霖雨為沴而引咎格天久旱不雨而宻禱即應是四君者俱能上感天心變災為祥遂享靈長之福以成中興之治徃歲以來山崩河改地動殿災蝗旱相仍天象交變譴告之意可謂至矣當時若能廢黜奸邪任用忠良克已自新以答天譴未必不轉禍為福也惟其修省未至是以不免於難由是觀之災異之見何代無之顧人君修省何如耳且匹夫一念之誠尚能動天况人君精誠所感其應尤速伏願陛下修德正事以承天心凡欽天監并各處奏來災異之變必早夜思省以荅天意凛然敬畏以弭災變將見天人感應之速未必不如商之中宗髙宗宋之太宗仁宗也於以為守成之令主於以致中興之盛治功烈卓然萬世標凖豈不美哉臣區區螻蟻之誠所願望者如此惟聖明留心幸甚八曰勉貴近臣觀前代中官正直忠良有功於國家者不為無人若漢唐之世史游良賀吕劉馬嚴或勤心納忠有所禆益或清儉退守無所引薦或清忠奉公直言切諌或排去奸邪委政廟堂或以一身扞人主之難或辭两軍抗㝠鴻之志千載之下仰其芬烈視彼招權撓政賣㺯威福取快一時不旋踵而遭大僇者一薰一蕕相去逺矣今陛下左右内侍之臣大非前日之比率皆小心畏慎恪勤匪懈守祖宗之法絶外人之交盖能以覆轍為戒也猶慮陛下一日之間接文武羣臣之時少親左右貴近之時多若能輔成今日中興之治皆其功也可不勉哉果能取法於前人興循理好善之念存正直忠良之心載之方册傳之萬世後之人仰而羡之曰當時貴近之臣某也正直某也忠良如此則播令名於無窮豈不美哉九曰振士風臣聞唐虞三代之世人人有士君子之行比屋有可封之俗士風之振不可尚也降自後世西漢士風尚忠厚東漢士風尚名莭雖所尚不同而莫非善行國祚所以綿逺者由士風之振有以維持之魏晋以來流於清談虚曠放逹而士風大壞李唐之世士尚華靡多文少實宜乎天下治日少而亂日多也惟宋之士夫有三代之風詳其所由亦上之人有以勵之耳觀太宗戒欺誕之詩曰好事盡輸純與直謾勞頰舌湧如泉士風安得不誠實乎真宗疾奔競之詩曰臣下但當守公法馳騖苟進何可取士風安得不恬退乎黜勢家士不與孤寒幷進録㢘吏後以愧貪墨之徒宜乎士風爭尚清廉也此宋之賢君䕶風俗如䕶元氣重名節如重神明所以士風大振而人人有士君子之行伏願陛下取法於宋以振士風戒欺誕以勵誠實疾奔競以惜恬退黜貪墨以重清㢘抑僥倖之徒絶諂佞之軰俾我朝人人有士君子之行將見士風大振未必不如宋之可追三代也惟陛下舉而行之幸甚十曰結民心臣觀書曰天視自我民視天聴自我民聴盖民心之向背係天命之去留有天下者不能固結民心而欲久安長治者難矣夏商周漢唐宋俱有天下數百年而歴世綿逺者固結民心之所致也其餘不能百年甚至三四十年而止者率由民心不向故也歴觀前代所以固結民心者豈有他術不過安之養之而已書曰德惟善政政在養民又曰安民則惠黎民懷之是以古之聖賢之君愛民之心如愛赤子休養生息惟恐失所晁錯曰人情莫不欲壽三王生之而不傷人情莫不欲富三王厚之而不困人情莫不欲安三王扶之而不危人情莫不欲逸三王節其力而不盡是以所欲與聚所惡勿施此固結民心之道也劉基曰三代之民如以膠摶沙言其難散故也五伯之民如以水摶沙言其易散故也伏願陛下逺法前代結民心之道近體祖宗恤民之心𤼵矜憐惻怛之念於九重之上播春風和氣之仁於八荒之表孟子曰德之流行速於置郵而傳命盖陛下省一分之費則民受一分之賜施一分之寛則民被一分之澤務使海内富庻衣食充足將見下民愛戴陛下之心亦如三代之民以膠摶沙而不散或遇㓂賊奸宄之變必不忍負朝廷之恩如此則宗社可安於永久雖歴億萬年斯可也惟陛下注意熟察幸甚上鑑古録李賢臣賢猥以駑劣遭遇明時恭惟陛下聦明睿智英邁絶倫凢百所行多盛德之事臣不勝感激忻躍尚慮前代聖賢之君事迹浩瀚難於遍覧今特録堯舜以下二十三君每君摘取所行之最善者數事集為一帙名之曰鑑古録臣於每叚之後畧為解說數句冀陛下易於覽而行之夫古之大臣莫不欲致君於堯舜之上伊尹曰吾豈若使是君為堯舜之君哉又曰予弗克俾厥后惟堯舜其心愧耻若撻於市今臣以庸下之才謬當輔導之任深愧不如古人况陛下有可為堯舜之資而臣不能將順其美可謂忠乎臣觀陛下所行之事已有超越前古者若又以此二十三君之善兼而有之則功德之隆真可同於堯舜而光祖宗矣臣犬馬之忠不勝惓惓錄呈乞重用老成李賢臣本以凡庸才學踈淺天順初䝉先帝擢用於内閣辦事盖偶遇缺人之際􅂓以備員非天下之極選也臣彼時不敢遜避黽勉就職環顧其中誠所弗堪是以八年之間恒懷憂畏外雖强為支持而心則未嘗一日敢自安也况近來不足臣者䜛毁多端謗議沸騰盖由臣之鄙性拙直不能委曲宜乎人心嫉忌兼以素行不能取信於人故耳臣思内閣實機宻重地須才德老成素行服人者可當此任竊見太子少保吏部尚書王翺由進士出身歴官五十餘年㢘慎忠勤小心翌翌高見逺識異於尋常士林推重未有過之者也乞照宣德年間少師吏部尚書蹇義例輟其部事量進階秩命入内閣俾與大議臣願隨行而恊助之庶足以見朝廷重用老成之意而忠厚之風亦可以少振也臣布此誠懇為國至計伏望皇上監察而俞允之幸甚論輔養君德李賢切惟人君一身為天下之主所係至重臣民瞻視以為休戚四夷觀望以為向背若行事合宜則中外人心自然悦服不然則人皆離德欲天下治安不可得矣今陛下初登寶位天下之人莫不延頸舉踵仰望治平然治平之本在於君德而輔養君德又在左右前後必得老成端整之人可也臣切見内臣曽事先帝歴練老成隨侍皇帝端謹小心者不為無人伏望皇上命其不妨管事於每日退朝燕居時分不許暫離左右舊日隨侍讀書者宜照舊每日隨侍不必分班其餘使令之人亦須選擇謹厚淳篤者供事如此庻於君德有益但有輕浮頑猾喜好生事逄迎取恱供耳目之玩信佛老之教者皆不可近伏望皇上即日退岀各衙門辦事毋令隨侍如此庻於君德無損臣受朝廷禄位為宗社生民至計敢不竭忠盡言惟皇上剛㫁而進退之天下幸甚題修德弭災事商輅昔漢臣董仲舒告武帝有曰天人相與之際甚可畏也國家將有失道之敗天廼先出災害以譴告之不知自省又岀怪異以警懼之尚不知變而傷敗廼至以此見天心之仁愛人君而欲止其亂斯言也古今以為名言兹者彗星見於天田西掃太微北近紫宫其譴告警懼之意至矣仰惟皇上憂切於心戒諭羣臣同加脩省是能體上天仁愛之心而欲修政以弭之也其時政得失生民利病諸文武大臣已條陳上逹矣然德者政事之本書曰惟先格王正厥事孟軻曰君正莫不正盖天下萬事必以正君心為本臣等備員近輔無以少禆萬一實深愧懼謹采修德大端幷安民大要條陳如左一曰正心術夫天下之道二正與邪而已自古人君崇正道者無不安享治平之樂惑邪教者未有不致危亂之憂載諸史冊歴歴可監臣等仰惟皇上聦明聖智豈不知所决擇而頗留意佛事者聊以試之非誠信之也然外人聞者竊以為議謂内府一次修齋街市一次騷擾中間委曲誰敢直言行之不巳漸失人心臣等伏望皇上留心聖學毋信異端以正本原減去内府修齋如遇節令止循常例於在外寺觀舉行可也修德應天之本莫先於此二曰謹命令夫王言如絲其出如綸言命令之出不可不慎也伏聞祖宗以來九傳㫖意必專任人如此則責有所在事無虚偽近來聖㫖行於光禄内府各衙門者傳奉不一政岀多門人得詐偽將來之弊有不可言伏望皇上今後斟酌事體可否如有可行必令司禮監官傳㫖庻幾命令出於一事有可稽而無弊矣三曰親接見夫君天也臣地也天地之氣交則為泰其不交則為否君臣之道何以異是徃古事監不敢枚舉惟我祖宗列聖在位未有不接見大臣論議政事者君臣情通政是以和今皇上視朝即退端拱九重不一接大臣於便殿天下軍民利病何由盡知豈以首出庻物自能洞察四方邪抑以臣下庸劣不足與議也如臣等者才踈識淺誠不足以備顧問在廷大臣豈無一可伏望皇上日御便殿或三二日一召文武大臣忠直有識者面議政事而可否之或詢軍民之休戚或訪人才之賢否或察治體風俗之得失有疑於心必詢於衆聴覽之日熟未必無少補益四曰慎賞罰夫賞罰二者人君治天下之大柄也賞當功罰當罪則人心服一有不當則人心不服故欲服人心莫先於慎賞罰然慎賞罰尤莫先於循舊章守成憲為當近者道路傳言謂賞典大濫近幸無故而受金帛者多工匠無功而冒官職者衆此非舊典所有也用刑太深有法不該充軍而充軍者有罪不至死而死之者此非成憲所宜也伏惟皇上節賞慎刑惟舊典成憲是循是守使人無偏私枉濫之議則公道彰治法正矣五曰納諌諍夫日有萬幾而事有萬變非兼聴博采何由一一當理是故伊尹以從諌弗咈美成湯傅說以從諌則聖望髙宗而後世之稱賢君者亦必以聴言納諫為首事也伏望皇上以古之聖主明君為法虛心屈已聴受羣言勿惡其切直勿忽其迂逺苟有當理即賜施行如此則官賞政刑不致乖失而下情得以上通天下利害軍民困苦皆得聞知而久安長治之道其在是矣六曰勵官守書不云乎臣作朕股肱之職乎給事中御史非耳目之司乎股肱舉動合宜耳目聞見不謬則元首尊安為成人矣但今承平百有餘年文恬武嬉事多因循究其弊端難以枚舉大槩主於奉承上㫖而嫌於違覆或直行已意而不加斟酌是以其事不便於軍民者多矣有識者徒能竊議而不敢公言意謂目前苟安懼煩凟也豈知今日下人愁怨感動天變如此之甚乎伏望皇上戒勵各官慎修厥職今後任股肱者凢遇事有便宜再三執奏毋率意行下結怨於民司耳目者但事為民厲官為民蠧者即便舉奏毋徇情容隱務使庶官變因循為奮勵各舉厥職興起事功然後政善民安可兾也七曰恤軍民書曰民惟邦本本固邦寧此不易之言也然軍出力以衛民民出賦以供軍軍民相資邦本乃固近來管軍管民官員罔體朝廷愛養軍民之心因公科歛弊出百端軍民窮困日甚一日若此者天下皆然而畿内尤甚何也以差役繁重而又無所資以為生也舊日牧馬草場積年開種田地今多為有力者侵占故馬死而罪責至地少而衣食窘懷憤蓄怨非一日矣伏望皇上命該部清理三營草場使官軍便於牧放減退勢家庄田使百姓便於耕種以資生理其各處衛所府州縣官有巧立名色或謂措辦或謂區畫或謂罰贖或謂勸借等項科歛掊刻軍民財物者乞令都察院嚴行禁治毋令恣意朘削以致下人困苦歸怨於上如此軍民各得其所而邦國永寧矣凢此七事實出輿論言之似若違悞行之必有禆益盖天之視聴在民民心感恱然後天意可囘此臣等惓惓愚忠實在於是伏望皇上監除舊布新之象㫁自聖心力行新政以正心為修德之本以善事為修德之助德修於上則羣臣咸知感激効職而安養軍民之政次第可舉行矣轉災為祥莫切於此晏嬰曰君無違德何患於彗此之謂也臣等不勝悚懼之至昧死上言伏候勑㫖題修德政弭災異事商輅臣等嘗聞天心仁愛人君莫大於𤼵災變以譴告之尤莫大於出妖孽以警懼之無非欲人君思省過咎以修德政欽崇天道以保天命變禍為祥轉危為安也皇上嗣位以來純仁大孝昭假上下𢎞恩霈澤覃被海宇凢在臣民無不欣戴宜其嘉祥至而景貺臻然而數年之間災變迭見今又妖物頓興豈非天心仁愛我皇上之至故屢屢假此譴告示警實欲躋斯世於平康之域也徃因災變文武羣臣嘗舉政事之當興革上達矣荷䝉允納而行之者有之暫從而復寢者有之故今妖物之興寧不有在乎皇上洞知此異以為上天示警憂懼修省不遑自寧誠可謂善於事天者矣竊惟事天當以實不以文弭災當以行不以言誠能推今修省之心以修德則德無不修推今憂懼之心以修政則政無不舉德修政舉殆見人心和於下天心和於上上下恊和百福荐臻諸休畢至又何妖孽之不殄滅人心之不安靖乎臣等職忝輔近不能少禆於德政之萬一覩兹災異惶懼實深除有關於聖德謹陳愚見外兹復條具時政數事以聞伏望聖明采納施行之則中外臣民不勝幸甚臣等昧死上言伏候勑㫖一節財用夫貨財軍國仰給不可一日而無者也要在撙節用之苟或侈靡妄費則府庫空虚倘遇興師動衆何以賞犒旱澇饑荒何以賑濟故孔子論治國以節用為本其弗信歟近年以來朝廷貨財多為下人侵耗如哈宻等處畨人來京俱帶玉石被細人誘引先將次等者進貢存留一等者在後計囑鋪行人等多估價值賣官規取庫藏銀兩又畨僧授職在彼土管事者例該給與印信使鈐束撫化鄉人近來在京閒住者徃徃自都綱禪師陞至國師佛子法王等職一槩給與金印信圖書前任所給者悉皆収留其有病故所遺者徒弟人等亦擅収藏及後承襲又求造給侵耗貨財乞勑甘肅等處廵撫等官今後哈宻諸番來京帶有玉石責令通事諳曉玉石之人辨驗第一等者計數封號装盛送京次等者許其量帶盤費其餘悉令在彼貨賣不許一槩帶來沿途扛運應付艱難如違許廵按分廵等官徑自拏問番僧陞官職印信止許留見在者其前任及病故遺下印信合令該部查收以後有新陞職不係本土管事官員復請給者許該部叅奏𤼵遣勿令在京生事紛擾如此庻事體得宜財無妄費矣一却貢獻臣等謹按傳曰下之事上也不從其所令從其所好上好是物下必有甚焉者也經曰玩人䘮德玩物䘮志盖人君一心攻之者衆倘一留心於玩好則下人旁搜逺索而貢獻者其弊將有不可勝言者矣洪惟皇上即位之初不急之務一切停止玩好之物一切罷去天下臣民莫不稱慶近年廣西雲南等處有貢竒花異卉珍禽竒獸珎珠寳石金銀噐物盖此物非出於所貢之人必取於民取於民不足又取於土官夷人之家本一物之進必十倍其直然後方可暴虐生靈激變地方莫此為甚且水路萬里之遙人夫轉運不勝其擾見今安南小國敢肆抗拒漸有内侵之患良由自我有以召之也臣等伏望陛下明示詔㫖今後除常例歲貢外其内外之臣敢有以玩好之物上進者治罪不宥如是不惟上下綏靖而無擾其於乂安中國感格逺人之道兼得之矣不寳逺物則逺人格惟聖明留意一開言路臣等嘗聞宋臣蘇軾有曰天下治亂出於下情之通塞至治之極至於小民皆能自達亂或反是雖近臣不能自通故易以天地交而為㤗不交而為否臣等不敢逺引前代明王遇災求言之典伏惟太祖髙皇帝臨御之時自文武羣臣以及軍民匠役諸色人等應有可言之事許直至御前陳說其言中理即為施行且或予之官或給之賞其不中理者亦置而不問所以廣耳目不偏聴防壅蔽而達下情也故當時雖閭閻之間細微之事無不周知太平至治良有以也洪惟皇上嗣承大統即詔天下凡軍民利病許人直言無隠有以見皇上之心即太祖髙皇帝求言之心也奈何近年以來人多顧忌不肯盡言豈非聴言之道猶有未至者乎臣等仰望聖明廓宇宙之量容㳙滴之微明詔在廷文武羣臣凢致災之由弭災之䇿悉陳以聞言之善者俯賜聴納見於施行言之不善亦不加罪如是則言路開而下情達萬事何憂不理災害何由不息乎一慎刑罰聖人不得巳而用焉用之貴在得中一失其中則邪氣積蓄隂陽繆盩妖孽滋興可不慎歟仰惟皇上嗣位以來凡遇盛暑必下詔寛於京師或值災變必遣官詳審於天下慎刑之心盖與古者虞舜好生之德同一揆也然自成化八年遣官詳審於天下迄今將五年矣夫以京師之内一有寃枉今日告鳴明日或可得以辨彼天下之廣萬姓之繁中間冒罹刑憲者不知有幾偏州僻縣隔離上司窵逺者豈無經年含寃死於犴獄者乎此在聖明之世不能不為之惻然也合勑法司遴選諳練刑名老成官屬照例請勑分投前去㑹同彼處廵撫分廵理刑官員重加研審務使情真罪當輕重適中毫釐不爽庶人無寃枉邪氣潛消而諸孽不作矣一省工役古者力役惟取於冬盖以時節人力也苟役不節以時勞筋苦骨民不堪生而怨讟以興怨讟既興和氣有弗乖戾者乎此有周先王營宫室而施鼛鼓緩工之仁建靈臺而布庶民勿亟之令良以此耳兹者朝廷修東直門城樓幷各處城垣所以壮觀京師捍禦内外之意既深且廣雖愚夫愚婦莫不悉知以故軍民萬衆一心子來無或嗟怨非以佚道使人孰能然歟伏望仰體先王營建仁心審今日興作緩急除城樓城垣所當建外其餘不急之處即頒德音悉令停止庻軍士得以休息怨讟不生和氣漸臻矣一足軍餉臣等切見徃年西北用兵榆林一帶糧草最難供給當時預借陜西山西河南三年租稅起運每草一束用銀二錢米一石用銀一兩或兩半若輸納本色上下山坡展轉溝壑不勝勞苦今無事之時若不早為預備一旦敵入河套復踵前跡民何以堪近者廷臣常議及此臣等尤恐所司奉行不至合勑戸部查筭彼處各堡糧草實數每處可勾幾時之用該有兵動可贍多少人馬如果不敷作何措置或比較屯田拖欠子粒採把未完草束或開種鹽引招商上納草束米豆或將腹裏積蓄糧草量起人夫加意撫恤以漸轉般赴邉収貯或將官銀及贓罰銀兩運赴彼處趂時収糴糧草上倉及其他長䇿務要一一舉行具實囘奏毋得視為泛常其遼東宣府大同雖未經用兵查見積蓄之數務令邉鄙充實庶不臨期悞事一飭邉備臣等見得遼東幷山海闗喜峯口古北口一帶地方去京師宻邇徃年朶顔三衛為我藩籬雖小有邊警尚不為大患今此三衛既被布達拉等服屬以彼之強從此鄉導來犯我邉則京師不得安枕况居庸迤南至紫荆等關口尤係京城切近屏蔽雖有御史逓年㸃閘縁承平日久未免忽畧合勑吏部奏遣歴練大臣或歴練老成給事中二員請勑分投前去㑹同各總兵廵撫守備等官趂今無事之時將各邉墻垣口子逐一㸔視該修理者即便差撥官軍分工併力深濬厚築以為經久整㸃煙墩修葺堅固以便哨望不許虚應故事其有城垣􅔐塌兵噐損壞人馬瘦弱不堪備用去處俱要即時修補𦂳要之處合添人馬亦湏斟酌多寡奏請選集聴候有警應用不致緩不及事一重地方臣等聞得永樂年間征取交趾郡縣其地天下大一統而無外其後守鎮非人不恤夷情遂至激變失䧟地方再不可復今兩廣四川貴州雲南俱係邉逺之地設若任用非人一旦有警軍旅荐興糧運不繼欲天下無事不可得已其雲南地方與安南尤為切近而蠻夷土官衙門易生事變不可不為深憂今兩廣四川貴州俱有廵撫官而雲南豈宜獨無合勑吏部推選剛直有為智識超卓大臣一員請勑前去廵撫其地凡利有當興弊有當革悉與鎮守等官處置施行各務安靖地方毋事阿狥有負委任題國本事商輅臣等仰惟皇上至仁大孝通於天地光於祖宗誕生皇子聦明岐㠜國本攸係天下歸心重以貴妃殿下躬親撫育保護之勤恩愛之厚踰於已岀凢内外羣臣以及都城士庶之家聞之莫不交口稱贊以為貴妃之賢近代無比此誠宗社無疆之福也但外議皆謂皇子之母因病另居久不得見揆之人情事體誠為未順伏望皇上勑令就近居住皇子仍煩貴妃撫育俾朝夕之間便於接見庶得以遂母子之至情惬衆人之公論不勝幸甚臣等職居輔導偶有所聞不敢緘黙謹具題知伏候聖裁革西厰䟽商輅仰惟皇上臨御以來敬天法祖任賢使能政事修明紀綱振舉是以十餘年間海内晏然雖天象屢示警戒而災變自消雖水旱比歲相仍而民無離叛實由皇上寛仁大度省刑薄歛慈仁愛人之心感孚於上下也夫何近日伺察太繁法令太急刑網太宻官校提拏職官事皆出於風聞暮夜搜撿家財不見有無駕帖人心洶洶各懷疑畏内外文武重臣託之為股肱心膂者也亦皆不安於位百司庶府之官資之以建政立事者也舉皆不安於職商賈不安於市行旅不安於途士卒不安於伍庶民不安於業承平之世豈宜有此究其所以盖縁陛下委聴㫁於汪直之一人而汪直者轉寄耳目於羣小汪直之失雖未為甚而羣小之中其奸謀足以顛倒是非其巧佞足以蠱惑人心如韋瑛者自言親承宻㫖得專予奪之柄自謂百官進退盡在掌握之中擅作威福虚張聲勢其間同惡相濟如王英者則以附己而薦之稍存公論有所諌正者則以異己而出之如狼如虎肆無忌憚原其立心惟知希求進用以為一身之榮不思傷害善良虧損國體大為聖德之累陛下若謂防微杜漸不得不然則前數年間何以帖然無事徃者曹欽之反皆由逯杲生事有以激之人所共知可為明監昔唐太宗當天下甫定之後骨肉相殘羣雄側目嫌疑之際宜乎過慎也而乃從魏徴仁義之言拒封德彛刑罰之說遂致海内殷富斗米三錢外戸不閉幾於刑措太宗因封德彛死謂羣臣曰此魏徴勸我行仁義之效也恨不令封德彛見之夫德脩而民自化法急而民愈亂攷之前史厯厯可驗孔子曰道之以政齊之以刑民免而無耻道之以德齊之以禮有耻且格我國家積德百有餘年深仁厚澤浹洽於人四方萬國孰不歸戴陛下為守文令主嚴刑峻法誠非所宜况今天鳴地震無處無之水旱災傷日甚一日省躬念咎弭災息患之道莫急於恤刑獄莫要於安人心而乃反此所為使人嗟怨感傷和氣一旦有警變且莫測腹心之患可不懼乎可不慮乎伏願皇上體天道之包容勿察察於事情遵祖宗之成憲勿屑屑於改易㫖意必經於六科防將來之假冒奏訴必由於通政杜濫受於他門責政事於府部而嚴課功覈實之舉付刑獄於法司而申三覆五奏之令収囘伺察之人誅逐奸邪之軰其有謀逆奸細幷貪贓壞法重情悉依舊䂓委任歴練老成之人管理如此則䜛言不入於耳自足以頥情而養神苛政不加於下自足以安邦而定國延聖壽於萬年保皇圖於不㧞其端皆在於此不然此風日長衆口嗷嗷國之安危未可知矣臣等荷陛下生成之德置諸宥宻之地一念愛君之心拳拳朝夕有所聞見豈容緘黙謹條陳大畧以聞一舊設行事人員專一緝訪謀反妖言強盗人命及盗倉庫錢糧等項大事今西厰專却搜尋細故凢街市闘毆罵詈爭雞縱犬及一時躱避不及者或捶楚或煩凟聖聴置於重法以致在城軍民驚惶不安一職官有犯緝訪得出請㫖拏送經該衙門問招明白有罪者奏請發落供明者請㫖還職係是定制今聞西厰將廣西勘事郎中武清自通州聴選方面官劉福自歇家俱拿到厰監禁數日輒又釋放且武清係五品官劉福係正三品官擅拏擅放恣意所為紊亂朝政莫大於此一官員犯罪追贓者法司自有成規今西厰自擅封兵部武選司門以後遇官員有犯正身未曽問招先將本家門封閉或夤夜越墻進入搜撿財物或將命婦剥去衣服用刑辱打被害之家有同抄劄以致各衙門大小官員驚惶不安若從此不止日後或有奸人强盗假名害人者真偽何由而辨一京營管軍頭目俱係朝廷託以重寄之人其公私勤惰朝廷自有賞罰今聞西厰不論有無事情一槩令人跟緝鈐束以致各懷危疑不安一各處鎮守總兵等官乃一方安危所係既被選用當任之無疑待之從厚其或有事不得不差人體勘事畢即已今聞西厰各處差人採聴事情彼其聞知寧不慮恐患及退縮自保誤事非輕一各布政司多有王府所在今西厰差校尉分投去彼行事不但官司驚疑各王府亦未免自危事生不測天順年間曽差校尉各處行事皇上即位之初巳革去後三四年尚有假充校尉詐錢害人者此明驗也不可不懲一河道係兩京各處錢糧貨物經由之路要在通行不宜阻滯今聞西厰官校分布沿河一帶遇有船到即加盤問間有公差官員被其搜撿以致徃來客商軍民人等聞風驚疑有未起程停止不來者有在中途寄放囬還者似此貨物不通將來京師公私費用何以仰給抑恐奸盗假此搜船刼人卒難禁止一朝廷威福不可下移自立西厰之後太監汪直每日出外跟隨之人數多但遇官員人等無不喝令下馬雖大臣亦謹囘避如兵部尚書項忠當早朝鼓響伺候之時汪直令校尉就左掖門下呼呌項忠不得朝罷被校尉擁逼而去其欺凌大臣如此至如法司郎中御史等官每遇吊查文卷俱要親齎赴厰竟日伺候不得一見又如東西兩長安門牌上用黄紙帖寫太監汪傳奉聖㫖不書其名滿朝官員見者無不驚駭一百戸韋瑛係無籍小人累投勢要不肯容留從征僥倖得陞前職夤縁投西厰行事之後𤼵人事情言多失實又引進譎詐小人王英結為心腹專一訐人隂私以固信任凢前項拏人放人擅封門户搜撿家財凌辱婦女驚動人心紊亂朝政等項俱係二人所為一臣等切詳此等事情非惟與治體相關又與天道災異相關何也去歲七月以後有妖物出自西北遶城傷人當時人言必有應騐及妖怪方息遂立西厰驚駭人心一如妖物傷人之時以此觀之天道預先示戒不可不慮今太監汪直年㓜未諳世事止憑韋瑛等主使呈報中間固有一二似為禁革奸弊柰非祖宗舊制所革未多其失人心則已甚矣中外騷然安保其無意外不測之變若不早為除革一旦禍興卒難消弭伏望皇上㫁自宸衷革去西厰罷黜汪直閒住以全其身將韋瑛王英拏送法司㑹同錦衣衛推問明白治以重罪如此則人心可安天意可囘矣奏入上恚曰用一内臣焉得係天下安危太監懐恩傳㫖詰責甚厲公正色曰朝官無大小有罪皆請㫖収問渠敢擅抄劄三品以上京官大同宣府北門鎻鑰一日不可缺人守者渠一日擒械數人南京祖宗根本重地留守大臣渠敢擅自収捕諸近侍渠敢擅自換易此人不黜國家危乎安乎懷恩聞之咋舌而退即日撤去西厰名臣經濟録巻十三
