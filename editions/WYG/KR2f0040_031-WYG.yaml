body:
  text: 名臣經濟録卷三十一明黄訓編禮部主客精膳譯言待賔之禮丘濬臣按譯言之官自古有之然惟譯其言語而已也彼時外夷猶未有字書自佛教入中國始有天竺字其後回回女直䝉古緬甸其國人之黠慧者各因其國俗而自為一種字書其來朝貢及有陳説辯訴求索各用其國書必加翻譯然後知其意嚮之所在唐宋以來雖有潤文譯經使之銜然惟有譯佛書而已非以通華夷之情也文皇帝始為八館曰西天曰靼韃曰回回曰女直曰髙昌曰西畨曰緬甸曰百夷初以舉人為之其就禮部試則以畨書譯其所作經義稍通者得聫名於進士榜授以文學之職而譯書如故其後又擇俊民俾専其業藝成會六部大臣試之通者冠帶又三年授以官重其選也蓋此一事似緩而實急似輕而實重一旦外夷有事上書來言其情使人人皆不知其所謂或知之而未盡則我所以應之者豈不至相矛盾哉非惟失敵情而或至啟邊釁者亦有之矣我文皇専設官以司之其慮逺哉請却進獻疏禮科抄出朝鮮國王李瑈奏将獲到海青一連差陪臣崔景禮管送赴京進獻等因具奏成化二年十二月二十五日本部官於奉天門欽奉聖㫖禮部知道欽此欽遵除照例賞賜外照得成化二年十月二十二日該朝鮮國王李瑈差陪臣金永需等赴京進獻白鵲一隻本年十二月十七日又差陪臣趙瑾等進海青二連今次又差陪臣崔景禮等進海青一連查得天順八年正月二十二日節奉詔書各處今後不許進貢花木鳥獸及本處一應所產物件欽此欽遵今朝鮮國兩月之内三次進貢禽鳥雖曰小國效順然不應将此玩物頻數來獻其意蓋謂朝廷所尚者珍禽奇獸故巧取頻貢希求厚賞況縁禽鳥微物奔馳千里之逺勞民動衆彼此煩擾若不禁止非惟彼國不知詔書禁絶貢獻之意抑且窺見朝廷嗜欲輕探厚取久将起侮招玩殊非王者撫馭外夷之體書曰不寶異物則逺人格合無請勅一道責付今次差來陪臣崔景禮等領回曉諭國王李瑈謂爾敬奉朝廷遣人進貢只宜遵守常禮其餘白鵲海青等物不必進來如此誠足以彰皇上盛徳不寶逺物四夷聞之亦足知警縁係却貢獻具題奉聖㫖是欽此止貢使䟽倪岳主客清吏司案呈奉本部送内府并禮科抄出欽差鎮守巡撫兩廣等處太監等官韋眷等題稱賽瑪爾堪地面阿哈瑪特王差使臣哈札爾和沁等賫送獅子等件從海道滿剌加國前來進貢除将獅子鸚鵡行屬支給官錢買辦喂養及差委的當官員同畨使人等管送赴京外具本先差舍人于鐸親賫題知該本部官於奉天門欽奉聖㫖該部知道欽此欽遵抄出到部送司查得成化二十年本地面差人從陜西赴京進貢獅子駝馬本部查照舊例議擬題准特賜畨王阿哈瑪特并伊妻男各色紵絲紗羅絹布一百九十餘匹賜獅子駝馬價彩段共六十八表裡給賜加賜使臣闢勒温瑪哈穆特等彩段七十三表裡銀一百七十五兩衣服絹匹數又不貲似此從厚賞賚逺人猶且心無厭足節次奏擾不已又䝉欽賜路費銀兩後各夷領賞事完要從海道回還䝉憲宗皇帝特㫖准從海道回去今該前因案呈到部看得賽瑪爾堪所進獅子乃逺方之野獸非中國所宜畜留之於内既非殿庭之美觀置之於外亦非軍伍之可用日逐喂飼之費及所賜前項銀幣等件俱係府帑之財帛百姓之供億兼且獅子真偽皆未可辨借使是真不免以彼無用之物易此有用之財倘或非真豈不受逺人之欺貽天下之笑且以啟逺人窺伺之心以為中國好尚之所在殆非所以𤼵揚聖徳之光輝補益治平之實效也臣等切為朝廷惜之蓋因逺人先次得利而去以此今次繼踵復來今若不為處置則今次既去後次復來一處既然各處倣傚以朝廷柔懐之仁固不計此小費其如彼之窺我者邀求無己何哉臣等嘗聞聖帝明王不寶逺物故周武王時西旅貢獒召公致戒漢文帝時有獻千里馬者下詔却之載之經史傳美萬世而我憲宗皇帝成化初年亦嘗降勅諭止朝鮮白鵲海青之獻皇上踐祚之初首頒明詔禁止各處鎮守等官進貢騷擾之弊既而放禽鳥縱鷹犬旬日之間屏逐無遺𢎞治元年四月内因迤西夷人進貢玉石等物却令帶回本年七月内又因雲南鎮守太監王舉欲進寶石等物嚴申禁絶善政善教逺近稱頌以為聖徳恭儉蓋與成湯之不殖貨利同符而一致由是而終始惟一雖堯舜之聖何以過此今未及三年而廣東鎮巡官員又将賽瑪爾堪所進獅子要行起送赴京臣等仰窺聖心必不納此無益之物以為聖徳之累但恐有先年事例為容其到京則經過道途騷擾必多賞賜犒勞須從舊例况本處進貢使臣例該於陜西甘肅驗放起送即今見一起哈瑪爾丹一十八名到京為因後起使臣未到未及題賞其經從海道雖有先朝特㫖止是准令回還不曾許從入貢今若聴從海道前來則後次倘有附近本地浮海商夷詭稱本處差來入貢則既無勘合又無印信何由知其真偽就使的係本處差來使臣則既陜西又從海道濫冒差人縻費財幣終無窮已且又令其習知海道啟意外之虞即今各處地方水旱相仍人民窮困却乃疲中國以供逺人費有用而易無用臣等愚見深為未便伏望皇上念生民財力之艱難察逺人詭冒之奸計斷自宸衷阻其使臣盡却所貢仍差的當行人一員馳驛前去沿途跟訪隨其所在會同巡撫或巡按及合干司府官就於所在官司支給官錢量為宴勞仍依例給與廩給脚力送回廣東量與賞賜嘉荅其意将原來船隻官為修理著令撑駕回還仍請勅一道曉諭阿哈瑪特王謂爾忠敬朝廷具知但差人進貢只宜照依常例量備駝馬從陜西陸路赴京為當其獅子鸚鵡不係常有之物不必逺涉海道來進如此則逺方之人知明天子之所為有非彼之所能測然後益崇俊良益修政治使家給人足禮樂興行邊域無驚萬邦賔服如此則雖四靈畢至未足以增光盛治矧一狰獰異獸亦何足以為明時之輕重哉再照鎮巡等官太監韋眷都御史秦紘安逺侯栁景俱係内外重臣均受朝廷重寄明知海南諸畨國惟占城真臘暹羅滿刺加國𤓰哇等處入貢有勘合者例於廣東布政司比對起送赴京其餘不許起送係是定例今賽瑪爾堪差來進貢既該委官千户孫祥等呈報各官自合遣人諭以朝廷事例并詔㫖事理阻回為當如果其性執抝不肯依從亦合以理阻留在彼差人星馳具奏候請明命以為進止可也却乃即便差人起送似此故違亦合叅究伏乞聖裁縁係遵奉詔㫖阻却貢獻及叅究鎮巡官員并奉欽依禮部知道事理未敢擅便𢎞治二年十一月十一日題次日奉聖㫖是珍禽奇獸朕不受獻况使人之至又不由正路來便差官阻回去廣東鎮巡官違例起送本當治罪且都饒這遭還行文與他每知道欽此止取畨僧疏倪岳𢎞治六年九月初八日該司禮監太監韋泰傳奉聖㫖四川光相寺國師領占竹取來大慈恩寺住坐禮部知道欽此傳奉到部送司除欽遵補本覆奏送科備照外查得成化二十三年九月内該禮科掌科事給事中韓重等及廣西等道監察御史陳轂等俱題為糾劾事内開法王領占竹等但以西畨腥膻之徒汚我中華禮義之教錦衣玉食縻費錢糧前擁後訶擅作威福獻頂骨數珠進骷髏法碗以穢汚之物冒陞賞之榮名曰祝延實為妄誕罪惡深重法所難容伏望聖上獨斷乾剛大彰天討将法王領占竹等挐送法司明正典刑等因本部議擬覆奏節該奉聖㫖是這畨僧及漢人習畨教的冒濫陞賞蠧耗錢糧年久數多本當究治但遇革饒他都依降革職事追奪累次誥勅印信儀仗並該還官物件便𤼵遣去欽此欽遵續據大慈恩寺住坐畨僧領占班著爾等各告係四川陜西等處光相等寺管事畨僧有本寺國師領占竹等先年進貢來京在大慈恩寺住坐今奉例𤼵遣回還縁領占竹等先年來京俱有馬匹船隻廩給脚力等項乞為轉行應付等因本部已經題准行移兵部将領占竹等量與應付船隻廩給送還原土本寺住坐外及查得近該禮科左給事中夏昂題為應制陳言修省事内一件遵制命内開教坊司額外樂官并畨僧及漢人習教的俱已奉㫖降革近日輒有奏討復職者不畏國法故違制命如此伏願皇上獨斷乾剛急頒渙號通行各該衙門今後如有希求請託故違制命者務要嚴加懲治以杜将來等因具題該本部議擬覆奏節該奉聖㫖是欽此又經通行欽遵去後今該前因看得國師領占竹先因進貢來京欽留大慈恩寺住坐累陞至法王名號濫叨恩賞實為第一伏遇皇上御極之初因其罪惡深重節該科道官糾劾本部議擬覆奏已經奉有欽依悉宥其罪從輕降革職事𤼵遣原寺住坐中外臣民莫不稱快今欲行取來京本部查無行取畨僧國師事例必須創始而行事有未便且四川布政司離京窵逺動經萬里之程使其陸路而來則經由陜西河南等布政司及北直𨽻順徳等府若從水路而來則經由湖廣江西山東等布政司及南直𨽻地方所至處轉相傳報必曰欽取國師至京驚駭耳目騷擾驛遞勢所必至况當時大慈恩等寺奉㫖并陸續奏留國師畨僧人等不下百十餘人未必自今遽乏領占竹一人之用而同時遣回四川陜西等處國師畨僧人等多至二百餘人倘或夤縁效尤乗機干進倖門復開殆難杜塞則於皇上初政之清明制命之嚴正不無少損誠非細故伏望皇上俯察愚誠暫寢新命将領占竹免令行取庶可絶小人覬覦之心示天下趨向之正實為便益臣等本以庸愚叨承任使偶有所見不敢緘黙縁係傳奉事理未敢擅便謹題請㫖申明舊例以正體統事徐瓊精膳清吏司案呈奉本部送准吏部咨該本部等衙門題吏科抄出太子少保禮部尚書徐等題節該本部題照得光禄寺之與本部太僕寺之與兵部各安體統罔有紛更今太常寺與二寺事體相同如䝉乞勅多官檢照諸司職掌并皇明祖訓及節次奏奉欽依事例逐一會議明白奏請定奪以定上下之分以塞紛更之心等因題奉聖㫖是著多官公同會議明白來説欽此欽遵太師兼太子太師英國公張等太子太傅吏部尚書屠等會議覆奏間又於禮科抄出太常寺卿崔志端等題為不遵舊例故違祖宗成法事節該乞賜御覽祖訓條章諸司職掌并本寺洪武永樂年間以來舊例及節次奉聖㫖便見明白等因題奉聖㫖著多官一併議了來説欽此欽遵臣等查得本部一應題奉欽依多官會議俱係本部為首承行今太常寺又題奉欽依著多官一併議了來説欽此欽遵會官併議縁所議事理係本部要正體統難以為首承行照得吏部係各衙門之長合無吏部為首承行會議惟復别衙門為首等因具題奉聖㫖著吏部承行會議欽此欽遵隨准禮部咨該本部題精膳清吏司案呈奉本部送於禮科抄出太常寺卿崔志端等題為告補㕑役事據本寺㕑役餘丁曹原等告係直𨽻保定等府易州等州縣民籍各告父兄曹軏等充當本寺㕑役𢎞治十一年等年月日不等病故身等俱各係在營生長親男弟姪自幼習學㕑役一向應當餘丁差使告要頂補等因行間又據㕑役董鑑吿稱年老力弱兩目昏花及患暗風等病不堪應役思得在營生長親男弟婿董剛等俱各年力少壯應當餘丁差使曾學㕑業堪替前役告乞替補及㕑役魏普兒告稱無丁替補乞要照例放回另行僉補等因各告到寺行據㕑役甲首孟惠等結勘相同在卷查得洪武年間以來舊例本寺㕑役凡有逃亡隨即呈行禮部轉行提解及在營老疾無丁替補者俱該本寺查勘明白類呈該部将應補餘丁照例收𤼵送寺著役其無丁者行移該管官司另行僉補老疾原役正身俱送順天府給引照回為民其病故者在營有弟男婿姪替補俱該本寺查勘無碍徑自具奏收補近該本寺題先奉禮部劄付為㕑役不敷差撥事要将本寺㕑役造冊送部等因本寺查無造冊事例及㕑役替役自洪武年間事例具題奉聖㫖禮部查看了來説欽此欽遵隨該禮部查看覆奏奉聖㫖照洪武年間例行欽此欽遵續該禮部劄付朦朧行寺開要造冊又該本寺查無造冊事例及查替補㕑役一節洪武年間以來俱係本寺替役縁由通行具題奉聖㫖遵舊例行該衙門知道欽此欽遵今照前項㕑役除逃亡提解老疾給引放回有丁替補無丁替等項合照舊例另行外所據病故㕑役餘丁曹原等告要頂補一節今既遵奉欽依只遵舊例行欲便照例收補令其著役當差未敢擅便開坐等因題奉聖㫖禮部知道欽此欽遵抄出送司看得計開項下㕑役蔡方開係山東兖州府東平州文昌縣蔡原男查得本府州所屬止有汶上縣并無文昌縣通行案呈看得替補㕑役係各人告送本部轉行該寺查勘明白具結連人送部具題方纔替補係是舊例今本寺因見先次題奉欽依造冊重覆辨奏輒便朦朧奏要徑自替補中間如蔡方縣分不明難保無弊况造冊未報無憑查對有碍覆奏案候間續奉本部送據太常寺呈為遵復舊例恪守祖宗成法事奉禮部劄付該本寺題前事備劄本司查照先今節奉欽依事理将本部先次題准行移本寺開造見在并逃故等項㕑役文冊作急送部以憑清查填註格眼施行等因奉此案查先奉本部劄付為㕑役不敷差撥事備行本寺要将見在并逃故虧折等項㕑役造冊送部等因本寺查得洪武年間以來並無造冊事例題奉聖㫖禮部查看了來説欽此欽遵續該禮部查照先年本部自造膳部文冊作㕑役文冊之例覆奏奉聖㫖只遵舊例行該衙門知道欽此欽遵今劄前因切惟㕑役文冊洪武年間以來已查無事例先奉欽依照洪武年間例行則冊之不造已昭然著明貴部劄付前來要行造冊本寺只得查照舊例上請又奉欽依只遵舊例行仰思聖意顯明如日麗中天人所共知矣貴部又劄付造冊禮樂制度朝廷制命一出臣民遵守之不遑况造冊一事固非大典禮亦非大制度上無益於國體下無利於生民無非該司假此以資其權勢耳今朝廷制命一則曰照洪武年間例行二則曰只遵舊例行皆光明正大之體即監於先王成憲之意為臣子者尤當遵守而弗失者也貴部節次劄付既備聖㫖於先又贅造冊之意於後不知欲本寺遵奉朝廷命令乎貴部命令乎欲便執奏但聖㫖昭然明白有識者之所共知若又假為不知上請則是先懐欺罔之心雖聖明寛大不遽加罪為臣子者豈可先懐此心術昔人謂有寧負公門而不敢負私室者本寺衙門卑小止知遵奉朝廷命令而不敢曲從權要也所據造冊一事既遵奉欽依只遵舊例行則本寺舊無造冊事例亦無舊例以為式様難以造報及照本寺病故㕑役先年舊例俱係本寺查勘無碍徑自具奏收補近遵奉聖㫖只遵舊例行隨該故㕑餘丁曹原等告要照例頂補父兄曹軓等名役行據各該㕑役甲首查勘無碍已經查照舊例於𢎞治十二年六月二十五日通行具題次日奉聖㫖禮部知道欽此欽遵今案候日久未䝉行寺即今陵寢并社稷山川先師孔子等項祭祀數多㕑役數少差撥不敷若又遷延日久未免覆奏恐致煩凟聖聰况病故㕑役替役初非大權本寺亦非敢僭越但舊例行之年久今既遵奉欽依只舊例行本寺若只具呈貴部奏替則是本寺只遵貴部不遵朝廷也為此通行呈報煩請查照施行等因備呈到部送司行間又奉本部送於禮科抄出太常寺卿崔志端等題為告補㕑役事據本寺㕑役餘丁曹原等告有父兄曹軓等充當本寺㕑役病故原等具告照例頂補經今日久貧難無以度日守候艱難乞為查照施行等因案照先為前事該寺題奉聖㫖只遵舊例行該衙門知道欽此欽遵今告前因委的各役守候艱難抑且本寺即今社稷先師孔子山川等壇祭祀數多見在㕑役數少差撥不敷及查得景泰天順成化等年病故㕑役李寛等弟男婿姪李友等各告替役節該本寺查無違碍具題俱奉聖㫖是欽此欽遵今既遵奉欽依只遵舊例行欲便将前項病故㕑役餘丁曹原等照前例徑自收役庶免久候人難不致缺人供祀等因題聖㫖是禮部知道欽此欽遵抄出送司案查先該本部題為㕑役不敷撥差事節該行令該寺将見在各㕑的確姓名鄉貫并先年原僉在後解補或替役日期備細縁由限一月以裡送部同逃故虧折等項㕑役本部設置格眼簿候有逃故等項僉補㕑役者頂名書填等因題奉聖㫖是欽此欽遵備劄該寺照依本部題奉欽依内事理即将該寺見在食糧并逃故虧折等項㕑役類造送部以憑填註施行續據該寺題為遵復舊例恪守祖宗成法事節開諸司職掌並不曾開太常寺㕑役在禮部統屬之下伏覩皇明祖訓内開罷丞相設五府六部都察院通政司大理寺等衙門分理天下庶務彼此頡頏不敢相壓事皆朝廷總之所以穏當欽此欽遵祖訓中間所謂等衙門者即是在京三品衙門與六部不相壓亦不曾開太常寺是禮部統屬及查洪武永樂洪熙宣徳正統景泰天順成化以來百餘年本司止是将逃故㕑役呈行僉補並無造冊送部之例乞勅該部查照洪武永樂年間以來有無造冊事例等因題奉聖㫖禮部查看了來説欽此欽遵本部檢照諸司職掌禮部所屬衙門儀禮司行人司鑄印局教坊司膳部項下俸給一條備開太常寺等衙門及查有洪武十六年間欽依造報職掌文冊内開太常寺㕑役四百一十名光禄寺㕑役三千四百六十九名太常寺職専供祀㕑役乃祭祀中一事耳彼時已奉欽依造報文冊設若不應職掌孰敢造報則是祖宗以來職掌已定昭然可見伏覩皇明祖訓内開不敢相壓乃謂罷丞相設五府六部都察院通政司大理寺等衙門彼此各守其職各行其事不敢相壓而言若謂在京三品衙門盡與六部事不相壓如太僕寺亦係在京三品衙門今屬兵部且該寺所行如祭祀牲口等物及樂舞生并一應㕑役不敢自出勘合行移各該司府州縣僉補俱開呈本部定奪轉𤼵施行上下統屬事體不紊聖祖良法美意萬世遵行而不可易邇者該司呈稱㕑役不敷差撥内開積年逃故虧折等項乞轉行僉補本部為照各㕑役查無冊籍無從清查解補案候間續該南京太常寺奏要清查兩京太常寺㕑役照例具題類行各該司府州縣各照名僉解仍行令該司将逃故虧折并見在各㕑姓名鄉貫僉補替役備細縁由依限造冊送部設置格眼簿類填格眼候有逃故等項頂名書填以便清查已經奉有欽依有案可查該寺不行遵奉欽依造冊輒引諸司職掌皇明祖訓并景泰年間本寺自行奏准照洪武永樂年間事例行事掩飾辨奏縁彼時本寺奏准之後本部又經據例覆奏奉景皇帝欽依只依洪武年間由禮部行不許徑行有失體統欽此欽遵今該寺故意隠匿本部前項覆奏節奉欽依禮部行一節朦朧奏擾意在沮住造冊幸免查出本寺宿弊懐奸亂政莫此為甚且景泰年間本部尚書胡濙係洪武年間人厯任年久備知洪武年間事例設若不應職掌彼時覆奏豈敢稱洪武永樂年間㕑役由本部定奪欽諭只遵舊例此大例也𢎞治七年本部因見該寺病故餘丁仍前徑自替補查照前項節該奏准由禮部行事例具題奉欽依是欽此欽遵此正欲監於成憲之意該寺乃謂祖宗成法難以輕變欲查洪武永樂年間以來有無造冊事例不思洪武二十六年間欽依造報膳部職掌文冊則造冊已自有例近年以來㕑役日漸增多照例造冊正欲闗防奸弊該寺百端朦朧掩飾隠匿欺罔沮抑成命不行依限造冊送部詳其本意蓋縁本寺多有在京殷實之家要得躱避重差夤縁謀當或有過犯殘疾之人貪圖月糧并軍匠應繼兒男各處來厯不明之人假作義男女婿展轉替補又有虚掛名姓専一辦納月錢經年累嵗不行供視公然在外游蕩比外又有假揑餘丁名色濫收精壯之人覔利肥已似兹情弊多端正為無冊可以查考得以朦朧自由一旦造冊送部類填格眼有可查考再難作弊伏望皇上奮乾剛之斷昭日月之明将崔志端并本寺僉書官吏挐送法司明正其罪以為朦朧掩飾隠匿欺罔沮抑成命者之戒等因覆題奉聖㫖照洪武年間例行欽此欽遵已經劄仰該寺照依本部題奉欽依内事理即照洪武二十六年間欽依造報膳部職掌文冊事例将先次題准行移本寺開造見在并逃故等項㕑役文冊作急造送本部以憑清查填註格眼施行隨又抄據該寺題查照先年病故㕑役餘丁楊泰等雖係喪服縁本寺㕑役中間但有父母在於原籍病故本部行文照勘是實照路途逺近定限期順天府給引回還奔喪限半年或十箇月仍送本寺著役正與病故㕑役事體相同乞勅本部仍照舊例頂補及洪武二十六年奉欽依造報膳部職掌文冊是該部自行造冊非是本寺造冊今禮部奏奉欽依洪武年間例行就便劄仰本寺将先次題准㕑役文冊作急造送臣等不知朝廷㫖意何在伏望聖明明示剛斷等因題奉聖㫖只遵舊例行該衙門知道欽此欽遵本部查得洪武二十六年間欽依造報膳部職掌文冊正係舊例又經劄仰該寺查照先今節奉欽依事例将本部先次題准行移本寺開造見在并逃故等項㕑役文冊作急造送本部以憑清查填註格眼施行去後并查得節准刑部山東等清吏司手本開送犯人黄福智鄭瓚劉鉞并自首逃㕑郭清各送到寺查無鄉貫來厯及先次奏行造冊未報難以轉行發遣俱呈堂案候外又查得𢎞治十一年五月内為乞恩認罪檢舉事節該太常寺題本部覆題崔志端等繆典祀儀罔諳法律以虚費糧米為小節以多收㕑役為常事因循積累以致重役數多亦合有罪等因題奉聖㫖是崔志端多收㕑役本當究問既認罪檢舉并林㫤等且都饒這遭欽此欽遵案呈到部看得太常寺奏稱㕑役除逃亡提解老疾給引放回有丁替補無丁行僉等項合照舊例另行所據病故㕑役餘丁曹原等告要頂補欲便照例收補令其著役當差并續奏稱欲便将前項病故㕑役餘丁曹原等照前例徑自收役縁查有景泰七年本部題奉欽依只依洪武年間由禮部行不許徑行有失體統及𢎞治七年題奉欽依事例難徑自行收補止該各人先赴通政司告送本部轉行該寺查勘無碍具結連人送部以憑奏請施行且㕑役一事逃亡提解等項俱由本部施行獨病故㕑役餘丁不由本部縱有扶揑義男女婿及濫收等項情弊事不歸一何由稽考以後脱或敗露責将誰歸縁該寺止因本部題奉欽依将㕑役造冊送部類填格眼以便清查未審該寺有何規避不肯造報重復辨奏反将本部奏行替役舊例具奏紛更切詳本部前項題奉欽依照洪武年間例行并該寺自行奏奉欽依只照遵舊例行正與景泰七年節該題奉欽依只依洪武年間由禮部行并𢎞治七年奏奉欽依是事理相同况該寺所引楊太等替補事例縁彼時本部以各役係喪服之人有碍供祀照例轉𤼵光禄寺當差另行原籍僉補比時止為各役雖有喪服縁係慣熟㕑丁發去他處另行僉補不惟㕑業生疎臨事有悞奏行本部仍照舊例替補即非該寺徑自收補不知該寺何所取義認為舊例就便違例受狀重復朦朧奏請務必勝以濟已私及先次奏稱不係本部統屬近日呈稱貴部及煩等字行移不惟蔑尊卑之名分抑且違朝廷之舊章照得光禄寺之於本部太僕寺之於兵部各安體統罔有紛更今太常寺與二寺事體相同似兹紛更關係不細况本内替補㕑役揑寫不明縣分情弊顯然本當逐一叅究縁係上下體統自有定分若與一般較計似乎各執一詞互相訐奏恐傷大體如䝉乞勅多官檢㸃諸司職掌并皇明祖訓及節次奏奉欽依事例逐一會議明白奏請定奪以定上下之分以塞紛更之心則事例歸一體統不失等因題奉聖㫖著多官公同會議明白來説欽此欽遵公同會議覆奏間又於禮科抄出太常寺卿崔志端等題為不遵舊例故違祖宗成法事節該本寺題奉禮部劄付為㕑役不敷差撥事開要本寺㕑役造冊送部本寺查無造冊事例及病故㕑役替補舊例自洪武年間以來俱係本寺徑行及檢㸃諸司職掌本寺亦非禮部統屬縁由題奉聖㫖禮部查看了來説欽此欽遵續該禮部查看覆奏奉聖㫖照洪武年間例行欽此欽遵隨奉禮部劄付又開造冊本寺又查洪武永樂洪熙宣徳正統景泰天順成化等年並無造冊送部及病故㕑役替補舊例自洪武永樂年間以來本寺徑自收補循行至𢎞治七年十二月内禮部朦朧奏行該部定奪縁由通行題奉聖㫖只遵舊例行該衙門知道欽此欽遵隨據故㕑餘丁曹原等告要照例頂補等因本寺查遵舊例收補題奉聖㫖禮部知道欽此欽遵案候間又據曹原等告稱守候日久艱難等因本寺查照景泰天順成化等年節該本寺徑自收補縁由題奉聖㫖是禮部知道欽此欽遵仰惟陛下每事率由舊章不樂更改是以於臣累奏輒賜允可比見陛下敬天法祖之聖心也而禮部官員忿其言之不行不肯樂從故違聖斷又将前情朦朧奏請多官會議奉聖㫖是著多官公同會議明白來説欽此欽遵切思臣等蹤跡寒微孤立少援每有所行動輒掣肘賴陛下明見憫臣孤立每事不許更改止欲遵舊例此非有私於臣實所以恪遵乎祖宗成法也奈何郎中翁健之執小忿而不解逞私意而妄為悵恨於坐臥之頃哀求於權勢之門乃假衆論以救其既往之失又驕同志以矜其能事之名似兹淺陋曷有逺圖其言光禄寺之於禮部太僕寺之於兵部各安體統罔有紛更太常寺與二寺事體相同似以本寺與二寺同為屬官也且祖宗設太常寺以奉天地神明其來逺矣肇於有虞之秩宗與四岳九官十二牧均列為二十二人未聞其有所統屬也傳又云國之大事在祀與戎戎即兵部所専祀即本寺所司是也太常既與兵部為伍則其秩難與光禄太僕二寺等明矣是以太祖髙皇帝有見於此故於皇明祖訓諸司職掌二書未嘗明言本寺為禮部所屬雖至㕑役末節亦不曾開註本寺與光禄寺同屬禮部則其大意已可見矣且光禄寺於精膳司事體相同謂之禮部所屬似矣而本寺職専供祀所交者不過僉㸃㕑役一事而已若以此而遂謂之屬則本寺官員皆選於吏部則為吏部屬官矣錢糧皆出於户部則為户部屬官矣夫奚可哉以此為言似亦不思之甚也且本寺㕑役有過犯者方責送光禄寺當差而官員有過犯者俱不得充本寺執事則本寺之於光禄寺自不同矣兵部為大司馬而太僕所掌者馬政也事必呈部而後敢行謂之兵部所屬似矣而本寺職掌祀事未聞其每事必由於禮部也縱以為有相關則於祠祭近之而於精膳則亦未之聞也二者之不可並論蓋彰彰矣豈可遽謂其統屬而責諸行移字様之間乎且㕑役之替補非有大權柄也不過遵守舊例而已本寺自洪武永樂年間循行至今無所更改直至𢎞治七年十二月内始被禮部朦朧奏奪當時本寺官員失於查例分辨遂為所竊𢎞治十二年二月内禮部又奏要本寺将㕑役造冊送部本寺備查洪武年間以來並無造冊送部事例俱䝉聖斷通照舊例施行已訖而郎中翁健之狡愎自用不遵聖斷復欲借重於多官之口以讋服臣等正恐多官不知本寺舊行事例不肯詳玩祖訓職掌諸書而聴信翁健之一偏之詞以為持扶斯文行事則臣等孤寡無援東侵西侮将不能自立矣古人所謂如立矮屋之下不敢擡頭者即此時也伏望陛下憫臣衙門卑小無人扶持乞賜御覽祖訓條章諸司職掌并行查本寺洪武永樂年間以來舊例及節次奉聖㫖便見明白便知奸臣紛更之由臣等不勝感戴天恩之至等因題奉聖㫖著多官一併議了來説欽此欽遵又查得先於禮科抄出户科給事中叢蘭題臣惟率由舊章詩有明訓監於成憲書有格言自古創業之君建置沿革立為成規繼世君臣必遵守之而不敢率易更改者良有以也仰惟我祖宗聰明睿知聖神文武以精神心術之藴立為當代典章法度至精至備盡善盡美誠萬世不易之常道也我列聖及我皇上凡於萬幾之至無巨無細一一遵祖宗成法為重中外臣工凡於分理之務無大無小一一遵祖宗成法為準以故百餘年來上下分定法制昭明而措宗社泰山磐石者皆賴此以維持之也切照太常寺卿崔志端等生逢明時濫膺重任正當安分效職潔已奉公小心翼翼遵守成法之不暇可也却乃不畏國法不恤人言大肆奸謀輒為變亂逞一已出位之私意壊百年祖宗之成法執稱本寺不係禮部統屬屢次奏辨期於必遂夫我朝廷立衙門惟六部都察院通政司大理寺各分一職不相統屬而太常寺光禄寺之屬禮部太僕寺之屬兵部自國初至今行移往來名分一定非獨縉紳士夫知之而庸人孺子亦無不知何崔志端等立朝不為不久居官不為不深而獨不知哉所以辨論不已者何耶正以崔志端發身道流穢行彰聞累經彈劾未䝉罷黜遂揚揚自得罔知止足乃敢愈無忌憚忍為欺罔直欲攀援六部頡頏九卿小人得志一至於此其餘僚佐又皆依阿朋比釀成此舉物議雖多莫如誰何且以見行事例觀之朝廷每大事會議止該六部都察院通政司大理寺未聞有太常寺也吏部每遇分撥進士止該六部都察院通政司大理寺亦未聞有太常寺也今欲與九卿衙門齊得乎見本寺乃祠部中之一事與光禄寺為膳部之一事太僕為駕部之一事相同但以此三事乃事之大者所以又設此三等衙門以専之耳今太僕寺既屬兵部光禄寺既屬禮部矣獨太常寺與禮部齊等可乎崔志端等乃謂本寺與光禄寺太僕寺事體不同不係禮部統屬悖謬妄誕莫甚於此夫祖宗之建立衙門一皆奉若天道者也上下相承體統不紊行之萬世而無弊崔志端何人乃欲紛更而變亂之以快已私此事忍為則何事而不可忍哉况本寺衙門凡祀天地祖宗及社稷先師孔子合行儀物皆其所司以此觀之求其盡心職務精誠感格萬無是理也以故頻年以來災異送見雖宫闈闕里亦所不免揆厥所由謂非此輩不職之所致而何哉伏望皇上奮乾剛之獨斷昭天討之至公将崔志端等挐送法司明正典刑以為将來變亂成法者之戒仍乞另選賢能以補前任庶可以慰祖宗在天之靈絶臣子僭越之分而感格之妙災異之息皆係於此等因題奉聖㫖是該衙門知道欽此欽遵看得所奏事情與前會議相連備由連卷移咨前去煩照本部題奉欽依内事理欽遵施行又准都察院咨准禮部咨該户科給事中叢蘭題前事移咨查照等因臣等會同後軍都督府等衙門掌府事太師兼太子太師英國公等官張懋等看得禮部太常寺節次題奏事情大略有三一件㕑役造冊一件㕑餘補役一件衙門體統臣等查照洪武等年間事例叅詳諸司職掌諸書公同議得前二件本寺明知禮部節奉皇上聖㫖自合遵依施行不合故違後一件明知本寺事務原屬禮部不合妄奏所以户科給事中叢蘭劾奏本寺卿崔志端愈無忌憚忍為欺罔直欲攀援六部頡頏九卿其餘僚佐又皆依阿朋比釀成此舉要将崔志端等挐送法司明正典刑以為将來變亂成法者之戒乞另選賢能以補前任等因不為無見合行都察院行提崔志端少卿馬宗逺黄寶寺丞趙繼宗王甫廣周序鄭常容并查提首領官吏問擬如律首領官吏先行發落崔志端等通行奏請定奪縁崔志端等係在京堂上官及京官并奉欽依是著多官公同會議明白來説著多官一併議了來説該衙門知道事理未敢擅便開坐𢎞治十二年九月初三日本部等衙門太子太傅尚書等官屠等具題本月十一日奉聖㫖是崔志端等并首領官吏本當究問且都饒這遭會計錢糧以足國裕民事韓文精膳清吏司案呈准祠祭清吏司副奉本部連送該本司案呈奉本部送准户部咨該本部會官題河南清吏司案呈准山東等清吏司副照得𢎞治十五年四月以來節該河南等處鎮巡等官奏稱各該地方被水旱災傷河南六十七州縣衛所山東二十三州縣衛所山西二十三州縣衛所湖廣四十四州縣衛所陜西一十五州縣衛所江西一十三州縣衛所南直𨽻五十九州縣衛所北直𨽻二十四州縣衛所各要将夏税秋糧減免等因查得本部每年會計天下司府州縣税糧存留一千一百七十六萬四千八百六十五石零起運一千五百三萬四千四百七十六石零馬草存留四百萬二千五百六十四束起運二千一百八十五萬二千七百四十八束絹二十七萬八千二百八十七疋布五十七萬六百三十七疋花絨三十七萬四千九百三十五斤十二兩户口食鹽鈔存留七千三百五十二萬三千三百七十九貫零起運四千四百七十九貫零鈔關船料鈔大約二千七百一十九萬三千六百一十一貫各運司額辦鹽課一百九十五萬四千三百五十五引屯糧大約三百七十七萬六千二百九十三石零及於本部遞年支運過錢糧并各處嵗支卷冊内查得近年起運京邊并存留本處錢糧有遇事故停減而嵗入不及原額者有逐年加添而嵗支過於原額者至有一嵗所入不足以供一嵗支用者今以停減者言之如漕運米四百萬石除天津薊州嵗取三十萬石京通二倉嵗收三百七十萬石每嵗該放支三百三十八萬石成化二十一年因腹裡地方災傷并延綏等處急缺邊儲将額内米摘撥糶賣減米二百二十五萬石𢎞治七年又因張秋河决於臨清倉寄收米八十九萬石𢎞治十二年因運船遲悞於徳州天津倉寄收米四十萬石如河南山東山西起運京邊糧料嵗有定額𢎞治八年因各地方被有災傷等項山東少起八千九十八石河南少起三萬八千三十九石山西少起一十三萬七千二百石又如内府供應庫内官監光禄寺酒醋麪局嵗收粳糯米共一十三萬四百五十石僅勾支用𢎞治十五年因詔書蠲免二分減米五千二百一十三石旋告不足而復徵補此則停減之大略也以加添者言之軍官折俸銀景泰六年一季支一萬三千三十餘兩𢎞治十四年一嵗支一十三萬九千九十餘兩多銀一十二萬七千兩軍士冬衣布成化十三年支一十九萬六千八百餘疋𢎞治十四年支二十三萬三百餘疋多布三萬三千四百五十七疋錦衣衛官軍月糧成化五年一月支二萬六千九百餘石𢎞治十五年一月則支四萬五千六百餘石多糧一萬八千餘石武驤右衛勇士月糧成化八年一月支一千五百九十餘石𢎞治十五年一月則支三千一百五十石多糧一千五百六十石象馬等房料豆𢎞治四年一嵗支二十三萬九千四百餘石𢎞治十四年一嵗則支二十九萬六百餘石多料五萬一千二百石草束𢎞治四年一嵗支七百六十一萬五百二十八束𢎞治十四年一嵗則支九百四萬五千四百一十六束多草一百一萬九千八百六十三束他如外承運庫𢎞治十四年收絹二十七萬八千二百八十七疋當年放支三十一萬二千三百七十二疋多支絹三萬四千七十五疋又如内承運庫先年進納金兩止備成造金冊支用銀兩止備軍官折俸及兵荒支給近年累稱不足金兩将税糧折納及於京市買過金八千三百八十六兩有零太倉銀五次共取八百九十五萬兩甚至又将河西務鈔關船料等項改擬折銀進納光禄寺先年會派㕑料牲口等項各有定數俱勾一年供用近來數次借過太倉銀十萬三千四百三十四兩又如各邊先年除原派糧草之外每嵗該送銀四十八萬兩自𢎞治十三年用兵以來大同宣府延綏等處類解過銀四百二十三萬二百餘兩開中過鹽六百六十一萬三千一百餘引茶九百萬斤舉行納官叅吏等項事例三十餘件又如各運司嵗辦鹽課先年止備兵荒之用並無王府支領食鹽價銀并織造借補鹽價之費近日各王府共支食鹽價銀每年該一萬一千二百八十兩織造支過鹽六萬引銀六萬兩此則加添之大略也此皆在内者以在外者言之如河南布政司每嵗存留税糧共一百萬七千二百四十餘石本處各衙門并各王府嵗支共一百一十六萬五千二百九十餘石比原額少糧一十四萬餘石山西布政司每嵗存留税糧一百五十萬一千四百七十二石本處各衙門并各王府嵗支共一百七十九萬八千七百六十六石比原額少糧二十九萬餘石雖各有折色數亦不多以致湖廣等處大率類此但冊文不備卒難查考是官用已不足矣此皆在官者以在民者言之如山東河南北直𨽻起解各邊折色税糧先年榆林每石不過二錢五分宣府不過八錢五分近年邊方多事改徵本色每石用銀一兩五六錢者有之一兩八九錢者有之似此徵輸十分偏重又如各處空閑地土先年許民開種幫貼糧差近年節被各王府及勲戚之家奏討為業有至千餘頃者有至萬餘頃者似此侵求十分太多又如内府供用等庫速香黄蠟每年起解各有定額近因縻費浩繁廣東添買速香四萬五千斤各司府添派黄蠟一十一萬斤順天府又買速香三千斤黄蠟八萬斤是民財已耗盡矣夫常入之賦或以停減而不足常用之數又以加添而過多則知在内在外一嵗所入俱不足以供一嵗所出况今天下災傷叠見供餉頻繁若不早為處置誠恐将來悞事非細理合呈乞施行等因案呈到部除災傷行移巡按等官勘報至日另行外臣等切惟因地制賦迺立國之大經量入為出實理財之要道故禹貢承六府之修而分土作貢成周以九賦斂財賄必九式均節之降是而後若漢唐盛世或度官量吏以賦民租或計丁授田以立租調是皆能推本末之義以適斂散之宜者也洪惟我太祖髙皇帝混一海宇疆理之盛逺過前代貢賦之制取準哲王不可尚已然洪武年間建都金陵當時供給之大南京為重各邊次之自永樂以來定蹕燕都其後供給之大京師為重南京次之而各邊又次之然洪武年間供給南京止於湖廣江西浙江應天寧國太平及蘇松常鎮等處而已供給各邊止於山西陜西及河南山東北直𨽻等處而已今天下司府州除陜西山西雲南貴州廣東廣西福建四川八布政司隆慶保安二州錢糧俱本處存留起運邊方備用内福建廣東止有起運京庫折糧銀兩一項其湖廣江西浙江及蘇松常鎮廬鳳淮揚供南京又供京師北直𨽻河南山東既供京師又供各邊則是前項五布政司兩直𨽻地方昔之供億者一而今之供億者二昔之常賦甚簡而今之常賦甚繁然不特常賦之繁而已正統以前國家費用減省故百輸納皆不出常額之外自景泰至今國家供用日盛科需日增有司應上之求不得已往往於額外加徵派納如河南山東等處之添納邊糧浙江雲廣等處之添買香蠟金兩皆先年所無者由是觀之則知今日國用之急民力之窮誠為可憂也雖然所可憂者不過據已往之用計近日之費耳若計近日以逆将來之費又有可憂者焉何則往者時嵗豐登運河易達邊方無調𤼵之久州縣無流徒之多有司得以藉先年之積制一嵗之用或徙有以均無或用豐而補敗猶之可也今太倉無數年之積而冗食者加於前内帑缺見年之用而給費者日伺於後征需已極而郡縣旱潦之不時輸送已窮而邊方請給之不已顧後瞻前朝不謀夕萬一他日河流少止漕運遲悞邊郡有警軍餉空虚則京儲求嵗入三百七十萬之數固難猝至邊餉須四百萬兩之銀亦難遽集不幸復加數千里之水旱通行賑貸連十數萬之軍旅皆欲餉給是時欲賦之民而民困已極欲借之官而官帑已虚不知又将何所取給哉所謂又有可憂者正以此也臣等猥以菲才叨司國計今天下倉庫處處空虚軍民在在疲憊晝夜思維䇿無所施伏望皇上憫天下民物凋弊之餘念國家財賦需用之急須先事以預圖斯有備而無患如䝉乞勅五府六部都察院通政司大理寺堂上官并科道掌印官公同計議京通糧儲支費日增如何節之使不濫費大倉庫銀虧損日滋如何制之使得充實内庫告乏累取天下銀兩以實之然隨實隨虚何以得常實而緩急之不悞㕑料缺用屢借别項銀以給之然隨給隨缺何以得減省而民困之少甦各邊軍儲如何調度使小民免征輸之苦各運司鹽課如何撙節使邊警得倉卒之用禄米莊田如何處置可以應無已之求馬房草料如何經畫可以省無窮之費速香黄蠟以何年為中制可行而不濫取布疋收受以何例為准則可守而不害民河南山西存留糧之短少何以補助湖廣等處存留糧之足否何以查處以致天下災傷蠲免税糧又何以處分使有恤民之實通行議處停當開立條件奏請定奪施行如此庶於聖政有補而天下蒼生咸被其澤矣等因𢎞治十五年十月二十日本部尚書佀等具題本月二十二日奉聖㫖是你每公同議處停當來説欽此欽遵會同後軍都督府掌府事太師兼太子太師英國公臣張少傅兼太子太傅吏部尚書馬等會同将前項事件逐一議擬開列條欵於後伏望皇上憫天下民窮財盡之極體祖宗節用愛人之心少留睿覽斷自宸衷俯賜施行臣工胥慶此外凡供應興造之浩繁量為減省近臣貴戚之賞賚少加撙節如此庶幾存一分國有一分之益寛一分民受一分之賜而於邦計亦大有所賴矣臣等不勝悃懇之至縁係會計錢糧以足國裕民及節奉欽依你每公同議處停當來説事理未敢擅便開坐𢎞治十五年十月十三日具題𢎞治十六年四月十一日奉聖㫖卿等所議事宜深切時弊重京儲另有㫖發落省供應均禁例已有㫖行了清鹽法戒掊克再議來説其餘都准議行欽此欽遵擬合通行為此除外合就備由開坐移咨前去煩照本部會議題奉欽依内事理欽遵施行等因送司案呈到部擬合通行為此所據慎庫藏并實内帑二事係𨽻儀制精膳二清吏司掌行合就連送仰付各司照該部會議題奉欽依内事理欽遵施行等因連送到司合付前去煩為徑自施行計開一慎庫藏查得太倉銀庫先年收貯鹽價折草等項銀兩不下三二百萬兩専一備預兵荒𦂳急及各營聴征馬匹草價各衛軍士冬衣布疋折銀支用𢎞治三年以來禮部急缺牲口工部計取物料共借過一十四萬二千七百五十四兩有零雖經户部奏取奉有欽依著令照數補還至今未見分毫送部奏准将各處拖欠并鈔關折銀補還太倉括銖計兩能有幾何又因陜西大同各邊警急節次支解即今在庫銀兩不過八十餘萬兩而已蓋以先之數計之借取者已至過半而見在者乃不及三分之一庫藏空虚莫此為甚臣等公同計得太倉銀兩専備𦂳急兵荒等項支用委的不宜别項花銷若使平居不能收蓄倉卒何所仰賴况今各處災傷迭見邊方烽火頻仍若不預為處置以備将來誠有不繼深為可憂伏望皇上軫念庫藏之空虚深思國計之重大痛加撙節不宜濫費仍乞斷自宸衷著為定例今後太倉銀兩若非兵荒等項𦂳急乞免取進内庫别項支用其禮工二部借過之數著令照數補還以後分毫不許再借違者聴該部該科論奏如此庶庫藏可充兵荒有賴矣邊情疏主客清吏司案呈嘉靖十一年十一月該陜西行都司都指揮同知徐威等起送土魯畨并天方國等地面蘇勒坦莽蘇爾等差來各使瑪哈穆特和爾納温等赴京進貢該本部将各國使進到方物驗收及将各畨王求討事情俱經具題給賞外即令差官督𤼵各國起程查得今次土魯畨入關進貢共二百九十名天方國一百三十七名縁舊例各國入貢十人内准與起送一人其土魯畨等處來貢止許與哈密依時同來並不許過十人後為寛禁例以舒邊情事又准每十人起送二人其土魯畨天方國兩處先年赴京人數多不過二十餘人惟是今次到京人數倍多且開列地面王號動至數千以致求討之文不勝其繁不惟違越舊規抑亦非以小事大之體若不及今區處将來踵襲故常於賞賜則難於應付於體統則難以制馭恐非善後永久之圖等因案呈到部看得西域諸國載在會典惟是土魯畨天方國撒馬兒罕等乃其國號其稱王者亦止是一人前此求討畨文除國王外多者不過十餘紙大抵皆稱王母王弟王子頭項其餘部落地面類稱頭目名色惟是今次土魯畨開稱王號者七十五人天方國稱王號者二十七人不别孰為國主孰為部領今次勅書回賜之間若一槩具荅如其所稱則是所開地面皆是入貢之國而彼國亦無復君臣之辨矣此等事體大有關係廟堂之上宜有處分一以尊中國之體一以服逺人之心况其稱號名目既多則貢物雖微自當如例給賞求討相同自當逐項回荅且一次准許日後遂為成例将來不副其無厭之求則執詞啟釁未必不由於此宋人嵗幣之事蓋可鑒已所以富弼當國家事勢逼迫之時猶力争獻納二字古人慎重事體如此敵人豈得不畏我朝以堂堂一統國勢尊强非前代比况列聖相承神威聖武四夷震叠泰山之勢何所不壓而蕞爾小國乃或肆其狡詐槩稱王號僭凟天朝揆諸國無二主之義以小事大之道彼将何詞為此臣等議得今次回賜勅書除各國國王一人宜從本等稱號其餘恐未可類以王號回荅合無請聖裁勅下内閣輔臣從長議處撰勅一道𤼵明華夏君臣大義備述祖宗相待逺人恩威並用舊規丁寧天語示以畫一之令責付進貢夷使齎還本國宣示國王俾知遵守庶懐柔之道制馭之方各得其宜斯為聖王禦戎之上䇿矣臣等膚淺之見未知逺猷伏惟聖明裁擇縁係邉情事理未敢擅便謹題請㫖嘉靖十二年四月十三日具題本月十五日奉聖㫖依擬欽此裁革冗食節冗費奏禮部為缺乏銀兩庫藏空虚等事精膳清吏司案呈奉本部送准戸部咨該本部等衙門會題廣西清吏司案呈該戸部題先該欽差總督糧儲本部右侍郎陳又該欽差總提督京通等處倉場御馬等監太監蔡用等及兵科給事中徐忱各題前事該部議得財賦乃國儲之大計京師實天下之根本必倉廩實斯可以係天下之心府庫充乃可以備軍國之費我祖宗以來聖聖相承財用出入俱有定制支費雖繁蓄積有素以故隨取隨繼未見缺乏近年以來災異頻仍嵗入有限且頃因先帝上賔愈益多事軍餉接踵於邊陲而猶稱不足賚典大施於中外而尚有未周故一嵗之間用過銀兩将及五百萬之數又舊嵗冬季軍官俸銀尚未支給無從措辦不得已奏准将太倉餘米折放數萬石目今舉大婚禮合用金銀數多各衙門不時催促何所取給事之難為未有甚於此時者也故侍郎陳清太監蔡用給事中徐忱等交章論列夫豈無自而然哉臣等職司邦計日夜憂惶前此亦嘗懇詞上請會集廷臣預為計處雖曰施行全無實效中間用可節省者或拘於先朝之舊制財可取用者狃於貴近之難行事當權變者又制於見行之禁例甲可乙否迄無定論日削月朘致有今日臣等深維逺慮毛髮生寒反躬自罪寢食俱廢竊聞天地生財有定數不在官則在民取民有定制益於上必損於下兹欲法逺垂永固所不宜而因財致用未為不可伏望皇上憫財用匱乏之極念民生供億之難乞勅在京各衙門官員同攄忠悃共濟時艱凡有生財之道綜理之宜各悉所聞開具上陳候事下本部會同五府六部都察院通政司大理寺堂上官及六科十三道掌科掌道公同計議從區處何者在所當行而可以開財之源何者在所當革而可以節財之流何者在所當急必以義而斷之何者在所當緩必以理而裁之或事理可行者不必拘於禁例或公家可取者不必泥於成規逐一計處停當開奏上請施行如此庶幾集衆人之見而用其所長審經權之宜而期於濟變府庫因之而可充國計由之而自裕矣正徳元年四月十三日本部尚書韓等具題次日奉聖㫖是欽此欽遵隨該戸科都給事中張文等題為經制國用以救乏困事該户部題先該總督糧儲侍郎陳清太監蔡用給事中徐忱各奏太倉在庫銀兩蕩然一空略無蓄積合行措置等因該本部題奉欽依要行各衙門陳言以憑會官議處等因覆奏奉聖㫖是欽此欽遵隨該户部累行手本前來隨轉行外臣等待罪言路職掌户科當此時艱才乏經濟日夜慙懼無以塞責而該部催迫再三臣等敢復容黙查得先年各處救荒開行事例有生員納粟者有三考納粟者有軍職納粟者有罪人納粟者有中納鹽糧者有給度僧道者有採辦礦課者有借貸在京貴戚富室者各例行之雖足以濟一時之急然利至而害亦隨之所得不補所失我孝宗皇帝節行禁約蓋懼弊端之復啟而於治體有不便耳然豈惟我朝然哉古之人有行之者矣考之前史固班班可見也雖以朱元晦之在浙東其救荒糴粟也請吿身數百本乞度牒數百本彼豈不知名器不可假哉異端不可長哉衣以袽舟帶以炷燈國勢至此危急已極雖大賢君子亦無如之何也近日都御史楊一清等旁及納粟之例太監秦文等微開礦課之端給事中徐忱謂禁例不必拘户部成規不必泥雖不明言所以而其意各有在矣臣等惟我朝廷富有四海自祖宗來百五十年之積其帑藏充牣亘古莫及宜乎取之不窮用之不竭而一旦空乏遂至於取之州縣也而州縣困憊於民也而民窮財竭於鄰國也今天下一君四海一國孰吾鄰乎取之前各例也而又有言其便者有言其不便者甲可乙否言人人殊誰適從哉所以諸臣告乏非不切至朝廷命下近及一月而舉朝相顧悠悠曾何有一人言之耶夫總理財賦固户曹之職而經制國用均之為大臣宰相事也陛下固當内謀之諸老責之九卿今日何道可以生財何術可以經國考古今之成跡某人某人可法按近日之典章某事某事可行或博采陳言或兼收遺䇿俱要講求明白區畫停當雖意見各出不必雷同而事理重大所宜畫一且沃焦捧漏之勢緩則事必不及期以億萬之積不出數月之内庶供用有賴而倉卒不至無辦矣然生財尤莫先於節用近年冗食冗費積集至今固非一日自頃尤甚供億愈難陛下合無勅吏部查冗官兵部查冗兵工部查冗匠禮部查於光禄寺司禮監查於内府各監局查理各項冗費又命戸部約祖宗以來官兵吏匠及每嵗本部賦入之數酌取其中以為定制十以七為經費而儲其三以備山陜各邊兵荒非常此外如土木齋醮游賞宴樂貴戚近幸無名之賞不經之費悉從裁節不致妄用情由禮約費從事省期以數嵗積蓄有餘物力稍紓自然富强矣否則雖以泥沙為粟瓦礫為金物齊而用無節安得不乏古人有言國用盈虚在於節與不節不節雖盈必竭能節雖竭必盈此為至論伏乞聖明留意臣等又惟所貴乎大臣者在知之必能言言之必能盡幸能正言曷若盡言而淺言之姑以塞責則亦何足取哉切照尚書韓侍郎顧既知事理牽制本部難以専行當具其情上請以俟聖裁何乃姑持兩端之説非有一定之計紓徐於廟堂之議猥瑣於文字之末是欲揖讓以救焚象龍而致雨其心何心哉無乃只欲分謗而已耳及照九卿大臣義均休戚命下既久若罔聞知豈以此事不足言耶抑豈以經制國用各有司存不當與耶夫讓夷急病之義既昧於今則扶顛持危之忠安望於後所據各官俱難辭責合無各令回話惟復容其自新以後凡水旱盜賊兵民財利事干大計為大臣者不拘職司惟有見聞並得奏請不許推避如此庶大臣體國愛君之職盡而迷國誤朝之罪免矣等因題奉聖㫖這本所言經制國用重事户部便會同各官從長議處逐一開具明白來説欽此欽遵臣等會同五府六部都察院通政司大理寺堂上官及六科十三道掌科掌道官查理京庫銀兩以嵗入言之夏税共該五萬五百餘兩秋糧九十四萬四千八百餘兩馬草二十三萬七千餘兩鹽課折銀二十餘萬兩雲南閘辦三萬餘兩通計各項實該一百四十萬九百餘兩以嵗用言之宣府年例五萬兩大同五萬兩遼東一十五萬兩延綏三萬兩甘肅寧夏共六萬兩給散京衛官軍俸糧共三十三萬五千餘兩内府成造寶玩等項其數不得與知大約并前折俸銀不下五六十萬餘兩通計各項實該一百餘萬兩其間支剰馬草等銀節該本部題准俱送太倉收候以備邊方𦂳急支用不許别項支銷故太倉之積多者三四百餘萬少亦不下二百餘萬夫何近年以來前項額辦銀兩或災傷減免或小民拖欠或詔㫖蠲免嵗入既虧於原額而嵗用乃過於常數姑以近日言之宣府年例外運送過六十一萬餘兩大同年例外運送過七十七萬餘兩陜西各邊年例外運送過四十萬餘兩遼東預送過三十二萬四千餘兩蓋邊方𦂳急糧草缺乏鎮巡等宫例外奏討之數又征進京軍給賞過六萬九千六百餘兩在京官軍人等共用過銀七十二萬四千二百六十餘兩及各邊官軍共六十九萬三千三百二十兩又陜西賑濟銀二十萬密雲紫荆居庸倒馬關等處召買糧草銀共一十二萬八千餘兩買金進送内府二萬六千五百餘兩迄今舉大婚禮等項支用一嵗支間實用過四百餘萬兩通前年例将及五百餘萬兩是舊例嵗用之外又加至四倍餘矣帑藏何由而不空財用何由而不竭哉臣等竊聞滄海不能實漏巵鄧木不能供野火其勢使然也今值海内虚耗之日百姓愁苦之時加以兵荒之相仍供億之浩繁不經之費日甚於前奢靡之習漸長於昔而欲應變制用倉卒取盈豈不難哉臣等叨備任使受恩深重茍有分寸之補敢辭犬馬之勞但晝維夜籌計無所出将欲少徇乎人情又恐致傷於國體将欲取給於目前又恐貽患於将來或益少而損多或害重而利微展轉憂思如芒負背臣等所以不敢輕為之議者蓋以此也竊嘗上觀往古下迄唐宋逺揆先王之制近觀祖宗之法莫不以財貨量入為節以勤儉愛惜為本以侈靡妄費為戒蓋因生之有限用之無窮若不撙節於平日何以克濟於臨時然撙節之道未有不自君身始者伏望陛下念天命至重祖業至大民事至艱躬履儉約為天下先乞将臣等議擬條件留神覽察斷在必行庶乎轉嗇以為豐伸縮以為贏濟一時之用培萬年之基臣等下情不勝惓惓憂惕仰望之至除有禁例難行及各官另有條陳户部徑自覆奏外今将會議過事件逐一開坐上請定奪縁係缺乏銀兩庫藏空虚并經制國用以救乏困及奉欽依這本所言經制國用事重户部便會同多官從長議處逐一開具明白來説事理未敢擅便正徳元年五月二十二日本部等衙門尚書等官韓等具題本月二十五日奉聖㫖這本内所開事件都准議行近年支用縁何比前日漸增加多至數倍及各邊解送銀兩數多用過存留數目還都備細查究明白并其餘别有可行長䇿再議處來説欽此計開一裁革冗食查得近奉詔書并各衙門奏行事理已将冗濫官員軍匠通行裁革但其間裁革尚有未盡亦有已䝉裁革仍復夤縁希圖照舊管事者以致冗食如舊支費不經夫當此匱乏之時而不為裁革變通之計何以裕民生而足國用哉合無禮部将光禄寺遞年科徵雞鵝等項㕑料通行查革俱係不急之用盡用裁省一崇尚節儉臣等竊觀自古人君莫不以勤儉興國奢靡壊政漢文帝躬衣弋綈集皂囊為帷惜中人之産罷露臺之費以致海内殷富是其明驗邇者皇上體念民窮財竭風俗僭侈特勅文武百官不得僭用𤣥黄紫三色及軍民下賤不得衣羅緞紵絲三品以下暑月不得執扇用蓋中外聞之莫不懽欣稱頌以為陛下躬行儉約其效必肇於此矣蓋人君一身萬化之本君能自行則不令而從君不能自行則雖令不從臣等伏望皇上念祖宗創業之難憂國用匱乏之極守恭履儉崇尚節約一銀一錢之微皆為小民之脂膏一衣一帛之細皆係庫藏之官物省無益之工罷不急之用仍乞勅司禮監御用等監凡百上用輿馬服飾器用玩好屏去淫巧務從朴素使度數不增於前而法制可垂於後再乞勅光禄寺查勘内外近侍官員日逐費用桌席酒肉等項但係濫費應該減革者一一奉請節省使天下臣民仰觀聖意所在翕然向化則儉約之風可興奢靡之俗可革而財利之用自足矣一裁革冗費仰惟我祖宗之朝財賦皆有定制費出亦有常經如天下嵗辦京庫銀兩共一百四十九萬嵗用則僅該九十餘萬漕運糧斛共三百七十萬石嵗支則僅該三百餘萬其他料豆草束絹布花絨與夫光禄寺㕑料内府顔料等項大率類此是即所謂以十之七為經費而儲其三以備兵荒支用者也近年以來官兵吏匠冗食日增水旱災傷逋負日甚加以土木迭興齋醮繼作勲戚貴近惠賚不貲宴樂游賞費出無算司兵柄者不計錢糧之費掌財賦者惟圖儲蓄之多姑以大者言之如内承運庫自來成造金冊只用在庫金兩近年累稱不敷索取於外户部節次買過金一萬四千八百餘兩本庫銀兩止備軍官折俸糧等項支用自𢎞治十五年到今戸部并太倉進過銀不下三百萬兩錦衣衛官軍月糧成化五年一月止該支二萬六千九百餘石𢎞治十五年以後則月支四萬五千餘石武驤右衛勇士月糧成化八年一月止該一千五百九十餘石𢎞治十五年以後則月支五千餘石軍士冬衣布疋成化十三年止該一十九萬六千八百餘疋𢎞治十四年以後則支二十三萬餘疋内承運庫絹疋𢎞治十四年以前嵗支二十七萬八千二百八十七疋以後年分增至三十一萬餘疋又如光禄寺先年會派㕑料等項俱勾嵗用近年累奏不敷借過太倉銀十萬餘兩先年各邊除原派料草之外嵗該送銀四十八萬兩自𢎞治十三年山陜用兵及近日宣大二鎮敵人為患解過銀八百餘萬兩又如京營人馬舊無聴征而今有聴征支給草料之例近京關隘舊無防守而今新設防守官軍之名調度愈繁則供餉愈急國用愈竭則上下愈困為今之計若不急為裁節年復一年噬臍何及合無勅令户部約祖宗以來嵗賦之數查正統以前嵗用之則酌為中制永示遵守今後非成造上用物件及王府寶冊等項不得用金非聖旦千秋等重事不得用銀管事人員悉遵舊制不得纎毫浪費及因花銷粧造佛像并指稱齋醮賞賜等項多色朦朧奏討該部每年仍扣算進送銀兩不過五十萬兩之數其在京官兵匠役但係傳陞乞陞收充等項各該衙門作急查奏曾奉㫖裁革者悉從原㫖存留者照例支與俸糧一半及今後光禄寺供應悉從裁減務復祖宗之舊制成清儉之美俗至若軍旅重事雖兵部所司其間事干錢糧多係先行具奏然後開咨户部知會撥辦事體實有未便况國計盈縮事例應否一時計處未必皆當今後凡調度人馬招募軍士等項係干錢糧者俱要會同户部計議而行此外凡有冗費可節者聴户部逐一查出奏請施行題陳時宜革弊政事禮部精膳清吏司案呈奉本部送禮科抄出禮科等衙門左給事中等官田秋等題各准本衙門關劄備奉欽依内事理會同禮部精膳清吏司主事王汝孝太常寺卿陳道瀛等光禄寺卿黄宗明等親詣該寺弔取文卷将現在㕑役逐一清查造冊奏繳臣等竊惟太常光禄二寺㕑役専以備郊廟之祭薦奉宫闈之膳羞賔饗四夷餼廩百司其職不為不繁太常寺原額一千五百名見在一千一百七十三名光禄寺原額六千八百餘名見在五千一百餘名雖於舊額未充而其數已不為少止是正徳年間以來因循日久奸弊漸滋占用數多買閑例起膳夫為貪饕囊槖之具官廩充游民豢養之資煎和烹割之業荒而操鸞執七之人病矣且如尚膳監等處占用光禄寺者一千四百七十餘名已去四分之一而神宫監等處占用太常寺者七百一十餘名遂至三分之二應役不敷勢必濫收公廩浪費有識之士咸思欲一振舉之而未能也兹幸聖人在上百度惟貞威斷大行近習斂畏於是廷臣目擊其弊屢有建白該部職司其事節請施行兹者臣等奉命從事悉心查理各官亦能仰承徳意盡數退出事酌其繁簡之宜人均其勞逸之節造成執事文冊以為定式并将冒濫者革退占用者取回一時弊政似為肅清臣等又以為法立而後有司得以守其成令定而後奸人無以乗其弊謹斟酌未盡事宜條具上塵睿覽乞勅該部議擬著之令甲永為遵守則天㕑之冗食可以少節而天下之民力亦少紓矣等因開坐題奉聖㫖禮部議了來説欽此欽遵抄出送司案查先該行人司行人王禛奏前事臣伏讀勅諭見陛下祇悼災變不忍元元受愆引咎自責退託不敏旁謀博詢乃仁主恤民之㫖聖人納諫之心也陛下躬堯舜至聖之資日親萬幾以圖中興之治固宜和氣致祥百姓登足然猶災變不已嵗歉相仍陛下不謂罪在臣工而歸罪於已不謂咎在天數而致咎由人蠲減租徭大𤼵帑廩覃恩而宥罪施惠以及物雖姒王之罪已周武之大賚不是過矣且猶深維弊端詳察缺政顧勅諭頒降謂守令之選未聞得人謂儲蓄之政未見實效謂軍功冒賞而負寃謂神祗有慢而虐民謂刑獄寃濫而無訴謂激揚報復而不公一有於此足傷和氣以招災沴凡撓至尊之懐抱一皆臣下之作為仰知日月之光明故雖覆盆而畢照内外臣工何以逃罪若此者固足以消弭災變然臣切思之弭天下之變當究所以致變之由圖天下之治當求所以致治之本今日災變之作實由隂陽之不和而民財之不足實由浮費之太廣且浮費之弊有三一曰裁抑無制二曰設置太冗三曰禁革無素此皆不在陛下之臨御而在武廟之積習不在陛下之經費而在冗食之虚糜臣請備陳其詳勲戚甲第通衢連雲而莊田客店布散畿輔其侵奪民利遺害多端内臣出鎮滿載囊槖而臺榭園池模倣内苑其贓私告詔動計百萬此則裁抑無制之弊也官吏太多而添設鬻賣虚費廩禄不知幾倍於古軍兵太冗而招集新舊徒張虚數不知幾倍於古工匠㕑役毉卜伎藝新增舊續又不知幾倍於古此皆設置太冗之弊也國初於異教私度者有禁於游惰者有懲今則釋老之徒日盛而莫作之徒坐京師以冗食者不計其億萬此則禁革無素之弊也生民有限之財供此無涯之費無怪乎聚斂繁急民怨而災變生矣茍欲捄今日之災變而弊源不革何異於揚湯而止沸耶臣知雖欲擇守令以牧民天下之大豈無循良賦斂力役之期會惟辦事為急曷得以便宜而停免雖欲廣儲蓄以賑濟郡縣之間從有賦税京料邊儲之起運其存留無幾曷以為糴本而備禦至於重祭祀審軍功清寃獄公舉劾雖可弭災而回和况未必如陛下所求者自今言之京師天下之根本也而冒功陞授夫豈盡革刑院天下之觀法也而立此拘律致錯亦猶觸類伸求條陳毫舉如奢靡未盡撙節孤貧未盡矜蠲孤臣懐異見而不和逐臣在謫籍而未復皆所以致隂陽之繆戾臣故曰弭天下之變當究致變之由圖天下之治當求致治之本也今日百姓凋弊已極非因循舊弊所能賑濟必朝廷為更化而後可矣易曰窮則變變則通通則久變非易常變古之謂變其弊政參酌損益以復祖宗之舊制以建經國之逺猷而已夫人情樂因循而憚更改畏任事而避浮議且恐弊政一更而浮費冗食之徒必多不悦先為駕空以眩惑陛下之聰明者其大本在陛下定聖志而獨斷於上其輔臣専圖任而承順於下務求長治不為淺謀總計天下之財賦一嵗所入者幾何熟計天下之廩禄一嵗所出者幾何其官吏數兵卒數工匠諸役該用而不可缺者幾何蠧財而無益者幾何或量加裁減或全為禁革其莊田非欽賜則給還本民其贓私係枉法則追徵入庫於以省冗員使官不必備吏惟足用文吏以賢否而為去留武弁以功罪而定陞降藝略具備者方許承襲量加管事而碌碌不逮者仍使備操以待後襲其他以倖途干進者一切停罷則士各自勵職有增減庶可省十之二三矣於以銷冗兵擇其精鋭汰其老弱内而京師團營禁兵時常教閲更替出戍其郡縣各處僉派少壯之民兵以備域守陛下於王畿之内蓄精兵一二十萬以輔之則内無不重外而邊陲鎮壘屯聚士馬精强俱堪實用其縁邊所在招集土民之驍勇以為屯軍而又選文武材略之士為将以統之則外無不實且耕且戰足食足兵亦可省昔之少半矣僧道不放度而久将自息游惰有所懲而驅集南甸凡無名之賞賚不急之功作皆浮費所當革規畫既詳立為經制頒之天下勅諸有司命臺諫以糾察擇監司以舉行陛下奮乾剛以昭勸懲信命令以示遵守循吏奉法則賞以勸功謬吏慢令則罰所不宥終始惟一不少遷改且抑兼并之弊減科須之繁以崇教導以課農桑嵗之所省不下數十萬九年之耕必有三年之積由是愁嘆不作災變不生百姓獲豐阜之樂天下仰更化之治借使有水旱之災盜賊兵戎之釁蓄積多而備先具矣况濟之以鹽利益之以茶馬積之以常平又有以資餽餉助軍需不必發内帑之銀加估備糴外自有餘陛下可髙拱無虞矣賈誼曰積貯者天下之大命也茍粟多而有餘以攻則克以守則固以戰則勝招敵附逺何為而不可其陛下今日之治歟史稱漢文之富太倉之粟紅腐難食都鄙之錢貫朽不較求其所以致治惟在恭儉陛下恭已侔舜克已類禹天徳之美逺過漢文而富庶之效未臻無乃浮冗之費未省耳此臣所以諄諄而告於陛下也識微慮淺不係言責承陛下諭以進言窺管所得敢不罄竭仰惟陛下恕其愚僭俯賜採擇則天下幸甚臣不勝戰悚之至等因奏奉聖㫖該部看了來說欽此欽遵抄出送司案呈到部除外所據㕑役合就連送仰行精膳清吏司呈來施行等因移付到司查得先為纂修事據太常等寺典簿㕔手本各查開太常寺㕑役洪武年間定四百名景泰六年間添三百名成化十五年添三百名𢎞治五年添三百名共一千五百名光禄寺宣徳初年九千四百六十二名宣徳十年減四千四百六十二名止留五千名正統四年復添三百八十名正統七年添一千四名成化十一年添五百名共該六千八百八十四名又查得嘉靖六年六月内為裕京儲安里甲順孝情革奸弊以禆聖明修省事該本部議照光禄太常二寺㕑役各項有占用過多者太常寺行收牲口御史光禄寺行巡視科道官清查退出不許占恡題奉聖㫖准議行欽此嘉靖八年三月内又為應詔陳言以弭災異事該監察御史穆相等題本部議照二寺厨役近年冒名頂補或父為太常寺㕑役而子為光禄寺㕑役者有之或一家三五役者有之合行二寺委公正官造冊會同收牲口御史巡視科道官盡數裁革徑自具奏定奪題奉聖㫖是欽此俱經備行各寺一體欽遵會同清查裁革去後隨為遵例告補㕑役以足額數以便供祀事該太常寺㕑役王通等奏開本寺見在食糧㕑役一千一百九十二名逃故一百一十三名未解一百九十五名應不敷要将在冊餘丁吳進等准收補足及為遵例乞恩将在冊餘丁補足額數以甦困苦事該光禄寺㕑役葛升等奏開原額㕑役六千八百八十四名逺年近日逃故共一千八百名見在食糧五千八百四名内撥大庖㕑一千一百八十六名御酒供應庫蠟蠋旛竿二寺一百一十六名欽撥尚膳監跟隨太監等官五百八十九名内閣翰林院尚寶司吏科等衙門一百二十六名大烹門關防搜檢巡風二百五十二名本寺止剰㕑役二千八百一十五名差多人少不能支持見有在冊餘丁黄洪等乞行揀選驗補等因具奏奉聖㫖禮部知道欽此欽遵又經行移各寺催查未報今該前因通查案呈到部看得前項㕑役専以供給上用膳羞及内外祭祀使令執七司味業各有定本部近年遇缺隨補空餘無多尚據各役節告不敷似難槩以原額一切議革但查太常寺洪武年間四百名隨後增至一千五百名光禄寺除洪武年間無查外宣徳十年尚止五千名隨後增置六千八百八十四名委的比舊增設過多且即葛升等奏開寺監等衙門跟官等項雜差非一實在供役人少必是舊來占役影射之弊因襲未除嘉靖六七等年本部曾經二次題奉欽依行合會同巡視收牲口科道官清查明開不許占恡迄今屢催竟未完報若非嚴限從實查理不惟冗食日增亦恐勞逸不均貧難偏累計名雖多無益於用所據行人王􅐃奏稱㕑役新增舊續不知幾倍於古要行熟計該用而不可缺者幾何蠧財而無益者幾何量加裁減或全為禁革一節相應依擬勘處合無候命下備行都察院該科奏差老練風力給事中御史各一員本部差屬官一員前去太常光禄二寺會同各堂上官弔取人卷速查前項㕑役舊設續添逃故見在總各若干某項官庖實該用若干名某處供祀實該用若干名某等衙門跟官聴事寫字是何年月題奉明㫖定撥或一時暫撥借使遂沿為例實該存減若干名并此外開載不盡條件通查明白斟酌繁簡立中制逐欵開坐奏行本部查照攢造㕑役文冊永為常額每年該寺仍奏委堂上官一員常川督屬立法查照禁革奸弊周嵗更代具奏稽考數内再有縱容私占役使辦納月錢借用影射不自查舉者光禄寺從巡視科道官太常寺從收牲口御史糾察比照管軍多少則例奏劾處治以後㕑役在逃除三箇月以上照例送問二次為民外若在逃三年以上一次者照正統九年題准事例常川上役一年二次者常川上役二年其遇缺告補務選精壯如有違例頂名冒籍投托勢要希圖買閑等項事發連原保鄉官送問本㕑革如此分數既明勞逸亦適官無冗役而食祀之正為之一振等因覆題奉聖㫖是依擬行欽此已經通行欽遵奏差委官清查去後今該前因案呈到部看得禮科左給事中田秋廣東道監察御史陸琳清查㕑役陳事宜各有所見相應依擬開立前件上請定奪伏乞聖裁縁係陳時宜更弊政以隆治道以垂萬世治安事及奉欽依禮部看議了來説事理未敢擅便開坐題奉聖㫖是依擬行計開一神宫監奉先殿尚膳監等處太監少監丞奉御長人等濫用㕑役數多法應查究但積弊相承日久又能先事退出合無免究取到㕑役共一千九百餘名俱應分撥原所當差前件查得嘉靖六年六月内為裕京儲安里甲順孝情革奸弊以禆聖明修省事該本部題奉欽依各項有占用過多者查照題准事例太常寺行收牲口御史光禄寺行巡視科道官覆行清查将各項占用人役盡令退出不許占恡去後今該科道等官奉命查審各監亦能先事退出相應免究但各監退出㕑役共一千九百餘名人數既多不無虚應故事有退出之名無退出之實合無候命下之日仍行該寺及原委科道官照名查㸃以憑收受分撥當差庶幾役占之弊得清而供事不至乏人矣一先該禮部題准逺年逃故㕑役許同鄉之人頂補事例蓋因未經清查應役不敷且原籍清勾甚為民擾權宜行之以濟急用今各該衙門占役者俱已取回該寺應役之人已自足用合将前例停止况頂補之人類多軍匠勢豪詭名冒籍除已革退太常寺二十九名光禄寺四百二名外以後若㕑役消乏太常寺至不足一千名光禄寺至不足四千名方許將在冊餘丁量有力業者選取送部驗中收役不許濫行原籍勾擾仍三年攢造餘丁冊一次以備取用若果餘丁不足再行議處前件查得先該本部右侍郎桂題為裕京儲安里甲順孝情革奸弊以禆聖明修省事該本部議得太常光禄二寺逃故㕑役行文原籍暫免清勾以蘇民困其在㕑役有逃故者許户丁及同鄉之人願頂者赴部告補題奉欽依准議行已經通行欽遵收補外無非權宜行之以濟一時急用其法非不美也但法久弊生以致詭名冒籍混濫者多今該科道等官清查各該衙門占役者俱已取回該寺應役已計有一千九百餘名則同鄉頂補一時權宜之法自不必用要将前例停止及以後太常寺㕑役消乏不足一千名光禄寺至不足四千名方許将在冊餘丁選取送部驗中收役不許濫行原籍勾擾俱見審處得宜相應依議合候命下之日本部行太常寺将同鄉二十九名光禄寺将同鄉四百二名查照退革其被革之人不許朦朧奏擾如有故違查究治罪以後各等若有㕑役消乏不滿今次題准之數方許将在冊餘丁選取送部審勘驗中收役仍三年攢造餘丁文冊送部查考不許仍前一槩濫收以滋弊端如或餘丁不足補用本部另行議處奏請定奪如此則㕑役自足於用而無詭冒之弊矣一今次清查之後占役之弊既清以後每年定委堂上官一員太常寺博士一員光禄寺署丞四員專一清查厨役酌量繁簡分撥牌局多寡貧富務令適均并一應替補事情月糧奸弊俱聴督查年終會同巡視監收錢糧科道官并部委官查考一次具本題知若有占役詐冒情弊就行叅奏革退其神宫監大烹門并該寺各署寫字人役亦就於年終會查更換以防作弊今年立法之初尤在得人臣等見得太常寺少卿王學夔光禄寺寺丞彭黯皆精敏清强相應就令管理庶得規模有定法守不隳前件臣等看得前項㕑役在太常寺者固有占役之弊在光禄寺者占役之弊尤為過甚且中間替補事情月糧奸弊及寫字人役久慣生事誠不能無今該科道等官清查明白仍欲每年定委堂上官一員光禄寺署丞四員専一清查禁革奸弊年終會同巡視監收錢糧科道官并本部委官查考無非杜漸防微謹始慮終之意相應依擬但内開見得太常寺少卿王學夔光禄寺丞彭黯皆精敏清强相應就令管理其所舉固為得人然恐各官遷轉不常難以主名定委合無候命下本部備行太常光禄二寺每年輪委各堂上官一員督同博士四署掌印官立法查㸃至周嵗更代之際仍會同巡視監收錢糧科道官并本部委官查考一次具本題知其㕑役如有仍前混占者叅請重治其各項寫字人役於年終會查更換以防奸弊如此則奸弊既除法守自定矣一神宫監奉先殿内臣原占㕑役悉已革回但各官私宅上竈亦須用人各行太常寺每月輪撥與㕑役二百名代其薪水之勞俱不許仍前包納月錢遇致祭祀打掃公事仍取供役其驚赶寒鴉等項人役每日辰時入巳時出不許止留在内私作及於廟城蒔種花蔬澆灌穢汚以上有違俱聴太常寺糾舉前件臣等看得神宫監奉先殿内臣原占㕑役悉已革回但各官公所住居等項亦須用人雖非原額定例而與權時宜亦應酌處今該科道等官議欲每月輪撥與㕑役二百名以代薪水之勞不許仍令包納月錢遇致祭打掃仍取回供役其餘驚赶寒鴉等項人役詳其出入之防廟城所在嚴其穢汚之禁深為得宜相應依擬但神宫監等監有太監少監丞奉御長等官品級大小既有不同則分撥多寡不容無别合候命下本部劄副太常寺分别等第酌量多寡撥與各官役使其致祭打掃等項事宜俱照原擬施行如此庶㕑役不得濫用而包納之弊革進出不敢混雜而穢汚之患除矣一太常寺原有直㕔門庫等役與光禄寺事體不同其跟官看門等項不該輕用㕑役但香帛祭品在内須得嚴於看守而各官入壇供事非㕑役不得擅入是以節年相承占用原無定額未免過多合定與中制除看門看庫看倉兵部另有僉撥外其守牙牌祭服每項定與四名卿五名少卿四名寺丞三名典簿博士二名不許額外多占違者聴收錢糧科道糾舉前件臣等看得太常寺直㕔看門看庫看倉等役既有兵部僉撥人數似難一槩濫用㕑役但該寺香帛祭品在内此㕑役之所司者而各官入壇執事委非㕑役不敢擅入以此相沿役用日久今該科道等官清查議處要行定與中制無非量度事體斟酌時宜之意相應依擬合候命下之日本部劄副該寺逐一分撥牙牌祭服每項定與四名卿六名少卿五名寺丞四名典簿博士二名永為定例不許額外巧立名目冒破多占如有違犯者許監收錢糧科道官糾舉如此則事有定體而相沿占用之弊可革矣一太庖㕑役一千一百餘名今查得五百三十七名係執役之人照舊留用外其六百三十六名俱稱奉欽依跟隨太監少監丞奉御長人等臣等議得該監内臣列職近侍既無朝叅幹辦之勞可免騶從僕馬之役况内庭密切豈可以六百餘人濫入乎合無止留與二百名給各官直廬薪水之役不許仍前包納月錢違者聴巡視科道官糾舉其四百三十六名仍取該寺分署執役前件臣等看得㕑役之設専以供給上用膳羞及内外祭祀使令初非内監等官所敢用也其後雖稱奉有欽依跟隨太監少監人等不過乞恩請討沿襲為例而已然又不依原討之數如止許八名者占用至二三十名者有之三四十名者有之遂至有六百餘人跟隨濫入者臣等竊惟該監列職近侍既無朝叅亦無催辦逺行勞差濫用㕑役實無所據况内庭密勿之地而使六百餘人得以濫入尤非所宜今該科道等官議處查革誠為有見相應依擬合無候命下之日本部劄行光禄寺轉行掌印官查照除大庖㕑役五百三十七名原係執役之人照舊存用外其六百三十六名内量留二百名分别等第撥與各官直廬薪水之役仍行該監大小官員務要恪遵皇上裁定節省之意不許仍前占用包納月錢違者巡視科道官叅奏治罪其餘四百三十六名查照原署分撥著役如此則積年濫冒之弊悉除而該寺著役之人皆得實用矣一各處禁密之地該内臣執役非㕑子毋敢輒至臣等俱經會議酌量裁革造有文冊查考前件臣等看得禁密之地豈常人所敢輒至事簡去處雖人多亦無所為今該科道等官審度事體斟酌繁簡條陳各項應存應減事宜逐欵分晰其撙節合乎人情區畫得乎中制甚為允當經久可行相應依擬合無候命下本部備行太常光禄二寺一體遵奉永為定例庶事有畫一之規人無偏累之苦矣為科舉主席事席書精膳清吏司案呈奉本部送禮科抄出太保兼太子太傅武定侯郭勛題准後軍都督府咨經厯司呈准禮部儀制清吏司手本該本部題稱嘉靖五年三月十五日殿試十九日恩賜榮宴於禮部合用大臣一員主席等著武定侯郭勛欽此欽遵外照得厯科進士恩賜榮宴圖設坐欽命主席大臣居中讀卷等官各分左右已成定規行之有年今科宴圖不分主席讀卷官員平分左右似越前規不見朝廷欽命主席之盛典但恐臨期不便禮儀錯亂有失大體等因題奉聖㫖只照舊規行該部知道欽此欽遵臣躬詣禮部中門裡見禮部堂上官迎臣説㫖意只照舊規少箇是字有些欠明又云正徳年間兩三次俱各分左右席坐就是舊規了臣思正徳年間變亂弊政俱各該衙門釐革已盡如何却将科舉恩榮宴圖次序以為舊規及思舊規乃是我太祖太宗及列聖相傳者為之舊規豈比近日不行奏請任意更張坐席為之舊規臣見各官堅執不從又云㫖意欠明只得捨其小忿而存大體望闕叩頭行禮把酒畢臣就於左席分坐訖切照前項舊例一旦輕廢不無有孤盛典亦不見朝廷命官至意如䝉伏望皇上俯察大體乞勅禮部将自洪武年間列聖開科以來恩榮宴圖欽命武職大臣主席中坐事例備查明白要見自何人主席中坐何年何人作俑左右分席有無相應奏請定奪庶使主席與宴官員永為定規則我盛朝典儀明而禮樂興免致臨期不便非臣敢再望将來之遣實有關乎治體所難等因題奉聖㫖恩榮宴禮君臣盛典已有㫖著照舊規行禮部却不行遵守輒議㫖意欠明今後務要循法規矩不許再來擾凟還著該部查明奏來定奪欽此欽遵抄出送司案查先准儀制清吏司手本該本部題本年三月十九日恩賜進士榮宴於禮部合用大臣一員主席等因題奉欽依是主席著武定侯郭勛欽此備行到司轉行光禄寺備辦至期筵宴間續於禮科抄出太保兼太子太傅武定侯郭勛亦題前事奉聖㫖只照舊規行該部知道欽此欽遵抄出送司除遵照上科圖稿主席公侯坐左大學士首臣坐右分例與宴外今該前因查得本部自𢎞治以前巻稿被火燒毁無從查考及查得正徳三年六年九年恩賜進士榮宴欽命英國公張懋主席十二年成國公朱輔主席嘉靖二年新政之初恩賜進士榮宴亦成國公朱輔主席俱與大學士李東陽梁儲楊廷和等左右分席其節年稿内查無主席中坐事例再查得大明會典内止載恩賜進士榮宴欽命大臣一員待宴亦無開有坐次通查案呈到部臣等竊謂臣職惟成命是遵部規惟舊章是守况恩榮賜宴朝廷盛典為臣子者敢不欽遵上命輕亂舊章乎大明會典國家之舊章也會典開載張榜明日賜狀元及進士宴於本部命大臣一員待宴讀卷執事等官皆預進士并各官皆簪恩榮宴牌花等因臣等伏讀聖制不曾開載待宴大臣中席而坐亦無與内閣大臣左右分坐自洪武年來相傳年久物換人更無從查考止自正徳年來至嘉靖二年恩賜榮宴皆待宴公侯坐左手第一席内閣首臣坐右手第二席其餘以次分坐相傳以為舊規近奉欽依只照舊規行臣等恪遵上命只得以嘉靖二年以前宴圖坐次為舊規不敢别有改作以亂成憲今武定侯郭勛乞要備查武職大臣主席中坐事例請命本部查明奏來定奪臣等考之會典既無開載坐次考之逺年亦無中坐文憑惟正徳年來宴次之圖見存預席之人具在是即舊規别無疑慮再詳會典所載國初禮儀定制止曰命大臣一員待宴不曾曰命大臣一員主席二字不知載於何典本部題本改為主席亦不知始於何年故朝廷每遇逺國朝貢凡命大臣皆謂待宴以今論之待逺人尚曰待宴不曰主席豈有待狀元進士九卿翰林乃名主席不以待宴為名果何謂乎故遞年修書筵宴皆待宴大臣坐右内閣大臣坐左獨於宴狀元進士待宴大臣乃反居内閣首臣之左臣等嘗疑此理甚有不通不料欽命公侯尚不以左自安又欲中坐獨全其尊此非武職大臣故為尊大也其心曰宴以主席命名奉差大臣不據中而坐恐辱朝廷之命以此武定侯郭勛二次具奏蓋有因也殊不知禮莫大於分分莫大於名恩榮朝廷之宴也主者朝廷之尊稱也當此名者惟慶成宴天子屈萬乗之尊親待百官可當主席之名為臣子者謂之待宴則可謂之主席萬萬有不敢也累年承訛習謬不知犯義干名伏望皇上勅下本部今後一應筵宴凡題本請命大臣不許妄擬主席二字遵照會典開載祖宗欽定禮儀定制止名待宴凡文舉賜宴欽命武臣仍坐於左内閣坐右讀卷官按圖次坐凡武舉賜宴欽命文臣亦以次分坐於左公侯以次分坐於右其餘筵宴照常序坐則名分正而禮樂自興舊典復而陋習可洗且彼此勢平雍雍肅肅於一堂之上矣縁係科舉及欽依恩榮宴君臣盛典已有㫖著照舊規行禮部却不行遵守輒議㫖意欠明今後務要循法規矩不許再來擾凟還著該部查明奏來定奪事理未敢擅便嘉靖五年三月二十七日本部尚書席題四月初四日奉聖㫖今後待宴官中席讀卷官分坐該部不許擅自紛更欽此慶成筵宴雖遇災傷不免事例汪俊禮部題為筵宴事精膳清吏司案呈奉本部送禮科抄出翰林院修撰唐臯奏為舉曠典以備大禮事臣聞祭祀之禮莫重於郊丘君臣之情必通於燕享古之帝王所以大本始之報而篤慈惠之恩於此乎在則大祀慶成誠禮之不可廢者切照嘉靖二年正月大祀天地次日例該慶成賜宴皇上因禮部之請念災傷之故特賜罷免此誠懼災恤民之盛心也臣竊以為郊則尊祖以配天孝之至也宴則受釐而介福仁之至也一舉而仁孝之道備此帝王之所貴祖宗之所詳定而世守也豈可偶因水旱之故例以他宴遂廢而不舉哉自武宗末年巡幸在外或曠而不郊或郊而不宴神人乖隔災變頻仍可追覩也皇上升潛繼統百度惟新敬天事神靈貺響荅今臨御已及三年之久而君臣尚不能同一日之歡非缺典歟前此妨於國䘏今則諉於嵗凶議必曰日食正朝前代曾以受賀見訾災傷迭報今日當以省禮為宜夫禮有大有小大者不可損小者不可益也郊祀祀之大者慶成宴之大者今此特從罷免損報甚焉禮猶體也不備君子謂之不成人郊丘之祭欽天監擇日禮之始也光禄寺設宴禮之終也終始具備是謂大成今損郊而廢宴有始而罔終謂之備禮可乎臣誠寡陋無所知識攷之周公制禮尊后稷以配天而行葦之詩則因祭畢而宴被之聲歌是知郊之必有宴也唐張九齡告其君曰天者百神之君而王者所受命自古繼統之君敬天之君以報所受故郊義不以徳澤未洽年穀不登而缺其禮又知災傷之不可廢郊也宋朝因郊肆赦䕃補賞賚為費不貲郊禮畢必宴紫宸廢郊則廢宴矣然景祐不以淮汴之溢澶河之决而廢郊乾道不以一府八州軍之飢而廢郊景祐猶夷簡柄用之時乾道則朱熹召對垂拱之後未聞其以為非則又知災傷之不可省郊而廢宴也切見江淮告災陛下惻然憫恤𤼵公帑遣重臣往賑濟之其為民亦至矣要在大臣委任得人處置得宜使民沾實惠以不負簡命爾况禮行於郊而百神受職則風雨調寒暑時休徵應之亦轉禍為祥一端也顧可惜一日之樂而不克承百靈之貺哉伏望皇上深維大報之禮光昭大備之儀俯察愚言特賜俞允勅下有司照例舉行則數年曠典一朝載覩神人介胥悦之休而君臣慶同游之盛矣等因奉聖㫖該衙門知道欽此又該兵科給事中裴紹宗題為舉大禮以通上下之情以悦帝天之心事臣竊惟祖宗制郊祀慶成之大宴謂天心既享大禮既成而君臣共慶之也日者該禮部題筵宴事嘉靖三年正月十二日大祀慶成例該次日筵宴奉聖㫖是既各處地方災傷准暫免宴欽此臣一聞成命之下深惜大禮之廢夫萬嵗聖節免宴賜鈔及正旦冬至等節免宴賜鈔皆陛下節財䘏民之意固為可也若夫慶成者慶上帝居歆也今郊畢不慶将謂上帝不歆乎臣以為不慶不可也且陛下即位以來三年於兹往以國戚兩廢大禮且今從又廢悦天之舉於義何居若陛下於未郊之前省營繕免織造罷冗官正刑獄以盡䘏災之實以致明徳馨香固宜然大禮既成自當以天心享格為悦故易卦以殷薦上帝為豫也未郊之前百萬之費不辭既郊之後觴酒豆肉是惜於義何居昔者孔子愛禮以存羊故文武雖當出車枤杜之時不忘天保鹿鳴之歌蓋君臣之禮一疎則上下之情不通上下之情不通則隂陽之氣不和隂陽之氣不和則天地之瑞應不至故君臣協和亦消災弭變之道也臣按禮經喪三年不祭惟祭天地社稷為越紼而行事夫喪且不廢行事而况災傷乎故此禮一舉於上為敬天於前為法祖於時非不畏災異於民非不䘏窮愁蓋祖宗所制奉天之大典雖陛下不可得而專廢之也又况國家百五十年來陛下中興帝業乃於此禮之頓廢上於朝廷失延欵之誠下於臣工觖歡戴之望於禮於情無乃不可乎昔唐憲宗元和二年郊祭致雪衆情歡悦蓋有所感於其先也况陛下為禹之率帝為湯之自責陋憲宗而不為者乎陛下胡為乎不求䘏災之實而但於名而廢此大禮也伏望陛下召大臣禮官再行議處如臣言不謬收回新命乞勅禮部光禄寺修舉大宴如式行禮則君臣情洽漢官威儀之盛復覩於今日天心未必不悦災變未必不弭等因奉聖㫖已有㫖了該衙門知道欽此案查先該本部題云云等因具題奉聖㫖是既各處地方災傷准暫免宴欽此今該前因案呈到部看得修撰唐臯給事中裴紹宗各奏稱祭祀之禮莫重於郊丘君臣之情必通於宴饗往以國戚兩廢大禮今且從吉慶成筵宴不可以災傷之故而廢悦天之舉乞要照例舉行天心可悦一節與本部原題君臣慶會之盛典不當惜天下之費大略相同前項筵宴委的相應舉行但四方災傷本部不敢不併以聞先奉明㫖免宴已有以仰見皇上恤災之徳今各官復有論列尤望皇上俯賜施行以彰聴言之公勅下本部照例施行光禄寺備辦至期筵宴庶盛典不致久曠而中外交歡矣縁係筵宴及奉欽依該衙門知道已有㫖了該衙門知道事理未敢擅便謹題請㫖嘉靖二年十二月初八日本部尚書汪等具題初十日奉聖㫖是還照舊例宴欽此光禄寺修定供應數目事例禮部題為修典籍考經費以備須知以定成規事精膳清吏司案呈奉本部送禮科抄出光禄寺卿黄宗明題惟國家財用所以制其經費之宜而稽其出納之數者莫先於典籍况光禄寺所掌即周禮天官宰夫之職所以式法掌祭祀之戒具與其薦羞凡朝覲會同賔客以牢禮之法掌其牢禮委積膳獻飲食賔賜之飡與其陳數無不由之費用浩大供應猥雜日不暇給典籍之設至為𦂳要臣自到任以來隨事考求勾檢簿集而厯數滋久巻案脱壊洪武永樂之舊漫無存者成化𢎞治以來間或可考而皆隨時因革條例繁多𢎞治年間本寺少卿趙竑正徳九年本寺卿沈冬魁嘉靖七年本寺少卿史道俱曾修有光禄纂要然皆為翰林院纂修而設未有折中成規以為可久可繼之道是以各署供應無有統一中外隔越罔有照會吏胥貪饞利於混亂縻費暴珍莫此為甚於是臣與僚官更相檢閲公同考訂刪繁就簡舍短取長著為成則凡為卷者五而各以其類附名之光禄須知又撮其要者以備御覽謹繕寫裝帙進呈中間如供祭之類皇上曾有革正而舉類未盡者臣等未敢擅便伏候聖裁夫覈名實謹出納防奸欺此特其細者耳殊不知帝王謹徳供御飲食至為切近又况宗廟羣神日有薦獻供祭所以竭誠致報防奢止慾養徳養身之務其可不慎也哉如䝉乞勅下禮部再加詳訂内外宫㕑俱為中制以定成規務令祭祀有常式供薦有常品膳羞有常味賔賜有常格多寡有常數而貪饞無所於利卷案不至埋沒仍轉行各衙門一體知會通行遵守實為便益縁係修典籍考經費以備須知以定成規事理臣等未敢擅便等因奉聖㫖禮部看了來説欽此欽遵抄出送司查得先為供應牲口事該本部會議得每年上下半年分日逐供應祇待等項共該用猪羊雞鵝一十萬口隻分派南北直𨽻并各布政司府州縣買辦解納内如浙江江西等處布政司府應天府南直𨽻府州路途窵逺牲口每致瘦損不堪行令措辦價銀解部轉送收買應用其山東河南等布政司順天北直𨽻淮揚等府徐州係附近産有處所買辦本色解納内大尾綿羯羊祭猪各因肥大最難餧養亦要照數措辦價銀解部送寺以備一年供應支用之需凡一應祭祀薦獻膳羞筵宴下程等項胥此焉出今該前因通查案呈到部看得光禄寺卿黄宗明所奏定立各項經費中制著為成規一節具見本官留心職務節費革弊圖惟永久至意相應依擬但内據賔享四夷欽賜下程係干懐柔逺人盛典先年題奉欽依内開會同館宴待夷人本部差屬官一員光禄寺委堂上官一員照舊巡看務要桌面豐腆酒味真正其送夷人下程酒肉等項之時光禄寺差屬官一員管押到於會同館主事處驗過給散庶使酒味不致攙水肉斤不致短少行已有年人多玩忽合併申明通候命下之日本部備行光禄寺将所題過物件須知事宜謄寫裝訂成帙每署給𤼵一本凡遇供應祇待一應事件并上用膳羞薦獻祭祀品物俱要依式遵行不許輕擅增減一本送本部以備查考其筵宴外夷之日該寺務遵欽依事理専委堂上官一員會同本部屬官看驗不許視為泛常推避不去其該送下程等物該寺仍責差屬官一員押送會同館本部提督主事驗散如有不行遵守聴從本部指實叅奏如此庶使膳羞品物均守成規而筵宴下程各沾實惠禮達而分定内治嚴而逺人服矣縁係修典籍考經費以備須知以定成規及奉欽依禮部看了來説事理未敢擅便謹題請㫖嘉靖十年九月二十三日本部尚書夏等具題本月二十八日奉聖㫖是依擬行欽此名臣經濟録卷三十一
