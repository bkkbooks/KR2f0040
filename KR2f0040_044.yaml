body:
  text: 名臣經濟錄巻四十四明黄訓編兵部武庫論兵備疏楊士竒臣竊見今差監察御史清軍有以陜西山西山東北直𨽻之人起解南方極邊補伍者有以兩廣四川貴州雲南江西湖廣浙江南直𨽻之人起解北方補伍者彼此不服水土南方之人死於寒凍北方之人死於瘴癘且其衛所去本鄉或萬里或七八千里路逺艱難盤纒不得接濟在途倒死者多到衛者少長解之人往往被累非但獲罪亦有艱難死於溝壑而不知者深為可憫况今西北二邊急於防守而西北壯勇之人乃發南方甚是未當查得永樂十年二月初五日太宗皇帝聖㫖北京人民有在各處充軍今後事故來勾丁補役不要發去只就河間立一衛或一所都著就那裏當軍原衛軍伍别著人若在北京衛分當軍的不動宣德二年三月初一日宣宗皇帝准兵部奏令雲南四川兩廣福建湖廣該勾軍丁除逃軍正身及巳解軍丁外其餘留所在附近衛所帶管食糧操備本年十二月十五日又准兵部奏今後一體存留収操縁海地方的也就留在那裏衛所操備宣德三年四月二十一日又准兵部奏江西貴州等布政司軍丁該解遼東甘肅等處并山西等布政司軍丁該解雲南兩廣等處動經萬里及七八千里者皆照例留在附近衛所帶管収操當軍又奉聖㫖腹裏地方該勾的軍離原衛二千里以裏的還發去二千里以外的都留在附近衛所収操此皆祖宗成憲蓋洪武中有犯罪死者恩宥免死不分南北發邊逺充軍所以懲治有罪此太祖皇帝之仁也其後有罪者巳死補役者皆非犯罪之人朝廷憫其逺道艱難留於附近衛所操備此太宗皇帝宣宗皇帝之仁也陛下即位以來以陜西該解腹裏山東河南大寧都司等處衛所軍丁俱収發陜西靖逺衛又以廣西缺軍命南方貴州雲南廣東廣西四處該勾遼東等處軍丁悉發廣西都司屬衛収操亦是仰體祖宗之仁近來該部執稱原舊隊伍難以改發只是畏避文案繁勞而不思兵備之無實不念下人之艱苦近日兵部雖因清軍御史之言奏請清出軍丁暫發附近衛所帶管収操縁南北俱有邊境今俱少軍若只於本處附近収用近邊衛分緩急亦不得濟臣等愚見今所急缺邊軍者欲乞除逃軍外以山東山西河南陜西北直𨽻今後清出軍丁各就所近發甘肅寧夏延安大同宣府永平遼東等處補伍雲南兩廣貴州四川湖廣江西福建浙江南直𨽻今後清出軍丁各就所近發四川雲南貴州兩廣及邊衛所補伍皆就定其衛所發去待補足其缺後再有清出者却於腹裏衛所補伍如此則兵備有實下人不困臣謹陳愚見伏乞特命公侯伯之老成者及都督尚書侍郎御史㑹議可否謹具奏聞伏候恩㫖條例事奏張本該本部尚書張本等奏天下衛所遞年以來勾取逃亡等項軍人為因比先未曾奏定條例頒布申明其各該衛所往往泛濫申填勘合差人前去各府州縣勾取所差人員毎嵗不下二三萬數該勾軍士又不從實開冩原報姓名鄉貫并充軍來厯縁由以致差去官旗通同有司里老人等作弊將有勾者揑故回申無勾者展轉扳指數内應分豁者不與分豁重復勾擾連年不絶其所勾次數少者三五次至八九次多者十餘次至二十次不止以此軍伍不清民被其害今後該勾軍士除曾經三次以上回申丁盡户絶等項無勾者照依先次奏准事理暫且住勾候各處衛所造冊完日通𩔖奏請開豁其餘逃亡等項軍士合無通將條例申明遵守逃軍每三個月或半年一次𩔖勾故軍并殘疾等項軍人毎一年一次𩔖勾務要將各軍原報姓名鄉貫并充軍來厯及逃故等項縁由造冊填給勘合責付差去人員照例勾取庶革奸弊將條例開坐宣德四年六月初九日早於奉天門欽奉聖㫖是都准行欽此本月十三日早本部官又奏欲將條例抄發各都司衛所并布政司府州縣恐後傳冩差誤又日久埋沒不遵合無刋刻成書發去永為遵守奉聖㫖是欽此欽遵外今將條例開列于後一逃軍除自首免問責限起解外其餘拿獲者就於原籍并所在官司取問明白初犯再犯依律的决差親屬隣里管解原衛所著役三犯者監候申詳依律處决先將户丁解補里隣人等仍照隱藏逃軍榜例治罪窩家發附近衛所充軍若窩家係軍人發邊逺衛分充軍其窩家如或懼罪不合將逃軍轉遞他所藏躱者不分軍民俱發烟瘴地面充軍所在官司知情故縱者依律坐罪一逃軍正身未獲先將户丁解補仍責限根要正身得獲替出户丁寧家一各處有司起解逃軍及軍人軍丁務要量地逺近定立程限責令長解人等依限管送若長解人等縱容在家遷延不即起程照依榜例違限半年之上者依律坐罪一年之上者収發附近衛所充軍犯人發邊逺充軍一旗軍有逃回原籍或詐稱病故或更改名姓於各衙門充當吏卒主文冩發撥置害民或出家為僧為道或投充生員或於豪强勢要官員軍民之家作家人伴當㸔莊種田等項名色及冐給文引出外買賣并於鄉境别都妄作民户另立冊籍照依榜例許令出首改正解赴原衛著役敢有違者逃軍發邊逺充軍隣里窩家人等照依隱藏榜例問斷一勾補軍役若正軍户下本有人丁比先朦朧揑作無勾即便改正勾解與免前罪如仍扶揑回申照依榜例軍丁發邊逺充軍原保結里隣人等収發附近衛分充軍官吏依律坐罪一勾軍人員合照依宣德四年二月内奉准事例選差的當人員并在營有丁之人前去不許泛差隻身無藉之徒一新勾軍士合照依宣德元年四月内奏奉聖㫖榜文事理限半月之内収帮月糧一個月整理房屋候安揷定方許差操如有不遵生事虐害在内監察御史在外廵按御史按察司官及鎮守官員廵察將故違之人軍吏總小旗就行拿問軍官具奏定奪其原降榜文都司衛所置立板榜各於公㕔常川懸掛永為遵守一存恤軍士合照依宣德四年二月内欽奉勑諭事理每軍一名優免原籍户下人一丁差役若在營有餘丁亦免一丁差使令其專一供給軍士盤纒一勾軍違限合照依宣德四年二月内奉聖㫖事意違限二年之上者官追俸旗軍就於户下選丁補伍再限一年以裏又不赴京全家調發别衛舍人餘丁户下一般起調正犯人各該衛所挨拏解京若官吏人等容情不行舉掌不饒仍照榜例許廵按御史按察司拿解一勾軍務要填給勘合差人前去勾取其各該衛所不許擅用闗牒批帖徑行有司勾擾違者許所在官司將差去人捉拿解京若係職官奏請提問一各衛所軍士有等殷實之家本身并户下精壯不行應役却乃買求官吏將買到軟弱家人小厮并義女使女招到女婿人等冐名頂替以致隊伍不精又有頑民通同軍士變亂版籍將户下人丁過房典賣招贅作婿影射差徭若有此等作弊之人許令改正男女歸宗違者官吏依律坐罪正軍全家調發别衛充軍頂替之人就収本衛補伍如果正軍户無人丁方許將少壯義男并同籍女婿収補仍禁約有司今後勾解軍人務要選取應繼壯丁不許容情將所買軟弱小厮家人義女使女招到女婿朦朧頂解違者一體治罪一各處軍户内應繼壯丁多有怕充軍役故自傷殘者今後若有此等許隣里首拿全家發烟瘴地面充軍一凡有陳告父兄弟姪兒男先年充軍在逃獲斷為事調發及逺年歇役勾發别衛者原籍又勾丁補伍查勘别無另項縁由許令轉逹兵部覆勘開豁將重勾户丁就發寧家聽補見役衛分軍伍一凡有陳告本户係是民籍止與故軍同名同姓冐勾補役從公掲查遞年黄冊體勘是實别無相干就便分豁寧家仍查正軍户内應繼人丁補伍若正軍户絶及挨無名籍轉逹兵部覆勘開豁其同名姓之人巳到衛所當軍食糧三年以上者不准一有等族屬疎逺并異姓人原係同籍在後分户若為事充軍在分户之前合令原户人丁解補如為事充軍在分户之後止許於為事人名下勾取如是聞知親屬為事充軍恐怕連累揑合文憑妄作分户在前及祖孫父子分居并充軍食糧年逺者不准一同籍父祖伯叔人等生前各另充軍事故勾取先儘本房内人丁解補若本房無丁别房有三丁以上者照名勾發各衛補伍别房人丁不及三丁以上者將本房無丁縁由轉逹兵部定奪開豁一同户有兩名三名充當各衛軍役壯丁消乏止有㓜丁二人合候出㓜轉逹兵部定衛將一丁充軍一丁聽補軍役餘衛軍伍開豁一招募等項軍士如有比先全户見丁充軍事故今次俱各照名勾補合將一名先行解發通將實有人丁開報議擬奏聞定奪一正軍在營巳有壯丁就収補伍不許原籍勾取若巳行勾取者有司體勘是實回報原衛將在營人丁収役軍衛不許違例勾擾一義男女婿替義父妻父之家當軍死亡止許於義父妻父之家勾補若係在逃通行責限根捉如是義父妻父之家户絶轉逹兵部覆勘開豁不許於義男女婿之家一概勾擾一故軍户下止有人丁年七十以上或篤廢殘疾不堪充軍者保勘是實明白回報定奪不必保送官吏人等不許因而作弊將不係此等老疾之人朦朧妄報脱免軍役違者論罪一比先將幼小兒男過房與人為男為婿各家俱係正軍事故見在止有過房子或女婿一人在户合將義父妻父之家作户絶開豁存留過房子并女婿聽補親父之家軍役若親父之家係民籍仍令補當義父妻父之家軍伍一官員軍民之家有家人義男女婿等項自願投充軍役及為巳事發充軍者事故止於本人當房人丁内勾解補役若當房死絶轉逹兵部覆勘開豁不許一概混擾一軍户有等倚恃豪强因充糧里老人毎遇勾取之際買求官吏及勾軍人員挾制小民佃户朦朧保結及有里老人等俱係軍户遞年互相揑故回申許照榜例首告改正如是仍不改正事發正軍解發原衛户下再罰一丁發附近衛所充軍一山西等處抽丁等項軍士原選并續勾軍丁俱係精壯之人到衛不久往往買求貪汚頭目人等令户下軟弱人丁私自輪流替換以致軍伍不精今後敢有仍前作弊替換合依榜例許原籍里老官司人等捉拿及許原衛同伍旗軍并諸色人等指實赴親臨上司及把總操備官員處陳告依律照例問斷事内作弊人員就行拿問其軍士果有殘疾并軟弱不堪差操照例相驗明白方許勾丁替換一軍户之家多有全家在逃躱避及官司遞年勾取里老隣佑明知逃避去訖暗地取索財物容情不行拿解今後若有此等作弊之人照依榜例正軍發邊逺充軍知情保結里老隣人發附近衞所充軍一為事編發及調衛旗軍多有更易姓名鄉貫及到衛所又不將原籍原衛丁口從實供報著役之後或逃或故衛所止憑原報鄉貫姓名坐勾有司回無名籍似此迷失者多今後若有此等作弊之人照依榜例正軍發邊逺充軍軍家下另選壯丁補伍隣里知而不首者依律問斷一今後紀錄軍丁年方出㓜當發補役其原衛所離原籍千里之外合照榜例發附近衛所収役充軍具由申逹兵部轉行原衛所開豁原伍一僧道為事發充各衛軍役亡故勾補者合照依洪熈元年二月内欽依事例僧道為事充軍有事故了的都照力士不勾丁的例前項餘丁除已解到衛外今後照例住勾轉逹兵部開豁軍伍一各州縣勾解逃軍及補役軍丁多有於所在官司冐給家人文引供送其實家人不行隨送前來及到衛所不一兩個月即將冐支文引照身逃回原籍及影射各處潛住或經商或受雇於人今後若有此等作弊之人照依榜例正軍發邊逺充軍家下另選壯丁一名補伍一故軍户下止有人一丁為僧為道若在未充軍之先出家給有度牒者轉逹兵部覆勘開豁軍伍如在已充軍之後出家仍發充軍一故軍户下止有人一丁充生員起解兵部奏送翰林院考試如有成效照例開豁軍伍若無成效仍發充軍一今後所勾軍士若丁盡户絶并山後等處人民挨無名籍等項委的無勾者軍衛務要查見各軍從軍縁由差的當人員㑹同有司官吏里老人等從公挨勘三次有司保結回申委無勾取軍衛有司各另造冊備開各軍來厯根因并三次所差人員及回申官吏人等姓名明白通將無勾縁由轉繳兵部以憑開豁經該官吏毋得推調遷延展轉泛填勘合虚文擾害及勾軍人員不許妄指平民違者治罪計處清軍事宜王憲該本部題武庫清吏司案呈奉本部判送據本司主事王學益呈照得清理軍伍係國家重事國初各該衛所在伍有缺俱得徑自差人勾補宣德十年該本部題革節該本部題准事例各衛所將節年該勾逃故軍士盡數查出分别司府攅造底發冊一様二本一本留部存照一本轉發各司府照名清勾仍毎年將各衛所軍額攅造舊管新収開除實在清勾五項花名冊一本送部以備冐清漏清等項查照各司府亦毎年將奉到本部轉發清勾軍冊逐一開立前件攅造實有事故文冊送部回答立法亦若周詳但查得在京各衛所嵗造前項文冊名數多者如府軍前衛則費銀數十兩其少者亦不下六七兩又有各衙門嵗該造送文冊不止一二十項毎項費與此相上下俱於百户俸給官軍月糧扣支使用極是繁擾不堪則在外可知矣况各衛毎年清勾軍士多或數千少亦千餘而計所解到軍丁毎年多者不過二三十名至有一軍勾及幾十次所費不知幾何而卒不能得其一日之役者實為未便各該承委督造軍政指揮不免責成各所千百户人等多有不諳文理及見前冊嵗以為常徒費少益非特視為故事抑且或生厭心往往止憑識字人等任意謄冩惟求塞責大抵攅造次數愈多則差訛愈甚且奸弊横出或有以見伍而作缺有丁而作無以希解補取利者或有故逃以待勾既勾而復首以希解補取利者或有移名換籍以希解到作無憑収伍取利者或有新軍初到而勒財以逼之逃受財以縱之逃以致隨解隨勾者雖禁例甚嚴而撿覈無法勢難悉杜及查各該司府毎年奉到清勾文冊謄發各屬被里長書手人等増減字畫埋沒名數作弊多端其造送回答文冊亦多止事紙上虚文至有勾軍數十而實有不數人者又有一軍回答至數十次而卒無下落者又有雖稱實有而不即解補者其巳解軍丁則又有隨到隨逃者有偽為批印回銷者雖近有行衛填勘之例而道里展轉嵗月侵尋冊籍浩繁日力不給終歸茍且又各清軍官員因本部原定三分之數或至不足有將不缺伍及在營有丁例不該勾人數作冊外清出以强凑免罪者有將丁盡户絶責令里甲頂認及妄指無干者其為民害不可勝言若不及今立為簡要之法將見衛所之清勾徒費而行伍難充有司之回答雖頻而文具何禆且使奸軍或至計行平民或至枉及稽考既疎勸懲不至軍政之壊漸無紀極合行各該衛所自嘉靖十一年為始除宣德四年以前逃故軍士已經題准住勾外其宣德四年以後嘉靖十年以前該勾逃故軍士不必毎年造冊發清聴本部定奪軍单式様令照式刻刷備將宣德四年以後嘉靖十年以前逃故軍士每軍一名用堅白厚紙填单一張用印鈐記𨽻本部者徑送𨽻都司者𩔖送本部掛號轉發各司府州照名清勾仍照舊以司府州相屬攅造底冊一本送部存照以後年分止將本年逃故軍士造冊填单送部施行巳發单者俱免再造本部仍每年終將各州縣逃故軍单總數𩔖填勘合催勾其五項冊亦不必毎年造送聽本部斟酌定與式様更名軍總冊行令各隨該衛原設五所或十所俱毎所釘作一冊照依發去冊式分付百户將各軍照充發年月順序挨冩不許遺漏毎紙一張分作八格毎格填冩一户上列横格開冩軍祖姓名籍貫下分八行開冩充調接補頂替來厯先管百户總小旗姓名餘行空下仍於毎百户下除將原額軍役填滿外各空格紙六張一様二本一本送部一本存衛仍照前冊分别各布政司及直𨽻府州各造一本以憑轉發収貯以後年分止將本年新収編發軍由及解補到軍數開造送部本部清軍委官督令該管人員將該年逃故解到等項填註原軍格下新充軍由填註該管百户空餘格内該衛并各司府州亦行照式填註以備查照雖至百年可免更造各該司府州亦不必每年通將逃故軍士造冊回答及不許將未奉单勾者妄勾擾民止照本部發去軍单逐一清審内有丁者即與解送著伍遇例優免及免勾者即與開豁毎年終將各解過軍丁収有批迴及例免者開造小冊連原单𩔖送布政司及直𨽻該管府州差的當人員送部銷照若將有勾軍丁自单到日為始三年以上不解者雖止一名府州縣清軍官俱叅問丁盡户絶并山後人民挨無者查照軍政條例及節年題准事例候經勘五次以上送清軍御史處審實𩔖繳免其再勾本部及該司府縣仍各立住勾冊每衛一本以備查照老幼不堪解者候經勘三次以上造小冊送部案候原单留該州縣候出幼解衛及老疾故絶日繳逃移跟捉者候三年不獲該州縣另冊編記原单繳部行該衛所另給单勾如再三年勾取不獲仍照此例施行雖久不廢其該年清審過官員職名及里甲隣佑姓名俱照式填冩单後各取親押若里甲人等通同作弊將有丁揑作故絶壯丁揑作幼小非老疾揑作老疾見在揑作逃移者事發應解軍丁照例發邊逺充軍如原係邊逺發烟瘴極邊仍令僉户下一丁補伍里甲隣佑窩家人等各照例發附近充軍官吏依律坐罪以後清軍御史定例五年一差務將五年内發去軍单責令各清軍官逐一完銷仍吊各司府原収住勾冊查審内有揑弊者另冊送部事完即許復命不必定以三年為限各清軍官員但以完銷軍单明白無弊及不枉平民為賢否以示勸懲其各衛所及有司送冊单繳冊单限期并違限等項俱照舊例施行則清勾之在衛所者嘉靖十年若猶未損於舊而自嘉靖十一年以後各衛所造冊之費不啻減十之一所省官軍扣糧之害不知凡幾千萬矣回答之在有司者在嘉靖十年若猶以為煩而自本年軍单既銷之後所嗣發者嵗各無幾所省官司里甲之擾不知幾何而費亦不知凡省幾千萬矣且此单一出不可妄銷而不解之例既嚴揑故之條尤重住勾之冊尚存御史之查不廢則軍衛之該勾者有丁在所必解無丁在所必豁雖欲以虚文了事不可得雖欲以刻薄用事不可得而行伍可漸充無辜可免害矣軍總冊之立可以俟百年不改而勾单之發又不煩復而易查非獨可杜展轉訛冩之端而在衛所妄勾之宿弊在各府吏書積年弄法之宿弊雖欲自逞其路無由矣軍之逃至三次者指揮千百户之所管逃至若干名以上者凡法例之所欲禁皆可一掲以知而法行無不可究之嘆矣夫然後清軍之職在武庫者冊籍不至於填委故綜覈可精在有司者承行不患於煩難故心力可盡在御史者按治不憚於無憑故激揚有道庶乎簡以知要不病於迂疎變以宜時不謂之紛更而於軍政可少禆矣及照各衛所先年造到清勾軍冊舊例俱新選官并復任官員順帶水路應付紅船陸路應付脚力近該本部題准止許進表官及撫按等處公差順帶亦照例水路應付紅船陸路應付脚力但各衛所道里逺近不一前冊不肯一一依期到部毎與進表官員到京相左各撫按等處公差人員往往利於齎文討馬不肯帶冊討驢又南北直𨽻各不係衝要府分俱無人肯枉道齎送以致多滯今既定毎軍止許給单一次則文移自減合咨吏部於新陞除官員係兩司以下州縣正官以上毎季於各布政司選委一人直𨽻各照廵按地方選委一人開送過部將該地方軍单盡數給與順帶前去浙江等處送各布政司交割轉發直𨽻送各廵按御史處交割轉發照例不支廪給水路應付紅船一隻陸路應付本官馬疋及量单多少定與扛擡人夫幾名本部仍按季另填勘合行各司府州查驗則驛遞既可不擾而軍伍亦得及時清理矣再照前項清軍事宜於各軍衛有司等衙門雖極簡便而該司稽考填冩各項文冊則實天下軍政根本尤宜精詳所據原設當該吏十名内止二名係揀撥餘俱大撥多有不諳書冩恐致悞事合咨吏部將該司冊科令典名缺俱揀撥前來庶為便益縁係計處清軍事宜以便遵守事理理合呈請議處施行等因判送到司查得宣德十年該本部題准在京在外都司衛所不許填給勘合差人勾軍止將遞年逃故軍人姓名貫址造冊送部轉發清勾成化十一年該本部題為陳言𩔖送軍冊以備稽考逺年欺隱軍伍事行都察院轉行各處清軍御史督同都司衛所南京北京衛所各於本部委官俱著落各該軍政及首領官即將各管旗軍逐一查出要見原額旗軍若干見在若干逃亡若干改調若干務將原充軍改調來厯年月貫址節次補役户丁正餘姓名備細通𩔖造冊毎布政司攅造一處直𨽻府一處各一様二本照依遞年清冊差人送部轉發清勾正德十六年該本部題為仰承恩命脩舉邦政事内開一定冊式以防欺隱切照勾軍文冊先年雖曾降去式様奈日久人玩合無照依都察院咨到舊管新収開除實在清勾五項冊式通行天下攅造花名總冊一本以防欺隱一復有司回答冊以便查考切照天下有司奉到勾軍文冊清解畢日除清過軍數呈清軍御史奏繳外另造回答冊送部查考正德十六年該本部題為陳愚見以清軍政事内開除宣德四年以前逃故無勾軍名照例住勾以省費用以杜紛擾宣德四年以後逃故軍士除奉例開伍不勾外其餘俱作奉冊清勾之數三年一次造冊送部轉發清理其成化元年以後逃故軍士作照例實勾之數一年一次造冊送部清勾又查得軍政條例内一欵所勾軍士若有丁盡户絶并山後等處人民挨無名籍等項三次有司係保結回申委無勾取軍衛有司各另造冊申繳兵部開豁若有故違查勘是實照依原奏准榜例查問當該官吏又一欵故軍户下止有人丁年七十以上或篤廢殘疾不堪充軍者保勘是實明白回報定奪不必起送官吏人等不許因而作弊將不係此等老疾之人朦朧妄報脱免軍役違者論罪又一欵勾補軍役若正軍户下本有人丁比先朦朧揑作無勾即便改正勾解如仍扶揑回申照依榜例軍丁發邊逺充軍原保結里隣人等収發附近衛所充軍官吏依律坐罪又一欵逃軍除自首免問責限起解外其餘拿獲者就於原籍所在官司取問明白初犯再犯依律的决先將户丁解補里隣人等仍照隱藏逃軍榜例治罪窩家發附近衛所充軍若窩家係軍人發邊逺衛分充軍其窩家如或懼罪不拿將逃軍轉遞他所藏躱者不分軍民俱發烟瘴地面充軍所在官司知情故縱者依律坐罪又一欵軍户之家多有全家在逃躱避及有司遞年勾取里老隣佑明知逃避去處暗地取索財物容情不行拿解今後若有此等作弊之人照依榜例正軍發邊逺充軍知情保結里老隣佑發附近衛所充軍又查得正德十六年該本部題為清理軍伍事内開一應軍冊聽候吏部新選復職官到部將原領文憑查對相同陸續封付前去各衙門交割清理陸路應付驢匹水路應付紅船一切廪給馬匹等項並革其撫按公差應得脚力之人情願帶領者除本等應付外合量加驢匹以為䭾冊之用嘉靖四年該本部題准今後該司預將前項軍冊分别司府封記本數只候各處進表官員事畢回還行移禮部開送本部如上半年不係進表之期遇有各處公差回還告討脚力者就便搭配公文責令帶領止與本等應付如冊數委的重多量添脚力仍於原來批文將領過數目明白開坐係各省者齎至布政司交割係直𨽻者該府州交割嘉靖八年該本司主事廖雲龍呈稱軍冊壅滯要行議處該本部題准咨禮部省令進表官於公事未畢之前赴本部分領軍冊照例應付等因通查案呈到部㸔得主事王學益呈稱計處清理事宜以便遵守一節為照事有極而必變法貴簡而可行所據清軍一事積弊巳久凡有識者皆思變通而推原其故則以其法繁而寡要費而少益矣夫繁而寡要則難稽費而少益則易玩以下之易玩而乘上之難稽是故文雖詳而弊無由察禁徒嚴而奸不可止也今主事王學益具呈前因一則免遞年清勾之擾一則損衛所攅造之費弊端釐革公私兩便相應依擬合候命下行五軍都督府南京兵部在京各衛所并浙江等布政司直𨽻各府州通行各該軍衛有司衙門悉照本部題准該主事王學益具呈事理施行及衛所依式攅造軍總文冊并清勾軍单完日各用牢固木櫃鎻封印記選委的當官員用心管解在京仍限本年五月以裏南京直𨽻山東山西河南限本年六月以裏浙江江西湖廣福建限本年七月以裏四川兩廣雲貴限本年九月以裏俱到部各都司掌印官員務要嚴行催督如有違限不到各都司官與各衛所官一體從重叅究以後年分該送軍冊仍照舊例俱限五月以裏到部及行各司府州如遇本部發到各衛所軍總文冊務要置立木櫃整齊堆架别庫収貯以俟百年不忒各官去任之日俱要交代明白如有疎違接管官具申該清軍御史如無清軍御史申廵按御史具呈都察院移咨本部叅究其各都司衛所及各司府州齎送冊单人員如有違限損失等項俱照例送問重治及咨都察院轉行各該廵按清軍御史嚴行各屬著實舉行及以後清軍御史悉照本部今次題准事理定例五年一差但以完銷五年内發去軍单畢日許令回道不必定以三年為限則費省而人自便法簡而弊可稽軍伍漸充平民不枉而軍政庶乎可修矣及照各該進表官員并撫按等處公差人役領齎軍冊委有未便合咨吏部自嘉靖十一年夏季為始毎季於新陞除官員係兩司以下州縣正官以上毎布政司選委一人直𨽻各照廵按地方選委一人開送過部將該季所有冊单盡數給與順帶前去各省送各布政司交割直𨽻送各廵按御史交割轉發清理照例不支廩給水路應付紅船陸路應付本官馬匹及量冊单多少定與扛夫幾名則不獨可省驛遞應付之擾而軍冊軍单亦不遲滯其該司當該吏十名止二名係揀撥餘俱大撥委多不諳書冩亦合移咨吏部查照該司令典名額俱用揀撥前來庶無悞事縁係計處清軍事宜以便遵守事理未敢擅便等因嘉靖十一年二月十九日太子太保本部尚書王憲等具題二十一日奉聖㫖是欽此陳邊務疏張瓉武庫清吏司案呈准職方清吏司手本奉本部送於兵科抄出廵按直𨽻監察御史金燦題内一件權補邊軍以資防守竊惟近日邊闗要務急於缺人臣欽承勑命查㸃軍士各該要害之地逃亡者十有四五除上班做工外存留者十無二三雖嚴併各衙所掌印官立限清勾通無一軍解到北人乗虚入冦如履無人之地深可憂慮乞勑吏部查復清軍御史庶諸司警懼不事虚文等因抄出送司該本部尚書張等具題清軍御史應否查覆伏乞聖裁於本年二月二十九日奉聖㫖准議欽此欽遵為照御史金燦條陳事多本部開立前件議擬上請雖奉有前項欽依事理而於清軍御史應否復差尚未奉有明㫖伏覩大明㑹典内開宣德二年勑各道掌道監察御史推舉亷能御史十四員具奏差往各處清理軍伍天順二年奏准清軍御史三年一次赴京查考更替𢎞治十五年奏准清軍御史自到地方日為始扣至三年滿日赴京復命正德五年議准在京在外都司衛所不許差人勾軍止將逃故等項造冊送部選能幹御史一十七員分定地方請勑前去浙江等布政司并直𨽻保定等府州縣清理毎年八月終仍具清解過軍數回京具奏嘉靖十一年題准清軍御史定例五年一差但以完銷五年内發去軍单畢日許令回道不必定以三年為限嘉靖十二年該吏部尚書汪為急缺風憲官員事題奉欽依清軍刷巻兼廵按御史兼理委於事體相應且免冗員今後廵按官果能兼理盡職的依部裏查奏不次陞用廢職的照舊著實考察罷黜著為令欽此通查案呈到部臣等㸔得營伍之充實必資於軍士而後集軍士之逃亡必集於清理而可稽百餘年來分差御史清理軍政任專而下皆可以責成限逺而事不至於茍且軍士之既散者復収而營伍之巳虚者漸補近以歸併於廵按御史似亦簡便但其按屬地方文移浩繁勤勤一嵗日猶不給况暇于軍政乎跡其心非不欲為顧其力實有弗逮是以未免舉彼而遺此掛一而漏萬也且如提學廵鹽廵茶印馬等差亦各專委御史而軍伍一事尤國家安危所係可無專官以理之乎今該御史金燦具奏前因無非欲遵復舊章充軍營伍深為有見相應議處候命下之日移咨都察院照依舊例浙江山東山西河南江西湖廣四川陜西福建各差御史一員兩廣一員雲貴一員南直𨽻二員北直𨽻一員本部各請勑一道令其欽遵前去各該地方清理軍伍仍照嘉靖十一年題准事例五年一差但以完銷五年内發去軍单畢日回道不必定以三年為限各該所屬清軍官員亦以完銷軍单明白無弊及不枉平民為賢否亦不必以先年清出分數多寡為勸懲其餘事宜俱有節年軍政條例明白可舉惟復遵照嘉靖十二年尚書汪題准事例清軍著廵按御史兼理臣等未敢定擬伏乞聖裁縁係邊務及奉欽依准議事理未敢擅便等因嘉靖十五年三月十七日本部尚書張等具題奉聖㫖清軍官依擬差用清軍奏曹習古一件妄指軍役事照得直𨽻蘇州等府浙江等布政司人民洪武年間為事法司提問有未曾到京中途先巳病故者有在監病故者其事内人犯後䝉斷發充軍到衛有逃回原籍生事詐騙同起為事先巳病故子孫財物不遂者又有夤差回還勾軍將齎來勘合擅自添冩前項病故人名詐要各人子孫盤纒不與者其逃軍又有被糧長拿獲解衛者俱各挾讎後回原衛却將比先病故并糧里姓名揑作一同為事問發充軍在逃名色妄報在營其衛所官旗不查原卷乗其欺瞞輙便准信朦朧移文勾取因循擾害今發冊坐勾各人訴稱寃枉告要分豁如䝉乞勑該部行移有司府州縣著落各該清軍官員從公查勘前項被誣妄勾軍名明白即與分豁庶免寃枉前件合准所言欲行清理軍政監察御史并直𨽻蘇州等府浙江等布政司行屬著落該清軍官員查勘但有此等妄勾軍名勘合保結呈繳赴部轉行該衛取問明白將挾讎妄報官軍依律治罪被害之人就與分豁一件重役事宣德四年行在兵部頒降軍政條例内開逃軍自首及紀錄出幼者俱發附近衛所収操以後直𨽻府州縣并各布政司將自首逃軍及出幼軍丁照例陸續収發附近衛所収操外今原衛發冊坐取其有司將不係廣西軍士一概又要將户内壯丁起解原衛比將先収發近衛軍人叅係食糧仍令在衛操備以此軍政不一如䝉乞勑該部行移有司將前項原収逃軍并㓜丁除係廣西該發外其餘依舊附近衛所収操仍行原衛開豁軍伍庶得軍政歸一抑且事無重復前件合准所言欲清理軍政監察御史并直隷蘇州等府浙江等布政司轉屬著落各該官吏除廣西軍士該發外其餘各都司衛所軍士照舊収操仍將各軍原伍明白申逹本部開豁題刋印武書以作養將材疏馬文升臣竊惟人君之治天下文德武備相資並用武備莫先於將將得其人則武備自修兵威丕振可以懾服四夷潛消奸宄矣且古為將者必學之於師十數年而後成非一朝一夕所可得也蓋兵法始於黄帝本之井田其來已久禹征三苖誓師之詞兵法巳具其後周之太公呉之孫子齊之穰苴魏之呉起漢之張良唐之李靖皆學兵之久而號知兵今武經七書皆諸子所作其詞古其義奥世之講明者少雖兩京設有武學以教幼官并應襲舍人但教官亦多常流不能講明七書之㫖况我朝機宻兵書有禁人不敢習所以將材甚為難得近該本部節次奏行内外大小衙門訪舉但有諳曉韜畧堪為將官者起送來京經今許久未見舉薦一人目今除在京各營提督武職大臣出自將門韜畧素諳固有其人各邊將官亦止是或號令嚴明或弓馬熟閑或持巳頗亷或愛軍頗仁者求其洞曉韜畧謀勇兼資如古之名將者亦不多見昔宋因有契丹西夏之患最重武備屢命儒臣編集兵書其目實繁獨武經總要一書乃宋仁宗命天章閣待制曾公亮編定仁宗自為之序頒賜内外武職重臣其中所載戰陣攻守行兵布營邊方地里一切器具與夫軍中合用事宜酌古凖今靡不該載武職官員若肯熟讀講解存之於心施之於事雖不如古之名將亦可克任邊方重寄况不係機宻兵書在律條亦所不禁各處不敢擅自鏤板所以武職官員多未得見間有抄謄舊本字様亦多差訛國家承平日久武備漸弛將材乏人邊事雖非趙宋之比固不足慮但西北之敵與我宻邇自古所不能滅屢為中國之患萬一有警勢甚猖獗倉卒之間邊乏良將將何以禦臣等職典兵政國家安危所係若不作養將材於今日何以得之於將來日夜思惟無以為計欲學武事莫先此書如䝉乞勑内閣儒臣撿㝷如有古本武經總要校正明白上進乞勑司禮監將此書從新刋板務在字様真正用好紙刷印數百部頒賜兩京公侯伯都督武職大臣并各邊鎮守總兵太監廵撫都御史及副叅游擊守備内外官員并本部及兩京武學各一部令其如法収貯在邊永逺相傳凡遇交代不許帶去及損毁遺失各官務要時時觀㸔十分精熟毋得視為虚文若罔聞知廵按御史時將查考若有帶去損失者亦要追究下落庶武經廣布將材可得而兵寄不至乏人矣縁係刊印武書以作養將材事理未敢擅便謹題請㫖器械之利一丘濬臣按自昔談兵者皆以弩為中國之長技故漢兵器以弩為尚將軍有强弩積弩之名而其用人則有材官蹶張之目平城之圍陳平請强弩傅兩矢外向夏侯嬰徐行弩皆引滿外向淮南之反亦欲以强弩臨江而守卜式亦願與臨菑習弩者請行死之與夫弓弩持滿抱弩負藺盛弩箭箙見於周亞夫韓延壽之傳自古用弩以取勝見於史傳者不可勝記今世則惟用弓矢而所謂弩者隊伍之間不復用矣意者有神機火鎗之用以代之故不復置歟然以臣觀之二者皆不可偏廢也敵惟弓矢一今我既用弓矢又用火鎗而又復用古人之弩則是敵之長兵一而我之長兵三以一制三敵騎欲來衝突不待短兵接而我之三技巳斃之於百歩之外矣器械之利二丘濬臣按古所謂火攻者因風縱火也而無有今世所謂火藥者宋太祖時始有火箭真宗時始有火毬之名然或假木箭以發未知是今之火藥否也今之火藥用硝石硫黄栁炭為之硝之名見於本草漢仲景方論中巳用為劑則是漢時已有矣然陶隱居日華子及宋圖經衍義等書註未嘗言其可為兵用也硫黄自舶上來唐以前海島諸夷未通中國則唐以前無此也自古中國所礟者機石也用機運石而飛之致逺爾近世以火藥實銅鐵器中亦謂之礟又謂之銃銃字韻書無之蓋俗字也其以紙為之者俗謂之爆爆者如以火燒竹而有聲如竹爆然也今礟之製用銅或鐵為具如筒狀中實以藥而以石子塞其口旁通一線用火發之其石子之所及者無問人物皆糜爛然惟用之攻與守也戰則資其聲以為號令焉近有神機火鎗者用鐵為矢鏃以火發之可至百歩之外㨗妙如神聲聞而矢即至矣永樂東平南交交人所製者尤巧命内臣如其法監造在内命大總神機營在邊命内官監神機鎗蓋慎之也厯考史制皆所不載不知此藥始於何時昉於何人意者在隋唐以後始自西域與俗所謂烟火者同至中國歟天祚國家賜以自古所無之兵器五兵而加以一五行而用其三可以代矢石之施可以作鼓角之號可以通斥堠之信一物而三用具焉嗚呼神矣哉自有此器以來中國所以得志於四方者往往藉此然用久而人玩敵人習知其故或出其巧智以為之避就者亦不能無也何也蓋士卒執此鎗而用之也人特一具臨時自實以藥一發之後倉卒無以繼之敵知其然凡臨戰陳必伏其身俟我火發既間之後即衝突而來請自今以後凡火鎗手必五人為伍就其中擇一人或二人心定而手㨗目疾者專司持放其三四人者互為實藥番番以進專俾一人司放或高或下或左或右應機遷就則發無不中者矣其視一發即退心志不定而高下無凖者有間矣又宜用紙為爆其聲與火鎗等者毎發一鎗必連放三五紙爆或前或後以混亂之使敵不知所避如此則其用不測而無敵於天下矣書生不經戰陳以意消息而為此説乞下曾經戰陳者議其可否以聞器械之利三丘濬臣按設官以造軍器是誠嚴武備之要務我祖宗以來以其事屬之工部凡軍器專設軍器局軍裝設針工局鞍轡局掌管時常整㸃若有缺用隨即行下本局計料委官監督定立工程如法造完進納内帑遇有闗支奏聞支給其外藩府州縣呈禀成造具奏行下依式造完支撥若各處有司嵗造之數起解到部辨驗堪送庫交収有不堪者坐監督者以罪其邊軍器弓有二等曰角弓曰交阯弓鎗有二等曰魚肚鎗曰蘆葉鎗刀之制有馬軍鴈翎刀歩軍腰刀將軍刀且三等又有馬軍义黑漆䤞子箭紅油團牌等器械若夫甲冑則有水磨頭盔水磨鑞子䕶項頭盔紅漆齊腰甲水磨齊腰鋼甲水磨栁葉鋼甲水銀摩挲長身甲并鎗馬赤甲之𩔖此皆國初所造之制其後内兵仗局各以巧計加添新様者又不止是臣考漢之史臣稱誦宣帝綜核名實至謂其技巧工匠咸精其能此雖有司之事然亦上係朝廷之政蓋有是君則有是臣有是臣則有是政治政治之大者不徒在文事而亦有武功焉文事有一物之或遺則是其文之未明武功有一器之或虧則是其武之未備是故經武之有五兵猶脩文之有六籍也六籍未明固是文之缺典五兵未具豈非武之失䇿乎漢宣帝於技巧工匠猶且留心况此兵戎之器所以脩武備立戰功以衛國家安生靈而保國祚於億萬年者哉論皂𨽻書羅倫倫白用光足下向承過論處皂𨽻事吾聞之喜而不寐矣吾弟此論雖一時之宜未盡合聖賢之道然以今視之可謂蟬蜕汙濁之中而脱然自新者也吾烏得而不喜哉然吾猶有説焉豈不信吾弟之過也懼為衆是之所讙也夫一事之非與十人談之非之者一而是之者九聞者率從其是而違其非以非者少而是者多也今此事也一二人談之一二人以為是三五人談之三五人以為是數十百人談之數十百人無不以為是間有是其非者亦垢面縮喙於其間不能一毫自異者懼為衆是之所讙也衆人皆以為是而吾弟獨以為非此吾之所以喜而且懼也吾弟明於知非而果於遷善必有以實吾之喜而虚吾之懼矣且君子處事當視義理為是非不當視人情世故以為是非此事古無有也祖宗之時亦無有也有自近代始吾嘗見東里先生三朝聖諭録載此事是東里時始有也顧佐之為都御史也東里薦之也一日有言顧賣放皂𨽻者宣宗皇帝召士竒問曰顧佐有此事否為大臣而不撿如此何以長風憲哉卿何為薦此人也士竒對曰此事有之近仕者禄不足雖臣亦然非獨顧也噫東里誤也重禄以養士不能使好于其家時人斯其辜東里之見也誠憂禄不足乎今日之天下固唐虞三代之天下也以堯舜禹湯文武之道輔其君則天下之大且家給而人足况仕者之禄乎八口之家百畝之田五畝之宅生之有道用之有節老者衣帛食肉少者免乎饑寒而又以保助乎其隣里親戚况據有四海之富哉大臣以道事君當何所取法耶一事不合乎道或貽四海之憂而遺千百年之患為人謀國不𢎞經逺之猷而茍且一時近小之利此三代以下所以無善治也東里得君行政如此其專且久也而見不出此何也昔髙允事元魏百官俸不足允以清脩苦節自持東里縱不能以唐虞三代之臣自期豈可復居髙允之下乎其見不出此何也然其初猶未如此之甚也利源一開末流無所不至以今視之則倍蓰什伯於其初矣其椎骨剥髓以病天下之民命蠧士心而虧國體汙衊一代之治化而遺羞千載者未有甚於此也君子所以惡夫作俑者此也脱以為士無常産以官為家仰事俯育之資無所於出則如吾弟之所處其亦庶乎其可也今士夫之嗜利無恥者貪多務得旁求巧取皆以為吾分之當然正猶李赤被厠鬼惑身入汚穢過者莫不掩鼻彼方揚揚然自以為鈞天帝都而莫之覺也然秉彛義理之良心吾弟勉為之同志之士安知不有彚興者乎是雖不能頓革一代之積弊凡為吾徒者庶乎少免汚穢之辱也則吾弟之所及者多矣善待其生者以百年為千載千載之事在此舉也吾弟勉之名臣經濟錄巻四十四
