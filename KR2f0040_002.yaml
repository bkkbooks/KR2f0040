body:
  text: 名臣經濟録卷二明黃訓編保治永樂洪熙宣德蹇義墓志録楊士竒洪武甲子中四川鄉試明年中禮部㑹試廷試賜同進士出身擢中書舍人授徴仕郎見重太祖髙皇帝每前奏事率稱㫖而數見奬賚初名瑢一日奏事畢問汝蹇叔之後乎親灑宸翰書義字賜之以易舊名時丁羅夫人憂賜道里費且命馳驛歸蓋特恩云服闋仍舊職滿三載吏部奏當調特命終九載朝夕左右凡機密文字必以付公而公小心敬慎久面愈篤建文中升吏部右侍郎授嘉議大夫太宗文皇帝入正大統轉左侍郎數月升吏部尚書授資善大夫時政令制度有非洪武之舊者詔悉復之公從容為上言損益貴適時宜間舉數事陳說本末文皇帝以公忠實悉從其言小人有譖公不忘建文者賴上聖明不聽有除官不得善地訴公不公者上皆斥之永樂二年冊仁宗皇帝為皇太子命公為詹事時師傅皆以勳臣兼之而輔導責任文臣詹事蓋元僚也上欲有諭皇太子率諭詹事往導意公亦委曲周悉皇太子尤愛重公所言靡不信用滿三載升資政大夫七年車駕巡狩北京命皇太子監國中外庶務惟諸王及逺夷有奏請詣行在餘悉啓聞處分公熟於典故達於政體孜孜無倦不動聲色而事賴以濟賜誥以其官秩封贈二代滿九載賜勑有秉心正直及淳良篤實裨益國家之褒數奉命兼禮部事雖職務填委處之裕如十七年丁父喪歸明年從皇太子朝北京遂命公巡撫直𨽻應天等府州縣問兵民休戚及文武吏之賢否而升黜之公謂國家多事之際悉以法繩吏人將不勝特出其太甚者數人餘多見寬假而兵民利弊當建革者具奏行之仁宗皇帝初嗣位一切政議預者三四人而公居首進少保兼吏部尚書二俸俱支賜冠服象笏及玉帶二遂進少傅又進少師賜師傅之臣銀章各一其文曰繩愆糾繆公首被賜上諭之曰朕有過舉卿即具疏用此封識進來蓋望公等匡直也又念公侍從監國舊勞特製蹇忠貞印賜勑有以善翊君勞心焦思二十餘年夷險一節時修太宗皇帝實録屬公監修宣宗皇帝嗣位一切政議屬公數人如仁考之初繼奉監修仁宗皇帝實録書成賜白金文綺鞍馬從征庶人髙煦還寵賚尤厚復從巡邉既還以公年老不欲煩以有司之務賜𠡠曰卿事祖宗積效勤誠朕嗣統以來尤資贊輔夙夜在念圖善始終蓋以卿春秋髙尚典劇司優老待賢禮非攸當况師保之重寅亮為職不煩庶政乃副倚畀可輟吏部之務朝夕在朕左右相與討論至理共寧邦家其専精神審思慮益致嘉猷用稱眷倚老成之意繼賜銀章一其文曰忠厚寬𢎞蓋以褒德云公為人沈深質實和厚簡靜內有孝友之行事君有誠處人有量無所拂逆未嘗輕涉一語傷物至於議法亦不茍為包含必歸中正歷事五朝凡五十年所履坦坦無一日顛躓之憂退朝之暇手不釋卷貴而能謙富而能約上前所言未嘗退以語人蓋天下有隂被其利者矣士竒嘗竊論之魯簡肅之忠實不欺李文正之不為傷人害物張忠定之不飭玩好傅獻簡之遇人以誠范忠文之不設城府公蓋兼有之矣夏原吉傳録王鏊三十一年升户部右侍郎太宗入轉户部左侍郎旋進尚書凡貢賦役制悉命詳定兩浙大水命公往治且命都御史俞某賫水利集賜之遍詢故老水之源委時役兵民數萬撫恤之人人盡力布衣徒步晝夜經畫目為之赤盛暑或持蓋至曰衆皆赤體暴日中吾何忍求涼决壅滯修堤浦濬溝洫治橋梁導水入海水不為患又奏發粟萬餘石以賑饑給牛具種子與貧民吳人懷之姚廣孝還自浙西上首詢公廣孝曰夏某古之遺愛也召還掌部事請裁冗食平賦役均出入勿使勢要種鹽以妨商賈勿使富貴専錢以沮貨易禁包攬侵欺之弊清倉場廣屯種皆立定規初建北京宫殿採木運餉者命公出巡視給以錦衣官校四十人律治怠事者公登車即諭官吏軍民各處乃事吾將出巡蓋恐犯者衆也人人感恱而事集八年親征北寇命輔導皇孫留守北京兼掌行在六部都察院大理寺事諭之曰朕以房𤣥齡委卿卿其盡心輔導時京邑諸司草創公每旦入朝獨近扆前參决機務退至政事堂郎官御史抱案盈庭公口應手判不動聲色北奏行在南啓東宫京師肅然七月駕回北宫公見便殿曰卿輔皇孫居守事妥民安參决機務咸當朕心公曰陛下之訓皇太孫遵行之臣何功之有翌日上諭羣臣曰夏某輔導皇孫今之周公也十九年三殿災公言愛民所以敬天也乞蠲逋負及芻糧採辦金銀課程優恤流移以回天意從之詔求直言者多云建都北京不便主事蕭儀言之尤峻上怒誅之時科道亦多云不當輕去金陵上曰方遷都時吾與大臣密議數月而行言者因劾大臣上命言官與大臣俱跪午門前對辨都御史陳英言科道皆白面書生不知大計上命左右至午門衆皆啐罵言官公獨奏曰御史給事職當言路且應詔陳言臣等備員大臣不能協贊大議臣等之罪也上恱兩宥之交趾平上問公升賞孰便公對賞費於一時有限升費於後日無窮乃升尤功餘皆班賚西域法王來朝上將親勞之公曰彼慕化而來宜示以君臣之禮且上如是下必有甚焉禮義豈容大壞上曰爾欲效韓愈耶他日法王見便殿上命公拜公曰王臣雖微加於諸侯之上况畨人乎臣恐一屈膝有辱天子臣死不敢奉詔上笑曰卿過侍郎楊勉之拜獼猴逺矣山東妖人唐賽兒黨三千餘人至公入奏曰諸所俘俱平人悉原之衆遮道呼公生我公叱曰朝廷之恩我何與焉漢庶人逆謀既彰上疑長沙有通謀者公曰謀出於彼居人何與臣敢以百口保之十九年議親征北敵羣臣無敢諫者公曰我受國厚恩不可不死諍約尚書方賔同諫曰公但來吾自言之入叩頭言頻年師出無功軍馬儲積十喪八九况今災眚屢作內外俱疲聖體少安逺涉風沙誠未便上怒乃命公整邉儲於口北賔懼自縊遂併籍歸家命錦衣官立取回至則方起厫理儲錦衣促之公曰姑俟畢此不然恐有侵盜死吾安之不以纍公及至上問征寇得失公對如初歷言自古不勤逺略之意命繫於內官監皇太孫屢請赦之上命中使覘之因問曰上待公厚今繫之暴亦有怨乎公曰風雨霜露無非教也何敢怨上意頗解猶繫之駕至榆木川不豫顧左右曰夏原吉愛我八月訃至仁宗時為皇太子親臨繫所公趨出皇太子立中庭泣曰楊榮報父皇已賔天公伏地哭不能起上命起曰卿可出視事公曰先帝罪人未聞遺詔何敢出駕回命賜御厨饌咨以國事公言方今民力竭於東南戎伍疲於漕運宜幸南京少蘇民困上曰朕意亦然復以詔條事宜訪公公請賑饑寬負省賦役罷西洋寶船雲南交趾採辦金寶香料各處閘辦金銀課程每朝罷必呼公等二三大臣近御扆前或隨至便殿面議政務凡內外所進章疏命擬㫖公擬㫖多云某部知道或以問公公曰豫奪之柄非臣下所敢専故付之六部定其可否而復取上裁則事有所分而權不下移也仁宗賔天皇太子監國於南京中外洶洶有漢庶人之憂太后命軍國事悉依公裁處公密謀急迎駕駕將至羣臣出迎太后留公佐襄王監國上見輔臣首問夏某安在蹇義等莫對上不恱至京慰曰見太后方知所以留卿之意漢庶人反檄輔臣奸邪亂政以公為首上夜召公等入議公免冠頓首曰臣罪當死上曰彼借卿為兵端耳命分坐屏左右密議楊榮首勸上親征上難之顧公公曰往事可鑒機不可失也臣昨見所命將語臣而泣其臨事可知兵貴神速卷甲趨之所謂先人有奪人之心楊榮言是上意乃决躬率六師兼程而往師臨城庶人欲降猶令人繞城罵公罪人既得大被恩賞賜閽者三掖朝參公固辭曰舊制非勳臣不敢用上曰卿輔導非勳而何十月交趾請降廷議疑其詐也更欲興兵討之公曰兵疲矣譬如癰伏於身未潰則憂不測已潰則宜進和平之劑使血氣調和自愈若惟毒之攻心腹內虛復生他患莫若因其請降許以復國自新二楊議亦同遂偃兵息民天下賴之胡榮神道碑録李賢太宗皇帝入正大統公供職如舊永樂改元秋以奏對稱㫖特升户科都給事中公益感激盡心五年丁亥上察近侍中惟公忠實可託心腹遂命公巡逰天下以訪仙為名實察人心向背時御製性理大全為善隂隲孝順事實書方成俾公以此勸勵天下人以故雖窮鄉下邑軌跡無不到學校士子聞公亹亹之訓竟日不釋凡名緇髙道被公容接者自以為榮在湖湘間最久丙申秋還朝丁內艱乞終制不允冬十二月進升禮部左侍郎明年往巡江浙諸州尋授嘉議大夫癸卯復自均襄還朝時車駕親征北寇駐蹕宣府公馳謁行在所上卧不出聞公至喜而起召公入見曰侍者謂胡先生來朕見說便是胡先生亦候我起乃大笑且慰勞之曰卿驅馳良苦賜坐與語凡所歷山川道里郡邑豐嗇民情休戚以至所聞所見保國安民之事悉為陳說上說而納之向所疑慮者至是皆釋比退漏下四鼓矣先是仁宗皇帝為太子監國時有飛語上聞文廟屬公往察之公至目覩所行七事皆誠敬孝謹乃密疏以聞上覽之大恱自是不復疑也仁廟嗣位之初特給誥命加授正議大夫資治尹已而聞公曽有密疏疑之乃轉太子賔客兼國子祭酒之官南京未幾閲章奏見公所上密疏深嘉其忠方議重用而龍馭上賔矣胡廣碑録楊士竒公初以進士第一為翰林修撰階承直郎又明年太宗皇帝入正大統升侍講踰月改侍讀進承德郎永樂二年升右春坊右庶子階奉議大夫仍兼侍讀四年進翰林學士兼左春坊大學士階奉政大夫進文淵閣大學士仍兼左春坊大學士又三年得疾且劇上數命太醫集衆醫之良者往視日遣中使問疾既卒上悼歎不已命工部具棺禮部賜祭者再贈資善大夫禮部尚書諡文穆國朝大臣有諡自少師姚公廣孝與公始也又命官給舟還其喪命有司治祠墳時仁宗皇帝監國南京公之喪過焉遣官臨祭賜賻甚厚葬畢其子入謝官其長子穜為翰林檢討仁宗既嗣位追念公舊人加贈榮祿大夫少師禮部尚書遣官諭祭且厚賜其家遭逢二聖恩備始終何其愈久而愈盛也公居官敬順在上前承顧問應對必盡誠必據理而忠厚為本未嘗及人過失事於奉㫖制𠡠視草即有所見必具可否以聞多見采納所撰進文字上知出公筆輒稱善所奏對語及所治幾務退未嘗出口雖親厚不敢私涉有問蓋自守之嚴有素事太宗皇帝十有七年凡巡幸北京親征北敵翰林率公與楊公勉仁金公幼孜在扈從信任甚篤禮部郎中周訥建請封禪羣臣亦多言此太平盛事上皆不聽時獨公之言與上意合既退作却封禪頌奏之丁母憂召還上問百姓安否對曰安但郡縣窮治奸惡外親為民厲遽詔罷之其兼春坊也小心盡誠多所禆益故尤為儲君所厚而沈靜謙約以滿為戒未嘗干人以私人亦無敢以私干之兩考京畿鄉試四為廷試讀卷官鑒别公明奉勑修髙皇帝實録及五經四書性理大全書皆為總裁志於扶植名教奬掖善類果於義事於利不茍取與未嘗一比匪人所與交必輔之於善不善去之不復顧小人有不滿公者屢造言毁之賴上深知之不聽遽黜毁者而公自執愈堅意度蕭散雖身處榮祿未嘗一日忘山林幽淡閒逺之趣公退閉户讀書賦詩而已漢府之變一楊士竒永樂十四年上在北京頗聞髙煦有異志驛召隆平侯張信詢之上猶未信車駕遂還南京以問皇太孫對曰人言未可輒信且父皇在當未敢有此心一日翰林諸臣奏事退上召士竒還問曰汝與蹇義在此漢府事皆當悉知昨日詢義固辭不知不肯言汝當為朕言之又曰如朕未有知汝輩慮有離間之罪朕既知矣汝何慮對曰臣與義同事東宫殿下外人固無敢與臣等言雖間有言者亦百之一二又多出臆度非見實跡此固不敢輒對陛下然漢王始受冊封國雲南不肯行後改青州又堅不行今知朝廷將徙都北京惟欲留守南京此天下之人疑其心亦豈待事有實跡哉惟陛下早善處置使有定所用全父子之恩以貽永世之利上默然起還宫數日上得髙煦私造兵器及皮船教習水戰及僭乘輿服物挾私擊死無罪官民縱護衛軍京城內外劫掠悉有實跡大怒禠其冠帶縶之西華門內東宫殿下叩頭懇為救解乃免上命翰林條示其罪且曰若此所為將來必不靜朕今削兩護衛處之山東樂安州蓋去北京甚邇即其作禍可朝發而夕擒也三朝聖諭録漢府之變二楊士竒仁宗賔天公受顧命時宣宗為皇太子監國南京中外洶洶有漢庶人之憂太后以公東宫舊輔凡軍國事悉命公裁處公密謀急迎駕還京駕將至羣臣出迎太后密命公留佐襄王監國上見輔臣首問公安在蹇少師等莫能對上不恱駕至京召公慰曰近見太后諭所以留卿意朕方知之卿奉皇祖命輔朕有年朕倚卿非他人比卿當以事皇祖者事朕加賜寶帶時喪禮及即位之儀皆公一二人所豫定諭衆𠡠草命公等刪削詔敕之議多主公言每朝呼召面議政務及手𠡠咨訪國事悉如仁考初公同蹇少師二楊少傅同心輔政蹇重厚多謀公含宏能斷文貞博古守正文敏明達有為中外稱為得人上時與公面議久命賜茶或命退殿廡少休復至扆前論議上尤以心腹託公朝退之暇不時獨召公密切顧問或袖中出小帖子親付公手公亦或有所呈於上凡中外所進章疏専命公批未及命攜出條㫖許用小票墨書帖各疏面以進中易紅書批出或未批多命公傳㫖處分公日孜孜惟謹所受聖諭及納誨於上者未嘗退以語人凡諸公謀猷之善者力贊成之不自有其功先修太宗實録命公監修至是復命公監修仁宗實録國朝文臣三預監修者惟公一人而已宣德九年秋七月上以山東無麥詔蠲其稅且諭公曰稷思天下有饑者猶己饑之伊尹作相一夫失政若撻於市卿國之大臣宜體此心公叩首曰臣敢不仰承聖訓八月漢庶人謀反移檄誣輔相奸邪亂政以公為首蓋惡公等得君贊治不利於己也上夜召公等入議公免冠頓首曰臣不才致變亂親藩罪當死上曰卿何為是言蓋假卿以興兵耳休戚與卿同之命分坐密議屏左右語楊文敏公首勸上親征上難之顧公公曰往事可監不可失也臣昨見命將而其色變退語臣等而泣在廷如此則其臨事可知又曰兵事貴速且有詞宜卷甲韜戈而往一鼓而平之先人有奪人之心也楊榮言是上意遂决即躬率六師征之晝夜兼程而往師臨城漢庶人懼欲降猶令人繞城上詈公罪人既得大被恩賞賜公閽者三人掖公朝參出公固辭曰舊制非勳臣不敢用上曰卿輔導忠勤非勳而何夏忠靖公遺事趙府之變一楊士竒公字廷器始代父長五十夫選𨽻趙簡王護衛永樂癸卯五月太宗皇帝微不懌數日未出見羣臣仁宗皇帝在東宫軍國政務悉啓聞施行邪僻傾險之徒不得騁其私咸所不便簡王時留北京敬修孝弟其護衛指揮孟賢等十數輩潛結厯官王射成等及內侍養子共構邪謀欲候宫車晏駕矯詔從中出立簡王而己得志焉實祕不令簡王知蓋慮不從即事敗虀粉而尸其謀者公姻家髙以正布置已定髙密以語公公駭曰此天壤間極惡大罪鬼神所不貸者奈何甘為覆家滅祀計髙不聽髙怒而慮其泄也謀害之遂詣闕入疏上覽之初疑其詐諼曰豈應有是反覆詰難衆為公危公詞色不少挫既捕賢等至上親問狀得其邪謀本末及所造僞詔立誅以正射成及內侍養子升公遼海衛千户後賢等皆伏誅召還又升懷逺將軍錦衣衛指揮同知有㫖戒其同官事必關白勿謾都督僉事王瑜神道碑趙府之變二楊士竒宣德元年髙煦反車駕親征罪人既得師還六部遣尚書陳山迎駕山見上言宜乘勝移師向彰德襲執趙王則朝廷永安上召楊榮以山言諭之榮對曰山言國之大計遂召蹇義夏原吉諭之兩人不敢異議榮言請先遣𠡠趙王詰其與髙煦連謀之罪而六師掩至可擒也從之榮遂傳上㫖令士竒草𠡠士竒曰事須有實天地鬼神豈可欺哉且𠡠㫖何以為辭榮厲色曰汝可沮國之大事乎令錦衣衛責所繫漢府人狀云與趙連謀即事之因何患無詞士竒曰錦衣衛責狀何以服人心榮曰汝不然吾言可往與蹇夏言之士竒往見二人言之蹇曰上意已定衆意亦定公可中沮耶夏曰萬一上從公言今不行趙後或有變如永樂中孟指揮之舉誰任其咎士竒曰今事勢與永樂中異永樂中趙擁三護衛今已去其二且昔孟指揮所為王實不預聞不然趙王豈至今日乎蹇曰即如公言今若何處置士竒曰為今之計朝廷重尊屬厚待之有疑則嚴防之亦必無虞而於國體亦正矣二人曰公言固當然上特信楊榮不係吾二人可否也士竒退與榮曰太宗皇帝惟三子今上親叔二人一人有罪者不可恕其無罪者當加厚庶幾仰慰皇祖在天之靈榮曰汝既不草𠡠則我當以聞時惟楊溥與士竒意合溥曰吾二人請入見上明其大義兵必不可移榮聞溥言即趨入見溥與士竒亦踵其後而門者不納二人不得入已而有㫖召蹇義入蹇義以士竒言白上意不懌然亦不復言移兵遂還京道中有顧問惟召榮及蹇夏不復召士竒及溥至良鄉臣二人始得見上意猶若未平忽厲聲曰好機㑹不得乘到家皇太后必見尼矣上至京大悔不復及彰德事然言者猶喋喋削趙護衛且請召趙王拘之京師上皆不聽一日特召士竒諭曰言者論趙王益多如何對曰今日宗室惟趙王於陛下最親當思保全之毋惑羣言上曰吾亦思之皇考於趙王最友愛且吾今惟一叔奈何不愛然當思所以保之之道吾今將封羣言俾都御史劉觀及公侯中選一人賫以示之使自處對曰必不得已則於皇親中選一人與趙心相孚者偕觀行庶幾有所開導上曰然則誰可對曰廣平侯袁容至親且善開諭更得璽書親諭之尤好上從之遂遣容觀行趙王得璽書及言者所上章大喜曰吾生矣即獻護衛且上表奏謝恩而言者頓息上待趙王益親厚而薄陳山竟疏斥之蓋上初雖為山所惑而後灼知其非踰數月召士竒至南齊宫諭之曰吾待趙叔不失親親之禮爾有力焉自今毋以見忤為嫌遂賜白金寶楮文綺三朝聖諭録名臣經濟録卷二
