body:
  text: 名臣經濟録卷十四明黃訓編內閣題內降疏徐溥前日欽蒙發下揭帖一紙內開欽天監致任監正李華令臣等擬旨著復職管事臣等看得李華係傳奉官禮部參奏行事乖謬致仕况已年老今一旦無上事忽然傳出著復職管事未免驚駭衆聽且皇上登極以來凡百除授升遷俱是合干衙門題奏請旨未有自內傳出者今又輒開其端誠恐奔競干請之徒紛然而起後來難以止塞其於治道不無有損若李華果於選擇昌國公張巒葬地與有勞力亦當工完之日量與賞賜為宜况本監見有監正吳昊掌印一衙而設兩正官亦為繁冗臣等叨承朝廷委任一事不敢阿從易曰君子作事謀始蓋凡事謀於其始則易為力幸門一開則引例希求者無所不至矣臣等愚見如此伏乞聖明採納不勝幸甚李東陽年譜録時有旨免日講公等上疏曰經筵日講皆祖宗朝良法美意所在而日講尤切謂之日講者蓋逐日之義欲其工夫接續義理貫通以為政令之法程治化之根本也今天氣和暖正是講學之時臣面受先帝顧命惓惓以常請讀書為諭追思及此涕淚滿襟惟欲少效微勞以圖補報若不昧死懇請則負先帝顧託之隆孤皇上倚毗之重罪當萬死無以自逃矣上未報五月上復不豫數日平復視朝公等上疏曰臣等備員保傅叨寄腹心論道輔德臣之職也安上保邦臣之願也先於三月二十四日恭聞聖體違和暫免朝參數日近於五月十三日又聞聖體欠安臣等神魂飛越寢食不寧犬馬私情莫知所措再經數日乃得瞻拜天顔不勝欣躍而喜幸之極轉生憂懼謹昧死上陳仰惟皇上英資洞達聖性剛明直可超邁百王齊光列聖但恐天時地利偶失其宜倉卒之間慮所不及蓋自端陽前後金鼓炮火之聲徹于都邑廄牧圉役之徒充于宫禁此皆衆耳衆目所共聞見大臣畏忌而不敢諫小臣震懾而不敢言臣等若再緘口括囊旁觀坐視則祖宗分職以設官朝廷縻祿以養士亦將焉用之哉昔漢司馬相如諫擊熊豕以為遇逸材之獸駭不存之地輿不及還轅人不暇施巧雖萬全而無患非天子之所宜近也張猛諫御樓船以為乘船危從橋安聖王不乘危史册書之皆稱美事臣等不能親侍輦轂又不能先事格心前日之事萬有一失臣等分固當死死而有知何以見先帝之面乎幸賴廟社神靈天心仁愛聖躬康復國祚隆長此正聖心感悟之機天下蒼生之福也伏望皇上念萬乘之尊思萬幾之重體萬民仰戴之切為萬代悠久之圖視朝加早則炎暑不侵進膳有時則元氣日盛于以導迎和氣坐致太平推之天下人民無不得其所者則大廷奏事不過數刻之勤而燕處深宫自有無窮之樂矣聖旨卿等説的是皆為天下社稷臣民朕已知了急皇儲疏李東陽臣等備員輔導叨任三孤或膺受顧命或荷蒙簡任瘝官竊祿積有歲時徒抱朴忠略無寸補深慮過計寢食靡寧近日以來恭遇陛下洞啓聖心勵精新政大姦已去羣弊漸消孝理方隆仁恩誕布天下之人欣欣相告皆以為太平之治可指日而致也但事有關于國家社稷至重至大者臣等若知而不言言而不盡則是緘默容身因循誤國生無以報陛下知人之鑒死無以見先帝在天之靈所謂顧命者為虛名而輔導者皆餘事也臣等竊惟天下者祖宗之天下上天之所付託生民之所仰賴昔太祖高皇帝櫛風沐雨十餘年而後得早作夜思三十餘年而後定何其勞也太祖文皇帝南征北伐定鼎貽謀亦二十餘年而後成何其難也列聖相承兢兢業業罔有怠荒以致今日先帝顧命惟欲陛下早嗣大位早成大婚光前裕後衍無疆之祚聖慮所及亦何其深且逺也四五年間陛下春秋鼎盛而儲嗣未聞中外臣民傾耳拭目以俟前星之耀此臣等所以憂懼也伏望陛下念上天付託之隆思祖宗授受之重體生民仰賴之切每于朝奏講讀之暇安處宫闈溥施恩澤起居以節遊豫以時保養天和培植國本則六氣不能侵百邪莫敢近皇儲早立寶祚延長可以隆我國家萬年之業矣未報諫調邉軍入衛李東陽有獻密計者託言京軍不習戰陳欲調宣府邊軍三千入衛京師而以京軍兊數戍邉每歲春秋畨換如班操例上遣司禮監谷大用同至閣議公力辨以為不可大用等謂此事非我輩所為自有先入之言牢不可破盍姑試之以俟再議公曰某等職在論思預聞國計知其不可若勉強曲從即有後患獻計者不知何在而執筆者固存國事一壞雖死何贖往返再日乃具揭帖略陳其故曰宣府京師北門切見強敵十分緊要朝廷屯宿鎮兵分地防守尚恐不給每年河南等處官軍輪班備禦近因劉賊猖獗動調官軍乃是一時權宜亦非得巳况今正是防冬時月縱使京軍在彼徒為勞擾亦難濟事祖宗百餘年來未嘗有此恐傳聞四逺未免驚疑臣等不敢輕議如謂聖駕看牲在邇欲比常加意竊見總兵卻永見在滄州宜令兵部密地行文暫帶領邉軍近京住劄事畢之日仍令還鎮庶事體穩當人心安靖乃下兵部會議兵部始以為可行及聞閣議及衆論多未協者覆議至再皆云不可而內意巳定司禮監文書迫令擬票去上坐乾清宫門必欲今夜批出公等乃具題本極言其不便曰京邉官軍各有分地必有急事乃可互相應援今無事而動一不便也京軍備邉不習戰陳難保必勝恐損國威二不便也京軍出京駭人耳目傳聞各處未免驚疑三不便也京軍出外倚恃強勢占住房屋索要錢物需索酒食強買貨物姦汚婦女將官護短而不肯禁邉方受害而不敢言四不便也邉軍在內狎恩恃愛傲睨軍民蔑視官府小則怠玩大則違法治之則或不能堪縱之則愈不可制五不便也違逺鄉井拋棄骨肉或風氣寒暖之不相宜或盤費供給之不相續六不便也糧草之外必用行糧布花之外必須賞賚非緊急不得已之時為糜費無紀極之計七不便也往來交替無有寧息倉卒之際或變起於道途厭倦之餘或患生於肘腋八不便也示京營之空虛見中國之單弱九不便也西北諸邉見報聲息唇齒之地正須䇿應脫有踈失咎將誰歸十不便也凡此一事不便者有此數端今五府以為不便六部等處衙門以為不便六科十三道皆以為不便臣等以腹心之臣居輔導之地若阿諛委順強勉曲從是滿朝之臣皆有為國之心而臣等獨當誤國之罪萬死不能以塞責矣伏望聖明洞察博採人言稍俟從容務求至當實宗社無疆之福也所有前項事情臣等不敢别議嘉靖登極詔草楊廷和奉天承運皇帝詔曰朕承皇天之眷命賴列聖之洪休奉慈壽皇太后之懿旨皇兄大行皇帝之遺詔屬以倫序入奉宗祧內外文武羣臣及耆老軍民合辭勸進至于再三辭拒弗獲謹于四月二十二日祗告天地宗廟社稷即皇帝位深思付託之重實切兢業之懷惟我皇兄大行皇帝運撫盈成業承熙洽勵精雖切化理未孚中遭權姦曲為蒙蔽潛弄政柄大播凶威朕昔在藩邸之時已知非皇兄之意兹欲興道致治必當革故鼎新事皆率由乎舊章亦以敬承夫先志自惟涼德方在沖年尚賴親賢共圖新治其以明年為嘉靖元年大赦天下與民更始所有合行事宜條列于後一自正德十六年四月二十二日昧爽以前官吏軍民人等有犯除謀反逆叛子孫謀殺祖父母父母妻妾殺夫奴婢殺家長殺一家非死罪三人採生折割謀殺蠱毒魘魅毒藥殺人強盜妖言姦黨失機并事干邉方夷情及人命至死罪者不赦外其餘巳發覺未發覺已結正未結正罪無大小咸赦除之有以赦前事相告言者以其罪罪之一𢎞治十八年五月十八日以後正德十六年四月二十二日以前在京在外內外大小官員人等有因忠直諫諍及守正被害去任降調遷改充軍為民等項及言事忤旨自陳致仕養病等項各該衙門備查明白開具事情奏請定奪死忠者諭祭修墳廕敘降調遷改致仕養病間住充軍為民者起復原職酌量升用大臣量進階級并與應得恩廕人夫月米相應起用者有缺推用已故者加贈一正德十四年文武官員人等為因諫止巡遊跪門責打降級改除為民充軍等項該部具奏起取復職酌量升用被打死者情尤可憫各追贈諭祭仍廕其一子入監讀書內有充軍故絶者一體追贈諭祭查訪親屬量與優養一王府册封朝廷大禮今後該部務照舊制一年一次舉行一各處王府應得祿米有缺少者各該巡撫都御史督率所屬查催完納一各處郡王將軍府子女有應請名請封選婚者本府即與保勘奏請承奉長史等官不許刁蹬其有年已長成未曽婚配貧難無力者所在官司量為助給一各處郡王將軍中尉有因事革減祿米者除毆殺人命敗倫傷化外其餘自詔書到日為始俱照舊支給儀賓有因成婚年逺不曽赴京謝恩參奏者悉皆宥免一自正德元年以來諸色人等傳升乞升大小官職盡行裁革吏禮兵工四部各將查革過傳升乞升文武僧道匠藝官員名數類奏查考其皇親及公主所生子孫原無出身正途朝廷推恩升授者不在此例一兩京五府見任掌印僉書管軍管事公侯伯都督及都指揮六部等衙門見任文職四品以上官并各處巡撫官俱聽自陳去留取自上裁武職內有傳旨管事者革去管事照舊帶俸文職五品以下兩京吏部照例會官考察一內府各衙門見任官員有侍從年久供事勤勞願告優間者許各具本陳請取旨定奪一給事中御史職當言路今後凡朝廷政事得失天下軍民利病許直言無隱文武官員有貪暴姦邪者務要指陳實迹紏劾在外從巡按御史紏劾一官吏軍民人等犯罪自正德九年正月二十八日以後已問結立功哨嘹運灰運炭運磚運石做工納米納料納鈔擺站煎鹽炒鐵充儀從軍伴膳夫及罰班重厯拘役枷號等項悉皆放免中間若係行止有虧敗倫傷化例該帶俸差操革職為民者仍各照例發落一武職官降級調衛者除失機事干邉情不宥外其餘俱復職回衛內原係錦衣衛調在京别衛文職因公錯并公事詿誤降級者復原職內原係京官者對品别用其因事革罷為民者除事干行止有虧敗倫傷化外悉與冠帶間住原係冠帶間住及京官調外任致仕者各照原職致仕一各處武職有因私役軍人不及五名例前問擬降級者守邉失誤被賊搶虜人民不及五名情輕律重降級者俱復還原職其各邉軍人因失事饒免發遣常川守哨者亦免守哨一正德十五年十二月以前各處實徴稅糧馬草農桑人丁絲絹布匹絲綿花絨屯田皇莊莊田子粒牧馬草埸子粒租銀及甲丁二庫蠟茶銅漆銀硃鹽課厨料戶口食鹽豬羊雞鵝備用孳生馬騾山厰柴夫後府柴炭軍器沿河軍衛有司蘆葦茭草夫價及閘埧泉溜洪淺等夫并樁草等料及曠役等項銀兩一應歲𣲖歲辦奏𣲖但係該納官錢糧物件拖欠未徴者盡數蠲免以蘇民困巳徴在官該起解者照舊起解準作本户以後年分該納之數各造册奏繳查考敢有將已徴揑作未徴侵欺盜用者許諸人首告巡撫巡按及守巡司官察訪拿問重治造册官吏參奏提問戶工二部差去催徴官員即日回京一浙江等十三布政司并南北直𨽻嘉靖元年分內除漕運糧斛四百萬石照舊徴兊起運其餘夏秋稅糧馬草農桑人丁絲絹布匹絲綿花絨屯田皇莊莊田子粒牧馬草場子粒租銀及甲丁二庫蠟茶銅漆銀硃等料不分存留起運以十分為率俱免五分以蘇民困一京通二倉水次倉皇城各門京城九門各馬房倉埸各皇莊等處但係正德年間額外多添內臣司禮監照𢎞治初年例查奏取回一近年差出取佛買辦織造燒造等項及腹裏地方并各邉各關但係正德年間新添分守守備內臣詔書到日即便回京其各處分守守備內臣將官有正德元年以後夤緣改作鎮守分守及副總兵等項名色并分外多管地方加添責任者兵部俱查奏改正換給勑書一自正德年來兩京各衛所容令無籍之徒冒籍投充并新添旗軍校尉勇士力士軍匠并內府各監局招收軍匠等役辦納官錢私役占用不下八九萬餘歲支錢糧百萬餘石以致京儲虧耗歲用不繼關係非輕論法都當拿問追究但既遇赦姑容改正詔書一出但係正德年間冒籍投充并新添及私自頂補額外招收等項人役并有名無人該衛所官按月支糧包辦月錢者即便各回原衛原籍隨住當差該衛所即將名伍開除回報戶部具數奏聞敢有揑奏存留設計影射仍前冒支官糧者事發都押發遼東鐵嶺衛永逺充軍該衛所官吏拿問調煙瘴地面安置一騰驤左等四衛勇士除𢎞治十八年兵部并科道官查出見役正數并事故外其餘詭冒名籍未經裁革仍又夤緣回衛虛挂名額者各照原擬舍餘發原衛民丁發在京缺軍衛分各充軍役食糧差操以後勇士替補照例開送兵部驗軍官處驗過方許收糧一權勢中鹽侵奪民利并客商中鹽增價轉賣俱問罪入官律有明禁近年以來姦商投託勢要每遇開中盡數包占轉賣取利甚至奏開殘鹽減價中支每米一石支鹽四引任場買補夾帶私鹽阻滯正課以致鹽法大壞邉儲告乏罪雖宥免鹽當追沒詔書到日巡鹽御史并各運司官即便查訪鹽糧勘合內坐到已支未掣并未𣲖未支鹽課但係商人投托勢要詭名占中賣窩買窩及河東運司鹽課例該宣府中納被勢要奏討賣窩别處開中并奏開殘鹽減價報中者悉照大明律裁革入官不許放掣𣲖支敢有將勢要中鹽賣窩買窩情由設計隱瞞仍舊冒支官鹽掣賣者許諸人首告給賞正犯追完鹽課發邉逺充軍干礙勢要聞處治巡鹽御史運司官吏知情容令掣支各治以罪其見堆皇鹽並各處巳賣銀兩未賣鹽斤盡數入官各項入官鹽課巡鹽御史作急回奏戶部查照邉儲急缺去處開中本色糧料以濟急用一在內御馬倉天師庵中府二草埸在外埧上等十九馬房倉吳家駝裏外牛房司牧司司牧局今年合用糧料草束於原會數內減去一半坐𣲖以蘇山東河南北直𨽻小民困苦以後年分還著巡視科道官備查馬匹牛羊實在數目照數會計以免冒濫一近來抄沒犯人莊田園圃戶部委官從公查勘如有倚恃權勢侵奪霸占者審證明白歸還本主管業若係原有及兩平置買價直無虧者照依時價變賣銀兩送太倉銀庫交收備邉若地畝數多離京五十里之外者行令該管州縣召人佃種照例起科一抄沒犯人玄明宫地土原係軍民住居墳墓該給主者該部會同科道官逐一查審明白給主管業一近年各處鎮守協守分守守備等官違例奏帶人衆到于地方科斂財物奪占功次所在不才官員因而乘機指一科十貪利成風以致百姓受害深可痛心詔書到日例外奏帶人員即便各回原衛原籍間住當差違者許撫按并按察司官察訪參奏拿問官舍旗軍調邉衛差操民發口外為民書辦省祭等官革職不敘今後敢有仍前奏帶人多及帶軍民職官錦衣衛旗校者該科即時劾奏究治其鎮守等官中貪刻顯著壞事有名者各該巡按御史指實具奏取回司禮監從公推舉平素亷靜老成之人奏請更替仍照舊例寫勑不許干預錢糧詞訟侵越諸衙門職掌亦不許假以進貢為名僉取皂𨽻科斂銀兩擾害軍民額外進貢一切停止一漕運官軍儧運糧儲經年纍歲不得休息貧苦可憫正德十四年以前京通二倉若有挂欠糧米席皮板木腳價一切赦免其南京并臨德徐淮水次拖欠者不在此例一漕運官軍借欠債負利上生利為害百端自正德十五年以前借者不拘多寡俱不許還以蘇漕運官軍困苦以後再借再放者聽漕運都御史巡按巡倉御史查例參奏重治一各處徴糧養馬地土內有水衝沙壓􅔐江等項負纍人戶包養纍經具奏者巡撫巡按官查勘明白具奏除豁一各解納錢糧到京內外管收人員刁蹬需索使用之數多於本物以致上納不敷重復徴解貽纍小民該部申明禁約許被害之人指實奏告治以重罪一南北直𨽻山東山西陜西湖廣浙江江西等處地方大軍經過及雖無軍兵經過但奉有明文取辦供應軍需等項所司動支官錢糧應付者各該撫按官查勘明白準作正支銷不許復行徴補重困小民一內府多餘宫人著司禮監逐一查審有親屬者各令的親家屬領回任其婚嫁無親屬者官與婚嫁務令得所一在京抄沒犯人錢寧等并江西逆賊宸濠等入官財物除金銀并器皿首飾珍寶及違禁之物外其餘紗羅紵絲綾紬布絹鋪蓋衣服靴帽家火器玩等件若貯庫年久不無浥爛損壞可惜著戶部科道各差官二員查盤見數估計鈔貫明白補放文武衙門官員正德十二十四十五年各上半年折俸之數若有多餘挨年再補一各處無籍姦人遊食術士及無名內使私自淨身人等多有投託王府因而撥置害人甚則貽纍宗室詔書到日許令自新各還本務各該撫按官仍要嚴加禁治不許故縱容留以稱朝廷親親至意一文武官員有因事住俸罰俸回話者悉皆宥免一南京內府各監局軍匠有丁盡戶絶名伍不除冒支月糧者南京戶兵工三部盡行查革一近年以來內府各監局官員內使添增太多供用浩繁甚非祖宗舊制司禮監逐一查選照依𢎞治以前員數存留供事多餘之數俱以本等職事聽用如遇各王府及內京各監局缺人奏請撥去應用其原係海戶夤緣驟入者仍舊查充海户見充海户者禮部盡數發回原籍為民當差不許在京潛住其原係樂工淨身收內府者亦盡數革退發南京孝陵衛充軍一私自淨身之人多有在京潛住希圖收用著錦衣衛緝事衙門巡城御史嚴加訪拿問今後各處軍民敢有私自淨身者本身并下手之人處斬全家發煙瘴地面充軍兩鄰及歇家不舉首者俱治以罪一宸濠之變都御史孫璲按察司副使許逵仗節死義并一時被害不屈之人日久尚未褒録都御史王守仁倡義督兵平定禍亂并同事協謀有勞之人亦未及論功行賞該部即便會官擬議奏來定奪一問刑衙門有抄提在官人口犯該反叛應連坐未給配安置者奏聞定奪其有律不該載者悉皆放免原沒官田産給還住種照舊納糧當差一正德元年以後在京在外官旗軍舍人等但係例外奏帶及稱報效在各邉各處或一人數處或一時兩三處報功及併功升官旗者除原祖職役照舊其餘盡行除革各衛所各將革過名數送户兵二部查考敢有受財隱避不革及抗違妄奏者俱問發邉衛充軍其諸色人等冒認錦衣衛官員户下舍丁致升官旗者限三箇月以裏許各官旗自首與免本罪冒籍之人革去職役過限不首該部查出或被人告發通行治罪發遣一正德十二年十月內大同應州功次極為冒濫內有傳升文職者吏部查奏軍職除本邉官軍自斬首級例該升級外其餘升者不分已未領受兵部查奏裁革一近年軍職人等在各邉不曽斬有首級巧立當先衝鋒等項名色及各處斬首不及數該部照例擬賞奉旨升級世襲者兵部通行查革一武職并舍人舍餘旗校納銀等項授職并冠帶者獲功止許於實授職役上加升一賜姓人員及見犯罪冒姓者各復本姓在京者各照原有本等職役間住隨住當差在外取到留用者不分官職大小各回原衛原籍帶俸間住但因賜姓義子廕升職爵并與做勇士等項食糧名色者兵部盡行查革原係在外官員罷間并原跟犯罪勢要無名籍惡黨俱不許在京潛住違者錦衣衛巡城御史五城兵馬司挨拿遞解窩家送問一在京武職除近選軍政并會保將材外其餘有告願改調外衛者該部查勘相應具奏改調仍聽撫按官照例考選管事一軍職病故子孫告襲扣算年月但在十年以裏該衛查勘明白保送到部者即與收選免其駁查一錦衣衛校尉專係直駕人役近年多有奏討投託濫占跟用因而令其幹辦私事脅制害人該衛盡行查明取回一南京年例進解馬快船隻舊例每起不過三隻正德九年以來違例撥給比舊加多攬載客貨沿途攪擾本等廩給夫役之外勒要銀兩數多甚為民害兵部出榜通行禁約今後進解船隻務照舊例撥給經過地方不許分外生事勒要折乾銀兩違者巡按巡河等官指實參奏不許故縱一順天保定河間三府各州縣自正德三年以來寄養馬匹俱各年齒衰老節次兊軍揀退不堪負纍民餧養兵部行文太僕寺分管官督同該府州縣管馬官勘實果係老馬變賣價銀轉解太僕寺貯庫輳補買馬支用一法司錦衣衛見監罪囚中間或煆煉成獄或拘泥文案多有枉抑今後問刑務要法當其情不許深刻所問犯人及在外問成解來人犯伸訴寃枉或調别衙門多官會審務要從公推問實情果有寃枉即與辨理不許拘執成案逼勒招認符合前問官吏致令枉抑無伸違者罪之一凡問囚犯今後一依大明律科斷不許深文妄引參語濫及無辜其有奉旨推問者必須經由大理寺審録毋得徑自參奏致有枉人近年條例增添太繁除𢎞治十三年三月初二日以前曽經多官奉詔會議奏準通行條例照舊遵行外以後新增者悉皆革去一江西并各處地方先因宸濠反逆事敗及因人告報謀反妖言等項事情一時追捕餘黨急於撲滅不暇審辨未免有迹涉疑似被誣逮繫者經該問刑衙門務要嚴加詳審果係誣枉即與釋放若係逼脅順從者問擬明白奏請定奪毋得寃抑淹禁一內外各衙門見監死罪重囚犯在赦前罪不該宥內有情可矜疑曽經奏請未得饒死及毆傷人延至保辜限外身死照例仍擬死罪者詔書到日覆審是實俱免死發邉衛永逺充軍若有辨問罪不至死者即行查照發落一見監與宸濠謀反事情有干正德十四年就陳擒獲及續拿人犯三法司錦衣衛先行會問明白其真正共謀逆賊并臨時脅從及先年交通不曽與謀者各依律議擬應得罪名再會多官覆審相同具奏定奪毋致輕縱寃枉一各處盜賊多因飢寒困苦流離失業脅從逼迫嘯聚為非詔書到日各該官司通行出榜曉諭許其自首免罪軍還原伍民還原籍各存恤一年免其差徭其有能擒捕首惡黨類報官者照例升賞仍量給犯人財産一官吏軍民人等自正德九年正月二十八日以後至正德十六年四月二十二日以前有為事問發充軍遷發為民者除原係真犯死罪饒死及事干謀反逆叛姦黨失機強盜撥置侵盜係官錢糧指稱打點誆騙者不赦外其餘悉皆放回原衛原籍寧家隨住若有赦前逃回不首原係真犯死罪饒死充軍例該照依原擬處決并雜犯死罪以下充軍例該枷號改發極邉衛分者免其處決枷號仍各發原充衛所著役其遷發為民者免其問罪仍發原編配所一內外各衙門罪犯該追贓物係還官給主銀貨至五十兩以上并入官至一百兩以上監追一年之外及正犯身死拘禁家屬各勘無家産堪以變賣陪納者開具所犯情罪奏請定奪其不及前數監追半年之外及正犯身死各勘無家産并例該追罰馬牛等項悉與宥免查照發落若係埋葬銀正犯見在者仍依律追給一內外衙門有問完官吏軍民人等罪犯已經奏請未曽奉旨發落應該宥免者即行查照發落其有監候行勘未報人犯罪該宥免者并正犯在逃監禁家屬證佐不係事干謀犯逆叛劇賊者悉令保候歸結一近年節次奏開生員納銀入監事例積纍數千餘人大壞選法今後再不許奏開違者吏部該科即時紏劾究治已開未納者即便停止至於額設吏役亦須得人近年納銀收充阻塞正途之人致令歇役革退雖有考選事例繁復不一吏部便查會典開載選撥吏役舊例申明遵守行令各布政司直𨽻府州凡遇缺吏從公考選徑自收參納銀人役務令習學字書通曉文移方許收參若願告改撥衛所事簡衙門者聽俱開報巡按御史查照訪察內有選撥不公或被人告發或按問得實依律究治一各書辦人員除大營額設員數外其餘夤緣額外添設者并各夷地方逺年不用小通事冒濫保補者通行查革一工部供應內府各監局內官內使人等年例柴薪靴料皮張冬衣鋪陳紵絲綾紬紗羅等項近年以來增添數倍該部往往借貸别項官錢輳用動經數萬纍及官民終非經久之計著司禮監會同該部查照永樂至天順年間人員數目關給則例通融處置除見有本色物件外不敷之數將近年抄沒犯人贓物銀兩兩平估折相兼俵散準作正德十五十六年年例之數少寬民力一兩京各監局等衙門近年額外增添器物如龍船戰車神象店房等項數多管事人員乘機作弊將物料工作任情冒𣲖侵尅害民今後除舊額器物房屋應修理成造者俱照會典所載舊定數目從實會計除本衙門并各庫會有外會無者量為從省𣲖辦不許隱匿冒濫改舊添新并招買那借貽害小民違者治罪一內府禁密之地不許蓋造離宫别殿載在祖訓萬世當遵近年以來節被左右近幸之人獻諂希恩在內添蓋新宅佛寺神廟總督府神武營香房酒店之類在外添蓋鎮國府總督府老兒院玄明宫教坊司新宅石經山祠廟店房等項便著內官監工部錦衣衛科道官逐一查勘但有不係舊規者或折毁改正或存留别用或變賣還官官匠人等有因蓋造升官者亦就查革改正在外聽撫按官一體查勘改正變賣還官不許隱匿一近年南京駕到各樣船隻數多俱在通州張家灣停泊勞人看守日久損壞無用著內官監工部便去會看除年例黃船照舊存留聽候外其餘烏龍船發送南京兵部改作擺江船黃船發送南京工部照舊看守聽差黑樓等船發送杭州府等處聽候進鮮進龍衣等項公用免𣲖民間修造其餘魚船等項變賣價銀收貯監部以備修造正支一荆州杭州蕪湖三處抽分厰專為打造糧船成造供應器皿而設以省科𣲖小民之計近來兩京各監局相沿且奏差人赴蕪湖厰支取杉楠等木數多又有內官監差官中半抽分二年有餘致將造船銀料不敷支給纍及運軍出利揭債缺船運糧耽誤國計今後南京各監局合用竹木聽於本處龍江瓦屑等抽分厰支取在京各監局合用竹木聽於內官監神木厰并真定盧溝橋抽分厰支取其內官監原差抽分太監李文等詔書到日即便回京以後不許援例奏差一天下司府州縣抽分稅課衙門俱有定額近年以來凡橋梁道路關津有利處所私自添設無名抽取數多甚為民害詔書到日巡按御史及按察司分巡官通行查革有司嚴加禁約不許坐視故縱一河防水利小民衣食之源關係最重各有專官管理該管官員務要躬親巡厯嚴督所屬修築墟岸疏濬溝渠但有權豪刁潑之家修建池亭設立碾磨阻壞水利坑陷錢糧者并聽自首拆毁改正與免本罪若有抗拒官府執迷不首者許鄰佑之人告舉究治所在官司容情故縱者事發一體治罪一易州山厰柴炭今後悉遵先年舊額𣲖納惜薪司近年新添加耗之數俱改正照舊其有攬頭指稱打點多勒價銀許被害之人首告管厰侍郎痛加改革不許仍踵前弊如違治以重罪一自正德年來劉瑾錢寧江彬相繼擅權在京在外各該衙門弊政多端詔書該載不盡者許逐一自行議奏裁革一近來冒濫玉帶蟒龍斗牛飛魚服色數多除五府九卿堂上官外其餘庶官雜流并各處將領頭目諸色人等但係夤緣奏乞傳賜者俱不許穿用內府各監局官員司禮監查奏裁革武職卑官僣用公侯服色花樣者一體禁約一浣衣局近年抄沒婦女法司逐一弔查原卷詳究事由情可矜宥者具奏釋放一錦衣衛旗校人等除𢎞治年間編軍册內見在數目外其餘詭名頂補僉補在逃故絶等項人役冒濫食糧者戶兵二部各選差屬官會同科道及本衛公正官查議裁革一豹房各處積年收貯并近日抄沒犯人銀兩司禮監查記明白數內運數百萬兩於太倉銀庫收貯以備折放官軍俸糧等項支用一正德元年以後各衙門官軍旗校人等緝捕妖言姦細並不係臨陳對敵強賊一應升授職役者通行查革以後各衙門照舊年終類奏兵部查議升賞一正德年以來傳升乞升法王佛子國師禪師等項禮部盡行查革各牢固枷釘押發兩廣煙瘴地面衛分充軍遇赦不宥近日奏討葬祭一切停革其中有出入內府住坐新寺誘引蠱惑罪惡顯著見在京者禮部通查明白錦衣衛還拏送法司問擬罪名奏請定奪一先在軍門辦事指揮張璽張倫及掌案寫字等項人員宫勳趙真殷大安王鎬王鎮陳貴龎璽朝用鄭曦賈銘高濙朱鳳翔管皇店千戶趙謹姚俊俱倚勢生事蠧政害民內外軍民怨入骨髓本都當處死姑從寬各連當房家小押發兩廣煙瘴衛分永逺充軍其餘跟隨辦事管店助惡有名小班答應旗校人等錦衣衛還拏送法司究問中間罪惡顯著者一體押發兩廣煙瘴衛分永逺充軍家小隨住俱遇赦不宥一回夷舍音和珊交通土魯畨興兵構亂攪擾地方以致哈密纍世受害罪惡深重曽經科道鎮巡官勘問明白既而夤緣脫免錦衣衛還拏送法司查照原擬開奏定奪一回回人于永出入豹房誘引蠱惑情罪重深錦衣衛拏送都察院追問明白議擬罪名奏請處治一今後照依舊例給事中有缺於進士內考選奏補御史有缺進士與行取人員相兼考選除授一朝廷政事得失天下軍民利病許諸人直言無隱一已上興革政令詔書到日有司即便奉行如有延緩者許巡按御史按察司訪察究問俱以違制論嗚呼君人之道在昭德以塞違繼世之規惟更化而善治特頒渙號用慰輿情宏施大賚之恩永錫太平之福四方臣庶咸使聞知乞停差官織造疏楊廷和懇乞憫念災傷窮民乞賜停止差官織造事內開近該臣等奏乞免撰差官織造勑書節奉聖旨官已差了再不必具擾執拗欽此臣等一聞此旨相顧驚愕備員大臣素蒙禮貌不意聖明一旦有此在朝羣臣亦皆彼此駭嘆謂雖正德年間亦未見批答內閣題奏有如此旨意者臣等固當引身求避以明不可則止之義但展轉以思不能無庶幾改之之望若以具擾執拗為嫌而乃悻悻然見于其面非臣之所宜自處也臣等豈敢以此擾陛下哉恐災傷窮民不堪織造之擾千百成羣起而為盜以覆天下也亦非敢固執已見違拗不通也執闕前旨雖出御筆親批決非司禮監官所敢議擬不知撰寫進呈果出左右何人之手我祖宗朝一應批答皆由內閣擬進惟正德年間權姦亂政有擅自改擬營求御批以濟其貪私者新政以來不曽明正其罪遂令此輩邪佞小人敢於今日復蹈前車覆轍其心惟欲蒙蔽蠱惑以圖身家富貴不顧生靈休戚社稷安危陛下何忍墮其姦計壞祖宗之法度哉祖宗天下至正德間幾致傾覆仰賴陛下再造乾坤轉危為安中外軍民始獲稍蘇然國勢民力比之成化𢎞治等年百尚不及一二今日豈堪敗壞邪興言及此可為流涕臣決不敢撰寫勑書以重誤國殃民之罪伏望陛下俯垂監察停止織造官員不差仍乞命司禮監官將前項蒙蔽蠱惑邪佞小人逐一查出斥逐在外不許仍前侍奉左右以杜後來亂政壞事之漸實宗社萬萬年無疆之慶奉聖旨卿等所言具見忠誠愛君恤民至意朕心已知宜安心辦事但官已差了寫勑書與他著安靜行事毋許分外擾人該衙門知道名臣經濟録卷十四
