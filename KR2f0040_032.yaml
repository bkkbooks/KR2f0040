body:
  text: 名臣經濟録卷三十二明黃訓編兵部武選上襲替犯堂疏王憲武選清吏司案呈奉本部送兵科抄出羽林前衛親軍指揮使司僉事指揮使劉永昌奏臣伏聞洪武永樂洪熙宣德正統景泰天順等年軍職襲替並無堂兄弟姪之分自成化十七年都御史何喬新建議之後議論始紛紛矣至𢎞治十八年兵部會官議得凡武職立功之人故絶親弟親姪曾經襲過者俱許相沿承襲其姪孫以下及堂兄弟姪等項旁枝俱不準襲自是親姪孫子孫被革不勝悲苦往往奏告不已至正德十四年該武選司議得立功之人故絶親姪曾經襲過既許相沿承襲則姪孫亦係應襲人數或親姪有故而親姪孫徑承襲事則不得襲以此議例不一人心不平往往不服奏告不已又該先任兵部尚書今總制三邊尚書等官王瓊題稱查得洪武永樂宣德等年軍職故絶不論堂兄弟姪俱得承襲自成化十七年都御史何喬新建言題準事例止為見任軍職故絶查勘不係立功之人的𣲖子孫不許承襲並無追論先年立功之人故絶不許堂兄弟姪旁枝承襲緣由本部節年議奏亦無姪孫不許承襲之例至𢎞治十八年新例姪孫以下方不許襲但姪孫即係親姪之子親姪許襲而親姪孫不許中間多有襲過三四輩者一旦革充總旗無罪革職人心委的不平合無將官舍李宏等各父祖原係立功之人親姪孫曾經襲過者俱照𢎞治十八年以前舊例及成化十七年會官議準事例許其相沿承襲以後軍職襲替查係立功之人親姪孫沿襲一二輩以上與李宏等事體相同俱照舊例許其襲替以前減革襲過者待其子孫襲替之日查照改正照舊襲替緣係遵復舊例襲替軍職事理具題正德十四年二月十三日奉武宗皇帝聖旨還照𢎞治十八年會議事例行欽此隨該本官奏稱臣等竊惟武職選授自洪武永樂以來至𢎞治十八年以前所行係祖宗舊制百有餘年相承之事所當遵守𢎞治十八年所議係一人一時之見所當改正臣等既知其非不敢隱默伏望聖明留神省覽許照𢎞治十八年以前洪武永樂以來舊制遵行事體幸甚緣係恪遵成憲議復軍職襲替舊例事理具題正德十四年二月二十三日奉武宗皇帝聖旨是欽此欽遵外自是武職襲替得一蘇矣臣嘗竊觀正德十四年之奏有曰立功之人故絶親姪曾經襲過既許相沿承襲則姪孫亦係應襲人數或親姪有故而親姪孫徑承襲事則不得襲以此議例不一人心不平往往不服奏告不已臣謂觀是言也則知十八年立議之刻夫親姪孫本係應襲人數止因親姪有故未襲便欲革罷其官非酷刻而何其王瓊之議曰姪孫即係親姪之子觀斯言也則知血脈相承親切無間非踈逺旁枝者比姪孫固無異於姪也姪而得襲姪孫不得襲此何理乎瓊又曰武職選授自洪武永樂以來至𢎞治十八年以前所行係祖宗舊制百有餘年相承之事所當遵受𢎞治十八年所議係一人一時之見所當改正臣等既知其非不敢隱默由是而觀則瓊之言不但於義理通天理合且與舊制合矣至正德十六年兵部尚書彭澤具題謂王瓊前奏頗招物議相應改正夫𢎞治十八年新例已該王瓊辨其非舊制乃一人一時之見其姪孫一節又已辨論通暢彭澤既欲革罷王瓊之奏則當偹折王瓊前議之非詳辨𢎞治十八年立議之是可也今不細論彼此是非但朦朧誣以一句曰頗招物議是知理屈而但強誣之耳奈何自彭澤具題之後於今十年武職被革流蕩淪沒者甚衆不勝悲苦邇者兵部武選司起火延燒本部工部荷蒙皇上特垂訪察而厯年被革官舍仰皇上離照之下具本聲訴蒙武選司未與議處但照彭澤具題事例將官舍參究提問外臣嘗伏讀皇明政要恭見洪武二十九年九月大賚天下致仕武臣太祖諭之曰元末兵爭中原鼎沸人不自保爾諸將臣奮起從朕效謀宣力共平禍亂勤勞偹至天下既定論功行賞使爾等居官任事子孫世襲永享富貴朕思起兵時與爾等皆少壯今皆老矣久不相見心恆思之故召爾等來所賜薄物以資養老爾等還家撫教子孫以終天年諸將叩首謝上因歎曰同厯艱難致有今日顧朕子孫保有無窮之天下則爾等子孫亦享有無窮之爵祿諸將臣無不感激至有墮淚者欽此臣每讀髙皇帝聖諭亦未嘗不墮淚感我高皇帝憫念武臣如此之至一則曰共平禍亂勤勞偹至二則曰同厯艱難致有今日一則曰子孫世襲永享富貴二則曰爾等子孫亦享有無窮之爵祿休戚相同之恩如此天地覆載之恩如此武臣子孫粉骨碎身豈堪補報哉伏望皇上仰體太祖之心俯察王瓊彭澤之奏果王瓊之奏有理彭澤之奏無謂乞勑多官會議將瓊所言查復施行虧枉官舍皆與改正庶使舊制不為新議所壞正議不至橫為浮議所阻官軍幸甚臣不勝恐懼戰栗之至等因奏奉聖旨兵部看了來説欽此欽遵抄出送司查大明律內一欵凡文武官員應合襲廕職事並令嫡長子孫襲廕如嫡長子孫有故嫡次子孫襲廕若無嫡次子孫方許庶長子孫襲廕如無庶出子孫許令弟姪應合承繼者襲廕若庶出子孫及弟侄不依次序攙越襲廕者杖一百徒三年欽此及查成化六年奏準武職絶嗣許從軍一祖子孫承繼其原籍疏族不許又查成化十七年該都御史何喬新題照得軍職有絶嗣者原籍同姓之人或稱同祖叔伯之孫或妄稱同堂兄弟之子孫或乞養異姓詐作親生兒男招贅女壻詐作同宗子孫買求官吏鄰佑人等保勘送部冒襲官職今內外衛所軍官該支俸糧俱自民出嵗入有限而冗食無窮乞勑該部通行天下都司內外衛所軍官今後同宗之人原係立功授職者嫡𣲖子孫方許保送承襲旁枝不許保送其旁枝已襲職任身故之後再不許襲但有冒襲者限三箇月以裏首官改正冒襲之人并經該官吏等俱免問罪若執迷不首被人告發依律問擬照例發落本年九月二十八日會官議擬題奉憲宗皇帝聖旨是都準議欽此通行巳久又查得𢎞治三年題準旁枝官舍有高祖原係總小旗者指揮革試百户千户革署百户職事俱準承襲百户革充總旗冠帶終身子孫準替旗役使之勉圖後功以後若無軍功雖遇例不得實授仍乞著為定例以後天下衛所保到承襲之人與此同者俱照此例查革若高曾祖止是軍役不係功升總小旗役之人子孫告襲者仍照見行事例不許承襲又有此遞降之例於前例少變矣乃查得𢎞治十一年奏準立功授職之人所出嫡親子孫方許遵依律條挨次保送赴部襲替但係旁枝不問親疏通不許襲其巳襲者年老事故之日各該衛所不許再保伊男中間若高曾祖從軍原有職役及各親父祖襲替之後自立軍功俱各照依應得級數各另扣算一體保襲至此遞降之例不行又復通行之舊矣又查得𢎞治十二年題準今後軍職無功授職之人年老病故絶嗣若係堂叔伯兄弟旁枝子孫不分已未襲替查審明白俱不許承襲外其同宗之人原係先委在營所的親弟姪承襲伯兄職事不分久近子孫俱許相沿承襲此又一例所謂親弟親姪曾經襲過者俱許照例相沿承襲其姪孫以下及堂兄弟姪等項旁枝皆不許襲衛所官員自今文書到日為始敢有違例保送者軍職問罪調衛文職照例發落遇例不宥其旁枝子孫革去官職照依總小旗同宗之人皆得替補事例俱該收補總旗照例併鎗前例止許親弟親姪承襲此又申明惟此二項襲過方許相沿若親姪有故姪孫告襲即係疏逺不許承襲例起於此惟總小旗不拘犯堂故職雖減革俱收旗役犯堂革旗例方起此又查得正德元年題準軍職旁枝子孫髙曾以上原有職役及親祖父襲替堂伯叔兄職事之後自立功通計三級以上者自有本等官職其高曾以上原無職役親祖父襲替堂伯叔兄職事之後自立軍功一二級者例內不曾該載若不斟酌定擬未免輕重失宜今後旁枝子孫髙曾以上原無職役親祖父襲替堂伯叔兄職事之後得功不分署職實授但一級者併收總旗子孫世與冠帶其二級者世襲署百户庶幾情法允當經久可行以後遇有此等官舍保送襲替者悉照此例施行此親祖功遞加之例因前例開載未盡又立此例通前徹後則情法允當至矣盡矣始終遵行五六十年及查得正德十四年題準洪武永樂宣德等年軍職故絶不論堂兄弟姪俱得承襲後自成化十七年都御史何喬新建言題準事例止為見任軍職故絶查勘不係立功之人的𣲖子孫不許承襲並無追論先年立功之人故絶不許堂兄弟姪旁枝承襲緣由本年節行擬奏亦無姪孫不許承襲之例至𢎞治十八年新例姪孫以下不許襲但姪孫即係親姪之子親姪許襲親姪孫不許襲中間多有襲過三四輩者合無將官舍李宏等原係立功之人親姪曾經襲過者俱照𢎞治十八年以前舊例許其承襲此例蓋徒論世次之親疏未嘗考其父祖功德之有無糜費俸糧冒濫名器在當時巳招物議之非在今日殊非為經久之法况今內外大小軍職衙門該支俸糧嵗入有限而冗食無窮制節謹度尚不能給又使旁枝之人無功而食可乎及查得正德十六年內該本部題查得武職立功之人故絶其姪孫以下旁枝不準承襲係𢎞治十八年本部會官集議題準通行事例蓋以惜名器為心故欲正濫襲之武職以國家軍儲為重故欲省糜費之俸糧隨時損益因事制宜十餘年來守而勿失本部又行具奏準襲頗招物議之非終非經久之法所據前例應合改正今後仍照𢎞治十八年題準事例姪孫以下人等仍不準襲其自正德十四年二月以後有照李宏等例襲過者待其子孫襲替之日一體減革本月十九日題奉聖旨是準改正還照𢎞治十八年會議事例行欽此又查得嘉靖十年閏六月該本部題參照李嗣隆石泰賈永明知有例立功之人故絶其姪孫以下旁枝不許承襲及節奉有皇上還照𢎞治十八年會議事例行明旨自合安分各供職役為當乃敢妄引李宏非例事情鼓衆奏擾阻壞選法相應究治以警將來合候命下移咨法司將李嗣隆石泰賈永明行提到官照依律問擬發落庶姦頑知警而選法亦不致損壞矣等因本月十八日該本部右侍郎潘題奉聖旨是欽此欽遵已經參送去後今該前因通查案呈到部看得指揮使劉永昌建議欲姪孫以下俱許承襲及引皇明政要聖祖訓諭武臣之詞欲我皇上勑議施行臣等伏覩聖祖訓詞有曰子孫世襲永享富貴又曰爾等子孫亦享有無窮之爵祿但指有功之人子孫而言非謂旁枝疏逺其父祖原無軍功者亦得享無窮之爵祿也又查得大明律內一欵官員襲廕職事並令嫡長子孫有故嫡次子孫襲廕若無嫡次子孫方許庶長子孫襲廕如無庶出子孫許令弟姪應合承繼者襲廕弟姪應合承繼蓋指親弟親姪同時者而言亦不及姪孫以下等項無功之人奈何厯年既深初意浸失軍職立功之人故絶原籍同姓之人或妄稱同祖伯叔之孫或妄稱同堂兄弟之子亦有乞養詐作親生贅壻詐為族屬買求官吏朦朧保送冒濫名器糜費俸糧故成化十七年都御史何喬新建議原係立功之人的𣲖子孫方許保送襲職旁枝不許保送其旁枝已襲者身故之日不許再襲通行已久至𢎞治十八年本部會官集議立功之人故絶親弟親姪曾經襲過者俱許相沿承襲其姪孫以下及堂兄弟姪等項旁枝俱不許襲一以惜名器之冒濫一以省俸糧之糜費參之情法可為經久無容再議正德十四年因人建言本部輕易變更遂至物議沸騰未及二年遇我皇上龍飛之初首先舉正五十餘年盡善盡美事例至此復舊行之又巳十年衆心已定何有他説况本部每兩月一選中間官舍多有係堂姪堂姪孫者亦有係堂伯堂叔堂伯叔祖者原以的𣲖有功相傳自一輩至十輩二十輩相沿無害其旁枝無功一輩固不可况至二三輩雖一朝一夕尚不可待又可至一輩二輩乎此即旁枝父祖别無另立功者也蓋有功子孫許其承襲雖逺不至禁革無功子孫不該傳襲雖近亦難準理本部該司文卷雖經燒燬部收貯選簿并內府印綬監內外貼黃俱各見在可查昨因賈永明等乘機妄行奏擾已經參送究問今劉永昌又為論列前因臣等待罪本部凡可以便於襲替無不奉宣德意豈敢故為異同不拘王瓊彭澤或可或否俱不必論顧爵祿國家勸功之典固不當使有功者弗食其報亦不當使無功者得濫其恩揆諸法例事理而論之立功人的𣲖子孫不分親疏逺近照舊承襲親弟親姪曾經襲過者俱許相沿不革獨姪孫以下疏逺之人厯年事例俱在減革之數正以各人父祖原非有功偶因旁親有功者故絶例前相沿若復許其承襲則俸糧糜費人亦不知所重而何以勸有功耶兼且各該藩府中尉人員時或缺祿不完衛所官軍亦皆少糧無措嗷嗷待哺莫能相補度彼參此獨可不加之念乎臣等竊惟𢎞治十八年會議事例前後遵行垂六十年名臣之所建議皇上之所舉正據此律例平此人心雖萬世可以傳行委難别議相應申明遵守合候命下之日本部行移內外軍職衙門今後立功人故絶同時親弟親姪應合承繼及曾經襲過者方許遵照律例保送其姪孫以下及堂兄弟姪除親祖例前相沿又自立有軍功者一體扣算保送其餘無功姪孫以下至堂兄弟姪等項及各人親祖沿襲職事之後别無自立軍功不許一槩妄保自文書到日為始敢有違例保送者軍職問罪調衛文職照例發落遇例不宥其旁枝子孫革去職役在內從本部在外從巡撫衙門照依總小旗同宗之人皆得替補事例俱收充總旗照例併鎗有功照例升授著為定例使凡無功子孫不得倚姦混擾庶情法兩盡事體不致於紛更財用可省名器不至於冒濫各都司衛所仍要刋刻板傍懸挂永逺遵守施行緣係遵舊制復正議以拯救軍官以消弭天變及奉欽依兵部看了來説事理未敢擅便等因嘉靖十年八月二十四日本部尚書王憲等具題奉聖旨是都準識行欽此名臣經濟録卷三十二
