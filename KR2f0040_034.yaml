body:
  text: 名臣經濟錄巻三十四明黄訓編兵部車駕上為守衛事劉大夏車駕清吏司案呈奉本部送於兵科抄出河南道等衙門監察御史等官石玠等題前事據虎賁左衛中所副千户李泰呈稱正徳元年正月初四日輪該守衛長安左門外第一鋪至第二鋪原設銅鈴七十八箇本日夜有本衛右所副千户胡安軍人任顯等傳逓到鋪止收七十二箇内少六箇随據該衛右所副千户胡安呈稱守衛長安左門外第三鋪至第六鋪有羽林左衛中所千户劉讓軍人劉忠等傳逓本夜巡更銅鈴止收七十二箇又據羽林前衞中所千户張進呈稱守衞長安右門外頭鋪本月初四日夜原發銅鈴七十八箇至八鋪摇脱鈴子轉回鈴二箇西安門又轉回三箇次日早長安左門止交七十二箇等因到部臣據此除臣親詣長安右門第一鋪取出前鈴查騐見在七十七箇鈴子俱全内委少一箇臣等竊惟前項銅鈴毎夜初更時分自長安右門頭鋪陸續發起一軍一鈴相接傳逓以嚴夜警最為𦂳要今稱少鈴一箇必是提鈴軍士彼此推託不即逓送遂至遺失所據長安左等門上直指揮并各鋪管軍千百户及留守五衞輪該巡㸃官員職専管理不行嚴謹俱各有罪但週圍紅鋪數多直更各有時刻前項銅鈴未審的係何鋪何人失落必須逐一挨審方得明白合無着落留守五衛輪該巡㸃官員督併上直等指揮官上𦂳挨查務見的確将失鈴人員備由奏送法司行提問擬照例發落以為将來守衛不謹之戒便益縁係守衞事理未敢擅便等因奏奉聖㫖該衙門知道欽此欽遵抄出送司案呈到部叅看得所奏失落銅鈴擬合挨查為此連送該司仰行留守中衞指揮馬智督併長安左右二門守衛官查勘自本年正月初四日右鋪原發銅鈴若干左鋪接受若干至初五日曉縁何内少一箇着落該夜官軍逐一沿鋪查勘前項銅鈴要見在于何鋪沉匿失落務要查明得獲星馳回報以慿施行毋得遲違取罪不便題應詔陳言以釐弊政事劉大夏車駕等清吏司案呈各准武選清吏司手本奉本部連送准禮部咨該禮科等科給事中等官倪議等題臣等諌垣叨任耳目極言進諌職分之常矧近者欽承詔㫖朕方圖新政理樂聞讜言除祖宗成憲定規不可紛更其餘事闗軍民利病切於治體但有可行的着各衙門大小官員悉心開具明白來説禮部知道欽此用是有以窺皇上憂勤之心恒切于宸𠂻作新之念昭掲于言表苟有見聞敢復緘黙第以迭年災異屢發綸音彼一時各衙門所奏連章累䟽非無可取經時閲嵗未盡施行臣等今次所言就中亦多相類竊恐與前均成故紙然則軍民之利何時而興軍民之病何時而祛乎伏望皇上普施離照大奮乾剛查取前項節次奏本并今開具事情凡有利于軍民者期在必興凡有病于軍民者期在必祛如此則求言以實而不徒文治道隆而無或替矣等因奉孝宗皇帝聖㫖該衙門知道欽此欽遵抄出送司案呈到部㸔得給事中等官倪議等所題事件俱係别衙門掌行擬合通行除外合就備申開咨前去煩為查照施行移咨送司㸔得咨開給事中倪議等所題事件除革夤縁等事另行所據減船隻恤守衞開絶軍三事俱𨽻别司掌行案呈連送到司案呈到部㸔得給事中等官倪議等所言後開三事俱係安民切務理合逐欵議擬開列前件具奏定奪縁奉孝宗皇帝欽依該衙門知道事理未敢擅便謹題請㫖一恤守衞照得各衙門守衞官軍所以拱䕶宸極庸備不虞在祖宗時待之甚厚月糧之外加以直米餘軍代其炊㸑奈何近年以來勞苦百端守門内官恣意剋剥随補随逃不能聊生先該給事中張𢎞至指揮羅永等各建言前事節奉俞允查革旬月之間稍知警畏以後仍蹈舊轍需索反倍于前軍士之病莫甚于此伏望皇上軫念軍士之苦門禁之重嚴立禁革科條敢有仍前剥害者革去職任許被害軍士赴巡城官處告理以慿叅究區處如此則軍士得以少甦而逃亡可免矣前件查得守門内官剋剥軍士近該給事中張𢎞至指揮羅永髙夀各開欵建言門官不分班次一槩科擾直軍要行定與班次免致混擾本部逐欵議得各門内臣因是近年定與網巾銅錢以致百計需索至有菜蔬錢掃帚錢上樓等錢然始猶止于該直官員以後一槩混擾訪得午門等門毎三日一直用錢一萬四千五百餘文東華等門毎三日一直用錢一萬九百餘文西華等門毎三日一直用錢一萬二千六百餘文𤣥武等門毎三日一直用錢一萬二千一百餘文東華西華𤣥武等門又有出車使用比之前門濫取尤多致令軍士月糧直米俱不得用妻子凍餓各官欲令分班意正在此除已往不必追究外乞勑司禮監裁减之後仍各定與班次毎門各置欽錄文簿一扇輪直明白若不該直在門混擾軍士許㸃城科道官并本部委官查檢文簿據實叅奏等因開欵題奉孝宗皇帝聖㫖這事件着各該衙門查奏定奪欽此欽遵已經開具手本賫赴内府司禮監徑行奏請定奪去後查無定奪過縁由在巻今該前因合無本部備行㸃城科道等官拘審各門守衛官軍如果已經内府司禮監查奏定奪守門官仍前分外需索害人許各官指實叅奏挐問若是未曽定奪即行該監遵奉查奏仍毎門給與定奪過班次文簿一扇庶使各官有所查考門軍知所遵守一减船隻照得南京馬快船隻指以供應上用為名濫起數多混搭客貨沿途騷擾地方軍民受害不可勝言先該尚書馬劉各言前事議擬量减縁由未䝉俞允軍民之病莫甚于此如䝉乞勑該部議處将南京供應物件如馬槽銅器等物係北京可置造者改在北京造用其餘難以更改者亦要斟酌物件多寡儘船装載量為撥給仍乞申明禁例不許恃勢凌虐驛逓衙門混搭客貨僣用吹手軍餘䕶送如此則沿途有司軍衞不致騷擾而裡河貧民得以少甦矣前件㸔得南京馬快船隻之類近奉詔書内一欵己令南京兵部查奏定奪以甦軍民困苦本部難再别議一開絶軍查得正統二年事例内一欵一軍政條例内開所勾軍士若有丁盡户絶并山後等處人民挨無名籍等項三次有司保結回申委無勾取軍衛有司各另造冊轉繳兵部開豁今照各處衞所官吏不行遵守又将曽經五次十次保結無勾軍人一槩造冊開勾今後各處衞所将先曽三五次保結并今次重行清審明白無勾者俱且住勾不許重復造冊勾擾若有故違查勘是實照依原奏准榜例查問當該官吏及照各處清軍官員不恤民隠惟欲取足三分之數以逭已責将年久無勾軍士一槩勾擾為害不可勝言如䝉乞勑兵部轉行清軍御史查照正統二年以前至今猶回丁盡户絶挨無名籍及永樂二十二年以前遇革為民軍士督令清軍官員再加研審是實取具官吏里書人等重甘結状造冊繳部即與開豁免清仍行各該衛所不許一槩朦朧開勾如此庶軍伍可清而民困少紓矣前件查得先為修明軍政事該監察御史黎鳳奏要将各處挨無名籍軍役照例開豁等因該本部議得此等軍政若非軍衛惑于老軍之妄報則是有司昧于里書之作弊若不斟酌事理一槩開除未免奸弊日滋軍伍日耗合無本部通行各該清軍御史督同所司清軍官員自正統元年以來一向清軍作挨無軍士除衛所籍貫姓名來歴全然不明及遇例釋放重各改調查無慿據曽經回報一二十次者依今所擬行各有類造通知冊一本繳報類發各該衛所查照開除不許再行勾擾但有衛所籍貫止是差訛不明者難稱挨無務要嚴督里老人等照舊清理務見下落不許只慿里書執㨿前案作挨無造報若查有前弊就将里書挐問如律責令補當軍役等因於𢎞治十六年九月十七日題准欽遵外續為陳言時務事該兵科給事中潘鐸奏要将各處丁盡户絶及挨無名籍軍役已經回報至今三五十次者照例開豁等因該本部議得各處軍伍丁盡户絶者固實有之里書作弊者數亦不少止因近年定三分之數有司明知屢經結正亦必差人解查圖凑前數累及無辜所以給事中藩鐸復有此論合無查照本部近日題准事例仍通行各處清軍御史照理分豁相應理者仍舊清理等因又于𢎞治十八年三月二十四日題准通行欽遵去後今給事中倪議等又奏前因案呈㸔得挨無名籍及丁盡户絶等項軍役槩查有無近日本部節次題准事例難又别議合再通行各處有司将前項應開軍士查勘明白作急造冊繳來以慿轉發各該衛所開除施行題禁革宿弊以强守衛事李承勛車駕清吏司案呈奉本部送兵科抄出湖廣道監察御史張仲賢題臣于本年正月奉都察院劄付差㸃皇城内外守衞官員春季己滿彼時以聖駕未臨兼委㸃閘防守官軍故得再承前差至今夏季又終例該更替前項守衞巡㸃半年中間情弊見聞頗稔事闗職業不敢無言臣竊惟皇城内外禁守衛之設非止肅儀衛以壮國威寔以嚴闗防以消奸宄必其强盛方為可觀若或廢弛何以戒備故夫守衛官軍有将領内臣常川管轄有科道部屬不時巡㸃先年立法至為詳宻近來廢弛似為殊甚臣毎一巡㸃一門一鋪官軍見其見在者身無完衣逃亡者毎為過半詢察縁由或因網巾錢少不敢過班或以拖欠班錢借貸不到前畨㸃視如此後畨來㸃亦然雖其量為責治其弊仍前備求其故盖因守門内官内使人員數多一門多者十二三員名少或七八員名雖奉詔㫖减革有退去而復來者有比舊時翻添来者毎軍過班三日即退銅錢百文作為網巾之名此外又有聴事帚掃臺桶等錢枝節科索亦頗多端軍士辦納不前只得扣除直米兑賣月糧甚至借貸箠楚誅求殆無寧日前項軍士皆無恒産多係傭工手藝為生縱無家口之養歇役三日豈能辦此錢數日朘月削以至貧窮到骨繼以逃亡致使守衛日弛門禁不嚴若不早為計處将來之弊有不可言者矣切照各門内官内使玩視詔㫖任意添留剥削害人不恤軍士事雖㣲小所闗匪輕聖明在上豈宜有此伏乞皇上軫念貧軍重惜守衛如䝉乞勑司禮監将皇城内外各門内官内使人員遵依詔㫖一體查减定以名次不許私自添留其一應索取網巾等錢通行禁革違者有罪以蘇困窮庶乎守衛官軍少得蘇息而門儀亦為之振肅矣等因題奉聖㫖該衙門知道欽此欽遵抄出送司查得正徳五年九月内為陳情乞恩分豁多官負乏軍士困苦等事該濟陽衛軍人闗能舉等奏稱各門門官成化等年間止是一正一副近年以來添設數多剥削軍士乞勑司禮監查照舊例裁革等因該本部查得皇城各門額設門官原與本部無行合無行移内府司禮監備查明白應否裁革徑自覆奏定奪施行等因具題奉聖㫖都不動以後朝廷自有處置欽此續為開讀事伏覩正徳十六年四月二十二日頒布詔書内一欵一京通二倉水次倉皇城各門京城九門各馬房倉塲各皇荘等處但係正徳年間額外多添内臣司禮監照𢎞治初年例查奏取回欽此除欽遵該司禮監查奏外查得近該兵科都給事中汪𤣥錫等題為申明門禁事開稱皇城四門邇年以來人心玩愒内外官員出入僕從成羣甚者内官家人潛住各官監局直房經旬不出乞要禁革等因該本部議擬具題奉欽依是皇城門禁最宜嚴謹他毎説的是你部裡便查舊制通行申明禁約欽此又該吏科等衙門給事中等官閻閎等題為守衛事開稱昔者魏相給事漢朝言變異以人災為重周廬宿衛務期嚴靖近年以來法度縱弛門禁視為泛常内外人員猶爾玩愒驕泰之習未能即改一體重為禁制等因該本部查議具題奉欽依是楊受等都着法司提了問今後内外守衛人員務要加意撫恤軍士仍不許擅離私行代替欽此續為申明禁約以嚴守衛事該本部照得皇城乃天下之根本華夏所觀瞻祖宗禁約事宜見載榜例法度森嚴恪宜遵守近年以來人多怠忽事因廢弛守衛門禁視為泛常以致閒雜人等任意出入往來肆無忌憚甚至法外遺奸交通賄賂盖由各該守衛守門内外官員人等不肯奉法仔細盤詰惟事偷閒私行代替甚者賣放占用或辦網中菜蔬等錢以充私儲及至㸃閘之時四散呼唤旋來應名借彼補此兩相影射己既不正焉能正人所以人心玩愒如故驕泰未改若不重加申明禁制誠恐内外奸細竊肆覬覦杜漸防㣲不可不慎伏惟聖治既新舊染宜雪命下之日合無本部出給榜文於皇城四門張掛曉諭在直守衛内外官軍人等務要恪遵祖宗成法常川直守仔細盤詰朝叅官員跟隨辦事官吏人等俱照𢎞治元年題准事例若有故違并守衞官軍人等仍前躱閃代替及賣放私占辦納網巾菜蔬等項積弊俱聴㸃城巡視紏儀科道等官着實㸃閘巡視糾勘叅奏提問從重究治等因具題奉欽依是皇城門禁係是重事你部裡便查照舊例出榜申明禁約欽此俱經通行欽遵禁約外今該前因通查案呈到部㸔得監察御史張仲賢題稱皇城内外門禁每一巡㸃一門一鋪官軍見在者身無完衣逃亡者每為過半或因網巾錢少不敢過班或以拖欠班錢借貸不到盖因守門内官内使人員數多一門多者十二三員名少或七八員名雖奉詔㫖裁革有退去而復來者有比舊時翻添來者每軍過班之日即追銅錢百文作為網巾之名又有聴事帚掃臺桶等錢支節科索多端軍士辦納不前只得扣除直米兊賣月糧箠楚誅求殆無寜日前項軍士以致逃亡及照各門内官内使玩視詔㫖任意添留剥削害人不恤軍士乞勅司禮監将皇城内外各門内官内使人員遵依詔㫖查减定以名次不許私自添留其一應索取網巾錢通行禁革一節照得皇城門禁守衛官軍所以拱䕶宸居譏察奸宄干係甚重先年守門内臣每一門正副内官并内使通不過四員小門不過二員止令提督守衛闗防出入此外别無科斂等項名目近年門官添設數多規圖利潤科索百端是以網巾菜蔬掃帚等錢為名不一而東華西華𤣥武等門又有出車使用臺桶等錢以此軍士受苦不過只得各将直米扣除月糧兊賣本軍空腹供役形容枯瘁衣服繿縷致使逃亡相繼門禁日弛所以監察御史張仲賢目撃其弊奏要禁革深為有見若不早為更張軍士何以免害仰惟皇上建極之初涣頒明詔剗除宿弊即及于此守衛官軍誰不感戴但前項門官雖經查革比前原額尚有餘員誠恐将來因循不無又復如舊伏望皇上特勅司禮監将各門内臣再行查减務照原額存留凡非舊制原額者盡數革去永為遵守其額内存留者仍乞天詔丁嚀戒勅今後務要撫恤守衛軍人不許剥削科害網巾等錢一切通行禁革不許在門混取如有故違及以後各門敢有夤縁額外添設者許巡視皇城科道等官指名劾奏罷黜縁係禁革夙弊以强守衛及奉欽依該衙門知道事理未敢擅便謹題請㫖題申明禁約以嚴守衛事李承勛車駕清吏司案呈查得永樂七年欽奉太宗皇帝聖㫖皇城四門守衛官軍恁部裡便将舊制榜文曉諭他每知道欽此已經欽遵将禁約事宜開欵木刻紅榜見在端門外左右張掛曉諭又查得成化七年為脩徳弭災事該文武大臣并科道官英國公張懋等㑹本部奏稱皇城門禁至為𦂳要近來守衛官軍多有雇人應㸃隨即散去行術并買賣諸色雜人出入内府奸宄莫辨今後守衛官員人等務遵祖宗舊制榜例嚴加捜檢但有無名之人及假帶牌面者就便挐送法司究治其守衛官軍該部并科道各差官一員不時㸃閘但有不在及冐名頂替者徑自叅奏挐問等因具題奉憲宗皇帝聖㫖卿等所言皆切時弊該衙門便整理行欽此成化十二年又該英國公張懋等㑹題内開長安左右門初開先放常朝及見辭等項官吏盡絶方許驗牌放進各監局工役人等有攙越混進及夹帶財物入内買賣者守衛官具奏治罪等因具題奉憲宗皇帝聖㫖卿等所言皆為國為民的事其餘的都准行欽此𢎞治元年又該刑科給事中韓祐題要闗防皇城門禁乞行各門守衛官嚴督各軍毎早整齊排列責令單行進入凡遇朝賀并朔望日俱於各朝房内具服以進朝畢仍回本房换服如遇雨雪止許一人随帶毡衫雨㡌其餘早朝並不許帶領伴當人等躋然闖入其外來朝見官吏并公差奏事及四夷人等應引見者各該衙門毎日早先詣長安門外聚集照數引進其官吏監生進入除有服飾可驗餘無牌面者不許一人冐入若守衛官軍不行嚴加闗防許糾儀御史叅究其伴當人等敢有如前諠譁接應者一體究治等因該本部議得原奉欽定跟随辦事官吏人等大臣三人其餘一人或執該用簿書或拿更换便服等項不但只拿雨具一事而己俱於闕左闕右兩行廊房之下伺立中間敬怠不等或又有分外多帶以致于下水牌諠譁接應除公侯駙馬伯儀賓并文武大臣原定許帶三人者無復他議其餘許帶一人者中間若有賫奏賫精㣲闗勘合接本註銷等項者再添與一人俱立于前項兩行廊房之下不許擁立于下水牌所在候官朝退各供乃事其前項所帶人員各以朝官門籍為主行令置造木牌懸帶守衛官軍辨驗放入其謝恩見辭工滿囚人進春進厯送納錢糧諸色人等經該衙門給與牌面事畢放回人數多者給印信手本送守衛官照入等因具題奉聖㫖是無牌面的還着錦衣衛緝拿欽此及查得正徳十六年五月内為申明門禁事該兵科都給事中汪𤣥錫等題稱皇城四門邇年以來人心玩愒先朝門禁雖有板榜懸掛槩作虚文其内外官員出入僕從成群至於一應閒雜之人或倚托勢要或偷竊錢糧或打㸃公事或交相買賣或藏匿亡命甚者内官家人潜住各官監局經旬不出内外交通政務舛錯乞要備查先朝板牓事例嚴加禁約等因該本部議得近年以來官廢道揆人無法守以致出入混淆奸偽難辨誠如都給事中汪𤣥錫等所言合無通行申明禁約備行内外守衛官員督令守門官軍今後務要嚴加捜撿宻切闗防俱遵祖宗舊制凡出入人等俱要驗其真正牌面記名驗放敢有肆行出入者守直官軍随即擒拿具奏處治巡視皇城科道及本部委官亦要不時㸃閘務要照依板榜事例嚴督守門官軍用心捜撿毋得視常故縱如違指實糾舉叅究等因具題奉欽依是皇城門禁最宜嚴謹他毎説的是你部裡便查祖宗舊制申明禁約欽此節經通行欽遵訖續為守衛事該吏科等衙門給事中等官閻閎等題稱西上門北小門旁有軍人張思名身故係是内地謂宜究竟端的及稱昔者魏相給事漢朝言變異以人災為重周廬宿衛務期嚴靖而連日衛卒或死而不知所因年來法度縱弛門禁視常内外人員猶爾玩愒驕泰之習未能即改惟一體重為禁制等因該本部議照皇城門禁最為嚴謹自洪武以來立旗手等二十衛官軍輪班直守仔細闗防出入捜撿頃刻不許擅離叅照指揮等官楊受等俱属故違律合提究等因具題奉聖㫖是楊受等都着法司提了問今後内外守衛官員務要加意撫惜軍士仍不許時刻擅離私行代替欽此又經欽遵備行訖前項事例雖經節次通行欽遵去後而内外人員若罔聞知入朝之際僕從成行擁衆争先真偽莫辨守衛官軍恬不加意散朝之後買賣負載雜如市途東西往來視為便道守衛官軍或坐卧而不顧或睨視而不言雖經禁約視為虚文盖因循舊弊未能頓除而紙上文移未可以悉知也合再申明舊例出榜曉諭等因案呈到部切照皇城乃天下之根本華夏所觀瞻祖宗禁約事宜見載榜例法度森嚴恪宜遵守近年以來人多怠忽事因廢弛守衛門禁視為泛常以致閑雜人等任意出入往来肆無忌憚甚至法外遺奸交通賄賂盖由各該守門守衛内外官員人等不肯奉法仔細盤詰惟事偷閑私行代替甚有賣放占用或辦納網巾菜蔬等錢以充私儲及至㸃閘之時四散呼唤旋來應名借彼補此兩相影射己既不正焉能正人所以玩愒如故驕泰未改誠有如近日給事中等官閻閎等所言者雖經都給事中汪𤣥錫等題行禁約内外人員尚未知戒若不重加申明禁制誠恐内外奸細竊肆覬覦杜漸防㣲不可不慎伏惟聖治既新舊染宜雪命下之日合無本部出給榜文於皇城四門張掛曉諭在直守衛内外官軍人等務要恪遵祖宗成法常川直守仔細盤詰朝叅等項官員跟随辦事官吏人等照例大臣三人其餘一人或遇隂雨及供事等項再添一人其内府供應人匠等項務候朝畢方許驗牌放進外内公差官員人等及常朝官員從人候立處所俱照𢎞治元年題准事例若有故違并數外多帶及先期闖入朝門者守衛官軍即時阻退如有倚勢不服并守衛官軍人等仍前躱閑代替及賣放私占辦納網巾菜蔬等項積弊俱聴㸃城巡視糾儀科道等官着實㸃閘巡視糾劾叅奏提問從重究治其㸃閘科道等官仍要三五日内在于東西長安門側出其不意暗行糾視遇有違犯之人即時指名叅究庶㡬法制脩舉拱衞肅清而臣民知所警畏矣緣係申明禁約以嚴守衛事理未敢擅便謹題請㫖宫禁之衛一丘濬臣按本朝十二衛即唐人十六衛之遺制凡諸衛之親軍皆以畨直宿衛執戈㦸嚴巡儆監門禁而錦衣所掌者乃鹵簿儀仗之事旗手所司者乃旗纛金鼓之物諸衛皆統軍卒而錦衣獨領校尉力士即周之虎賁旅賁也諸軍皆世卒而府軍獨簽幼軍即漢之六郡良家子也始之設親軍也僅十有二後又稍有加焉諸衛正倅一惟其世獨錦衣之任則不以世而以能盖天子御座則夾陛而立天子御輦則扶轅以行出警而入蹕承㫖而傳宣皆在所司也矧又詔獄所寄人之死生係焉是尤不可不慎擇其人也宫禁之衛二丘濬臣按本朝宿衛雖有武臣然皆爪牙之任而無有所謂腹心股肱之臣請如唐人以大臣畨直如太宗之用李大亮者如此則既有虎賁鋭士宿衛王宫又有勲徳世臣總司禁旅九重之上六宫之中得以安寝無虞矣寰宇通衢書目庚申脩寰宇通衢書成上以輿地之廣不可無書以紀之乃命翰林儒臣及廷臣以天下道里之數總類為書其方隅之目有八東距遼東都司陸行為里三千九百四十四馬驛六十四水陸兼行為里三千四十五驛四十又遼東東北至三萬衛馬驛四為里三百六十西極四川松潘衛陸行為里五千五百六十馬驛九十二水陸兼行為里八千三百驛一百有四南距雲南金齒陸行為里六千四百四十四馬驛一百水陸兼行為里八千三百七十五驛一百十三南踰廣東崖州水陸兼行為里六千六百五十五驛七十有八又東南至福建漳州府水陸兼行為里三千五百二十五驛五十四北暨北平大寧衛為里三千六百一十四馬驛五十三水陸兼行四千二百四十五驛六十一又西北至陕西甘肅為里五千五十水陸兼行為里六千七百二十驛九十六布政司十三浙江福建江西廣東之道各二浙江水驛十三為里九百四十八福建水馬驛四十一為里二千八百四十五江西水驛十五為里一千五百二十廣東水馬驛四十五為里四千三百九十河南陕西山東山西北平湖廣廣西雲南之道各二河南水驛三十一為里二千八百四十五馬驛二十二為里一千一百七十五陕西水馬驛五十一為里四千一百馬驛四十一為里二千四百三十山東水馬驛二十九為里一千九百一十五馬驛二十六為里一千四百八十四山西水馬驛五十為里四千三十馬驛四十一為里二千三百八十北平水馬驛四十七為里三千四十五馬驛三十九為里二千三百六十四湖廣水驛十八為里一千七百三十馬驛二十六為里一千五百三十五廣西水驛五十三為里四千四百六十水馬驛六十四為里四千二百六十五雲南水馬驛九十六為里七千二百馬驛八十三為里五千二百七十五四川之道三水驛九十四為里七千二百六十五馬驛八十二為里四千七百九十五水馬驛七十為里五千九百時天下道里縱一萬九百里横一萬一千七百五十里此其大畧也四夷之驛不與焉題為陳言事于謙近該内官監太監陳謹題稱本監差内使管領打捕户於真定河間等處打捕野味魚户於直沽海子口等處打魚合用口糧脚力扛擡軍士人夫該衙門照例差撥應用等因該工部官欽奉聖㫖是只着本監魚捕户自打有時起送逓運所船隻車輛逓送前來不許勞動攪擾軍民犯的不饒欽此欽遵行移應付臣有以見皇上愛養人力而不欲勞擾軍民之盛心矣但真定河間并直沽等處遭冦賊擾攘之餘正人心未定之際而所在軍民流移公私匱乏屢䝉恩例寛恤一時未能蘇息加以天旱不雨五穀未種頭畜牲口損失殆盡而軍衛有司逓運所選集軍餘民壮備守城池地方或借倩車輛船隻運送軍器物件差役繁重非止一端况即目當春夏長養之時正物類生育之際所宜對時育物以廣好生之仁兼且天氣日漸炎熱醃造亦非所宜萬一採取失時恐難食用伏望聖恩乞将前項事務暫且停緩待秋成以後斟酌整理如此則人物咸得其宜而恩澤益以周流公私兩得其安而事體永為便利臣叨受國恩備員輔導茍有所見不敢不言具題景泰元年三月二十日奉聖㫖卿言的是罷不必去欽此申明舊例事余子俊巡按陕西監察御史李敬題稱在京在外各衙門出使公差人員該支廪給行三坐五雖有舊例但未知以日期而論以衙門而論無巻可查若以日期而論毎日日行則三升坐則五升不難于支但遇有事𦂳急者一日或行三四程者有之又未審如何支給若以衙門而論倘一日經過三四處各支三升宿處又支五升則一日却支一斗以上議論紛紜靡有定見不惟出使人員難於遵守抑且有司驛分易於侵欺合著為定法通行在京在外衙門遵守奉行奏抄到部照得宣上徳達下情防奸宄誅暴亂馭邉疆等項機宜不過旬月之間遍及天下可以立待無或後期者實於驛傳是賴著有舊典應合給驛使客本部於該賫信字號符驗則填濕字號勘合備開陸路應付驢疋水路應付站船縁由於該賫達字號符驗者則填良字號勘合備開陸路應付馬疋水路應付站船縁由於該給驢疋紅船者則填恭字號儉字號勘合俱令㑹同舘應付有職者多支廩給行路之時毎驛經過三升公幹去處經過三升經宿五升有役者多支口粮不拘行路公幹去處一例支升五合前項廩給口粮非比俸給乃是日逐便於使客飯食以免躭遲所事之故通計一飯所費人有貴賤不同合用柴薪蔬菜鹽醤之類僅勾備辦飯後倘有所剰盡皆狼籍撇下在驛不成别用以此使客舊無一日經過兩三驛不支廩給口粮之例似此小費非是加厚使客揆之事體計程倍道不得不然但僻静去處或未貽慮衝要去處甚是靠損如北抵南京水道站船一隻止載一人船隻有限使客無窮循環逓送自夜達旦畧無休歇驛道使人實可矜憫中間亦有不才官吏人等不體朝廷立法初意凡遇使客到來廩給口粮不與做飯止是支與粗米不知使客又於何處做造所苦情状此其大槩積弊至此誠可痛恨方圖舉行禁約間今該前因若不體念人情申明舊例便利官民年復一年何以杜塞弊源用増實效啓無先儘舊例無弊次将時宜可行者總為斟酌刋行榜文發天下司府州翻刋就用司府州印鈐給發所屬驛逓衙門張掛曉諭禁約不屬司府州縣所屬者一體給發本驛不致頃刻稽留使客為主廩給口粮務須與其做飯不願做飯者方許支與細米上不虧官下不損民永為遵守敢有違悞者官員聴巡按御史按察司官拿問吏典以下聴合干上司提問使客有犯生事勒掯等罪赴京者該驛備行本部回還者備行本管衙門照例叅拿究治刋印榜文合用匠料紙張等項行令順天府支給官錢買用題驛逓過闗米粮事馬文升車駕清吏司案呈奉本部送於兵科抄出巡按直𨽻監察御史馬允中題内一件處置驛逓過闗米粮臣查得舊例並無過闗等項名色訪得先年間為薦新進貢黄馬快船并各處𦂳急公文一時輳集或無見船装載或有船濕漏不堪必欲守换不無稽留因此從宜毎闗一紙出米三四斗貼與經過此過闗之所以名也不意流弊至今勒取數石未已傳曰作法於凉其弊猶貪作法於貪弊将若何此之謂也若不姑近人情量為處置誠恐稽遲公事責有所歸如䝉乞勅該部議處合無毎夫一月出米若干升收貯在官以備所急毎闗文一紙上水量與米若干斗下水量與米若干斗無闗文者升合不許亦行各該驛逓板榜曉諭仍行各該巡河御史時常查考收支數目務要明白不致所司侵欺違者叅究如此庶驛逓夫役不致逼迫逃移而公事亦不致于遲悮矣等因并将處置接逓人夫皂𨽻并禁革官員多起闗文及禁革私鹽三事一同開坐具本該通政使司官奏奉聖㫖該衙門知道欽此欽遵抄出送司案呈到部㸔得所奏除處置接逓人夫皂𨽻并禁革官員多起闗文二事本部俱查有見行禁約事例難再覆奏及禁革私鹽原發去處係𨽻都察院掌行備咨該院轉行巡鹽御史徑自查處所㨿處置驛逓過闗米粮查得舊例並無過闗名色訪得先年為因公差人員各王府進貢到于驛逓一時無船装載或有濕漏不堪若候守换不無稽誤要将前路船隻打過從宜毎闗一紙出米三四斗貼與打過不意流弊至今勒要數石要乞議處一節切惟驛逓衙門所設有繁簡之分故夫役船隻有多寡之異且裡河一帶驛站設立不過五七十里逓運所設立不過一二百里之逺夫船有數而使客無窮但應付接逓之際不可不斟酌緩急以通變時宜若遇𦂳急公務無船装載量為貼助米粮令其經過此最人情兩便奈何因襲既久人心奸巧强勒米粮數多委的負累人難今御史馬允中所奏切中時弊若不量為處置禁約則事無定體奸弊日滋深為未便合無本部移咨都察院轉行各該巡撫都御史并巡按巡河御史及咨工部行令管河郎中各嚴督各該所轄府州縣掌印正官除偏僻驛逓外中間果係衝要去處如裡河一帶兩京各省往來公差人使客頗多船隻不勾倒换毎驛站五七十里者如遇打過站船毎隻止許貼過闗米二斗毎逓運所一二百里者紅船毎隻止許貼過闗米五斗各於輪該走逓水夫出辦不許一槩科擾如或凑辦不前願出雜粮者照依時值價聴其便但不許過二斗五斗米粮所值之數府州縣毎年置立印信文簿一扇發去各該驛逓收掌如遇差多船少接應不敷将貼過米粮俱於前簿内明白附寫某月日准某驛逓闗文奉何衙門差委何人往某處公幹無船倒换貼與米粮若干若係長行馬快船隻此與倒换船隻者不同及無闗文者俱不許升合支貼若干勢要之徒多勒過闗米粮者許各該驛逓申呈巡撫巡按官處叅究該管官吏夫甲人等敢有指一科十因而侵欺入已者事發罪不輕貸年終巡撫及巡按巡河等官吊簿稽考查出奸弊徑自提問如律仍行出給告示發仰驛逓常川張掛曉諭如此則過闗米粮自有定數公差人員不敢多勒而驛逓不致騷擾矣縁是處置驛逓過闗米粮及奉欽依該衙門知道事理未敢擅便謹題請㫖為建言民情事馬文升車駕清吏司案呈准武庫清吏司手本奉本部連送該本司案呈奉本部送准禮部咨𢎞治十三年月日不等於禮科抄出吏部等衙門聴選等官人等洪旻等呈建言民情事件該通政司官於奉天門奏合着禮部抄出㑹官議奉聖㫖是欽此欽遵抄出到部㑹同各部都察院通政使司大理寺六科議得除有例見行及泛言難准外數内七件合准所言宜從吏部等衙門查勘定奪施行未敢擅便各官於奉天門奏奉聖㫖是欽此欽遵擬合通行除外合行抄單移咨貴部煩為施行等因備咨抄單送司㸔得單内開聴選官洪旻等所奏差㸃軍解津貼不均等四事係本司承行另行呈堂外照得包攬驛夫加取夫價等八事係𨽻車駕職方清吏司掌行案呈到部合連送該司仰将應行事件呈來定奪仍将包攬驛夫加取夫價等事移付車駕職方二清吏司各另一體呈來施行連送到司抄單粘連手本前去車駕清吏司煩為徑自呈堂施行等因手本送司案呈到部擬合通行為此開具一連送該司仰付勘合卷類行福建布政司轉呈鎮守官㑹同巡按御史煩照㑹官議奉欽依内事理欽遵施行計開吏部聴選官許朝珮福建興化府莆田縣人言事一包攬驛夫加取夫價事竊惟包當夫役累有禁例而不遵該驛官吏容情而罔革臣竊見本府莆田楓亭二驛俱是莆田仙游二縣田粮編僉防旱二等夫役防夫之設専以逓解囚犯旱夫之設只是扛送等用逐驛交接不過五六十里之程毎米一石按月輪流不過三五次之差而已先年一向被附驛慣熟軍民包當就夫户家米一石索取銅錢二三百文又有輪該廩給毎次多則費銀七八兩少亦不下三四兩俱是該當夫户出辦至成化八九年間本府知府潘琴到任體知前弊及䝉巡撫都御史張宣等便宜處置斟酌計估毎米一石定則價銀二錢案仰本府着夫户照季本府秤收按季發驛查照夫次驗日給與工雇及廩給俱内支用尚有餘剰銀兩收官公用官民兩便比於包當民得省半後因知府潘琴等去任又被積年包攬之人通同久慣無粮老人妄呈收銀不便仍舊包當今見近年以來人尤奸詭毎米一石勒取價錢四百五百文者稍有不從輒便生事妄作不着役申呈批挐責罰或有等夫户本身自去應當者却又通同官吏那越夫次日逐差撥無時休息使其連累懼怕盡歸承攬且防夫價錢則索取倍於旱夫况一般田粮編僉而夫價多寡不一似此奸弊莫革民患益深且莆田目今災旱相仍人民缺食艱窘至甚又兼差役浩繁民不聊生若再被無籍之徒仍前包攬加取夫錢不無愈加困苦如䝉乞勑該部轉行本府縣查照先年都御史張瑄等定議價銀則例着令夫户備價赴府當官秤收按季發驛支用如有包攬之徒仍前在驛包當加取夫價索騙民財者合無照依積年事例問發邉逺充軍庶使包攬之徒無多取之弊而人民免受侵漁之害實為便益前件行福建鎮守官㑹同巡按御史查處定奪一咨巡撫山東都御史徐除外移咨前去煩照㑹官議奉欽依内事理欽遵施行計開直𨽻順徳府内邱縣部粮典史吕孚乾係山東登州府黄縣人言事一處驛站奸弊以蘇民困事切照本縣原編黄山舘驛粮僉上馬地九十頃中馬八十頃下馬七十頃驢毎頭四頃牛夫毎名二頃毎匹頭編殷實夫頭十名十年一次輪流挨當毎畆馬價鋪陳什物等項出銀一分各夫自徴馬驢倒死鋪陳什物損壊於内買補最為民便例該十年一造夫有消長不一地有推收之變又該取勘造冊里書人等乗機作弊儧後那先地數飛走上司法無可禁只得将地一頃二十畆入站五年常輪常養人情頗堪後奉事例除去逃亡全户充軍地畆止将見地併編隔年一輪多被隠漏出錢五文地多錢少若以十年相較費錢三倍之多又将馬驢鋪陳價銀徴解府庫任支以待倒死損壊方給逓年預徴無益於民工食草料各夫自徴不勾費用多将馬驢瘦損走逓不堪負累夫頭逃竄者有之雖節行取委的悞事不便非獨本省為然誠恐各處亦有此弊如䝉乞勑該部計議通行立法嚴明禁革那移合無将逃亡全户充軍遺地俱有佃種之人併作一處俯順民情照前編定十年一輪後該造冊夫頭消長就於貼户内補編一名應役地有推收當輪過籍㡬年十分為率均出站錢如甲原地五頃内賣一頃與乙冊内添一買地姓名各照地數朋當如此地無飛走那移之弊可革民皆稱便各處站地倘有粮僉不同務處省錢得宜不許更變前件兵部行山東巡撫官查處一咨巡撫四川都御史劉除外移咨前去煩照㑹官議奉欽依内事理欽遵施行計開四川重慶府巴縣民盧漢言事一濫設鋪兵臣見得本縣該管五十餘鋪先年本府掌印官量其道路煩簡公文多少僉設司兵常川在鋪專一逓送其路通三司并各府州縣衝要者毎鋪設與司兵十名或八名路不衝要僉與司兵六名或五名如本府迤東止通南川一縣往回别無分岐再往他處縣小事簡三二日僅送公文一次每鋪舊設司兵四名或五名迄今年久人多稱便公文無悮近年以來本府事煩不預本縣止慿鋪長毎年一次編僉官不知其作弊将南川路鋪瞞官添僉司兵十名及十二名不僉附近相應人户却僉隔逺三四百里人户以致畏逺不願應當只得将錢交與近鋪慣熟奸人暗與鋪長分用賣放少有正身自當或有告理官為擔代䝉蔽上司小民被其羅織加以刁潑之名只得逃生逺避臣惟民乃朝廷之赤子今却以為奸人資家之具増省在吏掌握誠恐民怨日深如䝉乞勑該部㑹議轉行四川巡撫巡按并布按二司嚴加禁革督同本府掌印官從公查勘毋容縣官飾詞回䕶止慿府主量路煩簡查照景泰天順成化初年原設原鋪司兵額數衝要鋪分各僉與司兵十名八名其餘鋪分僉與五名南川縣鋪僉與四名俱於近鋪里内人户僉㸃應役本縣掌印官督令司兵帶同家小常川住簿逓送公文十年一次更换鋪長依律磨勘赤厯不許干預僉拘仍查究多僉濫設司兵的係何人作弊受財通将𢎞治七年以後鋪長查提拘問明白司兵革發寧家聴當别差鋪長亦不得仍前干預害人前件兵部行四川巡撫官通行查處務在均平以革奸弊名臣經濟録卷三十四
