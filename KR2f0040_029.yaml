body:
  text: 名臣經濟録卷二十九明黄訓編禮部祠祭中題陵廟疏商輅臣等仰惟大行慈懿皇太后作配英宗皇帝正位中宫及皇上嗣居宸極尊為慈懿皇太后盖先帝全夫婦大倫皇上全母子深恩天下後世無容議矣今位號彰著于海宇數十年則壽終之後所宜奉梓宫附于裕陵奉神主祔于太廟此古今不易之禮亦先帝與皇上全大倫深恩之初心也今聞聖命欲別卜葬地臣等實切疑懼竊惟皇上所以若是者必于今皇太后千秋萬年之後與先帝同尊于陵廟自嫌二后並配非本朝之制然有二太后方自今始則陵廟之制亦當自今日考諸古恊諸義以行之臣等考之前代一帝二后並祔陵廟者未易悉數只如漢文帝尊其生母薄太后然于其嫡母吕太后雖得罪于宗社尚且仍與父髙帝並葬長陵無所更易此文帝所以號為孝文髙出漢諸帝之上也又如宋仁宗追尊其所生母李宸妃為太后然于嫡母章獻劉太后雖本無子尚且仍與父真宗同祭太廟無所嫌忌此仁宗所以稱為賢君髙出宋諸帝之上也皇上於慈懿皇太后昔日致其養今日盡其哀雖文帝仁宗無以加矣若陵廟之祔稍有未合于禮則致貽後議有掩前美况千秋萬年之後今皇太后與慈懿皇太后同在陵廟不相妨碍且愈足以見二太后生存之日雍和無間永久之後並美無窮載諸史冊增我皇明之輝增我皇上孝德之名此臣等所深願也但臣等識見愚昩未敢以為至當伏望皇上體先帝之心稽前代之制重念綱常之大以臣等所言下于禮部㑹同皇親公侯駙馬伯文武羣臣公同㑹議求其至當允合天理允惬人心則國家幸甚天下幸甚臣等不勝悚懼之至謹題成化四年六月二十八日奉聖㫖是着禮部便㑹多官同翰林院計議停當来説欽此題陵廟疏姚䕫昨者該大學士等官彭時等奏稱大行慈懿皇太后崩逝所宜奉安梓宫于裕陵神主于太廟䝉聖㫖命禮部㑹多官計議停當来説欽此欽遵㑹同皇親公侯駙馬伯五府六部都察院通政司大理寺翰林院錦衣衛六科十三道等衙門議得今大行慈懿皇太后梓宫宜葬于先帝之左皇太后千秋萬嵗後宜居先帝之右允合天下後世至公之論等因覆奏未䝉允納者臣竊以為人主治世所以固結天下人心者惟在于禮義而已禮義者人心本然之天禮義亡則人心離人心離則國非國天下可得而治乎且山陵宗廟禮義之大端父子君臣夫婦之道實所係焉不可不慎也大行慈懿皇太后自冊立為皇后正位六宫奉事先帝自始至終如樂之和未嘗有廢命則婦道全矣皇上嗣位尊為慈懿皇太后頒詔天下與皇太后並尊同養未嘗有過舉則母道全矣今其崩逝出于考終發遺詔于天下陛下為之括髮跣足朝夕哭臨舉大喪一依孝章恭皇后禮制行事未嘗有缺典則陛下之子道全矣使在先帝時有廢命則婦道虧皇上必不肯加慈懿之徽稱使居慈極時有過舉則母道虧皇上必不肯舉今日之大禮今也婦道全于前母道全于後則慈懿皇太后可謂盛徳矣生則致其養死則致其哀則皇上可謂至孝矣母有盛徳則于合葬祔廟之禮不可廢子有至孝則于合葬祔廟之禮所當行此人心禮義之天古今不易之理天下至公之論既無毫髮之差亦無纎介之惑今一旦無故欲以梓宫不於裕陵合葬神主不於太廟祔享人心既駭且疑皇上天性髙明孝心純懇固巳洞燭禮義所在累召詢問以為臣等所言乃是正禮但廹于皇太后之命未賜允斷来来言者屢屢不絶臣竊窺皇上欲順承母后之命則于義有未安欲従衆人之言則于恩有未忍展轉宵旰似難裁處臣聞昔桃應問舜為天子臯陶為士瞽瞍殺人則如之何孟子曰執之而巳矣以天子之父殺一人宜若可容而必執之者何也不以恩掩義也禮曰父母有過下氣怡色柔聲以諫諫若不入起敬起孝悦則復諫必欲置親于無過之地者何也是以義成恩也恭惟皇太后陛下聦明仁慈之徳聞于天下自皇上即位四五年間未嘗干預外政人皆謂女中堯舜不是過也今特偶扵慈懿一事見有未盡以理開諭易于轉移耳惟上極其誠敬和其聲氣従容戒勸至于再三皇太后必能感動而従之此則恩義兩盡也萬一有不能從則當斷之以義而從天下之公皇太后脱或有怒而陛下仁孝誠敬和顔悦色益加其至而不敢替焉則于恩義亦不兩失矣或者曰皇上乃皇太后所出豈可薄于此而厚于彼乎夫慈懿與皇太后他日並合於裕陵並享于太廟無輕重之間也無大小之分也無損于此也無益于彼也設使慈懿先入裕陵而皇太后他日失所尊慈懿先入太廟而皇太后他日不得預則有輕重之間也則有大小之分也則有損于皇太后而益於慈懿也今則不然慈懿葬于左皇太后萬年後葬于右慈懿今日祔于廟皇太后萬年後亦祔于廟同尊並列無分毫低昻髙下于其間而謂薄于此而厚于彼可乎或者曰慈懿無子宜與恭讓皇后同此尤不然恭讓在宣宗時已嘗遜處别宫而立孝恭皇后矣慈懿在當時未嘗别處他宫未嘗别立一皇后豈得謂之同乎况宣宗晚年追復恭讓徽號悔恨莫及自笑曰此朕㓜年事盖可知矣又况皇上繼統承緒即同其子而可謂非其出而議乎揆情度理合葬則是不合葬則非祔廟則是不祔廟則非是非之間有至公之論至公實出于禮義之天非勉強也一人之心如此千萬人之心亦如此萬世人之心亦無不如此人心同此禮義則同此向慕同此向慕則同此愛戴勢力加之不能奪刑威逼之不能從惟禮義統而属之表而率之何啻膠漆之堅也何啻金石之固也一或失此則人解散如隄潰水决而不可收拾矣夫天命之歸人心是視人心一去天命不能獨留勿謂此一事遂失天命也天命人心之去留毫忽之間而巳矣昔漢髙祖為義帝發䘮而得天下項羽戕義帝而失天下皆由一事所召而可不畏哉伏望皇上以臣等所言反復開諭皇太后决從衆議而不惑于他言則皇上全大孝之名母后全賢明之徳英皇歆享于上羣臣慰悦于下人心鼔舞愛戴莫不尊親有光宗社有光天地而萬福攸隆臣等不勝幸甚姚文敏公遺集李東陽陵廟對錄劉健𢎞治十七年三月十六日大行聖慈仁夀太皇太后䘮上御西角門朝退遣内官召大學士劉健李東陽謝遷至門内扉遂闔上帶翼善冠素服腰絰麻履御煖閣素幄起立床前左右皆屏不敢近臣健等叩頭畢致詞奉慰上顧謂曰先生軰上来臣健等皆至幄内上曰為陵廟事與先生軰商量臣健等仰奏曰昨䝉遣太監扶安諭示孝莊睿皇后葬不合禮欲為釐正此盛禮事臣等仰見皇上聖孝髙出前古不勝忻慕上袖出裕陵圖一紙指示陵門内有二隧道其一西行北轉而至者為英宗皇堂虚其右壙而中有道可通往来其一東行北轉而至者為孝莊𤣥堂相去可數丈中隔不通因曰此大非禮臣東陽奏曰此事臣等初不知上曰先生軰如何得知都是内官做的勾當又曰内官有幾箇識道理的昨見成化年間彭時姚䕫軰奏章先朝大臣都忠厚為國如此臣健臣遷對曰英宗皇帝嘗有遺命錢后與我合葬大學士李賢記在閣下上曰既有遺命當時柰何違之臣東陽對曰臣等聞當時尚有别議委曲至此恐非先帝本意上曰先帝亦甚不得已耳臣健等奏曰誠如聖諭但今日斷自聖𠂻勿憚改作則天下臣民無不痛快垂之史冊萬世有光矣上曰欽天監言恐動風水朕不以為然臣遷對曰隂陽拘忌之説不足信上曰朕已折之矣今開壙合葬不為動風水乎皇堂不通則天地否塞因以指畫紙曰若如此通通則風水流行惡得言動惟一㸃誠心為之料亦無害臣東陽賛曰皇上一念孝誠可以格天吉無不利臣健等皆力賛曰皇上所見髙出尋常萬萬願勿復疑上曰此事不難若祔廟之禮尤所當講臣健等奏曰先年奏議巳定慈懿太后居左今大行太皇太后居右合祔裕陵配享英廟且引唐宋故事為証臣等以此不敢輕議其實漢以前惟一帝一后唐始有二后宋亦有三后並祔者上曰二后已非若三后尤為非禮臣遷對曰彼三后一乃繼立一則所生母也上曰事須師古末世鄙䙝之事不足學臣東陽對曰皇上當以堯舜為法上曰然宗廟事關係綱常極重豈可有毫髮僣差太皇太后鞠育朕躬恩徳深厚朕何敢忘但一人之私情耳錢太后乃皇祖冊立正后我朝祖宗以来惟一帝一后今若並祔乃従朕壊起恐後来雜亂無紀極耳且奉先之祭先生軰尚不知英宗皇祖止設一座每祭飯一分匙一張而巳臣健等倉卒不解上意但應曰唯唯退思之盖止容二分而孝莊尚未配食也上又曰孝穆太后朕生身母止尊稱為皇太后别祀于奉慈殿今仁夀宫前殿儘寛意欲奉太皇太后于此他日嵗時祭享一如太廟不敢少缺臣健等皆未敢應聖意盖謂今皇太后千秋萬夀後也臣東陽贊曰皇上言及孝穆太后尤見至公至正之心可以服天下矣上曰此事却難處之行之則理有未安不行則違先帝之意又違衆議㑹議猶可柰先帝何朕嘗思之夜不能寐先帝固重而祖宗之制為尤重耳臣東陽對曰願聖見主張得定臣等無不奉行上曰朕亦難于降㫖先生軰是朕心腹大臣好為處置臣健等曰須下禮官令多官議之上曰雖多官亦不敢主張仍須先生軰為之耳臣健等曰容臣等計議上聞上曰先生軰辛苦且回去辦事是日上稱心腹者三呼先生者以十數臣健等感激稱謝皆叩頭起上前下板階顧内官啓扉立送而出時尊謚議已進奉㫖撰冊未上几筵臣健等乃具題本稱當時先帝遇難處之事群臣為委曲將順之詞或者不能無疑乞勅禮部㑹集多官再加詳議次日朝退上起立呼内閣臣健等至殿閣幄前立問曰先生軰昨日所進題令多官㑹議是㡬箇衙門臣健等對曰即前日進諡議者臣東陽厯對曰五府六部都察院通政司大理寺及詹事府翰林院言未畢上遽曰有翰林院最好考據古今大典禮須用翰林院又曰有科道乎皆對曰有上又曰好少頃曰别無言話囘去辦事盖是日專為翰林問也自是每召必于朝退立呼内閣未嘗呼名二十一日復召上袖出㑹議本問曰此事如何臣健等對曰議得是臣東陽奏曰未知聖意如何上曰如先生輩說臣健等曰正是古禮上曰仍稱太皇太后可否皆對曰既是别廟須如此尊稱為當上曰如何批荅臣遷對曰須説得委曲臣東陽曰要見是重事上曰然宗廟事重要見今後世世子孫崇奉不缺之意此本随文書下来臣東陽曰臣等領去臣健亦云即以本授臣復送而出二十二日復召上袖出奉先殿圗指示曰此與太廟寢規制一般常時薦祭皆在此又指其廊間有門通西一區曰此奉慈殿也舊為神庫今廊廡及井皆未動又指其東一區别為門面南五間東西廊各五間曰此神厨也欲以此建廟可乎臣健等皆對曰此地最便臣東陽曰但未知寛窄如何上曰寛窄有數因指其旁小字曰東西十㡬丈南北二十丈後有墻墻之後為米倉盖較之奉慈殿區深不及八尺皆請曰墻可展否上曰須展之其西偏有井亭亦須去之耳又曰欲遷孝穆太后併祭于此如何臣健等曰甚當再問再對上曰位序如何臣健對曰太皇太后中一室孝穆太后或左或右一室上曰須在左後来有如此者却居右臣東陽曰太皇太后居中乃可臣遷奏曰㑹議本未知今日可出否臣東陽曰外廷瞻仰此本已數日上曰正為廟地未定今既定即出矣皆拜出如前二十五日御批云祀享重事禮當詳慎卿等稽考古典及祖宗廟制既巳明白都准擬特建廟奉享仍稱太皇太后以伸朕尊親之意後世子孫遵守崇奉永為定制于是中外翕然稱為得禮盖自丁巳之召不奉接者巳閲八年龍顔温霽天語周詳視昔有加而明習國事洞察義理惓惓以宗廟綱常為已任盖非臣下所能涯涘矣陵寢事竟不行盖欽天監以為嵗殺在此方向不利内官監亦謂事千英廟陵寢難以輕動而聖意終不但已乃于陵殿神座移英廟居中孝莊居左孝肅居其右云題陵議近該光禄寺厨役王福錦衣衛千户陳昇建言欲要遷改顯陵迎請恭睿淵仁寛穆純聖獻皇帝梓宫入葬天夀山以全大孝一節即與先年革職錦衣衛百户随全罷閒光祿寺錄事錢子勲之説相同近又該縁事監生詹啟口山温州府武舉生杜承美為民兵馬周宻湖廣生員蕭時用致仕僉事寗河相踵具奏即與王福陳昇所言如一雖其心之出于公私真偽固不可知然據其論議皆自謂效忠以賛成聖孝之意巳經本部㑹議題覆至再至三始終未敢輙議奉行者尚書席書固巳備論于前今大學士李時極論于後矣先年工部尚書趙璜嘗有言曰體魄不可輕犯靈秀不可輕泄根本不可輕動其説良是至如引本朝故事太祖不曽遷皇陵太宗不曾遷孝陵此論亦正是皆合文武大臣多官之見要不出此豈忠君愛上之心謀國料事之智乃盡不若随全錢子勲王福陳昇蕭時用軰哉識者當知其不然也臣竊惟遷陵之議意者本出于聖母萬年之情陛下終天之慕凡在臣子豈昩將順所以卒不敢輕議者非謂才識謭薄不能奉行畏難茍安有所欺而不肯也亦非有義理難明之事考求不得有所詭而不可也亦非敢沮抑人言推避國事顧一已利害有所憚而不為也惟是竊念先皇帝衣冠之蔵厯嵗已久顯陵之役建造經年規制已備恭覩陛下光臨大寳十年于兹百祿駢臻即已然之福而徴諸地理庇廕之説似乎神靈已安比者屢頒聖製封其山為純徳名其府為承天表章丕顯似乎事體巳定而一旦議遷老臣長慮多為駭愕盖以關係國家禍福有動而不可悔之憂首事倡和之人將来有不容誅之罪故也但近日言者假當時安厝梓宫土壌非吉為詞自不能不感動陛下之宸𠂻上厪聖母之至慮所以節奉欽依重令本部㑹官従長集議昨該尚書汪鋐具奏又奉㫖一併㑹官詳議了来説欽此臣仰奉嚴㫖不勝悚懼夙夜思惟祗見事大體重非臣下所能任其咎者又况遷葬之舉治棺制服事同初䘮萬一欲改祔梓宫重易衾歛禮必躬親又非臣下所能代攝者是皆不可不預思也議者至謂陛下震位久虚以為咎在顯陵固未必然又謂陛下龍飛江漢以為福縁顯陵亦未必然盖上天篤生聖人為中興太平之主必能生聖嗣以開萬世之傳非地靈鬼神所能握其機者乃若先皇帝𤣥宫久閟體魄久安譬如木之根本培植巳固而一旦動摇則似非所以求枝葉繁茂之道是則不可不尤加慎重者也故今日之事誠在聖明留神加察淵謀獨斷上同聖母早夜籌慮有以自致其决耳慎勿輕為羣議之所摇惑况近世精通地理之術實鮮其人至于士夫渉蠟講論尤多誕漫每見人家惑于風水之説將先世丘壟無故改遷往往自速新㐫坐消己福盖異人罕得道眼難逄地理家書亦有天相神司之説所以可遇而不可求可信而不可盡信者也昔宋儒朱熹嘗論壽皇𦵏地非吉疏請遷改猶有取于孫逄吉之言少寛日月别求吉兆為上十字以為至論當時熹明知夀皇所葬不吉以為當改然亦必須從容慎擇如此况今日未有所擇之地知其最吉為必可葬又未知顯陵果非吉地為必當遷而建議之人徒爾紛紛未逹事體即使重復㑹官集議凢有忠愛之實心者恐亦不能復為他説也臣待罪禮官敢不恭承明命廣集衆思但事體重大輙難議擬如䝉聖明采擇臣愚伏乞英斷特罷㑹議亟賜停寢實為宗社無疆之慶仍乞重降嚴㫖禁絶細人自今無得妄議園陵重事傷國大體天下幸甚萬世幸甚嘉靖十年十月初二日進初四日奉聖㫖卿所言説的是朕已奉聖母慈訓謂陵寢根本重地不可輕動這各該奏擾人役本當都拏問重治且不䆒再来奏擾决不輕宥欽此國家常祀之禮丘濬臣按鄭司農解周禮四望以為日月星海鄭𤣥謂禮無祭海之文考周頌般序及觀學記謂三王祭川先河後海則是海之祭三代已有矣烏可謂無祭海之禮乎中國之地在三代不出九州之外惟揚徐青冀四州濵海而巳四海惟東北濵中國而南海北海則越在荒服之外自漢以後南越始入中國而有南海然西海竟不知所在故今祀東海于登州祀南海于廣州二祀皆臨海而祭西海則望祀于蒲州北海則望祀于懐慶夫宋都汴梁而懐慶在其北是時失幽燕而以白溝河為畍無縁至遼薊之域出國門而北望以祭之可也國初都金陵因之以祭亦不為過若夫今日建都于燕往南而祭北海豈天子宅中以臨四海之義哉且古謂青州為北海郡青去登不逺猶以是名今京師東北乃古碣石淪海之處于此立祠就海而祭于勢為順于理為宜况今北境毉無閭山在于遼海山既可以為北境川獨不可以為北海乎若夫中國之正西在于秦隴西北則蜀稍南則滇也滇之極西南百夷之外聞有大海通西南島夷此地在前代未入中國今既為覊縻之地則王化之所及也宜于雲南望祀之則四海之祀皆在吾域中矣議禮之事非臣下所敢專者謹錄愚見以俟采擇釐正祀典疏馬文升載考帝舜紹堯之後肇十有二州封十有二山盖毎州必表封山之髙大者以為一州之鎮如五鎮五岳之神東封㤗山為東岳今在山東泰安州沂山為東鎮在今青州府臨朐縣南封衡山為南岳在今湖廣衡山縣㑹稽山為南鎮在今浙江㑹稽縣西封華山為西岳在今陕西華隂縣封吴山為西鎮在今隴州北封恒山為北岳在今大同府渾源州封毉巫閭山為北鎮在今遼東廣寜衛中封嵩山為中岳在今河南府登封縣封霍山為中鎮在今山西霍州又封四海四凟之神東海之神在今莱州府南海之神在今廣東南海縣西海之神在今蒲州北海之神在今懐慶府濟源縣誌載以其濟水源通北海故祭于此淮瀆之神在今南陽府泌陽縣江瀆之神在今四川成都府河瀆之神亦在蒲州濟瀆之神亦在濟源縣三代而下厯秦漢隋唐俱有原封之山致祭至五代失有河北之地宋有天下未能混一北為契丹所有後以白溝河為畍所以祭北岳恒山于真定府曲陽縣俗傳有飛来峯之説不知祭毉無閭山于何處盖宋建都于汴而真定在汴京之北是亦不得已權宜之道也迨我太祖髙皇帝膺天眷命奄有萬世建都金陵覩真定逺在京都之北所以因循未曾釐正迨我太宗文皇帝遷都北平而真定却在京都之南當時禮官猶未建明猶祭北岳于曲陽縣惟北鎮仍祭于北寧若以為北岳原在真定則周禮載恒山為并州之鎮在正北我朝一綂誌亦載恒山在渾源州南二十里即北岳以此觀之則北岳當在渾源州為無疑矣今本州北岳廟址猶存故老猶能相傳我朝洪武初定岳鎮海瀆之神削去厯代褒加之帝號真可為萬世之法獨北岳猶祭于帝都之南非其故封之山誠為缺典臣非禮官考據未真但係國家重事不可不為釐正如䝉乞勅禮部再加詳考如臣所言為是明白具奏行移山西并大同廵撫官員候時年豐稔措置錢糧于渾源州恒山舊址去處修盖北岳神祠務在不侈不隘若舊殿猶存不必新造止可修葺工完之後有司具奏更乞𠡠翰林院撰文勒石竪廟以垂永久今後凡祭北岳之神于此行禮數百年之缺典得以正于今日而我朝之盛事亦可昭扵後世矣縁係考䆒神封以正祀典事理未敢擅便謹題請㫖𢎞治六年七月十七日具題次日奉欽依禮部㸔了来説欽此正祀典疏倪岳禮科抄出本科右給事中張九功題仰惟陛下初登大寳郊天告廟又遍及古之聖帝明王岳鎮海瀆是即大舜類帝禋宗望山川遍群神之意臣于𢎞治元年二月二十二日欽奉上命遣祭北岳恒山之神臣恐敬不足以接神明誠不足以荅聖明有孤陛下懐柔百神之意是以齋明戒懼不敢遑寧也臣惟國之大事在祀與戎祀典不正則神人凟亂妖誕所由興人心所由不正也故祭必有義君天下者祭古先聖王以其有功徳于民也祭日月星辰以其民所瞻仰也祭山岳河海以其利澤及人也祀典所載惟此族類考之祭法概可知矣方今聖明御極欲其首正人心必先脩明祀典不然人祭非鬼神奸惑人心焄蒿妖誕之説紛起欲天下務民義而正風俗也難矣如䝉乞𠡠禮部通行天下有司除祀典應祭者依例致祭外若神非其地者氣非其類者非有功徳于民非天地之正者悉皆除去勿使惑人務效狄梁公毁淫祀之法推西門豹投妖巫之心凢民間拜天告斗脩齋設醮假降邪神妄稱彌勒一切禳修善事扇惑人心者嚴加禁約有犯如律若視為泛常縦容不謹一體治罪于以正人心于以清風俗然朝廷者天下之本欲治其末先正其本臣觀朝廷常祭之外又有釋迦牟尼文佛之祭有三清三境天尊之祭有九天應元雷聲普化天尊之祭有金闕真君之祭有玉闕真君之祭有金闕元君生辰之祭有神父神母之祭宫觀中水官星君諸天諸帝之號之祀不可枚舉凢此皆異端茫昧之説祀典所不載者也夫人之所戴者一天而巳漢儒鄭𤣥五天六天之説乖繆不經况此黄冠之徒諸天諸君之號豈不尤為妄誕天有二日且不可豈復有如是之多天哉借曰有之不郊而祭則為凟凟固不可也如知其無徒然而祭則為妄妄亦不可也昔秦漢四帝五畤諸神恠荒惑之禱祀非此類乎如䝉乞𠡠禮部於諸宫觀寺廟中此等不在祀典非禮之祭逐一查出盡行罷去又一切逢七逢九之齋清醮火醮之類通行禁止如此則朝廷正而天下無不正矣臣今與祭祀之事故言及此干冐天聽不勝悚懼之至等因具題該通政司官于奉天門奏奉聖㫖禮部㑹官稽詳何神立于何代何神有功于國何神澤及生民如今應否祭祀明白来説欽此欽遵㑹同太傅兼太子太師英國公等官張懋等謹詳古制天子祭天地祭宗廟祭社稷祭天下名山大川祭五祀凢載于祀典者皆有功徳垂世如祭法所謂法施于民以死勤事以勞定國能禦大災能捍大患則祀之非此族類不在祀典故孔子曰非其鬼而祭之謟也又曰淫祀無福而先儒亦曰帝王無妄祭無徼福又曰明于天地之性不可惑以神怪知萬物之情不可罔以非類皆謂此也自秦以降乃多淫祠厯漢至元有因有革迨至國朝太祖髙皇帝即位之三年首詔天下有曰夫禮所以明神人正名分不可以僣差今命以古定制凢岳鎮海瀆並去前代所封之號止以山水本名稱其神郡縣城隍神號一體改正厯代忠臣烈士亦依當時所封以為實號後世溢美之稱皆與革去用稱朕以禮事神之意其天下神祗無功于民不應祀典者有司毋得致祭欽此欽遵及大明律内一欵凡私家告天拜斗焚燒夜香燃㸃天燈䙝凟神明者杖八十若僧道修齋設醮而拜青詞表文及祈禳火灾者同罪還俗又一欵凡師巫假降邪神書符呪水扶鸞禱聖自號端公太保師婆及稱彌勒佛白蓮社明尊教白雲宗等㑹一切左道亂正之術或蔵神像燒香集衆夜聚曉散禳修善事扇惑人民為首者絞為從者各杖一百流三千里欽此欽遵其所以拯弊俗于千古垂至戒于萬世至深切矣列聖相承恪遵成憲間有因所感應之事而增益祠祭或以萬夀千秋等節而修建齋醮一時行之不察後遂襲以為例因循莫改増置益繁異端之途轉相鼔扇怪誕相乗矯誣殊甚夫非禮之祭非類之禱近代帝王固不能無然絶地天之通嚴幽明之分在帝王以為當務之急盖非聖明之君卓然有見必不能深禁而痛絶之此給事中張九功之言所以深有望于今日者也伏乞聖明敬事天地孝事宗廟嚴事山川百神捨此之外凡有一應齋醮禱祠之類通行革罷不惟屏斥異端之奸亦能節省無益之費該部仍通行天下除應祀神祗照舊致祭外其餘無有功徳利澤及民及不經奏勘不合祀典者即係淫祠俱各查考盡行革去僧道脩齋設醮師巫假降邪神左道亂正者嚴加禁約敢有故違依律問罪其在京各宫觀寺廟神祗出處不載于正經功澤莫稽其顯跡但係非時遣祭者並皆停免中間有經累朝崇建難于輙廢亦宜釐正其名號减殺其禮儀庶㡬朝廷之上允合乎聖祖以禮事神之心至于祀典之存亦足致乎帝舜至誠感神之妙和氣恊應國祚綿長人心以明風俗以正其于治道誠非小補今將查到在京各項祭祀除太乙之神漢亭侯關羽宋丞相文天祥俱祀典應祭外其餘各寺宫觀神祗應否致祭縁由逐一議擬開坐伏乞聖明裁處緣係節該奉欽依禮部㑹官稽詳明白来説事理未敢擅便定奪謹題請㫖計開釋迦牟尼文佛三清三境天尊謹按傳記西方有佛國曰天竺天竺有五中天竺乃釋迦所生之地後漢明帝時其法始入中國後之宗其教者遂以釋迦為師其曰三世佛者則以釋迦之本輕為法身徳業為報身并其真身而為三其實本一人耳今乃分為三像而並列之失其指矣唐儒韓愈有曰三代之時天下太平百姓安樂夀考中國未有佛也明帝時始有佛法其後亂亡相繼運祚不長宋齊梁陳以下事佛漸謹年代尤促惟梁武帝捨身施佛其後餓死䑓城事佛求福乃更得禍由此觀之佛不足事亦可知矣至于道家以老子為師其所謂三清者盖倣釋氏三身而為之尤為謬妄宋儒朱熹有曰王清元始天尊既非老子之法身上清太上老君又非老子之報身設有二像又非與老子為一而老子又自為上清太上老君盖倣釋氏之失而又失之者也况莊子明言老􅔶之死則􅔶亦人鬼爾豈可僣居昊天上帝之上哉由此言之三清三境天尊實無所據况躬親祠醮傾心崇奉如宋徽宗者可謂至矣卒之䧟身北廷覆亡宗社千載之下可為明戒但縁異端佛老之徒轉相模彷惑世誣民厯代因之莫之有廢是逓年以来凢遇萬夀千秋等節奉欽依修建吉祥好事或遇䘮禮七七修建薦揚好事俱先期一日遣官詣大興隆等寺祭告釋迦牟尼文佛朝天宫祭告三清三境天尊此皆因襲而行不合祀典今議得齋醮既合停止其前項祭告俱各罷免北極中天星主紫㣲大帝謹按象緯書有曰北極五星在紫㣲垣中一名天樞一名北辰其北第五星名天樞盖極星之在紫㣲垣萬神所宗七曜三垣二十八宿衆星所拱為天文之正中又曰紫㣲大帝之坐天子之常居也即其朝廷宫殿所在乃其象焉國朝正統初年建紫㣲殿一所于大徳觀之東設立大帝之像毎遇萬夀聖節正旦冬至俱遣大臣一員祭告今議得日月星辰並曜于天故古有大明祭日夜明祭月幽宗祭星之文祖宗以来毎嵗南郊大祀内壇巳有星辰壇合祭之禮今乃像之如人稱之為帝以極星之正祠于異端之宫稽之祀典誠無所據所有前項祭祀伏乞罷免九天應元雷聲普化天尊謹按傳記有曰凢隂氣凝聚陽氣在内而不得出則奮擊而為雷霆非如異端所謂龍車石斧鬼鼔火鞭恠誕之難也雷聲普化天尊者道家以為玉霄一府緫司五雷而雷部諸神皆其所主而又託以六月二十四為天尊示現之日故朝廷歲以是日遣官詣大徳顯靈宫致祭今議得風雲雷雨皆隂陽之妙用鬼神之盛徳祖宗以来毎歲南郊大祀外壇巳有合祭之禮而八月望後山川壇復有秋報之祭况自二月發聲之後無非雷霆震奮之日顧乃止于六月二十四日扵義何取至于像設名稱禮亦無據所有祭告伏乞罷免梓潼帝君謹按圖誌英顯王廟在劍州即梓潼神姓張諱亞子其先越嶲人因報母仇徙居劍州之七曲山仕晉戰沒人為立廟唐𤣥宗西狩追命左丞僖宗入蜀封濟順王宋咸平中改封英顯又按文昌六星在北斗魁前為天之六府道家謂上帝命梓潼神掌文昌府事及人間祿籍故元加號為輔元開化文昌司禄宏仁帝君而天下學校亦多立祠以祀之京師有廟在北安門外景泰五年間闢而新之𠡠賜文昌宫額嵗以二月初三日為帝君誕生之辰遣官致祭今議得道家謂梓潼以孝徳忠仁顯靈于蜀廟食其地於禮為宜祠之京師不合祀典至于文昌之星與梓潼無干今乃合而為一誠出傅㑹所有前項祭祀伏乞罷免仍行天下學校如舊有文昌祠者亦合拆毁祖師三天扶教輔𤣥大法師真君謹按傳記張道陵字輔漢光武十年生于吴之天目山善以符治病桓帝永夀元年于靈峯白日上昇百二十歲唐天寳七年冊贈太師中和四年封三天扶教大法師宋熈寧中加封三天扶教輔元大法師大觀二年冊號正乙靖應真君子孫厯代相傳皆有封號迨入國朝仍令傳襲正乙嗣教真人之封秩視二品歲以正月十五日為祖師示現之辰遣官詣大徳顯靈宫告祭又按宋卲伯温聞見錄建安二十年曺操破張魯定漢中魯祖陵順帝時客蜀學道鳴鶴山中造作符書惑百姓受其道者輒出五斗米時謂之米賊陵子衡衡子魯以法相付授自號師君其衆曰鬼卒曰祭酒大抵與黄巾相類朝廷不能討就拜魯漢寧太守鎮夷中觀此則陵本非異人而道家祖陵為天師者特因天寳詔稱漢天師而然爾今議得正月十五乃其生辰自宜其子孫祭于其家所有前項祭祀伏乞罷免大小青龍之神謹按碑記昔有僧名盧自江南来寓西山之屍陀林秘魔巖一日二童子来拜於前盧納之鬻薪供奉雖寒暑無怠時久旱不雨二童子白於盧能限雨期言訖即委身龍潭須臾化二青龍一大一小至期果得甘雨事聞賜盧師號曰感應禪師建寺設像立碑以記其事又别設祠于龍潭之上春秋遣官祭二青龍神國朝宣徳中𠡠建大圓通寺二青龍出現禱之有應于是加以封號至今春秋時遣順天府官致祭遇嵗旱遣官祭告盖因舊傳二龍能致雲雨故累朝崇奉如此然雖稱二龍其實蛇也蛇有神蛇其名曰蜦亦能致雨今此二蛇西山寺院處處有之略無靈異近者京師連年亢旱累累祭告祈禱杳無應驗則此亦非蜦蛇乃凢蛇耳盖妖由人興久自衰息無足崇也明矣昔宋祥符中天慶觀有蛇極怪異人以為龍孔道輔以手板擊其首死之其患遂息程明道為上元主簿茅山池有小龍如蜥蜴崇奉以為神物明道捕而脯之使人不惑後亦不聞如何則此二龍之怪誕正此類也所有前項春秋祭告之禮伏乞罷免東嶽㤗山之神謹按圗誌東嶽魯之㤗山今在山東濟南府泰安州山下有廟自黄帝以来封禪者七十二君唐宋元皆加神以封號曰王曰帝若祀人鬼國朝洪武三年詔去封號稱為東嶽泰山之神有司春秋致祭有事則遣廷臣祭告今京師朝陽門外亦有東嶽廟實自元延祐中𤣥教大宗師張留孫買地為宫奉祀東嶽天齊仁聖帝國朝仍而不廢嵗以三月二十八日及萬夀聖節遣官致祭夫鎮嶽海瀆以其山川靈氣有發生潤澤之功故厯代祀之而㤗山在魯封内歲時已有常祭况毎嵗南郊大祀壇八月山川壇俱有合祀之禮所有前項祭告稽之祀典煩凟無據合當罷免北極佑聖真君謹按傳記北極佑聖真君盖真武神也真武本𤣥武宋真宗尚道教避聖祖諱改𤣥為真𤣥龜也武蛇也此本北方𤣥武七宿虚危星形似之故因而名後乃以𤣥武為真聖而作龜蛇于下靖康初詔加號助順曰佑聖助順真武靈應真君及考圗誌乃云真武為靖樂王太子也生而神靈長而勇猛志除邪魔遇紫虚𤣥君授以道秘東逰遇天神授以寳劒入武當山修煉功成白日飛昇奉上帝命往鎮北方被髮跣足建皂纛𤣥旗綂攝𤣥武之位此則道家傅㑹之説殊為誕妄耳考國朝御製碑文太祖髙皇帝平定天下兵戈所向神隂祐為多及定鼎金陵乃於雞鳴山建廟以崇祀事載在祀典太宗文皇帝起自藩邸以神有顯相又于京城艮隅并武當山各重建廟宇兩京歲時春秋及京師毎月朔朢各遣官致祭武當山則命内外官員專一在彼提督列聖崇奉之意可謂至矣憲宗純皇帝在位常範金為像屢遣内官陳善賫往武當安奉盖亦不過承先志以祈神休耳豈期陣善援引左道之人鄧常恩等上則熒惑聖聽糜費内帑下則搔擾道路虐害生民且又奏請重修京城廟宇改號靈明顯佑宫日居其間引進邪術遂使香火之地㡬為奸盜之區固非朝廷崇奉之本意使𤣥武有神亦豈其所樂聞哉今議得神既有功于國則累朝崇奉之禮固不可廢但本以一神而一歲之間兩京俱有春秋之祭京師復有朔望等祭過于煩凟合照南京洪武年間以来事例以毎年三月三日九月初九日各用素修遣太常寺官致祭其餘祭禮並行停止其武當山神像之類頻年賫送不無太繁况巳有内外官貟領勅在彼一應供奉之物自合責令各官嚴加整辦所有襄陽府縣三年一次額辦給散道士闊白綿布二千四百疋闊白苧布二千四百疋祀神油蠟香炷三萬七千二百八十四斤雖稱送日久皆係王税所出即今民力憊敝亦宜量為裁减合行湖廣廵撫廵按官員徑自酌量奏請定奪今後差遣内官鑄送神像等事並乞一例禁革庶㡬神祀不替而國用少節矣崇恩真君隆恩真君謹按道家之言有曰崇恩真君姓薩氏諱堅西蜀人在宋徽宗時嘗従虚靖天師張繼先及王侍宸林靈素傳學道法累有靈驗而隆恩真君則玉樞火府天將王靈官也又嘗従薩真君傳授符法國朝永樂中有杭州道士周思得以靈官之法顯于京師附體降神禱之有應乃于禁城之西建天將廟及祖師殿宣徳中改廟為大徳觀封薩真人為崇恩真君王靈官為隆恩真君又建一殿崇奉二真君左曰崇恩殿右曰隆恩殿成化初年改觀曰宫加顯靈二字逓年四季更換袍服三年一小焚化十年一大焚化又復易以新製珠玉錦綉所費不貲毎嵗萬夀聖節正旦冬至及二真君示現之日皆遣官致祭其崇奉可謂至矣今就其言議之薩真人之法因王靈官而行王靈官之法因周思得而顯其法之所自皆宋徽宗時林靈素軰之所傳一時傅㑹之説淺謬如此本無可信况近年附體降神者乃欽發充軍顧玒顧綸之父子其為鄙䙝尤甚徃徃禱雨祈晴杳無應驗則其恠誕可知但經累朝創建一時難便廢毁所有前項祭告之禮俱各罷免其四時袍服宜令本宫住持并庫役人等扵毎年應换之日仍㑹同道錄司掌印官照舊依期更換如法收貯不必焚化永為定例仍乞勅内府各衙門以後袍服等件不必再行製造如此則國用不至于妄費而邪術亦可以少貶矣金闕上帝玊闕上帝謹按大明一統志福建福州府閩縣南舊有洪恩靈濟宫一所祀二徐真人即今之金闕玊闕二帝真人也真人五代時徐温子曰知証封江王知諤封饒王嘗提兵平福州福父老戴之圗像以祀宋賜今額又考之御製碑文云太宗文皇帝臨御之十有五年適遇疾弗豫百藥罔効或有言神靈驗者禱之輙應脱然平復于是大新閩地廟宇命有司春秋祭嵗易時衣給户洒掃又于京師立廟以祀之加封金闕真人玊闕真人十六年又加封金闕真君玊闕真君賜額名洪恩靈濟宫正統初年重新宫宇進號金闕崇福真君玊闕隆福真君成化二十二年重加尊號伯曰九天金闕緫督魁神洪恩靈濟慈恵髙明上帝仲曰九天金闕緫督罡神洪恩靈濟仁恵𢎞靜上帝逓年以来毎月朔望并萬夀聖節正旦冬至及二真君誕辰俱有祭祀遣官行禮及時食獻新至今不缺四時巳有皮弁冠大紅紗羅紵絲織金雲龍朝服近又加以平天冠明黄紗羅紵絲衣服其黄服五年一次更換焚化紅服十年一次更換焚化夫神之世系年代可考如此本非有甚異也先年止因有功于閩廟食一方後以保䕶太宗文皇帝聖躬故京師有别廟之奉但本處既有春秋二祭而京師一年之間復有前項數次祭祀不無煩凟且惟皇上帝主宰于天而兄弟並稱上帝其為僣擬可知至於袍服等件在京更換焚化其費巳為不貲又毎毎差遣内官前徃福建賫送道路騷擾虐害人民不可勝言今議得廟之創置既始于閩則神如有靈固當往来于閩所有福建舊廟祭祀宜仍其舊其京師聖節并朔望等項祭祀及時食獻新俱乞罷免若以有廟無祭為嫌則于二真誕辰各遣本宫住持致祭一次仍乞革去帝號照依永樂年間加封事例止稱真君冠袍仍用本等服色在京者聴令本宫住持廟户人等于毎年應換之日㑹同道錄司掌印官依期更換如法取貯不必焚化直待敝壊之日方許奏請更製將不堪者照舊焚化其在福建者亦同此例但遇有敝壊者聴令布政司督属就彼處置修理以後再不差人前去永為定例所有見在平天冠明黄袍責付本宫庫内收貯仍行内府各該衙門無得再行製造如此既不失報功之典而祀禮亦不至於煩凟矣神父聖帝神母元君金闕元君玊闕元君謹按徐仙真錄及國朝御製碑文神父神母者即徐二真之父母金闕玊闕元君者盖其配也宋理宗朝封父齊王為忠武真人母白氏仁夀仙妃配許氏助順仁忠仙妃陶氏善助慈懿仙妃國朝永樂中加封父翊亮真人母淑善仙妃許氏真應仙妃陶氏恭靜仙妃繼又進封其父為真君成化二十二年神父加封髙上神主慈悲聖帝聖母加封安寜䕶國恭靜元君金闕妃天房衛保節靜元君玉闕妃天房衆母顯佑元君毎嵗萬夀聖節正旦冬至俱遣官祭祀而金闕玉闕元君又有誕辰之祭皆因二真君一時禱應之功故推及而崇奉之如此今議得神父徐温乃五代時吴國之時專權弑主殊無功徳祀以報功豈宜濫及况父母并妃並受隆名稱帝稱君僣擬益甚所有名號乞照永樂年間初封者為正以後増加及一切祭祀俱各革罷京都城隍之神謹按易坎卦有曰王公設險以守其國盖謂君人者觀坎之象知險之不可陵也故設為城郭溝池以守其國而保其民人傳記謂其制自黄帝始厯代建國必有髙城深隍上以保障宗社朝廷下以捍衛百官萬姓其所係甚重其為功不小故國朝之制天下府州縣皆有城隍廟之祭京都城隍廟舊在順天府西南累朝皆加修葺嵗以五月十一日為神之誕辰及萬夀聖節各遣官致祭夫廟祀城隍之神本非人鬼安得誕辰可謂謬妄况毎嵗南郊大祀壇八月山川壇俱有合祭之禮事體巳重此與天下府州縣之祭不同所據前項祭告煩凟無據俱各罷免前件奏奉聖㫖是脩建齋醮遣官祭告并東嶽廟真武廟城隍廟靈濟宫金闕玊闕祭祀俱照舊二徐真君并其父母妻只仍舊封號上帝等號俱革去冠袍等件該衙門換囘焚毁今後福建該用冠袍六年差官一換其餘釋迦三清北極雷聲梓潼祖師青龍崇恩隆恩神父聖母二妃都准擬行欽此青溪漫稿内外羣祀之禮丘濬臣按祭法言聖王制祭祀之禮其常典所當祀者有五焉其下復厯叙自古君臣有道功庸者以實之凢十有四為君者八人為臣者六人後世廟祀前代帝王而以其功臣従享者其原盖出于此本朝洪武初建帝王廟于南京雞鳴山之陽以祀三皇五帝三王漢髙祖光武唐太宗宋太祖元世祖所祀止及一綂之世創業之君其與前代泛及無統者異矣又詔以厯代名臣従祀帝王廟乃以風后力牧臯陶䕫龍伯夷伯益伊尹傅説周公旦召公奭太公望方叔召虎張良蕭何曺参陳平周勃鄧禹馮異諸葛亮房𤣥齡杜如晦李靖郭子儀李晟曹彬潘美韓世忠岳飛張浚穆呼哩愽勒呼愽爾濟齊拉衮巴延凡三十有七人是皆前代之君臣同徳始終一心者然其中或有不祀其君而祀其臣者盖惟取其純徳鉅功位列而通祀之非若前代随其君而各以其臣配其食也臣愚竊以為昔者建都南京厯代帝王廟因在于彼今郊廟既立于此則帝王廟亦當従之而北焉議禮之事非臣下所當及者謹述所見如此或有謂元世祖無功于中國而其臣木華黎軰亦皆為中國害者不祀亦可國家常祀之禮丘濬臣按大蜡之祭三代巳有之在周之前夏曰嘉平殷曰清祀而在周則曰大蜡焉秦始謂之臘尋更曰嘉平漢復曰臘季冬之月星囘嵗終隂陽以交農大享臘臘者接也新故相接畋獵禽獸以享百神報終成之功也魏晉以後皆舉其禮古者所祭者八神而巳皆有功于農事者也後世所祀之神乃至於八十有五座一百九十有二位何也本朝于古祀典所當舉者未嘗或廢惟於蜡祭缺焉盖此祭也與籍田相為始終當夫東作方興之始既舉籍田之禮以祀先農于春而以帥先農民以興其務本之心則夫百榖告成之後載舉大蜡之禮以報先嗇于冬而以勞来農民以報其勤動之苦是固舉先王莫大之禮是亦廣聖君莫大之恩倘不棄愚言復行盛禮則幽明人鬼皆䝉其休題扶正抑邪以崇祀典事王洧臣等竊惟太常掌天地神祗人鬼之祀即有虞所謂秩宗成周所謂宗伯其任大其責重職為第一清選非學冠儒林藝通禮樂而老成清慎者不足以居之近者太常寺缺少卿該吏部照例推舉得丁憂起復原任提督四夷館太常寺少卿王佐及丁憂扣該服滿太僕寺少卿儲巏俱各堪任奉聖㫖另推兩貟来㸔該吏部再推得通政司左叅議陳朂工部營繕司李堂俱各堪任奉聖㫖太常寺堂上官内推兩員来㸔欽此欽遵綸音屢降物議沸騰咸以王佐列衘太常清慎素著少卿舊職實為攸宜其儲巏陳朂李堂又皆發身科第學行亦優擇而取之亦無不可今不于此簡用而必于堂上推舉竊見今太常寺堂上官正途者少雜流者多互為援引各騁其説其不為紫之奪朱鄭之亂雅者㡬希傳曰太常實禮樂之司非儒者弗履况寺丞趙繼宗等黄冠羽服道家者流背棄天常虧損名教置此清選實有未宜于郊祀大典豈知損益縦使音律諳通儀文習熟則亦樂工舞師恊律賛禮之末技耳何以統和神人典司禮樂而當此夷䕫之重任哉㐲望崇重儒術扶持正道乞將所推少卿缺員仍於儒臣内簡命一員以充其任不勝惓惓激切之至正學類編名臣經濟録卷二十九
