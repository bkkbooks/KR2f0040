body:
  text: 名臣經濟録卷二十明黃訓編户部圖志田土賦役北直𨽻圖敘桂萼北直𨽻古冀州地京師即金元舊都也扆山帶海有金湯之固真定以北至於永平關口不下百十而居庸紫荆山海俱關喜峰古北黃花鎮俱口子在順天府東北境險厄尤著故薊州順天府屬保定重兵屯焉山後諸州自宣府東南至遼陽俱是故我大寧都司地也自國家棄以與敵今朵顔三衛是則居庸之外所恃以為藩籬者宣府耳廣平以南四方水陸畢會于臨清山東屬州轉漕京師輻輳而進若天津又海運通衢也國初江南糧運俱從海道今廢惟薊州運道猶通河間真定保定之間多達兵營塢其人性獷難馴且東安霸州武清俱順天府屬而東野曠人稀姦宄伏匿頗基腹心之患迤山一帶則樵採耕牧之利居多姦人每竄其中有司病之蓋賦繁民困户口流亡雖畿甸同風而順天之馬政寄養馬匹河間之水潦患尤烈焉户口户四十一萬八千七百八十九口三百四十一萬三千二百五十四錢糧夏秋二稅共米麥六十萬一千一百五十二石絲二百二十四斤絹四萬五千一百三十五匹綿花一十萬三千七百四十八斤鈔九貫馬草八百七十三萬七千二百八十四束長蘆鹽運司額辦大引折小引鹽十八萬八百七引南直𨽻圖敘桂萼南直𨽻古揚州地南京即六朝舊都也我祖宗創業實基於此然江限南北古今恃為天險江北則徐頴二州鳯陽府屬地跨中原瓜連數省並稱雄鎮故淮安特建兵府漕運衙門守以文武重職雖職司轉運亦示控扼之勢焉江南則安慶當長江委流西控全楚江西湖廣俱楚地為江表門户沿海兵戎本以備倭而崇明常熟俱蘇州府屬縣之民間作弗靖與江洋一帶出沒波濤肆行剽劫者不可勝數故今江防海備其重一也若廬州則民習遊惰地不盡利鳯陽習俗本同加以髙墻留守之冗費故皆易以告飢蘇蘇州松松江則田賦不均供億日困豐沛俱徐州屬縣之間濁河泛濫幾淪魚鱉轉餉既艱民亦凋瘵蓋水患莫甚於斯者也徽州多山少田民逐末利風俗用偷池州在山麓江滸軍民統理不一冦盜因以竄匿鎮江則當京口之衝鑿山圍水海潮出沒土田歲易處謂山田多荒白墟田多􅔐江民勞甚矣户口户一百九十六萬二千八百一十八口九百九十六萬七千四百三十九錢糧夏秋二稅共米麥五百九十九萬五千三百四十石里即至萊之海倉復入北海以其自膠抵萊故又名膠萊元時所濬以避迤東海道數千里之險者蓋嘗治閘故迹在迤北新河店海潮所通自此至海止八十里以達安東衛名在青州東南境則避開洋之險宜亦有可講者户口户七十七萬五百五十口六百七十五萬九千六百七十五錢糧夏秋二稅共米麥二百八十五萬一千一百一十九石絲二千一百一十斤絹五萬四千九百九十匹綿花五萬二千四百四十九斤馬草三百八十一萬四千二百九十束鹽運司額辦大引鹽一十四萬五千六百一十四引山西圖敘桂萼山西古冀州地背臨朔易沙漠是表裡河山蓋有倚挹中州之勢焉欣代二州俱太原府屬以北敵數內侵故大同特設征鎮與延綏在大同西宣府在大同東南互為聲援鴈門偏頭寧武三關並在太原北境並置關戍雖烽火之警不殊而河套為最急且保德河曲保德州河曲縣俱太原府屬之間與敵僅隔一河黃河稍或撤備則門庭皆勍敵矣若蔚州大同府屬之礦徒臨晉平陽府屬縣之屯卒藩府屯軍潞城潞州屬縣之逋民並以山谷阻深乘時抄暴要亦不足屯結也然邊餉既廣宗室彌蕃一切供輸自歲賦之外皆仰給河東之鹽課三晉之民勞悴甚矣而邊卒方且呌呶待哺帥臣號令為之不行此則積習流弊非漸圖之不可也户口户互十八萬九千九百五十九口五百八萬四千一十五錢糧夏秋二稅共米麥二百二十七萬四千二十二石絲五十斤絹四千七百七十七匹馬草三百五十四萬四千八百五十束鹽運司額辦引四十二萬引陜西圖敘桂萼陜西古雍州地山河四塞形勝甲於天下然平涼固原平涼屬州一帶畜牧蕃滋外乏屏蔽敵騎漸已侵入鞏鞏昌鳯鳯翔之墟若延延安慶慶陽則原野蕭條兵亦精徑寧夏則跨有賀蘭山黃河之險敵難馳驟故為備差易蓋本朝開拓以來受降故城唐張仁願嘗築三受降城于河外以禦敵久棄不守自移鎮榆林延綏鎮城河套延安北境是盡為敵有烽火遂達於內郡矣甘甘州涼涼州以西左番西番右達北番而肅州尤孤故土魯番在肅州西北二千餘里輒肆侵犯以為河西憂洮岷西寧則地入西羌西番實與四川同患苦且伊布勒北敵小王子枝將以殘孽竄居西海在西寧西境番人漸以南徙今松潘臘方是國家既失茶馬之利每歲番人獻馬易茶頗資其利而逋盜生齒日繁則西境腹心之禍也若漢中之襟喉巴蜀潼關在西安府東南之保障全陜並稱重地而險者在我矣然所在罄力以供邊奉宗室而平涼尤甚閭閻愁苦又何加焉户口户三十六萬二千五十一口三百九十三萬四千一百七十六錢糧夏秋二稅共米麥一百九十二萬九千五十七石絲綿三百六斤絹九千二百一十八匹綿花一萬七千一百七十二斤布一十二萬八千七百七十匹馬草一百五十一萬四千七百四十九束河南圖敘桂萼河南古豫州地閫閾中夏四方輳進蓋彰德則控河北今北直𨽻是嵩洛以蔽山南今陜西南境是南陽汝寧直走襄黃襄陽黃州俱湖廣屬府之郊而開封則其都會也由開封以泝衛河可以漕山東沿汴泗可以漕淮故言形勝者次關陜焉然分建宗親班祿無藝以今計之歲賦幾至百萬民亦勞矣且歸睢陳州二州俱開封府屬一帶地兼數省統轄非一姦人常藉以首難勦捕則潰四出禍延他境彰德道出趙山西魏北直𨽻之間軍民左右屬盜雖斂迹而牽制之患實與歸德同若考七郡之地山水環護民物茂實則汝寧為優鑄山獵野依憑險固強弓利弩出乎其間則河洛河南為著然土地未闢教令未馴非課農宣化加意拊循則冦賊劫奪之禍歲不免矣户口户五十八萬九千二百九十六口五百一十六萬六千一百七錢糧夏秋二稅共米麥二百四十一萬四千四百七十七石絲三十五萬三千六百四十三兩絹九千九百五十九匹綿花三百四十二斤馬草二百二十八萬八千七百五十四束浙江圖敘桂萼浙江古揚州地崇山巨浸所在限隔然嘉嘉興湖湖州與江淮相表裡嚴嚴州衢衢州以徽直𨽻徽州府饒江西饒州府為郛郭左信郡江西廣信府右閩關福建北境大海東蟠繞出淮淮安揚揚州之境斯固四通八達之區也安吉長興安吉州長興縣俱屬嘉興府以西本山越巢窟界在廣德直隸州之間上無兼轄之司訟獄繁興頗號難治嘉湖寧寧波紹紹興四郡則震澤今太湖是東海之所經也淜衝淤壅大遺三農之害而鹽徒嘉興易通舟楫故私鹽尤多之患次之處州之民多依山盜礦動至數千持之則激緩復馳縱慶元處州屬縣松溪福建屬縣與處州接界一帶歲被侵暴溫溫州台台州並海而南信宿再宿達於福寧福建屬州估客良便之然不能不防他冦也若倭夷奉珍入貢則風帆直至寧波突至倐來黠詐叵測先事而備其在定海寧波屬縣即夷舟所從入乎户口户一百二十四萬二千一百三十五口四百五十二萬五千四百七十一錢糧夏秋二稅共米麥二百五十一萬二百九十九石絲綿并絲二百七十萬四千二百七十兩絹三千五百七十四匹布九匹鈔五萬一千二百九十三錠馬草八十七萬四千四百九十一包鹽運司額辦鹽四十四萬四千七百六十九引江西圖敘桂萼江西古揚州地當吳南直𨽻楚湖廣閩福建粵廣東之交險阻既分形勢自弱安危輕重常視四方若保境和民則九江獨據上流牽制沿江州郡且密邇南康濵臨巨湖鄱陽湖盜舟四出不可無備南南安贛贛州之間則汀漳汀洲漳州俱福建屬府雄韶南雄韶州俱廣東屬府諸山會焉連州跨境林谷茂密盜賊之興斯為淵藪故設巡撫重職提師以臨之袁州地逼長沙湖廣屬府逋民客户頗難譏察而南昌建昌饒州宗室固在民疲供億視臨臨江瑞瑞州信廣信撫撫州諸郡殆有加焉故凡江西之民朴質儉苦有憂勤之思𢎞治以來賦役漸繁土著之民少壯者多不務穡事出營四方至棄妻子不顧而禮俗日壞惡少間出矣户口户一百三十六萬三千六百二十九口六百五十四萬九千八百錢糧夏秋二稅共米麥二百六十一萬六千六石絲八千二百三斤絹一萬一千五百一十六匹布一千三百四十一匹鈔九千九百七十九錠湖廣圖敘桂萼湖廣古荆州地襄襄陽鄧今河南鄧州即襄陽比境抗其頭顱蘄黃州府屬州黃黃州引其肘腋江陵荆州制其腰腹伸膝南向亦足以雄視諸州矣若鄖陽之保商陜陜西河南交界地方郴郴州桂本州桂陽縣之跨閩福建粵廣東辰辰州沅辰州府屬州之捍蔽雲貴大江中貫五溪在常德辰州地方外錯荆楚厄塞斯其備焉蓋二儀效靈山川獻秀故王氣獨鍾於潛邸然襟江帶湖所至民罹水患冦盜亦復乘之過此則永州寶慶之間謹備苗夷而已矧宗藩棋布歲賦實繁楚俗慓輕鮮思積聚於是四方流民失業者多赴焉故其民率啙音子偷惰之意窳而難治溪洞諸蠻施州及永保所屬地方是本以漢法羈縻差易馴擾惟永順保靖世席富強每爭奪獲罪輒假戰功自贖姦謀遍構驕橫滋萌朝議不明猥加徴發使逺方之民坐困且久而玩敵將貽異日之憂謂宜定令母輒輕發斯則善矣户口户五十三萬一千六百八十六口四百二十三萬三千五百九十錢糧夏秋二稅共米麥豆芝麻二百一十六萬七千五百五十九石絹二萬七千九百七十七匹布七百五十匹鈔一百七十五貫四川圖敘桂萼四川古梁州地劔閣即劔門闕在保寧北境表雲棧之固瞿塘峽名在夔州城東鎖巴峽之流界以番族西番阻以蠻部東川烏蒙烏撒芒部是山水襟束自相藩籬故姦雄割據則盜兵不敢西窺地饒而險厄備也然姦宄內作懸車束馬勢不相及有難猝定者矣况上列親藩重兵外戍諸所供饋咸取給焉且松潘以孤城介在番域而寄咽喉于龍州宣撫司千里轉運輒為番蠻所遮斯則巴西之隱禍也烏撒芒部即鎮雄府諸夷四夷民府雖犬牙形格仰我鼻息然內相黨結數啓兵釁且於敘敘州瀘瀘州有唇齒之重要在因俗撫綏攜其私黨而已乃若碉門地名天全六番招討司治之臂視諸番播州宣慰司之富藏四省播州地方與湖廣雲貴俱鄰接殆與蜀相為盛衰者焉建昌六衛僻處西徼自為奧區民夷安業非所憂矣户口户一十六萬四千一百一十九口二百一十萬四千二百七十錢糧夏秋二稅共米麥一百二萬六千六百六十九石絲六千三百三十三斤綿花七萬二千八百五十一斤提舉司并龍州等衛所額辦本折色小引鹽十萬九千一百七十七引福建圖敘桂萼福建古閩越地以溫處衢溫州處州衢州俱浙江屬府信江西廣信府為北藩建昌南贛建昌南安贛州俱江西屬府為右壁惠潮惠州潮州俱廣東屬府為外户海為門封壤促甚而重關內阻溪山秀美民用以和然處浙江處州府人輒用盜礦流入政和壽寧俱建寧府屬縣之境大為患害古田福州府屬縣福寧一帶本竊魚鹽之利山谷邃深逋盜每憑之而嘯聚但不常出也濱海上下外遏倭冦之流近通琉球之貢不為要害而海物互市妖孽荐興通番海賊不時出沒則漳浦龍溪之民居多且汀汀州漳漳州之山尤廣人迹罕到獨與贛州聲勢相通提督兵備實交治之而永春安溪俱泉州府屬縣沙尤俱延平府屬縣之間則屬之捕盜官矣四縣交界地方出盜頗多蓋簡僻莫如邵武囂訟莫如漳州土沃民稀耕稼兵燹不加則八郡一也户口户五十萬九千二百口二百八萬二千六百七十七錢糧夏秋二稅共米麥八十八萬三千一百一十五石絲綿一百九十四兩絹六百匹苧六十五斤鈔一萬七百七十九錠鹽運司額辦鹽價八千八百七十八兩廣東圖敘桂萼廣東古百粵地蓋五嶺之外號為樂土由雄南雄連連州廣州府屬可以向荆吳湖廣江西是由惠惠州潮潮州可以制閩越福建是由髙髙州廉廉州可以控交桂交趾廣西是而形勝亦寓焉濱海一帶島夷之國數十雖時時出沒要其志在貿易非盜邊也然諸郡之民恃山海之利四體不勤惟務剽掠有力則私通番船託名通番因而行劫海上無事則挺身為盜桴鼓之警彌滿山谷凡以良民困於徴求通山之禁齎送鹽米入山通盜者謂之通山教治不修而大征數舉之過也且密邇蒼梧廣西梧州府征蠻幕府在焉總鎮兩廣太監總兵都御史俱住劄于此軍旅之興殆無寧歲兵糧供饋咸以待乏况地産珠池在廉廉州境內番物駢集本民用所興而內使數來采辦民反病之故外負富饒之名而內實貧困者廣東是也户口户四十八萬三千三百八十口一百九十七萬八千二十二錢糧夏秋二稅共米麥一百一萬七千七百七十二石廣東海北二鹽課提舉司本折色鹽價并引價共二萬七千二百八十兩廣西圖敘桂萼廣西古百粵地當嶺南右偏三江府江左江右江襟帶提封甚廣然內給藩封外困邊圍而風壤氣習又視廣東特異如府江綿亘八百里則已半為苖夷所有阻兵江道肆為冦竊不但古田荔浦數縣俱桂林府屬苦其蠶食而已潯州則大藤峽跨在黔鬱二江俱在潯州境內之間諸蠻巢穴在焉剽掠四出急則投竄雖有上隆州田寧府屬五屯所在梧州府藤縣境內扼其咽吭不足制也若興安桂林府屬縣西延六洞在興安境內與武岡陽岡湖廣屬州接壤猺實據之是為桂林北境之患柳柳州慶慶逺以西則八寨在柳州境號為盜區洛容懷逺俱柳州屬縣並罹毒而賓州柳州府屬其襟喉矣然右江一帶惟岑氏今思恩田寧泗城各土官俱是最強思恩既已殘破則泗城猶嬰樊之虎計非削弱不可也且南控遏兩江坐躡交址自南寧太平西南入約十餘里桂管保障或者其在是乎户口户一十八萬六千九十口一百五萬四千七百六十七錢糧夏秋二稅共米麥四十三萬一千三百五十九石鈔二百四錠雲南圖敘桂萼雲南古梁州裔境地崇岡􅏭嵲激澗縈紆城郭人民夷居十七時恬則蜂屯蟻聚有事則獸駭禽奔蓋人自為險勢難統一者也必知其領要則雲南臨安大理永昌鶴慶楚雄頗號沃壤然元元江安臨安路納交址金金齒司後改設永昌軍民府騰騰衝地擁諸甸瀾滄聨絡寧永寧麗麗江曲靖彈壓烏蠻四川烏撒烏蒙等府是王公設險於斯要矣而土酋大者元江武定景東麗江小者桃安北勝鄧川霑益鄧川屬大理霑益屬曲靖俱州並以兵力稱桀向背靡常蓋自麓川難夷正統間土酋任思發以麗川叛嘗發兵討之滇境粗安則沐氏黔國公世與有力焉惟尋甸一帶風土絶異兵衛漸疏故諸羅武定東川等族俱羅夷構釁相尋而本邦孟密亦恃其險逺至今不聞悔過咎在撫綏失䇿本無措置可言然滇南北向中州必假道貴貴州陽而後進稍值兵梗坐令隔絶則滇池之達馬湖四川屬府武定之達建昌四川行都司屬衛川陸具存久而榛塞在今日所宜亟講而萬里投宦類難得人則夷情蠢動未為無故此尤不可不慎也户口户一十三萬二千九百五十八口一百四十三萬三千一百一十錢糧夏秋二稅共米麥一十四萬五百八十八石黑白等鹽并額辦本折色小引鹽五萬六千九百六十五引貴州圖敘桂萼貴州古西南夷羅施鬼國地地里蠻夷並同滇境雲南而山箐峭深地瘠寡利夷性猾詐殆有甚焉故泗州廣西土官衙門恣其狼吞伺竊外户則守在永寧州名茫部今鎮雄府盤據廣土蹲伏北藩則憂先畢節若思南石阡銅仁數郡界在鎮筸鎮逺筸子埤俱長官司𨽻湖廣西播西陽宣撫司播州宣慰司俱𨽻四川夷洞之間鴟張豕突諸夷常突出數郡冦掠貽患實深况地雜東川烏蒙諸部俱四川軍民府師旅繹騷每與川湖四川湖廣同其災害而軍民歲計又大半仰給於二省兵荒交值時有弗繼之憂且水西普安凱里即土官地方諸酋富甲他夷地連肘腋逞姦首禍患豈一朝故知梟獍之資不忘格鬭而爭強奪職乃其兵端焉然夷人自相翦伐貴在因俗以時撫定不足煩國家力也户口户四萬五千三百五口二十三萬一千三百六十五錢糧夏秋二稅共米麥四萬七千六百九十七石洞蠻席布二百五十九條論井田李堂井田之不可不行不待言矣國家建制立法師範帝王大綱正而萬目舉豈獨未嘗議及哉時也勢也惟遜志先生斷以為可行世人疑之而不以為變蓋以天下之人皆大公至正之人而又值大同之世也使若橫渠張子之嘗試假之職任於北方平原易地行之一郡一邑則施為之方經度之制績用之成可推矣奈何有志未就之恨猶夫人也當時王叔英先生亦每與之辨論尤切嘗奏請行限田之法其言曰井田之法固難猝行惟均田之法限田之制宜可行今日議者必以奪富民之田為貧民之業貧者可生而富民則怨殊不知富者當損貧民當益合天道虧盈益謙之公不可忌怨者而忌貧之民怨者多也而當時亦不能行惜哉雖然欲行均田必懲吞併富民之田本貧民之業也衣食不充公私逼迫勢必盡入富豪而後巳議者欲官為給借以取息入於官庶為兩便之一免負民之揭借革富家之專恣又或阻以青苗之紛利害者豈天之生民終無術以均之耶孔子曰為政在人其人存則其政舉孟子曰豪傑之士雖無文王猶興不忍人之政固生於不忍人之心何疑也耶論均田羅欽順井田勢不可復限田勢未易行天下之田雖未能盡均然亦當求所以處之之術不然養民之職無時而舉矣今自兩淮南北西極漢沔大率土曠人稀地有餘地而江浙之民特為蕃庶往往無田可耕於此有以處之其所濟亦不少矣以佚道使民雖勞不怨學道愛人之君子豈無念及於此者乎然漢之朝錯得行其策於塞下宋之陳靖不得行其説於京西則係乎上之人明與斷何如耳困知志與友人論井田書方孝孺僕向者僣不自量竊傷三代聖人公天下之大典墜地已久見今國家法立令行實足以乘勢有為舉而措之無所難者故著論井田之事可復不疑僕雖不才亦嘗三思之而熟究之非偶為是誇談也然每患有志者寡無與講明之者始見吾子行淳貌古心獨慕焉以為可語斯事故出而示之意吾子異於流俗人今吾子乃不察其道而橫為異詞以非之謂不可行於此今流俗之人常言僕耳聽之而幾聵者也吾子安取而陳之哉且人之言曰古法有不可行於今者若井田是也斯言甚惑也古之時席地而食手掬而飲歃血而啖毛衣皮而寢革為巢為窟以相安拍手鼓腹以為樂此其不得已也固不若後世宫室鍾鼓服食器用之美且適也若此者非惟不可行亦不必行以其非中制也若井田者更三四聖人而始大備酌古今之中盡裁成之理生民之巨方禮義之所由立也古者之世富庶勝於今風俗美於今上下親洽過於今國之盛強且久過於今曷為而不可行哉人又言曰禹之洪水桀紂之暴人民稀少故田可均夫古之時人民之衆後世莫及井田雖未行而其端已見矣桀紂之暴非若秦隋之糜爛其民也湯武誅其君而已非若戰國秦漢之際殺人盈城野民何為少哉今天下喪亂之餘不及承平十分之一故均田之行莫便於此時而吾子乃援王莽嘗行證之以為不可益謬矣且王莽之亂非為井田也欺漢家之老母而奪其璽稱制於海內海內之人憤怒思剖其心而食之故因變奮起使王莽不行井田海內亦亂莽亦誅死於井田何有哉吾子又謂漢唐不行今欲行之難矣尤非知本之論也漢唐不行者非不可行也未嘗行也漢髙祖之世可行而時無其人也唐太宗有志於三代之盛而魏徴之流未知先後不能輔之以成大業孰謂不可行也流俗之末不可行之者以吳越言之山溪險絶而人民稠也夫山之地雖成周之世亦用貢法而豈強欲堙卑夷髙以盡井裁但使人人有田各有公田通力趨事相救相恤不失先王之意則可矣而江漢以北平壤千里畫而井之甚易為力也東海有魚曰鯤身如丘山動則雷震遊則濤湧橋井之蛙未嘗識也伸其股而自詫曰東海寧大於井乎鯤魚之大孰若吾股乎今未知天下之故而曰井田不可行者是橋井之蛙之類也且僕鄙固之意以為不行井田不足以行仁義者非虛語也仁義之行貴人得其所今富貧不同富者之威上足以持公府之柄下足以鉗小民之財公家有散於小民小民未必得也上有取於富家者則小民已代輸之矣富者益富貧者益貧二者皆亂之本也或難僕以為陳涉韓信非有陶朱之富而豈富者為亂哉以此論井田疏矣是殆不然井田之行則四海無間民而又有政令以申之德禮以化之鄉胥里師之教不絶乎耳苛取暴征之法不及乎身何苦而亂乎使陳涉韓信有一㕓之宅一區之田不仰於人則且終身為南畝之民何暇反乎故曰井田之廢亂之所生也欲行仁義者必自井田始吾子欲舍井田而行仁義猶無釜炊雖愚婦知其不可不以井田為治士大夫安之豈智顧不如愚婦哉抑習俗之移人也俗之降衰日趨而日下特立而不變者惟豪傑之士能之吾子儼然在縉紳之列不務明聖人之道以淑來者而非先王之制甚為吾子不取也僕訥不善為詞性頗質不喜人為媚故且以告吾子孟子不云乎不直則道不見然則僕亦非過也將以明道也吾子倘有疑於心當以見教僕尚能終其説制民之産一丘濬臣按井田既廢之後田不在官而在民是以貧富不均一時識治體者咸慨古法之善而卒無可復之理於是有限田之議均田之制口分世業之法然皆議之而不果行行之而不能久何也其為法雖各有可取然不免拂人情而不宜於土俗可以暫而不可以常也終不若聽民自便之為得也必不得已創為之制必也因其己然之俗而立為未然之限不追咎其既往而惟限其制於將來庶幾可乎臣請斷以一年為限如自今年正月以前其民家所有之田雖多至百頃官府亦不之問惟自今年正月以後一丁惟許占田一頃餘數不許過五十畝於是以丁配田因而定為差役之法丁多田少者許買足其數丁田相當則不許再買買者沒入之其丁少田多者在吾未立限之前不復追究自立限以後惟許其鬻賣有增買者并削其所有民家生子將成丁者即許預買以俟其成以田一頃配人一丁當一夫差役其田多丁少之家以田配丁足數之外以人二丁視田一頃當一夫差役量應力役之征貧者出力若乃田多人少之處每丁或餘三五十畝或至一二頃人多田少之處每丁或止四五十畝七八十畝隨其多寡盡其數以分配之外又因而為仕宦優免之法因官品崇卑量為優免惟不配丁納糧如故其人已死優及子孫以寓世祿之意如京官三品以上免四頃五品以上三頃七品以上二頃九品以上一頃外官則遞減之無田者準田免丁惟不配丁納糧如故立為一定之限以為一代之制名曰配丁田法既不奪民之所有則有田者惟恐子孫不多而無匿丁不報者矣不惟民有常産而無甚貧甚富之不均而官之差役亦有驗丁驗糧之可據矣行之數十年官有限制富者不復買田興廢無常而富室不無鬻産田直日賤而民産日均雖井田之制不可猝復而兼并之患日以漸消矣臣愚偶有所見不知可否敢以為獻惟聖明下其議於有司俾究竟以聞制民之産二丘濬臣按井田之制雖不可行而溝洫之制則不可廢但不可泥其陳迹必欲一一如古人之制爾今京畿之地地勢平衍率多汙下有數日之雨即便淹沒不必霖潦之久輒有害稼之苦農夫終歲勤苦盻盻然而望此麥禾以為一年衣食之計賦役之需垂成而不得者多矣良可憫也北方地經霜雪不甚懼旱惟水潦之是懼十歲之間旱者什一二而潦恆至六七也為今之計莫若少倣遂人之制每郡以境中河水為主如保定之白溝真定滹沱河之類又隨地勢各為大溝廣一丈以上者以達於大河又各隨地勢各開小溝廣四五尺以上者以達於大溝大溝地官用錢償小溝地所近田主償其直又各隨地勢開細溝廣二三尺以上者委曲以達於小溝其大溝則官府為之小溝則合有田者共為之細溝則人各自為於其田每歲二月以後官府遣人督其開挑而又時常巡視不使淤塞如此則旬月以上之雨下流盈溢或未必得其消涸若夫旬日之間縱有霖雨亦不能為害矣朝廷於此又遣治水之官疏通大河使無壅滯又於夾河兩岸築為長堤髙一二丈許如河身二丈兩旁各二丈許空地以容則衆溝之水皆有所歸不至溢出而田禾無淹沒之苦生民亨收成之利矣是亦王政之一端也惟聖明留意下有司議可否而推行其法於天下貢賦之常膚見胡世寧是篇所論雖詳而所處未見悉當蓋三代而下取民之制莫善於唐之租庸調以其民有常産而國有常賦也至於歲貢之物出於州府所市其價視絹之上下無過五十匹有加配則以代租賦太宗又詔當州所産則充庭實不許踰境外求考其所貢不過藥物食用真得古人授田制賦任土作貢之義後經離亂户口消耗田不常授而丁賦日重又被藩鎮剝削貢獻無藝民不能堪楊炎因而奏立兩稅之法雖一時區處節目或未周要亦常時救弊之宜有不可少也嗣是立國者不能當平定之初復古授田之制誠為可惜若當中葉民生既繁民賦既定之後而欲驟變兩稅復古授田誠非易事也但今田賦之弊江南則等則多端而里胥飛走之弊瑣碎難革其間等重租官田或因前代舊額或係國初抄沒罪人之田小民盡刀耕種不彀辦糧事窮急迫多作民田出賣遺糧在户賠納不起多致逃竄負纍里甲攤稅之苦有如唐李渤所言者江北近京之地則富強之家開墾田土多不認糧惟是小民原額舊田始有糧稅至於畝數所在濶狹亦甚不同有此不均致民貧者愈貧而漸至逃亡不能出賦富者愈富而日肆兼併不肯加賦識者謂宜立權時救弊之法通行天下田畝各以本州縣為率而均一其稅不必更分多則其田數廣狹不均亦宜各縣丈量而均一之其若北方土曠收薄之處及南方或有邊江沙磧山岡易旱之鄉則宜倣古人上田一夫百畝中田二百畝下田三百畝之意而量寬其畝或令加半或人倍折或三倍折與亦不為過至於朝廷歲燕享服食器用之不可缺者計除每歲關市山澤之征勾用若干外餘所不足則宜均𣲖州縣仍照户計貧富令里甲出銀而市貢之然既當論土地出産而不可取有於無責多於少又當論道里逺近而不可捨近求逺捨易求難至於額外無名之科率及中使得預因而詐害之弊又宜痛革之則貢賦有常而民得蘇矣或以田賦舊額變更為嫌者查得永樂十三年敕諭許令官田拋荒無人肯佃者照依民田例起科又查得蘇州官田原額尤重宣德年間曾因知府况鍾之奏而量為減輕是皆不以舊制為拘也況今不議減而議均有何不可昔在五代吳越王時江南之田畝稅三斗宋太宗後因王永之言以為畝稅一斗天下通法槩令減輕故宋民感宋恩德深入骨髓雖以南渡衰弱之後而猶為之力耕血戰以抗強敵而立社稷者百數十年豈有今日聖明在上而宋太宗之事不可為也元主中夏縱強凌弱小民含寃無所控訴故天命我太祖出為民主首以抑強扶弱愛恤小民為事故當羣雄角逐時而民心先歸四海平定之日而民戴愈固以立我今日千萬年之基端在乎此今欲均稅以蘇民困則我太祖髙皇帝愛恤小民之遺意也又何不可在昔聖王行仁政必以均貧富分井授田為急後世井田之制猝難行而因議為均田限田之法今均田限田亦難驟行而惟均其田賦又何不可之有況貧户逃竄糧纍無干之里甲賠納又孰若均派有田之家分納為當也然此事廷臣皆知無肯言者蓋因富民糧輕之家多是朝士親識而各人為國之心不勝其私黨之念故也況此均派之法富民增賦無幾而貧户得減數多是私怨之人不勝感戴之衆亦何憚而不為之哉近年又有姦民通同里書推收匿糧之弊負纍糧里賠納不可不革如一都某户將糧三石開付二都另立子户止收一石丢下二石趙甲賣田推糧五斗與錢一户納止收二斗丢糧三斗之類是也名臣經濟録卷二十
