body:
  text: 名臣經濟録卷十八明黃訓編吏部文選下災異陳言疏馬文升文選清吏司案呈奉本部送準禮部咨節該巡撫四川等處地方都察院右僉都御史等官劉纓等各題稱四川雲南廣東廣西福建山東河南陜西山西南北真𨽻等處山崩地裂水泉湧出河水渾濁地震如雷搖倒城垣及聞天上聲響如鼓或星如車輪紅光燭天黑夜如晝江水白濁澴如豆漿等項災異各奏前來該本部具題奉聖旨是各處災異屢見朕心祗畏爾文武羣臣宜同加修省以回天意毋事虛文有當行的各衙門將緊要事情指實開具來説欽此欽遵除痛加修省外臣等竊惟災異之見必有由然乃天心仁愛人君欲其恐懼修省轉禍為福而保天位於悠久也蓋上天以生物為心人君以子民為責而羣臣者又所以代君而治民者也必上下交修各盡其誠使斯民安養而各遂其生則精誠感通天心恱而禎祥屢見民被困苦而不得其所則天心怒而災異頻仍天人之際感應不爽往古可監仰惟皇上即位以來誠以格上帝孝以奉兩宮仁以惠羣黎誠以御臣下宜其諸福之物可致之祥莫不畢至然而猶有前項之災異者實由蒼生困苦已極而無拯救之術羣小恣其姦蠧而無禁戢之令織造未息府藏益見其空虛齋醮頻見供辦日見其逼迫官吏貪殘而無所畏懼法令廢弛而未能振舉軍民田土勢豪霸占修造宮役士卒疲勞賦重徭繁民困財竭嗟怨之氣上干於天亦由臣等茍竊厚祿叨掌銓衡不能奉宣德意藻鑑人才之所致耳豈朝廷一政之或乖一事之失宜而遽致此災異連嵗之不息無處之不有哉古之人君遇災修省而益隆其業者甚多伏望皇上念今日所居之位乃祖宗之位必思保守之甚難今日之民乃祖宗之民必思愛養之甚至法天之剛健而勤以理萬幾體易之節制而儉以省財用凡臣下奏疏乞勑令各該衙門明白查奏更乞皇上斷自宸𠂻采而施行久而弗渝則天意可回而災異可弭宗社靈長而天位永久矣今將本部合行緊要事冝開坐上請伏乞聖明留意採納一裁冗官以省財用竊惟自古人君之治天下莫先於節財用節財用莫先於去冗員冗員不去財用不足一遇兵荒必致於措置無術此自然之理也蓋財取於民民之所供有限國之所用無窮茍不於其經費之餘而品節之必至於泛用茍取而民不致困窮流離者鮮矣故周之太宰以九賦斂財賄以九式節財用蓋欲量入為出而不至於匱乏也仰惟我祖宗法古為制官有定員俸有常數近年宗室位多武職太濫祿米俸糧所費甚繁而京儲府藏所餘無幾且在京各衙門額設大小官員通不過一千三百餘員其傳奉大小官將有八百餘員除僧道等官并冠帶匠役外中間實支俸給有皂𨽻者尚有五百九十一員每嵗該支食米不下萬餘石而折銀折絹又不止數萬兩若因大營建修造宮殿效勞頗多者傳升一級固不為過其或止是織造或染作修整樂器或鑾駕等項俱係職分之所當為别無重大功勞一槩傳升官職嵗文俸米占役皂𨽻是冗官之濫未有甚於此時者也此等之官蓋由各官內外衙門私其所管部屬之人豈惜國家財賦之耗皇上亦豈知此等之人不當輕授其官所以啓公論之騰沸而致國體之漸虧也且古者官以待有功賞以酬有勞有功者斯加其官有勞者斯受其賞今各官不過曲藝小能全無功勞冒叨官職妄費俸糧月計不足嵗計有餘况今京儲不多府藏空虛民力巳竭民財巳盡災異示警意或在斯正冝沙汰冗員撙節浮費之日也宋司馬光謂天地生財止有此數不在官則在民當今天下地力所出者有常數而國用所費者無常數方來耗損匱乏之患將必日甚一日矣是以文武大小臣僚屢嘗懇懇為皇上言之若能減一官則省一官之供寬一分則民受一分之賜消弭災異莫有急於此者伏望皇上大奮乾剛俯從臣等所擬斷自宸𠂻將傳奉額外濫支俸給皂𨽻干礙國賦者除進藥有效書寫制勑外其餘通行裁革或止許冠帶榮身隨藝供事如更聖恩優容照依成化年間事例量為減支半俸或更乞皇上今後不係修蓋大宫殿有大功勞之人乞恩傳升官職者明以察之義以斷之勿徇左右之私請恪遵祖宗之成憲以省國家之錢糧如此則人心既慰而天變可消矣一杜奔競以彰國典伏見三年朝覲大明黜陟乃國家之定制祖宗以來未之有改也豈惟我朝自三代以及漢唐宋亦未之有改也故曰三載考績三考黜陟幽明又曰諸侯各朝于方嶽大明黜陟蓋有功不進有罪不黜雖堯舜不能平治天下昔人論人主之職惟在進賢退不肖而已蓋天下人才一人之聰明或不能遍知也故不自用而付之吏部又付之都察院吏部都察院數人之聰明又不能遍知也故不自用而付之公論公論者何諫官之所論列方嶽之所開報與衆人之所議論耳目之所聞見參之於衆審之於獨吏部之所不可察院以為可則不敢去也察院之所不可吏部以為不可臺諫公論猶以為可亦不敢去也參互反復必求無負乎朝廷付託之意而始去之今既去矣陛下不以為然以臣為不足信乎不當使待罪此位以為足信乎不當復為掣肘既已去之又復留之則去者誰不自陳以冀復留之幸昔范仲淹為宰相凡不才監司一筆勾去富弼曰如一家哭何仲淹曰一家哭何如一路哭古今以為名言聖賢經傳古今子史其於小人惟恐去之不早除之不決未聞有所愛惜而不忍去之者也陛下仁覆如天曲為保護其如小人之不可長何中外之人窺見此意紛紛而起故胡孝之後王璠繼之王璠之後卲賢方志繼之方志之後朱瓉又繼之雖逺年如鍾越任穀之徒亦皆相告奔走而來後之紛紛者尚未知所止也况今九載考績之典有升無黜若三載考察之典又復不行則貪官汚吏遍滿天下戕害陛下之赤子誰復敢去之乎陛下以此不職之數人為可惜則天下數千百萬困苦之蒼生獨不可惜乎臣等於此數人者豈嘗有所怨仇特以國法所在民命所關不得不然耳今幸賴皇上遵祖宗之制循衆論之公胡孝等未遂其姦人心罔不稱快近日以來奏辦者少息尤望陛下自今以後若再有考察黜退官員奏擾者赫發震怒下之法司明正其罪則貪酷有所畏奔競有所沮而不敢肆無忌憚矣一革濫進以通選法切惟致治惟在於得人官得其人則政無不理民無不安而天下治矣自古君天下者必以畜養人才為先務也仰惟我皇上法古為治凡庶官用人惟由科目出身進士舉人及嵗貢監生得以除授此外雜流者不得並用前時三年大比各布政司設科取士鄉試所取舉人不多會試進士亦為有數其嵗貢生員每府一年貢一人州則每三年貢二人縣則每二年貢一人其嵗貢生員入監後不數年即取歷事通不過六七年吏部就為選用在部聽選舉人監生無淹滯久積之者所以年未衰老志亦精明一旦任官知守法度罔敢貪汚逮至天順年間憲臣建議起送天下在學年四十以上生員送監讀書奈各學生員夤緣作弊有方三十五六嵗或方三十者亦作四十起送赴京之數通有五千之上既而陜西強冦犯邊急缺戰馬又許生員納馬入監讀書其納馬之數又有七千餘名以後四川陜西地方荒歉軍民缺食乏糧賑濟守臣具奏生員上糧亦許入監通前共有數萬中間多係幼男自來不曽在學讀書既作監生須撥歷事其舉人監生雖年壯氣豪者亦與彼一同挨次取選始終二十餘年方得出身長者老耄壯者衰弱家道貧難未免負債於授官到任債主相逼因此貪人財物豈能展布行事所以官不得人民多受害至今未選納粟監生尚有七千餘名大壞選法壅滯人才率由於此本部雖有奏準不許生員納粟入監事例一遇兵荒府藏空虛未免又要奏開况蠲富民之徭役以重困貧民所損國體甚大不可不嚴為禁止合無通行在京各該衙門并在外巡按等官今後著落各該有司多方預備賑濟食糧凡遇兵荒如果錢糧不敷冝從另行設法措置天下之廣豈至乏財再不許奏開生員上納銀糧許其入監有壞選法以誤國事如有故違許科道官指實劾奏坐以重罪庶選法疏通而人才不致於壅滯官使得人而小民得蒙其實惠矣𢎞治十五年五月二十九日題奉欽依裁冗官通查來看其餘準行欽此重明詔信老成以慎初政疏馬文升文選清吏司案呈奉本部送於吏科抄出吏科給事中安奎題近該御馬監太監王瑞等題為急缺書篆人員事奉聖旨這急缺書篆人員吏部便訪尋精通的七八人來看欽此該吏部題稱自來內府各衙門所用雜辦事之人俱不經由本部選送宜從本監徑自訪求能書之人應用等因奉聖旨還選取來用欽此續該吏部考試得吳一中等八名頗通楷書等字乞要轉送御用監收用奉聖旨吳一中等八名并前革退李鼎等六名都送御用監通考優劣來説欽此又該吏部執奏要將吳一中等八名送去御用監收用李鼎六名不必同送等因奉欽依還照前旨通送考試來説欽此欽遵仰惟陛下以英妙之年撫盈成之運渙頒明詔汰黜冗員一時仕路頓清宿弊盡革咸曰此聖天子維新之美政垂久之良法也夫何旬月之內率多變更且雜流之徒亷恥素無奔競慣熟謂傳乞固可得官遇裁革即該盡黜不若營謀吏部訪取之名可為長久保身之計致令太監王瑞等題稱書篆缺人誤蒙準令吏部訪尋并選取來用又將革去李鼎等六名通令送考雖該部執奏再三而陛下終未俞允使大臣垂首喪氣謂掣肘而難行冗食依憑城社率夤緣而得計臣愚以為吏部者朝廷黜陟幽明之司使既退復進則吏部為徒設矣大臣者陛下股肱心膂之寄使論列不行則大臣為備員矣詔旨者朝廷鼓舞羣下之術朝更夕改則詔旨為虛文矣矧詔旨一出布滿寰宇所以洽上下之情者在是所以新天下之耳目者在是故凡繼世之君必頒詔令以繫人心然又不堅如金石信如四時使臣下有所持循而後可以言之否則視為泛常莫之信從不信不從政事隳廢世道日起於壞而不可救藥矣陛下初嗣寶位天下延頸想望太平顧可徇左右交通之情進既黜冗濫之徒與詔旨自相背戾哉昔人謂南山可搖而此判不可移陛下忍令詔旨反一判之不若乎臣嘗檢閲冗員未嘗不為愧赧中間如雙線匠之類亦得傳官其與竈下養中郎將爛羊頭關內侯何殊不意聖明之朝亦容有此李鼎等亦係招收人匠之數濫叨俸祿巳有年矣考其所能不過書篆彈琴一藝之微有之不足為重無之不足為輕不審何以克稱聖心而有回天之力如此且吏部遵奉明詔裁革冗濫不下七百餘員使李鼎六名姦計得行臣恐幸門一開後即為例如御藥房欲援引裁革之醫士則曰修和缺人乞要考選內官監欲援引裁革之人匠則曰造作缺人乞要查取不知陛下何以處之方今朝政多缺邊事孔殷災異頻仍府庫空竭陛下自即位以來未見召一大臣訪一大政顧乃于此不急之務冗濫之徒既責吏部以訪尋又責吏部以送考使此輩不獨一時茍祿以容身直欲後日名正而言順雖老成讜言纍進不恤也雖詔旨廢閣不行不恤也雖大體有損公論未愜不恤也然天下之事致謹於始猶恐鮮克有終以陛下新政之初謹始之際施為如此其欲終之盡美治之有成也難矣痛惟先帝崩逝今中外人心所賴扶持世道整頓紀綱遵守成憲三四元老大臣而已老成之士朝野蓍龜即此冗員一事陛下於老臣馬文升之論列尚且置之不信拒之不從如此不知可信從者果何人哉臣聞執狐疑之心來讒賊之口持不斷之意開羣枉之門近日文升執奏前事至於旬日留中不出臣仰測淵𠂻欲從文升之論則拂左右懇乞之私欲遂左右之私又非大公至正之道以故展轉卒從前旨遲遲而出耳使事事如此將來羣小肆志賄賂公行馴致主威不振於上政柄潛移於下矣新政之纍孰大於此况裁革冗員雖係吏部之職掌舉正欺弊實臣本科之攸司用是不忍緘默為陛下急切言之伏惟聖明俯納臣言收回成命勑令吏部將李鼎等六名仍遵詔旨革退為民惟復拏送法司追究交通情弊以為將來之戒其吳一中等八名務照吏部所擬必候辦事十年滿日給與冠帶再辦事五年滿日量除鴻臚寺序班仍前辦事不必考滿升用著為定例以後若夤緣傳乞升職者許該部及臣等指實恭奏庶弊源永塞政體不虧上有以彰聖明納言之美下有以遂老臣報國之心矣等因具題奉聖旨該衙門知道欽此欽遵抄送司查得近該御用監太監王瑞等題稱儒士李鼎等六名革退為民各不應役即今成造上用生活并寶纛龍旗龍床等項無人書篆乞勑吏部查照先年事例考取精通楷書篆書西番西天等字人員量送六七人赴監辦事等因具題奉聖旨這急缺書篆人員吏部便訪尋精通的七八人來看欽此本部查得李鼎等六名先因御用監招作諳曉楷篆西番西天等字并撫琴隨該工部恭稱李鼎等既謂之舍人固非在監人匠之屬所習字業又非該監應有匠色混同招收不過為他日傳奉之媒奏奉孝宗皇帝聖旨改作儒士御用監辦事甫及三年奏要比照儒士彭勉循事例授職又該本部恭稱不應妄引事例合送法司問罪具題節該奉孝宗皇帝聖旨準與冠帶欽此及查得趙世亦係傳奉之數俱各近奉明詔本部查奏革退為民今御用監成造上用生活合用楷篆等字人員冝從本監徑自訪取應用等因具題奉聖旨還選取來用欽此本部訪得在京官舍等項邢溥等五十七員名各諳曉楷篆等字考得數內吳一中等八名頗通前項字樣及議擬各人俱係白衣出身必候辦事十年給與冠帶又辦事五年量除鴻臚寺序班不必考滿别項升用等因開坐具題奉欽依還照前旨通送考試來説欽此欽遵覆奏間今該前因案呈到部看得給事中安奎所言大意欲遵明詔以革幸進之徒恤人言以謹傳奉之漸不使李鼎等復得進用而壞惟新之政是亦本官職分之所當為臣等亦切思之李鼎等不過書篆小藝其先以匠役招收後已改作諳曉楷篆西天等字巳該工部參其為傳奉之媒續又乞授職事又該本部參其妄引事例之罪及合夤緣進用據其前後奔競情節比之其他一時傳奉升官者又大有不同臣等執奏非與李鼎等别有讎怨固欲沮之但以皇上新政之始中外企望之時今乃因李鼎五六小人撓亂使明詔不信於下物議騰沸於朝傳奉又開末流難禁蠧國致災實由於此關係治體誠非細故伏乞聖明留神省覽合無俯從諫官之議仍依臣等所言將李鼎等不必考送照舊為民其吳一中等八名本部送赴該監收考中者留用不中者亦從黜退其考中之數月支俸糧及辦事除官等項日月俱依臣等所擬以後若有夤緣升職者許本部及科道指實恭奏拏問如此則皇上從諫之美可以追配祖宗用人之善可以益隆治道冗食自減而幸門少塞矣緣係重明詔信老成以慎初政及節奉欽依還照前旨通送考試來説并該衙門知道事理未敢擅便正德元年二月二十六日具題次日奉欽依是欽此薦舉陳獻章疏彭韶臣竊聞名德之賢成就甚難儲之朝廷關係甚重是以古昔聖帝明王咨訪搜求罔間遺逸小或致之大或起之動則賴以成顯著之事功靜則因以係士心之向慕聲望風采蔚為國華大學所謂惟善以為寶是也切見廣州府新會縣依親監生陳獻章心術正大識見高明涵養有素德性堅定立志願學於古人榮辱不足以介意誠高世之儒也往者成化五年應試春闈偶失甲第給假回還杜門養志沉潛聖賢之書實窺體要洞逹事務之理有見精微才雖未試行則可保今年五十餘矣讀書踐履愈覺純熟孝義著聞人皆感動臣等自度才德不及獻章逺甚猶且叨食厚祿顧於醇儒反未見用非惟臣等之心誠切不安亦恐國家不及收用坐失為善之寶也伏見天順年間英宗皇帝聞撫州民人吳與弼文行高古特加禮聘處以宫僚奈緣老病辭不供職是以未見作用之效今獻章年力盛強大非與弼之比伏乞聖明以禮徴召量處以在京儒官職事則必有以補助聖德風動士類矣臣等職居藩司所有屬縣人才不敢不舉為此具本奏聞後承準吏部辰字七百六十五號勘合該本司奏前事奉聖旨吏部知道欽此欽遵抄出到部隨該廣東布政司咨呈亦為前事通送到司查得陳獻章五十一嵗係前項府縣人由舉人監生成化三年本部歷事滿收候聽選間該通政使司連狀送據本生告要取討盤纒已經劄送順天府給引照回去後今該前因案呈看得廣東布政司左布政使彭韶等奏稱監生陳獻章給假回還杜門養志讀書踐履愈覺純熟今年力盛強非吳與弼之比要以禮徴召量處以在京儒官一節緣陳獻章先由鄉貢歷事聽選係是朝廷待次選用人才比與吳與弼山林布衣事體不同合就連送該司仰本司轉行該府縣親詣陳獻章住處以禮起送赴京本部另行具奏定奪以厲士風不在常選除授為急缺六科官員照例選補以廣言路疏臣竊照六科額設都左右給事中共五十八員中間事有繁簡故員有增損然所以司諫諍備獻納則六科之職均也祖宗以來額員俱備後來乃有不盡補之旨然遇都左右給事中缺五員以上則必奏請升補各科給事中缺十五六員以上則必奏請選補亦著為例在先朝嘗以五十八員一時補足當時侈為美談蓋增制諫垣自是盛代之事是故收蓄廣則真才必得耳目博則公論有歸矧今聖人在上納諫如流求言若渴顧惟獻替之職豈可諉曰乏人誠所當加注意者也今查得六科在任官止二十一員不及額數之半除都給事中六員掌管印信其十五員俱有領勑奉旨各項差遣略無空間該科一應常行公務且辦理不及倘一時奉命有所差遣遂至無官可推今吏科缺左給事中一員給事中四員戶科缺給事中七員禮科缺五員兵科九員刑科七員工科四員共缺三十七員六科除都左右給事中之外惟給事中四員而巳供事趨走日不暇給欲求優遊侍從以盡文墨論思之長從容退食以致寅恭謀議之實不可得已殆恐非朝廷設官定員之初意也近年以來六科員缺吏部不肯如數選補每補不過五六人問之則曰在外推官知縣未應行取行人博士未歷三年進士又不以選是以有缺盡行停閣不補然其間言事者連輒被斥忤時者又多外遷嵗消月減以至於今莫可復也臣考之祖宗舊規凡給事中有缺止於進士內年三十以上者考選奏補𢎞治間始以行人博士兼選正德間始以在外推官知縣照御史例選補正德末年大臣畏忌新進敢言乃始盡廢進士考選之例陛下登極之詔令今後照依舊例給事中有缺於進士內考選奏補御史有缺進士與行取人員相兼考選除授欽此欽遵然應詔止於一行而旋復寢塞吏部亦嘗奏請廟堂大臣隂行格沮往往以未嘗經歷世故藉口臣愚以為非是公言確論蓋用人之法惟在求之以公擇之以精任當其才歸於得人而巳得其人則進士行人博士固未嘗無弗可也非其人則推官知縣久於官政未見其可也古之人固有未嘗徒勞州縣而經綸素具又有致身台輔而功名反損於治郡者矣人品才器自有定價具目者當自得之烏可一律拘也今六科之選乃盡廢祖宗之舊獨舍進士而必求之推官知縣是偏重也既而推官以三年考滿者則得預行取於知縣則必限以六年是待推官知縣又自不同亦偏重也竊念朝廷良法美意有司官欲令久任者凡以為民耳使為民擇官則今之為縣者果有實德惠政如古之循良則任之愈久而民愈蒙利則不必行取當如漢法增秩賜金選諸所表以次須公卿之缺可也何必盡酬之以科道官而後足以為勸哉使為臺諫擇人則知縣中歷任三年聲迹顯著才堪侍從風憲者固可與推官同行取矣又何必於六年而後可哉此臣之所以不能無疑於用人之術也况朝廷之設言官其用意固自有在是故當取其風裁不當取其德量當取其戇直不當取其疏通當取其有廟廊圭璋之度不當取其有簿書米鹽之能司馬光曰凡擇言事官當以三事為先第一不愛富貴次則重惜名節次則曉知治體臣以為今日之擇言官當用光言以為取人之則當用臣言以求建官之體若徒以老成諳練為言是不過欲得脂韋媕婀愛身固祿之流取其不為已害而已又其甚者植一二不肖無良以為私人資其爪牙以搏噬善類以隂肆其威權此則大臣之所為利而非國家之福直臣之所為難而非聖主之明不能庇也臣待罪有年奏職無狀自愧不足為言路有無竊見近時以來侍從之員寂寥殆甚彈壓之氣委靡不伸若不妙簡才賢盛備員額恐不足以副陛下耳目之寄廣朝廷議論之司而國家之元氣血脈終不得以培植而流通伏望聖明深加體察特勑吏部遵祖宗之舊例奉陛下之明詔廣用人之公心破大臣之私臆事求允愜法貴變通將見在各衙門辦事進士及歷俸二年之上行人博士并推官知縣三年考滿到部者先行查照舊規及見行事例具奏從公考選以備六科見今給事中員缺其在外已經三年考滿知縣如果材識英逹治行卓異堪備臺諫之選雖未及六年亦乞勑下該部從公查訪精當坐名奏請行取前來以備急缺風憲之用遇給事中有缺亦聽相兼選補庶幾用人之道不偏滯於一途而濟時之冝不拘狃於一法將見吉人彚進忠讜日聞國體自尊朝綱自振而姦邪專恣當有所憚而不敢肆矣嘉靖九年六月十五日題奉聖旨吏部看了來説欽此定職官之品丘濬臣按周禮每卿六十屬六卿三百六十屬六卿所分之屬在唐分為二十四司今制吏部四司文選驗封稽勳考功戶部十三司則分𨽻浙江等十三藩仍量繁簡帶領直𨽻府州每一司內仍各分為民度金倉四科禮部四司儀制祠祭主客精膳兵部四司武選職方車駕武庫刑部十三司如戶部之制仍各分為憲此司門都官四科工部四司則營繕虞衡都水屯田四司設郎中員外主事以分主各部所掌之職而統於尚書侍郎吏部所掌則天下官吏選授勳封考課之政令戶部所掌則天下人民田土戶口錢糧之政令禮部則掌天下禮儀祭祀宴享貢舉之政令兵部則掌天下軍衛武官選授戎馬之政令刑部則掌天下刑名走𨽻句覆關禁之政令工部則掌天下百工山澤之禁令六部統各司各司分掌天下之務如網之有綱絲之有紀上下相承巨細畢舉其官屬雖無三百六十之多其間脈絡相通體統不紊得周官六典之遺意自有周禮以來二千餘年僅見行於今日者也臣伏覩皇明祖訓有曰自古三公論道六卿分職並不曽設立丞相自秦始置丞相不旋踵而亡漢唐宋因之雖有賢相然其間所用者多有小人專權亂政今我朝罷丞相設五府六部都察院通政司大理寺等衙門分理天下庶務彼此頡頏不敢相壓事皆朝廷總之所以穩當以後子孫做皇帝時並不許立丞相臣下敢有奏請設立者文武羣臣劾奏將犯人凌遲全家處死嗚呼此我聖祖高見逺慮超出百王之上是誠有合於成周設官分職以為民極之意則是今日之五府六部卿佐與夫都察院通政司大理寺皆前代三省兩府執政之官雖無宰執之名實理宰執之事但其事一總於朝廷而不專任於一人是以百年以來朝廷無紛更之弊臣宰無專擅之禍上安其政下保其位如一日也説者猶云政權必有所在不有所統必有所歸其中不無旁落下移之處潛持默運之人茍非其人其弊有不可勝言者是以我太宗皇帝即位之初即選文學之臣七人者俾居內閣專掌制誥凡國家大典禮大政令大事幾皆得以預聞謨謀既定然後付所司行之不豫之以名而豫之以實自是以為故事餘七十年於兹矣夫不豫以名則下無作威作福之具豫之以實則上賴詢謀咨訪之益其處置之善防慮之深漢唐以來所未有者也公銓選之法一丘濬本朝入仕之途其大者有二曰嵗貢曰科舉嵗貢之法每嵗學校貢生員赴禮部試中補國子監生府學嵗貢一人州學三年二人縣學二年一人以食廩先後為次則在學校者巳有資格也科舉則每三年一開科中鄉試者赴禮部中試者則授以官不中者送監肄業以俟下舉屢不第者亦以監生資次入仕科舉有定額嵗貢有常數學校貢舉與吏部選調其人才適足以相當而無甚有餘不足之數洪武永樂以來選用者未聞乏人而需選者未聞淹滯蓋以祖宗法制一定而有司奉行不敢有所更革也近世言者憫士子之在學校者多衰老乃開四十五嵗入監之例其後又因國計不足立納粟上馬入監等名自是於科貢之外别開岐徑選用之條止於此數而入仕之路比舊加多其人才日積月纍遂至數倍於前舊制各司歷事監生三閲月考過勤謹附名選簿仍留所司辦事臨選方行取用其實歷日期有多至二三年者後以坐監者數多減歷半年或一年即送吏部附選給假家居今有需次十年不得選者積纍既久員數愈多殆將及萬是以一時人才在監肄業之數少在部聽選之日多臣恐積愈久而愈多不止此數也國家養才而不得用及其用之皆衰老昏眊不能事事之人非獨人才之病其為國家之纍大矣嗟夫誾誾啾啾黌舍至不能容是乃國家人才之盛若夫充積於選調老死而不得一官夫豈盛時所宜有哉此非但士子之不幸也夫國家之於人才亦猶人家之於子弟白首而無室家為父兄者則必為之憂慮國家儲養人才白首乃不得沾一命為君相者能不為之憂慮乎所以憂而慮之者非預有以消息調停之不可也消息調停必使入仕者有及時效用之實汰退者無後時失所之嘆斯可矣然非在上權其輕重知其緩急決然以必行而不以人怨為解則雖有可以消息調停之䇿亦不可行矣古人有言一家哭何如一路哭而臣亦云一人怨何如千萬人怨怨之於一時者比之怨之無窮已者孰為多乎盍思曰我國家所恃以為治者人才也今日用人必循資格而人才需選者往往老於選調而不得及時以進用及用之大半衰老矣衰老之人志氣消沮筋力廢弛其不為身家子孫計者無幾失今不為之所猶七年之病而不求三年之艾也則夫異日所用者皆衰老之人衰老之人布滿天下而欲事理民安難矣事不理民不安亂亡之兆也且國家養士將何為乎為民而巳天下之民多乎士多乎説者乃獨畏士之怨而不恤民之怨何哉然則為今之計奈何請勑吏部通算本部需選監生自某年起至某年止總算若干人見到部者若干給假者若干本部以一年為率大約計用監生若干通計其數至某年方才盡絶而又通行天下布政司府州縣查算聽選家居監生備細開具年甲日期造册申部然後請旨選差卿佐有文學風力者賫勑詣各布政司會同巡按二司聚集聽選監生於總會處開場考試略如科試初日於經書中出論一道試之次日試時務䇿及行移各一道三題全通者為上通二者為中通一者為下全不通者為不中其中者造册送部依次選用不中者為民中者之中有不願仕者上等者遙授以京秩致仕有文學者授以助教學録之類有政事者授以通事序班之類免其戶丁三名差役中等者授以在外八品職名優免二丁下等者賜以冠帶免其一丁無丁者以本里內間丁給之其有未試之前告願免試者如下等之例如此則仕者得以效用而不仕者不致失所矣雖然此特一時不得已權冝救弊之䇿耳是豈祖宗所以教養人才之初意哉夫聖朝設立學校選擇師儒以教生徒優以廩餼免其差役優遊之以嵗月欲其成才以為國家之用士子立志務學底於成立以圖補報是為不負作養之恩顧乃茍延嵗月虛費廩給至於衰邁尚不措一詞如此之徒上孤聖恩下辱學校雖加以成周簡不肖之法屏之逺方終身不齒亦不為過但彼之所以衰老者固由其不能奮發勉厲之罪然亦以我之昧於事體者妄開幸門擠塞仕路有以扼之故也彼既自知其愆不願就試姑為此一時不得已救弊之䇿要之不可為訓也自此以後凡科舉歷事一遵祖宗成法於此二途之外不得别開入監門路以復洪武永樂之盛則人才不至於淹滯賢否不至於混淆矣今日求賢為治之務誠莫有急於此者或曰如此則選途固清矣其郡邑學校之中有生員年巳近艾而未得出身者何以處之曰學校之中生員年巳長大不通文理者充吏為民朝廷已有定例惟夫學問有成年嵗長大欲進之則資次未應欲退之則學行可取往往老死學校中可惜也竊見今吏部嵗貢生員初試未到監者往往試選為教職多有假手於人以圖僥幸不若就學校生員中稽考年四十五嵗以上食廩將及十年及曽歷鄉試六次入場者命提學憲臣會同巡按及藩臬二司每五年一次考驗其中有通三場者試中録其所試文字連人送部考試仍令坐監一年循資待缺以為教職如此則學校之生徒亦無有老死不用者矣公銓選之法二丘濬臣按天下之事其利害得失恆相半而朝廷所立之法亦然且如資格以用人説者謂此法既立之後庸碌者便於歷級而升不致沉廢挺特者脫穎而出遂至邅回則是資格不可有也然未有此法之前選司注官有老於下位三十年出身不得祿者則又是資格不可無也然則資格用人其利害得失如何嗟夫天生斯民賢智者恆少而愚不肖者恆多天下之事巨而重者又常不若輕而細者之為衆也是故人君為治用天下之人以理天下之事豈不欲人人皆用其賢且智也然人品有高下事體有大小官職有崇卑量其事而設其官隨其官而用其人必使官與事稱人與官稱則事無不理而政務舉治道成矣然人品高下之中又有高下事體大小之中又有大小官職崇卑之中又有崇卑不可以一律齊也於其不可一律齊之中而設官以總持之使之各得其劑量焉如權衡之稱物尺度之度物輕重長短各適其可而不倚於一偏非得其人不可也然人不常得於是不得巳而任之以法焉使朝廷常得人而任之則雖無法亦可也如其人之不常有何此古人用人貴於人法兼用也夫羣千百人之才品而決於一二人之耳目茍無簿籍之稽考法制之禁限資次之循歷而欲一一記憶之人人掄選之吾恐其智有所不周力有所不逮日有所不給矣而况夫偽妄詐冒請託干求那移蒙蔽姦計百出者哉由是觀之人固不可以不任而法亦不可以不定守一定之法而任通變之人使其因資歷之所冝隨才器之所能而量加任使不用資格亦不純用資格不用資格所以待非常之才任要重之職釐繁劇之務用資格所以待才器之小者任資歷之淺者釐職務之冗雜者其立為法一定如此而又得公明之人以掌銓衡隨才授任因時制冝而調停消息之於常調之中而有不常之調調雖若不常而實不出乎常調範圍之外人以漸而用而出類之才則不以漸官以次而升而切要之職則不以次非有大功德大才能及國家猝有非常之變決不拔卒為將徒步而至卿相也我祖宗立法之善超越前代未嘗不用資格而有不用者焉雖若不分流品而實未嘗不分焉何則今制文職四品及在京堂上官在外方面五品以上官有缺員皆具名以聞自五品以下吏部始得銓注此所謂用資格而有不用者也自尚書侍郎以下惟才是用雖若不分流品然翰林院國子監非通經能文者不授之其於流品又未嘗不分焉臣寮之在任也則雖推舉不次用之既滿秩到部則必考其功績按常調以用焉祖宗良法美意有如此者此又萬世所當遵守而不可更者也擇民之長一丘濬臣按九載黜陟之典始於唐虞後世任人惟西漢為最久黃霸在潁川至於八年然未有一定之制惟我聖祖稽古定制始復有虞之典內外官三年一考六年再考中有平常不稱職者皆許其復任以冀其後效至於九年通考然後課其三考之功過以相乘除因以黜陟焉其於外官也中有善政著聞而為吏民所告保者及部使者以聞即行旌異之典其秩滿者則又增秩加官仍其舊任是以官安其職民安其生仕者無奔走道路之勞居者無送舊迎新之費百年以來率循是道近自選法淹滯以來乃行一切茍且之政數有變更甚非祖宗立法任人之初意况繼任之人與所退者無大相逺乎擇民之長二丘濬臣按北齊制郡為九等唐宋制縣為七等定其等差所以别疆域之廣狹人民之多寡均科差之輕重也因其所轄之廣狹所統之衆寡所蒞之繁簡量其所容度其所有而計其所出如是則無偏重之弊不均之患是亦人君平治天下之大端也我朝得國之初郡縣多循勝國之舊名稱間有不同疆域則不異也方是時干戈甫定流徙未復人民無定數今則承平日久版籍既定生齒日繁然而郡縣猶仍其舊大小懸異多寡絶倫固有一府統數十州縣者其最小者乃至不滿一里焉設官雖有全減之殊品級則無大小之異仰惟祖宗官制一定固不敢輕有改革若夫斟酌唐宋之制以定府縣之等似若可行臣愚請分府為上中下三等州縣之等亦如之上縣以編民百里為率中縣五十里以上下縣四十里以下其縣之過百里者或升以為州或析以為一二縣縣之人民少者割附近里分益之州之人民少者或降而為縣或益之以近民而府亦然如此則官吏之所蒞者有繁簡以此次其殿最土地之所出者有厚薄以此科其財賦人民之所聚者有衆寡以此定其徭役將見疆域整齊事力均一差賦公平太平之基端在此矣或謂祖宗成憲行之百年一旦改革之孰任其咎哉曰浙之嘉興府止三縣宣德間則析為七矣景泰初元浙寇作而分溫處閩寇作而分建劒廣寇作而分南海與其析之於殘破之餘孰若置之於全盛之日哉矧今逺方縣道有地方四五百里跨三四縣間者人民去縣治既逺往往負固武斷椎埋遇有句攝公行旅拒官府恐致生變因循姑息前日之閩浙近日之荆襄可鑒也已擇民之長三丘濬臣按黃帝四監唐虞四嶽十二牧三代方伯連帥是皆後世監司之任但是時封建之制行所監者乃諸侯之國秦漢以來始立郡縣置守令地分而官衆所以監之者尤不可無一定之制漢以來雖設刺史州牧觀察節度轉運提刑等職然官無常制治無定署其流之弊乃至任分而不一權重而不掉雖有監察之名而無利舉之實遂至吏無所懲而民不受惠也亦有之矣國初循勝國之制設行中書省既而罷之分天下為十三布政司司設布政參政各二員皆分左右以總一方承流宣化之任又設都指揮使司以掌軍政按察司以司憲度參峙並立謂之三司治署既有一定之所官聨復有一定之制德刑兼舉文武並用體制相維關絡相通自罷侯置守之後治外之制未有如此之詳且善者也又於每年遣御史一員以巡按其地臨邊則專命大臣以鎮壓有事則分遣大臣以巡撫是以百年以來官無曠職民無宿寃而禍亂不作用此道也仰惟祖宗治外之制盡善盡美誠可謂超越百代者矣然所以振起而維持之者則又存乎聖子神孫焉昔人謂天下之本在於郡縣之責付之監司而其大綱總要則又專在朝廷誠能委任大臣俾之推擇監司預於未用之先廣為詢訪遇有員缺隨才選任或舉諸班行或拔自州郡或以職任遞遷或以異等超擢又於既用之後責以實效果有異能即加旌異顯有實迹不次明揚而不肖庸懦貪鄙之徒不顧其一家之哭如此則十三道之藩臬數十員之正佐皆得其人而郡縣無不良之吏田里無不安之民致治之要端在乎此伏惟仁聖加之意焉天下生民不勝大幸論官制一王瓊國家之制革中書升六部初亦疑之謂自古豈有無宰相而能致理者及觀宋南渡專任賊檜以殺忠良其後韓托胄史彌逺賈似道相繼盜政羣小又從而附和之日入於敗亂而不知非以權重故耶則今日去之不為過也我朝六部之設倣周制六典最為簡要有體然其名猶襲唐宋之舊唐以三省長官宰相謂中書令門下侍中尚書令左右僕射是也今中書省已去特存中書舍人為七品官給書翰而巳門下省已去特存給事中雖七品而有封駁之權尚書省不復設令僕乃升六司尚書分為六部秩二品蓋即僕射之類也中書尚書名與古同其實異矣論官制二王瓊國初官制全論歷俸淺深轉升如京官六品六年考滿升一級從五品又歷俸三年升一級正五品外官必九年考滿論繁簡升轉此定制也如宋景濓洪武二年除學士十年致仕五品終身自洪熙以後其法漸變蓋因四品以上官漸少五品以下官漸多卑官該升高官無缺不得升或卑官未該升高官急缺亦須升補以此有不待缺而升者如翰林院學士春坊殿閣大學士有升至尚書侍郎帶虛銜者通政使太常卿國子監祭酒及由序班出身升至鴻臚寺卿醫士出身升至太醫院使寫字出身在內閣書辦升至編修郎中等官皆有升至尚書侍郎帶虛銜者因該升而無缺也又有急缺而無該升之人則與署職如六部署郎中署員外郎也然署職之例惟行於六部司屬其餘衙門無之如給事中之上監察御史之上序班行人中書之上俱無五品官翰林院五品官五員以此俱無署職國初有御史升主事者如僉都御史升侍郎也然翰林科道職專講讀彈劾近侍清要又因在外四品以上官缺多乃於科道部屬中各論其歷俸年深者不次升補翰林官不歷政事故不外補九年方得升行人內選補科道中書亦九年得升各部員外郎惟序班一官九年方得外升八品最為貧苦此建官之制變而不能久也蓋轉遷雖有資序官制則有定員若資序雖當遷轉而官無員缺則但仍舊任不遷中間年深政績卓異者加升俸級必待有缺方遷補之則黜陟之典額定之員兩不相悖矣論官制三王瓊天下官員額設若干計算取士若干足勾除用若官多人少則官職虛曠或官少人多則人才壅滯洪武初天下學校養士嵗貢一人後三嵗貢一人通計三嵗不過一千餘人後設舉人科進士科每省多不過四十人進士多不過百人取士之數足當任官之數而又罷黜者多久任者少是以人才常不足用科貢之外又有人才之選自後人才雖稍充積然待選吏部者三月之外亦皆選除今各部歷事監生三月之外考勤上選舊法猶存也但因歷開貢開科加以納銀納粟事例監生積纍至數萬餘人考勤後一年餘仍留在部及放回聽選必十四五年方得挨次取選往往衰頺遲暮之人方入仕途是以吏治不精民不得所若取士貴精而不貴多及既用之後賢者久任不賢者速去使百司庶府盡皆得人民生有不安天下有不治者未之信也又科貢二途未必能盡網羅真才如黃福以貢士楊士竒以儒士胡儼以舉人是以進士未必皆優於舉人舉人未必皆優於貢士進士舉人貢士之外未必無竒才異能之士惟試之以事而後可見貴乎能察識而超拔之斯能盡一世人才之用而科目之選並行不悖矣吏部文選司題名記汪鋐嘉靖癸已文選司公署敝久葺而新之司官舊未有題名至是則搆亭鑿石志昔今氏名籍貫履歷於其上用垂永久郎中呂希周偕員外郎李學詩主事林春陳鯨請余為之記惟我朝稽古建官一凖成周之法天下大政悉掌於六部六卿分職各率其屬吏部統百官均四海分其屬為四司曰文選驗封稽勳考功凡中外百官遷改除拔之事文選實司之周禮謂司士掌羣臣之版以治其政令嵗登下其損益之數辨其年嵗與其貴賤周知邦國都家縣鄙之數卿大夫士庶子之數以詔王治以德詔爵以功詔祿以能詔事以久奠食今文選所掌者即其事焉故事權視諸司為尤重夫用舍之柄統於冡宰制於君上文選若無所用其力者然根源之所由起節目之所由分校閲之精甄别之當則未始不繫於文選任是職者茍非其人則名實倒置真偽錯雜勢所不免而舉錯之施鮮有不敗度者矣要必得其人本之以公濟之以明行之以勤操之以慎而尤主之以忠信不欺之心焉然後可以稱其職而無忝也兹石所刻始自洪武丁丑凡百有三十人在昔諸君人品之高下才識之優劣樹立之豐嗇名位之顯晦今觀其名考其實歷歷如指諸掌夫題名者本以題其氏名垂之不朽也然而美惡之實固亦與之同垂不朽矣實之不美雖孝子慈孫有不能掩飾而更置者噫可不懼哉是為記論選舉李堂國家人才逺過漢唐而選舉之行隨時異制洪惟聖祖神武自天羣臣乏偶始任中書再升吏部範圍曲成非不至也乃僨於胡汪辟於大誥故進退刑賞咸柄於朝廷及建文革除永樂更化部選久任於蹇公至郭黃繼銓權移保舉當時每著得人之稱自三楊謝事後權還吏部王文端公內任屬司外憑巡察雖天順咨詢輔弼而遂為定例成化以來凡要職徴拜遷除咸以撫巡旌異之奏為主故巡察之權並於正統之保舉然薦人之精濫純駁驗舉主之公私亷貪制未嘗不公也自王端毅公之後吏部虞於責備雖有連坐舉主之條率不能行至倪文毅公則斷然行之參究如制時論翕然近年逆瑾專政剗革過情遂不敢舉旌異之奏然賢否之迹吏部憑撫巡撫巡憑兩司制自不能廢也徒紛更爾雖然孟子論進退人才自左右諸大夫以至國人可謂公矣而必曰見賢否焉然後用舍之今日聖君賢相所以參衆審獨為造物司命權衡者豈區區法制條格為淺末者所窺測哉堇山集名臣經濟録卷十八
