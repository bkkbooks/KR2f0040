body:
  text: 名臣經濟録卷五十三明黃訓編都察院通政司大理寺御史府記方孝孺皇上嗣位之初即下明詔行寬政赦有罪蠲逋租巨萬計去事之妨民者明年以紀元賜髙年米肉綿帛民鬻子者官為之贖免田之租稅幾年分遣使者問海內所患苦賞亷平吏罪至死者多全活之於是刑部都察院論囚視往嵗減三分之二人人皆重犯法二年春二月甲子有詔若曰頃以訴狀繁易御史臺號都察院與刑部分治庶獄今賴宗廟神靈斷獄頗簡其更都察院仍漢制為御史府專以紏貪殘舉循良匡政事宣教化為職省御史員定為二十八人務為忠厚以底治平三月戊辰賜御史衣明日已巳以都察院舊署在太平門之北於朝謁為難命即詹事府為御史府賜宴於新治復命文武大臣皆預以寵綏之既而有勑令臣某記其事臣惟斯民之生以德養之則安於為善以刑制之則棄於為惡聖人之治天下豈有他術哉使人皆知去惡以從善而治道成矣惟御史之官始於周其職之所治與權任之重輕雖纍變不常然得其人則紀綱振而國體尊非其人則人望不肅而是非錯繆然專任以刑獄則自近代始曩者法吏持刑深刻犯者滋衆先皇帝甚厭苦之欲有所更革而未暇今皇上以德養人羣生喜悅訟者衰止復古官名以修善政實行先帝之遺志自今居是府者其敬承聖訓凡便於國利於民者則言之為民之蠧為國之病者則去之毋溺於私而枉其所守毋懾於勢而屈所當為一以道輔佐天子行德教使黎民醇厚如三代時斯不負建官圖治之意茍為不然舍其大而務其細或小忠末節以市名或為詭行憸言以規榮利於民之治否國之安危無預焉則是官之名雖更而實之可厭苦者自若也奚可哉臣幸執筆從太史後夫紀政教明職守以示後世史氏職也故書其事以為居位者規重臺諌之任丘濬唐制御史大夫一人中丞二人其屬有三院一曰臺院侍御史𨽻焉二曰殿院殿中侍御史𨽻焉三曰察院監察御史𨽻焉大事奏裁小事專逹凡有彈劾御史以白大夫臣按御史大夫即今左右都御史之職中丞即今左右副僉都御史之職唐有三院今併其二於察院祖宗設都御史六員職專紏劾百司辨明寃枉提督各道凡事之不公不法者皆在所理其屬有十三道各設監察御史曰浙江曰汪西曰福建曰湖廣曰山東曰河南曰山西曰陜西曰廣東曰廣西曰四川曰雲南曰貴州分掌其各布政司事其京衛并直𨽻府衛則分𨽻焉御史之職在紏劾百司照刷文卷問擬刑名巡按郡縣是則朝廷耳目之任所以振肅紀綱而防邪革弊者也六部之職有攸司而都察院惟所見聞不係職司皆得以紏察焉欽遵勑諭申明憲綱事汪鋐臣伏覩皇上即位之六年八月二十六日勑諭都察院內一欵成化七年憲宗皇帝欽准事例巡按公差御史回京之日本院堂上官仍依舊例查勘考察保結稱職者具奏照舊管事若有不稱奏請罷黜近年此例雖存不聞劾罷一人蓋由堂上官不能振揚風紀反為屬官所制避讒逺怨以致人心怠弛今後巡按滿日務要嚴加訪察果無贓私過犯推姦避事等項實跡取具該道結勘明白方許回道管事若有不職事跡不許朦朧具奏照例奏請黜罷等因臣仰窺聖意惓惓以考察巡按為諭良以巡按關係甚重得其人則一方之民無不受惠非其人則一方之民無不受害其為慮至深逺矣聖諭又謂此例雖存不聞劾罷一人蓋由堂上官不能振揚風紀反為屬官所制避讒逺怨以致人心怠弛此皇上洞燭幽隱卓越千古之見又無以加矣臣竊欲淬勵盡忠仰答聖意竊以御史言官朝廷耳目之寄欲考其不職而劾罷之茍非真有顯然事跡可據則固未可苟焉為之也臣是用忘其固陋謹以宣宗皇帝所定憲綱及皇上所降勑諭竊取夫宏綱大㫖為巡按當行當禁切要之務與夫臣等得以憑據而考之者著為條欵開坐上陳伏乞聖明俯賜采納一宣德意仰惟皇上勵精圖治即位以來屢次頒降恩詔傳奉勑㫖及欽准事例凡恤寃獄寬賦稅輕徭役節財省費救患分災興利除害靡所不至奈何各該有司不能仰體聖心著意奉行以致恩澤不得下究御史巡按一方事權最重人心視以為向背官吏視以為作止詔令不行御史誠不得辭其責今後巡按御史務要盡忠體國督令司府州縣各該官員凡恩詔勑㫖及欽例所載各項應行應禁事宜作速一一著實奉行毋得視為虛文漫不加意亦毋得虛應故事苟且目前仍要嚴立程限頻加考較分别勤惰奏請黜陟回道之日備將各官某事已行某事未行某事行之已效某事行之未效開具揭帖呈報查考如是御史不能盡心督責臣等查訪得實參劾罷黜一勤巡歷伏覩憲綱內一欵凡監察御史出巡必須遍歷竊照近年巡按御史省城駐劄之日多郡邑巡歷之日少以故偏州下邑多不及到甚至一二府全不到者亦有之夫既未到其地則官吏之臧否軍民之休戚又安能盡得其真耶合無今後巡按御史初到省城止許駐劄一月隨即巡歷各該地方每府十日以上每州縣五日以上務要周遍不許遺落一州一縣如違即係推姦避事按察司每于季終將巡按出巡府州縣地方日期緣由開具揭帖呈報都察院查考如有隱匿不報及開報不實一體參究一精考察伏覩憲綱內一欵風憲存心須用明白正大不可任一已之私昧衆人之見凡考察官吏亷貪賢否必于民間廣詢密訪務循公義以協衆情毋得輒憑里老吏胥人等之言顛倒是非亦毋得搜求細事羅織人過臣竊照先年巡按御史率務多方廣詢密訪如憲綱所云近來巡按御史巡歷既不能遍安能廣詢密訪夫既不能廣詢密訪則安得不任一已之私昧衆人之見乎安得不聽里老吏胥人等之言顛倒是非乎又安得不搜求細事羅織人過乎甚至寄耳目於鄉里親戚其為害又有不可言者矣合無今後巡按御史考察官吏務要廣詢密訪或詢諸耆碩父老人人致問事事細察毋惑于一偏毋膠於一節回道之日務將詢訪所得來歷各於本官下明白開注以俟參考一慎舉劾伏覩憲綱內一欵所至之處博采諸司官吏行止亷勤公謹者禮待之薦舉之汙濫姦佞者戒飭之紏劾之勸懲得體人自敬服臣查得𢎞治年以前巡按薦舉各官闔省多不過四五人少或二三人其慎重如此近來所舉一疏不下數十人碔砆與美玉錯雜無别夫朝廷寄耳目於巡按藉其舉劾以為黜陟實國家大政所關顧茍且冒妄若此其為負恩誤國抑孰甚耶合無今後巡按薦舉各官務要精擇才行出衆政績卓異者舉之照依𢎞治年以前闔省多不過四五人少或二三人其紏劾各官務要求其真實不才事有顯跡者劾之不得任情作惡濫及無辜其所舉所劾如曰亷能公謹必指其亷能者何事公謹者何事如曰汙濫姦佞必指其汙濫者何事姦佞者何事每一人項下必舉十餘事少亦七八事不得為泛然無稽之論臣等查其舉劾若無事跡明白開注或事端開注不實即指其不職而劾罷之如是所舉之人始以亷舉而卒以貪敗始以公謹舉而卒以不謹敗吏部即查明白連坐以罪臣等即亦指實參奏其清軍提學巡鹽巡關茶馬屯田等項御史止將該管官員舉劾賢否其餘不得一槩舉劾一謹關防照得巡按御史所帶書吏倚藉聲勢濫受賘私御史多不能禁蓋巡按事權既重有事之人百計夤緣賄通書吏或抄摘狀詞或洗改字樣或沉匿案卷或禀行牌面或透漏消息無所不至御史方且墮其術中懵然無覺臣伏覩憲綱內開所至之處先要防間合無今後巡按御史務要嚴於律已所帶衣靴等物止作一扛不過百斤其書吏監生行李共作一扛只此二扛緊於御史馬前隨行所至下馬與起程之際御史俱要督同各該府州縣掌印官三面將此二扛一一檢閲明白方許收放擡行并將書吏監生身上一併搜檢其卷宗簿籍等項公文裝載卷箱封鎖明白另委官一員督押至察院交割御史督同各該掌印官逐一搜檢明白方許收受其書吏監生若與御史同鄉或親戚故舊即當回避送回另差一禁逢迎照得巡按御史駐劄省城則守巡兵備等官專在省城日逐伺候巡歷府州縣則三司掌印官絡繹差官問安該道守巡兵備官謹謹隨從早晚不離其各該新任或朝覲考滿回還官員雖千里之逺亦各赴其所在參謁荒廢職業莫此為甚况水陸夫馬船隻費用不資豈是各官自辦一皆出自百姓合無今後巡按御史務要嚴加禁革毋得安然受之致乖憲體如違臣等詢訪得實俟其回道一併考劾一親聽斷伏覩憲綱內一欵凡監察御史按察司官分巡去處如有陳告官吏取受不公等事須要親行追問不許轉委違者杖一百又一欵風憲之官當存心忠厚其于刑獄尤須詳慎照得近來巡按御史接受詞訟不拘事情輕重俱是批委各衙門問理其有稱寃赴京奏訴准行御史親自再為勘辨者亦只轉委于人百無一二親問間或親問又專用毒刑固執偏見不肯虛心細察惟務羅織成獄及至奏訴在在拘泥成案不肯與辨接管御史亦曲為回護不肯改斷如是而欲民不寃何可得也合無今後巡按御史但奉本院劄付行仰親自提吊人卷再為勘問有寃與辨者務要遵依親自提吊從公勘辨不得轉委及專用毒刑固執偏見臣等查其回繳招由初次缺允駁回再問二次缺允具實參劾一稽儲蓄照得布按二司官并各府州縣掌印官若能勤於供職問理民詞朝夕不倦又能亷以律身贓罰紙米毫髮不私則稻粟榖石收貯于倉司府月可以千餘計縣可以數百計積之既久則陳陳相因遇有警急可以備召募遇有饑荒可以備賑給足食足兵莫切于此奈何各該官員闒茸怠惰者數日不能理一詞貪墨無恥者一毫盡歸於私槖夫如是何怪乎儲蓄之不充也合無今後巡按御史按歷所至務要稽其儲蓄有無多寡有而多者為亷為勤無而少者為貪為惰又即其多寡各分等第考察賢否先要以此為准則明白開寫于考察項下以備吏部查考黜陟如是御史不行用心稽查朦朧開報不實即係推姦徇私臣等查訪得實俟其回道參劾黜退一嚴督率照得布按分司官例該二月初出巡五月終回司七月初出巡十一月終回司奈何各官好逸惡勞不肯依期巡歷又因巡按御史多住省城要得隨衆伺候遂各託故專於省城安坐巡按御史樂其趍奉竟不啓齒督令出巡以致地方無人管束貪官汙吏得以肆志强劫盜賊得以橫行一有失事互相隱蔽廢職殃民莫此為甚合無今後巡按御史務要嚴督各官遵照事例依期巡歷不得輒便回司如敢故違即行參奏每年終布按二司將各官巡歷及回司日期開報都察院查考如是巡按御史徇情不行嚴督臣等查考得實一體參究一戒奢侈照得風俗莫善于儉約莫不善于奢侈居官者奢侈則必貪為士者奢侈則必淫富者以奢侈而遂貧貧者以奢侈而為盜故風俗之弊惟奢侈為甚兹欲移風易俗變奢侈而為儉約非委任權力之重不可為也御史奉皇上之命巡按一方令必行禁必止風俗轉移變化之機彼實能握之合無今後巡按御史務要躬行儉約率先一方日廪五升之外秋毫毋得取費於有司一菜一魚必以廪米照依時值易之仍遵照憲綱御史陸路給驛馬水路應付站船監生吏典承差陸路並騎驛驢水路應付遞運船並不得扛擡四轎乘坐座船凡可減省者無不減省然後行令司府州縣官吏軍民人等悉從儉約凡飲食宴會服飾車馬婚姻喪祭等項俱有品節限制不得過為侈靡一切縱欲敗度踰禮犯分之事無不禁革如是御史不能以身率下好為侈用不乘站船而乘座船不乘驛馬而乘四轎故違憲綱以致地方官民人等無所觀法奢縱如舊臣等查訪得實參劾治罪一謹禮度伏覩憲綱內一欵方面官與御史初相見左右對拜方面官來見御史前門外下馬由正道入御史延至後堂方面官坐左御史坐右及御史回望司前下馬由正道入方面官延至後堂御史坐左方面坐右又一欵指揮運使運同知府知州問答之際不許行跪禮近䝉皇上欽准事例又復申明前規奈何巡按御史不能遵依方面傍坐運使等官行跪猶循舊轍合無今後務要遵依憲綱及欽准事例所定禮儀一洗數十年弊陋之習則名分正而人心安紀綱自振法令自行如再抗違臣等詢訪得實參奏治罪一慎請差照得御史差出巡按先年舊規率以到任先後挨次差用臣竊以為人之才力大小强弱不能盡同若不論其才力之應否止以歷任淺深為差次似與皇上簡命之意背馳合無今後請差巡按臣等務要體國秉公質諸天地鬼神不拘先後精選才力相應者二員開具上請簡命一員如此則庶幾巡按得人地方受惠嘉靖九年正月二十日具奏二十一日奉聖㫖是御史巡歷地方振揚風紀關係甚重舊章成法具載憲綱朕已勑諭都察院舉行但近來人心漸弛都不遵守覽卿所奏深切時弊都准行便行各該巡按御史及各該三司等官務要著實奉行有不遵依的依擬舉劾黜退遵憲綱考察御史疏王廷相為遵聖諭定條約嚴考察以新風紀事臣等伏覩嘉靖六年八月內皇上勑諭都察院有云正統六年英宗皇帝詔中外風憲係綱領之司須慎選識量端𢎞才行老成任之其有不諳大體用心酷刻者並從都察院堂上官考察降黜成化七年憲宗皇帝欽准事例巡按公差御史回京之日本院堂上官仍依舊例查勘考察保結稱職者具奏照舊管事若有不稱奏請罷黜近年此例雖存不聞劾罷一人蓋因堂上官不能振揚風紀反為屬官所制避讒逺怨以致人心怠弛今後巡按滿日務要嚴加訪察果無贓私過犯推奸避事等項實蹟取具該道結勘明白方許回道管事若有不職事蹟不許朦朧具奏照例奏請罷黜欽此欽遵臣等伏讀之餘仰見皇上慎重風紀之司必欲御史得人使德化宣流生民得所而後巳真帝玉之盛典萬世之所當守也臣查得御史出巡舊規除盤糧等差與給事中同行互相關防免其考察外其餘巡按巡鹽巡關巡茶清軍刷卷印馬等差一年滿日及事完回京各具行過事蹟御前復命仍備呈都察院考核出巡有無贓犯及乖違等項違礙劄仰該道從公保勘委無違礙方許奏准照舊管事但御史出巡責任甚多今考察之例止言賘犯乖違未曾明具條件使御史無所據守以之盡職本院無所憑藉以之核實漫言指摘似為未便臣等議得今後御史出巡回京考察除犯該贓犯據有實蹟照例奏請提問及過違限期照依舊定水程查算外今將關係職守之大者六事定為出巡規格凡御史有差備開載於劄付之內行令一一遵照條欵考其修否以别勤惰臣等另有訪察不在此限如此則御史目覩耳聞之餘必能警省惕勵無怠職廢事之愆而朝廷之風紀亦於是乎振揚矣臣等欲候命下咨行各巡撫都御史劄行十三道并各巡按等項御史各一體欽遵施行緣係遵聖諭定條約嚴考察以新風紀事理未敢擅便具本開坐謹題請㫖一除革奸弊御史之職方今天下官邪民玩甚矣錢糧出納之侵欺驛傳往來之泛濫里甲困於無藝之供糧長苦於應官之饋巡鹽即販私鹽捕盜與盜通氣入官有見面之錢管事有常例之賄假以公用而科斂任情指稱修理而罰金無度吏典無賄而文書不行豪富通財而差役得免隱奸蓄慝不可枚舉近年以來御史出巡惟務作威作福以聳人之耳目不事廣諏博采以察下之隱微況巡歷所在止二三日飄風驟雨一過不返若不用心體察民間奸弊深隱何由以知合無今後御史出巡務要悉心亷訪但有奸弊發露即當置之法理使按屬之地風清弊絶以副皇上救弊恤民之心回京之日仍將革除過各項奸弊事由開造文冊呈院以憑考察職業修否一伸寃理枉御史之職切惟推情訊獄非上智之才公平之心鮮有得其真者况權勢之家問官懾於利害富豪之室賄賂靈於神明朴實之民鈍口奪於狡佞酷暴之官殺人輕於草菅粗疏之吏才情拙於淑問由是情僞莫分寃枉無訴小民有不得其生者矣既不能體皇上好生之心且有以干上天至和之氣致災召眚莫不中此合無今後御史出巡務要慎刑明獄及一應詞訟勘問之事虛心推理緣情求實但有枉抑勿拘成案即與伸理使按屬之地刑罰得理瞭無寃民回京之日仍將伸理過各項寃枉事由開造文冊呈院以憑考察職業修否一揚清激濁御史之職切惟御史為朝廷耳目出巡於外人才臧否賴之采訪部院考察馮之黜陟其關係至重也近年以來御史旌舉司府州縣等官不問其人品髙下立心行事曾有卓異政績與否但見其奉承齊備禮貌足恭便以為好即一槩濫舉多致數十餘人致使賢否同途薰蕕並器而不辨其所糾者類取一二塞責甚至糾及縣丞典史等官其大貪大奸蠧政而害民者則以鄉里同年親故之情掩蔽而不發惟念私情全不為國大壞風紀於斯為甚合無今後御史出巡於司府州縣官員務要即事察政即政察心果見其人品髙明心術正大政事卓異在司府官斷可為公輔之臣者在州縣官斷可為科道郎署之臣者方許薦舉其中人以下平常之才止可注在考語不得混同髙流以辱薦章其所糾劾首先貪酷殃民不法之人次及罷軟無為老疾之輩務要據其實跡奏行罷黜不許挾私報怨以害賢善回京之日備將舉劾過各官賢否實跡造冊呈院以憑考察若才賢者以不能奉承舍之而不舉中才平常之人反夾雜一二以盡私情及大貪極酷隱蔽而不劾者臣等體訪得出考以不職一本院劄去巡按御史勘合公文皆關係地方重大事情及官民寃苦奏詞有等公勤盡職御史督行二司及守巡官員一一依期完報其有等漫無才志者則悠悠度日傳食郡縣多致緊急事情廢閣不省又有等乖猾利巧及阿私偏黨者每遇關係利害之事則推託閃避遲留而不為干礙御史糾劾不實者雖容易勘明而不報以致終年纍嵗事無歸結此等御史尤為不職今後差去御史接管承行凡先次御史勘合務要作急勘報其自已任內劄付者除滿前兩箇月待續差御史勘完其餘拾箇月內務要一一勘明銷繳回道之日備將先差御史及自已任內勘合開具已未完數目造冊呈院以慿考察其有邊夷等項事情難於提人行勘者亦要明白開造一監察御史出巡所以上宣德意下達民隱風四方貞百度此其大節也為御史者必須清修簡約鎮靜不擾庶足以安民格物以振風紀近年以來御史出巡在外動輒人馬千百擺列兵衛吹打響器以張大聲勢擅作威福又隨帶府縣能幹官員及狡猾驛丞十數不等以備任使導從如雲飲食若流全無清約之節反生騷擾之害所至州縣計其一日之費每至百數十兩本以安民而反以勞民欲振風紀而反壞風紀此等御史乃淺陋無識徒假聲勢於外以自大求其中未必有者也合無今後御史巡歷郡邑務要安靜不擾本等導從皂𨽻之外並不許多用一人其府州縣驛丞等官亦不許隔境隨從迎候以為有司之害違者許巡撫巡按互相糾劾臣等察訪得實回道之日考以不職一巡撫巡按兩相和協則能開誠布公以共成王事近年以來輒因小忿遂成嫌隙至相訐奏安望其同心戮力有益地方乎臣等嘗求其故皆巡按御史無禮不遜致之都御史正坐御史旁坐禮也近年以來御史每與都御史上下賔主坐矣都御史前班御史後班禮也近年以來御史每與都御史同班並列矣豈非執法者不法貞度者無度乎巡撫桑和忍事者則隱忍而不與之較若遇剛毅正直者則必與之相講論不從則嫌隙成矣由是巡撫所行者巡按則不行巡按所允者巡撫則不允官吏人等答應巡撫者巡按則惡之答應巡按者巡撫則惡之至有無罪拿問因而革去職役者撫按自相構隙而禍及平人豈不寃哉以斯人所行乘勢驕傲為患如此欲望一方政令之平民庶之安胡可得哉臣等以為春秋之義王人加於諸侯之上禮也巡按御史在三司則可在巡撫都御史則不可何也都御史列銜內臺奉勑巡撫一方非在外守土之臣可比也地方事情可以共議而名分體統則不可越近日本院題准都御史正坐御史隅坐臣等以為此只以私情非禮議處非所以論於朝廷之上也若據禮制名分御史仍當旁坐仍居後班為宜合無今後巡按御史不論副都僉都其坐旁坐其班後列以正體統若有仍前不遜者臣等察訪得實回道之時考以不諳憲體奏請降調嘉靖十二年八月初三日奉聖㫖是覽奏足見振揚風紀深切時弊都依擬務要著實舉行內除奸弊一事還查照前㫖不許假以訪察為由誣害平民其餘未盡事宜著遵照憲綱備細申明來說再擬憲綱未盡事宜疏王廷相為遵聖諭定條約嚴考察以新風紀事嘉靖十二年八月初三日臣等題前事奉聖㫖覽奏足見振揚風紀深切時弊都依擬務要著實舉行內除奸弊一事還查照前㫖不許假以訪察為由誣害平民其餘未盡事宜著遵照憲綱備細申明來說欽此欽遵臣等切惟御史之官朝廷耳目綱紀之寄行止語默纎毫有違則人人得而非議之而寄斯忝矣憲綱一書垂示九十五條蓋亦周為之防必欲憲臣之無忝其寄而後已也但法行既久人心易弛故臣等不揣一得之愚用陳六事之奏防其因循也則曰除革奸弊防其苛刻也則曰伸理寃枉防其偏私也則曰揚清激濁防其淹滯也則曰完銷勘劄防其擾也則曰清修簡約防其傲也則曰撫按協和然亦孰非憲綱之所包括者哉仰瀆宸聰俯降溫㫖且以未盡事宜責令備細申奏臣等查得先署掌都察院事兵部左侍郎張孚敬為申明憲綱以勵巡按官員事題奉聖㫖卿所奏修舉憲綱事件皆切於恤民圖治要務便行與各處巡按御史及各按察司官務要著實遵行若仍有蹈前弊虛應故事的堂上官查舉降黜欽此續該先任都察院右都御史汪鋐為欽遵勑諭申明憲綱事題奉聖㫖御史巡歷地方振揚風紀關係甚重舊章成法具載憲綱朕已勑諭都察院舉行但近來人心漸弛都不遵守覽卿所奏深切時弊都准行便行各該巡按御史及各該三司等官務要著實舉行有不遵依的擬舉劾黜退欽此前後勑諭申明憲綱以為巡按御史之防者各已明備臣等除查有大義兩相同者不開外其事理有不相同者盡行開具及尚有關係地方之休戚者臣等又增入三條如䝉聖明採納勑行各該巡按監察御史出巡之日本院俱填入劄付內一併著實遵行回道之日仍聽本院慿此考核則御史無失職之忝而朝廷耳目綱紀之寄亦於是乎有賴矣緣係節該奉欽依未盡事宜著遵照憲綱備細申明來說事理未敢擅便謹題請㫖先署掌都察院事兵部左侍郎張孚敬申明事件一憲綱開載都察院按察司堂上官及首領官各道監察御史吏典但有不公不法等事許互相糾舉今後巡按御史彈劾三司不職者吏部斟酌舉行按察司官果有能糾巡按失職者亦應吏部查記不許科道官挾私報復其巡按清軍巡鹽刷卷御史同事地方固宜同寅協恭亦須互相糾察以清憲體一憲綱開載監察御史巡歷去處不許出郭迎接方面官相見左右對拜分坐自後不伺候作揖奈積諛成風卑恭過甚今後接見之間務依憲綱舊禮敢有倨肆違背本院考察不職三司官不知自立仍前獻諂者吏兵二部即坐罷軟則彌文去而實效臻矣一憲綱開載凡監察御史各道按察司官每出巡審囚刷卷必須遍歷不拘限期近來巡按差出者半年未見蒞任交代者旬月不出省城今後御史㸃差各照水程赴任仍具某年月日交代某年月日按某地方呈報本院查考違限怠事者定行參究則郡邑皆得遍歷而奸弊無不察矣一憲綱開載監察御史巡歷去處如有陳官吏不公等事須要親行追問近有不待陳告專於訪察者亦有不親受理轉委下司者今後不許訪察濫及無辜其必須自下而上果有斷理不公方行受理情重者親審本院節次發下勘合必須對款親理回報事完考察完過六七分者方與回道管事則事不滯而民無稱寃矣一憲綱開載巡按所至博采諸司官吏行止亷勤公謹者禮待之薦舉之汙濫奸佞者戒飭之糾劾之勸懲得體人自敬服近來薦舉濫加於庸流彈劾下及於丞尉今後歷任年深政績卓異者方許保舉五品以上賘迹顯著者指實參奏若是下官不職審實提問不必一槩糾劾有妨憲體一憲綱開載風憲之官當存心忠厚其於刑獄尤須詳慎茍不問事情輕重而一槩淫刑以逞鍛煉之下死傷必多夫立法貴嚴用刑貴寬凡一切酷刑之具皆宜屏去不用死刑重事必須親審無寃庶體聖明欽恤之意一憲綱開載分巡所至不許多用導從飲食供帳只宜從儉今後巡按自巡捕官護印皂𨽻清道之外不許多帶人馬隨行凡設綵鋪氈無名供饋之屬一切不用其有分外奉承者定治以罪庶免小民供備之繁先任都察院右都御史汪鋐申明事今擬申明事件一巡視倉庫房屋仰本府州縣提調官常加㸃視若有損壞即便修理及嚴加關防官吏斗級庫子人等收支作弊近來官司倉庫罔修出納滋僞或實藏不及月報之多或濫費已過嵗積之半或匿案而通同侵欺或乘機而私自借貸此等奸弊不止一端合無今後巡按御史所至務須親臨倉庫嚴加㸃視逐年簿籍必挨閲以驗其收除各官儲蓄必分注以别其勤惰中間如有侵欺實跡即行參奏拏問毋得專一委官查盤虛應故事巡歷滿日仍將查盤過錢糧等物參問過侵欺人員備細數目事由開報一巡察盜賊伏覩憲綱內一款境內盜賊仰衛府州縣嚴督所屬晝夜用心巡察擒獲務要盡絶無遺民患夫盜之起多以仍嵗凶荒賦斂橫出徭役頻興故聚而為盜弄兵於山海險阻之間或白晝突入城池或黑夜打劫村落捕之稍緩勢必蔓延其徒必衆遂致猖獗往往貽地方之患各該官司上下惟相推委以避罪責滋亂長殃莫此為甚合無今後巡按御史所按地方如遇盜賊竊發即嚴督巡守府衛州縣等官動調兵快多方勦捕若有怠緩誤事及事機重大者即須參奏處治有能薄賦平役民各樂業而境內不聞盜賊之警者仍須奏舉以為有司之勸一撫恤軍士伏覩憲綱內一欵指揮千百户鎮撫總小旗並要撫恤軍士各令得所夫人之危苦莫甚於軍今雖相安於承平無事之日然或管操或領運或屯種終嵗勤苦不得少寧兼以近日管軍官役恣肆貪殘生事虐害遇公務輒以月米扣除給屯田動以威力侵占餘丁則包納役使犯罪則拘係索財剝削之害非止一端若不禁除而欲天下軍士得所亦難矣合無巡按御史所至務要稽查各衛所軍政得失如有前項虐害軍士弊政具實參奏提問其能視軍士如視已子撫恤之政卓異衆人者仍須一體旌舉以為武用之備嘉靖十二年八月二十八日題九月初二日奉聖㫖是這申明憲綱事宜原有旨著各巡按御史及各按察司官著實舉行但近來掌院官多務姑息不行核實考察以致巡按官恣縱抗違按察司官因循畏怯全不舉行這各該事件并續擬的你每便通行曉諭務要遵照著實舉行有違的巡按官考核黜退按察司官指實參奏欽此定擬巡按及按察司造冊疏王廷相為遵憲綱以定冊式事竊惟風憲之官責任至重凡一切興利除害等事開載於憲綱者既明且備近該本院二次申明憲綱內各事理復切時宜例巡按御史於巡按滿日按察司官於每年終或逐季各將行過事績文冊關送本院以憑考察則各官職業方得驗之實政而不徒事乎虛文矣近者巡按御史回道止照舊式造報新定條件則遺漏而不開各按察司不惟年終季終造報愆期其所報事復踈略而不詳若不定為規式難以齊一憲度臣等欲將欽遵憲綱并節年題准事例及近該本院二次申明憲綱內各事理係風憲官相應造冊者逐一開欵於後合候命下之日通行各該巡按監察御史及浙江等十三按察司官遵照造執以憑查考庶事體歸一而憲度益明矣緣係遵憲綱以定冊式事理未敢擅便謹題請㫖監察御史巡按滿日造冊定式一薦舉過文武職官若干員如某官亷勤某官公謹俱要指摘所行實事若干件開報不得用籠通考語塞責一禮待過文武職官若干員凡各官賢能有何政事可以奬勵明白開報一糾劾過文武職官若干員如某官汚濫某官奸佞某官罷軟等項俱要指摘所行實事若干件開報一戒飭過文武職官若干員將各官悮事等項件數明白開報一舉明過孝義若干起如孝子節婦之類俱要開具查勘過實事緣由一問革過文職官若干員凡各官所犯情罪俱要開具略節招由一查理過倉庫錢糧若干數舊管新收開除實在逐項明白開報一提督過學校生員要將作養過人材後日堪為世用者若干名開報一興革過軍民利病共若干事如某處興某利某處除某害逐一開報一存恤過孤老若干名口要將各府州縣收入養濟院見在人數各廢疾并無依緣由開報一會審過罪囚若干起如審允轉詳處決及辦理過原擬罪名俱將各犯略節招由開報一問理過輕重罪犯若干起凡凌遲斬絞徒流杖笞等罪各計若干名口具實開報一追過賘罰若干數如還官入官贖罪給主等項逐一明白開報一督捕過境內盜賊共若干名凡各府州縣官於某年月日獲過强竊盜名數具實開報一督修過城壕墟岸塘埧共若干所要將某官於何年月日修過某處塘墟等項明白開報一禁約過囑託公事若干起凡按屬地方有無拏獲權豪勢要本土刁民挾制囑託者具實開報一禁約過非法用刑若干員凡所屬軍民職官有用非法刑具殘害人命者除參問外仍須指實造報一禁約過剋害軍士若干起凡拏問過所屬管軍官旗人等剋减月糧索納月錢等項情弊逐一開報一禁約過倉糧奸弊若干起凡府州縣倉厫處所曾經拏獲包攬侵盜之徒具實開報一禁約過軍民刁訟若干起所屬地方曾經拏獲教唆健訟刁徒各誣害過良善事迹逐件開報一禁約過科害里甲若干起凡所屬州縣等衙門官員不體小民貧苦專務奢侈行事浪費民財不知節省甚至科取侵用除拏問外仍須指實開報一禁約過淹禁罪囚若干起凡司府州縣衛所如有不才官吏受賄聽囑及庸暗不能訊決將輕重囚犯淹禁月久不理者除參問外仍指實開報一禁約過科差奸弊若干起凡各府州縣掌印官𣲖科㸃差或有任用奸邪聽受賄囑偏私不均者除參問外仍指實開報一禁約過土豪凶徒害人若干起凡所屬地方曾經拏獲凶惡土豪倚恃族大或假仕宦勢力聚衆執持凶器圍繞房屋欺打良善或至搶虜家財姦淫婦女者逐事逐名開報一禁約過賭博為非若干起凡所屬地方曾經拏獲有等好閒之徒聚集賭博因而為非者逐起開報一禁革過民間奢侈若干事凡所屬地方曾經拏問過婚喪踰禮服舍踰式及羣聚宴㑹盛張糖卓繁供殽饌以奢僭壞民俗者逐起開報一禁約過罰害軍民若干起凡所屬官員若有指稱修理恣意罰害軍民者除參問外仍要指實開報一完銷過勘合共若干起要將接管并自奉各項勘合已未完數目緣由明白開報按察司官造冊定式一各處驛傳革弊端以平政體事每季終將所屬州縣驛遞等衙門各應付過關文夫馬船隻廪給并錢糧數目備細開報以憑稽察一欽遵勑諭條約以新風紀事每將巡按御史并布按二司官巡歷地方有無導從兵快人馬衆多及隨帶官員人等盛設飲食供帳之具以勞州縣等項俱要從實開報一欽遵勑諭申明憲綱事每季終將巡按御史并布按二司官各巡歷地方及回省日期具實開報以憑查考一循舊典嚴守巡責實效以消災變事每年終將本司官行過事跡除薦舉禮待糾劾戒飭文武職官及舉明孝義完銷勘合外其餘與巡按御史同者共二十一件俱要備細開報以備考察一行移勘合事每年終將奉到府部院一應勘合已未完數目逐項開報以憑查考一奉勑諭事每年終將所屬府州縣衛所等衙門查盤過各倉積貯稻榖分别多寡數目造報備查論巡按葉盛景泰壬申嵗豫出官山西時山西巡按御史慈溪王鼎是年蒞事大同宣府七年始以訃還巡按凡㑹五人華亭張鎣安化璩安淶水張鵬通許賈恪蜀人黃紀是已不及相見而於先人嘗奉賻也天順二年有兩廣之行廣東巡按者吕益曰侃莊歙李曰良王朝逺塗棐棐嘗遇之道次清軍則宋榮採硃則吕洪護軍則王齊廣西巡按則吳禎吳綽劉淵逺紀禎又協贊清軍者易廣廣東勘處賊劉清事又有馮定乙酉嵗復來宣府則有吳㻞馮昱展育與今馮徽又四人矣御史巡按祖宗成憲也一方得一人則一方倚賴之一年得一人則一年倚賴之不得其人則否其所任不既重矣乎提督軍務都察院題名記汪鋐江廣閩荆四省相接之地凡八府一州山勢聫絡民易聚而為盜肇自𢎞治甲寅置巡撫都御史提督軍務統治之即贛城創都察院以居焉迄今凡三十有五載相繼蒞任凡十有一人未有題名鋐懼夫久之無考也乃命工鑿石題其名於上兾永傳焉夫人臣以盡職為貴都御史奉天子簡命提兵一方責至重矣使其兵威振盛盜懾伏不敢出斯為盡職矣乎曰未也然則空巢掃穴草剃而禽獮之斯為盡職矣乎曰未也必也使民安其業相生相養率自恥於為盜焉斯為盡職云耳然此豈易能哉守令者民之師帥守令帥民以仁而民不暴帥民以亷而民不貪則民之安其業恥於為盜實惟守令使之耳在昔龔黃卓魯治績之著載之史傳可考也然守令安得其賢若是哉上者下之所視效故曰上有好者下必有甚焉者矣守令之上為監司監司之上為都御史都御史身也監司臂也守令指也身使臂臂使指轉移變化之機固在此而不在彼焉昔君陳監殷成王命之曰爾克敬典在德時乃罔不變君牙為大司徒穆王命之曰爾身克正罔敢弗正民心罔中惟爾之中自古統御之官先自治而後治人大抵然也然則都御史之盡職其大且要有不在是乎是故敦吾仁飭吾亷無依勢作威無倚法以削喜怒豫奪一至公而無私俾監司以是道帥守令守令以是道帥吾民則庶幾其可耳乃若專事於兵如前二者之云謂之曰盡職則末矣雖然謙六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也然則誅暴禁亂曷嘗不事兵哉是故懷民以德謂之仁不服而征謂之義仁以生之義以成之一陽敷隂翕自然不易之理耳方今聖天子在上汲汲焉以安民為念擇任賢良宣布德威神武不殺蓋堯之帝德廣運聖神文武異世同符嗚呼有君如此其忍負之鋐之涼薄深懼盡職之難也遂書此以自規定職官之品丘濬臣按納言今通政司之職太祖髙皇帝命曾秉正為通政使諭之曰壅蔽於言者禍亂之萌專恣於事者權奸之漸故必有喉舌之司以通上下之情以達天下之政昔者虞之納言唐之門下省皆其職也官以通政為名政猶水也欲其常通無壅遏之患其審命令以正有司達幽隱以通庶務當執奏者勿忌避當駁正者勿阿隨當敷陳者毋隱蔽當引見者毋留難毋巧言以取容毋苛察以邀功毋讒間以欺罔公清直亮以處厥心庶不負委任之意嗚呼後世人臣有居此職者服膺聖祖此訓則非惟職任之修舉而於輔成國家太平之治實亦有賴焉重臺諌之任一丘濬臣按今世諌官雖無定職然祖宗設立六科實以言責付之凡內而百司外而藩郡應有封章無不經由者矧列署內廷侍班殿陛日近清光咫尺天顔上無所於屬下有所分理歐陽修所謂爭是非於殿陛之間今雖無此比至於司馬光所謂天下之政四海之衆得失利病萃於一官則今猶古也然則是職也亦豈易得其人哉必如光所謂擇言事官當以三事為先第一不愛富貴次則重惜名節次則通知治體必得如是之人以居諫官則上而君德必有所助下而朝政必無所缺矣重臺諫之任二丘濬臣按給事中自秦以來為加官至宋元豐中始有定職其職專以封駁而已我朝始分為六科設都給事中左右給事中給事隨其科事繁簡而設員凡章奏出入咸以經由有所遺失抵牾更易紊亂皆得封駁不特此也凡朝政之得失百官之賢佞皆許聨署以聞蓋實兼前代諫議補缺拾遺之職也祖宗設官不以諫諍名官欲人皆得以盡其言也而又專寓其責於科道吁四海無不可言之人百官無非當言之職又於泛然散處之中而寓隱然專責之意祖宗設官之意深矣求言之意切矣六科衙門葉盛六科衙門在磚城內尚寶司西永樂中災暫於午門外直房署事遂以至今自來凡公文承㫖皆稱五府六部都察院六科給事中景泰間户科都給事中馬顯强欲稱六科都給事中已失之今止稱六科亦未為當也兵科職掌有守衛官軍四城官軍二揭帖間見正統十三年所藏二本蓋子私録且詳識其由也今幾二十年矣具録如左守衛官軍揭帖者衛士守宿內門前班官旗軍校尉四千三百二十四員名後少十名東中門七𤣥武門一北安門二俱只從本門旗軍并隨伍內轉午等四門除東華𤣥武依前後班於隨伍旗軍內增減十名餘皆定數各門除東中𤣥武北安如前增減餘亦皆定數官少則以隨伍軍旗補之官軍三日一㸃揭帖三日一進如十五日至十七日終者則十四日早羽林前金吾前虎賁左燕山前旗守濟州府軍濟陽府軍左燕山左羽林左金吾左府軍右羽林右金吾右府軍後通州金吾後大興左等二十一衛各具官軍等項數目奏本送科本科攢揭帖十六日早掌科事官於御前奏進十八日留守衛具㸃閘過數目奏本送科備照留守則中前後左右五衛輪㸃而例不㸃閘者隨駕錦衣衛也錦衣暨金吾前後府軍府左右後羽林左右虎賁左皆名隨駕衛分午門至長安左右門午門闕左門并守鋪闕右門并守鋪端門承天門長安左門并守鋪長安右門并守鋪東華門至東安門東華門并守鋪東上門并東上南北門東中門東安墻門東安門并守鋪西華門至西安門西華門并守鋪西上門并西上南北門西中門乾明門西安裏門西安門并守鋪𤣥武門至北安門𤣥武門并守鋪北上門并北上東西門北中門北安門并守鋪四城官軍揭帖者守朝陽等九門十六衛分官軍總四百七十八員東城神武左忠義左大寧前西城會州義勇右蔚州左寬河忠義後中則武城中前後大寧中忠義左後義勇中北城忠義前右義勇前也每月三日一㸃挨次不論大小盡如初一日至初三日㸃過則本日晚四城兵馬指揮司各具奏本送科本科類揭帖初四日早送司禮監也九門朝陽東直西直阜城正陽崇文宣武安定德勝中書舍人題名記楊一清中書之官昉自西漢之尚書後改曰中書魏晉以來至於隋唐曰祕書曰內史曰紫微俱以省稱雖位望少異而職掌大略近之至設中書省則典司政本乃樞機之地宰相之職也中書舍人本中書省之屬後乃與翰林學士分掌內外制遂為儒臣之盛選國初仍元中書省之舊建於右掖門設直省舍人洪武九年始改中書舍人後中書省革獨設此官存古制也多簡文學魁傑之士居之後有致位宰輔如蹇忠定黃文簡髙文義張文僖者其他進官卿佐出參藩憲督學政宰大郡者蓋彬彬如也正德庚辰興濟孫君道夫嘗采自洪武以來凡官於是者之氏名刻而紀之太常少卿黃堂記之顧猶未備君既滿九載再遷尚寶少卿仍理舊事嘗語同官曰名固不可無題而題亦何得有遺脫哉乃旁搜博考增前之未及者自宋璲而下得一百七十四人將礱貞石重刻之以豫為四十年前舊舍人也請為記惟今中書舍人所典書天子辭命凡親王郡王并妃初膺封號合受金銀冊則書之自郡王以下至奉國中尉自王夫人以下至鄉君合給誥命則書之凡公侯伯初授封爵合給鐵劵凡勳戚內外文武官應給誥命勑命則書之其職掌至重也每大朝會則擬四員與翰林史官上殿東西班對立凡東宫節令朝賀定擬二員文華殿導駕侍班凡㑹試擬一員入場收掌試卷日給大官酒饌與翰林宫坊尚寶司六科同為侍從之臣諸司無相轄者其地勢至清也其選用自進士外舉人與纂修書成被恩典者乃得之監生生儒惟有勳勞大臣暨宫僚講官子孫宜承䕃叙奉特㫖者乃得之用之亦非輕矣顧今仕者每見翰林臺諫未嘗不改容加禮遇中書舍人或蔑視之此世俗計冷要逐勢利者之所為也而謂達禮義之君子肯為之哉惟昔蹇忠定以是官超拜吏部侍郎黃文簡入內閣始改編修髙文義以纂修功遷侍講厥後敘遷有例推薦有令功名事業炳然焕然者不可勝紀且士居其位惟患無以立耳苟能有以自立位之卑崇誠有不足顧者而况事修名著有崇登峻進之階朝廷亦何負於人哉夫道名非古也而近代相承為之書其氏名里與其位任而人品之髙下行業之純疵自不能掩往者無庸言巳其今在仕途者顧名思義其亦知所勵哉豫昔官中書滿九載恆以職弗稱是懼既遷提學以去出入中外踐更臺省晚參預機務德學勳績卒無所成就視忠定諸公深有愧焉嗣子紹芳暨孫元又相繼被恩䕃授官於兹絲綸世掌益增慚恧泚筆作記心用惕然初中書省罷祗以官名為署恆言每呼為科纍朝批㫖亦或及之然未嘗著為令不敢襲而稱之作中書舍人題名記簡侍從之臣丘濬唐武德二年改內史舍人為中書舍人臣按此中書舍人設官之始然是官也故𨽻於中書省故以中書舍人為名我朝罷中書省尚仍其舊名名雖同而實則異也蓋前代之中書與翰林學士分掌內外制誥以為兩制蓋屬文之官也我朝之中書舍人則專以書寫為職耳書者六藝之一漢人謂之小學以試學童為吏者也夫人能之無庸設官設之始自今日蓋以王言所係之重前代乃屬筆於吏胥殊無慎重之意祖宗以此設官蓋有深意必得夫素通儒術深明六書之義心正筆端如栁公權所云者居之庶不汙王言耳茍粗識偏旁而學術無素者尚不足以當此况又粗率側媚而流品非清者哉大理寺題名記國家建官分職三公而次專任九卿凡軍國大政無不與議其九卿中刑部都察院大理寺主執法故又謂之三法司大理之設則自兩法司所聽斷日抱成案引囚徒詣寺詳讞寃者疑者情重輕者一一據律參駁方求之當然後月報嵗聞於上請施行之其職亦重且要哉寺有卿一人正三品少卿二人正四品丞二人正五品總率二寺官屬以共王事蓋建置百五十餘年已為定之由是而有聞於天下則自少保于公文清薛公而下亦若干人矣正德庚辰青齊趙公克正蒞寺事既久慨先臣之蹟世逺而或湮之乃與少卿李公孔教萬公子鳴張公元素張公仲齊袁公醇夫議將題於石以示來者於是旁求冊籍及士大夫之所睹記總得若干人姓里敡歷大略稍備於戲諸君子之用心有以哉蓋刑者天下之大命也自唐虞之世明於五刑以弼五教辟以止辟刑期無刑禮樂刑政四達而不悖而王道備矣然宥過無大刑故無小詳不詳惟刑之𠂻是求茍盡吾心焉將天下國家實賴之獨名於一時也哉史云張釋之為廷尉天下無寃民于定國為廷尉民自以不寃自漢以迄於今千有餘年矣聞之者尚能使人如病得蘇如渴得飲而况當時被其德者乎夫是之謂名是之謂不朽不然所欲活則與生附所欲殺則與死比若之人固有以是而躋華要操樞柄者矣而又安足為執法者道哉幸不出此而或以姑息為仁避事為省則又大非王者之政所為戮一人而千萬人懼者故知寧失不經者權也唯可與權者能之也聖人之事也法也者經也可常行之道也臣子之事也然則今之執法者其亦惟經是守將不得藉口於權徒以為妄奪幸免之資乎哉國家自祖宗建極以來明法布令昭如日星凛如秋霜使人望而知避而忠厚惻怛之念實行乎其中又若元氣之無乎不在者臣下奉法罔敢怠乎故端方正直之士先後相望有不可勝記者若今題名者是已嗚呼其亦為執法者之榮也則可懼也蓍蔡既列觀者戾止原始要終君子將不能無瑕瑜諸公相顧喟然曰正唯吾徒之意哉於是為之記焉論刑獄疏黃綰伏為我朝太祖髙皇帝肇跡民間享國特久備歷艱難飽諳物態故立制定法凖今酌古周備無遺視漢唐宋為過之至刑獄一事尤在所慎既設刑部以掌邦禁又設都察院以司糾察兼之問刑又設大理寺以專審録凡問過罪囚具招送審凡招不協情情不合律駁回再問若駁回三次改擬不當將當該官吏具奏送問謂之照駁照者照其情律也若問有寃枉囚自畨異不服則取供行移改調隔别衙門問擬二次畨異不服則具奏會同九卿圓審詳載諸司職掌與大明會典為制甚密及查見行條例遇有重囚稱寃原問官員輒難辨理者許該衙門移文會同三法司錦衣衛堂上官就於京畿道會問辨理果有寃枉及情可矜疑者奏請定奪蓋使彼此精研互相覺察故為問刑審録之司者敢不積誠竭慮據情法以議其平哉法得其平人皆易知易守而不犯故刑罰得中民獲措其手足所以辟以止辟刑可期于無刑也奈何豐豫之餘人心玩怠問刑者不惟五詞之審五疵之尤審録者不知觀刑之中獄成之孚惟意出入百司視效不究其當究刑每濫於無辜不問所以問罪常訛於非情苛碎煩擾長宄興奸俾良善無控訴之門狙詐得橫行之路習迷不返乃稱守法因陋踵弊反為得體以求實理為怪異以論舊章為狂愚遂使祖宗良法廢壞殆盡臣等有難盡言者今幸陛下天錫仁勇孜孜勵精剗除宿弊圖新化理臣等幸沐遭逢忝司平反以為照駁圓審之法不行則司刑者無所畏憚庶獄決不可清他若詳定法律考課官屬矜恤獄囚查革淹滯省節煩擾體悉吏隱又所以清獄之源逺修舊章上禆聖政之萬一也伏望皇上俯察特勑法司今後問刑凡有擬議未當者容臣等查照舊規照駁再問駁回三次改擬不當將當該官吏具奏送問若問有寃枉囚自畨異不服取供改調隔别衙門問擬二次不服止照條例會同三法司及錦衣衛堂上官會審十分重情遵照會典會同九卿圓審原問及改問官若容私偏向仍有寃枉不明者一體參提問罪其餘事情均乞勑令本寺及各衙門欽遵施行臣等幸甚天下幸甚為此開坐一問刑衙門固應遵照律例問擬發落但民僞日滋或有所犯出於律例所不載者或情重律輕或律重情輕難以照常科斷者節該刑部都察院及本寺臨時議擬上請奉有欽依發落歷年以來非止一端此皆出於聖明參酌情罪以補舊章之未備誠宜傳之永逺使司刑者有所遵守也臣等恐文移積久職守不常未能一一查照奉行至有出入或重復奏請上煩宸斷深為未便合無行令刑部都察院會同本寺將自嘉靖元年以來凡問過事情臨時議擬奏請及撫按等衙門奏行部院議處具覆奉有欽依發落者逐一查出再行議擬停當開欵具奏取自上裁著為定式增入問刑條例通行內外問刑衙門永為遵守其近日刑官私議比附律條之類刻附律書者俱不許傳用庶聖謨丕顯而刑不濫矣一法司所以專理刑名至於大理寺職司參駁關係尤重凡任兩寺官非精律例見出原問官員之上何以評其輕重服其心乎近見兩寺官其間歷年既久諳練事體盡心職業者固多亦有初入仕途律之名例尚未通曉即欲斷按庶獄未免有差原問官因得指摘罅漏借為口實至於參駁本是亦不降心聽從輒逞雄辨往復數次淹纍囚衆至不得已只得將就允行亦有彼此騰謗遂相擠陷本緣公務反成私隙以致刑獄不清多此故也合無行令本寺今後遇有新除評事督令講讀律例半年以上考居疏通者方許干預平允如有刑名生踈者比照試御史事例仍令重歷重歷不堪者參送吏部對品改調在京别衙門敘用其見在者除寺正寺副不考外其餘亦限三月以裏通加考驗勤惰內有年久未諳者一體參送吏部别用若有究心刑名才識出衆者開送吏部候兩寺正副員缺不論年資銓補至為正副又能益勵職業比照刑部各道年深郎中御史一體不次推升如臣等堂上官不能正已格物以致刑獄未協於中亦乞聖明早賜罷黜以為不職之戒庶人心知勉法律昭明而足為天下之平矣一訪得刑部近年以來問理刑獄多便已私不體朝廷欽恤之意每遇强竊盜及人命重囚不問虛實輒加嚴刑苦訊又有經本寺審允題奉欽依處決者分付獄官私行謀死詐稱病故不得明正典刑及未成招死者枕藉於獄雖經御史及錦衣衛官相視不過虛應故事本寺所審者止據見在人犯病故者例不查考以致該部肆行無忌問官緣此得省文移提牢官緣此便於防守而以人命之重如拉犬彘習以為常漫不知惜甚傷天地之和召災致變未必不由於此此等弊政已非一日兹當欽明大獄之後人圖自新諒無敢蹈前非者臣等恐宿弊難祛頽風易靡不可不預為之防也合無行令刑部衙門戒飭各屬俱要仰體至仁重惜民命一應罪囚無得非法凌虐有患病者提牢官及司獄官請醫調治或調治不痊身死者一面行文都察院等衙門差官相視明白仍一面將患病緣由開送本寺以憑查審若御史等官驗有傷重及本寺審係矜疑人犯并未結事情雖係真正死罪重囚不曾請醫用心調治假揑虛文開報者俱將當該官吏參究從重治罪其男子杖罪以下及干證平人婦人徒罪以下者不許一槩淹禁每月終該部堂上官仍將見在開除病故囚數開具說帖御前宣奏庶司刑者有所避忌而囹圄無寃獄矣又訪得相視官往往畏懼復命推延數日積死數囚方行相視以致尸肉潰爛臭穢燻蒸莫敢近前非惟死者莫辨其寃生者亦被所染瘟疫舉發莫可救藥誠為可矜亦乞勑都察院等衙門遇有該部開報死囚隨即差官相視所差似前耽誤參究治罪如此則陛下如天之仁及於枯骨矣一近時法司問事多有淹滯日久牽纍人難合無行令今後問擬大小事情及行各城勘驗者大事限二十日中事限十日小事限五日俱要提齊完結如錢糧行查未明强竊盜挨拿正犯未獲人命未檢結勘以致稽遲者將見在人犯及本狀內各起事情先行問招送審本寺即明開各犯到官之日以憑查考有淹滯過期者年終類奏量請罰治如例應委官勘問及行軍衛有司會勘違限并托故推調不即赴勘者原委衙門照例參奏提問庶宿弊可革而官無曠職矣一近日各城巡視御史并兵馬司衙門每遇地方呈報小事不論情之輕重槩送法司法司又加求入以重罪送寺審駁方行改正又聽人囑託濫准詞訟批發兵馬司問理以致牽纍貧民動經旬月甚至傾家蕩産鬻賣子女始得完結者臣等以為律設大法禮順人情市井細民愚蠢無知過恆不免或因醉酒喧譁或因微末爭搆至有妻妾妬寵而反目子孫違令而打罵皆人情所不免該城量行責治已足示懲戒若一槩送問反戾人情誠為擾害合無行令各城御史今後除强竊盜人命等項重情地方呈報照舊送問外其餘一應小事審無别故者量情發落不許送問法司亦不許受理凡軍民詞訟俱赴通政司告行法司提問亦不許巡城兵馬司等衙門濫受擾民庶刁風可息而貧民獲安矣一給由服滿雜職官并吏員人等到部違限及洗改緊關字樣者查考大明㑹典及該部節年題准各有送問事例固難輕宥但近據送問者審其情多可矜事非獲已如過限者固久候巡按考核或因官司不即起文或因缺盤纒或因病疾或因地方逺涉不得及期赴部其洗改者或因司府吏胥差誤所致原無緊關字樣若不體恤一槩送問則贖罪一番所費不資又聞有吏違限免其送問罰班書辦轉行顧人繕寫逺方貧吏未免揭債了事揭債日多未免貪求自給及至敗露或反回護衙門不肯送問如此是責其細故而啓之以犯法也合無行令該部今後除官吏職役已滿及丁憂服滿并事故已經起送不行赴部者吏除照常十七箇月與官批限外再量地方逺近各除水程復有違限及查有真實奸弊批文咨結俱有洗改緊關字樣者俱照舊追問外其餘過限未及三年原籍并所在官司告有事故勘帖明白至若雖有緊關字樣洗改批而咨結貞正咨結洗改而批貞正或結狀一處洗改他處查對不差并洗改非緊關字樣律稱勿論者俱免其送問及罰班書辦等項庶情法兩盡事得不擾而卑官賤吏亦可以責其守法矣嘉靖六年十月十二日上奉聖㫖這本所言體悉人情不渝法守且合朝廷欽恤之意法司便查照著實舉行名臣經濟録卷五十三
