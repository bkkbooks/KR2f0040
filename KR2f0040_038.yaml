body:
  text: 名臣經濟録卷三十八明黃訓編兵部職方上之中為邊務事于謙內府抄出鎮守大同太監陳公題審得生擒敵人指揮巴蘇台供係克呼和斯人先因往威拉進貢就留在彼住坐曽跟隨烏魯斯并徹珍三次來朝比先下畨使臣回還之時額森安排筵席與馬清馬雲送路令我國人歌唱作樂有馬清等說不希罕我回去討一班笙簫細樂㑹唱的婦人來與你額森聽言歡喜後次又有使臣到彼和畨額森令兒子出來勸酒有使臣亦說好與中國結親我回去奏知務要成事額森就進馬三匹不期使臣回去不見結親事情又無歌唱婦女因此發怒領兵前來厮殺見今在於小黃河駐劄時常發遣哨馬或多或少往南探聽聲息搶掠人口頭畜今次聞知石總兵領三十萬人馬要往迤北征進額森令其弟賽堪王領一萬餘人牽騎馬二三萬匹前來緝探知得石總兵止領人馬三萬已回五日去訖來時額森分付就看腹裡人民種田不種各處城池有軍無軍又說額森時常議論不見中國差人講和若講和了時只差一二百回子將下畨官軍并先搶人口分一半送太上皇回去若不講和一發搬取家小就在沿邊駐劄搶掠不回額森人馬通不及四萬餘人托克托布哈已回去了屢差人勸額森回還額森說稱中國整理軍馬要來厮殺恐怕各枝人回散了急難再聚又說下邊小人兒心裡想家要回還老窩裡去審供得此行間又據節次被虜走回男子鄭道童等亦稱額森弟兄領人馬來大同答話相和若不和時五六月連老小都來大同周圍住坐七八月往大都十一月往寧夏搶掠又說要將搶得犂鏵安上木柄攻跑應渾懷仁等處土地等因㑹同總兵官定襄伯郭登參謀軍事左都御史沈固右參將潘興議得自景泰元年四月二十三日敵人入境往南去後至今未回除差夜不收人等分投緝探及飛報武清侯石亨太監裴當等知㑹隄備外緣係敵情及傳報聲息具本差夜不收王鎖兒等於本月二十六日起程賫奏至二十八日早有王榮等回報行至聚洛驛忽遇敵人數騎趕散王榮同馬夫張彥友被敵剝去衣服奏本四封亦被搶去棄馬藏躲得脫回還內王鎖兒不知下落今將前奏情由具本差夜不收齊二敢勇餘丁鄧斌親賫具題該本部官欽奉聖㫖兵部看了來說欽此又該征西將軍鎮守大同總兵官定襄伯郭登等亦題前事通抄到部參照各官奏稱比先下番使臣馬清馬雲曾許敵首額森討笙簫細樂㑹唱婦女及以後使臣到彼和番又許額森與中國和親一節除以後使臣别無開到年分職名無憑參擬外臣等切見比年以來因托克托布哈王并太師額森等年例遣人朝貢朝廷厚加禮遇遣使報聘以示恩信篤和好也豈期差去使臣止知貪利以肥家不思屈節而辱國於彼情之虛實略不以聞禮義之大節全不暇顧及回還復命又復駕揑虛詞誇大張皇肆為欺罔甚至透漏消息而隂結敵人妄報根腳而希求升賞以致敵人放肆有輕中國之心邊境不寧釀成今日之禍今照馬清馬雲前項辱命緣由雖係擒獲敵人巴蘇台所說未可憑信然此事中外臣民知之已久事不妄傳必有所自若不明白處治無以痛快衆心合將馬清馬雲拿送法司嚴加勘問明白奏請定奪處治庶使典法昭明臣民稱快其言敵首額森說稱若中國差人講和送太上皇回來等因顯是敵人益逞奸詐之謀故為誕妄之說誘我邊將弛我邊備假以講和為名意在乘虛深入合無差人馳驛賫文與大同總兵官定襄伯郭登等同守備鴈門偏頭等關都督同知等官杜忠等嚴加訓練官軍用心守禦城池倘遇敵人侵犯務要效死盡力隨宜守戰不許聽信哄誘失誤事機仍令郭登等差人密切跟尋原差奏事人王鎖兒得見下落通行具奏及照差來夜不收齊二敢勇餘丁鄧斌不避艱險奏報聲息勞苦可憐合無俱量升一級以勵將來緣奉欽依兵部看了來說事理具題景泰元年五月十一日奉聖㫖是欽此為預定安邊事于謙照得宣府大同地方即目敵人侵擾去來不常或攻圍城池或摽掠人畜或以輕騎襲我輜重或以人少誘我官軍聲東擊西出此入彼邊民不得耕種士馬不得休息切料此敵必欲搔擾大同宣府使之公私匱乏不能固守此其所謀不淺有必來侵犯京師之意今朝廷所委任者石亨楊洪栁溥孫鏜衛頴范廣張軓數臣其次則署都督僉事張義雷通諸人今敵勢方張邊務方殷京師軍馬雖操練頗有次第然萬人之命懸於一將將有必戰之心則士有效死之力茍計不先定心不齊一彼此異見而將無必戰之心上下隔絶而士無效死之力緩急之間恐誤大計伏望皇上聖明乞勑石亨楊洪栁溥孫鏜衛頴范廣張軓張義雷通等各陳已見以為今日敵勢如此之強大邊務如此之弗寧當何處置可得寧妥萬一敵人侵犯京師或近畿州縣及山西等處地方當何設法禦敵戰守或除戰守之外别有何䇿可以安邊保民不須㑹同計議文飾虛詞務在各出已長直言無隱令石亨等各另具題封進皇上聖斷采擇其可行者請勑各官遵守施行若是果有窒礙亦令各官陳奏必期上為朝廷分憂下為邊境除患不許面為承順退有後言敵至互為異同以誤國家大計況耕當問農織當問婢今日之事若不責成於石亨楊洪諸人而欲以臣等書生之淺見以議論則是徒為紛紛而未能濟事也臣材本庸劣叨掌兵機切見方今邊務誠為危急計慮預防間不容髮萬一事無豫定倉卒生變臣雖萬死不足以贖謹陳愚見伏候聖裁具題景泰元年五月十四日奉聖㫖說的是宣府大同乃京師之籓籬敵情難測各處摽掠使我士馬疲困若不預為處置愈生邊患便著他每各思長計如何安妥開寫來看欽此為緊急軍情事于謙內府抄出鎮守大同西路右小監韋力轉題景泰元年五月十七日十八日敵人臨城攻圍臣同右參將許貴二次出兵殺敗敵衆往東去訖十九日據被虜放回餘丁劉四說稱敵人四千人馬在於本城迤東二十里住劄牧馬說額森兄弟到六月初一日前來大同講和就送大明皇帝來大同住坐鐵頭太師坐右衛右頭城托克托太師坐左衛左頭城放回你去將這畨字一紙箭一枝送與你城裏頭知道等因又多寫下牌橛分由牧馬地方緣係畨字敵情不敢緘默今將畨字箭枝共進具題該本部官欽奉聖㫖兵部知道欽此欽遵抄出到部參照所奏顯是敵首額森等假以送太上皇為名詐令餘丁劉四回還傳說意在緩我邊備以圖乘虛襲取若不預為隄備誠恐倉卒之間彼處鎮守總兵等官智慮不及處置乖方有誤大事合無請勑太監陳公題定襄伯郭登左都御史沈固等公同計議如法整搠軍馬撫綏人民晝夜提備固守城池如遇敵人到於城下務要相度敵情緩急事勢可否以為守戰凡一應事務當以朝廷宗社為重不可聽信哄誘因而失誤大事果有别項難以處置事情星馳差人作三四起賫本具奏定奪以防中途衝截疏虞之患務在十分用心毋得怠忽誤事緣係區處邊務及奉欽依兵部知道事理具題景泰元年六月九日奉聖㫖是欽此為邊務事于謙內府抄出鎮守宣府等處內官監右少監柏玉題照得宣府地臨極邊控制邉防之要害實為京畿之籓籬向者敵人入剽尚賴朝廷洪福城池堅固士卒效力僅保無虞邇來敵亦厭兵纍遣其党講和奉送太上皇帝回京緣敵尚攻戰其情難測誠恐指以和好為由因而窺伺虛實不可不預為隄防然自去年敵人侵犯京師䝉調總兵官昌平侯楊洪率領精鋭官軍五千員名前去截殺事寧就留本官在京及存留馬步官軍都指揮梁泰等三千餘員名跟隨守備緣前項官軍原係備邊人數況兼遺棄家小經年在外衣鞋破損盤纒罄乏無人供送委的艱難臣㑹同總兵都督朱謙等議得先因敵人分投入剽圍困各城除將宣府原操馬步神鋭官軍量數發回萬全左右懷安蔚州廣昌等衛所固守城池外今查得見操官軍有馬者四千六百八十三員名無馬者二千九百六十二員名出隊官軍四千八百五十員名神銃手一千六百三十九員名共有一萬四千一百三十四員名實是人少地廣衛所隔越調用不敷即目秋髙馬肥恐敵侵犯難以抵敵乞勑廷臣從長計議將前項存留在京官軍仍發本處俾依家小住過操備養其鋭氣敵至相機勦殺實為便益具題該本部官欽奉聖㫖兵部知道欽此又該總兵官左都督朱謙亦題前事通抄到部查得先該昌平侯楊洪奏准將口北開平等衛官軍指揮梁泰等三千餘員名在京隨操聽候警急調用續該總兵官左都督朱謙內官柏玉等奏要將梁泰等盡數發回本處俾依家小住過操備等因本部節經議擬京師天下根本即今敵人請和真僞難測不可不慎防備又經奏准暫留在京候敵情虛實何如另行計議發回近該本部照得獨石等處城池屯堡先因敵人侵擾因而失守倉庫糧儲等項俱各見存緣此等城堡俱係緊關去處控制邊境關係非輕敵人今巳請和又經奏准請勑總兵官左都督朱謙㑹同鎮守巡撫參將等官計議修設守備并沿邊一帶墩臺屯堡俱要設法修築以備哨守如果事體重大應合奏請明白上聞去後今奏前因參照官軍梁泰三千餘員名原係口外守備人數合當發回原處以備守戰及照口外獨石馬營龍門長安嶺等處城池俱係緊關要害去處外控朔漠內蔽京師去年因敵衆入邉勢孤援寡俱各捐棄失守兹當聲息稍寧之時可以措置之日若不從長設法作急區畫停當萬一敵人渝盟未免似前誤事雖經具奏令朱謙㑹議修設守備誠恐各官互相矛盾遷延月久不即整理有妨邊備看得昌平侯楊洪都指揮同知楊能先在口外年久備諳彼處山川險易道里逺近士馬强弱敵情緩急合無請勑楊洪或楊能令其帶領原留在京官軍三千餘員名前去宣府與同總兵官都督朱謙內官柏玉及參將鎮守等官侍郎劉璉僉都御史任寧并巡按監察御史萬全都司堂上官公同計議獨石馬營等處城池及龍門長安嶺一帶墩臺隘口若何設法守備每城堡合用官軍若干其各處城堡或照舊修設或相度并立或止用原有官軍協濟操守務在用心協課逐一勘議允當經久利便就便急忙用工應修理者趂時修理應設立者上緊設立俾聲息得以連絡彼此互為應援仍將原帶官軍梁泰等三千餘員名分派各城守備以實邊境通將處置過緣由具實回奏令差去官員回京以後若有地方疏虞罪坐差去之人緣係欽依兵部知道事理具題景泰元年八月二十日奉聖㫖是欽此為紏劾事于謙嘗謂竭盡忠誠乃人臣之當務交通外敵在國法所必誅切照都督僉事毛忠本以俘囚荐沐寵恩纍官至五府之榮參將受一方之計自合精白一心以圖補報可也豈期本官挾詐懷奸欺心負國當敵勢方張之際正邊方多事之秋却乃濳蓄異謀隂圖不軌近因喜寧之謀逆敗露明正典刑自揆朝廷之天討不容遂懷疑二乃陳情而自釋䝉恩典以宏敷既不加誅復官其子冀以感恩思報庶幾改過自新然天地之量固無不涵容而豺狼之性終難馴伏邇者禮部侍郎李實出使迤北回還說稱本官曽遣人到於額森等處傳遞言語意在約為內應引敵襲我邊城敢負更生之恩自造滅門之禍奸謀未遂形迹已彰是皆上天默佑聖明鬼神隂誅叛亂是以逆臣就縛而邊境獲安也臣等切惟大易謹履霜之戒春秋慎無將之誅若不明正典刑實無以謝天下合將本官拿送法司究問明白碎尸萬段以昭法令之公以為後人之戒緣係應議官員未敢擅便謹具奏聞伏候勑㫖景泰元年九月二十八日奉聖㫖恁每說的是這是傳說言語未知虛實他在邊年久多效勤勞且饒他這遭放了欽此為邊計事于謙禮科抄出禮部尚書楊寧題正統十四年八月敵人犯邊獨石龍門一帶及永寧懷來邊將皆棄城不守以致數十年之經營數十萬之蓄積一切委棄草莽罪不容誅事往難論比聞欲調官軍復守獨石龍門等處斯固攸宜臣切惟為政當理內及外守邊當自近及逺京師者四方之本永寧懷來宣府直抵大同皆京師籓籬也各處見在軍馬以之專守尚慮未足為固而又分之以守獨石等處則兵愈寡而勢愈弱一旦邊報卒至救援不及切恐人心惶惶如前日未可知也獨石等處一搖則永寧諸處人心必不自安誠不可不慮又況足食而後足兵今宣府大同皆告缺糧以近邊猶爾又安能逺供饋也今之計邊儲者或曰軍運或曰民運或曰納粟冠帶或曰開種鹽糧或曰銀貨雜買言者紛紛而皆不求其本夫有播而後有穫春耕而後秋收奈之何不懷其本而惟末之圖古之屯金城屯渭濱屯塞下具有成法實邊之道無以逾此往者不可諫來者猶可追中國之有邊患猶人身之有疾病來則禦之去則備之法之良也不賞邊功以沮外徼生事之人意之善也今之為邊將者士卒不恤而一意希求升賞外侮不禦而一槩妄報功次又有斬獲一二首級而報功至一二百人者有止稱殺敗敵衆斬獲首級而全不開數者其為欺罔不言可知此果何功於朝廷何益於邊備至於臨陳亡死者固皆可愍然軍勝而死此勇進而至喪生其忠可期軍敗而死此退走而被追殺正當論主將之罪今一槩升一級是死者以退走為功而生者不以敗亡為懼又非所以示勸懲也臣愚以為永寧懷來宣府直抵大同京師籓籬當益兵積糧選將固守彼固則此自安獨石龍門等處姑候此有餘力然後議及遺下糧米設法以近就近搬運給軍衛喇特新來和好必不即為邊患一帶田地可以趂時設法屯種令各該總兵參將等官及侍郎劉璉都御史沈固任寧并巡按御史分投委官提督親行勸課如是田多軍少先儘軍種遺下餘田聽令近邊官豪勢要一應人等有力之家儘力開種無種子者官為借給秋收抵斗還官明行榜示景泰二年子粒并地畝稅糧俱免徵納所得花利令自糶賣仍行納粟冠帶開中鹽糧銀貨糴買等法人人見利而趨則耕者不勸而耕得穀必倍可資邊儲北直𨽻山東山西河南近邊去處宜令各衛所府州縣專委一員提督春農布種仍與設法置買牛具種子俱從巡按御史管屯僉事比較其有用心勤得穀多者指實具奏量加褒賞以勸其餘則家給人足可資供餽沿邊守將遇有聲息且須預將在外人畜收入城堡嬰城固守俟敵師氣惰然後乘便擊之如彼肆無忌憚越關內侵則內外合兵令其腹背受敵計無不克有功官軍升賞以信如有似前棄城不守率衆在逃無分貴賤不限親疏必殺不宥然後人知勸懲其有斬首少而報功多及妄報殺敗賊衆斬獲首級希求升賞者合無其功皆不必録軍勝陳亡官軍與軍敗失陷者亦須量有節減以止貪冒以戒退怯庶得爵賞不濫臣愚昧仰䝉聖恩莫能補報比因議及邊事不得長䇿晝夜思惟寢食不安輒有所見不能緘默倘有一得可采乞勑該部施行緣係邊計具題奉聖㫖户部兵部看計議來說欽此欽遵抄出到部除屯種等項户部另行外查得先該本部照得獨石龍門長安嶺等處俱係萬全都司所為緊關城池去年敵衆深入俱各捐棄失守兹當聲息稍寧可以措置雖經具奏令總兵等官朱謙等修設整理誠恐各官遷延有妨邊備已經節次議擬奏准令都督僉事董斌提督前項衛所官軍修理城池防護糧儲等項及昌平侯楊洪原留在京開平龍門等衛官軍三千員名并其餘俱係口外衛分在京報效等項官軍俱令都指揮楊能盡數領回原衛所操守近該董斌題稱獨石馬營雲州鵰鶚長安嶺等處城池委係外控敵境內庇宣府懷來一帶若獨石馬營等處城守嚴固則腹裡衛所自然無虞今議將前項城池重復修飭整設屯營誠安邊禦侮長䇿合設都指揮一員在彼分守地方請降勑書并給符驗及將獨石等處衛所官軍男婦人等俱要聽伊鈐束督發原處以實空虛之城并將萬全都司帶俸都指揮推選有謀有勇之人分派獨石馬營李家莊鵰鶚龍門等城專一守備操練聽伊調遣等因具題抄出本部又經逐一依擬奏准通行去後今尚書楊寧奏要將獨石龍門等處候有餘力然後議及一節臣等切詳各處土地城池俱係祖宗經營創建其獨石龍門一帶正係極臨敵境緊要去處外為邊境之籓籬內為京師之屏蔽去年敵首紏衆入敵守臣慮恐勢孤援寡因而捐棄失守至今清議不容今額森等已來請和邊報不甚緊急所宜興滯補敝修設故疆以為久逺之計以圖復讐之舉況前項城堡已命董斌提督并原守各城軍馬俱已發回即目正在營置之際彼處鎮守總兵等官並不曾奏難以修復緣由豈可自餒自畫輕易擲棄且我退一尺則敵進一尺我失一寸則敵得一寸得失進退之機安危治亂所係就使干戈擾攘之日尚當固守封疆況平居無事之時不宜自蹙土地兼且守備各城自用原有軍馬而非那移他處官軍今以理勢論之必當修復整理合無通行請勑宣府總兵參將鎮守參贊巡撫官員撫寧伯朱謙右都督紀廣內官伯玉侍郎劉璉僉都御史任寧都督僉事董斌等將獨石馬營赤城雲州李家莊鵰鶚龍門長安嶺等處一帶邊務查照本部節次議奏事理㑹同計議區處勘酌人情之勞逸相看地形之夷險先其急而後其緩舉其大而略其小果係緊關去處上緊修復不係緊關去處從容修理其各城合用都指揮務在推選至公俾邊城守備得人而糧儲防護有法不許各持已見怠忽因循自餒其志廢弛兵備若因此失誤事機必治以重罪不恕其奏永寧懷來宣府直抵大同當益兵將固守緣永寧懷來巳有都指揮同知楊信萬全右衛已有都指揮僉事江福提督宣府已有總兵官撫寧伯朱謙參將右都督紀廣大同已有總兵官定襄伯郭登參將都指揮潘興東路已有參將右都督方善西路已有參將都督同知許貴宣府大同所屬前項城除總兵參將及把總提督守備官軍外又有都指揮或一二員或三四員守城管操而所在衛所官軍止勾固守别無相應官軍可以增添其奏有功官軍升賞以信如有似前棄城不守率衆在逃無分貴賤親疏必殺不宥其有斬首少而報功多及妄報殺敗敵衆斬獲首級希求升賞其功皆不必録軍勝陳亡官軍與軍敗失陷者升賞亦須節減一節臣竊惟兵之勝負固係乎賞罰而賞罰運用必在乎嚴明近年以來因南北敵人紛擾所在用兵撫捕其有功官軍中間若有不明者本部議擬行令所在提督參贊軍務等項都御史及監察御史等官重復體勘明白方才定奪升賞而總兵參佐等官若有失機誤事亦往往覆奏降黜如向者所升德勝等門紫荆等關及大同宣府官軍俱係殺敗敵衆保全城池有功人數該總兵等官造册奏要升賞節行駁勘明白若不照例升用何以激勸人心其有退縮覆潰如陽和口及土木等處官軍雖已死於鋒鏑未嘗升用一人況兵家之事以絶勝敗敵為全功不以斬首多寡為勳績若止以斬首多寡定為升賞崇卑則人皆顧戀首級未免為敵所制今稱有妄報殺敗敵衆斬獲首級希求升賞緣無指實無憑查考合無通行各處總兵鎮守參贊等項文武大臣今後若是奏報殺敵有功官軍務要體勘明白要見何人奮勇當先為首何人協力跟隨為從何人生擒敵兵何人斬獲首級從實開奏以憑定奪不許徇私泛濫將無功之人一槩冒請升授以致賞罰不明士氣消沮如違一體治罪及奏沿邊遇有聲息預將人畜收入城堡固守俟敵師老氣惰然後擊之如彼越關內侵則內外合兵令其腹背受敵等情俱係用兵常法亦係見行事例别無定奪緣節該欽依看計議來說事理具題景泰元年十二月初八日奉聖㫖是獨石龍門一帶乃宣府籓籬若棄城不守則宣府必孤京師以何禦敵寫勑與朱謙董斌每上緊修城不許因循誤事欽此為擒獲敵人事于謙內府抄出鎮守大同右少監馬慶題該左參將右都督方善手本據髙山衛哨備指揮李英呈該守土山兒墩百户蕭勝報本年十二月十九日午時分軍人趙蘆斗瞭見境外有步行人腰帶弓箭前來隨令夜不收吕小良等二名下墩潛入攔馬牆內因見向墩射箭認是敵人其吕小良等奮勇向前擒獲連人解到審係恩克特穆爾也先部下有額森差賽音特穆爾等將領人馬二百餘騎在邊哨看接取進貢使臣因我省得漢語差來打聽聲息就被捉住等因行移知㑹㑹同總兵官定襄伯郭登巡按直𨽻監察御史鄭韶等計議得敵人出沒不肯轉離鞍馬今恩克特穆爾步行到墩又止一人既稱打聽進貢使臣其守墩官軍只合溫言撫接却乃掩襲搶拿非惟有失朝廷大信抑且引惹事端又恐係來降及走回人口小人邀功駕禍無辜如䝉准題乞勑該部通行禁約沿邊官軍惟當謹守信地嚴加瞭望不許貪圖小利妄生邊釁等因具題該本部官欽奉聖㫖兵部知道欽此又該總兵官定襄伯郭登等亦題前事通抄到部臣等竊惟中國之守邉疆固當振之以兵威尤當撫之以恩信所以折其强而結其心也今額森節次遣人朝貢其深為之謀雖未可知而和好之禮則未嘗有失今以使臣未回遣人探聽迎接其恩克特穆爾既不騎坐勒馬又不潛入邊城明說探接使臣别無奸細情節而守墩官軍就將本人搶拿只貪一時之近功不顧朝廷之大體而都督方善又不斟酌事情輒使輕信起解今訪得恩克特穆爾見行監問切以為此特一俘囚爾殺之不足為武而或有以啓釁舍之不以為怯而或有益於事如䝉聖恩乞勑法司再行研審委的止是探聽使臣消息别無其餘重情請勑令該府差人連恩克特穆爾賫送前去大同總兵官定襄伯郭登等處收領撫令聽候邊上如有額森差來之人就彼交與領回仍諭額森以朝廷忠厚撫待之意使知感激本部仍行都督方善并各邊總兵鎮守等官今後各要整搠軍馬固守地方果有敵人侵犯相機勦殺若彼中遣人來邊打話止一二人三五人别無奸細情由及逺探隨後再無跟隨掩襲人馬就便撫令回還不許貪圖小利邀功生事以啓邊釁以貽後患亦不許指此為由縱敵入境剽掠以誤邊務緣係請勑及奉欽依兵部知道事理具題景泰二年正月初三日奉聖㫖是欽此覆安邉固國強兵禦冦事于謙兵科抄出山西代州緣事為民前布政使弋謙題臣聞兵者國之大事自古興師動衆必擇將焉夫將有名有實所謂有名如李廣李陵輩卒無成功是也所謂有實如李牧趙充國輩卒建偉蹟是也故任將之道貴用其實不貴用其名曩者外夷入冦王師失律辱及萬乘之尊長驅都邑蹀血神京肆行剽掠如蹈無人之境我師竟不能少挫其鋒以報讎恥者正由擇而不審用之不以其實故也況額森既大得志而歸勢必復來人馬必衆必有覬覦中原之心亦非前日之比而我當國謀臣至今將帥不聞有智愚之别兵馬不知有簡募之方塹山塞谷等法皆兵中末務非所以安邉之要䇿也朝廷若不早為令圖一新威武止靠舊日虛名文字玩愒日月誠恐一旦禍臨卒難收救今若安邉固國强兵禦冦必先推選良將將得其人以守則固以攻則取以戰則克又何患外侮之憑陵我績之弗集耶聖朝堂堂天下智謀良將應多臣所知者前成山侯王通龍門衛致仕指揮寧懋真定府同知阮遷于此三者者籌䇿宏博慣經大戰臣今指其實略陳之昔交趾黎賊有二大將名黎豸黎善前後所陷官軍不可勝數宣德元年王通總兵征討地利不便王通身中重創獨以一騎僅免次日賊衆圍城城中出榜招募得數千之衆分為三軍內選精鋭三千王通統率擊賊一戰斬黎豸再戰生擒黎善自是殺賊垂盡厥後賊人不敢過江出戰止在江岸堅壁拒守遣大頭目告云願照洪武舊制年年進貢乞總兵官照依初克交址舊制班師比先又見安逺侯柳升所統援兵全軍覆沒王通遂㑹官議曰交蠻恃險叛服不常每遇調兵動輒數萬不應以此稍未無益之地致根本空虛決可棄不可守遂班師王通誠當今忠良儒將每遇敵臨陳輒忘身家有進死之榮無退生之辱矧纍隨太宗皇帝征進迤北嘗受太宗教誨破賊祕計使之熟記以為中國制禦之長䇿前嵗因臣到京建言舉保王通為將本官亦將所得祕計畫成圖本奏乞朝廷納用欲就與臣等共計勦賊時臣獲見圖本其妙盡藏於陳勢於我兵勇者不能獨進怯者不能獨退於彼敵無鋒不摧無堅不破真祕計也不期秉政重臣不悅王通并臣所奏兼惡王通為人髙傲又見議論立異不合已意遂暌乖抵有同矛盾不惟不肯奏保王通且反陽薦隂擠著令王通修守山陵而已使聖上徒有求言之名而無納言之實病國病民莫此為甚臣嘗怪戰國文武羣臣不相協和不能遜賢讓能妄以智詐相稱往往而致禍敗者夥矣不料昭代臣僚亦有此弊良可悲嘆近聞朝廷下求禦敵安邊的確謀計誠當時之急務也如䝉聽臣猥見選調在京精鋭馬步官軍八萬命王通寧懋阮遷于及他所舉將帥公同統率前去宣府大同㑹同總兵官郭登等各城并操備官軍數內再選精鋭馬步四萬共輳一十二萬俱作戰陳郭登等提督其餘官軍專一守城若遇機㑹亦聽出城討敵王通提督戰隊專一戰伐臣知王通寧懋於軍旅有簡閲之方有訓練之法有奬勵之術行之有紀律出之有正竒號令必嚴賞罰必信緩則五月急則三月應見武備大飭軍威大振於是國家可得倚仗農業可得耕穫糧餉可得轉輸遐邇人情亦得賴之寧帖而不搖矣一朝有警即於近城水草便利地方緊要去處安下野營兼有太宗皇帝破敵陳法遏止敵人人馬當戰則戰當持則持使不得深入腹裡因糧藉食彼孤軍懸入食必不繼久必饑疲我乘其弊則有戰必勝而收萬全之功必矣我算既定我武既備彼若仍挾勢驕恣詭以進貢要我貨財初至姑可待之以禮撫之以恩曉之以尊卑示之以禍福如至再三再四要求無饜當止其進貢絶其和好或猶不聽恃强愚弄將差來徒黨不問衆寡盡數斷其右臂割其耳鼻放回明報額森速來交戰使敵一戰之頃嘗其陳味知其兵力則必震懾遁去茍北敵一被摧挫遁去而南方一切草冦聞知朝廷兵威之重亦從此而自消釋不敢作亂必矣若王通寧懋阮遷于䝉命受任之後不能耀武揚威建立控制戡定之功臣願當萬死之刑以謝誑君之罪或曰王通領軍三千越久無功其能安在夫善為將者不貪小利不邀近功況才將當大受不可小知又恐敝卒殘兵不堪調用豈可遽以此而疵之也臣於此一事其言屢獻而不止者絶無希求進用之心特切念今日朝野臣子有如同舟共濟中遭大風巨浪必合盡其心竭其力庶幾渡此危險否則一至舟沒俱為水中之鬼此臣所以為國之誠耳至於邊儲充足之事除常賦稅外宜倣漢文拜官入粟塞下故事臣於前嵗題本內已詳言之矣伏望皇上御覽之下乞勑五府六部都察院大理寺翰林院六科給事中共議倘將臣言不致似前棄寢採納施行則宗社幸甚億兆幸甚具題該通政使司官奏奉聖㫖敵人犯京師比時也任用王通不見他有謀勇著後多官議山陵緊要去處著他鎮守任使非輕今這厮說擠著去修守又他所舉的人為智朝廷所用的人為愚若要十二萬人守大同其餘邊陲得幾萬人馬備禦兵部通看了來說欽此欽遵抄出到部除奏要拜官入粟行移户部另行外查得先該弋謙奏稱要起調官軍六萬員名令都督王通等統領令伊白身參贊分為三路約期㑹合撲搗敵營等因該本部㑹官議敵人額森侵犯邊境逼擾京畿上貽九重之憂下為萬姓之害所宜發兵勦滅以復不共戴天之仇但以兵家之事必多算而後勝為國之道先治內而攘外今畿甸及中原地方自兵燹以後民失農業公私匱乏京師帑藏之儲積有限官軍之費用無窮而各處邊境地方糧草俱無蓄積萬一調發人馬供餉從何而來非徒誕漫無實而難行抑恐輕易舉動而壞事及照王通先在交址鎮守失機誤事捐棄地方犯該死罪欽䝉宥死罷黜為民近䝉聖恩升授都督同知率領官軍在於天夀山鎮守修理關隘敵人在驢鞍嶺地方剽掠正係本官提督去處却乃全無謀勇致敵殺死官軍并弋謙先任交址布政使與王通共守一城不能運謀設䇿棄城捐地辱國喪師亦係宥死罷歸為民人數既往之事如此方來之事可知古人所謂敗軍之將不可以言勇者其王通弋謙之謂也比因言者屢薦弋謙可用皇上聖㫖克知灼見先奉令㫖不准又奉聖㫖弋謙既為民了罷欽此除欽遵外今又自薦以白身參贊王通軍務中間顯有徇情妄舉情由難以准理等因具題各官奉聖㫖是欽此除欽遵外今弋謙又奏稱王通先在交址議以為交蠻負固恃險叛服不常不應以此稍末無益之地致纍根本空虛此地決可棄不可守各官依允班師退出王通誠當今忠良儒將熟記破賊祕計却隂擠著令修守山陵一節臣等切照交址地方永樂初年太宗文皇帝命將討平置立郡縣後因黎賊叛逆王通掌握重兵圖復故地既有弋謙等在於軍門計議軍務所宜竭忠盡誠效力死守雖或城陷身斃猶全忠義之節各官計不出此顧乃不由君命擅棄城池挫朝廷之威遺蠻貊之笑而弋謙正主謀同惡之人顧謂此地決可棄而不可守因而班師退出使王通弋謙為將而守近畿萬一遇敵窘迫亦謂不可守而棄之乎人臣之義抑又何在茍如所言則張巡許逺之死節睢陽蓋有不足取者强辨不忠莫此為甚彼時各人雖置極刑猶有餘罪朝廷特降恩典宥死為民邇因敵人之强盛正當用人而匡濟欽命王通升都督同知令其守城禦敵既無驍勇又無智謀及在西直門外因是敵情緊急遂往寺中窩宿不敢一出都城此時有目者所共見以後事定令去天夀山鎮守夫以宥死之編􅡦驟進都督之顯宦復命統領官軍守備山陵重地禮遇渥厚任用非輕今弋謙所言如此緣鎮守天夀山之命由於內官武良之舉未審何人隂擠臣等不曉其由其稱要選調官軍八萬令王通寧懋阮遷于統領并宣府大同總兵官處官軍再選四萬共一十二萬專在大同討賊一節查得近該宣府等處總兵等官節次奏報敵人聲息本部已經議奏欽命武清侯石亨充總兵官都督孫鏜范廣過興張義充左右副總兵參將各營揀選官軍六萬員名團營操練及令都督石彪雷通充游擊將軍另操精鋭馬隊官軍六千聽候䇿應宣府都督劉深另揀三千䇿應遼東并宣府大同等處邊方城池所有軍馬俱係原先派定各守本城遇警聽總兵官調度況托克托布哈額森節次遣人赴京朝貢請和不曽紏衆侵犯邊境即目又係炎熱時月邊儲儧運不敷若便命將出師攻戰非惟士衆困倦難於成功抑且京師重地缺人防護合無候敵人果有釁隙可乘各邊糧草足備另行計議大舉以復前日之仇其言要將敵使斷臂割耳等因乃彼小丈夫之事而非為國大體所言難准臣又看得弋謙奏內所言秉政重臣不悅王通及病國病民莫此為甚等因雖不明言為誰臣等實掌兵政意在指臣為辭切念臣本以書生叨膺重寄既居保傅之官又兼六卿之任加以總督軍務而才器不逾於常人聲望弗協於輿論屢嘗懇辭未賜俞允兹當多事之秋正係更賢之日茍復冒昧貪榮不知紀極萬一有誤大計萬死莫贖弋謙所言激切反復不置必有所見而各營總兵等官武清侯石亨等雖係任用既久事無過舉屢效勤勞而弋謙亦謂將無智愚之别兵無揀練之方中外不足臣觀弋謙之意必欲用王通乃已臣等所言王通弋謙之事但因其既往而逆其方來尤恐王通等别有竒謀異見非臣所能窺測不可久妨賢路合無將王通寧懋阮遷于量為升守就令王通石亨等官掌管前項團操軍馬及將弋謙亦量升職代臣總督軍務令各官務在展布平昔抱負措置匡濟艱難不可又如臣等愚昧無知虛文應用惟望復臣右侍郎舊職佐理部事及兼管操練遇警隨軍殺賊以圖補報庶幾合衆論之公愜天下之望臣切受國恩至深至重所宜盡死豈敢辭難但輿論不容兼且恐誤軍國重計以獲罪於天下後世以獲罪於天地鬼神以此昧死干瀆天聽緣節奉欽依兵部通看了來說事理具題景泰二年六月初二日奉聖㫖弋謙言不顧行自已有過却說他人既先辱國喪師不可復用王通仍舊鎮守山陵寧懋阮遷于著跟石亨團操但有聲息調當先殺賊有功一體升賞其餘的事不必論欽此為軍務事于謙臣等竊惟兵者國家之大事所以防奸而禦侮保大而安民然軍必有將將者三軍之司命也兵法有大將有萬人之將有千人之將有百人之將要使大小之任各得其人然後調度之際克濟乃事國朝用兵之制一本之古法而參之以時宜以一軍之中有總兵有左右副總兵參將又有坐營把總管隊等項官員往往擇其人以任之蓋欲防奸禦侮保大安民者也奈何近年以來為因承平日久兵備懈弛總兵乏統馭之才禆偏失遴選之道其把總管隊等官多有夤緣冒進菲才濫充以致軍士不揚戰陳無勇甚則貪圖賄賂剝削害軍視兵政為等閒與士卒為仇敵失利僨事職此之由邇者恭覩皇上繼承大統赫然奮發思剪刈羣盜附衆强兵纍勑在京總督總兵等官留意訓練官軍從公揀任將士臣謙繆膺總督之任與同總兵官武清侯石亨等祗奉德意即將各營把總等項官員分别賢否具奏黜陟巳定近取勘到各營坐營把總管隊等官員姓名數目在部備照行移武清侯石亨安逺侯栁溥都督張軏孫鏜楊俊衛頴范廣今將選定把總等項官員照依先前定擬提督操練不許徇情作弊因而輕易那動以後若有事故升調等項應合選人代替者該營把總等官務要遴選至公堪把總者令其把總堪管隊者令其管隊仍將選補過把總管隊官員職名具奏任用及開報本部以憑查考果有坐營等官將把總管隊官員私自那動委用者宜從總督總兵官指實參奏拿問治以重罪庶體統不紊而任用得人武備修舉而不誤邊事緣係處置軍務事理具題景泰二年六月初十日奉聖㫖是欽此為軍務事于謙兵部抄出總兵官武清侯石亨題准後軍都督府咨准兵部咨呈開民壯夏勝一等先送該營操練巳後回還原籍經今一年之上其坐營把總管隊官員全不作逃拿解中間顯有通同脫放情由合無令該管總兵等官查照緣何明知各人在逃一向不行具奏及行咨本部挨拿并各人糧賞曾無關支指實參奏拿問等因具題奉聖㫖是欽此抄出備行臣處欽遵施行移咨准此查得先准後軍都督府咨送民壯夏勝一等前來已經劄發報效營收操去後今准前因行據該管坐營指揮杜山呈稱夏勝一等一百八十八名於景泰元年二月十四日到營收操陸續在逃已將張興二等一百七名通類呈逃數內夏勝一等八十一名為因事冗失於揭查作逃景泰二年二月二十日已行開逃外及本職先於本年二月二十四日為事至五月初六日復職管事各人在逃之時係原坐營把總指揮郭亨等在營管事其夏勝一等糧賞不曾關支見解本營操備等因具呈得此參照指揮郭亨等自合加意撫恤軍士操習武藝各人既已在逃合就行拿解問以警其餘却乃止將張興等一百七名開逃其夏勝一等八十一名不行作逃雖不關支糧賞中間顯是扶同縱放及照指揮杜山於前項日月為事復職管事不即查理却於景泰二年二月二十日才作夏勝一開在逃俱合問罪緣指揮郭亨等俱係軍職開坐具題該本部官欽奉聖㫖且饒他這遭再犯不饒欽此抄出到部查得先該直𨽻廬州府廬江縣申據民壯夏勝一等狀告蒙僉作民壯赴京操練為因艱難具本奏准蒙兵部職方清吏司給出印信批文照回等因告繳到縣看得批文印信篆文不明恐有詐僞差老人陳真等連人批管解赴部查得并無夏勝一奏准抄呈在卷顯是虛詞遮掩僞印情由合將夏勝一等同一起回還民壯并假批通送法司究問及照夏勝一先送該營操練以後回還原籍經今一年之上坐營把總管隊官員全不作逃拿解中間顯是通行脫放合令該營總兵等官查照緣何明知各人在逃不行具奏拿問不許誣下罔上容情不舉以致奸人得計軍政隳廢等因奏奉聖㫖是欽此除欽遵外今抄前因臣等切詳克敵之要在乎將得其人為將之方貴乎兵有其制前日大同和陽後口并土木等處我軍失利賊冦肆志者皆由平日將帥庸懦號令不明假寬厚持重之名以遂貪私茍安之計上下逺近習以成風致有此禍即目邊務方殷賊情不測正當盡革宿弊豈宜仍蹈前非況前項民壯夏勝一等一百八十餘名自景泰元年四月間揑寫僞印批文逃回原籍該管坐營把總等官朦朧隱下不行作逃被各原籍官司舉發解來本部奏送法司問罪及令該營總兵等官查明回奏方才揑稱於本年二月間開逃遷延月久若非各逃原籍官司及本部具奏則各人終於賣放在家名數虛存營伍空缺朝廷何由而知兵備何由而肅及照奏內開稱民壯夏勝一等糧賞不曽關支行該户部四川清吏司手本開查得前項民壯夏永一等四十九名已於景泰元年四月分造冊關支糧米今却妄行奏稱不曽關支顯是該營把總等官指揮郭亨等比先通同作弊受財脫放冒關月糧侵欺分用懼怕有罪又行揑脫瞞官作弊情犯昭然今各營見在坐營把總管隊官員數多因見郭亨等賣放民壯盜關月糧全無忌憚互相效尤作弊官軍日見消耗兵政日益廢弛萬一失誤事機追悔何及再照武清侯石亨本無汗馬之大功謬膺朝廷之重寄惟知市恩而誣下不思申令以正人縱容該管把總等官作弊壞事及至本部奏奉欽依查勘又復延調久不回奏都督衛頴屢次於教場呼喚郭亨等查究抗拒不服却乃私到石亨家送與公文本官輒又聽從首領官金以惠并當該掾史聽受郭亨等買囑通同隱下賣放民壯侵盜月糧實情揑稱失於揭查等詞石亨出名朦朧奏准致令奸人得計兵政廢弛似此上下交通互相䝉蔽若不通提問罪切恐貽患方來合無行移石亨嚴加戒飭本官并各營總兵等官今後務要竭忠盡誠修舉戎政以副朝廷之委託以為下人之表率不許似前罔上孤恩茍安日月及縱容下人受財壞事致令坐營把總等官將見操官軍縱容脫放如違一體治罪其把總官員數內杜山先因為事不即查理情罪頗輕合照節奉欽依且饒他這遭事理施行所據賣放民壯盜支月糧情重指揮郭亨吳能并石亨處通同作弊首領官金以惠及掾吏人等合提送法司明正其罪仍於郭亨名下追糧還官庶使人心警懼而法昭明武備克修而事無謬緣係整飭軍務參問軍職官事理具題景泰二年七月初一日奉聖㫖是欽此為陳言邊務事于謙准都察院咨刑科抄出山西行都司大同後等衛老軍吳淮等將左副都御史年富不法事情開坐具奏奉聖㫖該衙門知道欽此欽遵除尅減斛斗貪淫無恥等事本院施行數內開僣越職事本官職居三品欽差提督軍務自合以禮守職其定襄伯郭登係伯爵先承勑命掌征西將軍印鎮守總兵今年富自倚風憲不遵職級到任之日就與并坐僉押公文凡發號施令不容定襄伯啓口妄執已見意在專執蠧政下人實難遵守係兵部掌行開咨到部臣等參照年富係副都御史三品之職受朝廷勑㫖令其提督軍務凡軍中一應大小事務悉皆提挈綱維自總戎而下咸聽節制況都御史為風紀之官與侯伯無相統屬既係欽命提督當居總兵之左豈有不許並坐之理臣又看得武臣總兵文臣監督從古為然昔春秋之時齊之田穰苴以布衣監莊賈軍莊賈違軍法穰苴斬賈而破秦晉之師唐之裴度以御史中丞督視淮西軍馬卒平淮蔡事有明驗朝廷酌古凖今選用文職大臣充提督軍務等項皆便宜從事而左都御史王翺右僉都御史鄒來學提督遼東等處亦坐總兵官之左凡發施號令軍中賞罰皆係王翺等處置此係朝廷舊例軍務事宜體統已定非臣所敢專制而吳淮等以一介老軍倚恃刁潑妄言變亂沮壞軍務中間必有主使之人合無行移都察院將老軍嚴加勘問聽信何人教唆主使朦朧具奏前因務在問擬明白奏請究治及行年富照依王翺等事例施行緣係處置軍務具題景泰二年九月二十七日奉聖㫖是欽此為怠廢軍政事于謙該刑科等衙門劾奏都督同知衛頴等交通飲酒奸宿樂婦怠廢軍政等情欽䝉聖恩寬宥弗加罪責此誠天地生物之仁然臣等切惟衛頴等俱以凡才叨膺重任擢居都府分掌兵戎不能宣力而竭忠乃敢縱欲而敗度況終日飲酒為樂又復用錢買奸若非剝削害軍此物從何而得即目敵人雖已請和而邊報未甚寧息舊恥未雪當君臣卧薪嘗瞻之時大舉未圖宜將帥捐軀致命之日而衛頴等所為若此上孤朝廷之恩下失軍士之望惟騁一已之嗜欲豈恤衆情之艱難曩者土木之潰大事幾危正由為將帥者平日貪淫敗度受財賣軍互相交通夤緣黨比戰鬪之事不習兵戎之政不修將帥互為仇讐上下自相矛盾以致臨敵無功望風為解前日之覆轍未久而衛頴等又復效尤亷恥蕩然全無忌憚比者在營軍士逃者數多動以萬計安知不為衛頴等賣放逼迫所致杜漸防微不可不慎且賞從賤罰從貴此古今之通典而兵家之要術也今衛頴等位重任隆而貪婪無度則下人何所取法而管軍者何以為戒所據各人罪名已䝉聖恩寬宥而此等駔儈之才終難任爪牙之寄合無將衛頴范廣陶瑾張義郭英穆晟俱不許管理府衛事務及坐營領軍調往開平獨石大同一帶操守殺賊以贖前罪庶使法令昭明而餘人知懼恩義並行而戎政修舉矣具題景泰二年月日奉聖㫖衛頴等饒他罪今後著改過自新但有犯必不赦欽此名臣經濟録卷三十八
