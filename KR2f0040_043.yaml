body:
  text: 名臣經濟録卷四十三明黃訓編兵部職方下之下奏陳愚見以弭邊患事汪鋐臣先任廣東按察司副使巡視海道適有强番佛朗機駕船在海為患其船用夾板長十丈闊三丈兩旁駕櫓四十餘枝周圍置銃三十餘管船底尖而面平不畏風浪人立之處用板捍蔽不畏矢石每船二百人撑駕櫓多而人衆雖無風可以疾走各銃舉發彈落如雨所向無敵號曰蜈蚣船其銃管用銅鑄造大者一千餘斤中者五百斤小者一百五十斤每銃一管用提銃四把大小量銃管以鐵為之銃彈內用鐵外用鉛大者八斤其火藥製法與中國異其銃舉放逺可去百餘丈木石犯之皆碎正德十六年正月內臣訪據東莞縣白沙巡檢司巡檢何儒稱其上年因委抽分曾到佛朗機船見有中國人楊三戴明審知伊等年久投在佛朗機國備知造船鑄銃及置火藥之法臣即令何儒密遣人到彼以賣酒米為由潛與楊三等通話諭令向化重加賞賚彼遂樂從約定期夜何儒密駕小船接引到臣研審是實遂令如式製造試驗果效後臣舉兵驅逐佛朗機賴用此銃取捷殺滅無遺奪獲伊銃大小二十餘管比與楊三等所造體制皆同臣竊惟佛朗機凶狠無狀惟恃此銃銃之猛烈自古兵器未有出其右者用之禦敵用之守城最為便利如北人之來平原曠野與之對敵則用銅銃一百五十斤載以手車每一車載一銃火藥彈子與提銃俱置其上前後推引并舉銃每車用四人一出須用三百銃敵勢重大則增至五百銃布列前陳寇至齊舉瞬息之間一銃可發數彈其聲震天馬必驚潰觸之者死不觸者奔如敵見我設兵如此引馬他向則疾速推車向之敵左行則車左轉敵右行則車右轉或先相地度勢以車三面待之在臨時斟酌之耳夜則團圍作營日復展布如舊其要害之地險隘之處則築為城堡用銅銃五百斤者布列城上冦至舉之彼决不可度凡在邊塞一切要害俱築為此堡守以此銃若夫京師防守城池則大小三號銃兼用之分布各城一遇有警勢大則用大銃勢小則用小銃臣前此曾將原獲佛朗機銃四管并造手車四輛責差巡檢何儒帶領楊三等呈送梧州軍門轉進于朝廷巳䝉依擬就差何儒等齎進外乞勑該部候齎至之日驗之如果可用則多為鑄造依臣所言用之禦敵用之守城無往不濟臣又竊照南畿根本重地防守不可不嚴操江雖有船隻或未盡善合無照依蜈蚣船式樣創造數十艘易今之船使櫓用銃一如其法訓練軍士久而慣熟則防守益固乞勑該部再行查議如果臣言可采特賜舉行則緊急之際未必無萬一之助臣不勝懇切願望之至謹具奏聞奉聖㫖該部知道再陳愚見以弭邊患事汪鋐臣竊惟西北二邊為中國患其來巳久自古禦邉之法惟守為上戰斯下矣來則有備去則勿追守之謂也帝王以全取勝惟在於此我國家相度形勝沿邊各設重鎮如陜西則有甘肅延綏寧夏山西則有大同宣府此五鎮也實西北之大捍蔽也每鎮官軍不下六七萬人沿邊設立墩臺城堡其為守之之計固無不周然而賊冦之來卒莫能禦衝突奔逸所向無前一遇交鋒彼勝我負損傷官軍動至千百此其故何也蓋墩臺初無遏截之兵徒為瞭望之所而城堡又多不備間一有之其所執兵器不能及逺亦無遏截之用我軍遇之衆寡不敵其敗也固宜為今之計惟當用臣所進佛朗機銃小如二十斤以下逺可六百步者則用之墩臺大如七十斤以上逺可五六里者則用之城堡每墩置銃一把以三人守之每堡置銃三把以十人守之五里一墩十里一堡堡不必大縱橫止各五丈比墩大三之二則工力省而易就外墩內堡列為兩層或三四層大小相依逺近相應星羅碁布無有空闕東來東擊西來西擊則敵自無容足之地可以不戰坐收全勝之功矣臣又竊計之每鎮要害之地敵人必由之處大約不過千里十里一堡則千里當用一百堡五里一墩則千里當用二百墩一堡十人則百堡當用一千人一墩三人則二百墩當用六百人然則一千六百人可以遍守一鎮矣以更番之法一年分為四番則一千六百人當用六千四百人是一鎮之軍士十用其一巳有餘裕矣夫用其一而閒其九則閒者固有五萬餘人也又以此數盡督之屯種且耕且守仍十取其一于鎮城操備輪班更替不妨農作將參而下除額定軍伴外不得占役一人指揮千百户等官除管理墩堡外餘皆分投督理屯種之事務使人各盡力畎畝以興屯田之利夫天下無不可耕之土無不可農之夫無不可樹之稼今以空閒之軍士耕曠野之地土植所宜之五榖其為利又安有既耶臣竊觀各鎮每年嘗有客兵之調糧草動至缺乏則出內帑開鹽利以助不給今如臣之䇿則不惟不調客兵而常額之士且十可九耕矣不惟不出內帑開鹽利而屯田之入且嵗可數十萬矣臣又竊觀往者敗衄之後例必查勘將領重則處以極刑輕則問擬充軍其慘刻之禍亦不減戰陳之間也至於殺虜數人口搶劫數頭畜則守把提調等官無有不受罪者今如臣之䇿則不惟士卒可免塗地之苦而將領以下亦可免失機之刑矣伏望皇上亮察臣言的然可用特勑該部行令各該巡撫都御史及鎮守總兵官著實舉行相視地勢將各墩堡一一修築壞者新之缺者完之未備者增置之五里一墩十里一堡比比相因要害之處無不皆然照依式樣多造佛朗機銃人人教之熟曉放銃之法一墩三人守之以一銃一堡十人守之以三銃分撥指揮千百户等官某官領幾墩某官領幾堡其空閒軍士督之耕種十取其一更番操備仍乞敕本院行令巡按御史時常巡視稽考前項墩堡有無完固前項人銃有無齊備前項屯種有無修舉一不如法即行參劾務使墩堡無空缺之處人銃無廢弛之時境內無荒棄之地夫如是則用力甚省而取捷甚大立法甚簡而為利甚博行之萬世萬世無邊圉之患行之萬萬世萬萬世無邊圉之患矣臣不勝懇切願望之至為此具本親齎謹具奏聞伏候敕㫖嘉靖九年八月初四日奉聖㫖覽卿所奏具見籌邊之意户兵二部還再加議處停當務在經久可行以周邊計題為重邊防以蘇民命事汪鋐廣西道監察御史呈刑科抄出刑科給事中王希文奏原籍廣東東莞縣人生長海濵習膠陋學雖于國家大體素所未諳然閭閻隱情頗嘗備厯荷䝉聖明恩育選置諫垣臣豈不知要領之當言而細碎之可略亦以泛言不若聞見之為真舉逺不如指近之為切况天下之務莫急於邊防而邊防之害莫甚于海徼天下之民莫困於力役而力役之竭莫甚于東南臣謹以耳目所見聞者披瀝言之且如番舶一節東南地控夷邦而暹羅占城琉球瓜哇浡泥五國貢獻道經於東莞我祖宗一統無外萬邦來庭不過因而羈縻之而巳非利其有也故來有定期舟有定數比對符驗相同乃為伴送附搭貨物官給鈔買其載在祖訓謂自占城以下諸國來朝貢時多帶行商隂行詭詐故阻之自洪武八年阻至洪武十二年方且得止諄諄然垂戒也正德年間佛朗機匿名混進突至省城擅違則例不服抽分烹食嬰兒虜掠男婦設柵自固火銃橫行犬羊之勢莫當狼虎之心叵測賴有右都御史汪鋐前任海道副使併力驅逐肆我皇上臨御威振絶域邊境輯寧凡俘獲夷酋悉正極典民間稽顙稱慶以為番舶之害可永絶而疆圉之防可永固也何不踰十年而折俸有缺貨之嘆矣撫按上開復之章矣雖一時廷臣集議不為無見然切以祖宗數年難沮之虜幸爾掃除守臣百戰克成之功一朝盡棄不無可惜若使果皆傾誠奉貢則誰不開心懷柔以布朝廷威德設有如佛朗機者冒進為患則將何以處之乎其間守巡按視夫馬頻煩官軍搜索居民騷擾耕樵俱廢束手無為魚鹽不通生理日困皆不足論以堂堂天朝而納此輕瀆之貢治之不武不治損威誠無一可者臣竊仰陛下控馭西北諸夷恩威並用誠若知其跋扈之狀必不輕從此議也幸今番舶雖未報至然守備巳先戒嚴刷虜民船海島生變邊釁重大誠為可憂如䝉皇上重威守信杜漸防微乞敕都察院轉行巡按御史除約束備倭不致侵擾外仍乞申明祖宗舊制凡進貢必有金葉表衣來者不過一舟舟不過百人附搭貨物不必抽分官給鈔買頑民不許私相接濟如有人貨兼獲者全家發遣則夷貨無售其私不待沮之而自止矣番舶一絶則備倭可以不設而民以聊生鹽貨可通而瓊儋之利皆集矣又如珠池一節雷亷二府雖𨽻廣東然地極一隅接壤交趾因其蠙蚌間産名為珠池我祖宗四海為家雖設監守然不過防民爭奪而巳非以為寶也故採無常期取無定數蓋以非日用之物而難責於惟正之供如載在㑹典不與物料為例不與嵗辦同征班班然可考也正德年間逆豎用事毒流海濵監守漁獵牙爪助威誣商船為盜珠脅鄉民為匿寶傳奉採取擾害百端蠶食不堪致成激變屢經撫按重臣奏請我皇上御極沙汰冗員珠池少監亦在裁革民間踊躍欣幸以為中貴之害可永無而採取之禍可恆免也何不數年而革者復矣採珠數斛不盈其數而又再採矣一時守臣不體欽奉固為有罪然驅無辜之民而盜不測之險求不可必得之物而計以斗斛之盈若人力可為則誰不奔走奉承以供君上之用設或天産有限雖舉網竭澤亦何以足取盈之數乎其間雇覔夫船叢纍里甲橫行海島劫奪客商服役踰年荒棄生業風濤頃刻呼吸存亡皆不足論但以明明盛時而貴此無益之貨且寒不可襦饑不可粟似非有急者臣竊仰陛下於一切珍玩屏斥不好若誠知其採取之艱難必不再為此舉也今雖經行暫止然成命尚未收回領過官銀刻期追取船夫畏罪薄海逃生地方之患誠為可痛如䝉皇上輕貨重民計大纍小乞敕都察院轉行巡按御史除採取以罷工食停追外仍乞申明初年詔令珠池監守歸併總鎮責以守巡多方防範嚴禁民間不許僭用珠飾不許私相貿易盜採獲有贓仗者從重問擬則珠池不守而民自不敢犯矣監守既革則侵漁可免窮髮之民得以樂業而邊備無空虛之虞矣凡此二事臣素所縈念痛心為朝廷惜大體為民生惜微命有不容於不言者緣係重邊防以蘇民命事理未敢擅便等因奏奉聖㫖都察院看了來說欽此欽遵抄出到道具呈到院臣等看得刑科給事中王希文所奏前項番船珠池為地方之害欲加禁革一節臣等查得海南諸國自祖宗以來許其通貢雖恩以懷之者無所不至而法以防之者亦無所不周謹按皇明祖訓安南真臘暹羅占城蘇門答剌西洋瓜哇彭亨百花三佛齊浡泥諸國俱許朝貢惟內帶行商多行譎詐則暫却之洪武十六年又欽奉太祖髙皇帝聖㫖南海諸番國地方逺近不等每年多有番船往來進貢及做買賣的來的人多有假名託姓事甚不實難以稽考致使外國不能盡其誠敬又怕有去的人詐稱朝廷差使到那裏生事需索擾害他不便恁禮部官置立半印勘合文簿但是朝廷差去的人及那裏差來的人都要將文書比對硃墨字樣相同方可聽信若比對不同或是無文書的便是假的都拿將來欽此至正德十二年有西北極邊强番素未通于中國名曰佛朗機者駕船而南驅逐滿刺加國王竊據其國假託進貢突至東莞直趍省城布政吳廷舉許其朝貢為之奏聞繼而勘係逆番誅其首惡加必丹末火者亞三等以杜絶邊釁此海南諸番通貢之大概也至于抽分之說自成化至今或行或禁紛紜不一豈無至當之論哉臣鋐嘗任彼處海道副使身親其事頗知其詳蓋海外諸國稽顙稱臣輸忱效貢此固四夷來王悅服中國之本心至于挾帶貨物入我中土懋遷有無亦其情也故律有抽分之條所以順逺夷之意非但專為抽取貨物以資國用計也奈何法久弊生諸夷熟識海道大肆往來加以奸民千百為羣駕造雙桅大船私置兵器縱橫于海潛通勾引至于東莞地方虜掠居民一語不合輒勦刃刺戮而巡捕等官畏其獷悍莫敢誰何又抽分之官多不得人守候日久未抽之先私通貿易官軍不能防範而貴細之物巳十去七八及至抽分又詭詐百端止將粗糲之物用水浸灌搪抵納官是以解官有陪償之苦運船有雇直之虧其為地方之害巳非一端况復加以佛朗機之橫姦汚婦女殺食兒童為害尤甚於是御史丘道隆何鰲先後建言户部備查各年奏行事宜題奉欽依外國依期進貢齎有印信勘合的朝廷自有抽分舊例今後但係私番客船原無齎到勘合雖有勘合不係貢期假以國王差遣買辦為名的著鎮巡官嚴督所屬即便阻回不許私自抽分以致奸詐軍民搆惹釁端生事遺患其餘俱依擬行欽此至嘉靖八年該提督兩廣軍務兵部右侍郎兼都察院右僉都御史林富題為遵成憲通市舶以興利便民事又該户部申明前㫖通行去後仰惟我祖宗之待外國限之以朝貢之年定之以抽分之則而私番橫行者嚴之以重禁恩威並行情法不背可以經久而無弊奈何奉行者往往不得其人不能仰體德意俯恤民隱朝貢不問其年抽分不循其則不究其行商之夾帶不考其船隻之多寡法雖立而不能守禁雖嚴而無所施但遇番船之來即為地方之害給事中王希文生長兹土目擊其弊故有此奏合無再請明㫖行令彼處撫按鎮守市舶海道等衙門務要遵奉節年題准事例凡安南等國載在祖訓例應入貢者果是依期而至比對硃墨勘合相同夾帶番貨照例抽分應解京者解京應備用者備用抽分之外許良民兩平交易以順夷情其餘非應貢之年及過貢期而不還或假以國王買辦名色并奸商勾引搆惹釁端及逆番冒進頻年橫入如佛朗機者通行即時驅逐出境敢有違例交通者治以重罪海道備倭市舶等官若有威令不行處置缺當及貪叨壞事貽患地方者許撫按官員具實參奏庶幾懷逺有恩而邊方之夷情以順弭亂有法而內地之奸宄亦消矣至于珠池監守之設尤係民瘼臣等查得洪武三十五年差內官起取蛋户採珠乃一時缺用暫行之典固未嘗著之令甲設官監守以防民而廢業也天順八年始差內使一員看守平江珠池巳非祖宗舊制成化以來楊梅青鶯永安樂民等池節次添設內官或岐為二或分為三或夤緣兼管地方或陳乞督捕盜賊各官不能寅畏國法安靜行事恣其漁獵之私以滿其溪壑之欲百計謀求無有窮巳凡軍匠工商月錢貨稅與夫額外廪給口糧鋪陳船隻轎夫馬料一切折乾之類縱橫旁午有不可勝言者一年所得之珠曾不足以償一年供費之什一而海濵窮瘵之民罹此貪黷無名之征蓋至于正德末年極矣聖明御極深知其弊首革地方之兼管又取回壞事有名如太監趙蘭者以警其餘海邦民庶歡欣鼓舞熙熙然復有更生之望不意嘉靖三四年來差去官員不能上體聖心下恤民窮當聖治更化維新之㑹乃有調軍捕賊干預地方之事雖仰荷聖明不賜俞允而地方騷擾之害尚未能無以故給事中王希文復有論列臣等竊惟珠之為物徒侈珍巧無益寒饑陛下法祖恤民務學敬德近無耽好之玩逺無追求之勞古之聖王未易能過其于此物中外皆知其一切屏絶徒以其故事所在未及查革臣嘗考得採珠平江等池在東海之中蛋人採之極為艱苦每以長繫繩腰携竹籃入水拾蚌置籃內則振繩令舟人汲取之不幸猝遇惡魚一線之血浮于水面則巳葬魚腹矣臣又按南漢劉鋹于合浦縣置媚川都令人入海採珠溺死者衆宋太祖開寶五年遂詔廢之其一念愛民賤貨之意卒壽宋家三百年仁厚之脉陛下若親見採珠溺死之苦臣知必不忍以無益之物而纍此無辜之民也臣願陛下益隆聖德益清聖心一以我太祖髙皇帝及宋祖為法將監守珠池內臣查照近年各處市舶歸併鎮守帶管事例即為取回其合用監守採珠事宜敕令鎮守太監帶管遇有上供缺乏行令督同守巡府縣等官用心採取進呈仍行巡按御史嚴禁民間不得僭用珠飾責守巡海道等官嚴拿盜珠冦賊毋得因循縱容如此則珠池可以不守上供可以不乏陛下不貴異物之德逺屆四海而久瘵窮髮之民得寬一分矣緣奉欽依都察院看了來說事理未敢擅便謹題請㫖嘉靖九年十月初五日奉聖㫖是依擬行守邊固圉之略丘濬臣按月令於孟冬之月既命百官謹蓋藏命有司循行積聚無有不斂而又命有司壞城郭戒門閭修鍵閉慎管鑰者此蓋兼中外而言也至於固封疆備邊境完要塞謹關梁塞蹊徑則專為邊境言焉然邊境之中亦有城郭而其城郭則有門閭焉門閭之或啓或閉則有鍵閉管籥以司之故既坯其城郭之缺薄使之堅而厚而又戒其門禁之出入於鍵閉管籥也則又修而理之慎而守之所以防內之出而外之入也若夫封疆之固邊境之備則其所防者內恐盜賊之竊發外恐敵國之侵陵雖以無事之時亦必嵗嵗為先事之備於要塞也則完之以厄其要衝於關梁也則謹之以限其出入然非但於人馬可行之地而致其備則凡野獸往來之地僅可容足者亦無不致其謹焉可見古人于封疆之守邊防之備其嚴且密也如此後世為政者茍且目前而於邊塞之地無事則一切置之不問一有事焉則急遽之際倉皇無措者多矣甚者以樵薪之故而剪其䝉翳以營造之故而代其障蔽以游畋之故而廢其險隘殊不知王公設險以守其國無其險尚百計以營為之况有其險而自去之以為敵除道智者所不為也後之君子尚思所以為先事之備而毋貽臨時噬臍無及之悔臣竊以為今京師切近邊塞所恃以為險固者內而太行西來一帶重岡連埠外而渾蔚等州髙山峻嶺蹊徑狹隘林木茂密以限敵騎馳突不知何人始於何時乃以薪炭之故營繕之用伐木取材折枝為薪燒柴為炭致使木植日稀蹊徑日通險阻日夷設使國家常如今日之無事固無所用之不幸一旦而有風塵之警將何以扼其來而拒其入乎失今不為之限制臣恐日甚一日雖有智者不能善其後矣臣請下工部稽考洪武永樂年間以來其所用材木柴炭取於何所掌於何人凡其可以措置之方用度之數與夫愛惜減省之節目一一以聞必須無損於邊關無虧於國用定為經久之計其事雖小所係實大考諸司職掌於工部抽分條止云抽分竹木場如遇客商興販竹木柴炭等項照例抽分若不敷定奪奏聞給價收買或差人砍辦則是祖宗之時遇有營造不敷方行買辦然亦止言營造而不知當時大庖之㸑內臣之炊何處取材意者洪武之初建都江南沿江蘆葦自足以供一時之用也蘆葦易生之物刈去復生沿江千里取用不盡非若木植非厯十數星霜不可以燃取之須有盡時生之必待積久况今近甸别無大山茂林不取之邊關將何所取耶夫自立柴厰於易州以來恆聚山東山西北直𨽻數州民夫數千於此取柴炭以供國用又役順天之民以為挑柴夫府縣添設佐二官以専管之又特敕侍郎或尚書一員以總督之此事非特今朝無有定制而前代亦所未聞也然則前代皆不舉火耶古之人必有善處之法然而史籍不載無從稽考意者以此為非要之務隨時制宜姑取足用政不必顓顓設官拘拘督責因吾口食之奉以奪民日用之資也為今之計宜移置柴厰於近境之地散遣丁夫各還原籍量其州縣大小人民多寡定為薪炭之數分派輸納內外衙門每嵗定為限期俾其依期運納一如户部糧草例取納足通關以憑稽考又必痛為禁革除去印格茍薪柴可以燃燎即收貯不必問所從來限以式樣如宋之末世所取之炭必如核桃紋鸕鷀色以困吾民也如此非獨可以為邊關之固而京畿及山東西之民亦可以少蘇矣雖然木生山林嵗嵗取之無有巳時茍生之者不繼則取之者盡矣竊恐數十年之後則物日少其價日增吾民之採辦者愈不堪矣臣又竊有一見請於邊關一帶東起山海以次而西於其近邊內地隨其地之廣狹險易沿山種樹一以備柴炭之用一以為邊塞之蔽于以限北人之馳騎于以為官軍之伏地每山阜之側平衍之處隨其地勢髙下曲折種植榆栁或三五十里或七八十里若其地係是民産官府即於近便地撥與草場及在官地如數還之其不願得地者給以時價除其租稅又先行下法司遇有犯罪例應罰贖者定為則例徒三年者種樹若干二年者若干杖笞以下以次遞減照依繕工司運水和炭事例就俾專業種植之人當官領價認種某樹若干長短大小皆為之度以必成為效有枯損者乃責其陪其所種之木必相去丈許列行破綻參錯蔽虧使北馬不得直馳官軍可以設伏仍行委所在軍衛有司設法看守委官巡視嵗遣御史人員督察之不許作踐砍伐違者治以重罪待其五七年茂盛之後嵗一遣官採其枝條以為薪炭之用如此則國用因之以舒民困因之以解而邊徼亦因之以壯固矣又京城軍民之家皆以石煤代薪除大官外其惜薪司當給薪者不過數千人之烟㸑無京民百分之一獨不可用石煤乎倘以為便乞下便納挑運州縣計其買辦雇覔工價所費幾何俾其辦價送官量給與之市石煤以㸑是亦良便列屯遣戍之制一丘濬臣按此秦漢以來謫有罪者戍邊之始蓋置惡人於荒僻之地以禦魑魅古典也秦始皇謫治獄吏不直築長城漢武帝謫吏有罪者出朔方其來逺矣但有罪繫獄者人非一等有農民有游民與夫工商吏卒不一類焉彼事末農工商賈平日習勞苦事役作之人用以戍邊無不可者若夫名為士流繫宦籍者率多懦軟脆弱之人平日呻吟占畢不經勞役一旦使之被堅執鋭以從事隊伍之間以禦强敵用此以警衆庶固為可矣其如誤國計何况邊塞之地餽餉為難內地米一斛至邊計其費不止三斛也乃嵗苦內地良民運三十斛米以養一無用之人無乃非計歟必欲重困罪人使彼知警豈無别䇿而必用此乎列屯遣戍之制二丘濬臣按漢人疆場之間既巳廣屯增戍列營置塢而國有征伐又藉京師之兵夫內地有冦可出京師兵以平之若夫邊圉之敵必須用其邊兵何則蓋邊兵生長邊陲慣於戰鬬知敵人之情狀識道路之迂直且復屢經戰陳目熟心定若夫京畿之兵驕奢脆懦目所未嘗見身所未嘗經况受命而總兵者皆天子之勳貴報效而從征者皆是權貴富豪子弟欲希功以得官耳非實有材勇欲敵所愾以建功業也一至邊城巳既不能戰反役使邊兵之善鬭者為之給薪水供草料及至敵退而論功方且虛張功次奪邊兵之鹵獲攘其首級以為己功是以邊城一聞京軍之來無不解體者為今之計緣邊一帶分定疆界專責邊將守禦不得巳而出京軍止用以為邊城之聲援如大同則於應州或渾源州立一大營宣府則於懷來或保安立一大營其他遼東甘肅諸處皆然敵來者少則各邊自為守戰敵來者多方許奏請京軍如敵至大同則于應州駐劄敵至宣府京軍則於懷來駐劄兵法先聲後實每調一千則稱五千用以為邊城之聲援非其力果不能支而京軍不得貪功冒進如此則各邊將卒畏京軍之擾害且奪其功無不奮志效死矣總論邊務許論或有問於論者曰今天下之患何居論曰北敵最可憂餘無患焉曰何以為可憂也曰兵莫强于遼金元莫弱於我朝而始盛于今日是以知之蓋自我太祖髙皇帝定鼎之後其裔半留中國遁入沙漠者無幾太宗文皇帝又申北伐之威三犂其庭于是敗破之餘僅存喙息是以九邊戍卒所須不過四十萬視宋人備西夏一路而屯戍七十萬蓋倍蓰矣故曰敵莫弱于我朝奈何百餘年來生聚既蕃侵噬漸近開平興和東勝河套之地皆為所據自額森和碩之後益輕中國恃其長技往往深入風雨飄忽動輒數萬我軍禦之不過依險結營以防衝突僅能不亂即為萬全視彼驅掠莫敢誰何敵志日驕我氣日奪絶無堂堂一戰者其零騎出沒雖稍有俘斬亦已甚難蓋衆寡之勢殊强弱之形異耳所幸北人貪利無有他志計日數程不能持久每一大舉曬肉晾馬頗亦勞費若得失不讎則懷恨無已是以邊境得茍免焉近年以來敵勢轉橫既連得利心益歆豔而濟農者復縱橫其間最稱雄黠控弦之士餘二十萬益以中國驅掠逋逃之衆竊知內地虛實若一旦改慮不為劫掠之計則久弊之境豈能外寧供餽之擾或生內憂誠不知邊事所終矣曰今之邊備何如曰地方殘破兵馬單弱邊臣欺玩芻糧匱乏法令縱弛在處皆然是則所謂最可憂者曰孰能興之曰我聖天子能興之何以能興曰聖天子注意所在則賞罰必行謀國者不敢因循任事者不敢欺玩是以能興何以興之曰重巡撫將臣此第一義餘皆待其人而行者耳何謂重巡撫一曰慎其選二曰久其任三曰假其權四曰明其功罪蓋邊方巡撫責任至重不同腹裏必有通變之才堅忍之性奮迅之志而後可以有為先年最重其選不肯泛授後則視為常階不論所宜倘失其人則非徒無益而又害之愚謂於無事之時先令科道及吏兵部各舉所知以備簡用遇有員缺即于所舉之內酌量才力㑹推選補庶衆論攸同真才效用是為慎巡撫之選夫軍久蒞而後威惠洽事久練而後劑量審功久積而後庶務成今之巡撫甫至任而即望遷官焉得有固志無固志焉得有逺圖無逺圖焉得有善政無善政則朝廷將焉用彼也邊事因循而廢正坐此弊若自今限年為例非兩考者不遷六年之內利害切身窺避無由雖欲不極力以為之不可得巳是為久巡撫之任選慎矣任久矣而信之不專終亦無益近日邊臣奏議多見齟齬而言官苛舉細過悍將動輒抗衡每每令其束手是以雖有頗牧之才何所用之必也朝廷之上不惑浮議本兵之地推以同心言之得行而行之得至無牽制無掣肘庶幾其有濟乎是謂重巡撫之權權重矣而勸懲不立何以奔走天下之豪傑願著為令凡巡撫三年以上兵食有賴地方無虞者加升正卿職銜仍令巡撫六年以上即取掌臺部其有失機僨事悉從敗軍之法如先朝制縱得末減不廢禁錮如是則人將憂其敗而希其成邊防大計自知所以圖之而所謂最可憂者不煩聖主之外顧矣是謂明巡撫之功罪何謂重將臣一曰求實用二曰慎武舉三曰廣任使四曰懲欺玩夫將才所須本將戰陳况于邊方殺賊之外豈有别事近年倡為儒將之說以致武職不務本業競為浮誇雅言而矩步繪句而摛章撫按以是為薦揚本兵因之而任用墮國家神武之威銷英雄感慨之氣為害非淺况鸞刀解牛豈其適用急須洗此頽風還其本業作之新之如式怒蛙寧粗直猛暴之失勿從容文雅之是庶得跅弛之士克廣鷹揚之任矣夫是之謂求實用且武舉所以選將才也今退學生員緣此以隱避差徭白丁快餘假名而希求進用豈有韓彭之良在此闒茸之內就使僥幸掛名便無可用之地邊方贊畫騷擾居多掛印登壇從來未見不若罷去閒人止許武官應選仍分邊方腹裏如㑹試之南北卷更多其名數以廣賢材勿偏重浮詞以遺驍果夫然則既是見官即可推委亦自知重不肯茍同將見邊方腹裏均有所賴得人為盛矣夫是之謂慎武舉又國家推用武職止許指揮以上官而千百户不與將不隳墮人心阻遏賢路乎使得程功積事以次而升既足任使之資亦廣忠良之勸不亦可乎夫是之謂廣任用先朝軍機法重邊官不敢欺蔽否則禍出不測今乃造為活套規避任情巡撫將臣同然一律本屬陳亡而云回營身故本是敗失而云走死官馬襲殺老小而云入冦斬獲戎馬在門而云追襲出境殺掠至萬而不以聞連城陷沒而報無事死者含寃而不䝉恩生者憤悶而無控訴若不痛懲此弊賞罰何以得明賞罰不明則邊事未可知也必申嚴敗軍之法更為欺玩之例使將臣畏而懼敗敗而不敢隱則警聳之下人自求全邊事或可興矣夫是之謂懲欺玩嗚呼百步之矢激于寸括千鈞之運轉在隻輪今之論者孰不知巡撫將臣為急哉顧言之不得行行之不得至茍簡因循遂至於此若非聖天子鋭意講求大臣極力贊襄必賞必罰一洗積習之弊則雖言官諤諤朝議諄諄而因循之根終不可拔茍簡之為又復延蔓矣如九邊何哉如九邊何哉語云根本在朝廷此知要之言也敬附于後聊以見臣子期望之心焉耳治盜劉基郁離子曰勸天下之作亂者其招安之說乎非士師而殺人謂之賊非其財而取諸人謂之盜盜賊之誅于法無宥秦以苛政罔民漢王入關盡除之而約三章焉殺人傷人及盜而巳秦民果大悅歸漢漢卒有天下由是觀之豈非他禁可除而惟此三者不可除乎天生民不能自治于是乎立之君付之以生殺之權禁暴誅亂抑頑惡而扶弱善也暴不禁亂不誅頑惡者不抑善者日弱以消愚者化而從之亦巳甚矣而又崇之以爵祿華之以寵命假之以大權使無辜之民不可與共戴天者釋其讎而服事焉是誠何道哉遂使天下之義士喪氣勇夫裂眥貪夫悍客攘臂慕效以要利祿故曰勸天下之作亂者招安之說而世主弗悟也悲夫或曰然則舞干羽而苗格非歟曰甚哉俗儒之梏于文以誤天下也舜典曰竄三苖于三危又曰分北三苖夫竄與分北皆非撫納降附之詞也則豈因其來格而遂為之哉非人情也聖人豈為之必也以兵臨之而後分北其來格者安之頑不悛者竄之耳又况干羽非特文舞則非由誕敷文德而遂弛其伐苖之謀明矣臯陶曰苖頑弗即工帝念哉念兹在兹則有虞之君臣不頃刻而忘苖可想而見豈若後衰微偷惰之君臣以姑息為幸而以勸賢之爵祿勸天下之大憝哉遏盜之機一丘濬國初於南京設為四十八衛每衛各有營營兩際各為門本衛官軍就居其中遇有警急起集為易又于五城各設兵馬司設立弓手專以巡徼京城內外即周官修閭氏之職也又于各坊里巷立為火鋪支更守夜其與修閭氏所謂互柝追胥者無以異焉蓋衛所有定居則呼召之軍易集巡徼有攸司則追胥之責有歸祖宗思患預防之意深矣惟今京師蓋襲勝國之舊街坊里巷參錯不齊衛所散處而士卒之名𨽻尺籍者聚散無常甚者野處在數十里之外幸而承平無事一旦不幸而有意外之變出於倉卒之間急欲有所召集豈不難哉臣愚欲于無事之先而豫為有事之備請復祖宗南京舊制雖然時易勢殊當守成之後而為創始之謀未易也無巳請用祖宗之意以為今日之備可乎南京之衛四十八今京衛七十有餘其衛署隨處散置中亦有未置署者且其軍士雖係籍衛中食糧至其操練以待調發則分在各營必欲使每衛各為一處聨比其居决有不能者今名籍在衛所隊伍在將領而其居之地方則各屬兵馬司也今京城地大人衆聚四海之人雜五方之俗承平日久人烟衆盛奸宄實繁一城之大僅設五司官僚十數員兵卒百十輩而京城內外不下百十萬人家力有所不周勢有所不及臣請每城量地廣狹逺近添設行兵馬司數處每處添設副指揮一員居守其司署相去以鼓相聞為限司前用四木建鼓樓一所添兵置鼓以支更每更聲鼓而火鋪則擊柝以相應由近及逺不許雜亂又于該轄地方除官民及匠外凡係見操官軍在地方住者不分賃寄及上班者皆俾報名附冊就於本方見居軍官中推舉其管操者一員官最髙者或侯伯或都督都指揮無則把總指揮為衆信服者奏聞以為地方總領每季一造冊冊成各為三一留本司一送兵部一送總領官每季行司兵馬率領本坊見居官軍趣赴總領官私居參見每年四見此外不許擅自起居舊例每兵馬司嵗委御史一員督察今既多立分司宜隨地方廣狹添差分管遇有警急兵部下兵馬司行御史該督司起集該方官軍赴總領去聽用如此則倉卒事起有備無患雖非祖宗設立軍營初制然其間處置得宜運用有方則亦其遺意之倣佛也又京城內外自來街坊因襲前代舊名俚俗不雅混亂無别宜令各該御史督同兵馬司官分界畫圖别立新名每處立一大鋪分統小鋪每小鋪設更夫六名每夜自二更一㸃起守至四更三㸃止其初更及五更不禁人行每更二人一守一巡其大鋪更夫倍之大鋪之立必在本巷內出大街口邊對立木橦二三尺以下懸鐵索三以截斷行路二更一㸃以後即橫絙以絶往來至四更三㸃方開其他小巷口可通大街處俱為柵門一更三㸃即鎖斷五更一㸃方開各行司馬為印烙牌數十面遇有公事及人家水火昏喪緊急等事許先赴行司告領牌面遇夜照放無牌面闌出及擅開者坐以罪每大鋪置大銅鑼一面小鋪各置小者一面遇有盜竊即聲鑼相應其城中大街及城下皆不必立鋪大街中及城下居者俱守各巷口大鋪大約京城直南北大街不過數處假如崇文門自門至四樓為一節又自此抵城下為一節每節夜撥馬軍十五名每夜止巡二更三更四更更輪五騎往來巡邏其餘放此其九門城垣之下以城為限每城撥軍之數亦如之其巡邏之軍五軍大營每日于見操官軍內輪差如此則人家有盜賊之警更鋪得以闌拒而賊不得以出入國家有倉卒之變軍士易于召集而賊不得以縱橫此雖瑣末之事而所關係實大為國逺慮者可不加之意乎臣因是而又有一見焉昔者周幽王舉火以戲諸侯則是三代之時不獨邊境置立烽火而宫禁之中亦有之也今國家運氣隆盛德厚澤深所謂億萬年磐石之宗泰山如四維之者也萬無意外之事然杞人憂天天豈有墜理而杞人憂之憂之誠愚也然不失為愛天之深臣愚請于皇城中預蓄二髙竿猝有不測之事即于瓊臺上立之懸紅燈為號其事緩急以燈多少為符預以遍告諸總戎大臣俾知其故又於九門上各立髙竿以懸紅燈定多少之數以示緩急之别遍告諸軍以為進止分散之今如此則不煩三令五申而六軍萬姓可以不言而諭不召而至矣此亦愚者之一慮也遏盜之機二丘濬臣按盜賊之竊發往往以妖術惑衆伏讀律文有曰凡師巫假降邪神書符呪水扶鸞禱聖自號端公太保師婆及妄稱彌勒佛白蓮社明尊教白雲宗等㑹一應左道亂正之術或隱藏圖像燒香集衆夜聚曉散佯修善事扇惑民人為首者絞為從者流其法可謂嚴矣聖祖制法之初其慮一何逺也然欲禁絶其源當自京師首善地始宜敕巡城御史及兵馬司官凡京城內外有假鬼神降神書符以救病執事為名者即令街坊火甲具名報官究治驅遣之其當禁治而不禁治與容而為之者治以重罪及通行天下凡人家有收畜異書者皆許赴官受直三月之後不首者他人首發重罪之是亦治朝遏亂之一術也遏盜之機三丘濬臣按富蘇二臣所見略同蓋盜賊竊發古今代有彼其紛紛攘攘之徒為人所劫制者心無定志為利而動既可以誘脅而來亦可以哄嚇而去無足慮者所慮者粗知文義識古今者爾其言足以動衆其智足以設謀其縱橫詭祕機略變幻尤易以惑世而欺人此等之人茍非平時有以收拾之使其有所顧藉而不肯為非即不幸一旦有事則彼在中國則為盜賊主謀彼出外境則為夷狄效力其為禍害有非旦夕可巳者仰惟祖宗用人於科目嵗貢之外别有賢良方正才識兼茂及經明行修諸科下至富户老人亦在使用之列蓋以天下之大人才有能有不能故以此待之使其咸盡所用而無遺也近日用事者乃盡去之而顓顓用科貢二途甚非祖宗意也臣愚願復舊制諸科以收拾天下遺才又敕有司凡士子有不習舉業者有他才能藝術可稱皆許薦聞隨所能而試之量授一職其大江以北人才朴魯固有心解而口不能言口言而手不能書者其中有知邊情諳武事及膂力技能過人者亦許以名聞量用以為都司衛所幕官或補任或添注或於武職中試職其中才能出衆者果有顯效則不次用之以為將帥以為方面異日為國立功名捍邉郵亦未必不賴其用也夫然則天下之有才者皆有用而無出位之思國家之所用者無遺才而無意外之慮黃巢必不販私鹽張榮必不為阡能草書檄樊若水必不量江面張元吳昊必不為夏人之用黃師宓必不主儂氏之謀徐伯祥必不引交人以入冦也遏盜之機四邱濬臣按大盜之起必劫刑獄必掠公庫必殺官吏自古禍亂之起皆始于此馴而至於其極四海塗炭宗社丘墟皆起於一州一縣之積也有國家者思患而預防之豈容緩哉昔羣盜剽劫淮南將過髙郵知軍朝仲約度不能禦令富民出金帛具牛酒使人迎勞且厚遣之盜悅徑去不為盜事聞富弼欲誅仲約范仲淹欲宥之臣竊以為弼之欲誅法也仲淹之欲宥情也請酌之情法之中使髙郵有城池士卒而仲約不禦之而使之越過其境固有罪矣若無城郭可為屏蔽無士卒可以拒敵而又無鄰境可救援與其徒手以受害不若以計而緩之不猶愈於坐致一郡之生靈之失其所乎此其失在於朝廷不在於州郡州郡之罪在未事之先而不在臨事之際夫受人牛羊為之牧而不為之間校使為盜所竊則牧者不能無罪也責其不能為間校之罪則可今盜來而彼能以計却之使牛羊不失而坐以失牛羊之罪則過矣臣謂州郡之罪在未事之先而不在臨事之際者此也雖然城池之不設兵卒之無額豈但州郡之罪哉而朝廷之上廟堂之尊亦當分其責焉臣請自今以後凡天下府州縣無城池當要害處即議與築城置軍其不可置軍處則令巡按方面及守令計議或用民力或用官錢賃工以次第為之就用附郭市民免其雜差編為丁壯夫甲量其額數守之其餘州縣地狹而民少不可為城守者亦量與丁夫為守凡其所有倉庫錢糧甲仗俱寄郡庫犯罪重囚俱監郡獄有城池處如此則凡有官司皆有城守民有依附之所軍有禦備之具異時為冦所攻劫罪有所歸而彼亦無詞矣是雖一州一縣之事積而纍之天下之大宗社之安未必不由此也為國家逺慮者所宜深致意焉遏盜之機五丘濬臣按彭城乃天下南北之要衝其形勢風俗物産蘇軾言之盡矣雖然漢唐都關中此地在當時為逺郡宋都汴梁此地在當時為陪輔其在今日則在南北兩京之間運道所必經之地凡今天下十三藩其九藩皆由兹以北上南出數百里則為帝鄉興王之地祖宗陵寢所在關係非但漢唐宋時比也臣於京輔屯兵條下請於此處立為大鎮命大將一員統領江淮上班官軍於此守鎮一以守護漕運一以屏蔽皇陵而於一方之盜賊亦藉是以鎮遏之則兩京有通融之勢萬里無隔絶之患而宗社之安如磐石之固矣遏盜之機六丘濬臣按先正有言元之失天下招安之說誤之也何則人君所以立國者以其有紀綱也所以振紀綱者以其有賞罰也賞必加於善刑必施諸惡使天下之人知所勸懲焉則治本立矣方國珍者當天下無事之時一旦敢為天下先為元人計宜痛誅勦之以懲夫民之不逞者可也乃聽人言行招安之䇿不徒不加之以罪而又授之以官是以賞善之具以勸惡也由是羣不逞之徒紛然相仿效相誘脅事幸成或得以為王為伯不成亦不失州縣之官用是盜賊蜂起而元因是亡矣雖然豈但元哉宋人有詩云仕途捷徑無過賊將相竒謀只是招則其來逺矣然則國家不得巳而當此時有此冦何以處之乎弭禍亂者必折其萌國家無事之時齊民無故首興禍亂要必合天下之力以攻之遏絶其萌使毋致於蔓衍决不可用招安之䇿也萬一不得巳而用焉必播告之曰除首惡某一名不赦外其同黨有能自首及縛其人來者皆宥其罪量加以賞焉使一世之人皆知朝廷嚴首亂之誅的然不輕恕則禍亂之原塞矣遏盜之機七丘濬臣按自古論盜賊者多矣惟宋秦觀之言最為切中機要謹備録之以為後世之鑑觀之言曰治平之世內無大臣擅權之患外無諸侯不服之憂其所事乎兵者夷狄盜賊而巳夷狄之害士大夫講之詳論之熟矣至于盜賊之變則未嘗有言之者夫豈智之不及哉其意以為不足惜也天下之禍嘗生於不足惜昔秦既稱帝以為六國巳亡海內無復足慮為秦患者獨胡人耳於是使䝉恬北築長城却胸奴七百餘里而陳勝吳廣之亂乃起於行伍阡陌之間由此言之盜賊未嘗無也夫平盜賊與守邊疆之術異何則塞外之兵甲馬如雲矢石如雨牛羊槖駝轉輸不絶其人便習而整其器犀利而精故方其犯邊也利逺戰以折其氣盜賊則不然險阻是憑鈔奪是資亡命是聚勝則烏合非有法制相縻敗則獸遁非有恩信相結然揭竿持梃郡縣之卒或不能制者人人有必死之心而巳故方其羣起也速戰以折其氣勿迫以攜其心蓋非速戰以折其氣則緩而勢縱非勿迫以攜其心則急而變生今夫虎之為物嘯則風生怒則百獸震恐其氣暴悍可殺而不可辱故捕虎之術必先設機穽置網罟撞以利㦸射以强弓鳴金鼓而乘之不旋踵而無虎矣至蛇與鼠則不然雖其毒足以害人而非有風生之勇其貪足以蠧物而非有震恐百獸之威然不可以驟而取者以其急則入於窟穴而巳故捕蛇鼠之術必環其窟穴而伺之薰以艾注以水彼將無所得食而出焉則尺棰可以致其命北敵虎也盜賊者蛇鼠也虎不可以艾薰而水注蛇鼠不可以弓射而㦸撞故曰平盜賊與守邊疆之術異也雖然盜賊者平之非難絶之為難平而不絶其弊有二不可不知也蓋招降與窮治是巳夫患莫大於招降莫深於窮治凡盜賊之起必有梟桀而難制者追討之官素無竒略不知計之所出則往往招其渠帥而降之彼奸惡之民見其負罪者未必死也則曰與其俯首下氣以甘饑寒之辱孰若剽攘攻劫而不失爵位之榮由是言之是乃誘民以為亂也故患莫大於招降凡盜賊之首既巳伏其辜矣而刀筆之吏不能長慮却顧簡節而疏目則往往窮支黨而治之迫脅之民見彼汚者必不免也則將曰與其嬰錮金木束手而就斃孰若逃遁山海脫身而求生由是言之是驅民以為亂也故禍莫深於窮治且王者所以感服天下者惠與威也仁及有罪則傷惠戮及不辜則損威威惠兩失而欲天下心畏而力服堯舜所不能也夏書曰殱厥渠魁脅從罔治舊染汚俗咸與惟新蓋渠魁盡殺而罔赦則足以奪奸雄之氣脅從汚染不治而與其自新則足以安反側之心夫如是天下之人孰肯舍生之塗而投必死之地哉嗚呼自古建平盜巳亂之䇿莫有過于秦觀之論者其論三篇後篇即蘇軾代李琮所草之疏也國家為治誠能輕徭薄賦省刑戢吏遇有水旱即與賑濟自無盜賊之生發矣不幸而有焉方其初起未成之時即速與剪除不容少緩若其氣勢既成必須委曲計慮不可有輕之之心臣自出仕以來嘗三見反冦矣其初也皆以官軍輕之反為所敗資以器械甲兵其勢遂張大殆其後也復調官軍懲前日之敗往往持重堅守彼遂墮吾計中一舉而滅之此巳然之明效也何則蓋盜賊之初起也所以扇惑乎平民鼓動其惡黨者皆曰朝廷之政令不行衛所之官軍素怯城池之守備不固輒與之尅期曰某日攻某城又某日攻某城不旬月而吾之事成矣既而至期皆不應焉則衆見彼言之無驗謀之無效而知其事之决無成自然解體而散矣由是觀之秦觀所謂平盜賊與攘夷狄之術異驗於臣之所見尤信論治盜王廷相嘗觀民之為盜有侵漁迫於外饑寒切於身勢不得巳而為之者亦有無賴惡少不事生業習於下流得巳而為之者是人也豈其天性有異於人惡生好死而樂為之哉良以上無美政而因以失其良心下無法守而漸以成夫偷俗故爾是故古之明王每急於安撫懷來之實以養其樂生之心不懈於提撕警覺之令以攝其放曠之氣故風俗淳厚而盜警不作使為治者不務乎安輯保育之勤而惟事乎攻擊捕滅之術而羣聚不逞弄兵潢池雖布武宣威以成平勦之功而良民荼毒亦慘矣豈為政之上䇿也哉邇者竊礦之凶俱巳授首未起之黨皆為寒心此正平定安輯之時不宜深求過計以激其反側而興其擾攘也何以言之戡定亂略之後而猶督捕之急可以致吏承風悅上以立名可以致捕者因之為奸可以致民不得其死者多可以致故黨疑懼而不自安夫郡縣之吏皆觀望於上司之意向而為之也使一賊之克而功賞之頓加一䇿之得而顔色之遽及由之因以市譽因以進秩相效而起奔走恐後仗劍率衆四搜於山澤萑葦之間無虛日矣嗟乎盜賊橫行之日為之殊可以勵功勸衆而安平之後實生煩擾爾故曰可以致吏承風悅上以立名夫捕盜之令雖出於官府而執兵驅捕則藉於民快此等小人惟利是計使在上者不此為急則刑罰清明良惡區别彼固不得緣之為奸一或偏重而惟賊之是得則死生真僞由彼是任指扳無辜搜撿財産肆行而無忌矣故曰可以使捕者因之為奸夫禁盜所以為民也盜得其真民斯乃安風聞而捕者無為盜之實妄扳而捕者無可據之贓挾讎而捕多所誣之罪非以安之實以禍之矣况鷹鸇狼虎之吏惟欲多所捕獲大張聲勢以要竒功上司隔逺一時不得躬訊祇憑巧文不知欺蔽真正之賊一而良善之民十犴狴如海玉石俱焚貧弱之家無所控訴豈不哀哉故曰可以致不得其死者多夫治盜之要殱其渠首解宥黨與不直人心易安亦且地方省事此古今不易之道也今大冦既平宜稍示休靜以安餘黨失此弗圖更加嚴治則郡縣巡捕之吏豈能一一斟酌事機連根蔓結窮極瑕隙激成而變勢亦或有海翁之於鷗鳥非必畢羅彈射之加也一有欲取之意巳駭翔而不下矣况靈於鷗者而尤親觸其必死之機有不駭而變者乎故曰可以致故黨疑懼而不自安嗟乎今山東之所患者其勢凶志繆未有大於礦徒者也聚之則千百成羣不敢逼捕散之則一夕解遁莫可踪跡以愚計言之當以不治之法治之則不期靖而自靖矣何以言之此徒之所欲者礦而巳使洞無可入之隙彼何所利而為之故首當責實於塞洞凡塞洞之法不一有以泥塗於棘茨之上者有以巨石加灰泥者有以堅築土壤者此雖費工可以經久不得易開今之塞洞一切茍簡為之惟填巨石於洞口雜以小石補罅而巳故礦徒之來一時可開彼知利可易得故風行電掣三兩日夜其事就矣比及官府知而捕之彼巳得利而散故曰首當責實於塞洞夫今礦徒多四方來者必得近礦之家以為住歇之處斯踪跡隱蔽紏聚可成不然則易敗露彼烏敢肆然為之故次當保察於近礦之民使之十家為保保有保長十保為總總有保正使一保之中各相覺察但係面生可疑之人必要追求所來之自使之不得潛避為奸有司仍委公平亷能之吏不時巡察以提撕警覺保甲之衆如此則礦徒既不得與近礦之民相緣為奸而礦洞又不得一時可以易開則竊礦之心漸以自阻而捕治之吏可以不用矣故曰次當保察於近礦之民漢渤海多盜郡吏不能平宣帝拜龔遂治之遂曰民困於飢寒而吏不恤故為盜爾臣請有以安之至郡罷捕盜吏與民休息諸持鋤耰者勿問於是賣劍買牛賣刀買犢而為良民所謂以不治之法治之則不期靖而自靖者此也今之議者曰民間有弓矢之便長鎗之利故民易以為盜欲嚴法令以禁之非官司不得造作愚竊以為計之者過矣弓矢矛鋋之利民賴以衛家禦變也百姓不得具於平時一旦值有盜賊之警不過束手就執而巳是盜賊玩禁而得以恣行良民窘束而反以受禍令之不善無過於此况民之為盜由其有不得樂生之心不在於蓄有兵器之利使其樂生矣雖百千有利彼亦知愛其死而不為使不得其生之樂則凡可以茍延性命無不為矣鋤耰之夫斬木揭竿亦可以亡秦又何必待於長鎗利㦸而後為之哉漢公孫𢎞言於武帝曰十賊彍弩百吏不敢前臣愚以為禁民挾弓弩便帝下其議吾丘壽王對曰且𢎞所以為禁者為盜賊以之攻奪也攻奪之賊知死而猶為之者大奸之於重誅固不避也臣恐邪人挾之而利不能止良民以自備而抵法禁是擅賊威而奪民救也帝以難𢎞𢎞詘服是弓弩長鎗之禁便於劫賊而不便於良民古今之所同然者如此嚴令禁之似亦不可大抵事勢之變懸於機緩急輕重毫末之差而機隨以低昻事因之成敗其關係於政也大矣固不可不熟思審處以求適當其機也若夫詳其術以止盜而捕不宜急宣其惠以恤民而兵不必禁此正今日事機之㑹也伏惟採擇所宜行之則地方幸甚送錦衣衛張侯出邏序羅玘嵗聿云莫燕趙之間惡子弟食飲博奕費且盡思為冦偷益急每伺朔風塵起躍馬突出周道上矢聲搜然雖有賁育千夫而手龜足瘃饑虛困悴之餘亦不免戰懼失色伏而獻囊免患於瞬息間誠畏之也况南人素綿道逺而疲三尺童子可以制之其所携者固其物也亦何擇於公私哉當是之時懸人之命於手壯哉翼虎也而國門南出三凃視他域尤多蓋河氷不舟天下貢道出焉故令甲三凃嵗遣錦衣支帥三人握符提衛士分出於邏其出必以子月望日又出三侍御並臨之凡兵民之司皆受檄指麾從事期以靖冦寧民足國阜財而巳今年中凃屬張侯養直侯豫友也少為武學生戰藝場不如志而抑就右階時尚為百户也嘗屢戰建州諸寇得今官亷毅為其大帥所知以其名請乃有是命非常數也今日建纛出郊乃乘虎皮韀弓䩨魚服僕姑在氷衛士屏息俯首不敢唾嚏不敢仰視就而子趍離而鵠立整若斧兀若尸人皆壯侯能戢士冦固在其掌中豫獨知其建州之戰夜半斬敵首獻軍門如殺狐鼠耳今兹禦人之冦固實健且趫也亦豈敢望於北人哉其出沒騰蹂必輕騎游韁無所止息豈若㫋車穹廬驅騎而悉衆以為重乎以豫觀之剪此穿窬胠篋之徒一籌耳使道上之旅去其畏心并力支撑而生死以之則形格勢禁彼固無能為也尚勞天子爪士之出哉况侯斬冦之餘勇視此輩蚤虱不啻也無著手處矣戢士亦其末事别筵有詩豫總其意為之序名臣經濟録卷四十三
