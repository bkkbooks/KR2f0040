body:
  text: 名臣經濟録卷四十五明黃訓編刑部律例進大明律表宋濂臣聞天生蒸民不能無欲欲動情勝詭僞日滋强暴縱其侵凌柔懦無以自立故聖人者出因時制治設刑罰以為之防欲使惡者知懼而善者獲寧傳所謂獄者萬民之命所以禁暴止邪養育羣生者也譬諸禾黍必刈稂莠而後苗始茂方於白粲必去沙礫而後食可餐茍梗化敗俗之徒不有以誅之雖堯舜不能以為治夫自軒轅以來代有刑官而五刑之法漸著其詳弗可復知逮魏文侯師於李悝始采諸國刑典造法經六篇漢蕭何加以三篇通號九章曹魏劉劭又衍漢律為十八篇晉賈充又參魏律為二十篇唐長孫無忌等又取漢魏晉三家擇可行者定為十二篇大槩皆以九章為宗歷代之律至於唐亦可謂集厥大成矣洪惟皇帝陛下受億兆君師之命登大寶位保乂臣民孜孜弗怠其訓迪羣臣諄復數千言惟恐其有犯慈愛仁厚之意每見於言外是大舜惟刑之恤之義也矜憫愚民無知陷於罪戾法司奏讞輒惻然弗寧多所寬宥是神禹見辜而泣之心也惟貪墨之吏承踵元弊不異白粲米中之沙礫禾黍中之稂莠乃不得已假峻法以繩之是以臨御以來屢詔大臣更定新律至五六而弗倦者凡欲生斯民也今又特勑刑部尚書劉惟謙重會衆律以協厥中而近代比例之繁奸吏可資為出入者咸痛革之每一篇成輒繕書上奏揭於西廡之壁親御翰墨為之裁定由是仰見陛下仁民愛物之心與虞夏帝王同一哀矜也易曰山上有火旅君子以明慎用刑而不留獄言獄不可不謹也書曰刑期於無刑辟以止辟而民自不敢犯也陛下聖慮淵深上稽天理下揆人情成此百代之準繩實有易書之奧㫖行見好生之德洽于民心凡日月所照霜露所墜有血氣者莫不上承神化改過遷善而悉臻雍煕之治矣何其盛哉臣惟謙以洪武六年冬十一月受詔明年二月書成篇目一準之於唐曰名例曰衛禁曰職制曰戶婚曰廏庫曰擅興曰賊盜曰鬭訟曰詐僞曰捕亡曰斷獄采用已頒舊律二百八十八條續律百二十八條舊令改律三十六條因事制律三十一條掇唐律以補遺一百二十三條合六百有六分為三十卷其間或損或益或仍其舊務合輕重之宜云俯伏闕廷投進奉表以聞臣等誠惶誠懼稽首頓首上言洪武七年月日具官臣等上表講明律意疏馬文升臣伏覩大明律一款凡國家律令參酌事情輕重定立罪名頒行天下永為遵守百司官吏務要熟讀講明律意剖決事務每遇年終在內從都察院在外從分巡御史提刑按察司官按治去處考校若不能講解不曉律意者初犯罰俸錢一月再犯笞四十附過三犯於本衙門遞降叙用欽此欽遵外竊惟國家大事莫先於刑獄刑獄所重莫先於人命蓋以死者不可復生斷者不可復續一女含寃三年不雨匹夫結怨六月飛霜以其寃抑之氣有以傷天地之和召水旱之災自古帝王莫不愼之古舜典有欽恤之言周書有敬慎之戒下至漢唐法家多取專門趙宋刑官設科取士皆所以慎刑獄而重民命也仰惟我太祖髙皇帝膺天眷命奄有萬方臨御之初屢詔大臣更定新律至于五六為之弗倦以求至當復命刑官重會衆律親御宸翰為之裁定務協厥中而於人命尤致意焉是以當時司刑官員多所用心而於律意務為講明鞫讞之際少有失平隂陽以和風雨以時而天下無寃民矣近年以來兩京法司官員或由進士初除寺正寺副評事主事或由知州行人就升員外郎郎中而御史亦多知縣所除到任之後未經問刑就便斷獄公差所以律條多不熟讀而律意亦未講明所問囚人不過移情就律將就發落且笞杖徒流縱有所枉為害未大至於人命一有所寃關係匪輕且如强盜窩主重在造意若窩藏强盜而不造意亦難問擬斬罪又如官吏懷挾私讎故勘平人因而致死重在懷挾私讎若因事到官但有笞罪雖勘致死亦止可問擬因公毆人致死徒罪又如故殺鬭毆殺人若兩人相爭互相毆打毆死一人則名鬭毆殺人一人未曾動手一人於彼致命去處有意致死則名故殺此等律意人多忽略有將强盜窩主未曾造意同謀止是分贓及官吏因公事毆人至死本無私讎故勘情由而俱問斬罪者有本係鬭毆而問擬故殺斬罪者有本係故殺而却擬鬭毆殺人絞罪者甚至謀殺故殺無尸檢驗而問擬斬罪輒取情真罪當奏請處決者或本因與人妻妾通奸其夫別項身死而問擬本婦因奸同謀殺死親夫淩遲處死奸夫斬罪者其他以非為是以重作輕者非一查得數年之間天下布按二司等衙門呈詳死罪重囚本院并刑部詳擬明白大理寺復詳合律該科覆奏處決幸蒙憲宗皇帝慈愛仁厚不忍殺人止令監著恭遇皇上嗣登寶位重念刑獄屢下明詔强盜無贓仗人命無尸檢驗者具奏定奪其節年原監該決重囚近日辨理寬宥者亦多若使當時就令處決則含寃而死者不知幾人矣其所傷和召灾者果誰之咎歟法司尚然則其餘府州縣衛所囚犯枉抑而死者又不知其幾何矣此皆原問官員律學未講律意未明之故也況府州縣官員多有不曉刑名不知律意者遇有刑名事務多有不能剖決問理而惟聽於主文之人蓋由巡按御史按察司官按治去處不行考校之故也如蒙乞勑兩京法司堂上官督令所屬官天下都布按三司督令斷事理問及浙江等按察司官并各府推官各要將大明律條熟讀講解深明其意不許似前忽略置而不講其問囚之時參錯訊鞫務在得其真情方才取招議罪之時尤須原情定擬不許輕易致有寃抑獄成之後難以辨明及通行天下大小衙門并兩京部屬官吏各置大明律一本朝夕熟讀用心講解務曉其意仍通行各處巡按御史按察司分司官按治去處遵依大明律內事理從公考校若有不能講解不曉律意者依律施行當奏請并降用者徑自具奏發落仍乞勑吏部行移法司將撥去進士就令與見任官員一同問刑以後該選之時兩京法司有缺先儘各衙問刑進士除授如果法司無缺方令除授別部等衙門是亦前代刑官設科取士之意也庶使人精法律而刑鮮濫施之弊獄無寃抑而世底刑措之美緣係講明律意以重人命事理未敢擅便謹題請㫖申明刑罰疏馬文升臣竊惟為治莫先於德教輔治莫先於刑罰非德教無以化導乎人心非刑罰無以懲戒乎奸宄故在帝舜之世契敷五教而臯陶典刑以弼其教是知自古帝王之御天下未有舍此而能致治者也洪惟我太祖髙皇帝膺天眷命奄有萬方當殘元入主之後法度廢弛之餘以為刑乃輔治之具不可不明首命大臣更定新律以一人心又命刑官重會衆律以協厥中而垂法萬世其勸善疸惡之意無以加矣且五刑之屬三千而罪莫大於十惡十惡之外而情莫重於强盜何則强盜之行執兵持刃生殺在其掌握劫財奸淫操縱隨其意欲比之叛逆之徒相去不逺所以强盜條云凡强盜得財不分首從皆斬例該決不待時所以禁暴去惡懲奸止亂而輔治者也祖宗朝凡錦衣衛捉獲强盜綁赴御前引奏者俱奉綸音三法司錦衣衛於午門前當時會問明白隨即具奏奉有欽依刑科三覆奏就行處決或有不待三覆奏而處決者所以良善知所勸奸惡知所懲典刑即正盜賊屏息至天順三年九月二十五日該司禮監官傳奉英宗皇帝聖㫖人命至重死者不可復生自天順三年為始每至霜降但有該決重囚著三法司奏請會多官人每從實審録庶不寃枉永為定例欽此蓋專指律秋後處決重囚臨決之際恐有寃枉故令三法司會多官審録即古帝舜欽恤大禹泣辜之心也恐强盜重囚不在其內且强盜既該決不待時何緣監至秋後處決因有前該傳奉欽依所以一向因循但係强盜不分贓之多寡情之輕重俱監至秋後與秋後處決之囚一同會審比及會審之時十死七八存者監禁日久翻異原情能言者俱作矜疑情雖重而不決柔弱者俱作無詞情雖輕而行刑況處決之際因是囚衆多至日晚或至更深人多不見甚非刑人於市與衆棄之之義且情犯有輕重故行刑有遲速今常若此則自此終無決不待時之强盜矣是强盜與鬭毆殺人者為無異矣又非歷代制律懲惡之意欲强賊之息得乎如蒙伏望皇上今後凡錦衣衛官捕獲强盜綁赴御前引奏者乞照先朝故事勑令三法司錦衣衛堂上官於午門前會問明白追有贓仗擬罪如律備由具奏奉有欽依刑科覆奏不必監候隨即處決中間果有情可矜疑者亦要明白上請定奪或有寃枉亦與辨明其三法司徑問强賊及殺一家非死罪三人凶犯務在鞫問情犯明白贓仗真正毋撓於勢要無拘於成案發大理寺審擬合律類奏奉有欽依者刑科覆奏亦就處決庶有以正邦刑而懲奸惡息厲階而安良善其律該秋後處決重囚照舊會審恭惟皇上寬仁慈厚實同舜禹而臣猶以此言進者蓋此時强盜恣肆劫財殺人全無忌憚比之往年大有不同殺一家非死罪三人者往往有之若不將强盜凶徒依律不時處決則恐厲階自此而生將來有不可制之患矣況辟以止辟刑期無刑帝王之盛也强盜有犯不時處決餘賊知警是辟以止辟之意也蓋兵刑二事每每相須惡之小者以刑治之而有餘惡至於大雖兵加之而無益矣臣叨掌邦政弭盜安民乃其職任茍有所見事干國體不敢緘默緣係申明律意以弭盜賊事理未敢擅便𢎞治七年五月二十七日具題二十九日奉欽依是法司知道欽此奏行問刑條例疏白昻本部等衙門會題前事先該委官監察御史王鼎署郎中事員外郎楊茂仁項亨明署左寺正事左寺副朱華呈各奉本部院寺劄帖𢎞治十一年十二月二十一日節該欽奉詔書內一款法司問囚近來條例太多人難遵守中間有行者三法司查議停當條陳定奪其餘冗雜難行者悉皆革去欽此欽遵備將法司歷年見行及申明問刑條例查出開呈以憑會議等因奉此依奉查呈前來會同太子少保都察院左都御史等官閔圭等大理寺卿等官王軾等通行查議停當除冗瑣難行遵奉明詔革去者不開外將情法適中經久可行者條陳上請定奪等因開坐具題奉聖旨你每還會同各該衙門再議停當來說欽此欽遵會同吏部等衙門太子太傅尚書等官屠滽等將前項條例查照明白再加議處停當理合開陳具奏伏候命下之日刊行內外問刑衙門問擬罪囚悉照此例施行永為遵守等因開坐具題奉聖旨是有點的六條還再議停當來說欽此欽遵續該本部等衙門會同將今奉欽依㸃出六條舊例再議明白具題𢎞治十三年三月初二日奉聖㫖都照舊行論條例尹直豫觀問刑條例蓋𢎞治中尚書白昻等所定擬朝廷初亦慎重詔諭詳審至於再三然諸大臣刑名缺精不無窒礙如殺一牛罪至罰十行之數月邊將奏稱軍需缺乏蓋牛禁過重人莫敢殺皮骨斤角無處可買朝廷悔而難改乃諭東厰官校莫加刺訪以此益見祖宗之法不可少更更則有弊瑣綴録定律令之制一丘濬臣按漢之律百有餘萬言可謂煩多矣而大辟之刑至千有餘條視成周時蓋數倍焉元成之世竒請他比又日益滋多成帝下詔令中二千石二千石博士及明習律令者議減死刑及可蠲除省約者可謂知所先務矣所謂竒請他比者竒請謂常文之外别有所謂以死罪也他比謂引他類以比附之不主正律也分破律條妄生端緒舞弄文法詆文致意所欲生即援輕比意欲其死即引重例上不知其奸下不測其故此民所以無所措手足網密而奸不塞刑繁而犯愈多也我朝律文比前代為省約其條止四百六十其死罪止二百二十用之百餘年于兹其中固有不用者矣未聞有所增加也特所謂例者出於一時之建請權宜以救時弊者也嵗月既久積纍日多朝廷未聞公有折衷是以刑官猶得以意為去取伏乞特下明詔如漢人所云者命在廷大臣及翰林儒臣會三法司官將洪武元年以來至於成化丁未以前事例通行稽考會官集議取其可為萬世通行者節其繁文載其要語分類例條以為一書頒布中外與大明律並行其成化丁未以後有建請者或救時弊或達民情則別書之以俟他日裁擇如此則民知所遵守吏不能為奸矣定律令之制二丘濬臣按自魏李悝作法經六篇蕭何加以三篇為九章後世作律者本以為宗劉劭衍漢律為魏律賈充參魏律為晉律唐長孫無忌等聚漢魏晉三家擇可行者定為十二篇自名例至斷獄是也本朝洪武六年命刑部尚書劉惟謙等重定諸律以協厥中以近代比例之繁奸吏可資以出入者咸痛革之每一篇成輒繕書上奏揭於西廡之壁聖祖親御翰墨為之裁定明年書成篇目一準於唐之舊采用已頒舊律二百八十八條續律百二十八條舊令改律三十六條因事制律三十一條掇唐律以補遺一百二十三條合六百有六分為十三卷其間或損或益或仍其舊務合輕重之宜其後以其比類成篇分合無統復為釐正定為吏户禮兵刑工六類析十八篇以為一十九約六百六條以為四百六十析戶昏以為户役昏姻分鬭訟以為鬭毆訴訟廏庫一也則分廏牧為兵倉庫於户焉職制一也則分公式於吏受贓於刑焉名例舊五十七條今止存其十有五賊盜舊五十三條今止存其二十八名雖沿於唐而實皆因時以定制緣情以制刑上稽天理中順時宜下合人情立百世之準繩為百王之憲度自有法以來所未有也且又分為六部各有攸司備天下之事情該朝廷之治典統宗有綱支節不紊無比附之勞有歸一之體吏知所守而不眩於煩文民知所避而不犯於罪戾誠一代之良法聖子神孫所當遵守者也然臣於此竊有見焉蓋刑犯雖有一定不易之常而事情則有世輕世重之異方天下初定之時人稀事簡因襲前代之後政亂人頑今則承平日久生齒日繁事久則弊生世變則俗改是以周人象魏之法每嵗改懸三典之建隨世輕重蓋前日之要策乃今日之芻狗此必然之勢亦自然之理也今法司於律文之中往往有不盡用者律文如此而所以斷罪者如彼罪無定科民心疑惑請下明詔會官計議本之經典酌諸事情揆之時宜凡律文於今有窒礙者明白詳著於本文之下若本無窒礙而所司偶因事有所規避遂為故事者則改正之仍敕法司自時厥後內外法司斷獄一遵成憲若事有窒礙明白具奏集議不許輒引前比違者治以專擅之罪如此則法令畫一情罪相當而民志不惑矣定律令之制三丘濬臣按冬曦之言謂立法貴乎下人盡知何必飾其文義簡其科條請更定科條直書其事毋假文飾以其准加減比附量情皆勿用之使愚夫愚婦聞之必悟切中後世律文之弊臣愚以為今之律文多蒙於唐唐之律則蒙於隋也冬曦所論者雖曰隋唐之失然自隋以至於今古今一律竊考今律為卷十三為條四百六十必欲不簡其科條不飾其文義惟直書其事顯明其義用世俗淺近之言備委曲詳盡之義所謂以准加減等文皆即實以書明白著其文曰該得某罪該杖幾十所加者何罪所減者何罪使天下有目者所共見有耳者所共聞粗知文義者開卷即了其義不待思索議擬而皆瞭然於心目之間昭然於見聞之頃則民知所趨避不陷於機穽矣說者若謂祖宗成憲不敢有所變更臣非敢欲有所變更也特欲於本文之下分書其所犯之罪所當用之刑或輕或重或多或少或加或減皆定正名皆著實數使讀律者不用講解用律者不致差誤爾倘以臣言為可采乞命法官集會儒臣同加解釋標注其於四百六十之條不敢一毫有所加減惟於卷帙稍加增耳夫制為一代之律以司萬人之命垂萬世之憲非他書比今天下書籍支詞蔓語費楮何啻千萬顧乃於律書簡約如此無乃詳於古而略於今重乎詞而輕乎法哉迂儒過慮死罪死罪伏惟聖明矜察定律令之制四丘濬臣按唐有律律之外又有令格式宋初因之至神宗更其目曰勑令格式所謂勑者兼唐之律也我聖祖登極之初洪武元年即為大明令一百四十五條頒行天下制曰惟律令者治天下之法也令以教之於先律以齊之於後古者律令至簡後世漸以煩多甚至有不能通其義者何以使人知意而不犯哉民既難知是啓吏之奸而陷民於法朕甚閔之今所定律令芟繁就簡使之歸一直言其事庶幾人人易知而難犯書曰刑期于無刑天下果能遵令而不蹈於律刑措之效亦不難致兹命頒行四方惟爾臣庶體豫至意斯令也蓋與漢髙祖初入關約法三章唐髙祖入京師約法十二條同一意也至六年始命刑部尚書劉惟謙等造律文又有洪武禮制諸司職掌之作與夫大誥三編及大誥武臣等書凡唐宋所謂律令格式與其編勑皆在是也但不用唐宋之舊名爾夫法者刑之法也令者法之意也法具則意寓乎其中方草創之初未暇詳其曲折故明示以其意之所在令是也平定之後既已備其制度故詳載其法之所存律是也伏讀皇祖訓告之詞有曰子孫做皇帝時止守律與大誥而不及令與諸司職掌於刑部都官科下具載死罪止載律與大誥中所條者可見也是誥與律乃朝廷所當世守法司所當遵行者也事有律不載而具於令者據其文而援以為證用以請之於上可也此又明法者之所當知題律例事宜王恕臣備員棘寺叨司審録常愧無分寸之補奚敢有出位之思竊見法司中日逐擬斷之事揆之律例雖無不合推之人情亦有未宜今略舉一二昧死妄言伏望聖明少賜裁決著為定例庶幾事得其宜而人易遵守開坐具本謹題請㫖一件祛除凶德事臣惟姦盜凶德也凡人有一於身人皆賤之恥與為伍況堂堂清朝豈可容此等無恥之徒承襲世祿而玷辱聖化乎切見軍職中間守分盡職者固多而為姦作盜者不少且姦與盜名雖不同實則相等查得見行事例軍職犯縱容及抑勒妻女與人通姦者俱照敗倫傷化事例革職為民許令應襲弟男子姪替職其犯竊盜掏摸搶奪盜官畜産者法司因無事例止照常例發落仍令還職實是玷辱名爵有傷風化如蒙准言乞勑該部同三法司計議除已發落外合無將今後軍職有犯竊盜掏摸搶奪盜官畜産者如律罪之亦照敗倫傷化事例革職為民許令應襲弟男子姪替職如此則世祿及忠良之士在官無凶德之人矣一件抑勒為娼事伏覩大明律內一款抑勒妻妾及乞養女與人通姦者本夫義父不坐並離異歸宗其抑勒子孫之婦與人通姦者罪亦如之欽此竊照有等無廉恥之徒抑勒妻妾及乞養女并子孫之婦與人通姦討錢使用其妻妾及乞養女并子孫之婦堅執不從被其逼打不過才方將情具告法司因見不曾成姦律不該載止坐不應杖罪仍令婦人隨住切詳此等婦人思係良家不肯從伊為娼志節貞潔誠為可嘉今既告到官意脫免汚辱若未曾成姦仍令隨住彼不得志仍前抑勒稍有不從輒加捶楚以此婦女剛强不屈者必至死地柔善軟弱者終被汚辱實是敗壞人倫有傷風化如蒙乞勑三法司計議合無將今後但係抑勒妻女及乞養女并子孫之婦與人通姦雖未成姦取供明白就令婦女離異歸宗若婦女誣告亦依律罪之如此則凶徒不得肆姦而良善庶免汚辱矣一件囚人納紙事照得法司見行事例除真犯死罪竊盜并逃軍逃匠不納紙劄外其餘一應囚徒各納紙一分入官切詳立法初意蓋謂逃軍逃匠逃囚多是窮苦小人以此免其納紙今照報效義勇民壯舍餘勇士力士人等名雖與軍不同其實與軍一般操備征進為事一般照例發遣守哨法司因見前例不曾除豁亦令納紙未免破費盤纏實是窮苦不堪及有一家同居人口被人牽告三兩口在官者有之五七口者亦有之發落之時每人各納紙一分且民紙一分直銀三四錢官紙一分直銀一兩富實者固不為事貧難者從何措辦甚至傾家破産鬻男賣女若此窮苦實可矜憐如蒙准言乞勑三法司計議合無將今後問擬在逃報效義勇民壯舍餘勇士力士人等俱照逃軍事例免其納紙及一家同居人口有犯不分人數多少只令納紙一分如此則窮苦小人不致失所矣一件囚徒會赦事伏覩景泰二年五月初二日詔書內一欵官吏軍民人等為事問遣運米做工等項悉行放免欽此該衙門因見詔書不曾開有煎鹽炒鐵充軍伴儀從膳夫之類止運米做工等項放免却將煎鹽炒鐵之類仍前拘役切詳運米做工與煎鹽炒鐵等項囚徒俱係犯該徒流并雜犯死罪人數止是一時發落有此頭項不一矧詔書明開運米做工等項竊恐煎鹽炒鐵之類亦在其中若止將運米做工囚徒放免其餘煎鹽炒鐵等項不行放免非惟有違詔書事意且使囚徒不得均霑曠蕩之恩況煎鹽炒鐵等項多是窮苦軍民在工日久未免逃躲及至挨拏又不出官工役處所既不得其出力原籍原衛又不得伊當差兩相擔閣俱不得用徒有虛名實未便益如蒙准言乞勑三法司計議合無將曾經赦煎鹽炒鐵充儀從軍伴膳夫等項囚徒悉與運米做工等項一體放免如此則赦無彼此之分囚徒沾均一之恩矣一件除奸革弊事切照在京五府并各衛軍職官員俸糧折支銀絹椒米等物每季俱係各衙門差委指揮千戶等官赴內府總領出外分散中間有等無知委官不以錢糧為重惟務貪圗肥己多方侵漁略無忌憚有指以置買物件而侵欺者有假以抵換私債而剋落者或見彼軟弱而全不給與或因人不在而就不送還宿弊百端難以枚舉及至事發到官依法追問却乃展轉支吾不服招認錢糧被其侵剋官府被其攪擾蓋緣給散之際無有文職糾察照得例年賞賜軍士冬衣布花俱差給事中御史并戶兵部官親臨該衛眼同委官逐一唱名給散以此委官無由侵欺軍旗受其實惠弊源既塞詞訟自息此法最善實為便益如蒙准言乞勑該衙門計議合無今後每季關領軍職折俸銀絹椒米之時照舊各差委官赴府關領到衛仍照給散冬衣布花事例差給事中御史并戶兵部官分投督令委官將銀兩數分鑿成塊絹布每分捆作一束椒米每分包作一處如法封記眼同委官逐一唱名給散如此則侵欺之弊可革而告訐之風自息矣一件僧道犯罪事伏覩大明律內一款僧道犯罪曾經決罰者並令還俗欽此切照法司日逐問過僧道但犯一應大小罪名不分故失并曾否決罰者悉令還俗其僧道官有犯因見律不該載止照常例運糧運灰等項發落仍令還職臣惟僧道官主典教門表率叢林比之僧道戒行尤宜精嚴持身尤宜端謹僧道有犯既令還俗僧道官有犯豈可仍令還職且人誰能無過若將過誤犯罪及因人連纍致罪并犯罪不曾決罰僧道一槩令其還俗竊恐禁網太密下無全人如蒙准言乞勑該部三法司計議除已發落外合無將今後僧道官并僧道有犯公罪并過誤犯罪及因人連纍致罪者俱照常例運糧運灰等項發落仍令還職復業其犯奸盜詐僞并一應故犯罪名俱照常例運糧運灰決罪等項發落不分僧道官與僧道一體罷職還俗如此則事例得適中之宜僧道無故犯之徒矣景泰五年九月初日題奉聖旨三法司計議停當行介菴奏議陳修省疏何喬新節該太監韋闕傳奉聖旨近日京城雨水為災南京又奏大風雷雨之異朕當檢身飭行祗謹天戒爾文武百官尤當各加修省勉圖報稱毋事因循各衙門政事有缺失當舉行改正的斟酌停當來說欽此欽遵臣等備員法司所掌者刑所講者律不敢泛及他事竊惟刑律之制肇自虞之象刑其後夏有政典商有官刑周之三典以及漢唐宋而律書日繁我太祖髙皇帝肇造區夏本諸欽恤之心旁採漢唐之制定大明律以為輔治之具輕重適中度越前代矣列聖相承因時制宜又有事例以輔律之不及內外法司遵守惟謹逮今百有二十餘年罔敢違越然律文深奧百司官吏講解未明或以一字之文而害一條之義及其引律斷罪往往有乖律意承訛踵謬不知其非此乃有司因襲之弊非聖祖制律之本意也夫律意不明則刑罰不當刑罰不當則民有不得其死者矣臣等謹條今之擬罪有當改正者于後伏乞聖明裁處參酌輕重著于典章頒行天下永為遵守臣民幸甚等因具本奉聖旨這本恁還㑹都察院大理寺詳議停當來說欽此欽遵會同都察院右都御史屠等大理寺卿馮等詳議得凡告子孫及子孫之婦不孝并監臨官因公毆人至死及因事威逼人致死律例甚明近來有司遇有告子孫及婦不孝者不問虛實即坐重罪因公毆人致死者雖不曾用慘酷刑具俱作酷刑官員起送吏部奏請降調愚民或因忿爭小故致令自盡者俱坐以威逼致死此皆有司因襲之弊殊失律意合依本部所擬改正通行內外法司永為遵守庶幾不失聖祖制律之意其邊逺充軍江南等處發西北衛分江北等處發東南衛分律有坐定地方但近年兵部奏稱內外法司問該充軍人犯俱要就近編發以便勾取合無照依見行事例發遣中間有係降人等類者或發兩廣雲貴衛分充軍以防意外之虞其言國初定律之時鈔重而物輕經今百有餘年鈔輕而物重要將銀每一兩銅錢每一千文各估鈔四十貫揆之時估固為有理但銀錢估鈔行之已久合仍依原估其他一應貨物委有估計失當臣等再行斟酌計議務在輕重得中另行具奏定奪緣節該奉欽依還會都察院大理寺詳議停當來說事理未敢擅便今將議過緣由開具謹題計開一節該伏覩大明律內一款凡罵祖父母父母及妻妾罵夫之祖父母父母者並絞注云須親告乃坐又一款其祖父母父母誣告子孫子孫之婦者各勿論欽此竊詳律意蓋謂祖父母之於孫父母之於子天性之至親也子孫孛戾至於毁罵故坐以絞然恐人誣告致罪故曰須親告乃坐謂之親告乃坐者以見他人雖告不坐也近見問刑衙門遇有祖父母父母告子孫及子孫之婦罵者不問虛實輒坐以絞是乃親告即坐非親告乃坐矣使凡親告即坐何以有誣告子孫之律乎凡人之誣告子孫及子孫之婦者多出於愛憎之偏有因後妻之譖而憎前妻之子者有溺愛少子而惡其長子者有欲奪孫之資産以歸其子者有憎其孫遂及其婦者使親告即坐則雖恭順如薛包孝友如王祥者父母一有誣告將不免於死況其他乎合無通行內外問刑衙門今後若祖父母父母告子孫及子孫婦不孝者必須追究得實然後坐罪如律若祖父母父母偏私誣告仍依誣告子孫律擬斷庶無乖聖朝制律之意而克全天性之恩矣前件會議得合依所擬一節該伏覩大明律內一款凡官司決人不如法者笞四十因而致死者杖一百均徵埋葬銀一十兩若監臨官因公事於人虛怯去處非法毆打及自以大杖或金刃手足毆人至折傷以上者減凡鬬傷罪二等至死者杖一百徒三年追埋葬銀一十兩若於人臀腿受刑去處依法決打邂逅致死及自盡者各勿論欽此查得見行事例各處有司及問刑官有用腦篐夾棍烙鐵闌馬棍等項酷刑官員問罪起送吏部奏請定奪或降雜職或廢為民蓋所以懲戒殘忍之徒也近見內外官司或因督理公事或因考訊獄囚依法決打致死人命者問刑衙門一槩議作酷刑黜罷殊與律例不合且鞭作官刑撲作教刑自古有之但不當肆為殘忍以毒其民耳若因公事決打致死輒黜為民非律例之意也合無通行內外問刑衙門今後有犯除腦篐夾棍烙鐵闌馬棍等項慘酷刑具及於虛怯去處毆打致死者照例問罪為民其餘如因公事或笞或杖於臀腿去處決打致死者各依本律科斷不在起送降調之例庶於情法得中前件㑹議得合依所擬一節該伏覩大明律內一款凡因事威逼人致死者杖一百追埋葬銀一十兩欽此竊詳律意蓋謂諸色人等或逼取田園或强索財物或見愚弱而恐之以罪或因其卑賤而脅之以威其人畏威懾勢以致自殺者坐以前罪仍追埋葬之資給與死者之家近見街市愚夫愚婦或一時語言忿爭或偶因酒醉戲罵本無用威挾勢淩逼情由而愚民輕生輒便自盡者官司往擬威逼罪名追給銀兩殊非律意其罪雖止於杖然監追銀兩有力者隨即送官貧窘者淹禁連月甚至於鬻子女典房屋而後完納深為可憫合無通行內外問刑衙門今後遇有此等囚犯研審明白果係因事威逼人致死者依本律科斷若因一時忿爭或因醉戲謔互鬭等項致人輕死自盡別無逼迫之情者止依不應毆罵人等項律條科斷不必追銀庶幾情法相當而死生無憾前件會議得合依所擬一伏覩大明律邊逺充軍條內開江南并浙江江西等布政司府分發定遼山西等都司所轄衛分充軍江北山西陜西等布政司府分發廣東廣西等都司所轄衛分充軍竊見近來編發充軍囚犯不分南北多發西北邊衛充軍蓋以西北用兵故欲填邊衛也然此等囚犯多是原問斬絞罪名饒死及一應奸頑梗化輕於犯法之徒往往隨到隨逃仍復為惡雖有仍問死罪處決之例然逃者接踵終不知警況中間又有原係戎狄種類諳知邊情慣習夷語恐其乘隙逃入敵中為之謀主啓釁邊陲不可不防漢之衛律宋之張元可為永鑑合無今後編發充軍囚徒仍照律內所定地方原係北人者編發江南衛分原係南人者編發江北衛分庶可革其屢逃之弊亦可免意外之虞前件會議得充軍囚犯就近編發照兵部見行事例中間係戎狄者發兩廣雲南貴州充軍一伏覩大明律凡四百六十條其間計贓科罪者律也律一定而不易以贓估鈔者例也所以輔律可隨時損益之但國初制律之時每銀一兩值鈔一貫今則值鈔八十貫是國初常人盜銀八十兩方得絞罪監守盜銀四十兩方得斬罪今常人盜銀一兩監守盜銀五錢即坐絞斬罪名雖曰民俗澆漓恐人易犯故重以繩之然非祖宗制律之本意查得正統成化年間都御史陳智監察御史李志剛等各有論奏或欲照依國初估鈔常人盜銀八十兩方坐絞罪或欲照今時估常人盜銀一兩即坐絞罪合而論之贓輕罪重者似過於刻贓重罪輕者似失於縱況陳智等擬奏時估止稱銀兩銅錢而貨物因之及其後估計貨物雖有定規一向遵行就中輕重失倫者亦多如綿被一件值銀不過七八錢乃估以一百貫金一兩值銀不下五六兩止估以一百六十貫大車一輛值銀十餘兩而以七十貫估之柴草一大車值銀五六錢而以一百貫估之其他估計失常者不可枚舉依此論罪刑罰豈能得中合無今後估計鈔貫銀每一兩銅錢每一千文各值鈔四十貫其餘馬騾等畜并諸般貨物本部會同都察院大理寺從公斟酌估計務在合乎人情宜於時俗定擬停當通行內外問刑衙門遵依折錢擬罪庶幾得輕重之中而不失制律之意矣前件會議得銀錢估鈔照舊其餘貨物另行估計𢎞治二年九月十八日刑部尚書何等具題本月二十一日奉聖旨這本內罵祖父母父母一條係干倫理還著吏部會同戶禮兵工四部及通政司六科再詳律意講明來說其餘准議欽此水東日記名臣經濟録卷四十五
