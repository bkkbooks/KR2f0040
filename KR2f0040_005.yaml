body:
  text: 名臣經濟録卷五明黃訓編保治成化諫元宵燈火疏章懋翰林院編修臣章懋臣黃仲昭檢討臣莊昶謹奏為培養聖德事成化三年十一月二十九日內閣遣郎中韓定持小揭帖到於東閣及史館分與太常寺卿兼翰林院侍讀學士吳節令各賦烟火等詩以為上元賞玩之具臣等各授一帖內開烟火花燈等項面帖詩讃題目仍令照依舊詩格式擬述進呈及觀舊式俱是玩好之物鄙䙝之詞甚非所以養聖心崇聖德也臣等竊議以為此事必非陛下所為陛下以天縱之聖日新之學游心經術邁跡堯舜凡所舉動必欲為法於天下可傳於後世方即位之初首下溫詔赦田租絶貢獻蠲逋負停不急之務與民息肩又開言路凡朝廷政治得失軍民利病許諸人直言無隱天下欣然以為陛下應天心承祖德而所以太平萬世者在是矣及觀去年以來如遣人造楮國家舊制也一聞大臣之言而遂寢節令宴樂每嵗常例也一聞廷臣之疏而隨罷頃因災異勑諭羣臣同加修省凡此數事皆臣等目擊耳聞未嘗不拜手稽首稱頌以為陛下從善如流改過不吝自禹湯以來未之有也在彼者既皆陛下所不為則烟火之事臣等又决知陛下之不樂於此也今日之舉或者兩宫皇太后在上陛下欲極孝養奉其歡心非為一身娛樂之計然大孝在乎養志不可徒供耳目之玩好以為養也臣伏覩兩宫母后恭儉慈仁之德著於天下坤儀貞靜舉天下之珍竒玩好皆不足以動其心豈以烟火為樂哉况今兩廣弗靜四川未寧遼東雖云告捷然敵情難測尚費區處不可置之度外北敵瑪拉噶包藏叵測之心窺伺間隙尤當深慮江西湖廣一旱數千里民不聊生其他災傷處所尤多未易悉舉生靈嗷嗷張口待哺雖蒙優詔賑恤然公私匱乏計無所出可為寒心此正陛下宵旰焦勞不遑暇食兩宫母后同憂天下之日臣等又知陛下之不暇為此也至如翰林之官以論思代言為職雖口供奉文字然鄙俚不經之詞豈宜進於君上若不取法於聖賢而曲引宋祁蘇軾之教坊致語以為之皆是以三代以下之君望陛下而不以三代以上之君望陛下臣等遭遇聖明發身黃甲叨與庶吉士之選陛下養之翰林教之誦習六經師法孔孟二年於茲矣近又授以今職感冒國恩至隆極厚夙夜惓惓相與戒飾惟恐曲學阿世無所補報於萬一何敢為此鄙詞上瀆天聼以自取侮慢不敬之罪哉臣等又嘗伏讀宣宗章皇帝御製翰林院針有曰啓沃之言惟義與仁堯舜之道鄒孟以陳若今烟火之舉恐非堯舜之道烟火之詩恐非仁義之言臣等知陛下之心即祖宗之心故不敢以是妄陳於陛下之前且知其不可猶順而為之是不忠也知不可為而不以實聞是不直也不忠不直臣罪大矣古之帝王盤盂有戒几杖有銘目不視非禮之色耳不聼非禮之聲兢兢業業惟懷永圖雖在紛華靡麗之中幽獨得肆之地而所以戒謹恐懼操存省察以致其精一之功者無所不用其極誠以人主一心攻之者衆一惑於耳則凡侈靡之聲皆乘間而入矣一惑於目則凡侈靡之色皆抵隙而進矣人心愈危則道心愈微矣天理人欲不容並立若曰上元之樂乃微事烟火之舉乃細故此不足為聖明之纍是殆不然書曰不務細行終纍大德又曰不役耳目百度惟貞若於此一事厭常喜新之念興則他日之甚於此者將無不至不可以微事細故而不謹之也且漆器之作何損於德而舜則止之㫖酒之甘何害於事而禹則絶之露臺之費不足為奢而漢文則巳之彼聖賢之君何汲汲於是哉正以欲不可縱漸不可長故耳臣等伏願陛下寬鈇鉞之誅採芻蕘之語將此烟火等事一概禁止不使接於耳目而移此視聼為文王之視民如傷為大舜之聞善若决江河省此冗費以活流離困苦之民賞征伐勞役之士則干戈可息災旱可消百姓可以富庶四夷可以賔服億千萬年享太平無疆之休則陛下之所以奉養兩宫者其孝豈有大於此哉陛下深思而力行之不以臣言為沽矯不以臣等為迂濶使天下後世知大聖人之作為出於尋常萬萬是非臣等之幸實宗社生靈之大幸也臣等昧死以聞弭災修德疏姚夔切見今年春抵夏天氣寒慘風聲呌怒揚塵􅐈沙隂霾四翳日色無光近一二日來黃霧蔽天晝夜不見星日况今四月中旬雷不發聲考之洪範庶徴恆寒恆風急迫蒙昧之徴也月令季春行冬令則寒氣時發草木皆肅國有大恐傳記又謂大風黃霧白日沉沉政化未明之象又云雷於天地為長子主發生出則興利人君之柄也當發不發則號令失常所致天道如此驗之人事必有所因邇者朵顔三衛要結䝉古諸部窺覬邉境北敵瑪拉噶藏形遁跡謀未可測兩廣地方瘡痍日甚荆襄流民壅聚日多加以湖廣江西去嵗荒旱無收浙江處州近日强賊流劫四川雖常告捷郡縣賊徒蜂起大軍尚未班師四方事勢無時寧帖百姓供給日見勞憊倘積久不為之計患將不啻如目前者人事如此天其或者仁愛皇上因以警動之乎恭惟皇上受祖宗付託之重光膺寶祚敬天恤民任賢圖治無淫刑濫獄之慘有聼言納諫之美純仁至德人慶神歡天休滋至式克迓承凡五年於茲顧惟臣等俱以庸材叨居重任曽乏片言隻善啓沃聖心輔成至治用致人事乖而天道異罪重丘山不容逃逭雖皇上大德不即加誅而臣自揣實切愧赧日夜憂惶罔知攸措是用併德同心懇誠瀝血托取國計之急切者一二上陳伏惟皇上春秋鼎盛之日正嗣續繁衍之時奈何震位尚虛切係人望天與祖宗之意固自有待然臣區區愛戀之私有不能已前代逺事不敢援引竊見英宗睿皇帝臨祚以來克遵祖訓以御家邦而慈懿皇太后貴妃宸妃以下皆有關雎之德螽斯之美所以子孫衆多本支隆茂伏乞皇上修身養德感天格祖思國本之為不輕思宗社之為至重思聖體之當慎惜思聖愛之當均溥將見六宫奉職則百斯男九廟降祥本支百世實為天下大幸然此事自陛下身心上用力非求神奉佛所能致也若西山塔院勞民傷財宜在停罷阿咱爾之流惑世誣民宜在斥回其餘府庫金銀綵假俱是民間膏髓不宜浪自費用內局諸作匠役未為重大勳勞不宜濫與官爵此皆足以感傷和氣而召災異者也先儒真德秀有言人主修德講學則天下安昆蟲草木亦得其所此言誠為至論伏乞皇上奮發乾斷痛自省改仍乞每日視朝之後依祖宗及英宗皇帝初年未足疾時故事駕詣文華殿留心講筵裁决政事開誠心布公道以來善言親君子逺小人以圖治化凡一服食之所一言動之間悉依祖宗舊規如此而天意有不回災禍有不除臣甘當萬死不辭臣等區區忠誠所激不避忌諱伏望聖明監察臣等不勝幸甚陳政治終始疏彭韶臣伏覩成化二十一年正月初七日詔書內一欵凡朝廷政事缺失軍民利病許諸人直言無隱欽此欽遵臣忝偹員風憲之官幸遇聖明憂治之日不敢自諉在外隱忍緘默以仰負明詔求言之意謹以政治終為陛下陳之夫更新曰始成功曰終使政治常新而不失事功常勤而有成雖堯舜之盛不能外矣伏聞邇者星變既發於嵗暮又形於正旦此天心仁愛之至欲陛下善始善終而示於不言之表者也蓋嵗暮者天道之終正旦者嵗事之始天象兩見於此豈無意哉昔唐太宗時魏徴獻言有曰陛下志業比貞觀之初漸不克終者十事太宗嘉納至今稱為盛事臣愚妄謂今日之治不在他求惟守成化之初足矣茲於嵗首廣開言路禁止奢侈斥逐異端杜絶傳奉次第施行所謂漸不克終者非有如唐太宗之多然臣子之處心無已所望於聖明者不止於前數事也伏惟陛下嗣位之初廢立中宫特詔天下正家之禮嚴矣數年以來聞諸鎮守內臣貢獻土物於皇妃位下或加中宫之上又褒升其家幾與先帝時后家相等此陛下正家之禮有未終者也悠悠萬事惟此為大天意所以不豫人心所以湮鬱殆為於此臣伏見陛下至聖至明若俯念四海為家之義少納臣子家衆之言以時裁正俾彛倫攸叙則隂陽不調災害不弭未之有也成化之初內侍近臣進用稀簡防微之意蓋有在矣至於近年日有增益聞今大小名數將以萬計求之於古未見其比利源兵柄多付其手違禁犯科少有加罪所求能得所請輒從此陛下憲防之意有未終者也夫貴近之臣人所畏憚久預外事便成重輕臣伏見陛下臨御嵗久洞察事機宜及此時斟酌裁省俾內外事務各還職守立為定制以傳於後實萬世無疆之休不然異日故事已定偏重之勢遂成雖欲更張不可得已成化之初天下貢獻悉皆禁止儉約之德著矣至後數年鎮守公差諸人爭求珍異以充進貢海內臣庶實有憂心茲者又詔鎮守內外等官貢獻方物悉照天順三年以前例行不許因而科害軍民竊惟天順年間無事之時今遇災荒乃警戒之日古人遇有天災皆欲減膳撤樂豈宜轉令貢獻此陛下持儉之德有未終也先儒謂好貨之心乃天理之所有人情不能無然公劉好貨與百姓同之故國富而民足今前項官員不過剝取軍民之財以充貢奉之名豈有出自已物哉而乃水陸勞擾人畜疲頓怨歸公家恩被私室誠無益也伏望陛下畏天是圖將此貢獻盡行罷免則天下幸甚成化之初保傅六卿未嘗輕授用人之慎至矣至於近年邉方多事內郡流移而公卿輔臣無故而加保傅寺監衙門多以髙官兼掌及其致仕恩澤又日與之米嵗給之力無非所以禮大臣也然以是施於忠賢勞烈使人有所感奮若泛焉行之則人孰不思阿順從欲以圖日後之恩寵哉此陛下用人之道有未終者也自古平治天下責在大臣茍大臣自任既輕百司從而觀望後進一律世事將何賴耶伏望陛下慎重任使必忠賢而後優禮有勞烈而後加官不惟其官惟其人則羣臣幸甚臣聞因事為功古人所貴即其已往而慎於方來斯謂謹始而弗失則德澤加諸當時聲名昭諸後世所謂善終書曰終始惟一時乃日新又曰德日新萬邦惟懷此真陛下大聖人事也臣殞越妄言不勝戰懼之至緣是應詔陳言事理具本順差辦事官李錦賫奉謹題請㫖乞取回王太監疏王恕據江東馬驛報准前路遞到欽差內官監太監王牌面為公務事當職前往南直𨽻浙江江西等處公幹先遣牌面前去仰沿途軍衛有司驛遞巡司等衙門官吏即便抄牌預偹廪給口糧馬匹車輛軍民人夫等項差委的當官員管領聼候應付拽送毋得稽遲有誤公務惹罪不便所司官吏敢有指以饋送下程為由因而科斂軍民財物或體訪得出或被人告發輕則量情責罰重則枷釘解京奏聞區處或有假稱當職處陳告以憑懲治沿途遞牌衙門不分晝夜火速差人程遞前去毋得磨擦牌面字樣如有糢糊就便寫記驛名開申到職治以重罪先具抄牌官吏不違依准繳來仰將此牌程遞送抵南京㑹同館收候當職按臨至日通將各該官吏不違依准并執結連牌呈繳施行等因據報臣始則以為朝廷軫念淮揚蘇松等府地方饑荒軍民流亡恐臣等奉命不謹莫能區畫賑貸以致失所特遣近臣賫內帑錢物逺來救濟既喜且懼者纍日巳而傳聞太監帶百十號馬快船隻裝載私鹽前來河南收買玩好之物雖未委虛的第今大江南北饑荒殊甚斗米直七八十錢民有饑色野有餓莩老稚轉於溝壑壯者散而之四方不可勝數臣奉勑往來提督賑濟近來雖頗安妥而張口待哺者尚多若太監此行為賑恤饑荒而來則大江南北億萬生靈舉蒙再造之恩陛下盛德大業可以比隆二帝三王而無疆國祚可以與天地相為悠久矣若為收買玩好之物而來似此聲勢張皇未免騷擾郡邑驚嚇吏民臣恐逺近傳聞將謂陛下惟珍竒是好而無憂民之心致使狂夫得以藉口非社稷之福也臣以為當此饑荒之際朝廷正宜裁冗費却貢獻禁奢侈抑僥幸慎爵賞重名器輕徭役惜民力以收天下之心以培億萬年社稷之基本夫何織造傍午貢獻絡繹奢侈之風競起幸進之門大開遂使爵賞冗濫名器混淆徭役繁興財力日屈欲斯民之不貧且盜欲天下如泰山之安得乎昔唐太宗遣使往凉州諷李大亮獻其名鷹而大亮不可明皇令益州織半臂褙子琵琶捍撥鏤牙合子等蘇許公不奉詔其事載諸信史後之讀史者莫不稱太宗明皇之明李大亮蘇許公之忠今陛下以上聖之資居至尊之位聰明睿智本乎天性仁孝誠敬不待勉强可以為堯舜可以邁湯武尚何太宗明皇之足言哉臣幸際明時偹員巡撫偶有所聞若隱忍不言使陛下不知而天下國家受其弊豈忠臣乎非惟有愧於臯䕫稷契伊傅周召豈不有愧於李大亮蘇許公之輩是以臣不避斧鉞為陛下言之者非為身家計也為社稷計耳惟陛下留神深思速返其使併將前數事與臺閣大臣從長計議作急區處以安天下社稷幸甚生民幸甚臣不勝戰悚隕越之至扶植國本疏林俊臣惟君人之德莫大於聼納臣子之罪莫加於欺罔今年以來災異迭興兩京地震陵寢搖動日月繼食野熊入城監戒之昭莫此為甚而敵國陸梁犯吾北鄙邉氓騷擾戍卒咨怨誠不可不為之慮也臣愚謂此尚手足之疾耳陕西山西河南連年饑荒陕西尤甚人民流徙别郡及荆襄等處日數萬計甚者闔縣無人可者十去七八倉廪懸磬拯救無法樹皮草根食取已竭饑荒填路惡氣薰天道路聞之莫不流涕而巡按三司等官肉食彼土既知荒旱自合先期聞奏伏候聖裁顧乃茫然無知恝不加意勢至若此尚猶顧盻徘徊專事蒙蔽視民饑饉而不恤輕國重地而不言夫物極則變草澤之中禍深難測此誠腹心危急之疾治之當如救焚拯溺不可少緩者也乃者太學生萬安等具言將生員人等納米是固救荒之一䇿然此等欲事輕賫則彼地空乏買米無從欲他方轉運則困於劫掠道里難進臣恐緩不及事為今之計宜下寬恤之詔重欺罔之罪以收人心即遣才力大臣并科道部屬亷能等官分賫內帑之財星馳前往臨清等處聼其地里近便有運到官糧或鄰封積蓄官為顧車裝運兼程以行隨在賑濟則未死之餘民猶或可及然臣又有說焉孟軻有言死我所惡所惡有甚於死者故患有所不避也臣說一行則可泄天地神人之憤快聖祖神宗之心彰陛下為聖明聼納之主奠宗社萬億年無疆之休萬一忤㫖禍止臣一身耳臣何惜一身之禍不為陛下陳之臣聞修養之說怪誕無徴佛氏之教幻妄無取故其事不見於堯舜禹湯之世其誣每見於唐宋之時儒先之論史册所稽不可泯也謹按僧繼曉本一憸險小人市井無賴曩者猥指邪術欺誑楚府及至事敗挨拿却乃竄身逃罪不圖自新益加縱誕潜住京師多方夤緣誤蒙聖眷叠賜異恩五尺兒童切齒唾罵敢復肆無忌憚惑亂聖聰發內庫銀數十萬兩蓋大鎮國永昌寺臣細思之陛下聰明齊聖斷不為此是必繼曉小人倡為誕說謂此寺一建則聖夀日綿國祚益昌民命益永邉疆益寧以此啖陛下耳曾不知以可用之財供無益之費國計且日削矣以陛下超三邁五之資蹈唐憲梁武之轍聖譽且日損矣下人師師爭先事佛聖政且日壞矣居民重遷工役不息人怨且日興矣縱如繼曉之言先王之政斷不為此况萬無此理顧有大害者哉昔衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位豫焉能戰夫鶴之好似若未害其失人尚若此伏望陛下以類推之臣謂不斬繼曉異日之禍未可言也然縱之者梁芳也梁芳傾覆隂狠引用邪佞排斥忠良輔之者驟得美官觸之者動遭竄逐欺罔如趙髙奢侈如石崇數年之間假以進貢買辦為名盜祖宗百餘年府藏殆盡家資山積尚名不足所在風擾汪直莫能過乃復薦繼曉隂求蓋寺虛耗內財飛語外謂其極意不肯為是被陛下逼脅只得屈從是畏天下議巳欲陛下專擅謗耳夫臣善則稱君惡則歸巳今梁芳欲文巳奸而以過歸陛下即此一事已不容於誅矣且天下猶身也賢才元氣財用骨肉小人疾病也梁芳耗元氣削骨肉而引之以疾病臣竊為身危之臣斷謂粉梁芳之身不足償其罪之萬一耳臣德不足信職非言官熟知自默可以固位顧乃不自揣量與此二權奸臣抗可否是猶蝸觸山蛾赴火已不可言智矣然臣惟牛司耕犬司守走獸之微亦以勞而食也臣食於陛下且七年矣近以年勞復䝉增秩感愧無地中夜以思涕淚交流謂人主深居九重利害豈能盡知而祖宗在天之靈亦望臣等以言進於陛下也今內而大臣次而百官以及閭井之徒亦皆痛心欲食梁芳繼曉之肉卒之不敢以此言進於陛下者所惜者官所畏者死耳使臣復不言則陛下終不悟祖宗在天謂臣等何如人天下後世謂臣等何如人秉筆史官必譏笑臣等恐將及陛下矣昔魏任座答文侯何如主之問以直觸怒及問翟璜璜曰仁君也君仁則臣直向者任座之言直文侯悅使璜召座親下堂迎之以為上客臣不敢過望此然亦豈忍懷不直之言為陛下仁聖之纍耶臣誠不畏死惟陛下留神聼覽熟計而必行之則祖宗之光社稷之福臣民萬世之幸如臣言非是甘受顯戮以昭欺罔臣不勝激切之至附端峰存稿一邵鋭繫天下之治理者孰為重曰公論為重故公論明則君子進君子進則國昌而天下之理於是乎始矣所係固不重邪大參張公者曩官御史出按居庸用偹北冦當是時武廟頗事微行忽有馳騎突至曰駕將出關公即誓死連發三疏請亟還曰不然事且不測羣小氣沮竟奉以還天下莫不想望風采曰毅哉張公不負御史也已蓋公論所屬如此嗚呼天下當謹於微使正德初造密勿大臣克體遇巷之道善為之圖逆瑾未必遽橫瑾橫矣必欲盡上適意然後可以竊柄幸竊柄必欲盡箝天下之口然後可以惟所欲為而衣冠之禍始有不可勝言者矣瑾誅餘毒固在羣小乘之用固權寵而天下始有不勝其禍者矣當是時公顧屹然砥柱其間用遏暴漲誠不負御史者公論非公是屬顧誰屬耶附端峰存稿二邵鋭頃聞簡任留部固出私願揆諸時義似亦却好居間竊念大臣義欲有為於世必其信任日專機㑹可即援引善類布列要地候吾君志大定國是不搖然後徐議興革庶保克濟設使任我者既或未專前後左右復鮮同志顧欲屢有建白立致太平正恐當事者未必樂從若自已出諸不利者復以異議乘之不惟無益且啓不靖而黨事日滋矣不然有宋仁宗恭儉愛民後世鮮儷更事既久奮然思與范富二賢力圖改革用救極弊兩府臺課舉出宿望後相期朂仰副上意遐想是時何等氣勢尚為權幸所間竟不克少酬初志何耶義理無窮事變叵測吾人於此正合深思執古御今監戒具在尤不宜容易看過也臆說如此第自勇於任事者觀之將必難曰果若所言俟河之清人夀幾何吾既就列吾及吾時亟欲自效救寸得寸救尺得尺猶賢乎已顧鋭熟思終謂前說若於事理或有然者輒敢忘其鄙陋就正有道千萬諒察附送劉給事中巡撫山東楊士竒永樂十九年四月二十有一日上御奉天門顧羣臣若曰朕祗奉天命君天下天下之人其尚有未安於業而凍餒愁嘆者乎任牧守者其尚有苛刻黷貨而亂章以厲民者乎朕惟是孜孜夙夜之靡寧遂分命大臣巡撫天下而各副以近臣一人賜之璽書俾所至亷察民之利害而為之興革及牧守者舉其亷能而罷出其貪虐於是戶部侍郎李昶兵科給事中劉煥當巡撫山東山東介河濟連海岱而古魯之域也雖其壤地多肥沃然其人習氣緩慢加以比嵗旱潦疫疾之相仍而淪於艱窘雖故周公之國孔孟之邦然聖賢之德化逺矣仕於是者或失其良心誠有如聖諭然者昔漢唐宋數遣使臣行天下曰巡省曰安撫曰採訪皆今巡撫之職所以廣視聼逹民隱而其使之賢者多也今之奉命乘軺單厥心推明致公而無厭斁焉將使窮山深谷荒僻之人皆得以發舒幽鬱䝉被涵育而樂乎聖明之世者於上足以副君命下足以光使職豈不偉然有可譽可以擬昔之賢使者歟惟君以愛民為事天之實惟臣以愛民為事君之實諸君子是行也太平之責係焉可使有一毫之不至也哉煥字士極疏闓明敏於豫有鄉邑之義故於其行也歌皇華之二章酌之酒而申之以詞附葉伯巨鄭士利傳方孝孺葉伯巨字居升寧海東蒼里人也好讀書年二十餘有名於鄉黨選為縣學弟子員善說禮凡朋友有昏喪必禮相之為人耿介不能藏人短見人不善立折之不顧其喜怒人知其無他終亦不恨也以年長通經術升入太學未久詔諸生分教河北子弟伯巨得平遙縣待諸生如子弟諸生亦愛之如父兄洪武九年星變下詔求言伯巨曰今天下有三事最切其二事易見而為患小其一事難知而為患大此三者積於吾心久矣縱不求吾猶將言之况有明詔乎即為書言三事曰分封太侈也求治太急用刑太煩也今四方平矣民庶思治矣而不務以寬厚御之視誅殺人如滅螻蟻使民不獲安息欲以圖治難矣夫圖治於亂世之餘猶理絲於棼亂之之後緩之則端緒可得欲速則膠結而不可理今病民之不安奸邪不止朝夕異令賞罰不準君勞於上臣困於下治烏可致乎此二者人皆知其不可然非敗之根也所謂分封太侈者天子畿內地止千里而燕晋秦楚踰千里之國以封年少未逹事之王無事則易驕佚有事則易為僣亂此人所未知而臣所謂患難見者也其語皆切直上大怒曰小子乃何敢踈間吾家骨肉我見之且心憤况使吾兒見之耶速取以來吾將手射之而啖其肉耳伯巨至丞相乘上喜乃敢奏詔繫刑曹問狀瘐死獄中其同時言事有鄭士利士利字好養亦寧海人嘗為縣諸生其兄士原以儒薦為河南懷慶府同知遷湖廣按察司僉事士利因告於師去侍其兄游學有名洪武九年天下考校錢榖䇿書空印事起凡主印吏及署字有名者皆逮繫御史獄獄凡數百人士利兄亦以河南時空印繫獄中天子方怒空印事以為欺罔行省言臣二十餘輩守令署印者皆欲置之死佐二以下榜一百免死為軍逺方丞相大夫皆知空印無他罪可恕莫敢諫士利獨嘆曰上不知以為空印大罪誠得人言之上聖明寧有不悟懷欲言之適星變求言士利曰可矣既而讀詔有假公言私者罪之久之士利曰吾所欲言者為天子殺無罪為可痛耳吾兄非主印者固當出需吾兄杖出乃言言吾死不恨其兄免死出士利乃為書數千言言數事而於空印事最詳其意以為誠欲深罪空印者恐奸吏得挾空印紙為文移以虐民耳臣以為文移必完印乃可今考校䇿書合兩縫印非一印一紙之比縱得之亦不足用况不可得乎且錢榖之數府必合于省省必合於户部其數誠不可懸斷預决必至戶部而後定省府逺者去户部六七千里近者三四千里待策書既成而後用印則往來之難非期年不可致故必先用印而後書此權宜之務所從來逺矣何足深罪且國家諸法必明示之天下而後罪犯法者以其知不可而故犯之也自立國以至於今未嘗有空印之律有司丞相不知其罪今一旦捕而誅之則何以使受者甘心而無詞乎朝廷求賢士而置庶位得之甚難位至於郡守者皆數十年所成就通逹亷能之士非如草菅然可刈而復生也陛下奈何以不足罪之罪而壞足用之才乎臣竊為陛下痛惜之其書既成欲上者數矣而未决每歸逆旅則閉門俯首而泣泣數日其兄子侍行者疑而問之曰何所苦乎士利曰知吾有所事乎我以觸天子怒必受禍然殺我活餘人我更何恨遂持書詣丞相府士利短小容貌如常人見丞相頗倨丞相問何書士利曰吾將為天子言之丞相何問也丞相因御史大夫入奏上覽書大怒詔丞相大夫雜問誰教若為必有主謀者士利笑曰顧吾書可用與否如何耳且吾業既為國家言事自分受禍人誰為我謀乎詞卒不屈然猶輸作終身而竟殺空印者名臣經濟録卷五
