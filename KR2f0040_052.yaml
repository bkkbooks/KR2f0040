body:
  text: 名臣經濟録卷五十二明黃訓編工部虞衡屯田遵化縣鐵厰志邵寶工部分司在縣東六十里鐵厰中永樂間俱以各衛指揮領其事宣德末始委虞衡司官董之分司正統九年主事張孚建成化間主事馬祥鼎新焉正廳三間中外門各三間左司房三間譙樓三間右雜器庫鐵庫計二十四間米庫一間吏舍四間雜造局六間爐冶所鐵砂場獄二十六間爐房九間公廨過廳一間寢室五間四顧樓柴炭場萃景樓玩翠齋各三間滌煩樓亭一間廂房四間户所廳各三間在儀門外軍器局三間在廳北倉房五間在廳西北缺易州山厰志戴銑山厰之設專以燒薪炭供應內府宣德五年置於平山繼遷沙峪口景泰間移置滿城縣西十里惟設部堂之所周以垣墉構以稠木蓋以茅茨僅蔽風雨而已各府厰房未有定居率於西山寨口置厰燒採地荒又徙他處凡遇朔望及柴夫銷批倒解俱赴部厰習為例天順元年移置州城西北二里許其廳堂官民廬舍茍完而已其後建部堂於中環以土成八府五州分治以次而列皆南向前有東西長衢各屬州縣分治列焉每門各設坊牌以記之其部堂府治兩傍各有隙地為積放薪炭之所併植蔬果以供日用部堂總其綱府州縣佐二官分理其事民之執兹役者嵗億萬計車馬湊集財貨山積亦云盛矣然昔以此州林木蓊鬱便於燒採今則數百里內山皆濯然舉八府五州數十縣之財力屯聚於兹而嵗供猶或不足民之膏脂日以告竭在易尤甚上不虧國用而下能蘇民困仁人君子尚有以念之哉工部分治一所居厰之中直𨽻真定府分治一所營一所在部治東轄州五縣二十七直𨽻保定府分治一所營一所在部治西轄州三縣一十七山東兖州府分治一所營一所在部治東轄州四縣二十三山東青州府分治一所營一所在部治東轄州一縣十三山東東昌府分治一所營一所在部治西轄州二縣十六山東濟南府分治一所營一所在部治東轄州四縣二十六山西太原府分治一所營一所在部治西轄州六縣二十三山西平陽府分治一所營一所在部治西轄州六縣二十九山西直轄五州分治一所營一所在部治西轄縣一十七工部蕪湖分司題名記邵寶公署之有題名舊矣姓名邑里科第官階差遣嵗月之外不加一詞而褒貶之公論付之後人書之者無心而觀之者足以為勸為戒其微而婉也有詩之義其簡而嚴也有春秋之體是故君子尚之而歷世不能廢也我國家承平百五十有餘年百司庶府莫不任人就列內而省臺外而藩臬郡縣至於寓館署廳皆有所謂題名者蓋世平治久制備文繁雖不出於令甲而於事體亦若有不可缺者如此工部分司在蕪湖縣者實自成化七年始當時建議者以漕運舟船之料供應什器之料民不勝其科率蓋取諸材木之𣙜焉而蕪湖為畿輔近地當川湖二省下流商筏所聚故分司於是乎建大司空嵗請於朝簡委員外郎若主事一人主之期月乃代越𢎞治正德至於今蓋五十有六年矣歷官五十有三人先是𢎞治乙丑主事永平張君秉清者嘗一題之今主事嶽池張君大用謂其簡略失次也通加詳訂序書分注以刻諸石將俾繼自今有所考焉用為後人指議之地刻既成則託吾友李生原道書請豫為記豫惟六卿分職莫非天工王事而虞衡所職則涉於權利士大夫之自好者往往不屑於是然君子論為已之學者率謂錢榖簿書不足為纍蓋于其心不於其迹其道固然也况公私義利之辨正君子所當先講者故不當其事則已茍事有所當則夫地也吾致力焉而自考焉實於斯在蓋以公滅私固君子立心之要以義為利尤君子制事之宜以是事國何職不共以是立身何德不進易是則上干官針下招物議刑書史筆不在於今則在於後雖有他美莫之能贖而况無美可稱者哉古今記題名者莫不以司馬公諫院為先要其大指不過忠詐直回四言而已而後人所議率不能外今豫之虞於後人者豈有他哉亦惟曰某也公某也私某也義某也利云爾嗚呼人有恆言後之視今猶今之視昔也可不畏哉可不警哉張君發身賢科始仕初政乃是之蒞而於斯記汲汲焉圖之豫知君之能愛斯名也亦可以觀乎其人矣矧原道乃吾同年贈司空舫齋先生之子文行粹然克肖家學凡所稱君其言也信因附書之而不敢加一詞者亦題名體也名臣經濟録卷五十二
