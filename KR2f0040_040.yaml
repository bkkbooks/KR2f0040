body:
  text: 名臣經濟録卷四十明黃訓編兵部職方中之上余肅敏公奏議序楊廷和肅敏余公之卒于是三十又三年矣其嗣孫南京錦衣指揮承恩取其奏議彚次成帙以類相從分為六卷若巡撫若本兵若總督各二卷并附録凡百二十八篇諸孫翰林編修承勛又為之正其謬訛亟以請于工部尚書李公士修刻梓以傳尚書蓋公從子壻也公為一代名臣正不詭俗亷不近名其功業在朝廷惠澤在天下者夫人皆知之至其規畫之周詳奏請之委曲非稽之奏議則或者未必一一悉其本末今去公既久而奏議始行於世是固有待於後之賢子孫也初公之卒其子錦衣指揮置具公事行屬豫為狀以請銘於太史氏其所述不能十之三四時豫方從事史局得摘公前後奏牘及往日所聞於公者書之丘文莊公見之謂是足以盡公之槩豫意猶以為未足今取奏議讀之果然公嘗語人曰人臣事君當隨事盡力凡有建樹即近且小亦須為百年之計又曰大臣謀國遇有大利害當以身任之慎勿養交市恩為逺怨自全之地其城延綏時怨謗紛如公不恤執之不易卒以成功人至今利之且頌公之德不衰因言以求其志因奏以考其績蓋無一不相酬者信乎公之為一代名臣豫生也晚於公無能為役而公最愛豫公往年丁家艱歸取藏書分遺鄉人之職文字者特以大明律諸司職掌畀豫曰此可為異日用公之知我深矣獨愧老且無成無以為公報耳虞雍公嘗以鄉里前輩文獻無傳為後生之責豫在閣中欲撿范景仁張德逺二公奏議録之以傳而未及公固二公之流也斯集之傳豫得而序之亦可以有辭於鄉人矣軍務事余子俊該中軍都督府等衙門公文各將推舉將材官員職名開報兵部臣等議得將官凡在內者皆荷聖明簡用在外者多出撫按㑹保今五軍營坐營官缺尚要㑹官推舉以為將官預選之用今查得成化九年本部㑹官所舉將材選用將盡若不先事再行㑹保不無急於進取者奔競成風恥於自顯者愈致埋沒合無行移兩京五府六部都察院通政司大理寺翰林院科道并在外巡撫巡按二司官員各舉所知不拘侯伯都督見任帶俸都指揮但係存心愛人謀勇可取者每人訪保一二員各用公文明開職銜略節腳色見管某事堪任主將偏將緣由通送本部方㑹在京各官評議如果所保相應别無異同就行列名上塵御覽仍付本部行令照舊管理原委之事候在外各邊將官有缺臨期奏請委用除侯伯都督總兵巳重不須别議若都指揮堪任主將擬升五府堂上官署職指揮堪任偏將擬升都司堂上官署聽以示寵異以便行移向後果有戰功仍授舊職升倘遇一時恩例不在實授之例前項署職皆係流官其餘名器權以應變不至太吝經以守常不至太濫若急無將官之缺中間有堪補京營坐營把總即為補用使彼施其巳能勉其未至若有守候果久輒為改節者不再擬奏委用及或所舉不公事發連坐舉主如此縱是未盡得才終是公道有在題准巳經通行推舉去後今該前因臣等㑹官議得舉到將材官員有曾被推薦三四次一二次者目前所用大率類此但恐舉主一時聞見不真所舉缺當合無行令照舊修其本等職業候有主將偏將等項員缺臨期再為詢訪具奏定奪嚴捕盜賊事余子俊職方清吏司案呈京城內外例有監察御史并錦衣衛堂上官督同五城兵馬司并錦衣衛分定城方校謹嚴夜禁及迤南北直𨽻近京地方官路三處每年冬春三箇月每五里冷鋪內𣲖撥火夫住歇專令晝夜防護往來官吏諸色人等經行各路又差監察御史并錦衣衛官各一員帶領旗校前去督理防盜之法巳為周密奈何近來京城內外多有官民之家被其明火持刃劫殺人財直至房屋近京地方往來人等常被披甲響馬阻截道路若不申明舊例嚴加緝捕不無各事因循貽患不小奏抄到部臣等切惟京師乃宸居所在四方萬國所歸人煙輳集買賣繁華實有一等不務生理各處逃往軍匠囚徒心腹相結三五成羣為非作歹人號喇虎逮至家業蕩盡却乃賭博扶牌下棋打雙陸踢氣毬贏者得財仍恣所欲輸者喪氣䄂手無為遂至飢寒迫切發起盜心往往京師肆行劫掠防微杜漸誠不可緩乞勑五府六部六科各差有力量屬職官共五十五員內給事中五員㑹同錦衣衛堂上官并巡城監察御史督行五城兵馬司順天府委官通將城裏城外不分內外官民排門不越一家取勘果有容留賭博不務生理來歷不明軍匠囚徒等項許於各官處出首係民者送戶部係軍者送兵部係匠者送工部遞發原管官司收候無籍貫者送五城兵馬司監候事畢另議定奪以後再有逃來者查係發遣之數果曾原犯死罪遇䝉恩例得免仍送原問衙門擬以死罪鄰佑窩家今次并以後占吝隱蔽不舉俱與犯人同罪各官就行審編火夫除例該優免本身戶下二丁及止優免本身及官員優免本身一門外其餘大小人家不拘幾丁盡行編為火夫輪流坐鋪每夜務勾一十五名併力捕盜務在得獲不獲者巡城御史參奏責戒鄰佑不行救護者就行送問獲賊之日要問出窩家不服審編及審編不出者果係應請㫖者具實參奏餘人就行送問其火夫文册各官將稿付與兵馬司類造合用書寫之人行移國子監挨取應撥雜差監生五十名分投書寫合用紙劄筆墨本部行令順天府支給官錢買辦送用乞勑禮部查例禁約官民人等本等衣服靴帽等項不許僣分過侈以足財用以省奸盜其迤南北直𨽻三路軍衛有司照舊設立火夫防護道路及禁約往來人等早宿明行不許中賊奸計如果遇賊勢不能敵星馳通報京營差去把總官員撲捕毋得隱匿再乞聖㫖榜文將前項弭盜崇儉事由該載於內昭示臣民以為遵守各官此外再有所見何者為致盜之弊何者為弭盜之方俱要條奏以候災異陳言事余子俊切照去年以來陜西山西河南大旱饑民相食并正旦災異迭見星變有聲臣等條陳數事請自聖裁一自古遇災必汰冗官照得在京各衙門文職官員巳有諸司職掌額設等數近年以來額外添設數多及傳奉升授大小帶俸官員并寫經寫書等項冠帶食糧儒士匠官通計有二千餘員名其俸糧皂𨽻等項俱取辦於民不可勝數伏覩正統四年勑諭為因水災照永樂年間事例將各衙門多餘官員放回聽用方今百姓饑荒糧運艱難比之於昔災異有甚合無通行各衙門照諸司職掌額設官員存留辦事多餘管事并傳奉大小帶俸冗官及食糧儒士照例悉送吏部寄名放回原籍候本衙門有缺挨次查取任用其匠官除精通藝業者量為存留若老弱殘疾藝業不通者一體裁革以上吏部言事一天下司府州縣稅比先年間嵗徴過於嵗用幾倍所以存留本處起運兩京及各邊倉庫常有贏餘不聞告急近年以來宗支益盛官爵益多災傷益重供奉上用不足京軍布花不足外夷賞賜表裏不足管待厨料不足此等大端率仰給於內庫京官俸糧折色不足京民賑濟不足倉糧邊方軍餉本色不足此等急務皆取辦於京倉他如淮安徐州德州臨清四處水次倉糧年例應該漕運官軍支運七十萬石以足京儲四百萬石之數及兩京水路亦藉此以備非常巳是三年無有支運只得加重兑納即今內庫金銀錢鈔絹布等項所積之數不為甚多京倉料豆止勾一年之上支用在外官軍俸月等糧并布花之類多有一年半年全無况山東河南宗支奏稱缺食流民住無定所且稅糧本色嵗徴僅勾嵗用所剩不多其內外百官俸糧官軍俸糧軍士布花之類勢難减支若不及早計慮臨期率難求濟伏望皇上留心崇儉凡倉庫錢糧除上用及額設官員俸糧并功賞之外非祖宗朝㫖輕用者一切愛惜如此則國用可足久安長治重在於此各處鹽運司提舉司嵗辦鹽課我朝十分慎重非邊儲缺乏嵗饑救荒等項重事不輕開中其興販私鹽雖皇親國戚有犯亦不輕貸近年以來多被權貴等項人員任情奏討以致利有所歸凡遇開中無人報納誤事不小自今以始務須專一存留在官以備供邊救荒等項之用但有恃恩奏討者許戶部指實行科道官一體紏舉治以重罪若係內外官員臨期發落仍以罷職緣由開奏定奪在京不係額設官員止支食米一石一在京各倉內官非正統年間舊有者取回以上戶部言事一大慈恩寺大能仁寺大隆善護國寺三處番僧俱有廩給下程館夫等供應竊惟祖宗時因其來朝留之京師加以館穀所以風示番夷使知朝廷之意圖靖地方而巳然先年法王不過一員佛子國師數亦不多易於供應見今三處番僧不下千員法王巳有七人國師禪師無慮數十况法王佛子大國師例給金印其用度擬於王者中間多有軍民因見番僧可以躲避差徭各令子弟從學番教非惟夏變於夷其實冒濫糧賞合無將三寺番僧選差給事中御史各一員查勘果係邊夷的於何年月日來貢留京住坐有情願回還原籍者所司照例發遣有係中國軍民投託者許其自首回俗敢有不行首告者或體訪得出或被人告發定發邊逺衛分充軍如此則詐冒少革而供應少省一净身人巳有處死明禁因見前項净身者俱得收用遂各倣效若不嚴加懲治誠恐將來無有紀極照得各處王府缺少內使煩瀆聖聽合無將前項充軍為民脫逃來京及新净身每日赴部告擾乞勑司禮監量撥各王府使用者惟復本部審其原係充軍為民者徑送各該衙門仍押發原衛原籍官司責令收管著役如有逃脫赴部告收者照例發遣本部仍將原衛原籍經該官吏參問重罪其新净身者俱照例發邊衛充軍今後敢有净身者送去法司照依先次聖㫖榜例問斷庶使人知警懼不致有傷天地和氣以上禮部言事一軍職必有擒斬功次方升一級今查得成化元年以來諸色人等傳奉欽升軍職八百有餘每員月支俸糧一石嵗支絹布季支銀兩不等其指揮都指揮又有民僉皂𨽻辦納柴薪銀兩所廢無算此實弊政之大者合無將此等官員除勳戚䕃叙軍功并額設員數不動外其餘令冠帶閒住候有員缺該部具奏銓補內係匠藝緊要不可缺者月支糧一石照舊供事今後非因軍功陳乞軍職伏乞聖明留意裁處庶使名器崇重少息奔競之風一各處鎮守監倉守備等項內外官員除邊情緊急去處不動外其餘腹裏地面别無重大事情及不係正統年間原有之數合無查照取回一在外鎮守分守等官於所在去處僉設皂𨽻等項名色合無悉令巡撫巡按官員查發寧家以後再不許朦朧僉報其在京文武四品以上官成化二十一年皂𨽻停止免僉一查得軍京營提督內臣軍伴一百名掌營內臣與總兵官各六十名坐營官十五名把總官六名各處鎮守內外官各三十六名分守內外官各二十六名守備內外官各二十六名俱係成化十四年以前節次奏准非祖宗舊制近年以來各項官員日漸增添營衛軍丁日漸消耗官多軍少惟日不足况每軍一名年支米一十二石布二匹姑以軍一百名言之每年支米一千二百石布二百匹而總為一官軍伴之需其於人情事體實為太過合無今後量為遞减京營提督內臣與管營內臣及總兵官軍伴各二十名坐營官六名把總官二名各處鎮守內外官各十二名分守內外官各八名守備內外官各四名庶官不缺人跟用軍得以充操備以上兵部言事一錢糧出納當有其度且以寶石一事言之舊例凡興販者俱發邊逺充軍寶石入官今在京嗜利之徒輕視國典大肆奸貪賤價收買應禁寶石巧立美名作一切竒玩之器其價止值百兩者或關銀千兩值千兩者或領銀萬兩此皆市井無用之物而盜府庫有用之財伏望陛下凡一應寶石等項悉皆屏棄不令眩耳目而役心志且府庫所積多歸於販賣寶石之家今欲置之於法則事巳既往不可勝追合無嚴明禁令今後如有仍前販賣及作玩好器物者事發賣主工匠俱照舊例發遣充軍如此則國用不費而竒巧可息一邊方强冦黠謀狡計難以輕測聲東擊西當預為備近來邊將遇警張大聲勢擅請禁兵且京軍先期而去則費食糧草待報而行又緩不濟事切照各處沿邊俱有總兵鎮守等官設法勦捕今不專責其成功而輒從其告急遂為發兵騷擾地方虛耗糧草偶爾遇敵則擒斬多屬於邊軍而功次盡歸於權要合無行令大同宣府鎮守總兵巡撫等官各將所管官旗軍人從公揀選精壯平昔慣戰之人立為隊伍如或數少就於官員旗軍之家募選精鋭舍餘輳成萬數時加操練一遇聲息止令本處將官調遣見領軍馬相機勦殺如果敵勢衆大量力難支方許議奏命將其在邊官軍亦宜重加優恤有功一體升賞如或各邊將帥玩冦失機必依常律誅戮無赦如此則賞罰明信而將士用命一刑加有罪法貴得中且如兩法司錦衣衛鎮撫司鞫問罪囚察其原詞測其虛實依招定罪一遵常律但人真僞不一狡黠多端雖貌稽而審言豈能盡得其情實間有一二稱訴寃枉者所司為因事有成案詞無㵕漏難以全信其枉及又有奏奉欽依止是依招擬罪者故深寃未雪良民受誣合無今後法司凡遇一應稱寃調問及奏送擬罪人犯情允當者俱照原招議擬如果寃枉并情有可疑者亦與辨理具奏發落毋拘成案其干礙原問官員悉置之不問不許妄加參究庶刑獄得平而人無寃抑一朝廷設官分職皆有定設總兵鎮守本為地方近來政務不加多而官職日增地方本無事而鎮守濫設蓋生一事則有一事之害添一官則增一官之費其間有等鎮守等官朦朧請勑許令四品五品以下官員徑自拿問緣五品以上官員律該奏請今許拿問非惟有違舊制况其欲自調問實欲陽張威權陰受私賂為弊尤甚臣等又伏覩天順八年正月內詔書一欵浙江江西福建陜西臨清鎮守內外官員詔書到日即便回京其各處鎮守內官正統年間原有者照舊鎮守原無者即便回京不許稽延欽此欽遵伏望皇上仍依前詔將各處鎮守等官酌量地方緩急量為去留其應留仍舊鎮守者務令守分行事安靖地方所有原請勑書即便奏繳如此則舊制不違而民患可息以上刑部言事一查得先年設立直𨽻太平府湖廣荆州府浙江杭州府三處抽分厰抽分木植等料專為成就光祿寺供應器皿清江衛河二提舉司打造糧船以省百姓𣲖辦之苦近年以來南北兩京監局不察原設抽分之意往往差官前去各厰坐守印烙起取日用供給沿途拽運軍民勞擾不可勝言合無行移兩京監局如遇文書到日即便轉行差去內官起程回京原取木植等項除已運外其未運者存留在厰堆垜苫蓋本厰差人看守造册繳報倘後缺用另行定奪以上工部言事一江南人民部運白糧等糧赴內外衙門交收逺涉江湖辛苦萬狀及至到京各該衙門官員刁蹬作難勒要錢物所欲既遂方與收糧其收糧之時一石止准五六斗上納者有止准三四斗上納者吞聲飲氣莫敢誰何上納不敷加倍揭債完納債主到家官司不准重徴只得傾家蕩産鬻妻賣子以償之興言及此實切矜憐今後江南人民部糧到京赴內外衙門上納除原委部官及御史監收去處外其無委官去處合無委官一員到彼監收照例一尖一平不許多收侵虐人民一每年恭遇節旦各處總兵副參等官俱進貢馬匹中間賢智者自行出辦其不才者借此為名以一科十尅減軍糧甚至有將在官馬匹竊取應用者及夾帶私自馬匹二三十匹赴京供給人情買賣非惟沿途槩支糧草逼迫官司及至到京又費內帑之財給與賞賜無益於上有損於下合無行令各處總兵等官今後各處恭遇節旦止許照例進表不必進貢馬匹作弊害人以上都察院言事一各處軍民人等為因家鄉戶婚田土鬬毆等項小事官府剖斷不明不得巳赴京伸訴本無别情奈被在京刁潑書寫之徒及鄉里辦事為事等項無藉官吏往往兜攬在家貪取財物百般教唆妄稱原來本狀情輕難以施行愚民無知聽其唭誘妄將鄉里京官并殷實大戶駕揑虛詞牽扯在內欺誑朝廷及至差官勘問實少虛多其差去勘問官員有存心公正識達大體者事得明白良善無寃其中有偏向避嫌不能擔當者往往妄加參語致事誣枉者難保必無縱有事得明白其家屬親鄰被其牽連在官經旬纍月破家蕩産者有之纍死人命不敢聲言者有之又有誣告無干人命因而掘墓撿尸傷害平人骸骨者有之似此刁風實傷和氣乞勑法司嚴加問理除奏告得實奏請聖斷其虛誑不實務要追拏教唆書寫之人究問明白從重發落如此則良善不被凌辱衙門不致混擾刁風斂息無辜得以申寃通政司言事一近年以來內外問刑衙門遇有囚犯不論情之輕重事之大小在內則五城兵馬司等衙門在外則行府衛州縣屬等衙門委官體勘以致貪鄙官吏交通賄賂互相容隱以曲為直以是為非耽延日久淹禁罪囚有一二年不完者有三五年不結者中間干連無辜之人纍死於獄者不可勝記不無有傷和氣召致災異及致勘報原問衙門亦不分曲直是非照依原來結保問擬罪名所以人多稱寃事無杜絶合無今後除人命强盜重情應該撿驗及田土應該踏勘者照舊撿驗踏勘外其餘一應詞訟止許行提緊關人犯作急親自問斷果要干證之人亦就行拘面審省令知罪不許一槩監禁行勘庶獄無淹禁而人免寃抑大理寺言事緊急聲息事余子俊本部㑹同京營太子太傅英國公張𢡟等議得京營一等二等精鋭官軍合當定為三路聽征中路一萬員名預備為大同宣府之援東路五千員名為遼東永平密雲等處之援西路五千員名為偏頭關延綏等處之援每二千五百員名定委團營坐營不拘侯伯一員用心操候其正馬䭾馬三萬匹先儘團營之數不敷者三大營輳撥一應軍器大器旗號軍裝之類俱要先期整㸃齊備但調即行凡行軍監督總兵等官臨期奏請簡命各邊原委將官并所領軍馬並如前擬一體加意操候前項所擬在邊在京將官并所領軍馬此就平時而處臨時果有變態如東路緊急至其西路河尚未凍又可往東䇿應之類難以拘泥及行戶部於臨期命將之日將處見在糧草一處一處開報將官以便分兵駐劄具題奉聖㫖是欽此續該遼東鎮守太監等官韋郎等奏稱傳報北兵尋殺三衛要往天朝地方上過等因該本部官欽奉聖㫖兵部看了來說欽此本部看得原定東路聽征軍馬五千議得合於內摘撥馬隊三千選坐營官一員管領作急起程於沿途糧草多積去處且操且牧至山海關即止候遼東守臣具奏請兵前項軍馬一面過關應援㑹勦本部一面請命主將添調軍馬前去調度以成大功具題奉聖㫖是官軍且不必差著劉恆每整搠人馬待報起程恁部裏便行文與韋郎等好生隄備欽此近該太監等官韋郎等奏稱北兵追殺三衛侵犯開原地方砍傷守墩官軍等因該本部官欽奉聖㫖兵部便㑹總兵每看了來說欽此本部㑹同京營太子太保保國公朱永等看得北兵犯我開原名雖尋殺朵顔等三衛兵丁其實撤我藩籬虐我邊人問罪之師義所當舉但彼處守臣止言堅壁固守相機截殺應否請調天兵略無一言及之固是遼東地窄此賊難於久住萬一被其蹂踐豈不有損國威事急至此難拘前議伏乞聖明合無將團營坐營都督同知馮升署都督僉事馬俊命充游擊或參將名目先行請勑分領馬隊官軍五千員名正䭾馬七千五百匹一面促其作急起程如賊尚在此正罪人斯得之時今去將官與彼處將官務要平心易氣國爾忘家協謀合兵共圖殄滅若機有可乘毋假持重以圖自全若事有未宜毋事輕率以墮奸計所差官員即便星馳回奏另行上請命將出師兼程往彼總制行事其山海關西抵黃花鎮一帶山勢雖險隘口多北人譎詐聲東冦西不可不慮前項地方戰守之間步隊可用或命都督僉事李俊署都督僉事楊玉分領團營步隊官軍六千員名領勑前去分布隘口有警一體㑹合彼處守臣和同戰守若以兵分各該隘口前項都督名位過重未可零碎遍管合無止選都指揮二員領勑前去本部與户工二部各差官前去沿途并所在整理糧草車輛柴薪等項具題奉聖㫖是迤北敵兵既在邊尋殺朵顔三衛難保不入境侵犯著都督馮升馬俊充游擊將軍領兵去與彼處將官協同戰守山海關迤西只著都指揮二員領兵去協守都寫勑與他欽此欽遵外今該前因案呈到部看得巡撫遼東贊理軍務右僉都御史王宗彛所奏三衛夷人躲避北兵俱在開原廣寧一帶倚仗中國以圖存生見在軍馬數少分布不周又兼遼東連嵗雨災今年霜旱等項糧草蓄積甚是難為奏要文武大臣科道言官從長計議或加添人馬勦殺或止是本處官軍相機戰守一節此等邊患朝廷未嘗一日忘備或降勑或令所司行文巳至再三今當警急至此方有前項議奏事理京營聽征軍馬兼程往援尚慮不及伏乞聖明合無再於團營添調馬隊五千員名正䭾馬七千五百匹及簡命內臣一員監督軍務兼管神鎗文職大臣一員提督軍務武職大臣一員掛印充總兵官又二員充參將統領前項軍馬作急起程到彼㑹合先去游擊將軍軍馬總制鎮守巡撫等官相機戰守重大機務悉聽監督總兵等官便宜而行本部并都察院各差屬官一員隨軍紀功此外本部與戶工二部各差官沿途整理糧草車輛腳力人夫槽䥷鍋甕柴薪等項聽候軍馬經過應赴至於將在軍門全賴糧草繼足再令戶部多為區畫軍前糧草共濟大事仍照先行事理將見有糧草開報監督等官以便分布軍馬支給其宣府大同兩路若前敵殺退必往彼處偷生亦乞聖明留意候命下之日本部照例請給監督總兵參將并紀功官制勑付賫前去成化十六年九月十八日太子太保兵部尚書余等具題奉聖㫖是如今北兵在遼東邊上尋殺朵顔三衛恐來入冦便著太監汪直監督軍務保國公朱永掛印充總兵官威寧伯兼左都御史王越提督軍務太監傅德管領神鎗白瑜李俊充左右參將莊鑑馬俊充游擊將軍統領官軍一萬員名去彼㑹合征勦但恐北兵復回大同迤西等處侵犯邊民著太監劉恆監督軍務定西侯蔣琬掛印充總兵官都御史孫洪參贊軍務太監張善管領神鎗白全充參將楊玉充游擊將軍統領軍馬一萬員名到彼㑹合相機截殺官軍各賞銀二兩還著都督馮升劉能各領步隊官軍三干員名山海關迤西直抵居庸關協同彼處戰守每人賞銀一兩著戶部差的當官各一員先去整理糧草都不許遲誤各寫制勑與他欽此陳言邊務事王崇之巡按山東監察御史王崇之奏所據修武備以嚴內治足糧食以養官軍禁采取以杜邊患措糧儲以資急用俱係别部掌行事理擬合通行為此除外合行開坐移咨貴部煩為查照定奪施行一足食以養官軍洪惟聖朝愛養臣民官有常祿軍有月糧此外又有折俸鈔貫冬衣布花恩至渥矣遼東阻山隔海官軍俸鈔布花皆由此給山東河南十一衛自山海關陸路運到河南十四衛自登州海船運到兩得利便然河西常勾給散河東拖缺數多者蓋以陸路無虞海運廢弛也查得舊制造有海船一十二隻官吏奉職依期運到雖全伍軍士皆得飽暖近年以來船隻損壞者無人修理鈔布拖缺者不肯補還至成化十三年全無一隻到來海運不通官軍絶望祖宗制度廢弛盡矣以故軍士凍餒流離缺伍者多官員剝軍自養廢職者衆信乎其然也如驛遞鹽鐡所軍俱無月糧止靠賞賜土官達官間有半俸又係無子人數專賴俸給又無守臺巡哨晝夜在邊尤為寒苦近因各處災傷荷䝉皇上憫念元元遣使發倉賑濟所以固邦本重民命安地方也今邊儲預備少積别無賑濟官軍合得糧賞尚不可得不無有孤恩典查得自成化十二年以前共拖缺官軍俸賞鈔六百一十萬三千一百七十錠布七十七萬二千六百餘匹綿花二十八萬二千一百餘斤先該巡撫巡按官纍次奏乞令本布政司起倩車輛運送及暫量價值折銀補還戶部議得陸運艱難節行本司查勘定奪造船儧運補解去後但彼處官員視為泛常略不留意夫衣食切於人身不可一日有缺今遲以數嵗不能補給致此處有飢寒之苦彼處積無用之地陸路既稱難來海運見今無船則窮邊之官軍何所仰賴哉臣聞遼東舊時收成糧食頗賤商賈販賣易換有無尚不免於飢寒今兵荒相仍商賈少通無物易換使軍士啼飢號寒羣生嗟怨以此飢寒之人不惟難驅於鋒鏑之下亦恐生意外之慮如䝉伏望皇上俯念邊方重地憐憫軍士飢寒乞勑該部從長計議奏請定奪合無不為常例將前項拖缺鈔布等項行令山東布政司官存留在彼就作俸給查有見在銀兩照數折算解送或令布按二司分巡分守官員公同估計量為便易銀兩委官解送前來以救邊方一時之急仍乞將今嵗布花鈔貫另為處置或暫折收輕賫銀兩運來支給候造有船隻之日照舊海運如此則邊軍得目前之濟免飢寒之苦實為便益一措糧儲以資急用臣聞食者民之天不可一日缺也故洪範八政食貨為先子貢問政孔子告以足食為首民生最重邊方尤急所以戰勝攻取守固皆賴於此聖朝垂意邊儲因遼東屯糧不足發銀糴買召商上納欽命巡撫官以總督之布按二司官以分管之宜倉廩充實緩急足用也奈在前官員職任重大者多好逸惡勞官職卑微者惟畏勢貪利甚有通同作弊夤緣為奸官豪勢要之家乘機逐利撒放糠粃穀豆糴買腐爛倉糧官銀多歸於富家錢糧多報於紙上近因積弊多端特命給事中御史等官查盤辨驗奸弊敗露倉官為民充軍巡撫管糧等官查提問罪一清積弊邊軍稱快但刑罰雖加而事勢無及粗腐虛關於貧軍未䝉實惠折追拖缺於富商不肯還官間地腐爛相積邊境急缺糧儲如前屯等處倉糧不及半年之用海錦等衛有十年之積靉雲等堡無一月之支今遼陽城中每銀一兩止糴米二石五斗前項堡分每官價銀一兩作米一石或八斗尚少人上納近因邊情緊急該巡撫總理糧儲官不得巳恐缺軍餉㑹議於定遼金復等處十一衛軍餘輸運動調一萬餘人往回一二千里每米一石顧腳盤費多者要銀七八錢少者亦不下五六錢河東之地逺近騷然各官雖用心催儧但山澗險阻車輛不通止是牛畜䭾負力疲財殫卒難畢集事勢至此在前管理官員尤為可恨欲減米數糴買恐虧損官銀欲增腳錢與人恐庫藏缺乏即今又傳報聲息不絶設若大軍屯駐日久轉運艱難逼迫緊急使軍餘逃竄山林疲餓纍死不惟重傷人命亦且大誤邊儲以後河開農興尤難為用伏望皇上垂念邊儲重惜民困乞勑該部從長計議措置急用之方奏請定奪行移巡撫總理糧儲官員相度邊情緩急斟量道路逺近聽其隨宜增減米數腳錢多方措置以濟急用以恤人難其各倉拖缺折罰虧闕糧數行令布按二司管糧官躬詣各處上緊杖追先儘犯人財産變賣上納或令照依時價折納銀布入官另為處置以便目前支給俱先定與限期完報今後整理糧儲務要斟酌地方險易緩急查算見在有無多寡隨宜召納轉運庶不臨期有誤仍令布按二司管糧官員不時往來督察若有奸弊就便參拿不許在家久住若有似前延住三月之上及巳委接管畏避不來未曾得代先期回去者照例住俸一年其分巡分守滿日亦照例將追問過囚數糧儲事件開報轉呈巡撫等官處稽考勤怠若任內怠慢誤事以致糧儲軍務不完及以後經該糧儲盤有粗腐虧折等項重加參問則邊儲目今不致缺乏軍餘免於流亡巡歷既勤奸弊少革實為便益以上二事咨戶部一禁採取以杜邊患臣訪得遼陽山東土人少種田土專一採取人參榛松圍獵野獸為生數年以來多被本等上司及衛所官員指稱進貢人參等項或撒放布匹或給與銀兩便令部屬官舍於各寨百般逼迫科擾土人不勝其苦近時因見境內人參榛松缺少不堪又多私役附近軍餘出境採取販賣以規厚利常被敵人虜殺互相隱匿不報各處又有等軍餘土人不畏法度潜將鹽米包褁刀箭甲葉黑夜於牆下空野去處與夷人易換貂鼠參松等物透泄事情啓惹邊釁多由於此及各衛所官員又指以採打影木買辦皮張為由差𣲖餘丁不下五六百名通同委官人等將殷實之人受錢賣放纍及貧窮况採取亦難查得每年進用影木止該十箱人參三百斤狐狸皮張暫時買辦不多衛所官員却乃多科擾人目今前項出産地方被賊搶虜殘破室廬空廢田畝荒凉見在人口驚疑走入腹裏不能存活正宜厚恤伏望皇上憫念邊方多事人不聊生將前項供應人參影木及買辦皮張暫且寬免以紓民力以革擾害待後邊患稍寧之日行令照舊採辦仍乞勑該部轉行本處鎮守巡撫等官通行所屬出榜嚴加禁約及督令地方墩空巡守人員晝夜加謹巡察今後如有私役及縱容軍餘出境採取參松榛果等物及將刀箭甲葉與夷人交易致生邊釁者許被役及知見人等徑赴巡撫巡按官處指實首告正犯旗軍人等合無量為枷號滿日與空臺巡哨甲軍俱照依律例問擬發落私役官員并地方該管軍職一體參奏拿問庶官軍知所警懼下人免得疲勞亦杜邊患之一事也以上咨禮部一修武備以嚴內治臣聞禦邉疆之道守備為本城池器械守備之具也將帥士卒守備之人也遼東為東方重鎮各城有守備等官有屯宿軍士城池修理之料軍國造作之需各有軍餘造辦既有其具又有其人宜乎軍威振揚武備修舉也奈何邊官中間廉謹者少貪惰者多不修兵備不恤士卒軍需物料多營於私室練操人力皆疲於私役甚至侵盜賣放之弊不可勝言所以城池缺修器械不備士馬疲弊紀律廢弛修理操練有名無實凡遇巡撫巡按等官㸃視指稱修理反又科害軍缺則顧人頂替器械多那借應㸃惟務遮掩遂為得計前此之弊在在有之如遼陽一方大鎮也有六衛官軍有四千馬步有都司以統之有將官以臨之臣嘗一一㸃視如城上鋪舍多無門忩垜口間用土坯灰刷四月之間操軍十日一隊之中嘗少數人馬軍可以調用步卒疲弊不堪明甲可以禦敵青甲不能遮體軍馬器械大率類此推究其故輒稱邊方多事未暇修理公差數多卒難齊備大巡如此小巡可知平居如此遇警可知近該建州海西賊人侵犯地方虜殺人畜巳將副總兵等官韓斌等失機誤事情罪參奏外今前項賊人方命不朝纍報聲息北敵大衆逼近我邊窺伺日久倘卒然有警邊備如此可為寒心但積弊日甚久無稽考難以一一參究往日廢弛固不可救目今修整不可不急如䝉乞勑該部計議奏請定奪合無行移本處鎮守總兵巡撫等官嚴督所屬及時修理如法操練厚恤士卒謹慎烽堠及將見操不堪兵甲查照舊例奏請兑換堅完器械替出不堪之數官為修理既不勞軍置辦亦足遇警克敵仍令各衛今後除軍器有例每季查盤外如鹽鐡木植磚灰等料俱資國軍重務每季各要將收除實數開報巡撫巡按等官以備稽考仍委布按二司官員查盤若有短少就將經該官員參以侵欺之罪其巡撫等官所至處所亦要不時㸃閘如城池器械等項不完者將衛所官員就加懲治立限完報都指揮以上官住俸催督完日照舊支給操軍數少查有役占者照依欽奉勑諭京營事例奏請照數降級甚者罷職充軍干礙總兵副參等官一體參究如此則法令嚴明人知警懼緩急得以濟用奸弊可以少革邊務不至於大壞矣以上咨工部為地方事張鵬職方清吏司案呈照得京師迤北宣府大同等處迤東直抵遼東迤西直抵甘肅各邊各關自成化十九年大同地方有事以來雖經節次奏行隄備北冦及欽命太子少保戶部尚書兼都察院左副都御史余子俊前往宣府大同總督軍務太監張善監督軍務定西侯蔣琬充總兵官整兵待報啓行緣今大同宣府該余子俊奏調京軍二萬見在修理邊備及調集各處軍馬防護修邊工程雖未就緒軍威頗巳振揚正恐北敵威拉克實及其小王子率領部落錫錫等窺伺宣府大同一帶有備無隙可入不東冦遼東必西冦甘肅理合預防及照京畿與彼接境地方去嵗少雪今春少雨天時亢旱二麥無收民食不足盜賊必生又恐河南湖廣等處地方大率類此切惟荆州襄陽二府雖屬湖廣當南北水陸要衝接連河南陜西各省境界本處地廣山深可以趂食所以各處饑民往往流移至此即今青黃不接之際重以天旱無收所慮各處饑窘之民或冦攘草竊或流移嘯聚亦合先時預備案呈到部參照三邊隄備事情除大同宣府外朔州等處巳該參將楊玉領軍前去按伏及宣府鴈門關永平密雲等處見該游擊將軍白瑜李俊安順伯薛珤東寧伯焦俊操兵聽調偏頭關地方巳該余子俊調兵按兵按伏延綏寧夏陜西腹裏巳該本部奏行各該守臣各行嚴謹隄備去後所據遼東甘肅二處合無再行各該鎮守總兵巡撫等官查照原今事理轉行副參游擊等官提督所屬晝夜用心瞭望上下協力隄防一遇有警互相傳報從宜戰守勿以文移頻數略不加意致誤地方仍行順天等府及直𨽻保定等處各該巡撫官各查照本管地方軍民休戚何如有司積蓄何如各宜用心撫理如有盜賊生發行令各該守備巡捕等官設法禁捕毋致疏虞荆襄地方近年雖設有湖廣行都司鄖陽府衛等衙門事多草創未足倚賴合行分守湖廣行都司等處太監韋貴提督撫治鄖陽等處地方右僉都御史王濬通行所屬其湖廣河南陜西各處巡撫都御史各行附近荆襄等處分守分巡撫民等官一體撫安人民禁捕盜賊如發糧賑給調軍勦捕之類應便宜者便宜處置應奏請者具奏施行務期弭患未然地方安妥成化二十年五月初二日本部尚書張具題奉聖㫖是文書鋪馬裏賫去不要遲了鄖陽等處事情關係尤重著王濬每用心撫治不許怠忽欽此為敵情事馬文升職方清吏司案呈奉本部送於內府抄出鎮守薊州永平山海關等處內官監太監羅能題准總兵官署都督僉事李銘手本准巡撫右副都御史彭韶手本備兵部咨開臣等題據提督大喜峰口等關把總指揮潘清呈有泰寧衛都督托克托博囉等差使臣額森台等賫執番文奏稱番我們靠著邊墻住坐營盤丹口收放我的奴婢逃走來說他們歸去的人大軍馬九月間來搶又有愛滿王出哨拏住的人問他九月間上馬聽得這言語專差使臣額森台徐阿爾古裕平章特穆爾知院阿嚕岱千戶托特千戶隨來博囉等前來朝廷前進馬叩頭及審得徐阿爾古裕即徐安稱說年六十二嵗原籍鳯陽府舊城住係御用監裏厰撒花作所鎮撫徐旺男有父正統六年故安于正統十四年隨駕迤北征進八月十五日被巴延特穆爾平章部下的人巴圖爾拏住朝廷遇見說是我的銀匠交與巴延特穆爾後安與同𡊮彬哈名李成劉潑兒等伏侍聖駕回朝又交與額森太師恐我走了聖㫖分付徐安你要走了我到家把你全家殺了隨後聖㫖分付你久後回來升你大官職不久復被巴延特穆爾部下的人巴圖爾搶去隨住二十年後連家小走在泰寧衛都督托克托博囉部下隨住一十八年及說九月間迤北敵人要搶三衛遼東一帶等因㑹同議得夷人額森台等來不及時及看得賫來畨文印信篆文有僞况所報夷情别無緊關欲便照例阻回緣數內徐安所說原係漢人先被迤北敵人搶去隨住二十年後走在泰寧衛又住十八年一向不曾到關今却賫執不明番文前來報事中間恐有隱藏别項情由難以憑信除將各夷拘留在關撫待聽候將原來番文封進乞勑該部計議合無將額森台與徐安等六名連馬起送赴京譯審定奪便益具題奉聖㫖兵部知道欽此欽遵隨於兵科抄譯出泰寧衛都督托克托博囉等䝉古奏文一道到部參照臣等題稱泰寧衛頭目差使臣額森台等六名帶馬六匹賫執番文一紙來邊報事進貢除將各夷拘留在關奏來定奪一節切緣徐安原係在京人匠自正統十四年被北人搶去經今三十八年一向不曾近邊報事今一旦同各夷前來進貢中間恐有别項情由及看得譯出番文大約與原奏相同來貢既非其時據例合當阻回但數內徐安久住北地必能悉其事情而本人所言似有欲回之意合無不違常例行令臣等將各夷起送來京譯審北人事情緣是處置報事夷人事理本部官奏奉聖㫖是欽此欽遵備咨手本准此行據大喜峰口關指揮使李伸將拘留在關夷人額森台等六名連馬呈送前來合當起送開坐與總兵官李銘都御史彭韶各具本該本部官俱欽奉聖㫖兵部知道欽此欽遵又該錦衣衛等衙門帶俸署指揮使等官楊銘題臣等審得泰寧衛都督托克托博囉等差來報事夷人額森台等并平章徐安等六名說稱成化二十年有布拉克衛頭目托克托罕差平章竒塔特等七名賫迤北衛喇特克實克太師鐵牌一面到泰寧福餘兩衛與頭目每說衛喇特差使臣八人到我每布拉克衛住下頭目托克托罕轉差我每賫衛喇特鐵牌來與你每說有衛喇特差來的人說著你每差人到衛喇特克實克處有話說後有泰寧福餘兩衛差額森台等十一人到布拉克衛聽得衛喇特營盤逺了數內兵丁歐德等八人回衛有額森台托特徐安三人一同衛喇特原來使臣八人到地名庫森托輝見了衛喇特克實克每說你每回去時與三衛頭目每說在先原與我每衛喇特和好行走你每如今不要去投順迤北小王子每有小王子每常去搶殺你每三衛人又與我每衛喇特不和又去漢人邊上做賊我每衛喇特要差人往大明皇帝前進貢被小王子每阻住路道不通不得差人去今有番字文書一紙你每賫去朝廷前奏又說去年三月內有衛喇特克實克每差人馬搶殺小王子部下大烏梁海三營人馬克實克太師又說到今年冬間我每動人馬去搶殺小王子每我每還差人到你三衛轉差人奏得朝廷知道你每三衛并布拉克衛收拾人馬我每併力去搶殺小王子每額森台等差去衛喇特今年三月內回衛又說有泰寧衛兵丁塔喇齊被小王子部下兵丁搶去住過二年今年六月內走回到衛說稱聽得小王子每九月間收割田禾時動人馬不知往漢人邊上搶去不知來搶我每三衛當有都督托克托博囉差三十人哨探小王子每拏住迤北兵丁一人與走回的人托爾楚所說情相同因此泰寧衛都督托克托博囉等差我每來奏得朝廷知道又說三衛夷人常去小王子每處討搶去的人口往來走行以後夷情不知徐安又說我原係御用監銀匠正統十四年被迤北額森部下的人搶去在額森家住過額森自夥裏仇殺後到泰寧衛住過今差額森台并徐安等來報事討升賞及據徐安告說我家原京東邊勾欄胡同住有兄徐寬徐敏姪男徐達今要與兄徐寬等相見徐安見有番字奏文一道理合隨身封進據審得此緣是夷情具本該各官奏奉聖㫖兵部知道欽此欽遵又於兵科抄出譯衛喇特克實克等䝉古字奏文一道皇帝洪福前衛喇特克實克為頭知院䝉克等奏天的氣候緊急間往來使臣不能行走今我每欲要差使臣去途中有迤北小王子兵丁每阻隔這等達子每朝廷邊上作歹我每處也作歹今年三月內有我每的哨馬去將迤北大烏梁海的人搶了三營今我每這十二月要動人馬尋小王子去我每欲要調諾延三衛六千人馬來助我每今有泰寧衛額森台王等三人來到我每處我就與文書著這三人奏去了怎生恩賜聖㫖知道該部官欽奉聖㫖兵部便看了來說欽此欽遵通抄送司查照原行太監羅能等公文相同除馬匹審據伴送舍人供稱隨本送御馬交收內一匹薊州倒死取有所在官司文憑送禮部該司執照及查得先該鎮守甘肅太監覃禮等題稱成化二十二年准分守肅州右參將都督僉事李俊手本譯據哈密衛左都督哈尚番文今有迤北大衛喇特克實克死了部落將他兄弟阿實克齊扶做太師又有克實克之弟阿里古多阿克王與阿實克齊不和領右哨一萬人馬來進哈密地方住坐等因具奏抄出本部巳經具題外今該前因克實克又訛稱格實克案呈到部參照泰寧衛報事夷人額森台并徐安等說稱成化二十年布拉克衛差人賫執衛喇特克實克鐵牌一面到我三衛要差人到衛喇特說話有泰寧衛差額森台等三人到見克實克說著三衛不要投順小王子我衛喇特往要天朝進貢被小王子阻路不通今有番文你賫去奏又說今年冬間我每動人馬去尋殺小王子還差人到你每三衛轉差人奏得朝廷知道你每并布拉克衛收拾人馬同我并力去搶殺小王子等語其額森台等又傳本衛兵丁被小王子部下搶去二年今年六月內走回說聽得小王子每九月間動人馬不知往漢人邊上搶去不知來搶三衛等情及譯得衛喇特克實克番文却稱要于今年十二月內尋殺小王子要討三衛六千人馬來助他其餘情詞大約與額森台等所說相同臣等切緣迤北部落衛喇特為盛小王子次之而布拉克衛又次之今額森台等所賫克實克進番文既言要來尋殺小王子而哈尚又報克實克死其弟兄不和各領人馬巳到哈密地方蓋額森台自前嵗入衛喇特去嵗冬間離彼今年三月回衛所賫番文想在克實克未死之先哈尚所傳係在今年六月之內克實克之死想巳是實而小王子要來搶掠似亦不虛但敵情譎詐難以盡信况其部落彼此猜疑互欲吞併未成合一之勢此誠中國之福然敵人為患自古而然趂逐水草摽掠為生即目秋髙馬肥正是馳騁之時侵犯之謀難保必無在我隄防之䇿不可不嚴及照額森台等情得聞北人事情逺來傳報誠意可嘉懷柔之禮亦不可不厚再照徐安原係內府匠役被虜年久今從各夷來貢歷陳前因既欲求討升賞又願索見私親論法本當拘留不容回去又恐有阻後來被虜之人向化之心况稱曾奉先帝遺命留與敵人亦當量為處置合無鋪馬賫文與遼東山海宣府大同延綏寧夏甘凉等處鎮守總兵等官各要查照本部節次奏行事理嚴加整搠人馬措置芻糧修理城池繕治甲兵務使以戰則勝以守則固仍差人不時逺為哨探遇有緊急相機戰守仍行在京各營總兵官將原選聽征人馬收拾停當遇有報到聲息就便起行戶部計算各邊糧草有無勾用早為措備不致臨時缺乏有誤軍機其額森六人行移禮部照常宴賞給與馬價之外再加一表裏以勞其來打發出關令通事省諭各夷歸語各衛大頭目各要堅守臣節毋二乃心既不許聽從小王子之哄誘亦不可輕信衛喇特調用凡有事情速來傳報朝廷待爾素亦不輕萬一譎詐不實為彼探聽自取滅亡悔無所及其徐安既欲要見伊親合無俯順其情容其兄弟親人與之相見仍令通事再審本人若就願留别乞恩典本部另行奏請定奪若欲仍回北地顧其妻子亦宜量與職事伏乞聖明裁處俟後果能仰慕聖恩懷戀桑梓携家來歸尤當優異緣是處置報事夷人及節奉欽依兵部知道并兵部便看了來說事理未敢擅便等因成化二十二年八月初七日本部尚書馬具題奉聖㫖是徐安待通事每再審了來說照例改撥官軍備禦事馬文升職方清吏司案呈奉本部於兵科抄出太師兼太子太保保國公朱永題先該兵部行文開中都留守司并山東等都司摘撥官軍三千員名分為春秋兩班俱遍周而復始又該本部行文先期一年預行定撥省諭領操官旗令其次年該班不必到營徑赴該鎮交班等因今照𢎞治六年秋班輪該河南都司摘撥官軍一千五百員名今止到六百五十三員名尚缺八百四十七員名若候完足撥去不無有誤彼處守禦臣等㑹同太監楊穆議得本部所擬前項官員不必到營徑赴該鎮備禦一節但三大營選出頭撥團營官軍上以拱衛宸居下以預防征調即今各邊節報聲息倘有警急未免動調况今各處災傷官軍不能齊足赴操合無乞勑兵部計議查照撥去神機營官軍守備紫荆等處事例行移五軍營照數摘撥官軍輪流前去本鎮備禦存留團營官軍專聽征調庶不兩相妨誤具本該官奏奉聖㫖兵部知道欽此欽遵抄出送司查得先該太子太傅安遠侯桞溥奏稱景泰三年九月內差撥神機營官軍四千三百五十一員名前去居庸紫荆等關口守備今半年巳滿乞將神機營原撥十營官軍照數摘撥前去替換具題奉景皇帝聖㫖十營官軍本欲專一操練遇警調用若要差撥别處等項守備不如不選著總督總兵計議停當行欽此欽遵該本部㑹同太子太師武清侯石亨等議得十營官軍原係欽奉勑諭揀選頭撥精鋭操習聽調之數巳䝉聖斷明白臣等别無議擬欲行該府轉行該營令太子太傅安逺侯桞溥於本營存操官軍內更換其十營官軍人馬不許擅動開坐具題奉景皇帝聖㫖是欽此欽遵外及查得續該本部議得中都留守司并山東都司撥去黃花鎮操守城堡荒凉以四處論之巳是不均其中都留守司獨撥秋班山東都司獨撥春班以兩班論之又似不均既該軍人楊上三等合詞具告合無行移團營自𢎞治五年為始先將河南都司春班太寧都司秋班輪赴該鎮操守一年至次年却令太寧都司春班河南都司秋班又令赴一年仍行中都留守司并山東都司輪流赴鎮亦如此例大率四處每兩年一輪兩班俱遍周而復始永為遵守具題奉聖㫖是欽此巳經通行欽遵外又查得該戶部等衙門㑹議奏准內一件該整飭薊州等處邊備兼巡撫順天等府右副都御史唐珣奏稱原𣲖黃花鎮春秋兩班官軍要照京營限期徑赴黃花鎮交班該本部查處照得前項官軍今後定撥省諭先擬事例兩年一輪先期一年預行定撥省諭領操官旗不必到營徑赴該鎮交班敢有該班來遲脫班不到及到班在逃等項悉照京營事例而行又經通行欽遵去後今該前因案呈到部看得太子太師保國公朱永等奏稱𢎞治六年黃花鎮秋班官軍輪該河南都司摘撥一千五百員名前去備禦今止到六百五十三員名數內尚缺八百四十七員名要乞查照神機營官軍守備紫荆關等處事例行移五軍營照數撥本鎮備禦一節照得京營軍馬永樂宣德等年在五軍三千神機營三大營操練至景泰初年選出精壯官軍立為十營操練專備征調天順初年仍散歸三大營至成化年間為因各營軍馬號令不一卒遇邊方有警一時取撥不定恐致誤事因言者之議於各營內選取在京并外衛官軍共一十七萬總在一處分為十二營操備又命內外大臣提督名為團營凡遇各邊有警就便調遣前去不許别項差遣內以護衛宸居外以預防邊患居重馭輕强本弱枝其慮不為不逺其勢不為不重但今團營官軍事故等項不及一十二萬之數而五軍營缺少團營官軍四千餘名即今又無别項工役或遇重大工程又於團營內借撥用工其黃花鎮防守官軍原係長陵等四衛撥去為因離衛不逺率多在逃又因閲實邊關大臣具奏暫於團營內撥去今本鎮秋班官軍輪流該河南都司摘撥前去防守但河南地方去今二嵗水旱相仍官軍饑窘不能赴操以致團營數少欲候到足撥去緣今正係防冬時月不無有誤本鎮備禦若再於團營見在官軍撥去萬一邊方有警又恐調遣不敷况團營官軍不宜别項差撥係奏准事例今既該各官㑹奏前來若不權宜處置未免兩相妨誤合無行移五軍營總兵等官於本營次撥官軍內照數先行摘撥一千五百員名差人送至黃花鎮防守其𢎞治七年仍預行中都留守司該春班山東都司該秋班各定官軍一千五百員名不必赴京徑赴黃花鎮防守周而復始二年滿日仍令河南并太寧都司照前輪流免致撥亂團營官軍其五軍營該補團營之數陸續送如此庶京營武備以修而邊關防禦不失緣係議處改撥邊關備禦官軍及奉欽依兵部知道事理未敢擅便𢎞治六年九月二十九日本部尚書馬等具題次日奉聖㫖是題為任情方命妨誤邊機事吳瀚臣照得先年哈密城池被敵帥阿哈瑪特殘破虜去善巴荷䝉皇上垂念哈密城池係我太宗文皇帝所立善巴又係朝廷所封一則為西域之藩籬一則通諸番之貢使不可輕棄簡命兵部左侍郎張海前軍都督府都督同知緱謙委以腹心之託專以處置之權一時臣民莫不感激以為張海緱謙者必能上體聖心下急邊難展胸中之素藴克復長城運掌上之竒謀收回故壘夫何一籌莫展百事無成乃裹糇糧徒棲遲於士馬未遺巾幗終貽笑於婦人因循嵗月二年之間方才奏稱阿哈瑪特遣人賫番文進貢就獻還哈密城池被虜善巴城池尚為伊蘭占據善巴猶留三角城意在邀求先前抑留夷使等因命下兵部該多官㑹議得此酋變詐難信如果將城池善巴獻還貢物許其赴京前留夷使打發出關若不獻還將今夷使方物逐出原拘夷使仍前拘留善巴失地喪身亦難再立城池屢經殘破亦難遽復節該奉勑諭爾等宜令都勒噶布拉掌管哈密衛事與三種夷人暫居苦峪其城垣壕塹營堡等項預為修築完備散處夷人給與口糧牛犂買辦彩段梭布量賞頭目以結其心處置畢通將起送過夷人姓名日期井用過牛具種糧數目造冊具奏回京欽此欽遵又該兵部奏稱近聞敵率小王子人馬潛住賀蘭山後節入搶掠軍士十分艱難必須賑恤方保無虞先因多官㑹議將哈密寄住夷人盡數發遣苦峪居住及要將進貢夷人打發出關以絶西域貢路當此烽烟交警之時軍士罷困之際行此二事誠恐致有他變合無請勑張海緱謙從長計議等因節該奉勑諭爾等即㑹同鎮守太監傅德總兵官劉寧巡撫都御史馮續從公計議先行差委布按二司官員將被搶之家逐一查出中間果係十分艱難者支給官庫錢糧量加賑恤務令得所毋致逃移及再議前項哈密夷人并進貢夷使如是未曾出官即今敵兵未退地方未寧應否照依㑹官議處事理照舊打發出關或當暫且容其寄住候邊事頗寧之日另行發遣務要籌畫計議停當通行奏來處置欽此欽遵豈期各官以勑書為故紙視君命如浮雲不奉命而擅回既奉勑而故抗先次勑書回至凉州衛接遇後次勑書回至真定府接遇飄然長往不顧粗心大膽事屬故違且大臣以身係國家安危况彼敵情不為不緊邊機不為不重使敵聞之寧不輕我中國抑恐各邊將官聞之不能不為之解體是而可忍孰不可忍伏望皇上乾綱獨斷將張海緱謙拿送法司明正其罪以為臣下方命誤事之戒緣張海等俱在京堂上官未敢擅便謹題請㫖𢎞治七年十二月十九日題次日奉聖㫖張海緱謙錦衣衛拿送鎮撫司問欽此乞恩陳情絶嫌以全骨肉事馬文升職方清吏司案呈奉本部准禮部咨儀制清吏司案呈奉本部送於內府抄出晉府寧化僖順王妃趙氏奏有臣府僖順王存日於景泰成化年間因弟鎮國將軍美垎爭襲王爵連年評奏不巳美垎子即鍾鎎與臣世仇人所共知後鍾鈵襲爵其鍾鎎等深懷不平專以報復父仇為事陰謀反間無日不用其心况鍾鈵等年幼失教瞑無知覺竟各墮伊計中以至上瀆天威下傾祖爵迹鍾鎎平日教鍾鈵作威服人致使上下離心後與鍾針鍾巨鍾錥無日不㑹議自為謀主各人不知是詐悉聽其發縱指示鍾針嫌於僣逼不敢興詞主使鍾錥乘機而發至有今日之變此山西闔省同一論也想其起謀之時惟復害鍾鈵貪圖臣軍所莊田豈意軍所莊田俱䝉調撥推原鍾鈵之罪是皆衆人醖釀而成臣今含恨鍾鈵及各將軍恨不得糜爛其肉而飲其血但念臣先王軍所莊田受之祖宗列聖傳之宗嗣以奉祀事於無窮所以不避鈇鉞之誅以為竒㶏慮實非為竒㶏為臣先王祖考也伏䝉聖皇推罪人不孥之仁罰弗及嗣之義存留正軍一百名莊田三處與竒㶏管業抑非獨厚竒㶏厚臣先王祖考也臣非不欲上體聖心與宗族分享切惟鍾鈵得罪於朝廷故軍所莊田祿糧盡數革去其各將軍醖釀成鍾鈵之惡附㑹成鍾鈵之罪謀陷祖考之爵豈不得罪於其祖考哉况各人人役地畝初不奉朝廷明文特臣先王祖考一時親親之情今各將軍既得罪於祖考則祖考之遺惠其不應受也明矣臣伏覩大明律內一欵親屬相為容隱凡有告訐即同自首免罪所以篤親親而厚風俗所謂律設大法理推人情今鍾錥為鍾鈵親弟鍾鈵之罪法固難容在國主晉王所當舉在朝廷所當治臣以為斷非鍾錥所當言亦非各將軍所當謀害也忘親犯義其得罪於祖考豈不益彰彰矣乎兹者伏䝉皇上念臣祖考量存其革奪之餘以延臣殘喘而各將軍不思王爵巳被各人傾陷又復假情飾詞肆為侵占忘祖考宗庶之分目竒㶏為罪人之子而欲贅拾罪人之人役莊田何其無恥之甚也觀今鍾鈵犯罪觀各將軍奏詞竟無一人肯念親親扶持之者各人之情可知臣復何甘仍與各人人役地畝及照鍾巨與鍾錥同母兄弟為謀多出於鍾巨鍾巨鍾錥為鍾鈵親弟仇害如此其與竒㶏叔姪之情可知仰惟皇上深居九重大臣位列廊廟與臣隔越千里據情而論孰曰不宜倘能親聞面察未必不通行禁治昔莊公養成叔段之惡而殺之吕祖謙曰叔段之惡日長而莊公之惡與之俱長鍾鈵固當有罪醖釀而曲成者豈得無罪况各將軍越理妄為與鍾鈵誠為兄弟臣欲迹其顯著指實上聞又恐重增臣祖考地下之羞是臣又重得罪於臣祖考也所以飲痛吞聲欲言而止見今被鍾鎎奏討餘丁八名未幾而鍾巨比例奏討切惟臣府各將軍三十餘員後封者不計其數援情比例人孰無詞以臣府革奪之餘安能周無窮之用且親王郡王各有定分大宗小宗各隨所尊臣觀目前大臣㑹議言郡王不該使用軍以不出於祖訓今鍾鎎等奏討臣校尉餘丁恐亦非祖訓舊例臣忠鍾鈵兄弟不知皆因此輩小人誘引往來教唆離間骨肉致生今日仇嫌况鍾鎎為回避仇嫌事巳自行奏入晉府與臣府巳無相干今若將臣府校尉餘丁仍分撥各將軍使相往來必復引惹是非小人懷奸無所不至其各莊田各人雖分一半中間地土相連爭長競短必相訴訟將有不勝其方來之仇矣别嫌遠疑以全親親莫若各役其役各有其有不惟使役者專心則主者亦可以絶嫌疑而息爭端思臣莊田入官者六千餘頃軍餘入官者三千餘名况各將軍各有校尉儀從祿米巳有定分倘䝉皇上念各將軍至親在所必恤乞將臣入官地內照各將軍今撥地畝量撥管業入官軍餘係各將軍舊役者量留使用庶使地土不相連而爭競之仇可絶人役不相往而是非之仇可絶則親親之恩庶可保全而骨肉之私庶可復得臣非得巳自速罪戾以煩瀆天聽但鍾鈵實為各將軍同謀祖爵實為各將軍共陷竒㶏與各將軍誓不共天今賜與竒㶏莊田人役俱係臣纍次奏准巳奉勘合不許各將軍侵占明文為照情實難甘若仍分與各將軍受用又使之日相侵迫則爭訟仇訴必無了時臣聞骨肉相殘古今大惡此等子孫恐非聖明宗室所宜有也臣預先奏知倘不允臣奏章臣自備腳力率臣孫竒㶏并宮眷人等詣闕訴寃臣干冒天威下情不勝戰栗惶懼之至等因奉聖㫖該部看了來說欽此欽遵備咨送司查得先該寧化僖順王妃趙氏節奏鍾鈵巳䝉欽斷著戴頭巾閒住要將前項一所官軍仍留與嫡長孫竒㶏掌管等因該本部議擬具題奉聖㫖是准留正軍一百名改作校尉與本府使用欽此欽遵及查得續該寧化僖順王妃趙氏奏稱鍾鈵巳革爵嫡孫竒㶏見奉欽依著管府事要將本所正軍內㨂擇一百名改作校尉與其使用該本部議得前項軍所既巳改調今所奏留之人止是恭依欽賜原數情在可從事不為過合無仍行山西鎮守巡撫等官依其所揀正軍一百名俱改作校尉留與本府使用本戶餘丁一同隨住具題奉聖㫖是張聚等一百名准改作校尉與本府使用欽此欽遵又查得該寧化僖順王妃趙氏奏巳䝉朝廷存留庒田三處校尉一百名以此感激具本陳謝但慮各將軍欺孫竒㶏年幼莊田占種人役占用要乞降勑諭戒等因本部議得除莊田行移戶部查照外合無轉行本府使知保守并各將軍勿肆侵奪具題奉聖㫖是欽此欽遵又查得該護國將軍鍾鎎奏稱祖撥地土巳經戶部勘議歸與管業其使用餘丁原係祖遺人數要乞查照巡撫都御史楊澄回咨將寧化王府軍餘均平分撥該本部議得既查有前項回咨其寧化王府校尉張聚等一百名連餘丁共計一千一百二十四名况原撥餘丁楊名張七十等止是八名地土既巳半給人役似難獨吝合無將前項餘丁八名俱仍留鍾鎎使用具題奉聖㫖是欽此欽遵又查得該寧化僖順王第七子鎮國將軍鍾巨奏原䝉祖父撥與人役被鍾鈵纍一槩革去缺人役使地土巳䝉欽依分撥人丁亦祖所遺要乞將竒㶏府下校尉劉聚才等一十五名連各餘丁撥與跟用等因該本部議得奏討正軍校尉奉有欽依難以分用所據奏稱要將餘丁量撥跟用合行巡撫山西都御史㑹同鎮守官員勘處停當明白具奏前來以憑上請定奪具題奉聖㫖是欽此欽遵巳經備行山西鎮守巡撫等官通行勘處去後今該前因案呈到部臣等看得寧化僖順王妃趙氏所奏大槩以鍾鈵革爵嫡孫竒㶏管理府事䝉朝廷存留正軍一百名同餘丁俱與使用極知感激但前被鍾鎎奏討餘丁八名今鍾巨又行比例奏討若仍行分撥誠恐各將軍援例具奏爭無了時意在别嫌逺疑以杜將來切惟朝廷皇子冊封為親王親王之子為郡王郡王之子為鎮國將軍先前親王初封之時俱有護衛而郡王只撥與校尉將軍止撥與儀從或親王篤愛其子將護衛官軍奏准撥與郡王使用郡王篤念親親將軍餘撥與諸子將軍役使此出一時私恩非祖宗舊制今寧化王府一所官軍既巳盡數改撥太原左衛其一百改作校尉又係朝廷特恩存與寧化王府之數不係先前全所官軍據法論理固難分撥若論祖王遺愛先巳撥與役使年久一旦革去人情不堪似可量撥故前此鎮國將軍鍾鎎奏䝉撥與餘丁張七十等八名意正如此續該將軍鍾巨又奏討校尉劉聚才等一十五名本部又經通行山西鎮巡等官從宜勘處未報今僖順王妃趙氏正慮此舉若再分撥將來各將軍一定爭競不巳事無了期以此懇情奏乞定奪固為有詞但查無勘報緣由難以上請定奪合無仍行山西鎮守巡撫巡按等官㑹同三司掌印官員作急將先次鎮國將軍鍾巨并今次僖順王妃趙氏所奏事情從公併為查勘要見將軍鍾巨於懿簡王存日曾無奉有祖王遺㫖親筆手書并奏該何衙門勘合撥與軍餘若干名役使係寧化府見今存留正軍一百名改作校尉餘丁內何人係是原撥人數惟復止是援例奏討别無前項執結緣先次撥與鍾鎎餘軍八名以其存有都察院勘合奉僖順王妃趙氏及鍾巨親書手批為憑方才撥與今鍾巨所奏若不曾奉有祖懿簡王父僖順王遺㫖親筆手書并該衙門奉行勘合為照俱不必輕易分撥以啓爭端前項事情務在勘查明白計處停當免致再行奏擾畢日將勘過緣由㑹奏前來以憑另議上請定奪再照寧化王一府宗室蕃衍細查前後各起奏詞內開僖順王第七子除鍾鈵革爵鍾錤等三位俱故外其鍾錥鍾針鍾巨三位見存及查本府踈𣲖將軍見在者三十餘員後封者尚不計數今次鍾巨既比依鍾鎎事例奏討前項校尉其後來將軍豈不亦以鍾巨為例奏討餘丁役使此時若不通為定奪未免向後連章具奏紛爭不巳非惟煩擾朝廷抑且殘傷骨肉甚非盛世宗室美觀合無行移山西鎮守巡撫巡按官員行令布政司轉行晉府長史司啓王知㑹仍行寧化王府今後各鎮國輔國將軍但不曾奉有祖父遺㫖親筆手書并各該衙門分撥與軍餘勘合見存為照俱不許妄行奏擾煩瀆聖聽仍將原奏立案不行以後竒㶏襲封若情願將今存留校尉餘丁量撥與各將軍使用以厚本枝以篤親親不在此例緣係議處王府奏乞定奪分撥校尉及奏欽依該部看了來說事理未敢擅便𢎞治八年十二月十八日太子少保本部尚書馬等具題奉聖㫖寧化王府存留正軍一百名係朝廷特恩今後各將軍不許奏討分撥鍾鎎餘丁八名巳撥與了罷欽此名臣經濟録卷四十
