body:
  text: 名臣經濟録卷三十六明黄訓編兵部車駕下題覆救偏補弊以期裕馬政事彭澤車駕清吏司案呈奉本部送兵科抄出巡按直𨽻等處監察御史謝汝儀等題臣聞天下無無弊之法法之不能不舉與弊之不可不救皆勢也因其勢救其偏補其弊以求於可久而宜於民非時不可也今之馬政國家之大事然天下之害者亦曰馬政則其沿積之弊誠大矣恭惟陛下聖明中興百廢具舉正可有為之時此獨缺而不講是豈萬全之治也哉乃者不以臣卑鄙獨勅追補㸃烙直𨽻山東河南等處種馬并追解各年拖欠備用馬疋臣深愧庸駑過承任使不患追補之難而患追補之後無法以處之其弊將益深者故自受命以來恐恐朝夕懼無以仰答陛下之委任所至州縣博采輿言詢之長老得救時之務一焉綜理之術九焉脩舉之實亦一焉一得之愚謹用備陳以塵睿覽臣愚以為識其源斯可以救其弊欲馬政之脩當去其為害者故毎條之下各有立法之意今日之弊與其所以處之之術事相應者仍間出各條之下弊至於此而臣不詳言之陛下又何以知民之苦而拯之哉如䝉乞特勅所司酌定可否因臣之言推略以致詳集衆之思合異而致同盡掃積年之弊風維新祖宗之良法此難得之時不可令坐失者也若失今不為臣恐馬政終無可舉之期害日以大民日以窮將世世為直𨽻等處之害者不在於他而在馬矣陛下留神斯民幸甚緣係陳愚見乗明時救偏補弊以期修馬政事理未敢擅便等因題奉聖旨兵部知道欽此欽遵抄出送司案呈到部看得御史謝汝儀題稱今之馬政國家大事博采輿言詢之長老得救時之務綜理之術脩舉之實㕘以已見條陳一十一事稽之舊典而不違酌之時宜而有據具見本官奉命惟勤采訪詳盡合將所言議擬明白開列前件上請定奪緣係陳愚見乗明時救偏補弊以期修馬政事及奉欽此兵部知道事理未敢擅便等因嘉靖二年七月日兵部尚書彭等具題奉聖㫖是准擬行欽此欽遵擬合通行為此除外合劄本寺當該官吏照依本部題奉欽依内事理欽遵施行須至劄付者救時之務一曰差御史以専督察臣伏覩祖宗養馬之制州縣有判官縣丞或主簿一員以管理毎府有通判一員以總理又量地方設太僕寺寺丞一員以分管比較法誠備而善也今之馬政日以就壊何哉正緣州縣管馬之官貪汙者多利馬之死不利馬之生一遇倒失按月收其常例謂之令補民茍目前私圖便益習染成俗在在不免如此而欲馬政之脩於州縣難矣府之通判較之州縣之官識亷恥顧行撿者尚多其弊亦有二焉懦弱無用者恐㸃馬之起謗愒日玩時通不查理知事而情深者以無官専諉之曰我盡心所事無復知者専務謟悦上官營求别委或問理刑名或追併錢穀用以干名覬望旌奬已之職業若秦人越人置肥瘠於度外官以馬為名謂之何哉如此而欲馬政之脩於通判難矣乃若太僕寺寺丞之官責重而權輕事多掣肘行之不易每年出巡比較兩運備用馬匹恒不及之是懼何暇復追種馬勢固有不及也況備用不完年終有類㕘之例種馬則無之其喫𦂳於彼而優游於此固宜耳故倒死既多一遇差官印烙之年各該州縣同時比併買補買者既多價值自貴乗時射利之徒以致富而百姓囊槖罄然一空鬻及子女者有之及印烙一過上下帖然以為無事作踐者任伊作踐倒死者利其倒死凡此皆弊之在今日者也臣愚以為民財可惜邦本宜慮為今之計合無遵照成化初年事例毎年南北直𨽻各差御史一員河南山東添差御史一員一年一次領勅更替接管協同各該太僕寺寺丞督理種馬提調生駒遇有倒死既令馬户以時買補惟是㸃烙輪該年分之官請印照常㸃烙如州縣官員仍前貪汙及管馬通判荒廢本業與各條所言情弊逐一察訪禁約應提問者提問應㕘究者㕘究庶馬有務而餧養之専官吏有懼而奉法惟謹為寺丞亦有所藉無復掣肘葢實有所相濟而非有所相妨此脩舉馬政第一義也董子曰舉其偏以起其弊所以濟之救之當如此也若以成法不無少妨憚於轉移奪於異議止以三年之期差官㸃烙一次臣恐嵗月易過廢墜如常馬之追補無窮民之財力有限元氣日以耗根本日以摇徒成勞擾可謂痛哭流涕長太息者此也故曰救時之務莫此為急前件查得大明㑹典内開成化以來每嵗九月中請旨差御史二員同該管寺丞分行印俵𢎞治二年奏准孳牧備用馬每三年一次差官印烙今御史謝汝儀條陳前因切中時弊合無自嘉靖三年為始遵照成化初年事例於九月中具奏請㫖南北直𨽻差御史二員河南山東添差一員各請勅一道交付各官分投前去各該地方公同該管寺丞查㸃種馬馬駒遇有倒失即令馬户買補作踐致死者照例追陪各年拖欠備用馬疋逐一查究批回催督完解其各府縣管馬官員内有盡心職業馬政脩舉者一體旌奬或貪懦不職及有謟悦上官營求别委荒廢本等職務如謝汝儀所言應提問者提問應㕘奏者㕘奏施行每遇三年之期仍照常請印㸃烙待後種馬蕃盛足勾原額偹用馬疋不致拖欠照舊停止綜理之術九一曰量解駒以示勸懲臣伏惟種馬之養正欲其羣葢孳息生駒起解以備邉用歴考祖宗之時成化以前每騍馬一疋俱是每二年納駒一疋數不及者各該管馬官員俱有提問降級之例時承平則法易湮法易湮則官易怠平日無提調之方臨時為追罪之計而紙上栽桑之弊興焉如張三馬原未生駒預行報生某駒及駒生毛色不同遂置無用不免别買以務合册民由是不堪多作倒死𢎞治六年遂有倒失馬駒徴銀三兩虧欠徵銀二兩之例此例施而馬政壊矣何者毎駒一疋而餧養三年方可起解草料之費至少不下十兩水草牧放又用一人主之孰若納銀費少而事輕哉故當羣葢之時將兒騍馬分布别用絶其生意間或種馬有孕百方衝落求為虧欠不過納銀二兩或一生駒致令倒失納銀三兩輪當㸃烙之年官吏懼罪逼廹小民臨時買駒多是如豺如狗充數塞白有駒之名無駒之實正徳二年御史王濟奏奉欽依毎年每馬一羣朋合買備用大馬一疋起解不必較其駒之有無生有好駒起俵變賣悉聴自便所謂變而通之此例之行似甚便也但自是以来種備二馬判不相維有司毎年止是比較買馬起解更不提調生駒種馬若無用之物無駒亦不查究有駒任意作踐故建議者有以不必養種馬言有以但徴銀解部召商上納為言此皆徒見末流之弊而不考究其始有乖祖宗立法之意但勢至於此而不有以處之止計臣所㸃烙馬疋共該八萬八千五十九疋每日草料馬一分嵗用財三十一萬七千一十二兩四錢况一倍再倍而不止者烏可浚有限之脂膏養此無用之贅物哉此其弊之在今日者臣愚以為州縣買解之馬非從天降非自地出俱民間所養豈私馬生駒而官馬獨無哉昔之弊也在無駒為有駒今之弊也在有種若無種勸懲不明民心日懈耳為今之計合無申明舊制叅照新例請自嘉靖三年為始嚴督各該管馬官員務要提調生駒如三年之中一馬生有三駒者内㨂其一駒起俵一駒給馬頭以賞其勞一駒同貼户變賣起俵之時仍照例一户有馬三户幇價馬頭眼同貼户随丁田多寡分用若止生二駒一駒馬頭不必給駒於變賣銀内随冝以多坐之其起俵之駒仍照𢎞治九年事例齒少力強不及四尺亦為准俵以示優異為勸如此則民有養馬之利矣三年之中一疋全不生駒者其該幇各馬起解之價務要一時追給一羣全不生駒買俵大馬務要四尺以上稍不及亦不得為准仍将羣頭馬户各枷號一月問擬發落或罰空腹銀二兩為戒如此則民知所懲矣各該管馬官員申明提問降級之例生駒不及不許考滿并轉遷若有前項紙上栽桑之病許被害之人陳告行之數年生駒既多流布民間不惟買馬之易祖宗良法美意亦庶幾復矣前件查得馬政條例内開各處現在種兒騍馬大約以種馬十萬兒馬二萬五千為率每騍馬二年著實科駒一疋以十分為率生駒不及八分者將管馬官提問及將倒失虧欠例不該免種兒騍馬并駒免追本色每大馬一疋追銀五兩每駒一疋倒失者追銀三兩虧欠者追銀二兩還官以後每年差去印馬御史將孳生之駒逐一騐看堪中者印烙不堪者變賣正徳二年印馬御史王濟奏稱切見直𨽻河間衞輝二府孳生雖少駒尚可觀永平一府并山東兖州東昌濟南河南開封彰徳二府孳生既少駒又次之至於大名廣平順徳真定保定等府孳生不惟數少駒皆矮小甚有如豺如狼如狗者所以只得照例變賣通記各府印記不及二分堪望將来起俵十無二三種馬養在民間正欲孳生起俵以備邉用今雖有種馬之額無種馬之實徒有孳生之名而無孳生之用且如養種騍馬孳生馬駒起俵不出養馬在名下四年二駒是為三疋甚至積有四疋五疋者費用草料不貲官府㸃視刑責科罰百端害之所以百姓惟恐一有孳生百害叢至故將種騍馬饑餓作踐瘦病致死有駒則飲以涼水酸泔為之衝落求為虧欠不過納銀二兩饑餓作踐求為倒死不過納銀三兩又有管馬官畏懼比較逼要陪買送官搪塞求為變賣不過納銀二兩或三兩太僕寺嵗取備用大馬未免科民重買因虧欠倒失變賣之例行故將種馬作廢若不因時制宜圖為官民兩便之計終無實用下累百姓上無補於朝廷為今之計種馬地土人民嵗取已有定額但有種兒騍馬㨂選四尺以上十嵗以下髙大者存留矮小老弱者賣價區處買補輳完原數養在民間府州縣官一年四次太僕寺官一年二次止是㸃視務令臕壯病瘦者依律問罪倒失者就令陪補永為定例設有𦂳急亦可調用遞年有無孳生不必追究太僕寺嵗取備用大馬止照種馬定額𣲖行各府州縣買解假如有十萬種騍馬取嵗備用馬二萬疋只照五疋買馬一疋衆輕易舉百姓止養種馬生有好駒起俵變賣悉聴自便二三年間孳生蕃息種馬壯盛免官府印記之煩絶管馬官吏書手人等科罰侵漁之弊公私皆得其便等因該本部尚書閻某等議得御史王濟所奏㕘諸孳牧舊例雖有不同揆之官民事體似稱便利合無本部通行兩京太僕寺轉行各該分管寺丞拘吊原養種馬人户簿册并馬疋到官逐一㸃騐堪以作種者仍令領養不堪者揀出變賣倒失買補既足原額各令搭配成羣府州縣官一年四次太僕寺一年二次㸃視病瘦者痛為懲治倒失者立限陪償每馬百疋病瘦倒失十疋以上管馬官員查提究問其孳生之駒亦如本官所擬不必較其有無亦不必印烙每年備用馬匹止令一羣之内各照丁田議𣲖朋納本色或折色大馬一疋本色務要身高四尺兒馬五嵗騸馬八嵗以下者方許作數折色者徵銀一十三兩煎銷足色成錠俱令該管寺丞騐追徵完各差管馬官吏依限起解若羣内生有好駒堪以備用聴従本羣人户幇價起俵等因題奉欽依通行訖今奏别無依擬合無申明舊例今後種馬生有好駒者聴其幇價起俵其有無生駒或矮小不堪者㕘酌御史王濟所奏事例施行以後各該州縣管馬官員但有揑報生駒紙上栽桑許被害之人陳告該管寺丞處轉詳本部以慿重治二曰定羣臣以明法意臣惟祖宗養馬之制慮馬之多水草羣葢或不能皆以其時騎使作踐恐稽察之不及於是乎量為多少立有羣長所以都其事而察其弊又懼乎馬之病如人之病其弊之多横死可惜也於是乎羣長之下又立醫獸所以責其往來治療馬疋立法之意如斯而已今之有司不能講求法意羣長常川存留在縣跟同里老人等朝暮打卯中間一年一换者有之半年一换者有之甚至三月一换者有之不才官吏因是利其交代以為侵漁之計醫獸人有一畨弓兵各官分𣲖役占狡猾之徒因而營求差使為業甚者看馬醫獸又有一畨額設醫獸又有一畨看馬者多市井無賴額設者輪流應當故小民里長之役方滿羣長又及羣長之歇未及醫獸復來往來奔命皆馬而已問其本業茫然不知有司亦不以其當為者責之此其弊之在今日也臣伏覩洪武二十八年事例毎馬五疋立羣長一人每羣長下選聰明子弟二三人習學醫獸看治馬疋永樂十八年事例每馬十疋立羣長一人成化八年事例各處醫獸每州定設二名每縣一名嵗終更替欽此以臣所歴州縣查之大約在直𨽻者毎馬五十疋立一羣長在山東者每馬五羣一羣長之處居多惟直𨽻河間一府河南開封三府最為㕘錯不齊順徳邯郸一縣種馬止有五百九十五疋羣長乃有二十九之多至若醫獸雖馬少州縣亦有四五六名是成化八年之例未嘗行也所以然者州縣之大馬常至一千之上槩以一二名限之顧東失西更濟何事又况起解大馬中途恒用一二醫獸解押看治勢不可得而行也為今之計合無羣長遵照永樂十八年事例通行有馬州縣定為五十疋立解羣長一人一年方許更替一次中間參錯不齊者通行改正使其常川在鄊往來調督各該馬户羣葢以時務要生駒若有將馬耕田耕地使車賃顧與人等項作踐責其具呈州縣從重究治獸醫遵照洪武二十八年事例每羣長下選其聰明子弟二三人習學醫馬各羣定其業成者一人専以看治馬匹州縣多寡降殺其市井無藉與輪流充當等項一切革去仍勅各該州縣止許朔望㸃卯一次於羣長也責其半月之中提調羣葢過定駒馬若干各該作踐馬疋人户若干於獸醫責之半月之中醫過馬若干致倒失馬若干各該官員親筆填註卯簿季㸃之時若報定駒而致脱落者罪及馬户若未曾舉呈騐其瘠破觔傷者罪及羣長醫獸則以醫療之多寡定其勤惰能修其業復其本身若療無狀另行更換如此則彼知本分之當為而咸思勉矣若州縣官吏仍常川拘留在縣役替等項許被害之人陳告問擬違制庶幾業不妨馬政可脩矣前件依擬三曰擬餘地以補逃絶臣惟直𨽻養馬之例每地五十畝養一兒馬百畝養一騍馬此外又有餘地有白地何謂餘地假如一縣原有養馬地百頃通以騍馬計之算該領馬一百疋若止養九十疋其剰下十頃者聴其養馬餘地之謂也何謂白地直𨽻之地有例不起科者以不起科之地通融養馬徵糧地内故兒馬名為五十畝百畝者有之騍馬名為百畝二頃三頃者有之白地之謂也使此地而俱存馬何累哉但編僉之時各該官員假手吏書者多得過之家營求撥為餘地貧窮下户輳合養馬餘地之費每年畝出銀一二分若養馬一年至少畝亦費銀一錢又況餘地有徵銀之名無解銀之實而養馬草料日不可無買馬坐𣲖嵗不能免故狡猾者束手傍觀而小民日以累窮迹此由耳故一時追馬𦂳急或將養馬地畝揑作白地出賣或受累不過舉家逃移有馬頭逃而累及貼户者有貼户逃而累及馬頭者往往皆然故一馬之地見在者無幾臣又訪得各處風土多係村落自相排擠如第一社原編馬五十疋今雖户口消耗不得減少又如第二社原養二十疋今雖人户蕃息不肯増多夫州縣之馬故有額設彼保烏常有一定哉皆狡猾之徒以此藉口恐嚇官吏而茍禄少剛之徒坐民之困莫之省耳此皆弊之在今日者也臣愚以為見在之馬而民己不堪烏可復加棄餘地以贍之濟時上䇿無過如此而司國計者恒以軍需為辭又恐行之未易也為今日之計合無通行直𨽻養馬州縣逐一查勘原係養馬地土至今逃絶共若干即將見在餘地人户照數撥補仍照此社不足彼社得以補之不得自相排擠偏累靠損而各該逃亡之地仍編入餘地内候逃户復業照常徴銀解寺或軍需𦂳急之時暫令里甲陪納亦輕少易辦如此狡猾者不得以幸免貧竆者不至於獨累聴養之餘地自存小民之貧困實蘇矣前件照得北直𨽻養馬論地每地五十畝養馬一疋今各該有司官員清查地畝審編馬户或買囑於富豪或假手於吏書徵糧養馬通融無術故每一州縣有餘地有白地或十四五頃或一二十頃影射富豪規取地利以致貧窮下户累及養馬及有户口消耗馬疋仍存人丁蕃息領馬照舊誠有如御史謝汝儀所言者合無本部劄付太僕寺轉行北直𨽻分管寺丞督同各該州縣正官將徴糧養馬地畝逐一清查明白將餘地白地籍之於官照畝撥補各羣逃亡人户其有户口消耗及人丁蕃息去處務要彼此相濟不許偏害小民事完各造册具奏送本部該寺該府各本查考四曰缺五曰謹里甲以防借撥臣惟州縣立里甲之馬所以應付使客接濟往來故十年一次輪流應役之時各甲名下預行歛銀買馬以備差撥其來舊矣自配立馬户而有司視種馬為無用之物里甲之馬多不查究間復有貪汙官吏暗受偏手故行賣放専一將種馬輪流差撥月無虚日嵗無虚月或䭾載雙人或負重行李救死不贍奚暇生駒況又賠辦草料出差顧覓一人跟馬害有不可盡述者一為跑走所傷瘠破中風觔傷腿瘤遂至倒死又累馬户重行買補玩法殃民豈忍言哉更不止此有兵備地方調種以拿賊有之府佐下縣勒種以擺導有之官吏望風莫敢誰何但此之害有時而里甲之馬不足無時得休此亦弊之在今日者也臣查得𢎞治九年事例借撥官馬至瘦損倒死州縣五十疋府二百疋以上借者及管馬官各降一級欽此但借撥有多寡之異致死有前後之殊嵗月既深難於查考禁約雖設視為虚文小民隠忍而含寃官吏違犯而無忌為今日之計合無備行各該有馬府分嚴督府屬州縣凡遇里長出役各照前常年事例務買馬走遞以接濟往來該府仍將督買里甲馬疋毛齒每年開坐該管寺丞處查考如有前項侵欺賣放情弊務要體訪輕則問罪發落重則指實㕘奏仍為定法州縣州官但借用種馬一疋掌印官即以違例議罪管馬官以廢職受罰致損五十疋二百疋以上者照例送部降級其兵備官與府佐出巡擅行調用一體禁約庶幾上下有所持循而馬可無借撥之擾也前件查得先為㑹兵勦殺流賊該太僕寺卿劉等題稱擅調馬疋文武職官吏役照依那移侵用錢糧問罪發落仍著為定例通行遵照等因該部議擬題奉欽依今後擅調寄養孳牧馬疋者比照私借官畜産律調移自用借用或轉借與人及借之者各笞五十騐日追顧賃錢入官若計顧賃者坐賍論加一等倒失者比毁失官物坐賍追賠等因通行訖今御史謝汝儀條陳前因深切時弊合無本部通行南北直𨽻河南山東等處巡撫都御史轉行各該有馬州縣督令應役里甲各買馬疋荅應官吏使客往來差使不許擅動種兒騍馬違者許照本部前項題准并𢎞治年間借撥官馬降級事例施行本部每年㸃馬御史及該管寺丞查考六曰立循環以省季報臣惟洪武榜例凡管馬官吏時常下鄉提調看騐馬疋要見定駒若干見駒若干明白附寫以候太僕寺官出巡比較正月至六月報定駒七月至十月報顯駒十一月至十二月報重駒凡季報原領馬為舊管買補孳生為新收事故交俵等項為開除季終為實在徑送太僕寺類繳欽此但法久而廢定駒顯駒重駒官吏通不查騐季報之册書吏羣頭人等遂假此以為科斂之媒册之費能幾何而一馬或斂錢百文或倍於此而計所費亦不貲也況其所開報舊管新收開除之數俱是紙上彌文千無一實寺丞出巡未聞查對臣今㸃烙亦無底册可考兩不相照故民財徒費誠為無用正徳二年御史王濟題奉欽依毎年季報之煩盡皆減省惟年終各府將種馬并解過備用馬疋數多寡造册具奏而今之季報猶在是此例未甞革也臣又訪得州縣官㸃馬造册寺丞出巡造册凡寺府管馬官廩給柴炭紙劄俱出馬户故養馬之費什一為馬而費者恒什九凡此亦弊之在今日者也臣愚以為欲去其費當去其名而太僕寺専管馬疋漫無稽考亦於事體未宜為今之計合無酌量馬疋多寡各府州縣動支無碍官錢通置循環文簿二扇州縣簿用府印鈐記各府簿用太僕寺印鈐記循簿開冩春秋月分環簿開寫冬夏月分其在州縣之簿通將印過馬疋毛齒馬頭姓名一様開造一留本府一發各州縣務循去環來按季查考每季要見臕損若干管馬通判輪該季㸃之時府中領出存留之簿前去㸃視比對開報不實責及官吏瘦損倒失者責限追補臕壯生駒者别行慰諭明賞罰以示勸懲脩舉馬政誠為𦂳切而寺丞出巡亦止吊府簿查㸃各將㸃過縁由親筆填寫附簿俱不必另造虚用民財惟倒死馬疋非寺丞不許收補其各府之簿不必開造毛齒姓名止寫各州縣原額每季臕損倒失定駒等項畧節總目一留太僕寺一發各府亦循去環來按季查考每三年印烙之後方許改造一次惟年終各府將買補過種馬并解過備用馬疋生過兒騍駒數目照數造册具奏季報之煩各㸃馬册一切禁革廩給柴炭紙劄等項俱行州縣動支官糧備用如此絶科斂之路民財自省有稽考之實馬政可修矣倘䝉賜之施行臣當别為圖式以獻然臣謂倒死馬疋非寺丞不許收補亦有説焉夫欲生好駒必須種馬之良州縣管馬官追補馬疋非受囑容情即通同馬販故所補常老弱無用旋補旋死大為民病臣欲以責之寺丞葢量其不至於此耳前件查得馬政條例内開洪武年間欽定榜文一季報實領馬為舊管孳生為新收事故交俵等項為開除季終為實在務要依期造報春季三月二十四五夏季六月二十四五秋季九月二十四五冬季十二月二十四五徑送本司查數騍馬下仍開定駒顯駒重駒一孳生馬駒照依本寺例按月按季開報正徳二年該印馬御史王濟題該本部覆題准將孳生馬駒倒失虧欠變賣之例悉行除免毎年季報比較之煩盡皆減省年終各府將種馬并解過備用馬疋數目造册具奏今御史謝汝儀言及今之季報猶在則是州縣官員各該寺丞因循茍且奉行未至耳況一年四季費用紙劄不貲羣長馬户科歛財物無算其為民害可勝言哉合無照依本官所擬各府州縣官動支在官紙劄置立文簿二扇俱用各府印信鈐記循簿開寫春秋月分環簿開寫冬夏月分馬匹毛齒馬頭姓名一様開造仍備開臕損若干有無生駒若干倒死若干買補若干一留本府一發州縣循去環來按季查考管馬通判出巡吊取州縣簿分管寺丞出巡吊取府簿查對㸃視其在各府并太僕寺簿籍亦依所擬循去環來按季查考再不許另造㸃册科害小民三年印烙之後方許改造一次其年終照例造册具奏繳部不必更易各該州縣倒死買補馬疋通候分管寺丞按臨看騐印烙収補本部仍行御史謝汝儀造完圖式送部轉發太僕寺通行各該州縣遵照施行七曰缺八曰缺九曰慎坐𣲖以憐交病臣查得𢎞治三年㑹議備用馬嵗取一萬以後加𣲖漸多民不聊生正徳十年奏𣲖二萬五千疋似於民力少寛矣比之舊規尚加一倍又半也故雖馬多本折中半𣲖空年分該徴本色馬一萬二千五百疋臣訪得各州縣買解之馬毎疋用銀二十餘兩中途草料日費銀一錢計又用銀四五兩若本逃亡數多累一人陪買一時力不能及未免稱貸或甚以取諸馬販則所費又陪矣此俵中者然也萬一揀退馬之草料豈能復如前哉致令瘦損轉賣與人不能如值之半典廬産賣子女重行補俵故解馬一次中人之産蕩然此外州縣買馬之受病者如此解馬既多寄養之人户數少未免差及下户之人所居不避風雨馬従何地養之未免露置於外寒暑之欺凌霜雪之侵薄馬已病死舉其産不足以償之此尤可言其甚者一馬死一馬又來曽未幾何死者又繼因而逃移或累死於獄此畿内地方寄養之受病也如此積時累嵗倒死數多有司難於追補通付不省民無所忌頑猾之徒因緣為奸作踐致死揑作倒失而弊端百出矣如豐潤一縣前後發下馬一千八百一十餘疋今見在者止一百七十有零中間瘦病恒又半之其他地方雖不盡然槩可見矣夫州縣買解之馬皆竭民脂膏割其骨肉以求充數發其寄養曽不及鵝鴨犬豕然言之可傷心也臣愚以為民者國家之元氣所係不小中外受傷彼此交病似非常䇿所宜憐處此又今日弊之大者也臣查得十一年太僕寺清查過順天府所屬州縣免糧養馬地實有二萬八千九百三十八頃有餘毎地五十畝寄養馬一疋實編過寄養馬四萬一千五百六十疋其剰下地土今安在哉根本之地尤當注意者也為今之計寄養馬疋合無斟酌緩急之宜定為可常之數查照原册要見某州某縣清查過免糧地土各若干原編過寄養人户各若干今領養馬疋各若干其餘下地土權行通融灑貼各馬户以濟目前之困毋使勞者常勞免糧地多則馬户有人擇其得過丁多之家定為馬頭常川餧養太僕寺造册存照坐名發養遇有取用按籍而取之若瘦損不堪免給管馬官吏送問重治下年坐𣲖之數止以今年所免多寡定為本折免多則照𢎞治初年嵗取本色馬一萬疋其一萬五千疋徵銀解部發太僕寺收貯免少量於本色一萬之中加作折色之半其折色之價更於定例之上復加二三兩所省既多民亦樂為之辦凡州縣解到馬疋務補取用之空凡遇免軍必調寄養解到馬疋不得擅免中間寄養人户馬有倒失嚴限追補補買未及不復發領養限外不完馬户枷號官吏照例住俸提問若邉境無事五年之内調免不及者差官變賣其老弱如此馬地既多馬户又蕃衆輕力齊倒失易於追補一也管馬官吏時恐調及敗露獲罪用心提督馬可以臕二也銀貯太僕寺緩急之際發銀以買馬銀在而馬具存官獲實用三也在外州縣數少易辦減價解之若寄養地方不累下户無追補之難而元氣不致耗損四也倘蒙賜之施行政之偏弊不無少補矣前件查得馬政條例内開毎季起俵備用馬二萬疋以十分為率太僕寺所屬取七分南京太僕寺所屬取三分𢎞治三年十二月日為脩省事該吏部等衙門尚書王恕等㑹議題准備用馬每嵗暫取一萬疋本色折色臨時具奏定奪夫馬以備用為名防奸禦侮之意也京邉有事免調頻繁固宜多取之以足軍旅之用京邉無事不須免調又當少取之以節吾民之財今御史謝汝儀欲慎坐𣲖正此意也其嘉靖三年𣲖取備用馬疋合無候命下之日本部臨時斟酌事勢緩急定以本折馬疋多寡務監覆轍不致濫𣲖重貽民困其順天等府寄養馬疋地土已有册籍在官本部行移太僕寺轉行少卿張九叙督令三府管馬通判將地多丁多得過之家編為領養馬頭常川餧養仍將編過姓名三府各造册一本送太僕寺存照以後但有解到備用坐名俵散遇有免給亦坐名行取毋得仍前假手州縣官吏賣富差貧少卿仍具編定過總數掲帖送部查考脩舉之實一曰重委任以責成功臣惟祖宗立管馬之官欲其顧名思義脩舉馬政耳政之不脩官之未得其人也今欲馬政之脩舉誠非得其人不可得人之道在於重委任重之術無他亦曰精銓注専職業崇廉幹而已選之以例茍且之徒一時用之無益於政有害於民用之不専靡嵗月奔道路於政則不暇廉幹不崇又無以作其為善之氣而隂消貪墨之風凡此雖謂之弊亦可也臣愚以為馬政之易汙猶近朱之必赤守之不定鮮不為所移者為今之計合無凡遇府州縣管馬官員有缺即查各該地方相應員内遞年撫按之官考語有廉謹字様者改擬填註管馬不復如前以例徑除如此則銓註精矣擇之既精乃若春和者萬物生育之候馬之定駒俱此時也春季起解之馬有官州縣免其部押専一提調羣葢仍不許各所轄上司别行差委如此則職業専矣用之既専由是奉行有不為所汙生駒數多種無羣空者不必九年六年即行陞擢如此則廉幹崇矣用之既無非人職業有専遷轉如意不能者又有所歆動而勸焉馬政之不脩如前臣不信也若太僕寺寺丞之官亦當以是三者任之臣訪得往年寺丞缺員恩㑹監生等亦得濫與故甚為馬政之玷近年以來非年深政績可紀知縣等官該部不行推陞故各官多知自樹砥礪名節銓註誠精矣但其出巡無常期勤者終嵗碌碌惰者深居不行又三年考滿地方更調不竟所事此職業之未専也資格既深例陞逺方知府卓異者無分别白顧慮前後四體弗獲展布中人以下者之所不免是廉幹之未盡崇也臣愚以為寺丞者府州縣管馬官員之綱茍得其人其為馬政之益不少合無明立條例寺丞每年二月出巡查定駒催解頭運備用馬疋至六月方許回京八月出巡查顯駒有駒催解二運備用馬疋至嵗終方許回京考滿之後仍照原管地方難易安遇所遇不得如前更調則職業庶乎其専矣由是一考再滿之後地方既難功勣又著清白之操始終弗渝者在外量陞藩臬之官在内或令本衙門加俸以昭優異若地方既易政績如常雖所以無議止以常格陞焉則廉幹庶乎其崇矣臣聞趨易避難忠臣之所不為賞善勸勤帝王鼔舞天下之術委任如此而尤乏人世豈有此理哉臣既請差御史以督察矣而復以脩舉之實歸之得人者葢利之當興害之當去御史可勉而興之去之至於綜理查算之類奉行其法利真及民而害是務去非管馬皆得其人勢有不及故臣以此為脩舉之實為是故也前件照得各該州縣管馬官員廉能幹辦者固有貪懦無為者寔多太僕寺各該寺丞勤者二季出巡一次惰者茍禄戀家誠有如御史謝汝儀所言合無本部移咨都察院轉行㸃馬御史巡歴各該地方務要訪察管馬官員賢否實跡明白開具揭帖送部再加訪察移咨吏部賢者務留久任脩舉馬政不賢者照罷軟才力不及事例黜退調用其各該分管寺丞照依馬政條例㕘謝汝儀所擬毎年二季出巡春則催解頭運馬疋秋則催解二運馬疋并㸃視孳生馬駒一應馬政事宜不必頻數更换地方使各官展其才能以終所事議處牧放馬疋䟽節該兵部題内開户部題稱嘉靖七年五月内該兵部議擬題奉聖㫖這馬准存留六千疋聴征其餘照舊下塲牧放欽此欽遵將存留馬六千疋聴候總兵官恵安伯張偉㕘將劉玉等管領聴征如法操練支給料草乞今一年之上未見調遣出征且今嵗近京地方賊情已息而宣大偏頭闗等處敵情不聞況各草塲宻邇畿輔可以朝呼夕至欲將前項聽征馬匹照例下塲牧放遇有警報整搠啓行亦未為晚等因奉欽依是欽此又准惠安伯張偉題稱官軍馬疋先因邉報有警命臣掛印充總兵官督同左右㕘將統領挑選官軍一萬員名在於東官㕔如法操練待報啟行該馬一萬疋止領馬六千疋一千騎操今該户部具題要將前項馬疋下塲牧放此固惜財節費之䇿慮恐冦賊狡猾譎詐出沒不常一旦有警致失軍機重情罪實難逃欲要酌處等因奉聖㫖兵部看了來説欽此又該兵部看得前項馬疋固是聴征之數但今邉報稍緩牧地附近有事調用委亦不難誠如户部所議合無遵照題奉欽依行移左軍都督府將東官㕔聴征馬六千疋請勅一道賫送與原任坐營㐮城伯李全禮通前馬一併管領牧放不許縦放軍士私自回還遇有警急調用務要刻期回營毋致時刻稽延有誤大事責有所歸等因奉聖㫖是欽此臣等待罪該科凡事闗利病有所聞見不得不為陛下言之夫國之大事在戎戎之大用在馬古今牧馬之政班班簡册凡幾變矣我朝永樂以後錦衣旗手等三十衞五軍三千神機等營各置草塲於順天保定等府宛平大興等縣牧放騎操馬疋毎嵗春末夏初各營馬除例該存留聴用外其餘本部推舉坐營官一員請勅管領下塲牧放至九月終回營又奏差科道官㸃閘凡馬疋倒死官軍逃亡領勅官按月造報如有納賄買閒不行提督致馬瘦損者㸃閘官指實㕘奏其立法未為不盡善矣奈何各該草塲地土附近京師累朝以來節被内外權勢乗時妄指奏討奸人揑故投獻大率開墾耕種侵牟占奪十亡八九朝廷屢有禁例然弊成因襲終難釐正𢎞治年間乃令給事中御史并户兵二部委官清查各衞草塲有草未墾土處仍舊牧放已墾成田者照畝收銀解送兵部轉發太僕寺寄庫聴候買馬則是草塲之墾而成田其原額之失舊規之廢朝廷固知之矣雖下塲之令毎嵗舉行夷考牧馬之實不過存羊之名而已況古人養馬必適飢渴之宜必順勞逸之節必辨寒温之時在牧則有庌在廐則有閑所以國馬蕃盛而雲錦成羣也今各該草塲除耕墾之外可為牧地者無幾其低窪之處則又積為湖淀漫生萑葦人馬皆不可近而又無廬次可以棲止無廐庌可以蔽葢馬不免買草以喂人不免褁粮相従常年下塲之馬不過三五千疋而一往一返倒死必多軍士貧難逃亡相繼遇㸃則一時聚集㸃罷則隨復散歸雖有下塲之名殊無牧放之實法至於弊勢所難驅此臣之所以夙夜疚心愧未能有逺大經久之謀可以仰裨國家監牧之政者也然又豈敢飾詞隠實以欺陛下哉竊見近日㐮城伯李全禮奉勅管領下塲馬二千餘疋其牧放之苦已不能免於如前所言今又以聴征馬六千益之則人馬動以萬計殆恐管領之官難於調度軍士之苦益有不堪況近日大雨時行暑氣方溽泥潦遍野鬱蒸中人羣處則有疫癘之虞露宿則有䖟蚋之害炎風赤日灼體薰心加以飲食不繼寝息無所人困而踣馬疲而病將見數月之内士馬物故不可勝算則有徒狥節省之名坐受虧損之實得不償失利不補傷況緣此足以重失軍士之心又何有如戰鬭之氣且弓勁馬肥俱屬髙秋正宜存留以俟調發萬一畿甸有桴皷之警邉闗有烽火之報雖曰朝呼而夕可至未必馬騰而士盡飽也其於軍機國計豈不兩失而俱病哉昨者伏聞成命臣等即問之都督桂勇又問之惠安伯張偉及訪之下塲把總指揮等官又訪之在營號頭等官皆稱非便出而聞之道路則人言籍籍士心洶洶憂愁厭苦有莫可控訴之意是以臣等不遑寜處輙敢昧死上陳如蒙聖慈軫念乞勅兵部㑹同坐營總兵官従長計議合無將聴征馬六千疋責令軍人自領聴其就近隨便牧放不必拘之下塲仍月給料草一半嚴限毎十日赴營操㸃一次不許私自逃回所騎馬疋不得瘦損遇警調用尤為易集待九月天氣凉冷照例回營操練如此則公私兩便人馬俱利軍情慰悦無不感戴天恩而長懐敵愾之心矣伏惟聖明采納臣等不勝幸甚國家幸甚緣係議處牧放馬疋事理未敢擅便謹題請㫖嘉靖八年六月日題奉聖㫖這所言説的是都依擬行勿得忌沮户兵二部知道題覆禁革事宜以振舉馬政事陳洪謨該本部題車駕清吏司案呈奉本部送兵科抄出太僕寺少卿洗光題臣欽奉勅督理順天等府寄養馬政除欽遵行事造册奏繳外臣節該伏覩勅諭葢此事積弊已深或有禁革振舉良䇿例不載者聴爾類推行之欽此欽遵臣自奉命以來一年於兹巡凡三次週迴總七箇月所屬州縣三十七處遍歴各處殫心咨訪因考求得可以推行禁革振舉者四事謹用條陳上塵睿覽如蒙乞勅該部議擬查覆俯賜施行則於馬政不能無少補也等因題奉聖㫖該部看了来説欽此欽遵抄出送司案呈到部看得太僕寺少卿洗光題稱復専管以便責成一事係吏部掌行移咨該部徑自查覆外所據乗大造以清馬册等三事俱於馬政有益合就逐一開列前件上請緣係遵勅諭行禁革事宜以振舉馬政及奉欽依該部看了來説事理未敢擅便等因嘉靖十年四月日兵部左侍郎陳等具題奉聖㫖是依擬行欽此欽遵擬合通行為此除外合劄本寺官吏照依本部題奉欽依事理轉行分管寺丞一體欽遵施行須至劄付者一乗大造以清馬册竊惟馬頭之編實係於地畝而地畝之數實備於馬册葢人户之消長不一地畝之典賣無常非因册籍何所慿據故賦役黄册俱以十年一次為期而驛傳民壯等册皆隨黄册編造今查得所屬馬册三年五年一編造者又有十数餘年二十年一編造者久近不同消長不明加以官吏怠玩里書飛詭其弊豈可勝言今照正當大造賦役黄册之年合無行令各該掌印管册官員待黄册開收一定就令原經里書照依實在數目明白編造以後仍俱以十年為期隨同黄册舉行如此庶奸弊可革而馬册清矣前件查得𢎞治九年為經理馬政事該吏科右給事中韓祐等題稱北直𨽻論地養馬者百畝養騍馬五十畝養兒馬山東河南論丁養馬者十丁養騍馬五丁養兒馬數年之後地有典賣人有消乏該本部議行兩京太僕寺轉行分管寺丞督同該府州縣掌印官以後如遇大造册籍之時將養馬地畝人丁查勘果有地賣馬存丁消馬在者給付丁多有地人户領養造册收照覆題奉欽差通行欽遵外今據本官所奏編造馬册或三年或五年委的大近或十數餘年二十年又係大逺事體不一致官吏里書夤緣作弊欲要乗大造黄册之年隨同舉行深為有見相應依擬合無備行兩京太僕寺轉行分管寺丞務要親歴州縣督同掌印正官就取新編黄册逐一覆查要見某人地畝若干備開舊管新收開除實在數目將相應之家定為養馬人户備造文册二本一本該州縣收照一本該寺查考使富者不致倖脱貧者不致受累以後每遇十年大造黄册之時仍騐人户消長一同舉行一立寄庄以正馬頭竊惟軍衞有司本等差役固自不同而軍買民地則納糧養馬人户備造文册二本所屬薊州遵化豐潤玉田平谷三河武清香河等州縣俱與薊州遵化鎮朔東勝寛河興州營州左右等衞所同處一城故官軍舎餘人等買種民地例不能過割地税仍存賣主户内官者甚多又良鄉涿州通州順義等州縣亦與涿鹿興州營州中左等衞同處且宻邇京師官軍舎餘及勲臣之家置買民地不能過割各主存賣主本户者亦有中間恃勢負頑不肯幇貼者誠不能無然賣主無藉往往多勒貼錢以充私用故將馬疋作踐致死希求買主多出陪補價銀因而剋落有之合無趂今大造黄册之年許令買主就於賣主里内供報明白立籍寄庄養馬當差不許仍以賣主姓名編充馬頭如此庶户籍分明而馬頭正矣前件查得嘉靖六年為開讀事詔書内一欵順天府論地養馬近年以來地多歸於勢豪之家其馬仍令本戸餧養瘦損倒死責令追陪甚為貧民之累欽此該部議准地賣馬存者㫁令得地人户餧養不許豪强勢要占種隠瞞負累小民已經通行欽遵去後然此主於勢要而言其官軍舎餘人等買種民地例不歸割地税猶存本户及買主賣主各項之情弊俱未議及所以本官有此論奏相應比照前項事體依其所擬其或彼此隠瞞不行開報以致互相推托馬無歸著各該官員用心查訪重行究治一編羣長以杜侵欺竊惟羣長之設用以分管馬户拘集㸃視調撥交俵其役與里長同今里長之編大約每里一百一十户為率内取其丁力在上者十户充里長餘分作甲首排年應役周年滿日管收該年錢糧十年一次查有消長更换其法甚善今查得所屬羣長有於均徭人户編充者有令里老僉報者或三年一换或一年一換事體不一以致殷實之家多有買閑狡猾之徒往往營充専以剥削馬户交通官吏圖收折色子粒馬皮等項銀兩如文起解恁意侵欺縁此故也合無趂今大造年分比照里甲事體毎里定編丁力在上者十名充羣長其餘馬户與其分管多者撥輳鄰近里分最少者兩里朋合一里俱令其排年輪流應役週年滿日比照該徵里長事例就令管收該年各項銀兩俱限當年解納掣取批迴銷十年之後照依里長更换如此則人有定向各保身家而侵欺杜矣前件查得𢎞治三年為振舉馬政事該太僕寺少卿彭禮題本部議准今後羣長務僉相應之人一年一替如役過二三年不替復營充者果有埋没馬疋作弊真情問罪禁追已經奉有欽依去後但法無一定人得容私所以有營充等弊今本官稱欲比照里甲事體編充羣長要使買閑狡猾者俱無所容而役不致於偏累深切時弊相應依擬備行太僕寺管馬官㑹同該府州縣掌印官務要著實舉行不致虚應故事期於馬政有補申明舊例告示南京太僕寺為申明舊例以便遵守以祛宿弊事准本寺寺卿王闗惟立法貴於簡便守法貴於畫一本寺所轄八府四州一衞跨江南北地方廣濶風土既異情弊各殊馬政事例俱有成規因革損益至為精當為因年逺榜刻無存條例散見兼以近年以來各該衙門議處紛紜法令不一或弊政昔廢而今行或良法昔行而今廢變賣之例已除而馬駒尚賣於官季報之繁已省而格眼填註益繁以致官吏罔知遵守小民被其欺瞞政體既是錯綜奸弊自然百出且如有司㸃馬一年止該四季今則一月兩次適為官吏科罰之資孳生馬疋變賣聴従民便今則報官告買徒為閭閻侵漁之擾似此弊端難以枚舉馬户緣此困弊馬政因之廢壊兼以各該衙門官吏人等謹畏奉公者固有而偷惰病民者常多若不早為禁諭將來流弊益深為此除應具奏者另行具奏應續行者續後查行外今將見行舊例逐一查出㕘以聞見開立條欵再行申明俱係簡要便民之政約省文詞使人人易於省覽合行移闗本寺煩照闗文内事理轉行合屬養馬府州縣照依發去式様翻刻告示於人煙輳集去處常川張掛通行曉諭今後凡有㸃視比較孳生買補等項俱照後開事理奉行務要便民省事不許多事擾民如違定行㕘究不恕仍取具各屬出給告示道數日期各另開報以慿查考施行等因准此擬合通行為此除告示另行外今將闗到條疑刋印書帙發仰各府州縣存照仍如式翻刻裝釘成帙給散羣長羣頭人等一體遵照施行一減省㸃視馬疋凡㸃視馬疋府州縣官一年四次太僕寺分管官一年二次病瘦痛為懲治倒失者立限陪償毎馬百疋病損倒失十疋以上管馬官員查提究治此係正徳二年事例正徳十三年十六年節次申明近年各州縣官㸃馬有一月一次者有兩次者毎一次不分臕瘦例罰官紙一刀值銀二錢每馬一百疋該紙價二百四十兩馬多地方何啻數倍今後州縣官㸃視馬疋止許照年四次例外㸃馬者事發毎馬一疋一次以上紙價賍銀二錢追究馬數次數多者俱照前項銀兩數目加算坐追一禁約擾害孳生凢馬駒不必較其有無亦不必印烙止令每羣朋納本色或折色大馬一疋其馬駒起俵悉聴自便此係正徳二年事例正徳十三年十六年節次申明嘉靖二年兵部覆題為廣儲積寛困苦以救旱災急缺事又經申明近年馬駒又復報官因而科取分例及造册紙價或牽至當官騐看或被馬頭恐嚇告買或被官吏詭名騙取聴民自便之條廢閣不遵以致孳生日少馬不蕃息今後各羣凡有孳生馬駒起俵變賣悉聴照例自便免其到官㸃視亦不許同羣馬頭恐嚇告買官吏詭名騙馬賣者計賍論一開豁拖欠馬天長縣申稱馬頭左興等名下正徳五年倒死額外餘剰兒馬二疋每疋追銀三兩貯庫本寺查得正徳二年内該部題准以後凡種馬并駒馬倒死虧欠變賣之例悉行除免又經正徳十三年十六年節次申明前項餘剰馬疋不該追究已經批仰改正去後慮恐各處類有此等因循弊政不無枉累人難除正徳二年以前倒死馬疋照舊追徵外其正徳二年以後節年倒死等項馬疋務要查照正徳二年事例即與開豁不許承訛踵謬一槩濫追一停徵倒死皮張查得景泰三年申明馬政條例内稱已經除豁不開其皮張鬃尾内賍許民自賣係成化年間例正徳十三年十六年節次申明正徳二年又將種馬馬駒倒死虧欠變賣之例悉行除免正徳十三年十六年節次申明為照馬疋既不變賣緣何追徵皮張合無遵照節年事例凡馬頭倒死一應種駒皮張鬃尾等項暫免追徵一禁止多科折色馬一疋徴銀一十五兩原係本色改徴折色毎疋徴銀一十八兩係正徳八年馬政條例近年以來加減時有不同俱係正數凡遇坐𣲖到日止許照依正數徵收若有分外收耗尅害小民許被害之人赴所在官司告理坐賍論罪以正徳十年例正徳十六年申明今後坐𣲖折色馬疋到日不許羣長人等下鄉擾民止許羣長催羣頭羣頭催貼户羣頭同羣長當官交納不許分外多收折銀錢數及指稱到京使用并秤免加耗等項銀兩其一應帶買附餘帶徴陪補倒失及作下年備用等項各色一并禁革如違被害之家指實陳告従重坐賍究治一省令買補種馬務要三嵗以上八嵗以下方許作數係洪武年間事例景泰三年申明切照兒馬騍馬三嵗以上八嵗以下作數俱便但兒馬八嵗多係矮小駑鈍之材合無將兒馬定為三嵗以上五嵗以下方許作數一查正備用馬疋凡起俵備用馬疋各照丁田議和買俵身髙四尺兒馬五嵗騸馬八嵗以下者方許作數此係正徳二年事例正徳十三年正徳十六年節次申明若齒少力强不及四年以上者亦聴解俵係𢎞治九年事例但各處近年馬四尺以上者少難以一例責取恐徒為奸吏刁蹬之媒合無遵照𢎞治二年例騸馬三嵗以上八嵗以下兒馬三嵗以上五嵗以下雖不及四尺而齒力相應者亦許作數但不許將矮小老弱不堪者一槩搪塞一審編各羣差役凡兒馬一疋配騍馬四疋為一羣立羣頭一人十羣立羣長一人係永樂十八年例嘉靖二年申明又每羣長下選聰明子弟二三人習學醫獸看治馬疋毎羣長輪流馬頭二名差遣不許一槩拘留常川聴候妨悮農業及别項差使違錯不便洪武二十八年事例一審編養馬人户每十年一次審編先上户次中户单丁寡婦不許一槩僉編係成化八年事例一照年揀選羣長各該養馬府州縣將羣長五年一次揀選殷實本戸之人更换應役其有付馬頭去處一體革罷係洪武十六年例正徳十六年申明消乏者不拘年限一揀選領馬人役凡馬疋𣲖與上户領養中户量貼草料給與由票不許輪流牽養如是瘦損止罪馬頭其因而倒死者亦於本犯下追補係𢎞治九年例正徳十六年申明又輪流養馬者發邊衛充軍係洪武二十八年事例景泰三年申明一存留免糧田地凡逃絶免糧養馬田地給與同羣管業不許典賣與人係𢎞治九年事例正徳十六年申明一查定丁田額數應天鎮江太平寧國五府州每十丁領兒馬一疋十五丁領騍馬一疋鳯陽揚州淮安廬州四府徐滁和三州一衛每田二頃領兒馬一疋三頃領騍馬一疋滁州衛逓加一頃係洪武六年事例正徳十三年申明照得養馬事例論地者俱係免糧田地别無差税專一養馬田馬不得相離不許典賣與人若有混買者查照分數過豁養馬全買者全養論丁者俱照額數編定明立册籍仍刋刷花蘭小票各用印押鈐記每羣頭名下挨寫貼户姓名如遇坐𣲖起俵馬匹到日開寫本色或折色項下每丁該銀若干逐一開冩在内論地者毎户給與一張務與册籍相同不許額外分𣲖人丁羣頭執票方許催徴貼户亦要查票印出辦一改𣲖消乏人户凡牧馬處所有田去馬存丁消馬在者應牧馬疋改給丁多得業之人領養又凡耕種免糧地土不分是否原養馬人數但種過買地方者及官員吏典監生之家一體𣲖與馬疋領養俱係𢎞治九年事例正徳十六年申明一禁治阻壊馬政毎年分管寺丞親詣該管州縣出給告示但有地賣馬存貽累丁乏者許赴寺丞處投告查審是實㫁令承種養馬地土及丁多之人替養誣告者抵罪及照養馬與納糧同不係雜差例不該免敢有勢豪之家不服寺丞㫁理沮壊馬政者輕則拿送所在官司問罪發落重則㕘奏處治寺丞一年滿日將查審改𣲖過養馬人户緣由開報本寺轉呈兵部查照以考賢否係正徳十三年事例正徳十六年申明勢豪之家各宜遵守毋干國憲一禁治囑託賣馬敢有倚豪兠攬囑託賣馬及通同官吏醫獸人等作弊浪估價錢瞞官害民者俱用一百斤大枷枷號一箇月滿日俱調極邊衛所差操舎餘人丁俱發邊衛充軍官吏人等及獸醫一體重治干碍内外勢要人員徑自指實奏請其攛哄老病原馬騐退仍還賣主所得價銀若掯勒不還許被害之人陳告一體枷號治罪係正徳十年例正徳十六年申明一禁約借撥官馬官員借用寄養孳牧馬疋迎送使客借馬二疋罰馬一疋借馬五疋罰馬二疋完日方許復職又凡州縣借撥官馬至瘦損倒死州縣五十疋府二百疋以上借者及管馬官各降一級係𢎞治九年事例正徳十六年申明一禁革拘集㸃視有司官吏不許拘集馬疋赴州縣㸃視直待農閒時月委官指定某日到某羣親詣鄊村養馬去處㸃看但有指以㸃馬拘集人户在城聴候及牽馬州縣㸃視妨悞農業損壊馬匹墮落胎駒者重罪係洪武年事例景泰三年申明一禁約科歛紙劄凡比較㸃馬文簿官吏自備紙劄不許科歛違者治罪洪武年事例景泰三年申明又為陳愚見乗明時救偏弊以期修馬政事内稱各府州縣官動支在官紙劄置立循環文簿二扇按季查考不許另造㸃册科害小民係嘉靖二年事例一禁止差委官員各衛所府州縣管馬官員職事提調馬疋不許管署衛所府州縣事務及别項差占其管馬官吏不許違例擅自承行係洪武年榜例景泰三年正徳十六年節次申明又司府州縣并分廵守官並不許差委官員如違聴廵按御史并管馬寺丞紏舉應提問者提問應叅奏者指實叅奏其廵撫廵按亦要一體遵依毋擅差委係𢎞治九年例正徳十六年申明一追補倒失種馬凡倒失種馬俱在年終完備如是不完府州縣正佐首領官吏决杖二十管馬官吏加等痛治係洪武年例景泰三年正徳十六年節次申明應天順天府尹府丞係在京堂上官年終虧欠倒死等馬不完止取招服免其決打二十照例納米贖罪係成化十四年例正徳十六年申明一嚴督管馬官員凡管馬官有闒茸貪汙害民者分管所官及在掌印官開奏以除民害係洪武年榜例景泰三年申明一責成正官督理凡養馬府州縣正官推故不理馬政俱照錢糧軍伍不准考滿事例通行南北四府州縣掌印正官務要司督府府督州州督縣俱令管馬官員著實興舉馬政如管馬官有故俱令掌印正官帶管違者或批收不完聴兩京太僕寺堂上分管官㕘究𢎞治元年例正徳十六年申明一戒飭違慢官員該兵部題准節該欽奉太祖髙皇帝聖㫖這箇衙門職専提調官馬疋比較孳生但有虧欠作弊馬疋許令本寺舉問品職雖小所掌事重如同御史出巡按治敢有非理抗拒許令寺官開奏拿問欽此通行兩京太僕寺今後軍衞有司大小官員但有作弊虧欠馬疋及非理抗拒者許令本寺并分管寺丞照依太祖髙皇帝舊例應舉問者聴本寺舉問應㕘奏者指實㕘奏請定奪係𢎞治二年例正徳十六年節次申明一省令如法定駒凡兒馬春間羣牧時月要如法加料餧養臕壯照依原搭配定騍馬依時羣葢定駒如果原闗兒馬軟弱不堪著令民人另尋好馬羣葢但是葢過騍馬止許原葢不許將其餘兒馬混雜花葢難定駒胎不便如三嵗兒駒羣葢騍馬不得即用大馬羣葢係洪武年事例景泰三年申明一省令趂時羣葢毎年正二三月趂時羣葢定駒其騍馬生駒七月後著兒馬羣葢夏天炎熱時月須用天氣清明清晨薄晚天凉時羣葢過三五次却停歇三五日再用兒馬羣葢若騍馬打踢兒馬不受羣葢方是定駒仍五日一次用兒馬照試如果不受羣葢即是定駒騍馬先須喫草後方飲水不許餧蕎麥稭黍穣雜糧及將淘米泔一應惡水飲喫落駒不便係洪武年事例景泰三年申明一省令如法看養養馬之家務要置立馬房馬槽地下用磚石墊砌常川掃除潔净不許縦放雞鵝鴨等畜在馬槽馬房内作踐亦不許梳篦頭髪馬若悮食生病係洪武年事例景泰三年申明一省令如法餧馬料豆熱務要晾凉多用料水與草拌匀方可餧馬不許熱料餧養飲水畢緩緩牽行回轉約五七里然後拴在空閒沙地上隨意睡卧不許槽邉拴繫不便係洪武年事例景泰三年申明一省令如法牧放春草發生時月或馬十疋二十疋三十疋隨趂水草便利去處晝夜牧放如遇炎暑蚊虫水發時月務趂髙阜無蚊虫水渰去處牧放辰時飲水一次午時飲水一次至晚飲水一次毎月二十日或半月一次將鹽餧啖亦不許與牢拴繫一處洪武年事例景泰三年申明一蠲免草塲租銀各該州縣徴租草塲如有水旱災傷與民田一體勘實照依分數蠲免係𢎞治九年例正徳十六年申明一不許那借馬價舊例馬價銀兩不許别項支用正徳十三年奏准通行又今後不許擬奏支借馬價及擅使那移别用正徳十六年申明嘉靖九年十二月初七日示陜西馬政一楊一清正徳二年都御史楊一清䟽請查照先年事例仍差御史巡茶兼理馬政兵部議擬題奉欽依陜西一應馬政都著巡茶御史兼管務要著實舉行不許視常怠玩楊疏曰臣𢎞治十六年八月内到於陜西地方親詣苑馬寺查得牧馬草塲見在止存六萬六千八百八十八頃八十畝養馬恩隊軍人止有七百四十五名牧養兒騸騍馬并駒止有二千二百八十疋竊嘆馬政之廢至於如此臣委用都布按三司能幹官員講求故典更新興舉奏黜卿寺不職官員仰荷廟謨獨㫁以布按二司㕘政副使僉事薦補卿少卿員缺大改弦轍一新政令查得六苑清出草塲荒熟地共一十二萬八千四百七十三頃一十一畝八分九釐六毫清勾撥補召募改編等項見在軍人二千三百四十三名銀買茶易孳生馬疋并駒除俵給邉軍外正徳元年實在共一萬一千八百七十一疋脩完馬營城堡共一十九處衙門倉厫馬廐屋宇共四千一百餘間選設操丁一千名奏開武安苑草塲地二千九百六十六頃招募改編等項軍人三百四十五名共用過銀二萬五千七百四十八兩六錢及照西寜洮河三衞茶馬廢弛年久查得𢎞治十年起至十五年止巡茶御史共易過兒騸騍馬五千四十三疋而邉兵缺馬奏討太僕寺馬價及地畝樁朋銀兩髙價易買所補不過三分之一餘皆軍士自買至於破産鬻兒行伍凋耗臣仰遵聖諭嚴禁私販廣積官茶申明舊制招調逺近畨人仗天之威諸畨雲集争以所畜馬疋來聴收易查得𢎞治十六年御史李璣易馬將完取回臣接管四年共易兒騸騍馬一萬九千七十七疋計今三茶馬司處置見在茶斤四十五萬有餘儘勾今年明年易馬之用臣仰惟國之大事莫急於兵兵之大要莫先於馬陜西延綏甘肅皆防邊重鎮節因戰馬缺乏荷蒙孝宗皇帝采納廷議専設風憲重臣督理馬政臣猥以庸劣適當任使後因茶法馬政一事命臣兼理顧廢墜既久之事更新興舉事勢頗難凡所規畫處置皆遵奉明命盡臣之心不敢有遺慮竭臣之才不敢有遺力今草塲地復牧軍數増城堡相望苑廐羅列孳生稽考之法粗皆就緒將來雖不敢望雲錦成羣之盛其於三邉戰馬俵給不為無補至於招畨一節未嘗明復金牌之規而實坐收茶馬之利查得金牌舊制三年一次畨人該納差發馬一萬四千五十一疋價茶於四川保寜等府運送一百萬斤轉輸數千里如臣近所收易以三年計之似過其數所用茶斤皆招商買運不煩軍民轉輸故邉方既得實用而内地若罔聞知凡此皆臣職分非敢自陳功伐但念天下之事創作者必専而後成交承者必守而無失臣受命之初責任最専易於集事自兼巡撫以來顧此失彼已不如前比者復蒙皇上加任總制經理邉方責任重大其於監牧茶馬之政勢不能及懼隳前功以貽後責况臣未老而衰方將瀝血以陳冀遂乞骸之念獨交承之慮實嬰懐抱不得不言臣切惟馬政茶法事體相須先年兩寺馬政巡撫兼管而茶馬巡茶御史主之巡撫政事繁多馬政實不經意而茶司所易良駑莫究騎操所給登耗不聞本末始終茫不相攝虚名無實亦勢使然夫茶司之所易即監苑之所牧監苑之所牧即官軍之所給非惟不相悖而反相以為用故臣之不才亦得稍效其愚此後督理之官恐難復設若今巡撫帶管不無仍蹈舊轍莫若復巡茶之官而兼理之為便如蒙仍設巡茶御史務選年深老練實心幹事之人請勅兼理馬政茶法行太僕苑馬寺官員専聴提調約束各衙門不必干預凡臣已經布置區畫奏有成命一切事宜非有大碍不必立異更張庶幾事有定規可大可久為益實多臣雖退伏草野與世長違亦有榮矣陜西馬政二楊一清正徳元年都御史楊一清題准靈州大䀋池増課一萬五千引小鹽池増課三萬引新舊共五萬九千三百三十七引每引納銀二錢五分及收卧引銀一錢共銀二萬七百六十餘兩送固原慶陽收貯買馬支用及於鳳漢二府相兼河東鹽課貨賣疏曰臣切惟陜西地方皆防邉重鎮軍務所急莫先於馬頃自邊塵弗靖戰馬告乏各邉之仰給無窮公帑之所儲有限至厪宵旰之憂命臣督理馬政二年有餘孳牧茶馬較之先年號増數倍顧三邉戎廐倒亡相繼支應不敷看得靈州大小鹽池所産鹽斤與解池相類不煩人力取之無窮舊例止是招商中納馬疋分給邉鎮騎操後因各邉交争互取多寡不均故有間年闗領之例又因中馬勢囑賄通濫收不堪馬疋不得實用故有收價解邊之例畢竟為馬而設後因放鹽弊多奏添副使一員職雖整飭兵備實兼督理鹽法近年以来寧夏鎮廵衙門借去𢎞治十四年十五年二年鹽課修理河渠工程既未成緒倉塲糧草亦未充足而鹽馬之制遂廢以此總制尚書秦宏苑馬寺卿車霆先後論奏皆欲増廣然當久玩積弊之餘為改絃易轍之舉思之不熟終恐法立弊随有損無益行據副使燕忠髙崇熈等親詣鹽池查得鹽有餘饒常課之外雖増十數倍似亦可辦合將大池増一萬五千引小池増三萬引每引止可納銀二錢五分照鹽一車以六石為則外有多餘依律掣摰追問運至固原慶陽二鹽厰卸所每引仍照舊收卧引銀一錢通共每引該得銀三錢五分每年該得銀二萬七百六十餘兩此外若有餘鹽却依車霆所奏就地招人納銀給與引目聴其發賣倘遇旱澇鹽生不及或邊報𦂳急鹽路不通除舊額課鹽外新増鹽課明白除豁不可膠於一定嵗嵗取盈行鹽地方許於鳳漢二府通行與河東之鹽相兼發賣兩不碍阻其𢎞治八九年以前中馬鹽引年久弊多莫可查考所宜一切革罷𢎞治十三年以前招中商人彼皆奉例納銀輸官後因寜夏借課躭遲數年怨聲載道合准相兼支放新引七分舊引三分𢎞治十四年以後寜夏所借若有未支未中之數年分已滿中間勢豪之人輾轉影射難再復支未中鹽目陜西截取開中庶幾物論稱平所收鹽引銀兩俱送慶陽固原官庫寄放聴慶陽兵備兼理鹽法副使及固原兵備副使提督稽察毎季理鹽通判督同鹽課司將給過引目放過鹽數造册開報臣查考如遇各邉缺馬聴臣斟酌通融給發買馬支用不必拘定間年之例如此則與茶馬大有裨矣陜西馬政三何孟春二年兵部武選司郎中何孟春奏増靈州鹽課疏曰靈州鹽課大小鹽池自祖宗以來與茶法並為各邉馬疋支用近該總制邉務馬政都御史楊一清於額外奏討鹽引召商納銀商賈雲集近日買馬數目助益邉方實多其轉移區處之宜臣不能悉竊以向日馬少引常有餘今日引多鹽不告乏天地生財本自無窮顧人用之何如耳臣過靈州花馬池得聞二池之鹽自來不費人力煎熬夏秋晴煖水面皚皚如雪如霜隨取隨足以今權之課仍舊額傷於狹矣又訪得鞏昌府漳西二縣亦有鹽池額課御史王愷曽要發洮河岷州折銀易馬其河西鎮畨衞鎮夷所有鹽池而無額課除鎮夷鹽池該驛公用外鎮畨境内外鹽池數多獨無可資於官者乎臣愚乞勅楊一清即其已効廣為永圖前項鹽池若是計引重煩不如増額為便即行計量近嵗給引之數斟酌時中之額於雨𤾉乾潦之間制多寡贏縮之節大約可増至十萬引引鹽既定可計課銀每一百引可得銀二十五兩商人不問客人土著納銀二十五兩得引百道課銀一年當不下二三萬兩如遇各邉缺馬給發買補鞏昌鎮畨地方鹽池應否照此定奪其餘河階狄道魚河等處土鹽小鹽各加禁約不許興販致壊課程敢有權門勢族攙越依律治罪庻國用益充邉軍可無缺馬也陜西馬政四徐蕃給事中徐蕃䟽曰臣等切惟威逺之䇿莫先於脩武備而武備之脩莫要於蕃畜牧臣見往者陜西茶法馬政提督未有専員孳牧或兼於都堂茶課則委之御史體統病於分合之靡常弊端滋於交承之不一今我皇上専命都御史一員併付以茶馬之事葢欲盡復祖宗之良法收監牧之實効但恐振舉於廢墜之後非改弦易轍終不足以成務非權任専久終不足以有為謹以馬政切要條為五事併茶馬以期實用切見茶馬招易濟邉良䇿但巡茶御史止是一年所易之馬解發於監苑者雖有成數而不及查其虧耗所督茶課積貯於官司者雖有定額而不暇究其美惡非是不行用心葢縁職任不久耳況先後交代陞轉不常稽考難行事勢掣肘伏望皇上念官多民擾權分責輕將巡茶御史暫且取回而茶馬之事併付本官整理待其事有成效不須大臣之日仍差御史巡察照依清軍事例三年一换則久任成功矣一勘草塲以便畜牧凡有侵占必須還官然荒塲易處而耕種納糧之地似難遽奪曠野易為而既成村落之所恐難盡復必得便宜之權庶有通融之法但有闗地方軍民未免干於巡撫轄於分守彼此牽制有碍更張乞勅本官督同巡守審察權變因時制宜務使地復民安公私兩便而撫按毋得干撓則事權専一矣一清軍士以足牧丁凡有逃亡必須勾補但邉衞疲弊官吏因循或誘於别有奉行或視為尋常故事文移來往動淹嵗時乞勅本官將原額牧軍逋逃者立限清勾户絶者量為僉補務要人充舊額廵撫等官毋得侵預則圉校有人矣一崇勢分以勵賢能切見往者寺苑之官不収才望故其資格淹滯權任輕微雖帶卿佐之銜無異兩司所屬峻崇之階絶望茍且之念自萌今則推方面之賢使居寺苑懸京堂之爵以待成功賢能奚容不勸乎但恐體任素輕人不知重欲收豪傑宜稍優崇乞勅本官嚴加采訪先將見任老懦者上聞黜退政績著稱者量予旌揚員缺用其所推賢否聴其考察使得凖内寺體統照依京官行事不受制於撫按不降志於兩司則體勢自尊矣一分委任以共事功切惟馬政興革非止一端分任責成悉周衆務但恐各衙門不相統攝文移或怠於遵承差遣或違其約束獨謀坐運何以成功乞勅本官量於兩司官内擇委一二才幹以佐經畫府衞衙門凡有事干馬政者悉従節制如有賢否勤惰並聴開具考語類報吏部以明黜陟則衆思兼集矣陜西馬政五劉大夏尚書劉大夏疏曰看得徐蕃夏璲等所言皆詳備切要深補本部原擬之大不足大意俱欲加重本官之任以成公家之事緣都御史楊一清受命於馬政廢墜之後委的事體艱大責任難為況其所行俱於巡撫巡按及都布按三司事相干涉若使人得沮撓事或掣肘縦有才能亦難濟事合無悉准科道所擬備行本官令其查照本部原行及各官所言㕘酌施行仍乞將撫按衙門不得干撓馬政都布按三司以下悉聴節制委用等情増入勅内以便行事其所論茶易馬疋委係馬政一事若併付本官管理委的事體相須易責成效況茶馬自先停止大臣之後止是行人撫諭巡禁成化年間因是行人職輕難以革弊該巡撫奏准暫差御史整理今既有都御史兼理若又差御史在彼不無事權不一合無將巡茶御史行取回京一應首尾悉皆責成於楊一清其原擬禁約處置事宜亦皆増入本官勅内待到彼之日或行茶地方遥逺應該另添何等巡禁官員及茶法利弊中間有應處應奏事情俱聴本官奏請定奪本部仍行鎮守陜西總制鎮守撫按及都布按三司并轉行各府衞州縣所一體遵守并將節次奏奉成命行移在京各該衙門知㑹庶使仰體朝廷興舉馬政之心凡有干預務要欽遵共成國是遼東馬政凌相臣照得本寺軍士原係永樂年間欽撥領養孳牧馬疋給有草塲不等専一俵給本邉官軍騎操額定毎軍養馬二疋餘丁毎名一疋所轄昇平等一十二苑自遼陽直至復州皆其統屬自後於正統以來裁革十苑止留清深二苑𨽻於葢復二衞之間而當時馬疋尚及萬數猶足以供缺乏之用自後俵給既多軍士作弊一遇倒失及虧欠駒子往往買補兒馬以避徴駒監苑大小官吏名位已自輕微志行又復卑下潜通賄賂莫敢誰何所以養成頑慢之性慣習刁訐之風而本寺官員亦因事勢難為罔肯督責以致孳生不廣日漸虧耗𢎞治二年蒙兵部奏調永平府所屬州縣種馬一千疋𢎞治五年又該本寺先任卿李温奏為疏通馬疋以甦軍困事該蒙兵部題奉欽依支給太僕寺馬價銀七千兩亦收買種馬一千疋俱給與二苑軍餘領養比時孳生復廣馬疋成羣後至𢎞治十六年以來節因開原等處城堡及廣寜髙平等驛官軍告蒙巡撫衙門批准俵給過騎操走遞者数計萬餘加以軍士循襲舊弊詭養兒馬以此虧耗復倍於前今計見在馬疋并駒止有二千二百七十五疋中間老病瘦損者且當其半欲望馬疋蕃衍胡可得乎近蒙巡撫遼東地方兼賛理軍務都察院右副都御史張案騐為清查軍餘以備孳牧事該臣清出二苑餘丁除老㓜殘疾事故外實該精壯六千七百四名比之舊額足倍其數但前項積弊既深若不通融議處翻然改圖議擬定規永為遵守則人丁雖多亦何益於事耶切照遼東地方邉臨敵境不時有警官軍征調馬在所先而其虧耗如此當其事者又可得而逭其責哉臣因不揣蕪陋條具四事雖非籌邉經國之逺謀是亦救弊補偏之一䇿也謹具奏聞伏候勅㫖一均種馬以杜規避本寺監苑軍餘領養馬疋例該兩年徴駒一疋查得各該軍餘内有全不養馬者有止養兒馬二三疋者又有養騍馬一二疋而復帶駒二三疋者全不養者何葢因貧難倒失不肯措辦買補惟圖延捱以覬恩宥一也或狡猾之人遇有官軍告領盡數俵出以倖輕便二也止養兒馬者何多以家道得過懼人訐告不敢不養而又畏避徴駒借此以影射故也其養騍馬帶駒多者何大率柔弱之人不善夤緣而監苑官吏於前二者受賂狥私乃以此輩假公責併今年報一駒後年徴一駒駒大轉收又復追駒俵既不及其人駒復日倍其數以此坐受其累不盜他馬以抵其數則拐已馬以逃避耳弊狀如此良由知有官軍俵給之利而不知有苑軍俵給之利所以任其舞㺯一至於是以今䇿之莫若通計二苑馬疋查㸃數内堪以孳牧者騍馬盡數留下兒馬每騍馬五疋量留一疋其餘老病矮小者令其變賣兒馬多餘者兊與騎操官軍亦或従其變賣通計銀兩酌量收買騍馬併其見在之數通融均𣲖責令領養以後所生兒騍駒子俟其一嵗可離種母即便撥與無馬苑軍至於老馬若俟十七嵗以上方許變賣則價值不登多至倒死終必歸於無用今後兒馬十嵗騍馬十二嵗即聴變賣或俵給官軍却將轉收馬駒内撥給抵數仍五年一次本寺清查應該變賣者變賣應該撥補者撥補如此則種馬獲均而人無規避之私矣一寛額例以便追徴本寺監苑軍餘照例軍士養馬二疋餘丁一疋葢以軍有月糧賞賜又與餘丁俱給有官田分在孳牧别無差占以此責𣲖前數理固宜然但各該軍餘所養馬疋既有前弊大率有名無實不過紙上栽桑何曽實有其數臣愚以為少寛課責之虛名以收有用之實效則輕重緩急之間不待辨而自見矣合無每軍止令領養騍馬一疋餘丁四名比照有司四户事例亦領養騍馬一疋仍毎二年徴駒一疋有駒者即令報官無駒者軍士每疋納銀四兩餘丁每疋納銀八兩葢軍士出於一人餘丁出於四人軍士有糧賞餘丁則無故裒多益寡彼此通融俾各得其分願耳前項銀兩毎二年一次追徴封記在官造册呈繳合干衙門遇有騎操官軍應該領馬者有馬給與馬疋無則就將前銀眼同買給俱送太僕寺印烙如此則額例不拘而有切實之效事體歸一而免追徴之勞矣一隨便分丁就養前項軍餘領養馬疋𣲖有名數追徴馬駒限有年頭馬駒價值各従其便庶乎强者無所容其奸而弱者無以隠其憂矣但各該軍餘中間力有貧富不同所欠有多寡不等且東西南北之異處弟男子侄之異居若不従其所便而槩以名數分撥未免抝撓拂抑豈能久而不變耶今計前項軍餘丁多者止盡一户丁少者二户相兼各𣲖以馬數騍馬即量其力就其家即其地品撘均匀俱以四丁為則以便追併其兒馬則於其隻身軍士或貧薄欠馬餘丁止令一人領之免其徴駒仍毎馬給帖一紙各填姓名在上造册比對相同給帖與照册收在官遇有老疾病故等項即聴執占告明就於本户出㓜餘丁或在逃復業及擺站哨撩役滿之人撥補如此則彼此適均奸偽無所推避其於馬政不為無益一據馬分田就牧前項軍餘先於洪武年間欽給草塲本為孳牧馬疋後被各軍開種盗賣或别衞官豪侵占軍餘不沾實惠致有無田在逃者𢎞治十三年該蒙兵部奏差主事黄清前來踏勘給與由貼當時止以人給而不以馬給毎丁一名給田一頃三十五畝七分八釐故詭譎之徒偽報餘丁二三十名者輒得領田三四十頃考其養馬不過二三疋而已甚至全無馬疋者亦得以冒田數頃而軟善之人従實報丁一二名者止得領田一二頃而養馬反有三五疋不等者其於祖宗給田初意大不相侔所以軍士相沿迄今子孫相繼往往開種白収子粒糧既不納馬復不養天下寜有是理合無本寺俟其馬疋分撥停當之後次第清查田土若有盗賣侵耕之弊各令照數還官毎馬定以畝數仍給貼與照聴其種牧如此則名當其實强豪不至兼并其於馬政似亦有裨牧馬之政一丘濬臣按議者謂秦漢以來唐之馬最盛原其所以盛者葢以監牧之置得其地而監牧之宜得其人而牧養之有其法也唐都闗中其地宜馬我朝都幽兾亦是良馬所生之地然馬之蕃息不及唐之盛者豈無其地與其人歟葢襲用宋人保馬之法牧馬於民而官之所以牧者徒有其名而政之未舉焉必欲舉其政請下户部究查永樂以來牧馬草塲為官民所耕佃者盡以還官及所在閒田未經開墾者亦俾報官遣使經量創為牧馬之所而俾諳練民事臣僚講求其利害以聞必上有益於國下無害於民真有利而無害然後立為一代經久之計以為國家足兵之良法牧馬之政二丘濬臣按我朝奄有四海之大凡中國所謂宜馬之地皆在焉非若唐人自中葉以後失去河北宋人失幽燕寜夏之地其後也并中原而失之然是時未嘗去兵而用兵也未嘗乏馬今天下無事所謂馬政事者特以為操習預備之具耳司戎行者往往以乏馬為憂掌國計者切切以擾民為慮何哉不行先王之政而襲用王安石之弊政故也噫無事之時且爾一旦事出倉卒又將何以濟哉臣聞天下無難處之事君子懐先事之憂當閒暇之時而豫為之處置稽之於古騐之於今廣詢訪於衆謀不拘泥於故迹其間必有不虧官不損民之良法有利而無害者出焉牧馬之政三丘濬臣按今日馬政兩京畿及山東河南牧之於民山西陕西遼東牧之於官在官者有名而無實在民者有損而無益國家承平踰百年於兹矣正居安思危之日脩政舉廢之時乞下本兵柄大臣推求祖宗立法養馬之意寺監之養必循名而責實民間之畜必無損而有益立為通融之法兩京畿及山東河南於民養之外擇地以立監牧山西陜西遼東於官養之外設法以為俵散制畜養之規脩廐牧之所勘牧地之數廣收市之利分支兑之等寛追陪之限如此則民稱其實有益而無損矣牧馬之政四丘濬臣按古今馬政漢人牧於民而用於官唐人牧於官而給於民至於宋朝始則牧之在官後則蓄之於民又其後則市之於敵國惟我朝則兼用前代之制在内地則散之於民即宋人户馬之令也在邉地牧之於官即唐人監牧之制也而川陜又有茶馬之設豈非宋人之市於夷者乎請以今日國馬之政言之在内有御馬監掌天子十二閑之政以供乗輿之用凡立仗而駕輅者皆於是而畜之其牧放之地則有鄭村等草塲其飼秣之卒則有騰驤等四衞國初都金陵設太僕寺於滁州其後定都於北又設太僕寺於京師凡兩淮及江南馬政則屬於南其順天等府暨山東河南馬政則屬於北其後又用言者毎府州若縣添設佐二官一員管馬政在外設行太僕寺於山西陜西遼東凡三處苑馬寺亦三處陜西甘肅各轄六監二十四苑遼東僅一監二苑焉内地則民牧以給京師之用外地則官牧以給邉方之用又於四川陜西立茶馬司五以茶易蕃戎之馬亦用以為邉也本朝國馬之制大畧如此承平百年無大征伐遇有征行隨用隨足雖不至於大乏絶然求其如前代之雲錦成羣則未焉是葢唐人之四十八監宋人之十八監之遺制也然唐宋行之於内地而今日則用之於邉方焉其蕃育生息雖不敢盡於國初之盛然惟馬之用不足而已而害未及於民一旦按其已然之迹而振舉其廢弛之政則祖宗之良法善政故在也乞命本兵柄大臣講求本朝故事及㕘究唐宋之典以濟今日之所不及遣知馬政者勘實牧地其有舊有而今為人所侵欺埋沒者咸復其舊或有山林原隰可以開墾以為牧地者開墾之或附近州縣有空閒地可以増置監苑者増置之士卒有逃亡者則為之勾補廐庌有未備者則為之脩葺所畜之馬若牡多而牝少則為之添牝孳生之畜其有種不良則為之求良游牝去特必順其時騰放調養各有其法俵散闗換咸定其規皆一一講求其所以然之故與其所當然之則立為一定之法使之永逺遵守嵗時遣官巡視有不如法者坐以不如法之律必慎擇其官而優寛士卒必務臻實效而不為虚文如此則邉圉得馬之用矣若夫所謂民牧者是葢宋王安石新法之遺緒也方宋神宗初行此法文彦博極言其不可而不見聴其後大為民害神宗有愧彦博之言深知安石之悮而亟罷之是以在當時雖為民害猶未至於甚也今日之弊臣已詳之於前矣而所以為之處置者亦以具於制軍伍之條之下焉然所處置者特議以行於畿甸五都耳萬一可以通行請下兵部及兩太僕寺查算天下馬數某布政司若干某府若干某州若干某縣若干及查各府州縣原先有無草塲及沒官空閒田地并可以為草塲馬廐者假如某縣舊額民若干里户若干丁槩縣馬原額若干疋羣長若干人既具其數遣官親臨州縣勘實以聞然後因其已然之法而立為救弊之政必不失其原額必不拂乎民情務使官得其用而民無其害然後行之請即一縣言之某縣舊有里五十羣長千人馬千疋今即就五十里之中擇其鄉村相依附處或十村五村為一大廏村落相去逺者或五六十家七八十家為一小廏每廏就其村居以有物力者一人為廏長年老者一人為廏老無力不養馬者數人為廏卒每廏各設馬房倉囷及長槽大鑊每嵗春耕之候廏長徧諭馬户毎領馬一疋者種稈禾若干畆料豆若干畝履畝騐之有不種者聞官責罰無使失時無田者許其分田於田多之家或出錢以租耕收穫之際廏長及廏老計畝收之倉囷之中稈草料豆以飼馬而豆之萁即以為煮豆之用按日而出之嵗終具數以聞於官若其馬種即以在官之數充之若其種非良許其售而換之必求其良前此倒死未償之馬五分屬其三徴其二以市馬種凡馬始生則書其月日别其毛色使有所稽考又令通曉馬事者定為養馬之式鏤版以示之凡一嵗㳺牝騰駒去特皆有其時越其時者有罪凡一日齕草飼料飲水皆有其節違其節者有罰其房庌必冬煖而夏凉其牧養必早放而晡收凡可以為馬之利者無不為凡可以為馬之害者無不去如此則牧養有其道其視各家人自為養者大不同矣舊例凡羣頭管領騍馬一百疋為一羣每年孳生駒一百疋不及數者坐以罪請酌為中制每騍馬十疋止取孳生七疋其年踰數者除以補他年欠缺之數今年不足明年補之其有種馬倒死者即以駒足其數本廐生牝多許他廐聞官以牡來易每廐兼畜驢騾以馬為凖牝馬二十畜牡驢一牝騾四所生或驢或騾具數報官官為造車遇有搬運官物許於各廐起倩無事之日本廐馬户借用者聴按日計庸收以為秣飼之用每季本縣管馬官一行巡視府官嵗一行太僕寺官因事而行無定時凡其馬之壯老肥瘠逐月開具㸃視之凡房庌有不如度水草有不如法芻豆有不及數驅走有不如式皆為脩葺處置違者治以罪是就民養之中而微寓官牧之意上不失祖宗之成法下有以寛民庶之困苦中有以致馬政之不失大畧如此雖然其間之委曲纎悉又在臨時因事制宜補偏救弊也若夫俵散闗換之法具有成規官軍領馬騎操遇有倒死責以追償是固足以為不行用心保惜者之戒但馬之給於官軍者多係餓損并老弱羸疾者及至官給草料或不以時或馬有不時之疾猝然莫救者亦往往有之律文死損數目並不准除然一軍之産不滿十百而一馬之直多踰數千傾家之所有不足以償甚至賣三子不足以償一馬興言及此可傷也請自今以後給馬與軍必具其年齒毛色體質或肥或瘠或有疾或無疾明具於帳如齒踰十二或原瘦弱并有疾者不償准以皮毛入官若雖少壯而忽然有竒疾先期告官及衆所共知者亦在不償之數申明舊制凡馬軍皆要攅槽共喂如居隔逺秋冬之月皆俾就近攅喂半夜以後本管頭目親行㸃視草料有不如法及不及數者罪之其闗領草料則嚴為立法不許變賣及將换易他物買者换者罪同凡馬倒死必責同伍互償若同伍之人知其馬之老瘠疾病及其人棄縦不理雇借與人削減草料者預先告料理者免其共償如此則人人爱惜其馬有不惜者人共責之而預得以調治之則馬無横死而人免陪償矣是非獨以足乎馬而亦有以寛乎軍也雖然此内地官軍騎操之馬爾至於邉方之馬所係尤大與其得駑馬而乗之以禦敵又不若不乗之為愈也葢騎戰非中國所長而中國之馬比北馬為劣以非長之技而騎下劣之馬以角敵人之所長非計之得也請自今給馬於軍士非良不與而所與者必良與之騎操而不倚之飼秣宜於邉城中擇操空閒地為馬廐置長槽或十或伍隨其廣狹不為定數不分衞所隊伍因其近便而為飼養之所選其老弱之卒不堪戰陳者専一喂養置大團以貯草支大鑊以煮料每日遣官㸃視晡時則檢其所儲夜半則視其所飼操練之日軍士持鞍就彼鞁騎無事之時輪班牧放逐名調習或有瘦損病疾告官調治如此則馬得所養而無損失之患軍得其用而免陪償之苦矣或曰今邉城非一處處處皆屯重兵所騎之馬安能得其良竊考五代時范延光所言者李克用上立國制勝所畜不過七千今東起自遼東盡岷洮其間歴宣府大同延綏興慶甘肅之境邉城萬里其馬不趐數十倍矣然牧馬之數雖多未嘗以之臨敵出陳往往老死皂櫪之間而責吾士卒之陪償人不幸而生於邉界天苦寒而地磽燥物不生殖而人無蓄積天下之人莫苦焉既資其出力以為國防邉又責其出財以為官償馬以每嵗所賜予之衣糧猶不足以償其遞年倒死之馬疋況望飽煖其妻子乎則是無事之時無故以是不戰之馬而坐困吾得用之食卒而使之失所離心葢亦不思之甚也昔人有言帝王之師以萬全為勝中國之所以取勝於夷狄者以人不以馬以智不以力以守不以戰臣愚以為自今以後邉境一以髙城深池為固扼其要害塞其蹊徑來則拒之去則不追凡其制兵率以步兵為正以騎兵為竒大率步十而騎二步軍一萬騎軍二千馬非壯健不以給軍軍非驍勇不以為騎扼之使不得入而已而不遮其出拒之使不敢來而已而不追其往如此則騎兵無非良而馬亦易於辦矣或者若謂馬者兵之大用兵非馬決不能以制勝吁此論戰兵非所以論兵之守也所謂守者我静而彼動我逸而彼勞我大而彼小我衆而彼寡彼用其所長我捨我之短而用我之長以制之焉則彼進不得戰而退可以回自然屈服於我矣臣愚無知識輒敢肆其胸臆而妄為異議伏望天地大度憫其區區一念憂邉愛民之誠脩攘制禦之䇿丘濬臣按自古國都於其近邉必有牧馬之所其間必積芻豆以為飼秣之具方無事時資以牧育固為近便然世道不能常泰而意外之變不可不先為之慮金人至宋京奸人導之屯兵於其近郊之牟駝岡藉其芻豆飼其馬以為久駐之計此往事之明鑒也矧今國都去邉伊邇已已之變倉卒用言者計焚棄芻豆何啻千萬當時見者莫不悔惜然事已即休無復有以為言者竊惟都城東北鄭村壩二十四馬房其倉塲所儲積者如京如坻請於無事之時即其地築為一城以圍䕶其積聚及移附近倉塲咸聚其中就將騰驤等四衞官署軍營設於其中特勅武臣一員於此守鎮仍司羣牧四衞官軍不妨照舊輪班内直下直回城屯住是亦先事而備之一䇿也伏惟聖明下其議於羣有司以決其可否馬政議李堂國家常賦之制視古什一為輕而常制之外取之若盡其物如茶鹽之課闗市之征皆為儲蓄經費計也至於馬政之征尤為軍國重計堂嘗與議為審故利弊尤悉焉夫設官鑄印與守令分民而治何其重哉葢洪武條格重種馬課孳生永不可廢也今應天鎮江太平等處謂非養馬地方従便折銀解部以備買馬民誠便益乃推諸江北省府亦定價通行焉則太僕㸃視憲職印俵何為哉大抵建議更法之臣不顧條規成憲如江南府州屬邑牧馬草塲烽堆明白見在也乃計畝起税以徵銀用下人以不復孳牧官吏惟知集價應官而已何従騍駒乎且富民豪户乗肥䇿良者阡陌成羣況古之晉冀騋牝所儲雲錦所蕃而謂盡無留良乎捨孳牧以為勞縱市販以為便未見其得也雖然設官之非其職多矣豈但馬政一事而已哉鹽法闗征凡以助國用耳闗征近制多監於部署葢取竭疲農不若征諸得利之商近世所通行也長蘆淮浙等處之轉運提舉非鹽課之司乎今所在漏巵於豪右轉利於霸猾而奏討頻仍則阻壊混淆將蕩然無餘矣乃括疲竈困弱商税田課畝巧為水鄉等因以額辦其惠奸容蠧也甚矣夫豈立制建官抑末助農之本并及末議俟君子質之各邉馬數八處大同原額并新増馬共四萬八千九百四十四疋見在一萬六千七百三十九疋倒死三萬二千二百五疋京闗馬三千疋已買馬七百五十一疋未買馬二萬八千四百五十三疋寜夏原額馬一萬九千五百九十五疋見在馬九千一百二十疋倒死馬一萬四百七十五疋遼東原額馬五萬三千二百六十疋見在馬四萬九千九百九十二疋倒失馬三千三百六十八疋甘肅原額馬二萬九千五百六十七疋見在馬一萬八千二百三十四疋倒死馬六千六百九十疋又洪水堡等處倒死馬一百四十四疋備禦馬四千四百九十九疋陜西原額馬一萬六千一百八十三疋見在馬一萬五千五百七十三疋倒死馬一百二十四疋事故馬四百八十六疋延綏原額馬三萬二千三百五十一疋見在馬一萬四千五百二十三疋倒死馬九千六百十三疋事故馬八千二百一十五疋宣府原額馬四萬四千二百四十八疋見在馬三萬六千二百二十五疋事故馬八千一十三疋山西原額并添設馬一萬二百二十一疋見在馬七千四百八十疋倒死馬二千七百四十一疋名臣經濟録卷三十六
