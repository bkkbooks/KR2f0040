body:
  text: 名臣經濟録卷二十五明黃訓編禮部儀制上總論禮樂之道丘濬臣按宋儒朱熹上疏於其君謂遭秦滅學禮樂先壞漢晉以來諸儒補緝竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義疏耳前此猶有三禮等科禮雖不行而士猶得以誦習而知其説自王安石棄罷儀禮獨存禮記之科棄經任傳不過習為虛文以供應舉若乃樂之為教則又絶無師授律尺短長聲音清濁學士大夫莫有知其説者而不知其為缺也欲以儀禮為經而取禮記及諸經史雜書所載有及於禮者皆以附其本經之下具列注疏諸儒之説但私家無書檢閲無人抄寫迄不能就而鍾律之制則士友間亦有得其遺意者竊欲更加參考别為一書以補六藝之缺而亦未能具也臣覩朱氏此疏所謂以儀禮為經而以禮記及諸書為傳者雖不見用於時而其徒黃幹楊復恭蓋巳私輯之以為儀禮經傳通解所謂士友間有得鍾律遺意者則指蔡元定律吕新書也今儀禮經傳通解南雍有刻本已行於世而律吕新書永樂間已載性理大全書中則朱氏之言雖不見行於當時而實得表章於聖世臣竊聞開國之初太祖皇帝不遑他務以禮樂為急開禮樂二局徴天下耆儒宿學分局以講究典禮樂律將以成一代之制然當草創之初廢學之後稽古禮文之事諸儒容或有未足以當上意者當時雖輯大明集禮一書然亦無所折𠂻樂則未見全書焉古云禮樂百年而後興今承六聖百有餘年於兹矣所謂聖人在天子之位而制禮作樂者兹其時歟禮儀之節丘濬臣按成周盛時以禮持世凡其所以建國而辨方正位體國經野設官分職以為民極者皆謂之禮焉不徒以祭祀燕享冠昏賔射以為禮也大宰掌建邦之六典以治典為先而禮典僅居其一然其書不謂之治而謂之禮其意可見矣秦漢以來則不然凡其所以治者皆謂之政特以其所以施於郊廟朝廷學校而有節文儀則者則謂之禮焉蓋三代以前以禮為治天下之大綱三代以後以禮為治天下之一事古今治效所以有隆汙之異者以此我太祖皇帝初得天下於洪武元年即命中書省暨翰林院太常寺定擬三禮明年再命集議又明年遍徴草澤道德文章之士相與考訂之以為一代之制今書之存者大明集禮洪武定制禮儀定式稽古定制及諸司職掌所載者乞命掌禮大臣著為一書以頒賜中外使天下後世咸知我朝一代之制永永遵守亦俾後世作史者有所根據云進大樂律吕元聲書范永鑾題為正大樂以復古樂事臣考之自秦分六籍之後律吕之學已失其傳而大樂之不正也久矣治道之不古若良有以哉臣師已故先任桂陽縣儒學教諭後升思南府儒學教授李文利本之劉恕通鑑外紀長孫無忌隋志并吕氏春秋所載黃帝命伶倫取竹制律斷兩節間三寸九分而吹之以為黃鍾之宫曰含少因而詳加考證以三寸九分正司馬遷黃鍾九寸之誤以太極隂陽五行由一以生二由少以及多見黃鍾數少為極清以正宫聲為極濁之誤以左右對待各得一百二十九分正三分損益上生下生至仲吕而窮之誤以徴循環無窮正隔八相生往而不返之誤畫圖立説昭然可考初非無稽之空談實有據之定論顧編著垂成而天不假年殆將泯沒不傳矣其兄前廬江縣知縣李元憫其志大而未遂也取而復加校補臣叔江西按察司副使范輅亦嘗同臣師事文利曽聞其槩乃互為校正成帙因其舊名曰律吕元聲示臣臣竊念本以膚淺於此理茫然莫測其微奧今得是帙而觀之恍若有得或者大樂終不能晦故劉恕無忌吕氏存其度於煨燼之餘而臣師李文利并其兄李元臣叔范輅又拳拳互相發明於大壞之後歟臣思不為之表白焉則文利之志終不能伸而音樂之正否治道之汚隆終無以考驗矣乃謄寫上獻如蒙乞勑廷臣再加詳議如文利之所著果有禆於大樂下之所司試而行之誠千萬世之大幸而文利平生辛勤考究之功亦得以少見於天地間矣緣係正大樂以復古樂事理未敢擅便為此具本并寫完律吕元聲一帙専差承差焦明魁親賫謹題請旨論元聲書楊廉承惠寄校正兩山先生李公律吕書即其黃鍾三寸九分算之由十一月之黃鍾至十二月之大吕增六分由大吕至正月之太簇增九分由太簇至二月之夾鍾增九分由夾鍾至三月之姑洗增九分由姑洗至四月之仲吕增九分由仲吕至五月之㽔賔增九分由㽔賔至六月之林鍾減六分由林鍾至七月之夷則減九分由夷則至八月之南吕減九分由南吕至九月之無射減九分由無射至十月之應鍾減九分由應鍾復回十一月之黃鍾減九分其所增皆以九分而所減亦皆以九分惟黃鍾之於大吕㽔賔之於林鍾其所增減比之他律不同然實各有至理蓋大吕當五隂之盛一陽始生則是陽雖進而尚弱林鍾當五陽之盛一隂始生則是陽雖退而尚強固宜其增減僅得三分之二也律管長短一本隂陽升降之氣所謂律厯同道於此乃見執事書序髙文所謂黃鍾三寸九分升陽漸益至㽔賔而得九寸歸陽漸損至黃鍾仍得三寸九分所謂三分損益者以對待言隔八相生者以正徴言與夫所謂喉齶舌齒唇之聲證宫商角徴羽之音凡書之要一一拈出以示人可謂透其關鍵而得三昧矣今以司馬遷黃鍾九寸上下相生損益算之黃鍾至大吕減六分竒大吕至太簇減三分竒太簇至夾鍾減五分竒夾鍾至姑洗減三分竒姑洗至仲吕減五分竒仲吕至㽔賔滅三分竒㽔賔至林鍾增二分竒林鍾至夷則增四分竒夷則至南吕增二分竒南吕至無射增四分竒無射至應鍾增二分竒應鍾至黃鍾增四寸三分竒歷家二十四氣每氣算之不差毫忽若一氣短二分竒又一氣短三分竒又一氣短四分竒又一氣短五分竒又一氣短六分竒又一氣短四寸三分竒則月之大者過於三十日月之小者不及二十九日不惟無以成嵗而律管候氣亦不可用矣陽氣自冬至後以漸而升而律反減則氣有餘而管不足陽氣自夏至後以漸而降而律反增則氣不足而管有餘其亦背馳之甚哉謂司馬遷之差其差處正在於此謂李書之得其得處正在於此至於從前宫羽之舛此清濁之逆施正由黃鍾一差諸謬所必至者而不俟於言也廉嘗見歙人鮑泰希止著天心復要書以明厯大槩氣朔八十年一齊厯家每嵗二十四氣於時之八刻中往來無定鮑書所排節氣之交皆有定刻中氣之交亦有定刻如冬至乃十一月之中氣定在十二時之五刻嵗嵗如此餘氣之定在某刻者亦然朱子謂厯有一定之法後人不知只是趕趂天之行度然則鮑書豈非有一定之法而如是哉知厯者得之則亦可以推算矣嘗以今厯氣朔較之相去特五六時却是亘古亘今如此實萬年厯也鮑書謂郭守敬之法未是守敬法即今厯法我朝仍勝國之舊未嘗改也厯自漢以來皆不得其傳審如李書則鍾律自漢以來亦皆不得其傳而此二人者之獨見如此謂非天授不可也方今聖人在上必有軒轅命伶倫放勳命羲和之盛舉惜無以二書獻之闕下其所係豈細故哉廉於西山蔡氏書嘗為之律吕算例於郭守敬法亦嘗為之綴算舉例然不過為二家之注腳亦終於聚鐵鑄錯耳廉於李書窺見一班半點安敢肆然輒加語於其上哉尚兾執事之見察也鮑書并往執事聰明過人有入手處幸有以教我不宣王朝之禮一丘濬臣按前代朝儀無一定之制時有更改惟我朝自祖宗以來至於今日率循舊章一日三朝自古帝王所無也每日晨興上便服御奉天門文東武西待鳴鞭畢鴻臚卿唱入班百官行叩頭禮分班侍立翰林學士侍御座左錦衣衛官夾陛西立六科給事中分侍左右御史分班靣北立鴻臚官屬立其後先日謝恩見辭者於鴻臚寺報名至日先赴午門外俟百官叩頭畢鴻臚卿對御前宣奏姓名員數於午門外行五拜三叩頭禮畢五府六部以次奏所司合行事次通政司引人於御前靣奏請旨該司官出班承旨大理寺以下有事則奏無則已次禮科引差使考滿官員次六科各奏旨意題本守衛揭帖賞賜鈔錠次鴻臚宣奏藩府邉境所遣使臣上命以酒飯賞賜既而兩京堂上官新升者及在外三使來朝赴任者靣叩頭畢鴻臚卿唱奏事畢羣臣俱側身向上立鳴鞭畢上乘輦往御武英殿或文華殿閲章疏日率如此至午復出朝晚亦如之此每日常朝之制也每月朔望上具皮辨服御正殿百官公服叩頭畢分班侍鴻臚卿宣奏謝恩見辭員數畢上出奉天門視朝如常儀臣竊考前代之制有所謂捲班放仗入閣等名目或失於粗略或失於煩瑣惟今日朝儀酌古凖今實為得中洪武二十年冬十月太祖髙皇帝諭大臣曰近者臣僚尊卑體統多未得宜爾等宜著禮儀以為定式禮部尚書李原名等會官著為禮儀定式一書凡三十七條所謂朝參之禮有八焉頒行既久而奉行者偶因一時之便遂襲以為故事旁觀者雖知其非而不敢以為言後來者因以為當然者亦或有之竊觀前代朝會班次儀注皆著成圖式載在文獻通考諸書者可考也乞勑大臣及翰林院鴻臚寺官將纍朝實録及禮儀定式等書并稽洪武永樂年間以來事例詳加講究櫽括節潤畫為圖式懸於兩長安門用以表正百官觀示列辟俾人人知所趨辟世世得以遵守永為定制云王朝之禮二丘濬臣按此後世大朝賀宴會之禮所由起自漢行嵗首慶賀禮魏晉以後又有賀冬至禮唐中葉又有所謂賀生日禮皆於是日行禮畢設大宴以享百官我朝禮儀視前代為偹文臣四品以上及諸學士武臣都督以上皆宴殿上經筵官及翰林講讀官尚寶卿六科都給事中暨文臣五品堂上官武臣都指揮以上官宴中左中右門翰林院中書舍人右左春坊御史欽天監太醫院鴻臚寺官及五品以上陪祀官宴於丹墀是日行禮畢該宴官更衣立殿外俟上至升座樂作入拜進花進酒跪俟上飲訖乃起即席簮花啐酒酒凡九進湯五進羣臣則殺其二每嵗三大朝賀及郊祀禮成行慶成禮凡四舉焉遇故則賜鈔以代宴惟慶成則否臣竊以謂正旦長至遇故免宴可也惟萬壽聖節天下藩服重臣親賫表賀有自萬里而來者無不望一霑醉酒飽德之恩請命禮官舉行之禮儀定式後序劉三吾萬方之所承式在京師京師之所承式在朝廷所謂正朝廷以正百官正百官以正萬民正萬民以正四方者也皇上奄有四海君臨天下以來治定制禮上之朝廷有儀注次之京兆又次之外府州縣有洪武禮制中外奏行亦有年矣乃者皇上萬幾冗隙載命禮曹與爾廷臣羣定朝儀繁簡適中以聞尚書臣李原名侍郎臣張衡則如旨條奏即日復召六部都察院通政司左春坊大理寺羣臣等靣折厥衷惟允巳乃以頒示永為定式其條朝恭八筵宴二出使三拜禮二公座司屬見禮公聚序坐三官員相遇引避八常從儀從一以至傘蓋冠帶服色器皿鞍轡弓矢屋舍床榻之類悉依品從毋敢踰越此禮之常經然也中間拜禮先稽首四拜後叩首一拜為見君上之禮拜止於四為見東宫各親王之禮見父母同四拜禮見親戚官長止兩拜禮如宦者非隨從公侯駙馬其自出入者遇文武百官須下馬讓道其承宣召以下數事遇應避之官不避及司屬見禮應避路者有親戚尊卑之分聽行私禮此則禮之從宜者要在本乎常經合乎人情而已總之則朝恭第四條於聖諭教戒毋放肆怠聽思為省身克巳之道其諸條中最切要者大槩能以聖戒存心斯能於臣職無所不用其心矣豈但遵奉儀式而巳哉奉三江先生論禮書夏良勝良勝向以罪重責輕間居屏迹袛奉明詔湔洗可圖雖哀痛慘惻攀號莫及而私念隱度諸所更化誠為善治又計積德維久而明良契遇實應昌期直清令聞如執事者又當邦禮之寄故知天下將有興禮之治不獨法制修明而已也是以趨命就祿於職百未一舉而汲汲皇皇謬以議禮為第一義者孔子曰能以禮讓為國乎何有亦謂禮失而求之於野將有獲焉者也况慶萬壽聖節人所以事君之禮莫大焉而以忌易日誠禮經有所未偹而當代典章所創見者是故識淺未免於懷疑而思苦未能以自得執事謂有所未悉是誠然也蓋良勝強學書生所服者古訓也忝厠人臣所守者今制也是宜未能悉也顧以其事大其説斯長乃敢并布所聞以陳左右亦取正有道因所未悉而求以盡悉之也執事其俯聽之竊意我朝以萬壽聖節元旦冬至為三大慶禮俱上表賀元旦冬至南京并在外各衙門止遣首領官類進惟萬壽聖節親王方鎮例不擅離襲封衍聖公與南京守備官堂上官天下都司布政司按察司方靣官直𨽻府衛州所等衙門俱佐二官及朝鮮諸國使臣各於是日賫進是禮儀隆備較之元旦冬至尤為重大上有祝於君釐下有安於臣節大有通於天下逺有及於四夷悠久以行於萬年而傳於萬世故曰人臣事君之禮莫大焉此也或謂言涉謬妄是則宜然良勝初亦未敢自以為是亦乞下廷議各盡所見以求至當但謬妄云者亦在别白何者為曲證訓典何者為鑿空臆説何者於理道有違何者於章程有礙而後可自省也傳者議禮如訟固有未能合一者然必貫通於情義而後可常行必博求於古今而後為定論况疑事毋質直而勿有如銓選吏部職也京堂則九卿會推刑獄法司守也疑獄則多官議決大禮疑義未可視以為末事専以為家事膠定於一人之見懸斷於倉卒之際遽以為定禮而不容有異議者也良勝故謂斯禮也朝廷之禮也凡在朝廷之臣子得而議也通行於天下天下得而議也事關夷狄夷狄得而議也書之史册以垂萬世萬世得而議也獨自愧學不足以充其心詞不足以達其意爾然所引據忌日之謂父母忌日不樂即逺有終與曾子問答皆禮經之本無疑者或者乃曰旅見廢禮蓋適然事與議成禮者不類然太廟火后之喪雨失容謂之適然可也至於日食則日月之行有常度精厯算者所能考也縱官失之分秒度數容有不同未聞并日而差者也至於指摘詞語謂或非禮經全文或易原文一字則孔孟之斷章取義與文字家之會文切理皆非也每一事而必附數義為備禮有三千三百之目雖充棟禮文不足以盡而先儒謂易以每爻但該一事則亦止三百八十四事而已也司馬公謂欺天下不通文義者良勝初非較文之志是則不敢深論也比擬經筵事理乃近時廟堂之議輔養君德誠為重典而所執論者亦謂服緋衣與宴飲視聖節禮儀舉行疏密關係重輕亦足相當君不以忌而簡禮於臣臣欲以忌而廢禮於君彼此相形恐非可繼可傳之義祭取諸幽古有明訓今太廟時享孟春孟夏孟冬皆於午後行禮孟秋則以時方入伏暑氣鬱蒸至午而牲牢色變因改蚤祭沿襲而行非初制也故謂忌祭可移於午後者實昉於此况禮有據經而守正亦有適變以從權湯崩初喪也伊尹以冕服奉嗣王祇見厥祖成王崩未葬也召公畢公率諸侯入覲康王君臣皆冕服羣公聽命而王釋冕反喪服君薨而世子生太祝禆冕奠幣告于神仁宗章獻幸慈孝寺大臣魯宗道請後大安輿謂母有從子之義事關大禮在父母間猶然也而况服親盡之忌乎國初忌辰典章無所於考自奉先殿立而後致祭宫中太宗文皇帝於高皇后忌辰先期二日極致哀思以生母也亦謂孝道當自盡其誠𢎞治十四年奉孝宗皇帝旨今後遇忌辰朝恭官不許穿紵絲紗羅衣服則臣下以忌辰易服乃始於此然正月初三日宣宗章皇帝之忌辰如遇奉祭祀許穿紅衣服奉有明旨三月初一日孝肅太皇后之忌辰朔日不廢升殿百官四品以上俱用大紅公服至親王薨逝及有名德大臣之喪則輟朝不鳴鐘鼓忌日既鳴鐘鼓朝儀如常止易衣帶比論數端視萬歲聖節禮儀輕重懸絶不待智者而自辨或者曰高皇后不祧之廟與父母等然廟之不祧以高皇帝功德在萬世也凡后皆為祔廟之主未聞以后德隆盛而不祧者也今日同時輔相之勞不知視淳皇后篤生聖祖之功果孰為大前者不以淳皇后之忌而易日經筵兹者以高皇后之忌而易日聖節良勝益有所未悉也或曰生日不樂古之英君有行之者是則出於主上之至孝念及劬勞宣示中外通免表賀而後為稱非臣下所可取必於上而行之者也夫以聖皇歷服嗣統重忌以成其孝避慶以成其謙真盛德事故今日禮儀誠有難於獨斷者是在臣子所以自盡也夫臣之事君猶子之事親也今中外臣工有於父母之壽而以先代之忌慘然以素服侍之縱曰得禮不知可以安其親之心否也此良勝所謂未之能安者也是以昨者頓易衣帶果出臣下不謀而同則在廷議必有不能安者也主上亦有未能安者也人心之安天理之正也禮者天理之節文也則儀禮之疑者不於是取衷也哉所可惜者慶不成於禮忌不盡於情益有所未能安者也仰惟執事開誠心布公道集衆思廣忠益固論思之本懷也所斷度者不泥於常情審於誼所考據者不檢於故案求諸經所聽納者不限於名位折諸理堂堂天朝豪俊滿廷而謂無足與議者乎宋史載德明請糧羣議不決而王旦請具於京師令其自取遂使夷狄愧服謂朝廷有人今之議者朝廷一代典禮又不特請糧事也良勝往歲侍校文於南宫則同事也執案於銓曹又故吏也同而不果於自異故而何敢以自疏故不得已而有瀆啓也亦圖所以自盡其心也非敢必求其説之勝也謹啓題禮儀事賈詠照得嘉靖二年八月初十日恭遇萬壽聖節例該文武百官先期習儀至期各具朝服行慶賀禮案查正德十六年嘉靖元年俱值武宗皇帝服制未滿節該本部具題禮宜從簡百官各具錦繡衣服于奉天門行五拜三叩頭禮高皇后忌辰又該本部慮恐皇上初繼大統又值大喪若於是日行禮誠恐聖心未安故暫有先日行禮之議續該吏部署員外郎事主事夏良勝奏稱萬壽聖節遇高皇后忌辰先一日行禮是皇上誕膺叶祥為九廟之主為萬國之君終無當日行禮之慶則中外臣工何以盡水木本源之義而四方外國何以輸賔貢向慕之誠禮文有曰君子有終身之喪忌日之謂也忌日謂父母今凡忌皆不廢朝儀獨於衣帶不忍從吉則輕重亦可稱量近時覆議經筵事理月可三行者也尚不欲以忌廢之萬壽節嵗一舉耳而更欲簡廢當有以求其故矣且廟祭于隂特取諸幽之義欲俟喪服告終仍于本日夙興行慶禮于殿陛午後舉忌禮于宫中等因該本部覆題俟嘉靖二年六月禫祭之後恭遇萬壽聖節文武百官慶賀儀節悉用全禮等因隨奉欽依是欽此今照萬壽聖節在邇伏惟皇上自登大寶二年有竒二次聖節俱因喪制未行全禮兼以忌辰暫移先日臣等百官不勝瞻戀竊意我朝以聖節元旦冬至為三大慶禮俱上表賀元旦冬至各衙門止遣首領官類進至於聖節惟親王方鎮例不擅離其襲封衍聖分及南京各處都布按各差堂上官直𨽻府州衛所各差佐二官并朝鮮使臣俱於是日賫進比之元旦冬至尤為重大上有祝于君釐下有安于臣節大有通于天下逺有及于四夷悠久行于萬年而傳于萬世人臣事君之禮莫有大於此者也豈可屢嵗不行全禮而終身不於本日哉是日雖遇高皇后忌辰緣既不可以忌日廢經筵亦豈可以忌日廢聖節但云夙興行慶禮午後行忌禮似以卑先尊恐難舉行今凡遇郊社之祭及孟秋時享俱於本日未明之先行禮畢事乃出視朝若凖此故事本日夙興先於奉先殿行忌祭事畢出朝以受慶禮似亦相應及遇孝惠皇太后服制雖尚未滿緣奉有勑諭于宫中服齊衰期年則情可以禮制事可以義起而慶賀禮儀所當議行者也合無今次萬壽聖節文武百官於八月初七日初八日赴靈濟宫習儀初十日各具朝服慶賀悉用全禮惟復别有定奪伏乞聖裁等因題奉聖旨你部裡再議了來説欽此欽遵臣等仰惟皇上孝心純篤出於天性意以孝惠皇太后期喪未滿不忍盡從吉典故令再議臣等偹員禮官敢不仰體孝思從簡議擬合無先期暫免習儀至初十日夙興于奉先殿行忌祭禮後出朝受賀仍免雞唱山呼舞蹈等禮請皇上服黃袍御奉天殿錦衣衛設鹵簿駕如常儀鳴鐘鼓鳴鞭教坊司作樂文武百官具朝服先行四拜禮致詞又行四拜禮表文綵假暫免宣讀陳設送內府交收未敢擅便嘉靖二年七月十九日本部左侍郎賈闕等具題二十二日奉聖旨是石彪失儀彈文張寧臣惟見君而不知謹者斯為背禮知罪而不能懼者幾於怙強背理者敗常怙強者無忌有犯於此難逭於刑切照定逺伯石彪本以踈庸夙承敘蔭頃由微績超至大官德盛生成巳過草茒之分恩深豢養常懷犬馬之勞奈何無所用心遂至鮮克由禮邇因有疾皇上待極仁恩聽行調理視同休戚不責朝恭乃於天順二年七月初六日既病痊而入覲當加敬而不忘及禮畢於外朝合侍班於中禁豈期本官處身不檢致令幞頭墜地已無加敬之誠及禮畢不入內班又失常朝之禮御史紏劾而不在皇上寬宥而不知先雖過誤後實怙終臣等切聞古之人臣見君君適路寢然後敢退豈有上方視朝而敢背理自便者乎又聞諸候朝王或肉袒告罪豈有明知所犯而敢怙強自縱者乎即事原情法當無赦懲一戒百理難曲全伏望皇上以法斷恩以義制事將本官拿送法司明正其罪以昭國典緣係應議官員未敢擅便謹題請旨宗人府題名記孫清題名志不泯也史之義存焉夫事存於迹則沿革所由考道存於人則善惡所由考其不泯同也然世久制度或失其詳人逺傳播或非其實則題名記重有賴焉我太祖高皇帝建宗人府以主睦宗親族之事制以親王之長主領府事其次則宗人令左右宗正左右宗人階正一品以勳舊大臣佐之凡玉牒𣲖演支庶親踈立嫡請名章奏文移必關歷而後行焉故宗人府列府部諸司之首其載在祖訓及大明官制者甚詳洪武間沿革不可偹考永樂初太宗文皇帝建都北京宗人府為行在命駙馬都尉永春侯王寧署府事而宗人令宗人正宗人諸員皆洪熙宣德間皇親武定侯郭玹専署府事至正統三年始建府治於吏部之北在東公生門之南革去行在二字以駙馬都尉西寧侯宋瑛掌之自是遂為定制矣景泰天順中太保寧陽侯陳懋以皇親掌之成化改元駙馬都尉石璟掌之巳而勑遣璟奉祀孝陵乃以駙馬都尉周景掌之𢎞治乙卯景卒孝宗敬皇帝命駙馬都尉蔡鎮繼之鎮方正才敏諳習典章博達文雅推重公路􅊩事之餘留意規畫悉加釐正如知印貼書吏典厫經庫籍及印色紙劄皆請於朝創為之制府治堂階廊廡翼室以及臺阼行馬悉增修建置規摹煥然仍請給待漏寓直之置立公會之簿嚴文卷之籍省革吏員賄代之弊勒之於石永垂久逺嗚呼可謂審沿革之宜而善於守職矣且夫作者之善則統緒之因相要於無窮繼者之善則恢賁之功有光於既往公以二館之貴際寵擇之任旁稽逺紹無所承襲而事之建置多其創始此其謀猷宏逺垂法深長真可以貽百代之規豈不昭然偉異大過於人者哉題名之舉托之真珉而府治開建之始主領相承之任燦然備具考制度於沿革之原察善惡於勸懲之下豈獨有益於傳信之實而已乎然則題名之記不可以文字之常而槩論焉者也都尉公之為慮逺矣公字孟陽鳳陽定逺人别號東軒尚英宗睿皇帝第三女淳安大長公主讀書喜士為一時壽俊之美云署事請公姓名履歷詳書于左而虛其次孫清宗人府記題傳奉事倪嶽𢎞治八年七月二十日該司禮監太監鄧敏傳奉聖旨聖祖母聖慈仁壽太皇太后年高念叔崇王欲得一見便寫勑差官取來該衙門知道欽此欽遵外中外臣民伏聞詔旨皆有以知太皇太后慈愛之至情皇帝陛下順承之大孝雖大舜文王無以加矣但一時人心竊以朝廷舉事必須上揆天心下察人事務出萬全庶幾可動臣等節於𢎞治二等年月不等會同中軍都督府等衙門掌府事太傅兼太子太師英國公張懋等太子太保吏部尚書王恕等纍經會議崇王來朝揆之天時人事俱有未便緣由奏蒙聖恩俯垂俞允俱免王來然以今日論之事有未便者三焉又非前議之所及者蓋近來傳聞黃河泛漲水高於岸平日波流湍急舟行已難加以泛漲其為洶湧必異常時王欲來朝乃舟楫必經之地則夫震驚之患所不能無保護之責誰敢當之此其未便者一也兼聞河南彰德衛輝二府自春徂夏一雨不霑寸草不生赤地千里人民流動殆三之二其為艱窘不言可知王欲來朝乃車馬必經之地不獨供億之費無所仰給萬一盜賊乘時竊發則夫震驚之患所不能無保護之責誰敢當之此其未便者二也况二年之間三王之國近自京師之軍民逺而所過之郡縣百倍供需十分騷擾官無所措手民不能聊生言之可為寒心見者欲為流涕今若加以崇王來朝先聲所及人心驚疑送往迎來勞費增倍瘡殘之民何以當此此其未便者三也此皆切於今日之急務於理不可不豫為之慮者伏惟皇上欲以仰承聖祖母慈愛之情尤必先念祖宗社稷生靈之重委曲奏請暫免來朝此則天下之公義而非可以一時母子之常情論也且親王來朝固有舊制然自洪熙宣德年間已鮮舉行英廟復辟之初一詔襄王來朝固以篤親親之誼實以慰嫌疑之心由今而言巳非常例况今天下奏報災異驚駭見聞禍變之生誠未可測正宜上下交相修省用回天意親王與國同休尤當慎守封疆以固藩屏豈可輕動重貽憂慮伏惟皇上至孝通天誠敬篤至是以聖慈仁壽太皇太后享天下之養萬壽無極崇王親愛所託恩禮隆重亦無以加今果奉命來朝雖少遂一時欲見之心然欲别則難免眷戀不捨之情既去必倍增憂思不忘之念他日上厪聖慮所未敢言雖欲悔之殆無及矣所有崇王來朝事體重大關係非輕臣等茍有所見不敢緘默伏望皇上追寢成命請命太皇太后暫免來朝別遣親信內臣厚賫賞賚往視以慰其心庶於公義私恩可以兩盡臣等冒瀆天威不勝悚懼俟命之至未敢擅便謹題請旨𢎞治八年七月二十二日具題本日奉聖旨卿等説的是但朕承順聖祖母之意已有旨取王來了罷欽此後復奉旨免王來保全宗室疏馬文升臣切惟親莫親於宗室法莫嚴於祖訓宗室奉藩循禮恪遵祖訓者朝廷親親之恩為益篤縱欲敗度有違祖訓者朝廷黜罰之典所必加昔周成王克啇之後以其弟管叔蔡叔監殷後二叔挾殷之武庚以叛流言以傾王室故周公奉命東征誅管叔而囚蔡叔孔子恕之鄭莊公弟叔假因母寵愛莊公不早防間封之於京縱彼所為候其惡深舉兵伐之如克常人春秋譏之一則事干宗社而示天討之公一則不預防間而虧親親之義或恕或譏此天下至公之法而萬世之不可易者也洪惟我太祖高皇帝天生聖武袪除前元奄有中夏掃一時之陋俗回百代之醇風功德之盛逺符堯舜有非後世之所能及故本枝繁衍亦非前代之所能比封建諸王藩屏王室藩王之子封為郡王郡王長子襲封郡王諸子俱為鎮國將軍以漸而降世為奉國中尉藩王府內設承奉正副各一員典寶典膳典服各所正副各一員內使六名各門正副各一員內使司樂二名司弓矢二名外官設長史司左右長史二員典簿一員其餘審理典膳奉祠典寶紀善良醫典儀各有正副官二員伴讀四員教授一員內外各設官以理一國之政彼時俱遴選才識老成之人以充其任而輔導之方甚嚴王若有過先責輔導官員所以各王讀書樂善保守其國而稱賢王者甚多縱欲敗度又被黜罰者間有自正統年間至今除秦晉蜀襄淮德吉徽崇等府并新封興岐等府內官不缺外其餘王府內官有缺不行具奏有一府止有丞奉一員者甚至全缺不補者宫門傳事多係女人其他郡王府亦無補者往來傳事俱係外人凡百出入尤無禁治雖有藩王其郡王并將軍有係尊屬或族屬頗踈者雖知所為非禮不敢戒諭輔導官員不敢諫正其鎮巡三司官懼其揑奏欺侮離間動輒差官勘問亦不敢具奏所以肆其所為有潛畜異謀而蒸淫不道者有強擡軍民子女而打死人命者有骨肉相殘而致成仇敵者有密取外人之子為嗣者有呼喚樂妓入府姦用者甚至宫閫不肅致生外議者其他將軍有潛入樂院宿娼者或與市人飲酒賭博者以致衣食不足欠負於人鞍馬全無徒走於市雖有祿米難供其浪費矣及至事發差官行勘事多不虛因違祖訓事干宗社有不終其天年者有幽之高墻者有削去爵秩者有革去祿米者况醜惡之事傳之中外聞之天下又恐史册書之貽譏後世誠有玷於朝廷若使原設輔導外官內官各得其人早為諫正藩府親王肯為戒諭鎮巡等官預為具奏豈有前項之事哉與其懲治於已敗而示黜罰之典莫若保全於未然以全親親之仁如蒙乞勑各藩王除本府內官不缺不必具奏其餘缺少內官內使者明白具奏缺內官若干員內使若干名仍乞勑司禮監於相應內官內使擇其老成讀書者具奏照缺給賜前去以後有缺具奏除補互相維持府事其合用衣服飲食等項本府照例關給使之得所不許凌辱陷害其郡王府每府給賜內使二名専管宫闈事務及關防門禁其長史紀善伴讀教授乞勑吏部今後有缺務要訪察國子監并在外有學行儒官除授若藩王所為未善長史等官從容諫正如其不聽再三匡諫事情重者如再不聽密切具奏其郡王所為不合禮度者教授藩王密切戒勉如再不聽藩王具奏情輕者降勑切責若事干宫闈重者差內官皇親前去體勘至日密切處置不宜露泄於外若係外事仍差內官并法司官前去勘問藩王有過専罪輔導官員郡王有過専罪內使教授如此防間自無過舉其藩王府輔導官員亦要日逐請王於書堂內講讀經史王子王孫亦要講讀習禮若各府將軍有前項所為者各府郡王自行禁治若藩王郡王府互相容隱不行禁治許鎮巡等官將所為不法之事會本著實具奏上請區處其藩王府選用妾媵務要具奏奉有明文定其名數不許於本府軍校之家選用不許過數亦不許強買民間子女郡王將軍使女俱照會官奏唯事例名數若擅自買用女子及名數過多或令外人入府者許鎮巡官恭奏長史教授降調逺方任用若樂工縱容女子擅入郡王府及容留各府將軍在家潛行及軍民旗校人等敢有與將軍賭博誆哄及擅入王府教誘為非者事發邉逺充軍邑長依律問罪革去管事保全宗室莫過於此臣叨任大臣每見宗室所為不善事露容之則違祖訓所以不能保全者多臣切憫之故敢冒昧上言伏望聖明留意𢎞治九年四月初六日具題奉欽依是該衙門知道欽此王府喪禮議彭韶一伏見祖宗以來凡親王郡王薨逝聞喪祥禫等祭各遣使臣一員致祭於國所以篤親親之恩禮之大本也然其時藩國數少行之為宜今宗枝蕃衍吉凶事殷而使臣絡繹於道似當變通合無今後藩國若有喪禮除親王依舊外其郡王初喪遣使臣致祭一次其他祭乞遣本處官行禮則親親之恩亦不失矣前件各王府郡王薨逝聞喪至禫除祭祀俱例該差行人賫奉祭文前去致祭今奏前因照得近年以來各王府遣祭官員委的絡繹於道往來不絶人夫勞擾合無今後遇有郡王喪禮除聞喪七日百日下葬照舊遣官一員致祭其餘周年二周年并除服祭祀就遣本處布政司官行禮庶不煩擾一伏見祖宗以來凡王國母妃之喪俱遣內臣一員致祭於宫所以嚴內外之辨亦禮之大本也然其時藩國既少內臣又未出鎮方隅宜自中遣今宗婦衆多各布政司各有太監等官鎮守而又勞內臣跋涉似當稍更合無今後藩國若有內喪除無鎮守官去處依舊外若有鎮守官乞差本官行禮致祭則內外之體亦不失矣前件親王郡王妃病故俱例該遣內臣一員前去致祭今奏前因除藩國內喪無鎮守官處依舊遣內官致祭其言有鎮守官之處就遣內官行禮一節未敢擅便定奪一近年奉到事例凡塋葬夫婦同穴故王國遇造墳塋不分夫婦先後一體兼造甚便於事但初造之時工費浩大或兆位未安所以遣官監修選擇蓋得恤典之大本也及後開壙之際事成位定全不費力而猶具數差遣徒見煩擾合無今後有開壙葬者乞免差官只令本處上司官提調及隂陽學擇日不妨恤典前件奏要今後開壙免差官員巳行工部再行具奏外所據選擇隂陽內除親王并妃照舊差遣外郡王以下合就於本處隂陽學選取諳曉地理隂陽人差用一工部力字六百三十號勘合前事屯田清吏司奉本部連送該本司案呈準禮部祠祭清吏司手本奉本部送禮科抄出四川按察司按察使彭韶奏一本內開近奉到事例凡塋葬夫婦同穴故王國遇造墳塋不分夫婦先後一體兼造甚便於事但初造之時工費浩大或兆位未安所以遣官監修選擇蓋得恤典之大本也及後開壙之際事成位定全不費力而猶具數差遣徒見煩擾合無今後有開壙葬者乞免差官只令本處上司官提調及隂陽學擇日實與恤典不妨等因具本該通政司官於奉天門奏奉聖旨該部知道欽此欽遵抄出到部送司連送手本到部送司查得天順二年三月內該禮部議葬之説原無定例但夫婦同穴於禮為宜近來文武之家例該諭葬諭祭者或泥於隂陽風水往往各擇地假另造墳塋重起享堂不惟勞民傷財抑且有乖禮度合無今後文武大臣官為造墳者若夫故在前則并造其妻之壙妻故在前則并造其夫之壙繼室則附葬其旁夫婦先後亡故止與其造墳塋一所同一享堂不許另造庶使民得省費而事不失宜等因題奉英宗皇帝聖旨是合葬本古禮今後為親王以下造墳一體遵行欽此欽遵巳經通行遵依凡遇親王以下薨逝及文武大臣病故不拘夫婦先後俱各差官并造其墳甚為簡省便益其後開壙合葬往往又行乞恩差官似為重復煩擾未便今該前因案呈到部恭照按察使彭韶所言要將今後凡有該造墳塋享堂巳經差官一併成就完偹及後開壙之際止令本處上司提調不必重復差官一節所言誠為有理合無準其所奏今後凡親王以下薨逝及文武大臣病故曾蒙恩典差官造有墳塋享堂者除親王并妃開壙照舊差官外其郡王以下不拘夫婦薨逝在前巳經造有墳壙在後故者止令本處上司查照先行事例量偹工料開壙合葬袝葬該用明旌照例成造責付原差來人員順賫前去應用其文武大臣不拘夫婦亡故在後就令本家開壙徑自合葬俱不必差官重復擾民如是則禮有定而事不煩矣緣係陳言事件及奉欽依該部知道事理未敢擅便具題成化十三年九月二十二日本部尚書王復等於奉天門奏奉聖旨是欽此題處置地方事項忠欽差總督軍務都察院右副都御史項忠題內一件遷郡王以省轉運切惟陜西乃關中重地屯駐軍馬比之别處數常加倍本處額徴稅糧馬草子粒有限供給不前每年户部送江南諸處折糧銀十萬兩河南送大布十萬匹前來輳用僅勾支持未見充足一遇邉方有警奏開鹽糧等項緩不及事未免動勞軍民見丁儧運糧草父去子來車摧牛斃苦不可言臣等會勘得平涼韓府及寧夏慶府二處郡王極臨邉境宗支繁盛儀賔數多因城池窄狹府地無處可容不免終要分析見今嵗用祿米該五萬二千六百餘石又有護衛儀衛司羣牧所長史司等衙門旗校人等俸糧不在此數二府轉輸腹裡糧儲因是路逺每一石約有二三倍之費人民實難供給查得往年該陜西巡撫官建言要將各郡王府照依山西晉王代王二府郡王事例那移腹裡地方該禮部奏候豐年另行議奏定奪緣陜西人民邉運困苦已極如使早量遷移人民歲免萬石轉運則受惠多矣若待豐年議奏定奪公文轉展事終難成如蒙乞勑禮部奏行各府長史司各教授啓王自陳該部仍擇腹裡迤南見有府地及水次便益易於供給去處奏請遷移就祿益厚親親且將存省陜西稅糧以供邉儲以固邦本計其遷國之費不及一年之供實為便益等因具題欽奉聖旨該部計議停當來説欽此欽遵又該總兵官都督同知劉玉亦奏前因通抄到部查得通該襄陵王奏稱平涼城池窄狹土地所出有限要遷江西湖廣地方居住本部議得各處人民貧困遷王府係是重事不無勞擾軍民候豐稔之時定奪天順八年五月二十一日本部覆奏奉聖旨是欽此欽遵已行該府知會去後復該襄陵王奏稱子孫數多平涼城池窄小不通舟楫民間轉運艱辛要乞遷移江西建昌府居住以省民力本部議照彼處寇賊生發人心驚惶饋運糧草艱難難以準理成化二年十一月十一日覆奏奉聖旨是欽此欽遵又行知會外續該襄陵王又奏稱平涼城池窄小軍民繁衆糧草不敷要將本府遷移江西地方居住成化三年五月十二日本部覆奏奉聖旨分封巳定不必遷移寫書與王知道欽此欽遵外查得先該欽差巡撫陜西右副都御史陳題為寬省民力事要將陜西秦肅韓慶四府遷移湖廣江西地方居住本部為照河南地方王府數多湖廣荆襄盜賊生發江西地方連年荒旱人民困苦况遷移王府係是重事不無勞擾軍民合候豐年之時另行議奏定奪成化四年三月十四日本部覆奏奉聖旨是欽此欽遵外續真寧王又奏寧夏居住基地窄狹要照山西代府郡王遷移事例將本府郡王遷入鳯陽府城居往本部為照陜西地方即今賊寇生發征勦未寧候地方寧息年時豐稔另行具奏又經類行該府去後今右副都御史項忠總兵官都督同知劉玉又奏稱平涼韓府及寧夏慶府二處郡王那移腹裡迤南及水次易於供給去處存省陜西稅糧以供邉儲一節係干遷移王府係是重事即今陜西用兵之後人民困苦難以一槩聽令各王具奏遷徙合無將原奏襄陵真寧二郡量為那移稍舒轉運之勞查得江西湖廣河南山東等處各有王府宗支分封日繁勢不可容及查得廣東韶州府天順年間造有樂平王府第一所見在緣逺在嶺南賊寇時發非所宜居看得陜西腹裡鳳翔府舊有鄭王所居之地後遷入懷慶舊府尚存與平涼韓府相近襄陵王徙居為便慶陽府與寧夏慶府真寧王徙居為便合無著工部行移陜西鎮守總兵巡撫巡按及都布按三司等官公同相度地勢相宜待秋成之後人民梢蘇將原在鳳翔府空間府第量為修理慶陽府城內取勘空間公廨相應處所量為改造候修理完偹另行具奏定奪緣係會議遷移王府事理未敢擅便具題奉聖旨是欽此諫寧府用琉璃瓦疏林俊臣日者寧殿下纍乞琉璃瓦重荷聖諭於引錢內支二萬兩給換者臣有以仰窺陛下聖仁廣大惇敘九族盛心而寧王據禮守經不為無見然觀鎮巡議奏欲俟年豐定奪是巽言不當與也工部覆奏謂規制雖相應事體實可止又恐重纍地方作例各府是正言不當與也逮寧王又奏工部又執奏是申言決不當與也陛下先可部議是明示不當與也後從其半是婉示不欲與也士夫及耆壯公論謂寧府多此一舉是中外人心皆謂不當與也寧王讀書明禮聰察識事斷不為此以損賢名偶未之思耳夫事有可為有不可為有可巳有不可已江西公私匱竭人民滋困盜賊未息此何時也意者引錢無預於民不知存積僅二萬七千餘兩益府宫殿蟻蠧益殿下見移東寢萬分驚虞責將誰任修蓋之費約三萬餘兩此不可巳者也淮府造墳順昌王崇安王鎮國將軍起第已支五千三百餘兩後來未計此不可已者也所存儒學文廟傾頺問其故謂科例嚴所司顧忌不修以致此此不可已者也各處預偹倉榖數少問其故謂罰贖解部所司計無自出此不可巳者也官軍俸糧通融節縮嵗支尚少四萬四千餘石此不可巳者也臣嘗見楚府殿燬久未蓋荆府多敝漏淮府同一江西頺垣朽柱東拄西撑飄瓦斷椽脫落大半居然廢址在民庶尚不堪惟寧府完美堅緻金碧燦煌夫於義不可已有可為割財內帑為之未過也有可已無可為又何必為此等事哉古者采椽不斫茒茨不剪土階贊堯卑宫贊禹儒服紀河間樂善紀東平湘州之約儉鎮西之輕財聖帝明王所以揚盛休垂後美者端亦在是寧府移封之初親至親也已不用琉璃再造之會國至富也又不用琉璃豈亦慕采椽茅茨之盛崇古獨質示朴以垂憲如此哉今歷百年傳數世一旦無故而遽改之孝子順孫所以順祖考者義不當是夫前之失後人尚諱之前之善後人忍改之耶改則盡沒之矣沒之非孝子沒之非順孫謂賢王忍為之耶臣所謂偶未之思者也况性習難靜易動難儉易奢操之猶懼或放縱之何往不流賢王春秋方盛德業方始求之身心自有専務而規規循常文具之間以毁前人法則臣未知其可臣數侍賢王言論多師法古人又誤被禮愛獨至臣深感切若無右於賢王罪死罪死臣往年疏府第之制以不用琉璃美寧先王義不當以用琉璃諛今王且小人先合後忤君子和而不同臣欲愛德市義完賢名不欲貢諛順旨虧至孝孟軻曰齊人莫如我敬王臣拘儒不識通變但知報王道當如此竭忠盡愚事陛下道當如此寧王靜思幡悟必有創於臣言者伏望聖明篤懿親斷大義垂善處使賢王德如純璧名若完甌毋涉吳王几杖之賜叔假京鄙之求正大明白恩不掩義為世世頌美幸甚臣無任隕越俟罪之至緣係酌大義以全賢孝事理謹題請旨題定禮儀以一典章事毛澄臣切照皇明祖訓所載出使官便服行禮及洪武十八年定出使官員一體隨班禮儀其嵗月不無後先則遵守必須歸一但總兵撫按等官俱係欽差人員緣未開載是否出使名目內職出使官員亦無明開是何職銜其到王府應否便服或隨班行禮一者委難適從况事干祖訓舊制非臣等所敢輕議合無本部會官參酌禮制由聖斷使可遵守正德十三年四月初九日本部尚書毛澄等具題本月十八日奉聖旨是還會議了來説欽此欽遵抄出到部臣等會同吏部等衙門少保兼太子太保尚書等官陸議得洪武十八年所定慶賀王到國及正旦冬至王壽日等禮除王府官屬至今遵奉如儀其在外衛府等衙門摘撥佐二官隨班行禮一節查於洪武十九年該禮部欽奉太祖高皇帝聖旨今後親王所在去處凡遇正旦冬至千秋節日只許本國在城軍民官員慶賀在外府州縣衛所及守邉衙門不必慶賀欽此欽遵其出使官隨班行禮亦係洪武十八年所定自洪武末年祖訓頒行以來凡遇王國慶賀出使官俱便服行四拜禮前項隨班禮儀久巳停罷且會典之作一遵孝宗皇帝勑旨以本朝官職制度為綱事物名數儀文等級為目凡有籍册可據者先後具載其因革損益間與今行不同者亦存其舊所以王國禮儀雖洪武十八年所定或與祖訓不同俱載會典再議得大明律一出使不復命條下開有凡奉制勑出使不復命及不繳納聖旨符驗等語見今各處總兵巡撫巡按等官正是奉有制勑聖旨符驗人員其與持節制使賫詔行人及凡京官領勑在外公幹者均為出使况祖訓亦開有朝臣奉使至王府雖三公大將軍亦必四拜等語但撫按等官多係節年添設故皇朝禮制諸書於出使官職銜有所未載今寧王具奏要得集議明白行禮歸一臣等欽奉勑旨會議如前合無今後王國禮儀一遵祖訓為當其總兵撫按等官俱照出使官員便服行四拜禮但事關禮儀重典未敢擅便伏乞聖裁候命下之日通行各王府各該衙門永為遵守正德十三年五月十二日本部等衙門尚書等官毛澄等具題二十八日奉聖旨是這禮儀既會明白總兵撫按等官都著遵照祖訓并纍朝相承事例行禮還寫書與王知道欽此奏為陳愚悃以隆聖治事汪鋐近該豐林王台瀚具奏前事奉聖旨禮部會議了來説欽此欽遵隨該禮部尚書李時等會同臣等多官議得豐林王所奏四條一崇輔導以逺宗室之患一興學校以勵宗室之賢一均人役以息宗室之姦此三條者揆諸事理均為可行惟定子女以杜宗室之詐一條內開伏見近日禮部題準事例凡諸宗室各照爵位以定妾媵之數造名於册如有違例增添恭究革祿此乃因地方有限宗室無窮欲其不致冒濫之弊也然宗室之中其弊難究雖有已定之數不敢多加至於以無名李氏所生報作有名張氏所出姦詐不一真偽難詳况又府第深邃內外限隔孰得辨之縱有相訐到官其中賄賂苟免有之寃屈被誣有之雖終日查考未必一一盡其情狀案牘文移紛擾不巳不惟有誤政事抑且未省一絲之費設若不作計較而生齒日繁用度越廣終非長便豈可拘常制臣之拙論以為不必較其妾媵有無止定其子女多少伏望皇上篤念親親乞勑該部會議將親王除長子為嗣限以五子俱照舊受封若五子之外其餘多生子者止給冠帶榮身並無爵祿令其自行營業或商或農所行從便郡王以三子為例將軍以下各隨差等庶幾國用少省詐冒自息宗室亦得安寧方為永逺之計也等因所言雖極有理但於祖訓有礙難擅定擬請乞聖裁臣竊惟天下之法行之既久自不能無弊因其弊而少變焉非變其法也救其弊也救其弊正所以守其法也洪惟我太祖高皇帝立封藩之法著一定之制凡所以篤恩義正倫理嚴禮度別嫌明微無所不至奈何宗室日繁人心日懈習尚日移於是祖訓有不能一一遵守者矣夫祖訓之所定人事之常也以一人而生數十子則天下古今之所無人事之變也近來定妾媵之例雖行然如豐林王所論則詐冒者之背違祖訓亦已極矣今限其生子之數是制之使不得復為詐冒禮度以嚴倫理以正實所以遵祖訓也何為不可乎臣聞各處郡王祿米有纍月不得關者有經年不得關者將軍而下有二三年不得關者蓋賦稅之入有限祿米之供無窮其勢自不得不然耳臣又聞陜西一省嵗增祿米二萬石然則十年當增二十萬石百年當增二百萬石夫陜西之賦嵗不過三百萬石而祿米之增若此此豐林王所請臣愚以為的然當行而不可易設或不然則生子之冒濫既不能革常祿之缺乏又不能供恩薄而義疏其為患殆有不可言者伏望皇上斷然行之而不疑就於其中更從寬厚如親王限以五子則增二子為七子之限郡王限以三子則增二子為五子之限將軍增一子為三子之限中尉增一子為二子之限多餘之數雖無爵祿仍各月給食米二石女名封其一不及其二如此則親親之恩救弊之義並行而不悖矣天下幸甚萬世幸甚臣不勝懇切願望之至為此具本親齎具奏聞伏候勑旨奉聖旨這所奏禮部一併議停當來説條陳事宜以重修省疏照得先該本部題稱災異修省通行九卿衙門六科十三道各條列時政得失以聞等因節奉聖旨依擬務要思訪的實不許挾持泛引假公報私欽此欽遵臣等愚不省其於治體所在無足周知况政務之大者陛下方以次裁斷於上而諸司臣僚方以次敷於下臣等未敢他有論列謹將本部合行事宜逐一議擬凡九事伏望聖明採擇可否乞賜施行其於罅隙或亦小有補塞緣係修省陳言事理未敢擅便開坐謹題請旨計開一議請封查得見行事例凡宗室將軍中尉一應子女俱候十五嵗選婚其有年嵗不同或庶出生母入府來歷不明通行駁勘所據前例遵行巳久但近來各府長史司多有不遵法守任意遷延或有使用不敷營求未及則子女年嵗過例方與類請乞恩其奏內來文又多年月不同母氏錯誤至於應婚夫人姓氏或本到無結或結至無本互根背馳延緩以至查駁之間動經年嵗遂使聖明渥澤鬱而不流宗室至親怨曠失所感傷和氣關係匪輕合候命下行令各王府長史司啓王今後將軍中尉子女凡年嵗巳及即與具奏請婚若奏內來文或年嵗少差母氏未的本部一靣駁行查勘一靣聽令選擇應婚子女一併開具奏報若過期不行奏請夫人奏結不齊候至三月以上者俱聽本部查考得出將該府長史等官究問則法令嚴明文移簡便而婚配亦不失時矣一禁姦弊訪得各王府差來內使儀賔官校人等俱是積年光棍熟知誆騙關節一蒙王府差遣乞恩等項即便設計誆受金帛數多任意花銷使用或又收買土産往來買賣填實表文箱扛分外需索人夫接運以至纍損驛傳及至到京先投積年窩户窺探進止然後報名朝見或又私自潛住京師動經年月往往用計營求打點各王府不知本部凡遇合行事理自有公道一應公務自有事例期限非吏書人等所能預力合候命下移咨都察院行各處撫按衙門轉行各王府長史司啓王知會今後但遇有公事奏理不得聽信差來人役多費金帛指稱來京使用打點亦不許本役私帶銀兩貨物其批文務要定限月日逺近銷繳到京之日徑報入會同館安歇事完即回但有潛住日久并在京各色人役容令安歇通同作弊者許厰衛緝事衙門及五城兵馬司訪拿俱各指實參送法司問以誆騙打點相應罪名仍行都察院出榜禁約則形迹無疑而弊源可息矣一便關領照得各王府將軍以下應得冠服等件巳該本部議處題準嘉靖六年正月以後授封者行令各該布政司給錢造辦外嘉靖五年十二月以前授封未曾關給者其器物非一監局所造關領非一時可齊是以各府差人往返勞費日甚差來人役守候日久有將關領出金銀綵縀等項恣意花費無從查考遂使朝廷有成造之費而該府無受惠之實相應議處合候命下本部將見在各王府差來人役責限回還仍行各該布政司轉行長史司教授啓王知會逐一備查自嘉靖五年以前授封該府將軍中尉夫人等及郡縣鄉君儀賔一應宗室除已關領外其餘未領并先年遺下寄關物件逐一開具名位應得冠服等項件數造册印鈐限嘉靖十二年春季類奏之時賫送赴部赴內府盡數查會明白陸續造完待本年各府册封之日將前項物件領出給與副使順帶該府其不係册封府分應該關領者責令該府所差聖節冬至慶賀人員順賫前去該府俱各逐一交割仍令各該長史教授啓王將收過錢糧給散過名位造册奏繳以憑查考節年工部行造物件係是內府各監局造辦本部無憑查催仍乞勑各監局查照該部原行一一造辦給領如有延緩一體查出恭究則各府無守候之難而恩惠實沾矣一杜請乞照得王府孝行等事舊例止應請勑奬勵𢎞治十八年十二月內該魯府奉鎮國將軍陽銖陽孝行可嘉欲自備工料各建坊門乞賜坊名荷特恩賜允自此始開旌孝之端而親郡王將軍妃與夫人遂往往援引前例請乞不已切惟朝廷於庶民之家凡有節孝等行賜之旌表所以表其宅里以致特異於齊民之意至於天下王府則皆朱垣戟户有不俟於旌表而後異者况朝廷降勑奬勵蓋以親親之懿特形天語之褒非宗室孰克當此故纍朝以來宗室善行止是寫勑奬勵不立坊牌所以崇重宗室辨别貴賤立法最有意義且天潢之裔孰非懿德若使有所表異分别既殊則淑慝互形亦非敦睦大同之道也况今宗藩日衍樂善無窮若不斷之於今切恐將來無有紀極合無通行議處除巳往外今後各王府如有節孝等事及卓異行迹親郡王或撫按官查奏前事本部俱照舊例請勑奬勵仍通行天下王府今後不許奏請建立坊牌則體統正而風教同矣一定條例查得𢎞治十三年三月初二日前多官奉詔會議定王府條例十七條及本部節年題準事例不一俱遵行已久但見行條例載在刑書節年條例藏於案牘雖經屢次申明不過就事論事以故各宗枝不能周知事例惟務營求本部事例日煩難於檢閲殊為未便合候命下容臣等將王府見行條例及節年題準事例編成書帙請下廷臣集議如或可行具奏刋刻成書本部遵照施行仍乞遍賜各王府宗室使皆便於誦閲有所遵守其本部别項條例可行事件亦容臣等逐一抄謄編纂一體刋刻遵奉則朝廷貞明之法恪慎不移有司畫一之規奉行惟謹法守易循而姦弊不作矣一議王諡臣等看得各王府親郡王薨故必有諡號以表其行舊制俱於乞恩祭葬之時即賜以諡𢎞治年間唐玉奏準凡親王薨逝行巡撫巡按分巡等官郡王病故行本府親王及承奉長史等官各核勘善惡事迹至日度其賢否方賜以諡至今通行遵守但各王乞恩祭葬到部方與行文各該衙門核勘事迹回報至日題請諡號填寫銘旌前去始得安葬且如四川蜀府廣西靖江王府俱路途窵逺文移往返動經逾年差去掌行喪禮禮儀行人在彼守候葬畢方得回還以致往往乞恩寬限且有司供應之繁本差耽延之久未免耗費財力多生嗟怨矧各王府親郡王棺木暴露動經歲年亦足以上干和氣深為不便合無今後但遇各王府親郡王薨故本府一靣行移各該衙門核勘平生行實不必候本部行文徑自具結呈部以憑題請庶宗室體魄早獲安妥而事體簡便久逺可行矣一懷逺人照得我朝輿圖一統四方咸賔厚往薄來各有定制頃自正德年間以來貪官猾胥緣此為市所收假匹布絹稀鬆紕薄不堪服用逺人往往投遞畨文鳴號不平輒稱先朝賞賜甚厚今日賞賜太薄雖節經本部題請行移工部并該監局衙門查處去後但所賞者仍舊不堪無以厭服人心尊重國體所係甚大合無勑令工部再照前勑申明轉行各該織造地方巡按衙門應解假匹時節行委的當官員看驗務要經緯堅緻堪以進用者方許起解若各處解到者仍復稀鬆紕薄即行退回經該官匠定行提問收納之際經該衙門不許勒掯常例貽害小民凡遇各使到館奉旨給賞關領該監毋得推調淹滯以致逺人久住致生怨嗟務使厚賞速歸庶足以感興四方向服之情而悖戾之心消矣一處貢馬照得天下各王府凡遇聖旦冬至元旦并謝恩慶賀例該有馬進貢本部先準御馬監奏為進貢馬匹不堪廄牧預畫以省虛費國計事奉欽依務要到部辨看毛齒堪中方行送監驗收巳經遵行三四年矣但各王府享上之誠雖同而逺近貧富不一加以差來人役多係積年或領價到京旋買或領馬中途變易事完回府又稱雜費若干百計侵尅間有不堪驗退者未免行移責備該府是利歸姦人罪坐宗親甚非事體合無行移各王府長史司啓王知會今後應進貢馬匹須用印烙鈐記仍將毛色齒嵗尺寸備造清册一本長史司印封送部以憑比對看驗即與轉送該監收受毋得留難勒掯十分求全以拂朝廷親親之情如或馬匹毛齒恭差與原造清册不同即是差來人員作弊定行究治如此庶國體全而宗藩仰德矣一蘇民困切見全陜纍嵗災傷加以師旅民不聊生而嵗𣲖牲口之數必有所不能辦者查得光祿寺遞年節省所剩銀兩積貯頗多合無將陜西兵荒地方嘉靖十二年分牲口暫行蠲免一二年就將前項餘銀補用則上既不缺該寺備物之用下亦可少寬一方民力矣嘉靖十一年九月二十二日題二十四日奉聖旨覽奏具見卿等忠誠體國謀慮周悉都依擬行欽此定親王繼封併行查勘疏該榮澤王表檈奏稱晉王知煬薨逝無嗣該取切近宗枝倫序相應之人承繼承奉等官不由奏請輒將新化瑞和王長子新腆擅換府內欲承王嗣况瑞和王所生尚有次子新墧當襲晉王之爵以繼晉王之嗣及晉王繼妃王氏奏稱夫王薨逝絶嗣乞要將瑞和王知㸅妾尚氏庶生長子新腆襲封晉王爵位及據長史司申稱榮澤王教授申奉本王欲要將親枝郡王暫理府事各一節為照親王無嗣俱以倫序應及之人襲封王爵係是定制查得唐成王薨逝無嗣其弟文城恭靖王彌鉗生五子以長子文城王宇溫襲封唐王次子宇潛等俱封鎮國將軍不得襲封王爵瀋恭王嫡長孫胤榿病故絶嗣以恭王長弟次枝靈川榮懿王銓鉌所生嫡長孫恭裕王勛潪所生長子靈川王胤移承繼瀋王其弟胤榳今封鎮國將軍不得襲封王爵蓋纍朝舊例凡親王絶嗣例得繼封若郡王入繼親王封爵其本枝郡王不得復請繼封其次子亦止封鎮國將軍蓋重繼統不言繼嗣也故國朝以來並無舍長立次之例及查得晉靖王所生六子嫡第一子表榮今傳知煬薨絶其嫡第二子表槏生新化王知㸅巳故庶生二子新腆新墧其長子新腆倫序相因及查得新腆見年一十七嵗近該晉王知煬類奏請封為新化王本部巳經行準宗人府查報去後未經題請今該晉王薨故例該新腆襲封合無先將新腆以新化王長子請勑一道令其主喪管理晉王府事待服滿之日本部另行奏請遣官册封為晉王庶於倫緒相應典制盡合再照榮澤王表檈先稱新腆等年幼欲以郡王管理府事及又推保新墧前來是欲以新腆仍襲封新化王爵以新墧襲繼晉王封爵實與朝廷典禮不合查無以郡王次子繼封事例難以準從但查得本部收貯該府造報玉牒册內開稱新化瑞和王知㸅𢎞治十年五月二十八日母妃蘇氏嫡生及查妾媵册內開稱瑞和王位下妾尚氏先於𢎞治十五年二月十七日娶到太原府陽曲縣民人尚賢長女入府正德十三年正月十一日庶生第一子請名新腆今據册開新化瑞和王所娶新腆母尚氏入府年月扣算彼時知櫛年方六嵗不應便立妾媵事屬未明相應查勘及榮澤王又稱晉府承奉等官不由奏請輒將新腆擅換府內以承王嗣若果是實則專擅之罪法亦難容合候命下通行巡撫按官查勘務見新腆生母尚氏入府來歷的係何年月日見今年嵗若干其奏報册籍有無差誤逐一開具明白取具該府宗室人等結狀回報前來以憑本部覆請定奪施行其該府內外輔導長史等官如有擅權縱肆擾亂生事者一併恭奏仍行長史司及輔導內外等官欽遵明命暫聽長子新腆約束但新腆父知㸅娶妾尚氏年月未經勘明伏請聖裁惟復别有定奪嘉靖十二年二月十九日題二十二日奉聖旨新腆暫著管府事尚氏還著撫按官查他入府年月明白來説其餘依擬欽此稽古典以備採酌事嚴嵩臣看得尚書黃綰所奏要將安南黎氏受封始末等項查録前去以偹應用一節臣等謹欽遵考得安南古稱交趾秦并天下於此置象郡在漢為九真日南象三郡五代時為劉隱所并至宋初始封為郡王然猶授中國官爵勳階未以國稱其後封南平王奏章文移猶稱安南道宋孝宗時始封以王稱國不復為中國郡縣其先李氏傳八世至于陳氏太祖高皇帝登極陳日煃者首先效順遣翰林院學士張以寧等往封為安南國王未至日煃卒其姪日熞請封遣吏部主事唐仁封日熞為安南國王其後日熞為叔明所殺叔明為陳煒所殺陳煒為陳煓所殺俱責以大義置之不討永樂元年安南國權理國事胡奆遣使奉表及方物賀即位稱為陳氏之甥為衆所推權理國事及請封爵成祖文皇帝遣使廉察續遣郎中夏止善齎詔往封奆為安南國王後以矯詐往征之既而簡定陳季擴陳日皓相繼為孽叛服不常洪熙元年交趾海濵頭目黎利作亂宣德三年利為皓上表乞立為陳氏後差侍郎羅肅往封皓為安南國王未至黎篡其位尋因雷震焚利居室因表謝利自立為王及翻閲本部案卷所存者正統年間該安南國黎濬奏稱係國王黎麟嫡長有父黎麟病薨本部覆奏將黎濬襲封為安南國王至天順四年間安南國黎琮謀死國王黎濬朦朧請封國人不服被黎麟嫡次子黎灝謀於國人繼攝國事黎琮自縊身死隨該黎灝具奏求討又該本部奏準差官賫文會廣西三司御史等官體訪是實天順八年將黎灝襲封為安南國王又查得𢎞治十一年閠十一月該安南故國王黎灝世子黎睴奏臣父國王黎灝𢎞治十年二月初三日病薨遺囑頭目黎永等以臣管攝國事謹差部臣潘綜等賫國人求討表文并上進方物赴京陳奏該本部覆題照例將黎睴襲封為安南國王請節及請詔差正使侍講梁儲副使給事中王縝賫捧前去行禮又查得𢎞治十八年十二月內該安南故國王黎睴第二子黎誼奏𢎞治十七年五月二十六日父國王黎睴病薨遺囑世子黎敬暫管國事本年十二月初八日世子黎敬病薨時亟囑頭目黎廣度等以臣誼繼管國事謹差陪臣阮寶圭賫國人求討表并上進方物赴京陳奏該本部覆題準照例將黎誼襲封為安南王請節及請詔書差編修沈燾給事中許天錫賫捧前去行禮又查得正德六年八月內該安南故國王黎灝孫黎晭奏臣本國王黎誼寵任母黨阮种阮伯勝等恣行凶暴拂亂綱常以致阮种等權傾內外惡黨日恣圖竊國柄正德四年十一月二十六日阮种等脅遷黎誼于舊宅逼令自盡欲立阮种親弟阮伯勝本國頭目黎廣度等同國人聲説阮种阮伯勝等之罪惡阮伏厥誅本年十二月初二日黎廣度等請臣權管國事謹守欽賜印信請命於臣謹差陪臣阮綱等賫國人求討表文并上進方物赴京陳奏本部看得該國進到表文內稱晭係黎灝第五子黎玿之弟中間恐有違礙取具該管通事范榮執稱録據本國陪臣阮綱等各執稱本國國王並無嫡庶子孫止有黎灝孫黎晭相應承襲準封為安南國王請節及請詔書并將欽賜皮辨冠服等件請勑備載正副使湛若水等賫捧前去受封行禮正德十一年夏陳皓父子作亂晭遇害本國頭目耆人黎綱鄭江黎叔祐鄭簉黎悆鄧鳴謙黎武泉等共推以晭長兄故黎灝嫡長子黎譓立彼皓窺在隂山途路阻絶不得請封嘉靖元年秋登庸同阮時雍等謀作不軌譓間行脫居清華地方都城園寢悉為所據黎綱鄭江鄧鳴謙等率衆共討登庸懼誅脅立親王故黎灝庶出幼子然一切號令悉出登庸之口本國益亂是年冬差編修孫承恩等賫詔勑采假等物後竟以梗阻未達而返其所立稱光紹被逐海濱鳩殺黎懬偽立已子蹤迹曖昧尤不可知四年夏黎譓遣陪臣黎啔阮正卿等賫捧嵗貢奏事求討等禮被逆庸遮道不前續差拔萃黎景朱埴抱本間道潛乞援不果庸益得志肆無忌憚遂於嘉靖六年五月內明白篡立僣號明德本國人民雖腹背夾攻登庸疑其左右不任他人統兵拒守迄無成功九年春再偽立其子莫登瀛僣號大正妄自尊稱為太上皇帝每將兵拒戰四方見其人心不服益縱凶殘擾害邦畿國中大困黎譓播遷日久本年秋憂憤成疾而亡國人黎公亮鄭惟阮有嚴鄭伯蓬黎如避阮均范珏等皆以黎寧孫世子黎譓親嫡長子應襲共推嗣立然臣主交爭名分倒置逆庸黨與竊據要衝文移聲息無自而達於中國用是干戈擾攘割據至今此其始末梗槩如此但前項事迹浩繁年代懸隔本部所查尚未能盡其詳載在纍朝實録及內閣貯有稿籍必須備録祕府所藏方得詳確已經本部備行內閣查録外今將本部查出前項緣由共録上進仍候內閣所録進呈御覽畢伏乞發下本部别録一本給付黃綰賫捧前去以備應用奉聖旨是欽此名臣經濟録卷二十五
