body:
  text: 名臣經濟録卷十五明黃訓編內閣論簡侍從之臣一丘濬臣按八柄詔于冡宰內史復掌以詔王蓋史官公論之所在爵祿廢置殺生豫奪之柄有所不公史氏直筆以書之吳澄謂內史為翰林之職蓋以其命諸侯公卿大夫則䇿命之猶今學士院之草制詔也然謂之史乃掌文書贊治之名今制併史館於翰林其亦此意歟我太祖皇帝於吳元年已置翰林院以陶安為翰林學士於是設承㫖學士侍講侍讀學士直學士及待制應奉等官洪武九年詔定百官品級承㫖與六部尚書俱正三品學士從三品侍講學士從四品十八年三月始定翰林官制而革承㫖直學士待制應奉之名設學士二員秩五品講讀學士各一員從五品其屬則有侍講侍讀五經博士典籍侍書待詔外此又設修撰編修檢討以為史官皆屬之翰林院焉夫學士代言之官講讀經筵之職五經博士典籍則前代祕書之屬侍書待詔則前代供奉之名而所謂史官者則前代著作起居之任也今則併屬於翰林則是今代翰林一司實兼前代諸職其職任尤非他官比也永樂初太宗皇帝又東七人者入內閣專知制誥備顧問參預機務然其秩猶止五品也至仁宗皇帝又于本官上加以卿佐師保其任用尤為重焉歷任既久又易本官以文淵閣大學士華蓋殿謹身殿武英殿大學士云論簡侍從之臣二丘濬臣按編修檢討專以修史始見於此前此固有所謂編修官者蓋專以修經武要略為職屬之樞密院名雖同而實則異也然編修檢討在前代者皆名以官我朝止稱編修檢討云臣嘗因是而通論古今之史官矣夫天下不可一日而無史亦不可一日無史官也百官所任者一時之事史官所任者萬世之事周禮宰夫八職有史以贊治漢法太史公位丞相上天下計書先上太史公副上丞相唐及宋宰相皆兼史官其重有如此者自成周有左右史漢有起居注唐宋起居舍人著作郎之屬皆所謂史官也我朝開國之初猶設起居注其後革之而惟以修撰編修檢討當國史焉遇有纂修則以大臣為之監修學士為之總裁其法制可謂簡而要矣然是職也是非之權衡公議之所繫也禹不能褒鯀管蔡不能貶周公趙盾不能改董狐之書崔氏不能奪南史之簡公是公非紀善惡以志監戒自非得人如劉知幾所謂兼才學識三者之長曽鞏所謂明足以周萬事之理道足以識天下之用智足以知難知之意文足以發難顯之情不足以稱是任也雖然此猶非其本也若推其本必得人如元揭徯斯所謂有問學文章知史書而心術正者然後用之則文質相稱本末兼該而足以為一代之良史矣論簡侍從之臣三丘濬臣按前代藏書之府非止一處而掌書之官非止一職名數雖異而職務略同今代圖籍皆藏內閣所設之官止一典籍焉蓋本朝翰林之官雖有異名實無異職其所儲書非獨以存前代之舊蓋將以資儒臣之考閲講究以開發其聰明以為異時大用之具也仰惟太祖開基既設翰林院置學士等官又慮人才非儲養作興不能有成乃洪武癸丑命編修張唯等十人入禁中文華堂肄業詔宋濓為之師上聽政之暇輒幸堂中取其文親評優劣命光祿給酒饌每食皇太子親王迭為之主給冬夏衣時賜白金鞍馬太宗永樂甲申命學士解縉選新進士中材質英敏者得修撰曽棨編修周述周孟簡庶吉士楊相王英王直等二十八人又增周忱為二十九人俾就文淵閣進其學且諭之曰文淵閣古今載籍所萃爾各食其祿日就閣下恣爾玩索務實得於已庶國家皆得爾用命司禮監給筆札光祿寺給飲食分鈔以市膏燭賜第以為居止列聖相承按為故事每遇開科間于進士中選其俊異者如甲申制讀書中祕以儲養之前後得人比諸他年進士為多用之當時有得賢之效書之史冊為儒者之榮是誠一代之盛舉也臣伏讀文皇帝諭棨等有曰人須立志立志則功就未有無志而建功成事者汝等皆今之英俊當立志逺大不可安于小成為學必造道德之微必具體用之全為文必驅班馬韓歐之間古之文學之士豈皆天成亦積功所致也一時諸賢服膺聖訓莫不奮發立志勉進學業皆大有所成就留者擅文學之名出者播政事之譽大哉皇言其所以主張文教作興人才為世道慮也一何逺哉三代以下所僅見也嗟夫賢才不易得亦不易知必隨時而取之不限一時必多方以試之不拘一藝然後賢才畢用而無遺茍惟取之於此時而他時則否試之以一藝而他藝則否而欲所用皆得其人難矣臣請著為定制一次開科一次選用簡擇之餘乃分諸司觀政待新進士詣太學行釋菜禮畢即勑禮部諭俾各録平日所作文字投獻所作如詩賦序記略頌書論擬古評史之類封送翰林考訂其中有辭未文理其學可進者别出題試之其所試之文與所投之卷相稱即取以預選不問年之長幼質之强弱茍有器識才思者即如故事命官教育以俟其成若其辭鉤棘而意詭異者不在所取三年之後隨其才器而任使之每科不必多選不過二十人每選不必多留所留不過三五輩如此則國家儲材以待用者無非通經學古明體適用之儒布諸庶位列於內外者又皆得夫文學博雅之士以錯雜于政事法理之間以潤飾之臣見天下彬彬然多文雅之士儒皆真儒吏非俗吏凡其製作以華國施為以輔世者咸有可稱述者矣為治要務用人要術莫先於此論東宫官王鏊人君之學與不學係天下之治亂太子之學與不學係後日之治亂其重可知也賈誼曰天下之命懸於太子太子之善在于早諭教慎選左右今夫庶民之家有子焉則必擇保姆以保護之擇良師傅以教道之而况神器所屬係宗社之安危生民之休戚者乎昔者成王幼在襁褓召公為太保周公為太傅太公為太師所以保其身體傅之德義道之教訓此三公之職也又置三少曰少保少傅少師與太子宴游者也又選天下端正孝弟博聞有道術者以翼衛之所與居處出入者也逐去邪人不使見惡行故太子生而見正事聞正言行正道前後左右皆正人也其身有不正者乎古之教太子者其制如此今國家東宫之官師保而下有庶子諭德洗馬校書等官亦既備矣然官以序進未必皆天下之選學之日晨而授書授畢而退日中進講講畢而退况祁寒暑雨學皆間歇間歇之日所與宴游者誰歟所與居處出入者誰歟不可得而知也又近世之弊患在上下不交然為太子亦且未同於君今也則已儼然端默有言且不敢進又况為君之日乎求上下交而德業成胡可得也昔者三王之教世子必齒於學國人觀之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆知君臣之義矣其三曰將君我而與我齒讓何也曰長長也然而衆知長幼之節矣此所以學為父子君臣長幼之道而與人同如此下至漢唐此意泯矣然明帝授書於桓榮及為天子矣執醬而饋執爵而酳唐劉洎岑文本馬周遞日往東宫談論治道李泌與肅宗為布衣交出則聨轡寢則對榻國朝洪武初建大本堂取古今圖書充其中延四方名儒教太子親王分畨夜直才俊之士充伴讀時時賜宴賦詩商確古今評論文學無虛日仁宗于潛邸臣嘗伏覩其教令長至燕勞東宫之臣如家人父子又從學詩學為表則本朝之初亦未嘗如今制也英宗幼冲當時大臣無深識逺慮阿時所好務為尊君卑臣非祖宗之法本然也今雖未能如古之制亦宜稍略君臣之儀敦師友之分使宫僚日侍左右從容講讀講讀之暇宴飲出入居處皆得周旋其間至暮乃退或有剪桐折栁隨事諫止游戲翰墨端其所嗜宫僚有不法從三師紏正之甚者斥逐不使邪人得預其間如此所謂一人元良萬邦以貞三代所以久長者用此道也漢宣帝時欲使外家許氏監護太子家疏廣以為太子師友必于天下英俊不宜獨親外家太子官屬已備復使舜監護視陋非所以廣太子德于天下也貞觀中撰太子接三師之儀出殿門迎太子先拜三師答拜每門讓三師坐與三師書前名惶恐後名惶恐再拜宋天禧二年庶子張士遜等言臣等日詣資善堂參見皇太子雖令升階列坐然後跪受望令皇太子坐受參見詔不許至道元年皇太子每見賓客必先拜迎送常降階及門乾道七年討論東宫開講并慶賀辭謝禮儀宫僚講讀當依倣講筵稍殺其禮詹事以下至講讀官上堂并用賓禮參見依官職序坐皇太子正席講讀官迭起如儀延英講罷復位節朔不受宫僚參賀元日冬至詹事以下箋賀謝辭初以常見之禮後離位致辭復位就坐茶湯罷詹事參見拜皇太子答拜庶子等初上參見皇太子受拜庶子諭德乃講讀雖有坐受之禮止是五禮定三師朝賀東宫儀上以東宫師傅皆勳舊大臣當待以殊禮朝賀難同庶僚乃命考定其儀曰唐制羣臣朝賀東宫行四拜禮皇太子答後二拜三公朝賀前後俱答拜近代答拜之禮不行而三師之禮不可不重今擬凡大朝㑹前期設太子坐於大本堂設答拜褥位于堂中三師賓客拜位于堂前至日太子常服升座三師賓客常服入就位北向立皇太子起立南向贊四拜太子受前二拜答後二拜乃退震澤文集論內閣王鏊豫在翰林與陸亷伯語及楊文貞亷伯曰文貞功之首罪之魁也豫問何為亷伯曰內閣故有絲綸簿文貞晚年以子稷故欲媚王振以絲綸簿付之故內閣之權盡移中官豫亦不知其然否及豫入內閣歷朝詔誥底本皆在非所謂絲綸簿乎不聞送入况中官之專與否不在一簿之存亡也顧人主信用何如耳亷伯之言不知何所從授天下皆傳之嘉靖初年言路大開諫官紛然爭言利害有謂文貞居憂謀奪情起復遂以絲綸簿奉振不知文貞晚年歸省墓未嘗居憂也甚者又謂文淵閣印亦為司禮監所奪請追還之詔問印與絲綸簿今不知安在令言者自來追理還之言者伏罪乃已論史官王鏊前代修史左史紀言右史紀動宫中有起居注如晉董狐齊南史皆以死守職司馬遷班固皆世史官故通知典故親見在廷君臣言定而書之後世讀之如親見當時之事我朝翰林皆史官立班雖近螭頭亦逺在殿下成化以來人君不復與臣下接朝事亦無可紀凡修史則取諸司前後奏牘分為吏戶禮兵刑工共六館事繁者為二館分𣲖諸人以年月編次雜合成之副總裁刪削之內閣大臣總裁潤色其三品以上乃得立傳亦多紀出身官階遷擢而已間有褒貶亦未必盡公後世將何所取信乎論翰林王鏊宋時兩制皆文學名天下者始應其選雖一甲三人亦出知外任然後召試欲其知民事也其餘應試率皆一時赫然有名中外所謂制科是也故文學之士不至遺棄又通知民間利病以其曽試於外也國家翰林侍從亦兩制之類率用高科其餘則用庶吉士一甲三人終不外任庶吉士每科或選或不選留者或多或少國家之意本欲使之種學績文以為異日公卿之儲士既與此選自可坐致清要不復苦心於學又不通知民事天下以文學名者不復得預遺才頗多故不若制科之為得也制科行人人自奮於學以求知於上不待督責矣論內閣官制王瓊朱子著中庸或問至敬大臣章有云使大臣而賢也則可如其不賢則所謂偏聽生奸獨任成亂禦下蔽上以成其私而主不覺悟者亦安得而不慮也曰彼其所以至此正坐不知九經之義而然耳使其能明此義則必以正心修身為本而得其人以任之矣不幸而有趙高虞异李林甫之徒則亦亟求人以易之矣茍為不然吾恐君上之權不在大臣而移於左右其為國家之禍可勝言哉朱子此說是欲君聖臣賢兩得其人也然自古以來雖有賢君而為奸臣䝉蔽亂政亡國者多豈能君臣皆得其人哉惟我太祖垂訓立法高出千古罷丞相任六卿無偏聽獨任之弊此法能世守之朝政悉付六卿如有違枉臺諫得紏正論劾朝廷端拱以照臨於上萬世無弊矣嘗見紀國初事蹟者內載洪武間設有殿閣大學士其職不過代草辭令然每有犯輒罪黜凡制誥碑文祭文多出御製如今天下各衙門表箋祝文祭文雖臣下所用亦出御製至于武臣誥命皆組織之不書其每日羣臣奏事面奏取㫖畢各衙門將奉㫖意批寫本後送該科類寫奉到㫖意覆奏豈有大學士學士敢自為口㫖送內批于本面發出之事乎永樂始建內閣於東門內命解縉黃淮胡廣胡儼楊榮金幼孜楊士奇七人在閣辦事尋升侍講仁宗皇帝正位東宫皆轉春坊官凡草制纂修等事惟翰林院掌之無內閣掌管之說也如永樂十三年纂修性理大全書成翰林院學士兼左春坊大學士奉政大夫胡廣奉政大夫右春坊右庶子兼翰林院侍講楊榮奉直大夫右春坊右諭德兼翰林院侍講金幼孜上表進呈蓋雖春坊官必須兼翰林院職銜方得預纂修之事未有殿閣大學士而獨專纂修之事者也况永樂間胡廣所兼不過春坊大學士則是時殿閣大學士不設已久矣今雖尚書在內閣辦事六部請勑手本只云合用手本前去翰林院寫勑施行則舊意猶存可考也終永樂之世二楊官止五品蓋為衙門所拘初未有衙門小官大之例也仁宗登極始以東宫舊臣升士奇為禮部侍郎尋升少保轉少傅兼華蓋殿大學士楊榮為太常卿進太子少傅兼謹身殿大學士又升工部尚書在閣辦事楊溥永樂間繫獄十年至是釋出擢翰林院學士尋升太常卿兼學士內閣辦事此三人皆以龍飛超升委任不可以例論也後楊溥丁憂起復不入閣宣德間因九年三品職滿方升禮部尚書學士如故英宗即位復命入閣正統四年修宣廟實録成進少保楊士奇楊榮俱進少師號三楊初楊榮升尚書不過工部則不敢兼官壓六卿之意可見然自此官制一變其後遂使雜流出身在內閣書辦年久者亦得升至尚書至于序班道士亦以年資升至尚書掌鴻臚寺太常寺事皆三楊開其端也由是內閣之權漸重無異宰相之設六部之權漸輕凡事多禀受內閣風㫖而後行卒使祖宗官制額定之員得以增置而日久因襲遂不可復改矣名臣經濟録卷十五
