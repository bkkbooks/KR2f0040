body:
  text: 名臣經濟録詔令奏議類二奏議之屬提要臣等謹案名臣經濟録五十三卷明黃訓編訓歙縣人嘉靖已丑進士官至副都御史是書輯洪武至嘉靖九朝名臣經世之言中闕建文一朝以革除諱之也分十門凡開國一卷保治十卷內閣四卷吏部四卷户部五卷禮部七卷兵部十三卷刑部三卷工部五卷都察院通政司大理寺共一卷每門各有子目開國保治二門以時代為序吏禮兵工四部各以所屬四司分四類户部分圖志田土賦役給賜黃册屯田婚姻糧運祿俸鹽法茶法課程賑恤十三類刑部分律例論奏題奏雜論四類以二部諸司皆以省分無専掌一事者也內閣無子目百司之總無不該也都察院通政司大理寺亦無子目篇帙寡也明永樂間敕黃淮等編歷代名臣奏議至元而止雖門目浩繁不無冗雜而二千年訏謨碩畫歷歷可徴是編所載如陶安傳劉基行狀蹇義墓志李東陽年譜諸篇兼紀言行漢府趙府石亨曹吉祥之變諸篇併録時事以及謝鐸焉用彼相説之類旁及雜文邱濬大學衍義補之類至節取所著之書不純為奏議之體故但以經濟録為名其實奏議居十之九與淮等所編時代相接頗足以資考鏡今附之奏議類中其間如湖廣碑録之類間有濫收或亦朱子名臣言行録取吕惠卿趙汝愚名臣奏議不遺章惇秦檜之意分别觀之可矣乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:686154b2a5d1c300b29002390f5984c49137cac210f2075e57630363a55012a9
