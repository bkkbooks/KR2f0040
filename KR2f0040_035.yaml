body:
  text: 名臣經濟録卷三十五明黃訓編兵部車駕中朝覲官領馬對楊士竒永樂二十二年十二月兵部尚書李慶言于上曰今嵗北方之民畜馬頗蕃皆送至京已散軍伍操用尚餘數千欲散民間畜則民甚弊不可重困之今逺近方面郡縣朝覲官皆集請每員給一馬俾畜可散一千餘匹正官給牡佐二以下給牝太僕苑馬寺嵗課其息有虧罰與民同上令與蹇義夏原吉商略可否以聞二人奏如慶議命已下臣士奇聞之與慶言必不可行慶忿甚不納臣士奇遂詣扆前力陳不可曰朝廷以禮徴賢上者授方面郡守次者授百執事今皆役之畜馬以蘇民是貴民而賤官者矣時蹇夏皆在侍上曰士奇論當慶固無識汝兩人亦言其便何也兩人對曰初慶與臣等言此出陛下意必欲行之非謂出于慶也上曰幾誤朕矣顧臣士奇曰少頃即批出罷此令明旦復奏陛下許臣罷散馬之令豈遂中止必如欲行此令天下懷抱才德者自此誰肯出仕蓋虧損一馬必責陪償破家廢産纍及子孫且所散不及三千而朝廷負此名於天下後世誠非佳事上曰吾偶因事稽緩耳今日必批出又明旦復奏內批出兩日不出兵部已督責朝覲官多領馬矣且今所領多生駒初受羈絡南方之人怯軟不能控制立視其奔逸有號泣衢路者矣臣恐將來逺慮者非但不願仕亦無志學問此令之失非小上曰吾即批出不爽也午刻御思善門召士奇諭曰內批豈真忘初聞汝言即遣人觀李慶吕震等意渠輩交口忿爾朕念爾孤立慮為衆所傷固不欲因汝言而罷此令今有名矣出示一章乃陕西按察使陳智言畜馬風憲受制上曰爾就據此草勑止散馬臣士奇叩首對曰古人有言陛下知臣臣不孤矣但馬已有領去者望如何處之上曰已領者準洪武中官員乘馬例給之不責生息虧欠亦不責償未領者悉止未散之馬給邊軍操用上復顧臣曰繼今令有未便惟密與朕言此輩多不識大體但皆先朝舊臣未可遽退之題憑駒多寡黜陟馬昻成化二年八月初二日兵部為區畫馬政事一馬舊例一年一駒後因虧欠數多改為二年一駒近奉詔書內開三年一駒蓋所以寬民艱而恤民難也原其所自使管馬官得人羣養以時水草有節則生息自然蕃多國用自然充足定例固不敢輕易勸懲亦貴乎有法合無今後騍馬仍照例三年一駒管馬官員以一縣種騍馬為率三年考滿為期額內不虧者稱職額外每馬又生一駒者奏請旌異額外又生二駒者行移吏部不次升用不及額數者百匹為率遞相降級太僕寺分管寺丞所𨽻地方亦以州縣為度如一府十縣半能額外生駒者亦加旌異全能生駒者不次擢用如其不及額數本部查出轉送吏部降用本部尚書馬等題奏奉憲宗皇帝聖旨馬政多廢弛了恁每區畫的皆準行欽此題踏勘南直𨽻牧馬草場何宜成化二十三年二月初三日兵部題為申明馬政事據南京太僕寺寺丞文林呈本部參照寺丞文林呈稱南直𨽻養馬府州縣各有牧馬草場明載圖志多被勢豪之家侵占不得實用要行踏勘處置以備馬政急用一節合無本部行移南京轉行南京太僕寺坐委分管寺丞督同各府州縣掌印并管馬官員親詣各該所屬州縣嚴督當該官吏查照志書圖卷所載并吊取賦役文册到官從公逐一查勘原額草場各若干坐落某處地名頃畝若干堪以耕種并髙阜低窪不堪各若干遞年群長馬户曽無在彼牧放馬匹有無徴收子粒何年項下之用及曽否被近側豪強軍民侵占務要從實踏勘丈量頃畝數目界至明白埋立封堆分别上中下等第將髙阜低窪止堪牧馬地土責付養馬人户輪流管顧牧放中間果有肥饒地土即今空間堪以開墾成田照例看驗頃畝撥與有力馬户耕種以後驗定等第照依佃種官田事例所收花利不拘銀榖依時計估量納别置倉庫收貯其有曽經開墾成田耕種年久徴細子粒者一體查清徴收中間被人包占種作或侵占界至等項各許自首還官免其問罪如遇俵解馬匹地方災傷人户逃移無處湊買并十分貧難出辦不前斟酌停當量為支給以備足數止許用助馬政緊急不許别項支銷待後養馬數多停免耕種照舊牧放事完之日將踏勘過頃畝等第數目造册徑自奏􅌳本部左侍郎何等具題奉憲宗皇帝聖旨是欽此題覆興舉馬政事馬文升𢎞治二年七月二十五日兵部題為興舉馬政事該南京太僕寺卿秦崇等奏要將各府州縣解俵馬匹行令除見解俵外以後每年於起解備用之際照依定去分數徴解本部議得合無行移南京兵部轉行南京太僕寺將每年解京備用馬匹自𢎞治三年為始鳳陽廬州二府并滁和二州令其解本色馬七分折價銀三分淮揚二府所屬州縣并應天府所屬江浦六合二縣以十分為率四分解馬六分解銀俱照舊例每匹折銀十兩其本色馬務要㨂選以騎操四嵗以上七嵗以下折色銀兩亦要辨驗足色各令依期委管馬官員解俵馬匹折銀事例行之二三年備用馬匹有無勾用另行奏請定奪具題本部尚書馬等奏奉聖旨準議欽此題覆整飭馬政事馬文升𢎞治三年四月初四日兵部為整飭馬政思患預防事該太僕寺卿王霽等奏稱順天府所屬寄養備用馬匹消耗及倒失數多要照比較京營事例専差少卿一員請勑前去比較提督掌印管馬官員馬數無虧許令舉奏旌擢耗損馬匹住俸追補若有别項情犯五品以上官員聽其徑自提問及今後倒失備用馬匹務要追補不在宥免之例本部議得合無行移太僕於見任少卿內専差一員請勑一道令其賫捧不時前去順天府所屬各州縣將寄養馬匹常加點閘比較仍督同該寺分管寺丞該府管馬通判各該州縣掌印管馬官員務要用心喂養臕壯不致瘦損倒失照依比較京營騎操馬匹事例定限三箇月以裏報官陪償若不報官陪償如管馬判官縣丞等官照管隊官如掌印知州知縣等官照把總官馬匹瘦損倒失則例施行內倒失馬匹若是年終十分不完五分以上者聽本官查算明不必具奏即將掌印管馬官及該府管馬通判住俸追補五分以上方許關支未完數仍要責限完報驢騾牛隻一體點視比較責成其該寺分管寺丞及該府掌印官不行申嚴號令以致瘦損數多及縱容盜賣抵换并倒失至五千以上買補不足及五分者指實明白照例奏請定奪其管馬通判并州縣掌印管馬官員三年六年九年考滿通查馬數完足方許給由各官中間果有能盡心所事提調有方馬無耗損聽其指陳實迹徑自具奏聞量加旌異或升授職事仍令管理馬政若有貪汚不職馬政不修及贓私情弊倒失馬數多者亦聽本官應提問者拿送問刑衙門問罪發落應參奏者徑自參奏拿問其養馬人户若有將官馬盜賣私騎馱載借撥答應及老病瞎瘤等項馬匹悉照本部原擬而行其各年拖欠之數查照見行事例陸續追補此外凡可以興舉馬政禁革姦弊蘇息民困及殷實大户權豪勢要隱慝人丁不行養馬等項奏內該載未盡者聽本官推類而行本官務要公勤廉慎修舉職業以副委任如或虛應故事因循廢弛責有所歸一年滿日照例更换將該追未完之數明白交割接管官員一併整理仍將比較過馬匹臕息分數及追補拖欠馬數造册奏繳仍造清册一本送部以備查考其稱今後倒失備用馬匹務要追補不在赦免之例係朝廷莫大恩典非臣等所敢定擬伏乞聖明裁處本部官具題奉聖旨是今後倒失馬匹追補不赦欽此題覆振舉馬政事馬文升𢎞治三年八月十七日兵部題為振舉馬政事該太僕寺少卿彭禮奏稱永平府一州五縣先年因其種馬數多嵗取備用馬一千四百五十匹雖量減其數亦有一千上下故馬既不堪而拖欠之數又獨多於他處要自𢎞治三年秋季為始銀馬中半起解本部議得合無行移太僕寺今後分𣲖備用馬匹永平府再減去二百匹𣲖與地廣里多府分州縣其永平府所屬見𣲖馬匹自𢎞治三年秋季為始銀馬相兼每馬仍折銀一十兩其本色馬務要四尺上下銀兩煎銷足色一同起解不許拖欠責有所歸本部尚書馬等奏奉聖旨準擬欽此會議寄養馬匹馬文升𢎞治三年十二月十五日兵部為修省事該吏部等衙門太子太保尚書王等會議得一在京原無寄養馬匹自正統十四年北敵侵犯京師一時缺馬騎操該太僕寺奏準將順天府所屬人户孳牧馬匹分散保定等府人户領養却于兩京太僕寺孳牧馬匹內每嵗取馬二萬匹赴京分送順天府所屬人户寄養備用以十年論之該馬二十萬匹民户有限馬匹太多連年倒死者不止十數餘萬及至追補又告艱難徒費民財無益於用若照前數行取不無纍及逃亡今後合無將備用馬每嵗暫取一萬匹本色折色臨時具奏定奪如果緊急用馬照舊取用或發銀收買本部官題奉聖旨準行欽此題踏勘北直𨽻牧馬草場馬文升𢎞治五年七月二十九日兵部題為修舉馬政事該御史潘楷奏本部查得保定真定廣平順德大名河間等六府所屬州縣洪武年間俱有分撥馬厰牧地牧放官馬自天順成化年間以來被權豪勢要之家無籍之徒軍民人等侵奪占種收利肥家節該巡撫保定等府地方都御史張等奏行户兵二部差委會官同巡按御史原額馬厰地土逐一清查明白不分權豪勢要官員軍民人等但有占種者盡數丈量見數退出還官給與養馬人户耕種照例上納子粒遇有馬匹倒死等項將前子粒給與買補等因本部覆奏差署員外郎主事馮良輔等會同巡按御史太僕寺分管寺丞等官親詣各府將前項草場除欽賜皇親并王府達官及民間先年占種遇例起科辦納糧草等項地土聽其照舊耕種外將踏過各府草場地共七百八十六處各頃數不同除給原耕之人承種定其等第肥饒者每畝出銀七分中等者出銀五分下等者出銀四分自𢎞治六年為始照數徴收完足各府官庫收貯聽候買馬支用本部官題奉聖旨準擬欽此題覆應詔陳言馬政事馬文升𢎞治六年六月二十六日兵部題為應詔陳言馬政事該太僕寺少卿彭禮等奏本部會同英國公張懋等議得民間種馬定為額數再不搭配則民困終不得蘇馬匹終不蕃盛將來禍患有不可言且如以十萬種馬為額每馬二年騍駒一匹十年之間該駒五十萬匹縱使損失亦得三十萬匹再加十年馬必至于七十餘萬矣威敵制勝取用無窮但各該寺丞送到查勘文册內開種馬之數原額新增多有不明養馬之處論糧論丁亦有不實臣等難便定奪欲再勘明處置不無愈加遲延合無北直𨽻地方并河南山東等處六科差給事中都察院差御史并本寺屬官各一員南直𨽻應天等府行移南京六科都察院并兵部各差給事中御史屬官各一員共請勑二道前往各該地方布政司去處會同布按二司分巡分守官直𨽻去處督同本府掌印官仍會同分管寺丞督同各該州縣掌印并管馬官員從公查勘養馬地方何處論糧何處論丁論糧者要見免糧地畝實有若干或一百畝或五十畝養種馬一匹共該種馬若干論丁者要見有力人丁實有若干或十丁或五丁養種馬一匹共該種馬若干務要斟酌處置停當既不可多以損民亦不可太少以虧官每騍馬四匹照例搭配兒馬一匹此數一定永為定額再不搭配增添如有倒失遇赦亦不蠲免其耕種免糧地土人户不分是否原係養馬人數但係承種過買地土者及官員監生吏典之家一體𣲖與馬匹領養不許畏避勢要致令不均有壞馬政勘定畢日即將見在種兒騍馬盡數查出逐一揀選髙大臕壯者存留作種不堪之數責令變賣銀兩湊買好馬補數大約以種騍馬十萬兒馬二萬五千為率北直𨽻山東河南該八萬七千五百江南江北直𨽻府州縣該三萬七千五百先儘免糧地畝次及人丁家道如各府州縣種馬㨂選足數之外尚有多餘堪中作種者却𣲖與别府馬少去處領養作種額外堪以騎操兒馬并兒駒照數存留以作備用之數其堪以作種騍駒量留以備補用其餘不堪之數盡數變賣銀兩以備買補備用馬匹本部官題奉聖旨準擬欽此查得𢎞治六年內兵部題準差官勘處得河南開封彰德衛輝等三府陳州等一十七州縣山東兖州濟南東昌等三府所屬濟寧州等七十州縣各論人丁每五丁養兒馬一匹每十丁養騍馬一匹共該人丁四十三萬八千五百二十二丁領養兒馬六千七百五匹騍馬二萬六千八百二十匹其直𨽻真定保定永平順德廣平河間大名等七府所屬定州等九十二州縣各論免糧地畝每地五十畝養兒馬一匹一百畝領養騍馬一匹共該免糧地七萬七千四百九十一畝有零領養兒馬一萬七百九十五匹騍馬四萬三千一百八十匹各照例兩年算駒一匹其餘人户收候領養孳生馬駒其順天府所屬霸州等二十七州縣亦論免糧地畝領養各處解俵備用馬匹題為思患預防事臣奉勑踏勘牧馬草場被命以來夙夜皇皇恐孤付託於是相協同事之人遍歷牧放之地詢諸故老循其舊迹量度以計其畝封土以立其界敬畢前事以復明命矣然而經涉彼此體量事宜或有一二之可行者輒不揣蕪陋欲為陛下陳之臣伏思制敵以騎兵為急蕃馬以牧地為先自古明君思備患者必修馬令修馬令者必設苑牧苑牧之設不徒省芻秣之費而已馳逐水草堅其足力騰駒逰牝順其物性所以蕃孶其馬者莫善於此也自祖宗來鋭意馬政京畿四環牧地彌望長蓄茂草馬賴以滋歷年既久故趾湮沒官削民侵僅存十一每至下場之時地不足以供牧戰馬多或顧質牧卒半至逃亡萬一有所調用勢將何及此固不可不慮者也邇者兵部建議欲加清理其為國家慮逺矣陛下聖智明徹洞燭事幾遂俞所請勑臣等踏勘節該欽奉勑書有曰命爾等將永樂年間原撥各營牧馬草場取勘四至明白就為丈量係王府管業者另撥無礙地土補還退出草場牧馬其餘不分內外勢要俱要退出若係軍民私自耕種者取問如律睿旨下頒至切至再臣等愚昧無以仰副聖情然於四至頃畝粗舉其略而其間或有禆於馬政或因巡歷而有所見者臣等何敢緘默而不言耶臣考之古圉師教圉人飬馬冬廏夏庌冬寒則燠之以廏夏炎故涼之以庌其順時調燮以善其生者無所不至也今霸州等處舊設草場去民居稍逺極目荒墟曠無室宇人馬無所隱庇露宿蒼莽之中以至暑雨之月蚊虻生發鼓趐搖􅝉噬嚙肌膚馬多瘦損士卒不樂就牧百計逃避陛下鑒其宿弊近命科道官點閘此誠防間之至計也然既有以防之寧可無以處之乎又况迄今所築封堆不過數年風消雨沐漸就平夷將復迷其處所為今之計不若緣其邉界量立鋪舍數座使軍士分地而牧割屋而居馬亦得以就其隱庇復於居中建立廨宇以處領勑之官使得於點閘歇牧則設卒以守之庶幾人馬有依而邊界亦永固矣臣等前踏地至香河縣神機營草場係已故太監覃昌姪覃綱管業臣等丈量之時道路稱快問其所以緣覃綱管庒之人倚恃聲勢擅作威福收斂之時征求百端佃種之家遭其漁獵納之覃綱之家者十無二三管莊之人所得者常居八九連室興嗟無由控訴夫覃綱已故太監之姪耳而管庒之人倚之尚足為害又况非覃綱比者哉且陛下捐數畝之地以厚左右勤事之人若未為過而不知其轉展委託毒民斂怨有如此也即一處而觀之則凡權豪勢要之人所謂莊田者其征利禍民營私斂怨大率類此今草場之為莊田者陛下既令臣等清理而議處之矣然規利之徒夤緣左右圖復奏討者未必無也臣願陛下思國家之大計絶小人之營求則國體正而人心悅矣雖然萬民之望在於一人四海之化始于一家今霸州等處見有皇莊俱在牧馬之地陛下為天下之主聖母享天下之養是普天率土莫非王之莊也豈必於其間復私頃畝之地收數斛之租然後謂之莊哉臣以為宫閫之用設有不贍取府庫之積以益之使不失莊田嵗入之數則上可以愈聖母之心下可以紓生民之害矣又願陛下重自裁抑罷莊田以益牧地凡各處之名為莊田由此而悉屏棄之以與民則人將欽慕而奏討之門自杜矣臣又見三河縣五軍營草場一處多係宣德年間歸化達官任玉王鎮等住種自昔歸化之時給與莊田以裕其食用此固朝廷招徠降附之深意也然而土著既久生齒漸繁地之所入不足以贍其家之所需至有迫于飢寒而流為劫盜者甚非所以安逺人而來慕義也臣詢之於人咸言自此以至河間達官之營相望不絶貧不聊生者與營略同臣稽之禹貢五百里綏服二百里揆文教三百里奮武衛由是言之古昔聖王于邉境之未服者尚綏而撫之又况慕義來歸居于吾土者豈可使之失所也哉况其間習於土俗而精騎射者不少倘陛下用之得其所而處之得其宜則未必不賴其益也今天下武備懈弛窮海遐邉之卒手不能弓身不能騎者在在皆是脫有冦賊竊發將何以禦之臣願陛下留神於無事之日加恩于歸化之人其處顯位而見柄用固不必更張矣若夫達官之間散而不任事者選其材力超衆騎射絶倫之人散之邉方分置各衛如湖廣廣東廣西四川雲南等處衛置一二員加其品秩厚其廩餼使之専教士卒騎射則既不失安逺人之道而亦因得以精中國之技也區區螻蟻之忱冒干天聽陛下倘賜察納而施行之則生民幸甚奉聖旨該衙門看了來説欽此題為修飭武備以防不虞事半齋集先該兵部題前事蒙勑臣等將京運牧馬草場踏勘繳報外續該臣等題將各項侵占草場莊地一併退出牧馬等情又該兵部題該欽奉聖旨是設立草場牧放戰馬係軍國重事廢弛年久今各官既清白王莊侵過地仁夀宫并親王莊地及各官奏討侵占原草場地土俱照數退出牧馬欽此除欽遵外臣等各準奉各該衙門關劄帶領各營把總指揮姚慶等前去霸州等處將前項地土會同各該管莊官員人等逐一丈量明白築立封堆四至各堅粗石界牌退出牧馬外今丈量過退出地土頃畝數目并合行事宜開坐具本謹題一仁夀宫皇莊一處坐落霸州文安縣苑家口等里共退出地八百二十三頃五十四畝歸併五軍三千神機營牧馬外其坐落白鷀淀等處者不與草場相連不曽退出仍是內官羅全等管業臣等看得霸州草場地里寬廣水草便利牧地之善惟此為最陛下留神逺圖興修馬政一旦俯從羣議雖母后莊田亦宛轉上白退還牧放臣等有以仰窺皇度計逺處大而細微之利無益之征必不以此而改易矣臣前霸州丈量退地之時適見工部奏委官員到彼踏勘葦箔鐮票等地觀其所稱四至頃畝與臣等原踏草場相同意必草場廢弛之先渾河橫流散漫四出霸州上下漸為沮洳蘆葦旋生牧放不到當時言利之臣因其地之羡餘悉取葦箔等稅此亦一時權宜之計耳流例相承遂不可己今堙廢之餘又蒙查理是亦陛下綜核名實之一端也然葦箔等用較之草場牧放孰重孰輕固不待較而自明矣况草場設自永樂初年而葦箔等課起自近年是葦箔等地固草場之地也又况近來渾河改徙故道淤漲不産蘆葦又非宜征之地乞勑工部查明果有前項課額在內悉行分豁使牧放無地征之擾庶幾可垂永久以副皇上興復舊額之盛心也一夀府莊田一處坐落永清縣信安鎮地方共退出六百二十畝其地與霸州草場相連照前歸併三營牧馬一皇莊退出侵過草場地共一百四十頃御馬監退出侵過草場地共一百五十三頃俱坐落薊州安和鄉地方歸併三千營牧馬臣等看得薊州草場住種人户數多民居星散參錯下牧之時羣蹄踐蹂或傷禾稼必啓爭端臣等依奉兵部題奏過事理委本州掌印正官查對册籍於各家莊窠周圍兊换地土明白多立封堆以杜侵僣臣等前次踏過地土并今退出莊地計其頃畝不下數萬長蓄茂草足成牧放但恐居民過多日侵月削復踵前弊致損成規乞勑兵部行移本州設立板榜開寫民地至頃畝於官廰張挂或有侵踰許令鄰佑舉首重治庶杜弊源臣等又看得內有義井寺一所瞰居草場之中揆之四面道里適均見今議行蓋造官廳不無重費財用不如即寺之方丈以處領勑之官員既免造作之營且省浮冗之費其餘營房馬圈量宜成造此亦薊州一處之權宜也一太監陸愷奏討莊田一處坐落定興安肅二縣閻臺地方共退地八百五十一頃七十一畝歸併五軍營牧馬一太監覃昌奏討莊田一處坐落香河縣口頭社孟家莊等地方共退地六百八十三頃七十七畝六分歸併神機營牧馬凡此草場皆祖宗開創之時必思規畫畜牧戰馬以備不虞霸州一處固為足矣且又防其雨水之泛濫蚊虻之噬嚙又設薊州香河閻臺三河等地審時應候轉徙牧放其所以為馬政慮者至詳至備然嵗久弊生三十年來奏討占種苑牧幾廢仰賴陛下睿資天啓聖智夙成逺體祖宗之心大為邉方之慮察納廷論斷自宸𠂻特命臣等清查且退出各項莊田以復舊額固足以擴前休而垂永逺矣然事易于作始而難于保終臣等願自今以往大昭王度重申禁條敢言眩惑卑詞奏討者許令科道奏劾嚴加懲治則私蹊可絶而牧地永存矣𢎞治十年五月十一日奉聖旨該衙門知道欽此題早正種馬以免廢弛馬政事閻仲宇車駕清吏司案呈奉本部送於兵科抄出雲南道監察御史王濟題臣本儒官誤蒙先帝開復祖宗舊例進臣今職以言為名民間利病既有所知敢容緘默臣于正德元年正月二十一日欽蒙差往直𨽻山東河南印記𢎞治十七年分孳生馬駒承命以來夙夜憂惕惟恐不堪任使有負先帝再造之恩於在天有孤皇上委任之意于今日勉策駑鈍效報涓埃自暑而寒巡歷周遍今年正月二十八日到京復命已畢臣切見直𨽻河間衛輝二府孳生雖少駒尚可觀直𨽻永平一府并山東兖州東昌濟南三府河南開封彰德三府孳生既少駒又次之至於大名廣平順德真定保定等府孳生不惟數少駒皆瘦病矮小甚有如豺如狼如狗者所以只得照例變賣通計各府印記不及二分堪望將來起俵亦皆百無二三念祖宗立法種馬養在民間正欲孳生起俵以備邉用今雖有種馬之額而無種馬之實徒有孳生之名而無孳生之用臣愚所以甚為之痛心也既問之於有司又訪之於鄉老又察之於百姓多方考究不約而同皆曰即今百姓賦重差煩財窮力竭救死度日惟恐不贍畿甸之民困苦尤甚且如養種騍馬一匹孳生一駒是為二匹兩年印記兊領補種搭配起俵不出養在名下四年二駒是為三匹甚至積有四匹五匹者餧養既多費用草料不資雖有養馬地畝所得幾何加以官府點視刑責科罰百端害之所在人所必避至親骨肉莫如父子有怕嫁聘粧奩費用養女忍為溺死况孳生官馬有害無利百姓肯為之養乎不惟直𨽻山東河南為然至于南直𨽻鳳陽等府臣亦久知其然也所以百姓惟恐一有孳生百害叢至故將騍馬飢餓作踐瘦病倒死即今各處額數虧損太多其見在者間有定駒則又謀買羣醫人等為之隱諱有顯駒則飲以涼水酸泔為之衝落求為虧欠虧欠照例不過納銀二兩虧欠不得孳生既出雖報在官飢餓作踐求為倒死倒死不過照例納銀三兩倒死不得種騍馬既瘦雖有孳生終皆矮小又有管馬官畏怕分數不及紙上栽桑逼要陪買一畨名曰撓頭駒送官搪塞求為變賣變賣不過照例納銀二兩或三兩之間有印記或堪補種亦難起俵太僕寺嵗取備用大馬未足科民重買備用百姓甘心受纍因虧欠倒死變賣之例行故將種馬作廢若不早為從長區處因時制宜圖為官民兩便之計臣愚決以為馬政不惟孳生瘦小徒費喂養終無實用下纍百姓上無補於朝廷不十餘年必將併種騍馬亦廢盡而後已先時議者有欲併去種馬止照地畝人丁出銀買馬此固可革時弊但祖宗養馬之法不可廢壞為今之計種馬地畝人丁嵗取已有定額但要種兒騍馬㨂選四尺五嵗以上十嵗以下髙大者存留矮小老弱者賣價區處買補輳完原數照額養在民間府州縣官一年四次太僕寺官一年二次止是點視務要臕壯病瘦者依律問罪倒失者就令陪補永為定例設有緊急亦可調用遞年有無孳生不必追究太僕寺嵗取備用大馬止照種馬定額𣲖行各府州縣買解假如十萬種馬嵗取備用一萬只得十匹買一匹以地論之則出于五頃十頃以丁論之則出于二十五丁五十丁衆輕易舉就取三萬或銀馬中半百姓亦皆情願百姓止養種馬既不為孳生受害設有生好駒起俵變賣悉聽自便利之所在又人所必興豈有不用心看養種馬依時羣蓋而取孶生自然之利乎夫官馬民馬同一隂陽生生之道各處遞年起俵大馬俱係民間所産類非天設地造議者以為地産有宜否則古人冀北多良馬之説何每見諸載籍豐于民而嗇于官者蓋由利害之分遂至懸絶喂養科罰之害在民孶生之利在官雖日撻而求其好孶生決不可得種馬之額在官孳生之利聽民雖日撻而求無好孶生亦不可得此皆情也亦勢之所必致也臣廣詢博訪虧民損官其弊如此如蒙皇上俯察臣言勑行兵部從長議處施行則三五年間孶生既屬下不求其蕃息而自蕃息種馬雖屬官不求其壯盛而亦壯盛免官府查算印記之煩絶管馬官吏書算人等科罰侵渙之弊公私皆得其便祖宗立法養馬之意可保經久不廢矣具本該本官奏奉聖旨該衙門看了來説欽此欽遵抄出送司為照前奏干係馬政已經呈堂行勘去後續據太僕寺呈稱查得先年立法種馬養在民間正欲孶生起俵以備調用後因年久馬種消耗雖令買補馬既不及數亦不全以致孶生之駒大率不堪起俵京營及邉一有警急務要大馬充軍出征原生之駒既多不堪各該有司只得因民之便或於地畝或於人丁或徴虧欠倒失之價照數𣲖銀湊買解俵惟圖趨辦免罪何暇更論其他因仍既久遂為故常所謂雖有種馬之額而無種馬之實徒有孶生之名而無孶生之用誠有如御史王濟所言者今本官奏要種兒騍馬揀選髙大者存留不堪者賣價買補湊完原數照額令民牧養各該官員勤加點視務令臕肥瘦病者問罪倒失者陪補永為定例且可調用此係探本之論合無依其所言又奏稱太僕寺嵗取備用大馬止照種馬定額𣲖行各府州縣論丁論地買解百姓亦皆情願照得即今民間嵗貢備用馬匹或以丁或以地或輪流或朋合大率與王濟所言相同但稱遞年有孳生不必追究以宜通融再處等因回報到部送司查得洪武等年欽定馬政榜例內一欵開稱補領或孶生三嵗騍駒照例或二年納駒一匹永為定例欽此又一欵每年備用馬二萬匹南京太僕寺所屬取三分太僕寺取七分俱限八月以裏差管馬官員解部等因欽此又查𢎞治六年間該太僕寺卿彭禮奏為應詔陳言馬政事本部會議題準差給事中等官將各處見在種兒騍馬盡數查出逐一揀選髙大者臕壯者存留作種不堪之數責令變賣銀兩湊買好馬補數大約以種騍馬十萬兒馬二萬五千為率每騍馬二年著實科駒一匹以十為率孶生駒不及八分者就將管馬官員提問及將倒失虧欠例不該免種兒騍馬并駒免追本色每大馬一匹追銀五兩每駒一匹倒失追銀三兩虧欠者追銀二兩還官以後每年差去印馬御史將孶生之駒逐一驗看堪中者印烙不堪者變賣等因俱經欽遵通行外今該前因案呈到部看得馬政之設係我朝軍國重務屢經言者論列若不再為通融議處實難保其經久無弊今照御史王濟所奏參諸孳牧舊例雖有不同揆之官民事體似稱便利相應斟酌處置合無本部通行兩京太僕寺轉行各該分管寺丞即便親詣該管地方拘吊原養種馬人户簿册并馬匹到官逐一用心點視要見某人先於何年月日領養何等毛齒兒騍種馬即今有無見在倒失現在之數如果髙大臕壯十嵗以下堪以作種仍令領養內有老瘦矮小漂沙不堪者即令㨂出其倒失之數查係十七八嵗以上免其陪償官為買補不及嵗數兼有别項情由者立限責令收買身髙四尺五嵗以上七嵗以下堪中馬匹還官其上年印過馬駒及今揀退種馬俱令牙行當官估計變賣銀兩并追完各項馬價就令寺丞督同州縣掌印官員照前收買好馬補足原額給與原户領養若有餘剩銀兩解府總類差官解部轉發太僕寺貯庫以備買馬支用種馬原額各令搭配成羣府州縣官一年四次太僕寺官一年二次務要嚴加點視瘦病者痛為懲治倒失者立限陪償每馬百匹病瘦倒失者十匹以上管馬官員查提究問其孳生之駒雖種騍馬十萬每年科駒五萬奈何近年各處養馬之家盡為虧欠倒失之户何曽生有好駒堪以備用有名無實徒為勞攘合無亦依本官所擬不必較其有無有亦不必印烙每年備用馬匹止令一羣之內各照丁田議合明納本色或折色大馬一匹仍各將羣數隨其多寡分為兩班編成格眼互相輪流今年解本色明年解折色本色者務要身髙四尺兒馬五嵗扇馬八嵗以下者方許作數折色者徴銀一十三兩煎消足色成錠俱令該管寺丞驗追徴完各差管馬官吏依限起解若羣內一户生有好駒堪以備用聽從本羣人户幫價起俵其一羣人户解馬解銀亦都編定輪流周而復始如此行之則南北地方十萬種騍馬之中一年實得二萬五千堪用之馬其本色折色分數本部仍臨期酌量太僕寺銀馬多寡數目奏請定奪以後設遇緊急用馬量為增添不拘此例前項倒失虧欠變賣之例悉行除免每年季報比較印烙之煩盡皆減省惟年終各府備將種馬并解過備用馬數目具奏及送部查考仍每三年一次奏差御史二員請勑關領火印分投前去各該地方公同寺丞將見在并買補兒騍種馬通行查點印烙及有無拖欠備用馬匹亦行查追起解中間作弊人員拿問參奏徑自施行事完之日備造文册奏繳本部仍通行南北直𨽻河南山東巡撫都御史一體遵依施行如此則事省于民利歸于官既不失孳牧之本意誠可為經久之良圖緣係早正馬種以免廢弛馬政及奉欽依該衙門看了來説事理未敢擅便正德二年閏正月二十四日本部尚書閻等具題奉聖旨是欽此欽遵擬合通行為此除外合劄本寺照依本部題奉欽依內事理欽遵施行勘定種兒騍馬定數一南北兩京太僕寺所屬府州縣衛額種兒騍馬一十二萬五千匹兒馬二萬五千匹騍馬一十萬匹太僕寺所屬府州縣種兒騍馬八萬七千五百匹兒馬一萬七千五百匹騍馬七萬匹南京太僕寺所屬府衛州縣種兒騍馬三萬七千五百匹兒馬七千五百匹騍馬三萬匹北直𨽻河間府二州十三縣種兒騍馬五千三百六十匹兒馬一千七十二匹騍馬四千二百八十八匹大明府一州九縣種兒騍馬一萬八百八十匹兒馬二千一百七十六匹騍馬八千七百四匹保定府二州十一縣種兒騍馬七千九百四十五匹兒馬一千五百八十九匹騍馬六千三百五十六匹順德府九縣種兒騍馬三千七百一十五匹兒馬七百四十三匹騍馬二千九百七十二匹廣平府九縣種兒騍馬三千七百七十七匹兒馬七百五十四匹騍馬三千一十六匹真定府五州二十六縣種兒騍馬一萬七千六百三十五匹兒馬三千五百三十七匹騍馬一萬四千一百八匹永平府一州五縣種兒騍馬四千六百七十匹兒馬九百三十四匹騍馬三千七百三十六匹山東濟南府四州二十三縣種兒騍馬一萬三千三百四十匹兒馬二千六百六十八匹騍馬一萬六百七十二匹兖州府四州二十縣種兒騍馬一萬四千六十匹兒馬二千八百一十二匹騍馬一萬一千二百四十八匹東昌府三州十五縣種兒騍馬三千三百八十匹兒馬六百七十六匹騍馬二千七百四匹河南開封府一州六縣種兒騍馬一千三百一十五匹兒馬二百六十三匹騍馬一千一百五十二匹彰德府一州三縣種兒騍馬一千一十五匹兒馬二百三匹騍馬八百一十二匹衛輝府六縣種兒騍馬四百一十五匹兒馬八十三匹騍馬三百三十二匹南直𨽻鳳陽府四州十四縣種兒騍馬九千五百一十一匹兒馬一千九百二匹騍馬七千六百九匹揚州府三州六縣種兒騍馬五千五百九十三匹兒馬一千一百一十九匹騍馬四千四百七十四匹淮安府二州九縣種兒騍馬六千三百一十匹兒馬一千二百六十二匹騍馬五千四十八匹廬州府二州五縣種兒騍馬四千三百七十四匹兒馬八百七十五匹騍馬三千四百九十九匹應天府七縣種兒騍馬四千六百四十匹兒馬九百二十八匹騍馬三千七百一十二匹鎮江府三縣種兒騍馬二千三百四十匹兒馬四百六十八匹騍馬一千八百七十二匹寧國府南陵縣種兒騍馬七百五十匹兒馬一百五十匹騍馬六百匹太平府三縣種兒騍馬一千四百六十五匹兒馬二百九十三匹騍馬一千一百七十二匹廣德州建平縣種兒騍馬八百匹兒馬一百六十匹騍馬六百四十匹滁州二縣種兒騍馬七百八十五匹兒馬一百五十七匹騍馬六百二十八匹和州一縣種兒騍馬六百三十七匹兒馬一百二十七匹騍馬五百一十匹滁州衛種兒騍馬二百九十五匹兒馬五十匹騍馬二百四十五匹題馬政四事儲巏近者災變非常聖心恐懼詔令羣臣痛加修省各開具興革事宜臣等皆以庸材備員太僕馬政未舉民瘼未除召變致災實均有罪陛下不即加責為幸已多且使人各盡言又豈容默謹以馬政四事開坐上陳伏乞聖覽仍勑該部議處施行不勝幸甚一議養京營戰馬切見團營軍馬內衛京師外備征調軍精馬壯二者相資乃可以壯威而禦侮也近年以來營中之馬日見消耗告稱倒死無日無之多者十數匹少者四五匹以有限之馬供無窮之死誠可嘆息原其所以蓋因軍士貪圖草料私賣以養馬為纍倚恃朋銀買補以馬死為幸把總之官又多徇私𣲖領不恤貧軍姦頑之徒又多延挨比較以覬恩宥若不議處弊壞愈深臣等風聞團營官軍大約不下十萬團營之馬大約不下三萬以十萬之軍豈無三萬之家衣食稍餘産業稍足者哉但恐㨂閲不精𣲖養不當耳如蒙乞勑提督大臣各營選委忠實軍職一員將所轄官軍從一詢驗家産財力分為三等上等悉令養馬不足以中等補之其馬十四嵗以下倒死責令全陪十四嵗以上者止陪半價二十嵗以上者免陪革去樁頭朋銀之例絶其衆輕易舉之私編成格眼文册兵部用印鈐縫一本收貯營中以備科道等官點驗一本送太僕寺以憑本寺少卿點驗如有倒補轉换事故各該官員就注册眼為照官軍養馬既按月關支草料又以時下場牧放若處置有法騎養得人遞年作踐瘦損之弊亦可以漸保其無矣議者必曰騎軍步卒練習已久若通行選閲未免更張臣等不知兵事然考古兵法騎亦可以為步步亦可以為騎非如天生兩不可易者若平時騎步不能相通臨敵決戰何以出奇制變乎今團營提督皆奉命內外大臣臣等豈敢與議但司馬政不忍不言查得本寺給與馬匹除先年不開外𢎞治十六年給馬三千匹十七年一萬一千匹十八年又一萬匹內五千匹未領每匹直銀二十餘兩皆竭民膏血所得一旦付之軍士骨立稿死暴殄可憐積以嵗月八九匹中僅一二矮小老弱比之原馬真駑駘之易騏驥矣國家何所賴哉此臣等所以痛心而一言也一議減馬政文册照得本寺所轄養馬地方南北直𨽻河南等處各該府縣內外衛所及宣府等處各該城堡各年各項文册解造甚多臣等撿看有舊有而今可省者亦有新增而不可少者有季報馬册一年四季開報舊管新收開除實在數目者是也有孳生馬册每年開報孳生馬駒并馬户姓名本寺具數報册交與御史出差印記者是也有備用馬𣲖取寄養馬未到先繳一本已到隨繳一本以憑查對者是也又有點馬簿册少卿寺丞等官按臨所在臨期投遞以慿點閘者是也以寄養馬册計之本寺一本督理少卿一本分管寺丞一本該府通判一本是亦一事而四本矣各項文册計其工食解送之費加之官吏人等因而科擾所費不資皆出於民况其所造不過抄騰舊册略有增損各該官員視為文具亦不撿閲勞民傷財於事無益臣等豈敢坐視不為之處看得孳生馬册各該衙門每年止須二本一留本處備照一候御史寺丞會印之時投遞每年三月以裏止具總數申文到寺以憑轉報他本可以盡免矣備用馬册亦止須二本一留備照一候解馬到寺之日就同依準投遞凡先繳文册皆可免矣點馬簿册本寺於寄養馬匹行令各該衙門一體照式編造可以常用少卿一年滿日交與接管少卿寺丞三年滿日交與接管寺丞其餘點册點單手本之類可以盡免去惟季報文册乃欽定條例所載臣等昧死言之若將一年四季分併半年一造一年止造二次每造止許二本一留本處以備遺亡一解本寺以備查照則相似於舊制無違兼之民財亦省臣等不敢擅議伏乞聖裁各項文册乞勑兵部通行各該衙門并南京太僕寺永逺遵守造册差人止許掌印正官動支無礙官錢不許管馬官吏仍斂民財督理分管官員非奉欽依不許别生事端擅令造册州縣屬府者本府類解衛所屬都司者都司類解如無都司者方許徑解違者各坐以罪庶為便益臣等聞古人有言生一事不如省一事寬一分則民受一分之賜訪得各該衙門籍册亦多徒費無益若推類行之亦為民造福之一端也乞勑該部議處幸甚一議處管馬官員照得順天等府所屬州縣寄養兒騸馬匹田有定額户有定丁比之别處牧養孳生馬匹事體繁簡大有不同今該府馬政官員既有本寺少卿提督又有寺丞分理又有各府通判専管事少而官多令煩而民擾至于文移簿册之費迎送廩給之需積少成多皆為民纍查得少卿係奉勑督理官員難以更改合無將分管寺丞盡行減省管順天府者改委管别府管保定河間二府者止令管理孳生馬匹至於寄養馬匹専委少卿各府通判等官悉聽約束如此則職専而可責成民安而無多擾矣再照宛平大興二縣先年該差給事中等官王延等奉勑查勘宛平縣舊原額免糧養馬地一千一百七十九頃四十八畝有零編養馬一千二百九十匹大興縣地五百八十六頃五十三畝有零編養馬五百二十六匹大率計之為田人九十畝養馬一匹比之别縣止五十畝養馬一匹者例已不同編户造册詳於舊册民安事久已為定規續該順天府建言要將宛大二縣馬匹分𣲖别縣寄養管馬官員起送吏部别用該兵部覆奏行移本寺臣等看得民間種地莫非王土養馬者免糧出稅者免馬此不易之道也今兩縣地土幾及二千頃既不養馬又不納糧却將馬匹加𣲖别縣揆之事理可謂不均况兩縣密邇輦轂全無馬匹緩急征調何以應用該府所言可謂知其一未知其二也合無仍將管馬官吏存留辦事免糧人户照舊領養庶幾先事有備民無不均若謂京邑之民差使繁重宜加優恤許令原養馬二匹人户共養一匹則恩澤之施又加於他縣一倍矣如兩縣管馬官員得留本府管馬通判可以革去議者必曰他府不革獨革順天可乎蓋他府管孳生之馬事多不可革順天府止寄養之馬事簡可革也一議清場畝租銀照得各該養馬地方俱有牧馬草場事體歸一専令牧養馬匹近年法制更改祗是徴納租銀除真定等府每年陸續解銀到寺近又該兵部差官清查外惟順天府所屬二十七州縣永平府所屬六州縣保定府易州淶水定興新城新安容城雄縣七縣河間府青城任邱靜海三縣每草場有一假百十畝者有數段幾百頃者每年租銀有三四十兩者有五七十兩者自𢎞治六年起例以來各府徴收並無分文解送到寺既廢牧馬之舊規又失徴租之常例若不查理其弊愈深及照先該都御史洪奏將順天等府免糧養馬空間地土每年照畝徴銀祇行二年續該本寺奏準免徴除例前己行給民買馬外未給之數亦未清查臣等竊思前項銀兩俱緣馬政而設比與别項課稅不同既已徴收在官又非小民拖欠可比如蒙乞差本寺少卿一員遍歷所屬督令各該掌印并管馬官員逐一清查要見某處原設有牧養馬草場田土若干自𢎞治六年起每年各收租銀若干現在何衙門交收其别項支費者奉何衙門明文可據及查免糧空間地畝某處某年庫若干在官悉令起解該徴者立限催完其各年徴收在官銀兩或為官吏侵欺或推稱别項支費查無明文憑據悉聽差去官員應拿問者拿問應參奏者參奏追徴清理完日通將各處草場頃步坐落里至佃種人户花名每年并該徴銀兩等則之數造册二本一送本部備照一留本寺查考如此則不惟革官吏侵欺之弊且可助邊方買馬之資其於馬政亦為小補題馬政利病儲巏近奉勑諭痛加修省已將本衙門事當興革者開具上陳數日以來竊思邉方馬政關係尤重稽之案牘粗得其沿革利病之槩再行開具伏候聖裁照得本寺嵗收各處馬價銀兩起自成化二年為因南方一二縣地不産馬暫收折色自後比例者衆日漸加增當時所積不多各邉不曽有損以後間有奏討量與亦不盡從緣各邉自有買馬之需如宣府餘剩糧陕西屯田等項銀兩是也利源一開潰不可塞查得宣府成化二十一年止奏討銀一萬兩自𢎞治十四等年至今則一十三萬兩矣大同成化二十年并二十二年止奏討銀二萬八千三十兩自𢎞治十等年至今則一十六萬五千兩矣延綏成化年間止共討銀三萬九千兩自𢎞治九年至十八年則一十萬二千一百九十五兩矣寧夏𢎞治十八年以前節次止討銀二萬一千一百三十兩𢎞治十四年至今才及六年則已七十萬兩矣陕西布政司等處止是成化二十二年取銀三千八百八十兩自𢎞治元年至今則節次共討過一十五萬九千兩有餘矣他如甘肅遼東山西等處各次奏討過一十一萬五千三百七十二兩皆數倍于前可謂費出無經縻耗不資矣及照得本寺寄養順天等府馬匹起自正統十四年為因邊鄙用兵馬匹不敷嵗取南北直𨽻等處馬二萬匹俵養近坼以備征調然本意備京營之用不専為各邉之資緣各邉各有行太僕寺苑馬寺所畜馬匹足備征調故也其後馬政廢弛人心狎頑一遇邉警輒言馬少張皇聲勢奏請紛然橫議一興牢不可破查得宣府自成化十一年至𢎞治十二年止取馬一萬九千一百三十匹𢎞治十四年至正德元年七年之間却取過馬二萬一千四百五十四匹大同自成化十一年至𢎞治七年止取馬一千九百六十五匹𢎞治十二年至正德元年八年之間却取過馬一萬一千八百三十一匹除給銀買補者不計己數倍於前矣邉方官軍因見京師銀馬易以邀求遂將騎操馬匹不甚愛惜及至倒死不行陪償鎮巡大臣多濶略文法豈能一一核實把總等官惟乾沒貨利豈能一一盡公甚至貪黷之徒如近年都督莊鑑侵欺買馬價銀追贓罷官亦其一也其中弊病難以悉言若不計處國家之財物有限邉方之請求無厭嵗復一嵗何以支持臣等叨司馬政材識淺短素無經畫然且事勢牽制又難舉行輒以愚見條陳稍逭不職查得先年邉方討馬兵部奏勘缺少是實方行量給其後不知緣何不料邉情之緩急不計內馬之盈虛隨其奏討之數輒給與之而又不復稽考任其耗費合無該部仍照先年良法今後奏討者嚴加核實量為給與庶幾邉方不敢妄求朝廷不致徒費彼知馬不易得亦肯調養用心又查得本寺未收折色以前邉方止給馬匹今給銀十萬作馬萬匹價少馬多似利於官殊不知馬價銀兩不入軍中就為有司剋減又為軍士花費及至買馬所餘幾何價既不多馬何從好隨買隨死終費官價隨死隨討終纍朝廷原其本心非全為馬合無今後邉方缺馬之時仍給本色以杜前弊若謂寄養之馬不敷聽臣等多方措置又查得各邉俱有餘糧屯田草場樁頭等項銀兩以備買馬之費先年不曽給與本寺銀兩邉無不足今嵗給益多邉益不足何歟必須查考方得其詳合無兵部奏差風力郎中一員與同本寺督理少卿前去各邉查勘前項銀兩嵗入若干收貯若干各該城堡騎兵若干有馬者若干該補者若干近年本寺發去價銀買馬若干餘銀若干給過馬匹某城若干某堡若干如有姦弊聽其參究事完之日具數造册收貯兵部預知其盈虧多寡之數臨期請給易以酌量若一時動衆興兵暫添銀兩不在此數又查得各邉討馬開稱馬死或生災病或因馳逐理或有之然不應如是之多其間豈無瘦損作踐偷賣私借之弊並無一字聲説况生病亦由于水草之不時馳死亦由於作止之無節要將得人専心牧養豈可盡諉之馬哉合無兵部行移巡鎮等官各以暴殄天物為戒愛惜國馬為心選委管馬官員督責養馬軍士務要飲秣以時蔭息有地疾病者委之官醫作踐者治以軍法及照本寺奉勑督理少卿止是每年到邉點閘一次合無今後點閘二次倒死者皮張綜尾俱有方準朋陪買補者齒嵗身材相應方準印絡但巡點之處不及大同緣大同銀馬一從本寺給與既有相關亦合查點合無勑令兼管庶幾人皆警畏事可責成又查得督理京營少卿奉有勑諭內開比較百户指揮都指揮等官損瘦倒失馬匹或按月住俸或奏聞區處天語丁寧俱有則例然遐邇一體內外一法合無勑督理少卿宣府大同各城堡等處悉照京營則例遵守施行使邉方將士惕然悚懼俱知朝廷修建馬政法令嚴明庶幾變其舊習以圖後效又查得陕西各邉因是地方曠逺道途艱難不來取馬止是𢎞治十七年十八年定州給與延綏馬共三千五百匹其遞年奏討本寺馬價買補馬匹不下數十萬兩及彼處餘糧屯田官地樁頭各項銀兩亦合查究前項京營住俸比較事例亦合通行但原無本寺官員督理乞勑兵部另行議處或者所見謂邉方重地鎮巡大臣閫外之事宜從寬大若每事較量多方綜核邉方將士恐有不堪臣等謂團營為京輔之屯比之邉備尤重提督極人臣之貴比之鎮巡尤尊朝廷慎重馬政尚有科道點閘少卿督理况邊方乎蓋鎮巡等官於軍士務結之以恩臣等典牧之官正欲裁之以法固並行而不相悖也臣等愚昧不能盡識時宜伏乞勑下該部詳其可否補其缺略畫為長策為邊方久逺馬政之利不勝幸甚柴墟集名臣經濟録卷三十五
