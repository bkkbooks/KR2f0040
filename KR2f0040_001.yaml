body:
  text: 名臣經濟録巻一明黄訓編開國陶安傳録乙未夏六月太祖率師渡江取太平路安與耆儒李習率父老出迎安見上狀貌謂習等曰龍姿鳯質非常人也我輩今有主矣上召安與語時事安因獻言曰方今四海鼎沸豪傑並争攻城屠邑互相雄長然其志皆在子女玉帛取快一時非有撥亂救民安天下之心今明公率衆渡江神武不殺人心悦服以此順天應人而行弔伐天下不足平也上曰足下之言甚善吾欲取金陵何如安曰金陵古帝王之都龍蟠虎踞限以長江之險若取而有之據其形勝出師以臨四方則何向不克劉基行狀録公嘗遊西湖有異雲起西北光映湖水中時魯公道原宇文公諒諸同遊者皆以為慶雲将分韻賦詩公獨縱飲不顧乃大言曰此天子氣也應在金陵十年後有王者起其下我當輔之乃著郁離子客或説公曰今天下擾擾以公才畧據括蒼併金華閩越可折簡而定方氏将浮海避公矣因盡江守之此句踐之業也舎此不為欲悠悠安之乎公笑曰我平生忿方谷珍張士誠輩所為今用子計與彼何殊耶且天命将有歸子姑待之㑹上下金華定括蒼公乃大置酒指乾象謂所親曰此天命也豈人力能之耶客聞之遂亡去公决計趨金陵衆疑未决母夫人富氏曰自古衰亂之世不輔真主詎能獲萬全計哉衆乃定或請以兵從公曰天下之事在吾與所輔者爾奚以衆為乃悉以衆付其弟陞俾家人葉性朱祐等參掌之且曰善守境土毋為方氏所得也勿憂我逝總制官孫炎以上命遣使來聘公遂由間道詣金陵陳時務䇿一十八欵上從之中書省設御座遂奉小明王以正月朔旦行慶賀禮公大怒罵曰彼牧竪爾奉之何為遂不拜適上召公公遂陳天命所在上大感悟乃定征伐之計公曰張士誠自守虜耳陳友諒居上流且名號不正宜先伐之陳氏既滅取張氏如囊中物耳㑹陳氏復攻洪都上遂伐陳氏因大戰於彭蠡湖勝負未决公宻言於上移軍湖口期以金木相犯日决勝上皆從之陳氏遂平上還京定計取張士誠因定中原拓土西北公宻謀居多上欲相楊憲公與憲素厚以為不可上怪之公曰憲有相才無相器夫宰相者持心如水以義理為權衡而已無與焉者也今憲不然能無敗乎上曰汪廣洋何如公曰此褊淺觀其人可知曰胡惟庸何如公曰此小犢将僨轅而破犁矣上曰吾之相無逾於先生公曰臣非不自知但疾惡太深又不耐繁劇為之且孤大恩天下何患無才願明主悉心求之如目前諸人臣未見其可也上使剋期以手書問天象事公悉條答其大意以為霜雪之後必有陽春今國威已立自宜少濟以寛先是楊憲敗後汪廣洋為丞相未㡬而貶廣洋乃相惟庸公乃大慼嘗謂人曰使吾言不驗蒼生之福言而驗者其如蒼生何上天威嚴重惟公抗言直議不以利害怵其中上亦甚禮公常稱為老先生而不名又曰吾子房也法天順人疏王禕臣聞自古帝王定天下成大業必祈天永命以為萬世無疆之計所以祈之者在乎人君修徳而已君徳既修則天眷自不能已者書曰皇天無親惟徳是輔此之謂也人君修徳之要有二忠厚以存心寛大以為政二者君徳之大端也是故周家以忠厚開國故能垂八百年之基漢室以寛大為政故能傳四百載之業簡冊所載不可誣也欽惟陛下負不世出之資奮大有為之志艱難十年大業已成周之文武漢之髙光盖無讓焉臣竊聞之人君莫先於法天道莫急於順人心夫上天以生物為心故春夏以長養之秋冬以收藏之皆所以生物也其間雷霆霜雪有時而搏擊焉有時而肅殺焉然皆暫而不常向使雷霆霜雪無時而不有焉則上天生物之心息矣人君體上天生物之心故一動一静之間務合乎天不然則天必示之變異以警戒之人君誠能修徳則豈不足以當天意而成天眷哉此臣所以願陛下之法天道也夫民恃君以為生故人君視民之休戚必若已之休戚以君民同一體耳古者藏富於民言取之有節也取之有節則民生遂而得其所陛下近𤼵徳音減茶課免軍需蠲邊郡之租税民生咸悦㡬得以遂其有生之樂然今浙西既平租税既廣科斂之當減猶有可議者此臣所以願陛下之順人心也法天道順人心則存於心者自然忠厚施於政者自然廣大祈天永命之道未有越此者今陛下建國之始方将立法垂憲以定一代之典制度禮文之事可議者固多未敢悉數謹舉帝王為治之大要冐昧以聞陛下無謂儒者之常談而不加覽焉上太平治要十二䇿桂彦良一曰法天道天不言而四時行百物生天生聖君位至尊而統六合必當仰法於天明如日月恩如雨露威如雷霆信如四時則百職效勞庶事自理若身兼庶務則君勞臣逸非所以法天也夫天道好生聖人亦好生好生之徳洽於人心則人皆化於為善而自不犯法矣孔子曰惟天為大惟堯則之此之謂也二曰廣地利中原為天下腹心號膏腴之地因人力不至久致荒蕪近雖令諸軍屯種墾闢未廣莫若於四方地瘠民貧户口衆多之處今有司募民耕墾願應募者資以物力寛其徭賦使之樂於趨事及凡犯罪者亦謫之屯田使荒閒之田無不農桑三五年間中州富庶則財用豐足矣三曰順人心天下以人心為本人心所在即天命所在故善治天下者必上承天命下順人心民之所好好之民之所惡惡之盖人情莫不欲富夀安逸故三王生之而不傷養之而日厚節其力而不困君之於民既猶父母之於子則民之於君亦猶子之愛敬於父母矣三代之所以得人心者此也四曰養聖徳夫聰明睿智之主文武仁孝之君乃天生聖徳本無不備然萬㡬之頃或相感觸則意念之起如重翳之蔽白日故雖大聖必兢兢戒謹常加存養省察之功節其嗜慾懲其忿怒清明在躬志氣如神則猶青天白日萬物咸仰聖徳加盛聖夀萬年傳曰有大徳者必得其夀此之謂也五曰培國脈夫三代之厯祚延長者以仁義道徳教化斯民不專尚刑罰故民得遂其生養之樂而天命眷顧之也秦隋享國之不久者專事苛刻力役不休仁義不施故民不聊生而天不祐之也今功成治定萬邦悉臣當以三代有道之長為法秦隋之失為戒則人心和悦天心眷祐而國祚如泰山之安矣六曰開經筵自昔聖主賢臣治天下之大經大法具載六經垂法萬世不可以不講也講之則理明而心正措諸政事無不得其當今當大興文教之日宜擇老成名儒於朔望視朝之際進講經書一篇敷陳大義使上下聳聽人人警省興起善心深有補於治化也七曰精選舉夫官得其人則庶務自理萬民樂業故選舉之際不可不精審也六部十三布政司乃股肱重任豈可輕用而輕廢哉必歴試其才能徳量可當此者然後信任之至於提刑按察司與知府之職固不能盡知其人然亦不可輕任也宜令京官五品以上各舉賢良正直一員知州知縣於民最親亦須選擇宜令按察知府嵗貢廉勤淳厚一二員凡所舉不問已仕未仕但得人則有賞謬舉則有罰如此則人皆悉心求賢而無遺才矣若新進人才且當試以佐貳之職果有異能出衆特加超擢則官得其人矣八曰審刑罰刑罰一事人命所係不可不審書曰與其殺不辜寧失不經欽哉欽哉惟刑之恤哉盖死者不可復生刑者不可復屬苟不欽恤而詳讞之則傷人必多傷人既多必損和氣非所以善治也理刑之官必擇其公平正大仁厚之人如漢之張釋之于定國輩親信而委任之則天下無寃民而致刑措之效矣九曰敦教化學校所以宣明教化長育人才非止訓詁文詞而已今大興國學增廣生員教育之恩至矣然國學首善之地既選名儒以五經分教諸生必先徳行而後文藝抑浮華而尚淳篤且未可驟用以啟其奔競之心當日就月将得以真修實踐使成人有徳小子有造将見風俗日厚人材輩出可為朝廷之用矣十曰馭戎狄夫馭戎狄之道守備為先征伐次之開邊釁貪小利斯為下矣故曰天子有道守在四夷言以徳懐之以威服之使四夷臣服各守其地此為最上者也若漢武之窮兵黷武徒耗中國而無益隋煬之伐髙麗而中國䗬起以唐太宗之明智後亦悔伐髙麗之非是皆可以為鑒非守四夷之道也今海内既平車書混一蠻夷朝貢間有未順當修文徳以來之遣信使以喻之彼将畏威懐徳莫不率服矣何勞勤兵於逺哉元人遺燼尚煩聖慮當選将練兵分屯鎮守謹其隄防俟其釁隙一舉而殄平之未晚也十一曰蒐才俊古之俊才或隠於耕釣版築或起於商賈屠沽皆足以興邦而名世非一端所取也故書曰立賢無方旁求俊乂今於秀才等項悉巳舉而用之若軍伍謫戍農圃醫卜或以㣲罪困於里閭者豈無其人宜令有司盡心求訪果有材器出羣學識超衆者則舉薦之開其自新之路許其效忠竭力則庶可得其竒材異能之士㧞十得五可當千百人之用矣十二曰廣咨訪昔舜好問而好察邇言樂取諸人以為善故能以天下之善為已善而能周知天下之事足以開物成務使萬民各得其所伏惟聖朝混一華夏統馭萬邦遐方幽逺恐未周知嘉言善行或未盡取正宜大開言路廣訪博詢使常朝百官得闗輪對布政按察府州縣官朝覲之時各令敷奏以言觀其賢否凡時政得失民瘼利弊許諸人陳訴古有納言之官專掌其事宜選學識髙明通達治務者特授納言院官以詳擇其可否則天下之事可以周知天下之善言無不至而内外百司罔敢怠逸各盡思其職矣大庖西上封事解縉臣伏奉聖㫖朕今命爾義則君臣恩猶父子當知無不言古云爾有嘉猷嘉謀則入吿爾后於内爾乃順之於外曰斯謀斯猷惟我后之徳嗚呼臣人咸若時惟良顯哉臣謂成王於是失言矣歴觀載籍以來固以進諫之臣為善亦未嘗以納諫之主為非唐虞君臣更相勸戒更相推讓光昭不窮載為盛美昔人有譖魏徵於唐太宗者為其録前後諫章以示起居郎褚遂良雖未必然借令有之亦足垂世臣主同休停昏仆碑臣竊謂太宗怒非其怒矣陛下當同符堯舜師表百王豈宜下比太宗則非臣之所願望也臣願與臯夔比肩不願與魏徵同列則臣之感恩服義懇切以為言者尤願陛下毋自狹小誠萬世一時也陛下挺生南服一統華夷功髙萬古此放勛也得國之正皆非漢唐宋所及真所謂取天下於羣盗救生民於塗炭命将出師皆受成算不假良平不倚信布徐定燕都市不易肆女寵外戚寺人藩鎮之患銷融底定皆處之有法眹兆不萌不邇聲色不為游畋既逺過於漢宋又何謙遜於唐虞惟願陛下篤惇信之本加慎獨之學若臨若對之功益加不睹不聞之地無間雖處深宫之内亦如郊祀之時即前日郊祀之敬繼今日存養之功推所以愛臣之心以愛天下推所以待臣之心以待萬物喜怒哀樂一聽於天理上下四旁一視而同仁以天地為一體以天下為一人令出惟行也不宜於數改刑期於無刑也寧失於不經故令數改則民疑疑則不信刑太繁則民玩玩則不清國初至今将二十載無㡬時無變之法無一日無過之人陛下嘗教臣云世不絶賢豈億兆之衆果無一賢如古之人而盡皆不才者哉陛下嘗教臣云民不畏死奈何以死懼之良由陛下誠信之有間而用刑之太繁也宜其好善而善不顯惡惡而惡日滋者善未必䝉福而惡未必䝉禍也嘗聞陛下震怒鋤根剪蔓誅其奸逆矣未聞詔書褒一大善賞延于世復及其昆尊榮奉恩始終如一者也或朝賞而暮戮或忽罪而忽赦施不測之辱則有之矣誠以陛下每多自悔之時輙有無及之嘆是非私意使然也存養之功須㬰未加宻耳是以有過不及也陛下天性素嚴或差於急克伐怨欲臣知陛下聖性所無也臣見陛下好觀説苑韻府雜書與所謂道徳心經者臣竊謂甚非所宜也説苑出於劉向向之學不純溺於妄誕所取不經且多戰國縱横之論壊人心術莫此為甚韻府出元之隂氏鄙猥細儒學孤識陋蠅集一時兎園寒士抄集穢蕪畧無可采陛下若喜其便於檢閲則願集一二志士儒英臣請得執筆而隨其後上泝唐虞夏商周孔之華奥下及闗閩濂洛之佳葩根實精明隨時類别以備勸戒刪其無益焚其謬妄勒成一經上接經史豈非太平制作之一端也歟今又六經缺而禮記出於漢儒蹖駁尤甚宜及時刪改日御經筵訪求審樂之儒大備百王之典作樂書一經以惠萬世以承唐虞尊祀伏羲神農黄帝堯舜禹湯文武臯陶伊尹太公周公稷契夷益傅説箕子於大學而孔子則自天子達於庶人通祀以為先師而以顔曾子思孟子配自閔子以下各祭於其鄉而魯之闕里仍建叔梁紇廟贈以王爵而以顔路曾晳孔鯉配一洗歴代之因仍肇啟天朝之文獻豈不盛哉若夫配天宜復掃地之規尊祖宜備七廟之制奉天不宜為筵宴之所文淵未備夫館閣之隆太常非俗樂之可肄官妓非人道之所為禁絶娼優俾於變之民不遷於淫巧易制寺閹尊天子之貴不近於刑人執㦸陛墀皆為吉士虎賁趣馬悉用俊良雖門户掃除之役命公卿子弟之賢任諸侯王於衆職定久任法而加封待臣子於一體示天下之為公除山澤之禁税蠲務鎮之征商木輅朴居而土木之工勿起佈墾荒田而四夷之地勿貪釋老之業者驅之俾復於人倫經咒之妄者火之俾絶其欺誕斷所謂瑜迦之説禁所為符式之科絶鬼巫破淫祀省冗官減細繇痛懲法外之威刑永革京城之工役流十年而聽復杖八十以無加婦女非帷簿不修毋令逮繫大臣有過惡當誅不宜加辱治厯明時授民作事但伸播植之宜何用建除之謬方向煞神事甚無謂孤虚宜忌亦且不經東行西行之論天徳月徳之云臣料唐虞之厯必無此等之文所宜著者日月之行星辰之次仰觀俯察事合逆順七政之齊正此類也元首叢脞則股肱惰而萬事皆隳人君以不察為明帝徳罔愆則民志應而天命用休人君惟以徳為政陛下拳拳於畏天畏神鬼而所謂畏民者則未至也孜孜於治民治强暴而所以治心者猶未至也且粢盛之潔衣服之齊修舉之時儀文之備此畏天畏鬼神之末事也陛下豈誠以此為足以盡事天事鬼神之道哉簿書之期獄訟之斷詔告之勤鈎距之巧此治民治强暴之支流也豈真以此為足以盡治民治强暴之術哉古云天視自我民視天聽自我民聽孔子曰聽訟吾猶人也必也使無訟乎惟一於敬則心即天祭不必凟而受無疆之福神不必勞而享無為之治與天地合其徳日月合其明四時合其序而鬼神合其吉凶矣近年以來臺綱不肅果若人言以刑名輕重為能事以問囚多寡為勛勞甚非所以厲清要長風采也夫人自救過之不給何暇劾人之過人自以言為諱何能有諫諍之言御史糾彈皆承宻㫖未聞舉善但日除奸毎聞上有赦宥則必故為執持意謂如此則上恩愈重而不知被赦之人疑上好䛕此輩皆市井小人趨媚劬勞之細術陛下何不肝膽而鏡照之哉何嘗真有一夫持法固争謂某不當罪某當刑如舜曰殺之三而臯陶曰宥之三哉臣篤知陛下輕天下之士者皆此輩無以稱塞淵𠂻也然誰不願其父母妻子安榮哉所以諫諍實難禍愆不測入人之罪或謂無私而出人之罪必疑受賄逢迎甚易而或䝉褒營救甚難而多得禍禍不止於一身刑必延乎親友誰肯捨父母妻子而批龍鱗犯天怒哉陛下進人不擇於賢否受職不量於重輕建不為君用之法所謂取之盡錙銖置奸朋倚法之條所謂用之如泥沙監生進士經明行修而多困於州縣屈於下僚孝廉人才㝠蹈瞽趨而或布於朝省驟歴清華椎埋嚚悍之夫闒茸下愚之輩朝攝刀鑷暮擁冠裳左棄筐篋右綰組符剔履之賤衮綉巍峩負販之傭輿馬赫奕雖曰立賢無方亦盍忱恂有徳是故賢者羞為之等列庸人悉習其風流以貪婪苟免為得計以廉潔受刑為飾詞故有無錢工役無盤纒之俚諺鬍膀官人没商量之童謡出於吏部者無賢否之分入於刑部者無枉直之判黜陟無章舉錯乖方八議之條虚設五刑之律無常天下皆謂陛下任意喜怒為生殺而不知皆臣下之乏忠良也古者鄉鄰善惡必記今雖有申明旌善之舉而無黨庠鄉學之規互知之法雖嚴訓告之方未備序禮講學必有其地有其時先之以仁義而後以法制則庶乎磨之有漸而行之有效如影之隨形也今也應故事立虚文善惡二字蕪穢而莫之顧長㓜之民掉臂而不相揖紀綱不立節目無依勢使然也臣欲取古人治家之禮睦鄰之法若古藍田吕氏之鄉約今義門鄭氏之家範布之天下世臣大族率先以勸旌之復之為民表率将見作新於變漸次時雍至於比屋可封不難矣陛下不可視為迂闊而不切當今之急務也陛下天資至髙合於道㣲百家神怪誕妄恍惚臣知陛下洞矚之矣然猶不免欲以愚弄天下若所謂以神道設教者臣謂必不然也一統之輿圖已定矣一時之人心已服矣一切之奸雄已慴矣天無變災民無患害聖躬康寧聖子神孫繼繼繩繩所謂得真符者矣何必興師以取寳為名謂衆以神仙為徵應謂有所謂某仙某神孚佑國家者哉且以傳國寳論之潞王從珂已焚之矣屢求屢得真偽莫明假令真有之則區區李斯之書秦政之制何足為寳哉周武之時未有神仙符應書之所載可見也已而古今享國之長未有如周者神仙釋老誕謾恍惚何足稽哉地有盛衰物有盈謙而商税之徵率皆定額是使其或盈也奸黠得以侵欺其歉也良善困於補納夏税一也而茶椒有糧繅絲有税既税於所産之地又税於所過之津何其奪民之利如此之宻也且多貧下之家不免抛荒之咎或疾病死喪逃亡棄失今日之土地無前日之生植而今日之徵聚有前日之税糧里胥不為呈州縣不為理或賣産以供税産去而税存或禆辦以當役役重而民困又土田之髙下不均而起科之輕重無别或膏腴而税反輕瘠鹵而税反重此丈量之際里胥之弊也欲拯其困而革其弊莫若行授田均田之法兼行常平義倉之舉積之以漸至有九年之食無難者臣愚所謂願除天下之征商者此也臣聞仲尼曰王公設險以守其國故小邑必有城隍重門擊柝以待暴客聖人之所制也而近世狃於晏安隳名城銷鋒鏑禁兵諱武以為太平一旦有不測之虞連郡至望風而靡良平不暇謀賁育不暇鬬武備隳之過也及今修治不宜動衆但勅有司以時整葺寛之以嵗月守之以里胥額設弓手課之以弓弩兼教民兵習之以兵農開武舉以收天下之英雄廣鄉教以延天下之俊乂古時多有書院遺基學田舊業貢士有庄義田有族皆宜興復而廣益之夫罪人不孥罰弗及嗣連坐起於秦法孥戮本於偽書今之為善者妻子未必䝉榮有過者里胥必陷其罪唐虞之世四凶之罪止於流竄故殛鯀而相禹禹不以為仇舜不以為嫌况律以人倫為重而有給配婦女之條定之於不義則又何取夫節義哉此化原之所由係也孔子曰名不正則言不順故賈生欲易服色而定官名尚書侍郎内侍也而以加於六卿郎中員外内職也而以名於六屬御史詞臣所以居寵臺閣郡守縣令不應回避鄉邦同寅協恭相唱以禮而今内外百司捶楚屬官甚於奴𨽻是致柔懦之徒蕩無廉耻之節擎跽曲拳於進退下氣怡色而奔趨一為下官肌膚不保甚非所以長孝行厲節義也臣以為自今非犯罪惡解官笞杖之刑勿用催科督勵小有過差蒲鞭示辱亦足勸懲矣臣但知罄竭愚𠂻欲言固不止此承命忖量急於陳獻所陳畧無次序亦不暇組織成文冀以将來取譽惟陛下幸垂鑒焉上髙皇帝封事葉居升臣居升幸備生員首䝉寵賜令教山西書伏自開學以來罄竭所聞訓誨民間子弟常恐未見成效身塗草野無以上報聖朝養育之恩私切自念近者欽讀聖詔有曰欽天監報五星紊度日月相刑於是詔臣民詳言朕過四海聞之懽呼雷動皆曰此大禹成湯罪已之道復見今日矣臣敢不披露腹心以聞惟聖主詳擇之臣歴觀漢晉唐宋之世皆有災異之變始因刑政失宜賢愚倒置遂致紀綱不振或政失於權臣或勢移於方鎮患不生於女禍則困於夷狄上下偷安茍延嵗月諫書屢上曾莫之省天變於上而不知戒人怨於下而不知悉天下已壊而莫能救也臣每讀史至於其間未嘗不切齒熱中不止太息而巳迄元之季天人厭亂既極天命真人掃除亂畧四海英雄坐致闕下沙漠絶徼罔不臣伏方宵衣旰食以圖雍熈之治凡漢晉唐宋之失今皆無有然而天變於上以致日月星辰失序或者鑑觀前世之失矯枉其弊而有太過者歟漢賈山有言曰忠臣之事君也言切直則不用而身危言不切直則不可以明道明主之所急聞忠臣之所以䝉死而竭忠也臣今有芻蕘之言雖未足以明道敢切直言之庶盡忠臣事明主之心乎臣聞王者之心上通乎天王者之動上應乎天審天下之治否者則求其端於王而已使隂陽交和五行順序日月星辰得其常天下雖未善治謂之治焉可也隂陽錯繆五行不得其序日月星辰不得其行天下雖無事謂之不治可也稽之天道察之人事而後可以驗治亂之實矣臣觀當今之事太過者有三曰分封太侈也曰用刑太繁也曰求治太速也何以明之日者君之象也月者臣之象也五星者卿士庶人之象也臣愚不知星術姑以所聞於經傳并摭前世已行之得失者論之詩曰彼月而食則維其常隂盛陽㣲則為不善矣今日刑於月猶之可也而曰日月相刑則月敢抗於日者臣敢抗於君矣竊觀主上之有天下掃除羣雄如踐草芥包絡豪傑如臂使指今公卿大臣數十萬之衆戰必勝攻必取者朝廷遣一介之使召之則拱手聽命無敢後時况敢有抗衡者乎傳曰都城過百雉國之害也先王之制大都不過三國之一中五之一小九之一使上下等差各有定制盖所以强幹弱枝以遏亂原而崇治本也國家裂土分封使諸王各有分地以樹藩屏以復古制盖懲宋元孤立宗室不競之弊也然而秦晉燕齊梁楚吳閩諸國各盡其地而封之都城宫室之制廣狹大小亞於天子之都賜之以甲兵衛士之盛臣恐數世之後尾大不掉然後削其地而奪之權則起其怨如漢之七國晉之諸王否則恃險争衡否則擁衆入朝甚則緣間而起防之無及也此皇天眷顧之甚或者譴告以相警歟今議者曰諸王皆天子親子也皆皇太子親骨肉也分地雖廣制度雖侈所謂犬牙相制盤石之宗天下服其强耳豈有抗衡之禮耶書曰列爵惟五分土惟三今王亦列爵也漢制諸侯王亦不過三分之一耳禮莫大於分使王侯之國與京畿同則為列國矣尚有君臣之分乎今秦晉燕齊梁楚吳閩諸國皆連帶數十城而復優之以制假之以兵議者何不摭漢晉之事以觀之乎孝景皇帝漢髙皇帝之孫也七國諸王皆景帝之同祖父兄弟子孫也當時一削其地則遽構兵西向晉之諸王皆武帝之親子孫也易世之後迭相擁兵以危王室遂成五胡雲擾之患由此言之分封踰制禍患立生援古証今昭昭矣此臣所以為太過者歟昔賈誼勸漢文帝早分諸國之地空之以待諸王子孫謂力少則易使義國小而無邪心向使文帝盡從誼之所言則必無七國之禍願及諸王未之國之先節其都邑之制減其衛兵限其疆理亦以待封諸王之子孫此制一定然後諸王有聖賢之徳行者入為輔相其守者為藩輔可以與國同休世世無窮矣割一時之恩以制萬世之利以消天變以安社稷天下幸甚臣又觀歴代開國之君未有不以尚徳緩刑而結於民心亦未有專事刑罰而可以結民心國祚長短悉由於此三代秦漢隋唐享國之數具在方冊昭然可觀其故何也易曰天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義此可以見天地好生之心與聖人守位之道矣然而禁民為非之義特居末者明不得已而用刑而不專任刑罰也古者斷死刑天子為之撤樂減膳而寓慘怛之意於其間誠以天生斯民立之司牧而教養之俱欲其並生於天地之間也不幸而不率教者入於其中則不得不刑之耳故其仁愛之篤浹膚淪髓民思其徳愈久不忘故其子孫享國久逺者六七百年近者亦三四百年豈偶然而已哉今議者曰宋元中葉之後紀綱不振專事姑息賞罰無章以致亡滅此行小仁而滅大義雖有其位而不能守之此主上所以痛懲其弊而矯枉之者也故制不宥之刑權神變之法使人知懼而莫測其端也臣聞開基之主垂範百世一動一静必合凖繩使子孫有所持守况刑者民之司命可不慎歟夫刑罰貴乎得中過與不及皆非天討有罪之意也使刑政不立而强暴得以相陵則國非其國矣若刑罰繁苛而政治促急則民無所措手足矣姑以當今刑罰言之笞杖徒流死今之五刑也用此五刑既無假貸一出乎大公至正可也而用刑之際多出聖𠂻致使治獄之吏務從深刻以趨求上意深刻者多獲功平允者多得罪或至以贓罪多寡為殿最欲求治獄之平允豈易得哉近者特㫖雜犯死罪免死充軍其餘以次倣流徒律又刪定諸舊律條減宥有差此漸見寛宥全活者衆而主上好生之仁已藹然布乎宇内矣然未聞有戒治獄務從平允之條是以法司之治獄猶循舊弊雖有寛宥之名而未見有寛宥之實所謂實者在主上不在臣下也故必有罪疑惟輕之意而後好生之徳洽於民心必有王三宥然後刑之之政而後有囹圄空虚之效此非可以淺淺致也唐太宗謂侍臣曰鬻棺之家欲嵗之疫匪欲害於人欲利於棺售故耳今法司覈理一獄必求深入以成其考今作何法使得平允太宗矯隋之暴刑罰務從寛宥猶患及此况今立法嚴宻以矯寛縱能無是失何以明其然也古之為士者以登仕版為榮以罷職不叙為辱今之為士者以混迹無聞為福以受玷不録為幸以屯田工役為必獲之罪以鞭笞捶楚為尋常之辱其始也朝廷取天下之士網羅捃摭務無遺逸有司催逼上道如捕重囚比到京師而除官多以貌選故所學或非其所聞而其所用或非其所學洎乎居官舉動一跌於法茍免誅戮則必屯田工役之科所謂取之盡錙銖用之如泥沙率是為常少不顧惜然此亦豈人主樂為之事哉欲人之懼而不敢犯也竊見數年以來誅殺亦可謂不細矣而犯者日月相踵豈下人之不懼法哉良由激濁揚清之不明善惡賢愚之無别議賢議能之法既廢以致人不自厲而為善者怠宋程頥有言曰君子小人常相半也天下治則小人多化為君子而君子多於小人天下亂則君子多化為小人而小人多於君子此言在上之人有以化之耳有人於此廉如夷齊智如良平一或不謹少戾於法上之人将録其所長棄其所短而用之乎将舎其所長執其所短而寘之法乎苟取其長而舎其所短則中庸之才争以為廉為智而成有用之君子矣茍取其短棄其所長為善之人皆曰某廉若是某智若是少不如法朝廷不少貸之吾屬何所容其身乎致使今之居位者多無廉耻當未仕之時則修身畏慎動遵律法一入於官則以禁錮嚴宻朝不謀夕遂棄廉耻或事掊剋以偹屯田工役之資者率皆是也若是非用刑之煩者乎漢之世嘗徙大族於山陵矣未聞實之以罪人也今鳯陽皇陵所在龍興之地而率罪人居之以嗟怨愁苦之聲非所以恭承宗廟意也近令就中願入軍籍者聽其免罪復官者有之而猶聞有拘其餘丁家小在屯夫有罪之家長既赦而任之以政矣餘丁家小復何罪哉夫强敵對壘則揚精鼓鋭奮三軍之氣攻之必克擒之必獲可也今賊人偽四大王突竄山谷如狐如䑕無窟可追以計獲之庶或可得而乃勞重兵以討之彼乃驚駭潰散深入大壑與之較奔走則彼就熟路而輕行與之較死生則彼負必死之氣三軍之衆孰肯舎死而争鋒哉今捕之數年既無其方而乃歸咎於新附户籍之細民而遷徙之騷動四千里之地鷄犬不得寧息况新附之民日前兵難流移他所朝廷許之復業而來歸者今既附籍矣乃取其數而盡遷之是法不信於民也夫有户口而後田野闢田野闢而後賦税增今責守令年增户口正為是也近者已納税糧之家雖承特㫖分釋還家而其心猶不自安巳起户口雖䝉憐恤見留開封聽候今軍士散漫村落居民不知所為訛言警動况太原諸郡外界邊鄙民心如此甚非安邊之計也臣恐自兹之後北郡户口不復得增矣何者小民易動而難安今之小民以為新籍在官乃見遷徙反易逃匿若欲遷徙一槩而遷之我奚先受其殃乎凡此皆臣所謂太過而足以召災異未見其可以結民心而延國祚者也晉郭璞有言曰隂陽錯繆皆煩刑所致今之天變豈非煩刑所致者乎臣願自今朝廷宜録大體赦小過明詔天下修舉八議之法嚴禁深刻之吏斷獄平允者則超遷之苛刻聚歛者則罷黜之鳯陽屯田之制見任家小在屯者聽其耕種起科已起户口見留開封者悉放復業當差如此則人主足以隆好生之徳以樹國祚長久之福兆民自安天變自消矣昔者周自文武至於成康而後教化大行漢自髙帝至於文景而後稱富庶文王武王髙帝之才非不能使教化行以致富庶也盖天下之治亂氣化之轉移人心之趨向皆非一朝一夕之故致治之道固不可驟至今國家紀元九年於兹偃兵息民天下大定紀綱大正法令修明亦可謂安矣而主上切切以民俗澆漓人不知懼法出而奸生令下而詐起故或朝誅而暮犯者有之昨日所進今日被戮者有之乃致令下而尋改已赦而復收天下臣民莫知適從而不能相安者甚不稱主上求治之心也臣愚謂天下趨於治也猶堅氷之将泮也氷之堅非太陽一日之光能消之也陽氣發生土脈㣲動和氣薰蒸然後融釋聖人之治天下亦猶是也刑以威之禮以導之漸民以仁摩民以義而後其化熈熈也孔子曰如有王者必世而後仁此非空言也况今之天下猶古之天下民俗雖漓而民好善惡惡之心則未嘗泯也因其好善惡惡之心以正其風俗則求治之道在是矣求治之道莫先於正風俗正風俗之道莫先於使守令知所務使守令知所務莫先於使風憲知所重使風憲知所重莫先於朝廷知所尚則必以簿書期㑹獄訟錢榖之不報為可恕而流俗失世敗壊為不可不問而後正風俗之道得矣風俗既正天下其有不治者乎古之郡守縣令為民之師帥則以正率下導民為善使化成俗美者也征賦期㑹獄訟簿書固其職也今之守令以户口錢糧簿書獄訟為急務至於農桑學校王政之本乃視為虚文而置之不問将何以教養黎民哉以農桑言之方春州縣下一文帖里中回申文狀而巳守令未嘗親㸃視種蒔次第旱澇預備之具也以學校言之廪膳生員國家資之以取人才之地也今各處師生缺員者多縱使具員守令亦鮮以禮讓之實作其成器者朝廷切切以社學為教民之急務故屢行取勘師生姓名所習課業如是之詳今之社學當市鎮城郭或但置立門牌逺村僻處則又具其名耳守令亦未嘗以教養為已任徒具文案以備照刷而已及至憲司分部按臨亦但循習故常亦未嘗差一人廵行㸃視興廢之實上下視為虚文如此小民不知孝悌忠信為何物争鬭之俗成奸詐之風熾而禮義廉耻掃地矣此守令未知所務之失也風紀之司所以代朝廷班導風化訪察善惡條舉綱目拯治萬事至於聽訟讞獄其一事爾今專以獄訟為要務以獲贓多者為稱職以事迹少者為闒茸一有不稱雖有忠臣孝子義夫節婦視為虚文末節而不暇舉若是謂之察惡亦近之矣所謂班導風化者安在哉其始但知以去一贓吏决一獄訟為治而不勸民成俗使民遷善逺罪為治之大者也此風憲未知所重之失也守令親民之官風憲親臨守令之官未知所務如此所以欲求善治而卒未能也王制論鄉秀士升於司徒曰選士司徒論其秀士而升於太學曰俊士大樂正又論造士之秀升諸司馬曰進士司馬辨論官材論定然後官之任官然後爵之其考之詳如此成周得人為盛今使天下都邑生員考於禮部升於太學使歴練衆職任之以事可以洗歴代舉選之陋而上法成周之制矣然而都邑生員升於太學或未數月遽選入官委之以都者間亦有之臣恐此輩未諳時政未熟朝廷禮法不能宣導徳化上乖國政下困黎民雖曰國家養育之仁然世間竒才罕有如耿弇顔回鄧禹者固不可拘於常法雖賈誼之才漢朝以年少難委之開國以來選舉秀才不為不多所任名位不為不重自今數之在者寧有㡬人乎臣恐後人之視今亦猶今之視昔昔年所舉之人豈不深可痛惜乎凡此皆臣所謂求治太速之過也昔者宋有天下盖三百餘年其始以禮義教其民當其盛時閭閻里巷有忠厚之風至於耻言人之過失至其末年扞城之将力屈計窮則視死如歸忠臣義士死事者不可勝數雖婦人女子羞被汚辱此皆禮義教化之效也元之立國其本固不正矣犯禮義之分廉耻之壊自古未有故其末年棄城叛将降敵附下者亦不可勝紀雖老儒碩臣甘心屈辱大将北征以來為之死事者㡬人乎此禮義廉耻不振之弊也今其遺風流俗至今未革深可怪也臣謂國家求治之速莫若敦禮義尚廉耻守令則責其先禮義慎征賦而以農桑學校為急務風憲則責其先教化審法律而以平獄緩刑為最切如此則徳澤下流求治之道庶㡬得矣郡邑生員升於太學須令在學肄業或三年精通一經兼習一藝然後入選或宿衛或辦事以觀大臣之能而後任之以政則其學識兼懋庶無敗事且使知禄位皆天之禄位而可以塞覬覦之心也夫分封有制則本支百世矣刑罪既清則刑期無刑矣崇禮義尚廉耻而風移俗易矣於是主上端拱清穆待以嵗月則隂陽調而風雨時諸福嘉祥莫不畢至矣尚何天變之不消也哉雖然臣愚猥不自度干犯天威罪在不赦激切屏營之至革中書省對許士廉已亥胡惟庸等既伏誅上諭文武百官曰朕自臨御以來十有三年矣中間圖任大臣期於輔臻至治故立中書省以總天下之文治都督府以總天下之兵政御史臺以振朝廷之紀綱豈意奸臣竊持國柄枉法誣賢操不軌之心肆奸欺之弊嘉言結於衆舌比朋逞於羣邪蠧害政治謀危社稷譬隄防之将决烈火之将熾有滔天燎原之勢頼神發其奸皆就殄滅朕革去中書省陞六部倣古六卿之制俾之各司所事更置五軍都督府以分領軍衛如此則權不專於一司事不留於壅蔽卿等以為何如監察御史許士廉等對曰歴朝制度皆取時宜况創制立法天子之事既出聖裁實為典章但慮陛下日應萬㡬勞神太過臣愚以為宜設三公府以勲舊大臣為太師太傅太保總率百寮庶務其大政如封建發兵銓選制禮作樂之類則奏請裁决其餘常事則循例奉行庶㡬臣下絶奸權之患主上無煩劇之勞上然之焉用彼相説謝鐸甚矣相之重而任之不可不得其人也得其人則可以扶顛可以持危可以託孤可以寄命而天下事事非所憂矣不然任之重適所以成其勢而為簒竊之資則又不若勢分力抗一統於尊庶㡬不至於大壊極敝而卒莫之救也是故孔明漢相也卒輔後主抗曹操以不負昭烈之託曹操亦漢相也卒弑母后逼天子以盡奪漢家之業自是而後晉宋齊梁陳隋之君一皆祖操之故智而為之雖盧杞李林甫之於唐秦檜賈似道之於宋未必若彼其甚而其誤君亡國則一也噫使為相者而皆孔明其人則天下安可一日而無相哉惟夫三代而下求若孔明者而不可得故寧罷相不置而散其權於六部此我聖祖所以為億萬載深長之慮軼漢唐宋而過之者也家之於國雖小大不同而其理之與勢則一也家之有宗子猶國之有君宗子之有伯叔兄弟猶君之有相宗子不幸而孤弱相得其人則外侮不至而家道昌矣不然方且造謗起釁陽予隂奪日見凌礫吞噬之不暇雖有紀綱疎逺之親彼将自詭以號於人曰此吾之家事耳亦孰得而禦之哉吾於是又知焉用彼相之説不足以盡之矣故相而不得其人無寧事權散處綱紀畢張而名義素定則雖植遺腹朝委裘而天下不亂矣不幸而有若操者出乎其間則所以禍人家國天下者寧有已耶噫此操所以為萬世之永監我聖祖所以深有見於此而亟罷之也我朝度越歴代五事謝鐸昔邵康節有言我朝五事歴代所無一革命之日市不易肆二克服天下在即位後三未嘗殺一無罪四百年方四葉五百年無腹心患臣愚亦謂我太祖皇帝逺過於宋者亦有五事固歴代之所無也一擴清邊境以收復諸夏二肇基南服而統一天下三威加勝國而鋒刃不交四躬自創業而臨御最久五申明祖訓而家法最嚴盖自昔翦除暴亂以大定天下者有矣未有擴清邊境以收復諸夏者也自昔崛起江左以偏伯一方者有矣未有肇基南服以統一天下者也自昔誅其君簒其國以代其位者有矣未有戰不交鋒兵不血刃而遂有其國者也自昔中興繼世者在位享國之久則有之未有創業之初而臨御至於三紀者也自昔創業垂統者大綱衆目之舉則有之未有家法之嚴而垂訓至於諄復者也於乎若我聖祖之神功大業可謂髙出萬古而絶類離倫者矣豈直逺過於宋而已哉名臣經濟録巻一
