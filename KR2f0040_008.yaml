body:
  text: 名臣經濟録卷八明黃訓編保治𢎞治下應詔上書藁李夢陽詔曰朕方圖新政理樂聞讜言事關軍民利病切於治體可行的著各衙門大小官員悉心開具明白來説於是户部主事臣夢陽上疏曰臣聞人君不患世無直言之臣而患已之不能用其言人臣不患其言不得上聞而常患人君聞之而不樂也蓋直言之臣秉心朴實不識忌諱覩事積憤誠激於中義形於詞故其言剴切而無回互藥石而鮮包藏是以為君者不樂聞也即聞之不樂行也夫明君英主則不然也謂其言剴切非為身也藥石非規名也於是導之使言言可行也於是措之於行是故下無壅蔽之姦上無過舉之政故治化浹洽而百姓受福矣臣切伏思陛下則真明君英主也何以知之陛下法祖宗者至矣敬天地者蔑以加矣飭躬勤勵延問若不給矣乃猶曰政理未新讜言未聞惓惓焉若將失之欿焉恆不自安也乃於是下詔布誠廣路諭之以悉心誘之以樂聞惟恐知之者不肯言言之者不肯盡豈不出於尋常萬萬者乎臣故曰陛下真明君英主也然而治化不浹洽百姓不受福何也意者病與害為之而陛下弗察也又其漸不可長焉夫天下之勢譬之身也欲身之安莫如去其病欲其利莫如祛其害欲令終而全安莫如使漸不可長今天下之為病者二而不之去也為害者三而不之祛也為漸者六而不使不可長也乃顧汲汲曰是奚不安也奚不利也奚不令終而全安也是何異於不藥而求病愈於戲其可畏也哉夫易失者勢難得者時今覩可畏之勢而遇得言之時使仍緘默退縮以為自全茍祿之計是懷不忠而欺陛下耳臣今謹據所見昧死開坐惟陛下矜察哀憐俯賜觀覽焉二病一曰元氣之病夫元氣之病者何也所謂有其幾無其形譬患內耗伏未及發自謂之安此乃病在元氣臣竊觀當今士氣頗似之故曰元氣之病夫孔子曰邦有道危言危行今人不喜人言見人張拱深揖口呐呐不吐詞則目為老成又不喜人直遇事員巧而委曲則以為善處是以轉相則效翕然風靡為士者口無公是非後進承訛踵弊不復知有言行之實矣如此尚得謂之不病乎且大臣者庶官之表而民之望也今大臣則先不喜人言又惡人直夫諫官得以風聞言事者也今大臣被彈劾則率廷辨以求勝語人曰我非要作官但要屈直明白耳及直矣又恬然作官此何理也往大臣有親之喪服除非詔不起今大臣服除自起矣如此尚得謂之有禮義亷恥耶夫無禮義則佞人進乏亷恥則國無防佞人進則因循互相欺詆國無防則紀綱不張臣竊謂此等不治必積漸不可救藥故曰四夷未侵百姓未離刑政未墜疆土未蹙而國危主憂此臣所謂元氣之病也二曰腹心之病夫腹心之病者何也攻之則難攻不攻則亡身者也臣竊計今事勢內官者腹心之病也夫內官者隂性而狼貪其地逼近又朋比難翦臣故以為腹心之病夫倉厰場庫錢穀之要也今皆內官主之陛下以此輩忠實可用耶抑例不可廢也夫例誠不可廢每處置一二輩足矣今少者五六輩多者二三十輩何耶且夫一虎十羊勢無全羊况十虎而一羊哉今某某有司擲發其姦幸陛下洞見其情實外議僉曰是必不赦不且竄斥今數月矣猶閣而不行夫人情莫不遮於潛而玩於彰彼未擲發姦尚有嚴心今其姦業擲發之矣不置之法又不竄斥彼何所憚而不為乎昔人有言曰宦官有罪不可赦有缺不可補言難除也今皇城之內通名籍者幾萬人焉亦多矣陛下又敕禮部選年十五以下淨身男子五百名將安用耶夫人情孰不欲富貴今田野小民無故猶閹割親兒以希進用矧今有詔矧有名嗚呼此其禍可勝道哉夫滅絶人類則必戕天地之和戕天地之和則災害必至災害至則五榖不熟人民離散天道乖於上人心怨於下而隂性狼貪之徒無忌妄行於中而國不危者鮮矣臣故曰內官者腹心之病也今陛下誠于此時拔亷直奬忠鯁斥無恥大臣進盧扁之佐則必轉病而為安厭禍以為福且陛下何難為此而不為也今議者必曰彼曽不指實某忠某直某為無恥泛言難行然不知上者風也下者草也拔一君子則君子進即有小人相率而化於善矣且人不幸而有病擇醫而治之者為愛身也今某某有司幸擲發其姦是亦國之醫耳若一切閣而不行是醫能治之而上弗肯使也且陛下何難於此而不為也今誠欲腹心安莫如剷內官之權欲剷內官之權莫如有罪不赦有缺不補傳曰治未病不治巳病今固已病也而猶不治是可惑也已三害一曰兵害夫兵害者何也臣以為冗食而無補空名而鮮實也夫強本者所以弱枝也今在京之兵以衛計之七十有餘分為三營一曰神機二曰三千三曰五軍蓋帶甲空弦者數十萬焉意固欲以強本也然至正統巳已才數十年耳拔之乃僅得十二萬焉亦寡矣於是有十二團營之名團營至今又才數十年耳日者遣將北伐拔之不滿三萬焉然其腰鞬弓刀不全也騎士則牽露骨馬又旋置安轡等夫兵數不減於前食之者增也一旦而狼狽若此何也官不恤其軍豪勢多占使逺者逃近者潛職者不以報糧籍不開除又壯丁各營其家老弱出而應點宜其食之者增而用之者寡也臣故曰兵害者冗食而無補空名而鮮實也夫騰驤四衛者今非所謂內兵耶外官既不與稽其數征役又不選用其丁故其人率富豪而氣驕夫內官者隂狡而狠貪者也以富豪氣驕之人而率之以隂狡狠貪之徒兹其害可忍言哉且夫錦衣衛爪牙之司也今內官之家人子弟官之團營兵之精也內官參之內兵又其掌之陛下乃何獨而不為之寒心耶古人有言曰官惟賢賞惟功今團營把總號頭等孰非內官之私人乎彼其家人子弟抑孰非詭託冒官也乃遂布列要地為爪牙乎諺不有之曰萌芽不伐將折斧柯爝爝不撲燎原奈何言貴豫也陛下誠於此時查往年李玉事例仍置總兵官使參掌內兵又禁團營把總號頭等自今不得置私人乃於是令諸左右曰其詭託冒官自首者聽但罷免不問如此則威立而恩亦流所謂銷患於未形計之上也二曰民害夫民害者臣以為斂重而民貧又貪墨在位恩不下流也臣聞惟賢智者而後起家夫人未有無所賴而生者也今百姓賢智者百不一二愚蠢者十常七八然又苦無賴而有司者不之恤也斂之不問貧富也役之不問勝否也曰是爾職焉矣是故富者剝削貧者稱貸稱貸之不足則必鬻子鬻子而不足則必逋竄一旦棄父母捐親戚背鄉離井愁怨之聲上干天和則必有水旱風雹之災逋者不還居者縲絏而牽連則必有無辜暴露之尸臣故曰民害者重斂使之也夫內府供用有常數也宜有常簿焉今油蠟皮張諸料等較之𢎞治初年費且十倍於前此何也蓋下者效上者也取贏者未有不羡者也今既十倍於前則户工二部科派必又倍矣下之州縣必又倍矣百姓輸納又有稱頭等必又倍矣又經內官必有賄賂是益又倍矣於乎民日貧而斂日積當道不苦言以聞有司乘機而肥其家如此而猶望其治是真却步以求前耳陛下前固嘗降詔旨存問矣然簿數不減也科派不省稱頭如故賄賂公行無憚此所謂空名而實禍也臣故曰貪墨在位恩不下流者此也三曰在場畿民之害臣伏觀洪武某年詔曰直𨽻拋荒田地聽民開墾永不起科夫民既自開墾之矣不可謂非其田矣而今皇親之家聽無賴光棍投獻主使謂非其田也請之朝廷朝廷亦謂非其田率即賜皇親家皇親家既奉天子命為已有乃輒遂白奪其田土夷其墳墓毁其房屋斬伐其樹木於是有百年土著之民蕩産失業拋棄父母妻子千里之內舉騷然不寧矣夫皇親與國同休戚者也而祿非不豐貴非不極也乃秪以區區之田損害赤子動搖基本如此是不欲與國同休耶嗚呼亦甚矣昔魯廏焚孔子見之但曰傷人乎蓋貴人賤馬也今薊州牧馬草場與百姓爭阡而競畝尺分而寸剖之臣竊悲也是何賤人而貴馬也夫草場數千頃地耳今三遣官矣百姓連年坐勾攝轉相牽聫妨費本業耽閣其生理男不秉耜女不上機賣男鬻女弱者轉而死泥塗者過半矣嗚呼是何賤人而貴馬也臣雖未詳其始末竊計今事勢萬無百姓侵官之理設有之所辦亦官租耳非若皇親之家占之為己有也今據勘牒四至與民爭者止十之一二耳臣謂宜置而不問且百十年土著之民一旦逐之使去陛下忍為此耶夫王畿天下之本也今以數十百頃之地失黔首之心傷隂陽之和臣固知陛下不忍矣陛下幸哀憐聽臣愚計敕户部查景泰六年勘官馮諲奏內事理以前項田土仍給民徵租但以空間草地牧馬便六漸夫六漸者一曰匱之漸夫匱之漸者何也臣以為兵連然耳然又苦浪費今各邊用兵以將則庸以卒則罷糜財而無功曠日而損威而錢穀吏俯首供給莫敢如何稍有不繼則軍吏諉以自解是故倉廩不足不曰兵者糜之也曰是錢榖者之誤之也錢榖者不曰巳誤之也曰是無米而求粥也於是始有和買之議矣和買而不足於是有穵運之例穵運而又不足於是乞內帑之銀臣始至户部太倉庫銀尚百七十餘萬今銷耗且過半矣然而乞者未巳也由是積漸而不止雖欲不匱烏可得矣夫今疆土不蹙於前也又鮮大寇非有若胸奴突厥者也竭天下之力以供邊而日猶不足此其故何也糜財而無功曠日而損威者為之也夫錢者泉也言流也散於上則聚於下公家削則私室盈今京城內外千觀萬寺亦熾矣顧又不止此彼左右侍臣孰非造寺者也動以巨萬計諺曰十入一出今彼巨萬出則其入不止於巨萬明矣夫上惟風下民惟草今方春氣和耒耜在野陛下乃不發倉廩助不給賑不足顧遍察寺觀等敕給費修葺之是道民以奉佛也彼以巨萬入者又何憚而不造寺也夫智者察微今貨入而於私室矣又出而造寺觀等矣設卒有水旱之警兵甲事興內取則巳匱外斂則民窮臣不知陛下計所出矣故曰又苦浪費者此也二曰盜之漸夫盜之漸何也臣以為其幾在民窮夫盜者非不知法當死也彼以為往固無食矣今盜而得食即死不猶踰於餒乎往固無衣矣今盜而得衣即死不猶踰於凍乎往有租調官司之轄矣今盜而得自由不猶踰於追繫鞭笞之乎夫天下無智愚強弱舉俯首捧心以事我者以有法維之且畏死也今既死而踰於凍餒追繫鞭笞之則彼亦何所不至耶故以臣之愚竊計今事勢非但憂盜將必有大患大患者何所謂有亂之機無亂之形也夫今天下無不臣之邦四夷無不庭之國百官奉職筐篚歲至太倉有紅腐之粟武庫之兵朽而不用又無方二三千里水旱之災也然而哨聚殺人劫縣燒村剽掠婦女者日相聞也假如不幸而有方二三千里水旱之災武庫乏兵太倉粟竭百官不奉職夷狄外侵海內有警則事勢又何如矣故曰有亂之幾無亂之形嗚呼此亦可以寒心矣臣謂宜趂此急選良有司恤飢賑寒以安民又密令整飭城池軍馬以伺緩急之變夫安不忘危霸者之略有備無患聖王之政况今承平日久民不知兵萬一有意外之警有如平原睢陽之倫乎臣故曰計今事勢非但憂盜將有大患者此也三曰壞名器之漸夫壞名器之漸者臣以為黜陟失制也夫明懸爵以待天下之賢將以奉天而理民也故曰五服有章自天命之示非我也又曰爵人于朝與衆共之明至公也是以古之英君寧捐百萬之費而靳一郎之拜其意亦謂此耳而今乞官者官乞蔭者蔭黜其父者陟其子黜其祖者陟其孫臣不知陛下計所出矣夫蔭者所以報功又示勸也今黜者既陟其子孫則有功者何勸焉是以髙其爵不足以勵縻乎賞不足以諷夤緣鑽刺之風既行而廉恥名節之士遂寡且陛下何利於斯而為之也夫大學士萬安前侍先皇帝醜穢彰露陛下踐阼之始嘗令內官逼脫其牙牌逐之去矣而蔭其子為丞臣不知報耶勸耶且陛下何利於斯而為之也夫薰蕕同器不知有薰廉汚並賞孰肯為廉陛下若謂天下之大何吝此一官則所謂弊袴之藏繁纓之惜者皆非耶惟名與器不可以假人臣故曰壞名器之漸者黜陟失制也四曰弛法令之漸夫弛法令之漸者臣以為舛與玩為之也夫舛莫大於縱罪玩莫大於長姦昔者舜為天子其父瞽瞍殺人孟子以為士師執之為舜者但宜竊負而逃蓋法者公之天下受之祖宗者也掌於士師士師不得而專也出於天子天子不得而專也是故士師可以執天子之父而為舜者不可私其親曩者犯人王禮擅搶夷僧貨物損辱國體傳笑外邦獄案已具法所不赦也陛下何從而赦之耶以為無罪則固已追償其貨直矣以為有罪未聞有罪而赦之者也有罪而赦之是縱罪則姦長姦長則政舛政舛則民玩民玩則令慢令慢則法弛此古之所大忌而今之所甚忽也夫忌莫大於刑忽莫大於私何則刑天討也公天道也王者不私其天故罰一人而千萬人懼諺曰勿謂尺五後且不補臣故以王禮之赦為弛法令之漸五曰方術眩惑之漸夫方術眩惑之漸者臣以為去之不力則誘之必入也夫自古帝王享國長久者畏天而憂民也非以奉佛也康強少疾者清心而寡欲也非以事仙也且陛下獨不見梁武唐憲乎梁武帝奉佛最謹然罹禍最慘唐憲宗事仙最謹然年又最短此其明效大驗彰彰可考者而今創寺創觀者陛下弗止也比又詔葺其廢圮臣不知陛下乃何所取於彼而為之也夫真人者大虛無為之名也今酒肉粗俗道士陛下敬重之如神尊為真人又法王佛子等並肩輿出入珍食衣錦陛下踐祚詔曰僧道不得作醮事扇惑人心堂堂天言四海誦焉夫陛下神心睿姿不減於前也乃今復爾者臣故知有誘之者也夫去之不力則誘之必入譬若鋤草不盡反滋其勢陛下奈何去之不力而反使之滋也夫誘者必曰其道妙又其法靈今天變屢見于上百姓嗷嗷于下邊報未捷倉庫匱乏信如真人國師道足以庇法足以佑陛下何不遂一試之且彼能設一醮噀一法使天變息而嗷嗷者安乎而陛下不察反聽其誘此臣之所以日夜悲心者也六曰貴戚驕恣之漸夫貴戚驕恣之漸者臣以為其防決也夫水防惟土國防惟禮水決則潰禮決則陵昔者髙皇帝制皇親令曰皇親之家不得與政臣嘗伏讀嘆息以為聖王不易之論及退而考夫頒祿列爵則又使大貴而極富已又考其器度田奴之等則又不使踰也臣於是又嘆曰是所謂之防也夫皇親與國至戚也不宜有間今顧制禮以防之者臣以為此固保全而使之安也今陛下至親莫如壽寧侯所宜保全而使之安者亦莫如壽寧侯乃顧不嚴禮以為之防臣恐其潰且有日矣夫下替則上陵今夀寧侯招納無賴罔利而賊民白奪人田土擅拆人房屋強虜人子女開張店房要截商貨而又占種鹽課橫行江河張打黃旗勢如翼虎此謂之不替可乎替則陵陵則逼大逼則法行且今側目而視切齒而談孰非飲恨于壽寧者也夫川潰則傷必衆萬一法行陛下雖欲保全而使之安得乎臣竊以為宜及今慎其禮防則所以厚張氏者至矣亦杜漸翦萌之道也初詔下懇切夢陽讀既退而感泣已嘆曰真詔哉於是密撰此奏蓋體統利害事草袖而過邊博士會王主事守仁來王遽目豫袖而曰有物乎有必諫草耳豫為此即妻子未之知不知王何從而疑之也乃出其草示二子王曰疏入必重禍又曰為若筮可乎然晦翁行之矣於是出而上馬並行詣王氏筮得田獲三狐得黃矢貞吉王曰行哉此忠直之繇也及疏入不報也以為竟不報也一日忽有旨拿夢陽送詔獄乃於是知張氏有本辨矣張氏論我斬罪十然大意主訕母后謂疏末張氏以斥后也掌詔獄牟斌問壽寧胡不指其事實羽翼豫曰慮對耳斌曰指則我能據事實翦厥羽翼奚對焉獄成牟斌參之其略曰原情應詔論法亦違而渠云十罪者悉置弗入奉聖旨李夢陽妄言大臣姑從輕罰俸三箇月此十八年四月十六日也居頃之龍馭上賓矣痛哉何忍言何忍言太醫院使吳釴高郵人也謂我曰上崩之明日釴往見一近侍閹會閹挈其白綾褶子出褶子自肩以下血淋淋未乾也閹迎釴以褶子泣曰此爺爺口鼻中血也釴相與泣問故言上氣絶時閹負之自寢出云已閹抆淚謂釴曰怎更得此聖明皇帝釴叩之閹曰前李夢陽事知否釴曰不知閹曰上初無奈壽寧輩逼何金夫人又日在上前泣訴不平上欲借官人每力一日朝退召三閣老上問曰李夢陽言事若何劉健輒對曰此狂妄小人耳上默然良久謝遷前對曰其心無非為國上頷之曰然會科道官交章入李夢陽由是得釋然釋之日金夫人猶在上前泣訴求重刑上怒推案出竟批止罰俸三月汝以為此等皇帝能更得否言既二人相對大聲哭而尚書劉公大夏曰釋李夢陽時會上召我言閹輩事因遂及李夢陽事上曰朕初欲輕譴此人而左右者輒乃曰輕莫如打二十放了已顧大夏曰汝知渠意乎大夏叩頭對曰臣不知上曰打必送錦衣衛渠拴關節打之必死也於渠輩則誠快矣如朕殺諌臣何正德間豫至江西則見都御史艾璞曰璞往為光祿卿故事光祿寺日辦有攢盤云攢盤者供近侍宴者也孝宗末尚儉節斯格不行矣而一日未申間忽有旨趣辦攢盤十餘衆驚愕辦矣久不之取也例辦不入卿不出璞守至昏黑東安門將下鎖矣一老閹來曰官第出璞於是倉皇出明日入至寺寺閹耳語璞曰知攢盤否璞何由而知也閹曰昨夜上蓋遊南宫云皇后皇太子金夫人從而二更時召二張自東安門入璞問曰何事閹曰上和解二張耳為李主事璞叩詳細閹不答而豫因記往錦衣百户郭勳曰上遊南宫時二張夜入侍酒中皇后皇太子金夫人皆迤邐出遊上獨召大張促膝語左右咸莫知聞第遙見大張免冠觸地謝云豫始不甚信今以艾公言質之符矣奏記注言動儲巏伏見陛下即位以來屢垂清問召見大臣至於今嵗舉行尤數或講究典禮或諏詢治道或綜核庶職或制馭四夷邇者又親御午門讞審大獄盛德偉迹垂耀無窮非臣之愚所能殫述臣聞堯舜之德文武之政所以布天下傳後世者賴有典謨方䇿之存使非史臣當時記載則後代君臣何所誦法故古者設立史官左史記動右史記言大率為此臣備員班行每覩陛下宣召羣臣登對多係帷幄之語造膝之言近臣不得以聽聞史官何由而記録臣竊惜之夫前代史官追述往昔尚且網羅放失捃拾傳聞以成不刋之典豈如今日宸𠂻睿想之所形聖謨神斷之所著明並日月炳若丹青顯然可書足以傳信且儒學里孰之士門生弟子更相問難猶有日録年譜以備遺亡陛下復萬年之位臨九有之衆勵精圖治益大有為將來延訪日廣政事日新蓋有不可勝書者顧乃無所纂記以貽來世非缺典歟失今不圖誠恐歲月綿逺耆舊凋謝或遺失莫存或傳聞各異事迹無以究其始末日月無以考其後先後時之悔恐不能無雖悔亦無及已竊考本朝史職似與前代稍異臣愚欲乞陛下特敕在廷臣僚先後會蒙召問者備録當日於何殿下欽奉聖旨奏對之詞具本進覽宣付史館如事干幾密不宜宣露者御覽訖仍行封識付之謹密之臣藏諸法嚴之地所謂金匱石室者以俟將來庶聖君言動舉無所遺羣臣論説亦以附見洪武年間嘗有起居注陛下儻採臣言而行之正合祖宗之典貽萬世之謀臣不勝至願勸行王道奏張元禎臣惟為人君者不以王道為心雖有為也謂之有為之主則可非所謂大有為之主也為人臣者不以王道致君雖有功也謂之救時之佐則可非所謂名世之佐也臣非有王佐之才者也而潛心聖賢之學粗知王道之略養疴山林以待乎大有為之主久矣乃今幸遇陛下臣不於是時而勸行之少傾葵藿之誠用致涓埃之報是不惟有負陛下抑亦有負於所學惟陛下不以為迂而忽之臣惟王道乃二帝三王相傳以平治天下者也其道雖大然皆本之身心而非有待於外者也蓋心必純於天理而無一毫之私然後著之政事亦皆純於天理而無一毫之夾雜茍政雖善而心於天理有未純焉是外身心以為治是為無本是為不誠是為霸道霸道者假王道以成功名假天理之公以濟人欲之私者也王道真霸道偽王道實霸道虛王道坦夷霸道崎嶇王化大同乎天地霸業僅補其罅漏人主不可不深辨也今臣之所陳不及於陛下之更創制度不及於陛下之振舉綱維不及於陛下之黜陟人物惟勸陛下於身心上用功以立王道之本而巳身心之功既至則王道之著於政事者布在方册可因而因可革而革可益而益可損而損陛下聖見當自能裁之而羣臣中有名世者出當一一有以輔陛下也臣請詳之夫王者之心何心哉天地之心也天地所以相播相蕩相軋相磨而晝夜之不息者其心無他惟在生物而巳雖其雷霆之震擊霜雪之凋剝亦其所以破其頑而禁其盛非心乎殺之也人心即天理所生之物也如花木之接水泉之續然實皆得是生物之心以為心者也茍非得是心則是身無以生矣為人君者聰明睿智得此生物之心厚而靈猶天所以留心者蓋生物必當有以養而教之天不能自養而付養之之責於君天不能自教而付教之之責於君人且當體乎天而心天之心人君尤不可不體乎天而心天之心者也心天之心何如哉心其所以生我者以達之萬事以生乎萬民也必其四海之內九州之外熙煕乎無一處無一人無生生意皞皞乎無一處無一物無生生氣禮樂明備俗化醇美至和薰蒸諸福畢至景星慶雲見焉麒麟鳯凰出焉醴泉朱草生焉是即所謂王道也是即皆由其心所以生我者來也然是心也即天理也天理之在此心日用之間本無不流通但以既有此身則不能無耳目口鼻耳目口鼻既獨有諸已由是誘之以聲色之紛華臭味之甘美得之不得而喜怒哀樂之發遂不能無私焉身既有私則此心或為之蔽而不能祛或為之纍而不能遣或為之錮而不能釋此天理遂以漸而泯即此心以漸而亡私欲長一分則此心亡一分矣私欲長十分天理泯十分而此心亡十分矣始於濫觴而至於滔天始於一爝而至於燎原在人君則居崇高之位操威福之柄無求不遂無令不行其泯此理亡此心則害尤不可勝言者故尤當於是乎用力焉使此心私欲淨盡天理渾全無一毫之夾雜不然一念之差或貽莫大之憂一行之失或貽無窮之禍私成於一己之微而患被乎天下之大欲遂於一時之暫而患及於百世之久可不懼哉王道之行與不行實判於此然非有大有為之資者不能克非大有為之才者不易克也臣所以有望於陛下也臣在山林伏聞陛下育德青宫巳負大有為之望嗣登寶位纍著大有為之實何者崇異端嬖近習則有以蠱此心而不能大有為矣陛下則能斥而逺之略無所疑殖貨利耽玩好則有以荒此心而不能大有為矣陛下則能棄而絶之略無所惜開幸門塞言路則有以昧此心而不能大有為矣陛下則能塞彼開此幸者空於一掃言者雖多而不厭雖泛而不罪躬勤政務宵而衣旰而食威權不至於下移躬行節儉削浮冗却貢獻帑藏不輕於一費其進退大臣也衆望所歸則尊以禮而任之專衆論所棄亦去以禮而潔其名其顧惜大體也廓如天之量而不惑宫壼之浮言下大事之議而俯從臣工之正論內外之禁嚴以杜奔競章服之錫謹以正等威遊心恬淡他無所好改過不吝惟是之歸此皆天生聖明之資真足以大有為者也天縱英武之才真足以大有為者也真足以純此心以施之政以體乎天使王道大行於時以復二帝三王之治以紹二帝三王之傳者也此臣所以有望於陛下也先儒程子謂學者不可讓第一等事與别人做王道乃人君第一等事臣所以勸陛下行之而竊以三䇿焉惟陛下留神其一曰定聖志其二曰一聖敬其三曰廣聖知夫所以必先於定聖志者蓋王道之不行係於君志之不定耳志不定則多以近小之見邪僻之説或從而搖之近小之見邪僻之説必曰王道聖人能行非聖人而行徒事虛名效必不著一物之遂且難况於萬物一家且難况於天下殊不知王道只在心與政之無私而已非高逺而難行者也人皆可以為堯舜况於人君一事之無私即一事之王道一日之無私即一日之王道一身一家皆無私即一身一家皆王道一國天下皆無私即一國天下皆王道惟其積纍也久則自感化之也致中和而臻位育之效至誠而極參贊之功堯舜在位則黎民於變而比屋可封四方風動而魚鳥咸若此豈聖賢徒侈是大言以欺人亦豈聖賢徒飾是虛美以誇世哉本之身心而成效大驗必至焉耳臣願陛下闢曠千古之獨見奮邁百王之大勇以先王之言為必可信以先王之道為必可法以二帝三王之治為必可復勿惑志權謀之詭術數之小而自陋其規模勿惑志刑名之慘黃老之虛而自眇其氣象心必志於渾是一團天理之存政必志於渾是一團天理之著一語在此一默在此志必不間於語默微事在此大事在此志必不殊於大小大廷在此深宫在此志必不二於隱顯聖躬自少而壯此志必不因之而少壯聖躬自壯而老此志必不因之而壯老臣前所言不蠱於異端近習等聖德此正王道中事又必持之也堅而不變其始行之也篤而必有其終不使如晉武之初儉後侈唐明之初勤後怠復遺笑於後人如是則陛下之志卓然有定而王道之行確然可必矣古語云有志者事竟成先儒程子云君志定而天下之治成臣不勝惓惓夫聖志既定則身心之功於是可致矣身心之功不過曰存養曰省察曰克治曰擴充而所以致其力者則在於敬也故臣欲陛下之一聖敬焉敬者二帝三王與千聖傳心之法王道之要也此心不能無靜時靜惟有理而無欲此時而敬以存養之則中有主雖萬感俱寂而所以知覺者炯然不昧矣此心不能無動時動則有理而有欲此時而敬以省察之則中有主雖萬感畢至而所以别善惡者幾微不爽矣省察而為私欲而為惡耶即從而敬以克治之或截斷於念慮之初或芟除於事為之際必使私欲無一髮之容省察而為天理而為善耶即從而敬以擴充之或達赤子之端以及四海或推乞人不屑之念以及萬鍾必使天理無一息之間先儒程子謂有天德者便可語王道其要只在謹獨此即天德也此即慎獨之功也臣知陛下天理之聖心與聖敬者固無夾雜操存固已純熟踐履固已篤實若無俟乎更加如是之功矣然古之聖王道已至而小心翼翼猶若未至德已盛而終日乾乾猶若未盛聖學既以此敬成其始亦以此敬成其終也臣願陛下玩味先儒朱子敬齋之針詳究諸儒釋敬之義而默會二帝三王能敬之實主此身以此心主此心以此敬身在此即心在此心必不離乎身事在此即心在此心必不離乎事靜以涵動之原必篤而益篤於燕間晦息之微動以妙靜之用必謹而益謹於綱紀絲綸之著寂必有感而遂通者在不隨寂而泯感必有寂然不動者存不隨感而紛必長體念之使此理活潑潑一如夜氣之澄必長提掇之使此心常惺惺一如出日之皎如是則臣前所言不蠱於異端近習等聖德不惟聖敬無始終之變而凡人主未萌之私欲如好殺如好武如好內如好察察以為明等患亦不復生於心而害於政矣臣欲陛下之行王道此實至要惟狂克念作聖惟聖罔念作狂臣尤不勝惓惓夫聖敬既一則作聖之功至矣所謂王道之本立矣而臣尤欲陛下之廣聖知何哉誠以王者之道即聖賢之學心與理知與行而已理具於心心存而理得是固當致力於敬然理散於事物一事有一事之理一物有一物之理必其知之真而後行之力自此身以及天下道其當然有在事物有不容己者理則所以然在事物有不可易焉此事此物此理是矣易之於彼事彼物則非此事此物當此時此理是矣此事此物此理易之於彼時則非在我則是易之於人則非在近則是易之於逺則非在常則是易之於變則非先儒所謂天然自有之中所謂亭亭當當恰好處苟非窮之造其極求之極其博則事物之來沓遝參差欲一一應酬斟酌之無毫髮之差悉肯綮之中難矣陛下之行王道以本之身心然其著之政事也非一端王政雖莫要於教養之二者然其為法也甚周而甚密焉必行之真能得乎民心而後可曰王者養民之政必行之真能化乎民心而後可曰王者教民之政如九經達道分田制祿後王亦嘗有舉此王政者矣何以終有愧於先王經濟之盛五禮六樂六德六行後王亦嘗有舉此王政者矣何以終有愧於先王甄陶之妙干城之禦儲峙之恤後王屢有舉此王政者矣何以終有愧於先王張皇賑救之良天地之利先王興之何以若巨若細比之後世也大而盡生民之害先王除之何以若巨若細比之後世也淨而均兼之亷恥喪而浮偽滋後世習俗日惡矣何以反諸王道之淳枝葉繁而根本蹶後世之學術日乖矣何以歸諸王道之正不寧惟是衆論盈庭甲曰可乙或有所徇曰不可此曰當重彼或有所蔽曰當輕其是否之的何以別羣臣布列大詐似信大姦似忠正人指姦人為邪而姦人亦指正人為邪其賢否之實何以明此其所以於此道當然之中尤不可不求其所以然之故而知之尤不可不真求之尤不可不博也陛下聰明睿智得之天賦所謂尤厚而靈者故於御極之初於臣前所言不蠱於異端近習等聖德一旦即行之奮發如雷厲而風飛如天旋而地轉非知之素真養之素厚而為天下之大知何以能此是以風聞天下在在歡舞非惟臣以為大有為之君天下莫不舉手加額以為大有為之君也非惟臣望王道之行天下莫不延頸跂足以望乎太平也臣願陛下因此聖知之巳明而推之於萬一之未明因此聖知之巳真而推之於萬一之未真益懋伊傅多聞學古之訓再味朱子格物致知之説自身心性情達之人倫物理質之六經羣書精矣益究之使精至矣益究之使至古今事變覽閲多必究治亂之原以昭興亡之鑒制度各物稽考多必究創建之意以為潤色之據人物臧否辨論多必即其行事究其心術以擴知人之哲事事有其要言言有其實必一一究之使一一足以為行王道之資毋徒如腐儒之務記誦炫辭章於口耳筆舌之間而巳又必益宏明目達聰之度益敦好善樂諫之誠不惟啓經筵以勸講而儒臣之端謹粗知王道者不問大小時賜引論所以涵養聖知者深不惟容臺諫以盡言而朝臣之端厚粗知王道者不問大小或限五品以上時賜延問則所以增益聖知者詳延引之時必俯垂溫顔戒以毋有避忌使之得以盡其情彼勳戚宦官陛下雖不假以權寵亦宜使之羣侍拱聽庶有以開其識而知所憚所以保護聖知者益切如是陛下合千萬古之知為一人之知合千萬人之見為一人之見盈天下之事事物物聖知無不真舉而行之天下無不決聖知無不博參而措之天下無不當敬固王道之要此又王道之急務也臣尤不勝惓惓抑臣此三䇿皆所以立王道之本者也皆所以用功於身心者也陛下必於此三䇿兼致其力而不可廢其一焉如志已定矣使敬或不一則志徒大而身心上尊德性之功欠無以充其大以全王道之體故先儒胡氏云志立於萬事之表即繼之以敬行乎萬事之內而先聖孔子云志於道即繼之以據於德依於仁者此也如敬已一矣使知或不廣則所守徒固而身心上道問學之功欠無以進其明以大王道之用故先聖孔子約顔子以禮必先博之以文而三聖堯舜禹一中之傳惟一必先之以惟精者此也陛下真足以大有為者功實在此真足以心天下之心使王道大行以復二帝三王之治以紹二帝三王之傳者功實在此誠不宜不於此兼致其力也昔朱子進正心誠意之説於宋帝或正以上所厭聞臣惟陛下決非厭聞之主也又王通獻太平十二䇿於隋帝或誚通不智臣惟陛下無使臣復蹈通之誚幸甚幸甚為此具本親賫謹具奏聞奉聖旨該部知道欽此添進日講并東宫性理等書張元禎臣蒙召纂修叨充日講仰窺聖德髙廣聖學深博見之於事天勤民孝先奉慈與夫紀綱法度之施語默動靜之微一惟典禮之是遵誠敬之是篤兼之聲色燕遊絶無所好頥神適情惟琴惟書萬幾雖總攬獨斷而延接大臣博訪公論不矜主已其尤足為宗社生靈之大慶者仁愛欽恤之念常切不忘是以天變雖纍可懼而旋即消外患雖屢可虞而旋即弭此我皇上誠有第一等帝王之資足以致第一等帝王之治而加意於第一等帝王之學者也然聖學有大本焉本立則道自充聖治有大要焉要舉則效自著欲立大本舉大要非心學理學之明則不可得也心學與理學體用相須初非二致心學以存心言心存則理益精理學以窮理言理窮則心益睿二帝三王所以隆治化而上下與天地同流者實自此始此即帝王第一等之學也其説散見於五經四書巨細精粗固甚明白但求其直指根源提挈指要使一覽即知其槩則莫有如宋大儒濓溪周子之太極圖橫渠張子之西銘而洛陽程子定性之書新安朱子敬齋之針則用功之尤切者也皇上學無所不究書無所不閲其於此學此書留神乎聖覽妙徹乎宸𠂻者久矣然問學益講則益明義理一溫則一新此古昔聖帝明王所以貴乎致緝熙之功求多聞之益也伏乞皇上日講之時命內閣將太極圖等書同周易大學衍義以次分委臣等進講或每月每旬專定一日或二日獨命臣講解庶幾臣等一得之愚以少禆聖明萬分之一焉所以然者聖治隆於唐虞下至周公而不復聖學傳於孔子下至孟子而遂絶皆由此心學理學之不明也臣請得而究言之所謂心學者非如異端之置心於虛無寂滅也必於日用之間細驗真心之發如見孺子入井見牛觳􅑌之類由是推而究之使皆油然而不可遏沛然而無不達如是而後真為心學也所謂理學者非如俗儒之費功於記誦詞章也必於講學之際務造真知之地如聞談虎傷者之容色獨變然使凡身心事物皆有以究其所當然而不容已與其所以然而不可易於是而後真為理學也然此心此理又必靜而養之於不睹不聞之頃默而存之於無形無聲之表使其功益嚴益密而無少間隙其本益深益厚而無少滲漏庶幾心與理相涵體與用相資其所發無乎不當其所知無乎不精但見此心此理在日用間常潑潑而無滯無虧常惺惺而不昧不息好善則如飢之必欲食渴之必欲飲惡惡則如水之必不敢蹈而恐溺火之必不敢近而恐焚如是則以宰制天下之萬物應酬天下之萬變渾是天理而私欲淨盡吾心亦天地之心吾化一天地之化即程子所謂有天德者便可語王道也聖賢千言萬語其大本大要皆不出此而太極圖等書實具見其概者焉夫聖治雖止於周公而不復而聖學則幸得周程張朱四子逺紹孟子而復傳聖學實聖治所本未有聖學傳而聖治不可復者也皇上既有帝王第一等之資復能加意於帝王第一等之學則致帝王第一等之治何難之有臣伏聞皇上每當萬幾之暇焚香默坐靜養天和此正程子以靜坐為善學朱子以調息而收心之意其太極等書主靜主敬之説亦緊切在是皇上於帝王第一等之學已有本而得其要矣如因臣等進講前書更紬繹熟復優遊厭飫則聖學於此心此理愈致廣大而盡精微愈極髙明而道中庸是第一等之學昔在帝王今在皇上矣程子嘗以第一等事不可讓與別人做孟子謂人皆可以為堯舜成覸謂彼丈夫也吾何畏彼哉乞賜俞允即將前書添講臣不勝惓惓抑臣又幸侍春宫講讀得以仰瞻皇太子殿下天稟英明言動溫恭又有以上窺皇上修身儀家之化著於大綱大倫如此竊惟自天子至於庶人行莫大於孝孔子自謂行在孝經又三代盛王太子與秀民同入小學亦同入大學不惟讀書而又誦詩蓋學雖有大小小學實大學治國平天下之根本其讀書欲以知政事而誦詩則善者可以興起善心惡者可以懲創逸志而感化人心為尤切今孝經詩經小學俱有朱子考正集傳等書而朱子感興詩及訓蒙詩亦皆緊要臣伏見殿下逐日講讀尚書論語固足以啓沃睿𠂻養正作聖然復逐日習字一紙非帝王所急似為妨工欲乞皇上那殿下每日習字工程將孝經詩經并小學等書分日輪流同尚書論語講解不必如尚書論語溫背止是審聽默識每月三次容講讀官將已講解過者挑誦一二十字以見殿下之留心其習字亦不可廢每日暇時止作數十字不致生疏可已但小學詩經篇章頗多帝王之學惟在知要乞命內閣將小學詩經節取有關於綱常治亂民生艱苦之大者及真德秀大學衍義所載孝言孝行附之孝經同委臣等講解庶幾殿下聽覽不煩而事皆有益仍乞講解之時命殿下左右伴讀亦皆執書旁聽殿下退居不時使之講説賜之問辨詩則不時使之陳誦賜之歌咏如此則殿下不必自誦自讀而聞之自熟矣况詩之歌詠抑揚有可感動者寓焉此昔魏武公使瞽矇朝誦詩以致勸戒之意也此於殿下睿德補養非小夫皇上既加意於帝王第一等之學皇太子殿下乃天下臣民萬萬年之所屬宗社萬萬年之所託誠宜亦進第一等帝王之學用能以聖繼聖而綿第一等帝王之治其孝經詩經小學等書亦皆心學理學之所在者第一等帝王之學此實其基也乞亦賜俞允即將前書添講臣不勝惓惓然臣因是而復有獻焉詩即今之歌曲古之樂章與載事之書不同吟咏抑揚實有感動人心處故孔子曰興於詩又曰詩可以興今詩經三百篇孔子皆嘗絃歌之伏聞皇上深達制作之妙郊廟音樂一一是正如兹因殿下講誦擇其有關風化之大如二南關雎邠風七月之類被之管絃宫中燕間時奏焉其古雅平淡之音豈惟有助於頥神養性而已哉成周盛時聲詩為樂用之閨門用之邦國用之鄉人以化成天下此亦治道所係皇上能留神焉幸甚幸甚嗚呼今天下賦役繁重民窮財盡水旱相仍盜賊不息士大夫大道罕聞廉恥不恤貪暴矯激逢迎奔競習以成風下至民庶多骨肉相殘誇詐相勝薄父母而厚妻孥競奢靡而甘刑憲此皆世道風俗之可憂者皇上方兹大新庶政痛革宿弊臣顧袖手旁觀不能陳其一二而乃勸講前書不幾於迂而不切臣切惟此正似緩而實急似輕而實重乃世道之大機軸大關涉也皇上誠能加意使真心真知之形於萬幾者渾是天理無或遏無所蔽焉而又責任賢輔彌綸調燮與之大有為則幹旋轉移猶風偃草其致帝王第一等之治真易易耳何民疲俗惡之足憂哉臣是以不勝惓惓為此謹具題親賫以聞伏候敕旨名臣經濟録卷八
