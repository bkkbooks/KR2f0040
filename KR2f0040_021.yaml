body:
  text: 名臣經濟録卷二十一明黃訓編户部給賜黃冊屯田題乞恩分豁土地事彭韶該户部奏差臣等前去直𨽻真定府公同㑹勘錦衣衛帶俸指揮同知周彧等所奏地土緣由除另行回奏外臣等再昧死言伏聞為臣以不欺為本慮事以大體為先昔孟嘗君使馮歡收債於薛歡以賜諸民漢景帝遣田叔按梁事還悉去獄詞勸上勿問計二人之心豈不欲以順事為恭哉顧以大體所在不敢茍從是乃所以為恭也臣等鄙賤豈能少希於萬一然區區懇切之意誠有望於陛下焉且以臣等所勘真定地土言之真定在堯舜時為冀州之域其賦為第一等或雜出第二等說者以為如周官田一易再易之類蓋以其地有間嵗一收者有間二嵗一收者所以賦有不同則是未嘗逐畝定賦而一畝必兼數畝之地明矣我太祖皇帝於洪武二十八年户部官節該欽奉聖㫖百姓供給繁勞已有年矣山東河南民人除已入額田地照舊徴科外新開荒的田地不問多少永逺不要起科有氣力的儘他種欽此欽遵宣德六年本部官又奏北京八府供給尤多欽䝉宣宗皇帝准令照例是祖宗之心即堯舜之心也以此真定所屬武强等縣新開地土一向不曽增科至天順二年太監韓諒奏討武强縣踏勘得無糧地五百頃三十五畝䝉英宗皇帝欽撥一百頃與韓諒外有四百餘頃仍舊與民耕種不曽科糧是英宗皇帝之心即祖宗之心也後因廣寧侯家人劉聰等纍年攪擾民間方將前地并韓諒還官地減輕起科今周彧又奏求前地有司不能明白敷奏再量出無糧地七十餘頃蓋其地間有多餘故也然地雖間有勢難盡量臣等不敢欺蔽請陳其實頃者親詣本縣見其地有髙阜者有低窪者有平坦磽薄者天時不同地利亦異且如亢旱則低處得過而髙處全無水潦則髙處或可而低處不熟沿河者流徙不常鹻薄者數年一收截長補短取彼益此必須數畝之地僅得一畝之入是以堯舜行錯法於前我祖宗許開種於後良為此也即今彼處人民追賠馬匹起運糧草砍柴人夫京班胥皂等項一年約有數般差役以致丁丁皆受役之人嵗嵗無空閒之日所深賴者顧戀地業盡力耕種以取給朝夕而已今若一畝只量與一畝餘皆奪為閒地則仰事俯育且無所資其於糧差何暇復計臣知其非死則徙耳自古立國皆重根本今真定近在畿甸理宜加厚此臣等所謂不可盡量者也而戚里功臣之家錦衣美食與國咸休但能存心忠孝自然富貴兩全奚待與民爭艱食之利哉况聖朝卜世無疆法當垂後土地有限而求者務多亦恐終不能有所應付也臣等到彼百姓扶老携幼遮道哀告臣等不覺自失不忍重擾取具供結在官外伏望陛下逺以堯舜為心近以祖宗先帝為法所有賞賚之施聖恩區處外其他地畝乞特憫其祖宗開種艱難念其子孫衣食所托量加寬恤庶幾民間知有生生之樂沐浴太平歌頌罔極則本固邦寧而臣亦咸休無窮矣臣等遵奉聖訓豈敢偏向所向者祖宗萬世之仁事關大體而巳不勝犬馬惓惓之至緣臣等不曽依畝丈量合當有罪謹題請㫖成化五年九月二十二日欽奉聖㫖這地覆勘明白朝廷自有處置這厮每既承差委都稱不曽丈量妄引戰國時事自比但知邀名不顧方命好生不知大體錦衣衛拿來問欽此欽遵乞正谷大用罪林俊臣等今早文華殿進講之後伏䝉特賜宣召得親御座商略大政仰瞻天顔和粹溫潤俯聽玉音從容委曲真大聖之資帝王之度臣等何幸得備任使而遭此休明之運荷此希闊之恩退至內閣更相稱抃以為有君如此何忍負之竊惟聖明所喻御馬監草場地土錢糧仍聽本監管理原差踏勘太監李璽等免其提問俱已仰遵聖意票擬施行惟谷大用竊弄威權蠱惑先帝假勘地之名混占産業莊田至一萬有餘頃侵欺子粒官銀至百萬有餘兩利歸私室怨及朝廷情罪深重神人共怒必須從公究問然後國法可彰聖諭以為地土乃祖宗之舊制然額外有所侵占以剝害小民致其嗟怨則非祖宗設立之初意也聖諭以為踏勘奉先帝之成命然歷年有所侵欺以饜飽奸貪私於一已則先帝亦不得而知也自陛下即位以來查勘見於詔㫖官已纍遣嵗巳三更今草場之畍額既明大用之惡狀益著若不明正其罪何以警戒將來况今水旱相仍人民十分饑困追其所侵贓銀之半足以少備賑濟之需與其積於一家以利蠧國之盜臣孰若散於窮民以溥朝廷之恩澤伏望俯納臣等以正清朝之法將谷大用提問追贓則可以平人心之怨憤可以彰天討之至公天下幸甚臣等幸甚臣等無任忠懇激切之至謹具題查處皇莊田土疏節該户部題先因給事中底藴奏稱正德年來奸猾無藉之徒揑稱湖蕩等項無人之地投獻近幸勢要之官具奏建為皇莊臨近居民被其混賴侵占乞行撫按等官查勘等因已經該部議擬題奉欽依轉行各該撫按衙門委官親詣各該皇莊處所從公查勘通行去後續因傳奉事理該部執論又看得查勘事理干係重大必須另差科道部屬官員假以事權公同查勘等因題奉欽依是畿內根本重地祖宗朝屢有優恤禁例近年以來奸猾無藉之徒妄將軍民田土指作空閒設謀投獻管莊官校人等因而乘機侵奪藉勢混賴橫征巧取百般尅害利歸羣小怨在朝廷以致軍民失業盜賊生發朕在藩邸已知其弊覽奏深用惻然便寫勑差科道部屬官員各一員前去㑹同巡按御史親詣查勘但自正德元年以後朦朧投獻及額外侵占的盡行查出各依擬給主召佃管莊人員盡行取回著管屯僉事兼管該徴租稅照依原定則例折收銀錢原係皇莊的解部類進係皇親功臣的赴部關領不許自行收受亦不許佃户人等拖缺欽此節該部院等衙門題奉欽依差臣等前去查勘臣等切照皇莊及皇親功臣各項莊田所占各府州縣地方查得正德十一年以前已有三百八十餘處每處地土動計千百頃中間侵占混奪之弊積習巳非一朝為厲之階實起於奸人欲盡規地利以媚朝廷其流之弊則壞於勢家欲奪民産以肥私室其在宫闈者則中官禁卒旁午肆出而郡縣恣其騷擾其在勳戚者則豪奴悍僕肆行威斷而官府莫敢誰何雖嘗節經差官查勘終於患害不除蓋由私人貴戚憑藉寵靈猾少奸徒盤據窟穴是以積垢宿蠧莫可爬梳合勢朋奸動行沮撓此實纍朝弊政至於先朝而極畿輔軍民剝膚摧髓之害莫有甚於此者也兹者伏荷皇上至仁體物軫念民窮故因言官建議亟䝉俞允之音繼因該部執奏特降諄切之㫖既將管莊人員盡數取回復禁皇親功臣不許自行收受厲階禍本一旦剗除中外人心不勝歡慶但先經該部具題備行撫按衙門去後續因差科道等官止令前去㑹同彼處巡按御史而於巡撫衙門顧未之及臣等愚昧以為鋤擊豪强則於巡按之體為切至于撿核田土則於巡撫之職為宜必須彼此㑹同方於事體穩便且順天等八府雖曰近在畿甸然地方遼闊周延千里故撫按付以四人分理今皇莊并各項莊田所占之地幾遍八府以正德十一年以前所有計之無慮九萬餘頃至於近年以來嵗增日益踰鄉跨邑無處無之且先年祇因一二處奏辨告爭朝廷差官亦不過一二處踏勘况且經年閲月方得事竣今舉列郡皇莊之多百年積習之弊付臣等清理是宜舉措之間要必先有次第訪得各該撫按官員見今巡歷各在一方相去隔逺卒難期㑹合無查照該部原擬先行撫按衙門遵照先今節奉欽依事理一面委官分投親詣各處皇莊逐一查出四至假落并原額頃畝數目及審有無侵占混賴等弊開略節聽候臣等領勑前去親詣各該地方備出告諭嚴加督責密行體訪中間或權豪勢要沮壞行事或侵奪隱占積久難明或奸猾刁徒乘機混賴或貪官餌賄枉法欺弊或冗官玩法稽於奉行俱聽臣等㑹案施行應拿問者徑自拿問應參奏者指實參奏如此則先後有序而施為不至於叢脞輕重有體而事理亦得於周詳尤望天語丁寧載之勑諭令各該地方官員文職自知府以下武職自指揮以下俱聽臣等委用公勤幹濟者許臣等薦聞闒冗廢事者許臣等劾治庶足以振起庸常警飾怠傲而事乃克濟矣緣係查理皇莊事理未敢擅便謹題請㫖查勘畿內田土疏節該欽奉𠡠諭順天等八府係是畿內根本重地祖宗朝纍有優恤禁例近年以來奸猾無藉之徒妄將軍民田地指作空閒設謀投獻奏改皇莊管莊官校人等因而乘機侵奪藉勢混賴橫征巧取百般尅害以致軍民失業朕深惻然兹特命爾與山西道監察御史樊繼祖户部主事張希尹公同查勘先行撫按衙門選委官員分投查審明白爾等即便前去㑹同各該撫按官照依户部先後題准事理親詣各府地方用心覆勘凡正德元年以後各項莊田但有朦朧投獻及額外侵占者盡數查出各依擬給主召佃管莊人員盡數取回仍著管屯僉事兼帶督理該徴租稅照依原定則例折收銀錢原係皇莊者解部類進係皇親功臣者赴部關領不許自行收受亦不許佃户人等拖缺其莊田內有成化𢎞治年間奸徒投獻者一體查勘各該府州縣衛所衙門官員人等文職自知府以下武職自指揮以下但有事體相干者悉聽督委調用公勤幹濟者從公旌舉敢有玩法廢事及軍民勢豪人等不服拘管恃頑沮撓或奸猾刁徒乘機混賴或貪官餌賄枉法欺蔽者五品以上并勳戚指名參奏六品以下徑自拿問重治中間事情有該載不盡凡有益於國家有利於軍民者悉聽㑹同從宜議處輕則徑自施行重則具奏定奪爾受兹委任須秉公持正悉心查理務使積弊盡革官民兩無虧損毋得循情畏勢徒具虛文自貽咎責爾其慎之慎之欽此臣等除欽遵外先為前事准兵科等衙門關劄該户部左侍郎秦金等題查得先為開讀事伏覩詔書內一欵京通二倉水次倉皇城各門京城九門各馬房倉場各皇莊但係正德年來額外增添內臣司禮監照𢎞治初年例查奏取回欽此又該禮科給事中底藴奏為應詔查處皇莊事奉聖㫖該部看了來說欽此該本部議擬題奉欽依轉行各該撫按衙門選委官員查勘去後既而兵部又稱差管皇莊內臣官校數多移咨勘報等因到部臣等益加駭栗竊惟京師者天下之本而畿甸者又京師之輔也畿甸之民安則天下之民舉安歷觀前代之主無不以京師為重者我太祖髙皇帝以應天等處為興王之地特將夏稅不時全免太宗文皇帝建都北平恪守成憲撫綏畿甸安戢人民列聖相承益隆無替夫何正德年來奸猾無藉之徒多將畿內民田投獻左右近幸之人奏為皇莊况管莊內臣又憑城狐社鼠之勢而收租官校即係設謀投獻之人出入往來肆行無忌千方百計巧取橫征小民無所措手有司莫敢誰何而皇親駙馬功臣人等莊田亦皆散布其間乘機侵奪借勢混賴往往有之幸賴陛下聖明入繼大統舉百弊而一掃之故有前項裁革管莊內臣之詔有以仰見陛下强本制末居重馭輕之盛心矣旬月之間乃復有此傳奉復立皇莊責令私人管理不意聖政維新之初乃復有此厲民之漸伏望陛下垂念畿輔根本重地將近日傳奉皇莊管店事理收回成命又看得查勘事宜干係重大必須叧差科道部屬官員假以事權公同查勘庶幾克濟等因題奉聖㫖是畿內根本重地祖宗朝屢有優恤禁例近年以來奸猾無藉之徒妄將軍民田地指作空閒設謀投獻管莊官校人等因而乘機侵奪藉勢混賴橫征巧取百般尅害利歸羣小怨在朝廷以致軍民失業盜賊生發朕在藩邸已知其弊覽奏深用惻然便寫𠡠差科道部屬官各一員前去㑹同巡按御史親詣查勘但自正德元年以後朦朧投獻及額外侵占的盡行查出各依擬給主召佃管莊人員盡數取回著管屯僉事兼管督理該徴租稅照依原定則例折收銀錢原係皇莊的解部類進係皇親功臣的赴部關領不許自行收受亦不許佃户人等收受拖缺不還欽此欽遵隨該臣等題為查處田土事奉聖㫖是先著撫按衙門選委官員上緊分投查審明白你每還去㑹同各該撫按官親詣覆勘務使積弊盡革官民兩無虧損户部知道欽此欽遵等因到部備行前來臣等除遵奉勑諭親詣順天等府州縣㑹同前巡撫順天等府地方都察院右副都御史李昆今接管右副都御史孟春并巡撫保定府地方都察院右副都御史周季鳳前巡按直𨽻監察御史王琳宋鉞今接管監察御史郭楠選委官員分投親詣各該地方拘集地鄰并該圖里老人等嚴加查勘去後續據順天等府經歷司各將委官王槐等查勘過各該州縣原額莊田并投獻侵占額外軍民地土各頃畝數目及取具業主召佃人户退認供結領狀緣由造冊呈繳前來臣等覆勘相同除將成化等年奸民馮大經等投獻侵占地土隨將斷給原主管業有罪人犯案行該府提問依擬發落未到者照提歸結及將查勘過緣由備造文冊奏繳外切照臣等猥以菲材誤蒙委任奉命以來按行八府閲歷三時仰布明恩俯詢民瘼凡係成化𢎞治正德年間皇莊及皇親功臣莊田但係奸民投獻勢要侵占者逐一盡數查出給主召佃還官歸民一切遵照勑㫖施行所據查勘過順天等府地方各項莊田地土共計二十萬九百一十九頃二十八畝退斷過侵占民地共計二萬二百二十九頃二十八畝數十年來勢家豪奪隱占之弊一朝始得清眀數千里內小民流離困踣之苦一旦稍得蘇息閭閻之下莫不歡欣鼓舞歌頌太平此實恭賴我皇上如天之仁好生之德思王業之本念小民之休維新之政莫有大於此者宗社萬年之基端在是矣而臣等何幸得以此藉手獻忠於陛下但臣區區犬馬之忱尚有進於是者不敢不極為陛下陳之惟陛下俯垂聽焉臣等伏聞農業者天下之本土地者民食之源古者四民各有常職而農者居十八九故衣食易居而民無困苦故周官太宰以九職任萬民而首曰三農大司徒頒職事於邦國都鄙以登萬民而一曰稼穡自古帝王之治天下蓋莫不以土地農人為重也三代之制不可復已自秦人廢井田之後田不在官而在民是以貧富不均榖祿不平一時識治體者罔不興慨歷代以還英君賢佐凡有志於人民愛物者亦莫不隨時漸為之制如限田之議均田之法口分世業之制要皆良法美意而一時人賴其慶至今猶可稱述洪惟我太祖髙皇帝立國之初檢核天下官民田土徴收稅糧具有定額乃令山東河南地方額外荒地任民儘力開墾永不起科至我宣宗皇帝又令北直𨽻地方比照聖祖山東河南事例民間新開荒田不問多寡永不起科至正統六年則令北直𨽻開墾荒田從輕起科實於祖宗之法略有背戾至景皇帝尋亦追復洪武舊例再不許額外丈量起科至今所當遵行所以然者蓋緣北方地土平夷廣衍中間大半潟鹵瘠薄之地葭葦沮洳之場且地形率多窪下一遇數日之雨即成淹沒不必霖潦之久輒有害稼之苦祖宗列聖蓋有見於此所以有永不起科之例有不許額外丈量之禁是以北方人民雖有水潦災傷猶得隨處耕墾以幫助糧差不致坐窘衣食夫何近年以來權幸親昵之臣不知民間疾苦不知祖宗制度妄聽奸民投獻輒自違例奏討將畿甸州縣人民奉例開墾永業指為無糧地土一槩奪為已有由是公私莊田踰鄉跨邑小民恆産嵗朘月削至於本等原額徴糧養馬産鹽入站之地一例混奪權勢橫行何所控訴産業既失糧稅猶存徭役苦於併充糧草困於重出饑寒愁苦日益無聊展轉流亡靡所底止以致强梁者起而為盜賊柔善者轉死於溝壑其巧黠者則或投充勢家莊頭家人名目資其勢以轉為善良之害或匿入海户陵户勇士校尉等藉脫免徭役以重困敦本之人凡所以蹙民命脉竭民膏血者百孔千瘡不能枚舉是豈古今帝王治世之道是豈祖宗列聖立國之法臣等查得各宫莊田祖宗以來未之有也惟天順八年以順義縣安樂里板橋村太監吉祥抄沒地一處撥為宫中莊田其地原額一十頃一十三畝初吉祥占過軍民地二十四頃八十七畝共三十五頃立莊今次查勘又占過民地四十頃見在共七十五頃此則宫闈莊田之始而數十年間侵占之數過於原額已七倍矣舉此一處其他可知至成化間惟增寶坻縣王甫營莊田一處原係㑹州衛草場𢎞治間止增豐潤新城雄縣莊田三處至𢎞治十八年十月乃孝廟升遐之後先帝踐阼之初一月之間建立皇莊七處曰大興縣十里鋪皇莊曰大王莊皇莊曰深溝兒皇莊曰髙密店皇莊曰石婆營皇莊曰六里屯皇莊曰土城皇莊自此之後設立漸多而皇莊之名始著則其在昌平州則有蘇家口皇莊在三河縣則有白塔皇莊在真定寧晉縣則有鋪頭村皇莊大劉村皇莊在隆平縣則有大灰窑皇莊在新河縣則有仙汪莊皇莊在南宫縣則有南莊村皇莊此皆正德元年之所設也又東安縣則有南葛里皇莊寶坻縣則有李子沽皇莊通州則有神樹皇莊武清縣則有灰蝸口皇莊王慶陀皇莊靜海縣則有四當口皇莊此皆正德二年之所設也至正德四年則立大興縣三里河皇莊二處正德五年則立六里屯皇莊二處正德七年則立武清尹兒灣大直沽皇莊二處正德八年則立昌平州樓子村皇莊靜海縣衛河兩岸皇莊青縣孫兒莊皇莊保定府安州騸馬廟皇莊清苑縣閻莊社皇莊正德九年則又立安肅縣龍化社皇莊數年之間設立皇莊如此之夥共計占地三萬七千五百九十五頃四十六畝然皇莊既立則有管理之太監有奏帶之旗校有跟隨之名下每處動至三四十人其初管莊人員出入及裝運租稅俱是自備車輛夫馬不干有司正德元年以來權奸用事朝政大壞於是有符驗之請關文之給經過州縣有廩餼之供有車輛之取有夫馬之索其分外生事巧取財物又有語言不能盡者及抵所轄莊田處所則不免擅作威福肆行武斷其甚不靖者則起蓋房屋則駕搭橋梁則擅立關隘則出給票帖則私刻關防凡民間撑駕舟車牧放牛馬採捕魚蝦螺蚌莞蒲之利靡不括取而鄰近田土則展轉築封堆包打界至見畝徴銀本土豪猾之民投為莊頭撥置生事幫助為虐多方掊刻獲利不資輸之宫闈者曽無什之一二而私入囊槖者蓋不啻什八九矣是以小民脂膏吮剝無餘由是人民逃竄而户口消耗里分減併而糧差愈艱卒致輦轂之下生理寡遂閭閻之間貧苦到骨道路嗟怨邑里蕭條若使此弊不革將見數十年後人民離散土地日蹙盜賊蜂起奸雄藉口不知朝廷何以為國此可為太息流涕者也兹者幸遇皇上天縱仁智入繼大統曩在潜邸已知其弊即位之初首下明詔將管莊人員盡數革回乃者復采大臣之議委臣等以查勘前項地土草萊之下始得披雲霧而覩青天脫水火而就袵席矣但伏讀𠡠㫖猶有曰係皇莊者解部類進臣等竊有疑焉然未經查勘之前臣等雖知創設之由為害之實不敢冒為陛下言之今以臣等前所披瀝實出見聞之真陛下固當惻然於中亟圖所以處之矣而况陛下聰明廣覽蓋已先得於龍潛之日又有不待臣等諄諄者乎臣等竊謂普天之下莫非王土有若曰百姓足君孰與不足且天子藏富於民今四海九州之貢賦山林川澤之物産凡所以納之司農輸之內帑何者而非所以奉陛下一人者乎孟子曰尊親之至莫大乎以天下養又何而非所以奉重闈慈闈四宫者乎祖宗以來宫闈一切供奉自有成規况九重之內錦衣玉食何欲不遂顧屈萬乘之尊同於匹夫以侵畎畝之業辱宫壼之貴雜於閭閻以爭升斗之利其何以示天下訓後世也哉且自古人君未嘗有此漢宣帝嘗以池籞未御幸者假與貧民漢元帝嘗以公田及苑振業貧民未聞占民田土以為皇莊也且皇之一字加於帝后之上為至尊莫大之稱今奸佞之徒假之以侵奪民田則名其莊曰皇莊假之以罔求市利則名其店曰皇店又其甚者假以阻壞鹽法則以所販之鹽名為皇鹽即此三事言之足以傳笑天下貽譏後世仰惟陛下躬堯舜之資舉文武之政何不一切掃除之乎若此三者名跡猶存實足以纍陛下大有為之志甚非臣等所望於陛下者也如䝉聖慈俯察愚衷深惟國本乞勑該部查照臣等勘報文冊將在京負郭大興縣等地方各宫莊田原不係占奪民田不滿數十頃者請一切改為各宫親蠶厰公桑園等項名額勑令有司種植桑柘以備宫中蠶事蓋古者天子親秉耒以耕后妃親桑以供郊廟之服後世漢文帝景帝皆詔皇后親蠶以供祭服為天下先乃者改元之春臣等恭覩陛下躬耕籍田既以身先天下之農矣兹者嘉遇皇后殿下配德之初正位之始所宜躬履勤儉以率天下而親蠶之禮實為我朝百年缺典誠願陛下大建中興克配皇祖特勑禮部詳考禮經月令祭統祭義等篇斟酌古今具皇后親蠶儀以進待明年季春之月擇日舉行播告天下此誠帝王之髙致后妃之盛節閨門風化之首而王業之根本也將其風聲感動德教流行男勤於耕女勤於織海內富庶之效不患不文景若矣而况舉曠代之典又足以垂萬世之美談也哉其餘一應莊田逺在各府州縣動以千百頃計者臣等願陛下一切弛以利民或盡勒歸户部造入版籍令民照舊輸稅以為在官地土不必更屬宫闈然後陛下明降諄切之㫖榜示中外盡削皇莊及各宫莊田之名一洗四朝之弊永永垂百代之休萬一以為宫中常年供用不能頓缺敢乞著為定例令户部每嵗進納上供銀兩若干分進各宫以克支用却為光眀正大不傷大體何必虛受莊田之名重小民之害而示天下以自私自小也哉昔賈誼勸漢文以興起禮樂而文帝謙讓未遑千載之下賢者惜之臣等仰見陛下聰明仁聖至性天成堯舜之事蓋所優為此事甚順而易特在陛下少留聖意轉移間耳若舍此不圖臣等以為不惟不能免千古之惜殆恐不能不貽宗社將來無窮之憂伏願陛下亟召輔弼大臣相與熟講而力行之臣等不勝大願至於皇親功臣欽賞莊田臣等復有一得之愚又敢不重為陛下言之查得洪武初年凡公侯駙馬伯祿米皆給官田令量其原定官糧私租之數仍主佃分數收取至洪武二十五年令公侯伯祿米皆論功定數舊賜田還官竊謂洪武初年乃聖祖甫定天下干戈百戰之後海內人民喪亡略盡土地有餘彼時封為公侯伯者又皆一時翊運佐命元臣比與今之戚畹封拜者萬萬不同况以有餘之地賜有功之臣其在聖祖宜乎大析土壤以施恩賚亦無不給胡乃給祿之後而原賜田土亟令還官誠以土地乃農業所資實為國家之大本而人君所賴以為國者也蓋古之有田祿者各食其田之所出以為世祿今既官給之祿奈何又與之田是重出而過制矣此聖祖之意也然功臣之中勳勞大者至今仍有莊田不過數家臣等查得管業已定侵占亦少惟是近年以來皇親侯伯憑藉寵昵奏討無厭而朝廷眷顧優降賜豫無節其所據地土多是受人投獻將民間産業奪而有之如慶陽伯受奸民李政等投獻奏討慶都清苑清河三縣地五千四百餘頃如長寧伯受奸民魏忠等投獻奏討景州東光等縣地一千九百餘頃如指揮僉事沈傳吳讓受奸民馬仲名等投獻奏討滄州靜海縣地六千五百餘頃以致被害之民搆訟經年流離失所甚傷國體大失羣心今臣等仰遵勑㫖既已退給明白然非賴聖明在上地方罹害何有窮已今雖亟加扶救而傷殘已多伏望陛下特勑該部除功臣家外將纍朝皇親侯伯受賜莊田據臣等勘報文冊通融數目多寡定為中制量給養贍其過多者一切裁損以還之官要使恩澤適均將來可繼不然國家萬萬年無疆之緒皇親駙馬日見增加彼此援例爭相希恩必欲各滿其願雖盡割畿甸之田有所不給是豈可不為國家久逺慮哉惟陛下其熟計之再照臣等查勘過各項田土數目並是退給侵牟開豁荒鹹核實之數比與先年妄報投獻奏討原數不同乞勑該部查照一以新冊為定移文所司出給由票執照以便徴收再照祖宗纍朝儘民開墾永不起科之例歷年滋久上下蔽於不知是以奸民敢於投獻勢家昧於奏討及訪得山東河南等處奉例開墾之地亦多近年以來亦有奸猾之徒往往投獻王府及諸勢要之家其視畿甸之弊大抵相同合無伏候𠡠㫖將皇莊及各皇親莊田大賜處分之後一併出榜頒示該省地方仍行撫按衙門一體差官查勘再乞通行天下今後再有奸民故違例禁將民間田産投獻王府及諸勢要之家占奪至百頃以上者處以極刑全家移出化外如此則法重而人不敢犯恩溥而民得安生臣等區區忠悃言巳盡矣意已竭矣所冀陛下丕承祖宗萬年鞏固之基聿興中興千載熙明之運念京師根本之重知小民稼穡之艱厲精圖治約已裕民則太平之治可坐而致矣臣等冒昧進言無任隕越伏惟陛下留神省覽斷而行之宗社幸甚生民幸甚題為撫恤屯田官軍事方日乾一曰召佃看得各衛屯種軍餘近年以來苦於賠補相繼逃亡拋下田畝荒蕪間有暫荒之田易於開墾非無人領佃也但以我朝屯法每軍一名給田五十畝其田四散一軍之田或跨數墟一墟之田又分數處屯官旗甲不知事體或有鋤動一二畝者便率全糧彼欲兼領又患窵逺孰肯貪一二畝之便而任數十畝之勞圖數畝之利而賠五十畝之稅哉人視荒田畏如蛇蠍以致荒者日荒賠者愈賠患不得息自非朝廷寬恩停稅設法召佃則此荒田迄無可耕之期矣今南京户科等衙門給事中林士元等官奏要將拋荒屯田不拘軍民僧道之家聽其各擇所便開耕具告本衙門計畝定稅給帖承佃免其二年租稅不許管屯官分外科擾俟三年成熟方許徴納深為有見䝉本院備劄到職竊惟前項荒田零丘隔逺逺則不便於全領荒則未望其收成非聽令擇便則人苦於四散而不肯佃非量停租稅則人憚於賠糧而不敢佃即今勘得南京和陽鎮南等衛近年拋荒田畝共計三百三十頃九十七畝三分三釐四毫九絲儘堪耕闢乞聽本衙門多方招人承佃不拘全分隨其所便開坐畝假告領户由開墾耕種佃五畝者納五畝之稅十畝者納十畝之稅非見佃之田一毫不許妄徴量寬二年稅糧以為牛具種子之費俟三年成效一體徴納若成熟之後雖有新軍補役逃户復業亦不許爭告待十年之後另為區處如無補役復業之軍則永為已業如是則承佃之人既不苦於全領又不患於賠糧雖一二年間未必有收亦肯捨力向前以圖長逺之利近荒之田刻期可熟稅額不患於虧缺矣一曰蠲逋查得南京和陽等衛拖缺嘉靖四年等分屯糧共一萬一千五百石各衛掌印并管屯官員俱各住俸至今參照前項屯糧不係災傷應免之數各官追徴不完合應住俸但見今勘得各衛拋荒田地動經數百餘頃訪得前項無徴稅糧每年俱係各户包補如豐成之際猶隱忍代賠至薄收之年僅可自完本户錢糧誰肯鬻妻典子為人賠納此蓋拖缺之由也今各官俸糧住支已久彼拖缺數十者猶望豐成處置賠足如南京和陽一衛缺下五千餘石縱得豐年亦無賠納之計各官俸糧再無關支之望矣今南京户科等衙門給事中林士元等官奏要將各住過俸糧通行扣算抵補嘉靖六年以前拖缺屯糧之數其有未足待二年之後財力稍舒補完䝉本院備劄到職竊惟各官所住之俸已係在官今復以之准抵逋糧揆諸事體恐亦未安合無照各年分豁災傷事例查各衛見今勘實􅔐荒田地若干所拖屯糧悉為蠲免此外若有未完的係拖缺俱照原缺多寡數目分作三分嚴立程限先完一分暫准開俸其餘二分續徴取通關繳報如二年之後仍舊住俸庶幾人心有所遵循漸次補完否則各官之俸可住所缺之糧終不得完且祿以養亷士人尚資於此軍職之中求其甘貧守職者不多得也今俸糧久住日用無措未免侵剋屯軍屯軍既窮未免復缺子粒計所虧損仍在正額不若寬以處之之為愈也如䝉乞賜施行非惟屯官有資生之慶而屯軍亦無侵擾之虞矣一曰薄徴照得屯田之則有三曰比較曰改科曰新增比較之田每畝納糧一斗二升改科則減其半每畝五升三合五勺新增每銀一分六釐蓋又輕矣看得比較之田屯軍一名佃五十畝每嵗納糧一十八石內十二石准作月糧實納糧六石豈得為重但先朝末年頻嵗凶歉嘉靖三年加以大疫流行人死過半以致前項屯田無人耕種如南京鎮南等衛坐落江浦等屯行數十里俱是曠地葭莽極目不勝凄凉此項無徴糧稅所司因循不與區豁逐年俱係衆户賠補賠補愈重逃亡愈多逃亡愈多賠補愈重反復相因勢不能已屯政之弊至此極矣今南京户科等衙門給事中林士元等官奏欲將三則之內一項停免俟年豐人衆方議並復又欲通查三項田地見種若干頃畝照常輸納見荒畝頃若干姑且停免以待召佃成效一體徴收無非憫時救弊之意也䝉本院備劄到職看得田有常額額有常稅前三項屯田俱係在冊正額遽欲除豁一項恐亦有礙如云將見荒田畝姑且停徴待召佃成效一體徴收竊恐法亦未備蓋停徴而不召佃則徴之停者何時可復召佃而不設法則召之佃者何人敢承查得嘉靖六年等曽經總督南京糧儲右副都御史杭闕巡視屯田監察御史唐勳王世爵等官纍次題行欲通查各衛􅔐荒田地若干頃畝􅔐江者悉與除豁拋荒者俱作改科所缺額糧將各衛新增田內每畝加銀分釐通融處補以足原額虧缺之數酌量事體似為可行訪詢輿情俱各稱便今大約查算勘實各衛􅔐江田地四十五頃二十一畝一分委實崩􅔐合應除豁拋荒比較田地四百七十頃的係久荒難於開墾若非薄稅改科必無願佃之人矣合無照依都御史杭闕等官所議將前項􅔐江田畝悉與除豁比較荒田俱減作改科計缺額糧三千五百餘石通衛新增田地三千四十八頃每畝加銀五釐共加出銀一千五百二十四兩每糧一石折銀五錢准補缺額糧米三千四十石又查三則之外有三升三合等項之田此項田地俱係成熟年久俱當升作五升三合五勺共升出糧四百七十五石足以抵補原額足無虧缺然後出給曉諭不拘軍民僧道之家聽其擇便開坐畝假俱赴本衙門告領户由開懇耕種永為已業量寬二年租稅待二年之後田已成熟一體徴收如此則有力之家貪圖輕稅庶幾出力承佃再照中間有等田地坐落和州等屯荒廢久逺費力極難則雖薄徴改科人未必願佃者又不可不預為之計查得紅牌事例承佃故軍田地户由每户不過二分近年以來各衛故軍好田槩被軍官户內舍餘侵領每户領户由十紙二十紙者有之磽瘠不堪之田俱著貧軍領佃賠補糧稅最為積弊合無通查各衛户由每户多領二紙以上每三紙者著領久荒田一分務要立限開完回報如不願開者即將户由退出另召有力之人承佃每三分户由帶領荒田一分將見得三分熟田而領一分荒田未有不願承佃者矣如此則前項久荒之田俱可耕闢待十年之後成熟巳久仍當復作比較國稅可增人心亦願如䝉採擇施行則屯無曠土軍有餘糧屯弊庶幾可清矣釐革巡捕奏方日乾南京都察院為釐革巡捕以靖地方以全人命事准都察院咨該本院題廣東道呈刑科抄出巡按直𨽻監察御史方日乾奏臣奉命巡視南京錦衣等四十二衛屯田督捕盜賊兼理詞訟照得各衛屯所原設巡捕官數十員緝捕盜賊以靖地方近見法久弊生地方反受其擾臣不得不昧死言之蓋屯田地方俱屬直𨽻廬鳳等處逺者離京三五百里近者不下一二百里與京城諸司原不相涉今巡捕官員欲假威協衆捕得盜賊必令供攀無辜平人嚇詐財物一不遂意悉誣以證見竄藏虛情不逺數百里之外解送南京呈禀內外守備衙門以致江北軍民聞解南京如蹈水火往往傾家賣産以求脫免其重罪賦犯亦因賣犯所解稟者不過偷盜斗米隻雞人犯而已捉拿之時已用刑考訊解送南京跋涉數百餘里飢餓切身經內外守備二處衙門各用重刑攪撲參送到臣已非人形隨即議招發落死者亦已半矣况又有參送刑部該司延遲送審動經數月非惟犯人難以存活無辜干證人犯因而致死者庸亦有之此皆情可憐憫者也聖上矜恤大獄罪至死者尚見矜疑此等人犯俱杖罪以下者也使之就於死地何忍言哉臣惟各衛屯田俱雜直𨽻府州縣之間今欲痛革前弊以全人命莫若約束巡捕官不得擅自拿人考勘但捕得盜賊不論或軍或民俱以近就近解送所在有司衙門行提知證人犯公同㑹問具招申詳管屯衙門批招發落重者問徒做工輕者杖决釋放不許槩纍平人驀越呈禀如此則法律俱存人亦稱便否則官肆其凶人䝉其害誠有負聖上憂恤窮獨之盛心也如䝉乞𠡠都察院再議若臣言可行乞賜俯從仍行南京內外守備衙門不得干預屯田詞訟并行南京刑部該司今後屯田盜賊臣既奉命專理毋得輒受守備衙門參送出京百里外勾攝屯軍阻防農業庶幾體統歸一屯事少興矣嘉靖九年十一月十三日本院右都御史汪闕等具題奉聖㫖是奏興利補弊以禆屯政事方日乾臣奉欽命巡按南京應天鳳陽滁和等府州縣清理錦衣等四十二衛屯田照依清軍事例三年滿日差官更替自揣微才莫勝重寄奉命以來已經三年計日雖多全無寸補用心徒切實有餘慚但巡歷久而風土浸達咨詢遍而利病頗知得於目擊耳聞未敢條分縷析姑以至切要者言之夫興利莫先於賑濟補弊莫急於􅔐江賑濟預則飢年不至於逃竄􅔐江補則窮軍不苦於包賠屯務最切要者宜莫有過於此也謹以便冝二事具本奏陳如䝉采納實軍民之福也一曰備賑濟臣惟南京各衛操備駕船運各項軍役固皆貧苦然未有如屯軍貧苦為最甚者蓋各項軍役俱有月糧可資屯軍則自食其力輸糧於公牛具種子備不及時收成鮮薄僅足為納糧贍家之用一遭嵗歉輒至流移查得成化年間屯所飢荒陸續借過應天府常平倉糧四萬餘石賑濟軍士賴以存活自此以後歷𢎞治正德至今五十餘年飢荒疊見不復聞有賑濟之舉蓋由本衙門自無蓄積飢荒之際欲頻借貸勢固難為是以奉職之臣坐視軍士離散再無别處至𢎞治年間巡屯御史亦曽建議欲於各屯設立倉厫將本衙門一應問過詞訟贓罰紙價銀兩買榖上倉以備賑濟亦一策也但各衛三十六屯地方四散若蓋倉厫約有數十餘所土木工力先難措辦且無均徭斗級看守人役謀議踈闊事寢不行臣看得各衛屯所俱雜處應天等府州縣地面臣奉命以來問過贓罰紙米贖罪等項價銀紙價以十分為率除八分解南京都察院作正支銷二分本衙門公用外查得贓罰銀尚有一千七百餘兩贖罪稻榖三千二百餘石見貯各府州縣倉庫趂今豐成之際動支前項銀兩差委廉能官員照依時價收買好榖并原贖罪榖石俱仍貯各倉自此以後但問過贓罰紙價逐年查考收買榖石貯積各倉若遇大荒之年審實極貧軍餘各就該地方倉厫支領造冊奏繳庶倉厫無創立之煩關支有附近之便深為便益再照南京總督衙門總理屯務各年批發各司詞狀贓罰紙劄贖罪榖石數多亦俱貯各府州縣庫倉如䝉一併存留以備屯田賑濟如此則稻榖益多賑貸有賴屯軍不至逃亡矣一曰處􅔐江臣惟南京各衛所屯田太平附江原無髙堤捍禦江流只靠沿堤栽插栁樹潮水一漲漫不可支年復一年江形漸移附近田土漸次􅔐沒其未沒者江潮往來亦成廢地遞年子粒俱係各軍包賠甚可憐憫臣於嘉靖八年已經奉命處補􅔐江田三十九頃餘畝由是以來又經三年近嵗江潮尤為洪暴濵江處所復多􅔐沒本年正月據和陽等衛陸續呈報􅔐江田畝數目并各軍賠糧情狀到臣最為困苦查得臣先年處補荒田剩有餘糧七百一十餘石及升科過營房等地餘糧約有二百餘石皆係額外補􅔐江之數今據該衛呈報前情除一面委官踏勘外竊惟田去糧存實係弊政屯種貧軍難以包賠極貧之户未免賣房鬻子償納前糧若不亟為分豁誠恐賠糧不堪逃亡相繼成熟田土亦轉拋荒如䝉乞𠡠户部轉行南京户部委官一員㑹同踏勘果係􅔐沒量與分豁額糧虧缺即將前項積出餘糧補足原數如此則國課不虧窮軍亦裕矣論南京屯田余𦙍緒愚惟屯田之政古以益軍民今以厲軍民載觀諸賢所論俱可舉行但恨不得其人耳試以愚在户部所經勘屯弊言之去年三月承委督儲於南京浦子口九月權委㑹同屯田道御史踏勘江北屯田災傷按屯田坐落三州九縣一軍種田五十畝出糧六石大約每年總收屯糧十萬餘石俱赴浦子口應天橫海龍虎三倉并和州瀋陽倉上納以養浦子口和州十衛官軍操備為南京保障也正德年間一年尚徴完額數連積餘僅充半年支放未免又將南直𨽻浙江嘉湖等處秋糧兌補軍民兩困甚非祖宗舊意也蓋屯田皆沿江東則六合縣至儀真縣西則江浦縣至無為州與浦子口相接其近山等屯去江亦不逺二三百里江邉有墟堤堤內即田堤外即平地可以演武種屯軍人終嵗止辦屯糧更無在京在外雜差其總理有指揮分治有千百户亦無别委惟管屯一事農暇則演武於各屯所江上有急可以為援此祖宗寓兵於農之意也此舉不率者六七十年矣管屯軍官强者兼貪弱者廢事非惟演武不行而農具亦缺塘陂不治糞穢不積草萊不除因之嘉靖二年大飢三年大疫死者流者十之七八遂使田皆蘆葦一旦旱潦束手聽傷其巡視屯田御史一年一换不過文移承接雖欲躬行親理亦難周遍核實浦口監收主事亦一年一换不過收放而已至於㑹同御史踏勘災傷比時秋末冬初奏冊限迫但巡歷一次定别分數奏冊繳部致期催納者勢不得不如此也御史欲奏請三年嫌於攬權而人不信主事欲有所為恥於無權而人不從故事因循竟成廢墜愚去年自浦子口經滁和等州縣至於無為州逐墟沿江周章瞻眺則今日之告災傷乞蠲免者難盡責之天也觀今日太平之時若為無事玩祖宗立法之意則今日之頺弊誠可懼也蓋屯田之政舉則一嵗所入不止十餘萬石浦口之軍儲足則不必那之於民以至兩困為今之計御史主事各三年一代主事仍憑本部堂上㨂精力强健操守清亷才識老練者為之請𠡠一道與御史協同便宜行事毋得權差以致了事三年考滿本部本院考核清理屯田若干招種軍人若干徴收秋糧若干則任専而人信從責久而事振舉矣且近年户部又差一員郎中管理拋荒屯田及􅔐江者事雖可集然必俟屯田御史同行或至一年未出巡者御史又將更代事體掣肘不過文移往來今浦子口監收主事一年之間惟九月權差會同踏災十月十一月十二月收糧正月至八月事少時可以兼理前項等事莊誦仁廟諭户部尚書夏原吉言治屯者勿得擅差妨時切中今弊若有風力御史詳察今日所以屯廢之由并差占逃亡之弊不徒虛具則祖宗之意不孤矣論邉屯王鏊國家供三邉之費最大嵗用銀至四五十萬愚以為欲省轉運之費莫若興屯田兵法取敵一鍾當吾二十鍾屯田一石可當二十石今三邉之地固在也而人以為不可行何哉按趙充國屯田之奏曰計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃又言北邉自燉煌至遼東萬一千五百餘里故有吏卒數千人虜不能攻今留步士萬人屯田地勢平易多髙山逺望之便部曲相保以為屯田內有亡費之利外有守禦之備唐元和中振武軍飢宰相李絳請開營田乃使韓重華為水陸運使使給耒耜與牛耕傍近地方連嵗大熟軍不復饑又益募人為十五屯屯置百三十人而種百頃各就髙為堡東起振武西過雲州極界於中受降成秋果倍收嵗省度支錢千三百萬此又近事之效也今獨不可行乎後湖志序楊亷太祖髙皇帝建都金陵藏天下黃冊於後湖至太宗文皇帝定都北平諸司庶務類多隨駕以北獨後湖之藏不動如故祖宗深謀逺慮灼見於此故都遷而藏冊之所不可改不然輦轂之下如順天畿輔之近如真保定之類何為而不之京師而必之南京乎蓋後湖之廣周遭四十里中􅊳數洲斷岸千尺由是而庫於其上由是而冊於其間誠天造而地設者也其為圖籍萬年之計殆無踰於此矣給事中趙君惟賢來蒞後湖謂湖中諸例甚多不有以集之將至於散亂而不可收磨滅而不可考矣乃偕主事張君濟寬極力搜羅加詮次焉既成以後湖志名其編復徴亷序之夫今制黃冊所載人丁事産二者其經也舊管新收開除實在四者其緯也事産田賦輕重之數源流於禹貢九州厥田九等厥賦亦九等之法也人丁著户口登耗之數權輿於周禮三嵗大比獻民數於王之意也然黃冊之田賦鄉有所分邑有所别殆不止此舉九州而槩言之則密而詳矣黃冊必十年一造而民數無三嵗之獻則簡而要矣豈非後出者愈精乎亷𢎞治中濫職斯事自辛亥至癸丑月日如流靡所建白素餐之餘惟時於波光萬頃之間仰羡本朝版籍既極其善以為即此一事亦足以見其髙出千古矣然則兹志之成所係豈小哉趙君合州人正德辛未進士傳臚在言路直諒持大體志凡八卷詩文附録二卷君之初意欲如司馬溫公編通鑑例不收詩賦一主於嚴或謂是亦足以備湖中故實欲務於博君雖不用以入正志然竟收之蓋取中云奏為黃冊事楊亷奏曰竊見直𨽻永平府樂州知州潘齡建言欲抄後湖廣冊軍籍以便清軍兵部轉行南京户部今與臣管冊官計議是蓋以版圖重事而欲博采輿論也既而南京户部議得抄冊不便甲可乙否不得不言夫以為抄冊便者不過謂天下司府州縣多無逺年籍冊一至清軍之時止憑里胥供報甚至輒赴後湖查冊中間不無往復豈若將後湖之冊抄其軍籍俾在在有之而用以清軍之為便哉此則該部之說與潘齡所見略同也然臣以為此設若行不惟無益於事而且有意外之患臣請先言其患而後言其所以無益者仰惟祖宗舊例藏冊後湖法禁嚴重不許諸人窺伺其深謀逺慮固非一端至於今日各處逺年之冊多無而軍民户籍大勢不敢紊亂者誠懼冊籍之獨全於後湖也今者一旦令其抄謄使人測知後湖之虛實則户籍之紊亂將有不可勝言者矣何者使後湖之冊全則抄之猶可惟是見今如永樂年間之冊已不全十之一二如洪武年間之冊已不全十之四五如此而暴之天下使人知某鄉某里之無冊則向之所懼者至是有不足懼矣將見以民為軍者得以肆其告訐而脫軍作民者往往遂其奸計百年之籍由此紛然而不定矣臣所謂意外之患者此也至若人之脫軍作民者其名字定是改換其都圖多是飛出若止據軍户執以清軍曰某人汝祖也彼將曰我自有祖名字不同也曰某籍汝籍也彼將曰我自有籍軍民不同也都圖不同也若是果何以辨之辨之之術須從其民户而查之假如其人之先誠於洪武二十四年脫軍則二十四年户為新立矣誠於永樂元年脫軍則元年户為新立矣而又查其田糧自何而推收則或軍或民斷不失矣他而名字之不同都圖之有異不論也臣在湖管冊凡遇各處來查軍民户籍悉以此法行之妄謂收得明白今若止抄黃冊軍籍果將何所憑而以為清軍哉此臣所謂無益者是也伏望聖明下臣所言𠡠該衙門計議果見抄冊之為無益而决有所害則斷然止之不使虛費紙筆而别生事端也抑臣係管冊官員凡有關於黃冊者敢併言之臣看得洪武十四年二十四年黃冊軍匠里甲根源所在實冊之祖存莫存於後湖而為天下之所必查而二年冊庫每年止有一十七間其次如永樂元年之冊亦為緊要是年冊庫止有一十餘間該之永樂十年以後冊庫每年三十間大約少去一半以致數年之冊堆滿庫內每遇曬晾揭查最為不便今為之計宜添洪武等年永樂元年冊庫以足三十間之數務使數年之冊稀架薄堆則曬晾揭查二者俱便自然可以閲歷久逺矣否則所謂冊之祖者日就損壞非臣之所忍言伏望聖明下臣所言𠡠該衙門計議倘有可采俱乞賜施行奉聖㫖該衙門知道初九日戶部尚書葉淇等覆題看得給事中楊亷奏稱抄冊不便及要添造冊庫二事除添造冊庫行移工部另行外所據抄冊不便一節臣等議得本官奏稱見今洪武永樂年間冊籍多有浥瀾若使暴之於天下恐以民為軍脫軍作民紛然而不定以為有意外之患是誠有患也及稱止據軍户執以清軍則凡人之改換名字飛出都圖者皆無以辨之以為無益是誠無益也今為無益之舉而反貽意外之患則抄冊之不便明矣合無准其所言本部行移南京户部轉行管冊官員今後後湖廣冊不許將槩府州縣全冊查抄果一户二户軍民籍冊不明解人前來挨查者止許查抄本户田糧軍民丁産來歷明白即便發回亦不許因而帶抄别户以泄事機如此則奸弊無從而生户籍自然不亂矣次日奉聖㫖是名臣經濟録卷二十一
