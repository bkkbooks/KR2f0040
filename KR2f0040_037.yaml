body:
  text: 名臣經濟録卷三十七明黃訓編兵部職方上之上于謙行狀録于冕正統十四年夷酋額森入冦獨石馬營至秋勢益猖獗上將親率六師討之公偕尚書鄺野上言聖朝備邊最為嚴謹將士用命可坐收功不必親帥六師以臨塞下皇上宗廟社稷之主誠不可不自重不聽是年八月三十日六師啓行初上命公隨征忽改遣鄺野留公理部事十有五日師駐狼山土默特主將不識地利逺絶水路我軍焦渴甚窘促玩不為備俄而敵騎奄至王師敗績死者填委溝壑為滿蓋曠世所無之竒禍也上北狩報至京師大震公北望號哭誓不與敵俱生太后命郕王監國是日臺諫廷論土默特之變罪歸王振王方攝朝倉卒未有處分錦衣衛指揮馬順素附振意頗不平衆怒擊順死於廷且索振所親信二內侍將擊之彼此喧譁班行雜亂無復朝儀文武諸大臣皆驚避公堅立不動王亦疑懼屢起欲退公直前扶掖勸止之且請降㫖令羣臣立班勿擅動命紅盔將軍用瓜擊二內侍期亟死王從之時在廷上下相顧未已公恐事不測復進言曰請再宣諭羣臣王振罪固當赤族俟啓太后行誅未晚馬順罪惡應死勿論衆稍定退朝時過午刻矣公袍袖皆裂徐步出左掖門吏部尚書王直迎執公手謂曰今日事起倉卒賴公以定雖百王直將焉用之公辭謝不敢當太后以公人望所屬升兵部尚書公固辭不獲始就職公以鑾輿未回大敵垂至若前日扈從失律者一槩寬貸則今日被堅臨陳者何所畏憚乃上章劾舉其罪大略曰武臣如顧興祖等茫無一計可施遂使三軍覆沒上棄君父於漠廷下委生靈於丘壑文臣如王佐等雖無敗軍之罪難逃違法之誅王令法司議罪以聞時親藩有上章願赴闕勤王者太后遣太監金英傳㫖皇太子幼冲未能遽理萬幾郕王年長宣宗皇帝親子宜嗣大統言者亦以時方多事國有長君社稷之福於是文武羣臣交章勸進王涕泣固辭避歸郕邸不出太后復降㫖責王不得已乃即位遙尊英廟為太上皇帝改明年為景泰元年天下始知有君朝綱始肅法令始行公見上泣曰敵人方強氣滿志得將有長驅深入之勢不可不預為計邇者各營精鋭盡㨂隨征軍資器械十不存一宜急遣官分投召募官舍餘丁義勇起集附近民夫更替沿河漕運官軍令其悉𨽻神機等營操練聽用仍令工部齊集料物內外局厰晝夜併工成造攻戰器具京城九門最為緊要令都督孫鏜衛頴張軌張義雷通等統軍士出城守護列營操練振耀軍威遣給事中御史等官王竑等分投巡視勿令疏虞各城門外居民寇若迫其脅從則敵勢愈衆宜令兵馬司排門曉諭遷徙城內聽各隨便居住通州壩上等處倉糧不可捐棄令在官諸人關支准作月糧之數一舉兩得計無便於此者大同宣府等處曽經敵騎往來剽掠者請敕各處守臣諭以今日國家之事必須輯和衆庶固守城池整搠人馬互為應援一切關隘樓櫓墩臺壕塹務在挑修深固不許虛應故事至於選用人材尤為當今急務文臣如軒輗者宜令巡撫武臣如楊洪栁溥者宜為將帥凡軍旅之事臣請身任其責不效則治臣之罪上深嘉納悉施行之時邊報絡繹訛言萬端事情百出公先事預防攝權制變衆皆視公為安危輕重太監喜寧本邉人也土默特之敗降額森盡以中國虛實告之遂為鄉導奉英廟趨紫荆關京師戒嚴人無固志往往挈而南奔侍講徐珵妄言占象倡議南遷以避之事聞六宫而二三大臣復依違其間公慟哭於廷抗言京師天下根本宗廟山陵社稷咸在百官萬姓帑藏倉儲咸在此處不守何處可守若一動則大勢盡去宋南渡之事可監矣上是公言堅持固守之議先是京場草束自永樂以來承平日久俱在城外堆積動以千數百萬計壩上養大馬草束料豆亦置倉場於野外公一聞北敵臨關急分遣五城兵馬司官縱火焚燒一面奏聞或謂事重何不待報公曰事有經權今敵在目前若少緩待命下適以資敵及京師解嚴人皆服公經濟逺略設不預為焚燒之計則在野倉場皆敵囊中之物藉此持久坐困我必矣主將石亨與公謀議頗異只欲盡閉九門堅壁以待之公不聽乃請率先將士躬擐甲胄軍德勝門外閉闔城門示以必死泣諭三軍誓言國恩當報忠義難得事機一失禍患立至生不如死人人感奮勇氣百倍十月之朔額森入紫荆關傳言送駕還京長驅直前其先至者四散前突我軍堅不為動知我有備稍自引却額森次至城下對我壘而陳英廟在額森所敵人覘知我軍嚴整不敢有加我亦不敢向敵輕放一矢喜寧嗾額森邀我六七大臣出城議和奉駕還宫所邀金帛以萬萬計蓋責我所難從以起釁端廷議忷忷禮部遣使來問公公曰今日止知有軍旅他非所敢聞對壘凡七日是為十月既望諜知敵中移英廟車駕離其壘漸逺乃炮擊其壘敵死炮下者萬計額森大沮宵遁仍奉駕以北我軍奮欲追擊之公不許止令逐出境外縱之自去初紫荆失守公集議所以禦敵之䇿皆曰額森善戰而我軍新集且脆弱公曰聞善戰不若不戰而屈人也乃一以忠義干城卒至一矢不遺敵衆自退人謂天實生公以為社稷朝廷論功特加少保總督軍務固辭不允人言今日宋李綱不能及公曰四郊多壘卿大夫之恥城下但不盟耳今日惟有竭力戰守復還車駕此臣子之職分餘非所宜言議講和疏于謙兵部為陳言邊務事該鎮守大同參將都督僉事許貴查得正統十四年十二月內節該欽奉詔書內一欵朝廷求言本欲聞善道知警戒凡四方災異事干國體者所在官司即時聞奏欽此欽遵臣照得大同三路自舊嵗七月以來至今達賊不時攻圍四散搶掠臣守西路地方又係緊關衝要賊行四通道路節次侵犯攻圍臣領所部官軍相機截殺追趕纍次奏報外切見沿邊軍民趂空樵採柴草搶割田禾度日不為經常之道即目正當農種之時雖令各人照舊耕種但聞邊墩不時舉放炮火人心驚恐自不安生況今敵人聚集人馬衆大少者五七千多者一二萬整陳入境攻圍各城在邊軍民人等不敢出城樵採收割又無經營各衛倉厫舊嵗民間該納秋夏糧料草束為因路阻運送不前見在邊儲官軍馬匹按月支給有減無增再照西路五衛馬隊原有官軍四千九百二十員名先於乾河等處與賊對敵陳亡中半回衛見在者又有被傷旗軍告令弟男替代俱係未經操習戰陳之人舊役慣戰馬軍十無三四又況見在馬匹止有二千一百餘匹中間多有新例借勸收買兒騍小馬不堪騎戰十有二三比與原舊馬數缺少二千八百餘匹及照本年二月內臣差千户張鑑管領無馬官軍一百八十一員名前去墳嶺墩設伏有敵到墩攻圍未戰之時內中復有三人通曉漢話呌稱我一箇是女直同一箇是浮石參謀一箇是哈密指揮我來近墩打話你每聽著要講和著管你每的大頭目奏將去連夜差使臣來我每便回去你若不來講和我每三班人馬輪流打攪你不得種田等因已行具本奏報外今敵聚衆復入境內擾攘軍民不得耕種切慮四月以後青草茂盛倘若敵勢衆大就於腹裏駐劄趂草牧馬城門關閉人不得樵採馬不得牧放欲便興師戰鬬尤須量已料敵設若寡不敵衆如之奈何臣一介魯夫昧於戰守誤䝉聖恩濫叨今職晝夜懷憂不能補報伏望皇上憐憫在邊軍民乞勑在廷內外文武大臣將前項打話賊人要行講和情由從長計議便利上䇿分免聖主之憂臣之愚見莫若遣使賫勑與敵假以和好為詞暫示休兵照舊修飭墩隘廣積邊儲練習士卒飽養馬匹密定討伐之計若敵仍復拘執不移侵犯邊城我既有備以逸待勞守邊將官運謀出竒統率鋭士奮力復仇務在一鼓而擒之必矣具本該通政使司官奏奉聖㫖兵部知道欽此抄出到部查得先該福建道問刑監生練綱題稱在廷文武羣臣中間有以主和議為詞即是奸臣就乞誅之勿留誤國等因節該奉欽依他說的是欽此續該迤北走回軍餘陳旺等說你要差內使一人通事五十人去迎太上皇等因本部參係重務乞㑹多官計議節該題奉欽依敵情譎詐不必㑹官計議欽此欽遵今都督僉事許貴又奏要與敵講和暫示休兵待人馬强壯密定討伐之計一節切詳金人蟠據幽燕輒敢背棄盟誓自逞兵力之雄烏合獷悍之衆既侵犯邊境而拘留上皇復入冦京畿而震驚陵廟其為仇恨庸可勝言且以和議一事論之當去年秋冬之間正敵勢方張之際朝廷亦嘗遣都指揮李鐸指揮嶽謙等賫執金繒往使北庭賄賂才入於窮廬敵騎已至於關口繼遣少卿王榮通政王復又往敵營不見上皇鸞輿而還敵衆知我戰守有備尋皆望風遁去朝廷灼見敵情難測和不足恃以故絶使不通往還惟勑邊將修武備勵人心固守城池相機戰守今許貴又奏和議之說臣等竊惟今日之事理與勢皆不可和何者中國與敵有不共戴天之讐和則背君父而忘大義此理有所不可和也又北敵貪而多詐萬一和議既行而彼有無厭之求非分之望從之則不可違之則速變此勢有所不可和也茍以為敵强難制姑從和以緩其兵臣等請質之前代宋真宗澶淵之役契丹之衆纍被我兵摧沮既盟之後朝廷尚嵗輸銀絹三十萬兩匹逮至季世徽欽北狩中國名將如張韓劉嶽之徒屢敗金師及奸臣秦檜一主和議朝廷既割境土以與之又輸嵗幣以賄之甚則不得已降尊號其為含垢忍恥屈已從和固無所不至卒之人心解體國勢陵夷無救成敗而後已援古證今和之不足恃也明矣為今之計莫若選將練兵養威蓄鋭敵若來侵則相機而勦殺敵若逺遁不貪利以窮追萬一敵人昏于事勢昧于一來復有大舉入侵之謀則我兵操練有素加以將帥思奮臣等當盡死效力以圖報復以雪國恥必不出敵人之下其或皇天厭亂列聖有靈敵人自知窮兵不利變惡為善遣使入貢則示以善善量與賞賜遣回亦不拒絶而已若欲朝廷先遣使臣往彼通好則示彼以弱而啓其輕侮之心萬萬不可此則方今之要務而臣等愚見止於如此及照許貴叨居重任保障邊方不能鋭意用兵却乃倡為和議畏縮之跡既明忠義之心何在合將本官明正典刑以謝天下以戒將來緣係陳言事理又係備邊將官合無姑記其罪差人馳驛賫文切責許貴令其整飭邊務操練軍馬作興士氣固守地方必期竭力以贖前罪如仍退縮誤事治以重罪仍通差人賫文前去遼東宣府大同陜西等邊及永平山海居庸白羊紫荆倒馬等關口總兵鎮守等項內外官員令其整搠人馬固守地方如遇敵人來攻務要相機行事毋得聽信哄唀因而失誤機務仍通行在京五軍三千神機等營總督總兵等官嚴加訓練官軍諭以忠義大節使之感激思奮以圖成功不許茍且因循致誤大計緣奉欽依兵部知道事理具題景泰元年四月十九日奉聖㫖是欽此為擅調官軍事于謙內府抄出奉御黃整題今䝉差臣等前往永寧守備臣於景泰元年閏正月初一日率領官軍夜不收一千五百員名到永寧守備外至本月初八日據夜不收飛報聲息有都指揮同知楊信調去官軍三百五十員名本月二十二日又調官軍二百五十員名本城止有官軍九百員名守備不敷本年閏二月二十三日又有參將楊俊差夜不收賫貼前來永寧調去都指揮王琳帶領馬步官軍盡數前往懷來城內守備將永寧城西門砌塞等因臣切見先奉勑命專一守備永寧緣金陵山後未奉勑㫖臣難擅離城池具題該本部官欽奉聖㫖該衙門知道欽此欽遵抄出到部案查先該總督軍務少保兼兵部尚書于謙總兵官武清侯石亨昌平侯楊洪㑹議得懷來永寧一帶內則捍禦居庸外則接連宣府至為緊要若二城無人守備則一路聲息不通南北道路阻絶非惟敵人得以縱兵而京師亦不利便合無令都指揮楊信總領都指揮王琳李剛率領官軍夜不收共三千員名量給賞賜前去懷來永寧二城各安插一千五百員名修理城池築立墩臺收割田禾預備糧草探報聲息隄備敵人具題節該欽奉聖㫖准他說欽此欽遵今奉御黃整奏稱本月二十三日右參將都督僉事楊俊差夜不收賫貼前來永寧調取都指揮王琳帶領馬步官軍前往懷來城內守備將永寧城西門砌塞等因參照前項官軍原係奏奉欽依調去永寧守備之數皇上特命臣監督其本官不令楊信預先知㑹又不與總兵官公同計議奏請定奪却乃擅出票貼將欽調官軍改調别城又要將永寧城門砌塞似此方命專權擅作威福下欺主將上侮朝廷視邊務如等閒弄軍馬如兒戲强梁跋扈旁若無人方當軍馬調動之際而北敵乘間來攻彼此聲勢相懸豈不重為邊患及照本官先在馬營守備專一弄術舞智驕矜誇大種田貨殖私役官軍才不逾於斗筲心實惡於梟獍蔑視同列交結權貴一旦敵騎臨城不能竭忠死守窺伺敵稍退去輒將馬營獨石數處堅城并倉厫錢糧盡行捐棄在逃以致士卒潰散邊境失守開敵奔竄之路因而喪師辱國至今人皆痛恨雖伊父楊洪亦嘗憤之切齒今却不洗心改過仰答皇上委任之重仍復恃權妄為愈加放肆謂國法不足畏謂軍士不足恤謂剛愎為可恃謂驕縱為可久徇私積怨人所共知若不整治於今日無以警戒於將來合無將本官提送法司明正典刑以為邊將棄刑專權之戒仍令都指揮楊信將原調懷來永寧守備官軍依數分𣲖二城用心提督操練固守城池遇警相機行事若有應合調動緣由務要奏請定奪緣楊俊係軍職及奉欽依該衙門知道事理具題景泰元年正月二十七日奉聖㫖楊俊擅自調弄軍馬致令緊要城池無備這等妄為理法難饒如今北敵聲息緊急防守至重且饒他這遭再違了不饒還行文書與他知道欽此為建言事于謙兵科抄出都察院右副都御史羅通題臣本一介書生永樂六年弱冠之時䝉太宗文皇帝作養之恩叨中鄉舉永樂十年登名進士授監察御史歷升今官臣在仕途年久各處邊情頗知其略譬如近日遼東來報聲息此必徵調遼東軍馬其遼東守將因境外有一二敵人行走即便詐稱敵人數千犯邊以止所調之軍甘肅寧夏大同宣府亦然且其遇敵之時殺獲敵兵十餘人輒便稱說見敵數千殺敗敵衆斬獲首級十餘顆妄奏邀功似此所為比比皆然不必逺求向者德勝關等門外殺敵功次不知殺得幾百千敵却升官軍六千有餘萬目所視萬手所指尚且如此何況邊寨之逺朝廷所不能見者而不行詐哉此皆已往之事不必追究但方來之計不可不預備也為今之計宣府大同各宜屯重兵操練宣府合於獨石馬營或德勝口屯練大同或於威逺衛屯練各選武將之驍勇而不怯懦者充總兵官文臣之剛斷果毅而不猶豫者充總督軍務時常遣夜不收諳曉敵語者身穿敵衣裝扮敵兵出境探聽敵情若敵在三百里之內二百里之外則即按孫子兵法神乎神乎而不許揚軍之聲微乎微乎而不許現軍之形或乘月銜枚而行或乘霧捲旗而趨使敵不見灰塵出敵不意掩其不備夜搗敵營敵雖恃健馬徑弓卒然而至無所施矣如此則敵可擒而我軍萬全無失矣敵必逺去不敢近邊若止是正正之旗堂堂之陳白日行營敵非惟望塵而遁去抑且埋伏以待我軍其勝負利鈍非臣所敢知也臣之管見如此然古之名將韓信起於行伍穰苴拔於寒微乞勑兵部五軍都督府令都指揮千百户衛所鎮撫及有勇略總小旗其中必有知兵如韓信穰苴者可與議而行之若腰橫玉帶頭簮貂蟬者皆是茍全性命保守爵祿之人與憎賢忌能徒能言而不能行者不足與議此也具題本官欽奉聖㫖兵部知道欽此欽遵抄出到部參看得羅通奏稱近日遼東甘肅寧夏大同宣府虛報聲息妄報功次一節照得遼東宣府大同陜西寧夏延綏等處近日飛報聲息絡繹不絶若依所言一槩參奏不實誠恐邊將果有聲息不行奏報不無有誤事機合行都察院各該巡按監察御史體勘遼東甘肅寧夏大同宣府總兵鎮守提督參贊等官近日奏報聲息功次有無虛詐明白徑自回奏定奪其奏德勝關等門外不知殺得幾千百敵却升官軍六萬六千有餘一節查得近該總兵官武清侯石亨等奏繳前項功次文册到部通該六萬四百三十一員名本部已經查例議擬覆奏欽䝉將數內當先一萬九千八百八十員名升一級陳亡三千一百一十八員名升二級其餘齊力等項止是給賞不曽升六萬六千餘名續兵科掌科給事中覃浩等題稱前項功次不明節該奉欽依都察院便差公正御史一員兵科推公正給事中一員通行查勘他每功績有無曽無升賞的從實來說不許徇情妨廢公道欽此欽遵通查未報今羅通既稱前項官軍不曽殺敵合將臣謙同石亨等已升職爵革去其餘官軍合無不必查勘俱且不升止是給賞惟復仍候御史給事中查勘回奏至日另行定奪伏乞聖裁又奏宣府大同各宜屯練重兵選驍勇剛斷者充總兵總督官遣夜不收探聽敵情出其不意掩其不備則敵可擒要令知兵都指揮指揮千百户衛所鎮撫總小旗如韓信穰苴者議而行之若腰橫玉帶頭簮貂蟬者皆是茍全性命保守爵祿之人與憎賢忌能徒能言而不能行者不足與議一節查得先該本部㑹同户部并總兵等官石亨楊洪栁溥等議得大同宣府地方自敵犯邊以來官員損耗沿邊墩隘壕塹俱被坍㙭無人瞭望致使出入自由縱橫剽掠以致城門終日緊閉不敢放出樵採頭畜餓死房屋拆盡田苖不得收割草束俱各罄盡況今春農在邇若不設法用力備禦人心委的不安合無請勑石亨楊洪各帶精鋭馬步官軍四萬員名內步軍三萬五千馬軍五千石亨自紫荆關往大同楊洪自居庸關往宣府沿途巡哨就行提督一路守備官軍人等堵塞關口修理墻榨墩堡及布列營陳暗設詐備敵衆來攻以計破之敵少剽掠用兵勦之若其逺去依舊瞭守遮護彼處軍餘人等耕種秋收一體防護户部委官措備糧草供給候布置停當事體寧帖仍舊回京其餘未盡事件宜從各官臨事處置務在區畫得宜經久利便等因具題節該奉聖㫖領軍馬巡哨及措置邊務都准議行欽此俱欽遵外緣係已行事理合用總督參贊官員至期另行奏請定奪所據推舉武職已有令諭詔書事例其舉到部者俱送石亨等處試驗量才擢用雖係才略不齊亦可隨機任用未見有如韓信穰苴者又照武清侯石亨昌平侯楊洪安逺侯栁溥等頭簮貂蟬與都督孫鏜范廣衛穎等俱係腰橫玉帶之人亦有守戰功績不見茍全性命保守爵祿實情俱䝉欽命管操今羅通奏其不足與議此事又自薦伊仕途年久各處邊情頗知本官見䝉欽命參贊楊洪軍務所言如此切恐有韓信穰苴堪任大將之人未施於用者合無就令在京五府六部都察院堂上官將堪任大將之人指實姓名開具實跡明白奏保仍命內臣同文武大臣博採羣議從公試驗如果將才過於石亨楊洪等誠如古之韓信穰苴另行奏請定奪不許徇私偏執濫舉非才致誤大事再照羅通所言選文臣之剛斷果敢者充總督軍務官切念臣謙粗通章句濫厠縉紳既無剛斷果敢之才又乏折衝禦侮之力猥以孱薄魯鈍素不知兵叨䝉聖恩總督軍務揆以輿論委的不堪羅通所言切中臣病乞罷臣少保總督之命或就令羅通或另選老成大臣代臣管理臣止管部事當捐軀盡瘁以報聖恩一有違慢罪當萬死如此庶使上不有誤軍國之務下有以協乎輿論之公緣奉欽依兵部知道事理具題景泰元年正月二十七日奉聖㫖著五府六部都察院翰林院堂上官及六科給事中各道御史將于謙羅通所言通行詳看停當來說欽此為邊務事于謙兵科抄出鎮守延安等處都督同知王禎題景泰元年三月二十一日准協同守備都督僉事王斌咨節該欽奉勑候春暖河開即將前項州縣寨堡軍民撫恤前去照舊安插守備欽此今據旗軍龍五等狀告䝉臣等鈞帖仍調前去神木縣照舊守備切思本衛相離神木縣二千餘里路途窵逺供給艱難等因具告除將所告指揮白玉等官軍二百五十員名調守本衛安邊營地方操備及具題外備咨知㑹准此查得正統十年八月十八日准本府咨該王斌題要將原調綏德地方操守慶陽備冬官軍七百三十六員名連馬匹軍器退撥與伊分派各守地方等因抄出到部覆奏間又於兵科抄出協贊軍務監察御史馬恭題合無將延綏慶陽沿邊地方榆林莊等二十五寨堡軍馬令王禎王斌共管遇秋九月十五日以前一遞一年前去安邊營就令本處官軍備各防禦賊冦候到次年二月十五日以後春暖河開仍來榆林莊一處與臣等計議邊務行事及不時輪流或分領前去該管營寨整飭軍馬器械城池壕塹糧料草束庶無分爭事妥安邊實為有益具題兵部查得先奏奉太上皇帝聖㫖是朝廷選任將官要行協和安邊先著王禎王斌共守地方分投督兵備禦他怎麼不知以國事為心節次挾私忿爭今且不問兵部便差人賫文書與他著依原勑共管延安綏德慶陽沿邊榆林莊等寨堡軍馬每年防秋時候令王斌往安邊營操兵防賊春暖仍回榆林莊以安邊境但失機一體坐罪凡遇邊務須公同計議奏來敢有故違不遵偏執誤事的不饒還著馬恭與王禎等從公商議果安邊營見守備官軍不勾調用酌量添撥官軍去兼守不許妨事欽此欽遵通行王斌馬恭欽遵去後續准本府咨該臣覆奏㑹同監察御史馬恭計議得慶陽衛原調綏德地方備冬指揮白玉等馬隊官軍二百五十六員名係臣原奏隨操之數後因神木縣缺軍調去相兼操守不動外臣等遵奏欽依內事理將本衛常年調來髙家堡備冬官軍四百八十員名就帶執把軍器火器於正統十年十月二十日撥去慶陽地方安邊營操備訖今後若王斌仍再不足偏執攪擾惟事紛爭乞令本官前去所奏迤東易守地方孤山兒府谷東村等三寨協守臣仍前總督安邊等一帶營寨操備往來殺敵上無煩瀆聖聽下使邊備得一緣奉欽依還著馬恭王禎從公商議果安邊營見守備官軍不勾調用酌量添撥官軍去兼守事理具題本部官欽奉太上皇帝聖㫖既添撥官軍去安邊營操備了罷再生事紛爭的不饒兵部還行文書與王禎王斌每知道欽此欽遵施行外又准本府咨該王斌又題要將沿邊營寨地方乞勑協贊軍務監察御史馬恭從公酌量寨堡地里分軍馬等因具題該兵部參看本部官已奏奉太上皇帝聖㫖既添撥官軍去安邊營操備了罷再生事紛爭的不饒兵部還行文書與王禎王斌每知道欽此又通行欽遵去後今王斌又奏前因看得奏內係本年十一月二十二日具題恐前奉欽依公文未到以此本官又行紊煩具奏合咨呈該府轉行臣并王斌馬恭俱照前奉欽依事理欽遵協和守備不許各執已私故違聖訓生事紛爭有失大體誤事不便備咨又經通行去後今准王斌咨稱除將慶陽衛指揮白玉等二百五十六員名取調迤西安邊營操備一節緣前項官軍係奏定迤東神木縣領馬常川操備人數蓋是各官軍要得附近本衛易得私家往來捨逺就近投託在彼買囑王斌又行妄奏煩瀆聖聽係于纍經兵部參擬奏奉欽依已定年久操守官軍今後受私擅便調去安邊營自逞已威欺罔朝廷法度安在查得神木縣都指揮施政即今有操備官軍二千三百八十二員名不敷調用安邊營却有見操官軍二千三百九十員名此分爭之時又添西安左等三衛并直𨽻潼關平涼等衛官軍五百員名尚且不足及照都指揮神傑所奏係干那動邊備官軍未經勘議難便定奪行移臣等查勘回報緣王斌與神傑俱係降人不顧亷恥不知大體不思朝廷邊備為重故將各寨操備軍馬往往攪擾紊亂定規且如慶陽調守甘肅官軍及河南都司南陽潁上衛所并直𨽻寧山潼關等衛官軍調在延綏地方守備相離本衛各有三千餘里并二千五百里者却於何處寨堡操守為當致令神木縣見缺軍馬不敷調用安邊營軍馬愈加數多兩處不均實難操守再照王斌既知奉勑將州縣寨堡軍民撫恤前去照舊安插守備却將原守神木縣常備馬隊官軍白玉等擅便調在安邊營有此故違緣延安慶陽一帶邊寨軍馬俱係都御史陳鎰王文靖逺伯王驥等節次整飭邊備已定事理臣係鎮守官員若不具奏誠恐因而有廢大事未便切惟兵部職掌天下軍馬政務日有萬幾被其繁文冗亂巧揑妄奏一時不能周知依允准行不惟調動邊軍正中奸邪詭計如䝉伏望皇上明鑑萬方察正除奸乞勑該部參議施行庶使邊軍安妥邊務不致攪擾民安政舉實為便益具題該本部官欽奉聖㫖該衙門知道欽此欽遵抄出到部查得先該延安衛操備指揮同知神傑等題先調中寧寨營領延安衛軍馬操備䝉鎮守延慶等處都督同知王禎鈞帖該本官奏准將寧寨安邊定邊三營隨操軍馬暫收慶陽衛城內安插除遵依外續䝉協同守備都督僉事王斌鈞帖開寧寨安邊定邊三營守備并隨操軍馬安邊寧寨二營守備官軍却分撥慶陽城內其慶陽衛在城靖邊營守備官軍却撥延安城內俱不得自守地方誠恐激變下人從長區處將慶陽衛隨操并各營守備官舍軍餘令都指揮僉事張友王榮領回慶陽衛操守將延安衛守備寧寨營官舍軍餘八百五十員名令臣等領回延安各守地方若不預先具奏誠恐地方有警兩相推調誤事等因具題抄出本部為照所奏動那備邊官軍未經勘議難便定奪已經轉行王禎王斌馬恭等從長勘議應否將各營守備官軍各回原處其於人情邊務有無違礙明白具由回奏定奪續該都督僉事王斌題稱都督同知王禎共有官軍一萬五千八百二十五員名仍隨伊操其餘官軍指揮吳信等一千六百五十二員名并慶陽衛指揮白玉等官軍二百五十六員名放還各衛守備誠恐王禎又將放回延慶二衛官軍復調伊處操備臣領官軍委的寡少若不增添實恐誤事除王禎放回延慶二衛指揮白玉等所領官軍并各衛召募壯丁就令守備各處地方外所據延安衛指揮王貴等官軍四百二十六員名只今仍在綏德王禎處隨操亦合退回臣處分撥守備為當等因具題抄出本部又照所奏前項官軍係先議定守邊人數經今年久一旦奏要分更恐有偏徇窒礙又經行移延綏等處鎮守參贊等官都督同知王禎等從公計議定奪應否將所奏官軍退回王斌分守地方明白㑹奏外今王禎又奏前因臣等切聞兵者國之大事將者人之司命必主將偏裨之協和然後軍務緩急之不誤切照都督僉事王斌狡詐無狀剛愎不仁叨受國恩而謬膺重寄統領軍馬而協守邊方自當盡心效力和睦主將以濟邊務以圖成功可也豈期本官非我中興之心膂罔念邊務之重輕素無汗馬之勳勞恣肆如狼之暴戾自往延綏地方守備以來遞年虛張謬論煩瀆聖聽偏執已見沮壞邊務調弄軍馬有同兒戲欺侮主將視為尋常先因本官專權方命恣肆妄為非止一端纍該本部參奏欽䝉恩宥自合刷恥易行改過遷善今却全無忌憚愈肆强梁將奏准調去神木縣禦邊官軍擅自改調安邊營操備既不奏請於朝廷又不會咨於主將設使邊務守備率是以行是則賞罰豫奪之柄不出於朝廷而强梁跋扈之臣得逞其已計其為後患庸可勝言況本官終係族姓微賤難令守備邊方矧當多事之秋宜慎防間之術合將王斌拿送法司明正典刑以為邊將專權不忠者之戒或皇上憐念本官守邊微勞寬免刑誅亦合量為改調勿使終誤大事合無差人馳驛賫文行取本官不必來京就令前去平蠻將軍總兵官靖逺伯王驥處令其領軍當先勦殺貴州苗賊以贖前罪及令王禎馬恭等共同計議推薦厯練老成知兵都指揮或指揮一二員奏請升授代替王斌守備若是王斌仍前倔强飾詞攪擾不行隨即前去就便拿問治以重罪如此庶法令得以歸一邊務不致失誤緣奉欽依該衙門知道事理具題景泰元年三月二十九日奉聖㫖是王禎既纍次奏王斌攪擾邊備難令協守王斌不拿便寫與勑去著做參將馳驛往貴州靖逺伯王驥處領軍殺賊還行文書著王禎同馬恭便從公推選用兵老成熟知邊務都指揮勝如王斌的一二員奏來代替王斌協同守備即今緊關用人之際但徇私謬舉致有失誤事機一體重罪不饒欽此紏都督僉事張軏驕縱疏于謙臣嘗謂食祿居官志當存於報國喪師失律罪難逭於殺身徇曲法以伸恩必長奸而縱惡切照前軍都督府都督僉事張軏器非逺大質本凡庸素無汗馬之勞幸際風雲之㑹列官資於五府萃恩寵於一門惟知縱欲以肆非罔顧越理而犯分驕奢淫泆而僣踰之惡屢彰鹵莽粗疏而統禦之才安在邇者太上皇帝因湖廣貴州辰沅等處苗賊作耗殺害官民特命本官充左副總兵領兵撫捕乃於正統十四年七月日期不等與同總兵官都督官聚率領官軍一萬五千餘人在於貴州平越等衛地方遇見苗賊對敵本官止憑粗率並無計謀兼以紀律之不明營陳之無法既不稟命於主將又不審察於賊情而總督軍務本部尚書靖逺伯王驥恐其壞事再三戒飭令其嚴整部伍相機行事張軏倚恃凶暴而執拗不從口出穢言而當衆毁罵縱未整之士卒犯不測之鋒鏑罔知審勢而度情遂致亂軍而引戰輕率而前進退失據賊刃未交而甲騎先巳遁去官軍潰散而萬人殺於無辜張軏棄甲曵兵徒跣逃命垂首喪氣莫敢聲言上而玷辱朝廷下而遺笑中外致被王驥將失機情由奏䝉皇上俯垂寬宥未即加誅欽䝉取回今巳到京臣等切聞賞罰者天下之公論恩威者天子之大權故賞必及於有功刑必加於有罪然後合上天之心愜衆人之議今照張軏平昔縱欲敗度兹者辱國喪師偃蹇自如素無人臣之節威福恣肆難膺將帥之權服飾僣踰貨利充斥用之於承平之日清議猶恐未然用之於變故之秋大事安得克濟若令再典軍旅必致有誤事機況賞從賤故賞一人而千萬人勸罰從貴故罰一人而千萬人懼以張軏之貴顯驕縱而加以總率兵戎有罪不誅何以示戒合將本官拿送法司究問明正典刑以為人臣蹇慢不恭覆軍僨事之戒臣等職典兵政不敢緘默欲於大班紏劾緣張軏係應議官員具題景泰元年四月初五日奉聖㫖罷欽此紏都督楊俊不法事于謙臣嘗謂臣子以忠孝為先而不忠不孝者天討所不宥將帥以威福為戒而作威作福者國法所難容切照右都督楊俊猥以淺薄遭際盛明以分寸之微勞受一品之重任驕蹇暴虐知有巳而不知有人奢縱貪婪知為身而不知為國待偏裨若奴𨽻視人命如草芥近該伊父昌平侯楊洪奏稱楊俊歷官都督命為參將自幼無知處貴巳極且其性資粗率言語輕躁致為衆人之所擠排士夫之所非議非惟長惡不悛必誤邊事抑恐終陷刑憲不能保全乞將楊俊取赴京師團營日逐操練欽䝉聖恩取回即今本官見在臣等竊惟褒賞有功誅罰有罪此國家之常典亦天下之公論今楊俊叨䝉聖恩忝居重任不能修德以效忠却乃縱情而肆虐先在獨石馬營等處守備專一弄術舞智假公營私蔑視同列交結權貴及遇達賊臨城不能效力死守輒將獨石馬營等處堅城并倉厫錢糧盡行捐棄在逃以致士卒潰散城池失守開賊奔竄之路因而辱國喪師貽禍患於無窮至今人皆痛恨後如宣府參將率領馬步官軍在於懷來等處巡哨不候計議奏請擅出批貼將欽調永寧守備官軍要調懷來守備又將永寧城門砌塞該守備永寧奉御黃整等奏發本部巳將本官方命專權擅作威福緣由參擬覆奏欽䝉恩宥却乃不行改過愈肆非為悻悻而抱不平揚揚以為自得略無顧忌益肆驕矜凌辱守臣欺蔑主將又將都指揮陶忠無故栲打凌辱身死今伊父楊洪恐其敗壞邊務終陷刑辟具奏取回切照楊俊既不能盡忠於國又不能盡孝於親喪地棄城而謀勇之略安在恃恩玩法而人臣之節全無懷挾私讐打死人命衆心因之而不附邊務由之而廢弛誠國法之所難容人神之所共怒若不明正其罪無以警戒將來合將本官拿送法司究問明正典刑庶為後人之戒而愜士論之公緣楊俊係軍職具題景泰元年五月初二日奉聖㫖楊俊拿了三法司門前問楊洪罷欽此名臣經濟録卷三十七
