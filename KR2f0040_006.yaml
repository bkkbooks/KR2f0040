body:
  text: 名臣經濟録卷六明黃訓編保治𢎞治上題振肅風紀禆益治道事馬文升臣切惟贊襄治道固在於百司紏正百司莫先於風紀風紀振則百司自爾各盡其職百司盡職則庶績咸熙而治道隆矣自古君天下者未嘗不以此為先務焉洪惟我朝稽古定制在內設六科給事中十三道監察御史以司彈劾在外設提刑按察司以兼理都布二司軍民又設各道分巡以肅清一道巡按御史總監察焉良法美意至詳且密所以百餘年間相維相統內外肅然近年以來風紀不振是以奸宄得以逞其邪謀羣小得以恣其欺罔賄賂公行紀綱日紊帑藏錢糧浪費空虛貪官汚吏肆無忌憚仰惟皇上嗣登寶位崇重臺諫俾之盡言所以奸邪敗露羣小屏逐風聲頗振百司知警治道之隆端有望於今日矣臣猥以庸材荷䝉聖恩擢總風紀受命以來夙夜兢惕捫心揣已無由仰答知遇之隆近言納忠庶幾少效涓埃之報謹以振揚風紀禆益治道一十五事條陳伏望皇上留心採納俯賜施行臣不勝幸甚天下幸甚今將所言事件開坐謹題請㫖一選賢能以任風憲切惟御史為朝廷耳目之官任風紀之重必須得人方稱厥職我朝自洪武永樂宣德年間不分進士知縣教官皆得除授但選之甚精而授之不茍至正統年間朝廷頒降憲綱新進初仕不許除授御史至正統八年進士復得除之成化六年仍遵憲綱凡遇御史有缺止於進士出身知縣并行人內取中間多有不分賢否但資格相任皆得授任所以未盡得人如䝉乞勑吏部行移各處巡撫都御史并巡按御史并布按二司官各於所屬進士舉人除授到任六年以上知縣內從公推訪亷慎公勤政績昭著民心愛戴實有聲譽者明白具奏遇有御史員缺吏部據此并於考滿行人博士內行取如果六年以上知縣員少於辦事二年以上進士中選取仍照例會同本院官考選具奏除授若所舉不實事發連坐以罪如此則御史皆得其人而風紀為之振肅矣一禁托拾以戒贓官自古嚴贓吏之法所以為安養斯民之計也蓋贓吏之害民猶稂莠之害嘉榖稂莠不除則嘉榖無以遂其生贓吏不去則良民何以安其所我朝於文職官吏受贓不分贓之多寡罪之重輕俱罷職役不叙枉法滿貫充軍其所以定贓吏之法可謂嚴且重矣比先年間巡按御史并按察司官拏問貪贓官吏事無所枉俱不敢托拾具奏其風憲官員得以展布四體而有司官員不敢恣其貪酷十數年來文武官員被人具告貪賘等項重情巡按御史按察司官行提到官對證明白律該為民充軍者往往讎怨原問官員托拾虛詞朦朧妄奏輒將原問御史等官奏准差官提解來京或就彼與先問囚犯一同對理縱辨無干受辱已甚稍有小疵多致降謫虧損國體沮壞風憲莫甚於斯以此風憲官員互相效尤各保職任坐視贓官不敢究問以致法度廢弛貪汚恣肆而小民不得䝉至治之澤如蒙乞勑法司今後凡貪贓等項官員被巡按御史按察司官提問明白追有贓私律該為民充軍不分巳未發落妄揑虛詞托拾原問官員者或另行差官或偹行巡撫等官先行提弔一干人卷勘問明白别無寃枉委係托拾該充軍者發極邉衛分充軍該為民者發口外為民若御史按察司官果有寃枉及違法情罪明白參奏按察司官行巡按御史就彼提問御史罪重者行提來京情輕者候巡按滿日到京參送問罪不許輒便將御史等官一概奏提及就彼與原問囚犯一同取問仍行各處按察司出榜於所屬張掛曉諭如此則貪官知所警懼而風憲不致沮壞矣一擇人才以典刑獄切惟刑者國之重事死者不可復生斷者不可復續而司刑者不可不得其人也得其人則刑罰適中而下無寃民不得其人則刑罰濫及而上干和氣故雖臯陶掌刑而帝舜有明允之命呂侯司刑而穆王有敬明之戒是則司刑之官豈可不慎擇其人而任之哉我朝舊例凡各處按察司官有缺吏部於兩京法司御史郎中員外郎主事評事等官內除授都布二司理問所斷事理問及各府推官有缺俱於法司歷事舉人監生內除授尚不得人近年以來吏部將各處知府除授副使府同知知州除授僉事而推官斷事等官一概以年老監生除授且前項等官多有不識憲體不諳刑名問刑之際止慿奸吏任情出入傷天地之和召水旱之災未必不由於此及各處巡撫按并三司官多有將推官理問斷事往往差遣赴京或别項公幹經年半載不得回任以致問刑缺人尤為誤事如蒙乞勑吏部今後各處按察司不分問刑管屯整飾兵偹等官有缺俱於法司辦事進士及歷事年力精强舉人監生內除授不宜似前一概濫除仍乞勑內外問刑衙門以欽恤為心以人命為重務求真情勿致虧枉仍行各處撫按等官不許將推官理問斷事違例擅便差遣有誤問刑如此則司刑者各得其人而刑不至於枉濫矣一責成效以革奸弊洪惟我朝設按察司以總理各道以肅清郡縣無非欲振揚風紀彰明憲度俾官吏守法而小民之獲安也其分巡官出巡往回月日亦有定制洪武永樂年間各處分巡分管官常出在外遍歷所屬接受詞訟禁革奸弊宣布教條訪察民隱所以貪汚知所警懼軍民不被殘虐近年以來多有顧戀妻子罔肯出巡所過州縣暮到朝行甚至偏僻去處經年不至地方事情全不留意官吏貪酷若罔聞知所以政令日隳而奸弊滋甚矣必須定與期限庶可責其盡職如䝉乞勑各處撫按等官今後布按二司分巡分管官員每年春二月中出巡七月中回司九月即出巡十二月中回司務要遍歷所屬每處所住不拘日期凡貪官汚吏蠧政害民及一切興利除害之事有益地方者務在舉行每季終分巡官將問過賘汚官吏名數追過賘罰等項數目及完過勘合詞訟分管官將催完過錢糧撫安過人民并一應合行事件各開報撫按處查考撫按回日仍具略節總類開奏乞勑該部候三年六年考滿之時據此黜陟若推奸避事曠職茍祿不依期限擅自回司者許巡按御史指實參奏究問若有地方緊急事情應回與撫按計議者不拘此例如此則官無瘝曠而奸弊為少革矣一申命令以修庶務洪惟我朝洪武永樂以來於各邉添設將官假以節鉞之權以鎮守其地各處設都布按三司授以方面之寄以分理庶事無非欲振揚威武修飾邉偹以防外侮之侵承流宣化激濁揚清以造生民之福彼時各官奉公守法仰副委託所以朝廷無外顧之憂生民免流離之苦近年以來各邉將官中間多有指以進貢為名肆意科斂軍士廣置第宅恣情燕樂軍馬凋弊而不整邉偹廢弛而不修一遇有警動輒請兵其各處三司官亦皆因循茍且惟望升遷瘝曠逄迎罔思補報錢糧侵費詞訟不清小民控訴無門盜賊任其滋蔓此皆方今之弊而所當痛革者也伏望皇上降勑切責各邉鎮守總兵并各處都布按三司各巡撫官員務要下思享祿位之榮上念朝廷付託之重洗心滌慮改過自新為鎮守總兵者用心操練軍馬修飭邉偹務使軍士精鋭威武振揚以戰則勝以守則固為巡撫三司者務使朝廷恩澤之下布郡邑貪汚之斂迹倉廪充實軍民安妥凡百政令無不修舉如仍蹈前非許巡按御史從公紏舉國典具存决不輕貸如此則命令申嚴而庶務益修矣一逐術士以防扇惑切惟禁門不許擅入者所以防大奸也左道邪術之有禁者所以懼亂正也故我太祖髙皇帝於大明律及皇明祖訓皆惓惓以致意焉其所以監前代之失而立萬世之規者其慮深且逺矣洪武永樂宣德正統年間邪異之人不敢輕至京師近年以來或扶鸞禱聖或書符呪水或燒煉丹藥或假稱耳報一切邪術人等往往來京潜住始則出入大臣之家終則進入皇城之內妄言禍福扇惑人心如往年李子龍近來李孜省鄧常思之輩夤緣妄為人所共怒莫敢誰何幸而天厭其禍俱巳敗露然雖敗於一時誠恐復於後日若不嚴立重禁何以警戒將來如䝉乞勑各該衙門行令巡城御史及五城兵馬司并錦衣衛巡捕官校嚴督地方人等各於所管地方逐一挨訪除軍匠旗校監生吏典承差知印天文隂陽生醫士上納糧草之人外若係邪術之人不分有無文引無故來京潜住妄言禍福者俱要趕逐出京若一月不出仍前在京潜住者捉送法司問擬明白軍發極邉衛分充軍民發口外為民仍乞勑守皇城四門內外官員今後務要用心關防搜撿但有前項之徒及不係內府工作人役擅入皇城者就便捉獲具奏送問如有故違事發一體治罪如此則邪術有禁而人心不至於扇惑矣一擇守令以固邦本洪惟我朝設官分職各有體統上下相維以臻治理即古六卿分職各率其屬以倡九牧阜成兆民之意也今在外之官方面固重而守令為尤重蓋守令為親民之官得其人則民受其福不得其人則民受其殃自古願治之君未嘗不以守令為重往年知州知縣未盡得人該學士李賢奏准凡遇朝覲之年吏部於聼選監生舉人內不分附選逺近考選銓除臣曾陜西巡撫之時亦曾具奏於進士舉人內選擇除授以此大州巨邑民頗受惠近年以來各處知州知縣有一年不曾除授者甚至有二年除授不到者詢其所以蓋由吏部每選考試之時無堪任守令之人以此正官既缺佐二管事遲一日則民受一日之害且堂堂天朝豈無其人蓋因拘於附選年月所以不得越期除授誠恐豪傑之才坐淹嵗月多致衰老不得實用臣實惜之如蒙乞勑吏部查照大學士李賢奏准事例每年一次於聼選舉人監生內考選年力精强堪任知州知縣者若干人臨時於各衙門辦事進士內相兼選用不許將雜行之人除補仍預訪州縣之煩簡斟酌人才之髙下除授其四川雲南廣西福建路途遙逺江水險惡所除官員一年之上方得到任若候缺到方才除去不無太遲亦須照缺預先一年除授前官縱有事故亦不至於一年之久至於布按二司官各府知府乃守令之綱也所係甚大尤宜慎選升用俾嚴考守令之賢否以報撫按撫按覆考是實轉逹吏部吏部再加訪察以慿黜陟如此則守令庶得其人而政事修矣一嚴考核以示勸懲洪惟我朝舊制凡在京各衙門屬官三年六年九年考滿之時本衙門考核後俱送都察院考核初任稱職者朝廷給與誥勑封贈其親不稱職者不得關給且有黜焉此乃勸善懲惡旌亷戒貪即古三載考績黜陟幽明之意也比先年間依此考核人無異言近年以來各衙門屬官因見本堂上官考稱本院詢訪行止平常考作不稱者輒便揑詞具奏或造謗言原考御史多被連纍自此因循虛應故事以致賢否不分亷貪無辨祖宗勸懲之典廢弛殆盡若不從公考核無以警戒百司如蒙乞勑六部等衙門堂上官今後考核屬官務要察其平昔行止斟酌出與考語若本院考核不稱職官員敢有似前揑詞妄奏原考御史者許十三道御史將夲官實績劾奏有賘者問罪罷黜平常者降調外任其本官委係亷能而御史挾私考作不稱者一體治罪如此庶舊典不致廢墜而官僚知所警戒矣一禁公罰以勵士風切惟科罰科斂法律所當最禁者也邇來人心不古貪風愈盛天下府州縣官員不才犯此者固多中間有等曾經旌奬或上司禮待稱為賢能者往往假公營私罰取百端一年之間所罰銀不下數百餘兩甚至千有餘兩者誠恐議論欲掩人之耳目或領支修理學校或給發蓋造衙門官用者百無一二入巳者十常八九其三司官指公用為由亦各濫罰財物憲宗皇帝眀見此弊之甚曾降戒諭之勑比之穿窬之盜今弊尤存尚不知改且兩京為天下之本四方之極源清則流潔表正則影直兩京各衙門屬官中持正操莭者固多而濫罰財物亦有及供送柴薪皂𨽻到京正數巳足縱容家人掯要銀兩致民嗟怨有玷士風如蒙乞勑各處巡撫巡按并布按二司各行分巡分守官員嚴加禁約所屬不許似前公罰財物虐害小民敢有不悛從公體訪得實不分有無原告就便拿問如律其三司官尤須律巳正人毋蹈前轍如有故違巡按御史即便紏劾仍乞勑南京堂上官各戒所屬以革前弊益敦亷恥之風共助維新之治如此則庶官各知所警而士風為不偷矣一廣儲積以足國用切惟自古君天下者莫不兢業自持省財節用恆以國用之不足為憂洪惟我朝列聖相承或能愛惜民財不肯妄費雖賞四夷不過綵段所以內帑金銀常有數百萬之積近年以來羣小用事妄興造作欺罔多端以致府庫為之空虛天下為之困憊皇上嗣登寶位賞賚未周而內藏巳蕭然矣况天下府州縣倉廪俱無數月之糧而各邉亦止有二年之用萬一邉方有事或水旱災傷將何以濟興言至此深可寒心如蒙乞勑戶部通查在京及天下方面府州縣衛所大小文武官員及各王府宗支一應軍士若干共該支本色俸祿糧若干折色銀鈔若干通計天下嵗收稅糧金銀若干鈔貫若干有無勾用如果不足作何區畫使不缺乏及內帑前項巳空之數如何措置使之充盈或造鈔貫或鑄銅錢或清理鹽法或查勘屯田或閘辦天下之稅課或清查各處之船料凡理財之方足國之計無擾於民有益於國者宜從計處具奏定奪如此則儲積可廣而國用為之少足矣一恤降人以防後患切惟思患預防有國之大事防微杜漸保治之良圖臣切見順天府所屬固安永清武清漷縣及保定等州河間等處洪武永樂年間原安插降人不下千戶百十餘年生齒日繁雖同編氓終係逺人即今精壯男子恐有萬餘為官止慿俸祿而俸祿為有限在鄉者全藉田土而田土為不增况其官折俸銀兩比先年間按季關支近來過二三季或一年不得關支者賴此養贍别無營生一有不足為盜行劫勢所不免萬一邉方有警不無乘機剽掠事之可憂莫大於此必須使之得所庶可保無後患如蒙乞勑戶兵二部計議將在京各衛其官折色俸糧務要按季關與及將在外各處降人如果田土不足者或將空間地土或將入官莊田分撥各人耕種使足養其妻子不致失所以絶為盜之心以杜覬覦之念或選立屯長使有統屬或拘官操練得食口糧該管官員加意存恤果有違犯治之以法凡可以立久逺之規弭後日之患者宜從計處具奏定奪如此則撫恤有方而不貽患於後日矣一清僧道以杜游食切惟天下之事有當緩而所係急者僧道是也蓋所緩者僧道也所係急者民食也若視僧道為緩而不嚴加清查則游食者日衆而民食恆不足矣我朝廷制每府僧道各不過四十名每州各不過三十名每縣各不過二十名今天下一百四十七府二百七十七州一千一百四十五縣共額設僧三萬七千九十餘名成化十二年度僧一十萬成化二十二年度僧二十萬以前各年所度僧道不下二十餘萬共該五十餘萬以一僧一道一年食米六石論之共該米二百六十餘萬可足京師一年嵗用之數况又不耕不蠶賦役不加則食之衆而為之者少矣其軍民壯丁私自披削而隱於寺觀者又不知其幾何創修寺觀遍於天下妄造經典多於儒書敗化滅倫蠧財惑衆自京師逹之四方公私之財用於僧道者過半民食不足未必不由於此其勢又不能盡去若不通將嚴禁則將來游食者何有紀極如蒙乞勑禮部通查天下并在京寺觀共若干處僧道共各若干名除額度之數外多若干名如果數多既巳關有度牒難巳追奪明白具奏不許額外再度僧道直至額數不足之時方許各該有司具結照數起送關給度牒敢有故違再言度僧者許科道官紏勘拿問仍通行各處撫按等官督責官司嚴加查勘但係新修私創寺觀即便拆毁併於古剎大寺觀其中但有原無度牒行者道童即令還俗當差敢有私創庵觀及容隱未度行者道童收為徒弟者各問發口外為民寺觀住持還俗為民僧道官罷軟不舉者罪同所司官員容隱者亦治以罪仍通行天下撫按出榜嚴加禁約仍令各寺觀按月開報不致故違重甘結狀付所在官司查考如此則僧道無濫度之弊而民食不致費矣一敦懷柔以安四夷切惟四夷來貢者慕化之誠朝廷優待者柔逺之道此前代之所行亦我朝之故事也洪惟我太祖髙皇帝膺天明命汛掃前元太宗文皇帝神武雄略威振朔漠四夷八蠻罔不來貢賜以綵段衣服待以下程筵宴十分豐厚使之厭飫所以畏威感恩蠻夷悅服自成化年間以來光祿寺官不行用心局長作弊尤甚凡遇四夷朝貢到京朝廷賜以筵宴與之酒飯大宴品物頗可而朔望見辭酒飯甚為菲薄每楪肉不過數兩而骨居其半飯皆生冷而多不堪用酒多攙水而淡薄無味所以逺人到席無可食用全不舉筯在禮部光祿寺官以為廉逺堂髙直置不為意而安南朝鮮知禮之邦豈不譏笑臣昔往遼東整飭邉偹曽聞逺人怨言亦嘗具奏蒙憲宗皇帝勑令禮部光祿寺凡遇宴待逺人禮部該司官并光祿寺堂上官各一員巡看一時頗可今猶如舊臣若不再言年復一年益加苟且非惟結怨於外國其實有玷於中國此事雖小關係甚重如蒙乞勑禮部查照洪武永樂年間事例及欽奉纍朝奏蒙詔㫖行令光祿寺今後凡遇外夷朝貢到京或該筵宴或朔望見辭酒飯務要照依先年定例差官看視下飯斤數不許短少飲食菜蔬俱堪食用酒亦不許攙水今後除筵宴外其午門外逺人酒飯仍令每日侍班御史巡看但有似前剋減酒肉十分菲薄者許將光祿寺官并局長等參奏拿問如此庶使懷柔有道而得外夷之歡心矣一節財用以蘇民困切惟為國莫先於愛民愛民必先於節用茍不節用必至於傷財傷財必至於害民雖有愛民之心而民不被其澤矣仰惟皇上嗣登寶位之初重下寬恤之詔示以憫念小民凡事減省之言此即大禹克勤克儉文王視民如傷之盛心也天下蒼生無不欣戴且我朝洪武永樂洪熙宣德年間生養休息軍民富足故雖外征北敵內營宫殿樂於趨事未嘗告勞自正統十四年以後天下多事民始覺困自成化年間各處鎮守等官爭相進貢科取百端民愈凋憊加以山西河南陜西連年荒旱不收有司素無儲積民之死亡過半田土荒蕪而稅糧如故北直𨽻山東之民養馬供柴而征徭尤重江南各省人民輪納京儲及供兩京物料民困財竭未有甚於此時者也若非節財之用生養休息十數餘年豈能蘇其困憊然節用之道必自內府減省始如蒙乞勑戶禮工三部各查內府衙門自洪武永樂洪熙宣德正統年間一應供用之物如油蠟猪羊雞鵝及擡柴夫工價銀兩等類某年用若干某年添若干通查明白逐一上陳御覽斷自宸衷量加減省一分則民受一分之惠就為定例不許各衙門再行具奏增添尤望皇上自今凡百用度賞賜更加撙節罷不急之修造裁冗食之人員則帝王克儉之盛德復見於今日而民困為少蘇矣一足兵戎以禦外侮切惟為國之道足兵為先兵有不足外侮何禦書曰張皇六師兵法曰忘戰必危是知自古莫不以兵戎為重洪惟我太祖髙皇帝創制之初設衛籍兵天下之軍共有數百餘萬即今百十餘年而逃亡死絶者過半蓋由里老埋沒而無籍册之可查衛所作弊而無文卷之可慿雖有清軍御史而清出者百無二三雖解到衛所而隨逃者十常八九若再加百年絶故愈多此軍士消耗之弊如此也其見存之軍江南者俱各守邉備倭儧運糧儲江北者俱赴京邉輪班操偹而在衛守城不過老幼數百人都司操練止有餘丁一二千名居重馭輕京師軍士雖有二十餘萬南京官軍雖有五萬之上然多有名無實况騎射之未精什物之未偹加以連年做工疲困巳極輪班往返艱難尤甚此軍士見存之弊如此也消耗之軍既不能復見在之數又不堪用兵戎誠為不足遇警將何調用况今北冦猖獗於甘凉出沒於西北强賊又哨聚於江右此皆腹心之患而大有可憂者如䝉乞勑兵部通行天下都布二司各行所屬衛所州縣有司將所管各里軍戶充軍衛所官旗姓名逐一查理明白衛所各將所管軍人姓名籍貫充軍來歷年月審勘無差各偹造文册江南者送南京兵部江北者送在京兵部各將洪武以來舊册查對如有差訛即便改正仍收偹照務要磨勘明白除年逺盡絶外將宣德以逃故之數每省各抄謄一本該部照例通行各清軍御史嚴督所屬用心清理不許視常虛應故事庶奸詐之徒不敢作弊埋沒其京營官軍候營造憲宗皇帝山陵畢日乞勑兵部徑自具奏請命本部堂上官一員會同各營總兵官將見操軍馬逐一查理先儘團營務足原額之數其南京各營官軍乞勑南京內外守偹官員會同南京兵部堂上官一體清查仍各禁約管軍官員不許私占役使及擅撥做工等項致纍逃亡後清查完日各另回奏仍造册送兵部查考其見在軍士務要著實操練精其騎射養其鋭氣一遇征調俾克成功如此則兵戎不致消耗而戰守為有偹矣𢎞治元年月日題奉欽依這本所言多切時弊該衙門便看了來說欽此題赦言官以光聖德疏儲巏臣等竊見都給事中龎泮等監察御史劉紳等頃因上言免差官校提解武岡州知州劉遜皇上震怒俱下之錦衣衛獄數日以來內而臣工外而軍民莫不私憂竊嘆以為龎泮等不諳事體觸忤聖心即其所言不為無罪所可惜者皇上之盛德國家之大體不可因此一事而有所損爾仰惟皇上即位以來明目逹聰用言聼諫狂直者每賜優容抵牾者未嘗斥逐虛心從善以義斷恩有古帝王所不及者聖德昭彰巳十年矣今乃因其言事一有不當舉六科十三道盡下之獄此雖泮等有以自取然以皇上十年納諫之美而遽然有此傳之四方不能無議書之史䇿不能無疑因一事以掩前功以小故而妨大德此臣等所以竊為皇上惜也且泮等建言亦其職業但今次所論劉遜之事意傷於急遽詞失於婉曲然原其心蓋仰賴聖明在上素有以聼用其言是以隨事納忠不避煩數則其情固可矜而罪亦可略也况科道官乃朝廷之耳目凡國家之利害生民之休戚時政之得失百官之邪正皆得言之是以古之帝王及我祖宗建是言官必選天下直諒敢言之士以充厥職有一言之善者即賜施行雖多言不當者亦不加罪所以奬異而優容者惟以養其敢言之氣使之森然立於殿陛之前於以扶持正論消沮邪謀為廟社之福若摧折之囚繫之中人之資守道狥義者少趨利避害者多彼惟知緘默觀望持祿保位而巳他日脫有大事誰復為皇上言哉由是論之摧辱言官蓋非人主之利也自泮等下獄科道一空攝事署印盡委之人紏儀侍班皆曠其職惟此異常之事豈宜清明之朝皇上臨御之時視瞻所及及燕閒之處思慮所經未必不惻然有動於宸𠂻也昔唐太宗嘗謂侍臣曰比見人來奏事多有怖懾言語致失次第尋常奏事情猶如此况欲諌諍必當畏犯逆鱗所以每有諫者縱不合朕心朕亦不以為忤若即嗔責深恐人懷戰懼豈更肯言貞觀六年陜縣丞皇甫德參上書忤㫖太宗以為訕謗侍中魏徴進言曰自古上書率多激切若不激切則不能起人主之心激切即似訕謗惟詳其可否太宗曰非公無能道此者令賜德參帛二十段故臣等嘗論唐太宗非惟能容人之諫又導人而使之諌非惟不怒人之諫又賞人而使之諫故貞觀之治庶幾成康實其屈己納諫所致也欽惟我朝列聖尤喜諫諍臣等不能悉舉謹具一二事以言洪武初年朝臣有上疏萬餘言者太祖厭其迂衍怒欲罪之羣臣有阿意者指其疏曰此不敬此詆謗罪當誅上怒未解宋濓對曰彼應詔上疏其心為朝廷耳烏可深罪乎上覽疏中有足采者召阿意者罵曰吾怒時若等不能諫乃激吾誅之何異以膏沃火向非宋濓之言幾不誤罪言者耶洪熙初大理少卿弋謙數言事有言其賣直沽名者楊士竒對曰主聖則臣直惟陛下容之不然進言者將懼矣仁宗雖不罪謙然免其朝參令專坐司視事自是一月餘言事者少仁宗諭士竒曰自免弋謙朝言者不至豈果無事可言遂令士竒就前草勑引過命弋謙如舊朝參令百官言毋以謙為戒此祖宗之聖德明訓皇上所當祖述憲章者也今龎泮等不識事體縲絏下獄已示之罰矣伏望皇上廓天地之量霽雷霆之威沛發明詔不日而赦之則不惟泮等心懷感愧益圖報稱而內外大小之臣六軍萬姓之衆莫不歌詠聖德歡欣交通四方傳之以為盛事史䇿書之以為美談德業之盛名譽之美真可以匹休祖宗而貞觀之治有不足言矣然此豈髙逺難行哉惟在聖心獨斷一轉移之間爾臣等待罪大臣義同休戚是以昧死以盡惓惓之愚忠惟皇上赦臣等之罪而採納焉名臣經濟録卷六
