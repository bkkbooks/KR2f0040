body:
  text: 名臣經濟録卷十明黃訓編保治正德下題為宥小臣以全大體事楊一清正德六年十二月二十五日該禮部差監生賫捧欽奉勑禮部三法司兹者新正在邇萬物咸亨在京及南京見任文武羣臣除贓罪外自正德六年十二月二十五日以前所犯罪名紀録在官者悉與湔除俾圖自新故勑欽此欽遵仰惟皇上體天道發育之仁乘陽德泰亨之慶特降恩綸覃及臣下湔其罪過與之更新凡居覆載之中悉荷生成之賜臣備員大臣所宜仰體聖懷推𢎞化理切見刑科給事中竇明以陳言得罪奉欽依拿問監禁月久未蒙宸斷發落臣思比者臺諫論列多被嘉納未嘗譴責人方仰頌聖明從諫之美今竇明所陳之事臣不能知必是迂疏狂誕不達時宜所以上忤聖意罪固難辭但人臣進言於君大抵心乎為國非為其私給事中以言為職有所敷陳皆其分內雖涉狂妄猶勝緘默且近日京師地震蒙命羣臣同加修省况盜賊猖獗地方多事正當公聽博納以匡不逮而使言者獲罪彼一小臣耳誠不足惜竊恐中外臣工因而相戒以言為諱凡禦盜安民一切有益之事無復敢為朝廷言之其於治體不無少損其於修省似為彌文伏望皇上𢎞天地之量寬雷霆之誅當此泰開物亨之始乞將竇明罪過特賜湔除早為釋放以廣惟新之仁以盡修省之實則聖德益光治功有補人心悅服而天意可回矣緣係乞恩宥小臣以全大體事理未敢擅便謹題請旨題為急大本以圖治安以盡修省事楊一清臣等聞之主聖則臣直今聖主在上澤壅而未宣情格而不通天下之事日趨於弊臣等默無一言是終為容悅而上無以張主之聖下無以解於百姓之惑也罪可辭哉仰惟陛下天錫勇智神授英明自居春宫萬姓仰德及登大寶四夷向風不幸賊臣劉瑾竊弄威柄流毒生靈潛謀僭逆幾危郊社賴祖宗上天之靈假手近臣發其罪狀陛下奮雷霆之斷誅滅黨與剗滌凶穢復纍朝之舊章弔羣黎之疾苦息煩屏苛與民更始舉賢任能庶政一新天下莫不歡欣鼓舞謂陛下固愛民之主而前此皆賊瑾之荼毒知陛下固有為之君而前此皆賊瑾之蒙蔽日夜跂足延頸以望天下太平奈何積暴所加民痍未復餘烈所煽妖孽荐興盜賊烽起將及二年兵屯不解民困益甚陛下又嘗采納廷議命將出師招降撫順以安脅從蠲賦寬租以蘇凋瘵督責之令相尋賑貸之使迭出廟堂之上算無遺䇿然議論多而成功少即今師老財耗公私俱竭中原數千里之地僵尸漬血殺人如麻大村巨落蕩為灰燼戕賊我將吏攻陷我城池不知其幾事勢至此亦云極矣况比嵗乾象失常坤輿弗靖上天之示譴不一四方之告變無時臣等觸目生嗟經心抱痛殆非一日近該禮部題奉欽依文武百官同加修省拜稽之餘感愧交集展轉思之無以為計竊惟朝廷四方之極君身天下之本意者今日之所建白小舉而大遺徒事其末而弗究其本天未悔禍人未厭亂職此之由陛下有堯舜之資臣等不能導陛下於三代而使天下之人疾首蹙額懷怨積憤如漢唐之季死有餘罪矣謹托今日之政關係大本最切要者為陛下陳之夫朝以出政政以成事每旦視朝帝王聽政之恆規也陛下每月朔望之外視朝不過一二豈非欲𢎞委任責成之道以成端拱無為之化乎然臣之於君猶子之於父母也子之於父母一日不見則思數日不見則憂羣臣百司願時一覩聖顔一聞天語久而不得則進退惶惑倀倀無依憂思鬱結漸以解弛且逺近之民遂疑陛下不復念其窮苦而日興怨懟四方盜賊亦謂陛下未嘗有意剪除而益肆猖獗不可聞於外夷不可訓於後世伏願繼自今昧爽視朝令諸司照舊奏事日以為常黼座僅臨於數刻綸音不越乎數言未足為勞而可以收權綱決壅蔽示百官之承式回萬方之視聽亦何所憚而不為乎古者天子退朝深宮燕息以養天和出警入蹕防範備至竊聞龍輿常幸豹房駐宿纍日豹房不知為何所似非天子所居又聞日於後苑訓練兵戎鼓炮之聲震駭城域豈非念安不忘危之戒而為思患預防之術乎顧此乃將帥之事兼非宮禁所宜密邇廟社恐無以妥神之靈况今前星未耀震位猶虛而乃疲力於擊射之餘耗神於馳逐之下且千金之子坐不垂堂壯嵗乏嗣則其心為之惕然陛下奈何以宗廟社稷之身而自輕若是此羣臣之所以夙夜而不能安也伏願繼自今髙拱穆清深居禁密戒嬉遊無度之勞以保心體之和逺混雜不經之所以消意外之慮自然血氣循軌精神內固上帝孚啓聖之祥後宫衍多男之慶國本有託人心以安宗祧至計莫急於此至於經筵日講陛下嗣位之始時常舉行近嵗講期甫臨輒聞報罷勸講之官始為虛設書曰學於古訓乃有獲且一心之微攻之者衆不在此則在彼不遊心於詩書理義則放情於宴安逸樂固其所也伏望繼自今祇循舊典時御經筵非盛暑隆寒不可輒罷仍舉行日講故事就近儒臣講論經史涵泳義理以培養本原則聰明有所開發治道日益明暢天下至樂無以逾此而百凡好尚皆不能奪之矣前此三者天下之大本在焉易曰正其本萬事理大學曰其本亂而末治者否矣陛下俯垂聽納見之施行由是修聖政以亨天下之屯廣聖嗣以定天下之志𢎞聖學以成天下之務大本既立庶政末節各有司存自當隨事納忠以圖報稱則天意可回民生可遂冦盜可消境土可寧上以承祖宗之洪休下以垂子孫之大統近以慰臣庶之憂疑逺以答華夷之觀向實宗社萬億年靈長之福也臣等竊時髙位勢共安危受國厚恩義關休戚當四方多事之際不能展一籌以紓患害兹奉明旨修省若又不能極陳探本之論以贊維新之化依阿淟涊茍度嵗年縱能免觸逆之罪於一時豈能逃誤國之罪於他日乎臣等忠憤填臆不知所裁冒犯天威罪當萬死緣係急大本以圖治安以盡修省事理謹題請旨正德七年五月十二日奉聖旨朕已知悉了卿等安心辦事欽此諫獵虎疏王思臣聞臣之於君猶子之於父休戚利害本同一體此臣所以昧死流涕而獻其愚也臣竊惟孝宗敬皇帝之子惟陛下一人上賴以承宗社之統下賴以啓萬世之傳不可一日不致其謹也近者道路傳言虎逸於柙驚及聖躬臣聞之且駭且疑豈有陛下聖神文武而不為宗社萬世自重也哉臣竊觀陛下即位以來於兹九年朝寧不勤政太廟不親享兩宫曠於問安經筵倦於聽講揆厥所自蓋有二端曰嗜酒而荒其志好勇而輕其身由是戒懼忘於縱欲好惡由於喜怒威柄移於左右政令出於多門紀綱日弛國是不立士氣摧折人心危疑上天示警日食地震宗社之憂凜若朝夕今勇不可好陛下薄有所懲矣至於酒不可嗜臣請得而言焉夫荒志廢業惟酒為甚而天子一日萬幾尤當有節書曰甘酒嗜音峻宇雕牆有一於此未或不亡其末流之禍如此今陛下露處外宫日湎於酒厮養雜侍禁衛不嚴其荒志廢業已足深戒更或變起倉卒何以備之此臣所以大憂也伏望陛下以天命為可畏以祖宗為可法懲創往事克謹嗜欲預防外患還蹕深宫又必親享太廟孝養兩宫總攬乾綱緝熙聖學使俄頃轉移之間德業極其盛大豈不善哉臣越職言事不勝恐懼待罪之至奏宗社大計事羅玘臣少迂愚漫不諳事壯而登仕其愚如初今已老矣自分與愚終焉而已矣思天下聰明才辨之士何可勝數而或沉冥牖下或困滯下僚或不霑一命者在在有之顧臣之愚乃獲竊祿先朝備員侍從又於陛下登極改元之初自翰林侍讀超升南京太常寺少卿僅踰二年起升本寺卿又踰年轉南京吏部右侍郎臣又思前之任翰林者雖文華卓越十倍於臣而猶循資歷格有進寸退尺者有白首終身汨沒者臣獨何人六年之間驟進如此謂非陛下天地曠蕩之恩可乎臣又思感恩之極人雖至愚茍有一得之見自畏一身之死懷而不為明主吐之及至老疾病篤而畢竟以死是畏死而不免於死徒感恩而不知報其恩其果得為忠乎又果得為知乎使死而有知也寧不悔於地下乎且臣之所謂一得之見非指四方盜賊衆人目前所謂急者也亦非隱微而潛伏也左右大臣所共知也百司庶尹言官所共知也閭閻小人外至荒服夷狄所共知也或畏死而不敢以言或以其職而不得以言或卑且逺而不獲以言或懷祿保位而不肯以言甚或乘隙市姦謀非常之貴富而幸人之不言為已地者焉斯亦可為寒心也哉何也陛下受太祖太宗列聖之付託以天下六年有竒於兹矣而地久天長萬壽無疆固將自兹始也然亦必如祖宗有所付託於陛下陛下乃無負祖宗所託也不知陛下今之將所付託者何在耶前日賊瑾之謀逐榮王借使當時顧命大臣以死助陛下諍留榮王張綵雖狡急於助逆彼知有天潢血屬之在肘腋其敢萌是心乎是無血屬之在肘腋足以召亂明矣幸天啓聖衷卒殲滅之瑾滅之後可保決無瑾乎若綵則今班行中未必無綵也何以名之凡以公呼瑾者起此輩保能不以事瑾者事之乎綵獨惡著而先發焉耳賴列聖神靈俾瑾綵識膚慮淺其迹易見萬一有莽操者出於其間不知何以殲之自古人主之孤立其危豈若是哉宋之司馬光婁寅亮其心忠於社稷而卒有賴其言豈不可用歟伏望陛下蚤堅宸斷為宗社之計以繫海宇臣民之望以絶姦雄睥睨之心然後螽斯衍慶麟趾肇祥舉先正歸藩之義正元良主鬯之規斯萬世之長䇿也亦愚臣垂死圖報萬分之一也臣言至此惟知宗社不恤其他故不文不文故不諱不諱故傷觸權姦傷多觸多故中傷陷致罪辟以至於死臣亦甘心分內事也臣瞻望闕廷不勝激切屏營之至為此具本専差義男賫捧謹具奏聞奏蚤定宗社大計以絶窺覬事羅玘臣於去年四月具本差義男羅秀賫奉內開向者賊瑾謀逐榮王當時顧命大臣不能死助陛下諍留榮王致使陛下肘腋之間無一血屬之親足以召亂彰彰有前驗也故舉宋司馬光婁寅亮之故事以瀆天聽兼備責諸臣蕩無亷恥阿附賊瑾之狀而又發其後日乘時觀望不忠之謀冀以感動宸衷即賜施行以慰海宇臣民之望以消姦雄睥睨之心然後螽斯衍慶麟趾肇祥禮遣歸藩爰正主鬯臣雖譴死固其分也是後寂然不聞示諭臣料必是後宫儲祥將次彌月臣之私喜旦夕望之及今踰年更無影響徒聞大盜並興遍布天下連數十城所過如洗運河兩岸焚劫殆空前日縛殺方面今日射死將官近於楊村剖剝參將王杲夫楊村去京城幾何而眼空如此臣謂國本不定姦雄睥睨今何如哉前月二十三日湖廣陽邏地面傳來流賊執殺右副都御史馬炳然臣初疑似之間以為副都御史九卿之二也且非受命征勦之不過遇之而已而輒殺之則九卿之長遇之必殺也九卿之長敢殺之則公侯駙馬遇之必殺也是尚知有朝廷威令哉而朝廷左右尚為有人乎而臣亦備員九卿之二亦在賊必殺之中誓當不與此賊俱生賊生臣死賊死臣生也亦痛夫國本之未定而睥睨之萌漸不可遏已至此也然尚斷然不信傳來之言忽於今月十三日申時迎接炳然之吏王廷昌回報云親斂炳然之尸面劈一刀而去其鼻身中兩箭而傷其肋臣即跌仆在地口鼻流血昏暈沈冥如同氣絶臣知不久不以妻子自隨止憑一二小童扶摩灌飲至曉略蘇目今便血如流肋骨已解氣息奄奄死在旦夕尚恐賊窮生計魚遊釡中火燃未沸且喘息須臾之命百般搜索或至擁如盆子者一二人焉馳騖中原誘聚不逞百姓愚頑未明逆順諸將狐疑益見逗遛事機一變成敗分焉自是一二大臣雖欲假竊包荒養髙之名以庇其私門桃李之黨如數十年前恐未可也而陛下尚欲與數十近習為講武之舉寧有暇哉臣敢於未死之前披瀝肝膽再申前請伏望陛下幹乾轉坤少垂睿覽立召皇親公侯駙馬伯府部院寺大臣翰林院科道多官考司馬光范鎮韓琦文彥博吕誨包拯趙抃諸臣之議棄短取長酌古準今藏鋒斂鍔隨事據理假代九廟之勤劬兼託兩宫之奉侍體祖宗之意而不懸定順昭穆之序而無即真專候桃房之芳快覩前星之耀納衆庶於不識不知之天褫姦雄於如雷如霆之下則臣誅死猶生之年亦甚樂也臣不勝憤激屏營之至為此具本専差義男羅秀賫捧謹具奏勑旨論時政疏黃鞏已卯春有旨南巡時寧藩蓄逆上下以為憂大臣科道交疏不聽諸部寺司屬咸起而諍之以其事出於邊將江彬誘惑彬方席寵擅權無敢及之者鞏獨疏六事略曰陛下臨御以來祖宗之紀綱法度一壞於逆瑾再壞於佞幸又再壞於邊將之手至是將蕩然無餘矣天下知有權臣而不知有陛下者寧忤陛下而不敢忤權臣陛下弗知也亂本已生禍變將起竊恐陛下知之晚矣試舉圖治六事於今為最急者為陛下陳之其一曰崇正學嘗聞先儒周惇頤有曰聖人定之以中正仁義而主靜立人極焉又曰吉凶悔吝生乎動吉一而已動可不慎乎故唯聖人為能主靜惟君子為能慎動仰惟陛下聰明天縱有古帝王之資然其所以盤遊無度流連忘返者無乃動之過乎論思勸講之臣職在格心於是乎不能辭其責矣伏望陛下髙拱九重凝神定慮屏紛華斥異端逺佞人招延故老咨訪忠良可以涵養氣質薰陶德性而聖學惟新聖政日舉矣其二曰通言路嘗聞言路國家之命脈也言路之通塞國家之治亂係焉切見近時臣僚奏牘間或言及時政往往匿不以聞其或事關權臣則又留中不出而中傷以他事夫古之明王導人以言用其言而顯其身後世則不然不用其言而反罪焉今則又不然不使其以言獲罪而以他事獲罪由是雖有安民長䇿謀國至計無因以達於九重之前雖有必亂之事不軌之臣陛下無由而知之矣天下烏得而不亂哉伏望陛下以從善為心以聞過為明廣開言路以作士氣不責以出位不加以好名如此則忠言日進聰明日廣雖亂臣賊子亦將有所畏而不敢肆矣其三曰正名號嘗聞孔子有曰名不正則言不順言不順則事不成禮樂不興刑罰不中民無所措手足凡以名之不正故也陛下近日以來無故自稱為威武大將軍太師鎮國公逺近傳聞莫不驚疑竊嘆以為怪事陛下聰明智勇上嘉唐虞下樂商周何所不至顧乃自輕如此奈宗廟社稷何夫陛下自稱為公誰則為陛下者天下不以陛下事陛下而以公事陛下是天下皆公之臣而非陛下之臣也伏望陛下即日削去鎮國公等名號以昭上下之分以明示天下之人庶幾體統以正而朝廷自尊矣不然古之天子亦有號為獨夫與欲為匹夫而不可得者竊為陛下懼焉其四曰戒遊幸嘗聞大禹曰罔遊于佚罔淫于樂周公告成王母淫于觀于佚于遊于田春秋譏觀魚終綱目書巡者二十九皆譏也陛下始特遊戲不出大廷馳逐止於南內論者猶謂不可既而幸宣府幸大同幸太原幸陜西榆林諸處所至費財動衆寓縣騷然至使民間一夫一婦不能相保陛下為民父母何忍使民至此虧損聖德貽譏萬世陛下自視為何如主也近者復有南行巡狩之命南方之民爭先挈妻子以避去者流離奔踣敢怨而不敢言即今江淮之飢父子兄弟相食天時人事如此加以休息愛養尤恐不支况又重以蹙之其何不流而為盜速而為死亡也哉姦雄窺伺待時而發變生在內欲歸無路變生在外望救無及陛下斯時悔之晚矣彼居位大臣用事中官親昵羣小皆欲陛下逺出而後得以擅權自恣乘機為利也其不然則亦袖手旁觀如秦人視越人休戚之不相涉也夫豈有一毫愛陛下之心哉彼誠愛陛下者獨忍使陛下馳逐蒙塵而莫之救止也伏望陛下深惟往事之非翻然悔悟下哀痛罪己之詔與民更新罷南巡撤宣府行宫示不復出發內帑以賑江淮之飢散邊軍以歸卒伍斥不御之女以各還其家雪既往之謬舉收既失之人心如是則尚可為也其五曰去小人嘗聞易曰開國承家小人勿用自古小人用事未有不亡其國而喪其身者也謹按今之小人簸弄威權貪圖富貴者實繁有徒至于首開邊事以兵為戲使陛下勞天下之力竭四海之財傷百姓之心至今紛紛未已者則江彬之為也彬本行伍庸流凶狠傲誕無人臣禮臣等但見其有可誅之罪而不見其有可賞之功今乃賜以國姓封以伯爵託以腹心付以提督京營之寄此養亂之道也彬外挾邊卒內擁兵權騎虎之勢不亂不止天下之人切齒唾罵皆欲食彬之肉彬不誅天下亂必自彬始陛下亦何惜一彬以謝天下哉伏望陛下大奮乾剛將彬下諸廷議明正典刑以為姦邪小人迷亂之戒其六曰建儲二嘗聞漢人有言曰太子天下本本一搖則天下震動夫有本而搖天下猶震况於無本其何以安洪惟陛下春秋漸髙前星未耀祖宗社稷之託懸懸乎無所於寄方且逺事觀遊屢犯不測之區此必危之道也陛下徒知收置義子布滿左右獨不能豫建親賢以承大業臣以為陛下殆倒置也伏望陛下早及是時將近時羣臣建儲章疏通行檢出宣付皇親勳舊及在廷文武大臣共圖大議即於宗室中遴選親賢一人養於宫中使視皇子以繫四海之望待他日誕生皇子之後俾其出就外藩如此則繼體有人國本以固實宗社無疆之休惟聖明其留意焉車駕員外郎陸震見其疏稿願同署名以進疏既入自分必死為書别知友託以後事及收拾遺文彬果大怒欲必置之死乃下詔獄廷跪五日杖百餘除名陸竟死鞏體極修羸幸得蘇以詩遺弟曰不用汝謀方至此須知我道固當然蓋萬死不悔也李紹賢哀辭舒芬崇德死豫瘡甚伏蓐不能走哭哭於家慟侍者曰子亦弱喘餘魂其毋傷哉不知豫於崇德死不能不慟者有六焉以諫死死杖下酷烈一也死慶壽僧房惟一二僕之手二也豫輩厚善者皆不能與斂事微蔣虞中奔往視則棺不可蓋三也始車駕議以三月十九日壬子警道東巡祀岱宗歷徐揚抵南京下蘇州復浙江浮湘漢登太和太嶽且遍中土繁麗人情洶洶懼變叵測將相大臣多慫恿之豫鄉同年夏考功萬儀制館中汪子宿輩約風諸小臣連章乞留十五日早報免朝豫乃率館中同年先入疏兵部黃伯固陸汝亨論時政疏亦入時百司皆懷疏集闕下太宰陸公沮之且造歸惡語昳時夏于中萬汝信過豫扼腕恨沮義豫因邀陳太常至俱酌之酒贊之匹夫之志今其可奪三子是夕遂於吾寓連疏入且以告諸同志明日吏部張元承等刑部陸天爵等疏俱入又明日禮部薑夢賓等兵部孫鳴和等行人司余伯獻等俱連疏入時又有太醫院醫士徐鏊以醫諫車駕遂不果出乃二十癸丑天威震怒以黃鞏陸震夏良勝萬潮陳九川徐鏊等下錦衣衛獄以舒芬張衍慶薑龍孫鳳陸俸等百有七人跪午門外五日而行人司疏不報以通政司壅之也諸臣待罪離次至二十二日得報命余廷瓚等俱下獄明日同黃鞏等六人亦跪午門外五日梏拳是日工部林以乘等三人大理寺周子厚等十人亦連疏入明日俱下之獄亦梏拳跪五日時復有金吾衛指揮張英以是為變故明效言車駕出必不利乃肉袒戟刃于胸以死諫數日天色隂霾京師震駭公卿被唾罵瓦礫擲晨夕出入不敢待别色其尤顯者至減去辦事官吏易箱笈以包袱在昏曙中若以為異流然姦無所容益謀蔽惑請命禮部告示禁一槩言事者通政司送格不受疏又有貢諛參劾各屬為妄言者而天威遂不可霽乃二十五日戊午是日水溢內海子自不了橋髙四尺鐵柱七根齊折如斬命舒芬等一百有七人俱午門外前去衣打三十為首者調外任其餘罰俸六箇月四月十六日己卯是夕月食命黃鞏等六人午門前去衣打五十徐鏊邊逺充軍其餘為民林大輅周敘余廷瓚打五十降三級調外任其餘打四十降二級時死杖下者員外郎陸汝亨主事劉宗夏何孟循評事林質夫照磨劉珏行人司副余伯獻行人孟子乾劉平甫李德卿詹敬之與吾崇德蓋十有一人而瘡痍未起者尚多也夫首義者于中汝信子宿與豫四五人而已使豫能為太宰沮則于中汝信之疏且緩矣諸公之氣亦衰矣安得此舉哉致十一人慘死而我獲生四也是役也雖士氣少振姦謀少沮而國體亦少損五也自正德戊辰九月我與崇德同投文南京禮部明日同入國子監驢背一話遂相許善資麗澤而朝夕見者三年情又密昨丁丑又同年為進士戊寅春大喪朝夕哭未卒議往視山陵豫度其且狩宣府明日具上封事崇德過豫曰夜間報似非禮之禮微豫莫能辨析可但已乎告以疏早入矣崇德欣然曰適奉慰時與羣可語者料此義須君發之果然人將服吾知人也子視我真知已耶是同年相知莫深於崇德六也嗚呼豫哭崇德有此六者烏能不慟哉用直何景明夫國內有自擅之臣而外有敢敵之冦者在位無直節之士也夫直節之士行髙而不回言危而不遜行不回故有匡救之義言不遜故有諫諍之忠於是內無不發之姦外無不見之亂雖有自擅之心者無不弭也雖有敢敵之氣者無不沮也夫山有猛獸藜藿不採朝有直臣姦宄不生故直節之士邦之司繩而國之強禦也故司繩不得職則邪枉行矣強禦不在列則盜賊至矣可不畏哉夫亡國之君非無直節之士也有之而蔽於邪臣間於敵國也夫直節者邪臣之忌敵國之憂也我蒙其蔽而受其間則直節不得志直節不得志則邪臣遂而敵國昌也夫直節去讒諂至讒諂之人者內順而外交能使視聽閉言語塞夫視聽閉則亂不見言語塞則姦不聞於是宫庭容久伏之禍邊境有卒至之憂徑弩射於城中長戟起於輦下上莫之知而下莫之告者大臣懷首領之愛而羣臣畏口舌之誅也昔趙髙欲専制恐羣臣有言先指鹿為馬羣臣無敢言者陳涉起山東二世召博士諸生問之皆莫敢言叛叔孫通乃詭對而出逃夫二世弗明不能用直臣而蔽障於讒人故內以遂邪臣而外以資敵國也是故邪臣無不欲去其所忌敵國無不欲逐其所憂晉以垂棘之璧屈産之乘假道於虞而宫之竒去齊以女樂文馬賚季桓子而孔子見沮秦穆公憂由余之在戎餽戎王以女樂戎王樂其女樂五月不還由余諫不聽而亡夫外有悅目之欲內有惑聽之讒則賢不知其可寶而才不知其可惜也故虞為晉逐宫之竒魯為齊逐孔子戎為秦逐由余夫三國者非不知賢聖才智也悅於欲而惑於聽也夫直士人主之所難用也矯正而不能順遂自重而不能茍容非其職不食不得其道不仕夫邪臣者人主之所狎而重寶美色人主之所玩好也夫重寶美色在前邪臣在左右則無所置直士矣故孔子不與女樂并容於魯宫之竒不與璧馬同止於虞蓋勢有所不合也夫蘭艾不同室玉石不同藏故用直士則必去讒佞逺貨色矣夫讒佞者直士之賊也貨色者直士之蠧也養賊容蠧而曰我有以用直士難矣名臣經濟録卷十
