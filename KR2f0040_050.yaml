body:
  text: 名臣經濟録卷五十明黃訓編工部都水中南旺廟碑記尚書宋公禮同都督周長等發山東丁夫一十五萬登萊二府願趨事赴工之人一萬五千疏鑿會通河先是洪武二十四年河決原武縣黑陽山由舊曹州而河口漫過安山湖而會通河遂淤自濟寧至臨清三百八十五里舟楫不通乃於濟寧迤北至城材等遞運所凡軍需錢糧之輸北者悉陸運至德州凡七百里始入衛河至是疏鑿之又塞舊曹州鄆城兩處河口濬沙灣至舊曹州一帶河道又同刑部左侍郎金純等督河南運水夫開黃河故道自開封城北起下達鄆城至魚臺縣塌場口入於漕河又疏山東七十二泉匯於分水故永樂九年太宗降綸音一章曰工部錦衣衛便差四箇官鋪馬裏去都齊到那黃河新開口子處討兩隻船從那裡看將下來到舊曹州兩河口分開一路往會通河郡一帶去一路往穀亭這一帶來看那兩條河的水勢行得如何還看那黃河水比先是那一處漫過安山湖那一帶去淤塞了河道若是那原漫過水處隄岸低薄時就再整治得髙厚若不低薄時罷將文書去與宋尚書每知道欽此則其委任之重亦可見矣先是朝廷開河道不過欲通天下貢賦未専於漕運也十年宋公始議會通河儧運北京其奏狀曰永樂十年某月某日工部尚書宋禮奏海運糧儲每年五月太倉開洋直沽下卸待秋回京船隻多被損壞亦有漂失不見下落者俱用修理補造分派江西湖廣浙江等布政司并直𨽻徽州等府軍衛有司相兼修造俱限次年三月終完備駕赴太倉應用因限期逼迫措料不及不免科斂鈔物買辦其間作弊受害者不可勝言造船者惟顧眼前之急不慮速成不堅之患計其所費物料人工又難細舉且如造千料海船一隻須用百人駕使止運得一千石若將用過人工物料估計價鈔可辦二百料河船二十隻每隻用軍二十名運糧四千石以此較之從便則可如將鎮江鳳陽淮安揚州四府嵗徴糧米定撥七十萬石赴徐州并兖州府糧米三十萬石赴濟寧州交納差撥近河徐州等衛旗軍一萬名各委指揮千百戶管領工部撥與二百料淺船五百隻一如衛河事例將前項倉糧從會通河儧運供給北京每三年海運二次使造船者無逼迫之患駕船者獲堅久之利以兩河并海運計之三年可得八百餘萬十年之間國有足食之備民無繁擾乏憂至十二年遂罷海運而平江伯亦疏鑿淮揚一帶南北遂會通矣至今為國大利而宋公之功當為第一都督周公侍郎金公亦不可不謂之賢勞厥後傳謂宋公有微過朝廷督責之革其冠帶止服儒巾治事其權中微而平江之功愈彰故今人惟頌平江伯而不及宋公故丘文莊公嘗過會通河有感賦詩曰清江浦上臨清閘簫鼓叢祠飲餕餘幾度會通河上過更無人語宋尚書後李文正公各有詩其意在言表矣後主事王始請於朝建祠祀於分水龍王廟之偏因併録之以示來者知宋公之功不可沒也敕修河道工完之碑徐有貞惟景泰紀元之四年冬十月十有一日天子以河決沙灣久弗克治集左右丞弼暨百執事之臣於文淵閣議舉可以治水者僉以有貞應詔乃錫璽書命之行天子若曰咨爾有貞惟河決於今七年東方之民厄於昏墊勞於堙築靡有寧居既屢遣治而弗即功轉漕道阻國計是虞朕甚憂之兹以命爾爾其往治欽哉臣有貞祗承惟謹既至乃奉揚明命戒吏飭工撫用士衆咨詢羣䇿率興厥事已乃周爰巡行自北東徂南西踰濟涉汶沿衛及沁循大河道范以還既究厥源流因度地行水乃上陳於天子曰臣聞凡平水土其要在知天時地利人事而已天時既經地利既緯而人事於是乎盡且夫水之為性可順焉以導不可逆焉以堙禹之行水行所無事用此道也今或反是治所以難蓋河自雍而豫出險固而之夷斥其水之勢既肆又由豫而兖土益疏水益肆而沙灣之東所謂大洪之口適當其衝於是決焉而奪濟汶入海之路以去諸水從之而泄隄以潰渠以淤潦則溢旱則涸此漕途所為阻者與然欲驟而堙焉則不可故潰者益潰淤者益淤而莫之救也今欲救之請先疏其水水勢平乃治其決決止乃濬其淤因為之防以時節宣俾無溢涸之患必如是而後有成制曰可臣有貞乃經營焉作治水之閘疏水之渠起張秋金堤之首西南行九里而至于濮陽之濼又九里而至于博陵之陂又六里而至于夀張之沙河又八里而至于東西影塘又十有五里而至于白嶺之灣又三里而至于李􅕞之涯由李􅕞而上又二十里而至于竹口蓮花之池又三十里而至于大伾之潭乃踰范暨濮又上而西凡數百里經澶淵以接河沁河沁之水過則害微則利故遏其過而導其微用平水勢既成名其渠曰廣濟閘曰通源渠有分合而閘有上下凡河流之旁出而不順者則堰之堰有九長袤皆至丈九堰既設其水遂不東衝沙灣乃更時出以濟漕渠之涸阿西鄄東曹南鄆北之區出餘波而資灌溉者為頃百數十萬行旅既便居民既安有貞知事必集乃參綜古法第而為之加神用焉既作大堰其上鍵以水門其下繚以防隄堰之崇三十有六尺其厚什之長伯之門之廣二十有六丈厚倍之隄之厚如門崇如堰而長倍之架濤截流柵木絡竹實之石而鍵以鐵蓋合土木火金而一之用平水性既乃導汶泗之源而出諸山匯澶濮之流而納諸澤遂濬漕渠田沙灣而北至于臨清凡二百四十里南至于濟寧凡二百一十里復作放水之閘于東昌之龍灣魏灣凡八為水之度其盈過丈則放而泄之皆通古河以入于海上制其源下放其流既有所節且有所宣用平水道由是水害以除水利以興初議者多難其事至欲棄渠弗治而由河沁及海以漕然卒不可行也時又有發京軍疏河之議有貞因奏蠲瀕河州縣之民馬牧等役而専事河防以省軍費便民力天子從之是役也凡用人工聚而間役者四萬五千有竒分而常役者萬三千有竒用木大小之材九萬六千有竒用竹以竿計倍木之數用鐵為斤十有二萬鍵三千組百八釡二千八百有竒用麻百萬荆倍之藁秸又倍之而用石若土則不計其算然其用糧于官以石計僅五萬而止焉蓋自始告祭興工至于畢工凡五百五十有五日於是治水官佐工部主事臣謝參議山東布政使司臣雲鵬僉山東按察司事臣蘭等咸以為惟水之治自古為難矧是地當兩京之中天下之轉輸貢賦所由以達使終弗治其為患孰大焉夫白之渠以溉不以漕鄭之渠以漕不以貢而工作纍年費皆巨億若漢之瓠子不以溉不以漕又不以貢而役久弗成兵民俱敝至躬勞萬乘投璧馬籲神祗而後已以彼視此孰輕孰重孰難孰易乃今役不再期費不重科以溉以漕以貢焉可無紀述於來世臣有貞曰凡此成功實惟我聖天子之致所以俾臣之克效不奪浮議非天子之至明孰恃焉所以俾民之獲寧不苦重役非天子之至仁孰賴焉有貞之於臣職其惟弗稱是懼矧敢貪天之功惟夫至明至仁之德不可以弗紀也臣有貞嘗備員翰林國史身親承乏不可以嫌故自已乃稽首拜首而為之文曰皇奠九有歷年維久延天之祐既豫而豐有蔀以蒙見沫日中陽九百六數下厥鞠龍蛇起陸水失其行河決東平漕渠以傾否泰相承運維中興殷憂乃凝天子曰吁是任在豫豫可弗圖圖之孔亟嵗行七易曽靡底績王會在兹民便在兹孰其幹濟其為豫治其害而利惟汝有貞勉為朕行便宜是經臣拜受命朝嚴夕警將事惟敬載驅載馳載詢載謀載度以為乃分厥勢乃隄厥流乃疏厥滯分者既平隄者既定疏者既濬乃作水門鍵制其根河防水行有隄如龍有堰如虹護之重重水性斯鍾水利斯通水道斯同以漕以溉以奠乃載邦計惟賴惟天子明浮議弗行功是用成惟天子仁加惠東民民是用寧臣拜稽首天子萬夀仁明是懋爰紀厥實勒兹金石昭示無極治水功成題名記徐有貞有貞之治水於山東而作沙灣等處之河防也承命于景泰癸酉之冬經始於甲戌之春收功於乙亥之夏而告成于其秋上召見奉天門嘉勞焉因命之歸京管臺事丙子春有貞請勑載至乃擴前功益為大水之備時方暵乾衆莫喻其意頗以為過防及秋而大水洊至泗汶淇衛河沁一時俱溢環東兖之間若海之浸者三月逮冬始平運河南北餘千里故隄高岸之缺而不完者無慮百數十所而沙灣之正隄大也既訖工有貞將歸奏於朝而從事諸賢亦合辭以請曰治水之功其既成矣經久之效其亦著矣惟古人作事而有成也必題其名願以儀之有貞乃言曰於乎是惟吾君之德與諸大夫士之力耳有貞其何敢當此且夫治水固聖人事也次則賢者能之如有貞又何足以與此雖然有貞聞之士以天下為心則天下事皆吾分內事也矧吾徒食君之祿受君之命而幹君之事哉臣幹君事視子幹父事而加重吾徒弗盡其力烏乎可大禹聖者也而於治水必胼手而胝足吾徒而弗盡其力烏乎可夫水之大而為中國患者莫如河自禹而下世之治河者非一然可法者少而可戒者多也其不能成事者不必道就其成事者而論之如戰國之白圭漢之王延世王景元之賈魯是已圭之治河無所考見然觀其以鄰國為壑則悖甚矣延世之治河無所節宣而徒亟塞其決雖以此取侯封而不足善也至如魯之治河乃見於歐陽玄之記者亦皆塞之之具初無得乎行水之法矧其當世季民窮之時而興十七萬衆之役又無撫用之才卒之為元召亂是又堰獨巋然而存巋然而安其旁近之城郭田疇皆恃焉而免墊沒之患以水之來有所捍而去有所泄也於是東兖之軍民耆老合辭以請曰今兹之水蓋洪武以來所未嘗有而大耋之人所未嘗見也非隄與堰為之保障非閘與渠為之排解吾田吾産其池潢矣吾耋吾倪其魚鱉矣彼四方之舟楫往來而到於斯者乃亦有曰昔也沙灣如地之獄今也沙灣如天之堂之語而况居斯土之軍民乎哉然而吾儕小人竊伏計焉測水之變不測如今兹之溢以龍灣六閘泄之而猶未盡也以故感應祠之缺隄又煩公為救築焉茍忽在是其不又將延患纍年乎願及公規畫而大為之防吾軍吾民幸甚有貞曰唯唯月中既築感應祠之缺而作偃月之隄鼇甲之堰北沙灣水門大堰差小而治法略等復行度東昌龍灣六閘之上官窑之口置閘一穿新渠而屬篤馬東平戴廟之津置閘一疏古河而屬之大清并前六閘為八而皆注之海焉乃探禹遺之祕本呈上經緯之理鑄玄金而作法象之器建之隄表大河感應二祠之中以為悠久之鎮蓋盡人専符天造制物宜辟神姦其道並行可以為戒者惟景之塢流分之漢世無河患方之於彼其特善乎有貞雖不敏也乃所願則上法大禹下取仲章而為之不敢不盡其心力洪惟聖明聽納臣言而大賚瀕河之民與之休息此吾與二三子之幸以有成功也是不可不知皆應曰然遂題諸從事於斯大夫士之名于石而記之將俾後世之當治河之任者知所法戒云爾是行也前後歷三載焉凡作正隄一副隄二護隄四水門大堰一小堰一蓄水之堰三截水之堰九導水之渠二分水之渠二泄水之渠五制水之閘二放水之閘八若其修作功用次序本末之詳則具載前碑兹不重出議疏黃河築決口狀劉大夏𢎞治六年十月總理河道右副都御史劉大夏題會同河南山東巡撫都御史徐恪熊翀巡按御史塗升陳振都布按三司左布政使孫仁吳珉等及巡河御史曽昻管河郎中陳綺議得河南山東兩直𨽻地方西南髙阜東北低下黃河大勢日漸東注究其下流俱妨遲道雖該上源分殺終是勢力浩大較之漕渠數十餘倍從有隄防豈能容受若不早圖恐難善後其河南所決孫家口楊家口等處勢若建瓴皆無築塞之理欲於下流修治緣水勢已逼尤難為力惟看得山東河南與直𨽻大名府交界地方黃陵岡南北古隄十存七八賈魯舊河尚可泄水必須修整前項隄防築塞東注河口盡將河流疏道南去使下徐沛由淮入海水經州縣禦患隄防俱令隨處整理庶幾漕河可保無虞民患足為有備仍於朝神明南北各造滚水石壩一條俱長三四十丈中砌石塊一條擬長十四五里雖有小費可圖經久若黃陵岡等處隄防委任得人可以長逺仍照舊疏導汶水接濟運河萬一河流東決壩可以泄河流之漲堤可以禦河流之衝倘或夏秋水漲之時南邊石壩逼近上流河口船隻不便往來則於賈魯河或雙河口徑達張秋北上以免濟寧一帶閘河尤為利便臣等仰知皇上洞見黃河遷徙之害深為國計民生之憂凡智力所及不敢不盡但欲興舉此等工役未免勞民傷財今山東等處荒歉之餘公私匱乏人夫尚可起倩財用無從取辦况好逸惡勞者怨謗易興聽聲躡影者議論難據如蒙乞勑戶兵二部會同在廷羣臣從長計處斟酌前項工程於理應否興止倘以臣言可採則其事宜速舉其買辦木石等項銀兩應於何處取用應用匠作等項口糧該於何處支給或此外别有治河長䇿可以不費財力逐一處分明白定奪行令臣等遵守施行安平鎮治水之碑徐溥安平鎮舊名張秋實運河要地也景泰間黃河支流決鎮之沙灣壞運河朝廷命都察院右僉都御史徐有貞塞而堤之𢎞治六年復決於下流十里許汶水從之由東阿舊鹽河以入于海厥後霖潦大溢廣至九十餘丈運河自東昌而下率多淤涸舟楫不通今上以為憂既勑右副都御史劉大夏往治之又特勑內官監太監李興平江伯臣陳鋭總督山東兵民夫役與之共事時夏且平漕舟已集一經決口挽力數倍稍失手輒溺覆不可救僉謂宜急先務乃於西岸稍南鑿月河長三里許引舟由之次第皆濟及冬水落乃為塞決計規倣古法酌以時宜築東西二臺植木為表多施大索用船雜置土石鑿而沈之壓以巨掃囊土以實其罅役夫番代閲三晝夜弗息而決始塞其外則甃石樹杙纍築而固之又于其南為石壩以備宣節于上流為黃陵岡黃陵未塞則安平之功亦不易保故二役並興而湍勢悍急再塞再決羣喙胸胸莫知所定迄八年之二月皆以成告易鎮名曰安平又勑建神祠以祈冥佑名曰顯惠命有司春秋修祀事是役也凡用夫四萬餘薪芻以束計者八十四萬五千竹木以根計者三萬七千麻鐵以斤計者六十萬四千有竒而黃陵之役不與焉比復命于朝上若曰河決既塞越惟爾二三臣之勞爾興嵗賜祿二十四石爾鋭加太保兼太子太師嵗增祿二百石爾大夏升左副都御史佐院事分董其役者山東左參政張縉擢通政司右通政使仍治河防按察司僉事廖中為副使都指揮僉事丁全為署都指揮同知暨文武官進秩加俸者百數十人各有差既又勑臣溥為文紀功迹嵗月以詔來世臣謹按運河之利固國計所賴而貢賦商旅皆必由之所係甚大一壞于洪濤再壞於霖雨其為患甚劇不二載間變波濤為平地化嗟怨為歡欣昔之所難若甚易然亦獨何哉聖天子致和達順之功中外臣竭忠宣力之效天道應祥而地靈效職有不期而合者也然防患固難保功尤難繼是任修壞補敝之責則有司存今官有特置責有専任方汲汲為久逺計前日之功其可以勿壞矣乎臣故敘事紀日俾刻金石如宋靈平掃故事用復明命且警于有職者𢎞治十年十月初三日記安平鎮減水石壩記𢎞治初河徙汴北分為二支其一東下張秋鎮入漕河與汶水合而北行六年霖雨大溢決其東岸截流徑趨奪汶以入於海而漕河中竭南北道阻上既命都察院右副都御史臣劉大夏治厥事復命內官監太監臣李興平江伯臣陳鋭總督山東民兵夫往共治之僉議胥協疏塞並舉乃於上流西岸疏為月河三里許塞決口九十餘丈而漕始復通又上則疏賈魯河孫家渡塞荆隆口黃陵岡築兩長堤蹙水南下由淮徐故道又議以為兩堤綿亘甚逺河或失守必復至張秋為漕河憂乃相地於舊決之南一里用近世減水壩之制植木為杙中實磚石上為衡木著以厚板又上堤以巨石屈鐵以鍵之液糯以埴之壩成廣袤皆十五丈又其上甃石為竇五梁而凃之梁可引纜竇可通水俾水溢則稍殺衝齧水涸則漕河獲存庶幾役不重費而功可保工既告畢上更命鎮名為安平孫家渡神祠記𢎞治壬子都御史劉公大夏既受治河之命實薦河南按察司僉事張君鼐之才分厥任焉公躬相原隰下上數百里以張秋鎮之上流為黃陵岡之上流為孫家渡此而不治水勢且不殺功何由成乃檄張君及右參政朱君瑄督兵民夫七千疏之未幾張秋大決奪汶以入海運河遂壞上命太監李公興平江伯陳公鋭往與共事於是劉公分治所謂孫家渡者既又以荆隆等六口皆黃陵上流復檄張君及都指揮僉事劉勝以萬夫塞之功既並舉張秋適塞而運道始復其舊朝廷易鎮名曰安平建二神廟以為之鎮在黃陵者賜名昭應令有司春秋修祀事三公者既以成告皆録功進祿秩有差而張君遷副使専理河事踰年孫家渡漸壅弗泄奔流橫潰張君慮其復為黃陵害以及安平曰是吾責也其不可復玩丙辰春請于巡撫都御史陳公道以五千人疏之畚鍤雲集帚掃山委橛杙鱗次蓋取治決之餘䇿遺力而用之六旬而舉自是水勢復通由朱仙鎮以復項城故道張君復建廟于渡之隄上分水之處祀其水神令鎮州判官石粹董其役凡為殿廡門垣之類皆備黃陵岡塞河功完之碑劉健𢎞治二年河徙汴城東北過沁水溢流為二一自祥符于家店經蘭陽歸德至徐汴入于淮一自荆隆口黃陵岡東經曹濮入張秋運河所至壞民田廬且勢損南北運道天子憂之嘗命官往治時運道尚未損也六年夏大霖雨河流驟盛而荆隆口一支尤甚遂決張秋運河東岸併汶水奔注於海由是淤涸漕舟阻絶天子益以為憂復命都察院右副都御史臣劉大夏治之既而慮其功不時上也又以總督之柄付之內官監太監臣李興平江伯臣陳鋭俾銜命以往三臣者乃同心協力以祗奉命詔遂自張秋決口視潰決之源以西至河南廣武山淤涸之迹以北至臨清衛河地形事宜既悉然以時當夏半水勢方盛又漕舟鱗壅口南因相與議曰治河之道通漕為急乃於決口西岸鑿月河三里許屬之舊河以通漕舟漕舟既通又相與議曰黃陵岡在張秋之上而荆隆等口又在黃陵岡潰決之源築塞固有緩急然治水之法不可不先殺其勢遂鑿滎澤孫家渡河道七十餘里濬祥符四府營淤河二十餘里以達淮疏賈魯舊河四十餘里由曹縣梁進口出徐州運河支流既分水勢漸殺於是乃議築塞諸口其自黃陵岡以上凡地屬河南者悉用河南兵民夫匠即以其方面統之按察副使臣張鼐都指揮僉事臣劉勝分統荆隆等口按察僉事臣李善都指揮僉事臣王杲分統黃陵岡臣興臣鋭臣大夏往來總統之博采群議晝夜計畫殆忘寢食故官屬夫匠等悉用命築臺捲掃齊心畢力遂獲成功焉初河南諸口之塞惟黃陵岡屢合而屢決為最難塞之後特築堤三重以護之其髙各七丈厚半之又築長堤荆隆口之東西各二百餘里黃陵岡之東西各三百餘里直抵徐州俾河流恆南行故道而下流張秋可無潰決之患矣是役也用夫匠以名計五萬八千有竒柴草以束計一千三百萬有竒竹木大小以根計一萬二百有竒鐵生熟以斤計一萬九百有竒麻以斤計三十二萬有竒其興工以𢎞治甲寅十月而畢以次年二月會張秋以南至徐州工程俱畢臣興等遂具工完始末以聞天子嘉之特易張秋鎮名為安平賜臣興祿米嵗二十四石加臣鋭太保兼太子太傅祿米嵗二百石進臣大夏左副都御史理院事及諸方面官屬進秩增俸有差仍從興等請於塞口各賜額立廟以祀水神安平鎮曰顯惠黃陵曰昭應已而又命翰林儒臣各以工完之迹文之碑石以垂永久臣健以次撰黃陵岡臣惟前代於河之決而塞之若漢瓠子宋澶濮曹濟之間皆積久而後成功或至臨塞躬勞萬乘今黃陵岡諸口潰決已歷數年且其勢洪闊奔放若不可為而築塞之功顧未盈二時此固諸臣協心夫匠用命之所致然非我聖天子至德格天水靈效職及宸斷之明委任之専豈能成功若是之速哉臣職在文字覩兹惠政誠不可以無紀謹托其事撰次如右且繫之以詩曰中州之水河其最大龍門底柱猶未為害大行既北平壤是趨奔放潰決遂無寧區粵稽前代築修屢起瓠子宣房實肇其始皇明啓運亦屢有聞安平黃陵奏決紛紜壞我民廬損我運道帝心憂之成功欲蚤乃命憲臣乃𢎞廟謨諄諄戒諭冀效勤劬功不時上復遣近侍繼以勳臣俾同往治三臣協力兼采羣謀晝夜焦勞罔或暫休既分别支以殺其勢遂遏洪流永堅其閉水由故道河患斯平運渠無損舟楫通行工畢來聞帝心嘉悅加祿與官恩典昭晰惟兹天役不日告成感召之由天子聖明天子聖明化行德布匪直河水萬靈咸附殊方異域靡不來王以漕以貢億世無疆黃陵岡祭河文劉愷欽差總理河道都察院右副都御史劉愷率衆官謹以清酌庶羞香帛之儀致告于大河之神曰惟天地之大德曰生名山大川實體天地以生養萬物者也河伯在嶽瀆中尤為偉靈自西極以至于東海盤踞兩儀界斷下土倐忽變化能禍能福河伯實張主之𢎞治年間河決張秋比時國家財力猶足支持邇年以來河南山東直𨽻地方久毒於流賊繼歉於凶年我朝百五十年來赤子之窮困莫甚於此時國計之匱竭亦莫甚於此時也黃河自去年決去黃陵岡頭掃二掃止餘三掃危如一縷設若河伯必欲加􅍔不已則運道不通未免盡驅遺黎以從於修塞之間財力不逮其何能支禍黃陵岡者實所以禍赤子也人力不能有加神謀固自有在黃陵禍福在河伯一舉手之間耳神豈若是其恝然哉某奉天子命來治河齋祓一心惟神是賴神不為之人豈能為必若推究其召災之由則當禍於官不當禍於民內而百執事某不敢言外而百執事若某等撫按三司府衛州縣大小官員其間有叨君爵祿而誤君之事者有作民父母而叨民之肉者有假公以濟私者有背義而懷姦者神當奪其魄而報之顯戮可矣何必決黃陵以殃赤子而後為快者即今酷暑行天丁夫數萬從事河上勞苦病疫哀吟悲號日夜仰望者神惠一施而已伏願河伯全好生之仁顯神通之妙循故道以東行捨黃陵而南去解三省之懸活萬衆之命神之惠豈不並高厚而埀無疆者哉某等無任哀誠懇切祈禱之至伏惟尚饗黃陵岡謝河文頃者河水為災決去黃陵岡頭掃二掃復侵三掃運道幾危皇帝乃命臣某督理修築某竊念此矣此役關係非輕感召實由於人事經營須賴於神謀若乃虧職業以召天災役瘡痍以違神怒焉敢望其能有所濟哉徒傷國本自速其辜耳用是於七月朔日恭詣河上告戒衆官齋祓一心舉行祀禮投哀詞以懇河伯乞顯戮以貸蒼生仰荷休靈俯埀明鑒灌獻之頃天雨忽止數日之後河遂南遷真若颯然降臨慨然許諾而即為安排布置焉者黃陵無事則張秋不傷運道脫一縷之危丁夫省萬倍之力神惠顯大真可以並髙厚而埀無疆矣遐邇官民胥為歡抃某固不敢貪天之功亦不敢忘神之德已用上聞宣布朝野用是載修禋祀少罄謝私伏願河伯上留天眷下憫人窮河日轉於東南恩並施於曹單啓君心以神聖夀國脈於靈長某等無任激切感戴祈祝之至伏惟尚饗論治河理漕疏臣伏蒙召命道經豐徐竊見黃河為災傷民敗漕甚非細故敢究致災治漕之詳以聞臣按黃河發源吐蕃朵甘思西鄙名星宿海經流萬餘里其水本清浸近中國漸變黃濁三代以前惟有漲溢自漢以來始多決河蓋河髙湍悍壺口以上山源相夾猶在澗中地雖髙下未至壁絶水雖并入未至甚多勢雖奔流未至衝擊猶夫河也壺口以下受水始多龍門壁絶砥柱橫突懸水迅湍始成衝擊地夷土脆故得為患昔禹導河至大伾北流分為九河至碣石入海經史所載皆不言導此之故也臣考堪輿之説凡兩山相夾中必有水一水中流兩必有山南條與中條相夾長江是也中條與北條相夾黃河是也兩山相夾其間地勢必兩髙中低自為水導就而導之水趨無散故無決河之患惟流久積壅但有漲溢而已及禹疏治幾八百年並無水災至周定王時方云河徙砱礫此後又數百年不聞為災迄至戰國阡陌開溝洫廢平陸之土漸不可田建國都者無所仰給不免作渠灌田通漕致運作渠灌田者必引水自髙方能跨原阜以成其利通漕致運者必從旁穿決方能貫河渠以足其用况砥柱以下始多衝擊岸衝擊則崩頽者多故水益黃濁多泥凡經河流無不淤泥日積淤泥積於下河流升於上不為隄防何以障之今洛陽河隄髙於汴城豈一朝夕之故猶以盤盂盛水稍動則水溢几案故自漢以來始多河決之患或者不知每歸天數豈不繆哉武帝因瓠子災久不息然後導河北行二渠復禹舊迹梁楚之地寧未幾復決館陶此後歷代決塞不常不可殫舉至隋煬帝開通濟渠自板渚引河入汴河始入淮今黃河只金龍口至安平鎮一支或時北流其餘不入漕河則入汴河皆合淮入海矣今則跨中條而南乃在山阜之上河下為河南山東兩直𨽻交界處地勢西南髙東北下水性趨下河下之地皆易墊沒故自潰決必在東北而不在西南也今豐沛徐淮之水則自汴河滲流所致遂為豐沛徐淮劇患隂雨浹旬千里為沼室廬乃魚鱉之藪谷土皆洪波之壑人物蕭條生意索然久將若何民患固當軫念况豐沛徐淮南北之中國家喉襟尤當慮者憶臣曩嵗經沛見小溝上石橋為水衝頽石間有聲㶁㶁問之曰黃河滲流未幾復過小溝已為巨川臣時逆知必有今日之患蓋彭城諸山發迹嵩山至於西南轉之東北而至泰山馬陵蒙羽諸山又從泰山發迹自東轉西至於淮口以逆水勢水小則循吕梁出清口入淮大則河不能容水為山阻泛濫原野為豐沛徐淮患勢必然也若不疏導别行害無已時今欲治之非順其性不可夫川瀆有常流地形有定體非得其自然不足以順其性必於兖冀之間尋自然兩髙中低之形即中條北條交合之處於北浚導使返北流至直沽入海而水由地中行如此治河則可永免河下諸路生民墊沒之患且免河防夫役之苦雖不求禹迹即禹迹也務求禹迹恐積淤日久反成髙陸若泛聽典籍人言必為所誤欲復舊迹終不可復者此也况九河既淪于海碣石已入海中今云九河臆度非真矣或欲自淌河疏導入淮稍殺豐徐之患是亦權救之説但泗州鳳陽祖陵皇陵所在國家基本又須回避拱抱不可逼衝反跳或致傷犯厥害非細若沛流既去漕河必淤又為漕舟之慮欲預自沛縣及吕梁至淮多造滚江龍鐵齒浚川杷之類於上流往來拽之泥沙必隨水而去弗俟水落淤成然後開浚工費萬倍或謂黃河雖為豐沛徐淮患亦為漕河之助殊不知漕河源皆發山東不必資於黃河夫南旺馬腸樊村安山諸湖本山東諸泉鍾聚於此然後分為漕河今為漕者惟知封浚泉源為急而不知南旺馬腸諸湖積沙淤塞堤岸頽廢蓄水不多之為害也若能疏浚南旺諸湖修緝隄岸更引他泉别流者而總蓄之漕河不患其竭矣又見南旺馬腸湖隄之外西南土名孫村湖長溝陂馬房屯等處南至鈎兒口北至安山等處一帶地形下隰較之湖水反低即禹貢所謂巨野宋時所謂梁山泊是也民之樹藝遇水即沒恃隄為障欲就此瀦蓄為湖并將漕河改經於此可免濟寧髙原淺澀之難且自鈎兒口入谷亭至安山路亦不逺為力頗易蓋濟寧地從東北來故地形東北髙西南下因其下者為湖水有歸宿潦不至溢旱不至乾如髙郵邵伯諸湖源流未必多於山東諸泉但鍾聚得所水自多也如此為漕則可耐久無弊矣抑自漢唐宋京師粟皆仰給東南漢唐都關中其漕泝江淮河渭入宋都洛陽其漕泝江淮汴洛入皆因自然之勢微人力惟元都燕始引山東諸泉創為此道名曰會通河與海道兼運河在髙原之上南北峻坂水勢兩下無停瀦之所惟仗諸閘節蓄方可行舟一日風塵梗塞諸閘不守舟不可行故元末漕河蚤廢海運不通京師乏食無可奈何至乞哀叛逆斗米銀六兩勳戚權貴皆為餓殍聞我太祖皇帝大兵南來略無鬬志惟開北門遁之沙漠而已今國家自太宗皇帝徙都于燕即元故地命尚書宋禮等修復會通河罷海運鑿疏廣深倍于昔時立法備守已非昔比似可無慮然明者常憂於未形智者常謀於無事猶不免意外之憂或以海運一道當預修復設官置防分撥漕船導引商賈稍開熟路未必無為且泝淮入汴至于汝衛支河北流可以入都當相度疏治分撥各近漕船就便往來廣通運道以備不虞實為國家至計臣愚偶有所見區區寸誠不能自已亦猶杞人漆室之憂伏惟陛下明燭幽微念惟永圖勑令該部議行督運管河都御史郎中管泉閘主事及河南等處河害相關地方詢究可否萬有一取酌時緩急施行臣實不勝惓惓忠慮之至嘉靖六年六月二十七日上二十九日奉聖旨該部看了來説劉天和治河始末楊旦我皇明建都上遊挽漕東南以給京師舉由江淮經徐兖導汶建閘浮衛以達謂之運河所慮為運河之害者則惟黃河而已乃於開封下及曹單八百里間循河北岸築堤捲掃以禦之是以永樂間故元會通河之淤景泰𢎞治間張秋之纍決先後命文武大臣於淤則濬之決則塞之而己不復引河且用財纍億計而不敢以為費役夫至纍嵗而不敢以為勞也洪武二十四年河南徙決陽武東南由陳頴入淮而會通河淤永樂九年宋尚書禮役夫一十六萬五千濬之凡九月而成正統十三年河決滎陽衝張秋石尚書璞王侍郎永和王都御史文相繼塞弗績都御史徐武功有貞役夫五萬八千塞之凡十有八月而成𢎞治年河決金龍口衝張秋侍郎白康敏昂役夫二十五萬塞之𢎞治五年復決陳侍郎政塞弗績六年都御史劉忠宣大夏役夫十二萬有竒塞之凡二年而成正德己巳河東決沛縣飛雲橋入運嘉靖戊子治水者乃疏開封趙皮寨口導河南由亳泗歸宿分流入淮以殺東流水勢已丑庚寅間飛雲橋之流北徙魚臺之穀亭勢將及濟寧矣舟行閘靣一時順利而潰決堤岸衝廣河身廢壞閘座阻隔泉源識者憂之乃嘉靖甲午冬十月趙皮寨河南向亳泗歸宿之流驟盛東向梁靖之流漸微梁靖岔河口東出穀亭之流遂絶自濟寧南至徐沛數百里間運河悉淤閘面有沒入泥底者運道阻絶朝野憂虞于時有引黃河濬漕河二議莫能決總理河道右副都御史劉公天和曰吾誰適從哉吾惟審地形相水土之宜計工役權利害輕重任勞省費以求無負於國無病于民爾吾何容心哉乃博采羣議躬行相度自趙皮寨東流故道凡百二十餘里而至梁靖河底視南流髙丈有五尺自梁靖岔河口東流故道凡二百七十餘里而始至穀亭已悉為平陸日道逺費廣河不可復道矣引黃河幾四百里濬丈有五尺者百二十里餘濬二丈以上者二百七十里餘功倍費矣濬閘河兼濬南旺築曹單長堤幾三百里通融約計濬深丈許功倍省矣兼慮如歐陽修所謂故道雖復旋復淤塞修之言日黃河已棄之故道自古難復蓋河流既久底岸皆髙水行漸壅自不能行乃棄而他徙非若人力堵塞之河渠道猶存也是捐費財力而且以其勞貽後人也公之言日引河勞費倍于濬淤一也且非數月可畢上誤國儲營建之需二也京師百萬軍民仰給公私匱絶三也縱力引而至旋必復於目前億萬之費徒捐而濬淤修閘之勞與費卒不可免非忠于謀國吾何忍耶况引之不至至將即淤吾何敢耶况孫渡新河之覆轍當監耶孫渡在今滎澤正統間全河從此南徙𢎞治二年淤𢎞治六年至今凡十餘濬矣費幾百萬緡卒莫能通嘉靖癸已秋濬百五十里甲午夏水大漲一淤而平此已棄故道難復之明驗也嘉靖戊子沛縣廟道口淤三十里舍漕河而開新河費二十餘緡卒于中正仍濬漕河以通舟此漕河不可輕變之之明驗也乃議惟濬淤修閘以復先朝成憲為便而時已寒凍舟且至期限逼甚是時非惟運期逼近營建木漆之類且至矣非若永樂正統景泰𢎞治間之役可以逺期一二年近至八九月也乃測淤淺深度河廣狹淤以尺計工以日計役巨期迫公乃完測諸閘自水面至淤自淤至閘底之淺深而后逐里逐段止測水之淺深即知淤之淺深矣淤之淺深自數尺以至丈有九尺通融計算各淤深一丈一尺九寸議止濬一丈為凖復度河中心至岸廣狹自三十餘步至四十五步一以四十五步為凖復置方斗深廣各一尺取泥實之稱重一百四十斤每一筐以泥百斤為凖濬河則以面廣十丈底廣五丈通融折算七丈五尺為凖濬河工每長一尺廣七丈五尺即得泥一千五十筐為凖復計春月每日可行百里許擡泥止以往還五十里為凖餘為休息以每里三百六十步計之二人每日可擡泥二十筐然四人擡泥即一人取泥五人總計各得泥八十筐仍減十筐止計七十筐一人用工兩月內以一月為隂雨及泥水妨工止計實工一月是一人可擡泥二千一百筐即該分工二尺先是羣議以前會通張秋近年新河之役計之非役夫數十萬不可蓋彼肯用工久而兹役止兩月故也公曰審如是民不堪命矣乃竭心思規畫既定而夫役勞費大省定番休以節夫勞兼雇役以省民力復議濬南旺淤淺以免盤剝南旺每二年一大濬役萬六千人羣議姑置公曰運道不可尋丈淺阻乃用前計工法日六千人足矣委郡君元吉督之濬倍深倍逺且完修河堤自南旺至長溝六十里植栁自長溝至濟寧亦六十里蓋羣䇿畢效云築曹單長堤以防衝決復沽頭管閘部屬及諸閘官胥役夫公手自籌算甫旬日而議定謀協纎悉詳備區畫程度先後條列以聞上深用嘉納賜勑有竭誠體國之褒南北畿輔山東河南文武監司而下悉聽節制許一切便宜役事乃申令戒期分工畫地初令下郡縣編夫公日守令應朝無在者興工期逼甚即郡縣總事後期奈何乃令編夫一以均徭銀數為凖即優免無預矣且逐里順編滿五十人即為一隊至即分工十丈故始編可省吏姦而至工絶管工者放免之弊植廬舍以便居處給醫藥以療疾病用是大小臣工罔敢弗協淤深泥陷不能著足之工則雜施土草截河築壩縱橫填路下施新製兜杓方杓杏葉杓魚貫以濬之泥最稀陷最深者則用木筲栁斗下取猿臂傳遞登岸瓦礫之土則用鍬钁溜沙之土則用兜杓薑石之土則製鋸齒鐵義尺寸鑿之泥陷者施槅子法每州縣各截河為數橫埧埧之內則縱橫填路如井字然兜杓者以鐵為方口繫布為兜以取泥幾至斗許泥稀及溜沙用之方杓者以鐵為平底而周遭各髙寸許泥稍堅者用之二杓俱前有如鋸齒及鐵又皆創製也杏葉杓者舊有之而加廣厚泥最陷者用斗子法塗泥為坎自下倒斗於上出水堤外濬深泉湧之土則先擇泉分番役夫車戽併力急濬而後將泉深者倒水施工濬淤甫數尺泉即湧出盡日車戽一夕復滿莫能措手乃併力番休先將下埧徹夜取水歷數坎而始達堤外水盡即急濬之淤盡河成方將上埧倒水急濬如前法濬河之工莫難於此濬已既深工已埀就而河廣淤深所在隨濬隨墮者則倍給夫值增雇夫役以重濬之河廣淤深及黃河舊口所衝之處上為風日所暴僅可勝足尺寸之下悉為極稀油泥隨濬隨墮無復止極濬河之難尤莫甚于此夫役愁苦公乃躬行撫諭日吾增爾少值且令爾鄉爾族助爾少費爾不堪勞即以之雇役以畢此工毋重困爾也于是衆皆感悅至有泣者相率竭力底績云凡閘座之頽廢者悉增葺而修復之蓋合木土金石之工而為工甚巨為力甚難若河之廣狹視上流之南旺慮過廣則水易散也魯橋以下運河黃水衝洗大廣濬河底廣五丈或病其狹者公曰南旺水源也河底僅四丈許下流愈廣則愈淺矣如久旱泉微何吾不敢徒為觀美也是嵗自夏秋不雨幾四月而舟行無阻培閘面之低者以齊髙下俾水不易泄也運河諸閘悉前元及我朝永樂至𢎞治間先後所建以故髙低不一如下閘過低則上閘易涸公乃逐閘測其閘面至水面之髙下一以棗林閘為凖低者培而平之自閘板水面至閘石面各以三尺為凖其下閘底過低者則量留底板自是諸閘一律水不驟泄而下留底板則閘上之水益深運舟可直達上閘免中途淺閣真利及久逺用平凖以測濬之淺深俾舟行無滯也水平法用錫匣貯水浮木其上兩端各安小橫板置於數尺方棹之上前竪木表長竿懸紅色橫板而低昂之必與匣上橫板平凖以測髙下凡上下閘底髙低及所濬河底淺深悉藉此以校之公躬親測量暴露風日行泥淖中遍歷諸閘人不堪其疲勞而公弗恤也復施植栁六法以護堤岸六栁日臥栁低栁編栁深栁漫栁及髙栁也濬月河以備霖潦建減水閘以司蓄泄湖陂之利堙廢至是雙龍硯瓦雞鳴臺金溝口留城馬場南旺諸減水閘座皆議屯工復置以備乎蓄泄也築縷水堤以防衝決置順水壩以束漫流河直則水潰故堤以縷之河廣則水散故堤以束之且禁鞭撻問疾苦躬撫慰勞飲食役初興公即禁各屬不得輒施鞭撲違者即償其責人心大悅竪旗升降以時其飲食節其勞佚時薪木騰貴有以為言者公弗應且榜諭一依時值不少減抑于是商販輻輳終役無匱乏而價大省每州縣委醫一人隨夫調治公猶慮其未精乃齋沐焚香躬製錠藥數萬每郡復選醫之明者四人官之勤者二人分攜藥餌逐營遍問病即療之日一往回神人胥相罔弗效者且常值之外時榮以飲食焉宣諭上德曉以國計至重役民為不得已之故於是衆心和悅羣力畢效徹水者夜以繼日重濬者至再至三咸忘其勞百工告成運道復通萬艘畢達績聞天子嘉悅晉公工部右待郎兼左僉都御史仍理河道部屬方面而下勞最者遷官進秩賞賚有差方役之初興也內外逺近咸以為難就京師百貨騰貴餽餉不至至有議復海運者惟仰賴我天子明聖委任責成以故公等咸感激思奮攄忠報國身親督理野處河濵隨事經畫博采郡䇿竭其心思智力以期於必成公處谷亭鎮廢菴中隘室每集衆計事和顔溫語俾各盡言片善即納且揚于人人日巡考工隨見指授郎署監司而下悉廬于村舍水濵朝夕督視雖顔面黧變形體瘠損弗恤也蓋維計工以定役故為力甚簡視徭役之成數以調役吏胥無所容其姦故不擾雇值惟計工不計日故為費甚省畫地分工完即散遣故人自為力廬舍飲食器具醫藥勞勉周至故民不知勞尤仰賴我天子神聖川靈效順雨㿩時若疾疫不作民命獲全咸前所未有也是役也凡濬河三萬四千七百九十丈築長堤縷水堤一萬二千四百丈修閘座一十有五順水埧八植栁二百八十餘萬株役夫一十四萬有竒白金七萬八十餘緡木以根計一萬七千四百餘稍草以束計一十九萬五千餘鐵以斤計六萬五千九百餘麻灰磗石之類稱是役始於乙未春正月中旬迄於夏四月初旬財力不多費而功倍於昔人時日不久曠而效收於三月亦前所未有也直𨽻山東河南若漕運都御史馬公卿巡撫都御史唐公胄管公楫簡公霄若巡按監察御史郭君圻陳君表蔡君靉曹君翀徐君九臯咸協心共濬馬公且躬詣相度於有成分董其役者為工部郎中郭敦鄭鋼李仁塗揵主事張鏜邵元吉山東布政司左參議王㿩按察司副使吕陶查應兆僉事謝蘭河南按察司副使胡宗明咸躬親督理協心極力必期底績若郡縣衛所庶官同知孫廷相而下凡六百二十員云旦至而功甫成獲聞公經略之詳元吉則分任其事親承指授者乃相與詮次備釋于左以求諸立言君子以記來者埀休美于無窮云吕梁洪志序唐龍序曰吕梁洪曷志之名山大川綱紀四方昭靈紀異咸俟君子况漕之水道者哉是故司馬氏作河渠書九川九澤三江五湖罔或遐遺惟漕故也國家定賦歲漕米四百萬石白糙粳糯米一十八萬石由江入湖入河直達於京師水道凡數千里曰難曰險未有甚于洪者也豫方有事于漕搴衣躇階升梁而眺焉洪多巨石胚暉巗崿長如蛟蜒伏如虎豹紏錯如置棋盤旋如輪轂廉稜如踞牙如劒戟前代闢鑿厮而為渠汶泗衍溢沁汴滲淫黃河瀾汗合南瀦之石之所激奮躍鼓蕩雷訇而阜涌懸水四十仞環流九十里魚鱉不能過黿鼉不敢居漕萬三千艘胥於是乎進每一艘合數艘之卒夾洪夫挽之敝肩傷臆躃足揮汗咸畢力以赴然緣崕躡級蟻行蝸引得寸而寸焉得尺而尺焉一弗戒則飄忽瞬迅猶夫駟馬脫御非窮日之力不可回也是為天下之至難也天下之事惟難斯戒惟易忽之斯志行經國者知漕之難乎則官不置冗費必汰浮兵定以制役止不急粟無耗蠧廪有備焉受祿者知漕之難乎則祿以養賢吾思吾賢食以食功吾圖吾功敬事之臣日廣素餐之風熄矣是故考迹以明規因文而廣喻志之大也夫曰勒一方之宏圖揭今昔之勝槩抑末矣君子猶曰弗志焉漁石文集議引河沁二水疏金景輝天順八年七月二十三日都察院經歷司都事某奏自古有天下者必轉天下賦稅聚之京畿充足國計以固根本召四方商旅會於都邑以通貨易如漢之鄭當時王安世唐之田𢎞正元之郭守敬輩皆能興水利通漕渠者我太宗皇帝建立京師首命大臣疏會通河開清江浦增修各閘疏鑿三洪以通漕販仍於京城內外置倉厫以貯天下糧儲建塌房以蓄四方客貨富實京師以開萬世太平之基近嵗以來河道淺阻轉輸遲誤天順七年朝廷恐妨國計仍命右副都御史王總督漕運又該工部奏準委臣前去河南聽巡撫左副都御史賈銓提督開疏黃沁二河分水灌注運河即今徐吕二洪下至清河一帶河道通行無阻矣惟安山北至臨清衛河至直沽俱各少水而德州武城等處淺阻船隻不下千百餘艘又訪山東河南及大名等府起運京糧亦因河淺俱赴畿內買納况商販少至以致京師米麥翔貴物貨騰湧且畿內耕穫有限而四方買糴無窮幸值嵗豐民食尚乏倘遇凶荒將何以賴陸贄有云財用之在關中者與儲之帑藏不殊有急而需一朝可得今畿內之地正當富實豈容虛耗矧南京進貢馬快船隻亦皆阻誤不可不慮考得安山北至臨清二百五十餘里止有汶水春時雨少水脈細微以致淺澀其汴梁城北陳橋原有黃河故道其河北由長垣縣大岡河經曹州至巨野縣安興墓巡檢司地界出會通河合汶水通臨清每秋水漲有船往來止是陳橋迤西三十餘里淺狹水小時月不得通流若開挑深闊亦可分引河沁二水以通運河如此則徐州臨清兩河均得河沁之濟而衛河亦增且開封長垣曹鄆等處稅糧俱免陸挽又江淮民船亦可由徐州小浮橋達陳橋至臨清得免濟寧一帶閘座擠塞留滯之弊甚為便利駁引河沁水鄒魯𢎞治十二年有議引河沁由武陟原武經曹縣達運河者知曹縣鄒魯駁之曰沁河之水吞於黃河非一年而今乃引之以利害言則利少而害多以是非言則實非而名是往時決黃陵岡為運河患不過黃河一小支已竭十餘萬夫之力積數年而僅塞則沁河不可引亦明矣必欲引之其害有六為引沁河之説者必曰沁與河各一水也沁水勢緩而可引非河比一入運河則有源之水不竭殊不知引沁河將先塞沁入黃河之口而後施疏鑿之功則沁水無歸勢必散漫田禾廬舍必淹沒其害一也將疏下源既通而後塞入河之口則水勢搗虛千里不折不至衝山填壑未已比之黃陵岡之害或恐過之其害二也自木鸞店起至飛雲橋計千里以百萬夫積十年尚不知可成與否勞民傷財莫此為甚其害三也河南山東連年旱潦民之逃亡十室而九困仆之民使就版築呻吟思亂難必其無其害四也曹之西北地勢髙而東南地勢下且土少沙多易為崩坼建瓴之勢決不容緩張秋之決為監不逺其害五也冒此五害使有益於漕運猶之可也况成功不可必而禍患可計耶其害六也堽城堰記商輅汶泗二水齊魯名川汶出濟南萊蕪縣泗出兖州泗水縣二水分流南北不相通自古舟楫浮于汶者自兖北而止浮于泗者自兖南而止元時南方貢賦之來至濟寧舍舟陸行數百里由衛水入都至元二十年始自濟寧開渠抵安民山引舟入濟寧陸行二百里抵臨清入衛二十六年復自安民山開渠至臨清乃於兖東築金口堰障泗水西南流由濟河注濟寧兖北築堽城堰障汶水南流由洸河注濟寧汶下流又築戴村堰障之西南流南抵濟寧北抵臨清而汶泗二水悉歸漕渠於是舟楫往來無阻因名之曰會通河我太祖髙皇帝定鼎金陵無事漕運向之河堰廢損殆盡太宗文皇帝遷都於北爰命大臣相視舊築堰疏渠漕運復通第堰皆土築每遇淋潦衝決水盡泄漕渠盡涸隨築隨決嵗以為常民甚苦之成化庚寅工部尚書郎張君克謙奉命治河歷觀舊迹嘆曰濬泉疏源漕渠此嵗不可廢至若壩堰以石易土可一勞永逸何乃因循弗為經久計乎於是督夫採石首修金口堰不數月告成凡應用之需以一嵗樁木等費折納沛然有餘日斯堰既修堽城堰亦不可已方度材舉事遽以言者召還已而巡撫都御史牟公觀其迹極加嘆賞騰章奏保用畢前功至則以堽城舊址河濶沙深難於用力乃相西南八里許其地兩岸屹立根連河中堅右縈絡比舊址隘三之一乃謂於此置堰事半於古功必倍之遂擇癸已九月望日興事委兖州府同知徐福隂陽正術楊逵耆民張倫許鑑分領其役儲材聚料百需咸備明年春三月命工淘沙鑿底石如掌平底之上甃石七級每級上縮八寸髙十有一尺中置巨細石煮秫米為糜加灰以固之底廣二十五尺面用石板甃二層廣一十七尺袤一千二百尺開秋口七各廣十尺髙十一尺置木板啓閉遇水泛漲啓板聽從故道西流水退閉板障水南流以灌運河兩端為逆水鴈翅二各長四十二尺順水鴈翅二各長三十五尺中為分水五各廣二十三尺袤一百三十尺兩石際連以鐵錠石上護以鐵拴甃口上橫巨石或三或四各長十餘尺河舊無渠民病涉堰成遂通車輿有元舊閘引沙水洸洸淤汶水不能入兹堰東至閘為二洞皆廣九尺髙十一尺中為分水一旁為鴈翅二亦用板啓閉以候水消漲漲則閉板以障黃潦消則啓板以注清流洞上覆以石石之兩傍仍甃石髙一十有八尺中實以土與地平俾水患不致南侵洸河免於沙淤閘之南新開河九里引汶水通洸河口逼崕自顛至麓皆堅鑿石兩閘始通肇工於九年九月訖工於十年十一月是役所費較之金口不啻數倍而民之勞擾者似前折納之外所增無幾蓋處置得宜區畫有方所以開漕運無窮之利者實在於此都憲嘉其功之成命兖州郡守錢源徴豫以記往嵗克謙還自東魯語及修堰之役豫心善之及克謙再行豫實從吏今績用有成可靳於石耶昔白公穿渠民得其利歌曰衣食京師億萬口若克謙斯堰之築漕河允賴公私兼濟視白渠之利不亦尤大矣乎豫故備書其事為記克謙名盛常之宜興人也天順庚辰進士都水員外郎功名事業此其發軔云疏鑿泉林寺泉源記湯節疏泗水邑東五十里許陪尾山之陽有廟曰仁濟廟之西有寺曰泉林傍有泉曰珍珠曰趵突曰掬米洗鉢曰響水曰紅石曰清泉曰湧珠其源皆出於山其流環繞映帶寺之左右而西南經下橋橋之西復有泉數十曰大王溝潘波黃隂趙家莊石泉珍珠東巖石縫二角灣等泉合流於泗會于曲阜之沂河轉於天井閘會通河沿達海永樂已亥漕運前總兵平江伯陳公瑄言于朝受命工部主事顧大竒等遍歷山川疏濬泉源以通水利以濟漕運後以右通政王孜郎中史鑑主事侯暉等繼之正統已未所司請罷是舉上下泉源因以淤塞今以泉源利濟所資不可無官典其事乃請上可其奏於是主事熊鍊轉弱等領命來兹仍疏導之邇來亢旱不雨河道將涸豫親詣泰安寺等處疏通大小泉源逾泗水見乎泉林之泉利人者廣繇是逆流不便者改之亂石者去之不通者濬之又博訪耆耋言是泉皆從石竇中出清徹無比汪洋不窮豫聞而益喜泉之舊有名者勒珉紀之無名者立石表之復訪于益之少長所得石河等泉一十三道無巨細皆為開鑿以濟不通兹惟林泉乃衆山之精脈合細流以利長洪恐嵗久泯于聞遂書以識之時正統九年八月觀泉亭記吳寬自國家遷都於燕太倉益實長府益充皆以漕運而致其食貨之入孰非舟楫之所載乎由京師而南舳艫相銜維纜相結凡千里不絶其舟楫之來孰非河渠之所浮乎地勢隆汙望若階級置閘蓄水泄復盈焉其河之通孰非源泉之所濟乎泉多見於齊魯之地其發甚微其流甚迂微則易湮迂則易竭夫使其滔滔汩汩出無窮者又孰非人力所以濟而導之乎工部所掌水利其一朝廷特設主事一人分之三嵗始去成化十六年豫同年洛陽喬君廷儀奉命以往當嵗之暮泉脈初動廷儀輒率官吏召卒徒出而從事畚鍤所施濬導如法勤敏之稱徹於中朝顧所至露坐無以為風日之庇乃使人伐山木次第築臺泉上曰吾將于是督役而觀夫泉之行也因以觀泉名之廷儀以泉為職方其從事於斯立曠野入重山險逺幽邃皆有奇迹可謂天下之至勞而何有於樂雖然及功之將畢視其溢然而出沛然而行濟乎河渠而浮乎舟楫載乎食貨以給乎國用當是時有志於世務者亦可謂天下之至樂而遂忘其勞矣故泉一也渟滀而無為覯之者樂其適乎已發泄而有用覯之者樂其利乎世適乎已者小利乎世者大然則泉也人也寧為此乎為彼乎初廷儀受代為吾友徐君仲山今廷儀且滿任而閩黃君世用將往代之夫亭不足書而泉則重事也以三君之相繼敢敘其功而望其成焉重濬宿遷小河記謝鐸河出龍門非禹迹舊矣唐宋以來益徙而南其下流率委於淮其為害於汴為最甚入淮之道有三一自中牟由鳳陽而下一自開封經徐州而下一自歸德歷睢陽抵宿遷而下自宿遷下者謂之小河或曰睢河其所經歷延袤蓋不啻五百里而始達于淮視鳳陽徐州實當其中壅而不治則不特二州受其害其為汴之害也亦大矣𢎞治改元之明年河決金龍口汴之重臣以急告上命今刑部侍郎白公昂往治之公舉其屬婁郎中往而以小河之役屬焉起近河三州八縣之民力治之以求復其故道去年秋豫過宿遷見河口之土山積而下流之水爭赴淮以入海舟人指曰此婁郎中之功也俄而宿遷教諭張瀚偕其僚抵舟中請豫記豫力辭至淮徐太守鏞復請之無已乃為之言曰古稱善治水者不與水爭路惟行所無事順其性而利道之耳故禹治九州之水必先於兖以兖為下流必趨之地舍此而往將有不可為者曩豫聞金龍之決勢將直抵張秋復加往嵗之變議者徒以漕河為憂而民之墊溺不暇顧既乃復聞上築長堤下修減水閘而今復有小河之濬所以遏其衝而殺其勢者殆亦無所不至嗟夫水之為用大矣以資飲食以利灌溉以通舟楫及其為害也崕為之崩地為之陷帆檣為之摧宫室廬舍為之蕩溺此無他順其性與逆其性然耳於乎安有逆民之性而可以有為於天下者吾於是乎有感作宿遷小河記籌河臺記莊泉天下有大裁制有大承受者丈夫大事業也禹稷契皋陶夔龍伯夷周公敷教明刑節禮和樂播百穀平水土分田制井為學校封建以各盡其裁制各大其承受者知天下之責任在我也易曰裁成天地之道輔相天地之宜以左右民記曰經綸天下之大經立天下之大本知天地之化育古聖賢知其在我故凡有所裁制有所經綸豈冒焉自為不經意哉必將以素定之學於其臨事為之籌畫經理以上下其勢使出門合轍於閉戶不敢以易而處難以小而處大固自有主張也然萬古天地萬古人心聖賢事業後世安得謂我無分哉𢎞治已酉秋河水為患四決支流衍漫民多死溺有司以聞聖天子命今刑部侍郎白公治之公曰是大責任豫可獨往乃以舊屬兵部郎中婁君元善薦公意以為成天下之大事者固不可不得人以輔之也詔曰可於是元善會公宿遷相視原隰至符離謀曰天地間治水一大事水能濟人亦能溺人治水者救人於魚治之不以其道是人等耳水將魚我况能救天下於魚哉然治天下有要固有不出戶庭而能坐了於萬里之外者操其要也治水之要亦惟因其勢之通塞為之上下耳鯀湮洪水無是要也且封丘金龍口其勢漸基不因而隄之不可其中牟尉氏之決勢與河通不從而導之不可河溢梁宋之交雖泄未易然集議得小河口廢渠東與泗接可引汴而通不遡而西距歸德飲馬池受汴不可河經符離橋峽水隘勢不可制不月河其旁不可河勢曲狹湍悍不濬其淤經其折而疏之不可飲馬池小壩諸決喧豗迅疾不驟築之以遏奔潰不可是河之費工役之長丁夫之需又皆極其籌畫纎芥毫髮罔或滲漏豈有他哉亦惟謀其要也舉其要也舉其要而操之何所不可於是而疏於是而濬是以曽不數月河之為月者一為渠者二十為閘者十有五為隄者七百里為塞者三十有七水皆復其故道由汴入睢睢入泗泗入淮以達於海而民不魚矣符離之謀無不效者誰之功哉孟子以禹之行水行其所無事知者亦行其所無事則知亦大矣今公與吾元善之治河也因其勢之通塞為之順焉未嘗鑿以私智能言距楊墨者聖人之徒也公與元善其功視禹雖有大小要亦禹之徒哉莊定公集名臣經濟録卷五十
