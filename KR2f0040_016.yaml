body:
  text: 名臣經濟録卷十六明黃訓編吏部文選上題減省官員事商輅臣叨侍近密輒以愚見數事開具進呈伏乞聖覽如有可行乞勑該衙門施行如中間事有難行者乞賜寢罷干冒天聰不勝戰栗之至謹具題以聞一貴州湖廣先因猫冦猖獗䝉欽差保定伯梁珤右都御史王來并參將等官統領官軍往彼征勦即今賊勢已息地方稍寧而總兵等官在彼久住軍馬衆多供給艱難况聞四川湖廣之民攢運糧餉不勝疲弊乞勑該部將梁珤等取回彼處止令都督方瑛陳友照依原奉事理調度二處官軍往來撫捕相機守戰其貴州方面并府州縣流官俱係額外添設之數俱乞取回庶得少蘇民困地方幸甚一臨清不過一縣地方先䝉欽差平江侯陳豫往彼鎮守築立城垣開設衛分操練軍馬即今已有次第切慮彼處巡按巡河管閘管糧收鈔收磚等項御史主事等官常不下七八員不無官多民擾乞勑該部將陳豫取回止令本衛指揮等官照例操守巡按御史經過提督實為便益臣又照得真定保定二府既有僉都御史祝暹在彼巡撫兼守備倒馬關其易州鎮守又有參贊軍務僉都御史陳泰近聞祝暹患病未痊合無陳泰不妨參贊照鄒來學事例就令巡撫真定保定及提督紫荆倒馬關將祝暹取回定奪庶得責任歸一一正統年間各布政司地方俱添設僉事一員專管屯田而南北直𨽻亦各設僉事於河南按察司帶俸令其提督順天并鳳陽等府屯種緣河南按察司與直𨽻有司無相統屬行事之際不無掣肘誤事今後南北直𨽻屯田合無照提調學校事例另設御史管理惟復止令一處清軍御史帶管將見在僉事革去庶使便於行事一山東等布政司并直𨽻保定等府正統十四年起取民壯不曽赴京見在本處地方操守者彼時勑㫖丁寧諭以事平之日即放寧家今經三年未見定奪况前項民壯俱係丁多殷實頭等人戶大縣或五六百名小縣或不下二三百名除此之外有司每歲科𣲖不無靠損下戶貧難小民愈致失所乞勑該部行移各處將見操民壯悉發寧家一體當差其在京操守民壯并舍人餘丁人等亦乞勑該部計議酌量放免庶幾恩信兩全日後易於驅使一薦舉本以求異才若國家科目未開則薦賢之路不可不廣方今科目大開豪傑之士皆由此進則薦舉之道豈容大濫臣切見各處保來儒士例皆除授教職中間多有學問膚淺禮貌粗踈不由學校罔知大體此等之人一槩使之為人師範豈不有誤後學乞勑該部將見保來儒士發回原籍許令本處鄉試照例出身今後教官俱於副榜舉人三十歲以上者選除庶幾學校得人而人才有所造就若山林中果有隱居行義不求聞達年四十以上學識卓異之人須方面府州縣官公同舉保風憲覆實送部嚴加考驗然後録用如有不實罪坐舉主題用賢事商輅臣切照見任春坊司直郎林聰原籍福建人由正統四年進士歷任刑科都給事中升今職本官學識優長操持端潔存心公正遇事敢言先在刑科衆皆推服今任司直郎固是美職但所任政務頗簡未免以有用之才置於閒散之地况今吏科都給事中張某久病不出如䝉乞降特㫖著林聰兼吏科都給事中管事如此則恩出於朝廷非惟本官益竭忠誠勉圖報稱凡有言責者亦皆聞風感激各思自效矣且今春坊官員多係翰林等衙門兼職林聰原係都給事中今令以司直郎兼之俸祿無增品秩仍舊於事體無損於政務有益且使中外人聞之皆謂陛下誠於求言善於用賢所謂用一人而千萬人悅豈不美哉臣職居近密偶有所見不敢緘默覆給事中韓鼎公選法奏狀王恕文選清吏司案呈奉本部送禮科抄出禮科給事中韓鼎題云云等因具題奉聖㫖該衙門看了來說欽此抄出送司案呈到部看給事中韓鼎所言考選監生出論有請客之名要行出判語及令親供一節臣等議得考監生出論題觀其作文以第高下此舊規也奈何所考監生賢愚不一能者依經傍注一篇可成不能者閣筆凝眸一辭莫措却乃不依本題别寫他作故人謂之請客此等之人固不當取但人才難得是以或觀其寫字或觀其人物而次第之以備下僚末職之用未嘗有棄才也若與能者出論題與不能者出判語是使學者皆記判語而不學作文非法之善也合無今後考選監生聽本部出題取其文理平順者為一等文理頗通者為二等文理不通若寫字人物有一可取姑以入選如此則考選有方而高低自别矣其言各部主事等官有歷俸三年二年未及二年而驟升者有七年八年或九年將滿而才升者拘於各部似乎不公要照郎中林㙱等調改復除事例不分本部别部以歷俸年深者升用一節臣等查得往者各部缺官若本部有相應人員就於本部升用無相應人員方於别部升調此見行事例若户部郎中林㙱員外郎吳裕調吏部是也若但以歷俸年深為主不分清濁勤惰一槩更調如歲貢例不無賢否混淆紛更太甚合無今後轉升官員如某部缺郎中員外郎先儘本部年深相應員外郎主事銓補如無相應者則於别部年深相應員外郎主事調補如此則選法公而人心勸矣其言旌異推舉有舉取未成而問發為民者有旌異方畢而問發充軍者有行取到部調除原職者要行連坐舉主一節所言有理合無今後在外官員果有亷能公正政蹟卓異聽巡撫巡按等官從公旌舉各注舉主於旌舉官員之下日後犯贓連坐舉主如是庶幾舉能其官用得其人矣緣係陳言公選法及奉欽依該衙門看了來說事理未敢擅便具題奉聖㫖是欽此議都御史邉鏞保治奏狀𢎞治元年王恕文選清吏司案呈奉本部送禮部咨該都察院左副都御史邉鏞奏云云等因具本奏奉聖㫖這本所言該衙門看了來說欽此欽遵抄單移咨送司案呈到部當本官所言任賢以逺奸諛等六事逐一看議明白各開前件伏望聖明裁處緣係節該奉欽依該衙門看了來說事理未敢擅便具題奉聖㫖准議欽此一議得君子小人迭為消長君子進則小人退小人進則君子退自古未有用君子而不治用小人而不亂者也且執德守義正直中和者君子也巧言令色便僻側媚者小人也但君子難親而易踈小人難踈而易親陛下新服厥命固嘗用君子而退小人矣今都御史邉鏞拳拳以是為言者第恐君子雖用而信任不專使小人得以間之終不能成其治小人雖退而屏逐不逺復將夤緣復進終有以害其政夫知其為君子而任之則不必致疑知其為小人而去之則不可復用如是則正人立朝而萬邦咸休矣一議得都御史邉鏞所言納諫以廣言路一節誠人君為政第一事也陛下嗣位之初嘉言無不納善政無不舉弊政無不革臣民無不悅服若李文祥之奏疏其意雖忠直其言則逆耳陛下略不加罪但除事繁縣佐使之歷練以成就之恩莫大焉不知者以為貶李文祥以箝言者之口此邉鏞所以為陛下言之合無准其所言行取李文祥前來照依甲等資格改除在京事繁衙門使之歷練以成其德器一釋衆人之惑一全納諫之名不亦善乎一議得勸懲者人君之大柄所以歆動人心而警懼天下者也今都御史邉鏞所言别善惡以昭勸懲一事誠為有理臣等又聞古人有言賞必自踈逺始罰必自貴近始賞自踈逺則賞一人而千萬人勸罰自貴近則罰一人而千萬人懼陛下若納邉鏞之言用古人賞罰之法則善無不勸惡無不懲而天下治矣一議得名器者人君之至寶所以彰有德而别有能若不擇其人而授之則奔競之風起而亷恥掃地矣其何以為國乎陛下新服厥命擯斥奸佞惟賢是用固未嘗以名器假人矣今都御史邉鏞猶以是為言者但恐寡亷鮮恥之人尚在投間抵隙之言未絶惟願陛下始終此心始終此政杜絶先容之私言自無幸進之妄人夫如是又何患名器之不重而朝廷之不尊乎一議得都御史邉鏞所言乞勑巡撫巡按等官嚴加訪察守令務致的實名著循良者指實具聞即便擢用而無拘乎資格政果貪酷者據實訊問即便罷黜而無待於朝覲其守令之中尤有循良之最者書於御屏或錫車服以彰其能一節查得節次詔書與夫巡撫都御史勑諭并本部奏行事理其於守令之賢否俱有旌擢黜退之典今邉鏞復以是言之者蓋是巡撫巡按等官奉行未至合無通行各處巡撫巡按官查照節次詔書并勑諭及本部奏行事理嚴加訪察知府知州知縣等官某人亷能公正某人貪酷害民某人罷軟無為某人年多有疾當旌擢者具其政蹟奏聞當奬勸者略為奬勸當拏問者就行拏問當黜退者就行黜退當致仕者勒令致仕務在至公不許顛倒是非致紊勸懲之道自取失職之譏一看得都御史邉鏞所言陛下於文武大臣之中留神俯察其才能性行孰可宰銓衡孰可總風紀孰可為大將孰可為副參孰可撫安一方孰可守鎮要地既即事以驗其才再因才以授其職不因瑕以掩瑜務舍短而求長一節誠為簡法但自正統年間以來每日止設一朝或兩朝每一朝臣下進見說事不過片時聖主雖聰明豈能盡識盡察不過寄聰明於左右之人大臣於左右之人相見者不多左右之人亦豈能盡察識諸大臣之賢否亦不過寄聰明於門客門客之識見未必盡合公論或得之毁譽之言或出於好惡之私是以以直為枉以枉為直者多欲察識之得其真必須陛下日御便殿宣召諸大臣與之講論治道謀議政事或令轉對或閲其章奏如此非惟可以識大臣而隨才任事可以啓沃聖心日進於高明矣論王府保舉官員奏狀𢎞治元年王恕文選清吏司案呈奉本部送內府抄出淮王奏云云等因具奏奉聖㫖吏部知道欽此欽遵抄出送司查得劉奎某府州縣人由生員成化二十一年七月遇例納銀送南京國子監放回依親讀書至今方才二年有餘及查本部聽選監生自入監歷事以來守候十八九年方得除授今劉奎之為監生未及三年輒便希求保舉圖任伴讀若准所保不無遂其僥幸之計阻滯年深之人及查得天下王府二十五處額設官員不為不多除良醫典膳典樂外其餘俱係常選官員近年以來遇有缺員往往奏保或稱妃兄妃弟或稱儀賓親屬與凡相熟之人不論可否一槩奏保任用實壞選法阻滯常選之人案呈合無今後王府官有缺該長史司便呈報各該布政司轉達本部照缺於監生吏員內相應人員銓補不許仍前奏保攙越仕籍阻壞選法如此則奔競者不得幸進守正者免其嗟怨仍行各該布政司啓王知㑹緣係乞恩保舉官員及奉欽依吏部知道事理未敢擅便具題奉聖㫖是欽此議僉事林淮願就教職以便養親奏狀𢎞治王恕元年文選清吏司案呈奉本部送吏科抄出雲南按察司僉事林淮奏云云等因奉聖㫖吏部知道欽此欽遵抄出送司案呈到部看林淮奏稱雲南路逺母老不堪就養辭官則家貧難供朝夕乞要授以本處或附近府縣學教授教諭以便養母一節情實可矜况本官辭尊居卑辭富居貧豈得巳哉合無俯順其情授以附近地方府學教授職事令其到任以便養親親終仍除僉事職事一以慰本官母子之情一以為臣下忠孝之勸等因具題奉聖㫖是欽此欽遵今查得直𨽻常州府儒學見缺教授一員欲遵奉欽依事理將林淮准除授常州府儒學教授順賫文憑令其到任管事未敢擅便具題奉聖㫖是欽此選用新舊進士兼懲規避奏狀𢎞治元年王恕照得舊例進士登科之後自本年至第三年第二甲進士內則選主事等官外則選知州第三甲進士內則選評事行人等官外則選推官知縣至第四年不分二甲三甲俱選主事等項京職以其辦事年久故也成化十二年取進士三百名存留一百名在各衙門辦事餘皆放回依親讀書已經二次行取除已到選用其見在外尚有四十餘員未到即今在外缺知縣推官共七十餘員欲將見在二十年舊進士擬除補缺緣係舊進士去年已不選外任俱授京職今在舊進士比之先授京職者辦事聽選又多一年若選外任揆之人情實有不堪比之舊例亦不相同合無將二十年見在舊進士照例挨次俱除京職將二十三年第三甲新進士除在外知縣推官并在內行人待舊進士選盡却將第二甲新進士於內外相應員缺內相兼選用所據舊進士除到外其行取不到者似有躲避外選情弊合無除丁憂事故外其餘無故至今不到以後到部之日俱除外任庶幾銓法無私人心有警緣是選用新舊進士事理未敢擅便具題奉聖㫖是欽此議左都御史馬文升陳言禆益治道奏狀𢎞治王恕元年文選清吏司案呈奉本部送准禮部咨儀制清吏司案呈奉本部送禮科抄出都察院左都御史馬文升奏云云等因奏奉聖㫖這本所言多切時弊該衙門便看了來說欽此欽遵移咨送司案呈到部看得馬文升所奏選賢能以任風憲等四事誠如聖諭謹議開坐前件伏乞聖裁緣係節奉欽依該衙門便看了來說事理未敢擅便具題奉聖㫖准議欽此一查得舊例御史員缺於各衙門辦事半年以上進士及本部聽選舉人監生并行人博士推官知縣教官內選補至成化六年以後拘於正統年間頒降憲綱新進初仕不預選任近該南京禮部精膳清吏司郎中李諒陳言本部議擬今後選用御史於在京各衙門辦事進士與夫曽經一考稱職行人博士及進士舉人出身推官知縣內選年三十以上五十以下人物端莊言語正當操行亷潔才識優長者送都察院理刑半年滿日聽本院考察各注考語連人送部諳曉刑名堪任御史者奏請照缺選補但知縣推官係在外官員訪查未詳合無通行各處巡撫都御史巡按御史各於按屬進士舉人出身知縣推官內從公推舉如前相應之人備開腳色政績具奏以憑遇缺行取兼進士行人博士選送理刑不許舉非其人已經題准欽遵外今馬文升又奏前因誠為選用風憲之良法但恐遇有御史缺多六年以上知縣二年以上進士內相應之人數少必待其有然後選用不無誤事合無通行各處巡撫都御史巡按御史并布按二司官各於所屬曽經一考稱職進士舉人出身推官知縣內推舉年三十以上五十以下人物端莊言語正當操行亷潔才識優長者備開腳色政蹟具奏籍記在部遇有御史員缺先儘六年以上行取前來相兼二年以上進士并一考行人博士選送理刑半年滿日聽本院考察各注考語連人送部選用如無相應六年以上知縣推官二年以上進士仍依本部議擬奏准事例於半年以上進士曽經一考稱職推官知縣內選用如此則選用亦可以得人風憲不至於久缺矣一查得舊例按察司官有缺於法司屬官內推補其知府同知推官知縣有原係法司出身及曽在法司辦事者亦得推補如蘇州府知府林鶚推補江西按察使寶抵縣知縣葉淇推補廣西僉事是已至於斷事理問推官有缺本部臨時斟酌選用而法司辦事進士歷事舉人監生居多但進士及舉人監生俱是挨次取選而舉人監生又係臨選考校或前或後人缺有不相當難以一一照缺對人除補今馬文升奏稱前因合無今後按察官有缺先儘法司相應屬官推補其知府同知等官果有諳曉刑名政聲卓異者亦得量才推舉斷事理問推官有缺先儘法司辦事進士歷事舉人監生除補次及相應人員所言不許差占斷事理問推官有誤問刑一節係見行事例但各該官司奉行未至或遇急切公務往往差遣委的有誤問刑合無行都察院轉行各處巡撫巡按及布按二司今後不分大小公務俱不許違例差遣斷事理問推官妨誤問刑如此則司刑得人刑不枉濫矣一查得舊例知州知縣缺少本部於當選內將該選進士監生及該升官員除補如遇缺多照依大學士李賢奏准事例將聽選監生舉人不分年月逺近揀選考補近該成化二十三年朝覲考察黜退天下知州知縣數多本年四月內於常選外將聽選舉人監生照例揀選考試除補知州知縣共一百九十五員給憑赴任去訖餘有員缺常選陸續除補但州縣數多隨補隨缺未能得完人民繁夥錢糧浩大去處知州知縣實難其人本部已經題准將成化二十三年第三甲進士取選兼同舉人監生及該升官員通行除補外候員缺數多仍照前例揀選除補所言四川雲南廣西福建路途險逺若待缺到除官不無太遲要行先期除官頂補固為有理若不查勘應否一槩扣缺除補恐前官中間亦有事故一年之上未滿後官將帶家小守候日久不得支俸管事衣食不足求其不為奸民猾吏所餌斯亦難矣合無通行巡撫巡按官將所屬州縣正官二考之上九年將滿者按季查奏開具各官歷俸及該滿年月以憑斟酌逺近除補及將新除官員訪察敢有過家留連不即到任者查照成化六年三月內本部奏准選授外任官員過違憑限半年之上不到任者雖有中途患帖不准照例問罪過一年之上者不許到任起送革職為民事例施行若在中途及任所事故去任者所在官司并原任衙門即時具由通行合干上司及徑申本部知㑹以憑作缺銓補其言布政使按察使知府所係甚大尤宜慎選一節本部遇有前項正官員缺未嘗不廣詢博訪慎擇其人二司正官每員推舉二員請㫖簡命一員知府亦精擇一員請㫖升用自今以後益當盡心推選以求無負委任如此則正官亦可得人庶政不致廢墜矣一查得舊例兩京各衙門屬官三年六年九年考滿先從本衙門堂上官考核送都察院覆考又送本部覆考從而黜陟以示勸懲近年各司因循茍且所出考語不辨淑慝虛應故事及其覆考得實其平常官員輒便造謗托拾以致考核不行無所勸懲誠如左都御史馬文升所言合無通行兩京各衙門知㑹今後屬官考滿堂上官務秉至公詢訪得實出與考語善善惡惡定為確論送都察院并本部覆考如原來考語平稱得當續出考語不嫌雷同若有不當聽覆考官從公考核其被考平常之人敢有仍前造謗托拾許御史等官指實劾奏拏問平常者降調外任有贓者罷黜為民若覆考挾私不公一體治罪其有前考平常後考中間能深自懲艾勉於為善者亦宜書稱前考稱職後考中間放肆改節者亦書平常以憑黜陟如此則勸懲無私而官僚知警矣議戶給事中王珦陳言時務奏狀王恕文選清吏司案呈奉本部送准禮部咨戶科右給事中王珦奏云云等因具奏奉聖㫖該衙門知道欽此欽遵抄出移咨送司案呈到部查得見行事例取選考試舉人監生文理平順者多相應除授府佐知州知縣等官職事歲貢應例監生文理平順者少相應除以縣丞主簿等官職事但歲貢應例監生視舉人監生數多上選之時不得均勻舉人監生有接連五七十名者亦有百十人中舉人不上十數名者若前項府佐州縣正官缺多舉人該選者數少未免將歲貢應例監生除以府佐州縣正官若前項缺少舉人該選者數多不免將舉人除授縣丞主簿等官例此而行似未停當及查得成化十五年考選南監監生余紹䕫等止百人中有八十二人俱是舉人若欲一例取選一時豈有許多府佐知州知縣不無亦選縣丞主簿等項職事未免有枉才小用之誚今右給事中王珦要將舉人遴選另置小簿遇州縣正官府佐二員缺挨次銓補似為有理但歲貢應例監生內亦有可用之人若將舉人另置一簿不惟立法太拘抑恐起人爭訟况前項選簿資次已定相傳巳逺遽難更動合無將聽選舉人監生照缺斟酌取用如相應員缺數多則量為揀選多取幾人相應員缺數少則少取幾人餘者存留以待下選所取舉人與同歲貢應例監生一體考試其歲貢應例監生若有文理平順考在優等者亦授以府佐州縣正官舉人或文理不通考在中下亦以縣佐等項職事擬除如此庶使選法公而得器使之宜人心平而無咨嗟之聲緣奉欽依該衙門知道事理未敢擅便具題奉聖㫖是欽此議給事中林廷玉陳言翊奏狀𢎞治元年王恕文選清吏司案呈奉本部送吏科抄出吏科給事中林廷玉題云云等因具題節該奉聖㫖這本所言該衙門看了來說欽此欽遵抄出送司案呈到部除明賞罰以振軍旅六事係戶兵等部掌行外今將本部合行革宿弊以清吏治等四事逐一議擬各開前件伏乞聖明裁處緣係節奉欽依該衙門看了來說事理未敢擅便具題奉聖㫖准議欽此一查得成化十四年該辦事吏吳鵬奏稱近年以來有等無藉之徒遇該役滿指以清卷為由潛住公廨營謀聽缺農民或考退生員頂補希求賄賂要銀一百五十兩名頂頭房錢設有貧難無錢者逼迫無奈儘將産業變賣或揭借錢財輳數出與頂頭以致遞相倣效習以為常此等之徒著役之後甚至壞法害民以償私債逮堪充無礙之人懼法不服出銀者反被揑造過惡赴堂執禀官不知情就行黜退若此之類不可枚舉乞行禁約今後吏典役滿即將見行文卷交與同房書典當日起送出司如再托故延住取討頂頭房錢者通將受財并出錢過付之人各論以枉法贓罪永行遵守本部巳經議擬題准通行禁約去後今給事中林廷玉又題前因合無准其所言通行內外大小衙門如遇參充吏典該管官員務要嚴加禁約隨用新參吏典參充替役不許舊役吏典夤緣交通索取頂頭錢銀敢有不遵仍蹈前非事發與者受者及過付之人俱依律究治其該管官員知而故縱一體治罪在內令錦衣衛巡捕官校嚴加緝訪在外聽巡按御史紏察如此則宿弊革而吏治清矣一看得給事中林廷玉題稱近來納粟監生數多彼既以財出身得官豈不拔本生民被其魚肉要預先立為上中下三等於臨選之時吏部出題嚴加考試文理通暢者為上文理稍通寫字端楷非請客者為中不諳文理寫字粗拙請客者為下上中二等量其高下與科貢一體選用下等者填注衙門職名令其冠帶閒住行移國子監及天下學校省諭各生知㑹使知各加勉勵奮志進學以收後效如此庶幾臨時不誤士子而將來官亦得人矣一看得給事中林廷玉題稱教官升用太拘以致豪傑不就貢途充位生員無所取效要將天下教官今後俱於舉人除授六年有功蹟照例㑹試九年考滿若無功蹟依舊銓選但有功蹟者俱量升有司相應職事其歲貢出身之人不必除授教職一節除六年有功蹟許令㑹試九年有功蹟者量除有司職事俱係見行事例别無定奪查得天下教官五千有餘遞年取中副榜舉人雖有千餘其間有例不該就教職者十有六七該就教職者不過二三百名豈能完補前項教職員缺其言九年無功蹟者依舊銓選有功蹟者俱量除有司相應職事切緣祖宗舊制教授舉人五名該升舉人四名三名本等用舉人二名以下降學正舉人全無考通經降訓導學正舉人三名該升舉人二名本等用舉人一名降訓導舉人全無考通經降訓導教諭舉人二名該升舉人一名本等用舉人全無考通經降訓導訓導舉人一名該升舉人全無考通經降邉逺學校訓導其教授以下若不通經俱降河泊所等官百有餘年率用此道若將無功蹟教官依舊銓選不惟有礙舊制抑且人心無警且各王府審理紀善伴讀教授及國子監博士助教等官各府州衛儒學教授舊制俱該九年考滿有功蹟教官升用若將前項教官俱量除有司職事第恐各王府并國子監前項教職員缺無從銓補况教官中間雖有功蹟而年貌才調未必皆堪任有司之職合無今後教官九年考滿仍遵舊制第為升降其該升之中學行超越者授以知縣其次授以博士等官歲貢等項監生願就教職者本部及翰林院嚴加考試務要精通三場者授以訓導其文理生澀者不得濫竽其間如此則教官亦可以得人生員不至於無教矣一查得成化二十一年該本部題為缺官事當將刑科都給事中盧瑀升除湖廣長沙府通判給事中秦升升除四川順慶府廣安州同知工科給事中童柷升除湖廣武昌府興國州同知及查得成化二十二年為急缺紗綾紙劄事將御史劉俊調除福建邵武府光澤縣知縣訖近該本部題內開給事中御史調外任該升一級降外任該對品調任者有相應員缺就行除授知縣同知官職事無相應員缺者升俸一級仍令照舊管事其前項兩京給事中御史并文職奉特㫖調任降級者內果有才識超卓遇有相應員缺陸續量才舉用已將劉俊升俸一級仍舊管事候有相應員缺量才舉用外為照府通判盧瑀州同知秦升童柷又有原任禮科都給事中蕭顯升除貴州鎮寧州同知浙江道御史汪奎升除四川䕫州府通判俱係先年升用官員比之因事降調者不同以此未及舉用今給事中林廷玉言盧瑀童柷秦升雖係升遷但當時欲斥逐而難為名故假此以陰寓意耳要將各官量為升用合無准其所言將各官並成實蕭顯汪奎仍照本部題准事例再行訪察如果才識超卓遇缺量才陸續舉用如此庶幾屈者以伸而下無遺才矣陳言輔治奏狀王恕今年閏正月臣以年老奏乞休致奉聖㫖卿朝廷老臣未可輕退宜勉副任用事有當言的盡心來說毋再固辭欽此臣有以見陛下不欲臣去者非徒欲富貴臣也蓋欲臣竭耳目之所見聞盡此心以匡輔聖政也近因痢疾陳乞容臣調理將印命侍郎署管奉聖㫖准卿調理印照舊掌臣又有以見陛下眷愛之專也有君如是何忍負之伏覩祖訓條章內府各監局等衙門內官俱有定員各有職掌洪武永樂年間未嘗額外濫設其太監等官非歷練老成雖有聰明才俊亦不輕授近年以來則不然矣前者陛下將內官論年遞降蓋矯往年濫升之弊欲復祖宗之舊制誠是也臣於病中風聞近日又升一起內官其數頗多不知是前日遞降者不知另是一起也前既以為濫而遞降之今何不以為濫而復升之似乎不可舉措如此其何以示天下陛下嗣位之初人心歸向如古之二帝三王本朝太祖太宗復見於今日莫不稱頌而愛戴之蓋聞陛下在青宫時存心正大不喜聲色不貴貨利及登寶位又罷貢獻織造屏去一應珍奇玩好之物治近習蠧國亂政邪術欺君罔上之罪并逐喇嘛畨僧法王佛子國師革罷傳奉冗員追回濫賞莊田蠎衣等項裁抑奢侈奔競凡此數事皆壞名器損國體傷民財臣民所不欲而不能革非一日矣陛下一旦而盡革之此天下臣民所以稱頌而愛戴之也夫何未久而又濫升內官如此若復濫賞莊田蟒衣將見前數事不數年復如舊矣欲天下臣民稱頌而愛戴之如今日後不可得此天命去就人心離合之機也可不慎歟况今北敵在邉災異迭見此正君臣上下同加修省之時而國政如此其何以服逺人而弭天變伏望陛下自今伊始於出入起居之時發號施令之際務要惟精惟一允執厥中逺宗堯舜之道近守祖宗之法决不可為巧言所惑蹈襲前事上拂天意下失人心而為社稷憂臣誠激於中詞不能婉干冒天威無任戰栗隕越之至等因具本奏奉聖㫖這起內官隨侍春宫年久因遇節日各量升一級了罷欽此覆大理寺右寺丞楊澄鑒别大臣奏狀𢎞治王恕元年文選清吏司案呈奉本部送准禮部咨禮科抄出大理寺右寺丞楊澄奏云云等因具奏奉聖㫖這本所言該衙門看了來說欽此欽遵抄出將專委任以禮大臣一事移咨送司案呈到部臣等看得楊澄所言乞要陛下將內閣并在廷文武大臣一一重瞳鑒别果有年力衰憊庸庸保祿不堪任事者以禮罷去其老於閲歷明達世故可備顧問計大事决大疑者亦宜曲力庇覆而優容之少賜宣召而寵異之勿因小嫌而阻其志勿以小過而挫其節一節經傳載之而有成說歷代行之而致成效非無稽之言弗詢之謀可比也然所以體而行之在人君而非臣下之所敢言也伏乞陛下因楊澄之請將見任大臣再加鑒别可者任之其不可者罷去之既任之將以計大事也則小嫌宜在所略將以决大疑也則小過宜在所容人言當恤報私仇而陷排之者不可不察衆論可采執偏見而非毁之者不可不辨機密之事賜以手詔激切之情許之面陳必如朱熹所謂任則勿疑疑則勿任此聖君賢相所以誠意交孚兩盡其道而以共成正大光明之業也書曰任賢勿二去邪勿疑願陛下大書於座右時加省覽緣係陳言修省及節該奉欽依該衙門看了來說事理未敢擅便具題奉聖㫖是欽此議太常寺缺官供祀奏狀王恕文選清吏司案呈奉本部送吏科抄出太常寺掌寺事太子少保禮部尚書劉岌等題云云等因具題奉聖㫖該部看了來說欽此欽遵抄出送司查得徐啓端原任司樂傳升協律郎王福廣等一十三員俱由樂舞生傳升協律郎等項官職成化二十三年九月該科道官陳言要將傳奉濫設官員通行查出罷歸原籍閒住等因節該奉聖㫖是原有官升職的三品四品降正從六品五品六品降正從八品七品以下降雜職樂舞生道士出身的冠帶閒住都不用再求進用欽此欽遵外今該前因案呈到部看得具官劉岌等題稱本寺缺官供祀要將徐啓端仍復司樂其餘王福廣等月支食米聽候差委祭祀一節先因內外奔競無恥之徒夤緣梁芳等傳升京職日積月纍遂至千數百員費耗錢糧濫占皂𨽻不可勝紀互相交結以邪妨正又不可言三五年來名器大壞物議不平仰惟皇上嗣位之初首罷傳升官員朝野為之改觀人心無不痛快迄今一年有餘事體方定奔競稍息今劉岌等却要將徐啓端等復職食糧是為傳升官員立赤幟也若復用一人則數千百人皆相率而來豈勝煩擾豈不壞朝廷清明之政失萬邦黎獻之心所言難准且三年一次致祭嶽鎮海瀆歷代帝王俱遣樂舞生行禮若謂金山等處墳所四十五處祭祀官少不敷差遣照例差樂舞生行禮亦無不可何必開已閉之幸門引既退之小人然而此舉非真為缺官供祀蓋是徐啓端央凂劉岌等假此為名以求復進非惟啓此弊端抑且故違詔㫖所據徐啓端等俱合拏送法司明正其罪以為傳升降革再求進用者之戒劉岌等亦合有罪緣劉岌等俱係京堂上及京官奉欽依看了來說事理未敢擅便具題奉聖㫖是徐啓端等本當拿問且都饒這遭劉岌等罷欽此議徽王乞升鈞州為府奏狀王恕文選清吏司案呈奉本部送准戶部咨河南清吏司案呈准工部營繕清吏司手本奉本部送內府抄出徽王稱名奏云云等因奏奉聖旨該衙門看了來說欽此欽遵抄出送司照得改作衙門係𨽻别部掌行除稟堂外合用手本前去戶部該司呈堂施行等因到司案呈看得前項改升衙門一節比與臨清縣升州事體相同係𨽻别部掌管難以施行合就移咨徑自施行等因到部送司案呈看得徽王所奏除修築城池及改挑河道俱係工部掌管除行該部徑自施行外其稱分封寥落州治要將鈞州改升為府治就於郭內添設一縣并前項有名州縣一體所轄一節臣等體得肅府見在陜西蘭州瀋府見在山西路州荆府見在湖廣蘄州岷府見在湖廣武岡州立國多者八九十年少者亦不下四五十年率皆仍舊未嘗改為今徽府要將鈞州改為府治又要將汝州郟縣魯山寶豐商州許州襄城長葛臨潁郾城鈞州密縣新鄭縣一十二州縣改𨽻所轄不惟異乎前四府仍舊之撰且啓前四府改為之端况今各處災荒軍民凋弊欲興此役實非所宜兼且州之與府於王頗無所與改與不改於王似無重輕以此言之不如仍舊貫之為善也臣等愚見如此未知是否緣係欽依該部看了來說事理未敢擅便伏乞聖裁具題奉聖㫖是不必改升還寫書與王知道欽此㑹議儧運糧儲行移奏狀𢎞治王恕二年文選清吏司案呈奉本部送准禮部咨該本部等衙門題刑科抄出都察院左副都御史邉鏞等題湖廣道呈刑科抄出總督漕運兼巡撫鳳陽等處都察院左副都御史秦紘奏湖廣等處承宣布政使司呈䝉巡按湖廣監察御史姜洪批兊軍糧米本院節行㑹奏去訖布政司星馳差人咨稟淮南總督漕運官尚早處治毋得臨期致誤國用備申轉呈臣處照詳處置施行備呈得此臣查得淮安徐州臨清德州四處水次倉糧數少雖各該衛所運糧官軍行糧尚不勾用又况臣撫屬地方亦有災傷但於內酌量輕重那移輳補今亦未完其湖廣布政司前項兊軍糧米無從措置除行本部布政司計處外為照各處巡撫都御史與巡按御史行事雖不相關而名分終難紊越每見各處巡按御史與巡撫都御史移文有令按屬衙門抄案轉達此於名分雖乖猶以敵體相待今看得御史姜洪前項批詞玩其語意乃是以上司督臨屬官名分倒置如此顯是姜洪不諳大體如䝉乞勑都察院將御史姜洪拏問明正其罪以為越禮犯分之戒及行令各處巡按御史今後凡與巡撫都御史有行仍照行移體式徑自具呈不許出案轉達庶使名分正而體統嚴等因具本該通政使司官奏奉聖㫖都察院知道欽此欽遵又該刑科參看得監察御史姜洪批詞既曰星馳差人又曰咨稟其下文毋得致誤等語乃為布政司而設今都御史秦紘以此自認怒目不明輒便參奏自傷大體事屬紛擾宜從抄出施行通抄具呈到院看得具官秦紘參奏御史姜洪前項批詞云云一節已該刑科參看得監察御史姜洪批詞云云事屬紛擾詳此參詞姜洪似為無罪難以提問及查得行移體式內止開各道御史及巡按御史呈都察院并無巡按御史具呈巡撫都御史詞語其巡按御史出案轉達巡撫都御史揆諸事體亦無妨礙今要徑自具呈行移體式既不該載亦難擅擬為例所據都御史秦紘該刑科參出前項紛擾情節合當查究但本官近升右都御史巡撫兩廣去訖伏乞聖明裁處緣秦紘係在京堂上官及奉欽依都察院知道事理未敢擅便具題奉聖㫖這本係干名分大體禮部便㑹各部通政司大理寺堂上官從公看了來說欽此抄出到部㑹同吏部等衙門太子太保尚書等官王恕等查看得行移體式各道並巡按御史具呈都察院雖無巡按御史呈巡撫都御史之文緣巡撫都御史亦係本院堂上官相應具呈但在外巡按御史有具呈者有抄案轉行者今巡按湖廣監察御史姜洪批詞布政司星馳差人咨禀淮安總督漕運官尚早處置毋得臨期致誤國用委的詞語缺遜有失大體及刑科并都察院參奏都御史秦紘自傷大體合當查究等詞不無偏向俱各有罪所據御史姜洪刑科經該官都察院僉書官吏通該查究提問合無今後巡按御史事與巡撫都御史相關者仍照行移體式一體具呈庶幾名分攸存體統不紊緣事內干礙在京堂上官並京官及節該奉欽依禮部便㑹官從公看了來說事理未敢擅便具題奉聖㫖是姜洪批詞缺遜有失大體難居風憲對品調外任刑科都察院經該僉書官吏偏向不公本當提問且饒這遭各罰俸糧一箇月欽此欽遵擬合通行除外合行就移咨欽遵施行等因送司案呈到部看得御史姜洪係正七品今對品調外任該除在外正七品知縣職事查得山西平陽府解州夏縣見缺知縣一員欲將姜洪調補前缺順齎文憑令其就彼到任管事未敢擅便具題奉聖㫖是欽此名臣經濟録卷十六
