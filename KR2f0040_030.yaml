body:
  text: 名臣經濟録卷三十明黃訓編禮部祠祭下孔子封王辨吳沉後世之禮有甚似而實非者不可不察也且以追諡夫子為王言之夫子聖人也生不得位沒而以南面之禮尊之其說似矣然王君之號也夫子人臣也生非王爵死而諡之可乎哉昔者吾夫子嘗有言曰必也正名乎又曰名不正則言不順臣而王之于名正乎于言順乎春秋之時列國有僣王稱者矣麟經之筆削而黜之蓋名者實之著無其實有其名謂之淫名夫子之生也不獲有尺寸之土今而以有天下之號歸之在天之靈其肯歆之乎嗟夫有德者必有位理之常也有其德而無其位此則夫子之不幸也曽謂無實之稱而足以為聖人榮乎或曰夫子之道王者之道也謂仲尼素王其來久矣奚至今封之而不可曰謂夫子有王者之道則可謂夫子有王者之號則不可昔夫子病子路使門人為臣夫子責之曰久矣哉由之行詐也無臣而為有臣夫無臣不可以有臣非王而可以師稱王乎聖人不敢欺天也人其可以欺聖人乎然則當若之何曰夫子之澤不被于當時而其教實垂于萬世褒之以王者之貴曷若事之以師之為尊乎書曰天降下民作之君作之師古者治教之職不分君即師也師即君也二帝三王盡君師之責者也若夫子則不得君而為師者也師也者君之所不得而臣者也故曰雖詔于天子無北面所以尊師也彼以王爵之貴為隆以稱師者習俗之見也考之經在當時聖門髙弟之稱其師有曰孔子有曰夫子其孫子思直字之曰仲尼蓋夫子既無爵諡則稱之者不曰仲尼必曰夫子觀其門人弟子之不敢過號其師則知以無實之諡加于聖人必非聖人之意也天下之論每病于狥同惡異而不本乎至公至當之理談夫子之封王則必相與和之以為誇大矣謂夫子不當封王則必相與咻之以為狂怪矣吁此所以行之數百年之久而未有敢議其非者彼之不敢議必曰我畏聖人也此非畏聖人也畏天下之罪已也若吾之說則雖得罪于天下不恨也懼得罪于聖人而巳曰請問今將何以尊聖人曰在明其道不在乎王不王論尊孔子帝號楊守陳時有言者請尊孔子以帝號而加籩豆舞佾以稱其衮冕一如天子制有司沮之乃遷其說謂不加帝號猶可而籩豆舞佾在所必加朝廷從之加籩豆十二舞佾八此固追崇先聖之盛典矣然猶未臻于極焉孔子道德教化之盛賢于堯舜而配天地自生民以至于今一人而巳後世人君皆師之則皆其弟子也稱為先師固當矣若追崇之典必當臻乎極而後巳焉夫禮因人情以義起周公制禮追王其父祖前未有也師生之義與父子之恩同子可以追王其父則生亦可以追王其師况孔子又萬世一人後王實被罔極之恩者乎近世人君師孔子而追王之固禮也而未為之至者古之皇帝王皆因時建號非有等差自秦始稱皇帝而後世有天下者無不稱帝其祖父雖編氓伍卒亦追帝之而族屬功臣則皆封之為王于是帝為君號王為臣爵懸絶矣君于臣禮當其為師則不臣也况異代之聖師而可臣耶王孔子而不帝是猶臣之也其可乎必帝之乃見不臣之禮而為尊崇之典之極焉在宋真宗巳欲帝之矣其下不能將順而沮之謂孔子周之陪臣周止稱王不當加以帝號夫謂之周陪臣則雖公之與魯公班且不可况王之與周埒乎既王之則固謂其為萬世之聖師而不以周之陪臣視之矣于周何預而不當帝耶故先儒羅從彥謂可加以帝號而褒崇之誠百世不易之至論也今言者遷就有司之說謂孔子周人當用周制王乃天王之王非國王之王故不帝猶可在後世則帝之與王猶天澤之不可混猶冠履之不可殽矣尚可以周制論哉尊異代之聖師而用當代之臣爵曰此天王也彼國王也則亦非正名别嫌之禮矣孰若初說帝號之為確乎我太祖髙皇帝之定祀禮也凡嶽鎮海瀆皆革去舊制止以山水本名稱其神若所謂東嶽泰山之神是巳至于忠臣烈士亦止稱當時爵號而革去後世之封若所謂吳泰伯之神是已獨孔子善明先王之道為天下師以濟後世非有功于一方一時者比故不稱魯大司冦而仍舊號大成至聖文宣王其尊崇之意極至而無以加矣但當時未有援宋真宗羅從彥告者故未及帝之耳今有司沮言者乃謂舊制而不肯更夫以太祖尊崇聖師之心如彼其至茍聞今議有不幡然更耶彼有司于異端與他政弗能一一遵舊制也而此獨曰舊制豈舊制果不敢更耶又謂孔子之道惟在君臣身體而力行之諡號器數皆不足較夫道在身體力行是矣餘亦安可置之如彼其說則明王但奉天道繩祖武足矣而又尊稱上帝追王先公制為郊社禘嘗之禮樂皆必極其至而足為萬世式者何耶有司之議過矣然自漢以至于今儒之僻陋者豈獨不欲帝吾聖師雖公之王之諡加數字天子拜之郡縣祀之冕服籩豆舞佾如天子制皆謂不可甚而謂獻官以皇帝遣而北面揖其禮太重請改東靣此豈特不知禮而巳蓋亦無是非之心者也然人心之天理自久而明萬世之公論卒定于一故既王之又纍字諡之天子北面拜之郡縣通祀之而全用天子之禮樂矣獨帝號未加尚為闕典今若不加後世亦必有加之者聖皇良弼豈容有缺典待後世哉行將舉此至極之盛典超百王而憲萬世也歟鏡川文集孔子廟祀議宋濂世之言禮者咸取法于孔子然則為廟以祀之其可不稽于古之禮乎不以古之禮祀孔子是䙝祀也䙝祀不敬不敬則無福奈何今之人與古異也古者將祭主人朝服即位于阼階東西靣祝告利成主人立于阼階東西靣尸出入主人降立于阼階東西靣此皆主人之正位也卒脀祝盥洗升自西階主人盥升自阼階祝先入南面主人從户內西面祝酌奠主人西面再拜稽首皆為几筵之在西也尸升筵主人西面立于户內拜妥尸尸酢主人主人西面奠爵拜皆為尸之在西也漢晉春秋所載章帝元和二年幸魯祀孔子帝升廟西面載拜開元禮亦謂先聖東向先師南向三獻官皆西向是猶未失古之意也今襲開元二十七年之制遷神于南面而行禮者于北面則非神道尚右之義矣古者造木主以棲神天子諸侯之廟皆有主卿大夫雖無之大夫束帛以依神士結茅為菆無有設像之事開元禮亦謂設先聖神座于堂上西楹間設先師神座于先聖神座東北席皆以莞則尚掃地而祭也今因開元八年之制摶土而肖像焉則失神而明之之義矣古者灌用鬯臭鬱合鬯臭隂逹于淵泉既灌然後迎牲致隂氣也蕭合黍稷臭陽逹于墻屋故既奠然後焫蕭合羶薌蓋求神于隂陽也今用薰薌代之庸非簡乎古者朝覲㑹同與凡郊廟祭享之事皆設庭燎司烜共之火師監之其數則天子百公五十餘三十以為不若是則不嚴且敬也今以秉炬當之庸非瀆乎古之有道有德者使教焉死則以為樂祖祭于瞽宗此之謂先師若漢禮有髙堂生樂有制氏詩有毛公書有伏生之類也又凡始立學者必釋奠于先聖先師釋奠必有合有國故則否謂國無先聖先師則所釋奠者當與鄰國合若唐虞有后䕫伯夷周有周公魯有孔子則各自奠之不合也當是時學者各自祭其先師非其師弗學也非其學弗祭也學校既廢天下豈知所師孔子集群聖之大成顔回曽參孔伋孟軻實傳孔子之道尊之以為先聖先師而通祀于天下固宜其餘當各及其邦之先賢雖七十二子之祀亦當罷去而于國學設之庶幾弗悖禮意開兀禮國學祀先聖孔子以顔子等七十二賢配諸州但以先師顔子配今也雜置而妄列甚至荀况之言性惡揚雄之事王莽王弼之宗莊老賈逵之忽細行杜預之建短喪馬融之黨附勢家亦厠其中吾不知其為何說也古者立學專以明人倫子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也今一切置而不講顔回曽參孔伋子也配享堂上顔路曽㸃孔鯉父也列祀廡間張載則二程之表叔也乃坐其下淳祐初張居程上後因國子監集講再定張遂居程下顛倒彛倫莫此為甚吾又不知其為何說也古者士之見師以菜為贄故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠今專用春秋亦非釋奠有樂無尸而釋菜無樂是二者之輕重係乎樂之有無也今則襲用魏漢津所製大晟之樂乃先儒所謂亂世之音也其可乎哉古者釋奠釋菜名義雖存其儀注皆不可知唐開元禮倣佛儀禮饋食篇節文為詳所謂三獻各於獻後飲福即尸酢主人主婦及賔之義也今憚其煩惟初獻者得行之其可乎哉嗚呼學校者禮之所自出猶河瀆之宗瀛海也猶山嶽之祖崑崙也今乃舛謬若是則其他可知矣禮固非士庶人之所敢議者有人心者孰能默默以自安乎雖然此姑言其略爾若夫廟制之非宜冕服之無章器用則雜乎雅俗升降則昧乎左右如此類甚多雖更僕不可盡也或者則曰子之言信辨矣建安熊氏欲以伏羲為道統之宗神農堯舜禹湯文武各以次而列焉臯陶伊尹太公望周公暨稷契夷益傅說箕子皆可與享于先王天子公卿所宜師式也當以此秩祀天子之學若孔子實兼祖述憲章之任其為通祀則自天子下逹矣茍如其言則道統益專三皇不汨于醫師太公不辱于武夫也不識可乎昔周有天下立四代之學其所謂先聖者虞庠則以舜夏學則以禹殷學則以湯東膠則以文王復各取當時左右四聖成其德業者為之先師以配享焉此固天子立學之法也奚為而不可也潜溪集吳文正公祀議楊士竒欽奉聖㫖命臣等考䆒元儒吳澄應否從祀議擬奏聞臣士竒等欽遵考得元翰林學士吳澄所著書及奎章閣侍書學士虞集所狀澄事行蓋澄自十嵗得宋朱熹所注大學讀觀之即知為學之要專勤誦讀次讀語孟中庸亦然遂大肆力于諸經十五專務聖賢之學致踐履之實以道自任其所自勵有勤謹敬和自新自修消人欲長天理克巳悔過矯輕警惰顔冉理一等銘其教學者有學基學統等篇深䆒濓洛關閩之㫖考正孝經校定易書詩春秋修正儀禮小戴記及邵雍張載之書有易書春秋禮記纂言及易纂言外翼家所以啓大道之堂奧開來學之聰明傳之百世而無弊也時朝廷屢起之乃就國子監司業一言不合即自解去後屢徴復起亦不久于位進退之際卓然君子蓋元之正學大儒許衡及澄二人遭際世祖功在朝廷澄在朝之日雖淺其職論思教成均勸講經筵咸積誠意預議論大事咸引古道而功在學者尤多故二人之沒皆諡文正衡在當時巳列從祀澄既後出又卒于元衰之際當時已有建議宜列從祀者屬元綱日頺未及舉行今澄所著諸書具在我國家崇儒重道大明四書五經及性理之㫖凡澄所言皆見采録以惠學者蓋澄學問之功朱熹以來莫或過之而從祀諸儒自荀况下至范寧語其事功皆未及澄今若升澄從祀孔子庭列諸許衡之次允愜斯文之公議昭國家之盛典謹具奏聞伏候敕㫖東里文集考正祀典疏程敏政臣聞古聖王之治天下必以祀典為重所以崇德報功而垂世教淑人心也故有功德于一時者一時祀之更代則巳有功德于一方者一方祀之踰境則巳然猶欲勸一時範一方而不敢輕議焉况先師孔子有功德于天下萬世天下祀之萬世祀之則其廟庭之間侑食之人豈可茍然而巳必得文與行兼名與實副有功于聖門而無疵于公議者庶足以稱崇德報功之意若侑食者非其人則豈惟先師臨之神不顧歆將使典模範者莫知所教為弟子者莫知所學世教不明人心不淑通于天下而施及後世其為關係豈特一時一方之可比哉邇者言官欲出文廟從祀諸賢之有罪者詔禮部集議臣愚亦在預議之列疑其所言尚有未盡而議者相持憚于改作臣考之于書揆之于心不敢妄為異同謹畫一條陳上瀆聖覽伏乞皇上丕顯文謨主張斯道仍下禮部通行集議采而行之一洗前代相習之陋永為百世可遵之典使世教有興起之益人心得趨向之公其于治道未為無補謹具奏聞一唐貞觀三十一年始以左丘明等二十二人從祀孔子廟庭蓋當時聖學不明議者無識拘于舊注疏謂釋奠先師如詩有毛公禮有髙堂生書有伏生之類遂為專門訓詁之學為得聖道之傳而併及馬融等行之至今誠不可不考其行之得失與義之可否而釐正于大明有道之世也臣考厯代正史馬融初應鄧隲之召為祕書厯官南郡太守以貪濁免官髠徒朔方自刺不殊又不拘儒者之節前授生徒後列女樂為梁兾草奏殺忠臣李固作西第頌以美兾為正直所羞即是觀之則衆醜偹于一身五經為之掃地後世乃以其空言目為經師使侑坐于孔子之庭臣不知其何說也劉向初以獻賦進喜誦神仙方術嘗上言黃金可成鑄作不驗下吏當死其兄陽城侯救之獲免所著洪範五行傳最為舛駁使箕子經世之微言流為隂陽術家之小技賈逵以獻頌為郎不修小節專一附㑹圗䜟以致貴顯蓋左道亂政之人也王弼與何晏倡為清談所注易専祖老莊而范寧追䆒晉室之亂以為王何之罪深于桀紂何休則止有春秋解詁一書黜周王魯又注風角等書班之于孝經論語蓋淫端邪說之流也戴聖為九江太守治行多不法懼何武劾之而自免後為博士毁武于朝及子賔客為盜繫獄而武平心决之得不死則又造謝不慙先儒謂聖禮家之宗而身為贓吏子為賊徒可為世鑒王肅在魏以女適司馬昭當是時昭篡魏之勢巳成肅為世臣封蘭陵侯官至中領軍乃坐觀成敗及毌丘儉起兵討賊肅又為司馬師畫策以濟其惡若好人佞己乃其過之小者杜預所著亦止有左氏經傳集解其大節亦無可稱如守襄陽則數饋遺洛中貴要紿人曰懼其為害耳非以求益也伐吳之際因斫癭之譏盡殺江陵之人以吏則不亷以將則不義凡此諸人其于名教得罪非小而議者謂能守其遺經轉相授受以待後之學者不為無功臣竊以為不然夫守其遺經若左丘明公羊髙榖梁赤之于春秋伏勝孔安國之于書毛萇之于詩髙堂生之于儀禮后蒼之于禮記杜子春之于周禮可以當之蓋秦火之後惟易以卜筮僅存而餘經非此九人則幾乎熄矣此其功之不可泯者以之從祀可也若融等又不過訓詁此九人所傳者耳况其書行于唐故唐姑以備經師之數祀之今當理學大明之後易用程朱詩用朱子書用蔡氏春秋用胡氏又何取于漢魏以來駁而不正之人使安享天下之祀哉夫所以祀之者非徒使學者誦其詩讀其書亦將識其人而使之尚友也臣恐學者習其訓詁之文于身心未必有補而考其奸諂淫邪貪墨怪妄之迹將自甘于效尤之地曰先賢亦若此哉其禍儒害道將有不可勝言者矣至于鄭衆盧植鄭𤣥服䖍范寧五人雖若無過然其所行亦未能以窺聖門所著亦未能以發聖學若五人者得預從祀則漢唐以來當預者尚多臣愚乞將戴聖劉向賈逵馬融何休王肅王弼杜預八人裭爵罷把鄭衆盧植鄭𤣥服䖍范寧五人各祀于其鄉后蒼在漢初說禮數萬言號后氏曲臺記戴聖等皆受其業蓋今禮記之書非后氏則不傳于世矣乞加封爵與左丘明等一體從祀則僞儒兔欺世之名賢者受專門之祀而情文兩得矣一孔子弟子見于家語自顔回而下七十六人家語之書出于孔氏當得其實而司馬遷史記所載多公伯寮秦冉顔何三人文翁成都廟壁所畫又多遽瑗林放申棖三人先儒謂後人以所見增益殆未可據臣考宋邢昺論語注疏申棖孔子弟子在家語作申續史記作申黨其實一人也今廟庭從祀封文登侯在東廡申黨封臨川侯在西廡重復無稽一至于此且公伯寮訴子路以沮孔子乃聖門之蟊螣而孔子稱瑗為夫子决非及門之士林放雖嘗問禮然家語史記邢昺注疏朱子集注俱不載諸弟子之列秦冉顔何疑亦為字畫相近之誤如申棖申黨者但不可考耳臣愚以為申棖申黨位號宜存其一公伯寮秦冉顔何蘧瑗林放五人既不載于家語七十子之數宜罷其祀若瑗放二人不可無祀則乞祀瑗于衛祀放于魯或附祭于夲處鄉賢祠仍其舊爵以見優崇賢者之意亦庶乎其名實相符而不舛于禮也一洪武二十九年行人司司副楊砥建議請黜揚雄進董仲舒太祖髙皇帝嘉納其言而行之主張斯道以淑人心可謂大矣然荀况揚雄實相伯仲而况以性為惡以禮為僞以子思孟子為亂天下以子張子夏子遊為賤儒故程子有荀卿過多揚雄過少之說今言者欲併黜况之祀宜也然臣竊以為漢儒莫若董仲舒唐儒莫若韓愈而尚有可議者一人文中子王通是也通之言行先儒之論巳多大約以為僣經而不得比于董韓云爾臣請斷之以程朱之說程子曰王通隱德君子也論其粹處殆非荀揚所及若續經之類皆非其作然則程子豈私于通哉正因其言之粹而知其非僣經之人耳朱子曰文中子論治體處髙似仲舒而夲領不及爽似仲舒而純不及又曰韓子原道諸篇若非通所及者然終不免文士之習利逹之求若覽古今之變措諸事業恐未若通之精到懇惻而有條理也至于河汾師道之立出于魏晉佛老之餘逮今人以為盛則固豪傑之士也今董韓並列從祀而通不預疑為闕典臣又按宋儒自周子以下九人同列從祀而尚有可議者一人安定胡瑗是也瑗之言行先儒之論巳詳大約以為少述著而不得比于濂洛云爾臣亦請斷之以程氏之說程子看詳學記曰宜建尊賢堂以延天下道德之士如胡瑗張載邵雍使學者得以矜式朱子小學書亦備載瑗事以為百世之法臣以為自秦漢以來師道之立未有過瑗者矧程子于瑗之生也欲致其與張邵並居于尊賢之堂其沒也乃不得與張邵並侑于宣聖之廟其為缺典甚矣况宋端平二年議增十賢從祀以瑗為首若謂瑗無著述之功則元之許衡亦無者述但其身教之懿與瑗相望誠有不可偏廢者臣考之禮有道有德于教于學者死則為樂祖祭于瞽宗鄉先生沒則祭于社若通瑗兩人之師道百世如新得加封爵使與衡同列祀于學宫最得禮意一自唐宋以來以顔子曽子子思孟子配享坐堂上而顔子之父顔無繇曽子之父曽㸃子思之父孔鯉皆坐廡下臣考之禮子雖齊聖不先父食而三代之學皆所以明人倫也夫孔子之所以為教與諸弟子之所以為學者不過明此而已今乃使子坐于上父坐于下豈禮也哉若以為此乃論傳道之功則自古及今未有外人倫而言道者縱出于後世之尊崇非諸賢之本意臣恐諸賢于冥冥之中必有不安于心而不敢享非禮之祀者臣考之元至順三年嘗封顔無繇把國公諡文裕孟子之父孟孫氏亦嘗封邾國公臣愚乞下有司于各處廟學如鄉賢祠之制别立一祠中祀啓聖王以把國公顔無繇萊蕪侯曽㸃泗水侯孔鯉邾國公孟孫氏配享庶不失以禮尊奉聖賢之意臣又竊觀聖學失傳千五百年至程朱出而後孟氏之統始續則程朱之先亦不可缺况程子之父大中大夫封永年伯程珦首識濓溪周子于屬掾之中薦以自代而又使二子從遊朱子之父韋齊先生追諡獻靖公朱松臨沒之時以朱子託其友籍溪胡氏而得程氏之學珦以不附王安石新法退居于洛松以不附秦檜和議奉祠于閩其厯官行已俱有稱述臣愚乞將永年伯程珦獻靖公朱松從祀啓聖王使學者知道學之傳有開必先明倫之義不為虛文矣𢎞治元年八月初三日奉聖㫖這本禮部照例㑹官議欽此龜山先生從祀議程敏政翰林院為崇祀典以重道學事該禮部手本開送國子監博士楊廷用奏前事要將宋儒龜山楊時定議從祀孔子廟庭查得成化元年浙江紹興府知府彭誼亦要將楊時從祀及福建將樂縣嵗貢生員何升亦奏前事內稱宋儒朱熹張栻元儒許衡吳澄俱以有功聖門得與從祀而楊時獨不得與近年南京國子監祭酒謝鐸亦以為言可見後學之心皆有未安巳經行移翰林院議擬定奪外合依照例用手本行請本院查照議擬徑自具奏等因謹按諸儒從祀于孔門者非有功于斯道不可然道非後學所易知也要必取證于大儒之說斯可以合人心之公竊考程氏遺書及朱子伊洛淵源録所載龜山楊氏行狀墓志等文俱稱其造養深逺踐履純固溫然無疾言遽色與明道程子相似方其學成而歸程子目送之曰吾道南矣然則是道也豈易言哉自兩程子嗣孔孟不傳之統及門之士得以道見許者龜山一人而已蓋龜山一傳為豫章羅氏再傳為延平李氏以授朱子號為正宗文定胡氏親承指授而春秋之傳作南軒張氏上泝淵源而太極之義闡心學所漸悉本伊洛使天下之人曉然知虛寂之非道訓詁之非學詞華之非藝則龜山傳道之功不可誣矣崇宣之世京黼柄國躋王安石于配享位次孟軻而頒其新經以取士尊安石為聖人不復知有孔子誦新經為聖言不復知有古訓僣聖叛經凡數十年龜山入朝首請黜其配享不令厠宣聖之廟庭廢其新經不令蠧學者之心術又請罷綱運以收人心斥和議以張國勢竄權臣以正邦憲培主德以崇治本竑議讜言雖不盡用然使天下之人知邪說之當息跛行之當距淫詞之當放則龜山衛道之功亦不可掩或有疑其出處之際而少其著述之功則亦有可言者朱子謂龜山之出惟胡文定公之言最公曰當時若聽用决須救得一半而文定亦曰祭氏焉能凂之然則以出處見疑者未考之過也龜山值洛學黨禁之餘指示學者以大本所在體驗之功轉相授受而朱子得聞其指訣則見于何鎬之書朱子于理一分殊之論稱其年髙德盛而所見益精則見于西銘之跋要之無龜山則無朱子而龜山之道非知德者殆未可輕議然則以著述見少者亦未考之過也又按元史至正二十一年因杭州路照磨胡瑜建言已將龜山與延平李氏文定胡氏九峯蔡氏西山真氏俱各封爵列從祀以世變不及遍行天下此殆近于禮所謂有其舉之莫敢廢者然則親講于龜山若文定私淑于龜山若朱張咸在侑食而近私淑于朱子若蔡真逺私淑于朱子若許吳亦在侑食獨其師有傳道衛道之功可以繼往開來抑邪與正者反不預焉揆之人心誠為缺典考大儒之定論參前代之故實伸弟子從師之義慰後學向道之心以龜山躋于從祀宜合公言謹議釋奠先師之禮丘濬臣按塑像之設中國無之至佛教入中國始有也三代以前祀神皆以主無有所謂像設也彼異教用之無足怪者不知祀吾聖人者何時而始為像云觀李元瓘言顔子立侍則像在唐前已有矣嗚呼姚璲有言北史敢有造泥人銅人者門誅則泥人固非中土為主以祀聖人法也後世莫覺其非亦化其道而為之郡異縣殊不一其狀長短肥瘠老少美惡惟其工之巧拙是隨就使盡善亦豈其生盛德之容甚非神而明之無聲無臭之道也國初洪武十四年首建太學聖祖毅然的見千古之非自夫子以下像不土繪祀以神主數百年夷教乃革嗚呼盛哉夫國學廟貌非但以為師生瞻仰之所而天子視學實于是乎致禮焉夫以冕旒之尊而臨夫爼豆之地聖人百世之師坐而不起猶之可也若夫從祀諸儒皆前代之縉紳或當代之臣子君拜于下而臣坐于上可乎臣知非獨名分之乖舛而觀瞻之不雅竊恐聖賢在天之靈亦有所不安也或者若謂既巳摶土為之事之以為聖賢一旦毁之以為泥滓似乎不恭竊觀聖祖詔毁郡邑城隍塑像用其土泥壁以繪雲山載在令甲可考也矧所塑者特具人形耳豈真聖賢之遺貌哉程頥論人家祖宗小影有一毫不類則非其人彼親見其人而貌之有毫髮不肖似尚非其人况工人隨意信手而為之者哉臣惟文廟之在南京者固巳行聖祖之制今京師國學乃因元人之舊正統中重修廟學惜無以此上聞者倘有以聞未必不從今天下郡邑恐于勞民無俟改革惟天子臨視所乞如聖祖之制以革千古之夷教如儒臣宋訥所云者誠千萬世儒道之幸仰惟我聖祖有大功于世教十數此其一也發揚祖宗之功烈亦聖子神孫繼述之大者正旦日食對楊士竒永樂十一年十二月二十八日鴻臚寺奏習正旦賀儀上召禮部翰林院官問曰正旦日食百官奏賀可行乎尚書吕震對曰日食與朝賀之時先後不相妨侍郎儀智曰終然同日免賀為當上顧問翰林諸臣古有日食行賀禮否黃淮楊榮金幼孜皆未有對臣士竒對曰日食天變之大者前代元正日食多不受朝宋仁宗時元正日食富弼請罷宴徹樂宰相吕夷簡不從弼曰萬一契丹行之為中國羞後有自契丹回者言彼是日罷宴仁宗深悔今免賀誠當上曰君子愛人以德不以姑息其免賀及宴仍賜百官節鈔上于敬天致誠必求當理未嘗茍狥人言大率類此厯象之法丘濬臣按洪武中刻漏博士元統言一代之興必有一代之厯隨時修改以合天道我朝承運以來厯雖以大統為名而積分猶授時之數授時厯法以元至元辛已為厯元至今洪武甲子積一百四年以厯法推之得三億七十六百一十九萬九千七百七十五分經云大約七十五年而差一度每嵗差十分五十秒辛巳至今年逺數盈漸差天度擬合修改今年洪武甲子嵗前冬至為大統厯元推演得授時厯辛已閏准分二十萬二千五十分洪武甲子閏准分一十八萬二千七十分一十八秒授時厯氣准分五十五萬六百分洪武甲子氣准分五十五萬三百七十五分授時厯辛巳轉准分一十三萬二百五分洪武甲子轉准分二十萬九千六百九十分授時厯辛巳交准分二十六萬三百八十分洪武甲子交准分一十一萬五千一百五分八秒當元統上言時歲在甲子也巳云年逺數盈漸差天度矧今又厯一甲子而過其半其年愈逺其數愈多其所差者當益甚也臣愚以為厯者國家之大事所以膺在躬之數承上天之託以敬天道以授人時者端有在于此臣請詔求天下通星厯之學如郭守敬者以任考驗之責明天人之理如許衡者以任講究之方失今不為後愈差舛伏惟聖明留神聽察臣于厯數之學素無師傳謹述經史所載言及厯象之理者以為明時獻若夫推步占驗之法具見諸書者兹不復贅論正統巳巳厯嶽正豫及第之明年頒己巳之朔禮成而觀其書書二至之晷有晝夜六十一刻之文即怪其故退而求古諸家厯法無有也先生時為五官司厯豫雅相知者主事君又同進士因以所私問之先生曰子以為何如豫曰天行最健日次之月又次之以月㑹日以日㑹天天運常舒日月常縮厯家以其舒者縮者之中氣置閏以定分至然以三百六十五日四分日之一之日乘除之積三嵗而得三十二日五十九刻者其法常活以三百六十五度四分度之一之天分南北二極日行中道冬至行極南至牽牛得四十刻為日短夏至行極北至東井得六十刻為日長春秋分則行南北中東至角西至婁為晝夜均均者各五十刻也其法常死死者必不可易而活者不能不變故古以厯名家者必以其變者立差法以權衡之則變者常通而死者得其所矣有如今厯也者無乃不揣其本而齊其末歟先生曰如子言誠然豫曰若然者先生將居其職而不預其事耶先生掀髯笑曰能者不必用用者不必能又何今日咎也又曰厯者聖政之所先本也茍以私智揆之能無搖其支乎豫始悟當時用事者方赫赫必以先生為忌巳而果有土木之變益以服先生之髙識矣奏改厯元事宜鄭善夫奏為嵗差事照得正德十三年五月朔日食起復時刻不合數多該欽天監中官周濓等奏驗交食以改厯元本部議得今後日月交食本監官仍依古法推步如或未當暫免參究即于官生內精選數人同周濓等講究新法彼此參驗等因本年十月十五日十四年四月十五日十月十六日凡三次月食本部劄臣前往觀象臺督同欽天監官生人等看驗其初虧復圎時刻分杪古法新法俱有得失經該奏報外竊以經緯天地治厯明時本聖賢事業而王政之首務也且天道幽𤣥其數精微以人合天非明理逹數之原鮮克于此是故嵗差之法自晉虞喜始定以歲䇿五十年差天運一度何承天復定以一百年隋劉焯取二家中數復定以七十五年唐一行復定以八十三年元許衡王恂郭守敬復定以六十六年有餘凡經數十人厯驗千數年至元授時厯似為精密矣只今新法據許衡等六十六年有餘之數推演仍又不合天道豈易言哉且如定嵗之法積四期餘一日一日分加于四期是故二至之時只在絲忽之間自古難凖要須酌量以定者如定日之法一日百刻所以變為九百四十畫者以氣朔有不盡之數難分也凡每月三十日二氣盈四百一十一畫二十五杪一朔虛四百四十一畫積盈虛之數以成閏是故定朔必是四百四十一畫前後為朓朒只在一畫之間自古無有真知要亦須酌量以定者如日月交食惟日食為最難測月食分數惟以距交遠近别無四時加减蓋月小暗虛大月入暗虛而食故八方所見皆同也日為月體所掩而食蓋日大而月小日上而月下日逺而月近日行有四時之異月行有九道之異故旁觀者逺近自不得而同矣如北方食既南方才半虧南方食既北方才半虧是故食之時刻分杪必須據地定表因時求合而後凖也如正德九年八月朔日食厯官所報食八分六十七秒而閩廣之間遂至食既其時刻分杪安得而同今按交食以更厯元時分刻刻分分分分秒極精極細及至于半秒難分之處要亦須酌量以定者若差半秒積以歲月則躔離朓朒皆不合原算矣是故隨時考驗以求合于天者茍非其人豈易言哉謹按漢唐以來皆設算學與教習儒藝同科稱四門博士如宋錢藻孫覺諸儒皆為算學博士之官九章之法大明故定差法更厯元每得其人我朝算法既廢而户部考校數嵗限取數人又止于算錢榖户口此在九章尚未得其一也况占天之書國法所禁而官生之徒明理實少必須理明然後數精方今海內儒術之中固有天資超邁究心天人之學者使得盡觀祕書加以歲月必能上按往古下推未來庶幾厯元可更也近訪得養病南京兵科給事中樂護主事華湘開州判官余珊南京國子監生蔡於榖杭州處士孫一元此數人者聰敏靜深頗明理數之學而精于九章之法者乞𠡠該部照依太常少卿童軒事例于本職上超加職銜其監生處士量加官爵使觀祕書與周濂等講究參驗數年然後責成其效于改造厯法庶克有濟為此具本親賫奏聞讀元史厯志楊廉前代之厯唐虞三代無可考自漢至元凡四十餘厯漢興四百餘年更三造厯唐興三百餘年更七造厯宋興三百餘年更十八造厯本朝大統厯采用元授時厯自洪武至今百四十年未嘗更造而一一皆驗則斯厯真可以行之永久矣授時厯乃許平仲郭守敬所造知厯數既精明厯理又精恐古今之厯未有過之者也其法不用厯代積年日法最為簡易瓊臺丘氏作大學衍義補引洪武中刻漏博士元統之言謂授時厯元年逺數盈漸差天度擬合修改考之統所改元推步不應厯家尚仍授時之舊而丘氏復謂今去統時年逺數多所差益甚是亦泛論焉耳厯法踈密驗在交食今日月之食分秒不差又何得而疑之哉請贈諡黃福楊士竒少保户部尚書黃福喪禮傳奉聖㫖行移本院撰述祭文欽此臣等伏惟皇上臨御以來禮待臣下悉出于厚今福䝉賜祭塋葬光榮甚盛存沒感戴矣臣等竊思黃福洪武年間自衛幕官因言事太祖皇帝深見嘉奬超升工部侍即太宗皇帝初登大位即升工部尚書後建北京新設刑部命為刑部尚書及平定交趾初設布政司按察司乃命黃福仍尚書之職前往交址撫綏其民布政按察二司印信並付福掌管一切公務皆總于福福在交址十有餘年處事甚得人心仁宗皇帝監國備知其賢即位之初特遣人賫𠡠召還命兼詹事輔導儲君宣宗皇帝即位念南京重地以福老臣命于南京户部管事皇上嗣位之初升福少保令參贊機務中外之人皆欣悅朝廷用人之當福感戴聖恩與襄城伯李隆同心協力以副委任蓋福為人廉潔正直剛果無私且明識大體身雖老病念念在公官雖貴顯不營私蓄四十年來大臣之中正色居官少見其比今䝉聖恩固巳深厚但臣等欲望天恩賜諡一字及贈一官用褒賢良用垂勸勵蓋自古治平之朝及祖宗之世皆用此典臣等所目見者太宗皇帝于太子少師姚廣孝大學士胡廣皆賜諡贈官仁宗皇帝登極贈諡尤多尚書侍郎下至少卿少詹事贊善院判之賢且良者皆得䝉恩今黃福比前之得贈諡者厯官尤久效勞尤多操節之正始終一致伏望天恩特命該部依先朝例賜諡贈官庶使在位臣僚觀感興起臣等非敢私于黃福但欲國家典禮施之公當謹陳愚見伏惟聖裁題表勵忠賢事姚夔近該翰林院遞揭帖欽賜少保兼户部尚書黃福追封特進榮祿大夫太保諡號忠宣命下之日人皆翕然稱慶以為公論皇上勸賢勵忠之意至矣及照得户部尚書王佐兵部尚書鄺野正統年間俱隨駕迤北征進陳亡後䝉朝延追贈王佐少保兼户部尚書追贈鄺野少保兼兵部尚書看得王佐為人操存正大經略𢎞逺鄺野為人存心端介處事嚴謹二人者厯事纍朝偉然一代名臣而皆沒于王事始終一節夷險不變若不明章彛典加之諡號無以激勸忠賢而示將來合無照黃福事例行翰林院斟酌二人行實定擬諡號奏請頒賜庶可以慰死者于地下勵生者于方來其于風教不為小補緣係表勵忠賢事理未敢擅便成化二年九月初八日具題奉聖㫖是欽此欽遵行該翰林院遞出揭帖欽賜追贈少保兼户部尚書王佐諡忠簡少保兼兵部尚書鄺野諡忠肅姚文敏集題封諡事姚夔近該本部以巳故少保黃福尚書王佐鄺野生平行實奏請欽䝉聖恩追封賜諡報功昭德允協輿情今再照得巳故工部尚書謹身殿大學士兼東閣大學士髙榖鯁直不回端亮有守始以翰林院學士日侍英廟經筵入內閣輔政孜孜為國恪持公論景泰間先帝北巡力主遣使迎鑾之議及其還駕獨建備禮郊迎之策忠愛之誠人所難及天順初以老疾乞歸田里遂卒于家進退有道始終不渝贈諡未加誠為缺典合無照依前例行移翰林院參酌本官行實定擬封諡奏請頒賜庶可表勵臣節以示後來緣係封諡事理未敢擅便具題奉聖㫖是欽此賜諡文義姚文敏集題乞恩褒異舊臣事林俊據江西建昌府申據廣昌縣報𢎞治十五年十二月二十二日本縣致仕刑部尚書何喬新病故看得本官揚厯中外全德始終致仕十有餘年足跡不入城府聲色貨利素不嬰心著書立言老尤造妙誠為中朝耆望名世碩臣本官與刑部尚書彭韶吏部侍郎葉盛人望相同合申乞照彭韶贈太子少保葉盛諡文莊事例奏請贈諡及賜祭葬以快人心等因到臣行間又據江西布政司呈前事查得何喬新妻夫人吳氏先于本年二月內病故已經奏差進士林魁督造墳塋本官丁憂回家守制行委該府同知沈景督造外臣聞何喬新與彭韶先為刑部屬官並負盛名積官俱至刑部尚書彭韶忠亮懿淳何喬新貞方恭慎又各儒術精究吏事熟諳得古人之深以同任天下之重當時言完德純名文學政事節概皆屬心焉及位序巳極請老歸榮識者尤以不盡用為歉疏起者再四彭韶沒有贈諡仰悉我聖天子優異名德盛心然彭韶學有經緯道適中和危言峻行亷問貞風則有也忠與節與恪與清與憲則又有也其視葉盛學行同而事功過之葉盛得諡文莊彭韶宜無靳况追贈都察院右副都御史吳訥諡文恪南京吏部尚書魏驥諡文靖彭韶實足並美嗣休又宋臣歐陽修諡文忠范仲淹諡文正論者謂彭韶正色立朝先憂為國生今之世無愧古人沒而易名宜亦近之不知定議之時何取惠安之義捨大録細不類其人不足服中外之心為後世史書之信今何喬新之卒該府兼舉彭韶官階葉盛文莊事例為言似亦未慊彭韶之諡而欲求畀何喬新以文者或疑彭韶何喬新非出翰林不得諡文不知諡以責名實公是非聖君賢相所以右人文昭信史而風動士夫者端亦藉是况吳訥葉盛魏驥近事甚明而李時勉先諡文毅曺鼐諡文襄王英諡文安後各諡文忠著例厯厯可舉者哉此臣所以不揆狂昧特為申請伏望陛下褒崇舊德特隆何喬新贈祭開壙之典仍𠡠翰林院參詳臣奏揆以公議將彭韶再議與何喬新果合文正忠獻貞宣恭肅憲恪諡法具議上請聖裁易去彭韶惠安舊諡庶名實允符臣工胥勸緣係褒異舊臣及改諡事理未敢擅便為此具本謹題請㫖慎重恩典以杜濫請疏先該都察院右副都御史王應鵬等題稱看得巡按福建監察御史蘇信奏勘過巳故左布政使查約右參議楊瑀都指揮僉事王翺經歷周煥各將前項被殺事情委可矜憫乞要褒録一節相應議處以昭激勸等因奉聖㫖禮部詳議了來說欽此又該禮科給事中薛宗鎧題為明賞罰以定國是奉聖㫖這本說的是禮部看了來說欽此欽遵臣等看得人臣之死事變以節義為難朝廷之加恤恩以功德為重故士貴處死古人有泰山鴻毛之喻所以于國家死難之臣必責以義理之正有關激勸而後褒崇之典行焉上不濫豫下不虛冒庶幾名實相副足以風勵海內禮典所在關係匪輕今照左布政使查約右參議楊瑀都指揮僉事王翺經厯周煥偶以公事㑹集適遭重囚反獄挺兵突至事出倉卒橫罹鋒刃死極慘毒委可哀憫但臣等切詳前項罪囚反獄弄兵自求脫命乘勢肆毒何暇擇人而查約等適相遭值變出不虞遁身無從駢首遇害此與孫燧許逵等抗節不屈以身殉國周憲等臨陳奮勇以死勤事者大有不同所據乞要比照孫等死節恩典事例一體褒録臣等輒難輕議今給事中薛宗鎧具奏前因蓋本官彼時居閩屬邑中間事體顛末聞見尤真無非公是非慎賞罰之意與本部查議相同今該巡按福建監察御史蘇信查勘各官被殺事情及該院覆題前因委的詞多文飾義涉牽附殊非公論惟是各官不得其死原情雖足哀矜然死無禆于公安所議其褒録况先年巳經奉有欽依量賜各官營葬恤典所加巳足酬死所據該院請乞表彰褒録俱難准行且各該地方官貟平時不能禁奸倉卒不能禦亂以致方靣守臣分閫帥職當白晝大逵之中憲司公署之地以數輩么麼囹圄之羈囚操刃一呼𨽻卒潰散衣冠竄服肝腦塗地為國大辱漸不可長而當事執法之臣不能彰明憲典以正生者之罪誠有如給事中薛宗鎧所論者但查得前事先年巳經都察院行勘參提奉有欽依各該失事官貟俱巳罰治外事屬巳往亦難再議但再看得給事中薛宗鎧奏內所言罪囚林汝美等應决而久不决不錮之臬司而置之于縣獄往來易通之地是示之以無生之路而與之以可乘之機此實本官嘗為有司目擊時弊反獄殺官之禍本原在此蓋在外衙門問刑不審輕易入人死罪往往獄成而事在矜疑以致難于處决後官拘于成案避嫌畏事莫肯平反以致重囚淹禁經年老于囹圄及在外各按察司官往往移囚府縣以預防反獄之事罪不及已殊不計州縣衙門獄户垣墉卑隘監守人卒寡少易于反獄而按察司在省城之中狴犴牢固可以防禦今欲覬免已之罪而不顧貽地方之禍是何心哉合候命下移咨都察院通行天下今後凡係死罪重囚俱解按察司監錮不許寄監府縣如係應禁按察司罪囚而移監府州縣反獄者罪坐按察司掌印及該道分巡官如係應决罪囚不决而淹禁反獄者罪坐夲年巡按御史著為定例則反獄之禍可弭而地方不致有他變矣舉贈諡以勸忠丘濬臣按先正有言國家所以馭臣下者不過禍福榮辱而巳為善者生享其福死受其榮不善者生遇其禍死䝉其辱天下雖欲不治安不可得也如有不令之臣生則盜其祿位死則盜其榮名善者不知所勸惡者不知所懼臧否顛倒不可復振其為害可勝道哉臣惟生者之禍福出于一時䝉蔽衆論之不公人衆者勝天固可僥幸而茍免然而事久則論定天定則勝人至于蓋棺事則定矣然猶以偏愛之心持不公之論以愚而為賢當辱而反榮是終無天道矣是以三代明王立為諡法以為死後榮辱之典善者豫之以美諡惡者豫之以惡諡孟子所謂孝子慈孫百世不能改而世之昏君僻臣乃以一已之私而掩天下之公非惟得罪于世教而實得罪于天帝也三代以前君之諡則請命于天臣之諡則請命于君天不言而人代之言人代天言而反天之道天必殛之君不足定而俾臣代之臣承君命而負君之托逆天之理違國之法雖一時逭于人刑其如天道何唐宋議諡掌于太常博士凡于法應得諡者考其行狀撰定諡文移文吏部考功郎中覆定之本朝雖設太常博士而不掌諡議洪武初惟武臣有諡至永樂中文臣始得諡蓋自姚廣孝胡廣始也自後文臣亦多有之然我朝之諡皆出恩賜然臣竊以為九重之上于臣下之賢否未易盡知請自今以後有應得諡者未賜之先先下攸司俾其考訂以聞然後從中賜下如此則得之者以為榮不當得者不因其親故之囑託其當得者不為朋黨之掩蔽國家激勵臣子之大端有在于是其為世教之助夫豈細哉論諡法張志淳周制諡而王秦廢諡而亡此不待辨說而見然自漢以下周之制雖存而畢盡其義者亦鮮矣我髙皇帝跡行定諡至謂不容私諸子而諡以荒成周制諡之義于斯為盡文皇帝表章性理以諡法係諸治道且厯載宋儒之論殆以是夫然以今考之古之用諡美惡並也近專美而無惡豈人皆賢而惡諡無所于加抑亦惡不復諡而諡者得以掠美也竊惑之往居京師得古諡及蘇氏所言與我朝文武大臣之諡因録以歸而惡者亦未之見竊意周公以賞罰惟一時而欲久以美惡之諡其用殆要于命討其公殆不容于私諸君父固不第有美而無惡也或乃謂豫曰豈惟兹哉先年大臣諡文者以行不以官近惟官翰林者諡文而餘多寢不知此亦周公之法否也豫未及對則又曰晉唐以下博士行不應諡者可復乎吾益無以對則撫卷而識其說侍御張君鳳舉見而閲之謂可并刻以質諸天下之士遂不敢避易其說意或居廟堂而思用周公之道者之所欲觀也正學類編題災異事臣等竊惟聖上嗣守祖宗大業十有三年夙夜憂勤圗惟治理天下之人無不感仰聖德視前代嗣統之君逺過萬萬是宜天道協和雨暘時若休徵畢應而妖孽不作也夫何近年以來災變實多去嵗宫門大災秋大雨水一冬無雪今春嚴寒河氷重結郊祀之祭大風怒號二月朔望日月連蝕南京地震陕西天鳴即日又有妖物害人之異此皆隂盛陽微非常之變也夫天道不逺感召在人觀此則今日人事之不修德政之有虧軍民之怨困莫伸國家之事變叵測不卜可知此誠皇上側身修行之時所宜深省逺慮以安宗社為念增修德政講求得失踈逺私昵節省冗費以回天意可也臣等又惟應天以實不以文事神以誠不以僞祖宗創為郊祀之禮每年一次舉行極為慎重邇者傳聞皇上推廣敬天之心又于宫北建祠奉祀玉皇取郊祀所用祭服祭器樂舞之具依式製造并新編樂章命內臣習之欲于道家神降之日舉行祀禮臣等竊詳皇上為此非有他故無非上為母后祝釐下為生民祈福用圗保安宗社于萬萬年之久聖心誠敬人所共知但稽之于古未為合禮昔傅說之告髙宗曰瀆于祭祀時謂弗欽禮煩則亂事神則難釋之者曰祭不欲瀆瀆則不敬禮不欲煩煩則擾亂皆非所以交神明之道也况天者至尊無對尤非其他神明可比事之之禮宜簡而不宜繁可敬而不可瀆今乃别立玊皇之祠并用南郊禮樂則是相去一月之間連行三祭未免人心懈怠誠意不專且郊祀所用執事并樂舞生皆神樂觀道士為之其離俗出塵清心寡欲但係刑喪疾病之人一切不預祖宗制禮蓋有深意存焉皇上為天之子其于事天之禮豈可不斟酌典故而致有纎毫之不謹乎臣等伏望聖明將前項神祠停罷神像送宫觀侍奉祭服祭器樂舞之具送太常寺收貯凡內庭一應齊醮之事悉行停止今後聖節等項修齊悉照舊例施行勿為䙝瀆庶幾天心照鑒可以變災而為祥轉禍而為福宗社萬萬年無疆之慶端在于此臣等無任區區犬馬圗報之至謹昧死具題以聞伏候𠡠㫖奏止齊醮進香疏張寧臣聞釋道之教邃古所無下至漢唐其法寖盛然三代君王夀考世運靈長後世衰亂相仍年祚少永佛老無補視昔可知夫父子君臣夫婦兄弟朋友長幼人之大倫自古體國立法修政建事無非為此五者而為之經理防範耳五者順序百慶以寧是以聖人之道始于有為而終于無為彼佛老之法不足以有為而強于無為遂欲去君臣廢夫婦一切歸諸虛無寂滅假使其教盡行則婚姻既無生育頓絶不過百年人類盡矣雖有事物將誰用之厯代英君誼辟有見于此非不欲深惡而痛革之特以其頗能以禍福輪回之空談警動于人可以化導愚昧姑將存之以為治化之外一術耳豈真謂其能扶世立教延永國步而為之崇奉也恭惟皇上曩在清宫繼登大寶夙精儒學日御經筵于凡治亂之由正邪之辨洞明深識允蹈躬行當即位之初詔天下寺觀不許藏匿無度牒僧道等項尋奉睿㫖不許增修寺觀乞請額名上書言事者又每以濫度呌化不便為詞多被奬納傳之將來固當永逺無弊矣邇者恭遇皇太后誕日令僧道建設齊醮此見皇上將欲表揚孝道慰悅聖慈無所不用其極之心也諸大臣及百職事但當和𠂻助德仰贊至情上綏懿祉則心誠道德允合舊章而禮部尚書姚䕫等乃于各衙門斂㑹財物收辦炷香約以至期赴壇行禮為儒者自共其守業彼者烏知其非臣雖至愚為此深惜切惟人臣之于君願其福也則當勸以修德善願其夀也則當勸以去逸欲願天心之向順也則當相之以和保小民康濟四海故曰求福不回天夀平格又曰欲王以小民受天永命未聞有以禱祠得福丹藥致夀假符瑞以永天命者今乃不能盡所當為徒以辦香尺楮列名其上宣揚于佛老之神相率而拜曰為朝廷祈福祝夀天地鬼神山川河嶽昭布森列可厚誣如是哉昔孔子之于異端孟子之于楊墨韓愈歐陽修諸儒之于佛老為其惑世誣民充塞仁義故詞而闢之論而排之今若此其流不止于惑與誣矣通朝之人靡然相從仁義不止于充塞矣學聖賢之學者既不能闢而排之又不能以正自處天下後世謂之何哉伏惟英宗睿皇帝當復位之初國事多虞屬有足疾其時一二大臣所見不逺不察古人行禱之意故嘗舉行此事蓋一時臣子迫切至情事不得巳然非祖宗之舊典先帝之夲心也因循至今實意不存尚沿故習夫臣之于君猶子之于父一指一髮皆其長養一飲一食皆其賜豫若能以齊醮助國雖殺身亦所不辭豈敢自以儒者門户為此倔強與彼相較量哉但以無益事情徒傷大體其于經筵聖學不無略有所干其于進講儒臣亦恐難以身勸伏望皇上法古昔聖賢正常道之心監大學衍義明道術之語乞𠡠禮部及文武衙門今後凡遇慶賀日期等項不許擅備炷香于寺觀行禮庶可以扶名教振士風全一代之治體而與三代之時並隆矣臣等待罪言官不敢緘默誠惶誠懼謹題以聞方洲集題停齊醮疏臣某等謹題為慎選左右速停齊醮以光聖德事竊惟人君一身天下根夲欲令出入起居事事盡善惟左右前後皆用正人日聞正言日行正道則奸佞之徒不須斥逐自然逺去異端邪妄之說何從而生臣等先于正德十六年四月初間巳嘗具啓請于昭聖慈夀皇太后乞命司禮監官將尚冠尚衣四執事及膳房茶房殿內答應掌宫侍衛牌子等項人員逐一預選老成厚重慎密小心之人以待陛下任使其曽經先朝隨侍壞事人員不許濫與即䝉懿㫖施行暨陛下登極之初臣等又嘗極言異端邪說瀆經亂倫傷風敗俗亟宜痛絶又條奏慎始修德十二事寫成牌扁懸置殿壁其一事謂齊醮禳禱必須豫絶其端不可輕信不意近來無故不時修設齊醮恩寵賞賫過于尋常逺近傳聞莫不驚駭推求其故皆因先年壞事之徒各名下掌家管家等項人員計引畨漢僧道人等巧言誑惑以致陛下不察誤䝉信用各該名下人員從來壞事非止一端至于今日猶以齊醮一事試探聖心夫齊醮之事乃異端邪說誑惑時俗假此名目以為衣食之計佛家三寶道家三清名雖不同其實同一虛誕誣罔聖王之所必禁在昔梁武帝宋徽宗崇信尊奉無所不至一則餓死臺城一則纍繫金國廟社丘墟生靈塗炭求福未得反以召禍史冊所載其跡甚明若使二君當時左右隨侍皆得正人何至受禍如此哉二君且未暇詳論只如近日劉瑾建𤣥明宫錢寧建石經山祠張雄建大慧寺張鋭建夀昌寺于經建碧雲寺張忠建隆恩宫所費金銀不可勝計其心本欲求福也然皆身被誅竄家底敗亡略不䝉佛與天尊之庇佑由此觀之則不足信也明矣夫何讒邪小人公肆眩惑不遵祖宗法度不畏天下議論至使宫闈之內修建齊醮屈萬乘之尊親􅊩壇場上惑宸聰下誑愚俗以為福田可種利益可求災患可除祥瑞可致不知年來逺近亢旱風霾變災彼何不誦一經念一呪以消弭之乎南北直𨽻山東河南流賊往來焚劫殺戮彼何不驅神兵役鬼將以掃平之乎陛下試以此驅之則其無益有損不待辨矣况陛下親􅊩壇場行香拜籙亦甚勞矣何不移之以御講筵修設齊醮糜費財糧亦甚多矣何不移之賙窮困正道異端不容並立心既係于彼則必不係于此邪說既入則聖賢之經訓自踈播之天下傳之後世其為陛下聖德之纍不小非止虧損聖治耗蠧民財而巳臣等職在輔導培養君德分所當然第以積誠未至言雖諄諄未䝉嘉納今不得巳形之章奏揚言于廷以為不如是則不足以聳動天聽故不避干犯率爾上塵伏望聖明亟納臣等所言特命司禮監官將前項有名蠱惑誘引人貟逐一查出先將首惡從重䆒治其餘夤緣阿附者盡數斥逐不使仍前隨侍再命禮部查訪在內在外寺觀同惡相濟表裡售奸僧道一體治罪又命光祿寺備查近來每次齊醮取用過米麵蔬果等數又命內庫查報各該人員賞過襯施銀兩等物各開數目進呈䆒問追奪以杜冒濫更乞大施乾斷于凡無益齊醮一切停免惟日以敬天法祖修德保身為先務則聖治益隆聖夀自延聖德愈光所以綿國祚于千萬年而無疆者端有在是矣臣等不勝忠懇仰望之至謹題請㫖題照例查處給度事倪嶽祠祭清吏司案呈卷查𢎞治元年閏正月內該都察院左都御史馬文升題為振肅風紀禆益治道事奉聖㫖這本所言多切時弊該衙門便看了來說欽此欽遵內一件清僧道以杜遊食竊惟我朝定制每府僧道各不過四十名每州不過三十名每縣不過二十名今天下一百四十七府二百七十七州一千一百四十五縣共該額設三萬七千九十名成化十二年度僧一十萬成化二十二年度僧二十萬以前各年所度僧道不下二十萬共計五十餘萬以一僧一道一年食米六石論之共該米三百六十萬餘可勾京師一年嵗用之數况有不耕而食不蠶而衣且又不當本等差役可謂食之衆而為之不舒矣其軍民壯丁私自披剃而隱于寺觀者不知其幾何民食不足府藏之空職此之由若不通查僧道之數以示再度之禁則遊食之徒何有紀極如䝉乞勑禮部通查天下并在京寺觀共若干處僧道共若干名如果數多既巳關有度牒難以追奪明白具奏不許額外再度僧道直至額數不足之時方許各該有司具結照數起送關給度牒敢有無故再言度僧許六科十三道官紏劾拏問等因前件本部查得永樂十六年十一月二十七日節該欽奉太宗皇帝聖㫖今後為僧道的府不過四十名州不過三十名縣不過二十名額外不許濫收欽此欽遵續于天順二年五月十五日節該欽奉英宗皇帝聖㫖今後有願為僧者務從有司取勘户內三丁以上年十五以下方許出家如額外有缺許照正統十四年榜例保送赴部考通經典然後給與度牒仍定與則例每十年一次開度許照缺依期來關敢有故違悉發邉衛充軍欽此欽遵又查得成化二年給度過僧道一十三萬二千二百餘名成化十二年一萬三千三百餘名成化二十二年二十二萬四千五百餘名為因十年一度兼且各處納銀賑濟等項多有不查額數不由有司保送一概請給以此額外增添數將十倍是以軍民之籍日削異端之徒日盛侵奪民食耗費民財其為治道之蠧莫比為甚誠有如都御史馬文升所言者合無准其所奏行移兩京僧道録司并各布政司直𨽻府州縣各邉衛有寺觀去處通查給度過僧道共若干備造文冊送部存照以後各年有為事病故等項追繳度牒者照名開除仍將十年一度之例暫乞停止待後各處額數不足之日方許所在官司照依額外名缺起送赴部考中給與度牒再不許內外衙門指以救荒為由奏請給度庶不虧損國體僧道官亦不敢貪圗僥幸敢有故違許科道官紏劾拿問等因具題節該奉聖㫖准議欽此已經欽遵通行去後到今數年之間各處文冊少見繳到誠恐無知小人止以十年一度為期不知已有前項禁例以致各處僧道行童互相誘扇輒便預先來京潜住各寺宫觀投禮僧道官住持以圗至期可以夤緣請給一時不免蠶食京師將來米價日漸湧貴未必不由于此查得十二年節有奏准預期出榜禁約僧道不許來京搔擾事例理合早為照例查處案呈到部看得天下各處地方災傷數多民不聊生盜賊竊發劫財殺人在在有之中間獲到賊徒多有僧人在內皆因先年給度泛濫所致及查先該錦衣衛指揮朱驥等奏稱奉𠡠巡捕盜賊今為盜之人多係各處無籍僧徒晝則沿街乞食夜則相聚劫掠得贓即分各行逺遁雖有巡捕人貟無從追捕等因奏行都察院出榜禁約此為明驗况天下僧道額數不過三萬有餘而成化年間所度已該三十五萬有餘此非天地别生一種之人不過出于軍民匠籍之家即今天下有司工役衙門軍多缺伍匠多缺役里甲籍冊日見凋耗皆因此等之徒躲重投輕捨此入彼若不早為限量將恐天下之人皆流而為僧道之歸其為貽患不可勝言合無本部查照先次奏准事理及纍朝奉有欽依事例通行天下司府州縣掌印官督屬查勘原先給度過僧道數目見在若干事故等項若干比與欽定額數有無多少務照先次奏准事理造冊繳保除額尚多去處外果有額數不足去處許待豐年有收之日徑自具奏本部查照成化十二年奏准給度事例另行奏請定奪施行仍要通行禁約各處寺觀僧道行童不許指以請給為由預先來京攪擾各該關津把截嚴加盤詰阻當仍行錦衣衛五城巡視監察御史嚴督各兵馬司僧道録司逐一挨查各處寺觀不許容留在外僧道行童在內潜住取具住持人員不敢扶同容隱結狀繳報違者坐贓問罪無度牒之人發回原籍當差京城內外官員軍民之家亦不許容留僧俗混雜有壞風俗事發一體究治其有內外衙門及僧道人員或假救荒等項為由妄行奏擾者仍聼科道指實參劾問罪緣係照例查處給度事理未敢擅便𢎞治七年六月初二日題次日奉聖㫖是欽此名臣經濟録卷三十
