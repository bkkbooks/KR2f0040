body:
  text: 名臣經濟録卷二十三明黃訓編户部鹽法茶法鹽法對録𢎞治李東陽𢎞治十八年四月初七日臣東陽病起已踰月上召至暖閣袖出數本指一本云太常寺欠行户錢鈔昨有旨查洪武等年緣何市不通使户部查覆未明仍須别為處置務使通行臣健等皆對曰此須自朝廷行起如賞賜折俸之類在下如鹽鈔船鈔亦用舊錢乃可通行且民間私鑄低錢聽其行用本朝通寶乃不得行誠非道理臣遷對曰昨令查正欲通行但私錢不禁則官錢決不能行前年鑄𢎞治錢曽禁私錢不二三日即濫使如故上曰何故如此皆對曰只是有司奉行不至上曰今須嚴禁臣東陽奏曰臣等訪得今所鑄錢徒費工料得不償失亦是有司不肯盡心若止如此雖鑄何益臣遷曰昨令查已未鑄造數目亦是此意上曰然臣健等因奏曰今國帑不充府縣無蓄邊儲空乏行價不償正公私困竭之時鑄錢一事最為緊要其餘若屯田茶馬皆理財之事不可不講也臣東陽因奏曰鹽法尤重今已壞盡各開中徒有其名商人無利皆不肯上納矣上問商人何故不肯上納臣健等因極論奏討之弊上曰奏討亦只是幾家臣東陽奏曰奏討之中有夾帶奏討一分則夾帶十分商人無利正坐此等弊耳上曰夾帶之弊亦誠有之臣健等又言王府奏討亦壞鹽法每府祿米自有萬石又奏討莊田稅課朝廷每念親親輒從所請常額有限不可不節上曰王府所奏近多不與皆對曰誠如聖諭但乞今後更不輕與則不敢奏矣臣健因奏曰臣聞國初茶馬法初行有歐陽駙馬者販私茶數百斤太祖皇帝曰我才行一法乃首壞之遂置極典髙皇后亦不敢勸止此等故事人皆不敢言上曰非不敢言乃不肯言耳因言鹽法須整理臣遷等贊曰請下户部查議上曰然明日降旨云祖宗設立鹽法以濟緊急邊儲係國家要務近來廢弛殆盡商賈不行各邊開中雖多全無實用户部便通查舊制及今各項弊端明白計議停當來説於是中外稱慶知上意勵精思治如此是日天顔甚霽問答詳悉藹然家人父子之風誠前古所罕見也織造鹽對録正德李東陽𢎞治十八年八月闕日講畢出至文華門上遣司禮監官召臣健等復至暖閣問曰昨差承運庫太監王瓉崔果往南京浙江織造瓉等奏討長蘆鹽一萬二千引户部止與六千引半與價銀今可全與臣健等同奏曰與鹽六千引又與半價巳自足用上曰既與半價何不全與鹽引臣健等答曰户部亦是撙節用度耳上曰該部既要節用何不留此一半價却將鹽引與之聽其變賣豈不兩便臣健等對曰價銀有限不若鹽引之費為多上曰何故臣東陽對曰鹽引有夾帶且如有引一紙便夾帶數十引以此私鹽壅滯官鹽不行先帝臨終鋭意整理鹽法正是今日急務不可不為逺慮上曰若有夾帶事發朝廷自有正法處治他臣東陽對曰此輩若明得旨便於船上張揭黃旗書寫欽賜皇鹽字樣勢熖烜赫州縣驛遞官吏稍稍答應不到便行捆打只得隱忍承受鹽商竈户雖喫虧到底誰敢聲説所以不若禁之於始臣健等亦共言之上正色曰天下事豈只是幾箇內官壞了譬如十箇人也只有三四箇好人便有六七箇壞事底人先生輩亦自知道如是者再言之蓋是時已有先入之説矣上復謂此事務要全行臣健等奏曰容臣等再去計較因叩頭出殿中司禮監官追達聖意亦答云己奏過再去計較監官遂回奏云先生輩已承行矣臣健等至閣復具揭帖力爭請止從前眀日內批出止與鹽六千引如户部議云鹽法議王瓊一曰重邊餉諸司職掌有云凡遇開中鹽糧務量彼處米價貴賤及道路遠近險易例具奏出榜召商中納成憲昭布不可變也天順以前惟户部召商納糧草於邊耳成化中始有各運司納銀之例𢎞治元年校尉胡慶請如舊例議未及行厥後開賣滋甚類解銀貯之大倉銀庫雖曰備邊糴而多方之費實繁夫邊餉不預蓄於平時必俟空乏而後圖之雖富有銀貨將焉用此取目前之近功忘久遠之大計遂使商人廢沿邊糴買之規守運司納銀之例及塞下有警召納米榖而商人觀望多不赴中縱有至者所入亦甚微矣𢎞治十四年巡鹽御史馮允中亦嘗建議然言之未久旋復廢革何舊制壞之易而復之難如此耶或者謂以運司開中之銀解邊偹糴亦無不可殊不知官自和糴不若通商轉買事不勞而利亦廣乞申明定制示以永久或遇各邊寧謐再熟之後商人趨中者自有成效此整理鹽法之大要也其雲南四川等處鹽課不多就於彼邊量準折納不拘兩準之例如此則邊餉有偹寇患無虞矣二曰定勘合據洪武中時茶鹽引田契本銅板一百一十片俱南京户科收貯每遇開中南京户部印刷勘合發各邊填寫商人姓名并所中米豆鹽引數目俱用印蓋不許洗改每勘合一張或填寫一萬引或三五千引不拘定數編置底簿并流通文簿發運司候商人賫到勘合比對字號相同𣲖場支鹽及刷印引目運司關領給付商人照鹽發賣永樂中遷都北京鹽法庶務俱行在户部掌行惟鹽糧勘合引目銅板仍於南部收貯及勘合底簿流通文簿亦南部編置轉發正統六年鑄換印信始定行在户部曰户部改户部為南京户部而鹽引勘合文簿仍掌於南京正統七年户部因無繳到中過鹽糧勘合數目慮諸商將勘合增添洗改無可稽憑請於年終各邊收過糧數填給過勘合字號各運司將客商賫到勘合字號納過鹽糧數目各造册繳部比對查考又因造册難憑正德十二年户部又奏令南京編造勘合底簿完備送北京户部抄謄字號轉發各邊後以往返之勞仍令南京户部徑自編發臣到淮日稽驗南京所發勘合底簿有至五十餘歲而報中未完者課積于場豈無淹沒之虞又况客商投下勘合其所收糧數有用布政司都司及衛印鈐蓋者有洗改字樣不用印蓋者有雖有印蓋印色脫落不明者有開寫中過斗頭價值倉口明白者有止混開銀錢米豆總數不明者諸弊種之豈非鹽法之大蠧哉乞令鑄造鹽糧勘合銅板一片除南京二字送户部收貯如遇奏開鹽糧户部差官以人匠赴科印刷每鹽五十引印刷號紙一張回部轉發開中去處或布政司或都司衛分有印信衙門收掌每號紙一張填寫鹽三五千引或七八千引或萬餘引不必拘定一萬引之數所填商名貫址并米豆鹽引數目俱用印鈐蓋印色如法製造毋致脫落因而洗改字樣如有填剩號紙年終繳送户部塗銷仍置內外號半印勘合底簿二扇內號一扇户部收掌外號一扇發運司收掌商人赴邊納獲勘合投到運司比對外號運司𣲖鹽完畢將勘合類繳户部比對內號又與各邊歲報錢糧文册磨對有無相同然後注銷又每年置流通文簿一扇用印鈐蓋發各運司收掌挨次附寫商人姓名鹽數以憑年終照𣲖各開前件𣲖鹽下場記𣲖訖二字支鹽出場記支訖二字若年終𣲖場遇有事故明年終不支出者收原𣲖鹽課改𣲖别場免致積滯仍乞就各司員外主事改注一員或改員外郎職銜專掌鹽法册籍計鹽課髙下追理通關完欠考究各邊虛實斟酌開中多寡并比對勘合查革姦弊其有暇日不妨原委兼管如此則鹽課肅清邊儲無弊矣兩淮鹽法議霍韜切謂立法須公而溥行法須嚴而密然又善適變通之權乃可久而無弊唐劉晏只用淮鹽遂濟國用臣今姑議淮鹽利弊即天下可推也國初以兩淮鹵地授民煎鹽歲收課鹽有差亦猶授民以田而收其賦也淮鹽課條例云凡各竈丁除正額鹽外將煎到餘鹽夾帶出場及私鹽貨賣者絞然則耕民納賦租外將餘粟貨賣者絞可乎此法良有深意而後人失之也淮鹽原額歲辦三十五萬引有竒後改辦小引七十萬有竒然兩淮鹽貨除正額外猶産餘鹽三百萬引有竒今正額已不得多取餘鹽復不得私賣即三百萬餘鹽安所消遣乎兩淮行鹽地方南盡湖廣西抵河南東盡東海地方數千里民億萬家所仰食鹽只七十萬引饔餐安所取足乎是無怪乎私鹽橫溢而鹽價貴湧也國初竈丁辦鹽每引四百斤給工本鈔二貫五百文蓋洪武年間鈔一貫直錢千文故竈丁得實利如是而冒禁賣私鹽可絞死也今鈔一貫不易粟二升乃禁絶竈丁勿賣私鹽是逼之飢以死也此後來行法之弊非初年之失也正統二年令曰貧難竈丁除正額鹽照舊收納其餘鹽收貯本場每二百斤官給米麥二斗十三年令曰每餘鹽二百斤給與米一石若餘鹽二百斤竈丁實得米一石乃私賣鹽即絞死可也蓋當時此令雖出而米實無措故官司徒挾此令以征取餘鹽實不能行此令給民米麥且貧弱竈丁朝有餘鹽夕望米麥米麥不得則先從冨室稱貸然後出息加倍償鹽者有矣故鹽禁愈嚴則貧竈愈多此之由也貧民賣私鹽人即捕獲冨室賣私鹽官亦容隱故貧竈餘鹽必藉冨室乃得私賣冨室豪民挾海負險多招貧民廣占鹵地煎鹽私賣冨敵王侯故鹽禁愈嚴冨室愈橫此之由也且法愈嚴則利愈大頑民見利而不見法淮安頑民數千萬家荒棄農畝專販私鹽挾兵負弩官司不敢追問近年恃衆往來為劫此隙不彌必貽大患不止阻壞鹽法而已然既不能講求古法以處置餘鹽復不能變通鈔法以補給工本則貧民何所仰賴而不為變故鹽禁愈嚴而盜賊愈多此之由也此鹽場竈户之利弊也洪武年間招商中鹽每引納銀八分官之征至薄商之獲至厚故鹽價平賤民亦受賜永樂年間每鹽一引輸邊粟二斗五升商稅雖加邊糧仰足民亦受賜自永樂以前淮鹽開中歲無定額永樂以後歲定七十二萬引復定七分常股三分存積夫曰常股猶常行也商人先納邊糧乃給引目守場候支常年鹽也有守數十年老死而不得支者今兄弟妻子代支之令可考也曰存積者積鹽在場遇邊糧急闕乃倍價開中越次放支之鹽也此居貨罔利非王法正體成化以後準納折色每鹽一引準納銀三錢五分或四錢二分又令云客商若無見鹽許本場買補夫曰本場買補即開餘鹽私賣之禁矣故姦商借官引以影私鹽然商人竈户得贏利州縣民士亦食賤鹽惟私鹽愈行則官鹽愈壅而法遂大壞今兩浙鹽課許納折色之令可考也𢎞治正德年間或姦權奏討或勳戚恩賜皆給引目自買餘鹽故法雖大壞而鹽亦平賤復有各年開中未盡鹽名曰零鹽稱掣餘鹽堆積在所名曰所鹽皆權要報中借影私鹽以壅正額故正德以前鹽價雖平而課日損自御史秦鉞奏革所鹽稱掣餘鹽每二百斤作一小引稅銀一兩則取之過重自御史戴金奏減鹽價每鹽一引納銀八錢庶幾適中今之議者復論鹽包過大皆不知本末之見也蓋洪武年間鹽一引納銀八分而已永樂年間納粟二斗五升而已今則每引納銀七錢五分矣權勢賣窩復取利銀二錢矣復以長蘆兩浙兼答配支夫商人一身三路支鹽勞費殆不資矣計淮鹽一引蓋用銀二兩有竒矣商人轉販復以市利則鹽價益以湧貴乃其所也夫正鹽湧貴則私鹽盛行私鹽愈行則正鹽愈滯亦乃其所也此商人中納利弊也今欲復洪武之法則有上䇿欲救今日之急則有中䇿區區修補近年弊利則己無䇿何謂上䇿須變通鈔法鈔法重則錢法均而鹽法行矣今若立法使鈔一貫值錢千文竈丁得為實利則額鹽一大引給工本鈔二貫五百文餘鹽一小引亦給工本鈔二貫五百文各場餘鹽盡屬之官私挾私賣即處絞勿贖則兩淮正鹽七十萬引餘鹽三百萬引舉可招商開中或如永樂時例一引輸邊粟二斗五升可也或如成化時例一引折銀四錢亦可也若國課充足如洪武時例一引納銀八分藏冨於民尤可也蓋私鹽行由正課重也正課輕私鹽不禁自止矣私鹽塞正課流邊儲自實矣故曰上䇿何謂中䇿須更為令曰凡各商人中正額鹽一百引許帶中餘鹽三百引正鹽納邊糧二斗五升餘鹽納邊糧二斗聽與竈户價買又嚴為令曰客商借官引影私鹽竈户不辨驗官引輒賣餘鹽者各照私鹽律絞勿贖又嚴為令曰正鹽一引只二百五斤餘鹽一引亦二百五斤革近年大包之弊革近年勸借米麥之弊革鹽場積年轄害客商之弊三邊選亷而有才者一人為提督都御史兼三邊勸農使遇鹽商納糧即與收受糧賤許納本色糧貴許納折色俾商無久淹凡積年所以為商人害阻壞鹽法者悉與革絶復選廉而有才者一人為漕運都御史兼理鹽法俾自舉用運使提舉等官凡商人納完糧料即與支鹽勿得久淹凡積年為商人害阻壞鹽法即與革絶漕運都御史與提督都御史鹽課邊儲互相關通盈縮交與接濟利病均為休戚邊方腹裡共為一心兩都御史如左右手然後足以集事行之數年即邊儲可足乃以餘積召募遊民開墾邊地勸課農畝邊地愈闢百年之利也故曰中䇿何謂無䇿洪武初給竈丁鹵地復給草蕩所以利竈户者甚厚額鹽一引給工本鈔二貫五百文復免竈丁雜差所以資竈丁者甚厚歲課七十萬引所以取之者甚薄惟餘鹽不許私賣有餘即給官鈔收之下以資竈户上以總利權而均其施天下食賤鹽之利竈户無餘鹽之滯其法極善自鈔法不行則官司無術以處餘鹽矣乃曰挾餘鹽者絞販私鹽者絞可行乎行之而嚴即竈丁空腹以死不然即為變行之而寬即三百萬餘鹽之利盡入姦人囊槖矣法之弊而窮者一也竈丁窮矣轉而逃逋乃區區招復千日握其喉一朝與之食可聊生乎故撫賑徒勤逋逃益甚法之弊而窮者二也招商中鹽一引銀四錢已重矣今復加而七錢尤重矣買窩賣窩刻取二錢邊上科罰或三四錢勸借米麥亦復二錢不知幾倍重矣稅愈重則利愈大姦人避重稅而趨大利避重稅則正課壅趨大利則私鹽行私鹽愈溢正課愈壅雖絞刑治之不可禁遏况有贖刑之令有獲鹽不獲人不問獲人不獲鹽不問之令蓋開寬路示之趣矣則私鹽如何不益溢正課如何不益壅也法之弊而窮者三也私鹽盛行矣官兵捕獲迄無寧日頑民挾刃率而旅拒在揚子江及各海港者髙檣大舶千百為聚行則烏飛止則狼踞殺人劫人不可禁禦官兵敢逺望而不敢近語在兩淮通泰寶應州縣民厭農田惟射鹽利故十場之民十五以上俱習武勇氣復頑狠死刑不忌前年流劫幾致大變故淮安官軍不惟不捕私鹽且受餌利而為之護送出境矣山東官軍不惟不捕私鹽反向鹽徒丐鹽充食矣鹽徒千百白日挾刃徑行州邑官兵不敢誰何矣州縣不敢言科道不肯言陛下髙拱焉得知之抑亦諉曰事弊已極無可奈何再及數年則官兵之追捕日嚴鹽徒之旅拒日鋭拒捕之迹日著則罪惡之狀日深官司列罪狀以請法愚民罹罪罟乃逃生出不獲已激生他變將誅夷之則情可哀恤將緩縱之則頑獷愈甚禍釁所極遂有不可言者矣法之弊而窮者四也故曰無䇿臣嘗竊曰治鹽利猶治河患也治鹽利不究弊源惟末流之防猶治河患不從雍冀孟津懷衛引為陂堰鑿為溝洫以廣其利而分其勢乃從徐沛下流浚其淤土厚其隄防則愈浚愈淤愈築愈潰亦勢也自正統以後講治鹽法事例叢瑣無益鹽利祗足驅民為盜而已故今欲興淮鹽之利須選淮安漕運及三邊提督都御史講求其法而責以底績選人得失委託專暫成效虛實尤冝責之吏部期之數年鹽利不興邊儲不實邊民不蕃邊地不闢不收久大之效而坐致治安則兩都御史吏部尚書侍郎誅罰連坐然後任人者不敢茍且任於人者不敢怠玩而政有實效矣此兩淮利弊也舉兩淮即天下可知也題鹽法議梁材案查先為乞集羣議大修鹽政以實邊儲事該四川道監察御史周相題稱洪武年間每引輸粟二斗五升官征薄而商利厚鹽價平而邊用足自兹以後歲定七十二萬引七分常股挨次照支三分存積越次給與成化以後準納折色每引納銀三錢五分至正德年間漸至四錢五分今雖題準淮鹽六錢但近年以來有等姦商投托勢要則有占中賣窩之弊鹽商上納則有經紀包攬侵漁之弊管糧衙門則有例外勸借私增斗頭多收火耗之弊及搬運糧草則有各場官攢取索常例刁蹬留難之弊糧草既納則又苦於守候查盤勘合難得之弊且長蘆兩淮兼搭配支勢所不及又有他商要求賤引之弊必得撫臣大整邊方責其實效一則清理屯田之廢一則禁革報中之弊屯田廣則糧漸充商人易於上納而不艱宿弊革則飛挽簡便商人樂於趨利而不困又思邊儲蓄聚以漸而成運司鹽課以時而掣合無定立年限如嘉靖十年以前報過引目姑且照舊稱掣但不為常例勿令縱打大包以後各邊巡撫并管糧等官務以屯種為事清弊為先使商人有利無害推挽永便而夾帶之風自息獲利既厚而騰踴之價自平則餘鹽之利可無賴矣等因又為計處鹽課以裕國儲事該户科都給事中蔡經題稱國家開設鹽課本以足邊然昔行今阻儲蓄不充議者以為咎在餘鹽納價以致開中無商但鹽法之壞不特餘鹽一事昔年士卒衆多屯田不擾屯種有收米榖價賤時或上納開中無難邇者士卒多疲屯田不舉邊方米榖無所於出價值騰踴糴買甚艱加以科罰太重查勘遲延兩淮鹽價增至六錢而答配長蘆又難支給至於餘鹽納價雖非舊章而因時區畫以利國家亦終有不可廢者合無今後將派去淮鹽照原價俱令上納本色其搭配長蘆山東鹽惟令折銀上納如遇年豐願輸本色則照依時估聽從其便乃若稱掣餘鹽立為程限其數雖多無過正引中有商若無資或時難收買不願附帶者則竟將正鹽稱掣不必抑勒取盈仍將餘鹽價值查照先年巡鹽御史戴金奏準事例量為輕減酌為中制若欲盡革餘鹽惟開正課然此自今伊始責之撫按官員盡復屯田之額大收屯種之利數年之後庶可議行等因該本部等衙門會議得洪武年間每鹽一引納銀八分永樂年間每引輸米二斗五升成化年間準納折色每引納銀三錢五分近年以來浙鹽增至四錢淮鹽增至六錢商人病矣昔年邊方屯田不失原額歲豐收成商人樂於上納今屯政廢弛纍歲災歉商人告困應合量處餘鹽查照近年事例每鹽二百斤淮南納銀八錢淮北納銀六錢即以官價之數定為平市之法仍要嚴禁各商勿令縱打大包餘鹽數多無過正引斤數間有商若無資或時難收買不願附帶者聽從其便其所入餘鹽隨時盈縮不必拘定一例不許法外抑勒及於未稱掣未發賣之先亦不許迫令稱貸預納以足百萬兩之數多者多解少者少收多不為功少不為嫌淮浙正鹽正價太重亦合斟酌先今而為之中制淮鹽每引減去一錢浙鹽每引減去五分至於甘肅地方孤逺比之各邊尤甚合將甘肅淮鹽量減一錢五分浙鹽量減一錢本鎮止開浙淮二鹽不必搭配别處邊鎮亦免搭配商自樂趨其長蘆鹽價原定二錢山東鹽價原定一錢五分似難增減仍令照舊配支夫餘課可無盈邊鹽價可減而輕也搭配之便亦可以折中而處也然此不過一時救弊之法耳邊方缺乏糧草商人艱於上納既不可全改折色以失祖宗開中召商圖省飛挽之意則法有時而窮若待屯政修舉必須數年之後又如都給事中蔡經所言者然廢而不舉可乎屯田之壞久矣墩堡不修武備廢弛夷人輕犯殘吾禾苗固有有可耕之田而不敢耕種者矣糧賞不時剝削不禁士卒疲憊家無耒鋤亦有有可耕之田而坐視拋荒者矣疆界不明册籍不清又有為官豪勢要乘機而侵欺占沒者矣今欲大加整頓為力甚難兼以邊方事情難同腹裡急之則生變緩之則長姦况有各邊災傷若復分命大臣整理未免煩擾故其要惟在於得人而事體重難其責尤在乎專任巡撫合無各另請勑一道伏乞天語令各邊巡撫官督同管糧官修舉屯政選委衛所亷幹官員專理其事備查先年近日事體斟酌區處提綱挈領詳條逐件著實舉行開墾荒蕪禁革勢占查理侵欺尤須修築屯堡遇有警備嚴謹烽堠量為防護毋致寇掠使得盡力農畝以底收成徴收糧草即其所致自可足邊管屯官員勤能者旌賞怠惰者罷黜至秋成十一月間各邊巡撫等官興舉屯田事冝如開過荒田若干清出勢占若干追出侵欺若干徴過糧草料豆麥黍等項各若干懲勸過官吏若干逐一具本奏聞仍勑本部查考通總分别等第上請以示勸戒夫以久廢之事而欲責效旦夕勢亦難行亦要酌量時勢舉行有漸期以二三年間務使屯政興修邊儲有備又何盡資引鹽之利哉夫鹽利屯田均為濟邊二者常相須而不可偏廢者也臣等今日之議減價而革勸罰量地而免搭配所以寬報邊之商使樂於趨納餘鹽正數下商免其附帶所以制餘鹽之濫使所入隨冝至於興舉屯政則又士卒衣食之本邊方儲蓄之源足食足兵皆有攸賴待正數引鹽之利而自有充實豐盈之效此時餘鹽之數方可徐議而盡革也等因題奉聖旨這鹽課屯田事冝你每既議擬停當都依擬行欽此又為議處邊儲事該户科都給事中管懷理等題稱國初之給邊也有屯田之歲入有鹽引之飛挽有近省供邊之稅是以歲有餘積邊儲冨厚而威振四夷今日屯田不興鹽法大壞乞要從長計議等因該部議擬合無備行都察院轉行兩淮并各處巡鹽御史會同巡撫都御史及督同運司等官拘集年老知因商人耆宿人等將都給事中管懷理所奏鹽法先查各運司有無餘鹽數目或數目多少明白要見餘鹽課銀就彼掣賣與盡行開邊商人有無樂從江南江北見定銀兩應否再行增減餘鹽銀兩徑解各邊運司是否便益若欲盡行開邊價值尤須勘處停當母使日後已行開邊復又阻滯致使臨時有誤邊儲卒難措手或倍開餘鹽其數幾倍或另給照引其引幾何餘銀既盡解邊或遇各衙門奏準支用作何抵捕餘鹽既稱有壞正課應否盡行裁革使官商兩便鹽課不虧而後已前項二事承委官員逐一勘處參酌揆度時冝務求合於人情宜於土俗不拘於目前而經久可行不惑於浮議而事體歸一等因題奉聖旨是欽此又為再議鹽法歸一衆論以圖經久事該都給事中管懷理等題稱必欲盡收餘鹽在官一以足軍儲一以息私販一以贍貧竈一以寬商困一舉而四利具焉但户部復本俱未及此等因該本部議擬合無比照節年事例會推剛正風力大臣一員前去兩淮并長蘆山東地方將都給事中管懷理先後奏詞逐一勘處要見餘鹽或盡開邊方或就彼解邊孰為有益或增添引目或另立照票孰為可行某運司餘鹽須增若干方可盡收某運司餘鹽須定若干價方為便商等因題奉聖旨這鹽法係足邊急務祖宗具有成法近年全被內外勢要官員通同姦商買窩賣窩以致阻壞流弊滋甚你部裡便行與各該巡鹽御史會同撫按官遵照成法查處清理務要興利除害禁革弊端使畫一可行文書到日限三月以裡回奏官不必差欽此又為議處邊儲事該總都漕運兼巡撫鳯陽等處地方都御史馬卿會同巡按直𨽻監察御史陳鎬題稱餘鹽裁革不如收買為利餘鹽官買不如商買為便餘鹽解價不如開邊為益餘鹽照票不如開引可行餘鹽的數止可與正額相等餘鹽引價要當計利害定擬嚴禁夾帶以防阻壞嚴繳退引以杜影射又該巡按直𨽻監察御史曽翀會同巡撫都御史周全唐胄巡按監察御史鄭坤郭圻督同山東長蘆運司議稱十事一議占窩一議開邊一議添引一議守引一議殺征一議緩罰一議轉輸一議官市一議臨德納榖一議私販禁例又該巡按山西監察御史王昺會同巡按監察御史薑潤督同河東運司議稱每年餘鹽有無多寡俱無定數故或倍開餘鹽或另立照引在淮浙則當酌處在河東則無可議至於鹽銀徑解各邊之説在河東去宣府不逺舊規固己行之在淮浙長蘆山東則勢不可行又該巡按浙江監察御史盧瓉督同兩浙運司議稱餘鹽不可盡革餘鹽不可增多引目不可增刷照票可另立餘鹽與正課盡行開邊決非商人之所樂正課近己減價餘鹽價值量其住賣地方俱為中制若餘鹽官為收買邊銀運司徑解已該巡按監察御史鄧直卿陳鎬疏論不通不便極其詳矣臣等復何言哉等因該本部議照朝廷設鹽課開中正以助邊邇年以來水旱頻仍邊陲多警加以逋負徴解不全供億缺乏每每告給內帑所以都給事中等官管懷理等博采羣議各盡所長無非恤竈通商裕邊保國之意但理無定在隨時處中物有不齊勢難畫一國初竈丁歲給工本以資歲用商人無本官與鈔定雜糧中納了畢還官各場竈丁將煎剩餘鹽夾帶出場及私鹽貨賣者絞今則似難行矣正統十三年將脫剩糧米收買竈户餘鹽每二百斤為一引給與糧米一石景泰元年將長蘆引鹽用遮洋運船回還附搭赴儀真掣鹽所收貯俱作存積之數以備開中𢎞治二年令守支客商收買竈丁納剩餘鹽以補官引今亦俱難行矣正引各有常規餘鹽原無定數遏私販以通官鹽乃祖宗立法之正假額課以處餘鹽實今日救弊之冝欲革餘鹽則商竈俱困而私販必致於盛行倍收餘鹽則旱潦難齊而邊引不免於壅滯正鹽例有引目餘鹽夾帶者絞若再增刷則於祖制有違餘鹽原無正票總在正鹽包中若又另立則與引目相背官為收鬻不若聽商隨場收買簡易可行盡數開邊竊恐天時人事不同將來難繼淮浙正鹽減價無非所以利商運司徑解邊銀衆己稱其不便至於兩淮山東長蘆所議大略相同兩浙之與河東則皆欲其仍舊其議嚴禁夾帶嚴繳退引占窩守引緩罰納榖私販等項事冝計慮周詳皆於鹽法有補既該各官會題前來合行移咨各該巡撫都御史及咨都察院轉行巡按巡鹽各該監察御史除兩浙河南事體聽其照舊遵行外其兩淮鹽斤合依各官所議每包共計五百五十斤內二百八十五斤連包索為正引原定價六錢近減一錢該銀五錢內二百六十五斤為餘鹽淮南原定價銀八錢今減一錢五分該銀六錢五分淮北原定價銀六錢今減一錢該銀五錢兩浙每正鹽一引連包索共計二百五十斤原定價銀四錢近減五分該銀三錢五分餘鹽通融二百斤為一引嘉興批驗所銀五錢杭州批驗所四錢紹興批驗所四錢溫州批驗所二錢長蘆山東共計四百三十斤內二百零五斤為正引長蘆定價二錢山東一錢五分內二百二十五斤連包索為餘鹽長蘆南掣鹽所銀三錢北掣鹽所三錢五分山東三錢八分商人嫌重不肯樂從今減七分該銀三錢一分以上正鹽俱各照舊開邊報中兩淮兩浙俱令上納本色糧草長蘆山東俱令上納折色價銀如遇豐年願有上納本色者聽從其便餘鹽不必開邊照舊運司納銀解部轉發各邊糴買客兵糧草以備支用其甘肅險遠止開淮浙二鹽淮鹽再減五分每引該銀四錢五分浙鹽再減五分每引該銀三錢其餘各邊如開淮鹽搭以長蘆則不必更搭山東如開浙鹽搭以山東亦不必更搭長蘆庶使便於掣支不致顧彼失此以上正餘鹽斤各該巡按巡鹽御史嚴禁各商恪遵前數不得數外夾帶阻壞鹽法違者引律問罪就將夾帶之數照依時價追收入官賣鹽畢日將引告繳所在布政司并直𨽻府州按季類繳運司巡鹽御史年終通查各司府里分若干該繳退引若干未繳至三五千引之上將掌印正官參奏提問不必待其考滿給由其占窩一節本部今後開中引鹽給與印信文簿一扇行令管糧郎中無郎中去處行巡撫都御史收掌如遇商人報中驗其實在糧草若干方與準行隨將本商籍貫年貌并納完糧草數目明白登簿給與勘合實收一併照簿填寫事完將簿印封差人送部轉發巡鹽御史收候查驗若有詐冒嚴加查究干礙內外人員一併參提從重治罪其守引一節本部今後每年正月將𣲖過各運司引鹽數目即類行各該衙門先將在庫私鹽紙贖等銀照依每引三釐扣算預行動支差官解赴南京户部依數造引領回候商人投到勘合即與給引派支所納紙價仍各貯庫以備來年解造之費其緩罰一節除前項該帶餘鹽外但有數外夾帶鹽斤仍照前議問罪追價入官庶免阻壞正法及有開中勘合己完商人到遲違限或因喪疾等項事故者聽巡鹽御史審勘是實準與分豁若規避照舊罰榖上倉以備賑濟𢎞治七年長蘆山東額鹽積滯臨德二倉空虛故運使宋鉞建議令商人就近納榖以通一時之變既而竟莫能行所據前項引鹽相應照舊開邊報中私鹽不禁則官鹽不行律例昭然奉行未至本部合再通行各該撫按官轉行各該軍衛有司常川巡緝私鹽拿獲到官查照律例從重問擬發落若有不行用心巡緝及守財縱放等項情弊聽撫按并巡鹽御史參奏提問治罪再照兩淮運司額鹽七十萬五千引有零內除水腳竈丁鹽九千一百四十九引一百斤折納價銀解部見在竈丁實辦并召商買補逃亡共計開邊正鹽止六十九萬六千三十引有零每引俱以五錢計之共該銀三十四萬八千一十五兩每包帶餘鹽二百六十五斤淮南淮北大約俱以六錢計之共該銀四十一萬七千六百一十八兩兩浙運司額鹽四十萬引有零每引俱以三錢五分計之共該銀一十五萬四千兩包帶餘鹽二百斤嘉興紹興杭州溫州大約俱以三錢計之共該銀一十三萬二千兩長蘆運司額鹽一十三萬五千七百七十五引八十六斤每引二錢五分共該銀三萬三千九百四十三兩八錢包帶餘鹽連包索二百二十五斤南北掣鹽所大約俱以三錢一分計之共該銀四萬二千九十兩三錢山東運司額鹽八萬三千一百二十二引一百二十四斤每引一錢五分共該銀一萬二千四百六十八兩四錢每包帶餘鹽連包索二百二十五斤該銀三錢二分共該銀二萬六千五百九十兩二錢上正鹽共銀五十四萬八千四百二十七兩二錢餘鹽共銀六十一萬八千三百七兩五錢通共正餘鹽銀一百一十六萬六千七百三十四兩七錢正鹽既己開邊餘鹽隨引就赴各邊上納銀兩似亦可行但查餘鹽價銀惟山東畫一兩淮長蘆分别南北不同兩浙杭嘉溫紹所在亦異又各該運司鹽場美惡不齊行鹽地方貴賤廣狹不等若一槩開邊上納銀兩商人惟利是趨各擇便利卒使下場餘鹽無人收買則竈户苦於不均運司派場支鹽隨鹽收買之法必致齟齬不合以此餘鹽難以開邊上納且每年春夏與十月為旺煎其餘月分為衰閉若天時晴霽場分有産隨到隨支亦無不可設若風雨連綿數月缺煎或灘崩塌淋曬無地運司難於追併商人坐守無期正引耽延商竈兩困本部合再通行巡鹽御史今後商人到場除正引該帶餘鹽照數稱掣外若餘鹽缺煎時難收買許商人赴院陳告查勘是實行令運司止將正鹽稱掣不必抑勒取盈如各場勤煎壯丁納剩餘鹽數多商人一時收買不盡悉聽巡鹽御史臨時設法區處或令有本商人報數收買隨同正引稱掣發賣及將該納價銀量其發賣月日限以程期俱赴運司上納解部以備各支用違者問罪監追完日發落等因嘉靖十四年五月初三日題奉聖旨依擬行欽此代題議處鹽法利弊事章懋臣聞鹽之為用乃生民食味之所急而國家經費之所資為物雖微其利甚溥不可一日而缺焉者也然在虞夏之時不過以鹽充貢而未嘗或專利於上成周之盛雖或以鹽名官而未嘗不同利於民因齊相管仲而鹽策始正漢用桑孔而鹽禁始重其源一開末流無所不至矣臣以菲材叨官臺察欽蒙聖旨差往兩浙等處巡視鹽課按行屬郡訪求民隱得其所當行者數事一曰存恤竈户夫鹽之所出雖由土産而其成用必資人力海濱之民以煎鹽為業者謂之竈户其採辦薪芻朝夕烹煉不勝勞苦固皆在所當恤而單丁老弱家計貧難者煎辦不前課入不敷屢遭鞭撻之苦而鹽入於官或被雨水銷鎔又有追賠之患此窮户之尤可哀矜者也若蒙輕其歲課使納折色庶幾寬民一分使之稍可存活是即生死骨肉之恩也其有丁力衆多家道殷冨為總催大户者煎鹽既多私賣尤廣亦冝有以處之合照黃册事例凡民户之里甲有缺就將圖內丁糧髙大者析户當差以補其數若以竈户之丁多家冨者亦行析户充役照丁辦課以補竈籍逃絶皆免雜泛均徭則差役均平而歲課不虧矣二曰輕減鹽糧國初嘗命鹽司以掣下餘鹽行令各縣差人赴司關領回縣分給小民計口食鹽而納鈔以償鹽價民感上恩得鹽而納鈔固所樂也厥後鹽司久無餘鹽關給而鹽鈔又改為鹽糧惟市民仍詐納鈔而鄉民皆納鹽糧又使之遠輸外郡則不惟米價髙貴而逺輸勞費十倍於納鈔則鄉民之受困甚矣若得照依市民一體納鈔固為大幸如或不能即改亦乞照依秋糧折色事例納銀準鈔使民受一分之賜又若大旱之遇時雨矣三曰申禁鹽窩昔我聖祖以邊城險逺兵餉不充而糧運勞費乃命商人輸粟邊倉給引支鹽以償勞費商人喜得厚利樂輸邊餉公私兩便最為良法近年以來法久弊生每遇開中之時權豪勢要之家詭名請託占窩轉賣商人不求於彼無路中納以故中鹽者少邊餉不充而國家失利為害非輕先朝雖有禁例而權豪玩法仍襲前非未能盡革伏望特賜宸斷申嚴前例有犯必誅使人知警懼則其害可除而邊餉無不足矣四曰鹽商挾私夫商人輸粟餉邊受鹽於官出外平賣利亦厚矣而有貪得無厭者乃於正數之外賄求場官私加斤數有一引至三百餘斤者而掣鹽之後運入江船又買私鹽夾帶在船混同發賣亦有經過關津賄求批驗盤詰人員不行照引截角或十中止截一二徑自越關到於所住地發賣而賣鹽已訖不即繳引再買私鹽仍將前引影射過關隨發發賣往復數次多取價利直待上司催取然後繳引其載鹽船户亦買私鹽夾帶前去混同發賣此皆商人之倚官挾私所當禁治者也臣於前項姦弊雖聞人言未得實迹難便究治律中已有夾帶餘鹽及舊引影射之文則必先嘗有是事矣與其治之於已然孰若禁之於未然乞勑該部移文各處巡鹽風憲選取亷能官員照依出鹽場數稱掣就行責取商人重甘結狀如有前項姦弊著實究治盡將財本沒官而載鹽船户有犯者亦將船隻沒官及行訪察沿路關津經該官吏凡有容令引不截角及舊引影射不行舉覺者皆問贓罪則人知警懼不敢挾私而官鹽不至於阻滯矣五曰禁治鹽徒鹽商之倚官挾私而夾帶影射者臣既已言之矣其有肩挑步擔而沿街貨賣者亦私鹽也又有座船紅船水夫及各處船户到於杭州攬載欽差內外官及各處經過官員行李在船昏夜收買私鹽藏在船內經過關津不敢盤問隨其所住地方貨賣此皆所得不多為害亦小若嚴加巡察則不敢為矣惟有一種遊手無賴之徒不務本等生理十五為羣乘駕小船出沒江上其船多置篙楫滿載私鹽沿江上下賣與往來客旅百雜人等有不肯買者則將私鹽一包丢入船內口稱巡捕恐嚇取財得財即去其私鹽賣盡浮遊江中遇有客船遭風著淺不能行動窺見船中人少孤舟無侣即便擁衆上船肆行搶掠舟人見其勢凶力不能敵任其所取不敢與抗抗則必被傷害掠得財物回船衆手舉棹運船疾行江靣濶遠頃刻之間不知行往何處失其所在無處跟尋惟有呼天痛哭而己又有船行遇晚未及止宿或船行太早天色未明亦與遭風遇淺者同皆被劫奪此等鹽徒肆無忌憚積習成風恐生他變若唐末之王仙芝黃巢元末之張士誠皆鹽徒也不可不早為之所乞勑巡鹽御史選差府衛佐二者各一員帶領巡捕軍餘及應捕人等以巡江為名沿江上下往來巡察上至桐江下至曹娥及江之兩岸小港一皆遍歷務使鹽徒盡散官鹽流通而國家常獲其利矣凡此數事皆為國之要務其前二事見民患之不可不恤蓋以民為邦之本也其後三事明財用之不可不理蓋以財為民之心也能舉仁民之政使民無失所則尊君親上事必有終而國本固矣能盡理財之道使財無散失則聚人得衆生財有道而國用足矣長治久安之道豈有外於是哉臣學識寡陋不能有所建明但以職居言責不容緘默敢以一得之見上瀆宸聰如蒙準言乞勑該部看詳事理參酌時冝擇其可行者賜之施行則天下幸甚整理兩浙鹽政議彭韶一各場竈户多有艱窘府州縣預備倉糧不多豈得有餘賑濟竈户近行各場立預備倉乞令今後巡鹽御史并大小問刑衙門若有提問徒罪以上竈户并一應干礙鹽法司事內囚犯杖徒以上罪名應該納米贖罪者俱發所在場倉上納及應入官船隻頭畜貨物亦各變賣價銀送場責令官攢看守無倉場分則於有司官倉另厫收貯俱申巡鹽御史查考盤驗遇有凶年賑濟貧竈秋成照數還官一各場俱有見年總催頭目不過一身應役奈有無知官攢但遇分司官吏到場或相識官員經過及衙門拜見銷牌解册等項俱派催目出辦答應每年有使銀十兩或十四五兩者竈催艱難人已不堪又加此等尤為重害合令巡鹽御史不時吊查究問一竈户優免俱有見例奈何姦民暗將田糧詭寄以圖濫免又有豪強竈户田畝千餘人丁百十止當竈丁數名其有司差役推託不當乞將竈户該辦全課二十三十丁以上俱各通優免其餘全課鹽丁每丁貼與私丁三丁每丁除田二十五畝免其差役夫馬此外多餘丁田俱發有司當差其姦民詭寄田糧及豪強竈户影占差徭就將多餘丁田照數收補逃故竈丁若詭寄不多者依律問罪田糧改正淮鹽場圖詩疏略彭韶自古聖帝明王莫不以稼穡艱難為念忠臣賢士亦莫不以敷陳民事為先故有書邠風無逸以進者有進農桑耕織圖者有獻流民圖者要之但於深宫之中寓目動心不至視民如草芥矣然庶民之中竈户尤苦惜乎古今未有圖詠臣今近履鹽場始識其槩海鹽煎熬全資竈户雖有分業塗潦蕩然糧食不充安息無所未免預借他人課餘悉還債主艱苦難以盡言小屋數椽不蔽風雨脫粟糲飯不能飽餐此居食之苦也山蕩渺漫人偷物踐欲守無人不守無入此蓄薪之苦也曬淋之時舉家登場刮泥吸海午汗如雨隆寒砭骨亦必為之此淋鹵之苦也煎煮之時燒灼薰蒸蓬頭垢面不似人形酷暑如湯亦不能離此煎辦苦也寒暑隂晴日有課程前者未足後者又來此徴鹽之苦也客商到場無鹽抵價百般逼辱舉家憂惶此賠鹽之苦也疾病死喪尤不能堪逃亡則身口飄零復業則家計蕩盡去住兩難安生無計所冝加意矜念遇事寬恤彼將感動仰慰雖困極無復恨矣臣今將兩浙鹽場景物事情略分八節各繪為圖每各述以詩裝册上進庶幾目擊貧竈之迹臣不勝願幸之至應詔陳言疏王朝用據兩浙都轉運使司經歷司呈查得成化二十年以前兩浙運司額鹽俱是徴納鹽斤聽候客商報中彼因徴鹽留待年久走鹵消折負纍竈丁賠償該監察御史林誠題將成化二十年以後鹽課一半折納銀兩逐年十月以裡解部亦是權冝處置非立法之本意等因到部臣竊惟天下之財賦盡出於東南而鹽利尤為裕民之厚資天下之兵戈多在於西北而糧芻尤為備邊之急務故以鹽糧召商報中謂之飛糧挽芻誠為籌邊至計但引額原有定數而先後因革不同以臣愚見論之舊額之當復者其勢有六敢一一陳之兩浙行鹽地方浙江十一府并南直𨽻五府一州與江西廣信一府國初民間户口猶少而竈丁亦不甚充足額鹽尚有四十四萬有零近來民間生齒漸繁而竈丁曠丁亦多不惟食之者衆而辦之者亦衆使不變而通之則民食日見其不足竈課日見其有餘欲禁其私販亦難矣此其當復者一也先年減半折價解京者以濱竈近海易於辦鹽水鄉不諳煎燒易於辦價况辦鹽者惟辦本色收貯日久易於消折折價解京者亦一時優恤小竈之權冝非原先設立之正法近年以來不特解京者折價而存留在場者亦多折價聽候給客蓋以竈丁便於輸納無消耗之纍商人易於關支無守候之納每年解京二十二萬二千三百八十四引有零每引折銀二錢三分七釐共該解銀五萬二千七百五兩有零若將價銀收留運司額鹽盡數發邊開中就將前價一體給客收買則商人樂從竈户稱便且每鹽一引計價四錢在邊倉已滿八萬八千九百五十三兩之數若并割算餘鹽價銀計之每一千引三場兼派又該銀一錢共該增解價銀二萬二千二百三十八兩有零較之折價解京增出五萬八千四百八十六兩此其當復者二也每年運司類解折色價銀到部户部轉運發邊未免限月定期遲以歲月一時邊報緊急豈能濟事唯此鹽糧勘合人皆爭先趨赴匪徒神速如昔抑且加倍勝常驛遞免轉輸之苦道路無剽掠之虞此其當復者三也竈丁之煎辦有農夫之耕種耕者所獲除完納稅糧之外自有通功易事之理竈鹽既減半折解則納剩餘鹽豈可聽其消化而不為變通之計哉當此之時商人欲收買而限於無引竈丁欲變賣而畏於犯法此興販之徒接踵而至發運之船成綜而來其勢有不得不然者大抵天下之利不歸於官必歸於私若官引不足而又於私販是禁忍淡不食鹽味夫豈人情所宜一旦為人捕獲則又陷於法網夫犯法豈小民之得已哉此其當復者四也各處行鹽地方近來鹽價髙貴一則由於上納價值之重一則由於照賣官引之少故利之所在人必趨之雖巳嚴加禁治一旦遽難止息大抵源潔則流清此盛則彼衰若使引目既多則一年正商足以盡收竈丁之所獲各處官鹽足以備充民間之食用彼私販何由用其力而施其謀哉不惟鹽價得而平私販亦不期禁而自止矣此其當復者五也自折價解京之後民食漸覺艱難故先該巡鹽御史有奏開殘餘鹽者有奏開賣空額引者又傍引私囚名色而召納者亦一時補其不足之權冝但厚利所在多為勢要所有一奉先年明詔裁革殆盡近因執法者查理過嚴由是小商皆自危矣夫以裁革執商為名是矣至究其實則又不盡然者利已歸於勢要而不可出害復及於小商而不能免財利之際易生嫌疑當事之人率多規避孰肯加憐憫之意若使前引盡開小商何至此極此其當復者六也此額一復則民食自足私販易息邊儲充實國課不致於缺少商人得利竈丁可免於困極一事之舉可以兼數事之長乞除以前年分解過價銀到部者名為空礙與例有礙不開外以後年分有額空鹽折納價銀存留運司不必解京每引定價四錢盡數發邊開中前項價銀聽候商人賫執勘合倉鈔比對相同一體支領買補掣銷仍照例嚴禁腹裡及京師不得開賣以杜釁端則地方幸甚商竈幸甚無基貧竈沙蕩碑記田惟祜謹按天下産鹽之地不一而足惟海與淮為尤甚故自吳王煮海之後海鹽之利甲於天下我國初建立轉運司於杭而仁和場則負郭者也東接海口西連城市故不屬之分司而直謂之本司仁和場焉其所轄有五倉曰中倉東倉茶槽倉則附場者也曰錢塘倉則竈者錢塘之民也曰伍圍倉則地者蕭山之屬也要之地皆濵海無不煎煮以入貢者場有官吏屬有催役徴收有法賦斂有時或折錢以輸京師或以鹽而給商賈蓋法之良者也成化初海水沸騰潮勢衝擊斥鹵之地遂成巨浸而錢塘為尤甚加以歲歉賦煩民不聊生於是逋逃流散而不可維係矣司國計者往往以逋課責之催役罔不破家當道疏其事於朝上命都憲彭公董其事招撫流散弗責其舊逋懷來新附仍蠲其新賦親詣場所命老於世故如張圭者使之賫文尋訪未幾海沙復漲如昔於是雖稍稍四出而舊業已為豪強所得矣圭白之彭公公曰宋臣有上流民圖者我朝湖河等處有撫治流民官我獨不能效宋臣而上體朝廷之意乎命圭經畫之相厥攸居得仁和中倉之外海中懸沙處之名曰無基沙蕩永為世業約束強梗禁毋爭奪迄今七十餘年矣中間雖經豪橫告爭賴諸巡鹽公轉運公遵舊案而止場有惡少年罔知故事復訟於巡鹽江陵李公命都運黃公訪之鄉老圭之子曰世廉者悉具原末上之未幾李公陟而巡鹽南昌劉公至矣公曰有是哉命運司立石於場以示諸強梁者嗚呼無基之業自此定矣夫天下之惡一也天下之善亦一也刑以懲惡賞以勸善豈惟我國家亦歷代忠厚之至也今朝廷之所以存恤貧民者何如而豪強之驅逐貧竈如是哉黃公能仰副憲臣之意而下懷逋播之民可謂忠於朝廷者矣是冝鐫石以垂不朽長蘆運司志序倫以訓嘉靖癸已秋柱史東塘鄧子出按長蘆山東兩運司鹽政其年冬長蘆運司志成先是鄧子以山東運司槩附於山東通志而長蘆獨未有紀乃屬之運司諸君子於是都使郭子五常運同冷子宗元運判韓子義徐子官協心庀事不閲月志告成請正於鄧子鄧子以示其邑人史倫子倫子曰自鄧子之斯蒞也吾聞其百弊革百廢興斯志之創興廢之大者可無觀乎既卒業則復諸鄧子曰凡志之目十有四其卷七余既受卷於諸君子矣凡觀志之道有三亦可以為諸君子言之已乎夫志非以為觀美也將以彰往詔來軌厥官方者也是故觀其供億則思善事也觀其額入則思阜民也觀其禁防則思勑法也三者政之經而志之要也鹽課佐國經費久矣而長蘆之所供則以上給郊廟百神之祭祀帝后宫府之膳羞百官有司凡餼於公者歲遍焉以及於輦轂之下萬億之兵民下乃貨之於商均之於畿赤八郡西暨河南之彰德衛輝北通居庸東盡遼陽數千里其出給之廣與諸運司略同而上供之必精諸運司無有也凡備物之精者不必冨富者不必精惎精惎冨惟長蘆鹽則然是故思善事也虞夏青州貢鹽齊管子肇興鹽策長蘆置司滄洲介古燕齊所轄二十有四場東濱澥渤與登萊相望蓋古興鹽首地而課入視他司稍劣夫地利以民力為本民力弗克則地利弗究夫賦役重則逃亡滋草蕩侵則本業廢朘削繁則力本怠兼併行則公課減凡課在養民養民在去害民者爾矣是故思阜民也天下之禁防一也禁防之決必自豪貴始兩運司暨淮司當兩都往來之衝而長蘆尤京師密邇為豪貴淵藪淮鹽價髙天下當正德末年閽寺之使西域者織造東南者公破分地之例奏給長蘆諸鹽動數千引舳艫相銜遏奪商旅以爭利於南南北交受其病比年雖厲禁復始而挾勢殖私者亦時有之天以稍劣之課應甚重且繁之供而弊之弗戢其將何䇿以贍是故思勑法也今夫鹽利之在天下譬諸其水乎時其政令以導其利而上下布之譬諸其行水者乎阜民者浚其源乎勑法者防其溢乎善事者澄其潤乎慎斯三者以往可以與於斯志也已鄧子曰嘻盡之矣吾志也願吾子以斯言序之也鄧子名直卿字正與丙戌進士郭子徐子皆進士而徐子與倫子同年冷子官京師與倫子友善是故乞序諸倫子山東巡鹽察院記髙尚賢嘉靖甲申歲之秋八月山東巡鹽察院成巡按監察御史古洛景進提學僉事髙尚賢謂之曰鹽課古今之須也禹貢青州周官鹽人吳雄煮海齊霸鹽策後代損益而已我朝地廣倍昔政亦善昔其壤淮浙滄潞其産井池陂澤其務煎撈輸挽地有攸司官有攸紀懼其無以綱之也乃監之憲臣以登降其史之賢否罷行其事之利病非鹽課者亦便冝許焉視巡按清軍均也唯是東北之路帶直𨽻河南山東三境而山東且古青州之域山採海煎鹹作惟殷醝之上矣而無專官缺典也哉歲嘉靖癸未冬藩臬長二林公廷珍潘公玉卿等度地於清察審院之左曰冝乃計榷羡簡吏能以請於余余韙之而且速之成夫鹽利佐國十之二三人情惟飢渴迫無所事鹽恆居非此即不味伍齊之不和陸味之不平而生理亦幾困矣故世治則流世衰則閡是鹽之寢興天下盛衰之係也非有重臣柄政則強吞貪漁利不需國用不浮民池之坑而井之阱矣自夫有監臨也商不病阻民不病味官不及侵盜不及逞而利亦唯國是巡按之有無鹽政通塞之係也夫居定則志貞志貞則政裕否則席無定暖牘無久徴而志或憧憧政由兹二察院之設否又非巡按之所以輕重也哉地也而之官官也而之政政也而之國厥係亦博矣而功今適成院以肅憲憲以表藩前乎是也者志之有昭後乎是也者守之有繼可紀也院地廣輸凡若干丈尺中後堂各五楹重門率減堂制之二而穿堂後廳書房如之旁之廂房又槩諸此而加一焉言言翼翼細大咸飾厥度視巡按清軍察院而髙廣之其謀之也巡鹽桂陽范公古閩鄭公浮梁廬公潛江初公廬江黃分實首之其贊之也巡撫靜齋陳公南臯王公巡按四明孫公清軍平崖林公實協之畢務則歐陽君誥知府鍾君梁者屬焉厥惟大較也子盍為我記之賢拜曰逺哉先生所謂計國之説也賢何加焉先生按歷三國時未及期而害塞利通豺狐攸伏官民至正有泰山之瞻焉居又借公之重而公非得居之重焉已也噫後之居此者寧我之重彼也無寧彼之重我也則景公之志與是居永矣因推而記之茶法陜西清吏司案呈卷查應天府批驗茶引所直𨽻常州府冝興縣張渚批驗茶引所浙江杭州府批驗茶引所節次關去茶引自成化元年起至成化十年止陸續共關過茶引五十八萬三千六百六十一道前去發賣各處茶商照賣茶斤纍催不見銷繳查得本部先於景泰五年為因各處商人等多將舊引影射私茶不行銷繳查照清理鹽法事例具奏該户部依擬奏準出榜曉諭及行各處巡按巡鹽巡河巡江監察御史監收船料提督洪閘郎中等官禁治搜檢各批驗所追繳退引等因已經通行遵守外今照前項退引纍催不繳其故蓋因批驗所不置簿籍附寫茶商姓名貫址或不照茶商路引聽其冒名開報或將引由成千成萬賣與嗜利之徒賫赴産茶地方轉賣與人如此欲得的確名籍行追繳引難矣况茶貨出山經過官司既不從公盤詰又不依律批驗縱有夾帶斤重多是受財賣放彼何畏憚而不停藏舊引影射私茶又如南直𨽻常州府廬州府池州府徽州府浙江湖州府嚴州府衢州府紹興府江西南昌府饒州府南康府九江府吉安府湖廣武昌府寶慶府長沙府荆州府四川成都府保寧府重慶府夔州府嘉定州瀘州雅州等處俱係産茶地方相去前項三批驗所逺者數千里近亦不下數百里若照引內條例聽茶商徑赴産茶府州納課買引照茶於人為便理必樂從誰肯不買引由公犯茶禁今却令茶商皆來此三所買引路途窵逺往返不便欲其一一遵依不作前弊亦難矣况批驗引由與之截角及搜檢有無夾帶乃批驗茶引所之職所退引該與截角今前項三所却官賣引不行批驗名實不稱有乖職掌呈乞施行等因到部臣等切惟印造茶引鹽引禁治私茶私鹽係是太祖髙皇帝舊制今官不修職民不守法茶禁廢弛一至於斯若不申明禁約非惟虧國家之課程抑恐壞祖宗之制度合無請給聖旨榜文通行天下曉諭今後園户賣茶及茶商興販茶貨告給引由與夫批驗納課等項務要俱遵引由內條例數內惟買引一事免其納錢只照見行事例每引一道納鈔一貫中夾紙一張仍令前項産茶府州斟酌所管地方每歲可出茶貨若干預先具數差人赴本部關領前引回還收貯出榜召商中買仍要辨驗茶商路引果無詐偽即將其人姓名貫址附簿將引給與年終該府州各將賣過前引造册就將收過紙鈔差人一同解繳本部鈔送該庫交收紙劄造引仍具數關領次年合用引由各批驗所如遇茶商經過務依例逐一批驗將引截角如無夾帶即便放行若有夾帶就連人茶拿送本處官司問理年終將批驗過客商姓名貫址并引數目及盤獲私茶起數緣由造册申達合干上司轉繳本部查考如有日前停藏舊引未曽繳報者榜到日限三箇月以裡赴所在官司告繳與免本罪敢有不遵條件興販私茶者許巡按巡鹽巡河巡江監察御史監收船料提督洪閘郎中等官及各該軍衛有司把守關隘人員拿問挑擔馱載及引領牙行停藏之家俱依律治罪盤獲私茶并盤獲車船頭畜等物俱入官如將引由照茶依例批驗截角賣畢隨赴往賣所在官府告繳封送原領引由衙門報各該巡按監察御史按察司提問追繳如此則職掌定而政務修法令明而姦蠧息緣係申眀舊例清理茶法事理未敢擅便今將茶引由內條例開坐具題計開一茶引由內茶引一道納銅錢一千文照茶一百斤茶由一道納銅錢六百文照茶六十斤見行事例每引由一道納鈔一貫中夾紙一張一諸人但犯私茶與私鹽法一體治罪如將已批驗截角退引入山影射照茶者同私茶論一客商興販茶貨先赴産茶府州具報所買斤重依納課買引照茶出境發賣如至住賣去處賣畢隨即於所在官司繳納原引如或停藏影射者同私茶論一山園茶住將茶賣與無引由客商興販者初犯笞三十仍追原價沒官再犯笞五十三犯杖八十俱倍追原價沒官一茶引不許相離有茶無引多餘夾帶並依私茶定論一客商販到茶貨經過批驗所須要照例批驗將引由截角别無夾帶方許放行違越者笞二十一偽造茶引者處死籍沒當房家産告捉人賞銀二十兩一賣茶去處赴宣課司依例三十分抽一分芽茶葉茶各驗價值納課一販茶不拘地方欲令兩淮山東長蘆三運司將鹽引紙每張納鈔一貫奏狀名臣經濟録卷二十三
