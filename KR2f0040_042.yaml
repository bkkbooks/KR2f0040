body:
  text: 名臣經濟録卷四十二明黃訓編兵部職方下之上陳言邊務疏王守仁邇者切見皇上以彗星之變警戒修省又以邉方多故命將出師宵旰憂勤不遑寧處此誠聖主遇災能警臨事而懼之盛心當兹多故主憂臣辱孰敢愛其死况有一二之見而忍不以上聞耶臣愚以為今之大患在於為大臣者外託慎重老成之名而內為固祿希寵之計為左右者內挾交蟠蔽壅之資而外肆招權納賄之惡習以成俗互相為姦憂世者謂之顛狂進言者目以浮躁沮抑正大剛直之氣而養成怯懦因循之風故其衰耗頺塌將至於不可支持而不自覺今幸上天仁愛適有邊陲之患是憂慮警省易轅改轍之機也此在陛下必宜自有所以痛革弊源懲艾而振作之者矣新進小臣何敢僣聞其事以干出位之誅至於軍情之利害事機之得失茍有所見是固芻蕘之可進卒伍之所得言者也臣亦何為而不可之有雖其所陳未必盡合時論然私心竊以為必宜如此則亦不可以茍避乖剌而遂已於言也謹陳便宜八事以備採擇一曰蓄材以備急二曰舍短以用長三曰簡師以省費四曰屯田以供食五曰行法以振威六曰敷恩以激怒七曰損小以全大八曰嚴守以乘弊何謂蓄材以備急臣惟將者三軍之所恃以動得其人則克以勝非其人則敗以亡其可以不豫蓄哉今者邊方小冦曾未足以辱偏禆而朝廷會議推舉固已倉皇失措不得已而思其次一二人之外曾無可以繼之者矣如是而求其克敵致勝其將何恃而能乎夫以南宋之偏安猶得宗澤嶽飛韓世忠劉錡之徒以為之將李綱之徒以為之相尚不能止金人之衝突今以一統之大求其任事如數子者曾未見有一人萬一敵人長驅而入不知陛下之臣孰可使以禦之若之何其不寒心而早圖之也臣愚以為今之武舉僅可以得騎射搏擊之士而不足以收韜略統馭之才今公侯之家雖有教讀之設不可虛應故事而實無所禆益誠使公侯之子皆聚之一所擇文武兼濟之才如今之提學之職者一人以教育之習之以書史騎射授之以韜略謀猷又於武學生之內嵗升其超異者於此使之相與磨礲砥礪日稽月考别其才否比年而校試三年而選舉至於兵部自尚書以下其兩侍郎使之每嵗更迭巡邊於科道部屬之內擇其通變特達者二三人以從因使之得以周知道里之逺近邊關之要害敵情之虛實事勢之緩急無不深諳熟察於平日則一旦有急所以遙度而往蒞之者不慮無其人矣孟軻有云茍為不畜終身不得臣願自今畜之也何謂舍短以用長臣惟人之才能自非聖賢有所長必有所短有所明必有所蔽而人之常情亦必有所懲於前而後有所警於後吳起殺妻忍人也而稱名將陳平受金貪人也而為謀臣管仲被囚而建霸孟明三北而成功顧上之所以駕馭而鼓動之者何如耳故曰用人之仁去其貪用人之智去其詐用人之勇去其怒夫求才於倉卒艱難之際而必欲拘於規矩繩墨之中吾知其必不克矣臣嘗聞諸道路之言曩者邊關將士以驍勇強悍稱者多以過失罪名擯棄於間散之地夫有過失罪名其在平居無事誠不可使處於人上至於今日之多事則彼驍勇強悍亦誠有足用也且彼擯棄之久必且悔艾前非以思奮勵今誠委以數千之衆使得立功自贖彼又素熟於邊事加之以積慣之餘其與不習地利志圖保守者功宜相逺矣古人有言使功不如使過是所謂使過也何謂簡師以省費臣聞之兵法曰日費千金然後十萬之師舉夫古之善用兵者取用於國因糧於敵猶且日費千金今以中國而禦四方非漕挽則無粟非征輸則無財是固不可以言因糧於敵矣然則今日之師可以輕出乎臣以公差在外甫歸旬日遙聞出師竊以為不必然者何則北地多寒今炎暑漸熾敵性不耐我得其時一也敵恃弓矢今大雨時行筋膠解弛二也敵逐水草以為居射生畜以為食今已蜂屯兩月邊草殆盡野無所獵三也以臣料之官軍甫至敵且遁矣夫兵固有先聲而後實者今師旅既行言已無及惟有簡師一事猶可以省虛費而得實用夫兵貴精不貴多今速詔諸將密於萬人之內取精健足用者三分之一而餘皆歸之京師萬人之聲既揚矣今密歸京師邊關固不知也是萬人之威猶在也而其實又可以省無窮之費豈不為兩便哉况今官軍之出戰則退後功則爭先亦非邊將之所喜彼之請兵徒以事之不濟則責有所分焉耳今誠於邊塞之卒以其所以養京軍者而養之以其所以賞京軍者而賞之旬日之間數萬之衆可立募於帳下奚必自京而出哉何謂屯田以給食臣惟兵以食為主無食是無兵也邊關轉輸水陸千里踣頓捐棄拾而致一故兵法曰國之貧於師者逺輸逺輸則百姓貧近師貴賣貴賣則百姓財竭此之謂也今之軍官既不堪戰陳又使無事坐食以益邊困是與敵為謀也三邊之戍方以戰守不暇耕農誠使京軍分屯其地給種授器待其秋成使之各食其力敵至則授甲歸屯遙為聲勢以相掎角敵去仍復其業因以其暇繕完敵所拆毁邊墻亭堡以遏衝突如此雖未能盡給塞下之食亦可以少息輸餽矣此誠智士俟時之道王師出於萬全之長䇿也何謂行法以振威臣聞李光弼之代子儀也張用濟斬於轅門狄青之至廣南也陳曙戮於戲下是以皆能振疲散之卒而摧方強之敵今邊臣之失機者往往以計幸脫朝喪師於東陲暮調守於西鄙罰無所加兵因縱弛如此則是陛下不惟不置之罪而復為曲全之地也彼亦何憚而致其死力哉夫法之不行自上犯之也今總兵官之頭目動以一二百計彼其誠以武勇而收録之也則亦何不可之有然而此輩非勢家之子弟則豪門之夤緣皆以權力而強委之也彼且需求刻剝騷擾道路仗勢以奪功無勞而冒賞懈戰士之心興邊戎之怨為總兵者且復資其權力以相後先其委之也其敢於不受乎其受之也其肯於不庇乎苟戾於法又敢斬之以殉乎是將軍之威固已因此輩而索然矣其又何以臨師服衆哉臣願陛下手敕提督等官發令之日即以先所喪師者斬於轅門以正軍法而所謂頭目之屬悉皆禁令發回毋使瀆擾侵冒以撓將權則士卒奮勵軍威振肅克敵制勝皆原於此不然雖百萬之衆徒以虛國勞民而亦無所用之也何謂敷恩以激怒臣聞殺敵者怒也今師方失利士氣消沮三邊之戍其死亡者非其父母子弟則其宗族親戚也今誠撫其瘡痍問其疾苦恤其孤寡振其空乏其死者皆無怨尤則生者自宜感動然後簡其強壯宣以國恩喻以仇讐明以天倫激以大義懸賞以鼓其勇暴惡以深其怒痛心疾首日夜淬礪務與之俱殺父兄之讐以報朝廷之德則我之兵勢日張士氣日奮而區區之敵有不足破者矣何謂捐小以全大臣聞之兵法曰將欲取之必姑與之又曰佯北勿從餌兵勿食皆捐小全大之謂也今敵勢方張我若按兵不動彼必出鋭以挑戰挑戰不已則必設詐以致師或捐棄牛馬而偽逃或掩匿精悍以示弱或詐潰而埋伏或濳軍而請和是皆誘我以利也信而從之則墮其計矣然今邊關守帥人各有心敵情虛實事難卒辦當其挑誘之時畜而不應未免小有摽掠之虞一以為當救一以為可邀從之則必陷於危亡之地不從則又懼於坐視之誅此王師之所以奔逐疲勞損失威重而敵人之所以得志也今若恣其操縱許以便宜其縱之也不以其坐視其捐之也不以為失機養威畜憤惟欲責以大成而小小挫失皆置不問則我師常逸而兵威無損此誠勝敗存亡之機也何謂嚴守以乘弊臣聞古之善戰者先為不可勝以待敵之可勝蓋中國工於自守而北人長於野戰今邊卒新破敵勢方劇若復與之交戰是投其所長而以勝豫敵也為今之計惟宜嬰城固守逺斥堠以防姦勤間諜以謀敵熟訓練以用長嚴號令以肅惰而又頻加犒賞使皆畜力養鋭譬之積水俟其盈滿充溢而後乘怒急決之則其勢并力驟至於崩山漂石而未已昔李牧備邊日以牛酒享士士皆樂於一戰而牧屢抑止之至其不可禁遏而始奮威并出若不得已而後從之是以一戰而破強胡今我食既足我威既盛我怒既深我師既逸我守既堅我氣既鋭則是周悉萬全而所謂不可勝者既在於我矣由是我足則敵日以匱我盛則敵日以衰我怒則敵日以曲我逸則敵日以勞我堅則敵日以虛我鋭則敵日以鈍索情較計必將疲罷奔逃然後用竒設伏悉師振旅出其所不趨趨其所不意迎邀夾攻首尾橫擊是乃以足當匱以盛敵衰以怒加曲以逸擊勞以堅破虛以鋭攻鈍所謂勝於萬全立於不敗之地而不為敵之敗者也右臣所陳非有竒特出人之見固皆兵家之常談今之為將者之所共見也但今邊關將帥雖或知之而不能行類皆視為常談漫不加省勢有所軼則委於無可奈何事憚煩難則為因循茍且是以玩習廢弛一至於此陛下不忽其微乞敕兵部將臣所奏熟議可否轉行提督等官即為斟酌施行毋使視為虛文務欲責以實效庶於軍機必有少補臣不勝為國惓惓之至論用兵十二便宜狀夏良勝臣聞京師朝廷之心腹也省會為肘腋也運道為喉嗌也聨屬一身不容一息之有恙也今天下諸路褎凶鞠頑攻城掠地形諸奏牘而輦轂密邇之地尤為熾烈擁艦斷流國儲多損是猶腹心肘腋竒疾交攻而嗌不容粒縱和緩名流亦或裹囊而未敢一已以取效也今廟堂之上回顧却慮上翊神謨而遣將調兵日復煩擾但重臣迭出非可形破斧之詠而邊軍久役或可啓空壁之疑居重馭輕之勢縱未倒持而顧彼失此之患亦難逆覩襄夷期亟奏功籌畫必須預定臣本迂冗下才不通時務然寢食未敢懷安每慚莫效謹以行軍便宜略陳條目未能考古證今豈謂隨機應變然天不以惡木而廢發生人主不以世有小人而廢聽納如芻蕘之言無一可采伏望陛下别命多官議處各陳所見昔馬援猶能指示方略而謂虜在目中堂堂天朝豈敢謂無其人哉臣草率干冒天威不勝戰栗之至為此條陳一十二事謹具奏聞伏候敕旨一凡軍容厚集其陳以養威重今出京軍為戍卒可也邊軍足為鬬士矣至於奪心之將尚須召募死士若謂賊有潛姦摻入皆上將也發之太早則絶其歸路發之少緩則墮其計中羈縻散處以計戮之亦足剪其羽翼就中審是脅從微有叛意誘以厚利則兵法所謂因問之術可行也其真以死士應募者激以忠義約以爵賞令其三五為侣或作商賈而被虜或號竊盜而合從僅得百人入黨則向導從謀皆吾人也代謀伐交知彼知已保無虞也若伺其間隙當酣飲肆淫之際而殱彼渠魁脅從當為解體若欲交鋒臣謂此輩皆為立赤幟者矣一凡敵之強盛皆資糧於我不勞齎送坐享肥甘今野無黍稻牛馬之資若傳軍令凡敵鋒可及附郭市鎮去處俱不得積頓糧草等物或運或藏聽其所便臣知奪彼所資而老困之餘或可以成擒也一兵詭道也正勝之戰不聞久矣如今敵攻滄州等處城守不下積以數日彼此坐困上流如德州下流如天津相機䇿應分道竊發而夾攻之又發一枝水道艤舟以要其遁或遺一矢城中開門以擊其衝彼之腹背受敵我之掎角以成臣以為制勝一䇿也一戰陳之法識時為上敵之所恃者弓馬之力值兹秋爽誠彼之利必乘雨而攻之如雪夜取元濟可也况敵屢勝而驕肆志寵樂又不必贋雜更聲而後即邇然機括欲密莫知其來莫知其去如狄青於崑崙關既勝而不知乃妙算也臣思天下不患有此邊患無此將略而已一兵貴拙速不貴巧遲今賊處其逸我當其勞非可以速勝之勢也必求城郭完固之處以安營寨平定練習將知卒卒知將關隘可以察姦威聲可以振敵數挑而不戰屢約而不合先守後攻縱不勝臣保其必不敗也一軍士所領器械多係積朽鋒刃者或銛鈍而緩急不利於用筋漆者或敗液而強弱不稱其人神鎗銃石伏弩宜於隘口而非平曠所施臣聞先年海冦施天泰作耗從事軍門者新製火藥有名噴筒者用竹一尋如椽大通數節間圍以鐵以火藥與鐵子沙石雀舌和而實之放則火燭一望可移動可持久彼當其蔽我處其明入膚焦髮創見亦難於禦彼海濤山立恃此猶能燬艦成功况兹陸野攻取皆為有用之具也一凡軍法主客不可相應彼左而右彼右而左彼騎而步彼疾而遲皆在隨機以應變也如今北人所恃馬陳也我未成列突焉而馳京軍怯懦收韁促鐙恐墮不暇若列步卒比刃而迎之猶足當鋒邊軍遊騎分道而馳之乃為有濟臣觀之傳狄人用車戰而荀吳毁車為行伍乘為參伍是以取太原之勝也一凡京操軍士綿軟愈惰盔甲著身若不能任轉項運臂已有難色其能據鞍上馬者鮮矣尚能挽幾石弓執數尋戟以從事乎况馬雖強壯其所載器械而具已如二人乘者奔馳百里水草不時損亦良多若素疲瘠又將何如大抵馬上從軍非邊徼素習適為敗奔所恃敵因得之壯為騎而瘠為糧也况經行調度一馬之費可備三卒臣意自邊軍外其餘調用軍士不必給與馬匹非惟奪其逃生之具亦且堅其必死之心古者濟河焚舟與持糧三日之意正謂是也一凡各處行軍俱以重臣總制是固慎重之意然蕞爾小寇乃爾鄭重譬之奕者此為盡著也况爵位已滿於素望精力不逮於初年鞍馬之勞似非所便常觀古之立功名者俱以志氣尚鋭血氣方剛乃能有濟而先聲後實亦在威望素為懾服者耳若曰德望鎮重古人有曰貪可使也詐可使也陳平吳起何如人哉一軍威以殺為主故曰軍旅之後必有凶年全勝之功古今幾見敵之令嚴而多殺故進則生而退則必死我屢敗而未戮一將與卒故進則死而退則可生勝敗之異職此之由伏望陛下申令主帥使副屬而下俱得按法行誅如戮莊賈為徇人雖至愚敢不用命勝敵為幸生之計哉一天下運道為賊阻截良多休息無期劫奪有素萬一賊遁南奔適為彼之具餉臣意天下倉場皆朝廷外府若使督運官軍隨船所在官司倉場如法收貯仍令各衛所官督集運兵何啻數萬或攻或援調遣隨時必待功成賊定方許通關繳報緩急當有得力者矣一凡天下被賊地方巡守等官俱被參提警集人心然祖宗設官所謂衛者護衛城池之意也所謂守者備禦盜賊之意也所謂守禦所者備禦盜賊之意也巡守有司專以治民而已若有警急具餉乃其職也今以軍職習於宴安故不得已而以文官從事戎伍一有差失便見參劾揆之情法實有不堪况失事之中亦有等第其玩冦養亂而失者固宜也其衝突戰陳救援不及是亦不幸焉耳况軍主於威臣子假朝廷威者冠帶之榮而已今一切革去是人而冒虎之皮者并其皮而亡之爪牙之利更何所施伏望陛下俯察此情寬假此輩當有黽勉從事以圖死報者矣采納愚忠以全政體疏近因本科題為申明遵復欽奉舊規以慎選任將臣事該臣等查看得𢎞治十八年四月初二日欽奉孝宗皇帝聖旨兩京五府各營及親軍衛分堂上管事及在外鎮守分守守備方面武職官員姓名履歷兵部按季開寫進來以便觀覽欽此及查正德十年春季揭帖尚存本科以後不知廢自何人迄今不復舉行乞敕兵部查照先年欽奉事理將兩京內外武職官員姓名履歷仍要增入貫址年嵗及曾經大臣及撫按官舉劾賢否考語備細開造揭帖一樣二本一以進呈御覽一留本科收貯每季於孟月一日差官送科次日早朝本科掌印官赴御前與六科旨意題本一同奉進仍乞陛下留置宫中遇有推用武臣輒賜一覽少助聖明萬一等因奏奉聖旨這本所言的是兵部看了來説欽此昨該兵部覆題行準吏部文選手本每年按季終將兩京堂上官及在外方面知府以上官姓名履歷開造揭帖於左順門進呈並無開送該科看得前項揭帖自𢎞治十八年四月欽奉孝宗皇帝聖旨以來一向按季開造進呈止有略節履歷不曾開寫舉劾緣由與吏部事體相同但本部自來不曾具本隨進以致該科疑其不復舉行又恐徒存姓名賢否不具雖經御覽無益於事故有此奏合無今後照舊按季開造揭帖仍將各官任內曾經大臣等官舉薦及撫按言官論劾者備開舉劾略節詞語於下無有舉劾者照舊止開履歷具本赴左順門進呈御覽等因奉聖旨是依擬行欽此竊照該部議擬上言進呈揭帖增入舉劾賢否考語揆之事體視昔加詳誠為有益聖覽矣但臣等待罪該科職在舉正其選用將官掌科官實與會推之列則凡內外武官姓名履歷皆當與聞前項揭帖實有不可少者况各衙門一應奏本文册圖籍及附選揭帖之類無有不送該科以備存照查得本科先年原有武職揭帖俱係兵部開送當時御覽揭帖又發本科收貯所以便於查考今自正德十年以後嘉靖元年以來進呈揭帖既已一向留中而該部又不復開送臣自到任以來凡遇撫按官舉劾將官章疏無不隨手抄録以備參考然不在舉劾之列與夫兩京五府各營各衛官員姓名履歷俱各無從得知是以臣等愚見宜令該部開送揭帖二本一備進呈以便陛下省覽一存本科以便臣等查考無非共圖至公以仰副陛下知人官人之意非有他也今該部援引吏部事例以為並無開送該科殊不知兵部與吏部事體大有不侔蓋文職官員資格之用有常考核之法甚密其在京在外官員三年六年九年給由文册合于上司及部院賢否考語題本俱送吏科存照况一登科甲名姓遂彰一踐仕途才猷具見自知府以上官員臧否亷穢無不在人耳目者惟是武職員多缺少蹤迹散漫本無資格可循况都督總兵以下都司守備以上又皆以次遞遷所以易於夤緣難於選舉茍非出於至公則賢否無不倒置是以兵部用人必須外資撫按舉劾之公內資該科糾察之益是雖體統所在固亦職業相關前項揭帖正宜開送本科况事非難辨理在可從今乃詞若設難意存靳惜恐非所以開誠心布公道也再照本科職掌如守衛官軍揭帖刑科囚數揭帖俱掌科官於御前奏進况武職官員賢否專備御覽比之各項揭帖事體特重是以臣等愚見欲於御前奏進以示光明正大之意且宣揚於殿陛之前足以聳羣臣觀聽有益政體今該部秪欲具本仍從左順門進呈是使臣等皆不得與聞而本科全無關涉竊恐行之既久間以非人則異日賢否詞語可以任意增減搖手掉筆皆足為弊陛下日親萬幾何由察識該科之臣何由舉正又非所以明事體别嫌微也臣等猥以愚陋誤塵諫垣秪欲勉修職業以求無負聖明殊非好名故為多事但所進狂言既蒙俞旨今該部題覆不為未悉臣等區區愚朴之忠似非所以將順陛下聽言納善之美臣等有懷抑塞輒復開陳如蒙聖慈俯垂英監少紓睿思加察臣等所言儻不致甚乖理道有益國體萬一伏乞特降綸音今後武職官員賢否揭帖宜令兵科掌印官御前奏進該部仍開造一本送科備照實為有禆治理仍乞宣付史官著為令典臣等不勝幸甚干冒隕越俯伏俟命之至緣係乞采納愚忠以全政體事理未敢擅便謹題請旨嘉靖八年六月初十日題奉聖旨這揭帖照前旨著兵科掌印官同旨意題本進覽仍用一本送科永為定例兵部知道勘處倭冦事情以伸國威以弭後患疏照得先該巡按浙江監察御史歐珠鎮守浙江太監梁珤題為緊急夷情及夷人讐殺乘機攻劫敢行叛逆等事又該禮科都給事中等官張翀等監察御史熊蘭等及該兵部禮部節次題覆俱為前事各節奉聖旨該部知道又奉聖旨是這進貢夷人大肆狂悖圍城劫庫放火殺人拒敵官兵占據門禁逆謀顯著巡視守巡等官先事不能關防臨事不能擒捕以致奔逸入海殺死備倭官員情罪俱重本當拏解來京但有事之際且都住了俸著鎮巡官督率各官調集官兵嚴加防守設法追捕務將首惡及餘黨日下擒捕究問明白并失事官員分别等第奏來處治還通行各該備倭衙門一體防禦毋得觀望推託致誤事機其應否入貢事宜禮部看了來説又奉聖旨是宋素卿著鎮巡等官省諭就彼回還本國其餘俱依擬行又奉聖旨禮兵二部會官議了來説又奉聖旨是宋素卿及宗設夷黨都牢固監候待報發落這事情還著鎮巡等官上緊研審明白來説又奉聖旨是這地方巡視海道及府衛所寨巡捕等官正為備倭而設因循日久人多怠玩致令倭夷不畏中國法度縱橫往來殺人放火甚至戕害方面官員擾害地方事情重大著巡按御史查勘明白參了來説彼處鎮巡等官并南直𨽻巡撫都御史各督所屬用心議處設法擒捕又近該兵部總議前項事情題奉聖旨是這進貢番船進港日久各該官員不行遵照舊例上緊盤驗以致夷人在於中國地方殺人放火戕害總督備倭官員失事情重馮恩等并張芹著巡按御史提問明白奏來處治不許回護容隱賴恩雖無地方之責提督欠嚴本當究問且饒這遭著改過自新以圖後效劉錦情有可憫贈指揮使與陳亡的張鏜胡源子孫各照例襲升一級劉恩及詹尚等都量與優恤其餘俱依擬行欽此除欽遵外臣等看得前項倭冦敢於中華肆行叛逆各該地方官員先事不能防禦臨變不能勦捕漫無籌䇿坐失機宜以致荼毒生靈占據城池劫奪庫藏燔燒官府戮害將臣辱國損威莫此為大及查據前後章奏俱各事涉掩覆而言詞多遁情狃寬縱而功罪未明該部節次覆題亦不過按據來文遷就議擬雖云行勘亦主故常所以屢瀆宸聰多是曲為裁答即今因循日久未見回報不惟賞罰淹留而心懈玩抑且法令廢弛而欺蔽肆行昨見朝鮮國王李懌奏稱倭奴打攪上國至殺官兵不服天誅偷生到境仰伏皇威勦殺幾盡并將賊倭二俘首級三十顆及長箭船窗等物差刑曹參判成洗昌等賫領并將搶回人口王漾等八名管押前來獻之闕下臣等相顧動色殊覺懷慙事聞中外頗喧物議以為堂堂天朝統馭萬國而東南疆場之臣忘忽武備廢棄職守反外夷之不若方且務為掩蔽茍逃罪譴若不嚴加勘治何以示戒將來參照鎮守三司守巡重臣濫膺朝廷藩方重任不能協謀畫䇿以保障地方市舶海道備倭衙門不能遵式舊規嚴設武備以禁防禍亂寧紹府衛所寨掌印巡捕大小官員坐視夷冦縱橫來往於封域之內殺戮攻劫於旬日之久如蹈無人之境略無捍禦之方以上各官職任雖有不同俱各無所逃罪訪聞前項二起倭夷到來之時實因各官從事怠緩處置失宜釀成禍亂及至變作却又一籌不展狼狽失措貽害生靈甚至以城門之扄鑰付之賊手以日本之國號封我東庫舉火自焚舶司差官為賊鄉導閫帥墮馬而走匿民家守臣棄城而縱賊焚劫沿餘姚江呐喊殺人地方之驚擾可知抵紹興城逼令獻賊府衛之官何在且宗設所領倭夷不滿百十餘人而寧紹兩郡軍民何啻百萬今乃任彼凶殘肆意攻略畢竟無與為敵尚謂國有其人致使蕞爾島夷蔑視華夏蹂躪城郭破壞閭閻殺死都司方面質虜指揮貽國大恥事出非常中間隱匿事情得於道路傳聞未易悉舉及查得指揮馮恩奏詞亦曰其間情節隱礙尚多不敢盡露今若止令鎮巡官查勘回奏竊恐上悮朝廷事機下貽地方災害法令幾於不振功罪終是不明况巡按御史當時倉卒聞奏稽察未精鎮守等官身負罪愆豈肯吐實臣等夙夜思慮實懷隱憂伏望皇上軫念海隅蒼生罹此凶變兼係裔夷猾夏事關國紀特遣近臣素有風力才望者一員領敕前去寧波府地方逐一查勘前項失事緣由明白分别功罪等第參詳奏來然後重行誅賞大明黜陟庶人心以定國威以伸而四方邊徼皆聞風知所警且懼矣載照宋素卿本寧波人背棄中國潛從外夷正本朝叛賊法所必誅正德年間勾引外夷俱來入貢事已敗露將置重典乃以金寶厚賂逆瑾夤緣特旨幸逭天刑今次復因此人激成宗設之變訪聞宗設倭船先到而盤貨在後素卿倭船後到而盤貨獲先宗設內已不平及市舶太監置酒命坐又以宗設席次抑置素卿之下其心愈加懷憤構此禍端實為戎首若不明正典刑梟首海濵則將來射利效尤之徒習為謀叛靡所禁絶伏望特敕兵部將今次朝鮮國執獻賊倭中林望古多羅二名遵照明旨送都察院譯審明白案候仍將二倭押發浙江解赴欽差官處令與宋素卿對鞫前項構禍緣由及彼國差遣先後并勘合真偽來歷具招奏聞一同處治其宋素卿并宗設黨與見在監候者中間審有中國從叛之人俱各一體梟斬示衆仍要拘審鄉鄰里老人等根查宋素卿本宗及平日知情與彼交通貿易或為嚮導姦細之人鞫問情真照依律例問擬奏聞從重禁治以杜後患其餘審無他情上請聖裁合無編發不近海道邊方散布安插決不可放令返國使逺夷知我虛實引惹邊患遺禍無窮再照臣等旁考載籍日本在東海之中古稱倭奴漢魏以來已通中國其地度與會稽臨海相望在勝國時許其互市乃至四明沿海而來艨艟數十戈矛森具出其重貨與中國人貿易即不滿所欲則燔焫城郭抄掠居民往往為海邊舟郡之害我祖宗灼見其情故痛絶之開國之初八荒向風四夷賔服雖西北徑敵亦皆安靜惟是倭奴時或犯我海道用是於山東淮浙閩廣沿海去處多設衛所以為備禦後復委都指揮一員統其屬衛摘撥官軍以備倭為名操習戰船時出海道嚴加隄備近年又增設海道兵備副使一員專督可謂防範周且密矣是以數十年來彼知我有備不復犯邊奈何邇來事久而弊法玩而弛前項備倭衙門官員徒擁虛名略無實效寧波係倭夷常年入貢之路法制尚存猶且敗事其諸沿海去處因襲日久廢弛尤甚乃者宗設作亂大肆叛逆竟得揚帆入海而去該部題奉欽依通行各處備倭衙門一體防禦及責令緝捕務在得獲亦復徒具文移何曾著實修舉伏乞特敕兵部議擬合無選差官員領敕前去由山東循淮揚歷浙達閩以極於廣會同巡撫官員按部備倭衙門親歷海道地方查照原設官軍閲視舊額墩堡盤驗見在兵器官軍缺乏者即與撥補墩堡圮壞者即與修築兵器朽鈍者即與換給官員之不才者即與易置法制之未備者即時區畫庶使海防嚴謹中土奠安可以防海堧不測之虞可以壯國家全盛之勢矣再照海外諸夷國名載諸皇明祖訓者凡十有五而日本與焉其下注曰日本雖朝貢暗通姦臣謀為不軌故絶之及嘗觀本朝吏部侍郎楊守陳家藏文集亦復惓惓以倭夷變詐凶虐時以刀扇小物褻瀆天朝規牟大利不當與之通好觀於今日之事則皇祖貽謀萬代如見而儒臣論事後世足徵其應否通貢絶約事宜關係重大臣等未敢擅議乞俟查明奏報之日禮部奏請敕下勳戚文武大臣及在廷羣臣詳加會議上請定奪其羈留編管夷人各待彼國嗣有遣使到來然後明降詔旨切責一併另議處分及照朝鮮國送來被搶人口王漾等八名雖審有鄉貫來歷亦恐或係潛從外夷之人合無解回本處官司審有的確方發落寧家又查得近日福建市舶太監趙誠奏稱有海上夷人數十遭風漂船奔逃海岸乞食被獲即今日逐關給口糧撥軍防守亦欲伺便放歸本國臣等竊料此屬恐是宗設餘黨竄逸到彼乞敕兵部查行都察院將倭賊中林望古多羅譯審責令供報宗設手下據其所知夷黨姓名若干却將福建見獲夷名比對倘有一二相同即係宗設之黨無疑則當解赴浙江以慿查勘若其非是乞敕兵部亟行福建鎮巡三司及市舶衙門將前項收獲夷人亦要以宗設作亂事情會官嚴加審譯或將一二用刑拷鞫蓋夷情譎詐叵測未可輕信務得真情從長酌處不許輕易縱放别有規避其各該地方官員失於瞭報俱合作急查提問罪會議回報再照宗設犯華之罪不可使之竟脫天誅况此賊搶虜中國船隻不任風濤未能返國必且出沒海陬掩我不備決有侵犯剽劫之虞尤乞通敕沿海各處備倭衙門整搠官兵修理戰艦習占風候時出海洋瞭捕務俾罪人斯得國威以伸而聖天子日月之明雷霆之令真足以照臨八表震讋萬方矣請設文武重臣勦除凶悖以宣國威以靖地方疏近該巡按浙江監察御史王化題為地方事據溫州府知府丁瓚呈稱磐石衛逃役軍四百餘名各披甲持刃搖旗呐喊擁入館頭地方將主簿吳永縛執軍中通判粟廷用逼脅踰垣存亡未見言説還我扣支月糧方肯退兵本府隨即動取官銀三千餘兩給領該衛各軍尚未退休等因又據浙江按察司水利僉事江良材呈稱常州府江隂縣賊首侯仲金等羣聚數百人連艘數十隻劫奪民財敵殺金壇等縣官兵二百有餘將主簿梁瑾支解其尸百户任臣殺投於水賊首雖已就擒人心尚未見定及參劾鎮江府知府劉可同知徐萬璧欲先行降調等因題奉聖旨吏部知道欽此昨該兵部參照覆題奉聖旨是這各該地方賊情并逃軍致變事情依擬行直𨽻巡按御史將失事緣由及有功罪人員逐一作急勘明奏報仍行巡江都御史嚴督各該府衛守備巡捕巡司等官上緊設法併力緝捕再有似前怠慢坐視撫按官著實指名參究來説及行浙江巡按御史公同三司掌印守巡等官從公查勘磐石衛逃軍因何致變中間必有主謀倡率之人務要俟訪的實擒拿到官追問不許一槩濫及無辜其守巡府縣掌印管糧備倭把總等有無激變通同情由亦要追究明白一併具奏定奪欽此續又該巡按浙江監察御史張問行為海賊虜掠地方事題稱據溫州府呈據蒲岐千户所報嘉靖八年四月初八等日賊船三百餘人上岸虜掠人財放火燒房又有賊船十四隻約五百餘賊登岸殺死民兵方露等十四名口燒死男子陳玩一名殺傷男子孔璉等五名被虜男婦汪濟等四十九名燒燬房屋二百三十餘間鹽厰七十五間官軍對敵傷損二十餘人銃傷軍人一名趙亞中及參劾海道副使傅鑰指揮胡璉曹鸞俱合戒飭提問等因奉聖旨都察院知道欽此臣等竊謂前項三事併起一時關係甚大漸不可長誠宜上厪廟謨重煩區畫以振國法以安人心以防意外將來之患不當視為泛常祗降督責之旨徒移查勘之文而已也往年甘肅大同之變適因首先處置失宜而效尤者薦起山東河南流賊之禍亦因小警不戒釀成大盜至今國法損於邊陲而隱憂尚在中原疲於戰鬭而重困未蘇此皆前日執政大臣謀國術疏往轍可監貽憂宗社言之痛心今日之事以臣觀之憂方大耳矧惟聖明在御仁覆如天英斷若神宜乎威德丕冒四方咸服以坐致太平而守土任事之臣不能仰副勵精重益頽靡今乃叛卒逞凶於海嶠姦民弄兵於江洋且浙江為天下首省號聲名文物之都當東南財賦之半鎮江常州又江淮之因喉留都之甸服使浙東之士卒且叛則四方荒徼之逺何以制之江洋之賊不除則南京根本之地不免搖動又况儀真瓜洲為漕運之門户朝貢之通衢使此賊益熾則大江南北不得安枕而沿江州郡先受其敝福建經兩藩軍變之後江西當逆藩甫靖之餘實與溫州接境况近嵗水旱相仍各省存留錢糧大率蠲豁官軍月糧豈能盡數追徵依期支放若此風不息則相率為亂皆得為辭禍變相仍何所底止此臣等所以獨抱厝火積薪之憂而不敢不昧死為陛下言也切照東南都會莫巨於浙南連大海北控長江領府十一置衛十六田賦物産之富甲於天下惟是百餘年來武備廢弛民不知兵雖有海道兵備副使備倭都指揮等官秪是徒擁虛名不見修舉實效嘉靖二年倭夷入貢自相讐殺因而封閉城門燔燒官廨抄掠鄉村殺害都指揮等官橫行於寧紹二府所在奔避若踏無人之境而本處鎮巡三司守巡及府衛巡捕大小等官束手無䇿竟不能擒捕一人乃縱其奪港乘風以去後因漂泊朝鮮國中始被捕獲國王遣刑曹參判成洗昌押發前來獻俘闕下臣言時為給事中深以堂堂天朝而疆場之臣廢棄職守反外夷之不若因上疏論劾鎮巡以下等官蒙差給事中前去勘處庶幾國典少伸今者磐石衛逃軍之變在法尤為難容夫溫州乃瀕海魚鹽之區生理豐裕前項衛分安處海濵軍士坐食月糧苦無征調比之西北邊士困苦危辱相去何啻百倍有司因其逃役扣除月糧事必有據縱有屈抑豈無上官可以控訴何至擁衆稱兵縛官執吏敢負國家素養之恩自陷叛逆之罪有司官員不幸遇事但當開諭禍福宣布恩威自當禁戢何至輒動府庫官銀三千餘兩與之解和此等舉錯大是乖舛長亂滋姦損重傷體殊非所以令衆庶見也今又加以海賊犯我邊防殺人放火猖獗殊甚想像事體更費支吾及今朝廷不重加處置誠恐法度漸隳則地方將來恐有不可收拾之患臣愚欲乞陛下裁察查照先年事例添設巡視浙江等處都御史一員奉敕前去假以督軍重權兼制鄰境將磐石衛叛軍事情務要體勘明白將主首倡亂之人亟加顯戮以正憲典不得有所姑息容隱仍令設法勦除海冦一應地方興革重務付之整理所貴必為百年無事之計以分九重南顧之憂再照鎮江等處江洋之賊本皆鹽徒賊首侯仲金等即係鎮江先年叛賊施天泰餘黨訪得近年秪因官鹽法壞私鹽盛行濵海姦民始則違法射利繼而乘勢行劫昨因官兵討捕未盡遂致大肆跳梁今則支解命吏殺害武臣凶暴慘酷罪不容誅訪得前項賊船專一裝載私鹽盛陳兵甲起自海口狼山由鎮江儀真上至南京蕪湖九江逺抵江西湖廣大江數千里之內沿洄上下縱橫出沒隨在停泊略無畏忌而沿江兵力單弱全無備禦莫敢誰何近該巡撫都御史孫修奏稱擒獲陳表等一百九十餘名止遺侯仲金等可以刻期捕絶臣等當時訪聞亦謂失實今幾何時旋復猖獗所據賊殺金壇等縣官兵二百餘名殺害主簿百户則前項賊徒聲勢重大卒難殄除今又奏稱賊首已獲臣未敢據此為真所慮此賊延蔓不已決裂四出則江淮道梗農畝失業甚非國家之福為今之計必須涖以大將壓以重兵庶幾勦捕可望盡絶臣愚欲乞陛下裁察專設鎮守江淮總兵官一員於瀕江緊要處所駐劄凡沿江守備備倭等官俱聽節制仍令會同操江及各該巡撫都御史調集江南北各衛所官軍民兵互相䇿應先將前項賊徒務要勦滅盡絶嚴限奏聞庶幾事有專責而巨盜可彌如蒙聖明采納乞敕吏兵二部亟加詳議於都御史則慎擇中外臣僚通達治體具文武才略者一人往膺巡視之任於總兵官則會舉南北武臣謀勇兼資諳練江防海道者一人付以專征之責則事變可以濳消軍民得以安堵且使四方知朝廷施為注措越出尋常實為宗社之幸臣等備員近臣兹事繫安危不敢默默伏望聖慈特賜英斷緣係請設文武重臣勦除凶悖以宣國威以靖地方事理未敢擅便謹題請旨奉聖旨這所言説的是都依擬行吏兵二部便會官推舉素有才望謀勇的文武大臣各兩三員來看軍伍之制一丘濬臣嘗因漢唐宋之軍制而論之漢之材官踵秦而置唐之府兵沿隋而立宋人監五代之失而萃兵京師然亦多因其舊本朝雖接元之後而未嘗因元之舊是何也元起朔漠兵制簡略不可為法故也我祖宗得國之初在內設錦衣等上十二衛以衛宫禁設留守等四十八衛以衛京城上十二衛為親軍指揮使司番上宿衛無所𨽻屬而京城之衛屬五軍都督府遇有征行則調發之今天下都指揮使司凡十六處而為行都司者四近又於湖廣添一行司為五焉內外衛凡若干處其所設軍士俱有定數大率以五千五百名為一衛一千一百一十二名為一千户所一百一十二名為一百户所衛分軍數或有多寡而千百户所統則一每一百户所內總旗二名小旗十名管領鈐束以成隊伍此則本朝軍伍之制也竊考歷代兵制前後多有變更加減惟今日立制一定百世不易蓋前代之制多因勝國之舊或臨時制宜或因時救弊往往皆出有司之處置臣子之建請惟我聖祖久歷戎行洞燭古今之利病斷自宸衷制為畫一之法可以經久遵行萬世無弊故自開國至今百有餘年矣聖子神孫恪守成規以為宗社不拔之基其間固有軍伍懸空之處將領積多之患惟在設法填補調停之則盡善矣軍伍之制二丘濬臣按蘇軾之䇿於漢唐宋兵制之得失瞭然明白就其三者而論之宋之禁軍不如漢之踐更漢之踐更不如唐之府兵三代之制不可遽復必欲復古之漸以壯國勢以省國費皆莫若唐府兵之盡善焉然唐行之未百年而中變者何也蓋府兵之制無事則番上宿衛京師有事則調發出征四逺雖曰寓兵於農暇則耕稼然軍府雜郡縣之中士卒混編氓之內其他徭役科征未能盡蠲况又承平日久兵政廢弛番易更代多不以時非法徵求分外驅役此其立制非不善而其行之既久終不能以無弊也設使當時知其弊之所在補其罅舉其偏而振其所廢墜雖至今存可也惟今聖朝建國幽燕直𨽻八府之地蓋古幽冀之域也杜牧所謂山東河北王不得不王霸不得不霸之所其人沈鷙多材力重許可耐辛苦敦五種本兵矢他不能蕩者復産健馬下者日馳二百里所以兵常甲天下唐自天寶末失此地其後罄天下之力以經營之不能得其尺寸人望之若回鶻吐蕃無有敢窺者必欲使生人無事其要先去兵不得山東兵不可去是兵殺人無有已也由牧此言觀之則今日京畿之形勝物力天下莫敵焉可知已彼區區叛將以逆犯順茍得地之形便尚敢以拒王師况居萬乘之尊有萬方之衆而又據形勢之便者哉文皇建都於此餘六十年矣承平日久民不知兵武備不無少弛往時一衛以五千六百名為率今一衛有僅及其半者甚則什無二三焉朝廷非不時加整飭嵗遣御史分部清勾而法司亦往往謫有罪者戍邊然終不能復國初之舊臣愚過為逺慮切恐自兹以後日甚一日失今不圖恐後愈難於今矣請於國家常制之外於京畿之中别為寓兵之法用唐人之意而不泥其故迹因今日之便而不變其常制不識可乎請試言之今京畿八府其順天保定真定河間永平五府實居輦轂之下所轄十七州八十九縣若見丁盡以為兵可得四五十萬使今日京輔之間有此徑兵則國勢自尊國威自壯視彼列屯坐食之衆遊手豢養之徒蓋有間矣萬一臣言有可採者請敕大臣集議若於舊制無礙治體有益民情不拂即委有心計知治體之臣專主其事講求利害的然有利而無害然後見之施行每縣因其原設里社制為隊伍一以所居就産為定里社丁户有不足者移其少而就多使之整然有定數每一里百户分為二隊伍十名立一總甲視軍衛總旗又合十隊為一都甲視軍衛千百户而屬之州縣州縣屬之府其十年輪當里甲咸仍舊焉凡民差役如皂𨽻柴夫等類科派如嵗辦和買等類一切蠲除之嵗惟養馬納糧二事他賦役皆無與焉其民籍十年一造如舊例其兵籍每嵗春秋一造籍不以户而以丁丁以二為一單丁則合諸他每丁自備軍裝器械如軍伍制有司嵗時閲視有不如度及頓壞者易之民年二十二附籍五十八免役尫羸篤廢者除其名秋糧量減其額或三而去其一或五而取其三兵不番戍糧不調運嵗十月上其籍於兵部五郡謂順天等五府之兵分屬五軍州縣各為教場月一點操之每府又闢平衍地為一大教場孟冬農隙兵部奏遣該府都督一員帶領將帥於此召集民兵依京場操練分命御史監督之而糾其不如法者兵部遣官校馬政工部遣官閲兵器事竣各具實開奏遇有征行按籍起調又見京輔之屯條所謂養馬之政計村莊有民居五十家以上者立一馬廏不及數者合諸其鄰每三丁備一種馬俗所謂騍馬併力養之晝則分牧夜則合飼擇其中有物力材幹之人立為羣長每春種時督其民計丁種粟取稈種豆取料至秋成時按畝以收預為倉場積草料於近廏之地以為牧養之費民無地者官給之凡境中原額草場為勢家奏取為莊田者一切查一理還官分給於民非但養馬兼蓄驢騾以為駕馬運遞之用孳生之馬有壯健者印烙畢即俵散壯丁俾其騎操官時點視有疲損者罪其人如此則國家不徒得兵而且有馬矣詳見牧馬之政條或曰五郡切近京師應內外百需所出百役所萃今一切罷免從何措注請下各部查勘順天等五府每嵗夫役若干物料若干通計該費若干然後行下户部計算天下秋糧夏稅鹽鈔坑冶課程等項名色之數嵗入凡幾何舊積凡幾何經費之外預備之餘酌量多寡足備無缺其有羡餘者别為收貯以為此五郡雇役之直買物之費凡此五郡常年合用夫役官為計工定直出此錢雇間民以代之當凡此五郡每嵗合辦物料官為先事計算出此錢隨時估以代之售如此不徒寬民力以足兵備亦可以收市井遊惰之民而官府所需之物皆得實用不多科擾民矣然則國計僅足不能用餘則如之何曰設法措置隨時通融損有餘以補之捐不急以足之大約計順天一府一嵗所費不過用二十萬其餘每府不過十萬或五七萬耳土宇之廣民物之衆國家嵗入夏秋稅糧見今二千六百二十三萬餘其他鹽糧課鈔亦不下千萬之數捐此五六十萬之資以寬今日畿甸之民以復古人府兵之制以壯國勢以張國威內以固京師外以懾夷狄其於國計亦無大損或曰昔宋韓琦刺民兵於陜西亦謂得唐府兵法而司馬光六上章以為不便其後不十年果以之運糧大為民害皆如光所言切恐既籍民為兵之後而州縣科差如故既受有司之役又有征戍之苦民愈不堪也臣為此議惟仍州縣之舊而不屬之軍衛所謂點操者月惟一行非若宋人保甲之頻數也農隙教戰朝委將帥惟於冬月一行必與御史俱焉兵不番上糧不調運惟於三時農事之隙開通溝洫築堤引水以備旱潦或修築京城以為急切之備或轉運京儲以實近邊之缺除此之外不許他役有他役者必坐以罪况此五郡之民差役繁重不聊生也甚矣一旦得此優間如出湯火以就清爽之地上戴國恩淪肌浹髓其歡欣鼓舞銘刻思報為何如哉此法非但可以足兵亦可以省費內可以壯中國之勢外可以懾外夷之心立法既定行之久而成俗隨時制宜補偏起廢又有待於他日之良臣賢輔焉修舉團營事宜疏王廷相臣等切惟蓄威昭德人主之大權居重馭輕立國之至計仰惟京師宸居所在實諸夏之根本為四海之會極使無宅中制外之形焉享久安長治之福洪惟我太宗文皇帝遷都之後京師置七十二衛所約官軍不下三十餘萬畿內置五十餘衛所約官軍不下三十餘萬以外言之括諸邊之兵不能過此數以腹裏言之括諸省之兵不能過此數聖慮神謀超唐軼漢其為居重馭輕之圖深哉邈矣而不可加也但承平既久兵政日弛尺籍雖存而逃亡罔稽營伍雖具而兵馬欠精是以卒兩大減於國初之額時而逆盜竊發反藉力於邊方之卒居重馭輕厥勢安在言及於此誠可寒心臣等猥以庸愚專兹營務夙夜惕厲恐負重託謹以在營切要三事會同太監麥看議得卒必精健而後兵可強故論選軍馬必臕壯而後戰可力故論惜馬兵強馬力使不置以操練之法則武藝不間戰鬭有怯亦不堪於用矣故論訓練伏乞敕下該部議處將軍馬錢糧通作一家計算勿忌夫事權之不一勿拘夫事例之不合惟在劑量事情斟酌時措要於武備修舉足為國家經久之畫再行具奏上請定奪營務幸甚臣等幸甚緣係修營務以振武備事理未敢擅便謹題請旨一選軍臣等伏覩大明會典營操事例節開永樂初立五軍營又有三千營以司寶纛令旗神機營以司神鎗火器是為三大營又於中都大寧山東河南附近衛所摘撥官軍輪班上操以內衛京師外備四方征伐俱屬五軍營操練景泰初選三大營精鋭官軍分立十營團操以備警急調用是為團營每營官軍一萬員名至成化三年復分為十二營共該官軍十二萬員名又查得𢎞治十三年十月內為選軍給馬預修武備以防外患事該兵部題查得初選團營之時京衛八萬其外衛分為兩班每班四萬連京衛八萬共一十二萬其三大營內外揀存官軍之數不與焉臣等會看得即今團營內外官軍雖有十二萬之數而京衛撥去捕盜已該五千六百員名外衛撥去各處做工及拽木等項常不下二萬有零雖云暫時借用而營伍終年空缺其見操者中間老弱疲羸不能執兵習藝者甚衆校閲之際已不堪觀脫有緊急邊情調遣又安望其投石超距奮勇以禦敵哉及今若不早為設法精選終是虛應故事徒糜糧餉於兵無益臣等以為營伍不能充實軍士不能精練其大要有三軍無定用一也替役之難二也隱避之姦三也何謂軍無定用夫軍欲戰勝攻取須平日養其鋭氣精於武藝不以雜役奪其操練斯志一事專奮發果敢直前無敵矣今團營軍士派之雜差撥之做工留之拽木終嵗不得入操困苦以勞其身而敵愾之氣縮畚鍤以奪其習而弓馬之藝疏雖有團營聽征之名實與田畝市井之夫無異欲其戰勝攻取以張皇威夫何敢望何謂替役之難軍士類多貧下吏胥無賄不行文書到衛衛吏刁難文書到司司吏掯勒縱是真正子姪亦須用財打點方保無事貧者度日尚難安能辦此是以終年纍月老弱在營茍且應役而精壯子弟不得收操矣何謂隱避之姦團營軍士皆是大營挑選壯丁以聽征者先年多有富實姦猾之徒畏懼營操出征之苦買求該管人員作為不堪之數揀存本營未曾選出貧者不能營幹而常川操練富者終嵗安間得以躲閃由斯三者軍士之所以不精也臣等伏乞敕下兵部通行議處差委本部驗軍官會同點軍科道官員將三大營並團營官軍查照各衛真正户口文册一一挑選委果年力精壯者方許留在團營中間老病尫羸體貌委瑣不堪教練者盡行選退有少壯子姪者即時摘牌替役無子姪者發回三大營其年老有疾逃故為事久不回營等項子男弟姪亦要查出照册從公揀選但係年力精壯武藝頗習在册有名及先年欺隱不入册者即與收補其外衛兩班輪操官軍上班之時亦照例㨂選仍查照先年團營額數內衛外衛共輳一十六萬備造年貌籍貫文册收照不許各衛擅自更替果有事故方與另補各營操演教習武藝專備聽征之用其團營雜項差役併各處做工拽木等項止許於三大營揀存數內撥用仍查照𢎞治十一年十月內兵部為修武備以壯國威事題準事例團營軍士並不得差撥如此則軍皆精壯而威武無不振之患矣一惜馬照得團營馬匹乃朝廷武備大計所關軍士領養之後多致瘦損倒死此馬出自小民膏脂今處之輕如草芥誠為可惜臣等會看得馬之瘦死其故有三草料不足一也給領失宜二也餧養無法三也何謂草料不足查得團營馬匹有曰存操者自四月起至九月終止有料無草有曰下場者自四月起至九月終止無料無草惟十月入操之後至三月終止二項之馬俱有料而所給之草又俱止三箇月以一年計之存操之馬俱有料而無草者九箇月似料彀而草不足下場之馬止得半年之料而無草亦九箇月似草與料皆為不足夫馬給於官非著已之物自備草料乃切身之苦雖得過軍士猶不肯陪錢以養馬况貧難之軍自給不暇安能念及於公家之畜哉無怪乎在營之馬日惟飢瘦而多斃矣此情甚真此理甚明無難知者而該部每以舊例止之夫法難執一事有時措祖宗以來諸司之例隨時而變者亦多矣即如下場之馬𢎞治以前尚隨場牧放今草場半為田畝而民間納租銀矣營馬隨便牧放而軍士不出京城矣其牧馬之資非軍士自備而何所出哉此時猶執下場採青之例豈非名實相背而近於膠柱之政乎官以非事例而不肯給軍以非著已而不肯賠則夫無所足食之馬惟曰俟其斃而已則馬之為命豈不寃哉且一馬之價小民解俵到京所費無慮三四十兩而乃吝此數月草料以致瘦死是所惜者一倍之利而所失者數十倍之多豈非顛越之算蓋以掌馬者權不及財掌財者意不急馬各競其職以為勝故如是耳使通作一家幹事則草料馬匹皆切已之物必酌事體之輕重分别利害之多寡而行之豈肯惜些小草料之費而致傷數十兩之多之馬哉伏乞敕下户部再行計處合無將存操馬匹再添三箇月之草按月給籌半根六箇月共十二根下場馬匹再添六箇月之料三箇月之草通融放給亦可彀一年之用再照兵部團營草場乃為牧馬而設今所收租銀以之養馬乃為本等今則牧貯太僕寺為買馬之用似為不倫且自嘉靖七年題準之後至嘉靖十二年共該六年每年租銀八千四百五十六兩三分八釐二絲六年共該五萬七百三十六兩二錢二分九釐二絲至今並無分毫徵解到寺豈非怠緩乾沒重傷國課乎合無兵部再行計處今後草場租銀該部定委廉能官員會同州縣官依期徵收完日通解户部以備營馬草料不敷之用臣等又查得薊霸二州牧馬未開地土薊州尚有地七百二十三頃九十七畝五分霸州尚有地五千二百四十頃二畝二分四釐四毫五絲若再通行召民佃納每畝照舊收租銀三分二項一年共該租銀二萬六千三百四十八兩六錢三分三釐二絲通為給軍養馬之數亦足以助户部料草之費似為便宜何謂給領失宜軍士家道頗過則住居必有房屋付之養馬草料必不短少頓置必不暴露今各營軍士家道得過者以領馬為纍賄賂人情百方買脫僥幸差撥務取輕間富者既不領馬所領必及於貧此等貧軍賃房而居待糧而食賃房則馬必無栖止而露地以居露居則雨雪之來無以遮蔽而馬苦矣待糧則食必無餘而自養不足不足則草料之資反以養人而馬飢矣馬苦而飢欲其不瘦損而斃也得乎合無兵部再行計處差官會同點軍科道官將三大營並團營軍士從公查審但係得過之家通行審出將賃房貧軍所領之馬一一交與領養如此庶馬皆得所不致損傷以為便宜何謂餧養無法軍士關出草料散在各處從其自養莫能查稽中間畏法之人愛惜馬匹餧以實草實料其馬始終臕壯無他病損有等姦頑之徒未關本色則已賣籌於人關到折色徒為自食之具而馬惟啖以酒糟切以酒糟性熱而味惡性熱則能生瘡而傷氣味惡則不作臕而損力雖強壯之馬數月之後即致羸病不堪騎操甚者不能食糟因之而斃雖有比較肥瘦之令終無以察其草料之實若不制以餧養之法終莫能救其害馬之弊臣等查得在營每一把總下所屬之馬有百匹者有七八十匹者中間有上臕者有中臕者有無臕者除上臕中臕聽其自養不計外其無臕之馬合無兵部再行點軍科道等官盡行揀出馬留在家調養軍仍赴營操練每一把總下各會集一處或街或巷或空地每日申酉二時把總官親至其處一一點視皆以熟料細草餧之餧畢各散臣等亦不時差人驗視夜間聽其自養一兩月之後點軍科道官驗有臕息者免其會餧其有臕自養者科道官仍行嚴禁不得餧以酒糟若被地方兩鄰告發或在營驗出皆送法司問罪如此則瘦馬有處而軍士知警以為便宜再照聽征馬匹雖大邊情調遣多不過二萬之數再有萬匹存營操守亦足彀用倘事勢緊急猶有各州縣寄養備用馬匹二萬鄰近易取若軍士堪養馬者數少亦不必濫給合無兵部再行計處將團營聽征馬匹擬為定數若干每遇事故倒失五百匹以上行太僕寺兑給一次以為常規如此不但愛惜馬匹性命而户部草料之費亦可以節省矣一訓練古語云教士三萬橫行天下故齊桓有節制之兵秦之鋭士不敢當嶽飛五百背嵬之軍烏珠巨萬不能敵由是觀之兵必教成而後可以勝敵矣使士馬精壯而武藝不熟則臨敵無可恃之能對壘乏敢戰之氣安望其出竒致勝以禦侮哉此訓練之法所不可缺也臣等會看得團營操練舊規除下營走陳法度整齊進退可觀旗幟金鼓號令俱有節制及纍年在營舊軍武藝頗習堪備征調無議外但今新選之後與各營新補户丁皆係未曾操練軍士其數尚多若不嚴立賞罰時加比較揀選雖精徒為無用查得大明會典載有教練軍士之法凡騎卒必善騎射及鎗刀步卒必善弓弩及鎗刀凡射十二箭六箭逺可到近可中者為試中逺可到以一百二十步近可中以五十步凡用鎗刀以進退習熟為試中臣等以為自今以後各營該操五日之內三日教習二日操演教習之日不得仍舊射箭九回落旗而散各該把總管隊等官督令各色馬步教師一一指授方法如何挽弓如何發矢如何馳馬如何滚刀戈矛牌銃無不教習以多為能不拘回數黎明從事辰未方散不中式者當時責治治已再教務使合式乃巳此後二日操演調隊比較仍依舊規夫教習不倦則藝騎精趫藝騎精趫則膽氣增倍膽氣增倍則遇敵不懼遇敵不懼則能以少擊衆以精制強更以諳曉韜略之將御之則或正或竒隨所頥指呼吸變化動中機宜又何敵有不克者哉其號頭把總管隊等官督教一年之外臣等會同兵部堂上官試驗以其所管軍士試中為率不治六分以上者奏請罰治其試中軍士算及八分以上者公同會舉升賞推用每二年一次舉行如此庶營操著實而兵皆練習可用矣戰陳之法丘濬臣按西漢會稽郡治在今蘇州則吳之海舟可通閩久矣臣嘗因是而通考天下之海道觀秦運負海粟以給北邊及吳徐承帥舟師將自海道入齊漢武伐東越亦自會稽以舟師入閩則燕可至齊齊可至吳吳可至閩蓋自秦以前則已通行矣然吳既可至閩閩之至廣尤易易然臣於制國用條嘗請復元人海運今日誠能用軍三四萬人舟四五千艘由海道漕運因而教以水戰則東可以制朝鮮南可以制交址噫當元盛時而知為此備則張士誠方國珍豈敢稱亂哉惜乎當時惟以運糧而不習水戰簡閲之教丘濬臣按教閲之法備於周禮在春夏有振旅茇舍之制在秋冬有治兵大閲之制中春振旅王執路鼓中秋治兵王載太常蓋一嵗四嵗之教天子再臨焉文武無二道六禮之中軍居其一我國家凡百禮制皆古典獨於軍禮所謂簡衆講武者缺焉嵗時雖有教閲然止是命將肄習坐作進退之節而車駕不親臨請下禮官講究周禮及漢唐宋遺制本開元禮儀注而增損之以為一代講武之禮每嵗冬月一行以復古禮以講武事以作士氣以備一代之制論將才李堂國家制兵有三曰京營曰外衛曰邊兵而統領成功則在乎將將者三軍之司命也承平日久內恬外嬉京營之團哨外衛之操直邊兵之戰守咸以防變禦侮而已然蠻夷冦賊不免為憂而四邉之患北人為劇自遼陽至關陜西北三邊屯聚宿兵重將者亘數千里常敵隨宜䇿應爾敵重勢勍則請京兵以益之蓋居重馭輕統屬相應也然亦有內變不足而動京軍京軍不支而調邊兵者非為兵有定制將乏實才乎軍政簡推臺省保舉司馬考核詳且精矣近年武舉設科參合格例而彚萃其全凡京外邊圉衛所武軍官生襟珮騎辨之士克稱行止操為吏能文藝才業勇略者兼舉無遺中式官生遞遷直至將帥真昭代之竒會也又何加哉然腹裏之弱邊疆之精固非異其人也習惰與簡練不同爾誠使操之於邊圉用之於內地激懦起孱使惰者間而怯者奮非將才之儲乎近年流賊之變擾郡邑動京師無城者奔有城者棄衛軍倒刃京軍披靡至調邊將統邊兵追逐嵗月而後幸捷焉良可慮矣正德初科執議者有見於此以武舉中式官生送邊操備將揚歷其才試以績效而後用之非無謂也而或者謂其情出於私遂尼不行茍以公心行公制又何議哉論時政書何喬新去嵗周僉憲回承寄蓍草今秋歐陽知縣來又辱華翰僕逺宦炎荒無足齒録而閣下惓惓不遐遺非篤於同年同鄉之誼克爾耶僕居閩五年矣德薄材劣無禆聖時殊以為愧而來書奬譽太過益增慙靦八閩自沙尤之變以來民桀驁下陵上賤犯貴相帥成風而強宗大族依慿城社暴橫尤甚蓋吾江右所無也郡縣吏寧違上司之令而不敢違勢家一言以為上司不過督責勢家能陷以重罪故也凡為政者脂韋媕婀輒得美譽不再嵗而遷否則怨誹紛紛或因以得罪僕不能隨俗浮沈一切繩之以法桀驁之風雖少戢已不勝謗讟矣然謗與譽奚足恤哉僕之所慮有大於此者焉天下日入於弊而未知所以救之之方此大可慮也我朝懲前代藩鎮之弊以都司典兵布政司理民按察司執法凡軍戎調發之政布按二司不得專非有符驗都司亦不聽調也夫軍所以能前却之者恃有三尺法耳一旦有事白刃臨其身厚利誘其心三尺法能制之耶愚以為宜稍變舊制特詔布政使按察使兼典戎政而妙選勇略素著者為都指揮使少寬擅興之法緩急調發二司得以專之不由中制庶可以防患於未然宜救尾大不掉之弊焉古之善觀國者不觀其國勢之強弱而觀其用人之賢否今之用人賢歟否歟愚不能知但見升一官進一秩士論輒譁然曰某以親舊當道而得之或曰某以通書政府而得之或曰某以納賄權門而得之僕始聞之以為人言不可信徐而察之巧宦者率皆超擢自守者往往淪棄亦不能不信也夫平居之時既徇利以進身多事之秋肯捐身以報國乎不待智者可知也愚切謂當崇奬恬退之士抑逺奔競之徒以共振名教於風頺俗靡之際夫知人固未易大抵剛介寡合者君子也善柔易親者小人也於此察之十得七八矣果君子歟拔而用之不必親也不必故也不必識其面也果小人歟黜而退之親不可昵也讐不可避也羣言交屬不可徇也如此處之庶幾有招之不來麾之不去之士出焉此二者時弊之大者也閣下官為學士職號論思時政之孰得孰失人材之孰賢孰否知之素矣經筵進講之餘宜從容陳之使天下隂受其賜可也昔歐陽永叔司馬君實為翰林學士所論奏者豈徒發揮經義而已哉舍二公而他取法焉非僕所望於閣下也尊兄少保先生實秉國鈞古人有政將及子可不預慮而熟圖之邪閣下試觀今日治歟否歟在廷者孰為李綱張浚歟居方面者孰為宗澤張所歟緩急可倚者誰歟臨難不易節者誰歟茍此數者未有其人抱火積薪殆未足喻也乞留意焉狂瞽之言不識當否恃愛妄發幸乞恕之不宣京輔之屯一丘濬臣按自古建都者皆於四近之地立為輔郡所以為京師屏翰也漢以京兆左馮翊右扶風為三輔唐亦以華州同州鳯翔為輔而宋初未遑建立至於徽宗時亦於畿郡立為四輔焉每輔則屯兵二萬人為額我朝建國江南於鳯陽屯重兵凡京師軍皆散於江北滁和等處為屯田雖不名輔而儼然有蕃屏之意太宗皇帝自北平入正大統遂建都於此其初猶以行在為名而立一行部以總之其後遍立五府六部大小衙門如舊制凡京衛之兵皆分其半以來并起江南富民以實之而去其行在之名則是萬萬年不拔之基永定於此矣然而畿甸之間猶未有輔郡蓋有待也臣按漢唐宋之輔郡皆因郡治而立至今之建置則以形勝要害為固蓋漢唐都長安宋都汴梁皆去邊地遼逺非若我朝都燕則自以都城為北邊捍蔽北最近而東次之西又次之而南為最逺焉請如漢唐宋故事立為輔郡以宣府為北輔因其舊而加以藩守之軍俾守國之北門其東也以永平為輔以守松亭一帶關隘及扼遼莊要害其西也以易州為輔或真定以守紫荆一帶關隘其南則以臨清為輔坐鎮閘河而總扼河南山東之衝又自此而南屯兵于徐州以通兩京之咽喉每處屯重兵一二萬量其輕重緩急以多寡其數罷兩直𨽻河南山東上京操備班軍因近屯守以為京師之屏蔽遇京師有事則調發焉夫自古為國者必固外以蔽內居重以馭輕譬則人之家居必有藩籬墻壁然後堂室堅固內呼而外應若設關捩然有所動於中而四面之機畢應之然後盜之利吾財者不敢輕侵犯焉近年以來起調兩直𨽻河南山東軍赴京上班操備半年一替方其新班既起而舊班未回城池雖設而隊伍空缺者有之幸而無事則巳萬一有不逞之徒乘虛為亂將何以支持之倘立為輔郡因近屯守則軍士遂室家之願而生息日蕃國家省轉輸之勞而調發易集邊方足禦備之具而關隘有守如此則都城鞏固宗社奠安矣萬一臣言可采見之施行其於國計不為無補郡國之守丘濬臣按前代州兵皆無定制或以土民自守或以禁兵出屯或選自户籍或出自召募或因有警而民團結皆是因其土地之宜隨其民俗之便或多或少或廢或置不惟無常制亦無常數惟我國家自平定之初則立為衛所以護衛州縣衛必五所所必千軍而又分藩列閫以總制之而有都衛之設其後也改都衛為都指揮使司文武並用軍民相安百有餘年其視漢唐宋之制可謂大備矣然承平日久兵備不能無弛軍伍不能無缺舊制遇有缺伍衛所差旗軍於其原籍徑行勾補而其流弊乃至所勾至者反少於所遣之人得不償失於是用言者計每嵗分遣御史清勾然亦徒有其名無益於事近有建言欲稽御史所勾之數以為黜陟然亦徒害平民無益軍政臣嘗考歷代之制皆是草創之初軍伍數少而其末乃有冗濫之失惟我朝則是先多而後少何也前代之制率因一時而隨事制宜惟我聖祖則斟酌古今立為一代之制使子孫百世遵守焉方其初制為軍伍也內地多是抽丁垜集邊方多是有罪謫戍嵗月既久姦弊日滋或改換姓名或變亂版籍或潛行析户或私自分居彼此相隱上下相蒙遂至卷簿難清挨究無迹其間丁盡户絶者固亦有之而正户固在旁纍他人者亦不能無也為今之計乞敕兵部通行清理凡天下都司衛所俱要造册開具本衛州縣原設額數若干見今實在若干缺伍若干不問存亡備細開造具其籍貫及充軍緣由仍行户部行下天下布政司若府州縣亦要造册開具各州縣軍户若干見在充當者若干挨無名籍者若干彼此照對以見其實在之數其衛所見在食糧者若干缺伍不補者若干兵部類以奏聞會文武大臣集議所缺必設何法然後得軍伍足數以復國初之舊必須不拂民情而致其生怨不為民害而激其生變講明根究至再至三然後見之施行如此則僉論之中必有良法善計不徒然也夫天下之事譬如器用然有新必有舊而壞者又為之新製則其用不窮矣今日之軍伍可謂舊而壞矣失今而不為之制吾恐日甚一日積而至於無餘一旦有事而必欲用之倉卒之際其將噬臍無及矣國家大事莫大於戎國步之安危所係運祚之修短所關誠不可不加之意也彼為具臣者不為逺慮其意只欲茍具目前以貽其責於後人蓋以官非世有故也若夫聖明之主承列聖之鴻業以傳之萬萬世之聖子神孫烏可不為之逺慮哉唐人有言凡此蔡功惟斷乃成彼淮蔡之土宇一州耳固不可無斷矧此丕丕之基萬方之廣億萬年之久其所以軫當寧之深念法乾造之雄斷者又當何如哉臣不勝惓惓名臣經濟録卷四十二
