body:
  text: 名臣經濟録巻十一明黄訓編保治嘉靖謝存問疏王鏊臣竊念古之聖君賢相共成至治之隆者盖起於上下之交而近世之弊多起於上下間隔所以為上下之交其道有二一曰講學二曰親政陛下即祚以來時御經筵聖學勤矣臣愚猶過憂工夫或間斷而不洽所望清燕之間廣厦細旃之上時召文學侍從之臣從容講論凡帝王為治之大經大法日陳於前萬幾之暇惟是觀書觀書之暇静以養心則自内及外無非進學之地殷髙宗所以惟學遜志務時敏道積於厥躬者此也陛下昧爽視朝聖政勤矣臣愚猶過憂堂陛太懸絶而不親所望視朝之暇時御便殿公卿大臣侍從臺諌逐日輪對從容咨詢生民疾苦政事得失使得日陳於前揔攬乾綱不治微細接引忠賢不隔疎逺則自朝至暮無非修政之時周宣王所以早朝晏罷卒成中興之名者此也講學則聖心日明親政則聖政日修君臣上下周旋於一堂之上又安有間隔之患哉二帝三王之治可復見於令日矣聞古人雖在畎畆義不㤀君故敢輙効其愚誠不自知其言之可用與否其義則臣子事君盡心之道也惟陛下少留意焉講學篇曰國家經筵之設其盛矣乎天子自正朝輦御文華公侯九卿大臣盛服侍列羽林之士亦皆環列以聴經筵一開天下欣欣焉傳之以為希濶之典故曰其盛矣乎然一嵗之間寒暑皆歇春秋月分日不過三五日之間風雨則免政事有妨則免講之日夙具講章至期講訖綸音賜宴儼然而退上下之情未見其親且密也至於日講可謂親矣然體分猶過於嚴上有疑焉未嘗問下有見焉未嘗獻也昔傅説之告髙宗曰學於古訓乃有獲惟學遜志務時敏厥修乃來遜者遜其志如有所不能敏者敏於學如有所不逮成王訪落於羣臣曰學有緝熈于光明弼時仔肩示我顯德行緝熈者繼續而光明之示我顯徳行者冀羣臣有以開示之也商周之君其學如此之切夫人主一日萬幾固不暇如儒生學士日夜孜孜然而帝王精一之傳治天下之大經大法古今治亂之迹天人精祲之際自非遜敏緝熈亦安望其有得而今也濶畧如是暴之之日少寒之之日多傅之之人寡咻之之人衆未見其能得也且不獨商宗周成為然也漢光武雖在軍中投戈講藝息馬論道至夜分乃罷唐太宗延四方文學之士房杜褚薛輩十八人分畨直宿討論經籍或至夜分今貞觀政要與魏徴所論亦可見矣宋世賢主宮中消日惟是觀書居常禁中亦有日課翰林侍從日寓直禁中以備顧問我太祖髙皇帝甫得天下開禮賢館與宋濓劉基章溢輩日相講論其後聖學髙明詔誥天下皆出御製睿翰如飛羣臣拱視今御製文集是也仁宗皇帝臨御建𢎞文館於思善門之右文學之臣數人入直時至館中講論孝宗皇帝經筵之外毎觀永樂大典又嘗索太極圖西銘等書於宮中玩之尤嗜故學士沈度之書日臨數過夫自古帝王之學如此祖宗之學如此陛下睿哲自天春秋鼎盛講明聖學正其時也臣愚特望於便殿之側修復𢎞文館故事妙選天下文學行藝著聞者七八人更畨入直内閣大臣一人領之如先朝楊溥故事陛下萬幾有暇時造館中屏去法從特霽天威從容詢問或講經或讀史傳或論古今成敗或論民間疾苦閒則游戲翰墨雖詩文之類亦惟所好而不禁盖亦日講之義而加親焉大畧如家人父子上有疑則必問下有見則必陳日改月化有不知其然而然者時御經筵所以昭國家之盛典日造𢎞文所以崇聖學之實功如是不已則聖徳日新又新髙宗成王不得專美於前矣親政篇曰易之泰曰上下交而其志同其否曰上下不交而天下無邦盖上之情達於下下之情達於上上下一體所以為泰上之情壅閼而不得下達下之情壅閼而不得上聞上下間隔雖有國如無國矣所以為否也交則泰不交則否自古皆然而不交之弊未有如近世之甚者君臣相見止於視朝數刻上下之間章奏批答相闗接刑名法度相維持而已非獨沿襲故事亦其地勢使然何也國家常朝於奉天門未嘗一日廢可謂勤矣然堂陛懸絶威儀赫奕御史糾儀鴻臚舉不如法通政司引奏上特視之謝恩見辭惴惴而退上何嘗問一事下何嘗進一言哉此無他地勢懸絶所謂堂上逺於萬里雖欲言無由言也臣以為欲上下之交莫若復古内朝之法盖周之時有三朝庫門之外為外朝詢大臣在焉路門之外為治朝日視朝在焉路門之内曰内朝亦曰燕朝玉藻云君日出而視朝退適路寢聴政盖視朝而見羣臣所以正上下之分聴政而適路寢所以通逺近之情漢制大司馬左右前後將軍侍中散騎常侍散騎諸吏為中朝丞相以下至六百石為外朝唐皇城之北南三門曰承天元正冬至受萬國之朝貢則御焉盖古之外朝也其北曰太極門其内曰太極殿朔朢則坐而視朝盖古之正朝也又北曰兩儀門其内曰兩儀殿常日聴朝而視事盖古之内朝也宋時常朝則文徳殿五日一起居則垂拱殿正旦冬至聖節稱賀則大慶殿賜宴則紫宸殿或集英殿試進士則崇政殿侍從以下五日一員上殿謂之輪對則必入言時政利害内殿引見亦或賜坐或免穿靴盖亦三朝之遺意焉盖天有三垣天子象之正朝象太微也外朝象天市也内朝象紫微也自古然矣國朝聖節正旦冬至大朝㑹則奉天殿即古之正朝也常朝則奉天殿即古之外朝也而内朝獨缺焉非缺也華盖謹身武英等殿豈非内朝之遺制乎洪武中如宋濓劉基永樂以來如楊士奇楊榮等日侍左右大臣蹇義夏原吉等嘗奏對便殿於斯時也豈有壅隔之患哉今内朝罕復臨御常朝之後人臣無復進見三殿髙閟鮮或窺焉故上下之情壅而不通天下之弊由是而積孝宗晚年深有慨於斯屢召大臣於便殿講論天下事將大有為而民之無禄不及覩至治之美天下至今以為恨矣惟陛下逺法聖祖近法孝宗盡剗近世壅隔之弊常朝之外即文華武英倣古内朝之意大臣三日或五日一次起居侍從臺諫各一員上殿輪對諸司有事咨决上據所見决之有難决者與大臣面議之不時引見羣臣凡謝恩辭見之類皆得上殿陳奏虚心而問之和顔色而道之如此人人得以自盡陛下雖身居九重而天下之事燦然畢陳於前外朝所以正上下之分内朝所以通逺近之情如此豈徒除近世壅隔之弊哉唐虞之世明目達聰嘉言罔伏野無遺賢亦不過是而已奏豫戒游逸以謹君徳事湛若水臣久以險艱退廢山澤恭遇聖明繼極以人言起臣草野之中置諸勸講之列臣觀講官進講之時聖容淵穆聖聴專精臣愚豈勝聖學緝熈之望邇者以暑月暫輟講事臣竊憂之夫人之心無所用則放有所儆則存故廢於講學則或繼以逸欲不可不豫戒也孟軻曰雖有天下易生之物一日暴之十日寒之未有能生者也言人主不可一日不親賢講學也書曰惟聖罔念作狂惟狂克念作聖聖狂逺矣乃繫於一念之微可不寒心哉夫天下之事禁之於未然者易救之於既壊者難此臣所以日夜念此至切也夫以大舜之聖其臣猶戒之罔游于逸罔淫于樂無若丹朱傲惟慢游是好傲虐是作罔晝夜額額罔水行舟朋淫於家用殄厥世言雖聖不可以不念也不念則怠荒怠荒則傲傲則慢遊慢遊則暴虐暴虐則朋淫而殄世也夫殄世極矣其起於一念之微可不寒心哉周公作無逸戒成王首陳殷三宗周文王之無逸而享年有永其後嗣王生則逸逸欲愈甚而享年愈促繼自今嗣王其無淫于觀于逸于遊于田無皇曰今日耽樂乃非民攸訓非天攸若言不可不念勤恤戒遊逸以永命也夫不惟勤恤是念則觀逸游田之事興觀逸游田之事興則耽樂之心勝故下絶於民上逆乎天也夫天民邈矣其弗訓弗順乃生於一念逸欲之微可不寒心哉臣謂陛下今雖未御經筵日講然而憂勤之念兢業之心盖不可以寒暑間者臣願聖明以深居静思為本以温習尋求為業以敬親事天為職分以勤政親賢為急務隨處操存體認天理俾此心無異於經筵日講之時稍萌逸欲即為禁止舊徳老成如大學士楊廷和等新起宿望如戸部尚書孫交刑部尚書林俊及九卿大臣之賢時賜召問以興其成王畏相之心尤擇内臣之老成忠厚者俾給侍左右以責其旦夕承弼之益外則有輔相之賢内則有侍從之正出則有正學之程入則有游息之規謹十寒之戒遵克念之訓存儆戒之心勵無逸之教法天不息與時偕行則君徳成而萬化理矣臣職在以經義勸聖學以徳業禆人主故不容不言記曰畜君何尤畜君者好君也實愚臣之心伏乞聖明留意覽臣所奏根本重事存省座隅為天下力行之臣不勝犬馬至念縁係豫戒游逸以謹君德事理具本親賫謹具奏聞嘉靖元年六月初十日奉聖㫖這本所言豫戒遊逸召問大臣并擇内臣老成忠厚的給侍左右朕已知道了為修省事桂蕚嘉靖七年四月二十四日吏部等衙門太子太保尚書兼翰林院學士等官桂等具題二十九日奉聖㫖災異迭見委因百姓不安所致卿等所言具見體國恤民至意仁壽宮及顯陵大工俱不可緩但不許浪費工力大木果勾足用採木官即便取回招商運木㑹計錢糧等項著工部還議停當來説陜西修築邊牆係是要務待豐年著撫按官即奏舉行勿得廢置不理王廷相且取回本部管事運河闗係至重開挑新河應否停止著戸工二部行總提督河道官㑹同漕運都御史總兵等官并奏内各項事情作急㑹議奏來定奪務要不悞將來嵗運夷情兩廣行王守仁雲貴四川行伍文定備倭行浙江鎮巡各議處應施行者徑自施行事體重大者具奏區處通鹽法免解瓶酒均寄養馬收净身也著該部各備細議奏定奪矜恤髙牆庶人蠲免帶徴錢糧禁約巡捕誣枉平民都依擬行有犯官員只依律處斷重守令尤係要務今後州縣正官有缺將見在聴選舉人三年以上嵗貢六年以上的從公揀選文學可觀年力精壯的選用如政蹟卓異撫按一體旌擢吏部不拘資格酌量陞用其餘俱罷欽此欽遵擬合通行一邊牆運河臣等㑹議得近該大臣言官因運河淺塞邊報𦂳急遣大臣提督改造興修皆為國逺謀甚盛舉也但當時議擬未及㑹計所費及行之頗覺煩勞山東河南陜西之民有不堪命合無先勑兵部取回見差勘處行邊右侍郎王廷相將應議事宜轉委該邊守巡等官勘計奏請待年豐時暇次第行之一順夷情臣等㑹議得邇者廣西有田州之征川貴有芒部之役老師費財生民已不勝苦今四川又有播凱之事鎮巡累次勘處分撥分𨽻之議實土人彼此情願雲南安銓之變由流官之激鳯陽朝文之變由襲替之争而畢節各處亦相繼以變告矣大畧雲貴川廣夷人互相觀望朝廷舉動當否係數省之安危可不慎乎若因其勢收其心而能中彼肯綮則地方自可不煩兵而定者必欲力以勝之竊恐民困征求必將展轉無聊或見今之惡未除而意外之虞又作在唐田悦朱滔之役足為明鑒仰惟皇上視華夷一體之心惟法隆古之修徳深懲末世之窮兵不必專主一說在兩廣者委任新建伯王守仁使之開誠心號召土民而親詢其所願若用流官不必拘資格但務擇人而重委任之若用土官或因功大小分為數州或全付一人仍府之舊但期長久安寧夷夏兩便其在四川播凱者催促鎮巡作速果斷衆説紛紜不一當求人情之同然如見今兩廣之處在雲貴則安銓鳯朝文罪惡已深决難輕貸然以夷攻夷昔稱良法宜令尚書伍文定明白示諭有能除安銓鳯朝文一起兇惡而以一府歸順者即以一府畀之有能除一州之害而以一州來降者即以一州授之有能除一村之害而以一村來歸者即以一村與之小者授長官等號大者授知州等職使世守其地各該提督等官俱要體朝廷好生之徳懇切布告使知朝廷所以不宥岑猛安銓鳯朝文者以其貪淫暴虐賊殺爾土人搶刼爾鄰封朝廷為天地夷夏之主不得已而興師動衆止是為土人雪讎然土人近亦拒敵天兵者實畏彼兇威事非得已非爾罪也首惡既誅之後必使爾等各得所安一應事宜俱順爾夷人之心寸土尺帛朝廷無所利焉如此而天不助順夷不歸心無是理也但慮為將領者或意在貪功或有所畏忌心不誠令不信則不足以感人心而安地方也皇上稽古勤學以二帝三王為法者也夫帝王之道修徳以來逺故舞干格苗萬世稱聖而窮兵黷武王者弗取也又照浙江先年倭夷之變由寧波人宋素卿與夷使搆隙相殺所致今宋素卿及經該地方官治罪有差但彼時指揮袁璡等被夷人虜去彼國遺下夷人百餘名亦見在紹興府各處羈住支費日繁民力不堪夷貨若干見貯官庫近雖准行文彼國問罪處置并行浙江鎮巡將夷貨違禁者解京其餘變賣及造船送前項夷人還國至今未見下落况前項夷貨未貢即有變故若即解京變賣恐於國體未宜合無行令浙江鎮巡官作急造船將見在夷貨照舊貯庫盡行開具數目公文付與應還夷人仍與勾過海飯米等項令見在京琉球夷人帶回本國仍查照原奏行文順賫國王將前項惡逆之人盡行處置前項物貨何項入貢係解京之數何項貿易係應還之數并送回指揮袁璡令彼將前項縁由一一明白照數開報文移以憑施行待有差來謝罪或進貢之人方將夷貨入貢者解京貿易者給還仍行該衙門著令琉球夷使用心順帶并行琉球國王知㑹差人轉送毋令失所乃重國體而信逺夷之一道也一均寄養馬以優畿甸臣等㑹議得順天保定河間三府寄養馬疋以備緩急近年以來地方災傷民受養馬之累十分不堪盖所屬州縣地多者莫不托為優免人户以逃避也夫人不偏擾則户不偏累况國家優免之制止是雜差凡寄養馬者地土糧差巳免其半而不養馬可復不征其税乎此誠不通之論不平之政也查得嘉靖五年以前此法尚未輕變至六年各縣逃差奸民捏奏命下該部知道即用强不由官司主張盡推養馬於無力不肯投托勢要之家者而寄養之法大壊矣當時昌平知州固執不從輙假他事凌辱知縣遂莫敢誰何而畿甸之民騷然矣合無特勑改正惟不堪充軍之馬准嵗一揀賣以休息之一謹巡捕之職重贓官之法臣等㑹議得捕盗一事國家甚重設民職於各府州縣者所賴以聨屬保甲以安輯地方設軍職於京城及在外各衛所者所賴以追勦捕捉以防衛地方近民官多羅織平民以獲盗計功軍職多妄報首級以殺掠為尚本以化盗從良者今反以激良為盗殊乖國家建官之意合無通行撫按衙門嚴加究治領兵官必須約己率下申嚴紀律所過之處不得秋毫有犯擒斬有名劇賊衆証明白方許報功違者以故殺抵命其民職有縱容積年捕人公行羅織以疑似執民不肯開豁者拿問革職致死者以故殺罪之如原報賊情有虧枉者就為分豁如此則地方得以寧謐而不致激民為盗矣又照内外犯贓官員所以累經罷黜而不畏者以所犯非枉法贓雖盈千百貫而罪止充徒故也夫犯重罪枉法減輕贓僅滿貫即得充軍其各司及府州縣官於所治之民或為人誣告人命或為人誣牽為盗明知其究乃加異事同情也顧罪止充徒人豈畏之哉合無定為事例凡各司府州縣官有犯前項强索無罪人財物至值銀五十兩以上者𤼵邊逺充軍如詹事府少詹事霍韜之論則法行而貪官始畏矣論劾貪暴大臣疏葛鴊切見武定侯郭勛貪暴專横莫之與京該巡撫都御史孟春兩次題稱自𣲖夫銀故縱積年光棍出京害人等情竊照五府典司兵政原無徑自𣲖銀催徴解府舊規勛何人斯乃敢變亂舊章擅自僉𣲖并差防軍馮智等逺出外郡辱鎻官吏逼要銀兩支用不明查得勛先曽差人越闗擅拏職官及至認罪又不輸情該院叅其專横乖違要得罰治荷䝉聖恩歴數違慢之罪開示自新之端勛先年鎮守兩廣所得財貨不貲後罷歸以車五十餘輛輦至崇文門厰衞緝知重賂得免此其貪暴之罪一夤縁後府掌印在京各衙門惟都察院許出榜文此祖宗舊制勛擅自出榜禁約京城内外燒酒此其專横之罪二假燒酒之禁遣邏卒四出捜索酒家凡有疑似皆令逮捕見則捆一繩重决三十棍都人畏其酷暴以銀賂之計都城酒家不止數千通前得銀無筭此其貪暴之罪三團營軍士去年揑稱採打鼓石每軍科銀一兩今年指以修理營㕔每軍𣲖銀一錢其後到補役等項又罰修氷窖出銀五錢兩年所取無慮數萬此其貪暴之罪四召素知貿易者散以本銀按月取利如有短少自行拷打監禁此其貪暴之罪五自掌府事以來交結近倖大肆貪饕此其專横之罪六况拜蕭敬為假父四維陵夷以威力濟奸雄一軍聲怨伏望特勑兵部將勛先行革去見任再勑法司按其罪狀等因奉聖㫖該衙門知道遵祖訓以端政體疏臣嘗伏讀聖祖之訓有曰凡廣耳目不偏聴所以防壅蔽而通下情也又曰朝堂决政衆論稱善即與施行大哉王言此誠子孫萬世帝王所當遵者也頃縁先朝内外奸人交通盤據䝉蔽主聰竊弄威柄朝政廢弛言路靡通將一應章奏或遷延沈匿不與聞達或揑改㫖意肆為欺罔以致予奪非宜刑賞失當及至言官論列又多留中不出甚至假以朝廷震怒動遭譴謫鉗制人口不復敢言是以下情不能上通真贋無從辨詰紊亂政本養成禍機壊祖宗法莫大於此重以奇衺淫巧百爾誘惑使先皇帝既不得日親萬幾又莫與儒臣接見經筵輟講積有嵗年浹月臨朝恒以昏暮君臣隔絶形迹疎違由是威福大權盡墮奸人之手内閣莫獲叅預六科徒事論駁御史無能糾察該部不敢執奏紀綱大壊奸黨横行患蓄邊防毒流海内上干天變下失人心十六年中大難繼作貽憂社稷壅蔽之禍兹亦極矣如先年劉瑾揑冩㫖意既以伏誅而近日錢寧家又復捜出題奉本四十餘件江彬沮抑邊情本一百三十六件司禮監隱藏不報本又數百件似此欺蔽可為寒心尚賴皇天眷祐宗廟有靈社稷不致顛危乃真幸耳兹者伏遇陛下聰明天錫仁孝夙聞起自親藩光陟帝位四方萬國延頸抵目瞻望太平今龍飛御極之初正勵精圖治之始且國家安危之幾俗化汙隆之候天下治亂之分君子小人進退消長之際於此焉决昨者伏覩明詔痛革先朝敝政洞察小人奸狀中外臣民不勝懽慶以為我朝百六十年以來未有如此詔令陛下撥亂之功可謂盛美蔑以加矣但臣以為本源之地不治則末流尚有可憂伏願陛下奉天法祖總攬權綱明目逹聰大開言路臣請自今伊始毎日視朝之餘即御文華殿聽政凡中外大小臣工所上章疏凝神注思逐一俯賜觀覽不時召入内閣大臣以備顧問從容講論斟酌裁决凡事情重大論議矛盾者則勑下廷臣集議不宜謀及䙝近徑自内批如先朝之為者即有寢罷亦宜明示外廷可否以彰陛下至公無我之度臣又竊伏私念内閣機密重地祖宗設官立法必極周詳擬㫖進奏宜必各有職掌綸音渙號亦必有所紀載前項奸蔽似若無可容者何乃公然隱匿而無所稽憑肆行矯詐而無復忌畏則是闗防之術尚若濶疎進擬之權容有侵越而小人乗勢因得以竊弄之矣然臣考之司禮監職掌著之祖訓内閣創置列於大明㑹典臣愚欲乞陛下仰遵聖祖大訓載稽我太宗文皇帝故事勑令内閣專一擬㫖司禮監專一進奏仍令内閣置立印信文簿一扇或鈐以御寶將逐日聖㫖裁决過事件明白開載每五日一次類進揭帖與六科㫖意題本對同雖陛下聖意有所予奪亦必經由内閣議而後行事有可否許令執奏不宜復有傳奉之制更乞勑令御前紀事給事中二員朝罷赴左順門㑹同司禮監官收接一應章奏紀其數目送吏科附簿以備查照如此則大公至正明白洞達壅蔽矯詐沈匿之奸舉無所容朝廷之政將無一不出於正矣臣忝官諫諍遭際聖明一念朴忠粗先有見於此伏望陛下修舉祖宗久大之業釐正累朝因襲之弊光復令典永示𢎞規追究前日壅蔽章奏朋比欺罔一應奸邪之人明降勑㫖處之重典以示大戒此實端本澄源法祖立政之第一義也伏惟聖明留神天下幸甚臣干冒天威無任隕越縁係遵祖訓以端政本事理未敢擅便謹題請㫖勤志聽言以端化本事鄭慶雲臣惟人君以求言為職臣子以進言為忠陛下登極以來亦嘗求言矣然聴之者不什一拂之者常什九臣子有逆鱗之忠陛下無轉圜之美臣等近因聖體違和具務學親賢保聖躬數事上塵睿覽自謂於聖學聖躬少有補裨奉聖㫖該衙門知道欽此臣等愚昧不知所謂夫所謂該衙門者如今之六部三法司百職事之屬也至於臣等所言乃陛下自知之而自行之該衙門何與焉使其言之不可用亦當明示譴責為失言者之戒竊思今日如此批答非陛下之過也司章奏者之過也或隱匿不以上聞或票擬不由内閣䝉蔽攬權為國大蠧其罪浮於亂臣賊子盖䝉蔽者必至於攬權武宗十五六年之間其弊正在於此陛下所親見者也奈何今日忍蹈襲之耶臣等職諫南服騰章於數千里之外待報於一二月之間所以望陛下者如日月焉如恐其或虧也今臣等言焉陛下復不以為然而棄之則臣等之心益孤矣伏望自今以後勤萬幾而不間俯羣言而不遺切於身心利在國家者務行之必力則君身正而萬事理矣奉聖㫖該衙門知道務實勝以答天戒疏劉世龍臣伏覩六月二十九日明㫖南京祖宗根本重地宗廟尤重朕聞大變不勝驚惕兹五祖神靈必須奉慰其祭告及修省之儀禮部便開具來看此誠上天示戒務要應之以實勿事虚文繼觀七月初三日明㫖又云致災之由端在朕一人欽此臣三復天言不勝感激乃作而嘆曰明明天子真大有為之君不世出之主也臣愚何幸而躬逢其盛哉臣聞天眷有徳變不虚生仰惟陛下仁政盖與天地同流而非常之災猶復不免推所從來實惟中外大小臣工職守無狀以致上干天和災及祖廟陛下乃輙引咎自歸復令諫官極言時政得失即此一念天監在兹昔周成王啟金縢之䇿天乃反風宋景公出罪已之言星為退舍矧陛下修省之誠務欲見諸行事之實臣見天心上格和氣日臻宗社無疆之休端在是矣祖宗在天之靈其有不慰者乎臣職非言路本不當言久有所懐不能自已兹重有感於陛下畏天之誠敢不乘時以效夫野人芹曝之獻謹以時務之重且大者列為三事仰凟聖聴少加省覽則臣愚不勝幸甚天下臣民不勝幸甚一曰杜諂䛕以正風俗臣聞天下之患莫大於風俗之不正而風俗之不正由人心之壊使之也人心之壊非有他也由患得患失之心使之也夫患得患失之心勝則寡亷鮮恥之徒多寡亷鮮恥既繁有徒而正色直氣日以消滅則平居之所恃以尊主庇民臨難之所恃以仗節死義者焉攸賴哉今天下之風俗人心臣不知其成何氣象也刻薄相尚變詐相髙謟媚相師阿比相倚仕者日壊於上學者日壊於下如脂如韋為鬼為蜮彼倡此和靡然成風或片言不相協而禍患已逮於身家或一笑未及終而戈㦸已礪於胸臆是以人圖自全勢不兩立與時浮沈之輩則惟以安分守已為髙而常恐獲戾於人獨立卓行之士則徒抱憤世嫉邪之志而安能手援天下以致人心益薄風俗益偷究其末流不至於大壊極敝不已也臣以為轉移變化之機非陛下以身先之雖復家置一喙市列千金則積久之敝安能一旦而丕變耶伏望陛下洞察幾微大加矯正握其要以風動四方端其本以統馭萬事勿以詭隨阿䛕者為賢能勿以正直鯁介者為不肖勿以私好而有所喜勿以私惡而有所怒虚心以防邪佞之欺謙巳以來忠讜之益仍勑大小臣工各相戒勉務協和以共圖成功毋朋比以私植黨與事闗九重則明白開陳利及萬民則懇切敷奏可者獻之否者替之不以事之小而互相隱藏不以勢已成而巧於遷就獲乎上者勿以此而望於下壊於已者勿以此而責於人將見四方聞風莫不感動人心一移風俗自美如此而天心不應者有是理乎臣恐陛下所謂應之以實者似亦可以少備採擇之萬一也二曰廣容納以開言路臣聞天下之患莫大於上下之情之不通也人君之德莫貴於使人得盡其言之為美夫上下之情不通則貴賤之形迹日隔而壅蔽之禍深人得以盡其言則人君之耳目日廣而欺隱之弊絶夫壅蔽深則寸步之間皆如隔世雖欲用其明不可得也欺隱絶則萬里之外皆如對談雖不用其明而自莫之遁也古先哲王深知其然是以堯設敢諫之鼔舜有誹謗之木成湯有司過之士武王有戒慎之鞀謙虚自將延訪多術猶懼夫天下之情或有未通天下之言或有未盡此所以上下交孚幽隱畢達而大業昭於四方榮名垂於萬世者職此故也仰惟陛下天縱聖神徳超今古其於天下之人如天地之無不覆載而何所遺其於天下之情如日月之無不照臨而何所遁而臣猶復喋喋云者真知陛下為堯舜之主而必欲使斯世斯民同享唐虞之治而後已也臣觀陛下臨御以來犯顔敢諫之臣比之先朝尤為獨盛其故何哉良以真主難逢明時難再故凡茍有志於用世者咸思乘時自奮以仰酬徳意之萬一其幸而得言者亦必反復籌度而始敢冒犯乎天威雖其一時所言或激切狂直未能悉中乎時而其中心所發則忠愛憂思惟欲求盡乎臣節較諸循循黙黙徒取寵以固位者盖不侔矣而今放逐既久悔悟日深險阻備嘗事體自習是陛下之所以抑之者乃所以成之也陛下何不悉加寛宥以逺追堯舜湯武之盛軌哉臣以為非獨堯舜湯武為足尚也三代而下如漢髙祖晉武帝雖皆有為之主要之亦未聞乎王道者然周昌則以髙祖為桀紂劉毅則以武帝為桓靈當時二君非惟不少加怒抑且笑而受之垂之青史以為美談而二臣狂直之過亦自難掩則言之當否其得失固在臣耳而君於德何損焉伏望陛下念成才之難擴有容之度凡諸臣之一切以言而獲罪者宥其既往之愆開以自新之路原其事情以次録用其不幸而故者行令原籍官司存恤其家仍令自今以後大小臣工凡有所見許令自陳養其敢言之氣以無負其報主之心將見天下之耳目所聞見益足以禆益陛下之聰明天下之血脈相貫通益足以培植宗社之根本盛徳大業殆將與堯舜湯武并隆而漢晉二君不足道矣如此而人有不孚和氣有不應者哉臣恐陛下所謂應之以實者似亦可以少備採擇之萬一也三曰慎舉動以存大體臣惟帝王為天下之宗師而舉動尤人君之大節一動所在四方為綱一時所行萬世不冺此其所闗係豈小者而可以弗慎哉仰惟陛下臨御以來動與天合博大纎悉何事不周而臣猶復惓惓不能自已於言者誠念生逢堯舜之君而惟欲快覩雍熈泰和之治也臣聞之孔子曰敬大臣則不眩又曰君子篤於親則民興於仁故舊不遺則民不偷誠以大臣為中外臣僚之表率勲戚實國家休咎之相闗茍非有大不可而不容以少貸焉者猶當區為之處而不可以輕廢棄也臣惟陛下之於大臣必先知其才之非常而可託故委之以重任而不疑夫任之既重則禮之宜優今或忽焉而去之又忽然而召之又或因事而械繫之箠楚之則何以為臣人者勸哉夫臣之於君也猶子之於父也無所逃於天地之間也是故其進退榮辱之際惟其命而莫之違也而上之所以處之豈容不察其情而全其禮耶臣愚為陛下歴試之餘其人果無足取則宜託詞省令自劾以禮而退如見素行無缺委任既隆乃偶以一時喜怒輙從而顛倒之陛下固已付之無心而不知天下傳聞殊失觀望恐非以禮御人臣之道也至於故舊如近日張延齡家憑寵為非勢所必至罪至難議法自不容此在廟堂自有定論臣何敢贅側聞長老之言孝廟在時待之過厚或至釀成近日之事殆未可知矧彼豪貴之徒焉知盛滿之戒自貽伊慼今復誰尤區區逆豎亦何足惜獨念孝廟在天之靈太皇太后垂老之景乃至不能庇其骨肉之愛於情忍乎陛下孝養兩宮心如日月海内臣民莫不稱頌恐於此際殆亦不能不為一動心也頃見通報創造神御閣啟祥宮特令二三大臣督理其事此固陛下尊祖愛親事亡如存之義臣則以為南京太廟之災方在目前陛下修省之誠正達天表五廟之靈倀倀焉何所於依安慰之儀皇皇焉人皆有待抑其煨燼之墟未知應否重建如不可已則今日工役之重且急更有過於此者乎矧興作頻年四方彫敝災傷變故到處相聞此又民勤於食時詘舉贏之候似宜劑量輕重而為之以漸殆未晚也他如日用起居之常事幾應酬之際凡有闗於聖德有禆於聖治有係於聖躬者尤望澄心定慮熟思審處謀之於始以圖其終慎之於微毋待其著則本端而物無不正徳盛而業日昌隆人事修於下天心格於上和氣駢臻災變消弭億萬載隆長之慶端在是此皆狂妄之談不識忌諱之甚不知陛下所謂應之以實者此亦可以少備採擇之萬一乎否也奉聖㫖劉世龍這厮譏訕君上結庇逆惡悖慢肆行好生無理錦衣衛便差委的當官校賫駕帖去即拏械來京説不許輕縱論驕恣武臣疏謝瑜臣近得邸報太師兼太子太師武定侯郭勛奏為陳愚見遵祖制答聖明通選法用人才立稽考惜民財蘇困苦添鎮守以清政治以圖奠安事奉聖㫖這所奏事宜各衙門便看議了來説欽此臣等覽誦大駭聖明在上内外大小臣工莫不祗肅靖恭罔敢踰越而勛乃妄言凟亂肆無忌憚如此據勛之言則是六部院寺科道及撫按監司守令盡皆不才天下政務盡出勛之指畫乃理也謂聖明之世盡無一人可用盡無一事得宜何其誣妄之甚乎觀其所論各項事宜類多影響恍惚妄意億逆未嘗實見有何利弊其添設鎮守乃其主意之所在也必是久閒内臣重賄鑽求勛乃利其不貲之入并其日後肆出剥民以供奉於已為之試探陛下却乃謗讟諸臣以鉗衆口耳臣等不敢縷舉以塵天聴請以一事與勛辨之其曰天下官吏貪汙害民盖因陛下無腹心耳目之人在天下也又曰文武官員推奸避事許内臣劾奏則奸貪歛跡此正先朝奸邪之人所以蠱惑君心蠧害朝政之言而勛乃敢以陳於陛下之前乎果如勛言則内臣用事莫如正徳年間内臣歛手莫如陛下臨御以來是勛以正徳年間為太平極治而方今為積弊之時也十數年大壊極弊陛下一洗而更新之得失治亂不較自明而勛之倡議顛倒若此意豈無所為乎如使勛之言果行則陛下累年惠養安堵之民一旦困苦愁嘆當復如正德年矣且宦官用事害政傷治不獨正德年為然自古有之陛下斷自宸衷毅然裁革可謂度越百王傳之萬世而運祚綿永書之史冊而宇宙増光勛乃謂嘉靖年來不知何人奏請皇上因事取回豈奏者為妄奏而陛下為過聴耶陛下光明俊偉之事而勛以為偏私不公之甚其恣肆不臣何如哉陛下為萬國臣民之元首凡文武百官莫非陛下之股肱耳目心膂而刑餘之屬特以備門庭掃除之役耳君臣一體忠義天性豈惟宦官之親而大臣羣臣皆疎耶宦官鎮守利於宦官者勛欲用之科道巡視不利於宦官者勛欲去之是欲陛下盡疑天下之臣而獨倚宦官為腹心耳目勛何切切於宦官耶前代有以宦官為心腹耳目者陛下視之為何如主而勛用以此望陛下也孟子曰責難於君謂之恭陳善閉邪謂之敬勛之此言不恭不敬莫大於是又其言曰文官弄法武官已被鉗制不得如文武并用之時又非虚心為國忠陛下之言也勛亦武官獨被厚寵位極太師班列三公之上此武官之極也正宜持滿戒盈謙虛自保以求無負殊遇斯為盡道乃欲以一身攬九卿之權以數言鉗百僚之口内結宦寺外悦羣小總握軍機忌人干預何為者哉使其真有感恩圖報之誠經國濟時之畧方今邊塵屢警當决䇿以折衝天討方行當身先以勇往乃其職分之宜補報之地胡為因循退縮曽無一籌可展而招權出位為此誣妄之説乎知人如陛下聴言如陛下昭監如日月摧折如雷霆不昵近習不悦佞倖如陛下而勛敢肆無忌憚凟亂聖聰如此萬一得行又將無所不至矣天下之人一聞勛奏莫不驚悸憤嫉籲控無地臣等待罪言責敢鉗結以自固乎其他怙寵作威輕賢綱利又不可盡舉者伏惟聖明俯察則勛之忠邪自見早賜區處天下幸甚臣等萬死萬死不勝激切隕越之至謹具奏聞等因奉聖㫖這鎮守内官無益於治朝廷自有處置這本所言專借事攻毁勲臣本當拏究其情且不究治該衙門知道題添鎮守推將官疏張瓚職方清吏司案呈奉本部送吏科抄出太師兼太子太師武定侯郭勛題臣每䝉皇上召見與二輔臣言論政務皇上論及邦本政令無不及時品第人才智識深知真切臣復何言但各衙門政令有失漫無照察稽考臣既得知不得無言以報皇上知遇之恩以救時弊之失以安宗社之計謹將愚見條陳伏望皇上聖明勑下各該衙門通行㑹議果能有益於天下國家采而行之庶有少補於萬分之一也臣民幸甚臣亦不勝幸甚開坐等因奉聖㫖這所奏事宜各該衙門便看議了來説欽此欽遵抄出送司又奉本部送准户部咨稱看得太師兼太子太師武定侯郭開陳事宜内除開取礦課以濟國用等事本部另行查覆外所據奏添鎮守分守内臣係𨽻兵部掌行煩為徑自查覆等因送司案呈到部看得太師兼太子太師武定侯郭題稱陳愚見遵祖訓答聖明通選法用人才立稽考惜民財蘇困苦添鎮守以清政治永圖奠安一節除通選法等事係𨽻吏部等衙門徑自查議外所據添設鎮守推陞將官二事係本部掌行合就開立前件議擬伏乞聖裁縁係陳愚見遵祖制答聖明云云及奉欽依這所奏事宜各該衙門便看議了來説事理未敢擅便開坐謹題請㫖一兵部推陞將官原為保障地方國之藩籬事之最要者比年推陞一級必責其熟於地利深知兵法量才擢用近年陞轉不論人之可否地方逺近輙行那改以致邊方腹裏叅錯其人往往失事不寧將坐營推陞副叅游擊都司守備等官似亦有序推用却又將副叅游擊都司守備等官推陞坐營事體顛倒若斯多矣如在營號頭把總只可推去叅將守備或分守地方係軍旅衙門亦可知其軍旅矣如衛所指揮推陞各都司軍政掌印僉書亦是案牘所闗亦可為之舊案可循不致無稽之政且如即今將官比之文官不同如舉人進士三年三百餘人况將官一方一鎮三四十年作養不出二三人來因有小過小失若被叅劾革退又有被人連累者及至用人則推之不出將見在者東那西補皆為曲就為今之計安不忘危乞勑兵部將見在各邊將官行令各處撫按官遵照祖宗憲綱以禮相待不得推求細故輙擅凌虐以挫鋭氣及用彼戴盔甲逺接撫按此皆擅作威福之大槩也又將軍馬號令俱各侵奪掌管臨敵則責令將官出兵却又不似平日之强悍臣切思我太祖高皇帝開天立極以來深知文職輕舉妄動降印用武職掛印不許文官干預軍機重任只許專理錢糧詞訟盖有深意存焉但少有不遂又妄加恭劾文官權衡太重致使武職垂首喪氣久矣將來誰復振作威武以安不虞伏望皇上深戒文職衙門體皇明祖訓文武并用彼此頡頏不敢相壓之意再察文官叅奏武官所犯事情及失事輕重便見其虚實矣臣先曽具奏為事充軍閒住致仕大小將官未見舉用再乞勑下兵部行取來京㑹同府部驗看年力精壯尚堪䇿勵者註名在部或留送團營寄操待有相應員缺推用如年老不能赴京者聴其自便古人云一世之才自足一世之用不資來世矣可不惜哉一前件查得先為公薦舉以備任用事該太師兼太子太師武定侯郭題稱文武大小官員充軍為民冠帶閒住及致仕去任者乞勑府部九卿科道等官及南京各衙門并各處撫按各舉所知備開來歴不拘名數奏聞簡用該本部擬議通行查照薦舉題奉聖㫖是欽此又為前事該兵科等衙門都給事中等官王庚等㑹保原任總兵官劉文等南京禮部等衙門尚書等官霍等各保閒住都指揮韓平等俱該本部題奉欽依起用及陸續推用去後今該前因照得本部推舉將領必先儘本處官員次方取於鄰境盖以其熟知地利至於邊方腹裏用各不同尤不敢叅錯若夫副叅游擊都司等官推陞坐營坐司或將坐營坐司等官推陞副叅游擊都司亦内外通融相沿舊規在營號頭把總推陞守備各衛指揮推陞都司掌印僉書亦因材授任法所宜然與本爵所奏大畧相同其稱各邊撫按官與各將官要以禮相待不得輙擅凌虐及將兵馬號令侵奪掌管妄加叅劾一節深為有見相應議處合候命下本部移咨各邊巡撫都御史及咨都察院轉行各巡按御史凡與各該總兵恭將游守及各都司軍政等官相見各要遵憲綱以禮相待不許將各將官輙加凌虐并各要修舉本等職業不許將軍機事情侵奪掌管各該將官遇有失事或為事等項指實論奏不許妄加叅劾務在文武協和保障地方若有乖違者本部查訪得出恭奏治罪再照本爵原奏為事充軍閒住致仕將官雖經本部題奉欽依通行保舉推用但奏保者十無二三况將材難得求之貴廣合無通行各處總督及巡撫都御史㑹同各該巡按御史查訪所屬大小將官不拘閒住充軍致仕等項果有謀勇出衆累立戰功為衆所知堪任將領者開具實跡疏名具奏起送來京以憑上請定奪一開取礦課以濟國用臣先因大工缺少工價銀兩具題已該户部覆題通行各該有礦地方行查開取去後止據薊州并山東沂州等處解到礦銀不上二萬餘兩已後各該地方官吏不知有何觀望不肯承當開収不見解報及今節該有礦地方山塲所産銀課情願自備工食人匠開取有四六分者有平分者具奏在部不見㑹議皆是各官狐疑猶豫之心深且長而攄忠報國之心慢且薄只知開納監生農民賣官鬻爵以為已便口説公言心生荆棘又被鼓惑以此事無定議十分難行况各地方文官弄法武官被人鈐制不得似文武并用之時久矣臣復思天下各處鎮守分守内臣原係我成祖文皇帝命去鎮守十府以防不虞後至歴代以來踵踵相因至於嘉靖年來不知是何人奏請皇上節次因事取回不用皇上再察所奏之人公乎私乎便見偏私不公之甚也以致天下官吏貪汙虐害下人不得聊生盖因皇上無心腹耳目之人在於天下也且内官壊事難保必無内中奉公守法者亦豈無之只是比照文武衙門大小官員事例要本衙門掌印官公同推選平昔行止端莊弓馬熟閑年力精壯知文識字者列名上請皇上親閲其能任而用之皇上再加嚴禁明㫖以誡守官之箴有罪亦同文武官員之治罰如此誰無學好向上存心守法哉切縁開礦舊例原是鎮守内官兼管取用就將開礦之事付之則事體歸一若地方文武官員推奸避事或面是背非作俑生事左道害人者亦許鎮守内臣指實劾奏如此地方有保安之計奸貪有歛跡之容矣一前件伏覩正徳十六年四月二十二日詔書内一欵近年差出取佛買辦織造等項及腹裏地方并各邊各闗俱係正徳年間新添分守守備内臣詔書到日即便回京欽此又查得為應詔陳言以匡時政事該巡按河南監察御史汪淵奏稱近年以來軍民財竭貧窮入骨流移為盗皆因各處内臣鎮守等官徴求科𣲖進貢鎻官縳吏誰敢抗違小民含寃賣男鬻女誠可痛心近日奸邪納賄定一鎮守量地價值有謀一缺用銀一十餘萬稱貸權門一倍償兩倍之息官方到任債主隨之若非酷取小民何以酬前數之債一方之民坐取數十餘萬上下侵漁指一科十計其所費過於納税小民膏血安得不竭盗賊安得不起乞要多官㑹議凡各處鎮守等官查非額設悉皆除革等因該本部議擬題奉聖㫖不必㑹議各處鎮守内臣不分新舊但有不合公議的司禮監從公推舉亷慎老成之人更代今後著他每務要奉公守法安静行事不許生事害人貽患地方欽此又為應詔陳言廣聖謨以答天戒事該四川道監察御史毛鳯韶題該本部議得各處鎮守監鎗提督分守等項太監等官原非洪武年間舊制永樂以後増置日多皇上累頒明㫖訓飭羣工節用恤民前項内臣如浙江福建既有鎮守又有提督市舶浙江又有織造遼東宣府大同寧夏甘肅既有鎮守又有監鎗俱二三人同處一城似為冗濫相應歸併一員帶管内將一員裁省河南江西山東既係腹裡地方各該鎮守又係添設不久相應裁革俱取回别用其薊州地方分守内臣一員守備内臣十員宣府地方分守内臣三員守備内臣六員大同地方分守内臣二員守備内臣三員總計三鎮東西相去不及二千里共設内臣二十五員毎員占用軍人少者數十餘名或四五百名俱不操練防邊合行撫按酌處歸併題奉聖㫖是准議行又為應詔陳言廣聖謨以答天戒事該四川道監察御史毛鳯韶題要將江西雲南二省鎮守内臣裁革該本部議得省官節用正係我皇上聖政之先務兩京内外文武冗員俱已陸續裁減革罷前項内臣似宜減革等因題奉聖㫖准俱革取回欽此又為乞廣天恩取回内臣以甦窮邊困苦事該巡按貴州監察御史郭𢎞化題稱貴州地方委係疲憊軍民貧苦乞要將太監楊金革回等因該本部議擬裁革題奉聖㫖是欽此又為裁黜冗惡内臣以清聖治以快人心事該兵科都給事中張潤身等題稱訪得鎮守浙江太監鄧文鎮守兩廣太監張賜湖廣太監潘真福建太監師章貪縱害事均為不職宜速賜罷黜永不差補等因該本部議題題奉聖㫖是都准裁革取回欽此又為乞恩憐處殘壊邊方停差鎮守内臣以永圖安攘事該廣東道監察御史廖自顯題稱建昌營鎮守内臣無事則坐享太平歛怨軍士有事則高臥不出冡將貪功兵出失律乞要查照雲南等處事例停止該本部擬合裁革題奉聖㫖是欽此又為災荒頻仍軍民困極乞賜裁革鎮守以圖久安重地事該陜西撫按等官都御史劉天和等題稱陜西鎮守内臣貪饕殘酷剥民脂膏椎骨及髓俾全陜八郡三十餘衛所之間元氣為之喪盡及稱前項地方外而三邊既有鎮守而各鎮又有總制以控制之商漢之間又有提督都御史以撫治之若鎮守内臣不過端居省城坐享供饋而巳實與河南山東江西浙江諸内地無異要將鎮守陜西内臣取回裁革不必再設明著為令該本部議得内臣出守委非祖宗舊章聖明中興以來多從裁革誠於地方有益軍民稱快今陜西地方節年災傷即今尤甚比與他省鎮守内臣尤宜裁革等因題奉聖㫖是鎮守陜西員缺依擬裁革永不差補欽此又為貪饕鎮守官員公行鬻販屬官科斂奉承乞恩黜治以安地方事該巡按四川監察御史熊爵等題稱四川鎮守太監蕭通官尊法重氣熖嚇人受其害者只得隱忍屈辱乞要比照江西河南貴州事體將蕭通取回前缺不必差補該本部議擬照例革回永不差補題奉聖㫖是蕭通准革回欽此又為比例裁革鎮守内官以安地方事該提督兩廣軍務兼理巡撫兵部右侍郎林富題稱廣西地方土瘠民貧供應浩繁公私匱竭要將鎮守内臣裁革該本部議擬照例裁革題奉聖㫖是欽此又為乞罷鎮守内臣以安地方事該提督鴈門等闗兼巡撫山西地方都御史黄鍾題稱山西地方地瘠民貧鎮守太監害民尤甚乞要照例裁革著在典章永為遵守該本部議擬裁革題奉聖㫖是欽此又為乞革鎮守内臣以恤貧軍裕邊陲以光聖治事該巡按直𨽻監察御史李朝綱題稱大同地方地土瘠薄軍民貧困而鎮守之設非惟無益於地方抑且有害於軍士要將太監張紳取回前缺永不推補該本部議擬裁革題奉聖㫖是欽此已經通行欽遵外今該前因除開取礦課係𨽻户部掌行徑自查議外為照各處鎮守内臣原非太祖舊制永樂年間始差内臣鎮守後因而添設漸多又有分守守備等項名色至正徳年間其弊已極有如前項各官所論列者我皇上聖徳中興首下明詔將各處内臣裁革後節因撫按等官具奏又多取回員缺永不差補天下臣民無不稱頌聖明今本爵具奏前因臣等查有節奏前項明㫖不敢輕議嘉靖十七年四月初六日太子太保本部尚書張等具題奉聖㫖各處鎮守内臣原不係太祖定制今且著雲貴兩廣四川福建湖廣江西浙江大同用毎一人著内侍監選去不許作威生事刻害百姓但只著本等行事也與他勑其餘准議題為星變事王廷相職方清吏司案呈奉本部送准禮部咨該本部題切見本年四月二十三等日夜有彗星見於雲中約長三尺光指東南在栁星二宿之次旬日以來明晦無常尚未銷滅臣等仰惟皇上尊天法祖勤政安民休徳至治上帝歆監自無致變之理也考之傳曰彗者除舊布新之象晏子曰天之有彗也所以除穢也變不虚生由人所召今者星見之異實皆臣等大小臣工不職所致然上天垂戒無非仁愛人君之意伏望皇上仰承天意益加祗慎擇日躬禱於𤣥極寶殿勑下該衙門大小臣工省已洗心自本月初八日為始如故事青衣角帶三日仍通行兩京九卿堂上官各令自陳臣等禮官奉職無狀感召災變實為諸司之首謹跧伏屏息以俟天威重加譴謫臣等無任恐懼隕越之至等因嘉靖十八年五月初六日太子太保本部尚書兼翰林院學士嚴等具題十二日奉聖㫖上天垂此星異非一次者在朕躬的過自省察之内外大小官員人人皆有代理之責宜各思過圖改不必青衣角帶外飾虚畏須實奉行用贊朕上承天眷奏禱今多事之日安得精専兩京九卿堂上官都待考察一併處分各處鎮守内官都著取回該衙門知道欽此欽遵擬合通行為此除外所據取回各處鎮守内官係𨽻兵部合就移咨貴部煩為查照欽遵施行等因咨部送司案呈到部擬合通行查取為此除外合就前去煩為轉行各處巡按御史查照該部題奉欽依内事理欽遵查照施行一咨各處巡撫都御史除外合咨前去煩照該部題奉欽依内事理行令鎮守太監欽遵查照回京施行浙江福建湖廣江西兩廣雲南貴州四川遼東大同宣府延綏甘肅寧夏一具揭帖差主事楊予臣賫赴内府司禮監煩請查照該部題奉欽依内事理欽遵施行乞留聖駕南巡疏王廷相奏為聖駕南巡思獻愚忠事仰惟皇上諭禮部欲躬詣顯陵相卜吉兆旬日之内合行事宜靡不整辦齊備戒行有期臣竊觀皇上南行之計决矣必矣無復疑矣但臣日來積有私憂過計之慮欲聞之皇上九𤼵九止而不敢輙觸君父之怒既而思之人臣事君有犯無隱心有所否忍而不言是自欺其心不忠甚矣况大臣有心膂股肱之託與人主有同戚共樂之義者哉故終不得不為皇上陳之伏惟宥其斧鉞之誅少加聴納幸甚幸甚伏自聖諭下議南巡以來説者曰所過地方災荒特甚人相啖食流民載路盗賊蝟興恐有犯屬車之塵以致驚動乘輿者又有云聖諭南巡近邊冦敵如哈陶部落聞風為患深入腹裏如往年搶至昌平地方致使京師戒嚴者又有云今日之行扈衛官軍旗校及内外從官諸色人役不下數萬其糧料草束車輛馬疋各各供應所費不貲郡縣倉庫在在空虚百姓聞風逃避有司無所措處者此三者皆衆人之慮患之在外者若處置得宜猶可保其無虞臣之所慮乃不在此仰惟皇上玉體清勝常加静養善攝猶時小有不快今也逺涉長途日日登歴縱安輿輕輦未免勞頓而况衝冒風塵隔殊水土六氣襲之五内受之萬一倘致聖體違和聖心不暢誰其任之登頓於山原不如深宮大廷雍容之為安觸冒乎風塵不如逸神静志逍遥之為樂皇上何乃自苦而必欲親行哉臣常日每於朝祭之時獲覩天顔潤粹發氣滿容便與一二大臣言之不覺喜動於心時而聞有不快即為不樂今者皇上逺行去逸就勞舍静而動臣安得不為皇上慮之此臣之所以含痛於心不得不以愚忠陳之也臣又再三思之人君巡幸一事其所闗係至𦂳至要至大至重何以言之居中可以制外事勢機權盡由之我也處外必假付託事勢機權半由諸人也况勞人動衆之餘加之以苦急無聊之故變生於倉卒患起於不測此理勢之或有者觀諸自古以來人主巡幸之事載在史冊足為後世殷監者其得失安危之跡可考而知也知之而不言之是無深逺先幾之見者也是以至難之事草草視為泛常容易者也是不愛重其君犯險履危徼倖於萬一無事者也伏望皇上垂監往事少為加察焉且皇上必欲躬詣顯陵者乃欲自致其誠孝先皇也以臣觀皇上之孝盖自古以來所未有者矣何以言之漢宣帝曽繼昭帝之統矣而不能尊皇其父宋理宗能皇父矣而不能稱帝以宗之漢哀帝能稱皇而廟祀矣而不能宗祀以配天今皇上之於睿皇廟祀矣薦謚矣稱宗矣配天矣而因心之愛無所不極自臨御以來建皇極贊天地康四海服諸夷而繼述之業日為之隆雖大舜之克孝武王之達孝亦未有過於此者伏望皇上自信之重之况天子之孝與士民不同又何必躬自勞苦逺涉數千里之途以下同於士庶人之愛敬乎伏望皇上自信之重之今日之事皇上必欲合𦵏或送而南或遷而北定有宸斷臣請當事自行仍望皇上選遣安静老成曉事親信内臣二人與臣同事再勑内官監選擇各色該用人匠數十人聴臣等指使或送或遷兩月之内即有次第皇上安居九重清穆髙拱而臣等亦能辦集其事却將户部所供糧草賞賜各項銀兩留為修建顯陵之用一舉三得不惟可以慰皇上誠孝之心亦可以免皇上逺行之勞亦可以濟修陵之費大事易得以襄而亦無意外之虞矣宗社幸甚天下幸甚臣干冒天威不知避忌死罪死罪為此具本親賫謹奏以聞伏候勑㫖天變自陳疏王廷相臣仰惟皇上欽承天道寅畏神祇凡百敬事和民無所不用其極宜乎天心格而和氣襲矣邇者奉先寶殿乃有震雷之變都城鼓樓復有龍火之災若天人不順應矣臣俛而思之皇上憲天之政如此其至望治之心如此其切今日之災變夫豈皇上致之意者中外臣工不能仰體聖心奉職無狀之所致爾臣謹以今日中外士風臣節頺壊之狀為皇上陳之以見臣竊位不職宜先罷黜之由伏惟聖明察焉記曰大臣法小臣亷古之士風如此天下烏乎不治社稷烏乎不安臣觀今日朝野之風大不𩔖此亷靖之節僅見貪汙之風大行一得任事之權便為營利之計賄賂大開私門貨積但過闗節㒺不如意濕薪可以㸃火白晝可以通神是豈清平之世所宜有者乎在先朝豈無賄者餽及百兩人已駭其多矣今也動稱數千或及數萬矣豈無貪者暮夜而行潛滅其跡猶恐人知矣今也納賄受賂公行無忌豈非士風之大壊乎大臣貪濁而日在髙位則小臣得於觀感之下者將無不惟利是圖矣京官貪濁而安處無事則外官被其鼔動之風者亦無不惟利是圖矣大小效尤内外征利由今之道不變其俗則在上者日以封殖在下者日以剥削民窮盗起而國事日非矣豈非時政之大害乎且古之士大夫難進而易退寧自守以俟時無寧違道速化以失已寧遁世不見知而不悔無寧熱中阿附毁道以求進盖以其見道明用心剛素有所養而然爾由是人主舉而用之大則可以康世濟務小亦可以風勵時俗而不失民望焉豈不有益於國臣觀今日士大夫之風殊與此異恬退者衆誚其拙奔競者咸嘉其能一登仕宦之途即存僥倖之志或以謟䛕䑛或以賄賂求或以奉承得甚至一官有缺各趨權勢之門講論年資體例應得之故先講既定則後講者或不能得以是無不爭先趨走搶而論之往來頻數閽者厭煩矣既講而不得則又喧嚷騰謗雖吏部亦難於處措故京師有講搶嚷之嘲斯人也自以為得計而不知有識者之見笑於側矣夫恬静者君子之流也奔競者小人之𩔖也奔競者進則恬静者必退由是以小人引小人而朝宁之上無君子矣朝無君子則法揆何由而清紀綱何由而振奸宄何由而除是奔競之風熾世道不祥之幾也豈非時政之大蠧乎仰惟皇上聰明神聖允邁堯舜道源政本澄清宣朗而臣下貪穢奔競之風至於如此豈不大可怪乎臣惟都御史職任糾察百僚振肅風紀今兹二者官邪風壊莫此為甚既不能正身格物使風清弊絶復不能不避嫌疑以抗疏論列悠悠坐視日惟嘅嘆致使内外奸貪公行無忌糾察何在振肅何在由是言之臣之不職在廷之臣莫有踰者雖䝉皇上天徳包容不即誅罰而臣尸禄曠職罪安所逃且夫一婦含寃三年不雨賤臣下獄六月飛霜事乃至微而天應甚著况賄賂交通匪人在職中間事情乖變賢否顛置害及地方軍民含寃者豈止匹夫匹婦而已哉由是觀之上干和氣以招天變實臣奉職無狀致之矣伏望皇上將臣罷歸田里以懲不職别選才賢以端臺揆實政可以責成懋功可以建立庶修省以實而災變亦可弭矣奏奉聖㫖卿職司風紀自後宜糾正百僚以弭天變不准辭吏部知道遵奉欽依條陳時政疏汪鋐禮部因彗星為殃題乞通行九卿衙門并六科十三道各條列時政得失以聞節該欽奉聖㫖依擬務要思忠論實不許挾持泛引假公報私欽此欽遵竊念臣一介庸材無所知識曷能思忠論實以當聖意然待罪班行安敢不披瀝肝膽竭盡一得之愚伏聞臯陶之告大禹有曰在知人在安民此二言者實為治之大綱自古及今未有舍此而可以致治者是故自知人言之其目有四自安民言之其目亦有四重久任公選法杜僥倖尚亷介此四者知人之事也興水利恤刑獄廣儲蓄嚴守禦此四者安民之事也何謂重久任盖官不久任則無固志無固志則無實心無實心則施之政事皆因仍茍且之為簿書期㑹之間而巳耳今之言治者皆曰守令當乆任然豈惟守令天下之官雖不同其不可以聲音笑貌為則無不同也孰有不當久任者哉况法必公而後可行偏則不可行矣臣見近日中外庶官之遷轉比𢎞治以前其速常倍之昔以六年遷者今三年昔以八年遷者今四年久任之廢甚矣如是而欲職業修胡可得也然官缺則當補有缺無補則如之何而可哉此在掌銓衡者有消息調停之術視其輕重緩急之宜而處之當其可耳如家之用財務為撙節之法如此積以數年則久任之法自然可復而百司庶府靡不得人矣臣謂重久任者此也何謂公選法士之初授官惟憑吏部一考耳其才之優劣官之崇卑任之煩簡地之逺近悉於是取决焉夫既不能知其平日之實行而徒取信於一日之間數百字之文詞則已未可盡得其真矣况復茍且粗畧甄别失精挾私狥情顛倒錯亂則所以誤天下之人壊天下之事者又何可言哉臣願皇上勑下該部今後考選務如塲屋糊名編號先於考功等司取其善校閲即中等官四五員分與先看各定為九等不拘名數無上等則缺上等無中等則缺中等乃送於左右侍郎詳看裁决然後送於尚書復加校閲定以髙下如是則庶幾公而無私才者上不才者下天下之官庶幾各得其人矣臣謂公選法者此也何謂杜僥倖吏部之黜陟惟憑撫按舉劾舉劾不公則黜陟有不當矣夫其舉也或以賄賂或以親故其劾也或以私忿或以䜛譖故舉之之濫有省至數十人而劾之之濫有下及典史驛丞者職此由耳此撫按之薦舉實天下僥倖之大闗節也臣深知其弊故初受命為右都御史即以慎舉劾為皇上言之欲令薦舉各官務要精擇才行出衆政蹟卓異者舉之照依𢎞治以前闔省多不過四五人少或二三人糾劾各官務要求其真實不才事有顯跡者劾之如曰亷能公謹必指其亷能公謹者何事如曰汙濫姦佞必指其汙濫姦佞者何事毎一人項下必舉十餘事少亦七八事不得為泛然無稽之論如所舉之人始以亷舉而卒以貪敗始以公謹舉而卒以不謹敗吏部即查明白連坐以罪臣等即亦指實恭奏其清軍提學巡鹽巡闗巡茶馬屯田等項御史止將各管官員舉劾賢否其全不得一槩舉劾臣之言如此荷䝉皇上不棄芻蕘俯賜嘉納即降明㫖都依擬行臣不勝忻躍竊以為太平之機括在此矣奈何人心蔽固已極迄今三年鮮有著實奉行者臣是以即其所舉被黜干考察者疏實以聞乞正連坐之法荷䝉皇上含宏寛大之徳不忍盡棄猶以多寡為等差二名以下止得罰俸臣竊恐治惡不嚴則僥倖之門終不可杜而太平之效終不可致昔人有言一家哭何如一路哭夫往事臣不敢復言矣尚願今後不拘多寡但有薦舉不當事敗即連坐之務使法之行堅如金石雖千萬世不移也如此則舉劾自無不公黜陟自無不當矣臣謂杜僥倖者此也何謂尚亷介盖士之亷猶女之潔士而不亷則他行雖有可觀終無正己正人之實德决不能有所樹立猶女不潔雖千百其能千百其巧亦烏足尚哉是故亷也者士君子立身之大節也大節不謹他何取焉且如守令之職最為親民茍使其一介不取則自然一私不存法雖嚴人則畏之不以為苛政雖寛人則懐之不以為縱雖無剖决如流之才終有恩惠及民之實其致太平也何有茍或不亷則其嚴也為深為刻為强梁為暴虐而巳耳其寛也為柔為佞為懦弱為無斷而巳耳雖有治事之才率為濟奸之具其致亂亡也何有夫藩臬所以制乎守令者也撫按又所以通制之者也臣欲候命下行令撫按官員今後舉劾各官務擇其亷者舉之不亷者劾之其他賢否止於冊揭考語内見之不必形諸奏牘仍咨吏部將其所舉亷者即加顯擢不亷者即行罷黜及將在廷大小羣工不時詢訪一體黜陟尤望皇上如神之智亦試一加察焉則人心之趨向自正而太平可立待矣臣謂尚亷介者此也何謂興水利臣竊見各處地方水旱相仍五穀不登人民饑窘而陜西一省連年亢旱尤為狼狽臣乃考諸史冊知輔臣丘濬有言井田之制雖不可行溝洫之制則不可廢及又考其秦鄭國開涇水以為渠於是闗中為沃壤魏史起引漳水以溉鄴於是㵼鹵生稻粱蜀李氷壅江水作􅔐於是蜀沃野千里漢召信臣造鉗盧陂人歌召父杜詩復修其業人歌杜母宋黄懋建言於河北諸州作水利卒有墾田六百里之效元虞集建言遼海一帶引水為田卒有海口萬户之設臣於是備由具奏乞勑陜西延綏甘肅寧夏及河南山東山西四川湖廣南北直𨽻各該巡撫都御史務要一體訪求古人巳行之迹著實舉行各嚴督所屬司府州縣衛所各該掌印管糧管屯等官各躬親循行郊野相視地宜某川之水可導某山之泉可疏其導之也或為溝或為洫必因水勢之大小其疏之也或為遂或為瀦必因地勢之髙下或為防以止水或為澮以㵼水或當為陂或當為堰考古人已行於昔者而施之於今求古人已行於彼者而為之於此必使山川原野之間水有所趨無壅遏之患水有所防無决壊之憂水有所蓄無散溢之虞如此則旱不能為災潦不能為虐而民之饑者可食困者可蘇矣臣之言如此伏䝉皇上特降明㫖謂水利工役重大還待邊方事寧時年豐稔來説欽此欽遵臣竊惟水利之興實皇上所以養育民生保全民命之大本也實皇上所以幹旋造化救度流亡之急務也今日聞之今日即賜施行若决江河沛然莫之能禦斯可以仰副皇上軫念元元不遑寢處之盛心明㫖所謂還待云者臣仰思聖意豈不曰民困甚矣曷可驅而勞之邊境危矣曷可舍彼顧此此聖意之詳慮却顧臣復何言但臣竊以為民之無田者其困已甚民之有田者雖困未甚也水利之修有田者為之與無田之民不相闗也且如十里之内有田百頃或數十家共則數十家為之或百餘家共則百餘家為之固不借力於他人也特以人心不齊必俟官府督責之而後可為耳以佚道使民雖勞不怨何懼其工役重大哉夫七年之病求三年之艾茍為不蓄終身不得旱乾為虐巳三年矣茍不及時興修水利則安得有豐稔之年乎若夫邊境雖曰多事然守邊者軍也非民也修水利者民也非軍也自不相涉也巡撫雖以邊事為急然亦未甞日日躬親從事於干戈戰陣之塲其所以督修夫水利者亦自不相妨也伏望皇上容納臣言早行一日則民命早活一日早行一年則民早活一年皇上軫念元元之心於是乎可以少慰而臣犬馬報君之忠亦於是乎可以少盡矣不勝幸甚不勝幸甚臣謂興水利者此也何謂恤刑獄切照刑部都察院問理各項詞訟監禁者動經屢年奏訴者斥充道路其間恃刁健訟之徒固不為少而抱抑負寃之輩亦不能無且如問官明知寃抑或習於因循或拘於成案或沮於嫌疑或溺於私意往往不為明白辨問此其當恤一也又如罪犯稱寃不服例該調問一調不已而再調再調不已而三調任從屢調只照原擬先後相沿牢不可破此其當恤二也又如送審大理寺或因問招不得其情而駁或因擬罪不合其律而駁問官往往偏執已見以駁為非不肯更改駁愈煩而執愈甚以致罪犯經年累月不得脱獄此其當恤三也又如問招本已得情該寺或誤謂未得擬罪本已合律該寺或誤謂未合甚至拘拘較論一文一字以為能以致往返駁辨淹纒不决罪犯反受其累大理以平反為職罪犯之來招擬已具惟審其有寃無寃則可矣有寃則駁無寃則允如流水行雲此之謂大經大法至公無私固不必牽制於文義亦不必示威於鞭扑易曰君子以明慎用刑而不留獄夫牢獄之苦守日如年一人繫獄一家皇皇焉如焚溺之在目此其當恤四也又如京城内外大小詞訟皆赴法司告理法司不即親問輙行五城兵馬勘報兵馬亷明者少貪昧者多顛倒出入勢不能無法司官據勘成獄寃抑卒不可解此其當恤五也伏望皇上勑臣等法司各省躬反已如是五者之病有則改之無則加勉庶幾刑罰可清民命可保而和氣自臻矣至於外之刑獄尤為不經其責實在巡按巡按茍有欽恤之心則自不能不勤於巡歴而詳於辨理是故一方之民命巡按實司之臣於各處訴寃之本必行令巡按親為勘問然能遵行者絶少率多委官委官又復委官展轉推託畢竟歸於寃而已臣欲候命下今後巡按回繳勘合必視其曽否親問茍非親問即行恭劾不容回道如是則庶幾民無寃抑臣謂恤刑獄者此也何謂廣儲蓄在昔祖宗之時以兩淮兩浙之鹽為飛輓邊儲之計故不呼而集不勞而積其法之善雖萬世不可易者後因權勢專利之徒有買窩賣窩之弊當事者無能禁止徒并其法而廢之以塞已之責與因噎廢食誠無以異又其後規規於餘鹽之増價遂以為得䇿而飛輓之法竟不可復近日御史周相聞人詮嘗以為言臣深善其議復為皇上陳之已荷聖明依擬行矣臣復何説竊惟儲蓄之廣其法有三鹽利一也屯田二也水利三也然是三者實相為用鹽利興則召商開中無力耕田者有商人以接濟之自無不耕之田水利興則引水溉田有力耕田者雖旱乾不能為害自無不稔之嵗屯田之入既饒鹽利之積又厚則邊儲焉有不給者哉臣謂廣儲蓄者此也何謂嚴守禦盖西北之敵所以荼毒乎邊氓者甚矣强敵常衆而我兵常寡卒然一至所向無前惟在固守以禦之矣然無郎機之利銃雖欲守焉得而守今幸有此銃可以一當千千當數萬而防守之利莫有過焉十里一堡堡置三銃五里一墩墩置一銃星羅碁布無有空缺則敵雖有百萬數千萬亦將何所用哉近日尚書唐龍侍即張瓚都御史楊志學皆寄書與臣謂此銃實為萬世無窮之利盖皆嘗試之而見其的有成效矣又各具疏請乞多給臣欲候命下移咨工部專一委官督造務令堅固如法毎遇各邊請給即照數與之仍移咨各該巡撫都御史務照依臣原日題奉欽依置墩臺立城堡守以此銃自可永保無虞坐享康年之福凡一切選將練兵増糧買馬之事皆不足為及移咨兩廣雲南四川各提督巡撫都御史各於要害之地一體設堡請銃守之則盗賊自無不弭而生民自無不安矣如是各該巡撫不能著實舉行而徒𤨏𤨏於他務以炫已能以欺君上致有誤事之失聴巡按御史指實恭奏如臣言不效亦乞治臣罪臣謂嚴守禦者此也夫是八事實切於時政之大但臣淺見詖説不能不得此遺彼掛一漏萬伏望皇上矜臣之愚俯賜采擇亦或庶幾可為聖政萬一之助愚臣幸甚天下幸甚臣干冒天威不勝戰慄待罪之至為此具本親賫謹具奏聞伏候勑㫖奉聖㫖覽卿奏足見為國至意該衙門詳議停當來説名臣經濟録巻十一
