body:
  text: 名臣經濟録卷二十六明黄訓編禮部儀制中設學校以立教一丘濬臣按真德秀言古法其近民者教彌數故二十五家為閭閭有塾民朝夕處焉四閭為族則歲之讀法十有四士生斯時不待舎去桑梓而有學有師敬敏任恤則閭胥書之孝弟睦婣則族師書之其所以教又皆因性牖民而納諸至善之域禮鎔樂洽以成其德達其材古者教人之功盖如此今之世里於民最近而無學士嘗輕去土著而事逺游行之修窳無所乎考至其設教以琢詞鎪句為巧詭聖僻說為能非惟無以淑人抑且重斵喪之也真氏此言切中秦漢以來教學之弊我聖祖慨然欲復古庠序之制未即大位之先即建國子學洪武二年詔立府州縣學八年詔立社學上諭中書省臣曰昔成周之世家有塾黨有庠故民無不知學士以敎化行而風俗美今京師及郡縣皆有學而鄉社之民樂覩教化宜令有司更置社學延師儒以教民間子弟庶可以導民善俗也竊觀三代以後之君以武功定天下者往往緩於文事漢歴髙惠文景至武帝五世始立太學宋歴太祖太宗真宗至仁宗四世州郡始有學我聖祖立國子學於未登極前之三年立郡縣學於登極後之二年至於八年即立社學其與古人家塾黨庠術序之名雖不同其以土著教人則一也設學校以立教二丘濬臣按郡縣有學始北魏獻文時而其生徒有數亦於是時始也唐制天下都督府州縣學校有生徒各因其州縣之等定第而定其數每歲舉其成者送之尚書省史記所謂由學校者曰生徒是巳我朝於府州縣各立學府學廪膳生四十人州學三十人縣學二十人其増廣生則不拘額數夫聖人之於人非不欲人人教而養之也顧勢有所不能盡也於是擇其尤者而篤厚之非謂一郡一邑之人才止於此也地有小大人有衆寡養之者雖各有數而教之者則其限焉教之養之至於大成而後貢之而又有科目拔於常貢之外雖然承平日乆人才日多人才所當養者又不可拘拘於故常也且如松江之華亭江右之臨川人民里數多至七百而漢中之平利廣右之恭城止於一二里其生徒之數乃無異焉請如唐制因其郡邑人民多少之數而定為飬士之額設學校以立教三丘濬臣按三代以後文治首稱宋朝然其立學乃在四世之後自其開國至是幾八十年矣我聖祖以歲戊申開國明年即詔府州縣立學其太學之立乃在未登極之前三年歲乙巳也方其初立學擢許存仁為博士以專學事四年陞學為四品設祭酒即拜存仁為之存仁元儒許謙之孫謙承考亭正學而存仁承上命以為教一宗朱氏之學非六經四書不讀非濓洛關閩之學不講所謂全體大用之學者也所謂治事者固巳在乎經義之中一時學校之士無不明經者經明以之治事凡所謂水利邊防等事皆自此而推之也宋人乃分之為二則是以體用為二事而非聖賢之學矣設學校以立教四丘濬臣按禮曰師嚴然後道尊道尊然後民知敬學祖宗以來最重教官之選往往取之耆儒宿學其後科目興乃取之乙榜舉人其有優異者不次擢居顯要故居是官者人人自奮既皆以道自重而一時公卿大臣藩臬守令亦皆重之是以既樂為之莫不謹身飭行以示教嚴立規範以為教善人多而風俗美朝廷得人之用皆由師道之立也近世師儒之職日輕公卿藩臬略不加之以禮而乙科舉人多不屑就乃取歲貢之士為之徒取充位而巳所謂教法者蕩然矣臣竊以為國家要務莫急於儲賢儲賢必先於教養所以代君以施教養者師儒之職也其任若輕而實重自今宜如宋人慎重其選假如一府并其屬共有十學該設教官三十五員不分教訓職名一郡所選教官苟足以分職各學不必備員朝廷既遴選其人不肯輕授人得之以為難自然貴重官既不多所以供億者稍足而彼亦不厭其禄薄矣仍勑有司申明憲綱以禮待之坐以聽講不行跪禮違者坐以風憲失職之罪如此則教官得人教官得人則生徒充業而國家有得人之效所以成世務夀國脉此其基也設學校以立教五丘濬臣按太學之教所以聚天下賢才使之講明經史切磋琢磨以成就其器業以為天下國家之用非顓顓以計歲月較髙下以為仕進之途也三代之制比年入學中年考較必至於七年而小成九年而大成然後用之月書季考程順尚以為教之所爭夫何士子尚在學校之中遽巳立為升進之法比之私試等第其文其爲爭也尤大焉是豈三代明倫之教古人大學之法哉本朝洪武十六年定生員三等髙下凡通四書未通經者居正義崇志廣業堂一年半之上文理條暢者升修道誠心堂一年半之上經史兼通文理俱優者升率性堂升率性堂者方許積分積分之法孟月試本經義仲月試論及内科詔誥表章季月試史策及判語二每試文理俱優與一分理優文劣者與半分文理純繆者無分歲内積至八分者為及格與出身不及分者仍坐堂肄業一如科學之制其後此制不用監生惟計年月先後撥出六部諸司歴事三閱月所司考其勤謹奏送吏部附選挨次取用外此又有寫本寫誥者就中寫能書者充此又太學出身之資格也方其在學校時每月之中㑹講背書皆有定日每季一試惟第髙下以為激勸之方而於出身無所闗預又輪差於内外諸司俾其習於政事半年回學晝則趣事於各司夕則歸宿於齋舎優游之以歲月琢磨之以義理約束之以規法廪食學校則俾其習經史歴事各司則俾其習政法遇大比科許其就試其為教法可謂本末兼舉矣近年以來為邊方事起之故建議者欲存省京儲以備急用始為依親之例教法稍變祖宗之舊疆場無事儲蓄日充請勑所司申明舊法以復祖宗養士之舊設學校以立教六丘濬臣按太學之設教養生徒以為國家之用其闗係至重張載有言人才出國將昌子孫才族將大國家之有賢才猶人家之有子孫也所以培養之者烏可以不加之意哉祖宗養賢之制視前代為盛各門設宣課司以收商税盡以為供給士子之費設典簿以掌錢粮設掌饌以司飯食其膳夫三更五㸃不起有誤㑹饌責罰三犯處以極刑監丞典簿掌饌管不嚴肅重加責罰嗚呼聖祖草創之初事多未備其所以廩養多士者巳如此其周密況列聖相承承平日久顧所以養士者反不如草創之初可乎臣請申明祖宗舊制復㑹饌以養太學之士是亦聖孝繼志述事之大節也提督學校條例禮部為學校事正統元年六月二十一日准行在禮部先於行在禮科抄出少師兼戸部尚書黄福建言事件該行在通政使司官奏奉聖㫖該部看欽此欽遵抄出看得近年以來各處布政司按察司及府州縣官不以朝廷作養人才為重或因地方廣闊經年不能徧歴或因政事繁冗累月不暇案臨或因政務所妨徒以徴科為急或有不通文學但知幹辦為能虚費廩膳有負作養擬得合無於浙江等按察司各添設僉事一員南北直𨽻選除御史二員專一提督學校宜從行在吏部照例㑹官舉保文學才行兼修堪為後學儀表者選用正統元年四月初四早本部官題奉聖㫖是欽此欽遵行該到部㑹同都察院堂上官公同舉保到鹽運司同知胡軫等一十二員本月二十七日具題除授副使僉事等官往浙江等處節該奉聖㫖職專提調學校這是朝廷育賢緊要事還著禮部翰林院計較合行條例具奏寫勑與他每去欽此欽遵㑹同少傅兵部尚書兼華盖殿大學士楊士竒等官計議到合行條例理合開坐正統元年五月二十一日早本部官奏奉聖㫖是都依這議的寫勑與他去欽此欽遵外擬合通行須至劄付者一學者不惟讀書作文必先遵守孝弟忠信禮義亷恥使見諸踐履以端本原一士貴實學比來習俗頹敝不務實行於巳惟記誦舊文以圖僥倖今宜首革此弊凡生員四書本經必要講讀精熟融㑹貫通至於各經及子史諸書皆須講明時常考試勉勵庶幾將來朝廷得用不負敎養一學者所作四書經義論策等文務要典實説理詳明不許浮虚夸誕至於習字亦要端楷一學校無成皆由師道不立今之教官賢否不齊先須察其德行考其文學果所行所學皆善須禮待之若一次考驗學問踈淺及怠於訓誨姑且誡勵使向進改過若再無進不改量施決罰三考仍無進不改送吏部罷黜若貪淫不肖顯有實跡者不必考其文學即具奏拏問吏部别選有學行者往補其缺一學校一切事務並要遵依洪武年卧碑不許改違一師生每日坐齋講書及日逐廩膳府學令有司僉與膳夫四名齋夫八名州學膳夫三名齋夫六名縣學膳夫二名齋夫四名不許違悞缺役亦不許數外濫設一生員有食廩六年以上不諳文理者悉發充吏增廣生員有入學六年以上不諳文理者罷黜為民當差一生員有缺即於本處不問官員軍民之家選擇俊秀端重子弟有志於學者考設補充不許聽信有司及學官受私濫舉一生員之家並依洪武年間例除本身外優免戸内二丁差役有司不許故違一凡巡視學校水路乗驛舟陸路乗官馬仍於本司帶書吏一名隨行陸路乗官驢俱支廪給一所在有司宜用心提調學校嚴束師生敎讀不許縱其在外放蕩為非學校殿堂齋居等屋損壊即便令有司辦料量工修理不許藉此生事因而重擾百姓今後有司若恃按察司副使僉事或御史專理學校推故不行用心提調及學校中一切可行之事不整理者許指實行移合干上司通知給由之日以憑降黜一所過之處遇有軍民利病及不才官吏貪酷害人事干請㫖從實奏聞一所過之處有軍民人等訴告寃枉等事許受其狀詞輕則發下衛所府州縣從實處治重則送按察司提問本職專督學校不理刑名一科舉本古者鄉舉里選之法今南北所取舉人名數巳有定制近年奔競之徒利他處學者寡少往往赴彼投充増廣生員詐冐鄉貫隠蔽過惡一槩應試所在教官僥倖以爲己功其弊滋甚今後不許違者聽本職及提調科舉官監試官拏問一提調學校副使僉事御史或往他處其所在有經過布政司按察司官及巡按監察御史并本處府州縣官皆當加意提督不許怠慢推故不理亦不許侵越提調者貪淫無狀許巡按監察御史指實具奏不許擅加凌辱一所轄境内遇有衛所學校一體提調整理武職子弟悉令其習讀武經七書百將傳及操習武藝其中有能學舉業者悉聽科舉右劄付國子監准此正統元年六月二十三日論太學狀竊惟太學者天下貢士所萃乃育賢成材之地故天下之士所以賢所以材胥此焉出賢材所以盛所以衰胥此焉係然則生民之休戚風俗之美惡國家之安危豈不皆關於此哉洪惟太祖髙皇帝聖神文武平一天下定鼎金陵首崇是道方是之時宫殿城池未盡完也百府諸司未盡創也佛寺道觀未盡興也乃建太學於國都宏其規模極其壯麗凡所以敎士之法戒士之條居士之所養具無不詳審周密完備又慮表率之職實難其人務選天下學明行修德尊望重海内所向慕士夫所依歸足以師表一代名盖一時者然後命為祭酒崇以師道以振文風以增士氣其愛惜諸生如慈母之顧嬰兒貴之若席上之珍恩惠極隆無以加尚於是天下之士入太學者居無不正習無不端衣無不具食無不足無饑寒之亂心無邪僻之墮行其所事者治禮義明人倫窮修己治人之方務致君澤民之術故當時賢才俊傑之士濟濟輩出布列中外大綱一正萬目畢張自古太平之盛未能或之先也易曰聖人養賢以及萬民其斯之謂歟永樂初年駕臨北京太學之設因元之舊凡百規制未暇増新洪熙宣德以來因仍未舉至其敎戒居養之道頽然廢弛不遑介意師儒之職率皆庸常學行荒疎無所矜式雖有遺規不過承虛名為文具踵因循應故事而巳於是天下之士入學者蔑教戒之嚴無居養之正置禮義為外物輕亷恥如錙銖雜處於軍民之家渾住於營巷之地與市井之人為伍無藉之徒相接同其室而共其食啖其夫而私其婦易君子之操為鄙夫之行改士夫之節為穿窬之心所習如此一旦居官不過志於富貴而巳尚何望其尊主庇民建功立業乎夫近朱者赤近墨者黒居住所致無怪其然也嗚呼天下之士修之於庠序而壊之於太學賈誼所謂可為太息者也陛下春秋鼎盛纉成大統凡一舉措不可不慎舉所當舉則天下之人莫不懽心措非當措則天下之人莫不解體可不慎歟我國家建都北京以來有廢弛而不舉者有創新而不措者所廢弛者莫甚於太學所創新者莫多於佛寺舉措如是臣以為舛矣然成事不說廢者當舉若重修太學雖極壯麗亦不過佛寺一所之費況佛寺無益於朝廷而太學實闗於治體伏願皇上興廢舉墜乞勑該部計料興工一新太學作養秀才重選師儒厚加眷注果能此道將見數年之後賢材濟濟文風大振生民於是乎安天下於是乎治我太祖養賢及民之效復見於今日太平之盛不期自至而國家社稷永享無窮之福矣臣性質凡陋無所知識偶有所見豈敢隠黙冐干天聽不勝惶汗之至國子監革弊事宜奏章𢡟𢎞治十七年閏四月二十二日該司禮監太監陳寛傳奉聖㫖近來各衙門弊政多端軍民受害以致上干和氣深切朕懐合行緊要革弊事宜各該衙門便查議明白開具來説欽此欽遵臣有以仰見陛下敬天愛民孜孜圖治即二帝三王之用心宗社生民之大幸也敢不夙夜匪懈講求弊政之所當革與時變之所宜通者以為聖治涓埃之一助哉竊惟治無古今利民者爲良法論無當否便民者為嘉謨今天下承平日久文恬武熙政出因循事多積弊以言乎國用則不充以言乎兵力則不强以言乎國論則不定以言乎紀綱則不肅以言乎刑罰則不清以言乎俗尚則奢僣而無節以言乎士習則奔競而嗜利以言乎官吏則誕慢而具文僥偽日滋而閭閻窮困奸宄竊發而邊鄙失寧所以上干和氣災異迭見而厪陛下宵旰之憂也其大本之未正而萬弊之所由生者在廷大臣暨言路諸臣必能一一為陛下陳之臣固未敢出位而僣言也姑就職司之所及者而論之雖云細務非大體所闗然亦積弊之久為民之害有不容不為之區處者敢陳鄙見上凟宸聰伏望聖明深恤民隠俯察邇言通變宜民勿拘故常之見更化善治用垂久逺之規庶幾宿蠧可袪而民困可甦天下幸甚為此今將本監合行革弊事宜具本專差辦事吏某賫奉謹具奏聞一本監歲貢諸生先在各處府州縣學為附學為增廣亦既有年然後得廪其廪膳必二十餘年或三十年而後得貢迨貢入國學逺者十餘年近亦三五年而後撥歴又歴事一年而掛選通計前後年數巳五六十嵗又待選十餘年而後得官則其人巳老多不堪用因而死亡者亦不少矣是國家虚費廪米數百石以養一人而不得其一日之用豈不重可惜哉此今日積弊之大者不可不早為之所也如蒙乞勑該部計議先清之於學校責任提學憲臣嚴加考選凡材之庸下年之老邁不堪作養者不許食廪充貢次清之於國學照依先年命大臣揀選之法而加嚴凡材之庸下年之老耄不堪任用者不容在監待其掛選之時吏部就行考定髙下或賜冠帶或授合得品級散官使之待選於家而行各處巡撫巡按分巡分守及司府正官凡有公事委之幹辦既可使之習於政事又可驗其能否每歲終各該上司開具差委過各人幹辦實跡第其材識髙下造冊奏聞其材識優長堪任用者即行取選年老無材不堪用者就令致仕況洪武中嘗差監生各處丈量田土亦欲驗其能否而授職也明試以功如此則官使得人而民皆受其惠矣此賢愚同滯之弊所當革者也一本監舊制博士助教學正學録等官共三十七員盖國初天下人材共入一監作養故設官之多如是後因添設北監頗因裁減查得成化初年本監止有博士三員助教十員學正學録共七員耳今在監諸生不過七八百人而博助正録等官餘三十員又㑹饌久停掌饌一員巳為虚設而今乃有兩員似乎過冗且各官所食之廪禄所役之皂𨽻皆生民之膏血而國家大農之經費也冗食不節國用虚矣臣竊聞官不必備惟在得人各官為諸生表率後學模範茍非其人則師道不立教難成效又況近奉新例風憲有缺許於博士助教等官内選補則各官者不惟風教所係抑乃風憲之儲尤宜慎選其人不以備員為貴也如蒙乞勑該部叅酌所宜量為裁減如成化初年之數以後遇有缺員合無行令巡撫巡按提學等官推選學行超卓教誨有方者列函舉奏及九年考滿教官内有功績而兼著時名者以補其缺庶幾用不失人既有以佐風教而備迪簡員不至冗又可以寛民力而紓國用矣此冗食之弊所當革者也一本監官吏俸粮及監生家小月粮俱係糙米師生㑹饌係熟米每歲預先㑹數具呈南京戸部坐𣲖蘇常等府解納本色近奉南京戸部劄付判官𢎞治十六年分折納糙熟米共三千八百石計銀二千六百六十兩不分糙熟米俱作七錢一石臣查得南京部院等衙門官吏監生俸粮近年俱是折價每石納銀七錢今將本監俸月粮糙米亦作七錢一石折納委實事體相同經久可行惟有㑹饌白熟米亦係按月闗支每人多者不過三斗少則七八升者有之三五升者有之若將銀兩碎分不免虧折之患又後湖查冊監生數多所有饌米乃日用不可缺者雖云有銀可糴而米價貴時熟米一石不止七錢欲從本監糴買供應又不免陪補之患若止將銀兩送湖則湖上亦費區處臣愚見此項粮米只合收受本色巳行具呈南京戸部定奪該部稱係巡撫衙門奏准事例難擅改移只得遵依收受訖但恐遂為永制則二患有未巳也如蒙乞勑該部查議合無將本監官吏監生俸粮月米以後年分照依各衙事例折納價銀使民獲輕賫之便其饌米仍納本色則官免虧折陪補之患此則預防其弊官民兩便之事也一本監舊額膳夫一百名皆應天府所屬各縣編審均徭人戸充役為因節有逃亡不便成化二十二年該欽差巡撫南直𨽻右副都御史王克復始行改𣲖蘇松常徽寧國五府每名一年改銀一十二兩有閏加一兩以充僱役之用本監先前收獲前項銀兩僱人應役自文廟六堂及博士㕔并内外各號看守灑掃及雜用工役等項共僱七十餘人該用工食銀四百五十餘兩其餘分𣲖各官名下僱人跟用及本監一應公用如辦納内府浣衣局濕小粉等項皆於此取給先任祭酒劉某頗嘗積有贏餘奏准修理號舎訖自臣到任以來所收𢎞治十五年十六年銀兩除僱人應役外比照北監見行事例虧欠數多學正學録典籍掌饌職卑禄薄官員各一名共用三十二名其餘公用隨宜節縮亦頗有餘均給六堂監生俱有文案簿籍惟是未經奏請於義未安今𢎞治十七年蘇松常三府共該膳夫七十名每名止解銀十兩其來文開稱係巡按馮御史議處事例而徽寧二府却照例解發多寡不齊欲便聽從輕減以寛民力義無不可但亦未經奏請未敢擅便定奪又今後湖查冊例該兼撥膳夫徒夫到彼供役縁法司近年問擬囚徒並無一名到監無從差撥巳曽具呈南京禮部轉行取撥而法司回文須要申請方准撥送以此本監只得盡用前項銀兩多僱人役前去供應但恐從此遂廢舊規未便如蒙乞勑該部查議前項膳夫應該納銀若干通行各府遵守庶幾事體歸一仍乞查照祖宗舊制及北監事例行南京法司照前問發充徒送監應役庶使百年成規不至隳廢所有前項膳夫銀兩除僱役外合無給與博士等官各一名及公用或有剰餘合無均給諸生惟復用以修理公廨或刋補書板亦乞斟酌所宜立為定制以便遵守仍將收支數目明立文案隨卷照刷以防奸弊庶幾財無妄費民免重困此又革弊恤民之一端也一本監㑹饌乾魚每年預先㑹數俱是南京戸部行湖廣布政司坐𣲖所屬各該河泊所辦納猪肉則每三日一次㑹數行應天府都税等司辦納行之歲久積弊多端當魚貴時則輸納後期而支用多缺及魚賤時則一年併至而給散有餘堆積在庫一經暑雨則臭腐潰爛化為灰土人不可食不無暴殄天物其饌肉每當暑月送納之際亦多臭敗退換則買補不便收受則日用不堪彼此皆以為患本年五月内據應天府都税等司連申自願折納肉價銅錢行據各班堂友長呈稱若如所申委的兩便隨呈南京定奪未蒙施行臣查得國子監通志毎人每日乾魚二兩而本監案卷數十年間止是三日二兩又查得北監有給錢鈔事例饌肉亦係折納如蒙乞勑該部從長計議即今在庫腐魚數多合無從每日二兩之例分給以後各該河泊所嵗辦乾魚欲乞酌量中價止令折納銀兩則民免裝運輸納之費而在官亦免堆積腐壊之患其饌肉每年自四月初起至八月終止暑熱易敗之時合無准其照依時估折納銅錢庶得官民兩便此事雖無闗於大體實亦積弊之不容坐視者也一近因戸部奏准取撥監生往後湖查冊縁彼處冬月苦寒夜無燈火夏月盛暑又多蚊蚋兼以土地卑濕水泉汚濁監生到彼多致疾病而死者以故畏難而不肯去往往告求養病及搬取畢姻依親就教職等項以避其差查得先年查冊之時監中人多常撥七百名分作兩班往來替換猶以爲苦臣竊謂好逸惡勞人情之常查冊一事比之其他短差及坐班委的勞逸相懸不可不為之所也如䝉乞勑該部計議合無將查冊一月者准筭坐班兩月使人有所激勸而忘其勞或别作區處以增添監生如先年之數使得分畨更換庶幾公務易完而人情樂從此又優恤監生之一事也楓山先生集奏修明教化事謝鐸臣聞教化學校所自出誠國家之急務而不可一日忽焉者也故我太祖皇帝定鼎金陵首建國學以司教化以式四方所以為天下國家慮者至深逺矣百餘年間繼繼承承罔敢失墜皇上嗣位之初謁廟幸學尤切注意於此臣實何人謬膺此任受命以來夙夜戰兢恒思古人以身教而化天下者固未易能然法制禁令之間或可以為教化萬一之助者茍有所見亦烏敢自隠而不為陛下言之哉所有各言事宜輙敢條列於左一曰擇師儒以重敎化之職二曰慎科貢以清敎化之源三曰正祀典以端教化之本四曰廣載籍以永教化之基五曰復㑹饌以嚴教化之地六曰均撥歴以拯教化之弊凡此六者自今而觀惟撥歴最為緊要而㑹饌次之其他不以為迂泛不切則以為窒碍難行臣竊思之不擇師儒則所教或非其道不慎科貢則所養或非其賢不正祀典則駿奔仰瞻之際無以示趨向不廣載籍則明體適用之學無以資見聞臣恐所謂㑹饌所謂撥歴者一切皆為虚文故事以如是坐食待次之人而欲備他日天下國家之用臣愚誠未見其可也凡此皆臣旦夕之所憂念以求盡職分於萬一而求能者用是冐昧上陳不敢緩於此而急於彼若論其極則所謂教化本源其逺者大者尚不止此出位之思又非臣愚所得而易言也伏惟聖明留意則天下幸甚臣不勝犬馬惓惓一擇師儒以重教化之職臣愚竊謂師道立則善人多善人多則天下治是師儒之職誠不可以不重如臣等兩京國子監官以至十三布政使司南北直𨽻提學等官皆所謂師儒也有如臣者至愚極陋既病且衰力不逮志巳甚愧負於初心任匪其人曷克更圖於後效願乞早賜罷黜之恩以為師儒不職之戒然後另求道德之士以為太學之師如唐之韓愈宋之楊時庶幾教化有賴人材有作而朝廷之委任天下之仰望不為虚也至於提學等官雖一方教化之司實天下人才之責權足以黜陟其間非如國學之徒守繩墨而不敢越功足以培養其始非如國學之坐視扞格而不可違盖其官之所歴視國學雖為稍卑而其職之所闗視國學則為最切故必得亷靜恬退之士而有嚴重剛方之操風采綱紀之中而有㴠養作興之道者庶足以稱其任而不愧其職也不然或矯激以賣公道或假託以盖私恩在我者不能以不奔競何以禁人之不我乎奔競在我者不能以不貪得何以禁人之不於我乎貪得科貢由之而弊人才以之而衰其府州縣學等官固亦視其好惡以爲向背因其勸懲以為賢否盖又在所不必論也凡若此者臣豈敢推過於人而不歸咎於己其實天下之士十數年養成於彼而欲一旦責成於此雖有智者殆亦無如之何伏願聖明深加之意精擇其人而無如用臣之誤則庶幾於教化之職無負矣二慎科貢以清敎化之源臣愚竊謂國學所養之士皆萬邦黎獻之臣不取之歲貢則取之鄉科是國學為養士之地而科貢實取士之階誠不可以不慎也今之所謂歲貢者雖足以勝輸納自進之徒而因循姑息之弊實莫此為甚今之所謂科舉者雖可以得豪傑非常之士而虚浮躁競之習亦莫此為甚盖科舉必本於讀書今而不讀京華日抄則讀主意不讀源流至論則讀提綱甚者不知經史為何書嵗貢必先於食廪今而不以貨賄廩則以權勢廩不以優老廪則以恤貧廪甚者不知舉業為何物是雖未必盡然大率實類於此臣愚乞勑提學等官凡此日抄等書其板在書坊者必聚而焚之以永絶其根柢其書在民間者必禁而絶之以悉投於水火於其廪之未食者必嚴加考覈而不容其倖進於其廩之巳食者必痛加裁革而不恤其私怨如此庶幾國學之所養皆賢不惟朝廷之恩無負而教化之源亦稍清矣三正祀典以端教化之本臣愚竊謂孔廟從祀之賢實萬世瞻仰所繫一有不合於天理人心之公何以為教化本原之地是誠不可以不正也且所謂十哲七十二子以及左氏以下二十二人其所當黜陟者先儒程子與熊去非巳有定論而近時大臣與禮官亦嘗㑹議取自上裁不敢再贅但此外猶有不能以無疑者有若龜山先生楊時程門髙弟伊洛正傳息邪放淫以承孟氏不愧南軒所稱繼往開來吾道南矣實演晦翁之𣲖雖其晚節一出不克盡從其言而新經之闢誠足以衛吾道論行檢漢儒如馬融戴聖之徒固為不可幾及論著述宋儒自周程張朱之外恐亦未免有疵如是而不預從祀之列臣竊惑焉又若臨川郡公吳澄著述雖不為不多行檢則不無可議生長於淳祐貢舉於咸淳受宋之恩者巳如此其久為國子司業為翰林學士歴元之官者乃如彼其榮出處聖賢之大節夷夏古今之大防處中國而居然愚昧忘君親而不恥仇讐迹其所為曾不及洛邑之頑民何敢望首陽之髙士昔人謂其專務聖賢之學卓然進退之際不識聖賢之於進退果如是否乎如是而猶在從祀之列臣固不能以無惑況二人者皆太學之師其於廟祀黜陟之際尤不可以不正也臣愚乞勑升時以上祔宋諸賢之位斥澄以下從莽大夫之列不惟天下之公論允愜而於世道敎化亦不無少補矣四廣載籍以永敎化臣愚竊謂天下之道非託之書不能以自傳天下之書非藏之官不能以不散雖敎化所在有不依文字以立而誦習之功未有不假書籍以待者也本監所有歴代書板雖舊多藏貯而散在天下者未免有遺雖旋加修補而切於日用者猶或未備臣愚乞勑各布政司將所有緊要等板如程朱大全集與宋史等書盡行起送到監一以備國學蓄積之富而士習有所資一以免有司饋贈之勞而民力有所省一舉兩得而有益無損矣又本監所有東西書庫屋既隘陋地亦卑濕以致各様書板朽壊日甚所損非細臣愚乞勑改為東西書樓上以為庋置之所下以為印造之局不惟書籍之奉安極其髙潔抑且工匠之出入有所拘檢其工價料物如不欲動費在官錢粮臣當别行節縮措置如此則歴代緊要書板不致杇壊散漫而敎化之助亦庶幾其永有賴矣五復㑹饌以嚴敎化之地臣愚竊謂監生之㑹饌猶百工之居肆不惟朝斯夕斯得以專精其術業實亦相觀相善有以收斂其放心誠國學之舊規皇祖之明訓不可以為不重而不加之意也自景泰初以柴薪缺少暫且停免逮成化中致饌堂損圮遂成廢弛今饌堂㕑竈修造將完所缺者器皿米肉椒油支給如故所少者柴薪若復因仍不舉誠為虚費可惜臣愚乞勑該部計議將饌堂前廊房一帶照舊監造以便朝夕往來碓磨櫈棹碗楪等件逐一修造以供日用飲饌柴薪之費或取之抽分或資之買辦務使經久可行不致半途而廢如此庶幾國家養士之恩不為虚文而教化之地亦益見其嚴密矣六均撥歴以拯教化之弊臣愚竊謂作法於涼其弊猶貪作法於貪弊將何極所有納粟監生一節實為國家敎化之弊今固既往而不敢言矣然天下之事既不及塞其源亦必塞其流天下之病既不克治其本猶當治其標又安可坐視其流弊之極而不之恤哉且往歲㑹議之時納粟監生約有三分科貢監生止有一分故今分為兩途相兼撥歴各取其年月淺深以定其名次先後或三七分或四六分是以名數之多少而為撥置之多少也然先帝聖裁猶命該監臨期酌量務使均平撥歴盖巳慮納粟之旁蹊將有妨於科貢之正路而一時救荒之權宜終不可有加於萬世取士之定制也今見在監生納粟止及一分科貢巳有二分自此以後多漸反而為少少漸反而為多盖又不止往歲之三分一分而巳也若但泥於舊制納粟仍為六七而科貢止於三四則人少而撥反多人多而撥反少不惟流弊之極有不可言而不均之嘆實所不免殆恐非先帝臨期酌量均平之深意也臣愚欲乞轉科貢為六七更納粟為三四庶幾易窮則變變則通之義雖於敎化未能少補而流弊亦不至於甚極也桃溪淨稿修舉廢墜䟽謝鐸臣切見本監廢墜之事固非一端其逺者大者臣愚未敢輕易輒舉惟是日用之急雖近且小不可暫缺敢略舉一二為陛下言之惟陛下俯察而加惠焉臣竊惟先王之治下必使斯民養生喪死無恨而後可望王道之成況國學萃天下之英材而敎育之於兹二者或未能以無恨焉尚何以望士風之振人才之興以備國家天下他日之用哉臣到任以來切見本監監生二千三百餘名而號房曾不及五六百間其傾頺漏爛不可居者又往往半之於是不免寄居雜處軍民之家是不惟出入往來有所不便而僦貸支費亦甚艱難以朝夕無所與居之人而欲望其篤志於學以大底於成誠亦難矣切見退省堂及東西饌堂不下五六十間亦皆損壊廢於無用如蒙乞勑工部通加修理量撥監生暫且居住是亦不費之惠而人人稱便矣臣又切見本監通志舊例監生不幸病故者本監移文順天府本監給與殮殯之具臣在南京時亦嘗舉行近者本監監生邢偉病故移闗順天府雖有所給而稱為俸銀既而監生韓本宋濟相繼病故却乃執稱無例漫不之應臣等不得巳止従本監勉强措置少助臣職居其地目覩諸生如此死喪之狀狼狽臣若復坐視其態不惟死者目不能瞑而於聖朝仁政亦未免為萬一之累矣且監志作於成化三年間人必有所據方敢載入但禮部近年兩經火災案卷無存故有司執稱無例以致推調内外大人故官皆有口粮脚力送還其家監生雖未為官然皆朝廷儲養以備官使之數豈可使之死無歸而漫然不惜哉如蒙乞勑禮部從長計議量加恩典所費之惠雖不甚多而所以作士氣收人心者端在是矣臣又切見本監各色堂宇與夫四面墻圍亦皆年久坍損失今不修後必大壊及照文廟櫺星門前一帶空堦毎被附近軍民朝夕作踐又有不良淫婦雜居其間極為䙝瀆穢汚之甚臣愚欲乞朝廷逐去不良稍加開拓髙築屏墻以為障蔽庶幾文廟肅清而神靈安妥矣又本監朝房一所亦皆坍損隘陋朔望朝叅不堪住坐臣愚欲照順天府朝房事例造為前後兩樓以備衆官歇泊此雖細務末節實亦廢墜不舉之一端朝廷如不欲動費在官錢粮臣别當節縮自行措置惟是養生喪死之具惟監生日用所急伏乞聖明曲加矜憫特勑該部議擬施行則臣等不勝幸甚國學士子不勝幸甚桃溪浄稿維持風敎疏謝鐸臣愚竊惟人倫風敎所先人倫不可以不明也臣願正祀典以究明倫之實仕途風敎所係仕途不可以不清也臣願重科貢以清入仕之途冗員風敎之濫冗員不可以不革也臣願革冗員以從京府之制捷徑風教之羞捷徑不可以不塞也臣願塞捷徑以澄國學之源臣愚近覩禮部尚書傅瀚等為地震事題准各該衙門條陳所見臣固知天下之事所當言者不止於此盖凡政本之蠧蝕官司之黷濫生民之愁苦軍士之疲困災異之迭見邊境之失寧是皆宗社安危之所闗朝廷宵旰之所急者顧以啟沃論諌各有攸司而出位言髙尤在所諱惟是四者事闗風敎學校之首務也臣雖不才職專學校又豈容終於隠黙而不一言之哉用是條列冐昧以陳惟聖明加之意焉一曰正祀典以究明倫之實臣愚竊惟學校之設皆所以明人倫也人倫莫先於父子子雖齊聖不先父食奈何承訛襲故以顔曾思三子配饗堂上而其父則皆列祀廡下冠履倒置有是理哉為今之計莫若於闕里立廟祀叔梁紇而配以顔路曾晳孔鯉諸賢如先儒熊去非之論庶幾各全其尊而神靈安妥也人倫莫大於君臣殷之頑民猶不忍忘紂奈何忘君事仇若吳澄者親為有宋之遺臣靦顔前元之官禄名節掃地復何言哉後死之誅止宜律以春秋大義斥其不忠本朝之罪罷黜從祀以列於莽大夫之列庶幾不掩其惡而人心愜服也此前一事人雖屢言而未見施行此後一事臣亦嘗言而未蒙俞允臣非不知重復覼屢言之誠為可恨特以每當奉祠對越之際輒起嚬顣不安之心心所不安又不得不發之言耳如蒙乞勑禮部翰林院重加考定議處使祀典以正人倫以明則所以維持風教者不淺矣二曰重科貢以清入仕之途臣愚竊惟科貢之設皆所以羅天下之賢財而用之也科舉一途雖稱得人奈何考試等官類皆御史方面之所辟召職分既卑學亦與稱恩之所加勢亦隨之於是又以外簾之官預定去取或者多為防閑而實則闗節内外相應悉憑指麾而科舉之法日壊矣臣愚乞勑兩京大臣各舉部屬等官素有文行者取自上裁每布政可特差二員以為主考如往歲諸臣之所建白者庶幾前弊稍革而真才亦可以漸得矣歲貢一途雖亦有之但近來提學等官類從姑息試廪之初不以勢得則以賄行不以優老則以濟貧及其來貢之際又聽其自乞願授教職往往名為陞考而實則虚文上下相蒙迄無可否而歲貢之法益壊矣臣愚乞勑禮部將歲貢生員願授教職者先送翰林院國子監按月考試期年之間擇其果通三塲者方許陞考授以職事庶幾前弊稍革而教官亦不至甚濫矣凡此二事揆之人情格例未免窒碍難行臣切反復思之積弊之深如此必得出宸斷力加旋幹然後科貢可重仕途可清而所以維持風敎者不外是矣三曰革冗員以從京府之制臣愚竊惟京國四方之極天下所視以為凖則也切見順天應天二郡實惟京府大興宛平江寧上元四縣皆為附郭見今學校之設惟二府有之而四縣皆未嘗有盖雖統於所轄實以府學之生徒悉皆由縣之俊秀與其儲養之濫不若選擇之精之為愈也不然豈以京國首善之地而惜此一學校之官哉奈何凡今天下附郭縣分不分多寡俱各有學其視京府實為冗濫臣愚請從順天應天之制凡附郭一縣例増廪膳十名隨其縣之多寡以為增損止以府學教官兼領其事生員雖益而官不加多庶幾冗員稍革而風教之責亦稍重矣臣亦熟知今之爲官者類喜於添設而難於裁減殊不知増一官則増一官之費寛一分則民受一分之賜天下冗員之可減者寧止是哉四曰塞捷徑以澄國學之源臣愚竊以國學聚天下之英才而教育之皆所以備國家他日之任使也選之科貢尤恐未精奈何近年以來大開捷徑如納馬納粟之徒皆謂其有資國用之缺殊不知得其利未什一而受其害者巳千百況今日之納馬納粟即他日之鬻爵賣官此等風聲豈盛世所宜有哉今邊事方殷謀國之臣必有以此策獻者萬一再行則彞倫之堂變為交易之地豈不大可恥哉臣願深監前弊預塞其途雖或國用不足亦當别為節縮區處而此策斷不可行矣往年為因此革在監不諳文理凡撥各衙門冩本者俱各僱人今遂視為定例致使六科短差亦以僱人艱難為詞目前流害其極如此如蒙乞勅内府等衙門事例許以年月相應者送科冩本亦令掛選出身庶幾嗟怨少息而風教之地亦稍清矣臣固知國家養士不厭其多但賢闗所在恩倖之濫進昏眊之雜處殊亦可憂然則捷徑之當塞者又寧止是哉奏均選擢以勵庶官事賈詠南京吏部文選清吏司案呈奉本部送准吏部咨該本部題文選清吏司案呈奉本部送吏科抄出南京國子監祭酒賈詠等奏仰惟我祖宗受天明命撫有萬方式崇儒術誕興文教乃南北兩京並建國學所以重首善之地而開敎化之源也故所立之官祭酒司業則擢自翰林而監丞博士助敎學正學録皆取諸科目之士且必俟其出敎於府州縣學功績有成學行可觀或曾經各撫按等衙門旌奬有譽望者或由進士出補外任願乞恩典者始得陞授固足以見崇儒重道之至意也至於所以作率風勵之者則又有不次之擢焉又幸而恭遇朝廷廣開言路旁求俊彦科道缺員即許兩監監丞博士以下等官與兩京行人太常博士及行取外京推官知縣府州縣教職一同選補又足以見立賢無方之盛心也列聖相承率循是道所以敎化隆而風俗美朝廷正而天下治有由然也迄今百五十年於兹其前項内外各官屢次擢用不輟惟南監自正徳二年助教張祐擢授御史去後到今未蒙恩典遂使居南監之屬者莫不懐輕南重北之心而銳志事功者亦有不屑就之意焉況臣自供職以來夙夜兢惕恒以表率模範為事比見各屬立心剛直制行端方文章足以飾治平亷介足以激貪汚或博學而勤於誨人或恬退而甘於自守或體貌魁梧而素閑禮節或才識通敏而動中事機且訪其先任鄉學之時有屢經撫按旌奬素有譽望允服人心如此等人乆淹下位不以上聞則不惟非臣以人事君之心亦無以示激勸於將來也伏望聖明體天地生成之徳廓一視同仁之心察臣所奏乞勑該部比照北監兩京行人太常博士府州縣行取等官事例曲加訪察凡遇風憲及兩京部屬有缺移文本監擇取行實年貌才力相應者或一二人或三四人赴部擢用以勵其餘以復祖宗崇儒重道之典以昭皇上立賢無方之心如此則凡厥庶官知所激勸而區區臣職以人事君之忠亦庶乎可以仰副於萬一也臣下情無任恐懼之至等因奏奉聖㫖吏部知道欽此欽遵抄出送司查得見行事例兩京御史員缺查取在外進士舉人出身知縣推官南京國子監官并天下府州縣賢能出衆舉人出身教官與在京一考以上行人博士國子監官㑹同都察院揀選擬授今該前因案呈到部看得南京國子監祭酒賈詠等奏稱乞要比照北監凡遇風憲及兩京部屬有缺移文本監擇取行實年貌才力相應者或一二人或三四人赴部擢用一節為照兩京國子助敎博士等官曽經一考以上賢能素著者行取考選風憲係是見行事例但南京國子監助敎博士等官查無開報賢否各官才力未詳所以得與行取者少今祭酒賈詠奏稱前因合無移咨南京吏部轉行南京國子監掌印官每遇年終將所屬助敎博士等官從實開報年歲明註文學才行開具賢否掲帖一本責令順差人役賫送本部查照以備斟酌行取縁係均選擢以勵庶官及奉欽依吏部知道事理未敢擅便正德十二年十一月十六日少保兼太子太保本部尚書陸完等具題十二月十七日奉聖㫖是南京國子監助教博士等官著本監掌印官每年終開具賢否揭帖送部如遇考選風憲斟酌取用欽此欽遵擬合就行為此合行移咨前去煩為轉行國子監照依本部題奉欽依内事理欽遵施行等因咨部送司案呈到部擬合就行為此合就備申劄副本監照依該部題奉欽依内事理欽遵施行須至劄副者正徳十三年正月二十二日行圖籍之儲丘濬臣按宋朝以文為治而於書籍一事尤切用心歴世相承率加崇尚屢下詔書搜訪遺書或給以賞或賜以官凡可以得書者無不留意然猶慮其或有非常之變每卷皆有副本分貯各所是以真宗之時崇文秘閣之災而猶存太清樓之儲徽宗設官提舉募工繕冩一置宣和殿一置太清樓一置秘閣其寓意深矣我朝不專設館閣官凡前代所謂省監皆歸於翰林院翰林院專設官以司經籍圖書名曰典籍凡國家所有古今載籍皆在所掌又於國子監設典籍一員司凡大學所有經籍及板本之屬臣考唐人謂人之博學曰行秘書而宋人之評詩者亦曰胸中無國子監不可讀杜詩而書史之有訛舛者必校正之以監本則此二者乃自古貯經籍之所我朝館閣之職凡前代所謂集賢院崇文院秘書省秘閣皆不復置惟於翰林太學置此官二員今翰林院秘藏皆在文淵閣其典籍固有所職掌惟兩京太學典籍㡬於虚設臣聞永樂中太宗皇帝肇建北京勑翰林院凡南京文淵閣所貯古今一切書籍自一部至百部以上各取一部送京餘悉封識收貯如故則是兩京皆有儲書也夫天下書籍盡歸内府其人家所有者盖亦無多其間多有人家所無者今幸其猶存於此萬一有所踈失則永絶矣可不惜哉今幸國家無事正天子崇儒右文之時忍使古昔聖賢垂世立教之言載道為治之具傳之數千百年者一旦不幸或有意外之變乃至於今而泯盡豈不貽千古之永嘆哉臣請勑内閣儒臣將南北兩京文淵閣書籍凡有副本於南京内閣及兩監各分貯一本其無者將本書發下兩監勑祭酒司業行取監生抄録給與人匠紙筆責令各堂教官校對不限年月陸續付本監典籍掌管如此則一書而有數本藏貯又有異所永無踈失之虞矣章服議宋濓歙儒有議章服之制者其言曰公之服龍山華蟲火宗彞五章在衣藻粉米黼黻四章在裳五章則五列也四章則四列也四之外雜以雲朶間之禮官駁之曰九章之名則是也其謂五列四列則歴代之制無有也非也自軒轅氏肇為章服有虞氏從而明之各章或一或兩而巳惡取所謂五若四哉假使其言可行則天無二日天子之服當繪三辰無乃有數日乎矧三日者咸法天而成章雲亦天物也設用以間之無乃又益之以一章乎盖曲說之無據者也是未可信也金華宋濓曰禮官之議皆傅經而辨善則善矣至謂歴代之制無有則不能有以降其心也竊按唐制衮服之冕衣繪而裳繡自山龍而下每章一行為等每行十二夫行猶列也天子之衣既云每章分為十二則公之服似可以類而推但不知五四之分又别何所見也自山龍而下始然則日月星必仍其舊而無所加强誣天子之章當有數日亦不能通矣又按宋制章服並織成間以雲朶而補其空地夫間以雲朶不過為文章而周飾之亦非益之以一章也由是觀之歙儒其果有據乎無據乎若不待知者而後決所可恨者好竒之過舎先王之大法而循末代之彌文耳嗚呼自先王之法壊侈靡之習迨於六代極矣至有議畫鳳於衮以示差降飾圓花於裳而云於禮無碍者況於唐宋之世哉豈惟衮衣為然也冠冕之制古者采藻為旒前後䆳延以延冕上覆也𤣥表纁裡後世則用龍鱗錦表綴玉為七星旁施犀瓶金絲網之屬又外作翠旒使碧鳳啣之古者以旒數為降殺極於十二而止後世則或増為二十四焉使歙儒舉以為言則羣起搤其吭矣不觀其㑹通而遽斥人以曲説亦豈可哉然則將安從之曰章服當凖有虞氏之制古之人有是言也宜以禮官為正送莊僉事提學陜西序皇上嗣登大寳之初少保戸部尚書黄公以學校不得實才為言上命在外按察司添設僉事各一南北直𨽻於巡按之外添設監察御史各一在廷大臣㑹舉文學深博充其任俾不理他務職專提督所屬學校務求實才而國子學正莊公今陞陜西按察僉事正其人也嗟夫學校不得實才豈獨學者自怠之過哉師道不立所司姑息之政有以悞之耳國家設科取士文學之優者為進士文學之次者為教官天下學者素怠而不勤而又以其次者之為師博之以文學則慮巳有所困而顯其短急之以政教則懼彼有所怨而不親於是學者厚致其意以求逸為師者亦厚致其愛而樂與之俱逸棄其訓迪之方溺於荒墮之習而於聖賢經傳之學邈然若不相闗逮夫科貢迫急然後孜孜剽竊汲汲記誦校藝於所司則曰彼善於此勿求其全也卒業於太學則曰進用有期勿復苦之也歴試於諸司則曰勤苦至此在所當矜也至於謁選之際則又一切俯就雜試以吏胥之所能嗟夫施便安之教以荒其修用姑息之政以勸其怠欲求天下學校實才之用難矣哉宜乎下勞大臣之言上凟九重之聽而以實才之效責望扵公等也公嘗典教扵外庠又嘗賛教扵太學師之不教弟子之不學公能深知其弊矣兹行也務在革其弊而新其習督厲懲勸鼔舞作興黜陟賢否與時更化使關陜之為弟子者勇扵進修而樂扵有成則實才之效得矣大臣之所薦聞朝廷之所選用公可無媿焉公名觀徽州人端謹沉實樂聞善言今太常少卿魏先生多稱其道扵其行申以贈之明教方孝孺天下非無才也聚數萬之人養之十餘年而未見有一人可稱者養之無其漸而教之無其法也古之善育才者豈能益之以藝増人以智哉為之之具素備能使以不成才為病不若人為恥各思勉為君子而不可止也故自其少時居扵閭族而閭胥族師不責之以敬敏任䘏則責之以孝弟婣睦其本固巳美矣及其漸升扵太學求之以六徳以觀其内試之以六藝以觀其外行完而徳備藝成而器良然後措之扵用盖其詳且盡也如此後之所望以為才者執子弟於販鬻之區芻牧之場被之以衣冠而納於郡邑之學終歲期月太學有徴焉則又納於太學計其所習曾未知拜跪之節興俯之容而巳肆然有爵禄之心太學舉而教之者又不越乎誦書業文挾弓矢角膂力恒人之淺事歴時未久有司有求焉則以應之卿大夫之位有缺焉則以為之為之者既不自知其不可而命之者亦不責之以其所學於是學者以習恒人之淺事冐竊禄位為得計莫不相勉為恒人而自謂不必修君子之事也太學之所聚郡邑之所教咸有茍且之心無賴之行兾其才之成奚可致哉夫國之立學所以養才必不期其至此也為學者雖無志於道徳亦必不自望為恒人也而卒不能有成者非他用之速而教之疎也古之六德智仁聖之事顔閔之所不能及六藝禮樂之度數節文孟子之所不能詳射御之工杜預羊祐之所不能兼書數之法君子猶有所未習今欲責學者皆法古人而盡備之宜其未易為也然不法古人而惟弓矢膂力是効誦書業文是為亦未見才之可成也然則何由而設教乎盖聖人而取人徳不求其全而取其不違乎道藝不求其備而貴乎能致其精唐虞以九德待士而有三德者亦俾為大夫有六徳者為邦君聖人豈不欲得全徳之人而用哉以為求人大全則天下無全才不若因德命官之為無失也臯陶未必能達禮益稷未必能知樂而益稷臯陶所為之事伯夷后䕫宜亦有所不能然而數子為之各稱其位而成名於後世以其精不以其備也人惟行可以自圖若才藝則有能有不能欲强而通之非惟不足得其所不能且將并其巳能者而失之故善立教者莫如本之以六行予則因其質而設其科人有剛毅重厚者有慈良而順愛者有䟽達而明斷者有强識而通敏者有沈勇而有威者有多力而任武者此六人者使曲徇衆人所能必不能堪茍因其固有而教之於成才也奚禦剛毅重厚也必可以任天下之大事且因而教之博通古昔之政教周知海内之得失觀其損益折衷以驗其為勿使色厲而偽者得參之則大臣之儲也慈良順愛者必可以治民則因而教之平賦施惠之方賑災恤患之道辨邪察獄之事理俗興化之要勿使柔佞而詐者得參之則牧伯之儲也疏達眀斷者則百官衆職之儲也强識通敏者則文學典禮之儲也沈勇而有威多力而任武則將帥之選疆埸之所恃也各以其所當為者教之而皆不使近似可說之人得與則所用無非才而所為無僨事矣此大學之政也而為師者非其才德之美不可也大學惟其法行之於郡縣俾亦以六科為凖郡縣之取子弟員也必問於其宗族鄉黨皆信言篤行而好學則取之而復其家田百畝入太學則倍復仕而有政則皆復學於郡縣者與郡祀與燕㑹禮之使殊於恒人縣每科四人三歲各升一人於郡郡每科十人三歲各升三人於太學太學每科百人為率以應上聽任用郡縣既升而缺則即充之廩之也宜厚教之也宜詳試之也宜嚴用之也宜當人知學之可仕也則不怠於自修知各因其才而用之也則必謹於自立而天下之異才咸思有為於世矣為治者不患無才而患乎聚天下之才而不能教用天下之才而不能擇教之而能成其德用之而能不違其器才何可勝用哉胡貊之富人聚馬盈谷而不得一善馬善御者執鞭策相麾而區别之一日馬之致千里者以百計而盈谷之畜無棄者御非能假馬以力而易其性也能别其髙下而不失其性則善馬出矣為治者能不失其性豈特不患乎無才天下亦安所患哉題科舉事倪岳儀制清吏司案呈照得𢎞治八年八月又該天下開科鄉試巳經具題通行照例舉行外及𢎞治九年例該本部㑹試查得上年入場舉人將及四千比之往年漸有加増及近因試卷數多添請同考官員所據事體日増而供給之費如舊不免靠損順天府大興宛平二縣人民案呈到部今將酌量一應應該増添事宜逐一預為議擬縁係科舉事宜未敢擅便開坐謹題請㫖本月十九日具題次日奉聖㫖是都准行欽此計開一照得順天府鄉試所用供給錢粮等項米麥戸部放支牲口等件直𨽻各府定數供辦本府止供紙劄及一應買辦等項遇有不敷亦從借辦應用尚且逐年負累小民窘迫不堪縁鄉試係順天府合直𨽻各府生員人等考試不過二千餘人如此供給於禮為宜禮部㑹試乃合應天順天二府并浙江等十三布政司舉人考試將及四千視前幾倍而所用供給亦止賴於順天并直𨽻各府其間人數多寡夐不相同而預備供給與之無異及用度不足却又一切取給於在京兩縣之民百般驅迫幹辦不前盖供給既巳因人而日増則錢粮亦合隨時而異處若不量為加添補行愈累貧乏深為未便即今各處開科鄉試合無本部行移浙江江西福建湖廣四川河南山東陜西山西九布政司并應天府於本處供給科舉餘剰錢粮内各扣除銀浙江江西湖廣福建四川各一百兩山東山西陜西河南應天府各八十兩俱責付本處司府朝覲官吏於𢎞治八年十二月内賫送到部轉發順天府收貯除米粮柴炭刋字人匠照舊支辦猪羊量減𣲖納若有不足并其餘一應紙劄果品酒醋油麫等項應用物件臨期本府選委公正堂上官審取殷實舖戸照依年例量為増添支價兩平收辦如此則衆輕易舉京民不至於靠損錢粮稍裕供給亦不至於窘迫矣一照得試院自天順八年重修以來累經建議盖造板舎以防風火之虞實為永便今板舎四千間但有一二處未曾添盖房屋臨期仍用蘆蓆蓬晝夜加意防守尚為未便如場内望髙樓五間俱用蘆蓆搭盖埋脚不堅有風之日軍士不敢在上每樓合用軍士二三十人亦要供給有費無益合無行移工部照依應天府并各布政司試院於中止盖樓房一間四角望髙樓俱不必用臨時止用軍士二三十人四面觀看最為省便及至公堂前原盖小捲蓬一間因其窄小不堪擺列席面及容供事人役在内臨時却於兩傍搭盖大蓆蓬二座并謄録所原盖房屋數少亦天井内搭蓋大蓆蓬一座并彌封對讀受卷三所内亦有蓆搭蓬屋縁此等處所晝夜常有人在内謄録及各供所事俱用燈燭倘遇風起之時人心驚惶十分不便兼且歲用搭蓬工料錢粮不為不費合無將至公堂前舊盖小捲蓬一間拆去另盖大捲蓬三間謄録所天井内週圍照依地方四面盖造通連小房向明開窓以便謄録及各所量盖小房數間如此則雖小費而有大益暫勞而永寧矣一試院内原設受卷彌封謄録對讀四所合用執事人員查得正統年間入場舉人不過千名尚用京官十五員景泰年間入場舉人不及三千名亦用吏部聽選府州縣官十七員近年入場舉人増多將及四千乃止用官一十三員分管不敷難免差誤深為不便合無查照前例量為斟酌於彌封謄録對讀三所各添官一員待至㑹試之期行移吏部照例揀選官一十六員分管前事如此庶得繁簡制事之中可免差錯悮人之弊矣一謄録等項合用生員常例除順天府學不用外將本府所屬各州縣學不分廪增生員盡數起送赴部通不過五百餘名轉發試院内分撥謄録受卷彌封對讀四所供事但近年入場舉人日漸加増試卷日多前項生員分理不敷至於謄録一所用人尤多每年借用各處送到歲貢生員近年又復奏准借國子監監生二百名縁此等生員俱係出學日久年紀漸大之人又見不係本等應辦事務往往不肯用心故意錯亂謄寫深為誤事況要朝入暮出謄冩不多惟難於闗防抑且反致躭閣尤為不便合無行移北直𨽻提調學校監察御史預期於直𨽻府州縣有隣近順天府地方者就於各學内再行揀選巳冠能書生員二百名通前共七百名起送赴部分撥謄録等項應用如此則事得早完既可省供給之費人非借用亦可免出入之防矣劾輔臣壊科目疏張寧切照大學士陳循王文職居輔弼任重經綸所當正巳正人為上為下而乃以子之故紛章叠奏煩瀆聰明祗為私謀不恤國體大臣之道果安在乎臣等聞宋范質為相從子杲求遷秩質作詩戒之曰爾曹當閔我勿使増罪累比之陳循賢否何如也韓億為相其子維舉進士不就廷試盖以父任執政為避比之王文髙下何如也沈文通登進士第一馮京第二時以貴冑不可先寒畯乃進京而退文通比今文卷巳落而求與中卷比對者得失何如也世之庸人愚婦亦知人談子德則歸過而反責之豈有身為大臣元宰公為其子暴才稱屈於朝廷之上哉即使才而屈猶不可也況無實之争何以服天下且今歲順天府就試者一千八百餘名而中式者一百三十五名劉儼等借使考試未精則其間遺漏者亦未止王倫陳瑛設若一槩援例求進拒之則情偏從之則弊起是陳循等一舉而壊科目之制矣仰惟陛下優禮大臣准令㑹試恩巳極矣而循等乃欲將劉儼等問罪以文其奸臣等聞樹德務滋除惡務本用法不可以太寛太寛則犯之者可幸免而不知懼施恩不可以過當過當則得之者以為易而不知感循等假公濟私要君脇下其所存施非止一日今情狀自敗罪犯巳彰大小人心莫不共怒但畏其勢而不敢言耳陛下若又待之以寛施之以恩而不絶其根柢則循等愈無忌憚乞將循等罷歸田里别選文學公正之人以居内閣用昭輔平明之治其王倫陳瑛仍照不中生員事例發回原籍讀書下科各就本處應試則科目有定制逺近無異法人不茍求而真才斯出矣方洲集増解額疏張寧查得景泰元年詔書内一欵科舉一依永樂年間例行不許更改此皇上中興初政所以廣致人才懋圖治理之盛心是以庚午癸酉各處開科取士俱各欽遵施行不拘額數續因給事中徐廷章等建言欲依宣徳正統年間仍定解額該禮部通行議擬得若依宣德取人不無太狹合照正統額例數外果有堪中文字量加名數亦不得多過二十名巳經奏准行屬但其所増二十名不復各照地方定擬猶為未當臣等請以一二處論之宣德中應天府額取舉人八十名雲南布政司額取舉人二十名定額之初未始無多寡之分也正統中應天府增取二十名雲南増取五名増額之數亦未嘗無多寡之分也今應天等處學校不減於先而雲南等處士子不加於昔若不論其地方不量其士習一槩俱增二十名則應天所増名數比舊僅過一分雲南所増名數比舊將及一倍矣在彼者何其甚寛在此者何其太狹舉此一二餘地可知且禮部見今行移既有不得過二十名之語則少者必欲取盈多者不敢踰額進退不均枉濫斯甚況今開科在邇乞勑禮部申照舊例其先奉増添二十名除雲南不動外其餘南北直𨽻各布政司多寡未均者各依正統年間増額等第照例挨數加添庶為便益縁係比依宣德年間定額及正統年間増額事例今將擬添名數開題請㫖方洲集雲南布政司正統間増五名今依禮部奏添不得過二十名廣東四川陜西山西廣西正統間各増十名今比雲南各増多五名通増二十五名浙江福建江西河南湖廣山東正統間各増十五名今比廣東等處各多五名通増三十名南北直𨽻正統間各増二十名今比浙江等處各多五名通増三十五名改便科舉以順人情疏該遼東都指揮使司遼東都司等衛儒學優次等生員徐潮等奏惟照嘉靖十年例該鄉試臣等俱蒙巡按遼東謝御史某考送山東布政司鄉試隨於六月内起程閠六月入闗時值天雨連綿平地皆水冐暑衝泥延至七月終方纔到省中間觸犯暑濕大半感疾多不終場臣等勉强全場而志昏力倦僅能成文以致本學中式止生員韓偉一人而臣等俱被黜落委屬文理荒繆豈敢妄有怨尤但念臣等由遼東以至山東往返六千餘里跋涉四箇餘月辛苦萬千難以盡訴巳於嘉靖七年九月内備將苦情及將遼東比照潼闗等處科舉事例奏行該部轉行遼東巡按王御史勘處取具議擬供給及合費供給銀兩又經覆奏一向拱候明㫖至今未蒙准行臣等竊惟潼闗一衛本屬直𨽻而科舉乃在陜西以其近於陜西又如宣府一鎮其守巡官員俱係山西而其科舉則在順天以其近於順天今遼東之地比之潼闗其去順天逺近最為相等而其所設守巡亦係山東官員又與宣府相同獨科舉一節乃使越過順天逺赴山東揆之事體似有不均議者或謂此其舊規殊不知遼東先年學校之名雖設而科舉之途未開至正統丁卯地方撫臣始選都司等學軍生張昇金統律二人起送應試彼時遼東山東原有海道之便却將昇等咨送山東既而中式以後科舉遂以昇等為例實因襲之非舊規也況今海道不通巳四十餘年臣等何由以乗其便向使遼東先年既有科舉跋涉果如今日之逺廟堂之議必酌量地里逺近附之順天無疑況遼東學校見屬巡按管理與直𨽻提學事體相同而科舉乃屬之山東竊恐法制不如是也如蒙伏望皇上憫念下情乞勑禮部查照臣等先年奏行本詞及該年巡按王御史勘處縁由容令遼東各學生儒得赴順天府應試庶勞逸適均事體便益臣等圖報亦有日矣干冐天顔下情無任戰慄之至等因奉聖㫖禮部知道欽此欽遵臣等看得遼東都司等衛儒學生員徐潮等奏稱正統年間撫臣始選軍生應試亦有海道之便咨送山東科舉況今多年海道不通乃使越過順天而逺赴山東往返六千餘里辛苦不便乞要比照潼闗宣府事例附近順天府科舉一節為照遼東都司衛學應試生員先附山東委縁山東海道之便今海道既塞陸路遼逺往返至有六千餘里貧生寒士褁粮挾策奔走長途動經數月委於人情不便今欲改附順天府應試又與潼闗之附陜西宣府之附順天事體相同況節該衛學生員徐潮等并曹福等陳奏頻煩情詞如一似應俯從但係奏改就近科舉地方既巳更屬解額未免有拘臣等查得近該直𨽻提學御史胡明善題稱德州等衛提調教官皆屬山東惟生員乃為提學御史所轄乞要建學起貢等因該本部覆題奉聖㫖是依擬行欽此巳經行令欽遵去後今照遼東衛學逺去山東三千餘里乃使越過順天而附於山東科舉徳州左等衛學本是山東地方而科舉乃反附於順天事體人情通屬未便相應議處臣等合候命下行移山東布政司及移咨都察院轉行直𨽻提學并遼東巡按御史知㑹今後德州左等衛儒學聽山東提學官管轄就山東布政司應試遼東科舉生儒聽遼東巡按御史考送順天府鄉試其德州等衛建學起貢事宜本部移咨都察院改行山東巡按御史查照先奉欽依事理施行則不惟解額無拘而人情事體兩得其便矣嘉靖十年十月十六日具題十九日奉聖㫖是依擬行欽此清入仕之路丘濬本朝科舉叅酌前代之制而取厥中凡所謂明經宏詞諸科一切革罷惟存進士一科洪武三年詔天下行省以是年秋八月開郷試春二月禮部㑹試其解額以五百人為率㑹試取百人而所試之文尚仍元制至十七年始定今科試格式十八年㑹試止録士子姓名鄉貫而未刻程文録文自二十一年始也自是三年一開科取人無額惟善是取宣德改元始鐫定額兩京十二藩貴州附雲南各隨地産以差多寡而㑹試如洪武初取士之數又以北方學者文采不能自見分南北中三類取人正統壬戌於各布政司舊額上量増之而㑹試則加以半景泰初詔除科額以復洪武永樂之舊尋復鐫定比舊額稍増禮部試則臨期取㫖自是遂為定制夫自洪武甲子定為三歲一開科至是三十餘科矣科塲條貫曰増日密一切病弊盡革無餘惟程試之文氣進用之人才似乎有愧於前者雖或氣運之使然習俗之流弊然不可不知其故也祖宗時其所試題目皆摘取經書中大道理大制度闗係人倫治道者然後出以為題當時題目無甚多故士子專用心於其大且要者其用功有倫序又得以餘力旁及於他經及諸子史主司亦易於考校非三場勻稱者不取近年以來典文者設心欲窘舉子以所不知用顯巳能其初場出經書題往往深求隠僻强裁句讀破碎經文於所不當連而連不當斷而斷遂使學者無所據依施功於所不必施之地顧於綱領體要處反忽略焉以此初場題目數倍於前學者竭精神窮日力有所不能給故於策場所謂古今制度前代治蹟當世要務有不暇致力焉者甚至登名前列者亦或有不知史冊名目朝代前後字畫偏旁者可嘆也巳然以科額有定數不得不取以足之以此士子倣效成風策學殆廢間有一二有策學者又以前場不稱畧不經目人才所以不及前者豈不以是哉其録出以為程文者又多萎薾粗淺拘泥纒繞不厭士心録文一出議論紛然其所謂主意之說尤為乖謬凡其所命之題專主一說謂之主意殊不知聖經深逺非一人之見所能盡理茍通焉斯在所取矣何必惟巳之同哉士子志於必得謂非合主司之意不可以取中往往將聖經賢傳之㫖旁求曲說牽綴遷就以合主司所主之意此非獨壊士習其為聖傳之蠧也甚矣有司主此以出題士子主此以為文今日為士子既以此進身異日為主司又以此取士宋史所謂謬種流傳今日時文之弊殆類之也然此又不但科試為然而提學憲臣之小試殆又有甚焉者也其所至出題尤為𤨏碎用是經書題目愈多學者資稟有限工夫不能徧及此策學所以幾廢而科舉所得罕博古通今之士也正統景泰以前所刻程文皆士子親筆有司稍加潤色耳近日多是考官代作甚至舉子無一言於其間殊非設科之本意若夫考試之官兩京㑹試皆出自朝命鄉試則方面官先期訪請洪武以來惟有學者是用不問是何官職雖儒士亦在所聘後乃有建言專用教官者其所禮聘無非方面之親私率多新進少能持守一惟監臨官是聽内外之權悉歸御史凡科塲中出題刻文閲卷取人皆一人專之所謂彌封謄録殆成虚設謹按科場舊例分簾内外以隔絶交通之弊自簾以内考試官主之自簾以外監試官主之而提調官則兼總内外焉然惟蒞其事爾而取人刻文皆不得預所以用巡按御史為監臨者特以紏察其不如法者耳今宜勑有司凡科場條貫必復祖宗之舊所命題以光明正大切於人情物理闗於彛倫治道者小録所刻之文謂之程文特録出為士子程式也非用是以獻上也文有可為程式者則刻無則否或多或寡不必齊同不許代舉子作如有欠缺繁宂稍加筆削可也經書題目無甚凶惡字面不必迴避初場經義四條以通三條書義三條以通二條為合格否則不取五策問目通以十事為率非通五以上不在取數㑹試則本數不足取别數足之鄉試則此經不足足以他經凡解額惟限之守不許過數茍無足取者寧欠無足通場全無然後短中求長取以備數如此則科目所得者皆通經學古之士而適於世用矣更乞申明舊制在外鄉試俱照㑹試及兩京例不設監臨官其巡按御史止於科場外嚴加糾察士子欲入場者專委提學憲臣考驗而亦不許他官小試凡百執事不許用進士舉人出身人員恐有夤縁作弊臨晚給燭雖唐宋故事然今科場代筆換卷多在昏暮宜革去給燭而取減場先期聘考試官必詳加詢訪不許徇私濫舉許御史糾治惟有學行譽望者是取不分有司教職見任致仕仍乞申嚴簾内簾外之限不許通融出入三日一宴之禮惟送酒殽不必宴㑹考試官閲卷去取既定先將所取中卷用其字號編定名第一様三本封號印記其一留以自備其二以授提調監臨官至期比硃墨卷相同然後拆號各照所編定字號填榜不許更易又於各經各存備卷三五卷如所取卷有參錯即隨經用所備卷依次補之如此庶幾科場少弊可以得人而復祖宗之舊矣又考㑹試舉人往時入場者極多不過二千人今則積多巳踰四千矣切恐數科之後日累日多又不止此數竊考宋歐陽修作禮部唱和詩序謂宋制考校五十日今制自初八日入場至二十日以後揭曉不過十餘日卷多日少恐不能無遺才請下禮部議寛其日限而移殿試於三月望日庶幾考試者日力有餘得以盡其心力精詳文理以爲國家求才科舉私說謝鐸周子曰天下勢而巳矣勢之至雖聖人亦莫如之何故由忠而質由質而文聖人非不知忠質之為貴及其至也亦不得而不文然文勝而至於滅質則其本忘矣於此而不有以迴幹之通變之以不失乎先王之意奚可哉盖自先王之政廢而民無恒産民無恒産則無恒心無恒心則毁譽之口不勝其愛惡之私於是鄉舉里選之法不得不變而為後世科舉之制此勢也非得巳而為之者也善因其勢者謂之隨時於是而迴幹通變之而先王之意存焉是故今之科舉罷詩賦而先之經義以觀其窮理之學則其本立矣次制詔論判而終之以策以觀其經世之學則其用見矣窮理以立其本經世以見諸用是雖科舉之學茍於此而盡焉則古之所謂德行道藝之教盖亦不出諸此而其以成人才厚風俗濟世務而興太平也亦豈有不及於古之嘆哉然考其歸則所謂窮理所謂經世者恒浮談冗說修之無益於身心措之無益於國甚者口夷齊而心蹻跖名伊周而迹斯鞅遂使科舉之學悉為無用之虚文暨其得而棄之也顧乃以吏為師以律為治視其昔之所謂者曽荃蹄蒭狗之不若噫是豈朝廷立法之意端使然哉歐陽子曰三代而上治出於一而禮樂達於天下三代而下治出於二而禮樂為虚名然則文與道離而欲一日之文以盡收天下有道之士不亦甚難矣乎雖然盡言而庸違者有矣未有不深於道而文能至焉者也此又科舉立法之深意而今之豪傑亦未必不由之以出是其所謂迴幹通變之機以不失先王之意者乎不然一舉而紛更之吾固未知所以善其後故曰巳日乃革無咎鐸不佞敢私贅其説如右以為天下有志者告庶識其勢之所在而亟反之於乎獨科舉也哉論制科王鏊王子曰國家設科取士之法其可謂正矣密矣先之經義以觀其窮理之學次之論表以觀其博古之學終之策問以觀其時務之學士誠窮理也博古也識時務也尚何求哉其可謂良法矣然行百五十年宜其得人超軼前代卒未聞有古之豪傑者出於其間而文詞終有愧於古雖人才髙下係於時然亦科目之制為之也夫科目之設天下之士羣趨而奔向之上意所向風俗隨之人才之高下士風之淳漓率由是出三代取士之法吾未暇論唐宋以來科有明經有進士明經即今經義之謂也進士則兼以詩賦當時二科並行而進士得人為盛名臣將相皆是焉出明經雖近正而士之拙者則為之謂之學究詩賦雖近於浮豔而士之髙明者多向之謂之進士詩賦雖浮豔然必博觀泛取出入經史百家盖非詩賦之得人而博古之為益於治也至宋王安石為相黜詩賦崇經學科場以經義論策取士可謂一掃歴代之陋也然士專一經白首莫究其餘經史付之度外謂非己事其學誠專其識日陋其才日下盖不過當時明經原闕名臣經濟錄卷二十六
