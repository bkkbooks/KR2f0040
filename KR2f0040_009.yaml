body:
  text: 名臣經濟録卷九明黃訓編保治正德上陳言治道要務疏章𢡟臣聞天道以元生萬物而聖人體元治萬民故即位必稱元年而建元必殊徽號蓋於天下更新示其所以為治之意使人心知所向望也洪惟憲祖以成化紀元蓋欲治化之成就而先帝以𢎞治紀元則欲治道之恢𢎞皆即為治之大效而言其規模固已宏逺矣今皇上龍飛御極紹承大統而建元獨取於正德乃究為治之大本以寓繼述之深意能正其德則何患乎化之不成而治之不𢎞也哉臣有以知陛下真不世出之主負大有為之志可以四三王六五帝而爭先於列聖矣然以正德為名當求正德之實必如唐劉蕡所謂居正位親正人發正言行正道而後可以正德必如董仲舒所謂正心正朝廷正百官正萬民而謂之正德茍德有未正則雖令不從欲求治化𢎞成庸可得乎臣以菲才待罪胄監而老病衰頽不能久事陛下無以補報大恩兹已具疏乞骸將歸死首丘而犬馬之誠耿耿不能自已敢攄一得之愚以正德之所當務者條為五事效野人炙背食芹之獻以為新政涓埃之助伏惟聖明擇其可行者而見之施行則宗社無疆之休生靈莫大之幸也為此開坐具本奏聞一曰勤聖學臣聞明君以務學為急聖學以正心為要若堯舜禹湯文武之聖商髙宗周成王之賢莫不孜孜於學講明義理正其心術以為修齊治平之本又設師傅保之官有誦訓針諫之臣朝夕左右責難陳善以潛格非心而薰陶成性故其聖德隆茂王猷允塞而致雍熙泰和之治也下如漢唐宋之英君誼辟亦莫不然但其學有未至故其治不古若洪惟我太祖髙皇帝於退朝之暇延接儒臣講論經典又書大學衍義於內殿兩廡及書洪範揭於坐右以備觀覽蓋雖生知之聖必從事於學也列聖相承率由是道今陛下出震繼離始登大位即以正德紀元而又開經筵親儒臣以講讀經史闡明聖道固有志於學矣但經筵之開講而臣之進見有時學問工夫未免間斷一日暴之十日寒之有剪桐之戲而莫與針規違持養之方而無從諫止則所以輔成聖德者或未備也臣願陛下經筵之外聽政之餘時召師保大臣侍從文臣引之便坐講論經術咨詢治道照依唐太宗引十八學士於禁中故事不必限以日時煩其禮貌接以誠意假以溫顔使人人得盡言以輸其忠循習既久化與心成則出入起居罔有不欽發號施令罔有不臧施之任人而邪正以辨以之立政而事皆可法其於聖德豈小補哉董子曰勉強學問則聞見博而知益明勉強行道則德日起而大有功此今日正德之先務也惟聖明留意焉天下幸甚二曰隆繼述臣聞武王周公善繼人之志善述人之事而夫子贊其達孝孟莊子不改父之臣與父之政而孔子稱為難能則為嗣世之君者不可不從事於繼述也昔我太祖開創之功比迹湯武其立法制度以垂於後人者至備先帝守成致治之美協德成康其盛德大業之增光於前烈者尤盛豈非陛下之所當繼述者乎先帝在位之日尊養兩宮備殫孝敬親任大臣延問治道寬假言官樂聞讜論罷工役而止貢獻放鷹犬而出宮人不荒聲色不事遊畋皆其善行之可法者陛下所當遵守而不變又嘗念户口之消耗而議撫恤之宜以鹽法之廢弛而求拯弊之方清查禁軍以革濫冒沙汰冗官以節濫用皆其志之欲為而未成者陛下所宜繼成以終其志其纂修會典則欲舉祖宗之舊章而見諸施行其節修通鑑則欲考前代之成敗以為法戒尤陛下所當究心而從事於其間也不獨是焉又當取聖祖之皇明寶訓洪武聖政諸書置諸座右日與大臣議舉其彞典而施諸今日則為能盡繼述之道而見陛下正德之實矣昔啓能敬承繼禹之道而建四百年之夏成王能式刑文王之典而衍八百年之周惟聖明留意焉天下幸甚三曰謹大婚臣聞天子之於后猶日之與月陽之與隂相須而成者也故禮以大婚為重自古聖王於婚姻之始皆博訪令族簡求淑德然後昭告宗廟成以婚禮而未婚之前又必教於公宮有師傅保姆教以婦德婦言婦容婦功教成而祭所以成婦順也昔宋哲宗以幼沖嗣位將行納聘其臣范祖禹上奏宣仁太后論納后所宜先知者四事一曰族姓二曰女德三曰隆禮四曰博議吕希純則言當求德閥不宜參用隂陽數術以男女年命而勘婚而彭汝礪又言當早擇而素教之蓋王化之始萬福之原選之不可不精教之不可不預而禮尤不可不正也伏惟聖朝列聖皆有內德之助以成重熙纍洽之治非偶然也今皇上聖德英明睿質純粹天命降鑒必釐聖女以佑皇家近聞分遣內臣各處采擇所得必非一人伏望陛下逺稽先王之禮近取宋臣之言上思宗廟天地之奉下為萬世子孫之計乞命內閣及該部大臣考究典禮審處事宜必由德選不以色進當此諒隂之時姑緩册立之期俟畢祥禫以成嘉會照依宋哲宗故事將所選者暫處太皇太后宮中使之觀法壼儀擇師傅保姆之賢修言德功容之教嚴服飾之節陳圖史之戒凡寢食坐立視聽動作一皆約之以禮而弗納於邪教之既成又以日事察之必有關雎鵲巢之德葛覃樛木之行足以母儀萬國表正六宫然後設幄於內成以六禮以定后妃之位以正天下之本以對上天之丕顯休命則禮行告廟史無愧辭非惟古訓不違尤於孝道有光儀刑四海垂法萬世而文王二南之化復見於今日矣陛下之正德孰有大於是乎臣老且耄不達時宜而惓惓愛君之念夙夜不忘敢昧萬死冒進狂言惟聖明留意天下幸甚萬世幸甚四曰重詔令臣聞人君所以鼓動天下者在乎詔令而詔令所以行天下者由其信必所謂大哉王言者也茍發之不妄而持以必行堅如金石信如四時則敷天之下莫不聳聽而厭服書曰令出惟行傳曰令重則君尊詔令其可以不重乎乃者陛下登極之初渙頒明詔布告天下有謂國家財賦有限而議裁減文武冗食之員及裁取各門局倉庫與各處添設之內官又謂鹽糧為國用所急不許勢要之求討占窩所以節國用也又謂皇親勢要之受獻地土侵奪民利而治以重罪又謂內外勢要占奪軍民地土而限令改正退還所以恤民隱也凡此數條皆經國之逺猷為當今之急務天下聞之莫不歌誦聖德以為軍民困苦庶其有瘳逮今已期月矣而冗員之裁減取回者庶幾勢要之治罪退還者未聞故內閣大臣有政壅不行而詔所載盡為虛言之奏六科諍臣亦有冗員復留傳奉復作而號令不信之章則陛下之詔令耳目所及已有牽制而不能行者矣何以行之天下乎成湯之所謂朕不食言者其道何如而漢之吏不奉詔者其罪當何如耶臣願陛下主之以剛果守之以堅凝勿以巨室而寬假勿以嬖媟而姑息從羣臣之言而治不奉詔之罪則法行自近澤被生民而四夷莫敢不服矣此係正德之要務也惟聖明留意焉天下幸甚五曰敬天戒臣聞天生聖哲非常之君必遭非常之變以警動其心使之憂勤惕厲修政立事以致非常之治若堯湯之水旱成王之風雷與宣王雲漢之虐莫非天心仁愛之所在故堯舜以警豫為念成湯以六事自責成王悔過出郊宣王側身修行皆能變災為祥轉禍為福以其能致敬天之誠也臣又伏讀五倫書所載我太祖皇帝開基之初屢遭亢旱而聖諭以為欲彌天災但當謹於修已誠以愛民故減膳素食宫中皆然而免民之田租既嘗素服徒步詣山川壇設藁席晝曝於日夜卧於地三日而大雨霑足又嘗躬祀百神而曰茍有罪責宜加朕躬毋為民災其罪已修德若是故能開創大業聿致隆平而垂無疆之休非偶然也今皇上天生聖哲初政清明求言圖治孜孜不倦固宜其治效益隆而休徵畢至奈何即位以來星文示變霪雨為災天鳴於西土地震于南京而陜西又有災傷之患生靈嗷嗷有識凜凜深懷不測之虞所謂非常之變豈非天心仁愛而欲皇上厲非常之志行非常之事以濟其變乎書曰天視自我民視天聽自我民聽凡國家之行政用人但不合乎衆情即有違於天意如有罪而不誅無功而濫賞或幸門旁出而大臣不得行其志或勢要抱持而百司不能舉其職民已窮而征求之愈急財已匱而侈奢之無節若此類皆天心之所不豫而災變之所由生不可以不察也伏望陛下逺師帝王近法聖祖先以側身修行之誠解謝上蒼又以罪已求言之意敷告下土日與左右大臣講求致災之由以盡彌災之道凡用人行政之有違於天意者悉從糾正內外協心上下交修以承天心仁愛之意庶幾精神潛通和氣感召民心悅而天意得則陛下之正德不為虛文矣惟聖明留意焉天下幸甚論裁革中官疏汪循臣近日伏閲朝報工部尚書曾鑒等題本開坐軍容安轡二局添設管事內官上請裁減蓋奉行詔書內事理也陛下不蒙裁減反令司禮監查正統天順年例來看臣愚以為陛下不欲裁減內官不必形諸明詔既已形諸明詔必以內官濫設為可革也可革即革何必復查當裁決裁何必復看王者承天號令明如日月信如四時威如雷霆堅如金石天不變法亦不變山可移判不可移况陛下即位之始發令之初著為詔書頒示天下宣播四夷中外傾心臣民卭首仰望維新之政未踰三月即有二命何以統天承運而慰億兆臣民之望哉在廷大小羣臣百司又何所遵守以布四方一民志哉然此意非但出自陛下側聞先帝之時已有成命矣誠以中官管事其害不小非但各門庫局為然在在有之但管一事則敗一事到一方則害一方挾以天子私臣聲勢可畏莫敢誰何而鎮守典兵抽分倉場錢穀之司其害為尤大也其害不止百姓不堪怨言生於下則災異形於上有自來矣先帝修德弭災明知其故欲行裁革不幸中道崩殂臣民失望夫孝者善繼人之志善述人之事者也武王纘太王王季文王之緒周公成文武之業聖人美之稱為達孝且天下者太祖太宗之天下陛下承之先帝而傳之子孫者也今陛下崇達孝之心欲述先帝已為之事成先帝未行之志則自有祖宗之法度在內監之設官有定員職有常事只掌宮禁服御之需未嘗干預朝廷之政具載皇明祖訓昭昭可查也陛下舍此不查而令查正統天順年間事例則誤矣英宗皇帝英睿之主仍襲洪熙宣德以來輕改祖宗法度添設中官寵信太過以致王振售姦吉祥不軌聖蹕蒙塵幾危社稷正統天順善政固多而中官一事則可以為監而不可以為法也明矣及乎二命既下大臣委靡承順不復開陳科道坐視旁觀不即匡救俾陛下始陷於不知終失於不信誰之咎歟自古天下之事常起於微成於漸而盛於極極則其勢重而難變矣宋儒周惇頤曰天下勢而已矣勢輕重也極重不可反識其重而亟反之可也反之力也識不早力不易也臣愚以為今日之勢亦將重矣識之不早反之不力恐難善其後矣臣嘗讀史至唐天寶之亂宋靖康之變未嘗不痛心扼腕以傷其時禍初未形無智者以圖其始變將已極無勇者以善其終君愎諫而樂宴安臣姦貪而事蒙蔽君子吞聲喪氣小人安危利災而釀成之也是以自古賢君厲精圖治莫不制治於未亂保邦於未危尤必進君子聽忠言上下一心而後能成一代之治如唐太宗容王圭魏徵之直故能成貞觀之風宋仁宗能納范仲淹唐介之忠故能臻慶厯之治賢臣獻言亦必謹禍於微慮患於早而多過於論喻如漢文帝崇尚節儉治比成康賈山猶以過秦為譬賈誼為之痛哭仁宗恭儉仁恕君子滿朝蘇轍猶以六君為比蘇軾為之深悲二君者不以四臣之言為過而嘉納之享隆平之利成英誼之名凡此皆居安慮危方治思亂君臣相得上下交修以成治安之明驗也况今人事擾攘之秋天命絶續之會而自陛下即位以來隂雨霪將踰三月夫陽剛者人君之象而隂則臣也以類推之陽為男隂為女陽為君子隂為小人陽為中國隂為夷狄陽為發生隂為肅殺陽為慶賞隂為刑戮陽為和悅隂為悲慘故天之道晴日恆多隂雨恆少陽恆使其有餘隂恆使其不足今也天道反常必有其應天心仁愛其在兹乎孟子曰入則無法家拂士出則無敵國外患者國恆亡亦以事幾兆於無形禍亂生於所忽今天變於上敵交於前民困於下目擊心惟當不寧處必也戰兢惕厲滌慮洗心省德以回天安內以攘外消己形之變而使之不為災傾將否之運而使之轉為泰誠有望於陛下與夫法家拂士也陛下春秋方茂初試萬幾不宜長處深宫惟以二三中貴傳命于外側聞先帝宫車晏駕之時親執輔臣之手而託以陛下今少師劉健少傅李東陽謝遷諸臣實親受顧命者也吏部尚書馬文升兵部尚書劉大夏都御史戴珊諸臣亦先帝不時召見與決大事者也陛下當召至便殿與之講論朝廷政事得失詢訪天下軍民利病羣臣章疏必躬省覽與之量度去取次第而行至於詔書已行頒布中外豈容不信語曰民無信不立民匹夫也舍信尚無以自立况萬乘之主無信何以立朝廷定天下一民志乎臣願陛下毅然行之不沮於浮言不惑於讒言不尼於近昵詔書容有所未備者推類以盡其餘纘成先帝之志光復祖宗之舊别賢愚辨忠佞進君子退小人審公私明賞罰攬乾剛於獨斷揭日月於中天成一代大有為之君垂萬世永無疆之緒然後陛下為不負先帝所託此微臣輸犬馬之忠而圖報稱於陛下者也然念自古直言之臣多便於朝廷而不便於權幸多利於天下而不利於一身往往言發而禍應計行而身戮臣非不知固位保祿資格轉遷可致富貴顧乃不避忌諱撩蛇頭履虎尾岌岌然若撼山之螟撲燈之蛾而不止者豈厭久生而樂速死哉顧以所欲有大於生所惡有甚於死者耳堂堂天朝上駕唐虞下陋漢唐宋而廷臣言官顧欲自處漢唐宋諸臣之下臣實恥之臣才不及二賈文不如二蘇而職又不在王魏范唐之列徒以目擊當世之弊心抱把人之憂故不惜萬死千刑惟欲博陛下一悟者夫何求哉亦以所志之同然猶不敢以諸臣所至者自畫而學為孔孟之徒所願於陛下者亦不敢以漢唐宋諸君所成者相望而欲超乎堯舜之上此臣之志也所謂犬馬之忠以圖補報者此也臣臨楮不勝憤激戰兢惕厲之至劾宦官疏韓文臣等伏念人主以辨姦為明人臣以犯顔為忠故羣小之姦逼近君側勢足以危社稷亂天下伏未及發是謂禍萌故曰萌不可長臣等幸待罪股肱之列值主少國疑之秋仰觀乾象俯察物議瞻前顧後心焉如割至於中夜起嘆臨食而泣者屢矣臣等伏思與其嘆而泣不若昧死進言即使進言以死不猶愈於緘默茍容乎此臣之志亦臣之職也臣等伏覩近嵗以來朝政日非號令欠當自入秋來視朝漸晚仰窺聖容日漸清癯皆言太監馬永成谷大用張永羅祥魏彬劉瑾丘聚等置造巧偽淫蕩上心或擊毬走馬或放鷹逐犬或俳優雜劇錯陳於前或導萬乘之尊與外人交易狎昵媟褻無復禮體日遊不足夜以繼之勞耗精神虧損志德遂使天道失序地氣靡寧雷異星變桃李秋華考厥占候咸非吉徵切緣此等細人惟知蠱惑君上以便已行私而不思赫赫天命皇皇帝業在陛下一身今大婚雖畢儲嗣未建萬一遊宴損神起居失節雖將此輩虀粉菹醢何益於事乎昔我髙皇帝艱難百戰取有四海列聖繼承傳之先帝以至陛下先帝臨崩顧命之語陛下所聞也奈何姑息羣小置之左右為長夜之遊恣無厭之欲以纍聖德乎竊觀前古閹宦誤國其禍尤烈漢十常侍唐甘露之變是其明驗今照馬永成等罪惡既著若縱而不治將來無所忌憚為患非細伏望陛下奮剛斷割私恩上告兩宮下諭百僚將馬永成等拿送法司明正典刑以回天地之變以泄神人之憤潛消禍亂之階永保靈長之業則皇上為守成之令主臣等亦為太平之具臣矣事關安危情出迫切不勝戰栗俊命之至自劾疏李東陽先帝顧命惓惓以陛下為託臣等痛心刻骨誓以死報及當初政竭力匡持未敢輕易求退近者地動天鳴五星凌犯星斗晝見白虹貫日羣災疊異併在一時京城近甸道路殺人西北諸邊徑敵猖獗損軍折將戰則無兵守則無食民生窮苦府庫空虛風俗傾頽紀綱廢弛賞不當功罰不當罪法令不行名器冗濫諸司弊政日益月增百孔千瘡隨補隨漏當此之際內外臣僚協心倍力猶恐弗堪方且持祿固寵任情作弊讒謗公行姦邪得志變亂黑白顛倒是非人怨於下而不知天變於上而不畏竊嘗歷觀載籍遍閲古今未有如此而不亂者也恭惟陛下即位之初詔書一下天下延頸想望太平而朝令夕改迄無寧日百官庶府倣效成風非惟廢格不行抑且變易殆盡建言者以為多言幹事者以為生事纍次執奏則謂之再擾查革舊例則謂之紛更憂在於民生國計則若罔聞知事涉於近幸貴戚則牢不可破以一二人之私恩壞百年之定計而不顧以一二人之邪讒違滿朝之公論而不恤臣等叨居重地徒擁虛銜或旨從中出略不預聞或有所議擬徑行改易屢有論列多不見允此為兵户等部議處功次等事具本上陳極言利害拱俟數日未蒙批答若以臣等言是則宜俯賜施行臣等言非則亦明加斥責而乃留中不報視之若無使臣等趨向不明進退無據深憂極慮寢食靡寧亦知內告外順人臣之常但政出多門咎歸臣等捫心反顧無以自明展轉於衷事非獲已若諉顧命之名而不盡輔導之實因循玩愒竊祿茍容既負先帝又負陛下伏乞聖明矜察特允退休别選賢能代兹重任則陛下優待舊臣之心勵精新政之議兩盡而無遺矣聖旨卿等切切為治的心朕已知之言事待斟酌行著用心照舊輔導論時政疏李東陽竊聞委質事君者人臣之常職託孤寄命者天下之重任必處常而不失其身任重而不負其託然後可以無愧若徒曠官尸位而假委質之名不能扶顛持危而冒託孤之寄斷乎其不可也痛惟孝宗皇帝大漸之時召臣等至乾清宮御榻前面賜顧命諄諄數百言臣等頓首拜受不勝嗚啞彼時司禮監太監陳寬實共聞之伏自陛下嗣位之初臣等輔導啓沃多見施行少伸報稱近數月來往往旨從中出略不預聞有所議擬徑行改易詔書不信政令失中臣等不敢縷縷姑以其重者言之商人談景清等附託皇親奏討殘鹽既不肯奉詔還官又不肯領回原價挾制朝廷搖撼官府沮陛下之美政纍母后之盛德論其情罪死有餘辜且皇親之家既已辭退家人引目此商人者已不相干而乃曲為庇護寧使帑藏空虛邊餉匱乏而不之顧此政令之失一也大同隨征所開衝鋒破敵名次揆之舊制俱不該升况紀功官原開按伏不係對陳侍郎等官勘得功無顯迹查無明證名字不對多寡不一而乃查近年弊政欲升數百冗員以官法為人情視爵祿如糞土此政令之失二也內府冗員奉旨裁節僉書守門及分守守備等官減革者百無一二而南海子淨身人又選八千餘非惟傷財害民抑且敗壞風俗至於蟒龍玉帶濫賞無算大壞名器尤為不可此政令之失三也御用監書篆缺人吏部奉旨考選乃令革退人役通送本監考校優劣是不信銓衡之任而信寵幸之臣况該部查出革退之人俱係夤緣傳奉奉詔裁革才不幾時遽開此例則匠官術士倣效成風以邪路為當行視詔書為故紙此政令之失四也他如皇莊田土已令巡撫官查數又復差官踏勘取者未回差者繼出帶領人役騷擾地方京畿小民貧困已極何以堪之此政令之失五也駕帖出外拿人纍經各衙門論奏恐生詐偽近因皇親家人奏訴畿民侵占田土輒為出結提解來京鎮撫司打問情節俱與原奏不同未免親解本處官司問理牽連負纍破家蕩産寃苦之聲致傷和氣此政令之失六也韋興齊玄蠱惑先朝盜空府庫一則夤緣分守屢劾不退一則奏請追究止令取回遷延至今未正典刑此政令之失七也各營執事官軍及內府軍匠各倉軍斗俱經奏準查赴團營及各衙乞留仍復照舊廢營伍之籍供私用之門此政令之失八也內承運庫銀兩支銷纍數百萬內府支用不給印票該庫內官自前查算竟爾不行司鑰庫銅錢該部纍奏支用展轉推延至今未發此政令之失九也饒州磁器奉詔蠲免二年又令起運來用此政令之失十也似此之類未易悉舉臣等坐視無可奈何或封還執奏不能終止其為失職實所難辭追思先帝臨終顧命之言仰念陛下委任舊人之意若涓埃之力少有所禆犬馬有知猶當報德况主少國疑四方多事豈忍潔身去位自求便安但忠不足以格君才不足以濟世智窮力竭日甚于前臣等所陳奉有聖諭朕便處治至今未有施行今所奉聖諭云待斟酌行是必言無可采乃使之照舊輔導亦不過仍前失職而巳先帝赫赫之靈臨之在上豈欲其冒輔導之虛名而蹈曠廢之實咎如此哉陳力就列不能者止聞之古人亦有明訓與其身自壞之不若讓之能者伏望聖明俯垂洞察諒臣等為國之心非由矯飾正臣等失職之罪特賜罷歸亟選非常之才俾任難為之事庶可以上回天變下慰人心承先帝付託之隆保祖宗基業之重矣聖旨所言事件著各衙門查奏定奪卿等盡心職務以副倚任李東陽年譜録時府部等衙門因災異陳言數多公慮朝廷不及一一省覽乃進揭帖曰臣等看得府部等衙門災異陳言本詞意懇切有臣等所不知者竊恐萬幾事繁不暇遍覽謹摘本內緊要詞語開列于後伏望皇上留神警省置之坐隅朝夕顧諟以成聖德臣等不勝惓惓之至一單騎驅馳輕出宫禁一頻幸監局一泛舟海子一鷹犬彈射不離左右一內侍進獻飲膳亦屑曲納十月府部科道等衙門有疏請急除羣姦以保聖躬司禮監傳云聖諭已悟痛加修改而所劾太監某等姑示涵容公與劉謝二公上疏曰此數人者蠱惑引誘罪大惡極得罪祖宗非皇上所得而赦臣等不能及早匡救罪已難辭今事至此又豈敢阿從以重傷聖德伏望聖明剛斷俯察羣言拿送法司從重究治以絶禍根則聖德光輝聖躬安泰上以慰先帝在天之靈下以副天下臣民之望司禮監復傳聖意欲將某等寬貸公等又上疏曰伏見舊年以來龍顔清減心切憂惶傳聞每夜戲樂有妨寢膳皇城禁門開閉無節甚至入市交易全無扈衛皆由左右之徒誘引以致聖心荒怠政令乖違財盡民窮上干天變臣等以為宗社至重繼嗣至急屢陳忠悃仰徹宸聰每荷優容未蒙省悟昨者府部科道等官合詞纍奏所論事情又有臣等不及知者皆謂太監某等數人狎昵淫巧罪大惡極欲乞明示典刑肝膽披露情詞激迫臣等讀未終篇涕淚交下連日司禮監太監李榮等三至內閣傳示聖意洞悟前非痛加修改臣等仰嘆聖明不勝竦躍但謂某等自幼服事不忍遽行斥逐臣等已兩次陳請備詞附奏不敢阿從竊惟改過不吝去邪勿疑乃古聖賢明訓人君之於小人若不知而誤用其失猶小天下尚望其明知而去之若既知而不去則小人狎玩愈肆姦邪正人危疑被其離間天下之事無可復為必至於亂亡而後已今數人者已揚於朝廷天下知之矣陛下既悟前日誘引之事皆由此數人即乞早賜斥逐則罪有所歸聖德無損若含糊將就雖內自修省天下誰肯信之且邪正之勢不能兩立今滿朝文武公卿科道皆欲急去數人而使之尚在左右非但滿朝之臣皆懷疑懼而此數人者亦恐不能自安上下相疑內外不協禍亂之機皆自此始宗社所關誠非細故數人若退自有忠謹老成之人以充任使若滿朝文武不安其位陛下誰與治天下乎臣等身居此官目擊此事若曲為阿附苟避刑誅則古人所謂疾忠直如仇讎保姦回如骨肉欺君誤國死有餘辜何以報陛下委任之恩副先皇顧命之託用是傾心瀝血冒犯天威猶冀俯垂鑒納若以臣等為不能適情順旨則乞罷歸田里以避羣姦别選賢能以充任使必能格君正法輔翼太平臣等雖不能逃向來曠職之愆猶免將來負國之責上不允於是公等以去就決之各上疏求退附録李東陽年譜正德五年庚午公年六十四嵗六月久旱風霾蔽日人心惶懼上降旨令百官修省特致齋九日公因法令太嚴人不堪命乃上疏曰臣等職居輔導心切效忠每有所見未敢一一煩瀆竊惟近時以來皇上勵精圖治威令大行中外臣民莫不悚懼但霜雪之後必有陽春雷電之餘必有甘雨此上天之道君人之所當法也今不敢多舉姑以近且切者條陳一二上陳睿覽伏望聖明特垂鑒納俯賜施行誠宗社之慶蒼生之福非獨臣等之幸也臣等不勝忠愛懇切之至謹題請旨一近來逃軍及拐馬人犯正身發邊衛充軍窩主鄰佑火甲人等發附近充軍固懲姦戒惡至意但人情久玩驟不能堪况窩主鄰佑亦有不知情者見今天氣炎熱在監人衆乞勑問刑衙門將逃軍正犯不曾拐馬及馬有下落者送營操備窩主鄰佑人等暫為釋放馬無下落者仍行追究及將逃軍近者三箇月逺者令兵備鋪馬賫文到日為始再限六箇月自首免罪以後過限事發從重處治實為便益一近來各衙門官犯通查遞年經該僉書職名追究懲治此固除姦革弊至意但以一時之失而窮一二十年之逺以一事之差而纍數十人之衆非惟人才難得抑且情有可矜乞勑問刑衙門除侵盜錢糧接受贓物打死人命等項重情不宥外將遞年干連人犯公錯者罪坐本犯經手者止坐該年遷官去任者依律發落實為便益一近來各處查盤糧草虧折浥爛者巡撫等官多有監追賠價甚至加賠此固慎重錢糧至意但職有大小責有専溥賠補虧折法有明條管糧部官分守分管屯官固難辭責若巡撫之職一方庶政皆其所統事無經手日無餘暇乞勑該衙門將都御史等官果有侵盜依法追陪若止是督理不嚴從寬發落或罷黜不用仍申嚴禁例今後有犯虧折等項從重處治實為便益一近來各處差出官校真偽莫辨間有詐稱校尉索要各衙門官財物者朝廷赫怒拿解本犯罪及各官此固杜絶姦弊至意但此等官校既奉朝命一出國門逺近驚悚與其治於末流孰若正其根本乞勑法司凡有在外衙門應問人犯情輕者止令巡撫巡按等官問理情重者解京處治前項官校免其差出真者不差則偽者無由而作庶事穩當人心獲安實為便益上從之祕録李夢陽初今上即位青宮舊閹等日導上狗馬鷹舞唱角抵漸棄萬幾罔親時號八虎而段敏黃偉雖舊閹以端慤斥不信用會段坐病免死於是户部尚書韓文每朝退對屬吏言輒泣淚數行下以閹故而郎中李夢陽間説之曰公大臣也義共國休戚徒泣何益韓公曰奈何曰比諫臣有章入交論諸閹下之閣矣夫三老者顧命臣也聞持諫官章甚力公誠及此時率諸大臣殊死爭閣老以諸大臣爭也持必更力易為辭事或可濟也韓公於是捋鬚昂肩毅然改容曰善即事弗濟吾年足死矣不死不足以報國翼日早朝韓公密叩三老三老許之而倡諸大臣諸大臣又無不踊躍喜者韓公乃大喜退而召夢陽令具草韓公讀而芟之曰是不可文文上弗省也不可多多覽弗竟也而王嶽者亦青宫閹也剛厲而無阿頗亦惡其閹儕初閣議持諫官章不肯下諸閹者業窘相對涕泣會諸大臣疏又入於是上遣司禮者八人齊詣閣請一日而遣者三而閣議持卒不肯下而嶽者八人中人也顧獨曰閣議是明日忽有旨召諸大臣諸大臣者蓋人人惴也既入左掖行吏部尚書許進首咎韓公曰公疏言何韓公於是故曳履徐徐行而使吏部侍郎王鏊趨詣閣探動靜閣老劉健語鏊曰事已七八分濟矣諸公第持莫輕下至左順門閹首李榮手持大臣疏曰有旨問諸先生諸先生言良是無非愛君憂國者第奴儕事上久不忍即置之法耳幸少寬之上自處耳衆震懼莫敢出一語答李榮面韓公曰此舉本出自公公云何韓公曰今海內民窮盜起水旱頻仍天變日增文等備員卿佐靡所匡救而上始踐阼輒棄萬幾遊宴無度狎匿羣小文等何得無言韓公言雖端而氣不徑又鮮中肯綮於是李榮哂而曰疏備矣上非不知今意第欲寬之耳諸公遂轟然而退蓋是日諸閹者窘業自求安置南京而閣議猶持不從諸公乃竟爾爾退惟王鏊仍前謂榮曰設上不處如何李榮曰榮頸有鐵裹之耶而敢壞國事榮入而事變矣是夜立召劉瑾入司禮而收王嶽范榮詔竄南京尋殺二人於途已又連斥劉謝二老顧獨懇留李而韓公訩訩咸拔茅散矣變之起大抵莫可詳而李榮則曰諸大臣退而瑾儕繞上前跪伏痛哭首觸地曰微上恩奴儕磔餧狗矣上為之動而瑾輩輒進曰害奴儕者嶽也上曰何也曰嶽前掌東厰也謂諫官曰先生有言第言而閣議時嶽又獨是閣議此其情何也夫上狗馬鷹嶽嘗買獻之否上心所明也今獨咎奴儕既而益復伏地痛哭上於是怒而收王嶽瑾又曰夫狗馬鷹何損於萬幾今左班官敢譁而無忌者司禮監無人也有則惟上所欲而人不敢言矣上於是詔瑾入司禮監此其説亦近第難盡信耳又聞閣議時健嘗推案哭謝亦亹亹訾訾罔休獨李未開口得懇留云乞宥言官去權姦以章聖德疏王守仁臣聞君仁則臣直大舜之所以聖以能隱惡而揚善也臣邇者竊見陛下以南京户科給事中戴銑等上言時事特勑錦衣衛差官校拿解赴京臣不知銑所言之當理與否意其間必有觸冒犯諱上干雷霆之怒者但以銑等職居諌司以言為責其言而善自宜嘉納施行如其未善亦宜包容隱覆以開忠讜之路乃今赫然下令逺事拘囚在陛下之心不過少示懲創使其後日不敢輕率妄有論列非果有意怒絶之也下民無知妄生疑懼臣切惜之今在廷之臣莫不以此舉為非宜然而莫敢為陛下言者豈其無憂國愛君之心哉懼陛下復以罪銑等者罪之則非惟無補於國事而徒足以增陛下之過舉耳然則自是而後雖有上關宗社危疑不制之事陛下孰從而聞之陛下聰明超絶茍念及此寧不寒心况今天時凍沍萬一差去官校督束過嚴銑等在道或致失所遂填溝壑使陛下有殺諌臣之名興羣臣紛紛之議其時陛下必將追咎左右莫有言者則既晚矣伏願陛下追收前旨使銑等仍舊供職擴大公無我之仁明改過不吝之勇聖德昭布逺邇人民胥恱豈不休哉臣又惟君者元首也臣者耳目手足也陛下思耳目之不可使壅塞手足之不可使痿痺必將惻然而有所不忍臣承乏下僚僭言實罪伏覩陛下明旨有政事得失許諸人直言無隱之條故敢昧死為陛下一言伏惟俯垂宥察不勝干冒戰栗之至劉瑾之變李東陽三月朝罷內降勑諭留百官於金水橋南跪聽宣讀敘曩者伏闕之事以為朋比指摘公卿臺諫數十人未退者勒令致仕後稱張懋等依同僉名姑不查究蓋指公等嘗聯章奏諫也尋以黃紙謄稿付內閣落底公謂此勑不經鳳閣鸞臺豈宜混録令中書默記其下曰四月二十三日遞出蓋謹之也瑾威權寖盛口銜天憲隂養松江罷學生張文冕及其姪壻罷職司務孫聰於家凡有批答多令增減甚者别為創造真偽混出而文理亦多不通觀者皆知其非內閣所擬也日進勑稿或用朱筆改竄公輒令制勑房底簿亦用朱筆各記所竄易處以備參考四川鎮守太監羅籥請便宜行事瑾實主之公力言不可因奏曰太祖髙皇帝設官定制在官有都布按三司都司管兵而不管錢糧布政司管民而不管軍馬又有按察司官糾劾専問刑名而軍馬錢糧皆不管其權蓋分而不兼此祖宗防微杜漸之深意永樂以後漸差都御史在外巡撫其有番夷去處則置鎮守總兵官後又差內臣一同鎮守撫安軍民防禦賊冦其權則同而不専故勑諭之詞曰會同計議停當而行毋得偏執違拗未有一人専制一方者且如四川所奏則王府宣慰皆其綜理夫以親藩之隆重土官之強悍彼心不服則釁隙必生又如舊勑有載草冦生發則調兵勦捕或征勦土官必須奏請其所關係尤非細故今既革去巡撫若并付鎮守衙門任其進止非惟事體不便恐鎮守一人亦自擔當不起百五十年所未有豈敢一旦增添若天下鎮守比例而行則其所係又不止一方而已乃內批出便宜自餘如所議陳俊之得罪也瑾因以及漕運總兵官平江伯陳熊以濕潤米等項銀為贓遂至大獄必欲置之死地公力爭之瑾謂熊所犯罪重不宜姑息公云某誠姑息但非姑息陳熊乃姑息陳瑄耳瑄在太宗朝開濟寧河道以通漕運有大功金書鐵券子孫皆免一死豈可盡革傷天下武臣心瑾曰國初功臣如常遇春鄧愈湯和輩百戰之功今其子孫俱已革罷陳瑄不曾厮殺有功當代豈足深惜公曰漢髙祖親定十八功臣位以蕭何為第一蕭何不曾厮殺但因供給餽餉不絶遂以為萬世之功蓋足食然後足兵使當時餽餉不繼雖百張良十韓信豈能取漢天下且蕭何餽餉猶是一時爭戰之日陳瑄通南北漕運每嵗四百萬石至京師國家萬年誠萬世之利也瑾不能答會慶府置鐇與千户何錦等叛逆朝廷命太監張永總督軍務起致仕都御史楊公一清與涇陽伯神英提督軍務告廟出師詔告天下視草甫出瑾不得已從之猶欲延緩數日公即趣禮部差官員監生錦衣衛設雲盤鹵簿鴻臚寺備禮儀以翼日頒行瑾見公捧詔付禮部出忿然謂同官曰且令渠輩歡喜是日至東閣云上謂詔書取回各處差出官校是要革行事衙門此係纍朝舊制如何可革公曰舊制行事衙門官校止在京城今差出四外聲勢烜赫驚疑天下姦詐之徒因而矯託真偽莫辨近已纍犯煩朝廷處分若真者取回則偽者無所容矣天順元年詔書曾有如此條例因取舊稿示之瑾乃語塞退而嘆曰我費三四年心行幾件好事被一張紙改盡矣後自逺外來者皆云各處軍民官員受苦已極若非此詔安人心其禍有不勝言者而寧夏尤急云置鐇之變鎮守太監趙弼總兵官都督薑漢巡撫都御史安惟學皆遇害朝廷慮一鎮無主亟為易置以係人心一日間勑旨十數降公迅筆擬奏刻時發行略無疑滯動中機宜見者驚嘆初傳遊擊將軍都指揮仇鉞已入城興武營守備都指揮保績其親家也衆方疑之公謂鉞之入或將以有為未可逆詐若用他人是絶其歸也乃請以副總兵都督楊英代為主帥即以鉞為副總兵而保績為參將蓋謂彼若感激思奮可以成功如既用之而彼乃負德則亦無以自容矣衆以為然隨得績奏云臣母及妻子皆在寧夏城中今不暇顧恨不得飛渡黃河食賊之肉辭氣激烈見之不覺墮淚旋得諸報知鉞已斬周昻殺丁廣執置鐇而鉞久未自陳比奏至亦直述事由未嘗有矜伐希賞之意識者知廟堂之算無遺䇿矣王師甫出數日捷報已至即勑神英旋師令張永仍往寧夏安輯其地瑾亦畏永不敢令其還師聽自酌處乃於勑內極言年嵗飢饉道路供億之難永知此意乃止挈數十人以行而悉還其所部官軍三千餘衆所省餽餉不可勝計公以災異上疏辭聖旨卿是纍朝重臣已受先帝遺命輔導朕躬才德兼隆中外悉知譽望顯著海內咸聞尚未從心之年神彩精健正當輔佐凡事用心足見為國至意近因寧夏叛賊勦平皆卿裁割之力朕心允協安忍懇切引疾求間有疾宜親近藥餌善加調護纍有旨勉留安心辦事毋負遺命朕意所辭不允公又疏辭聖旨卿引衰疾屢求休致至再至三歷旨勉留宜盡心職務允協朕懷不必固辭有疾多訪賢醫善加調理八月十三日寧夏獻俘既入東安門上親賜宴勞太監張永永乘間出懷中疏奏劉瑾十七事且言其將為不軌上震怒當夜遣人執瑾次日早令太監溫祥等持永疏至內閣公讀畢徐問曰今當何如祥輩曰老先生輩謂當何如耳公曰此事極大須朝廷大作主張祥輩曰已就逮矣公曰此聖政也天下望此久矣祥輩乃曰須傳旨行之公乃援筆擬進上降旨數百餘言皆合死律末云劉瑾所壞事情科道官指實來説異日科道列瑾罪惡三十餘條乃下瑾鎮撫司獄會鞫於午門前得其私製兵甲刻期起手罪狀明白坐謀反於是降旨極言罪狀特令凌遲三日諸被害者爭拾其肉嚼之須臾而盡天下聞而快之是時籍瑾書籍得秦府永夀王為瑾慶壽詩序中間稱謂過於卑諂上怒甚欲降勑切責公上疏曰自古治亂賊者正名定罪誅止其身昔漢光武平叛賊王郎得吏民交通文書數千章一不省視會諸將燒之曰令反側子自安歷代相傳以為故事當劉瑾専權亂政之時假託朝廷威福以劫制天下生殺豫奪惟其所欲中外臣民誰不屈意待之往來書信禮意雖於律法有礙俱因畏罪避禍多不得已情有可原况王府懿親尤宜優待自非知情共叛法不可赦者其細故小過亦須曲賜包容若指論罪實降勑切責則凡有書信饋送者不知其幾傳聞驚駭各不自安或愧懼終身或遂致失所不可不為之慮今劉瑾罪狀明白已正典刑欲乞聖明洞察廣大涵容將此壽詞置之不問并一應書劄文字無干叛逆事情者併行燒燬以滅其迹使人心安帖事體穩當上以為然於是悉焚其往返文字無延及者名臣經濟録卷九
