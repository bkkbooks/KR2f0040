body:
  text: 名臣經濟録卷四明黃訓編保治景泰天順休菴詩序何宜兵部尚書王公以疾乞歸河州既得命乃取古人以休休名亭之意亦以休名菴朝士大夫惜公之去願公之復來者咸有詩以道意宜萃而成帙因僭有言曰古人以休休名亭者蓋自以量才一宜休揣分二宜休耄而聵三宜休也公以名進士為給事中為都御史為尚書歷官將三十年於凡所為無非忠義事宜固未能悉舉且以公之忠義大節言之公為給事中時我國家為權奸所誤致有土木之變中外訩訩咸以宗社為憂公退食與夫人暨諸子言之輒流涕因不能下咽乃首倡諸廷臣抗疏論權奸誤國之罪欲夷其族朝廷於公等之言猶未深納公與諸廷臣俯伏大慟有附奸者厲聲以訶止之公曰國家為權奸所誤如此若等正奸黨所當誅者今日尚敢爾耶乃奮不顧身與衆共擊死之朝廷知公之忠義不可奪遂深納其言公等始退時餘黨尚多皆惶怖不自安而敵騎又充斥朝廷欲姑安餘黨之心而嚴慎防敵之䇿乃令衛士傳宣諸論事者蓋欲諭以此意也朝廷此意外猶未之知而餘黨即為流言以恐諸論事者公與夫人暨諸子訣曰吾今日事乃忠義所發自不能已也忠臣為國以死為安脫有不虞爾為吾之妻當死節耳所遺幼稚寧無尚義者為我育耶遂與諸論事者入而朝廷獨諭以前意不復有他說衆始知餘黨之流言也公退乃悉心經畫防敵之䇿既而敵騎薄都城公督兵拒守敵知有備遂遁去而中外之憂始釋其忠義之發足以安宗社也如此為都御史時嘗奉命巡撫徐淮諸州郡值連嵗水災民饑甚流離死亡不可勝紀至有相煽為盜將貽朝廷之憂者公乃早夜憊精劬力經畫救荒之䇿至忘寢食大發官廩及斂富人所輸之粟厚賑恤之諸廩已空獨廣運倉之所儲者尚富然是倉之所儲乃備京師用者故朝廷嵗遣一內臣一户部官以同主之公欲先發是倉以賑然後以聞而主者有難詞公强之而難詞益甚公謂之曰民惟邦本本固邦寧民窮至此吾恐貽憂於朝廷故欲亟發此耳爾不吾從脫有變吾先殺爾以治爾召變之罪以謝衆怒以免朝廷憂而吾則請罪於朝廷也主者不復有難詞乃大發以賑流離遂定其忠義之發足以固邦本也如此為尚書時有言古北密雲之邉事者命下兵部議之公以其言有理遂如其言以聞有忤上意越兩日猶未報公謂宜曰吾充位大臣當以道事君若以此得罪亦惟懇疏乞歸而已而大臣之位不能以復充也乃具疏以待然上素知公之忠義又欲有以求讜言也故竟無一言以罪公而於言事者亦不加之罪也公所具乞歸之疏遂不上或有為公慮者私謂公曰自今凡事宜慎重事有大利害者何苦而不計耶公曰自今不遇此等事則已脫遇此等事吾亦如此處之使利害更有大於此者吾亦不知計也為公慮者為之愧服其忠義之發足以服人心也如此昔漢汲黯於武帝時為謁者以嚴見憚河內失火延燒千餘家帝使黯往視之還報曰家人失火比屋延燒不足憂也臣過河南災傷水旱貧民萬餘家或父子相食臣謹以便宜持節發倉廪以賑貧民請歸節伏矯制之罪帝賢而釋之黯之忠義如此故武帝於黯嘗以古社稷之臣稱之宋韓琦居相位處危疑之際知無不為或曰公所為誠善萬一蹉跌豈惟身不自保恐家無處所矣琦歎曰是何言耶人臣當盡力事君死生以之至於成敗天也豈可預憂其不濟遂輟而不為哉聞者愧服琦之忠義如此故先正吕中丞於琦嘗以社稷之名臣稱之若李綱為兵部侍郎痛惜國家為奸臣所誤勢危如髮乃欲誅鋤內奸以快人心治兵捍敵以守宗社奮不顧身而任天下之重不幸遇有李邦彥等社稷之賊惟綱是嫉不恤國計綱有謀議多為所沮不見聽於其君是以靖康之禍竟莫能免然綱之忠謀正議雖不見聽於其君而綱之忠肝義膽天地鬼神之所知也綱之忠義如此故太學生陳東等於綱亦以社稷之臣稱之公之憤權奸誤國奮不顧身而為宗社計與綱之痛惜其國家為奸臣所誤奮不顧身而任天下之重固無以異也慮徐淮饑民有變先發廣運倉賑貸然後以上聞與黯之憂河南貧民父子相食先便宜持節發為公慮者之言與琦之所對或者又何以異哉公之忠義大節既無以異於黯與琦綱則公亦社稷之臣也社稷之臣量才固不宜休揣分亦不宜休况公於今年方五十有二尚未耋而聵也又豈宜休耶三不宜休而亦以休名菴公之節固髙矣其如士大夫之公論何昔宋之名臣范鎮吕誨歐陽修富弼皆於熙寧間引疾求去御史中丞楊繪上疏曰老成人不可不惜今舊臣多引疾求去范鎮年六十有三吕誨年五十有八歐陽修年六十有一而致仕富弼年六十有八而引疾陛下可不思其故乎夫以老成人如范鎮吕誨歐陽修富弼未及引年皆稱疾求去楊繪猶懇懇為朝廷言之公為社稷之臣年方五十有二而引疾使遇楊繪又不知其言之當何如也宜曩以疾章至再上乞歸時公尚未入兵部宜於公雖極向慕然猶未得一奉誨言既公入部詢知宜疾少愈即疏留之今公以疾乞歸宜不能懇疏留公深以為愧然宜雖不能懇疏留公他日豈無楊繪者懇懇為朝廷言之以起公耶矧公之乞歸也章至五上詞甚懇切上不得已始賜俞允且謂疾已當復來是上亦知公為社稷之臣朝廷不可以少公也他日縱無楊繪者為朝廷言之朝廷亦豈肯於公忘耶又詩曰保兹天子生仲山甫自古以來賢佐皆天為國家生也天為國家扶社稷之意甚厚故生社稷之臣生社稷之臣必欲其永安社稷以副所以生之之意則天亦豈肯於公捨耶是以公雖休而終亦不能休也昔殿中侍御史裏行唐介以直言被貶去國朝士有詩送之於末兩句云天為吾皇扶社稷肯教夫子不生還公以疾乞歸固非貶比然公亦去國者宜於休菴愧未能為賦一詩敢借是詩之句而易以三字云天為吾皇扶社稷肯教夫子竟休官朝士大夫所賦休菴詩皆惜公之去願公之復來者蓋此意也宜故推其意以為序云災異論事孫原真臣聞洚水警豫六事自責雖大舜成湯之世不能無水旱之災然聖君之自警自責如此宜彌天變之災遂民生之福也先因雨暘弗順自去嵗冬至今嵗春或積雪連旬或窮隂彌月陛下發渙綸音責躬省咎是心也即大舜自警成湯自責之心也又謂君臣一體宜同此心下諭羣臣咨以致災之由彌變之道如愚臣者暗於天道曷足以知謹按洪範久隂恆寒兹遇咎徴陛下敬天恤民之誠感孚上下而隂謀不足慮也羣臣尤當思過自新上體宸衷祗畏天戒此臣等所以深思熟慮仰答無由而朝夕惕若也顧惟陛下道合重華德符知勇自即位以來不邇聲色不興土木不事游畋不濫刑罰不好逺方珍物使民只正役取民只常賦其他一無所需可謂清心寡欲仁愛兆民之至尚因何咎而致兹天變哉是蓋犯邉之冦未賔冗食之兵未汰屯堡之田未盡耕稼轉漕之粟未足供給流移之民未盡復業孳牧之馬未免追賠若此等事殫天下之財困天下之力公私耗竭軍民咨嗟災變之應其或在兹然數者之弊皆洪武年間所無積漸於永樂之後以至其弊尤甚而欲四海歡康五行時若災沴不作更化可也但隂襲已久未易遽更或任其事者樂因循憚改作必有非議之者臣願陛下日御經筵與股肱大臣參帝王之良規考祖宗之成法以為今日之經制某弊可以漸更某弊可以遂革凡可以固邉防足兵食節國用紓民力堪為經久之計者臨機獨斷務在必行俾威福不至下移將見華夏尊安戎狄順服億兆無愁歎之聲則隂陽和寒暑時而嘉祥應矣今將所論事件開坐謹題請㫖一論邊境北敵之俗孳牧駝馬牛羊以給衣食飲其酪食其肉衣其毛革造弓矢刀鋋以為兵器馳騁射獵勇於戰鬭自古為中國患及至有元入為君主此前代所未有也天命我太祖髙皇帝恢復中華總一區宇還變淳風其餘黨遁歸北漠罔敢南侵至永樂辛丑竊掠疆場太宗文皇帝躬率六師往問其罪臣忝從征時和寧王威拉烏梁海三部落之衆不相統一彼此疑畏各相逺避保其部落是以天兵如入無人之境直至黑松林以北但俘其老弱并獲其馬牛羊以歸今和寧王烏梁海之衆俱為威拉所并正統己已敵人入塞我兵失利遂犯京畿陛下赫怒誓師奮擊敵敗而還後雖慕義遣使來朝人輒千餘馬至數萬是蓋覘我虛實坐敝中國且養兵休士略不驚我邉鄙此其志在中國實今日大患也况敵勢方張聲震西戎威驚女真今三邉阻絶間諜無所入應援無所通非中國得志之秋雖衛霍將兵未可窮追逺討以望成功宜選賢將積榖休兵優養士卒撫之有恩教之有法謹烽火整器械固守邉疆且聞敵先入寇一人所乘三馬迭換以革囊盛乾酪為糧不將輜重故其人馬不罷鋭氣無損來若風雨卒莫能拒去如絶絃速不可追自然之勢也是以攻城步戰非其所長突騎奔衝實其所便若復侵邉必須度我兵勢未能出竒設伏正兵忽與爭鋒恐損軍威宜如李牧之養鋭示怯趙充國之且屯且守候其部衆志驕心離以計破之庶無失也一論冗兵夫兵貴精不貴多昔周瑜破曹操於赤壁謝𤣥破苻堅於合淝李靖於定襄破突厥於隂山破頡利斯皆以少擊衆而多者反敗是則兵不在多能用計爾惟京師根本之地誠宜聚衆兵以臨制四方然以前代及我朝洪武中兵制較之今在京有親軍及五府屬衛之兵又有衛陵寢牧國馬服匠藝并續調外來操備之兵其間冗食者不為不多而欲府庫充倉廩實豈不難哉乞命文武大臣簡其精鋭習戰陳以振武威汰其冗雜給屯田以歸農業其西北備邉之兵以次簡閲養精鋭汰冗雜則不惟內外兵精足以禦侮防奸而嵗省粟帛可勝計哉一論曠官切照在京各衛所帶俸都指揮指揮千百户鎮撫或先從成祖起兵或宣德正統以至景泰年間各處征討有功升授以官因諸處衛所官無缺員既不如職授任又不領隊管軍一向隨伍執役食六品至三品之祿充一卒之用養之徒厚用之實輕在京錢糧供給艱難亦非所以貴貴而勸有功也乞𠡠兵部同總兵官於各帶俸官內簡選有謀略及驍勇者量數存留領隊管操餘悉照依舊例於大寧山東河南等都司中都留守司直𨽻衛所見今來京操備軍內精選兌換就令各官到任或除授在外都司衛所管屯等項不惟各安職任候倉儲充實漸減漕運一分軍民省一分之勞減二分軍民省二分之費傳曰生之者衆食之者寡則國常足矣一論逃民臣前任河南參政時查各處逃户周知文冊通計二十餘萬户內山東山西順天等府逃户數多其河南之開封汝寧山東之兖州直𨽻之鳳陽大名此幾府地境相連往時近黃河湖濼浦葦之鄉後河泄水消遂變膏腴之地逋逃潛住其間者尤衆近因河溢橫流此幾處水荒流民復散間有回鄉多轉徙南陽唐鄧湖廣襄樊漢沔之間趂食恐其逼於饑寒相聚為盜聞朝廷遣官賑恤已不失所未至為非緣此等逃民始因躲避糧差終至違悖德教食地利而不輸租賦曠丁力而不應差徭棄故鄉而不聽招回住他郡而不從約束屢詔寬恤其原籍與所在官司兩難挨究莫如之何况今聲教所暨四海歸心獨此輩恃恩玩法梗化如此然以中原腹心之地為流民淵藪如昔陳涉王常張角諸盜皆由此起今聖明撫運萬無此虞然慮積嵗滋久時遇饑荒安知無奸盜扇禍其間故宜防之於未然合候年榖豐登乞𠡠遣近臣先往此幾處著落司府州縣各委官員沿村逐户挨勘的實籍貫丁口明驗家口以給田業隨土宜以課農桑舉鄉飲以導其父兄立鄉學以訓其子弟建鄉社使知報本設義倉使知備荒時加巡察撫綏德禮以化之刑法以齊之徐議其賦役俾為治世之良民庶杜後來之患也一論馬政治兵以備邊疆畜馬為先如漢太僕牧師諸苑三十六所分置西北二邉奴婢三萬人養馬三十萬匹唐於西北置八坊四十八監以牧馬田萬千二百三十頃募民耕之以給芻秣自貞觀至麟德年間馬七十餘萬匹宋在京有兩院四監六坊在外有十四監牧地四萬九千四百餘頃兵校一萬六千三十八人飼馬二十餘萬匹然牧馬之地無考較其養馬十匹只用一人唐之牧馬數蕃而芻秣之田數不登餵養之人數無考宋牧馬之地差廣較其養馬一人不啻十匹又有馬户則蠲其科賦保馬則蠲其征役此前代馬政牧於官者多牧於民者少我太祖髙皇帝定鼎金陵歸馬淮甸太僕所領於民間西北二邉置太僕寺伍苑馬寺四監一十九苑七十四則官署有加於昔其養之人與牧地馬數莫知幾何若北京行太僕寺所管馬匹先俵順天等八府民間牧養後民丁不敷復俵山東河南是蓋牧於官者其法漸廢牧於民者其數日蕃又不蠲其科賦復其征役及種馬倒死駒馬有虧未免督責追賠其續增馬數又合添俵民甚苦之今古制固不必復舊制亦所當考宜令各太僕苑馬寺查勘設置各監苑之初養馬之人放馬之地牧馬之數幾何其法制仍在如便孳牧將後該俵馬匹與寺苑領養又嵗選其堪騎操者給與馬隊官軍領操調習庶幾緩急可用若官為多牧民免再增幸甚一論權幸昔堯舜之世靜言庸違之共工不得不流方命圯族之伯鯀不得不殛况後世之臣豈無共鯀其人哉我太祖皇帝時置中書省以總政權初用李善長為左丞相得幸朝臣之無忠義者隂與搆禍繼用胡惟庸為左丞相得幸結構羣小夤緣為奸後先敗露相繼誅夷詔罷中書以抑權幸太宗皇帝時錦衣衛紀綱得幸希㫖弄權貪利僭分事覺并誅其黨復籍其家榜示天下垂戒後世太上皇帝信任王振得幸専權擅作威福內外官僚罔不畏憚正直氣沮莫敢言其非邪佞朋奸惟欲附其勢同列應對或至屈膝臣僚參謁或至叩頭奢僭已極智能自矜不知命將在謀用兵有法輕視北方意圖要功强萬乘之尊擁數十萬之衆雖智由天錫然目未見敵身未經戰且幃幄運籌智能莫預安能定廟算以授諸將哉是以諸將不知主謀諸軍不知將令乃欲破滅勍敵鋒刃未接營陳已陷當國家全盛天下無事之秋軍非不精馬非不良兵革非不堅利臨機失措不戰而喪師辱主為敵國所笑自古以來未之有也權奸誤國若此雖其殺身自取赤族之誅敵且乘勢入關犯京都驚陵寢賴陛下委任將相協力運謀誓師問罪敵雖遁去尤恐上皇乘輿播越沙漠困處穹廬固知聖情靡寧猶以君道自尊聲色不動彼雖殊俗莫不瞻感敬服終執臣禮陛下遣使省問復諭敵以恭迎上皇恩意有加義以責之誠以動之敵方悔罪欵塞奉送上皇法駕還京陛下得以解鴒原之憂中國臣民得以解不共戴天之讐實不幸中之大幸也斯皆往事鑒戒昭然今所任用未聞有此尤宜慎之於未然伏願陛下視朝之暇日御便殿集勳舊之臣延英俊之士訪論治道商確政事好問好察以通下情明目達聰以廣上智忠佞自見誠僞莫逃然必總攬威權自奮乾斷法堯舜之除凶惟允體祖宗之去邪勿疑務兼聽以納讜言毋偏信以長奸計則善賢日進內外官皆正人而權幸者日逺矣軍民利病奏孫原貞欽惟皇上即位以來德上寬仁政從簡省闢言路以通治道任賢才以隆治功期年之間與天下相安於無事民心大恱臣以庸才亦䝉甄拔方面之寄豈淺薄所堪夙夜戰兢思無報稱謹以軍民利病等事條陳臣自揆學本迂疏識不達於大體言雖瑣細事有切於下情仰惟仁聖寬鈇鉞之嚴容芻蕘之直有可採擇庶補涓埃開坐謹具奏聞一草束事本布政司徴收民間草束洪武年間每糧一石五斗該草一束附近場分交納今該八斗一束已倍其徴又多撥京場交納緣草束萬數動如山積舟車莫能逺運里役徴收只得准折布絹等物赴京附近州縣買納名則輕賫實則重斂及到彼收買或遇旱潦草少價增貨物短少無計了納復還重徴多致逋負有司受遲誤之罪里役罹杖責之苦積嵗不完惟冀蠲免因此民難及照山東民納草束事體相同前件如蒙准言乞勑該部隨駕御馬監計議於直𨽻河間大名二府近水次去處踏勘空曠相應田地設置馬房草場其鄭村埧等處收養馬匹量存大駕備用之數其餘馬匹并續到進貢等項馬匹俱送二處於武驤左等四衛內或全衛或分撥官軍前去牧養量撥草束料豆河南於大名草場山東於河間草場送納實為民便一水利事北京儲積漕運實重故言者多以水利為急有未嘗至其地審其勢但知其利而不計其害聞其便而不悉其難故其言之切朝廷從之宜也如金龍口河道接黃河水達張秋以入漕運河內先曽淤塞永樂年間用軍夫十有餘萬開挑不數年淤淺自後逐年一淤一濬軍夫勞役未有寧息近該欽差巡撫河南山西行在兵部右侍郎等官行移著令見起并看守軍夫五千餘名疏濬行在工部勘合該監察御史李懋題欲量工多起人夫深濶挑通緣會計工程浩大該用軍夫數多及照本司所屬百姓因上年旱蝗饑饉逃移一十二萬餘户欽承明詔宥其逃罪蠲其逋租免其雜役才招復業中間有居屋廢壞田産荒蕪耕無牛具種無種子生理既難日食不給此等人民誠可憐憫其餘見在人户亦因嵗歉逃户糧差并及貧窘可知兹役一興未免一槩動擾恐復逃移及看河口土不堅實河底沙泥深陷難以開深黃河水勢更改不常易於淤塞且漕運河內淺處尤在濟寧一帶若船過濟寧有水行至張秋下流亦易去矣前件如蒙准言乞𠡠該部計議止用見在工軍夫從宜疏濬免致動衆為便若干礙漕運緊急亦乞暫停候二三年後田榖豐穩凋瘵復蘇再行定奪一屯種事天下軍衛設置屯所軍士種田秋成比較子粒舊有事例每軍有嵗收細糧二十四石者則一人之耕勾二人之用有十八石者則二人之耕勾三人之用有十二石者亦足自給如一衛或五七百名或千餘名一所或二三百名屯種以天下衛所計之嵗收何可勝算此寓兵於農古良法也今各處因循視為細務軍士下屯者少舉天下之兵幾百萬之衆不耕而食臣恐民間租稅不足餽餉欲倉廩充實其可得乎且今國家營造已罷西洋不去四方無虞惟在京漕運操備備邉三事餘無征差前件如䝉准言乞𠡠五府該部行移在京在外衛所取勘軍士除前項差占及守城等項外餘悉屯種然軍士貧窘者多牛隻器具一時莫措耕種尚艱計其所收子粒一二年間且宜寬減以後依例比較仍於農隙時日修習武備則兵不至於坐食而廩有餘積矣一邉儲事今西北二邉守邉軍馬數多日支糧料皆出民供或因逺運多費腳錢送納不敷者有之或在中途車頽牛死進退兩難者有之有司畏懼耽誤軍機不免逼迫民難昔趙充國守邉且屯且守諸葛亮出師且戰且耕獨可行於當時不可行於今日乎前件如蒙准言乞𠡠各總兵官權宜處置邉境如無警急就彼屯種以給軍食以節民勞實為便益一富户事永樂年間營造北京於浙江江西直𨽻蘇松等府起取富户發順天府大興宛平二縣安定德勝二關住坐當差家在數千里外有缺人供送科差繁重貧苦在逃及病故者多行移原籍勾補有等無籍官吏作弊多端在逃者容隱不解而揑故回申病故者遷延不補而多方賣放富户久缺勘合不完欽奉詔書內一欵宣德十年正月初十日以後官吏人等犯罪充軍者止終本身欽此切詳此等人犯到衛不係勾丁永充軍役人數夤緣閒住者有之揑故脫免者有之名編軍伍不得實用前件如䝉准言乞𠡠法司將問擬例該充軍犯人有係官吏糧長大户堪充富户者連當房家小起發安定德勝二關終身充軍富户以辦糧差候補富户數足仍依發遣充軍其原僉富户以先并今病故者悉免僉補實為民便一稅課事各處客商車載貨物入京買賣及在外公差等項官吏生員軍匠人等將帶貨物作盤纒來京經過張家灣宣課司攔稅其巡攔生事或徇私放過者有之或容情隨數納鈔者有之或勒令卸車搜檢箱籠者有之或髙估所將價值多收鈔貫者有之或因而被盜失所者有之又於小路攔稅者有之以致無籍之徒詐稱巡攔勒掯取財者有之蘆溝橋亦有此弊及至文明等衙門宣課又納課程則兩征其稅前件如䝉准言乞𠡠該部定擬行屬除客商人等興販貨物在張家灣蘆溝橋買賣者令本處宣課司稅辦課程若係經過入京城者不許攔稅宜從文明等衙門宣課司驗其貨物應稅者稅之若論張家灣有起稅之由都城外有匿稅之弊必欲盡得其課臣以為古者關市譏而不征且有欽承詔㫖課程減依舊額其征稅亦宜從寬庶不重擾人難實為便益章綸碑録尹直英宗皇帝歸自北狩尊為太上皇别居南宫憲皇已在儲位又明年乃易兩宫疏隔嫌隙滋萌災異荐臻人心危懼廷臣無敢以言者時公為儀制司郎中特陳修德彌災十四事一畏天戒二任燮理三養聖躬四節幸御五務儉約六勤論政七惇孝義八慎賞賚九重名爵十革巡撫十一擇重臣十二辨異端十三却貢獻十四汰冗官其畏天戒大意謂內臣不可干外政佞臣不可假威福後宫不宜盛聲色凡為隂盛之類俱請革罷其惇孝義則謂上聖皇太后皇太后為天下母受天下養可謂尊養之至矣然必躬修問安視膳之禮乃盡尊養之誠太上皇帝君臨天下十有四年陛下向嘗親受封冊為臣子是天下之父也至以天位授陛下尊為太上皇是天下之至尊也每月朔望及嵗時節旦宜率羣臣朝見於延安門以極尊崇之道而又復舊皇后於中宫以正天下之母儀復舊皇儲於東宫以定天下之大本如此則倫誼篤而和氣充天意自回災變自彌矣疏上忤㫖下公錦衣獄刑逼誣引大臣并南宫通謀榜掠慘酷體無完膚濵死者數卒無一語他及惟御史鍾同先嘗有言故并逮之俱欲重坐㑹天大風雨黃沙四塞刑乃少緩明年秋南京大理卿廖莊入朝亦以嘗請復儲杖於闕廷因命杖公與同至百同死公幾絶復蘇禁錮愈嚴公了無懟悔意越二載英廟復登寶位憲皇還正儲宫首録公忠出之獄嘉歎良深遂擢禮部右侍郎石亨之變一陳循景泰八年正月十二日禮部㑹內閣及文武羣臣議立東宫事具奏不允十四日內閣大臣陳循等招石亨東閣㑹本復請立茂陵為皇太子亨對曰上面有病休要激惱他又言少停慢慢說話因見人多不曽說得初景泰皇帝有病羣臣不知其危劇本月十三日夜石亨獨䝉宣到郊壇齊宫榻前面受代行禮親見知必難起於是始有南城之謀十七日早四更時分有郎中龎文至循家文素善張軏得之軏謂前日石總兵要與循計較說道西邉病重難起若請立東宫不如就請太上皇復位可以得功賞恐與循說奏循不肯却與徐有貞計較先言要與陳學士說不曽說得本官回言陳學士往日在人前說你無功封侯此事如何與他說他見為首請立東宫若他得西邉難起是的又㑹集百官懇請太上皇復位是所謂必無功賞切不令人知今事只約內外典兵三五人密為之庶幾功勳有歸權寵在己又與亨計必須捏過異故方顯得吾輩功髙此事在今日早發芳洲辨寃録石亨之變二祝允明景泰皇帝有疾都督張軏武清侯石亨太監曹吉祥以南城之謀扣太常卿許彬彬曰此社稷功也雖然老矣無能為矣盍圖之徐元玉軏亨等說其言是月十四日夜㑹徐有貞曰太上皇帝昔者出狩非以游畋為赤子故耳今天下無離心謀必在此特不知南城知此意否軏等曰兩日前有隂達者有貞曰必伺獲審報乃可啓議軏等去兩日夜復㑹有貞言報得矣計將安施有貞乃升屋覽步乾象亟下附軏等云時在今日不可失遂相與密語人不可得聞已而軏云今寇騎薄都城奈何有貞言正宜乘此以備非常為名隂納兵入內誰不可者軏等首肯之復密語既倉皇以出有貞焚香祝天與家人訣曰事成社稷之福不成家族之禍歸耶人不歸鬼矣遂往㑹軏亨吉祥王驥楊善陳汝言等收諸門鑰夜四鼓聞長安門內起兵千人宿衛官軍驚愕不知所為有出入者兵輒叱止之有貞命仍鎖門曰萬一內外夾攻事去矣鎖訖有貞取鎖投水竇并軏等莫知所為時天色晦冥軏等惶惑有貞輒行軏顧謂曰事當濟否有貞大言時至矣勿退薄南宫城門門錮密扣不應俄聞城中隱隱然有開門聲有貞等命取巨木架懸之數十人舉撞城門又令勇士踰垣入與外兵合毁垣垣壞門啓城中黯無燈火軏等入見太上皇燭下獨出呼軏曰爾等何為俯伏合聲請陛下登位乃呼兵士舉輿來兵士驚懼不能舉有貞助挽以行忽天色昭明星月輝光上皇顧問有貞等卿為誰各對某官某有貞等前導密邇屬車既升奏奉天殿諸臣猶有在輿前者武士以椎擊有貞上叱止之時黼座尚在殿隅諸臣往推之至中升座鐘鼓齊鳴百官入賀景泰皇帝聞鐘鼓聲問左右云于謙耶左右對曰太上皇帝景泰皇帝曰哥哥做好上既復辟即日命有貞依舊左副都御史兼翰林院學士明日升兵部尚書命掌內閣事三月封武功伯仍命兼華蓋殿大學士掌文淵閣事蘇村小纂石亨之變三李賢石亨欲往來大同顧紫荆關謂左右曰若塞守斯關京城何由能至識者知其心不順每憚于謙兼懼正人之多不敢决為天順初自南城迎復之功封忠國公益恃寵招權納賂天下都司及邉將多出門下是年二月初三日朝退歸私第所親盧旺彥敬杜清等二十餘人各叩頭起侍亨曰我這職事皆爾之所欲為者衆不知所謂咸曰我等賴老爹擡舉各衛指揮之職至是足矣三公之位何敢望也亨曰當時趙太祖陳橋之變史不稱其謀反爾等若助我至此我職非爾為之而何衆皆股戰南城有功瞽目指揮童先乃手出妖書曰惟有石人不動蓋天意有待爾等勉力為之乃謀曰大同人馬甲天下我撫之素厚今石彪在彼充游擊將軍異日以彪代李文掛鎮朔將軍印北塞紫荆關東出山東拒臨清决髙郵之隄以絶餉道則京城可不戰而疲遂議以盧旺守裏河一道各議分其地而還三月敵寇延綏命亨征之童先力勸亨成前謀亨曰為此事不難但天下各處都司除代未周待周為之不晚也童先曰時者難得而易失也恐時一失不可復得亨不聽童先私罵曰這厮不是幹此事亨時還無功見上於文華殿上命還位露刃以侍石亨之變四李賢景泰不豫文武羣臣不過俟其不起請上皇復位時武清侯石亨都督張軏掌大兵小人欲圖富貴以為少保王文于謙與中官王誠等欲取宗室立之之說以激亨等借其勢而成之亨等遂以迎駕為功殺王文于謙等并貶謫陳循等十數人亨封忠國公軏封太平侯乃固寵攬權冒濫官爵黷貨無厭方復位之初人心大恱及見亨等所為人皆失望干動天象彗出星變日暈數重數月不息乃羣隂圍蔽太陽之象而亨恬不知戒賄賂公行强預朝政掠美市恩易置文武大臣邉將以彰其威有不出於門下者便欲中傷中外見其勢焰莫不寒心敢怒而不敢言亨姪彪頗驍勇驟升都督性尤貪暴粗立邉功大肆凶惡謀鎮大同邀人奏保朝廷覺其不實使人亷察果皆虛詐置彪於法人心皆快已而罪連亨朝廷初念其功纍宥之未幾家人𫝊說怨謗有不軌之謀於是置亨於法籍其家受禍甚烈議者以為天道好還如此人見其名位勢力如泰山之安一旦除之曽不少阻蓋幽明寃抑從此伸氣雖朝廷之法有所不免亦其罪惡貫盈人神共怒助力於其間當時若以彪鎮大同誠為可懼且在京武官多出亨門下而亨又握兵權天下精兵無如大同稍有變動內外相應其禍可勝言哉此時雖欲撲滅力不能及今辨之於早除此大害非上之剛明果斷不能如此而亦祖宗在天之靈有以默相之社稷綿逺端兆於此石亨既置於法平日出入門下者無不驚懼一日賢言於上曰元惡既除宜戒諭羣臣且安人心不究其餘遂行之中外釋然無不感戴朝廷之恩者初石彪事發言官密奏明日大班劾之即有漏泄於彪者上召賢曰羣臣黨惡如此不可不戒賢對曰誠如㫖意乃𠡠諭百官今後文武大臣無故不許往來近侍官不許造大臣私宅錦衣衛官亦然於是莫不肅靖天下聞之亦皆竦息交通之弊遂止石亨下獄死法司請瘞其尸上召賢曰如何賢曰如此行之未為盡善法司宜執法論罪欲梟首示衆朝廷不從特全其首領尤見恩義尚存上曰然即從之曹吉祥之變李賢內官吉祥居禁庭最久為人惟喜私恩小惠招權納賄擅作威福嘗往雲南福建殺賊帶去夷官軍能騎射取功因而收於部下加以恩澤為腹心天順初召呼此輩迎駕俱升大職此輩亦感吉祥之恩後石亨事發冒官者俱革去此輩又為吉祥所庇不動吉祥初以迎駕為功貪圖富貴一家弟姪俱得大官又賣官鬻獄瀆貨無厭上初不得已而從其所欲後不能堪稍疏抑之吉祥輒懷異志令其姪昭武伯欽糾集所恩之人謀為不軌㑹兵部尚書馬昻懷寧伯孫鏜統官軍往陜西殺賊於五年七月二日早辭欽等乘機欲殺馬昻孫鏜等就擁兵入內為變幸而孫鏜等先覺二鼓時即報於內禁門不開欽兄弟與同惡者先詣錦衣衛指揮逯杲宅前遇杲方出斬其首碎其尸蓋杲亦吉祥所恩之人後朝廷委任行事且禁欽非理之事所最恨者先害之然後分布於各禁門待其開擁入三鼓至門欽兄弟四五人俱在東長安門豫四鼓到朝房聞搶馬驚亂以為出征之軍及入房聞呼錦衣衛指揮焦夀郭英等拿住豫亦不知何如又呼豫官名曰尋李學士豫方恐即出房至門前見披甲持刀者數人一人砍豫一刀又打一背曹欽適至見豫不忍殺連呼尊長托豫手曰毋恐叱退持刀者且告曰我父子兄弟盡忠迎駕復位今被逯杲譖毁反欲相害提杲頭示豫曰誠為此人激變不得已也豫曰此人生事害人誰不怨恨既除此害即可請命欽曰就與我寫本進入即令人防豫至吏部朝房尚書王翺處借紙筆寫成豫拉翺同行於門縫投進欽見門不開乃舉火焚燒復欲害豫令持刀者同豫尋尚書馬昻得翺等解之及天明上馬呼衆馳往東安門又令披甲持刀者一人馳馬尋豫翺等復解之忽有孫鏜領官軍襲而圍之豫乃得脫時恭順侯吳瑾左都御史寇深俱被殺死豫被傷在吏部至晚大雨不止聞官軍圍欽等於其宅盡誅之豫慮其脅從者不寧即投本進入請急宣聖㫖脅從者罔治以安反側之心然後詔示天下布寬恤之恩一切不急之務悉皆停罷與民休息吉祥已正典刑蓋此亂臣賊子肆行反逆天地鬼神所不容當時若不早覺各門既開此賊擁入縱橫一時不能禦之其禍不可勝言畢竟就戮被其傷害多矣幸而早撲滅之此實宗社之福也吳瑾碑録天順辛已逆賊曹欽謀為不軌潛俟七月二日早朝入內為亂恭順侯吳公先於是夜一鼓聞之即與其弟廣義伯琮約總兵懷寧伯孫鏜走詣長安門告變於是禁門不啓賊計遂窮舉火燒禁門公等率兵𠞰殺奮不顧身賊雖誅滅公已捐軀矣嗚呼先機告變公之忠也殺賊喪元公之勇也然則逆賊之敗豈非公之功乎平逆頌程敏政天順辛巳秋北敵博囉擁衆寇迤西上命懷寧伯孫鏜帥師禦之而以兵部尚書馬昻節制其軍先是昭武伯曹欽及其黨以復辟功權傾中外上稍裁抑之遂蓄異圖時以七月二日出師欽約其兄都督曹鐸從兄都督曹弟都督曹鉉謀入內為亂推其黨之黠者為謀主而以其部所典禁兵及其仲父宦者曹吉祥為內援并結番將都督巴延額森等數十人以樹黨是日都指揮旺札勒圖亮詣長安門告變夜二鼓宫中聞變詔侍直中官執吉祥以俟天曙漏下四鼓舉兵犯闕合番漢兵五百騎直抵禁城雷鼓大振撾殺錦衣衛指揮逯杲擊翰林學士李賢傷首并執吏部尚書王翺於東朝邸鐸帥數騎而西殺左都御史寇深斫傷廣寧侯安時禁門未啓欽督其黨縱火焚東西皇城門及東華門朝臣悸散莫知所出達曉王師始集詔㑹昌侯繼宗將之鏜諸軍先登恭順侯吳瑾及諸將臣分道逆擊昻以精兵殿之首尾連絡旗鼓相望欽退屯東華門以衆接戰王師鋭甚賊衆披靡自辰至午敗斬之欽中流矢創甚振䇿以馳適瑾將五六騎出覘卒與欽遇衆寡不敵力戰死之還駐東大市街相拒至酉鉉以百餘騎往來馳突者三王師環結不動自相枕藉鏜令執潰者斬以徇責戰益急發神臂弓追斬鉉欽益懼使百餘騎還攻朝陽門不克諸軍進薄其衆大破之鐸為亂兵所殺欽入溺於眢井中其黨巴延額森等縋城以遁遣兵追之皆被獲是晚乘輿出御午門朝百官詔下吉祥及巴延額森等於御史獄皆伏誅仍以鐸棄市而磔欽尸籍其家以賚將士餘黨並落二職流嶺南旌死節功追封瑾梁國公諡忠壯贈深少保諡莊愍論功行賞加繼宗太保安太子少傅賢翺昻並以本官兼太子少保鏜賜爵徹侯而進旺扎勒圖亮為都督餘將士加官進爵有差明日下詔暴欽罪於中外於戲不測之虞起於一旦若此伏惟皇上聖德神武荷天地廟社之休不旋踵而醜類殄滅宫闕肅清稽古考今宜有紀述臣誠不佞謹撰平逆頌一首雖不敢上備尚書故實亦少見愛君尊主之誠不能自已於萬一云爾煌煌大明五葉嗣承爰及我后奉天中興既循既攘內外時乂有孽其間欲梗豫治蠢兹吉祥實維寺人中懷孔奸曹騰之孫假子曰欽開國昭武手提禁兵孰敢豫侮后惡其驕曰爾永圖欽乃蓄異萃彼逃逋中構吉祥以逞無賴以效阿瞞而力弗逮孟秋既朔熒惑在垣伺間而舉狺聲喧喧燔我闕門戕我朝士蹀血闕東金吾御史惟相惟將臣賢臣安如唐衡度被斫被殘飛變夜聞后赫斯怒曰爾繼宗元舅元輔往暨爾鏜用整厥師爾瑾先驅爾昻殿之靖此狡童惟爾之績爾惟弗績罪弗爾惜衆奮其武如羆如熊大旗翻翻炮聲震空賊鋒始交逆陳而鬨瑾喪其元人百其勇再鼓以進羣醜遂奔乃馘乃俘奏功轅門兔技斯窮如醉罔省反走厥家授首眢井梟徒獍隊不日成擒天開日舒眚銷沴沈后御午門告爾大衆罔治脅從無怖無恐吉祥就磔欽首懸竿槁街闐闐都人快觀乃瀦其居乃殄厥世爾族爾姻投屏四裔籍録所入有帛有金爰犒我士凱歌謳吟勸忠褒功后有明詔公侯公孤有𠡠有誥羣臣稽首我后永貞大憝既平聖武乃成我后曰嘻惟天之祚將率之力祖考之祜允顯聖德巍巍難名告功萬世敢揚頌聲名臣經濟録卷四
