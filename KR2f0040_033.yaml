body:
  text: 名臣經濟録卷三十三明黃訓編兵部武選下查革武職疏該兵部題武選等清吏司案呈節該伏覩正德十六年四月二十二日詔書內一欵自正德元年以來諸色人等傳升乞升大小官職盡行裁革吏禮兵工四部各將查革過傳升乞升文武僧道匠藝官員名數類奏查考其皇親及公主所生子孫原無出身正途朝廷推恩升授者不在此例又一欵兩京五府見任掌印簽書管軍管事公侯伯都督及都指揮六部等衙門見任文職四品以上并各處巡撫官俱聽自陳去留取自上裁武職內有傳旨管事者革去管事照舊帶俸又一欵正德元年以後在京在外官旗舍餘人等但係例外奏帶及稱報效在各邊各處或一人數處或一時兩三處報功或併功升授官旗者除原祖職役照舊其餘盡行除革該衛所各將革過名數造册送户兵二部查考敢有受財隱避不革及抗違妄奏者俱問發邊衛充軍諸色人等冒認錦衣衛官員户下舍丁致升官旗者限三箇月以裡許各官旗自首與免本罪冒籍之人革去職役過限不首該部查出或被人告發通行治罪發遣又一欵近年軍職人等在各邊不曾斬有首級巧立當先衝鋒等項名色及各處斬首不及數該部照例擬賞奉旨升級世襲者兵部通行查革又一欵賜姓人員及見犯罪冒姓者各復本姓在京者各照原有本等職役間住隨住當差在外取到留用者不分官職大小各回原衛原籍帶俸間住但因賜姓義子廕升職爵并與做勇士等項食糧名色者兵部盡行查革又一欵正德元年以後各衙門官軍旗校人等緝捕妖言姦細并不係臨陳對敵強賊一應升授職役者通行查革以後各該衙門照舊年終類奏兵部查議升賞欽此欽遵俱經呈堂在京行五軍都督府并所屬衛分及錦衣并親軍等衛所左外行都察院轉行各該巡按御史所屬及咨南京兵部各行查革去後延今將及一月在京府屬并錦衣等衛所未見將各官旗應存應革緣由回報相應議處案呈到部臣等仰惟皇上御極之初首頒前項裁革之詔蓋痛官爵之冗濫而欲為愛惜之圖念俸糧之糜費而思為節省之計更化善治宜莫先於此者各該衙門正當仰承德意疾速奉行庶前日之弊政不留而祖宗之舊規可復今五軍都督府并所屬在京衛分及錦衣等衛所官員不以明詔為重本部查革文移到彼將及一月未見各將應存應革緣由造册繳部蓋因各該府衛官員或人情稔熟欲抗顔而未能或依慿有人遂掣肘而難動若不另為處置誠為廢格詔書查得見該科道官會同户兵二部委官清查錦衣衛旗校事頗就緒合無比照前例乞差風力給事中御史各一員本部委官一員屬錦衣衛者本衛選委老成能幹官二員遵照詔書內事理將五府并所屬京衛及錦衣并親軍衛所應革人員每人審取親供二本各將原祖職役并例外奏帶或報效或拿賊等項獲功或因盜賊妖言獲功或非時冒叨恩級或併功升職及傳乞升職緣由備開明白差去官員逐一清查磨對各人應存應革職級扣算定擬停當備造文册奏繳中間如有事涉疑似者臨時奏請定奪敢有隱避及抗違推調等項情弊聽各官參究治罪庶冒濫名器之徒不致於漏網而清朝釐革之政不委之虗文緣係差官遵詔查革冗濫官員事理未敢擅便正德十六年五月二十日本部左侍郎楊廷儀等具本奉聖旨是五府所屬京衛并在京親軍衛分便差風力給事中御史兵部屬官各一員遵詔旨清查屬錦衣衛者本衛選老成官二員會同清查欽此欽遵又該兵科等科都給事中汪玄錫等題亦為前事題稱武職乘時冒濫已非一日科道等官既承重任必須自立無過之地方免浮議且文册浩繁展轉搬運恐生弊端合令各官於相應公廨處所會同清查不許一應間雜之人出入查得詔書內原令各該府衛衙門徑自查革造册繳部已經通行日久訪得承委官員造有清册前項冒升之徒尚萌僥免之心百計破調以致承委官互相觀望不將清册繳送乞勑各該衙門作急造完前項文册繳送兵部該司收貯轉送科道等官清查如再遲延有誤行事各該衙門掌印官及承委官容令科道等官參究伏望皇上特勑科道等官務要秉公持正悉心查革無使清明之朝仍有名器冒濫之弊實為至幸等因題奉聖旨是各該清查官員務要秉公持正悉心查革毋致仍前冒濫該衙門知道欽此欽遵備行臣等會案行準兵部武選清吏司手本開送五軍都督府并所屬京衛及清軍旗手等衛所造完該查官旗文册并各人親供及本部節年升官奏帶堂稿前來又準職方清吏司手本準臣等手本行查各處鎮守分守守備等官奏帶分别例內例外則例開送施行等因到司準此查得先該巡撫宣府左僉都御史秦紘奏稱各鎮守分守各內外官員不照巡撫官員事例俱各奏討在京官舍名為親信頭目在邊跟用夤緣為姦非止一端要將各處奏討頭目盡數取回以後不許奏討等因該本部議得合無今後鎮守分守等項內外官員奏討跟用之人原係五名者減作三名原係十名者減作六名務要嚴加簡選不許夤緣投托本部仍通行各邊內外官員一體申明禁約帶去之人既不夤緣投托圖財蠧政亦不許泛濫差遣假公行私倘有事發連坐本主如此庶幾不敢容無藉之徒邊方亦不缺可用之人但奉有上項節次欽依事例未敢擅便定擬伏乞聖裁成化二十年十二月二十日具題奉聖旨是各處跟隨人員既多姦弊內外鎮守官與五名分守等官與三名多餘的都查取回京今後都照這例行欽此又查得公務事該太監姚舉題蒙差鎮守江西地方奏帶去支廩給官舍指揮使楊輔等五員名并不支口糧軍舍姚文等六名該本部查得各處鎮守分守等項內外官員奏帶跟用頭目內鎮守官許帶五名分守等官三名應付口糧腳力若係團營操備并侍御上直人員不許奏帶又查得內外守臣係鎮守者許帶指揮以下係分守者許帶千户以下係守備者許帶百户以下止以原擬名數不許過多如有故違聽本部參奏究治俱係見行事例參照太監姚舉係鎮守官員例該奏帶頭目五名今却數外多奏姚文等六名但查楊撫劉成董英各見在團營操備李椿等又係辦膳人員於例俱難準擬所據支口糧冠帶舍人姚鎮等并不支口糧軍舍姚文等既查無礙人數合無行令本官仍就於多奏不支口糧軍舍內另選三名替補指揮楊輔等輳足五名之數前去應用楊輔等各送該營把總操練李椿等仍尚膳監辦膳等因正德元年六月初三日題奉聖旨是欽此又為公務事該大同總兵官溫恭奏稱原任大同左副總兵奏帶官舍祁宣等三員名支廪給口糧劉元吉等九員名不支口糧見在聽用今充總兵官例該五名支口糧除祁宣等三名尚缺二名訪得錦衣衛等衙門通事舍人官旗李秉等二員名支給口糧劉奉等一十三員名不支口糧乞發聽用等因具題正德三年五月奉聖旨照例這鴻臚寺通事并譯字通事係應役人數不許奏帶别項雜差如有鎮守先行奏帶去的著禮部并大通事查照取回著役該衙門知道欽此又為公務事該延綏參將田琦例外奏討頭目該本部議得本官奏討侯俊等係例外之數擅難定議等因具題正德十四年三月奉聖旨田琦既以奏帶跟隨三名這例外奏討的不準今後有似這等例外夤緣奏討的恁部裡參究來説欽此欽遵合用手本前去查照等因又準該司手本開稱太監陸誾尹生等雖有奏帶原無花名無慿開報等因臣等會同將五府所屬京衛并在京親軍衛所應革官旗逐一清查內錦衣衛仍會同委官千户陳澍等清查通行磨對扣算明白內有開報不明取供未到緣事故等項俱候兵部另行臣等仰惟皇上天啓聖明臨御之初誕下明詔絲綸煥赫條貫精詳舉行舊章剗剔宿弊凡在臣民豈勝歡抃所據正德元年以來軍功冒濫官爵繁冗甚非祖宗之法臣等仰遵明詔通行查革備造文册奏繳外但簿書浩繁不宜猥瀆聖覽所有弊端之未能盡除事體之尚須釐正者敢昧死重為陛下言之仰惟我祖宗開國以來立為武爵専以待有功之臣延及子孫俾世其職報功之典可謂重矣然品秩之尊莫有過於公侯伯者自非定難拓土之功不以輕授故我太祖高皇帝開天啓運不階尺土奄有區夏而一時翊運元臣佐命宿將驅除剪滅𢡟建厥功然在當時封公者六人封侯者二十有八人至我太宗文皇帝始自藩封克登大寶其所封拜亦不滿十餘人列聖相承益加慎重中間屢嘗殱夷大憝蕩平羣盜戡伐戎冦立功之臣後先相望蓋不為少然未有中官弟姪封拜之濫爵賞之極如先朝者也臣等參照寧夏之役雖曰置鐇背逆天道實由逆瑾結憤人心彼時賴都指揮仇鉞之兵一舉平定而太監張永聞風趨赴攘為已功幸而禍亂克平實仗宗社之慶後逆瑾伏誅永與有力僅可以贖黨惡之罪豈應遽為討賊之功既而太監谷大用馬永成陸誾魏彬等結為朋黨專權出政乃以運籌帷幄並受褒崇於是以永兄張富封泰安伯弟張容封安定伯谷大寬封髙平伯谷大亮封永清伯馬山封平涼伯陸永封鎮平伯魏英封鎮安伯其他俱以功廕加升都督指揮者又不下數十人貂蟬玉帶勢轢班行鐵劵金書光動閭里身不出國門之外足未履戰陳之地曾無旦夕尺寸之勞而一槩大拜封爵坐獲殊寵此士夫之所以痛心而將臣之所以解體也今仰遵詔旨俱以查革候命下之日合行該部追奪誥劵削為編氓但張容魏英已經辭免伯爵復被新命仍與做都督同知張富與做錦衣衛指揮使且三人者均冒無功之賞尚逭有罪之誅况大小冒濫人員既以盡行削革而容等有官如故不免陟罰異同伏乞特賜威斷將容等見存職級盡行禠奪革其世襲庶足以光昭祖宗之法而一洗名器之汙也再照正德年間軍功之濫其弊有三奏帶之數太多紀驗之次失實武選之法盡壞如鎮守官奏帶例該五名分守官奏帶例該三名今則七八十名者有之五六十名者有之其領兵奏帶至三四百名者有之如錦衣衛官校旗舍俱係侍衛直駕人員與夫京營操備官旗例無奏帶之例今則公然違例奏帶而前項人員獨多蓋以各處鎮守太監類皆出自權門援引是以彼此互相結納遇有地方用兵則以所帶之人盡𨽻報功之籍往往安居京師寄名邊方故有一人而數處奏帶一時而數處獲功其不在斬馘之例又復巧立别名或曰運送神鎗或曰賫執旗牌或曰衝鋒破敵或曰三次當先如寧夏之訪尋金册河南之軍前效勞皆是也紀驗之地既無審核之公銓選之司又無駁勘之實當給賞者每破例而冒同升官應查議者輒升除而許令自首其改正重升併功加授之類私謀巧術弊出百端難以枚舉臣等查得寧夏陜西甘涼雲南貴州江西湖廣等處平賊功次中間俱有冒濫未能盡合條格獨貴州香壚山之役錦衣衛報功升授者尤為冒濫山東河南征勦流賊其功雖有可稱而太監谷大用張忠陸誾尹生等各人奏帶巧立名色升授職級者幾六百員名其冒濫抑又甚矣今仰遵明旨將例外奏帶之人通行查革其各處厯年紀功官員審核不公雷同為詐有負朝廷耳目重寄者乞勑兵部查議明白移咨吏部通行罷黜以警將來再照各處討賊既平內外中官大臣類授武職功廕尤非祖宗之法竊謂各該領兵官員奉命出師致有成功乃其職分廟堂籌畫理亦冝然且克捷之日既身加官爵之崇又家受金帛之賚莫非優典已足酬功奈何重以武爵廕及子孫寵報逾涯實難負荷但近年文職功廕多因中官妄希恩數一例普及心知非義辭拒弗能今仰遵明詔一體查革臣等伏乞自今以後內外文臣果能身兼將相功業顯著者朝廷欲加殊恩豈無别項彛典不必假以武廕以干清議實足以厲士夫廉靖之節足以服邊庭將士之心再照正德元年以來各衙門緝獲妖言強盜并不係臨陳對敵一應升授職役者已經遵照詔旨盡行查革臣訪得天順成化𢎞治初年指揮門逹袁斌朱驥等提督緝捕每至十年或十一二年方才一次類奏其間委係積有年勞獲有竒功者該部查勘是實分别等第奏擬升賞然升者不過五七人多至十人而止其賞者或以布絹或以鈔錠其無功者尚或責打黜退當差自後因其拿獲妖言升襲一輩之例於是人競貪功大肆羅織所獲妖言強盜多是寃枉故𢎞治十八年之詔痛欲禁革此弊當時已有濫觴之漸及正德元年錦衣衛指揮趙鑑葉廣東厰太監王嶽鄭旺各官一時更代數月之內將辦事官校四次奏升正德二年又復類奏當時已經該部參論馴至近年以來姦幸用事厰衛專權無賴之徒鱗集蟻附創設四厰復立內刑辦事之員日增獲功之奏漸數始則三年一奏或二年一奏後至一年一奏或一年兩奏遂有年終類奏之名往往以妖言為首張皇賊狀無非掎托之詞連署姓名不辨獲功之數含糊奏請朦朧擬升奏一人則升一人奏百人則升百人以致市井庸流不崇朝而立升朝籍權門厮役不數嵗而驟至顯榮且其假種妖書隂為陷穽買同番手誣執平民加以酷法慘刑煆煉成獄凡經厰衛奏送法司莫敢平反寃魂塞路上干天和凡有人心言之憤結且𢎞治元年奉有孝宗皇帝聖旨以後拿獲妖言的不升止照成化十四年例給賞綸音具在所當萬世遵行不知該部何所稽慿類將妖言升級方今聖明在上妖孽自不能興况亦律有明條不須另開賞格但輦轂之下畿甸之廣盜賊竊發難保必無以後合無每年年終類奏止將獲過強盜起數題送兵部附卷定為三年或五年之制待年滿方將各人各年之內獲過強賊多少分為等第查奏升賞然每升不過十人給賞不限名數已升者仍依舊例不得再升其類奏獲過盜賊起數不許仍前混開務見某人拿獲某賊或某人為首某人為從明白開其月日地方其有賊勢衆凶登時拏獲功出尋常者兵部即時奏請定奪類奏之時仍須開報如此則人思建實功官無濫授獄無寃民而盜賊亦不至猖獗矣再照五府錦衣衛之立一則管轄兵馬一則專掌宿衛掌務之職或以流官或由推舉蓋用其能而不用其世所以待武臣之大有勳勞超出羣類者也然亦惟武臣之胄而他途不得與焉其選可謂重且嚴矣近年以來乃有不由武胄雜然並進大抵非嬖幸冒功之徒即技藝希恩之屬援朋引類車載斗量入則金紫雜沓於班行出則僕從喧闐於道路遂使國家以賞功之典為施恩之具不惟加諸其身而又使之世襲使邊庭效命之士扼腕不平祖宗法度之所以漸更朝廷紀綱之所以大壞府庠之所以耗斁倉廩之所以空虛生民之所以困苦盜賊之所以繁興災異之所以疊見未必不盡由於此也臣等仰遵明詔將正德年間一應冒濫之流通已查革外乞勑兵部查照先年凡不由軍功授職者日後仍照詔旨革其子孫承襲伏望皇上繼今已往念祖宗得天下之不易惜朝廷官爵之匪輕非軍功決不可授以武職非異才決不可試以流官使天下之人知得之為難則國家有事可以勸忠厲能而足以措宗社於泰山之安矣再照兵部近年以來選法不明人自為例如流官不許世襲署職止加實授係是祖宗纍朝成法不知起自何人乃敢擅為變亂即今查革過冒濫人員數多中間蓋有流官以流得襲署職以署加升甚至納粟虗御遂以軍功纍授近日推舉各處將官多有見在裁革之數事多違法責在該司較諸犯功之官其罪尤為不同乞勑該部通行查出從重參究庶將來官爵不至於冒濫而祖宗典章不視為虗文也再照五府所屬京衛并在京親軍衛分自明詔開讀之後兵部行文查革各該衙門既以遷延一月不報及該兵部題奉欽依差科道等官會同清查臣等聞命之日即復會案備行嚴立期限不次催督乃復仍前延緩前項文册幾於兩月方才造到顯是各該掌印首領及承委官員奉行不力事屬稽遲俱當有罪乞勑該部通行參究以警諸司再照裁革過職級如都指揮等官見在各該地方領勑管事者皆是夤緣而出原非選舉之公合無乞勑該部逐一查取回京另推相應官員銓補庶存甄别以厲賢能及照前項汰黜人員通計三千有竒中間大率城狐社鼠稔於鑽刺之人竊恐心存覬覦不顧搖尾之羞力可夤緣未絶回天之想萬一敢有抗違奏辨之舉即係懷姦亂法之人伏乞陛下赫發震怒亟加嚴譴庶有以杜塞幸門挫懾羣小尚願陛下普垂離照益厲乾綱振起綱維申飭憲典慎重名器以待天下之勳勞節省財用以安海內之百姓上為宗廟社稷建不傾不拔之基下為子孫黎元開可久可大之業臣等不勝幸甚天下幸甚緣係開讀事理未敢擅便今將查革過官旗數目開坐謹題請旨明恤典以定功賞疏昨該兵部題為乞恩比例加升親兄陳亡功級以圖補報事武選清吏司案呈奉本部送兵科抄出陜西行都司甘州左衛指揮使孫淮奏兄孫鏜原係指揮使職事嘉靖二年十二月內領軍調征東路冦賊追至地名打磨溝與賊對敵奮勇身先射中一賊落馬督軍就陳擒獲餘賊發恨齊擁撲奪將兄射砍陳亡因兄乏嗣臣係同母親弟例該承襲嘉靖五年二月內保送襲兄原職回衛到任管事今蒙劉御史將兄陳亡功次勘明造册繳部思得綏德衛一般陳亡指揮僉事周仁伊男周邦先襲祖職後加伊父陳亡升級蒙授指揮同知臣與事體相同伏望皇上憫念臣兄死鋒鏑之苦一視同仁乞勑兵部查照臣兄陳亡升級明白照例將臣改正加升都指揮僉事等因奉聖旨兵部知道欽此欽遵抄出送司查得嘉靖五年二月內該陜西行都司甘州左衛陳亡指揮使孫鏜親弟孫淮前來襲職該本部查明欽選祖職指揮使訖續該巡按陜西監察御史劉濂奏繳嘉靖二年十二月內甘州地方功次文册前來內有甘州左衛陳亡指揮使孫鏜該本部照例擬升一級與做都指揮僉事保送應襲兒男赴部襲升等因嘉靖七年正月二十九日題奉欽依備行去後今該前因案呈到部看得陜西行都司甘州左衛指揮使孫淮奏稱伊兄孫鏜原係指揮使嘉靖二年甘州地方殺賊陳亡伊襲祖職指揮使今乞要照例加升伊兄陳亡功級一節查照本人襲職及伊兄陳亡升級緣由相同合無備行該衛再查無礙準令孫淮於原襲指揮使上加伊兄陳亡一級與做都指揮僉事於原衛所查照施行仍將本官原舊職俸開除等因奉聖旨是欽此臣等看得前事該部議擬似未穩當請為陛下言之查洪武十九年令從征官沒於陳所者子孫襲職升一級又查得天順正德年間陜西地方敵殺冦賊賞例凡陳亡者俱升一級皆為子孫襲職而言今孫淮却是以弟襲兄又伊祖職原係指揮使重職假使孫鏜有子則孫淮止是軍官舍人今以兄鏜乏嗣遂獲承襲三品職事匹夫一得此巳溢分望乃復援引周邦以子襲父之例欲將伊兄陳亡一級併加本身所據父子兄弟事體不同該司槩以陳亡常例查覆即將孫淮擬升都指揮僉事以上必以材能軍功方得推升選用名為流官不許子孫世襲今孫淮本非自立軍功又無材能可見若復以兄陳亡遽升都指揮僉事似以流官亦得襲升殊非舊制况自來無因兄陳亡升弟明例查得正德十六年題準襲職事例內開今後軍職或千户或指揮獲功升至都指揮以上內都指揮僉事以上職級雖未任先故者子孫止許承襲指揮使夫實有軍功升職未任而死者子孫猶不得襲升流官况孫鏜係陳亡非功孫淮係弟非子乃得以指揮使而冒升流官為都指揮僉事可乎臣等竊謂陳亡升級本以憫念死者罹鋒鏑之慘故令子孫承襲加升一級若其不幸無嗣則前項優恤之典正宜加諸死者之身合無今後武職陳亡無子孫者應該承襲之人止許授以祖職仍將陳亡該升一級追贈陳亡之人自指揮使以下都指揮僉事以上皆用此例其旗軍陳亡無子者則查照正德年間陳亡不願升者賞銀十兩之例止賞銀十兩以優恤其家其陳亡有子孫者自指揮同知以下皆得照例襲升惟指揮使陳亡則亦止當追贈為都指揮僉事蓋其祖職官階已尊而國典流官不得襲也其諸武職百户以上自立軍功於祖職上纍升至指揮使而無嗣者應該承襲之人亦當革去續立軍功職級止許襲授原祖職事仍於本身原職上亦得加贈一級若纍功升至都指揮以上者加祭一壇如此則死者之心得以少慰而生者之福不致過徼似於國典人心兩無偏礙如蒙伏望皇上俯注聖覽少紓􅌖思倘以臣等所言非謬特降綸音勑下該部列為著例永久遵行仍乞將孫鏜準贈都指揮僉事其孫淮所升都指揮僉事一級先乞明旨革去止照原襲指揮使供職則恤典所加各有攸當而功賞為重庶幾不濫施矣緣係明恤典以定功賞事理未敢擅便謹題請旨賞功之格一丘濬臣按後世計首級以定軍功始於此嗚呼生天地間而靈於物者人也人與人同類相生以相愛相死以相衛人之理也天之道也世降而偽滋人與人乃相戕相害均是人也而又殺人以為功是豈人道當然哉夫自五帝三王之時已有爭戰之事然其人化服即止不至殺戮之甚如後世也至秦用商鞅始尚首級後世襲用之以為當然而不可易百世如一日也後世忍心貪功之人乃至誣平民截死尸以為功次皆秦作俑之遺禍也臣嘗謂天下之事惟武功一事最難得其盡善而無遺弊何也蓋興師動衆人至多也臨陳對敵機無窮也不殺則不足以退敵而功不成是武功之成必在於殺人也是故論功者恆以殺敵之多少以為功庸之差等古昔盛時固已獻馘於學宫載之詩禮者可考也非但秦也蓋至秦乃益甚焉耳今若不用秦之法而於武功告成之日一例升賞然而勇者怯者同賞孰肯效死而爭先若依舊以首級為功方其戰酣乘勢之際其勢有進而無退既斬敵首何暇轉而持之非獨為人所有而敵亦或得以制其命矣二者皆非萬全無弊之法然則果何如而可臣竊以為自古國家所以賞功者爵與財而已矣爵以名而致貴財以利而致冨是名與利冨與貴乃人之所甚欲而甚慕者也以人之所甚欲者以為賞功之具蓋以性命者人之所甚惜身體者人之所甚愛人能舍其所甚愛甚惜之性命身體以為我操兵戈以禦敵以衛生靈以安社稷厥功莫大焉於是乎即其所甚欲甚慕之貨財官爵以報之焉報其已往之功所以作其將來之志非但為其人蓋為乎國也然其所立之功有大有小有多有寡有緩有急有易有難不可以一例觀也不可以一例觀亦不可以一例報而戰陳之時急迫之際紛亂之中安能一一得其輕重多寡之實而權度之不差哉將使人臨陳而監之歟則目力所及有限而不能周將使人隨衆而紀之歟則人心所存不同而不能以皆公不然則將待其功成而通第之歟則是非真贋何所據而分辨臣竊以為古人有言惟公生明公則已不為私明則人不能欺在已者既不為私自然有以畏服人之心志而人不敢欺已矣國家當有事命將之時必於廷臣中擇平日理明而心公智周而性執者以為紀功之官使其隨時制宜權其緩急難易以定其功次使上下通知彼此保證一有疑似難明紛爭不已者即與移文考核結正必須詳實歸一然後明白開具榜於通衢如科試揭曉然考有不公者許其指名開告其作私及蒙蔽之人有贓者計贓論無贓者削去功次如此雖未盡善亦庶幾乎大凡天下萬事莫外於一實惟實則人心無不悅服更乞朝廷下文武大臣將出軍賞功資次立為定式俾其遵守原在軍伍長行及出榜召募者則一例造册其有內外臣僚子弟臨時方行自投報效者則具名開奏取旨蓋此等之徒皆非真有智勇欲為國家出力蓋藉父兄勢力乘機欲得進用耳所以懈怠人心激怒士卒者皆此等者為之不可不知也又有將帥遇有征差輒將子弟親識奏請從行及左右使令吏胥之輩其實不曾臨陳往往敘作軍功不次升賞夫以出師取勝非一人智力所能獨成其臨陳奮勇者固為有功然左右將領為人參謀運智以助其所不及協力幹濟以輔其所不能彼此皆不可相無者烏可全謂其無功哉但不可以斬馘論耳為今之計冝多立名件如斬將搴旗奮勇當先之類各於本類下次其名姓并著其所效之實績若是隨從之人明書曰某人隨從某官參謀運智或協力幹濟有功合凖作首級幾功不許混報斬首功次如此則事得其實而士卒效力者不起爭憤之心矣又有陳亡士卒以其既死無人開報遂至泯滅今後但有臨陳戰亡者必須同伍開報不報者有罪死者一功當生者二功其有不曾臨陳而亡者雖無禦敵之功亦為王事而死亦須同伍開報量加優賚其子孫賞功之格二丘濬臣按陸贄此疏可見有唐一代賞功之格所謂爵號者如今公侯伯之類所謂職事者如今都督都指揮千百户鎮撫之類所謂勳者如今柱國騎都尉之類所謂散官者如今光祿大夫驃騎將軍之類在唐則分為四類而今日則惟三類焉蓋在今之勳階散官隨職事而有非若唐别以授人也我朝異姓無生而王封者列爵惟公侯伯而無子男嵗錫以祿而無唐宋食邑之虗名蓋自漢以後以官爵封功臣所僅見也其職事之官皆以階級相承無不掌務而授俸者但就其中又分為等第焉有世官有流官世官則以軍功得官而子孫得承襲者也世世不絶自指揮使以下至於鎮撫是流官者因其材能擢以任事則終其本身而不得世襲在內則五軍都督錦衣衛指揮在外則都指揮及流官是也贄謂輕重互相制而國不失權我朝祖宗蓋得此意矣其報臣之功則賞延於世因人之能則盡用其材得唐人之實而無其虗焉嗚呼三代以來所未有也伏願聖子神孫念祖宗得天下之不易惜祖宗之官爵保祖宗之功臣追崇其所已然以報其功振作其未然以激其志非軍功不授以武職非異材不試以流官使天下以得之為難則我國家一旦有事人人欲得我之官爵以為子孫計則得之者盡職以保其家未得者竭力以求吾祿如此則維持之者既固奮起者又繼之則凡吾心之所向無不如意事之所舉無不成功宗社之安如泰山而四維立矣伏惟聖神留意毋輕以賞功之典以為施恩之具而輕以授之嬖幸技藝之流則天下國家不勝大幸賞功之格三丘濬臣按朝廷立武爵以待有功之臣必親臨行陳者然後為軍功彼其出禁旅左右承奉者雖有年勞當别甄敘我朝立錦衣衛以掌宿衛官職之設雖與列衛同而其官則用其能而不用其世蓋所以待武臣之超出羣類者也然亦惟武臣之胄而他途不得與焉其選可謂重而嚴矣今世乃有不出自武胄而以嬖幸技藝進者失祖宗之初意矣夫技藝之流舊制當屬工部今因其能而用以雜流俾專司其業豈不名稱其實哉顧乃以賞功之官以為恩賜之具彼得之而人譏之固不足以為榮彼何足惜遂使國家失賞功之常典而凡親臨行陳出萬死得一生者皆因之以解體其失豈小小也哉授之以是官固非矣而又使之世襲可乎彼技藝之流有異能者朝廷以特恩授之可也而其子豈亦有異能而使之世其官乎有異能且不可况實無異能在其身且不可况又延及其子孫乎賞功之格四丘濬臣按祖宗立為武職專以賞有功之臣以延及其子孫世其職而不遷不計滿限不用磨勘父死而子繼兄亡而弟及官職簡而階級明非若宋人遙授遷轉無定職且無定員也今制十軍立一小旗五十軍一總旗兩總旗一百户十百户一千户千户有正有副千户以上有指揮指揮有使有同知有僉事此皆世襲之官也至於都指揮都督各三等亦如指揮之制此則擢其有才能者為之用其才而不世其官者也祖宗之制可謂盡善盡美後世雖有作者不可及也奈何積日久而人日多前之積者未銷後之來者日至遂至軍少而官多所任者一夫之事而所食者大官之祿欲國計不屈難矣伏惟我太祖髙皇帝於洪武二十九年大賚天下致仕武臣諭之曰同立艱難致有今日顧朕子孫保無窮之天下則爾子孫亦享無窮之爵祿一何仁之至也太宗文皇帝於永樂二年因法司言征討官有繫獄者論功定罪諭曰朝廷大公至正之道有功則賞有過則刑刑賞者治天下之大法不以功掩過不以私廢公一何義之盡也仁之至所以報其功使其世世享爵祿之奉以衍其家慶義之盡所以厲其節使其世世奉法度之公以保其世祿大哉皇言萬世所當服膺者也然祖宗不惟形之言者仁義盡至如此而又著之於法律以維持警飭之使吾仁義之澤百世如一日焉伏讀律文有曰凡內外大小軍民衙門官吏犯公罪杖罪以上明立文案每年一考紀録罪名九年一次通考所犯次數重輕以慿黜陟又曰若軍官有犯私罪該笞者附過收贖杖罪解見任降等敘用該罷職不敘者降充總旗該徒流者照依地里逺近發各衛充軍嗚呼太祖定律之意即太宗垂戒之言也誠能本太祖立律之文用太宗垂戒之意則武臣益知所懼無有不盡忠守法者矣然人之性質不能皆同其間固不能無不思不謹者焉因其人之所犯而用國法以遞降之消之以漸日減月削去者去而來者來今之來者即所以補乎昔之去者焉則人與官互相稱矣尚何軍少官多之患哉臣於此又有見焉孟子曰君子之澤五世而斬注謂父子相繼為一世四世而緦服之窮也六世則親屬竭矣夫以大賢君子功業見乎一世德澤被乎天下其沒世之後四世而後子孫尚廢其祀况彼一介武夫乘時嶥起因人而成事隨衆以建功未必真有出竒制勝之智搴旗斬將之勇立難拓土之功錫之以官爵食之以俸祿終其身也已為多矣况及其子若孫乎况無子及孫者又及其旁枝别泒乎且開國大臣封公者六封侯者十有五其餘封伯及繼封者又不上數十人今存者無幾大功多廢小功獨存何大功之澤不究而小功之澤反延哉今文武官犯公私罪律條久廢驟而用之恐駭物聽臣請勑兵部查內外貼黃將洪武永樂宣德年間以來官職從軍升授緣由及行內外衛所并各官原籍户口若干舊任遺下家屬若干要見其人是始初從軍者的泒子孫與否明白詳實備具聞彼此對照無差然後將前項軍官分為三等一曰奉天啓運二曰奉天征討其他立功邊廷及隨大將平冦者居其次三焉啓運征討之功已經五世之後若不係從軍人的泒者革去職任其子孫附籍所在世世優免雜差五世之後仍係從軍的泒子孫者遇有公私過犯依律遞降不在赦原之數無犯者照舊其不係啓運征討及各處立功者三世之後子孫不係的泒者革職的泒子孫五世之後有犯者遞降又有加功者不革否則革之其五世三世之後例該革任者其間有一世以王事死及再加功者又從此人起計其世數以上皆優免其子孫如此則禮與律皆協人知所勸效而官不至於冗濫矣臣愚見如此非敢犯衆怒而輒興異議以取張仲瑀之禍念此乃國家大事不於無事之時而預有以為之調停一二馴致於無可奈何之地雖有智者不能為矣伏望明主閔其愚而察其心毋使若高歡者得以起邪心也武選清吏司題名記吕柟夫武選者知選注武人對文選設也題名記者題諸郎中員外主事名於石而記之也舊記事詳而略兹陳德英諸大夫悉索洪武來選簿而申諸石請柟記之也是故以終官係厯任以厯任係發科以發科係籍以籍係字以係名氏而屬之司三官於以考勳而詢姦訊仁而摘暴稽廉而尤貪明明而恥幽進壯而退劣崇實而卑訛貴嚴而賤疏兵有七程題名近之夫自文武道分文以知化武以知衛皆於民焉食之其選不可不慎也今天下都司二十一留守司衛四百九十一守禦屯田羣牧所三百十一番夷都司衛所四百七而儀衛宣慰招討宣撫安撫長官司不計則其為兵不啻萬億為官不啻百千食乎民力者不啻盡矣咸於斯司焉宰分名可勿題乎故今制統軍以三爵五府謂公侯伯中左右前後聮軍以九職謂總兵參將遊擊守備協守備倭提督等官以十有二勳柱國至武騎尉秩官以二十有四階榮祿大夫至忠武校尉咸於斯司焉參逹名可茍題乎故內以衛宫門外以障邊郵中以宅生靈故雖上有部尚書左右侍郎卿三人然皆提綱而挈領不及斯司之精專下有車駕職方武庫三大夫然皆析務而承緒不及斯司之體要名可易題乎故今法以六黃正親供正續內貼外貼大小以五實釐誥勑歸附征克升轉衛所流襲以五除徵選簿升調復傳特以六地敘功次北敵女直西畨苖蠻內地反賊以九誅慎軍機殺降失機陷城逃敵激叛等以四義御流官都指揮僉事以上及義男女壻襲替及革授者以七咎斷世襲典刑敗倫不孝失機劫盜退陳人文不至以八戎懲專縱擅調發不策應縱虜掠等以七罷戒不恪緩報稽需違期歇役私賣器馬等以加升課部卒以遞降練什伍以附過御還職以三試定武舉以考選比試併鎗逹才而程力故斯司郎中二文選員外郎一文選主事五文選而其遷之也內或列卿佐外或雄藩而巨鎮亦與文選略等名豈徒題乎夫功莫大於安社稷嚴莫大於存綱紀智莫大於止傳升勇莫過於黜貪猾信莫大於守律令愛莫大於登才賢廉莫大於清交遊此非其實乎夫實盛則名雖勿題而常存實之不足雖好名者莫能保旬月美也國家百五十年來郎中由范子敏員外由李本主事由孟禮不啻千人如得其實者必其人名位勳德顯如日月至今人猶誦慕之則其字亦尊籍亦光科亦榮厯官亦重也使無其實固有如今日待查選簿而後知名者矣如其待查選簿而後知又奚能知其字與籍與科厯官哉於時德英及路君敬夫及吾年友李君宣文及蔣君汝潔汪君汝梁王君子中王君子崇皆曰斯往也敢使他日待查選簿而後知名以辱吾子言而愧斯石乎柟曰石選簿又何難焉於是諸大夫咸曰兹知所以先石選簿矣名臣經濟録卷三十三
