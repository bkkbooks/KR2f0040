body:
  text: 名臣經濟録卷二十二明黃訓編户部婚姻糧運祿俸婚姻議朱善有國者重世臣有家者重世婚臣見民間婚姻之訟甚多問之非姑舅之子若女即兩姨之子若女蓋以於法不當為婚故為仇家所訟或已聘而見絶或既婚而復離或成婚有年兒女成行有司逼而奪之使夫婦生離子母永隔寃憤抑鬱無所控訴悲號於道路親戚為之感傷行人為之嗟嘆議律不精其禍乃至於此哉按律尊屬卑幼相與為婚者有禁若為父母之姊妹與已之身是為姑舅兩姨皆為巳之尊屬巳不可以卑幼而匹之若已為姑舅兩姨之子彼為姑舅兩姨之女是無尊卑之嫌以門地則相匹以才德則相稱以年之長幼則相若為子擇婦為女擇壻宜莫先於此古人未嘗以為非也周之時王朝所與為婚者不過齊宋陳把數國而已故當時稱異姓大國曰伯舅小國曰叔舅其世為婚姻可知也至於列國之君若齊宋魯衛陳鄭秦晉亦各自為甥舅之國降及後世如晉之王謝唐之崔盧潘楊之睦朱陳之好無不以世婚為重其顯然可證者如溫嶠之玉鏡臺此以舅之子而取姑之女也吕榮公夫人張氏乃待制溫之女而待制夫人即榮公母申國夫人之姊又非以小姨之子娶大姨之女乎朱子小學一書正所以明人倫也而榮公事有取焉如果以為不可則必不在所取矣今江西兩浙此弊尤甚以致獄訟繁興賄賂公行風俗凋弊願以臣所奏下羣臣議弛其禁庶幾刑清訟簡而風俗可厚也漕挽之宜一丘濬臣按自古稱善理財者首劉晏然晏嵗運之數止百一十萬石耳然當時運夫皆是官雇而所用傭錢皆以鹽利非若今役食糧之軍多加兊以為費也今米石加兊五六是民之納租名一石者出石五六斗田之起科三升者加多一升半且軍在衛所既支月糧及出運又有行糧之給而一夫嵗運不過三十石通其所加兊及所支給者而計之則多於所運之數矣蓋費一石有餘而得一石也而舟船之費不與焉又晏所造歇艎支江船二千艘每船受千斛十船為一綱每綱三百人篙工五十人則是三百五十人駕十船運米一萬石較之今日十人駕一船載米三百石通三十船運米九千石其人少五十其米少一千而不甚相逺也惟所謂囊米之説今日尚有未行綱米所以耗損運卒所以困斃者坐此故也史謂晏嵗轉運粟百一十萬無斗升溺然當時未聞有加兊也其所行乃大江大河而又隨處轉運非但若今運於窄淺之漕河者何以能無溺哉况今加兊浮於所運之半而嵗嵗有所損溺官軍賠償舉債鬻産無有已時所以然者政坐剝淺之費廣挨次之日多不幸而沈溺顆粒無餘也為今之計宜如劉晏之法所運之米皆以囊盛遇河淺澀暫舁岸上過淺而復舁歸舟或分載小舟以過淺亦有包封不致散失不幸而沈溺撈而出之不至全失縱有浥爛亦可他用説者若謂囊米恐舟淺不能受夫既實滿艎中宜加之艎板之上護以竹簟葦席以蔽風水其後船毁再造量加大之可也然則米皆用囊如費將益多何夫囊以布為之可用數年有山處可用竹篾近江處可用蒲葦其所費比所散失亦為省矣漕運議丘濬臣按海運之法自秦已有之而唐人亦轉東吳粳稻以給幽燕見唐杜甫詩然以給邉方之用而已用之以足國則始於元焉初巴延平宋命張瑄等以宋圖籍自崇明由海道入京師至至元十九年始建海運之策命羅璧等造平底海船運糧從海道抵直沽是時猶有中灤之運不専於海道也元初糧道自江入淮由黃河至封邱縣中灤旱站陸運至濬縣淇門一百八十里入御河二十八年立都漕運萬户府以督嵗運至大中以江淮江浙財賦每嵗所辦糧充運自此以至末年專仰海運之道其初也自平江劉家港今在蘇州府崑山縣太倉入海至海門縣界開洋月餘始抵成山計其水程自上海至楊村馬頭凡一萬三千三百五十里最後千戶殷明略者又開新道從劉家港至崇明州三沙放洋向東行入黑水大洋取成山轉西至劉家島又至登州沙門島於萊州大洋入界河當舟行風順時有自浙西至京師不過旬日而已説者謂其雖有風濤漂溺之虞然視河漕之費所得蓋多故終元之世海運不廢我朝洪武三十年海運糧七十萬石給遼東軍餉永樂初海運七十萬石至北京至十三年會通河通利始罷海運臣考元史食貨志論海運有云民無挽輸之勞國有儲蓄之富以為一代良法又云海運視河漕之數所得蓋多作元史者皆國初史臣其人皆生長勝國時習見海運之利所言非無徴者臣竊以謂自古漕運所從之道有三曰陸曰河曰海陸運以車水運以舟而皆資乎人力所運有多寡所費有繁省河漕視陸運之費省十三四海運視陸運之費省十七八蓋河漕雖免陸行而人挽如故海運雖有漂溺之患而省牽率之勞較其利害蓋亦相當今漕河通利嵗運充積固無資於海運也然善謀國者恆於未事之先而為意外之慮寧過慮而無不臨事而悔今國家都燕蓋極北之地而財賦之入皆自東南而來會通一河譬人身之咽喉也一日食不下咽立有死亡之禍况自古皆是轉般而以鹽為傭直今則専役軍夫長運而加以兊支之耗嵗嵗常運儲積之糧雖多而征戍之卒日少食固足矣如兵之不足何迂儒過為逺慮請於無事之秋尋元人海運之故道别通海運一路與河漕並行江西湖廣江東之粟照舊河運而以浙西東瀕海一帶浙江布政司及常州蘇州松江三府由海通運使人習知海道一旦漕渠少有滯塞此不來而彼來是亦思患豫防之先計也臣家居海隅頗知海舟之便舟行海洋不畏深而畏淺不慮風而慮礁故製海舟者必為尖底首尾必俱置柁卒遇暴風轉帆為難亟以尾為首縱其所如且暴風之作多在盛夏今後率以正月以後開船置長篙以料角定盤針以取向一如番舶之制夫海運之利以其放洋而其險亦以其放洋今欲免放洋之害宜豫遣習知海道者起自蘇州劉家港訪問傍海居民捕魚漁戶煎鹽竈丁逐一次第踏視海涯有無行舟橫道泊舟港汊沙石多寡洲渚逺近親行試驗委曲為之設法可通則通可塞則塞可回避則回避畫圖具本以為傍海通運之法萬一可行是亦良便若夫占視風候之説見於沈氏筆談每日五鼓初起視星月明潔四際至地皆無雲氣便可行舟至於已時即止則不遇暴風矣中道忽見雲起即便易柁回舟仍泊舊處如此可保萬全永無沈溺之患萬一臣言可采乞先行下閩廣二藩訪尋舊會通番航海之人許其自首免其本罪及行廣東鹽課提舉司歸德等場起取慣駕海舟竈丁令有司優給津遣即至訪詢其中知海道曲折者以海道事宜許以事成加以官賞俾其監工照依海舶式樣造為運舟及一應合用器物就行委官督領其人起自蘇州歷揚淮青登等府直抵直沽濱海去處踏看可行與否先成運舟十數艘付與駕使給以月糧俾其沿海按視經行停泊去處所至以山島港汊為標識詢看是何州縣地方一一紀録造成圖册縱其往來十數次既已通習保其決然可行無疑然後於昆山太倉起蓋船厰將工部原𣲖船料差官於此收貯照依見式造為海運尖底船隻每船量定軍夫若干裝載若干大抵海舟與河舟不同河舟畏淺故宜輕海舟畏漂故宜重假如海艘載八百石則為造一千石舟許其以二百石載私貨三年之後軍夫自載者三十稅一客商附載者照依稅課常例就于直沽立一宣課司收貯以為嵗造船料之費其糧既從海運腳費比漕河為省其兊支之加耗宜量為減殺大約海舟一載千石則可當河舟所載之三河舟用卒十人海舟加五或倍則漕卒亦比舊省矣此非獨可以足國用自此京城百貨駢集而公私俱足矣考宋朱子文集其奏劄言廣東海路至浙東為近宜於福建廣東沿海去處招邀米客元史載順帝末年山東河南之路不通國用不繼至正十九年議遣户部尚書貢師泰往福建以閩鹽易糧給京師得數十萬石京師賴焉其後陳友定亦自閩中海運進奉不絶然則此道若通閩廣之綱運亦可以來不但兩浙也况今京師公私所用多資南方貨物而貨物之來苦於運河窄淺舳艫擠塞腳費倍於物直貨物所以踴貴而用度為艱此策既行則南貨日集於北空船南回者必須物實而北貨亦日流於南矣今日富國足用之策莫大於此説者若謂海運險逺恐其損人廢財請以元史質之其海運自至元二十年始至天歷二年止備載逐年所至之數以見其所失不無意也竊恐今日河運之糧每年所失不止此數况海運無剝淺之費無挨次之守而其支兊之加耗每石須有所減恐亦浮於所失之數矣此策既行果利多而害少又量將江淮荆湖之漕折半入海運除減軍卒以還隊伍則兵食兩足而國家亦有水戰之備可以制伏朝鮮安南邉海之夷此誠萬世之利也臣章句末儒偶有臆見非敢以為決然可行萬無弊也念此乃國家千萬年深逺之慮姑述此嘗試之策請試用之試之而可則行不可則止屯營之田丘濬臣按虞集此策在當時不曽行及其末世也海運不至而國用不給謀國者思集之言於是乎有海口萬户之設大略宗之每年亦得數十萬石以助國用吁亦已晚矣今國家都於燕京師之東皆瀕大海煙火數千里而居民稠密當全安極盛之時正是居安思危之日乞將虞集此策勑下廷臣計議特委有心計大臣循行沿海一帶専任其事仍令先行閩浙濵海州郡築隄捍海去處起取士民之知田事者前來從行相視可否講究利害處置既定然後召募丁夫隨宜相勢分疆定畔因其多少授以官職一如虞集之策雖然天下之事建議者思之非不周而執事者行之未必力方集議此時説者固已謂一有此制則執事者必以賄成而不可為其事遂寢及至於不得已之際方用其策然幾會已失事勢巳去不可為矣嗚呼豈非後世永鑒哉臣嘗聞閩浙人言大凡濱海之地多鹹鹵必得河水以蕩滌之然後可以成田故為海田者必築隄岸以闌鹹水之入疏溝渠以導淡水之來然後田可耕也臣於京東一帶海涯雖未及行而嘗泛漳御而下由白河以至潞渚觀其入海之水最大之處無如直沽然其直㵼入海灌溉不多請於將盡之地依禹貢逆河法截斷河流橫開長河一帶收其流而分其水然後於沮洳盡處築為長隄隨處各為水門以司啓閉外以截鹹水俾其不得入內以泄淡水俾其不至漫如此則田可成矣於凡有淡水入海所在皆依此法行之則沿海數千里無非良田非獨民資其食而官亦賴其用如此則國家坐享富盛逺近皆有所資譬則富民之家東南之運其别業所出也濵海之收其負郭所獲也其為國家利益夫豈細哉由是而可以寬東南之民由是而可以壯西北之勢虞集之言不見用於當時而得行於今日集雖死不死矣國朝運法五變議邵寶國初海運因元之故海運不給於是乎陸運以濟之陸之為勞蓋不減海之險也及會通河既浚於是乎有儧運而海運乃罷遮洋海運猶不廢焉然儹運之初皆支運也既而議者以為軍民不便於是乎有兌運時支運猶十之四又其後也改兌議行嵗嵗因之所謂支運才四十之一而故法幾廢矣由今觀之蓋凡五變而小小損益不與焉固其勢然也易曰窮則變變則通通則久是故變通之際君子重之一曰海運洪武末及永樂初蘇松浙江等處嵗糧俱輸納太倉蘇州地方由海道以逹直沽洪武三十年永樂六年十二年海運糧俱有數見嵗運條下二曰海陸兼運永樂初肇建北京江南糧一由海運一由淮河入黃河至陽武陸運至衛輝由衛河入白河至通州三曰支運先是永樂五年禮部會官議北京合用軍餉本處稅糧子粒并黃河漕運未能周急必藉海運然後足用即目海船數少每嵗運不過五六十萬石且未設衙門専領事不歸一莫若於蘇州太倉城內専設海道都漕運使司堂上官於文武中擇公勤廉幹者以充行移與布政司同各處衛所見有行船并出海官軍俱屬提調以時點檢如法整治奉太宗文皇帝聖旨運糧的事再議了來説至九年以濟寧州同知潘叔正言命工部尚書宋禮都督周長等發山東丁夫十六萬五千濬原會通河自濟寧至臨清三百八十五里於是漕舟始達通州十年禮以海船造辦太迫議造淺船五百艘由會通河運淮揚徐兖等處嵗糧一百萬石以補海運一年之數十二年平江伯陳瑄等始議原坐太倉嵗糧蘇松浙江改送淮安倉鎮江廬鳳淮揚送徐州倉徐州并山東兖州送濟寧倉河南山東送臨清倉各交收浙江并直𨽻衛分官軍於淮安運至徐州京衛官軍於徐州運至德州各立倉厰收團山東河南官軍於德州接運至通州交收名為支運一年四次十三年增造淺船千艘海運始罷遮洋船每嵗河南山東小灘等水次兊運糧三十萬石於天津等衛倉收二十四萬內十四萬石連耗折銀六錢俱從直沽入海轉運薊州倉收四曰兊運先是裡河民運多失農月永樂末始令民運於淮安瓜州補給腳價兊與軍船領運軍民兩益衛所出給通關付繳從巡撫侍郎周忱等議也宣德八年參將吳亮言江西浙江湖廣江南船各回附近水次鎮兊南京江北船於瓜淮領兊其淮徐臨德諸倉仍支運十分之四浙江蘇松等船各本司府地方領兊不盡者仍於瓜淮交兊其北邊一帶如河南彰德等府於小灘山東濟南州縣於濟寧其餘水次倣此五曰改兌成化七年都御史滕昭議罷瓜淮兊運裡河官軍顧江船於江南水次交兊民加過江之費視逺近為差十年議淮徐臨德四倉支運糧七十萬石改就水次兌與軍船名為改兊每年議𣲖多凖其數然不為常例原漕河議陸錢禹貢冀州夾右碣石入於河兖州浮於濟漯達於河青州浮於汶達於濟徐州浮於淮泗逹於河山東漕運其昉於兹乎秦欲攻胸奴使天下飛芻挽粟起於黃腄琅邪負海之郡轉輸河北漢髙祖運山東之粟以給中都嵗不過數萬石至武帝通西南夷滅朝鮮擊胸奴城朔方轉漕甚逺而山東咸被其勞矣宋初都汴京東之粟歷曹濟及鄆入五丈渠至京師真宗時京東分廣濟河由定陶至徐州入清河歷吕梁灘磧之險至理宗時于堽城作斗門以遏汶流益泗漕以餉邊衆而漕渠開矣元初開濟州泗河至新開河由大清利津諸河入海既而海口沙壅復從東阿陸挽至臨清入御河又開膠萊新河以通海道勞費不資少有成效巴延始創海運與濟州河並行未幾又用韓仲暉等言自安民山開河北抵臨清引汶絶濟直屬漳御名會通河夫汶自古東北入海以智力導引使南接淮泗北通白衛實自元人始然河渠淺澀舟不負重嵗運不過數十萬石終元之世海運不能廢也國朝初給餉遼卒海運如故永樂徙都於北亦嘗行之後尚書宋禮等復濬會通河於是漕利通而海運罷膠萊故道亦遂堙廢夫河漕誠利矣然泉源壅塞有疏濬之勞堰閘蓄泄有供役之繁徐吕洪流之泛溢淮揚襟喉之扼塞意外之患有不可不防者海運其可不講耶是故漕河者萬世之通利也海運者備不虞之變也膠萊故道者翼海運以成功也皆不可廢也天下之事居常者必慮變擇利者必思害輕重緩急達乎其勢而已矣獨漕政為然哉成化七年漕利例奏滕昭總督蘇松糧儲都御史滕昭奏該應天蘇松等府糧長徐漢等各告近年民運過江瓜州淮安二處水次兌軍并淮安府常盈倉上納糧米俱照該部原定正耗則例起運又加盤用船車等米每年於十二月以裡運赴前項水次但軍船先後不齊民人守候月日難論未免將糧入倉或被人盜取其該納常盈倉之數又被官攢刁蹬篩曬虧折要將成化七年分民運瓜淮二處兊軍并常盈倉上納糧米俱令官軍過江就於各該水次倉分聽其交兊每石照依江南官軍兌糧則例增與加耗又再加盤腳船用等米及將該運常盈倉糧亦照各年加耗就彼支與官軍領運户部議得常盈倉糧巳議就彼支與官軍領兊瓜淮二處兊軍糧米準令官軍過江就各水次倉交兊每石除加耗外再添腳價米六升正德三年漕例奏一王瓊總兵官郭鋐都御史王瓊奏伏惟我聖朝自永樂年間開設裡河漕運以來定撥湖廣江西浙江南京江南江北并中都留守司衛所官軍一十二萬七千八百餘員名分為十二總嵗運糧儲四百萬石於京通天津薊州等倉交納其江西湖廣浙江南直𨽻都司衛所官軍運糧由揚子大江至江北裡河由儀真揚州淮安邳徐濟寧東昌臨清德州天津直抵通州等九衛皆𨽻漕運所轄者不過欲其程途接續制統聫絡便儧運也其直𨽻德州天津通州等九衛又其臨近京師天下根本萬一天時亢旱邊務緩急不同稍有不繼必須用北直𨽻官軍轉搬至京得以一呼而集是北直𨽻通州九衛之官軍尤重於迤南漕運官軍矣緣北直𨽻一總所轄德州二衛天津三衛通州四衛共九衛官軍一千七百六十四員名該運糧米五萬四千一百三十四石有零係是舊制到今儧運百十餘年近於𢎞治十三年為因聲息緊急團營缺人暫掣正軍千名補操却連原運餘丁七百名一概退掣間曠其北直𨽻一總漕運原運糧米五萬四千餘石摘令江南北直𨽻遮洋把總內折銀米糧減存辦料官軍輪流代運赴京交納蓋一時權宜之法非為經久之計合無將掣去北直𨽻一總通州等九衛運糧軍餘一千七百餘名俱還原運照舊領運糧米五萬四千一百三十四石京營操軍另於空間衛所撥補或將通州等九衛見操正軍一千名不動各於本衛選補餘丁一千名同原運掣回在衛餘丁七百名照舊漕運其遮洋船該運薊州折銀糧一十四萬石照舊交兌本色運赴通州倉交納却將湖廣江西浙江等處衛所內缺軍疲弊者折運一十四萬石連加耗并兩尖并折銀七錢解薊州交納若遮洋船內有運船少者於各衛折銀減下船內湊補代運如此漕運舊規不致破壞近者運本色逺者運折色又得禹貢納總納秸之利最為利便薊州原兊粟每石折銀六錢今改南方糙米每石折銀七錢照依時價折色月糧又有積餘以足軍用興利除弊莫大於此正德三年漕例奏二王瓊總兵官郭鋐都御史王瓊奏查得南京兩總所管旗手等衛雖衙門設在江南其稅糧船隻却在儀真埧上灣泊官軍前去浙江江西南直𨽻水次交兊顧船裝運儀真埧上上船此與江北三總官軍江南兌糧事體一同其耗米每石只依原定則例並無加與過江腳米以此南京各衛運糧官軍年年借債轉相負纍日見逃亡論運軍疲弊之極者必以南京各衛為言衆所共知屢經議奏曲折之情未必便逹且如今年江北三總官軍船在江北不過埧前去南直𨽻蘇州等府兊糧裝運每石止得耗米五斗六升兩處運軍同在一處兊糧船隻不過埧與雇船裝運皆同而所得耗米不同其為不均較然明白蓋南京各衛運糧耗米議定在前江北三總加添過江腳米議定在後方議加添江北腳米之時偶未及於南京各衛非故有輕重於其間也且據事論理兩處耗米不宜有異合自正德三年為始將南京兩總所管衛分酌量加添庶使事體均平運軍蘇息正德十年漕例奏叢蘭都御史叢蘭總兵官顧仕隆奏據南京總運糧署都指揮僉事余果呈備金吾前等衛運糧指揮江嶽等呈切照各衛所官軍領運各司府糧其折耗二六不等輕賫銀兩例該隨本色糧兊以備中途盤剝上倉車腳之費奈何近來各該管糧官員止知交兊本色其輕賫往往置之度外官軍領兊本色糧米畏懼遲悮只行儧運先行前進摘留官軍在彼守候輕賫或兩三箇月或四五箇月方才得完而船至前途般盤上倉急缺使用只得加利借貸凋敝亦由於此呈乞議處等因臣等議得輕賫銀兩原係隨糧交兊之數今本色糧米兊完却就出與通關去訖有司一得通關到手即便以為了事再不顧念軍士輕賫的係到京完糧緊急腳費之用近則兩三箇月完者有之逺則隔年尚且拖欠不足雇車剝船雇腳倉中使用等項只得加倍借錢以了官事似此故違新例合當申眀禁治如蒙乞敕該部會議合無行令浙江等司府今後輕賫務隨本色一併徴收交兌完足方許出與通關而有司必以得通關之日為始完糧期限敢有止將正糧完足勒逼官軍出給通關者聽漕運衙門并監兊官指實參奏照例施行正德十二年漕例奏叢蘭都御史叢蘭總兵官顧仕隆奏議得自正德十二年為始凡運糧把總官員儧運勤慎通不借債三年者升俸一級五年者升署一級如該總一嵗借債至五千兩者罰俸半年積至萬兩以上者降俸一級仍留再用以後二年通不借債軍士稱便許復原俸三年皆滿萬者降官一級就行黜退仍查任內錢糧并所借債銀若有侵欺情弊從重問擬其衛總指揮并守禦千戶所所總千户不借債負并借債積千兩以上及衛所分千百户借債積至五百兩以上或有侵欺者亦照此例升降俸級問罪俱止終本身子孫照依原職襲替例該罰俸降俸者漕運衙門徑行例該升官降官者移文該部施行若該部於把總官內推選并衛總官內推選别用亦照在外文職官員事例查係漕運衙門曽經旌奬者再行訪察相應然後舉行其把總官有缺就於衛總內亦曽旌奬熟知運事者推補衛總官有缺聽漕運衙門先儘升俸升級至於衛官相等取用如所官纍升至衛官者衛總無缺仍管所總運事若各該官員任內借有債負目下彌縫僥幸遷轉離運日後敗露事迹顯著有入已者一體從重問結無入已者仍照前例降罰正德十四年漕例奏叢蘭都御史叢蘭總兵官顧仕隆奏準戶部咨節該江西都司把總運糧署都指揮使王佐奏前事內一件積債之害切照缺軍盜糧之害多因積債所至積債數多則旗軍月糧行糧不勾分償債主經手官旗畏懼債主逼討膽小者則不敢赴京交糧而拋棄船隻逃回膽大者盜賣正糧償還債主又且乘機作弊所以致害至此然積債之由其目有五或因漂流磕沉船糧不得勘報開豁借債買糧賠補一也或因原兊糧米濕潤經過三伏腐爛虧折借債買糧賠補二也或因使用不足收受斛面大重以致挂欠籌斛借債買糧賠補三也或因天雨泥濘車驢腳貴輕賫不足借債賠補四也或因不才運官營幹已事假以雇腳賣糧為由誆借債負遺賴衛所償還五也五害不除借債積債數多則官軍逃亡盜賣糧米乃理之必然者也矧今積債巳甚所以官軍逃亡盜賣糧米遺纍見在運官或自縊身死如袁州衛百户王宗是也或削髮脫身如東昌衛指揮王鏞是也人情至此誠可流涕若不權宜區處設法改救將來運政臣不敢言查得𢎞治年間該漕運衙門會奏亦因運軍疲憊每糧一石外加耗米五升運軍少蘇即今疲憊已甚有非加米所能救者也臣嘗讀大學衍義補觀古之漕運者唐稱劉晏宋稱李沆劉晏之法以鹽雇傭李沆運船令載鹽回所以稱善也今日漕政積債遺害至此再無别項銀兩接濟合無乞敕廷臣從長計議行移漕運衙門查照在册該還債負并欠債官旗船數造册具奏户部準令欠債船隻照依官價上納長蘆運司鹽引各一百引於空船回時順帶取便變賣償債其上納鹽本責令各債主自出上納暫借一行以了積債如此則軍民無賠債加賦之苦債主免坑陷資本之怨其運軍行糧月糧各得以養家口而運政自然清楚矣等因查得成化二十一年間該巡按監察御史謝文等題奏準通行欽遵外迄今年久因循廢弛矧今漕運狼狽軍士困苦又非先年之可比者臣請以其故為我陛下條陳之且在運所償之物軍士有家有月糧也一家老稚藉此為生近因各處災免數多及有司官員緩於催徴恆有八九箇月或二三十箇月甚至五六十箇月不得關支者軍士經年在外無由生理遺下父母妻子啼飢號寒中間凍餓而死者不知幾何間得一月在家逼取還債人情何堪此無從議處者一也軍士在外有行糧也自水次以至京師計其往還近者五六箇月逺者八九箇月所支米麥多則三石少則二石食用巳不得勾况每軍十人領船一隻暑雨晝夜無人更代內有負纍逃亡者仍又賴此雇人牽挽中間忍飢輸力者不知幾何若此物奪取還債人情何堪此無從議處者二也軍士交兌有輕賫也户部議單正米之外尚有本色折色加耗本色所以備上倉明加耗米及盤剝拋撒等項之數折色所以備雇車及進倉使用并買席板等項之數近來車腳大貴使用頗增萬口一詞悉稱不敷正德十年户科户部有見於兹各有建白添差本部郎中并漕司把總官各一員領勑處分以平之車戶腳價愈增而其事遂寢矣迄今識者追思徒興慨嘆自兹以後誰能抑之漕卒之纍尚可忍言今若又將此物奪而還債人情何堪此無從議處者三也交兊之際有補潤也各省軍民交兌或因天時隂雨日久或因水鄉地方窄狹無從曬揚恐悮期限議加數升以補虧折之數或因而在船蒸傷太甚或因而到倉曬揚太重或以易换蓬篙索纜之需得少費多以致往往挂籌今若又將此物取而還債人情何堪此無從議處者四也官軍北行有鈔貫也指揮八錠千户衛鎮撫各六錠百户所鎮撫各五錠旗軍各四錠比先年間鈔貫值錢儘勾買辦柴薪蔬鹽之用即今一嵗所得不勾一飽之需總若奪而還債能還幾何此無從議處者五也五者之外再無分毫所據加米一節先年屢嘗行之雖宿債之多不足以盡償一時之急可以少濟揆之事體此亦相應如蒙乞敕户部計議合無申明御史謝文等奏行事例行移本部監督委官公同巡倉御史督同各該把總官員候今嵗各衛所完糧之日就將欠債旗軍一一審查根究所借因何使用果係糧米虧折輕賫短少迹已明著事非由私勢不容巳決然該借者準其在運償還不分債負逺近止許加利三分若有已還原本并三分之利改約再增者即便停止原劵對衆燒毁敢有隱匿不行盡數報官私下議還仍蹈故轍者許運官赴法司或漕運衙門陳告將經該官旗問罪革退原債令其自還若係總督提督等官指以京中人事分𣲖科斂或因把總衛總等官營幹私事假公侵漁以致纍債就便指實參奏以從重譴以後每年運糧畢日並聽各官照前清查著為定例永為遵守及將正德十三年江西等布政司該徴本總糧米三十萬六百九十五石三斗八升每石量加耗米五升照數折銀帶徴行令把總官督同衛總官候次年交兊另項收貯運糧到京聽戶部委官并巡倉御史眼同查驗照依原清的數償還債負若有餘剩行令封收本總存為修艌船隻謂官軍揭債多因腳價不敷負纍正德十三年以前所欠照依御史謝文等奏準事例清查議處户部暫於淮浙二運司鹽價銀兩支一十萬兩解送太倉叧項收貯以後腳價缺少查算補給以絶借債之弊正德十四年漕例奏臧鳳都御史臧鳳總兵官顧仕隆奏查得洪熙元年節該欽奉敕諭官軍運糧逺道勤勞寒暑暴露晝夜不息既有盤淺之費糧米耗折所司又責其賠補朕甚憫之今後除運正糧外附載自己什物官司毋得阻當欽此正統三年户部覆議運糧官軍合遵敕諭順帶土貨以為盤費不許沿河巡司官兵人等生事阻當成化二十一年都御史馬文升復奏申明正德八年又該户部欽奉聖旨説與户部近年以來漕運軍士為因流賊生發阻截運道燒劫船隻好生困苦先年有奏準事例許令量帶土宜貨物以備剝淺修船等項支費你部裡還行與漕運衙門知道欽此欽遵仰惟朝廷優恤運軍之典至諄至切為臣下者正冝遵守奉行奈何近年所司罔肯體恤運船但帶柴菜竹木等物經過瓜儀抵京大小官司俱要攔阻搜盤求索虐害雖流涕哀乞終不憫惻至於空船回還又假以盤鹽為由每處拘留三五日或十數日勒取執結不容放行雖鹹菜魚腥之物亦皆搜去甚至將官軍行李衣鞋公然挾制盜取不敢言喘如斯之害巳非一日切以言之得利惟在瓜儀如淮揚官司盤禁理固相應今德州臨清濟寧東昌處處搜盤况彼處地道早寒閘座又多年年回船凍阻獨滯於斯如蒙乞敕該部再將前例申明重復行移沿河各該衙門今後運船所帶土貨等物令其隨便發賣以助貧軍剝淺守凍盤費之資不許違例阻當擾害若官軍乘機不將運船裝糧滿載客貨妨悮糧運者事發仍照例追究納鈔抽分其回空船隻果有夾帶私鹽聽淮揚官司依法搜盤禁治施行正德十六年漕例奏臧鳳都御史臧鳳總兵官顧仕隆奏切照每年各衛運糧多至六七月內到京彼農務正忙大雨不時車輛數少泥濘難行須用厚價顧車方肯裝載往往腳價使用不敷揭債上納展轉遲悮職等思得京城大通橋至張家灣一帶河道乃元時轉運通渠國朝永樂間設立漕運循其故道船得抵京交納自後張家灣水旱車船人户與夫包攬光棍之徒要行窺取漕利巧生姦計妄言搖動遂將此河廢置不行正德元年有定議者復舉興修題奉欽依工部差官會同漕運參將梁璽用銀二萬餘兩雇倩夫匠重加挑濬糧運又曽抵京上納又被前項積年姦徒設計阻滯仍前不行遞年營造大木悉由此河拽運到京即此度之糧船雖曰難行剝船必有可行之理或者以為地峻水急不能由閘而上臣等愚見若得此河原設五閘少加修理每閘下板六七塊大水聽其漫流水小任其積聚每閘審度河道濶窄各造大小剝船五十隻用軍四名共一千名候北直𨽻總督官員運糧到灣之時借用駕使恐不能齊一聽參將王佐委官雇人撑駕本總把總并該運官交糧完日就彼管領仍置口袋一萬條各衛輪番領裝糧米盤上剝船運軍協力挽拽參將王佐總為提調催督逐閘盤運雖遇隂晴泥濘亦可達京大意相同浙江各埧盤鹽之法若或天道乾亦聽分雇車腳水陸並進庶獲濟益職等每思漕運日困使用日繁若専守舊法恐難拯救此河一行亦可少殺車腳之費矣如蒙敕該部從長計議行臣等於淮揚地方動支漕運官銀雇募夫匠打造剝船置辦口袋完日送參將王佐處聽其委撥官軍管領船行之日省出腳銀以備下年添造剝船并各閘及近城地方蓋造厰房堆放糧米以防隂雨騰卸剝船毋使停滯若有假託勢要名色包攬口袋及車戶光棍人等敢為倡率妄言阻壞或生姦弊盜決河防聽科道官舉劾并行參將王佐督同通州分守等官訪拿問擬重罪枷號仍發邉衛充軍庶姦徒知警浮議自息而漕運可行矣嘉靖元年漕例奏俞諫都御史俞諫總兵官楊宏奏據長淮衛運糧指揮使孫興呈照得江南兌運糧米舊例俱各民運至瓜淮與各衛軍船交兊自成化八年更改水次漕運淺船俱不下埧江北衛分𣲖兌江南府縣水次糧米者每船摘撥旗軍一半守船一半到於各水次聽兊有司另出過江腳米就彼雇船裝載行之年久巳是定規先年有司徴糧及時交兌亦早船無留難人皆樂從近年有司徴糧過期官軍留船守候日久以致船户畏難趨避旗軍恐悮兌裝只得於枝河小港尋覔雇倩又被地方居民或豪強大户趕打占留毆傷致訟官軍欲雇無船坐待遲滯甚至有司管糧部運等官自知糧數未完故將剝船趕散延捱追徴稽留月日又有等姦猾官軍會集捉船乘機嚇騙姦弊多端致起爭訟如蒙乞勑户部轉行各處合無自嘉靖二年為始將應天廬州蘇常鎮等府民糧該兌南京江南江北衛所官軍者聽各把總官預行各該府州縣管糧巡捕等官酌量本州縣説兊糧數用船多寡各於本管地方河道照數拘留船户候官旗到彼軍衛有司公同議價將過江腳米兩平雇覔轉運不許虧損腳價致令怨嗟餘剩腳米仍作過埧挑盤之費若衛所管軍仍前強促嚇詐地方勢豪仍前趕打占留應拿問者拿送所在官司問罪應參奏者轉呈漕運衙門施行嘉靖二年漕例奏俞諫總兵官楊宏會同都御史俞諫奏該户部郎中趙載題議得漕運糧船先年海運至京俱經文武大臣建議開濬會通河分立十二總遂罷海運其嵗運糧四百萬石內薊州邊儲獨遮洋一總尚留南京水軍左等八衛江北淮揚等五衛軍船俱於小灘鎮等水次兊運山東河南糧米三十萬石仍由海道以抵薊州天津二倉上納成化年間又因海道不便姑自小直沽開通新河一道當將遮洋海船每二隻該旗軍三十六名改造五百二十五隻旗軍六千三百名比時船隻運道雖改衛所官軍俱仍舊役雖或愛禮存羊而其地里之逺近往來之耽閣軍船之狼狽糧運之稽遲誠有如郎中趙載之所言者况該南京給事中彭汝晏復建此議至若河南一總上下兩江催儧甚逺不無顧此失彼而趙載又復言及皆係漕運要務擬合通併議處查得南京淮揚等衛官軍昔年止因習知海道存於遮洋今日既由新河儧運却乃空身自南趨北不惟路途艱辛人情事體甚是不便抑且江北船多摘撥江南就兌加費過江一三腳米而南京行糧抑又重費年復一年尤當愛惜况遮洋近年議準折色數多軍得減存但辦料數少食糧則多亦應區處及查北直𨽻總下德州天津二倉不惟道途甚近抑且原運正耗相若人情允便相應改撥合無將遮洋江北淮大髙揚長淮五衛旗軍三千三百一十二名照舊不動外將北直𨽻總下德州天津等九衛旗軍一千七百六十四名併入本總其不足之數再於附近徐州左泗州二衛添撥旗軍一千二百二十四名通抵南京逺運共湊足六千三百名原數以備嵗運三十萬石舊額仍為遮洋總就令孫機管理遇有減存臨時酌𣲖以蘇軍困仍將孫機原額退與南京領駕其退下水軍南京左等八衛官軍添入江南分為上下江二總就以程鵬二人分管旗軍仍每船十名船不過埧亦各存與過江米六升却將原一三裁去七升各總以截上江兊安慶池太廣德等府州糧米多餘軍船領兊江西不盡之糧下江者兊蘇松常鎮四府糧米多餘軍船領兊浙江不盡之糧通前仍為十二總其南京二總每年却分江浙二處儘總撥兌餘船方撥江南至若浙江等總軍船雖有多寡亦每就近算𣲖事不大害俱宜照舊不必槩為更張其改撥遮洋行糧查照議單北直𨽻者仍舊二石徐州左泗州二衛俱照淮太二石八斗如此庶水軍等八衛得以就近領兊江南之糧免駕空船北行江南一總得以分投催儧亦免往來督兌之難則逺近適均水程順便而糧運不致耽悮且行糧腳米亦因得以少省矣議處本折倉糧以蘇負纍事據山東布政司呈查得嘉靖三年分部降徴糧則例內開臨清廣積二倉并德州倉夏稅小麥折米如在三百里內州縣運赴本色米石上納每石加耗二斗腳價二分五釐若三百里之外每石連正耗席草腳價共徴銀八錢仍照例買米上納其秋糧臨清倉民運赴倉米石加耗二斗席草銀二分五釐該納州縣不拘地里逺近每石連正耗席草共收銀八錢趂米賤之時赴臨清并附近去處仍買本色上納等因除通行外為照常年所屬各府縣徴納前項倉口稅糧依例該徴本色運納者其腳價每石比之官定使費尤多徴收折色者到倉每被光棍攬頭擡價每石要銀九錢以上或至一兩以上者亦有之寫立合同誆騙浪費十無完納一二往往負纍大户監併追販傾家蕩産動經數年不得完納及照今嵗省屬地方比之往年頗為薄收粟米每石時值價銀不上七錢之數大户例該收銀八錢若照常本折運納買上倉是以小民脂膏之餘而為攬頭誆費之資不惟仍纍大戶抑且虧滯國儲合無通行所屬將嘉靖二年臨德二倉麥折米并赴倉米不分地里逺近每石連腳耗席草照例共徴銀八錢每銀一錢收錢七十文收完易銀傾㵼成錠印封差經收大户倒文赴倉交納不必買米其嘉靖三年以前年分拖欠未完見被攬頭誆費者通行查出亦不必令其買米止照原數追銀在官赴倉上納與今年秋糧各出給通關銷照聽候本倉自行照例支放庶糧得早完大戶不致受害官民兩便緣由到卷臣查先據該司呈送造完所屬州縣各年拖欠錢糧文册查得臨清廣積二倉各自正德元年起至嘉靖元年止夏稅小麥折米及秋糧米除花戶拖欠奉例委官查明蠲免其大户巳收完足赴布政司倒文解納未獲通關者臨清廣積二倉共米九萬一千二百四十三石四升六合一勺六抄二撮德州倉米一十二萬一千六百四十三石八斗二升六合中間雖年月久近不等不行完納掣取通關已經行據該司提解濟南等府章邱等縣正德九年大户卨安等審據執稱巳將糧價銀兩交與攬頭林杲等上納未完并各大戶侵欺不等及至行提林杲等對問又據該司臨清州回稱林杲等名下不止騙費本省章邱等州縣錢糧其騙費河南等處各州縣錢糧亦多見該監兌主事發州監追等情又經案行該司將德州倉糧册行分守右參政吕經臨清廣積二倉行帶管臨清兵備副使錢宏各吊監兊主事文卷歇家保狀合同厫經底簿查對原解的數分别先已納過者就將出給截數倉鈔比對厫經明白仍欠若干係大戶名下侵欺者照依原收官價係攬頭名下騙費者照依原寫攬價各盡其家産差委能幹官員盡數變賣賠償追過銀兩暫發寄庫叧行議處去後今據前因臣會同山東巡按監察御史孫漳議照臨清廣積二倉并德州倉夏稅麥折米及秋糧改撥兊軍并改兌與民運赴倉米俱係聽兌之數國用所急者今自正德元年起至嘉靖元年止被攬頭大户侵騙不行完納掣取通關者共計二十一萬有零縱使變賣家産亦不能勾盡數賠還縱使照例將攬頭枷號發遣則小民之脂膏已為吞噬國家之軍儲已被虧損徒增痛恨何濟於事然監往可以懲今因前可以善後其嘉靖元年以前被攬頭騙費大户侵欺者已難求全責備矣即今嘉靖三年前項各倉糧米大户徴收將完陸續倒文解納若不嚴為禁令别作區處任其優遊自在寫攬包納不無弊復如前若痛懲攬頭騙費之弊而専責之大户上納則恐納糧米數多而乘時射利之徒不無如前攬納别生弊端千萬沮撓只欲令其將銀交收在倉作數支銷或解京則恐原議聽兊之數遽難輕改查得臨清兵備副使敕內開查有考倉糧革除姦弊字樣則廟謀廷議深長逺慮蓋原有意乎此合無將臨清廣積二倉行令主事會同副使德州倉會同守巡官一員或該州知州各照依大户投文先後拘令行户斗照依時價與同各該大户買米上納或令富商大家先將糧米上納在倉然後令大戶照依納過米數交還價銀以後若年嵗不收米價髙貴暫將價銀寄庫待候豐年買納其嘉靖元年以前攬頭騙費者照依攬價大户侵欺者照依價直各追收貯庫作數支銷如此庶既往者得以清絶而將來者不致侵費其於官民頗為兩便如蒙乞勑户部再加詳議作急上請俯賜施行惟復别有定奪緣係議處本折倉糧以蘇負纍事理未敢擅便為此具本謹題請旨儧運糧儲疏唐龍臣案照先準户部咨為地方事內開漕運都御史總兵官參將遞年俱在八月以裡赴京會議漕運事情等因題奉欽依備咨到臣除欽遵外照得嘉靖八年糧運過淮已畢議事在邇會提督漕運鎮守淮安地方總兵官南京後軍都督府署都督同知楊宏議照漕政之設百餘年於斯規畫已備法例亦詳臣等惟遵循之不暇耳特以休息軍士實今日急務選用把總尤漕運要宜裒集衆聞參合三事一曰立團造二曰慎舉用三曰嚴事例上陳睿覽少竭愚𠂻乞勑該部再加會議早賜施行倘於軍士有一分之寬漕政有一毫之補則軍國幸甚臣等幸甚一立團造為照湖廣都司所屬武昌等一十一衛所原額設淺船一千一十二隻係杉木者十年一造每隻連底船合用價銀一百三兩新楠木者七年一造每隻連底船合用價銀九十兩五錢松木者五年一造每隻連底船合用價銀七十三兩九錢一分以十分為率軍三分民七分每年照數出辦民料解布政司軍料解都司各收貯民料𣲖於槩省州縣猶易辦納軍料乃𣲖前十一衛所各扣運軍月糧抵數運軍窮年勞苦止有月糧又取以為造船之用是并其食而有之無怪乎嗟怨不息逃亡相繼也及其造船則又團造無厰管攝無官止憑旗軍領出料銀星散成造侵欺尅減之弊紛然而起油少釘稀木脆板薄造不如式樣運不及年限其弊有不可勝數者矣查得江北等五總造船皆出杭州蕪湖二處抽分料銀定委清江厰主事監造湖廣荆州抽分銀兩先年亦為造船而設者也可以充用又見有工部主事一員在彼可以帶管及查湖廣所産楠木居多若將前船俱作楠木七年一造以一千一十二隻分為七年每年實該造一百四十四隻五分有零每隻連底船用銀九十兩五錢嵗共該用銀一萬三千七十七兩有零是又為畫一之道矣合無自嘉靖九年為始查照清江浦事例於荆州水次總設一厰將前武昌等十一衛所該造淺船俱移在彼團造就用抽分銀兩作為料銀仍照清江浦事例於十一衛所各選千百户一員管造坐委荆州抽分主事帶管監督其原𣲖軍三民七料銀悉從除豁免其辦納永為定規則軍民既蒙休養之澤而運船尤有歸一漕務得以振舉矣乞敕户工二部從長議處早賜定奪施行一慎舉用天下之事履而後知中人之情有所慕斯勸自古則然查得永樂宣德成化年間運糧把總有缺皆於各衛運糧指揮內推舉老成無過熟知運事者奏請推用蓋運總領兊年深推為把總則若利若弊可行不可行與錢糧之盈縮軍士之苦樂河道之險易無一不知其為之斯易矣古人輕車熟路之説正如是爾况把總以都指揮行事歷升長印挂印坐營坐府皆可及焉運總之才者得為之則人人思奮雖貪而不敢貪雖虐而不敢虐譬猶明珠在前踴躍而取之矣當時運事修舉卓有成效用此道也正德年間劉瑾用事各把總官不全自運總推舉多用生踈之人既懵於事體又忽乎軍情敗者多矣自兹運總亦弛然懈怠而略其前進之心漕政日廢又何怪焉正德十二年漕運都御史張縉具題把總官有缺仍照舊例於衛總內曽經旌奬熟知運事者推補等因該户部會官議擬題奉欽依推用其為軍國之計至矣乞敕戶兵二部查照先年事例再為議處仍行漕運衙門於各衛總管運年深指揮內慎選守已恤軍及有才能與周知運務者開送兵部收候遇有把總官員缺就於內選擇相應人員疏名上請簡用則把總得練達之才事不可敗運總寓鼓舞之術人各知勸矣一嚴事例查得議單一欵該漕運衙門題開要將各司府州縣折耗輕賫銀兩每年務隨正糧各自一併兌完方許出給通關不必總類延遲仍舊稱封裝鞘差官隨運解淮驗封明白交付運官同運赴京雇腳完糧若或不早徴解致纍官軍沿途跟趕耽悮完納照遲糧事例一體參究治罪等因俱經户部會官議擬題奉欽依通行欽遵訖及據浙江杭州右衛運糧指揮僉事吳臣等呈切見漕運官軍千里轉輸艱辛萬狀其得月糧以安家口行糧以充途費先年行糧俱照例隨同大糧𣲖兊得濟窮困近年以來法緩人姦有司縱令糧長各指稻麥收後方才催徴給領以致官軍經月困守不得隨船食用旗軍只得侵食官糧深遭負纍呈乞議處等因為照輕賫乃正糧腳價之需行糧尤運軍食用之物舊定事例必須隨糧而兊隨軍而行隨船而進所以杜姦弊戒非虞濟軍士之急也奈何近年府州縣管糧官員不念國計惟便已私恣將輕賫銀兩不行照例隨糧交兌糧兌已足船已開行每衛止留一百户帶二三旗甲守候經久方才得完雇船裝載沿河跟趕非惟有悮交納抑且别生侵欺至於盜賊窺伺之虞尤大有可慮者矣其行糧一節南京江西等司府俱隨正糧兌與官軍各得濟用惟南直𨽻浙江司府十數年以來分撥多非近倉催徴又違原限直待幫船過淮抵灣方才給領官旗人等指名公費任意花銷故軍士有率弗獲升斗之用者因而竊取耗米盜食正糧交納虧折挂籌借債實由於斯乞敕户部計議申明事例通行各該府州縣掌印官將各輕賫銀兩同正糧𣲖徴并行直𨽻蘇松等府及浙江布政司以後年分行糧俱要分撥附近倉分候各運船到日正糧輕賫一時兌足行糧亦即給領眼同軍士交割任船輕賫公同看守行糧隨便食用過淮之日聽臣等查驗不許仍似往年遲悮以致先後相失緩急難濟則交納無悮而軍士得沾實惠盜米借債之患亦可除矣題折收俸糧事彭韶切照東南財賦國計所資大則內府之供次則百官之俸軍國之需出自蘇松常三府為多遞年户部止將秋糧正數𣲖令起運兩京交納中間加耗船腳等項無所借辦不得已就於正米上加收五六斗以備支撥既已支訖就撥糧長運夫於當年十二月以裡盡行起身次年八月九月內回還未久又行支撥以候下運今者成化二十年天時久旱運河乾淺各府糧船至今多未曽回其為艱苦何可勝言臣熟思之須於此時濟以權變之宜庶不虧官損民大約蘇松常三府每嵗起運南北京白糧計九萬四千有零兊軍糧一百三萬有零此則升斗本色不可缺者也至於百官俸糧在京各衙計約七萬有零南京各衙門一十九萬有零此則權宜折解銀價似亦可行蓋京官家口多是糴買米麵榖粟相兼食用其南京俸糧又盡出帖賣人未曽親自關支若南京則米糧易得官員之家既有實價可不勞致也臣切謂折銀為便伏望聖明軫念三郡人民飛挽之勞稍與蘇息乞敕户部會官計議合無今後將蘇松常三府秋糧原𣲖在京五府六部等衙門官員俸米每石計加耗船隻等項折白銀一兩南京公侯駙馬伯五府六部等衙門各官俸米除留一二石外餘俸每石計加耗船腳等項折白銀六錢俱無耗銀於內將在京官員不分南北二京俸米俱解在京各衙門交納南京官員俱解南京各衙門交納庶幾東南民運可略減省而官員俸糧銀亦不虧損實為便益緣係折解俸糧事理未敢擅便専差典史周瑜賫俸謹題請旨論祿米俸米王瓊國初天下諸王皆置護衛有兵權至太宗即位後遂皆革罷不許來朝初制親王嵗支祿米一萬石後因地方豐歉或有減支郡王將軍俱有常祿亦因民供有限悉減支一半本色一半折色其折色多不關支又如初封郡王嵗支二千石以後襲俱支一千石後亦有例初封郡王亦支一千石又如郡王生子多至二三十人者有之慶成王生七十子只以十子論之一嵗該支米一萬五十石反多於一字王祿米矣先年陜西慶府分封郡王俱於慶府一萬米內分撥并軍校亦於大府分出不知彼時奉何事例又於鎮國等將軍年一十二嵗即請封號祿米𢎞治十一年因災異禮部會官議修省事件郎中慈溪王綸白於諸大臣定擬鎮國等將軍年及十五嵗方準撥支祿米至今行之以民論之則日益不給以宗室論之往往衣食不繼反不如庶民之家得自為生計也又宗室犯罪降為庶人者計口月給米石比與將軍中尉反得實惠宗室例不得種田納稅商販營利而常祿不給日見其貧乏不能存活矣國初定制百官俸給皆支本色米石如知縣月支米七石嵗支米八十四石足勾養廉用度後改四品以上三分本色七分折色五品以下四分本色六分折色後又改在外官月支本色米二石其餘俱支折色其折色以鈔為則每米一石折鈔十五貫或二十貫每布一匹折米二十石京官折俸四五年不得一支外官通不得支俸祿之制果能守哉欲禁貪婪是以難也論食貨王鏊正統以前天下嵗徴稅糧凡三千六百三十二萬一千餘石內三百二十萬九千石折銀八十一萬四千餘兩户口商稅除折米外并船料鈔折銀可得四十三萬九千餘兩兩淮鹽場鹽課銀嵗不下數萬千兩各處稅糧折徴共一伯三萬餘兩雲南閘辦三萬餘兩各鈔關船料四萬餘兩馬草折徴三十三萬餘兩鹽課折徴二十餘萬兩每年入數共二百四十三萬兩送內庫預備成造等項十餘萬兩或二十萬兩官軍俸銀三十三萬餘兩官軍折俸三十三萬六千五百餘兩宣府大同遼東陜西年例共四十萬兩若有聲息緊急奏討加添四五十萬或二三十萬聖旦千秋節用三十九萬二千八百餘兩親王王妃公主及上用及天下王府銀盆水罐儀仗等用共十三萬七千五百餘兩每年出數共百餘萬兩正德以來天下親王三十郡王二百十五鎮國將軍至中尉二千七百文職二萬四百餘員武職十萬餘員衛所七百七十二旗軍八十九萬六千餘廪膳生員三萬五千八百二十名吏五萬五千餘各項俸糧約數千萬浙江等十三布政司并南北直𨽻額𣲖夏稅秋糧大約二千六百六十八萬四千五百五十餘石出多入少故王府久缺祿米衛所缺月糧各邊缺軍餉各省缺俸廪嵗漕之數嵗運正糧凡四百萬石內兌運二十四萬赴薊州倉改兊六萬赴天津餘三百七十萬赴京通二倉舊例民運淮安徐州臨清德州水次四倉交收漕運官分𣲖官軍餘內支運於通州天津二倉成化十年議四倉所收令官軍徑赴州縣水次四倉交兌名為改兌𢎞治十六年又以𣲖不足額每年於水次四倉支運九萬六百石以足前數正德間全𣲖改兌支運遂絶蘇州嵗運軍糧六十五萬石加耗過埧每石加七斗九升不過埧每石加六斗六升外金花銀十七萬兩折米六十八萬鳳陽南京不在數中存留在蘇嵗七萬石河南嵗漕三十萬浙江六十萬祖宗時嵗用且以黃蠟一事言之國初嵗用不過三萬斤景泰天順間加至八萬五千成化以後加至一十二萬其餘可推也正德十六年工部奏巾帽局缺內侍巾帽靴鞋合用紵絲紗羅皮張等料成化間二十餘萬𢎞治間至三十餘萬正德八九年至四十六萬末年至七十二萬東漢永平中始定宦官員數中常侍四人小黃門十人和帝以後中常侍至十人小黃門二十人唐太宗詔內侍不立三品中宗時黃衣乃千員外置千員衣紫者尚少開元天寶黃衣以上三千員衣紫者千餘其稱旨者輒拜三品列戟於門宋初自供奉官至黃門一百八十人為定員孝宗時仍定以二百人為額後增至二百五十人今上即位之初錦衣衛旗校革三萬一千八百餘嵗省糧儲數十萬裁革冗官冗兵一千四萬餘嵗省京儲一百六十八萬石以下缺文冗食議王鏊國初設官沿革月異日殊自洪武十三年罷大都督府中書省御史臺升六部都察院與通政司大理寺為九卿而太常太僕光祿鴻臚寺欽天國子監太醫翰林院各統其屬以外攝都布按三司之政務至建文永樂損益相仍其綱維體統具載諸司職掌大明官制通行萬世無弊蓋虞夏商周之復見也然因事設官非官則政務不舉以人立政非人則政不虛行如翰林則不可拘員給舍則不必具員而採訪巡撫鎮守經略以臺臣部職行事巡鹽巡茶巡倉巡河巡關巡海巡江清軍清匠兵備守備守禦管糧提學之設有增無減雖建言裁革詔旨頻頒而添設如舊官設矣循常候代思遷其秩而巳官事不攝者何如哉此猶有職任可諉也武職至都督以下為升官指揮使以下為世襲蹊徑之冒濫傍枝之混淆終其身繼其世老子長孫而兵革不知戰陳不識食祿自如也至傳奉乞恩報功紀績者填衢塞路而不已將校多於卒伍冠辨倍於兜牟土地所生貢賦所入日報虧矣而衆食如此非當世之深憂哉正德中籍沒劉瑾貨財金二十四萬錠又五萬七千八百兩元寶五百萬錠銀八百萬又一百五十八萬三千六百兩寶石二斗金甲二金駒三千玉帶四千一百四十二束獅蠻帶二束金銀湯盬五百四蟒衣百七十襲牙牌二匱穿宫牌五百金牌三衮袍四八爪金龍盔甲三千玉琴一玉珤印一顆以上共金一千二百五萬七千八百兩銀共二萬五千九百五十八萬三千六百兩嘉靖初籍朱寧貨財金七十扛共十萬五千兩銀二千四百九十扛共四百九十八萬兩碎金銀四箱碎銀十匱金銀湯盬四百金首飾五百十一箱珍珠二匱金銀臺盞四百二十副玉帶二千五百束金縧環四箱珍珠眉葉纓絡七箱烏木盆二花盆五沈香盆二金仙鶴二對織金蟒衣五百箱羅鈿屏風五十大理石屏風三十三座圍屏五十三蘇木七十扛胡椒三千五百石香椒三十扛假匹三千五百八十扛綾絹布三十三扛錫器磁器三百扛佛像一百三十匱又三十扛祖母緑一尊銅鐡獅子四百車銅盆五古銅爐八百三十古畫四十扛白玉琴一金船二白玉琵琶一銅器五十扛巧石八十扛嗚呼胡椒八百斛世以為侈也而盛傳之今觀二逆賊籍視元載何如聞昔王振曹吉祥之籍也尤多官家府庫安得不空百姓脂膏安得不竭國家富有四海非若宋之偏安有宋西北二邊嵗幣百萬百官祠祿郊賜之類今皆無之宋制臺省六品諸司五品一郊而任一人兩制以上一嵗而任一人子又任其孫孫又任其子任姪任甥亦有之今三品以上才得一子入監可謂至窄宋民間器物傳至今者皆極精巧今人鹵莽特甚非特古今之性殊也蓋亦坐貧故耳觀宋人夢華録武林舊事民間如此之奢雖南渡猶然近嵗民間無隔宿之儲官府無經年之積此其故何也人皆曰本朝藩府太多武職太冗是固然矣又有一焉而人莫之及古稱天下之財不在官則在民今民之膏血已竭官府之府庫皆空豈非皆歸此輩乎為國者曷以是思之名臣經濟録卷二十二
