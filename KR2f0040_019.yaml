body:
  text: 名臣經濟録巻十九明黄訓編吏部驗封稽勲考功封贈䕃叙議廣東都指揮使狄崇王臻言妻阮氏等封淑人已沒仍乞封次妻何氏等為淑人詔下廷臣議太師韓國李善長及禮部等官議曰禮莫大於分分莫大於名妾不可為嫡夫人故魯莊公妾成風僖公母也稱為夫人春秋非之哀公庶子荆之母嬖將以為夫人使宗人釁夏獻其禮對曰無之昔周公武公娶於薛孝惠娶於商自桓以下娶於齊此禮則有若以妾為夫人則故無其禮蓋古夫人沒貴妾攝其家事不得稱為夫人若庶子而貴得以推恩其母亦不得稱為夫人使並嫡也今崇臻欲任私意廢大禮亂嫡妾之分不可許上從之命禮部及翰林儒臣定嫡妾封贈例頒示中外於是定議凡正妻在日所娶側室皆謂之妾正妻沒諸妾不許再立為妻若以禮聘良家女為妻許受封贈前妻無子其所生子即為嫡長子若正妻在日無子不再娶而諸妾有子者當以長男襲父職其子依本品職推恩其母俱從之庚申詔定擬文官封贈䕃叙之制封贈例十一其一文官一品至七品止封贈散官職事其應封一代者父與子同妻從夫貴應封二代者祖降父一級應封三代者曽祖降祖一級父見任者不封已致仕及亡沒者封之其在任棄官就封者聴其二應封父母者嫡母在所生之母不得封嫡母亡得並封若所生母未封不得先封其妻其三父母有兩子當封者從其髙品婦人因其子受封而夫與子兩有官當封者從其髙品父母原有官既殁而因其子孫封贈者進一階其四應封妻者止封正妻正妻殁亦得追封凡繼室止封一人其五命婦因子孫品級封者並加太字若已殁及曽祖祖父母在者不加其六凡正從七品陞至正從六品封贈一次陞至正從五品封贈一次陞至正從四品封贈一次陞至正從三品封贈一次陞至正從二品封贈一次陞至正從一品封贈一次其七曽祖父母父母曽犯十惡奸盗除名等罪其妻非禮聘正室或再醮及娼優婢妾並不許申請其八封贈之後但凡賍私者並追奪其九凡婦因夫貴母因子貴受封不許再醮違者治之如律其十京官四品以上試職實授頒給誥命取自上裁其巳授誥命者亦須一考滿秩方許封贈五品以下官試職一年考覈稱職者實授頒給誥勑不稱職者黜降其已授誥勑者亦須一考方許封贈其十一凡在外三年為一考稱職者頒給誥勑再考稱職聴請封贈其有才能卓異出自特恩者不在此例䕃叙之例五其一用䕃以嫡長子若嫡長子殘廢則嫡長之子孫以逮曽𤣥無則嫡長之同母弟以逮曽𤣥又無則繼室及諸妾所生者又無則傍䕃其親兄弟子孫又無則傍䕃其伯叔子孫其二用䕃者孫降子曽孫降孫傍廕者皆於應叙品第降一級其三正一品官廕其子於正五品用從一品子則從五品用正二品子則正六品用從二品子則從六品用正三品子則正七品用從三品子則從七品用正四品子則正八品用從四品子則從八品用正五品子則正九品用從五品子則從九品用正六品子則於未入流上等職内叙用如行人巡檢司獄之𩔖從六品子則於未入流中等職内叙用如各關倉庫稅課司局批驗鐵冶所官之𩔖正從七品子則於未入流下等職内叙用如逓運所驛丞閘壩之𩔖其四凡職官子孫許廕一人年二十五以上能通本經四書大義者叙用其不通者發還習學其五應叙之人各於原籍附近布政司所屬地方銓注詔皆從之論誥勑狀李賢臣聞誥勑者勸懲善惡之良法激勵名節之美事夫豈無益之費哉洪惟國朝制諸司職掌於誥勑一事至詳且備可為萬世法程凡大小之臣有私過者終身不得無私過者方許請給既與之後少有私過輒行追奪於是為官者未得之前兢兢小心既得之後益加謹慎馭士之方惟此為要此事一行則天下之士莫不感激去惡為善修身飭行顧惜名節是以所費者少所勸者多若此法不行則士皆失望善惡不分名節不振其有廉潔自守者反為貪夫所笑曰無異於我何苦於是則天下之士相率而入於利途民之被害可勝言哉是朝廷所惜者寡而下民所傷者衆臣竊痛之然此事非但勸夫在位之士其未入仕者見已仕者䝉此恩榮推及父母光耀鄉里莫不爭自琢磨奮志經史明體適用竭才殫智願為國家之用矣譬之以餌致魚則投餌之費小得魚之利大有國家者豈可舍此而不為哉我國朝自洪武永樂以來此法雖行而未盛至洪熈宣德以來始大舉行於是天下之士皷舞歡欣無不感激逮皇上即位以來率由舊章近者行在吏部欽奉㫖意今後誥勑俱待九年考滿方與不許照諸司職掌施行臣愚不審聖意所在若以為織造縻費則臣已言之於前所費者少而所利者多若以為各官得之易而多不保守旋復追奪則臣所目為保守者什九追奪者什一況中人之材可為善可為惡授職三年即得誥勑不勝榮幸遂革非向善戰兢保守而為端正之士若待九年則此輩必不持乆遂流於貪況九年方與得給者十無二三不得給者十常八九何哉凡内外官員九年之中多不能齊有歴任四五年而轉遷者有歴任六七年而保陞者有父母垂老而不能待者有巳身多故而不遂請者如此則天下之士感激者少怠志者多使國家勸善懲惡之法激厲名節之事無所於籍而下民亦未能不被其害伏願皇上留意守祖宗之成憲遵先帝之良法昭曠典而宏惠澤乞勑所司今後誥勑仍照諸司職掌施行在京官員三年考滿依例請給在外官員三年與本身六年請封贈如此則天下之士善不患不勸惡不患不懲名節不患不振下民不患不安矣臣為驗封主事職頒誥勑既有所見豈敢隠黙若以避嫌而不言則為不忠以所掌而自言則為要名臣寧受要名之責不蹈不忠之罪故陳愚悃干冒天威不勝慄戰之至議封贈繼母奏王恕驗封清吏司案呈奉本部送准南京吏部咨開南京太僕寺寺丞文林照例請給故父文洪故母陳氏故繼母顧氏見在繼母吕氏勅命等因到部送司照得成化二十三年四月十九日欽奉詔書内一欵兩京文武官員未關誥勅者七品以上至四品若父母見在先與誥勑封之三品以上俱與應誥命不為常例欽此續該本部查照天順年間欽奉詔書恩例節比題准各官父在兼贈其母母在兼贈其父共給誥勑一軸以省多費事例具題奉憲宗皇帝聖㫖照天順年間給與欽此欽遵又查得本部見行事例凡子應封父母者繼母亦該受封諸司職掌内不曽開有繼母二人三人俱封贈亦不曽開有繼母止封一人止有應封妻者繼室止封一人之説今該前因案呈到部看得子之於繼母禮有斬衰三年之服繼母或一人或二人三人遇有大故為之子者皆當依例守制遇有恩例似不可止及一人今寺丞文林請給林母并二繼母勑命揆諸天理民彛似合給與但往時未見有二繼母並受封贈者所以再三躊躇未敢輕易與之奏請若照繼室止封一人例不與之奏請不審今後見在繼母奉養有闕及有所違犯宜如何治罪而其服制宜何如守也今因文林照例請給勑命若不與之講究陳請定奪非惟有孤恩典且使為繼母者自分此彼而意有厚薄而其子之於繼母雖欲同一孝心而不能盡非所以均仁恩而勸慈孝也合無准寺丞文林封贈父母并二繼母共給誥命一軸以後遇有應請告勑官員或有二三繼母者亦照此例一體請給庶幾恩典均及而子母之心安矣縁係恩典及係事例可否臣等未敢擅便定奪伏乞聖明裁處𢎞治元年五月二十三日具題奉聖㫖諸司職掌原無封繼母之文後來許封一人已是加厚了文林勑命只照見行事例與他欽此議封見在繼母奏狀王恕驗封清吏司案呈奉本部送准户部咨廣東清吏司案呈奉本部判送據山西清吏司主事唐錦舟呈云等因到部送司案呈看得主事唐錦舟係正六品官例該封贈父母及妻查得伊故父唐仁先任吏科給事中已關勑命故母周氏故繼母周氏俱已封贈孺人訖今本官乞要封見在繼母舒氏若拘常例止封一繼母縁前繼母係伊父請給勑命所封非本官請給勑命之所封今要封其見在繼母亦是止封一繼母非封二繼母也若不准令封其見在繼母止令封其妻使其繼母穿著常服坐於其上其妻珠冠霞帔立於其傍為子者寧能自安為婦者亦何忍為似非聖朝教人以孝之意也合無准令主事唐錦舟封其見在繼母舒氏今後該封繼母者止封見在繼母一人若前繼母曽因父受封後繼母見在亦照此例封之如此則姑婦同榮母子皆安恩澤均而彛倫厚聖朝以孝教人之意可謂曲盡其情而為萬世法矣縁係請給勑命及係事例未敢擅便定奪𢎞治元年十二月二十一日具題奉聖㫖是唐錦舟准封見在繼母欽此議知府王衡陳言停止納財充吏奏狀王恕驗封清吏司案呈奉本部送吏科抄出直𨽻廣平府知府陳衡等奏云云等因具本該通政司官於奉天門奏奉聖㫖吏部知道欽此欽遵抄出到部送司查得成化三年十月内該浙江嘉興府知府楊繼宗奏稱納米農民俱係奔競無籍之徒營求請託借債納米若得㕘充瞞官作弊要乞革去照依洪武年間舊例著落里老呈報相應識字農民㕘補等因本部已經依擬題准通行天下遵守去又查得成化二十一等年該陜西山西宣府江西等處巡撫右副都御史等官鄭時等各因地方災傷賑濟軍民糧草闕乏節次奏准定與則例生員上納銀米入監讀書在京在外吏典承差知印上納銀米草束或免辦事考試就撥當該或免當該考試就與冠帶各照資格出身或聴選不拘年分不次選除生員事例停止外其餘俱各見行及查得自成化二十一年起至𢎞治元年二月終止吏典人等納過糧草等項已到部者共二千一百五十餘名生員納過銀米已入監者共六千餘名通查案呈到部訪得永樂宣德正統年間天下亦有災傷各邊亦有軍馬當時未嘗舉行納糧草納銀兩為監生為吏典等項事例糧草不聞不足民兵不聞困斃近年以來各邊并腹裡小有災傷所在守土等官止圖目前分寸之利不為國家長乆之謀輒便奏開生員吏典人等納糧草銀兩等項事例彼此效尤遂為長䇿殊不知祖宗教養生員㕘充吏役良法美意各有攸在且如生員選於民間俊秀子弟教養於學校成材者科貢入監不成才者充吏為民未嘗不别賢否一槩濫進也其吏役亦必於農民之中選其識字能書者充之令其書辦文案及其兩考役滿赴部辦事數年纔撥京考京考滿日考中纔得冠帶不中者發回為民亦未嘗不論能否一槩入選也近來因有前例是以在學無志生員及未入學富家子弟揑作生員名色不分賢否有無學識一槩入監以圖出身將來入仕不知為政之道豈不悞事殃民一切小民不分能書與不能書不論市民與農民一槩聴缺充吏不惟官司不得伊書辦文案且於舊制有違及其三考役滿又免考驗一槩照依資格出身所以多不稱職比先年間監生止由科貢吏典亦循年資别無雜進之途是以聴選之人不多選法不致壅滯任用亦多得人自有此例雜進者日多一日以致正途監生吏典因而壅滯不得出身多者十七八年少亦不下十五六年纔得選用年已向衰誰肯盡心幹事不謀歸計甚至聴選年老例不入選只與冠帶閒住又况此等雜途所進中間多負債破産頑鈍無恥之輩今日既知以財進身他日豈肯以亷律已欲不貪財害民天下治安何由可得若不早為處置日復一日不惟有壊選法而正途有壅滯之苦抑恐官授非人而小民遭無窮之殃誠不可不慮也今廣平府知府等官王衡等奏要今後遇有災傷凡百長策任其施為不許再擬納財充吏永杜貪利之門一節實端本澄源之論深為有理方今皇上嗣位之初萬化維新凡此弊政正當除革合無准其所言通將前項陜西山西宣府江西奏行納糧納草等項事例限本年四月以裡通行停止仍行户部并各處巡撫巡按鎮守等官先時預慮多方儲蓄務使緩急有備不致臨期告乏今後遇有災傷及邊方糧草不足不許再行奏開前項生員吏典人等納草等項事例貽患將來其在外補充吏典仍行天下司府等衙門各遵舊制於農民内選充不許一槩濫收如此則非才不得倖進而選法自通任用可以得人而民生自遂實為便益縁係停止納粟等項事例以防後患及奉欽依吏部知道事理未敢擅便𢎞治元年三月初四具題奉聖㫖是欽此議布政使裁革承奉司吏奏狀王恕驗封清吏司案呈奉本部送内府抄出徽王奏云云等因具本奏奉聖㫖吏部看了來説欽此欽遵抄出到部送司案呈查得祖訓條章并諸司職掌内俱不曽開有各王府承奉司合設吏典縁由今内府各監局亦不曽設有吏典及秦晉周楚等王府承奉司亦無吏典考滿到部想是自來不曽設有止查得天順七年德王府該本府長史司手本開本司并所屬衙門無吏書辦要行定撥等因前來本年七月内本部撥去長史司吏户禮房司吏一名典吏六名兵刑工房司吏一名典吏六名審理所司吏二名典吏四名良醫所司吏一名典膳所奉祠所工正所司吏各一名典吏各二名典簿㕔典吏一名廣受倉廣受庫攅典各一名不曽撥有承奏司典吏本年九月内撥承奉司司典各一名各送著役去訖稿簿内亦不曽開稱因何添撥以後秀王崇王吉王徽王等府相因俱撥有承奉司司典吏各一名今徽王奏稱河南左布政使徐恪行文裁革本府承奉司吏典二名等因不知徐恪因見祖訓條章并諸司職掌内不曽該載承奉司吏典或見周伊等府承奉司俱無吏典獨徽府承奉司有吏典疑是濫設要行查革抑不知别有其故未經行勘難便定奪合無本部行移河南布政司查勘前項吏典因何要行裁革著令從實回報前來另行奏請定奪等因具題奉聖㫖是欽此欽遵已行河南布政司查勘去後今該前因案呈看得前項承奉司吏典諸司職掌既不該載周趙唐伊鄭等府自來又不曽撥有況本部在前撥送德崇吉徽四府各承奉司之時亦無奏奉聖㫖縁由左布政使徐恪職司前事恪遵祖宗成憲裁革誠是但前吏相沿㕘撥頗乆不行咨呈本部查勘待報施行就行裁革雖無别情而輕易之罪亦不能辭欲轉行德崇吉徽四府長史司將承奉司吏典一體裁革送各該布政司改撥及行都察院轉行河南巡按監察御史將徐恪就彼提問明白照例發落縁係裁革吏典㕘問方面官及先奉欽依吏部看了來説事理未敢擅便𢎞治二年九月二十日具題次日奉聖㫖是既祖訓條章并諸司職掌不曽開有承奉司吏典便冩書與各王知道照例裁革徐恪處事輕易本當提問且饒這遭還罰俸兩月欽此論起復奪情不可為例奏狀王恕稽勲清吏司案呈奉本部送内府抄出内官監太監黄順等題云云等因具題奉聖㫖准他吏部知道欽此欽遵抄出到部送司案查潘俊等聞父母喪已經移文本部關給勘合守制去後今奉前因案呈到部查得諸司職掌内凡内外官吏人等例合丁憂者仍以聞喪月日為始皇上以孝治天下臣民方且觀感而興起矣豈可因此小官而開奪情起復之門以干祖宗之典憲而傷國家之風化乎伏望聖明收回前命仍令潘俊等守制滿日依例起復如此則祖宗之法不壊而陛下仁孝之道通於神明光於四海休徴畢至而令名無窮焉縁係扶持風化及奉欽依准他吏部知道事理𢎞治元年十月初六日本部具題次日奉聖㫖匠官係手藝人已准他了罷欽此臣等竊惟子生三年然後免於父母之懐故父母沒而子服三年之喪所以報本也此古昔聖人縁情制禮之意萬世行之而不可易者又聞古人居親之喪有三年不言者有泣血三年者非矯情也蓋不忘親耳洪惟我太祖髙皇帝斟酌古禮定為時制凡文職官吏監生生員知印承差人等聞父母喪悉令丁憂守制所以教之以孝也而守制止於二十七月所以示之有終也今潘俊等雖是手藝之人已居官食禄亦係守制人員陛下因該監官之請而許其奪情起復臣等所以言之者蓋甚有違前項事例使忠臣孝子聞而議之心誠不安今陛下特降德音如此臣等固不敢違若不再陳但恐後之人遂以為例相率而忘其孝有傷聖明之風化是臣等不言之罪也欲望陛下著為定例自今以後凡文職官吏人等聞父母之喪非身任金革之事悉令依例守制終喪敢有營求奏保奪情起復者許科道官糾劾本人以匿喪論奏保之人以違制論如此則人知所警懼而相勸勉於孝矣何患風化之不厚天下之不治乎縁係扶持風化事理未敢擅便𢎞治元年十月初九日具題次日奉聖㫖是欽此定奪欽天監官奔喪奏狀王恕稽勲清吏司案呈奉本部送據欽天監呈前事據五官司厯劉玉呈稱有母張氏𢎞治二年正月十九日病故祖塋在於順天府東直門外遷民屯已於本年三月初三日安葬畢思得本職係是親男例應守制理合具呈乞為查照定奪等因到監據此查得洪武十九年二月二十四日該本監官於奉天門欽奉太祖髙皇帝聖㫖恁隂陽官人毎都不要丁憂永為常例欽此欽遵外今照本監查無守制事例及看得本官母故己行安葬完畢要行守制一節縁本官係是提督造厯𦂳要官員正值興工之時及有前項事例本監難擅定奪備呈乞為查照定奪等因到部送司案呈查得永樂二年二月十七日有本監五官司厯潘緝熈父故要回奔喪該監官奏奉太宗文皇帝聖㫖著他去欽此天順二年二月二十九日五官靈臺郎方欽母故呈乞奔喪該監官引奏奉英宗睿皇帝聖㫖照例欽此成化元年二月十二日監正谷濱母故奏要奔喪該本部具題奉憲宗純皇帝聖㫖照例欽此成化六年三月二十三日五官靈臺郎呉英父故奏乞終喪該本部具題奉憲宗純皇帝聖㫖准他去奔喪欽此及成化十年三月二十日監副楊瑛順天府人繼母病故奏乞躬葬成化十七年三月二十五日中官正皇甫敬母故置丘塋所順天府地方奏要安葬成化二十二年十二月十三日漏刻博士袁洪父故置地順天府地方奏乞奔喪安葬本部節次照例題准俱限三箇月奔喪安葬畢日照舊辦事前項奔喪事例已行八十有餘年以袁洪父故置地順天府地方與劉玉事體相同又係目前之事本官與本監官豈得不知今本官既有母喪自合隨即呈監轉呈本部照例奔喪為當却乃遷延月乆待其安葬已畢方纔具呈意欲免其奔喪顯有貪禄忘親之情而該監官却將奔喪事例匿而不言止稱查無守制事例又稱本官係是提督造厯𦂳要官員雖稱呈乞定奪其意亦欲免本官住俸奔喪不無受囑情弊且該監官聞父母喪既已免其守制若不照例奔喪則是於送終之禮全不用情烏得為孝子乎且聖明之世有禄人員豈可容此不孝之人所據劉玉并該監僉書官吏本當究問但呈文内有呈乞定奪字様合無免其送問行令劉玉照例奔喪三箇月滿日赴部送回本監照舊辦事以後凡遇該監官員人等聞父母喪者務要照依前例隨即具呈奔喪敢有託故不奔喪者以違制論堂上官知不令奔喪者亦治以罪如此則法令嚴而奸頑懼彛倫明而風俗美縁係查照定奪欽天監官奔喪事理未敢擅便𢎞治二年四月十七日具題次日奉聖㫖是欽此議給事中盧亨脩明治道奏狀王恕考功清吏司案呈奉本部送兵科抄出本科給事中盧亨題云云等因題奉聖旨該衙門知道欽此欽遵抄出送司案呈照得本部見行事例在外司府州縣等衙門官員三年六年給由赴部考覈不分稱職與不稱俱照例引奏復職必待九年通考然後論其殿最定其黜陟是即唐虞三載考績三考黜陟幽明之良法若有老疾罷軟等項不職官員聴各該巡撫巡按官考察黜退三年朝覲大明黜陟中間果有治行卓異者復有旌擢之典其法可謂周悉無遺矣今看得給事中盧亨所言大意以為官不乆任則政多紛更政多紛更則民無定守今後官員三年考滿果有卓異政績量陞一級仍留管事必俟九年考滿然後不次陞擢知縣就陞知府知府就陞布政一節其意固善但三年量陞一級存留管事似非舊制若知縣必待九年陞知府又恐御史有缺不得相應老成官員除補知府必待九年陞布政非惟㕘政有缺少相應官員陞補抑恐㕘政任滿無相應員缺轉遷且以資格待尋常之士不以資格待非常之才此古今通制也合無仍照舊制除巡檢倉場等官三年週歳考滿外其餘司府州縣等衙門俱候九年滿日考其殿最定其黜陟果有政蹟卓異者府州縣官必須曽經一考以上考稱者遇有相應員缺斟酌陞用方面官不拘年歳遇有相應員缺照例推舉仍行各處巡撫巡按都御史等衙門今後府州縣官果有廉能幹濟政蹟卓異者務要循名責實從公舉保以憑具奏旌擢不許將阿䛕奔競有名無實人員一槩濫舉如所舉非人以致蠧政殃民者聴本部并科道官紏舉㕘奏如此則進用有序庶官不曠縁奉欽依該衙門知道事理未敢擅便𢎞治三年八月二十四日具題次日奉聖㫖是欽此議魯府鎮國將軍陳言便民奏狀王恕考功清吏司案呈奉本部送准禮部咨該魯府鎮國將軍陽奏云云等因具本奏奉聖㫖該衙門看了來説欽此欽遵除開言路以廣見聞等三事本部另行外其餘嚴黜陟以安民庶等事係𨽻别衙門掌行抄單移咨到部送司案呈今將所言事件各開前件逐一議擬伏乞聖裁縁奉欽依該衙門看了來説事理未敢擅便𢎞治元年九月二十七日具題次日奉聖㫖王輔導官不為常例著巡撫巡按官㑹同考察奏來處置其餘准擬欽此一查得本部欽奉詔書并節次奏准考察官員事理俱行移巡撫廵按并布按二司等官將所屬守領等項官員嚴加訪察務在至公無私不許顛倒是非及遇所屬三年六年九年考滿之時務要從公嚴加考覈不許狥情虚應故事以致黜陟不公等因去後今鎮國將軍陽所言巡撫巡按官考察官員不過據該司開陳賢否以憑黜陟該司官與府州縣官豈無親故讐嫌以致考察不公黜陟不明要行各處巡撫巡按及布按二司官凡遇考績黜陟之時務要設法體訪陟其明而黜其幽一節其言有理深中時弊合無准其所言通行各處巡撫巡按并布按二司官今後凡遇所屬府州縣官或三年六年九年考覈或朝覲考察或保舉糾劾務要公心設法體訪得其賢否之實一黜一陟必須允合輿論不許容情挾私以致是非顛倒黜陟不公人心不服責有攸歸一查得近該吏科給事中廷玉題稱近來納粟監生數多彼既以財出身得官豈不拔本生民被其魚肉要預先立為上中下三等於臨選之時吏部出題嚴加考試以文理通暢者為上文理稍通冩字端楷非請客者為中不諳文理冩字粗拙請客者為下上中二等量其髙下與科貢一體選用下等者填注衙門職銜令其冠帶閒住及行移國子監天下學校省諭各生知㑹使知及時勉學毋致後日追悔本部看得所言有理合無依擬於臨選之時嚴加考試分為三等如前所擬選用及冠帶閒住及先行各生知㑹使知各加勉厲奮志進學以收後效題奉聖㫖准議欽此除欽遵通行外今鎮國將軍陽又以為言縁有前項題准事例見行未乆若再更張非惟政體不一抑且人情不堪一看得鎮國將軍陽言各王府輔導官不得其人要行巡撫巡按不為常例通行考察年力精壯文理優長素行清白者存留老弱無為阿䛕不才者就便罷黜一節固為有理查得諸司職掌内開各王府官不係常選任滿黜陟取自上裁似難行令巡撫巡按官考察及查得先該藩王奏稱各王府官中間有年踰七十者不肯告老致仕及年未七十或沾疾病等項願告致仕者俱照例加陞品級等因該本部議擬奏准已經通行去後其言要乞行選端謹有為之人以充厥職所言有理合無候各王府長史等官有缺本部照例於教官之中詢訪推舉相應堪任之人照例銓補庶使輔導得人宗支弼正矣嚴考察以厲庶官奏狀王恕考功清吏司案呈奉本部送吏科抄出河南道監察御史呉泰等云云等因具題奉聖㫖這考察事吏部看了來説欽此欽遵抄出送司查得成化四年該科道官魏元等奏要考察兩京大小衙門官員本部奏奉憲宗皇帝聖㫖是有堂上官的還㑹堂上掌印官公同考察欽此已經㑹官考察外成化十三年又該御史戴縉奏要考察兩京五品以下官員本部查照前例具題節奉憲宗皇帝聖㫖照例㑹官考察欽此欽遵又經㑹官考察訖案呈到部看得南京河南等道監察御史呉泰等奏稱兩京堂上官并在外司府州縣官已經考察獨兩京各衙門五品以下官員年乆未經考察其間才行可稱者固多而貪冒茍且者亦有要行兩京吏部㑹同兩京都察院公同各衙門堂上掌印官從公逐一考察一節臣等竊惟兩京堂上并在外司府州縣節經糾劾考察黜退惟兩京五品以下官委的年乆未經考察不無賢否混淆誠如呉泰等所言合無准其所奏照依前例在京者本部㑹同都察院并公同各衙門堂上掌印官將五品以下見任帶俸并丁憂公差養病省祭等項官員從公逐一考察除廉幹公勤才行超卓者遇有内外相應員缺另行具奏擢用職業頗脩操履不失者存留辦事外其貪淫酷暴罷軟老疾素行不謹浮躁淺露者開具職名奏請定奪如考察不公仍聴科道糾舉其被黜之人若有造言生事摭拾妄奏者治以重罪發遣為民仍行移南京吏部㑹同南京都察院等衙門一體考察徑自具奏定奪其言要嚴立歳考之法在京諸司堂上掌印官及在外布政兩司并各府掌印官毎遇年終各將本衙門及僚屬官員廉貪能否勤惰得失縁由斟酌的確考語造册三本一本奏繳一本送吏部一本送都察院查照一節仰惟國朝定制内外官員已有三載考績三考黜陟之典外官又有朝覲考察之例若再更立歳考之法不無事體紛更難准所擬合無仍照舊例通行在京在外前項衙門堂上掌印官如遇所屬官員三年六年九年考滿之日務要從公嚴加考覈所出考語亦要允協公論不許狥情虚應故事以致賢否混淆黜陟不當事發連坐以罪縁係考察官員及奉欽依這考察事吏部看了來説事理未敢擅便𢎞治元年二月十九日具題當日奉聖㫖是欽此嚴考課之法丘濬仰惟本朝三年一朝覲天下布政按察諸司府州縣官吏各賫須知文册來朝六部都察院行查其所行事件有未完報者當廷劾奏之以行黜陟近歳為因選調積滯設法以疏通之輒憑巡按御史開具掲帖以進退天下官僚不復稽其實跡錄其罪狀立為老疾罷軟貪暴素行不謹等名以黜退之殊非祖宗初意按舊制官員考滿給由到部考得平常及不稱職者亦皆復任必待九年之乆三考之終然後黜降焉其有縁事降職除名亦許其伸理雖當臨刑亦必覆奏其愛惜人才而不輕棄絶之如此可謂仁之至義之盡矣彼哉何人立為此等名目其所謂素行不謹尤為無謂則是不復容人改過遷善凡經書所謂改過不吝過則勿憚改皆非矣夫人自幼至壯自壯至老其所存所行安能事事盡善而無過舉哉不仕則已一履外任稍為人所憎疾則雖有顔閔之行有所不免矣竊觀漢時長吏不任位者三公遣掾吏案驗然後黜退其後不任三府而權歸刺舉之吏朱浮謂有罪者心不厭服無咎者坐被空文意當時長吏雖心不厭服然猶有罪可名雖被空文然猶有文可考今則加以空名如死後節惠之謚受此曖昧不明之惡聲以至於沒齒賫恨况貪者未必暴暴者未必貪老疾未必老疾罷軟未必罷軟素行不謹不知何所指名又何以厭服其心哉宋韓億為執政毎見天下諸路攟拾官吏小過輒不懌曰天下太平聖主之心雖天下昆虫皆欲使之得所仕者大則望為公卿次亦望為侍從下亦望為京朝官柰何錮之於聖世嗚呼禁錮人於聖世固非太平美事然使天下失職之人布滿郡縣亦豈朝廷之福哉伊尹曰一夫不獲時予之辜當道君子尚慎思之奉王冡宰書周叙太保冡宰抑菴大人先生閣下叙惟吾吉自有宋逮今賢才輩出為世道之重鄉邦之光者九賢也由兹以降匪無其人而俊偉光明卓然著稱為無瑕之玉無疵纇之珠者殆亦鮮見焉叙於永樂宣德間嘗仰望少師東里先生可當之然迹其舉措䆒其底裡士大夫公論不容掩也竊自計之堂堂名郡際今聖明大一統之時豈無復有歐陽子胡澹菴周平園楊誠齋文信公其人者出耶為之徘徊嘆息翹佇思慕者乆矣兹乃於大人先生而見之得非吾吉賢才之運國家養士之效之所鍾哉非特叙與吾郡之士動喜天下士大夫亦莫不為之更慶而交賀也伏惟先生處在屯之際翼戴今皇帝嗣大統處大事濟大艱其時其事視諸前輩又甚難者竊謂膺天下之重任必當心天下之大憂成天下之大計而後可以有濟其要無他在於用君子逺小人而已若兩存之譬如持衡之勢此重則彼輕彼輕則此重難並行不悖也蓋小人易進難退君子未有不為所擠者當兹維新之始主上内外惟先生是倚得不毅然少任其責而無少有回顧之慮乎使少有回顧非惟朝廷大事難濟於夫所謂世道之重鄉邦之光者亦難望其全矣叙閒中窺察其人若今某公某及某公某皆君子也其已同朝者宜傾竭倚注之彼在逺在家者宜即日驛召以來之與之朝夕圖惟同心同德以處大事濟大難幸甚小人之道宜徐為之謀強壯者俾膺重鎮於一方年老者許彈劾致仕於其家餘未有顯著之迹藴堪用之才者存之彼自相發奮洗濯琢磨為君子之歸矣其他内外防㣲之政宜與三四君子因人所建白不動聲色以漸處之可也得非謹終於始又曰惟克果斷乃罔後艱竊思我朝當三楊先生輔政之初一幾也不深思熟慮身任其責惟陽歛隂施掩人耳目雖曰自保其實誤國故致今歳七月之禍此時先生與諸君子輔政之初又一幾也宜監覆轍為宗社生靈永逺之謀開天下後世太平之治俾歐陽子周平園之事業復見今日顧不偉哉失今不圖恐異日噬臍之悔莫及矣豈得即能效張子房之從赤松子裴晉公營緑野堂之時伏願先生斷斷若殷之伊傅宋之韓范以天下為已任為心毋徒諉曰尚有某有某而不敢自專為辭若然史臣輩將執彤管磨崖石以紀勒先生之大勲垂示無窮之不暇則天下之大憂大計可收厥效矣叙頼朝廷之恩先生之惠以一介書生官至學士榮矣叨居南京秩清務簡樂矣此外無纎毫求進之心况冒膺宋史之脩倘不即死成此一事竊名穹壤間他富貴皆無所望第學識淺陋不足以當耳所念者國家安叙輩亦或可偷生畢其素志今歳以來因朝廷屢有更張事不敢避禍亦屢有所陳無非為求天下之安故也恭審朝議以為可采否自是以往亦不復敢凟告一語矣伏乞先生垂仁誘掖曲全之感德感德叙兩歳患脾疾今秋復作兼以左身風痺未知可逭生否恃平昔從游門墻兼辱教愛故不得不有言然前此未嘗敢一奉問也兹因論拯時急務不免覼縷干冒崇嚴恕納不宣名臣經濟錄卷十九
